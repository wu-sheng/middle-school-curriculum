subjects:
  - id: math
    name: 数学
    nameEn: Mathematics
    icon: "📐"
    grades:
      - id: grade7
        name: 七年级
        nameEn: Grade 7
        description: 初一数学，依据人教版（2024版上册 / 2025春版下册）
        semesters:
          - id: semester1
            name: 上学期
            nameEn: Semester 1
            version: 七年级数学上册（2024年版）
            chapters:
              - id: rational-numbers
                number: 1
                name: 有理数
                nameEn: Rational Numbers
                hasContent: true
                topics:
                  - 正数、负数、零的意义
                  - 有理数的概念与分类
                  - 数轴的建立与点的表示
                  - 相反数的概念
                  - 绝对值的意义与几何解释
                  - 有理数大小比较
                  - 用数轴分析大小规律
                topicsEn:
                  - Meaning of positive numbers, negative numbers, and zero
                  - Concept and classification of rational numbers
                  - Number line and locating points
                  - Opposite numbers
                  - Absolute value and its geometric meaning
                  - Comparing rational numbers
                  - Using the number line to compare values
              - id: operations-rational-numbers
                number: 2
                name: 有理数的运算
                nameEn: Operations with Rational Numbers
                hasContent: true
                topics:
                  - 有理数加法法则
                  - 有理数减法及转化为加法
                  - 有理数乘法法则
                  - 有理数除法法则
                  - 乘方的意义
                  - 科学记数法
                  - 近似数与精确度的初步认识
                  - 含加减乘除与乘方的混合运算顺序
                  - 综合与实践：进位制的认识与探究
              - id: algebraic-expressions
                number: 3
                name: 代数式
                nameEn: Algebraic Expressions
                hasContent: true
                topics:
                  - 用字母表示数
                  - 代数式的概念
                  - 列代数式
                  - 代数式的值
                  - 从文字语言到代数语言的转化
              - id: polynomials
                number: 4
                name: 整式的加减
                nameEn: Addition and Subtraction of Polynomials
                hasContent: true
                topics:
                  - 单项式、多项式、整式的概念
                  - 项、系数、次数
                  - 同类项的识别
                  - 合并同类项
                  - 整式加法与减法
                  - 用整式表示数量关系
              - id: linear-equations
                number: 5
                name: 一元一次方程
                nameEn: Linear Equations in One Variable
                hasContent: true
                topics:
                  - 方程的概念
                  - 等式的性质
                  - 一元一次方程的概念
                  - 解一元一次方程的基本步骤
                  - 去分母、去括号、移项、合并同类项
                  - 检验方程的解
                  - 用一元一次方程解决实际问题
              - id: geometric-figures
                number: 6
                name: 几何图形初步
                nameEn: Introduction to Geometric Figures
                hasContent: true
                topics:
                  - 立体图形与平面图形
                  - 点、线、面、体的初步认识
                  - 直线、射线、线段的概念与表示
                  - 线段的比较与运算
                  - 角的概念与表示
                  - 角的比较与运算
                  - 余角、补角
                  - 基本作图与几何语言表达
                  - 综合与实践：设计学校田径运动会比赛场地
              - id: amc8-number-theory-basics
                number: 7
                name: "🏆 AMC 8 扩展：数论基础"
                nameEn: "🏆 AMC 8 Extension: Number Theory Basics"
                hasContent: true
                topics:
                  - 整除判断法（被2/3/4/5/6/8/9/10整除的规律）
                  - 质数与合数，质因数分解，因数树
                  - 最大公因数（GCD）与最小公倍数（LCM）及应用
                  - 数字题：用位值分析两位数、三位数
                topicsEn:
                  - Divisibility rules (by 2, 3, 4, 5, 6, 8, 9, 10)
                  - Primes and composites, prime factorization, factor trees
                  - GCD and LCM with real-world applications
                  - Digit problems — place value analysis of two- and three-digit numbers
          - id: semester2
            name: 下学期
            nameEn: Semester 2
            version: 七年级数学下册（2025春版）
            chapters:
              - id: intersecting-parallel-lines
                number: 7
                name: 相交线与平行线
                nameEn: Intersecting and Parallel Lines
                hasContent: true
                topics:
                  - 相交线
                  - 平行线及其判定
                  - 平行线的性质
              - id: real-numbers
                number: 8
                name: 实数
                nameEn: Real Numbers
                hasContent: true
                topics:
                  - 平方根
                  - 立方根
                  - 实数的概念
              - id: coordinate-system
                number: 9
                name: 平面直角坐标系
                nameEn: Cartesian Coordinate System
                hasContent: true
                topics:
                  - 有序数对
                  - 平面直角坐标系
              - id: systems-of-equations
                number: 10
                name: 二元一次方程组
                nameEn: Systems of Linear Equations in Two Variables
                hasContent: true
                topics:
                  - 二元一次方程组的概念
                  - 消元法解方程组
                  - 实际问题与方程组
              - id: inequalities
                number: 11
                name: 不等式与不等式组
                nameEn: Inequalities and Systems of Inequalities
                hasContent: true
                topics:
                  - 不等式及其解集
                  - 一元一次不等式
                  - 一元一次不等式组
              - id: data-collection
                number: 12
                name: 数据的收集、整理与描述
                nameEn: Data Collection, Organization, and Representation
                hasContent: true
                topics:
                  - 统计调查
                  - 直方图
              - id: amc8-counting-combinatorics
                number: 13
                name: "🏆 AMC 8 扩展：计数与组合基础"
                nameEn: "🏆 AMC 8 Extension: Counting & Combinatorics"
                hasContent: true
                topics:
                  - 加法原理与乘法原理
                  - 排列与组合（阶乘、P(n,r)、C(n,r)）
                  - 补集计数法
                  - 分类讨论法
                topicsEn:
                  - Addition and multiplication principles
                  - Permutations and combinations (factorials, P(n,r), C(n,r))
                  - Complementary counting
                  - Systematic casework
              - id: amc8-word-problems
                number: 14
                name: "🏆 AMC 8 扩展：应用题建模"
                nameEn: "🏆 AMC 8 Extension: Word Problem Modeling"
                hasContent: true
                topics:
                  - 行程问题（速度、距离、时间）
                  - 工程问题（合作效率）
                  - 比例与百分数（连续变化、混合问题）
                  - 代数建模策略（逆推、估算验证）
                topicsEn:
                  - Rate-distance-time problems
                  - Work rate problems
                  - Ratio, proportion and percent
                  - Algebraic modeling strategies

      - id: grade8
        name: 八年级
        nameEn: Grade 8
        description: 初二数学，依据人教版（2024版）
        semesters:
          - id: semester1
            name: 上学期
            nameEn: Semester 1
            version: 八年级数学上册（2024年版）
            chapters:
              - id: triangles
                number: 1
                name: 三角形
                nameEn: Triangles
                hasContent: true
                topics:
                  - 三角形的三边关系（两边之和大于第三边）
                  - 三角形的三种类型（按边、按角分类）
                  - 三角形的高、中线、角平分线
                  - 三角形的稳定性
                  - 三角形的外角定理
                  - 多边形内角和与外角和
                  - 综合与实践：三角形稳定性在建筑中的应用
                topicsEn:
                  - Triangle inequality (sum of two sides greater than the third)
                  - Types of triangles (by sides and by angles)
                  - Altitude, median, and angle bisector of a triangle
                  - Rigidity of triangles
                  - Exterior angle theorem
                  - Sum of interior and exterior angles of polygons
                  - Integrated practice: rigidity of triangles in architecture
              - id: congruent-triangles
                number: 2
                name: 全等三角形
                nameEn: Congruent Triangles
                hasContent: true
                topics:
                  - 全等图形与全等三角形的概念
                  - 全等三角形的性质
                  - 三角形全等的判定（SSS、SAS、ASA、AAS）
                  - 直角三角形全等的判定（HL）
                  - 角平分线的性质
                  - 辅助线的添加方法
                topicsEn:
                  - Concept of congruent figures and congruent triangles
                  - Properties of congruent triangles
                  - Congruence criteria (SSS, SAS, ASA, AAS)
                  - Right triangle congruence (HL)
                  - Properties of angle bisectors
                  - Adding auxiliary lines
              - id: line-symmetry
                number: 3
                name: 轴对称
                nameEn: Line Symmetry
                hasContent: true
                topics:
                  - 轴对称与轴对称图形
                  - 线段的垂直平分线
                  - 等腰三角形的性质与判定
                  - 等边三角形
                  - 轴对称的应用
                topicsEn:
                  - Axis symmetry and symmetric figures
                  - Perpendicular bisector of a segment
                  - Properties and criteria for isosceles triangles
                  - Equilateral triangles
                  - Applications of line symmetry
              - id: polynomial-multiplication
                number: 4
                name: 整式的乘除法
                nameEn: Multiplication and Division of Polynomials
                hasContent: true
                topics:
                  - 同底数幂的乘法
                  - 幂的乘方与积的乘方
                  - 整式的乘法（单项式与多项式、多项式与多项式）
                  - 平方差公式
                  - 完全平方公式
                  - 同底数幂的除法
                  - 整式的除法
                topicsEn:
                  - Multiplication of powers with the same base
                  - Power of a power and power of a product
                  - Multiplying polynomials (monomial×polynomial, polynomial×polynomial)
                  - Difference of squares formula
                  - Perfect square trinomial formula
                  - Division of powers with the same base
                  - Division of polynomials
              - id: factorization
                number: 5
                name: 因式分解
                nameEn: Factorization
                hasContent: true
                topics:
                  - 因式分解的意义
                  - 提公因式法
                  - 公式法（平方差公式、完全平方公式）
                  - 因式分解的综合应用
                topicsEn:
                  - Meaning of factorization
                  - Common factor method
                  - Formula method (difference of squares, perfect square trinomial)
                  - Combined applications
              - id: algebraic-fractions
                number: 6
                name: 分式
                nameEn: Algebraic Fractions
                hasContent: true
                topics:
                  - 分式的概念
                  - 分式的基本性质
                  - 分式的约分与通分
                  - 分式的乘除法
                  - 分式的加减法
                  - 分式方程
                topicsEn:
                  - Concept of algebraic fractions
                  - Basic properties of algebraic fractions
                  - Simplifying and finding common denominators
                  - Multiplication and division of algebraic fractions
                  - Addition and subtraction of algebraic fractions
                  - Fractional equations
              - id: amc8-triangle-area
                number: 7
                name: "🏆 AMC 8 扩展：三角形面积与海伦公式"
                nameEn: "🏆 AMC 8 Extension: Triangle Area & Heron's Formula"
                hasContent: true
                topics:
                  - 三角形面积公式汇总（底×高、坐标法、鞋带公式）
                  - 海伦公式及其应用
                  - 四边形面积的三角形分解法
                topicsEn:
                  - Triangle area formula toolkit (base×height, coordinates, Shoelace)
                  - "Heron's formula and applications"
                  - Quadrilateral area via triangle decomposition
              - id: amc8-advanced-geometry
                number: 8
                name: "🏆 AMC 8 扩展：几何进阶"
                nameEn: "🏆 AMC 8 Extension: Advanced Geometry"
                hasContent: true
                topics:
                  - 复合图形面积（加法法与减法法）
                  - 坐标几何技巧（距离、中点、鞋带公式）
                  - 几何变换（平移、旋转、对称）
                  - 圆与扇形面积应用
                topicsEn:
                  - Composite figure area (addition and subtraction methods)
                  - Coordinate geometry techniques (distance, midpoint, Shoelace)
                  - Geometric transformations (translation, rotation, reflection)
                  - Circle and sector area applications
              - id: amc8-logic-strategy
                number: 9
                name: "🏆 AMC 8 扩展：逻辑与策略"
                nameEn: "🏆 AMC 8 Extension: Logic & Strategy"
                hasContent: true
                topics:
                  - 抽屉原理（基本形式与推广形式）
                  - 奇偶分析
                  - 不变量
                  - 逆推与排除法
                topicsEn:
                  - Pigeonhole principle (basic and generalized)
                  - Parity analysis
                  - Invariants
                  - Working backwards and process of elimination
          - id: semester2
            name: 下学期
            nameEn: Semester 2
            version: 八年级数学下册（2024年版）
            chapters:
              - id: pythagorean-theorem
                number: 7
                name: 勾股定理
                nameEn: Pythagorean Theorem
                hasContent: true
                topics:
                  - 勾股定理的发现与证明
                  - 勾股定理的应用
                  - 勾股定理的逆定理
                  - 直角三角形的判定
                  - 特殊直角三角形（30°-60°-90°、45°-45°-90°）
                topicsEn:
                  - Discovery and proof of the Pythagorean theorem
                  - Applications of the Pythagorean theorem
                  - Converse of the Pythagorean theorem
                  - Determining right triangles
                  - Special right triangles (30-60-90, 45-45-90)
              - id: quadrilaterals
                number: 8
                name: 四边形
                nameEn: Quadrilaterals
                hasContent: true
                topics:
                  - 多边形的内角和与外角和
                  - 平行四边形的性质与判定
                  - 矩形的性质与判定
                  - 菱形的性质与判定
                  - 正方形
                  - 梯形
                  - 重心与中位线定理
                topicsEn:
                  - Sum of interior and exterior angles of polygons
                  - Properties and criteria for parallelograms
                  - Properties and criteria for rectangles
                  - Properties and criteria for rhombuses
                  - Squares
                  - Trapezoids
                  - Centroid and midsegment theorem
              - id: linear-functions
                number: 9
                name: 一次函数
                nameEn: Linear Functions
                hasContent: true
                topics:
                  - 函数的概念与表示
                  - 正比例函数
                  - 一次函数的概念
                  - 一次函数的图象与性质
                  - 用一次函数解决实际问题
                  - 一次函数与方程、不等式的关系
                topicsEn:
                  - Concept and representations of functions
                  - Direct proportion functions
                  - Concept of linear functions
                  - Graph and properties of linear functions
                  - Applying linear functions to real problems
                  - Connections between functions, equations, and inequalities
              - id: data-analysis
                number: 10
                name: 数据的分析
                nameEn: Data Analysis
                hasContent: true
                topics:
                  - 平均数（算术平均数、加权平均数）
                  - 中位数与众数
                  - 方差与标准差
                  - 数据的综合分析与评价
                topicsEn:
                  - Mean (arithmetic mean, weighted mean)
                  - Median and mode
                  - Variance and standard deviation
                  - Comprehensive data analysis and evaluation
              - id: amc8-probability-intro
                number: 11
                name: "🏆 AMC 8 扩展：概率入门"
                nameEn: "🏆 AMC 8 Extension: Introduction to Probability"
                hasContent: true
                topics:
                  - 基础概率（等可能事件、补集）
                  - 用计数方法求概率（列举、树形图、组合数）
                  - 独立事件与乘法原理
                  - 条件概率初步（不放回抽样）
                topicsEn:
                  - Basic probability (equally likely events, complement)
                  - Counting methods for probability (listing, tree diagrams, combinations)
                  - Independent events and multiplication rule
                  - Introduction to conditional probability (without replacement)
              - id: triangle-classic-models
                number: 12
                name: "📐 几何专题：三角形经典模型"
                nameEn: "📐 Geometry Special: Classic Triangle Models"
                hasContent: true
                topics:
                  - 风筝模型（对角线互垂的推导）
                  - 沙漏模型（相似三角形的识别）
                  - 手拉手模型（旋转全等）
                  - 半角模型
                  - 一线三等角模型
                topicsEn:
                  - Kite model (perpendicular diagonal derivation)
                  - Hourglass/bowtie model (similar triangle identification)
                  - Hand-in-hand rotation model
                  - Half-angle model
                  - One-line-three-equal-angles model

      - id: grade9
        name: 九年级
        nameEn: Grade 9
        description: 初三数学，依据人教版（2024版）
        semesters:
          - id: semester1
            name: 上学期
            nameEn: Semester 1
            version: 九年级数学上册（2024年版）
            chapters:
              - id: square-root-expressions
                number: 1
                name: 二次根式
                nameEn: Square Root Expressions
                hasContent: true
                topics:
                  - 二次根式的概念
                  - 二次根式的性质
                  - 二次根式的化简
                  - 二次根式的加减法
                  - 二次根式的乘除法
                  - 分母有理化
                topicsEn:
                  - Concept of square root expressions
                  - Properties of square root expressions
                  - Simplifying square root expressions
                  - Addition and subtraction of square root expressions
                  - Multiplication and division of square root expressions
                  - Rationalizing the denominator
              - id: quadratic-equations
                number: 2
                name: 一元二次方程
                nameEn: Quadratic Equations in One Variable
                hasContent: true
                topics:
                  - 一元二次方程的概念
                  - 直接开平方法
                  - 配方法
                  - 公式法（求根公式）
                  - 因式分解法
                  - 韦达定理（根与系数关系）
                  - 一元二次方程的应用
                topicsEn:
                  - Concept of quadratic equations in one variable
                  - Square root method
                  - Completing the square
                  - Quadratic formula
                  - Factoring method
                  - Vieta's formulas
                  - Applications of quadratic equations
              - id: quadratic-functions
                number: 3
                name: 二次函数
                nameEn: Quadratic Functions
                hasContent: true
                topics:
                  - 二次函数的概念
                  - 二次函数 y=ax² 的图象与性质
                  - 二次函数 y=a(x-h)²+k 的图象与性质
                  - 二次函数 y=ax²+bx+c 的图象与性质
                  - 二次函数的顶点与对称轴
                  - 二次函数的最大值与最小值
                  - 用二次函数解决实际问题
                topicsEn:
                  - Concept of quadratic functions
                  - Graph and properties of y=ax²
                  - Graph and properties of y=a(x-h)²+k
                  - Graph and properties of y=ax²+bx+c
                  - Vertex and axis of symmetry of quadratic functions
                  - Maximum and minimum values of quadratic functions
                  - Applying quadratic functions to real problems
              - id: rotation
                number: 4
                name: 旋转
                nameEn: Rotation
                hasContent: true
                topics:
                  - 旋转的概念与性质
                  - 中心对称与中心对称图形
                  - 旋转的作图
                  - 旋转与其他变换的综合
                topicsEn:
                  - Concept and properties of rotation
                  - Point symmetry and point-symmetric figures
                  - Constructing rotations
                  - Rotation combined with other transformations
              - id: dynamic-point-problems
                number: 5
                name: "📐 几何专题：动点问题"
                nameEn: "📐 Geometry Special: Dynamic Point Problems"
                hasContent: true
                topics:
                  - 动点问题基础（三步分析法）
                  - 面积随动点变化（函数建模）
                  - 轨迹与路径分析
                  - 分段讨论
                topicsEn:
                  - Dynamic point fundamentals (three-step method)
                  - Area as a function of moving point
                  - Path and trajectory analysis
                  - Piecewise case analysis
              - id: optimization-problems
                number: 6
                name: "📐 几何专题：最值问题"
                nameEn: "📐 Geometry Special: Optimization & Min/Max"
                hasContent: true
                topics:
                  - 将军饮马问题（对称反射法）
                  - 三角形周长最值
                  - 代数最值方法（配方法、均值不等式）
                  - 几何代数结合求最值
                topicsEn:
                  - "General's drinking horse (reflection method)"
                  - Triangle perimeter optimization
                  - Algebraic methods (completing square, AM-GM)
                  - Combined geometric-algebraic optimization
          - id: semester2
            name: 下学期
            nameEn: Semester 2
            version: 九年级数学下册（2024年版）
            chapters:
              - id: inverse-proportion-functions
                number: 5
                name: 反比例函数
                nameEn: Inverse Proportion Functions
                hasContent: true
                topics:
                  - 反比例函数的概念
                  - 反比例函数的图象（双曲线）与性质
                  - k的正负与图象的位置关系
                  - 反比例函数的增减性
                  - 反比例函数与一次函数的综合应用
                topicsEn:
                  - Concept of inverse proportion functions
                  - Graph (hyperbola) and properties of inverse proportion functions
                  - Effect of sign of k on graph position
                  - Monotonicity of inverse proportion functions
                  - Combined applications with linear functions
              - id: similar-figures
                number: 6
                name: 相似
                nameEn: Similar Figures
                hasContent: true
                topics:
                  - 比例线段
                  - 平行线分线段成比例
                  - 相似多边形
                  - 相似三角形的判定（AA、SAS、SSS）
                  - 相似三角形的性质
                  - 相似比的应用
                  - 位似图形
                topicsEn:
                  - Proportional line segments
                  - Parallel lines dividing segments proportionally
                  - Similar polygons
                  - Criteria for similar triangles (AA, SAS, SSS)
                  - Properties of similar triangles
                  - Applications of similarity ratios
                  - Homothety (dilation)
              - id: trigonometric-functions
                number: 7
                name: 锐角三角函数
                nameEn: Trigonometric Functions of Acute Angles
                hasContent: true
                topics:
                  - 正弦、余弦、正切的定义
                  - 特殊角的三角函数值（30°、45°、60°）
                  - 互余角的三角函数关系
                  - 用计算器求三角函数值
                  - 解直角三角形
                  - 锐角三角函数的应用
                topicsEn:
                  - Definition of sine, cosine, and tangent
                  - Trigonometric values of special angles (30°, 45°, 60°)
                  - Trigonometric relationships of complementary angles
                  - Using a calculator for trigonometric values
                  - Solving right triangles
                  - Applications of acute angle trigonometry
              - id: circles
                number: 8
                name: 圆
