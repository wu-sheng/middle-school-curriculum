subjects:
  - id: math
    name: 数学
    nameEn: Mathematics
    icon: "📐"
    grades:
      - id: grade7
        name: 七年级
        nameEn: Grade 7
        description: 初一数学，依据人教版（2024版上册 / 2025春版下册）
        semesters:
          - id: semester1
            name: 上学期
            nameEn: Semester 1
            version: 七年级数学上册（2024年版）
            chapters:
              - id: rational-numbers
                number: 1
                name: 有理数
                nameEn: Rational Numbers
                hasContent: true
                topics:
                  - 正数、负数、零的意义
                  - 有理数的概念与分类
                  - 数轴的建立与点的表示
                  - 相反数的概念
                  - 绝对值的意义与几何解释
                  - 有理数大小比较
                  - 用数轴分析大小规律
                topicsEn:
                  - Meaning of positive numbers, negative numbers, and zero
                  - Concept and classification of rational numbers
                  - Number line and locating points
                  - Opposite numbers
                  - Absolute value and its geometric meaning
                  - Comparing rational numbers
                  - Using the number line to compare values
              - id: operations-rational-numbers
                number: 2
                name: 有理数的运算
                nameEn: Operations with Rational Numbers
                hasContent: true
                topics:
                  - 有理数加法法则
                  - 有理数减法及转化为加法
                  - 有理数乘法法则
                  - 有理数除法法则
                  - 乘方的意义
                  - 科学记数法
                  - 近似数与精确度的初步认识
                  - 含加减乘除与乘方的混合运算顺序
                  - 综合与实践：进位制的认识与探究
              - id: algebraic-expressions
                number: 3
                name: 代数式
                nameEn: Algebraic Expressions
                hasContent: true
                topics:
                  - 用字母表示数
                  - 代数式的概念
                  - 列代数式
                  - 代数式的值
                  - 从文字语言到代数语言的转化
              - id: polynomials
                number: 4
                name: 整式的加减
                nameEn: Addition and Subtraction of Polynomials
                hasContent: true
                topics:
                  - 单项式、多项式、整式的概念
                  - 项、系数、次数
                  - 同类项的识别
                  - 合并同类项
                  - 整式加法与减法
                  - 用整式表示数量关系
              - id: linear-equations
                number: 5
                name: 一元一次方程
                nameEn: Linear Equations in One Variable
                hasContent: true
                topics:
                  - 方程的概念
                  - 等式的性质
                  - 一元一次方程的概念
                  - 解一元一次方程的基本步骤
                  - 去分母、去括号、移项、合并同类项
                  - 检验方程的解
                  - 用一元一次方程解决实际问题
              - id: geometric-figures
                number: 6
                name: 几何图形初步
                nameEn: Introduction to Geometric Figures
                hasContent: true
                topics:
                  - 立体图形与平面图形
                  - 点、线、面、体的初步认识
                  - 直线、射线、线段的概念与表示
                  - 线段的比较与运算
                  - 角的概念与表示
                  - 角的比较与运算
                  - 余角、补角
                  - 基本作图与几何语言表达
                  - 综合与实践：设计学校田径运动会比赛场地
          - id: semester2
            name: 下学期
            nameEn: Semester 2
            version: 七年级数学下册（2025春版）
            chapters:
              - id: intersecting-parallel-lines
                number: 7
                name: 相交线与平行线
                nameEn: Intersecting and Parallel Lines
                hasContent: true
                topics:
                  - 相交线
                  - 平行线及其判定
                  - 平行线的性质
              - id: real-numbers
                number: 8
                name: 实数
                nameEn: Real Numbers
                hasContent: true
                topics:
                  - 平方根
                  - 立方根
                  - 实数的概念
              - id: coordinate-system
                number: 9
                name: 平面直角坐标系
                nameEn: Cartesian Coordinate System
                hasContent: true
                topics:
                  - 有序数对
                  - 平面直角坐标系
              - id: systems-of-equations
                number: 10
                name: 二元一次方程组
                nameEn: Systems of Linear Equations in Two Variables
                hasContent: true
                topics:
                  - 二元一次方程组的概念
                  - 消元法解方程组
                  - 实际问题与方程组
              - id: inequalities
                number: 11
                name: 不等式与不等式组
                nameEn: Inequalities and Systems of Inequalities
                hasContent: true
                topics:
                  - 不等式及其解集
                  - 一元一次不等式
                  - 一元一次不等式组
              - id: data-collection
                number: 12
                name: 数据的收集、整理与描述
                nameEn: Data Collection, Organization, and Representation
                hasContent: true
                topics:
                  - 统计调查
                  - 直方图

  - id: english
    name: 英语
    nameEn: English
    icon: "📚"
    grades:
      - id: fce
        name: FCE 冒险岛
        nameEn: FCE Adventure
        description: 面向已通过 PET 的小学高阶学习者，15 个月从 B1 进阶到 B2
        descriptionEn: For advanced young learners who passed PET, 15-month journey from B1 to B2
        semesters:
          - id: phase1
            name: 基础探索（1-5月）
            nameEn: Foundation (Month 1-5)
            chapters:
              - id: Q01-magic-words
                number: 1
                name: 魔法变形课
                nameEn: Magic Word Lab
                hasContent: true
                topics:
                  - 前缀系列（un-, in-, dis-, mis-, over-, under-, re-, pre-）
                  - 后缀系列（-tion, -ment, -ness, -ful, -less, -able, -ous, -ive, -ly）
                  - 词性转换规律（名词 ↔ 动词 ↔ 形容词 ↔ 副词）
                topicsEn:
                  - Prefix families (un-, in-, dis-, mis-, over-, under-, re-, pre-)
                  - Suffix families (-tion, -ment, -ness, -ful, -less, -able, -ous, -ive, -ly)
                  - Word class conversion (noun ↔ verb ↔ adjective ↔ adverb)
              - id: Q02-time-traveler
                number: 2
                name: 时间旅行者
                nameEn: Time Traveler
                hasContent: true
                topics:
                  - 12 种时态对比与选择
                  - 过去完成时深化
                  - 条件句 Type 0-3 与混合条件句
                  - I wish / If only 虚拟语气
                topicsEn:
                  - Comparing and choosing among 12 tenses
                  - Past perfect in depth
                  - Conditionals Type 0-3 and mixed conditionals
                  - I wish / If only subjunctive mood
              - id: Q03-detective-club
                number: 3
                name: 侦探俱乐部
                nameEn: Detective Club
                hasContent: false
                topics:
                  - 主旨推断与细节定位
                  - 作者态度判断
                  - 段落逻辑衔接
                  - 情态动词表推测（must/might/can't have）
                topicsEn:
                  - Main idea inference and detail location
                  - Author attitude and purpose
                  - Paragraph cohesion and coherence
                  - Modal verbs for deduction (must/might/can't have)
              - id: Q04-dragon-academy
                number: 4
                name: 驯龙学院
                nameEn: Dragon Academy
                hasContent: false
                topics:
                  - 主动与被动转换
                  - 直接与间接引语
                  - so...that / too...to / enough...to
                  - 比较级句型与因果连接词替换
                topicsEn:
                  - Active and passive voice transformation
                  - Direct and indirect speech
                  - so...that / too...to / enough...to
                  - Comparative structures and cause-effect connectors
              - id: Q05-story-forge
                number: 5
                name: 故事锻造坊
                nameEn: Story Forge
                hasContent: false
                topics:
                  - 故事结构（Hook → 发展 → 高潮 → 结局）
                  - 五感描写与修辞手法
                  - 叙事时态一致性
                  - B2 级叙事连接词
                topicsEn:
                  - Story structure (Hook → Rising Action → Climax → Resolution)
                  - Sensory details and figurative language
                  - Narrative tense consistency
                  - B2-level narrative connectors
          - id: phase2
            name: 进阶挑战（6-10月）
            nameEn: Advanced (Month 6-10)
            chapters:
              - id: Q06-nature-explorer
                number: 6
                name: 自然探索家
                nameEn: Nature Explorer
                hasContent: false
                topics:
                  - 段落衔接信号词
                  - 指代关系追踪
                  - 信息流逻辑（总分、因果、对比）
                topicsEn:
                  - Cohesion signal words
                  - Reference tracking (this, such, the former)
                  - Information flow (general-specific, cause-effect, compare-contrast)
              - id: Q07-idiom-jungle
                number: 7
                name: 成语丛林
                nameEn: Idiom Jungle
                hasContent: false
                topics:
                  - 高频短语动词 60 个
                  - 固定搭配 80 个（make/do, take/have）
                  - 介词搭配与连接词完形
                topicsEn:
                  - 60 high-frequency phrasal verbs
                  - 80 fixed collocations (make/do, take/have)
                  - Preposition collocations and connectors in cloze
              - id: Q08-world-builder
                number: 8
                name: 世界构建师
                nameEn: World Builder
                hasContent: false
                topics:
                  - 定语从句（限定 vs 非限定）
                  - 状语从句与名词性从句
                  - 分词短语作定语和状语
                  - 句子合并练习
                topicsEn:
                  - Relative clauses (defining vs non-defining)
                  - Adverbial and noun clauses
                  - Participle phrases as modifiers
                  - Sentence combining exercises
              - id: Q09-review-master
                number: 9
                name: 书评大师
                nameEn: Review Master
                hasContent: false
                topics:
                  - Review 结构（介绍 → 概述 → 评价 → 推荐）
                  - 评价语言与目标读者意识
                topicsEn:
                  - Review structure (Introduction → Summary → Opinion → Recommendation)
                  - Evaluative language and audience awareness
              - id: Q10-debate-arena
                number: 10
                name: 辩论竞技场
                nameEn: Debate Arena
                hasContent: false
                topics:
                  - 议论文结构与正反论证
                  - 观点表达升级（I think → It could be argued that）
                  - 举例、让步与总结技巧
                topicsEn:
                  - Essay structure and balanced argumentation
                  - Upgrading opinion expressions
                  - Exemplification, concession, and conclusion techniques
          - id: phase3
            name: 冲刺模拟（11-15月）
            nameEn: Final Sprint (Month 11-15)
            chapters:
              - id: Q11-code-breaker
                number: 11
                name: 密码破译者
                nameEn: Code Breaker
                hasContent: false
                topics:
                  - Use of English Part 1-4 综合混合训练
                  - 限时模拟与错题归类
                topicsEn:
                  - Use of English Part 1-4 mixed practice
                  - Timed mock tests and error analysis
              - id: Q12-final-quest
                number: 12
                name: 终极冒险
                nameEn: Final Quest
                hasContent: false
                topics:
                  - 全真模拟卷（4 套）
                  - 分项得分分析与薄弱环节强化
                topicsEn:
                  - Full mock exams (4 sets)
                  - Score breakdown and targeted revision

