examples:
  - type: 1
    title: 同号<<有理数/rational number>><<加法/addition>>
    titleEn: Adding <<有理数/rational number>>s with the same sign
    question: |
      计算 $(-8) + (-5)$。
    questionEn: |
      Calculate $(-8) + (-5)$.
    steps:
      - 两个<<负数/negative number>>相加，符号取负号
      - <<绝对值/absolute value>>相加：$8 + 5 = 13$
      - "结果：$(-8) + (-5) = -13$"
    stepsEn:
      - "Adding two <<负数/negative number>>s: the sign is negative"
      - "Add the <<绝对值/absolute value>>s: $8 + 5 = 13$"
      - "Result: $(-8) + (-5) = -13$"
    answer: "$(-8) + (-5) = -13$"
    answerEn: "$(-8) + (-5) = -13$"

  - type: 2
    title: 异号<<有理数/rational number>><<加法/addition>>
    titleEn: Adding <<有理数/rational number>>s with different signs
    question: |
      计算 $(-12) + 7$。
    questionEn: |
      Calculate $(-12) + 7$.
    steps:
      - 异号相加，取<<绝对值/absolute value>>较大的数的符号
      - "$|-12| = 12 > |7| = 7$，所以结果取负号"
      - "<<绝对值/absolute value>>相减：$12 - 7 = 5$"
      - "结果：$(-12) + 7 = -5$"
    stepsEn:
      - "Different signs: take the sign of the number with the larger <<绝对值/absolute value>>"
      - "$|-12| = 12 > |7| = 7$, so the result is negative"
      - "Subtract <<绝对值/absolute value>>s: $12 - 7 = 5$"
      - "Result: $(-12) + 7 = -5$"
    answer: "$(-12) + 7 = -5$"
    answerEn: "$(-12) + 7 = -5$"

  - type: 3
    title: <<减法/subtraction>>转化为<<加法/addition>>
    titleEn: Converting <<减法/subtraction>> to <<加法/addition>>
    question: |
      计算 $(-4) - (-9)$。
    questionEn: |
      Calculate $(-4) - (-9)$.
    steps:
      - "<<减法/subtraction>>转化为<<加法/addition>>：减去 $-9$，等于加上 $9$"
      - "$(-4) - (-9) = (-4) + 9$"
      - 异号相加，$|9| > |-4|$，取正号
      - "$9 - 4 = 5$"
    stepsEn:
      - "Convert <<减法/subtraction>> to <<加法/addition>>: subtracting $-9$ equals adding $9$"
      - "$(-4) - (-9) = (-4) + 9$"
      - "Different signs, $|9| > |-4|$, take positive sign"
      - "$9 - 4 = 5$"
    answer: "$(-4) - (-9) = 5$"
    answerEn: "$(-4) - (-9) = 5$"

  - type: 4
    title: <<有理数/rational number>><<乘法/multiplication>>
    titleEn: <<有理数/rational number>> <<乘法/multiplication>>
    question: |
      计算 $(-6) \times (-\frac{2}{3})$。
    questionEn: |
      Calculate $(-6) \times (-\frac{2}{3})$.
    steps:
      - 同号得正，结果为<<正数/positive number>>
      - "计算<<绝对值/absolute value>>：$6 \\times \\frac{2}{3} = \\frac{6 \\times 2}{3} = \\frac{12}{3} = 4$"
    stepsEn:
      - "Same signs give positive result"
      - "Calculate <<绝对值/absolute value>>s: $6 \\times \\frac{2}{3} = \\frac{6 \\times 2}{3} = \\frac{12}{3} = 4$"
    answer: "$(-6) \\times (-\\frac{2}{3}) = 4$"
    answerEn: "$(-6) \\times (-\\frac{2}{3}) = 4$"

  - type: 5
    title: <<除法/division>>转化为<<乘法/multiplication>>
    titleEn: Converting <<除法/division>> to <<乘法/multiplication>>
    question: |
      计算 $(-15) \div (-\frac{3}{5})$。
    questionEn: |
      Calculate $(-15) \div (-\frac{3}{5})$.
    steps:
      - "<<除法/division>>转化为<<乘法/multiplication>>：除以 $-\\frac{3}{5}$，等于乘以它的<<倒数/reciprocal>> $-\\frac{5}{3}$"
      - "$(-15) \\div (-\\frac{3}{5}) = (-15) \\times (-\\frac{5}{3})$"
      - 同号得正
      - "$15 \\times \\frac{5}{3} = \\frac{75}{3} = 25$"
    stepsEn:
      - "Convert <<除法/division>> to <<乘法/multiplication>>: dividing by $-\\frac{3}{5}$ equals multiplying by its <<倒数/reciprocal>> $-\\frac{5}{3}$"
      - "$(-15) \\div (-\\frac{3}{5}) = (-15) \\times (-\\frac{5}{3})$"
      - "Same signs give positive"
      - "$15 \\times \\frac{5}{3} = \\frac{75}{3} = 25$"
    answer: "$(-15) \\div (-\\frac{3}{5}) = 25$"
    answerEn: "$(-15) \\div (-\\frac{3}{5}) = 25$"

  - type: 6
    title: <<乘方/exponentiation>>运算
    titleEn: <<乘方/exponentiation>> calculation
    question: |
      计算 $(-2)^{4}$ 和 $-2^{4}$。
    questionEn: |
      Calculate $(-2)^{4}$ and $-2^{4}$.
    steps:
      - "$(-2)^{4} = (-2) \\times (-2) \\times (-2) \\times (-2)$"
      - "$4$ 个<<负数/negative number>>相乘（偶数个），结果为正"
      - "$(-2)^{4} = 16$"
      - '$-2^{4}$ 表示"$2^{4}$ 的<<相反数/opposite number>>"，即 $-(2^{4})$'
      - "$-2^{4} = -16$"
    stepsEn:
      - "$(-2)^{4} = (-2) \\times (-2) \\times (-2) \\times (-2)$"
      - "$4$ <<负数/negative number>>s multiplied (even count), result is positive"
      - "$(-2)^{4} = 16$"
      - "$-2^{4}$ means \"the <<相反数/opposite number>> of $2^{4}$\", i.e., $-(2^{4})$"
      - "$-2^{4} = -16$"
    answer: "$(-2)^{4} = 16$，$-2^{4} = -16$"
    answerEn: "$(-2)^{4} = 16$, $-2^{4} = -16$"

  - type: 7
    title: <<科学记数法/scientific notation>>
    titleEn: <<科学记数法/scientific notation>>
    question: |
      用<<科学记数法/scientific notation>>表示 $23500000$。
    questionEn: |
      Express $23500000$ in <<科学记数法/scientific notation>>.
    steps:
      - "把小数点移到第一个非零数字后面：$2.35$"
      - "原数的<<整数/integer>>部分有 $8$ 位数字"
      - "所以 $n = 8 - 1 = 7$"
    stepsEn:
      - "Move the decimal point after the first nonzero digit: $2.35$"
      - "The integer part of the original number has $8$ digits"
      - "So $n = 8 - 1 = 7$"
    answer: "$23500000 = 2.35 \\times 10^{7}$"
    answerEn: "$23500000 = 2.35 \\times 10^{7}$"

  - type: 8
    title: <<混合运算/mixed operations>>
    titleEn: <<混合运算/mixed operations>>
    question: |
      计算 $(-3)^{2} \times 2 - (-4) \div 2$。
    questionEn: |
      Calculate $(-3)^{2} \times 2 - (-4) \div 2$.
    steps:
      - "第一步，先算<<乘方/exponentiation>>：$(-3)^{2} = 9$"
      - "第二步，再算<<乘法/multiplication>>和<<除法/division>>：$9 \\times 2 = 18$，$(-4) \\div 2 = -2$"
      - "第三步，最后算<<减法/subtraction>>：$18 - (-2) = 18 + 2 = 20$"
    stepsEn:
      - "Step 1: Calculate <<乘方/exponentiation>> first: $(-3)^{2} = 9$"
      - "Step 2: Then <<乘法/multiplication>> and <<除法/division>>: $9 \\times 2 = 18$, $(-4) \\div 2 = -2$"
      - "Step 3: Finally <<减法/subtraction>>: $18 - (-2) = 18 + 2 = 20$"
    answer: "$(-3)^{2} \\times 2 - (-4) \\div 2 = 20$"
    answerEn: "$(-3)^{2} \\times 2 - (-4) \\div 2 = 20$"

commonMistakes:
  - "异号相加时搞反符号：$(-7) + 3$ 的结果符号应取<<绝对值/absolute value>>大的那个（$7 > 3$，取负），正确答案是 $-4$，不是 $4$"
  - "\"减负得正\"记混：$5 - (-3) = 5 + 3 = 8$，不是 $5 - 3 = 2$"
  - "<<乘法/multiplication>>符号判断错误：$(-2) \\times (-3) = 6$（同号得正），不是 $-6$"
  - "$(-a)^{2}$ 与 $-a^{2}$ 混淆：$(-3)^{2} = 9$，但 $-3^{2} = -9$，括号的位置至关重要"
  - "<<科学记数法/scientific notation>>中 $a$ 的范围弄错：$a$ 必须满足 $1 \\leq a < 10$，所以 $56000000$ 应写成 $5.6 \\times 10^{7}$，不是 $56 \\times 10^{6}$"
  - "<<混合运算/mixed operations>>顺序搞错：先<<乘方/exponentiation>>，再乘除，最后加减；不能从左到右一路算"
commonMistakesEn:
  - "Getting the sign wrong when adding different signs: $(-7) + 3$ should take the sign of the larger <<绝对值/absolute value>> ($7 > 3$, take negative), correct answer is $-4$, not $4$"
  - "Confusing \"subtracting a negative\": $5 - (-3) = 5 + 3 = 8$, not $5 - 3 = 2$"
  - "Wrong sign in <<乘法/multiplication>>: $(-2) \\times (-3) = 6$ (same signs give positive), not $-6$"
  - "Confusing $(-a)^{2}$ with $-a^{2}$: $(-3)^{2} = 9$, but $-3^{2} = -9$. The position of parentheses is crucial"
  - "Wrong range of $a$ in <<科学记数法/scientific notation>>: $a$ must satisfy $1 \\leq a < 10$, so $56000000$ should be $5.6 \\times 10^{7}$, not $56 \\times 10^{6}$"
  - "Wrong order in <<混合运算/mixed operations>>: <<乘方/exponentiation>> first, then multiply/divide, finally add/subtract; do not just calculate left to right"

exercises:
  timeGuide:
