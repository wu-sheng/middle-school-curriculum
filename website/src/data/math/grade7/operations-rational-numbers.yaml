title: 有理数的运算
titleEn: Operations with Rational Numbers
chapter: 2
subject: math
grade: grade7
semester: semester1
estimatedTime: 60-90分钟学习 + 40分钟练习
targetAudience: 小学3年级自学生（已完成小学数学），自学材料，由简入深

objectives:
  - 掌握<<有理数/rational number>><<加法/addition>>法则，能熟练进行<<有理数/rational number>><<加法/addition>>运算
  - 理解<<有理数/rational number>><<减法/subtraction>>可以转化为<<加法/addition>>，并熟练计算
  - 掌握<<有理数/rational number>><<乘法/multiplication>>法则，理解符号确定规律
  - 掌握<<有理数/rational number>><<除法/division>>法则，能转化为<<乘法/multiplication>>计算
  - 理解<<乘方/exponentiation>>的意义，能进行简单的<<乘方/exponentiation>>运算
  - 会用<<科学记数法/scientific notation>>表示较大的数
  - 了解<<近似数/approximate number>>与<<精确度/accuracy>>的概念
  - 掌握<<有理数/rational number>><<混合运算/mixed operations>>的运算顺序
objectivesEn:
  - Master the rules of <<有理数/rational number>> <<加法/addition>> and perform calculations fluently
  - Understand that <<有理数/rational number>> <<减法/subtraction>> can be converted to <<加法/addition>>, and calculate fluently
  - Master the rules of <<有理数/rational number>> <<乘法/multiplication>> and understand sign determination
  - Master the rules of <<有理数/rational number>> <<除法/division>> and convert to <<乘法/multiplication>>
  - Understand the meaning of <<乘方/exponentiation>> and perform simple <<乘方/exponentiation>> calculations
  - Be able to express large numbers using <<科学记数法/scientific notation>>
  - Understand the concepts of <<近似数/approximate number>> and <<精确度/accuracy>>
  - Master the order of <<有理数/rational number>> <<混合运算/mixed operations>>

prerequisites:
  title: 从小学知识出发——运算的新挑战
  titleEn: "Starting from elementary school knowledge — new challenges in operations"
  intro: |
    小学里，我们已经学会了<<加法/addition>>、<<减法/subtraction>>、<<乘法/multiplication>>、<<除法/division>>这四种运算，比如：
  introEn: |
    In elementary school, we already learned the four operations: <<加法/addition>>, <<减法/subtraction>>, <<乘法/multiplication>>, and <<除法/division>>. For example:
  knownNumbers:
    - $3 + 5 = 8$
    - $10 - 4 = 6$
    - $6 \times 7 = 42$
    - $20 \div 5 = 4$
  knownNumbersEn:
    - $3 + 5 = 8$
    - $10 - 4 = 6$
    - $6 \times 7 = 42$
    - $20 \div 5 = 4$
  canSolve:
    - 妈妈给了 $10$ 元，爸爸又给了 $5$ 元，一共多少元？
    - 一块蛋糕 $8$ 元，买 $3$ 块要多少钱？
    - $24$ 颗糖平均分给 $6$ 个小朋友，每人几颗？
  canSolveEn:
    - Mom gave $10$ yuan and Dad gave another $5$ yuan. How much in total?
    - A cake costs $8$ yuan. How much for $3$ cakes?
    - $24$ candies are shared equally among $6$ children. How many does each get?
  cannotSolve:
    - 白天气温 $5℃$，晚上降到 $-3℃$，温差是多少？
    - 电梯从地下 $2$ 层上升 $5$ 层，到了第几层？
    - 一个细菌每小时增殖 $2$ 倍，$10$ 小时后有多少个？
    - 太阳到地球的距离约 $150000000$ 千米，怎么简洁地写？
  cannotSolveEn:
    - "The daytime temperature is $5℃$ and drops to $-3℃$ at night. What is the temperature difference?"
    - "The elevator goes up $5$ floors from basement level $2$. What floor does it reach?"
    - "A bacterium doubles every hour. How many are there after $10$ hours?"
    - "The distance from the Sun to Earth is about $150000000$ km. How to write it concisely?"
  conclusion: |
    引入<<负数/negative number>>之后，我们需要学会带有<<负数/negative number>>的<<加法/addition>>、<<减法/subtraction>>、<<乘法/multiplication>>、<<除法/division>>以及<<乘方/exponentiation>>运算，这就是本章的核心内容。
  conclusionEn: |
    After introducing <<负数/negative number>>s, we need to learn <<加法/addition>>, <<减法/subtraction>>, <<乘法/multiplication>>, <<除法/division>>, and <<乘方/exponentiation>> involving <<负数/negative number>>s. This is the core content of this chapter.

concepts:
  - id: addition-rules
    title: <<有理数/rational number>>的<<加法/addition>>法则
    titleEn: Rules for <<有理数/rational number>> <<加法/addition>>
    content: |
      <<有理数/rational number>><<加法/addition>>法则：
      - **同号相加**：取相同的符号，并把<<绝对值/absolute value>>相加
      - **异号相加**：取<<绝对值/absolute value>>较大的数的符号，并用较大的<<绝对值/absolute value>>减去较小的<<绝对值/absolute value>>
      - **一个数加 $0$**：仍得这个数
    contentEn: |
      Rules for <<有理数/rational number>> <<加法/addition>>:
      - **Adding numbers with the same sign**: Keep the common sign and add the <<绝对值/absolute value>>s
      - **Adding numbers with different signs**: Take the sign of the number with the larger <<绝对值/absolute value>>, and subtract the smaller <<绝对值/absolute value>> from the larger one
      - **Adding $0$ to a number**: The result is the number itself
    examples:
      - "同号相加：$(-3) + (-5) = -(3 + 5) = -8$"
      - "异号相加：$(-7) + 4 = -(7 - 4) = -3$"
      - "异号相加：$8 + (-3) = +(8 - 3) = 5$"
      - "互为<<相反数/opposite number>>：$5 + (-5) = 0$"
      - "加零：$(-6) + 0 = -6$"
    examplesEn:
      - "Same signs: $(-3) + (-5) = -(3 + 5) = -8$"
      - "Different signs: $(-7) + 4 = -(7 - 4) = -3$"
      - "Different signs: $8 + (-3) = +(8 - 3) = 5$"
      - "<<相反数/opposite number>>s: $5 + (-5) = 0$"
      - "Adding zero: $(-6) + 0 = -6$"
    notes:
      - "<<加法/addition>>交换律仍然成立：$a + b = b + a$"
      - "<<加法/addition>>结合律仍然成立：$(a + b) + c = a + (b + c)$"
    notesEn:
      - "The commutative law of <<加法/addition>> still holds: $a + b = b + a$"
      - "The associative law of <<加法/addition>> still holds: $(a + b) + c = a + (b + c)$"

  - id: subtraction-rules
    title: <<有理数/rational number>>的<<减法/subtraction>>法则
    titleEn: Rules for <<有理数/rational number>> <<减法/subtraction>>
    content: |
      **核心思想：减去一个数，等于加上它的<<相反数/opposite number>>。**

      公式：$a - b = a + (-b)$

      也就是说，所有<<减法/subtraction>>都可以转化为<<加法/addition>>！
    contentEn: |
      **Core idea: Subtracting a number is the same as adding its <<相反数/opposite number>>.**

      Formula: $a - b = a + (-b)$

      In other words, all <<减法/subtraction>> can be converted to <<加法/addition>>!
    examples:
      - "$5 - 8 = 5 + (-8) = -3$"
      - "$(-3) - 5 = (-3) + (-5) = -8$"
      - "$(-4) - (-9) = (-4) + 9 = 5$"
      - "$0 - 6 = 0 + (-6) = -6$"
    examplesEn:
      - "$5 - 8 = 5 + (-8) = -3$"
      - "$(-3) - 5 = (-3) + (-5) = -8$"
      - "$(-4) - (-9) = (-4) + 9 = 5$"
      - "$0 - 6 = 0 + (-6) = -6$"
    notes:
      - "\"减负得正\"：减去一个<<负数/negative number>>，相当于加上一个<<正数/positive number>>"
      - 转化为<<加法/addition>>后，可以利用<<加法/addition>>交换律和结合律简化计算
    notesEn:
      - "\"Subtracting a negative gives a positive\": subtracting a <<负数/negative number>> is like adding a <<正数/positive number>>"
      - "After converting to <<加法/addition>>, you can use the commutative and associative laws to simplify"

  - id: multiplication-rules
    title: <<有理数/rational number>>的<<乘法/multiplication>>法则
    titleEn: Rules for <<有理数/rational number>> <<乘法/multiplication>>
    content: |
      <<有理数/rational number>><<乘法/multiplication>>法则：
      - **同号得正**：两个<<正数/positive number>>或两个<<负数/negative number>>相乘，结果为<<正数/positive number>>
      - **异号得负**：一个<<正数/positive number>>和一个<<负数/negative number>>相乘，结果为<<负数/negative number>>
      - **任何数与 $0$ 相乘**：结果为 $0$

      先确定符号，再计算<<绝对值/absolute value>>的乘积。
    contentEn: |
      Rules for <<有理数/rational number>> <<乘法/multiplication>>:
      - **Same signs give positive**: Two <<正数/positive number>>s or two <<负数/negative number>>s multiplied give a <<正数/positive number>>
      - **Different signs give negative**: A <<正数/positive number>> and a <<负数/negative number>> multiplied give a <<负数/negative number>>
      - **Any number times $0$**: The result is $0$

      First determine the sign, then calculate the product of the <<绝对值/absolute value>>s.
    examples:
      - '同号得正：$(-4) \times (-3) = +12 = 12$'
      - '异号得负：$(-5) \times 6 = -30$'
      - '乘零：$(-100) \times 0 = 0$'
    examplesEn:
      - "Same signs give positive: $(-4) \\times (-3) = +12 = 12$"
      - "Different signs give negative: $(-5) \\times 6 = -30$"
      - "Multiplying by zero: $(-100) \\times 0 = 0$"
    notes:
      - '<<乘法/multiplication>>交换律：$a \times b = b \times a$'
      - '<<乘法/multiplication>>结合律：$(a \times b) \times c = a \times (b \times c)$'
      - '<<乘法/multiplication>>对<<加法/addition>>的分配律：$a \times (b + c) = a \times b + a \times c$'
      - 多个数相乘时，先数<<负数/negative number>>的个数——偶数个<<负数/negative number>>结果为正，奇数个<<负数/negative number>>结果为负
    notesEn:
      - "Commutative law: $a \\times b = b \\times a$"
      - "Associative law: $(a \\times b) \\times c = a \\times (b \\times c)$"
      - "Distributive law: $a \\times (b + c) = a \\times b + a \\times c$"
      - "When multiplying several numbers, count the <<负数/negative number>>s — an even count gives positive, an odd count gives negative"

  - id: division-rules
    title: <<有理数/rational number>>的<<除法/division>>法则
    titleEn: Rules for <<有理数/rational number>> <<除法/division>>
    content: |
      <<有理数/rational number>><<除法/division>>法则：
      - 除以一个不等于 $0$ 的数，等于乘以这个数的**<<倒数/reciprocal>>**
      - 符号规律与<<乘法/multiplication>>相同：同号得正，异号得负
      - $0$ 除以任何非零数，结果为 $0$
      - **$0$ 不能作除数！**

      公式：$a \div b = a \times \frac{1}{b}$（$b \neq 0$）
    contentEn: |
      Rules for <<有理数/rational number>> <<除法/division>>:
      - Dividing by a nonzero number equals multiplying by its **<<倒数/reciprocal>>**
      - Sign rules are the same as <<乘法/multiplication>>: same signs give positive, different signs give negative
      - $0$ divided by any nonzero number is $0$
      - **$0$ cannot be a divisor!**

      Formula: $a \div b = a \times \frac{1}{b}$ ($b \neq 0$)
    examples:
      - '$(-12) \div 4 = -3$'
      - '$(-20) \div (-5) = 4$'
      - '$(-3) \div \frac{1}{2} = (-3) \times 2 = -6$'
      - '$0 \div (-7) = 0$'
    examplesEn:
      - "$(-12) \\div 4 = -3$"
      - "$(-20) \\div (-5) = 4$"
      - "$(-3) \\div \\frac{1}{2} = (-3) \\times 2 = -6$"
      - "$0 \\div (-7) = 0$"

  - id: exponentiation
    title: <<乘方/exponentiation>>
    titleEn: <<乘方/exponentiation>>
    content: |
      $n$ 个相同的因数 $a$ 相乘，记作 $a^{n}$，读作"$a$ 的 $n$ 次方"。

      其中 $a$ 叫做<<底数/base>>，$n$ 叫做<<指数/exponent>>，结果叫做<<幂/power>>。

      特别地：$a^{1} = a$。
    contentEn: |
      Multiplying $n$ identical factors of $a$ is written as $a^{n}$, read as "$a$ to the $n$th power."

      Here, $a$ is called the <<底数/base>>, $n$ is called the <<指数/exponent>>, and the result is called the <<幂/power>>.

      In particular: $a^{1} = a$.
    examples:
      - "$(-2)^{3} = (-2) \\times (-2) \\times (-2) = -8$"
      - "$(-3)^{2} = (-3) \\times (-3) = 9$"
      - "$-3^{2} = -(3 \\times 3) = -9$（注意：这里只对 $3$ 求平方，负号不在括号里）"
      - "$(-1)^{100} = 1$（偶数个负号，结果为正）"
      - "$(-1)^{99} = -1$（奇数个负号，结果为负）"
    examplesEn:
      - "$(-2)^{3} = (-2) \\times (-2) \\times (-2) = -8$"
      - "$(-3)^{2} = (-3) \\times (-3) = 9$"
      - "$-3^{2} = -(3 \\times 3) = -9$ (Note: only $3$ is squared; the negative sign is outside the parentheses)"
      - "$(-1)^{100} = 1$ (even number of negatives, result is positive)"
      - "$(-1)^{99} = -1$ (odd number of negatives, result is negative)"
    notes:
      - "<<负数/negative number>>的偶次<<幂/power>>是<<正数/positive number>>，<<负数/negative number>>的奇次<<幂/power>>是<<负数/negative number>>"
      - "$(-a)^{2}$ 和 $-a^{2}$ 意义不同！前者是 $a^{2}$，后者是 $-a^{2}$"
    notesEn:
      - "An even <<幂/power>> of a <<负数/negative number>> is a <<正数/positive number>>; an odd <<幂/power>> of a <<负数/negative number>> is a <<负数/negative number>>"
      - "$(-a)^{2}$ and $-a^{2}$ have different meanings! The former is $a^{2}$, the latter is $-a^{2}$"

  - id: scientific-notation
    title: <<科学记数法/scientific notation>>
    titleEn: <<科学记数法/scientific notation>>
    content: |
      把一个大于 $10$ 的数写成 $a \times 10^{n}$ 的形式，其中 $1 \leq a < 10$，$n$ 是<<正整数/positive integer>>。

      这种记数方法叫做<<科学记数法/scientific notation>>。

      确定 $n$ 的方法：$n$ 等于原数的<<整数/integer>>部分的位数减 $1$。
    contentEn: |
      Writing a number greater than $10$ in the form $a \times 10^{n}$, where $1 \leq a < 10$ and $n$ is a <<正整数/positive integer>>.

      This notation is called <<科学记数法/scientific notation>>.

      How to determine $n$: $n$ equals the number of digits in the integer part minus $1$.
    examples:
      - "$300000 = 3 \\times 10^{5}$"
      - "$56000000 = 5.6 \\times 10^{7}$"
      - "$1230000 = 1.23 \\times 10^{6}$"
      - "全球人口约 $8000000000 = 8 \\times 10^{9}$"
    examplesEn:
      - "$300000 = 3 \\times 10^{5}$"
      - "$56000000 = 5.6 \\times 10^{7}$"
      - "$1230000 = 1.23 \\times 10^{6}$"
      - "World population is about $8000000000 = 8 \\times 10^{9}$"

  - id: approximation-accuracy
    title: <<近似数/approximate number>>与<<精确度/accuracy>>
    titleEn: <<近似数/approximate number>> and <<精确度/accuracy>>
    content: |
      生活中很多数据是近似的，不是精确的。

      **<<近似数/approximate number>>**：与实际数据接近但不完全相等的数。

      **<<精确度/accuracy>>**：一个<<近似数/approximate number>>四舍五入到哪一位，就说它精确到哪一位。

      **<<有效数字/significant figure>>**：从左边第一个不为零的数字起，到精确到的数位止，所有的数字都是<<有效数字/significant figure>>。
    contentEn: |
      Many numbers in daily life are approximate, not exact.

      **<<近似数/approximate number>>**: A number that is close to but not exactly equal to the actual value.

      **<<精确度/accuracy>>**: When an <<近似数/approximate number>> is rounded to a certain digit, we say it is accurate to that digit.

      **<<有效数字/significant figure>>**: Starting from the first nonzero digit on the left, all digits up to and including the digit that was rounded to are <<有效数字/significant figure>>s.
    examples:
      - "$3.14$ 精确到百分位，有 $3$ 个<<有效数字/significant figure>>：$3$、$1$、$4$"
      - "$2.0 \\times 10^{4}$ 精确到千位，有 $2$ 个<<有效数字/significant figure>>：$2$、$0$"
      - "$0.0258$ 精确到万分位，有 $3$ 个<<有效数字/significant figure>>：$2$、$5$、$8$"
    examplesEn:
      - "$3.14$ is accurate to the hundredths place, with $3$ <<有效数字/significant figure>>s: $3$, $1$, $4$"
      - "$2.0 \\times 10^{4}$ is accurate to the thousands place, with $2$ <<有效数字/significant figure>>s: $2$, $0$"
      - "$0.0258$ is accurate to the ten-thousandths place, with $3$ <<有效数字/significant figure>>s: $2$, $5$, $8$"

  - id: order-of-operations
    title: <<有理数/rational number>>的<<混合运算/mixed operations>>
    titleEn: <<有理数/rational number>> <<混合运算/mixed operations>>
    content: |
      运算顺序（与小学一致，增加了<<乘方/exponentiation>>）：
      1. 先算<<乘方/exponentiation>>
      2. 再算<<乘法/multiplication>>和<<除法/division>>（从左到右）
      3. 最后算<<加法/addition>>和<<减法/subtraction>>（从左到右）
      4. 有括号的，先算括号里面的（小括号 → 中括号 → 大括号）
    contentEn: |
      Order of operations (same as elementary school, with <<乘方/exponentiation>> added):
      1. First calculate <<乘方/exponentiation>>
      2. Then <<乘法/multiplication>> and <<除法/division>> (left to right)
      3. Finally <<加法/addition>> and <<减法/subtraction>> (left to right)
      4. Parentheses first (parentheses → brackets → braces)
    examples:
      - "$(-2)^{3} + 3 \\times (-4) = -8 + (-12) = -20$"
      - "$10 - 2 \\times (-3)^{2} = 10 - 2 \\times 9 = 10 - 18 = -8$"
      - "$(-6) \\div 2 + (-3) \\times 4 = -3 + (-12) = -15$"
    examplesEn:
      - "$(-2)^{3} + 3 \\times (-4) = -8 + (-12) = -20$"
      - "$10 - 2 \\times (-3)^{2} = 10 - 2 \\times 9 = 10 - 18 = -8$"
      - "$(-6) \\div 2 + (-3) \\times 4 = -3 + (-12) = -15$"

