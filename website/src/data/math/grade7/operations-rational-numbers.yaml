      answerEn: "$5$"
      explanation: |
        $(-1)^{2024} = 1$（偶次<<幂/power>>为正），$(-2)^{2} = 4$。
        $1 + 4 = 5$。
      explanationEn: |
        $(-1)^{2024} = 1$ (even <<幂/power>> is positive), $(-2)^{2} = 4$.
        $1 + 4 = 5$.

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        计算 $(-36) \div 4 - (-2)^{3} = $ ______。
      questionEn: |
        Calculate $(-36) \div 4 - (-2)^{3} = $ ______.
      correctValue: "-1"
      answer: "$-1$"
      answerEn: "$-1$"
      explanation: |
        $(-36) \div 4 = -9$，$(-2)^{3} = -8$。
        $-9 - (-8) = -9 + 8 = -1$。
      explanationEn: |
        $(-36) \div 4 = -9$, $(-2)^{3} = -8$.
        $-9 - (-8) = -9 + 8 = -1$.

    - number: 3
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        用<<科学记数法/scientific notation>>表示 $135000000$，正确的是（　）
      questionEn: |
        Which is the correct <<科学记数法/scientific notation>> for $135000000$? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - "$13.5 \\times 10^{7}$"
            - "$1.35 \\times 10^{8}$"
            - "$1.35 \\times 10^{7}$"
            - "$0.135 \\times 10^{9}$"
          correctValue: "$1.35 \\times 10^{8}$"
      answer: "$1.35 \\times 10^{8}$"
      answerEn: "$1.35 \\times 10^{8}$"
      explanation: |
        $135000000$ 的<<整数/integer>>部分有 $9$ 位，$n = 9 - 1 = 8$。
        $a = 1.35$（必须满足 $1 \leq a < 10$）。
        所以 $135000000 = 1.35 \times 10^{8}$。
        注意：$13.5 \times 10^{7}$ 不对，因为 $13.5 \geq 10$。
      explanationEn: |
        $135000000$ has $9$ digits in its integer part, $n = 9 - 1 = 8$.
        $a = 1.35$ (must satisfy $1 \leq a < 10$).
        So $135000000 = 1.35 \times 10^{8}$.
        Note: $13.5 \times 10^{7}$ is wrong because $13.5 \geq 10$.

    - number: 4
