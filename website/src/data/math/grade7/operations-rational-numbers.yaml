      answerEn: |
        $(-1)^{3} - \frac{1}{6} \times [4 - (-2)^{3}]$
        $= -1 - \frac{1}{6} \times [4 - (-8)]$
        $= -1 - \frac{1}{6} \times 12$
        $= -1 - 2$
        $= -3$
      explanation: |
        运算顺序：先<<乘方/exponentiation>>（$(-1)^{3} = -1$，$(-2)^{3} = -8$），再算中括号内（$4 - (-8) = 12$），再<<乘法/multiplication>>（$\frac{1}{6} \times 12 = 2$），最后<<减法/subtraction>>（$-1 - 2 = -3$）。
