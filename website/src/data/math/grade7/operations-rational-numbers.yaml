        Calculate $(-1)^{3} - \frac{1}{6} \times [4 - (-2)^{3}]$.
      answer: |
        $(-1)^{3} - \frac{1}{6} \times [4 - (-2)^{3}]$
        $= -1 - \frac{1}{6} \times [4 - (-8)]$
        $= -1 - \frac{1}{6} \times 12$
        $= -1 - 2$
