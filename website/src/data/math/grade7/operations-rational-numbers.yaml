      sectionEn: "I. Fill in the Blanks"
      question: |
        $(-9) + 4 = $ ______。
      questionEn: |
        $(-9) + 4 = $ ______.
      correctValue: "-5"
      answer: "$-5$"
      answerEn: "$-5$"
      explanation: |
        异号相加，$|-9| = 9 > |4| = 4$，取负号，$9 - 4 = 5$，所以结果是 $-5$。
      explanationEn: |
        Different signs: $|-9| = 9 > |4| = 4$, take negative sign, $9 - 4 = 5$, so the result is $-5$.

    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        $(-6) - (-10) = $ ______。
      questionEn: |
        $(-6) - (-10) = $ ______.
      correctValue: "4"
      answer: "$4$"
      answerEn: "$4$"
      explanation: |
        <<减法/subtraction>>转化为<<加法/addition>>：$(-6) - (-10) = (-6) + 10 = 4$。
      explanationEn: |
        Convert <<减法/subtraction>> to <<加法/addition>>: $(-6) - (-10) = (-6) + 10 = 4$.

    - number: 3
