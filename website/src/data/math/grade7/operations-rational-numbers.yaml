    - number: 5
      type: 中考应用题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        一潜水员从海平面开始下潜，每分钟下潜 $3$ 米，下潜 $4$ 分钟后又上浮 $5$ 米。

        （1）用<<有理数/rational number>>运算表示潜水员最终所处位置（以海平面为基准，向下为负）。
        （2）如果潜水员最终要到达海平面以下 $15$ 米处，还需要再下潜多少米？
      questionEn: |
        A diver starts from sea level, descending $3$ meters per minute. After descending for $4$ minutes, the diver ascends $5$ meters.

        (1) Use <<有理数/rational number>> operations to express the diver's final position (sea level as baseline, downward is negative).
        (2) If the diver needs to reach $15$ meters below sea level, how many more meters must the diver descend?
      answer: |
        （1）下潜 $4$ 分钟：$(-3) \times 4 = -12$（米），
        然后上浮 $5$ 米：$-12 + 5 = -7$（米）。
        潜水员在海平面以下 $7$ 米处。

        （2）目标位置：$-15$ 米，当前位置：$-7$ 米。
        还需下潜：$-15 - (-7) = -15 + 7 = -8$（米）。
        还需要再下潜 $8$ 米。
      answerEn: |
        (1) Descending for $4$ minutes: $(-3) \times 4 = -12$ (m),
        then ascending $5$ m: $-12 + 5 = -7$ (m).
        The diver is $7$ meters below sea level.

        (2) Target: $-15$ m, current: $-7$ m.
        More descent needed: $-15 - (-7) = -15 + 7 = -8$ (m).
        The diver needs to descend $8$ more meters.
      explanation: |
        本题综合考查了<<有理数/rational number>>的<<乘法/multiplication>>（下潜速度 $\times$ 时间）、<<加法/addition>>（上浮）、<<减法/subtraction>>（求差距）。
        中考应用题常把实际情境转化为<<有理数/rational number>>运算，关键是正确设定正负方向。
      explanationEn: |
        This problem tests <<有理数/rational number>> <<乘法/multiplication>> (descent speed times time), <<加法/addition>> (ascending), and <<减法/subtraction>> (finding the gap).
        Exam application problems often convert real situations into <<有理数/rational number>> operations. The key is correctly defining positive and negative directions.
