      answer: "$40$"
      answerEn: "$40$"
      explanation: |
        同号得正：$(-5) \times (-8) = +(5 \times 8) = 40$。
      explanationEn: |
        Same signs give positive: $(-5) \times (-8) = +(5 \times 8) = 40$.

    - number: 4
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        用<<科学记数法/scientific notation>>表示 $91200000 = $ ______。
      questionEn: |
        Express $91200000$ in <<科学记数法/scientific notation>>: $91200000 = $ ______.
      correctValue: "9.12*10^7"
      answer: "$9.12 \\times 10^{7}$"
      answerEn: "$9.12 \\times 10^{7}$"
      explanation: |
        $91200000$ 的<<整数/integer>>部分有 $8$ 位，$n = 8 - 1 = 7$，$a = 9.12$。
      explanationEn: |
        $91200000$ has $8$ digits in its integer part, $n = 8 - 1 = 7$, $a = 9.12$.

    - number: 5
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $(-2)^{3} = -8$。
      questionEn: |
        $(-2)^{3} = -8$.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        $(-2)^{3} = (-2) \times (-2) \times (-2) = 4 \times (-2) = -8$。<<负数/negative number>>的奇次<<幂/power>>为<<负数/negative number>>。
      explanationEn: |
        $(-2)^{3} = (-2) \times (-2) \times (-2) = 4 \times (-2) = -8$. An odd <<幂/power>> of a <<负数/negative number>> is <<负数/negative number>>.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $-5^{2} = 25$。
      questionEn: |
        $-5^{2} = 25$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        $-5^{2} = -(5^{2}) = -25$，不是 $25$。只有 $(-5)^{2} = 25$。
      explanationEn: |
        $-5^{2} = -(5^{2}) = -25$, not $25$. Only $(-5)^{2} = 25$.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $0$ 除以任何数都等于 $0$。
      questionEn: |
        $0$ divided by any number equals $0$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        应该是"$0$ 除以任何**非零**数都等于 $0$"。$0$ 不能作除数。
      explanationEn: |
        It should be "$0$ divided by any **nonzero** number equals $0$." $0$ cannot be a divisor.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $3.5 \times 10^{5}$ 表示 $350000$。
      questionEn: |
        $3.5 \times 10^{5}$ represents $350000$.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        $3.5 \times 10^{5} = 3.5 \times 100000 = 350000$。
      explanationEn: |
        $3.5 \times 10^{5} = 3.5 \times 100000 = 350000$.

    - number: 9
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        计算 $(-3) \times 4 + (-2) \times (-5)$ 的结果是（　）
      questionEn: |
        The result of $(-3) \times 4 + (-2) \times (-5)$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$-22$", "$-2$", "$2$", "$22$"]
          correctValue: "$-2$"
      answer: "$-2$"
      answerEn: "$-2$"
      explanation: |
        先算<<乘法/multiplication>>：$(-3) \times 4 = -12$，$(-2) \times (-5) = 10$。
        再算<<加法/addition>>：$-12 + 10 = -2$。
      explanationEn: |
        First <<乘法/multiplication>>: $(-3) \times 4 = -12$, $(-2) \times (-5) = 10$.
        Then <<加法/addition>>: $-12 + 10 = -2$.

    - number: 10
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        下列运算正确的是（　）
      questionEn: |
        Which of the following calculations is correct? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - "$(-2)^{3} = 6$"
            - "$(-1)^{2022} = -1$"
            - "$(-4) \\times (-3) = -12$"
            - "$(-1)^{2023} = -1$"
          correctValue: "$(-1)^{2023} = -1$"
      answer: "$(-1)^{2023} = -1$"
      answerEn: "$(-1)^{2023} = -1$"
      explanation: |
        逐一检验：
        - $(-2)^{3} = -8$，不是 $6$
        - $(-1)^{2022} = 1$（偶次<<幂/power>>为正），不是 $-1$
        - $(-4) \times (-3) = 12$（同号得正），不是 $-12$
        - $(-1)^{2023} = -1$（奇次<<幂/power>>为负）✓
      explanationEn: |
        Check each:
        - $(-2)^{3} = -8$, not $6$
        - $(-1)^{2022} = 1$ (even <<幂/power>> is positive), not $-1$
        - $(-4) \times (-3) = 12$ (same signs give positive), not $-12$
        - $(-1)^{2023} = -1$ (odd <<幂/power>> is negative) ✓

    - number: 11
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: "IV. Calculation"
      question: |
        计算 $(-2)^{3} + (-3) \times [(-4) + 2]$。
      questionEn: |
        Calculate $(-2)^{3} + (-3) \times [(-4) + 2]$.
      answer: |
        $(-2)^{3} + (-3) \times [(-4) + 2]$
        $= -8 + (-3) \times (-2)$
        $= -8 + 6$
        $= -2$
      answerEn: |
        $(-2)^{3} + (-3) \times [(-4) + 2]$
        $= -8 + (-3) \times (-2)$
        $= -8 + 6$
        $= -2$
      explanation: |
        运算顺序：先算<<乘方/exponentiation>> $(-2)^{3} = -8$，再算括号 $(-4) + 2 = -2$，再算<<乘法/multiplication>> $(-3) \times (-2) = 6$，最后<<加法/addition>> $-8 + 6 = -2$。
      explanationEn: |
        Order: first <<乘方/exponentiation>> $(-2)^{3} = -8$, then parentheses $(-4) + 2 = -2$, then <<乘法/multiplication>> $(-3) \times (-2) = 6$, finally <<加法/addition>> $-8 + 6 = -2$.

    - number: 12
      type: 综合应用题
      inputType: open
      section: 五、综合应用题
      sectionEn: "V. Comprehensive Application"
      question: |
        某商店一周内每天的盈亏情况如下（盈利为正，亏损为负，单位：元）：
        $+120$，$-80$，$+200$，$+150$，$-60$，$-40$，$+310$。

        （1）这一周总的盈亏情况如何？
        （2）平均每天盈亏多少元？
      questionEn: |
        A store's daily profit/loss for a week is as follows (profit is positive, loss is negative, unit: yuan):
        $+120$, $-80$, $+200$, $+150$, $-60$, $-40$, $+310$.

        (1) What is the total profit/loss for this week?
        (2) What is the average daily profit/loss?
      answer: |
        （1）总盈亏：
        $120 + (-80) + 200 + 150 + (-60) + (-40) + 310$
        $= (120 + 200 + 150 + 310) + [(-80) + (-60) + (-40)]$
        $= 780 + (-180)$
        $= 600$（元）
        这一周总共盈利 $600$ 元。

        （2）平均每天盈亏：
        $600 \div 7 \approx 85.7$（元）
        平均每天盈利约 $85.7$ 元。
      answerEn: |
        (1) Total profit/loss:
        $120 + (-80) + 200 + 150 + (-60) + (-40) + 310$
        $= (120 + 200 + 150 + 310) + [(-80) + (-60) + (-40)]$
        $= 780 + (-180)$
        $= 600$ (yuan)
        Total profit for the week is $600$ yuan.

        (2) Average daily profit/loss:
        $600 \div 7 \approx 85.7$ (yuan)
        Average daily profit is about $85.7$ yuan.
      explanation: |
        利用<<加法/addition>>交换律和结合律，把<<正数/positive number>>和<<负数/negative number>>分组计算更方便。
      explanationEn: |
        Using the commutative and associative laws of <<加法/addition>>, grouping <<正数/positive number>>s and <<负数/negative number>>s makes calculation easier.

