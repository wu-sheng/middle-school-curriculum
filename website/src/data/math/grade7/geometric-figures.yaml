    - number: 4
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        如图，$\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>，$\overrightarrow{OD}$ 是 $\angle BOC$ 的<<平分线/angle bisector>>，若 $\angle AOD = 54°$，则 $\angle AOB = $ ______°。
      questionEn: |
        As shown, $\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\angle AOB$, and $\overrightarrow{OD}$ is the <<平分线/angle bisector>> of $\angle BOC$. If $\angle AOD = 54°$, then $\angle AOB = $ ______°.
      correctValue: "72"
      answer: "$72°$"
      answerEn: "$72°$"
      explanation: |
        设 $\angle AOB = x$。
        因为 $\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>，所以 $\angle AOC = \frac{x}{2}$，$\angle BOC = \frac{x}{2}$。
        因为 $\overrightarrow{OD}$ 是 $\angle BOC$ 的<<平分线/angle bisector>>，所以 $\angle COD = \frac{1}{2} \cdot \frac{x}{2} = \frac{x}{4}$。
        $\angle AOD = \angle AOC + \angle COD = \frac{x}{2} + \frac{x}{4} = \frac{3x}{4}$
        由 $\frac{3x}{4} = 54°$，解得 $x = 72°$。
        这道中考题考查<<平分线/angle bisector>>的两次应用和方程思想。
      explanationEn: |
        Let $\angle AOB = x$.
        Since $\overrightarrow{OC}$ bisects $\angle AOB$: $\angle AOC = \frac{x}{2}$, $\angle BOC = \frac{x}{2}$.
        Since $\overrightarrow{OD}$ bisects $\angle BOC$: $\angle COD = \frac{x}{4}$.
        $\angle AOD = \angle AOC + \angle COD = \frac{x}{2} + \frac{x}{4} = \frac{3x}{4}$
        From $\frac{3x}{4} = 54°$, we get $x = 72°$.
        This exam question tests double application of <<平分线/angle bisector>>s and algebraic reasoning.

    - number: 5
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知 $\angle AOB$ 和 $\angle BOC$ 互为<<补角/supplementary angle>>，$\angle AOB$ 比 $\angle BOC$ 大 $40°$。
        (1) 求 $\angle AOB$ 和 $\angle BOC$ 的度数。
        (2) 求 $\angle AOB$ 的<<余角/complementary angle>>。
      questionEn: |
        Given that $\angle AOB$ and $\angle BOC$ are <<补角/supplementary angle>>s of each other, and $\angle AOB$ is $40°$ larger than $\angle BOC$.
        (1) Find the measures of $\angle AOB$ and $\angle BOC$.
        (2) Find the <<余角/complementary angle>> of $\angle AOB$.
      answer: |
        (1) 设 $\angle BOC = x°$，则 $\angle AOB = (x + 40)°$。
        因为互为<<补角/supplementary angle>>：$x + (x + 40) = 180$
        $2x + 40 = 180$
        $2x = 140$
        $x = 70$
        所以 $\angle BOC = 70°$，$\angle AOB = 110°$。

        (2) $\angle AOB = 110° > 90°$，所以 $\angle AOB$ 没有<<余角/complementary angle>>（只有小于 $90°$ 的<<角/angle>>才有<<余角/complementary angle>>）。
      answerEn: |
        (1) Let $\angle BOC = x°$, then $\angle AOB = (x + 40)°$.
        Since they are <<补角/supplementary angle>>s: $x + (x + 40) = 180$
        $2x + 40 = 180$
        $2x = 140$
        $x = 70$
        So $\angle BOC = 70°$, $\angle AOB = 110°$.

        (2) $\angle AOB = 110° > 90°$, so $\angle AOB$ has no <<余角/complementary angle>> (only <<角/angle>>s less than $90°$ have <<余角/complementary angle>>s).
      explanation: |
        第 (1) 题用方程求解互补的两个<<角/angle>>，是中考最常考的题型之一。
        第 (2) 题是一个"陷阱"：<<余角/complementary angle>>要求两个<<角/angle>>的和是 $90°$，如果一个<<角/angle>>本身就大于 $90°$，则不存在<<余角/complementary angle>>。
      explanationEn: |
        Part (1) uses equations to solve for two <<补角/supplementary angle>>s — one of the most common exam question types.
        Part (2) is a "trap": <<余角/complementary angle>>s require the sum to be $90°$. If an <<角/angle>> is already greater than $90°$, it has no <<余角/complementary angle>>.
