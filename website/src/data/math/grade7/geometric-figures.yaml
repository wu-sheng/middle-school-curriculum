  questions:
    - number: 1
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        <<直线/straight line>>有______个端点，<<射线/ray>>有______个端点，<<线段/line segment>>有______个端点。
      questionEn: |
        A <<直线/straight line>> has ______ endpoint(s), a <<射线/ray>> has ______ endpoint(s), a <<线段/line segment>> has ______ endpoint(s).
      correctValue: "0,1,2"
      answer: "$0$、$1$、$2$"
      answerEn: "$0$, $1$, $2$"
      explanation: |
        <<直线/straight line>>向两端无限延伸，没有端点；<<射线/ray>>有一个端点，向一个方向延伸；<<线段/line segment>>有两个端点。
      explanationEn: |
        A <<直线/straight line>> extends infinitely in both directions with no endpoints; a <<射线/ray>> has one endpoint and extends in one direction; a <<线段/line segment>> has two endpoints.

    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        已知<<线段/line segment>> $\overline{AB} = 12$ cm，点 $C$ 是 $\overline{AB}$ 的<<中点/midpoint>>，则 $AC = $ ______ cm。
      questionEn: |
        Given <<线段/line segment>> $\overline{AB} = 12$ cm, and point $C$ is the <<中点/midpoint>> of $\overline{AB}$, then $AC = $ ______ cm.
      correctValue: "6"
      answer: "$6$"
      answerEn: "$6$"
      explanation: |
        因为 $C$ 是<<中点/midpoint>>，所以 $AC = \frac{1}{2}AB = \frac{1}{2} \times 12 = 6$ cm。
      explanationEn: |
        Since $C$ is the <<中点/midpoint>>, $AC = \frac{1}{2}AB = \frac{1}{2} \times 12 = 6$ cm.

    - number: 3
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        $40°$ 的<<余角/complementary angle>>是______°，$40°$ 的<<补角/supplementary angle>>是______°。
      questionEn: |
        The <<余角/complementary angle>> of $40°$ is ______°, and the <<补角/supplementary angle>> of $40°$ is ______°.
      correctValue: "50,140"
      answer: "$50°$、$140°$"
      answerEn: "$50°$, $140°$"
      explanation: |
        <<余角/complementary angle>> $= 90° - 40° = 50°$；<<补角/supplementary angle>> $= 180° - 40° = 140°$。
      explanationEn: |
        <<余角/complementary angle>> $= 90° - 40° = 50°$; <<补角/supplementary angle>> $= 180° - 40° = 140°$.

    - number: 4
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        已知 $\angle AOB = 90°$，$\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>，则 $\angle AOC = $ ______°。
      questionEn: |
        Given $\angle AOB = 90°$ and $\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\angle AOB$, then $\angle AOC = $ ______°.
      correctValue: "45"
      answer: "$45°$"
      answerEn: "$45°$"
      explanation: |
        <<平分线/angle bisector>>把<<角/angle>>分成两个相等的<<角/angle>>，所以 $\angle AOC = \frac{1}{2} \times 90° = 45°$。
      explanationEn: |
        The <<平分线/angle bisector>> divides the <<角/angle>> into two equal <<角/angle>>s, so $\angle AOC = \frac{1}{2} \times 90° = 45°$.

    - number: 5
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        经过两个点可以画无数条<<直线/straight line>>。
      questionEn: |
        Through two points, you can draw infinitely many <<直线/straight line>>s.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        经过两个点有且只有一条<<直线/straight line>>。这是<<直线/straight line>>的基本公理。
      explanationEn: |
        Through two points, there is one and only one <<直线/straight line>>. This is a basic axiom of <<直线/straight line>>s.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        <<射线/ray>> $\overrightarrow{AB}$ 和<<射线/ray>> $\overrightarrow{BA}$ 是同一条<<射线/ray>>。
      questionEn: |
        <<射线/ray>> $\overrightarrow{AB}$ and <<射线/ray>> $\overrightarrow{BA}$ are the same <<射线/ray>>.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        $\overrightarrow{AB}$ 的端点是 $A$，$\overrightarrow{BA}$ 的端点是 $B$，它们端点不同、方向也可能不同，所以是不同的<<射线/ray>>。
      explanationEn: |
        $\overrightarrow{AB}$ has endpoint $A$, while $\overrightarrow{BA}$ has endpoint $B$. They have different endpoints and possibly different directions, so they are different <<射线/ray>>s.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        如果 $\angle 1 + \angle 2 = 90°$，那么 $\angle 1$ 和 $\angle 2$ 互为<<余角/complementary angle>>。
      questionEn: |
        If $\angle 1 + \angle 2 = 90°$, then $\angle 1$ and $\angle 2$ are <<余角/complementary angle>>s of each other.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        <<余角/complementary angle>>的定义就是两个<<角/angle>>的和等于 $90°$，与这两个<<角/angle>>是否相邻无关。
      explanationEn: |
        The definition of <<余角/complementary angle>>s is that the sum of two <<角/angle>>s equals $90°$, regardless of whether they are adjacent.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        两点之间，<<直线/straight line>>最短。
      questionEn: |
        Between two points, the <<直线/straight line>> is the shortest.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        正确说法是"两点之间，<<线段/line segment>>最短"。<<直线/straight line>>是无限延伸的，没有"长度"可言。
      explanationEn: |
        The correct statement is "between two points, the <<线段/line segment>> is the shortest." A <<直线/straight line>> extends infinitely and has no measurable "length."

    - number: 9
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        下列说法正确的是（　）
      questionEn: |
        Which of the following statements is correct? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - "A. <<线段/line segment>> $AB$ 和<<线段/line segment>> $BA$ 是不同的<<线段/line segment>>"
            - "B. <<射线/ray>> $\\overrightarrow{OA}$ 和<<射线/ray>> $\\overrightarrow{OB}$ 一定是不同的<<射线/ray>>"
            - "C. <<直线/straight line>>没有端点，可以度量长度"
            - "D. 经过一个点可以画无数条<<直线/straight line>>"
          correctValue: "D. 经过一个点可以画无数条<<直线/straight line>>"
      answer: "D"
      answerEn: "D"
      explanation: |
        A 错：<<线段/line segment>> $AB$ 和<<线段/line segment>> $BA$ 是同一条<<线段/line segment>>（两个端点相同）。
        B 错：如果 $A$、$O$、$B$ 三点在同一条<<直线/straight line>>上且 $A$、$B$ 在 $O$ 的同侧，则 $\overrightarrow{OA}$ 和 $\overrightarrow{OB}$ 可能是同一条<<射线/ray>>。
        C 错：<<直线/straight line>>无限延伸，不能度量长度。
        D 对：经过一个点可以画无数条<<直线/straight line>>。
      explanationEn: |
        A is wrong: <<线段/line segment>> $AB$ and <<线段/line segment>> $BA$ are the same (same two endpoints).
        B is wrong: If $A$, $O$, $B$ are collinear with $A$ and $B$ on the same side of $O$, then $\overrightarrow{OA}$ and $\overrightarrow{OB}$ could be the same <<射线/ray>>.
        C is wrong: A <<直线/straight line>> extends infinitely and its length cannot be measured.
        D is correct: Through one point, infinitely many <<直线/straight line>>s can be drawn.

    - number: 10
      type: 计算题
      inputType: open
      section: 四、计算与应用
      sectionEn: "IV. Calculation and Application"
      question: |
        已知点 $C$ 在<<线段/line segment>> $\overline{AB}$ 上，$AC = 5$ cm，$CB = 3$ cm。点 $D$ 是<<线段/line segment>> $\overline{AB}$ 的<<中点/midpoint>>。求 $CD$ 的长度。
      questionEn: |
        Point $C$ is on <<线段/line segment>> $\overline{AB}$, $AC = 5$ cm, $CB = 3$ cm. Point $D$ is the <<中点/midpoint>> of $\overline{AB}$. Find the length of $CD$.
      answer: |
        $AB = AC + CB = 5 + 3 = 8$ cm
        因为 $D$ 是<<中点/midpoint>>，$AD = \frac{1}{2}AB = 4$ cm
        $CD = AC - AD = 5 - 4 = 1$ cm
      answerEn: |
        $AB = AC + CB = 5 + 3 = 8$ cm
        Since $D$ is the <<中点/midpoint>>, $AD = \frac{1}{2}AB = 4$ cm
        $CD = AC - AD = 5 - 4 = 1$ cm
      explanation: |
        先求出 $AB$ 的总长，再利用<<中点/midpoint>>求出 $AD$，最后用 $AC$ 和 $AD$ 的差得到 $CD$。
      explanationEn: |
        First find the total length of $AB$, then use the <<中点/midpoint>> to find $AD$, and finally the difference between $AC$ and $AD$ gives $CD$.

    - number: 11
      type: 计算题
      inputType: open
      section: 四、计算与应用
      sectionEn: "IV. Calculation and Application"
      question: |
        如图，$\overrightarrow{OC}$ 在 $\angle AOB$ 内部，$\angle AOB = 100°$，$\angle AOC = 40°$。$\overrightarrow{OD}$ 是 $\angle BOC$ 的<<平分线/angle bisector>>。求 $\angle AOD$ 的度数。
      questionEn: |
        As shown, $\overrightarrow{OC}$ is inside $\angle AOB$, $\angle AOB = 100°$, $\angle AOC = 40°$. $\overrightarrow{OD}$ is the <<平分线/angle bisector>> of $\angle BOC$. Find the measure of $\angle AOD$.
      answer: |
        $\angle BOC = \angle AOB - \angle AOC = 100° - 40° = 60°$
        因为 $\overrightarrow{OD}$ 是 $\angle BOC$ 的<<平分线/angle bisector>>，
        $\angle COD = \frac{1}{2}\angle BOC = \frac{1}{2} \times 60° = 30°$
        $\angle AOD = \angle AOC + \angle COD = 40° + 30° = 70°$
      answerEn: |
        $\angle BOC = \angle AOB - \angle AOC = 100° - 40° = 60°$
        Since $\overrightarrow{OD}$ is the <<平分线/angle bisector>> of $\angle BOC$,
        $\angle COD = \frac{1}{2}\angle BOC = \frac{1}{2} \times 60° = 30°$
        $\angle AOD = \angle AOC + \angle COD = 40° + 30° = 70°$
      explanation: |
        先求 $\angle BOC$，再利用<<平分线/angle bisector>>求 $\angle COD$，最后利用<<角/angle>>的加法求 $\angle AOD$。
      explanationEn: |
        First find $\angle BOC$, then use the <<平分线/angle bisector>> to find $\angle COD$, and finally use <<角/angle>> addition to find $\angle AOD$.

    - number: 12
      type: 综合题
      inputType: open
      section: 五、综合题
      sectionEn: "V. Comprehensive Problem"
      question: |
        已知 $\angle \alpha = 36°$。
        (1) 求 $\angle \alpha$ 的<<余角/complementary angle>>。
        (2) 求 $\angle \alpha$ 的<<补角/supplementary angle>>。
        (3) $\angle \alpha$ 的<<补角/supplementary angle>>是它的<<余角/complementary angle>>的几倍？
      questionEn: |
        Given $\angle \alpha = 36°$.
        (1) Find the <<余角/complementary angle>> of $\angle \alpha$.
        (2) Find the <<补角/supplementary angle>> of $\angle \alpha$.
        (3) How many times is the <<补角/supplementary angle>> of $\angle \alpha$ compared to its <<余角/complementary angle>>?
      answer: |
        (1) <<余角/complementary angle>> $= 90° - 36° = 54°$
        (2) <<补角/supplementary angle>> $= 180° - 36° = 144°$
        (3) $144° \div 54° = \frac{144}{54} = \frac{8}{3}$，即<<补角/supplementary angle>>是<<余角/complementary angle>>的 $\frac{8}{3}$ 倍。
      answerEn: |
        (1) <<余角/complementary angle>> $= 90° - 36° = 54°$
        (2) <<补角/supplementary angle>> $= 180° - 36° = 144°$
        (3) $144° \div 54° = \frac{144}{54} = \frac{8}{3}$, so the <<补角/supplementary angle>> is $\frac{8}{3}$ times the <<余角/complementary angle>>.
      explanation: |
        利用<<余角/complementary angle>>和<<补角/supplementary angle>>的定义分别计算，然后求比值。
      explanationEn: |
        Use the definitions of <<余角/complementary angle>> and <<补角/supplementary angle>> to calculate, then find the ratio.

