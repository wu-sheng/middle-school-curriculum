      question: |
        如果 $\angle \alpha = 56°$，那么 $\angle \alpha$ 的<<余角/complementary angle>>的<<补角/supplementary angle>>等于（　）
      questionEn: |
        If $\angle \alpha = 56°$, then the <<补角/supplementary angle>> of the <<余角/complementary angle>> of $\angle \alpha$ equals ( )
      subInputs:
        - prompt: 选择答案
          options: ["$34°$", "$124°$", "$146°$", "$56°$"]
          correctValue: "$146°$"
      answer: "$146°$"
      answerEn: "$146°$"
      explanation: |
        $\angle \alpha$ 的<<余角/complementary angle>> $= 90° - 56° = 34°$
        $34°$ 的<<补角/supplementary angle>> $= 180° - 34° = 146°$
        这是中考常见的"<<余角/complementary angle>>的<<补角/supplementary angle>>"嵌套问题，关键是分步计算不要混淆。
      explanationEn: |
        <<余角/complementary angle>> of $\angle \alpha$ $= 90° - 56° = 34°$
        <<补角/supplementary angle>> of $34°$ $= 180° - 34° = 146°$
