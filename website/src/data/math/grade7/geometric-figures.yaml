examples:
  - type: 1
    title: 识别<<立体图形/solid figure>>的三视图
    titleEn: Identifying three views of <<立体图形/solid figure>>s
    question: |
      一个<<圆柱/cylinder>>从正面看是什么图形？从上面看呢？
    questionEn: |
      What figure does a <<圆柱/cylinder>> look like from the front? From above?
    steps:
      - "从正面看<<圆柱/cylinder>>，看到的轮廓是一个<<长方形/rectangle>>"
      - "从上面看<<圆柱/cylinder>>，看到的轮廓是一个<<圆/circle>>"
    stepsEn:
      - "Viewing a <<圆柱/cylinder>> from the front, the outline is a <<长方形/rectangle>>"
      - "Viewing a <<圆柱/cylinder>> from above, the outline is a <<圆/circle>>"
    answer: "从正面看是<<长方形/rectangle>>，从上面看是<<圆/circle>>。"
    answerEn: "From the front it is a <<长方形/rectangle>>, from above it is a <<圆/circle>>."

  - type: 2
    title: 用字母表示<<直线/straight line>>、<<射线/ray>>、<<线段/line segment>>
    titleEn: Using letters to denote <<直线/straight line>>, <<射线/ray>>, and <<线段/line segment>>
    question: |
      如图，直线上有三个点 $A$、$B$、$C$（$B$ 在 $A$、$C$ 之间）。请写出图中所有的<<线段/line segment>>和<<射线/ray>>（以 $A$ 为端点的）。
    questionEn: |
      Given three points $A$, $B$, $C$ on a straight line ($B$ is between $A$ and $C$). List all the <<线段/line segment>>s and all the <<射线/ray>>s with endpoint $A$.
    steps:
      - "<<线段/line segment>>：$\\overline{AB}$、$\\overline{BC}$、$\\overline{AC}$，共 $3$ 条"
      - "以 $A$ 为端点的<<射线/ray>>：$\\overrightarrow{AB}$（即 $\\overrightarrow{AC}$，同一条）、$\\overrightarrow{A}$ 沿反方向（即 $A$ 反向延长的<<射线/ray>>），共 $2$ 条"
    stepsEn:
      - "<<线段/line segment>>s: $\\overline{AB}$, $\\overline{BC}$, $\\overline{AC}$, a total of $3$"
      - "<<射线/ray>>s with endpoint $A$: $\\overrightarrow{AB}$ (same as $\\overrightarrow{AC}$, since $B$ and $C$ are on the same side), and the <<射线/ray>> in the opposite direction from $A$, a total of $2$"
    answer: "<<线段/line segment>>有 $3$ 条：$\\overline{AB}$、$\\overline{BC}$、$\\overline{AC}$。以 $A$ 为端点的<<射线/ray>>有 $2$ 条。"
    answerEn: "There are $3$ <<线段/line segment>>s: $\\overline{AB}$, $\\overline{BC}$, $\\overline{AC}$. There are $2$ <<射线/ray>>s with endpoint $A$."

  - type: 3
    title: 利用"两点之间<<线段/line segment>>最短"解题
    titleEn: "Using 'the <<线段/line segment>> is the shortest path between two points'"
    question: |
      要从公路旁的村庄 $A$ 修一条最短的路到公路 $l$，应该怎么修？
    questionEn: |
      To build the shortest road from village $A$ beside a highway $l$ to the highway, how should it be built?
    steps:
      - 从点 $A$ 向<<直线/straight line>> $l$ 作垂线段
      - '由"两点之间<<线段/line segment>>最短"和"垂线段最短"可知，<<垂线段/perpendicular segment>>是从点 $A$ 到<<直线/straight line>> $l$ 的最短路径'
    stepsEn:
      - "Draw a <<垂线段/perpendicular segment>> from point $A$ to <<直线/straight line>> $l$"
      - "By 'the <<线段/line segment>> is the shortest path between two points' and 'the <<垂线段/perpendicular segment>> is the shortest,' the <<垂线段/perpendicular segment>> is the shortest path from $A$ to $l$"
    answer: "从 $A$ 向公路 $l$ 作<<垂线段/perpendicular segment>>，即 $A$ 到公路的垂直距离就是最短路线。"
    answerEn: "Draw a <<垂线段/perpendicular segment>> from $A$ to highway $l$; the perpendicular distance from $A$ to the highway is the shortest route."

  - type: 4
    title: <<线段/line segment>>的<<中点/midpoint>>计算
    titleEn: Calculating the <<中点/midpoint>> of a <<线段/line segment>>
    question: |
      已知<<线段/line segment>> $\overline{AB} = 8$ cm，点 $C$ 是 $\overline{AB}$ 的<<中点/midpoint>>，点 $D$ 是 $\overline{CB}$ 的<<中点/midpoint>>。求 $\overline{AD}$ 的长度。
    questionEn: |
      Given <<线段/line segment>> $\overline{AB} = 8$ cm, point $C$ is the <<中点/midpoint>> of $\overline{AB}$, and point $D$ is the <<中点/midpoint>> of $\overline{CB}$. Find the length of $\overline{AD}$.
    steps:
      - "因为 $C$ 是 $\\overline{AB}$ 的<<中点/midpoint>>，所以 $AC = CB = \\frac{1}{2} \\times 8 = 4$ cm"
      - "因为 $D$ 是 $\\overline{CB}$ 的<<中点/midpoint>>，所以 $CD = DB = \\frac{1}{2} \\times 4 = 2$ cm"
      - "$AD = AC + CD = 4 + 2 = 6$ cm"
    stepsEn:
      - "Since $C$ is the <<中点/midpoint>> of $\\overline{AB}$, $AC = CB = \\frac{1}{2} \\times 8 = 4$ cm"
      - "Since $D$ is the <<中点/midpoint>> of $\\overline{CB}$, $CD = DB = \\frac{1}{2} \\times 4 = 2$ cm"
      - "$AD = AC + CD = 4 + 2 = 6$ cm"
    answer: "$\\overline{AD} = 6$ cm"
    answerEn: "$\\overline{AD} = 6$ cm"

  - type: 5
    title: <<角/angle>>的表示和计算
    titleEn: Notation and calculation of <<角/angle>>s
    question: |
      如图，$\overrightarrow{OC}$ 在 $\angle AOB$ 内部，$\angle AOC = 28°$，$\angle BOC = 17°$。求 $\angle AOB$ 的度数。
    questionEn: |
      As shown, $\overrightarrow{OC}$ is inside $\angle AOB$, $\angle AOC = 28°$, $\angle BOC = 17°$. Find the measure of $\angle AOB$.
    steps:
      - "因为<<射线/ray>> $\\overrightarrow{OC}$ 在 $\\angle AOB$ 的内部"
      - "所以 $\\angle AOB = \\angle AOC + \\angle COB = 28° + 17° = 45°$"
    stepsEn:
      - "Since <<射线/ray>> $\\overrightarrow{OC}$ is inside $\\angle AOB$"
      - "Therefore $\\angle AOB = \\angle AOC + \\angle COB = 28° + 17° = 45°$"
    answer: "$\\angle AOB = 45°$"
    answerEn: "$\\angle AOB = 45°$"

  - type: 6
    title: <<角/angle>>的<<平分线/angle bisector>>
    titleEn: <<平分线/angle bisector>> of an <<角/angle>>
    question: |
      已知 $\angle AOB = 76°$，$\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>。求 $\angle AOC$ 的度数。
    questionEn: |
      Given $\angle AOB = 76°$, and $\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\angle AOB$. Find the measure of $\angle AOC$.
    steps:
      - "因为 $\\overrightarrow{OC}$ 是 $\\angle AOB$ 的<<平分线/angle bisector>>"
      - "所以 $\\angle AOC = \\frac{1}{2}\\angle AOB = \\frac{1}{2} \\times 76° = 38°$"
    stepsEn:
      - "Since $\\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\\angle AOB$"
      - "Therefore $\\angle AOC = \\frac{1}{2}\\angle AOB = \\frac{1}{2} \\times 76° = 38°$"
    answer: "$\\angle AOC = 38°$"
    answerEn: "$\\angle AOC = 38°$"

  - type: 7
    title: <<余角/complementary angle>>和<<补角/supplementary angle>>的计算
    titleEn: Calculating <<余角/complementary angle>>s and <<补角/supplementary angle>>s
    question: |
      一个<<角/angle>>的<<补角/supplementary angle>>比它的<<余角/complementary angle>>大多少度？
    questionEn: |
      How many degrees larger is the <<补角/supplementary angle>> of an <<角/angle>> than its <<余角/complementary angle>>?
    steps:
      - "设这个<<角/angle>>为 $\\angle \\alpha$"
      - "它的<<余角/complementary angle>>为 $90° - \\angle \\alpha$"
      - "它的<<补角/supplementary angle>>为 $180° - \\angle \\alpha$"
      - "差 $= (180° - \\angle \\alpha) - (90° - \\angle \\alpha) = 180° - \\angle \\alpha - 90° + \\angle \\alpha = 90°$"
    stepsEn:
      - "Let the <<角/angle>> be $\\angle \\alpha$"
      - "Its <<余角/complementary angle>> is $90° - \\angle \\alpha$"
      - "Its <<补角/supplementary angle>> is $180° - \\angle \\alpha$"
      - "Difference $= (180° - \\angle \\alpha) - (90° - \\angle \\alpha) = 180° - \\angle \\alpha - 90° + \\angle \\alpha = 90°$"
    answer: "一个<<角/angle>>的<<补角/supplementary angle>>比它的<<余角/complementary angle>>大 $90°$。这个结论与<<角/angle>>的大小无关。"
    answerEn: "The <<补角/supplementary angle>> of an <<角/angle>> is always $90°$ larger than its <<余角/complementary angle>>. This conclusion is independent of the size of the <<角/angle>>."

  - type: 8
    title: 度分秒的换算
    titleEn: Converting degrees, minutes, and seconds
    question: |
      把 $35°24'$ 与 $18°48'$ 相加。
    questionEn: |
      Add $35°24'$ and $18°48'$.
    steps:
      - "先加分：$24' + 48' = 72' = 1°12'$"
      - "再加度：$35° + 18° = 53°$"
      - "合在一起：$53° + 1°12' = 54°12'$"
    stepsEn:
      - "First add the minutes: $24' + 48' = 72' = 1°12'$"
      - "Then add the degrees: $35° + 18° = 53°$"
      - "Combine: $53° + 1°12' = 54°12'$"
    answer: "$35°24' + 18°48' = 54°12'$"
    answerEn: "$35°24' + 18°48' = 54°12'$"

commonMistakes:
  - "<<射线/ray>>的表示中端点要写在前面：$\\overrightarrow{OA}$ 和 $\\overrightarrow{AO}$ 是不同的<<射线/ray>>，端点不同"
  - '<<直线/straight line>>没有长度，不能说"<<直线/straight line>> $AB$ 的长度"；只有<<线段/line segment>>才有长度'
  - "<<角/angle>>的表示 $\\angle AOB$ 中，<<顶点/vertex>>字母 $O$ 一定要写在中间，不能写成 $\\angle ABO$"
  - '<<余角/complementary angle>>和<<补角/supplementary angle>>是两个<<角/angle>>之间的关系，不能说"一个<<角/angle>>是<<余角/complementary angle>>"，要说"两个<<角/angle>>互为<<余角/complementary angle>>"'
  - "度分秒进率不是 $100$，而是 $60$：$1° = 60'$，$1' = 60''$，计算时注意进位和借位"
  - '不要把<<线段/line segment>>的<<中点/midpoint>>理解为"中间的一个点就行"，必须满足 $AC = CB$ 才是<<中点/midpoint>>'
commonMistakesEn:
  - "In <<射线/ray>> notation, the endpoint must be written first: $\\overrightarrow{OA}$ and $\\overrightarrow{AO}$ are different <<射线/ray>>s with different endpoints"
  - "A <<直线/straight line>> has no length — you cannot say 'the length of <<直线/straight line>> $AB$'; only <<线段/line segment>>s have length"
  - "In the notation $\\angle AOB$, the <<顶点/vertex>> letter $O$ must be in the middle — do not write $\\angle ABO$"
  - "<<余角/complementary angle>> and <<补角/supplementary angle>> describe a relationship between two <<角/angle>>s — do not say 'an <<角/angle>> is a <<余角/complementary angle>>', but rather 'two <<角/angle>>s are <<余角/complementary angle>>s of each other'"
  - "The conversion rate for degrees, minutes, seconds is $60$, not $100$: $1° = 60'$, $1' = 60''$ — pay attention to carrying and borrowing in calculations"
  - "The <<中点/midpoint>> of a <<线段/line segment>> is not just 'any point in the middle'; it must satisfy $AC = CB$ to be the <<中点/midpoint>>"

exercises:
  timeGuide:
    total: 30分钟
    totalEn: 30 minutes
    sections:
      - range: "1-4"
