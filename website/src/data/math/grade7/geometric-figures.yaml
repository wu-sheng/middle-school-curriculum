title: 几何图形初步
titleEn: Introduction to Geometric Figures
chapter: 6
subject: math
grade: grade7
semester: semester1
estimatedTime: 45-60分钟学习 + 30分钟练习
targetAudience: 刚小学毕业、准备进入七年级的学生

objectives:
  - 认识<<立体图形/solid figure>>和<<平面图形/plane figure>>，了解它们之间的关系
  - 理解<<点/point>>、<<线/line>>、<<面/surface>>、<<体/solid>>的基本概念
  - 掌握<<直线/straight line>>、<<射线/ray>>、<<线段/line segment>>的概念、表示方法和区别
  - 学会比较<<线段/line segment>>的长短，理解<<线段/line segment>>的中点
  - 掌握<<角/angle>>的概念、表示方法，能进行<<角/angle>>的比较和运算
  - 理解<<余角/complementary angle>>和<<补角/supplementary angle>>的概念及性质
objectivesEn:
  - Recognize <<立体图形/solid figure>>s and <<平面图形/plane figure>>s, and understand their relationship
  - Understand the basic concepts of <<点/point>>, <<线/line>>, <<面/surface>>, and <<体/solid>>
  - Master the concepts, notation, and differences of <<直线/straight line>>, <<射线/ray>>, and <<线段/line segment>>
  - Learn to compare the lengths of <<线段/line segment>>s and understand the <<中点/midpoint>> of a <<线段/line segment>>
  - Master the concept and notation of <<角/angle>>s, and be able to compare and calculate <<角/angle>>s
  - Understand the concepts and properties of <<余角/complementary angle>>s and <<补角/supplementary angle>>s

prerequisites:
  title: 从小学知识出发——几何图形在哪里？
  titleEn: "Starting from elementary school knowledge — where are geometric figures?"
  intro: |
    小学里，我们已经认识了一些图形：
  introEn: |
    In elementary school, we already learned about some figures:
  knownNumbers:
    - "<<长方形/rectangle>>、<<正方形/square>>、<<三角形/triangle>>、<<圆/circle>>等<<平面图形/plane figure>>"
    - "<<长方体/cuboid>>、<<正方体/cube>>、<<圆柱/cylinder>>、<<圆锥/cone>>等<<立体图形/solid figure>>"
    - 用尺子量长度，用量角器量<<角/angle>>
  knownNumbersEn:
    - "<<平面图形/plane figure>>s such as <<长方形/rectangle>>, <<正方形/square>>, <<三角形/triangle>>, <<圆/circle>>"
    - "<<立体图形/solid figure>>s such as <<长方体/cuboid>>, <<正方体/cube>>, <<圆柱/cylinder>>, <<圆锥/cone>>"
    - "Measuring length with a ruler and measuring <<角/angle>>s with a protractor"
  canSolve:
    - 识别一个图形是<<三角形/triangle>>还是<<长方形/rectangle>>
    - 用量角器量出一个<<角/angle>>是 $90°$
    - 知道<<正方体/cube>>有 $6$ 个面、$8$ 个顶点、$12$ 条棱
  canSolveEn:
    - "Identify whether a figure is a <<三角形/triangle>> or a <<长方形/rectangle>>"
    - "Use a protractor to measure that an <<角/angle>> is $90°$"
    - "Know that a <<正方体/cube>> has $6$ faces, $8$ vertices, and $12$ edges"
  cannotSolve:
    - 为什么"两点之间，<<线段/line segment>>最短"？
    - 怎样用字母规范地表示一条<<直线/straight line>>、<<射线/ray>>或<<线段/line segment>>？
    - 如果两个<<角/angle>>的和是 $90°$ 或 $180°$，有什么特殊性质？
    - 怎样用几何语言严谨地描述和证明？
  cannotSolveEn:
    - "Why is a <<线段/line segment>> the shortest path between two points?"
    - "How to properly use letters to denote a <<直线/straight line>>, <<射线/ray>>, or <<线段/line segment>>?"
    - "If the sum of two <<角/angle>>s is $90°$ or $180°$, what special properties exist?"
    - "How to describe and prove things rigorously using geometric language?"
  conclusion: |
    七年级的几何学习，就是要用更严谨的**数学语言**来描述这些图形，学会**推理**和**计算**。
  conclusionEn: |
    Geometry in Grade 7 is about using more rigorous **mathematical language** to describe these figures, and learning to **reason** and **calculate**.

concepts:
  - id: solid-and-plane-figures
    title: <<立体图形/solid figure>>与<<平面图形/plane figure>>
    titleEn: "<<立体图形/solid figure>>s and <<平面图形/plane figure>>s"
    content: |
      我们周围的物体都可以看作几何图形。
      - **<<立体图形/solid figure>>**：占据空间的图形，如<<长方体/cuboid>>、<<圆柱/cylinder>>、<<球/sphere>>、<<棱锥/pyramid>>等。
      - **<<平面图形/plane figure>>**：在同一平面内的图形，如<<三角形/triangle>>、<<长方形/rectangle>>、<<圆/circle>>等。
      - <<立体图形/solid figure>>从不同方向看，可以得到不同的<<平面图形/plane figure>>（即**三视图**）。
    contentEn: |
      Objects around us can all be viewed as geometric figures.
      - **<<立体图形/solid figure>>s**: Figures that occupy space, such as <<长方体/cuboid>>s, <<圆柱/cylinder>>s, <<球/sphere>>s, <<棱锥/pyramid>>s, etc.
      - **<<平面图形/plane figure>>s**: Figures in the same plane, such as <<三角形/triangle>>s, <<长方形/rectangle>>s, <<圆/circle>>s, etc.
      - Viewing a <<立体图形/solid figure>> from different directions gives different <<平面图形/plane figure>>s (called **three views**).
    examples:
      - 一个<<圆柱/cylinder>>从正面看是一个<<长方形/rectangle>>，从上面看是一个<<圆/circle>>
      - 一个<<球/sphere>>从任何方向看都是一个<<圆/circle>>
      - 一个<<正方体/cube>>的展开图是由 $6$ 个<<正方形/square>>组成的
    examplesEn:
      - "A <<圆柱/cylinder>> looks like a <<长方形/rectangle>> from the front and a <<圆/circle>> from above"
      - "A <<球/sphere>> looks like a <<圆/circle>> from any direction"
      - "The net of a <<正方体/cube>> is composed of $6$ <<正方形/square>>s"
    hasVisualization: true

  - id: point-line-surface-solid
    title: <<点/point>>、<<线/line>>、<<面/surface>>、<<体/solid>>
    titleEn: "<<点/point>>, <<线/line>>, <<面/surface>>, and <<体/solid>>"
    content: |
      几何图形都是由<<点/point>>、<<线/line>>、<<面/surface>>、<<体/solid>>组成的。
      - **<<点/point>>**：没有大小，只有位置。两条<<线/line>>相交得到一个<<点/point>>。
      - **<<线/line>>**：没有宽度，只有长度方向。两个<<面/surface>>相交得到一条<<线/line>>。
      - **<<面/surface>>**：没有厚度，有长和宽。<<面/surface>>有<<平面/flat surface>>和<<曲面/curved surface>>之分。
      - **<<体/solid>>**：有长、宽、高，占据空间。
    contentEn: |
      Geometric figures are all composed of <<点/point>>s, <<线/line>>s, <<面/surface>>s, and <<体/solid>>s.
      - **<<点/point>>**: Has no size, only position. Two <<线/line>>s intersect to form a <<点/point>>.
      - **<<线/line>>**: Has no width, only direction and length. Two <<面/surface>>s intersect to form a <<线/line>>.
      - **<<面/surface>>**: Has no thickness, only length and width. <<面/surface>>s can be <<平面/flat surface>>s or <<曲面/curved surface>>s.
      - **<<体/solid>>**: Has length, width, and height, and occupies space.
    examples:
      - "<<长方体/cuboid>>有 $8$ 个顶点（<<点/point>>）、$12$ 条棱（<<线/line>>）、$6$ 个面（<<面/surface>>）"
      - 笔尖在纸上点一下形成一个<<点/point>>
      - 两面墙交接的地方形成一条<<线/line>>
    examplesEn:
      - "A <<长方体/cuboid>> has $8$ vertices (<<点/point>>s), $12$ edges (<<线/line>>s), and $6$ faces (<<面/surface>>s)"
      - "A pen tip touching paper forms a <<点/point>>"
      - "Where two walls meet forms a <<线/line>>"

  - id: line-ray-segment
    title: <<直线/straight line>>、<<射线/ray>>、<<线段/line segment>>
    titleEn: "<<直线/straight line>>, <<射线/ray>>, and <<线段/line segment>>"
    content: |
      这三种都是"直的线"，区别在于**端点个数**和**是否可以延伸**：
      - **<<直线/straight line>>**：没有端点，向两个方向无限延伸。经过两点 $A$、$B$，可以记作<<直线/straight line>> $AB$ 或<<直线/straight line>> $l$。
      - **<<射线/ray>>**：有 $1$ 个端点，向一个方向无限延伸。从端点 $O$ 经过点 $A$，记作<<射线/ray>> $\overrightarrow{OA}$（端点写在前面）。
      - **<<线段/line segment>>**：有 $2$ 个端点，不能延伸，有确定的长度。连接 $A$、$B$ 两点的<<线段/line segment>>记作 $\overline{AB}$（或<<线段/line segment>> $AB$）。
    contentEn: |
      These three are all "straight lines," distinguished by **number of endpoints** and **whether they extend**:
      - **<<直线/straight line>>**: No endpoints, extends infinitely in both directions. Through points $A$ and $B$, written as <<直线/straight line>> $AB$ or <<直线/straight line>> $l$.
      - **<<射线/ray>>**: Has $1$ endpoint, extends infinitely in one direction. From endpoint $O$ through point $A$, written as <<射线/ray>> $\overrightarrow{OA}$ (endpoint written first).
      - **<<线段/line segment>>**: Has $2$ endpoints, cannot extend, has a definite length. The <<线段/line segment>> connecting $A$ and $B$ is written as $\overline{AB}$ (or <<线段/line segment>> $AB$).
    classification:
      - name: <<直线/straight line>>
        nameEn: <<直线/straight line>>
        examples: "无端点，向两方延伸，不可度量长度"
      - name: <<射线/ray>>
        nameEn: <<射线/ray>>
        examples: "$1$ 个端点，向一方延伸，不可度量长度"
      - name: <<线段/line segment>>
        nameEn: <<线段/line segment>>
        examples: "$2$ 个端点，不能延伸，可以度量长度"
    notes:
      - "经过两点有且只有一条<<直线/straight line>>（两点确定一条<<直线/straight line>>）"
      - "两点之间，<<线段/line segment>>最短（<<线段/line segment>>的基本性质）"
      - "两点之间的距离就是连接这两点的<<线段/line segment>>的长度"
    notesEn:
      - "Through two points, there is one and only one <<直线/straight line>> (two points determine a <<直线/straight line>>)"
      - "Between two points, the <<线段/line segment>> is the shortest path (basic property of <<线段/line segment>>s)"
      - "The distance between two points is the length of the <<线段/line segment>> connecting them"
    hasVisualization: true

  - id: segment-comparison
    title: <<线段/line segment>>的比较与运算
    titleEn: Comparison and operations of <<线段/line segment>>s
    content: |
      **比较<<线段/line segment>>长短**的两种方法：
      1. **度量法**：用尺子分别量出长度，再比较数值。
      2. **叠合法**：把一条<<线段/line segment>>移到另一条上，使一个端点重合，看另一端的位置。

      **<<线段/line segment>>的<<中点/midpoint>>**：
      - 如果点 $C$ 在<<线段/line segment>> $\overline{AB}$ 上，且 $AC = CB = \frac{1}{2}AB$，则点 $C$ 是<<线段/line segment>> $\overline{AB}$ 的<<中点/midpoint>>。

      **<<线段/line segment>>的和与差**：
      - 如果点 $C$ 在<<线段/line segment>> $\overline{AB}$ 上，则 $AC + CB = AB$，即 $CB = AB - AC$。
    contentEn: |
      **Two methods for comparing <<线段/line segment>> lengths**:
      1. **Measurement method**: Measure each length with a ruler, then compare the values.
      2. **Superposition method**: Move one <<线段/line segment>> onto another, align one endpoint, and check the other endpoint's position.

      **<<中点/midpoint>> of a <<线段/line segment>>**:
      - If point $C$ is on <<线段/line segment>> $\overline{AB}$, and $AC = CB = \frac{1}{2}AB$, then point $C$ is the <<中点/midpoint>> of <<线段/line segment>> $\overline{AB}$.

      **Sum and difference of <<线段/line segment>>s**:
      - If point $C$ is on <<线段/line segment>> $\overline{AB}$, then $AC + CB = AB$, i.e., $CB = AB - AC$.
    examples:
      - '已知<<线段/line segment>> $\overline{AB} = 10$ cm，点 $C$ 是<<线段/line segment>> $\overline{AB}$ 的<<中点/midpoint>>，则 $AC = CB = 5$ cm'
      - '点 $C$ 在<<线段/line segment>> $\overline{AB}$ 上，$AC = 3$ cm，$CB = 4$ cm，则 $AB = AC + CB = 7$ cm'
    examplesEn:
      - "Given <<线段/line segment>> $\\overline{AB} = 10$ cm, point $C$ is the <<中点/midpoint>> of $\\overline{AB}$, then $AC = CB = 5$ cm"
      - "Point $C$ is on <<线段/line segment>> $\\overline{AB}$, $AC = 3$ cm, $CB = 4$ cm, then $AB = AC + CB = 7$ cm"
    hasVisualization: true

  - id: angle-concept
    title: <<角/angle>>的概念与表示
    titleEn: Concept and notation of <<角/angle>>s
    content: |
      **<<角/angle>>的定义**：
      - 定义一：从同一个<<点/point>>出发的两条<<射线/ray>>所组成的图形叫做<<角/angle>>。这个<<点/point>>叫做<<角/angle>>的**<<顶点/vertex>>**，两条<<射线/ray>>叫做<<角/angle>>的**<<边/side>>**。
      - 定义二：一条<<射线/ray>>绕着它的端点旋转而形成的图形叫做<<角/angle>>。

      **<<角/angle>>的表示方法**：
      - 用三个字母表示：$\angle AOB$（<<顶点/vertex>>字母写在中间）
      - 用一个字母表示：$\angle O$（当<<顶点/vertex>>处只有一个<<角/angle>>时）
      - 用数字编号表示：$\angle 1$、$\angle 2$

      **<<角/angle>>的度量单位**：
      - $1$ 周角 $= 360°$
      - $1$ 平角 $= 180°$
      - $1°= 60'$（$1$ 度 $= 60$ 分）
      - $1' = 60''$（$1$ 分 $= 60$ 秒）
    contentEn: |
      **Definition of an <<角/angle>>**:
      - Definition 1: A figure formed by two <<射线/ray>>s starting from the same <<点/point>> is called an <<角/angle>>. This <<点/point>> is called the **<<顶点/vertex>>** of the <<角/angle>>, and the two <<射线/ray>>s are called the **<<边/side>>s** of the <<角/angle>>.
      - Definition 2: A figure formed by a <<射线/ray>> rotating around its endpoint is called an <<角/angle>>.

      **Notation for <<角/angle>>s**:
      - Using three letters: $\angle AOB$ (the <<顶点/vertex>> letter is written in the middle)
      - Using one letter: $\angle O$ (when there is only one <<角/angle>> at the <<顶点/vertex>>)
      - Using numbers: $\angle 1$, $\angle 2$

      **Units of <<角/angle>> measurement**:
      - $1$ full rotation $= 360°$
      - $1$ straight <<角/angle>> $= 180°$
      - $1° = 60'$ ($1$ degree $= 60$ minutes)
      - $1' = 60''$ ($1$ minute $= 60$ seconds)
    hasVisualization: true

  - id: angle-comparison
    title: <<角/angle>>的比较与运算
    titleEn: Comparison and operations of <<角/angle>>s
    content: |
      **比较<<角/angle>>的大小**：
      1. **度量法**：用量角器分别量出度数，再比较。
      2. **叠合法**：把两个<<角/angle>>的<<顶点/vertex>>和一条<<边/side>>重合，看另一条<<边/side>>的位置。

      **<<角/angle>>的<<平分线/angle bisector>>**：
      - 从<<角/angle>>的<<顶点/vertex>>出发的一条<<射线/ray>>，如果把这个<<角/angle>>分成两个相等的<<角/angle>>，那么这条<<射线/ray>>叫做这个<<角/angle>>的<<平分线/angle bisector>>。
      - 如果 $\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>，则 $\angle AOC = \angle COB = \frac{1}{2}\angle AOB$。

      **<<角/angle>>的和与差**：
      - 如果<<射线/ray>> $\overrightarrow{OC}$ 在 $\angle AOB$ 的内部，则 $\angle AOC + \angle COB = \angle AOB$。
    contentEn: |
      **Comparing <<角/angle>>s**:
      1. **Measurement method**: Measure each <<角/angle>> with a protractor, then compare.
      2. **Superposition method**: Align the <<顶点/vertex>>es and one <<边/side>> of two <<角/angle>>s, then check the position of the other <<边/side>>.

      **<<平分线/angle bisector>>**:
      - A <<射线/ray>> from the <<顶点/vertex>> of an <<角/angle>> that divides it into two equal <<角/angle>>s is called the <<平分线/angle bisector>>.
      - If $\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\angle AOB$, then $\angle AOC = \angle COB = \frac{1}{2}\angle AOB$.

      **Sum and difference of <<角/angle>>s**:
      - If <<射线/ray>> $\overrightarrow{OC}$ is inside $\angle AOB$, then $\angle AOC + \angle COB = \angle AOB$.
    examples:
      - "已知 $\\angle AOB = 70°$，$\\overrightarrow{OC}$ 是 $\\angle AOB$ 的<<平分线/angle bisector>>，则 $\\angle AOC = \\angle COB = 35°$"
      - "<<射线/ray>> $\\overrightarrow{OC}$ 在 $\\angle AOB$ 内部，$\\angle AOC = 25°$，$\\angle COB = 40°$，则 $\\angle AOB = 25° + 40° = 65°$"
    examplesEn:
      - "Given $\\angle AOB = 70°$, and $\\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\\angle AOB$, then $\\angle AOC = \\angle COB = 35°$"
      - "<<射线/ray>> $\\overrightarrow{OC}$ is inside $\\angle AOB$, $\\angle AOC = 25°$, $\\angle COB = 40°$, then $\\angle AOB = 25° + 40° = 65°$"
    hasVisualization: true

  - id: complementary-supplementary
    title: <<余角/complementary angle>>与<<补角/supplementary angle>>
    titleEn: "<<余角/complementary angle>>s and <<补角/supplementary angle>>s"
    content: |
      **<<余角/complementary angle>>**：
      - 如果两个<<角/angle>>的和等于 $90°$（即一个<<直角/right angle>>），那么这两个<<角/angle>>互为**<<余角/complementary angle>>**。
      - 用式子表示：$\angle 1 + \angle 2 = 90°$，则 $\angle 1$ 和 $\angle 2$ 互余。

      **<<补角/supplementary angle>>**：
      - 如果两个<<角/angle>>的和等于 $180°$（即一个<<平角/straight angle>>），那么这两个<<角/angle>>互为**<<补角/supplementary angle>>**。
      - 用式子表示：$\angle 1 + \angle 2 = 180°$，则 $\angle 1$ 和 $\angle 2$ 互补。

      **重要性质**：
      - 同角（或等角）的<<余角/complementary angle>>相等
      - 同角（或等角）的<<补角/supplementary angle>>相等
    contentEn: |
      **<<余角/complementary angle>>s**:
      - If the sum of two <<角/angle>>s equals $90°$ (a <<直角/right angle>>), then these two <<角/angle>>s are **<<余角/complementary angle>>s** of each other.
      - In formula: $\angle 1 + \angle 2 = 90°$, then $\angle 1$ and $\angle 2$ are complementary.

      **<<补角/supplementary angle>>s**:
      - If the sum of two <<角/angle>>s equals $180°$ (a <<平角/straight angle>>), then these two <<角/angle>>s are **<<补角/supplementary angle>>s** of each other.
      - In formula: $\angle 1 + \angle 2 = 180°$, then $\angle 1$ and $\angle 2$ are supplementary.

      **Important properties**:
      - <<余角/complementary angle>>s of the same <<角/angle>> (or equal <<角/angle>>s) are equal
      - <<补角/supplementary angle>>s of the same <<角/angle>> (or equal <<角/angle>>s) are equal
    examples:
      - "如果 $\\angle 1 = 35°$，则 $\\angle 1$ 的<<余角/complementary angle>> $= 90° - 35° = 55°$，$\\angle 1$ 的<<补角/supplementary angle>> $= 180° - 35° = 145°$"
      - "已知 $\\angle A = \\angle B$，$\\angle C$ 是 $\\angle A$ 的<<余角/complementary angle>>，$\\angle D$ 是 $\\angle B$ 的<<余角/complementary angle>>，则 $\\angle C = \\angle D$"
    examplesEn:
      - "If $\\angle 1 = 35°$, then the <<余角/complementary angle>> of $\\angle 1$ $= 90° - 35° = 55°$, and the <<补角/supplementary angle>> of $\\angle 1$ $= 180° - 35° = 145°$"
      - "Given $\\angle A = \\angle B$, $\\angle C$ is the <<余角/complementary angle>> of $\\angle A$, $\\angle D$ is the <<余角/complementary angle>> of $\\angle B$, then $\\angle C = \\angle D$"

  - id: geometric-language
    title: 基本作图与几何语言
    titleEn: Basic constructions and geometric language
    content: |
      几何中常用的基本作图有：
      1. **画一条<<线段/line segment>>等于已知<<线段/line segment>>**
      2. **画一个<<角/angle>>等于已知<<角/angle>>**
      3. **画<<线段/line segment>>的<<中点/midpoint>>**
      4. **画<<角/angle>>的<<平分线/angle bisector>>**

      **几何语言表达**：
      - "因为……所以……"是几何推理的基本格式。
      - 例："因为 $\overrightarrow{OC}$ 是 $\angle AOB$ 的<<平分线/angle bisector>>，所以 $\angle AOC = \angle COB = \frac{1}{2}\angle AOB$。"
      - 学会把文字条件翻译成数学符号，把数学符号翻译成文字。
    contentEn: |
      Common basic constructions in geometry:
      1. **Draw a <<线段/line segment>> equal to a given <<线段/line segment>>**
      2. **Draw an <<角/angle>> equal to a given <<角/angle>>**
      3. **Draw the <<中点/midpoint>> of a <<线段/line segment>>**
      4. **Draw the <<平分线/angle bisector>> of an <<角/angle>>**

      **Geometric language**:
      - "Because ... therefore ..." is the basic format of geometric reasoning.
      - Example: "Because $\overrightarrow{OC}$ is the <<平分线/angle bisector>> of $\angle AOB$, therefore $\angle AOC = \angle COB = \frac{1}{2}\angle AOB$."
      - Learn to translate verbal conditions into mathematical symbols, and mathematical symbols into words.

realLife:
  - category: 建筑
    categoryEn: Architecture
    positive: "建筑物的墙面是<<平面/flat surface>>，柱子可以看作<<圆柱/cylinder>>"
    positiveEn: "The wall of a building is a <<平面/flat surface>>, and a pillar can be seen as a <<圆柱/cylinder>>"
