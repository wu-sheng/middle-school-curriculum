      questionEn: |
        Given <<线段/line segment>> $\overline{AB} = 10$ cm, point $C$ is on $\overline{AB}$ with $AC = 4$ cm, and point $M$ is the <<中点/midpoint>> of $\overline{CB}$. The length of $\overline{AM}$ is ______ cm.
