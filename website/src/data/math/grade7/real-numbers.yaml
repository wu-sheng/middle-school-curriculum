      question: |
        已知 $\sqrt{a - 1} + |b + 2| = 0$，求 $a + b$ 的值。
      questionEn: |
        Given $\sqrt{a - 1} + |b + 2| = 0$, find the value of $a + b$.
      answer: '$a + b = -1$'
      answerEn: '$a + b = -1$'
      explanation: |
        因为 $\sqrt{a - 1} \geq 0$ 且 $|b + 2| \geq 0$，而它们的和为 $0$，所以两项必须都等于 $0$：

        $$\sqrt{a - 1} = 0 \implies a - 1 = 0 \implies a = 1$$

        $$|b + 2| = 0 \implies b + 2 = 0 \implies b = -2$$

        所以 $a + b = 1 + (-2) = -1$。

        **关键思路**：两个非负数之和为 $0$，则每个数都为 $0$。
      explanationEn: |
        Since $\sqrt{a - 1} \geq 0$ and $|b + 2| \geq 0$, and their sum equals $0$, both terms must equal $0$:

        $$\sqrt{a - 1} = 0 \implies a - 1 = 0 \implies a = 1$$

        $$|b + 2| = 0 \implies b + 2 = 0 \implies b = -2$$

        Therefore $a + b = 1 + (-2) = -1$.

        **Key idea**: if the sum of two non-negative numbers is $0$, then each number must be $0$.

