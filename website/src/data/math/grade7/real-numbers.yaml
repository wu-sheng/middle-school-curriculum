      explanationEn: |
        (1) The distance between two points on the <<数轴/number line>> equals the <<绝对值/absolute value>> of the difference:
        $$AB = |(\sqrt{2} + 1) - 1| = |\sqrt{2}| = \sqrt{2}$$

        (2) Since AC $= \frac{1}{2}$ AB $= \frac{\sqrt{2}}{2}$, and C is between A and B (to the right of A),
        the number represented by point C is $1 + \frac{\sqrt{2}}{2}$.

        This problem combines the representation of <<实数/real number>>s on the <<数轴/number line>> with distance calculation.
