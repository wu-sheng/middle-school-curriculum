      questionEn: |
        Find $x$ that satisfies the following conditions:

        (1) $x^2 = \frac{25}{4}$　　(2) $x^3 = -216$
      answer: |
        (1) $x$ 是 $\frac{25}{4}$ 的<<平方根/square root>>，所以 $x = \pm\sqrt{\frac{25}{4}} = \pm\frac{5}{2}$

        (2) $x$ 是 $-216$ 的<<立方根/cube root>>，所以 $x = \sqrt[3]{-216} = -6$
      answerEn: |
        (1) $x$ is a <<平方根/square root>> of $\frac{25}{4}$, so $x = \pm\sqrt{\frac{25}{4}} = \pm\frac{5}{2}$

        (2) $x$ is the <<立方根/cube root>> of $-216$, so $x = \sqrt[3]{-216} = -6$
      explanation: |
        (1) $x^2 = \frac{25}{4}$，对两边<<开平方/extracting square root>>，得 $x = \pm\frac{5}{2}$

        (2) $x^3 = -216$，对两边<<开立方/extracting cube root>>，因为 $(-6)^3 = -216$，得 $x = -6$
      explanationEn: |
        (1) $x^2 = \frac{25}{4}$; <<开平方/extracting square root>> on both sides gives $x = \pm\frac{5}{2}$

        (2) $x^3 = -216$; <<开立方/extracting cube root>> on both sides gives $x = -6$ since $(-6)^3 = -216$

