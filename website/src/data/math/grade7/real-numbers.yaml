      inputType: open
      section: 五、综合题
      sectionEn: 'V. Comprehensive Problem'
      question: |
        将下列各数分别填入对应的集合中：

        $$\sqrt{3},\quad -5,\quad 0,\quad \frac{2}{3},\quad -\sqrt{2},\quad \pi,\quad \sqrt{16},\quad -0.5$$

