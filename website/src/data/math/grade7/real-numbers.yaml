      questionEn: |
        Place each of the following numbers into the correct set:

        $$\sqrt{3},\quad -5,\quad 0,\quad \frac{2}{3},\quad -\sqrt{2},\quad \pi,\quad \sqrt{16},\quad -0.5$$

        <<有理数/rational number>> set: $\{$______$\}$

        <<无理数/irrational number>> set: $\{$______$\}$
      answer: |
        <<有理数/rational number>>集合：$\{-5,\ 0,\ \frac{2}{3},\ \sqrt{16},\ -0.5\}$

        <<无理数/irrational number>>集合：$\{\sqrt{3},\ -\sqrt{2},\ \pi\}$
      answerEn: |
        <<有理数/rational number>> set: $\{-5,\ 0,\ \frac{2}{3},\ \sqrt{16},\ -0.5\}$

        <<无理数/irrational number>> set: $\{\sqrt{3},\ -\sqrt{2},\ \pi\}$
      explanation: |
        - $\sqrt{3}$：无限不循环<<小数/decimal>>，<<无理数/irrational number>>
        - $-5$：<<整数/integer>>，<<有理数/rational number>>
        - $0$：<<整数/integer>>，<<有理数/rational number>>
        - $\frac{2}{3}$：<<分数/fraction>>，<<有理数/rational number>>
        - $-\sqrt{2}$：无限不循环<<小数/decimal>>，<<无理数/irrational number>>
        - $\pi$：无限不循环<<小数/decimal>>，<<无理数/irrational number>>
        - $\sqrt{16} = 4$：<<整数/integer>>，<<有理数/rational number>>
        - $-0.5$：有限<<小数/decimal>>，<<有理数/rational number>>
      explanationEn: |
        - $\sqrt{3}$: infinite non-repeating <<小数/decimal>>, <<无理数/irrational number>>
        - $-5$: <<整数/integer>>, <<有理数/rational number>>
        - $0$: <<整数/integer>>, <<有理数/rational number>>
        - $\frac{2}{3}$: <<分数/fraction>>, <<有理数/rational number>>
        - $-\sqrt{2}$: infinite non-repeating <<小数/decimal>>, <<无理数/irrational number>>
        - $\pi$: infinite non-repeating <<小数/decimal>>, <<无理数/irrational number>>
        - $\sqrt{16} = 4$: <<整数/integer>>, <<有理数/rational number>>
        - $-0.5$: finite <<小数/decimal>>, <<有理数/rational number>>

summary:
  - 正数 $a$ 有两个<<平方根/square root>>：$\pm\sqrt{a}$；<<算术平方根/arithmetic square root>> $\sqrt{a} \geq 0$
  - $0$ 的<<平方根/square root>>是 $0$，负数没有<<平方根/square root>>
  - 每个实数都有唯一的<<立方根/cube root>>，负数的<<立方根/cube root>>是负数
  - <<无理数/irrational number>>是无限不循环<<小数/decimal>>，不能表示为 $\frac{p}{q}$ 的形式
  - <<有理数/rational number>>和<<无理数/irrational number>>统称为<<实数/real number>>
  - <<实数/real number>>与<<数轴/number line>>上的点一一对应
  - <<实数/real number>>也有<<相反数/opposite number>>、<<绝对值/absolute value>>、<<倒数/reciprocal>>，运算法则与<<有理数/rational number>>相同
summaryEn:
  - 'A positive number $a$ has two <<平方根/square root>>s: $\pm\sqrt{a}$; the <<算术平方根/arithmetic square root>> $\sqrt{a} \geq 0$'
  - 'The <<平方根/square root>> of $0$ is $0$; negative numbers have no <<平方根/square root>>s'
  - 'Every real number has a unique <<立方根/cube root>>; the <<立方根/cube root>> of a negative number is negative'
  - '<<无理数/irrational number>>s are infinite non-repeating <<小数/decimal>>s that cannot be expressed in the form $\frac{p}{q}$'
  - '<<有理数/rational number>>s and <<无理数/irrational number>>s are collectively called <<实数/real number>>s'
  - '<<实数/real number>>s and points on the <<数轴/number line>> are in one-to-one correspondence'
  - '<<实数/real number>>s also have <<相反数/opposite number>>s, <<绝对值/absolute value>>s, and <<倒数/reciprocal>>s, with the same rules as <<有理数/rational number>>s'

