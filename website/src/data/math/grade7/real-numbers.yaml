      sectionEn: 'IV. Computation'
      question: |
        计算下列各式的值：

        (1) $\sqrt{144}$　　(2) $\sqrt[3]{-1000}$　　(3) $\sqrt{\frac{4}{9}}$
      questionEn: |
        Calculate the value of each expression:

        (1) $\sqrt{144}$　　(2) $\sqrt[3]{-1000}$　　(3) $\sqrt{\frac{4}{9}}$
      answer: |
        (1) $\sqrt{144} = 12$（因为 $12^2 = 144$）

        (2) $\sqrt[3]{-1000} = -10$（因为 $(-10)^3 = -1000$）

        (3) $\sqrt{\frac{4}{9}} = \frac{2}{3}$（因为 $\left(\frac{2}{3}\right)^2 = \frac{4}{9}$）
      answerEn: |
        (1) $\sqrt{144} = 12$ (since $12^2 = 144$)

        (2) $\sqrt[3]{-1000} = -10$ (since $(-10)^3 = -1000$)

        (3) $\sqrt{\frac{4}{9}} = \frac{2}{3}$ (since $\left(\frac{2}{3}\right)^2 = \frac{4}{9}$)
      explanation: |
        (1) 找到平方等于 $144$ 的正数：$12^2 = 144$

        (2) 找到立方等于 $-1000$ 的数：$(-10)^3 = -1000$

        (3) 找到平方等于 $\frac{4}{9}$ 的正数：$\left(\frac{2}{3}\right)^2 = \frac{4}{9}$
      explanationEn: |
        (1) Find the positive number whose square is $144$: $12^2 = 144$

        (2) Find the number whose cube is $-1000$: $(-10)^3 = -1000$

        (3) Find the positive number whose square is $\frac{4}{9}$: $\left(\frac{2}{3}\right)^2 = \frac{4}{9}$

