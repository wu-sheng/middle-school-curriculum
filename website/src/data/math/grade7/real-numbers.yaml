        (2) 如果点 C 在 A、B 之间且 AC = $\frac{1}{2}$ AB，求点 C 表示的数。
      questionEn: |
        On the <<数轴/number line>>, point A represents $1$ and point B represents $\sqrt{2} + 1$.

        (1) Find the distance between points A and B.
        (2) If point C is between A and B with AC = $\frac{1}{2}$ AB, find the number represented by point C.
      answer: |
        (1) AB $= (\sqrt{2} + 1) - 1 = \sqrt{2}$

        (2) AC $= \frac{1}{2} \times \sqrt{2} = \frac{\sqrt{2}}{2}$

        点 C 在 A 的右侧，所以 C 表示的数为 $1 + \frac{\sqrt{2}}{2}$。
      answerEn: |
        (1) AB $= (\sqrt{2} + 1) - 1 = \sqrt{2}$

        (2) AC $= \frac{1}{2} \times \sqrt{2} = \frac{\sqrt{2}}{2}$

        Point C is to the right of A, so C represents the number $1 + \frac{\sqrt{2}}{2}$.
      explanation: |
        (1) 在<<数轴/number line>>上两点间距离等于两数之差的<<绝对值/absolute value>>：
        $$AB = |(\sqrt{2} + 1) - 1| = |\sqrt{2}| = \sqrt{2}$$

        (2) 由 AC $= \frac{1}{2}$ AB $= \frac{\sqrt{2}}{2}$，且 C 在 A、B 之间（即在 A 的右侧），
        所以点 C 表示的数为 $1 + \frac{\sqrt{2}}{2}$。

