examPrep:
  intro: 以下题目改编自各地中考真题，帮助你提前感受中考题型和难度。
  introEn: "The following questions are adapted from past high school entrance exams to help you get familiar with exam formats."
  questions:
    - number: 1
      type: 中考选择题
      inputType: choice
      section: 中考强化
      sectionEn: Exam Prep
      question: |
        下列式子中，是<<代数式/algebraic expression>>的是（　）
      questionEn: |
        Among the following expressions, the one that is an <<代数式/algebraic expression>> is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$x + 1 = 2$", "$3a - b$", "$y > 0$", "$2 + 3 = 5$"]
          correctValue: "$3a - b$"
      answer: "$3a - b$"
      answerEn: "$3a - b$"
      explanation: |
        $x + 1 = 2$ 含等号（<<方程/equation>>），$y > 0$ 含不等号，$2 + 3 = 5$ 含等号（等式），它们都不是<<代数式/algebraic expression>>。只有 $3a - b$ 是由数、字母和运算符号组成的<<代数式/algebraic expression>>。
      explanationEn: |
        $x + 1 = 2$ contains an equals sign (<<方程/equation>>), $y > 0$ contains an inequality sign, and $2 + 3 = 5$ contains an equals sign (equation). None of these are <<代数式/algebraic expression>>s. Only $3a - b$ is an <<代数式/algebraic expression>> composed of numbers, letters, and operation symbols.

    - number: 2
      type: 中考填空题
      inputType: blank
      section: 中考强化
      sectionEn: Exam Prep
      question: |
        当 $x = -1$ 时，<<代数式/algebraic expression>> $2x^2 - x + 3$ 的值是______。
      questionEn: |
        When $x = -1$, the value of the <<代数式/algebraic expression>> $2x^2 - x + 3$ is ______.
      correctValue: "6"
      answer: "$6$"
      answerEn: "$6$"
      explanation: |
        代入 $x = -1$：
        $2(-1)^2 - (-1) + 3 = 2 \times 1 + 1 + 3 = 2 + 1 + 3 = 6$
        注意：$(-1)^2 = 1$，$-(-1) = +1$。
      explanationEn: |
        Substituting $x = -1$:
        $2(-1)^2 - (-1) + 3 = 2 \times 1 + 1 + 3 = 2 + 1 + 3 = 6$
        Note: $(-1)^2 = 1$ and $-(-1) = +1$.

    - number: 3
      type: 中考选择题
      inputType: choice
      section: 中考强化
      sectionEn: Exam Prep
      question: |
        某商店以每件 $a$ 元的进价购入一批商品，加价 $20\%$ 后标价出售。则每件商品的标价是（　）
      questionEn: |
        A store purchases goods at $a$ yuan per item and marks them up by $20\%$. The marked price per item is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$0.2a$", "$20a$", "$a + 0.2$", "$1.2a$"]
          correctValue: "$1.2a$"
      answer: "$1.2a$"
      answerEn: "$1.2a$"
      explanation: |
        加价 $20\%$ 即标价 $= a + a \times 20\% = a + 0.2a = 1.2a$。
        这道中考题考查用<<代数式/algebraic expression>>表示实际问题中的数量关系。
      explanationEn: |
        A $20\%$ markup means the marked price $= a + a \times 20\% = a + 0.2a = 1.2a$.
        This exam question tests using <<代数式/algebraic expression>>s to express quantitative relationships in real-world problems.

    - number: 4
      type: 中考填空题
      inputType: blank
      section: 中考强化
      sectionEn: Exam Prep
      question: |
        一个三位数，百位上的数字是 $a$，十位上的数字是 $b$，个位上的数字是 $c$，则这个三位数可表示为______。
      questionEn: |
        A three-digit number has digit $a$ in the hundreds place, $b$ in the tens place, and $c$ in the ones place. This three-digit number can be expressed as ______.
      correctValue: "100a+10b+c"
      answer: "$100a + 10b + c$"
      answerEn: "$100a + 10b + c$"
      explanation: |
        百位上的 $a$ 表示 $a$ 个百，即 $100a$；十位上的 $b$ 表示 $b$ 个十，即 $10b$；个位上的 $c$ 表示 $c$ 个一。
        所以这个三位数是 $100a + 10b + c$。这是中考常见的数字问题。
      explanationEn: |
        Digit $a$ in the hundreds place represents $100a$; digit $b$ in the tens place represents $10b$; digit $c$ in the ones place represents $c$.
        So the three-digit number is $100a + 10b + c$. This is a common number problem in exams.

    - number: 5
      type: 中考解答题
      inputType: open
      section: 中考强化
      sectionEn: Exam Prep
      question: |
        已知 $a = 2$，$b = -3$，求<<代数式/algebraic expression>> $\frac{a^2 - b}{a + b}$ 的值。
      questionEn: |
        Given $a = 2$ and $b = -3$, find the value of the <<代数式/algebraic expression>> $\frac{a^2 - b}{a + b}$.
      answer: |
        代入 $a = 2$，$b = -3$：

        $\frac{a^2 - b}{a + b} = \frac{2^2 - (-3)}{2 + (-3)} = \frac{4 + 3}{2 - 3} = \frac{7}{-1} = -7$
      answerEn: |
        Substituting $a = 2$ and $b = -3$:

        $\frac{a^2 - b}{a + b} = \frac{2^2 - (-3)}{2 + (-3)} = \frac{4 + 3}{2 - 3} = \frac{7}{-1} = -7$
      explanation: |
        这道中考题综合考查了<<代数式/algebraic expression>>求值、<<负数/negative number>>运算和<<分数/fraction>>运算。
        关键步骤：$-(-3) = +3$，以及分母 $2 + (-3) = -1$。
        注意代入<<负数/negative number>>时要加括号，避免符号错误。
      explanationEn: |
        This exam question tests evaluating <<代数式/algebraic expression>>s, <<负数/negative number>> operations, and <<分数/fraction>> operations.
        Key steps: $-(-3) = +3$, and the denominator $2 + (-3) = -1$.
        Remember to use parentheses when substituting <<负数/negative number>>s to avoid sign errors.
