  questions:
    - number: 1
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        一支笔 $a$ 元，买 $4$ 支笔需要 ______ 元。
      questionEn: |
        A pen costs $a$ yuan. Buying $4$ pens costs ______ yuan.
      correctValue: "4a"
      answer: "$4a$"
      answerEn: "$4a$"
      explanation: |
        $4$ 支笔的总价是 $a \times 4 = 4a$ 元。注意数字写在字母前面。
      explanationEn: |
        The total price of $4$ pens is $a \times 4 = 4a$ yuan. Note that the number is written before the letter.

    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        小明今年 $x$ 岁，爸爸的年龄比小明大 $26$ 岁，爸爸今年 ______ 岁。
      questionEn: |
        Xiao Ming is $x$ years old this year. His dad is $26$ years older. His dad is ______ years old.
      correctValue: "x+26"
      answer: "$(x + 26)$"
      answerEn: "$(x + 26)$"
      explanation: |
        爸爸比小明大 $26$ 岁，所以爸爸的年龄是 $x + 26$。
      explanationEn: |
