      sectionEn: "I. Fill in the Blanks"
      question: |
        当 $x = 5$ 时，$3x + 2 = $ ______。
      questionEn: |
        When $x = 5$, $3x + 2 = $ ______.
      correctValue: "17"
      answer: "$17$"
      answerEn: "$17$"
      explanation: |
        将 $x = 5$ 代入：$3 \times 5 + 2 = 15 + 2 = 17$。
      explanationEn: |
        Substituting $x = 5$: $3 \times 5 + 2 = 15 + 2 = 17$.

    - number: 4
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        当 $a = -2$ 时，$a^2 + 4a = $ ______。
      questionEn: |
        When $a = -2$, $a^2 + 4a = $ ______.
      correctValue: "-4"
      answer: "$-4$"
      answerEn: "$-4$"
      explanation: |
        将 $a = -2$ 代入：$(-2)^2 + 4 \times (-2) = 4 - 8 = -4$。注意代入<<负数/negative number>>要加括号。
      explanationEn: |
        Substituting $a = -2$: $(-2)^2 + 4 \times (-2) = 4 - 8 = -4$. Remember to use parentheses when substituting a <<负数/negative number>>.

    - number: 5
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $2x + 1 = 7$ 是一个<<代数式/algebraic expression>>。
      questionEn: |
        $2x + 1 = 7$ is an <<代数式/algebraic expression>>.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        含有等号的式子是<<方程/equation>>，不是<<代数式/algebraic expression>>。
      explanationEn: |
        An expression containing an equals sign is an <<方程/equation>>, not an <<代数式/algebraic expression>>.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        单独一个数字 $8$ 也是<<代数式/algebraic expression>>。
      questionEn: |
        The single number $8$ by itself is also an <<代数式/algebraic expression>>.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        单独一个数或者单独一个字母都是<<代数式/algebraic expression>>。
      explanationEn: |
        A single number or a single letter is also an <<代数式/algebraic expression>>.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        "$a$ 与 $b$ 的和的平方"应写为 $a + b^2$。
      questionEn: |
        "The square of the sum of $a$ and $b$" should be written as $a + b^2$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        "$a$ 与 $b$ 的和"是 $a + b$，"和的平方"是对整个和求平方，应写为 $(a+b)^2$，而不是 $a + b^2$。
      explanationEn: |
        "The sum of $a$ and $b$" is $a + b$; "the square of the sum" means squaring the entire sum, so it should be $(a+b)^2$, not $a + b^2$.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $a \div 5$ 在<<代数式/algebraic expression>>中应写成 $\frac{a}{5}$。
      questionEn: |
        $a \div 5$ should be written as $\frac{a}{5}$ in an <<代数式/algebraic expression>>.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        <<代数式/algebraic expression>>的书写规范要求除法用<<分数/fraction>>形式表示。
      explanationEn: |
        The writing conventions for <<代数式/algebraic expression>>s require division to be expressed in <<分数/fraction>> form.

    - number: 9
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        下面哪一个是"$x$ 的 $2$ 倍与 $y$ 的差"的正确表示？
      questionEn: |
        Which of the following correctly represents "the difference of twice $x$ and $y$"?
      subInputs:
        - prompt: 选择答案
          options: ["$2(x - y)$", "$2x - y$", "$x - 2y$", "$2xy$"]
          correctValue: "$2x - y$"
      answer: "$2x - y$"
      answerEn: "$2x - y$"
      explanation: |
        "$x$ 的 $2$ 倍"是 $2x$，"与 $y$ 的差"是减去 $y$，所以结果是 $2x - y$。
      explanationEn: |
        "Twice $x$" is $2x$, and "the difference with $y$" means subtracting $y$, so the result is $2x - y$.

    - number: 10
      type: 列代数式
      inputType: open
      section: 四、列代数式
      sectionEn: "IV. Write Algebraic Expressions"
      question: |
        一块长方形菜地，长是 $a$ 米，宽比长少 $3$ 米。
        (1) 用<<代数式/algebraic expression>>表示菜地的宽。
        (2) 用<<代数式/algebraic expression>>表示菜地的面积。
        (3) 当 $a = 10$ 时，求菜地的面积。
      questionEn: |
        A rectangular vegetable garden has length $a$ meters, and its width is $3$ meters less than its length.
        (1) Express the width using an <<代数式/algebraic expression>>.
        (2) Express the area using an <<代数式/algebraic expression>>.
        (3) When $a = 10$, find the area of the garden.
      answer: |
        (1) 宽为 $(a - 3)$ 米
        (2) 面积为 $a(a - 3)$ 平方米
        (3) 当 $a = 10$ 时，面积 $= 10 \times (10 - 3) = 10 \times 7 = 70$ 平方米
      answerEn: |
        (1) The width is $(a - 3)$ meters
        (2) The area is $a(a - 3)$ square meters
        (3) When $a = 10$, the area $= 10 \times (10 - 3) = 10 \times 7 = 70$ square meters
      explanation: |
        宽比长少 $3$ 米，所以宽是 $a - 3$。面积等于长乘宽，即 $a(a-3)$。代入 $a = 10$ 计算即可。
      explanationEn: |
        The width is $3$ meters less than the length, so the width is $a - 3$. Area equals length times width, which is $a(a-3)$. Substitute $a = 10$ to calculate.

    - number: 11
      type: 生活应用题
      inputType: open
      section: 五、生活应用题
      sectionEn: "V. Real-Life Application"
      question: |
        小华存了 $m$ 元钱，他每周花 $15$ 元买文具。
        (1) 用<<代数式/algebraic expression>>表示 $n$ 周后剩余的钱。
        (2) 如果 $m = 200$，$n = 6$，还剩多少钱？
      questionEn: |
        Xiao Hua saved $m$ yuan. He spends $15$ yuan per week on stationery.
        (1) Express the money remaining after $n$ weeks using an <<代数式/algebraic expression>>.
        (2) If $m = 200$ and $n = 6$, how much money is left?
      answer: |
        (1) $n$ 周花费 $15n$ 元，剩余 $(m - 15n)$ 元
        (2) 代入 $m = 200$，$n = 6$：$200 - 15 \times 6 = 200 - 90 = 110$ 元
      answerEn: |
        (1) In $n$ weeks, $15n$ yuan is spent, leaving $(m - 15n)$ yuan
        (2) Substituting $m = 200$ and $n = 6$: $200 - 15 \times 6 = 200 - 90 = 110$ yuan
      explanation: |
        每周花 $15$ 元，$n$ 周共花 $15n$ 元，从总钱数 $m$ 中减去就是剩余的钱。
      explanationEn: |
        Spending $15$ yuan per week, $n$ weeks cost $15n$ yuan. Subtract from the total $m$ to get the remaining amount.

    - number: 12
      type: 综合题
      inputType: open
      section: 六、综合题
      sectionEn: "VI. Comprehensive Problem"
      question: |
        连续三个<<整数/integer>>中，最小的一个是 $n$。
        (1) 用<<代数式/algebraic expression>>分别表示这三个数。
        (2) 用<<代数式/algebraic expression>>表示这三个数的和。
        (3) 当 $n = 20$ 时，验证三个数的和等于中间那个数的 $3$ 倍。
      questionEn: |
        Among three consecutive <<整数/integer>>s, the smallest one is $n$.
        (1) Express each of the three numbers using <<代数式/algebraic expression>>s.
        (2) Express the sum of the three numbers using an <<代数式/algebraic expression>>.
        (3) When $n = 20$, verify that the sum of the three numbers equals $3$ times the middle number.
      answer: |
        (1) 三个数分别是 $n$、$n+1$、$n+2$
        (2) 三个数的和 $= n + (n+1) + (n+2) = 3n + 3$
        (3) 当 $n = 20$ 时：
            - 三个数为 $20$、$21$、$22$
            - 和 $= 3 \times 20 + 3 = 63$
            - 中间数的 $3$ 倍 $= 3 \times 21 = 63$
            - 两者相等，验证成立
      answerEn: |
        (1) The three numbers are $n$, $n+1$, $n+2$
        (2) Their sum $= n + (n+1) + (n+2) = 3n + 3$
        (3) When $n = 20$:
            - The three numbers are $20$, $21$, $22$
            - Sum $= 3 \times 20 + 3 = 63$
            - $3$ times the middle number $= 3 \times 21 = 63$
            - They are equal, verification complete
      explanation: |
        连续三个<<整数/integer>>相邻差为 $1$，所以是 $n$、$n+1$、$n+2$。它们的和可以化简为 $3n+3 = 3(n+1)$，恰好是中间那个数 $(n+1)$ 的 $3$ 倍。这个规律对任意<<整数/integer>> $n$ 都成立。
      explanationEn: |
        Three consecutive <<整数/integer>>s differ by $1$, so they are $n$, $n+1$, $n+2$. Their sum simplifies to $3n+3 = 3(n+1)$, which is exactly $3$ times the middle number $(n+1)$. This pattern holds for any <<整数/integer>> $n$.

