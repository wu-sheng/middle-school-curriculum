    - number: 12
      type: 综合题
      inputType: open
      section: 六、综合题
      sectionEn: "VI. Comprehensive Problem"
      question: |
        甲、乙两个仓库共存粮食 $420$ 吨。如果从甲仓库运 $30$ 吨到乙仓库，则甲、乙两个仓库的粮食一样多。求甲、乙两个仓库原来各有多少吨粮食？

        要求：列<<方程/equation>>，写出解题步骤，并<<检验/verify>>你的答案。
      questionEn: |
        Warehouses A and B together store $420$ tons of grain. If $30$ tons are moved from A to B, both warehouses have the same amount. How much grain did each warehouse originally have?

        Requirements: set up an <<方程/equation>>, show all steps, and <<检验/verify>> your answer.
      answer: |
        设甲仓库原来有 $x$ 吨粮食，则乙仓库有 $(420 - x)$ 吨。
        运 $30$ 吨后：甲有 $(x - 30)$ 吨，乙有 $(420 - x + 30)$ 吨。
        等量关系：运完后甲 = 运完后乙
        列<<方程/equation>>：$x - 30 = 420 - x + 30$
        整理：$x - 30 = 450 - x$
        <<移项/transposition>>：$x + x = 450 + 30$
        <<合并同类项/combining like terms>>：$2x = 480$
        <<系数化为1/reducing coefficient to 1>>：$x = 240$
        所以甲仓库原来有 $240$ 吨，乙仓库有 $420 - 240 = 180$ 吨。

        <<检验/verify>>：从甲运 $30$ 吨后，甲剩 $210$ 吨，乙有 $180 + 30 = 210$ 吨，甲 $=$ 乙，正确。
      answerEn: |
        Let warehouse A originally have $x$ tons, then B has $(420 - x)$ tons.
        After moving $30$ tons: A has $(x - 30)$ tons, B has $(420 - x + 30)$ tons.
        Equal relationship: A after transfer = B after transfer
        Set up the <<方程/equation>>: $x - 30 = 420 - x + 30$
        Simplify: $x - 30 = 450 - x$
        <<移项/transposition>>: $x + x = 450 + 30$
        <<合并同类项/combining like terms>>: $2x = 480$
        <<系数化为1/reducing coefficient to 1>>: $x = 240$
        So warehouse A originally had $240$ tons, warehouse B had $420 - 240 = 180$ tons.

        <<检验/verify>>: After moving $30$ tons from A, A has $210$ tons, B has $180 + 30 = 210$ tons. A $=$ B, correct.
      explanation: |
        本题关键是找到等量关系："运完后两个仓库一样多"。设好<<未知数/unknown>>后，用两种方式分别表示运完后甲和乙的粮食量，令它们相等即可。
      explanationEn: |
        The key to this problem is identifying the equal relationship: "after transfer, both warehouses have the same amount." After setting the <<未知数/unknown>>, express the grain amounts in both warehouses after the transfer in two ways, and set them equal.

summary:
  - "<<方程/equation>>是含有<<未知数/unknown>>的<<等式/equality>>，必须同时具备等号和<<未知数/unknown>>"
  - "<<等式/equality>>的两条性质是解<<方程/equation>>的理论基础"
  - "<<一元一次方程/linear equation in one variable>>只含一个<<未知数/unknown>>，且<<未知数/unknown>>的最高次数为 $1$"
  - "解<<方程/equation>>的五步法：<<去分母/clearing denominators>>、<<去括号/removing parentheses>>、<<移项/transposition>>、<<合并同类项/combining like terms>>、<<系数化为1/reducing coefficient to 1>>"
  - "<<移项/transposition>>一定要变号，这是最常出错的地方"
  - "解完<<方程/equation>>后要养成<<检验/verify>>的习惯"
  - "用<<方程/equation>>解实际问题：审题、设<<未知数/unknown>>、列<<方程/equation>>、解<<方程/equation>>、<<检验/verify>>作答"
summaryEn:
  - "An <<方程/equation>> is an <<等式/equality>> containing an <<未知数/unknown>>; it must have both an equals sign and an <<未知数/unknown>>"
  - "The two properties of <<等式/equality>> form the theoretical basis for solving <<方程/equation>>s"
  - "A <<一元一次方程/linear equation in one variable>> has only one <<未知数/unknown>> with highest power $1$"
  - "Five-step method for solving: <<去分母/clearing denominators>>, <<去括号/removing parentheses>>, <<移项/transposition>>, <<合并同类项/combining like terms>>, <<系数化为1/reducing coefficient to 1>>"
  - "Always change the sign when <<移项/transposition>> — this is the most common mistake"
  - "Develop the habit of <<检验/verify>>ing after solving an <<方程/equation>>"
  - "Solving real-life problems with <<方程/equation>>s: read, set <<未知数/unknown>>, set up <<方程/equation>>, solve <<方程/equation>>, <<检验/verify>> and answer"

examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        <<方程/equation>> $2x + 3 = 5$ 的<<解/solution>>是（　）
      questionEn: |
        The <<解/solution>> of the <<方程/equation>> $2x + 3 = 5$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$x = 1$", "$x = 2$", "$x = -1$", "$x = 4$"]
          correctValue: "$x = 1$"
      answer: "$x = 1$"
      answerEn: "$x = 1$"
      explanation: |
        $2x + 3 = 5$
        <<移项/transposition>>：$2x = 5 - 3 = 2$
        <<系数化为1/reducing coefficient to 1>>：$x = 1$
      explanationEn: |
        $2x + 3 = 5$
        <<移项/transposition>>: $2x = 5 - 3 = 2$
        <<系数化为1/reducing coefficient to 1>>: $x = 1$

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        若 $3a + 1 = 2a + 5$，则 $a = $ ______。
      questionEn: |
        If $3a + 1 = 2a + 5$, then $a = $ ______.
      correctValue: "4"
      answer: "$4$"
      answerEn: "$4$"
      explanation: |
        <<移项/transposition>>：$3a - 2a = 5 - 1$
        <<合并同类项/combining like terms>>：$a = 4$
      explanationEn: |
        <<移项/transposition>>: $3a - 2a = 5 - 1$
        <<合并同类项/combining like terms>>: $a = 4$

    - number: 3
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        解<<方程/equation>> $\frac{x - 1}{2} = \frac{x + 1}{3}$，$x$ 的值是（　）
      questionEn: |
        Solve the <<方程/equation>> $\frac{x - 1}{2} = \frac{x + 1}{3}$. The value of $x$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$x = 5$", "$x = -5$", "$x = 3$", "$x = -3$"]
          correctValue: "$x = 5$"
      answer: "$x = 5$"
      answerEn: "$x = 5$"
      explanation: |
        <<去分母/clearing denominators>>：两边同时乘以 $6$
        $3(x - 1) = 2(x + 1)$
        <<去括号/removing parentheses>>：$3x - 3 = 2x + 2$
        <<移项/transposition>>：$3x - 2x = 2 + 3$
        $x = 5$
        <<检验/verify>>：左边 $= \frac{5-1}{2} = 2$，右边 $= \frac{5+1}{3} = 2$，左边 $=$ 右边。
      explanationEn: |
        <<去分母/clearing denominators>>: multiply both sides by $6$
        $3(x - 1) = 2(x + 1)$
        <<去括号/removing parentheses>>: $3x - 3 = 2x + 2$
        <<移项/transposition>>: $3x - 2x = 2 + 3$
        $x = 5$
        <<检验/verify>>: left $= \frac{5-1}{2} = 2$, right $= \frac{5+1}{3} = 2$, left $=$ right.

    - number: 4
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        若关于 $x$ 的<<方程/equation>> $2x + a = 3$ 的<<解/solution>>是 $x = 1$，则 $a = $ ______。
      questionEn: |
        If the <<解/solution>> of the <<方程/equation>> $2x + a = 3$ (in terms of $x$) is $x = 1$, then $a = $ ______.
      correctValue: "1"
      answer: "$1$"
      answerEn: "$1$"
      explanation: |
        把 $x = 1$ 代入<<方程/equation>>：$2 \times 1 + a = 3$，$2 + a = 3$，$a = 1$。
        这道中考题考查的是"已知<<解/solution>>求参数"——反向思维！
      explanationEn: |
        Substitute $x = 1$ into the <<方程/equation>>: $2 \times 1 + a = 3$, $2 + a = 3$, $a = 1$.
        This exam question tests "finding a parameter given the <<解/solution>>" — reverse thinking!

    - number: 5
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        某商店将一件进价为 $80$ 元的商品按进价提高 $40\%$ 标价，然后打八折（即按标价的 $80\%$）出售。求这件商品的实际售价，以及商店每件商品的利润。
      questionEn: |
        A store marks up an item with a cost price of $80$ yuan by $40\%$, then sells it at a $20\%$ discount (i.e., $80\%$ of the marked price). Find the actual selling price and the profit per item.
      answer: |
        标价 $= 80 \times (1 + 40\%) = 80 \times 1.4 = 112$ 元
        实际售价 $= 112 \times 80\% = 112 \times 0.8 = 89.6$ 元
        利润 $=$ 实际售价 $-$ 进价 $= 89.6 - 80 = 9.6$ 元

        也可以用<<方程/equation>>的思路：设实际售价为 $x$ 元
        $x = 80 \times 1.4 \times 0.8$
        $x = 89.6$
        利润 $= 89.6 - 80 = 9.6$ 元
      answerEn: |
        Marked price $= 80 \times (1 + 40\%) = 80 \times 1.4 = 112$ yuan
        Actual selling price $= 112 \times 80\% = 112 \times 0.8 = 89.6$ yuan
        Profit $=$ selling price $-$ cost price $= 89.6 - 80 = 9.6$ yuan

        Alternatively, using the <<方程/equation>> approach: let the actual selling price be $x$ yuan
        $x = 80 \times 1.4 \times 0.8$
        $x = 89.6$
        Profit $= 89.6 - 80 = 9.6$ yuan
      explanation: |
        这道中考题考查商品利润问题，核心关系是：
        - 标价 $=$ 进价 $\times (1 +$ 提价百分比$)$
        - 售价 $=$ 标价 $\times$ 折扣
        - 利润 $=$ 售价 $-$ 进价
        这类题在中考中出现频率非常高，要熟练掌握"进价、标价、售价、利润"四个量之间的关系。
      explanationEn: |
        This exam question tests the profit problem. The key relationships are:
        - Marked price $=$ cost price $\times (1 +$ markup percentage$)$
        - Selling price $=$ marked price $\times$ discount
        - Profit $=$ selling price $-$ cost price
        This type of question appears very frequently in entrance exams. Master the relationships among "cost price, marked price, selling price, and profit."
