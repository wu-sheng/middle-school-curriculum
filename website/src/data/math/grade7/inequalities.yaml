examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        关于 $x$ 的<<不等式/inequality>> $(a - 1)x > a - 1$ 的<<解集/solution set>>是 $x < 1$，则 $a$ 的取值范围是（　）
      questionEn: |
        The <<解集/solution set>> of the <<不等式/inequality>> $(a - 1)x > a - 1$ (in $x$) is $x < 1$. The range of $a$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$a > 1$", "$a < 1$", "$a = 1$", '$a \\neq 1$']
          correctValue: "$a < 1$"
      answer: "$a < 1$"
      answerEn: "$a < 1$"
      explanation: |
        由$(a-1)x > a-1$ 得到 $x < 1$，说明两边除以 $(a-1)$ 时<<不等号/inequality sign>>方向改变了。
        <<不等号/inequality sign>>变向说明 $a - 1 < 0$，即 $a < 1$。
      explanationEn: |
        From $(a-1)x > a-1$ we get $x < 1$, which means dividing both sides by $(a-1)$ reversed the <<不等号/inequality sign>>.
        The sign reversal means $a - 1 < 0$, i.e., $a < 1$.

    - number: 2
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        解<<不等式组/system of inequalities>>，并求出<<解集/solution set>>中所有整数的和。
        $$\begin{cases} 3(x - 1) < 4x \\ \frac{x + 5}{2} \geq x + 2 \end{cases}$$
      questionEn: |
        Solve the <<不等式组/system of inequalities>> and find the sum of all integers in the <<解集/solution set>>.
        $$\begin{cases} 3(x - 1) < 4x \\ \frac{x + 5}{2} \geq x + 2 \end{cases}$$
      answer: |
        解第一个<<不等式/inequality>>：
        $3x - 3 < 4x$
        $-3 < 4x - 3x$
        $-3 < x$，即 $x > -3$

        解第二个<<不等式/inequality>>：
        两边乘 $2$：$x + 5 \geq 2x + 4$
        $5 - 4 \geq 2x - x$
        $1 \geq x$，即 $x \leq 1$

        <<公共解集/common solution set>>：$-3 < x \leq 1$

        <<解集/solution set>>中的整数：$-2, -1, 0, 1$
        整数之和 $= -2 + (-1) + 0 + 1 = -2$
      answerEn: |
        Solve the first <<不等式/inequality>>:
        $3x - 3 < 4x$
        $-3 < x$, i.e., $x > -3$

        Solve the second <<不等式/inequality>>:
        Multiply both sides by $2$: $x + 5 \geq 2x + 4$
        $1 \geq x$, i.e., $x \leq 1$

        <<公共解集/common solution set>>: $-3 < x \leq 1$

        Integers in the <<解集/solution set>>: $-2, -1, 0, 1$
        Sum of integers $= -2 + (-1) + 0 + 1 = -2$
      explanation: |
        本题综合考查<<不等式组/system of inequalities>>的解法和在<<解集/solution set>>中列举整数。注意 $x > -3$ 不包含 $-3$，$x \leq 1$ 包含 $1$。
      explanationEn: |
        This problem tests solving a <<不等式组/system of inequalities>> and enumerating integers in the <<解集/solution set>>. Note that $x > -3$ excludes $-3$, while $x \leq 1$ includes $1$.

    - number: 3
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        某商店购进一批商品，每件进价 $40$ 元。根据市场调查，售价定在 $40$ 元至 $70$ 元之间（含端点），每件利润不低于 $5$ 元且不超过进价的 $50\%$。求每件商品的售价范围。
      questionEn: |
        A store purchases goods at $40$ yuan each. Based on market research, the selling price should be between $40$ and $70$ yuan (inclusive). The profit per item must be at least $5$ yuan and no more than $50\%$ of the cost price. Find the range of selling prices.
      answer: |
        设售价为 $x$ 元，利润 $= x - 40$ 元。

        条件 1：售价范围 $40 \leq x \leq 70$
        条件 2：利润不低于 $5$ 元，即 $x - 40 \geq 5$，$x \geq 45$
        条件 3：利润不超过进价的 $50\%$，即 $x - 40 \leq 40 \times 50\% = 20$，$x \leq 60$

        综合三个条件：
        $$\begin{cases} 40 \leq x \leq 70 \\ x \geq 45 \\ x \leq 60 \end{cases}$$

        取公共部分：$45 \leq x \leq 60$

        每件商品的售价范围是 $45$ 元到 $60$ 元。
      answerEn: |
        Let the selling price be $x$ yuan. Profit $= x - 40$ yuan.

        Condition 1: price range $40 \leq x \leq 70$
        Condition 2: profit at least $5$ yuan, i.e., $x - 40 \geq 5$, so $x \geq 45$
        Condition 3: profit no more than $50\%$ of cost, i.e., $x - 40 \leq 20$, so $x \leq 60$

        Combining all three conditions:
        $$\begin{cases} 40 \leq x \leq 70 \\ x \geq 45 \\ x \leq 60 \end{cases}$$

        Taking the intersection: $45 \leq x \leq 60$

        The selling price per item ranges from $45$ to $60$ yuan.
      explanation: |
        本题需要同时满足多个不等条件，转化为一个<<不等式组/system of inequalities>>。关键是将每个文字条件准确地翻译为<<不等式/inequality>>，然后求<<公共解集/common solution set>>。
      explanationEn: |
        This problem requires satisfying multiple inequality conditions simultaneously, forming a <<不等式组/system of inequalities>>. The key is accurately translating each verbal condition into an <<不等式/inequality>>, then finding the <<公共解集/common solution set>>.

    - number: 4
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        若关于 $x$ 的<<不等式组/system of inequalities>>
        $$\begin{cases} x - a \leq 0 \\ 2x - b > 0 \end{cases}$$
        的<<解集/solution set>>为 $1 < x \leq 3$，求 $a + b$ 的值。
      questionEn: |
        If the <<解集/solution set>> of the <<不等式组/system of inequalities>>
        $$\begin{cases} x - a \leq 0 \\ 2x - b > 0 \end{cases}$$
        is $1 < x \leq 3$, find the value of $a + b$.
      answer: |
        由第一个<<不等式/inequality>>：$x \leq a$
        由第二个<<不等式/inequality>>：$2x > b$，$x > \frac{b}{2}$

        <<公共解集/common solution set>>为 $\frac{b}{2} < x \leq a$

        对比已知<<解集/solution set>> $1 < x \leq 3$：
        $\frac{b}{2} = 1$，所以 $b = 2$
        $a = 3$

        $a + b = 3 + 2 = 5$
      answerEn: |
        From the first <<不等式/inequality>>: $x \leq a$
        From the second <<不等式/inequality>>: $2x > b$, $x > \frac{b}{2}$

        <<公共解集/common solution set>> is $\frac{b}{2} < x \leq a$

        Comparing with the given <<解集/solution set>> $1 < x \leq 3$:
        $\frac{b}{2} = 1$, so $b = 2$
        $a = 3$

        $a + b = 3 + 2 = 5$
      explanation: |
        这道中考题考查逆向思维——由<<解集/solution set>>反推参数。先分别解两个<<不等式/inequality>>得到含参数的<<解集/solution set>>，再与已知<<解集/solution set>>对比，确定参数的值。
      explanationEn: |
        This exam question tests reverse thinking — deducing parameters from the <<解集/solution set>>. First solve each <<不等式/inequality>> to get <<解集/solution set>>s containing parameters, then compare with the given <<解集/solution set>> to determine the parameter values.
