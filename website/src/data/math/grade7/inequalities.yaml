    - number: 11
      type: 生活应用题
      inputType: open
      section: 六、生活应用题
      sectionEn: "VI. Real-Life Application"
      question: |
        某工厂生产一种零件，每件成本 $8$ 元，售价 $12$ 元。工厂每月固定费用为 $6000$ 元。问每月至少生产并售出多少件零件才能不亏损？
      questionEn: |
        A factory produces parts at a cost of $8$ yuan each and sells them for $12$ yuan each. The monthly fixed cost is $6000$ yuan. How many parts must be produced and sold per month at minimum to avoid a loss?
      answer: |
        设每月生产并售出 $x$ 件。
        利润 $=$ 总收入 $-$ 总成本 $= 12x - (8x + 6000)$
        不亏损意味着利润 $\geq 0$：
        $12x - 8x - 6000 \geq 0$
        $4x \geq 6000$
        $x \geq 1500$
        每月至少生产并售出 $1500$ 件。
      answerEn: |
        Let $x$ be the number of parts produced and sold per month.
        Profit $=$ total revenue $-$ total cost $= 12x - (8x + 6000)$
        No loss means profit $\geq 0$:
        $12x - 8x - 6000 \geq 0$
        $4x \geq 6000$
        $x \geq 1500$
        At least $1500$ parts must be produced and sold per month.
      explanation: |
        关键是建立不等关系：利润 $\geq 0$，即收入 $\geq$ 成本。注意总成本包括固定费用和可变成本两部分。
      explanationEn: |
        The key is establishing the inequality: profit $\geq 0$, i.e., revenue $\geq$ cost. Note that total cost includes both fixed and variable components.

    - number: 12
      type: 综合题
      inputType: open
      section: 七、综合题
      sectionEn: "VII. Comprehensive Problem"
      question: |
        小华去商店买练习本，若每本 $3$ 元则剩余 $4$ 元，若每本 $5$ 元则差 $8$ 元。问小华带了多少钱？要买多少本练习本？
        要求：列<<不等式组/system of inequalities>>，写出解题步骤。
      questionEn: |
        Xiao Hua goes to a store to buy exercise books. If each costs $3$ yuan, he has $4$ yuan left over. If each costs $5$ yuan, he is $8$ yuan short. How much money does Xiao Hua have? How many exercise books does he want to buy?
        Requirements: set up a <<不等式组/system of inequalities>> and show all steps.
      answer: |
        设小华要买 $x$ 本练习本。

        每本 $3$ 元剩 $4$ 元，说明他带的钱为 $3x + 4$ 元。
        每本 $5$ 元差 $8$ 元，说明 $3x + 4 < 5x$（钱不够）且 $5x - (3x + 4) \leq 8$（差的不超过 $8$ 元，即刚好差 $8$ 元或更少）。

        更直接地：带了 $3x + 4$ 元。
        每本 $5$ 元需要 $5x$ 元，差 $8$ 元说明 $5x - (3x + 4) = 8$（实际上这是方程）。

        用不等式组的思路：
        $$\begin{cases} 3x + 4 \geq 0 \text{（带的钱为正）} \\ 5x > 3x + 4 \text{（每本 $5$ 元时钱不够）} \\ 5x \leq 3x + 4 + 8 \text{（差的金额不超过 $8$ 元）} \end{cases}$$

        由第二个：$2x > 4$，$x > 2$
        由第三个：$5x \leq 3x + 12$，$2x \leq 12$，$x \leq 6$

        若题意"差 $8$ 元"表示恰好差 $8$ 元：
        $5x - (3x + 4) = 8$，$2x = 12$，$x = 6$
        带的钱 $= 3 \times 6 + 4 = 22$ 元。

        验证：买 $6$ 本，每本 $3$ 元花 $18$ 元，剩 $4$ 元 ✓；每本 $5$ 元需 $30$ 元，差 $8$ 元 ✓。

        小华带了 $22$ 元，要买 $6$ 本练习本。
      answerEn: |
        Let $x$ be the number of exercise books.

        At $3$ yuan each with $4$ yuan left over, Xiao Hua has $3x + 4$ yuan.
        At $5$ yuan each, he is short $8$ yuan, meaning $5x - (3x + 4) = 8$.
        $2x = 12$, $x = 6$
        Money $= 3 \times 6 + 4 = 22$ yuan.

        Verify: buying $6$ at $3$ yuan costs $18$, leaving $4$ yuan; buying $6$ at $5$ yuan costs $30$, short by $8$ yuan. Both conditions are satisfied.

        Xiao Hua has $22$ yuan and wants to buy $6$ exercise books.
      explanation: |
        本题可以同时用<<方程/equation>>和<<不等式/inequality>>思路解决。关键是用两种购买方案分别表示小华带的钱，建立数量关系。
      explanationEn: |
        This problem can be solved using both <<方程/equation>> and <<不等式/inequality>> approaches. The key is expressing Xiao Hua's money in terms of both purchasing scenarios to establish the quantitative relationship.

summary:
