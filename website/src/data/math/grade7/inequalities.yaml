  - "<<不等式/inequality>>的三条基本性质中，性质 3 最关键——**乘除负数要变号**"
  - "解<<一元一次不等式/linear inequality in one variable>>的步骤与解<<方程/equation>>相同，唯一区别是除以负<<系数/coefficient>>时<<不等号/inequality sign>>要变向"
  - "解<<不等式组/system of inequalities>>的关键是求<<公共解集/common solution set>>：同大取大、同小取小、大小小大取中间、大大小小取不了"
  - '在<<数轴/number line>>上，空心圆圈表示不包含端点（$<$、$>$），实心圆点表示包含端点（$\\leq$、$\\geq$）'
  - "解实际问题时，注意关键词对应的<<不等号/inequality sign>>，以及根据实际情况取合理值（如取整）"
summaryEn:
  - 'An <<不等式/inequality>> is an expression connected by <<不等号/inequality sign>>s ($<$, $>$, $\\leq$, $\\geq$)'
  - "The <<解集/solution set>> of an <<不等式/inequality>> typically has infinitely many values and can be represented on a <<数轴/number line>>"
  - "Among the three basic properties, Property 3 is most crucial — **reverse the sign when multiplying or dividing by a negative number**"
  - "The steps for solving a <<一元一次不等式/linear inequality in one variable>> are the same as for <<方程/equation>>s; the only difference is reversing the <<不等号/inequality sign>> when dividing by a negative <<系数/coefficient>>"
