    - 什么是<<垂直/perpendicular>>？<<垂线段/perpendicular segment>>有什么特殊性质？
    - 怎样判断两条直线<<平行/parallel>>？<<平行线/parallel lines>>有什么性质？
    - 什么是<<命题/proposition>>？怎样进行几何<<证明/proof>>？
  cannotSolveEn:
    - "What special relationships exist among the <<角/angle>>s formed when two lines intersect?"
    - "What is <<垂直/perpendicular>>? What special properties does a <<垂线段/perpendicular segment>> have?"
    - "How to determine if two lines are <<平行/parallel>>? What properties do <<平行线/parallel lines>> have?"
    - "What is a <<命题/proposition>>? How to write a geometric <<证明/proof>>?"
  conclusion: |
    本章将从两条直线相交出发，研究<<对顶角/vertical angle>>、<<邻补角/supplementary adjacent angle>>、<<垂线/perpendicular line>>，再到<<平行线/parallel lines>>的判定与性质，建立系统的几何推理能力。
  conclusionEn: |
    This chapter starts from two intersecting lines, studies <<对顶角/vertical angle>>s, <<邻补角/supplementary adjacent angle>>s, and <<垂线/perpendicular line>>s, then moves to the criteria and properties of <<平行线/parallel lines>>, building systematic geometric reasoning skills.

concepts:
  - id: vertical-and-adjacent-angles
    title: <<对顶角/vertical angle>>与<<邻补角/supplementary adjacent angle>>
    titleEn: "<<对顶角/vertical angle>>s and <<邻补角/supplementary adjacent angle>>s"
    content: |
      两条<<直线/straight line>>相交，形成 $4$ 个<<角/angle>>。

      **<<邻补角/supplementary adjacent angle>>**：
      - 两个<<角/angle>>共用一条<<边/side>>，另一条<<边/side>>互为反向延长线，则这两个<<角/angle>>互为<<邻补角/supplementary adjacent angle>>。
      - <<邻补角/supplementary adjacent angle>>互补，即 $\angle 1 + \angle 2 = 180°$。

      **<<对顶角/vertical angle>>**：
      - 两个<<角/angle>>的两条<<边/side>>互为反向延长线，则这两个<<角/angle>>互为<<对顶角/vertical angle>>。
      - **<<对顶角/vertical angle>>相等**：$\angle 1 = \angle 3$，$\angle 2 = \angle 4$。

      推导过程：因为 $\angle 1 + \angle 2 = 180°$，$\angle 2 + \angle 3 = 180°$，所以 $\angle 1 = \angle 3$。
    contentEn: |
      Two <<直线/straight line>>s intersect to form $4$ <<角/angle>>s.

      **<<邻补角/supplementary adjacent angle>>s**:
      - Two <<角/angle>>s share one <<边/side>>, and their other <<边/side>>s are opposite extensions of each other; such <<角/angle>>s are <<邻补角/supplementary adjacent angle>>s.
      - <<邻补角/supplementary adjacent angle>>s are supplementary: $\angle 1 + \angle 2 = 180°$.

      **<<对顶角/vertical angle>>s**:
      - Two <<角/angle>>s whose <<边/side>>s are opposite extensions of each other are <<对顶角/vertical angle>>s.
      - **<<对顶角/vertical angle>>s are equal**: $\angle 1 = \angle 3$, $\angle 2 = \angle 4$.

      Derivation: Since $\angle 1 + \angle 2 = 180°$ and $\angle 2 + \angle 3 = 180°$, we get $\angle 1 = \angle 3$.
    examples:
      - 两条直线相交形成 $4$ 个<<角/angle>>，其中 $\angle 1 = 50°$，则 $\angle 2 = 130°$（<<邻补角/supplementary adjacent angle>>），$\angle 3 = 50°$（<<对顶角/vertical angle>>）
      - 剪刀张开时，两个刀刃对侧的<<角/angle>>是<<对顶角/vertical angle>>，它们相等
    examplesEn:
      - "Two lines intersect forming $4$ <<角/angle>>s; if $\\angle 1 = 50°$, then $\\angle 2 = 130°$ (<<邻补角/supplementary adjacent angle>>), $\\angle 3 = 50°$ (<<对顶角/vertical angle>>)"
      - "When scissors open, the <<角/angle>>s on opposite sides of the blades are <<对顶角/vertical angle>>s and are equal"
    hasVisualization: true

  - id: perpendicular-lines
    title: <<垂线/perpendicular line>>
    titleEn: <<垂线/perpendicular line>>s
    content: |
      **<<垂直/perpendicular>>的定义**：
      - 当两条<<直线/straight line>>相交所成的<<角/angle>>中有一个是<<直角/right angle>>时，就说这两条<<直线/straight line>>互相**<<垂直/perpendicular>>**。
      - 记作 $a \perp b$，读作「$a$ 垂直于 $b$」。交点叫做**<<垂足/foot of perpendicular>>**。

      **<<垂线/perpendicular line>>的性质**：
      1. 过一点有且只有一条<<直线/straight line>>与已知<<直线/straight line>><<垂直/perpendicular>>。
      2. 连接<<直线/straight line>>外一点与<<直线/straight line>>上各点的所有<<线段/line segment>>中，**<<垂线段/perpendicular segment>>最短**。

      **<<点到直线的距离/distance from a point to a line>>**：
      - 从<<直线/straight line>>外一点向<<直线/straight line>>作<<垂线段/perpendicular segment>>，<<垂线段/perpendicular segment>>的长度叫做<<点到直线的距离/distance from a point to a line>>。
    contentEn: |
      **Definition of <<垂直/perpendicular>>**:
      - When one of the <<角/angle>>s formed by two intersecting <<直线/straight line>>s is a <<直角/right angle>>, the two <<直线/straight line>>s are said to be **<<垂直/perpendicular>>**.
      - Written as $a \perp b$, read as "$a$ is perpendicular to $b$." The intersection point is called the **<<垂足/foot of perpendicular>>**.

      **Properties of <<垂线/perpendicular line>>s**:
      1. Through a point, there is one and only one <<直线/straight line>> <<垂直/perpendicular>> to a given <<直线/straight line>>.
      2. Among all <<线段/line segment>>s connecting a point outside a <<直线/straight line>> to points on that <<直线/straight line>>, the **<<垂线段/perpendicular segment>> is the shortest**.

      **<<点到直线的距离/distance from a point to a line>>**:
      - The length of the <<垂线段/perpendicular segment>> from a point outside a <<直线/straight line>> to the <<直线/straight line>> is called the <<点到直线的距离/distance from a point to a line>>.
    examples:
      - '如果 $a \perp b$，垂足为 $O$，则 $\angle AOB = 90°$'
      - 从路边的房子到马路最近的距离就是<<垂线段/perpendicular segment>>的长度，即<<点到直线的距离/distance from a point to a line>>
    examplesEn:
      - 'If $a \perp b$ with <<垂足/foot of perpendicular>> $O$, then $\angle AOB = 90°$'
      - "The shortest distance from a house beside a road to the road is the length of the <<垂线段/perpendicular segment>>, i.e., the <<点到直线的距离/distance from a point to a line>>"
    hasVisualization: true

  - id: angles-formed-by-transversal
    title: <<同位角/corresponding angle>>、<<内错角/alternate interior angle>>、<<同旁内角/co-interior angle>>
    titleEn: "<<同位角/corresponding angle>>s, <<内错角/alternate interior angle>>s, and <<同旁内角/co-interior angle>>s"
    content: |
      一条<<直线/straight line>>（称为<<截线/transversal>>）与两条<<直线/straight line>>相交，形成 $8$ 个<<角/angle>>。其中有三种特殊的<<角/angle>>对：

      **<<同位角/corresponding angle>>**：在<<截线/transversal>>的同侧，且分别在两条被截<<直线/straight line>>的同方向（都在上方或都在下方）。形如字母「F」。

      **<<内错角/alternate interior angle>>**：在<<截线/transversal>>的两侧，且都在两条被截<<直线/straight line>>之间（内部）。形如字母「Z」或「N」。

      **<<同旁内角/co-interior angle>>**：在<<截线/transversal>>的同侧，且都在两条被截<<直线/straight line>>之间（内部）。形如字母「U」。

      识别技巧：
      - <<同位角/corresponding angle>>：找「F」形
      - <<内错角/alternate interior angle>>：找「Z」形
      - <<同旁内角/co-interior angle>>：找「U」形
    contentEn: |
      When a <<直线/straight line>> (called a <<截线/transversal>>) intersects two other <<直线/straight line>>s, $8$ <<角/angle>>s are formed. Among them, there are three special types of <<角/angle>> pairs:

      **<<同位角/corresponding angle>>s**: On the same side of the <<截线/transversal>>, and on the same side (both above or both below) of their respective <<直线/straight line>>s. Shaped like the letter "F."

      **<<内错角/alternate interior angle>>s**: On opposite sides of the <<截线/transversal>>, and both between the two <<直线/straight line>>s (interior). Shaped like the letter "Z" or "N."

      **<<同旁内角/co-interior angle>>s**: On the same side of the <<截线/transversal>>, and both between the two <<直线/straight line>>s (interior). Shaped like the letter "U."

      Recognition tips:
      - <<同位角/corresponding angle>>s: look for the "F" shape
      - <<内错角/alternate interior angle>>s: look for the "Z" shape
      - <<同旁内角/co-interior angle>>s: look for the "U" shape
    examples:
      - 一条<<截线/transversal>>与两条<<直线/straight line>>相交，共有 $4$ 对<<同位角/corresponding angle>>、$2$ 对<<内错角/alternate interior angle>>、$2$ 对<<同旁内角/co-interior angle>>
      - 在梯子与地面和墙壁组成的图形中，可以找到<<同位角/corresponding angle>>、<<内错角/alternate interior angle>>和<<同旁内角/co-interior angle>>
    examplesEn:
      - "A <<截线/transversal>> intersecting two <<直线/straight line>>s creates $4$ pairs of <<同位角/corresponding angle>>s, $2$ pairs of <<内错角/alternate interior angle>>s, and $2$ pairs of <<同旁内角/co-interior angle>>s"
      - "In the figure formed by a ladder with the ground and a wall, one can find <<同位角/corresponding angle>>s, <<内错角/alternate interior angle>>s, and <<同旁内角/co-interior angle>>s"
    hasVisualization: true

  - id: criteria-for-parallel-lines
    title: <<平行线/parallel lines>>的判定
    titleEn: Criteria for <<平行线/parallel lines>>
    content: |
      在同一平面内，不相交的两条<<直线/straight line>>叫做**<<平行线/parallel lines>>**，记作 $a \parallel b$，读作「$a$ 平行于 $b$」。

      **<<平行线/parallel lines>>的判定方法**（由<<角/angle>>的关系判断两条<<直线/straight line>><<平行/parallel>>）：

      1. **<<同位角/corresponding angle>>相等，两<<直线/straight line>><<平行/parallel>>**
         $$\angle 1 = \angle 5 \Rightarrow a \parallel b$$

      2. **<<内错角/alternate interior angle>>相等，两<<直线/straight line>><<平行/parallel>>**
         $$\angle 3 = \angle 5 \Rightarrow a \parallel b$$

      3. **<<同旁内角/co-interior angle>>互补，两<<直线/straight line>><<平行/parallel>>**
         $$\angle 3 + \angle 6 = 180° \Rightarrow a \parallel b$$

      **平行公理**：经过<<直线/straight line>>外一点，有且只有一条<<直线/straight line>>与已知<<直线/straight line>><<平行/parallel>>。

      **推论**：如果两条<<直线/straight line>>都与第三条<<直线/straight line>><<平行/parallel>>，那么这两条<<直线/straight line>>也互相<<平行/parallel>>。
    contentEn: |
      In the same plane, two <<直线/straight line>>s that do not intersect are called **<<平行线/parallel lines>>**, written as $a \parallel b$, read as "$a$ is parallel to $b$."

      **Criteria for <<平行线/parallel lines>>** (determining two <<直线/straight line>>s are <<平行/parallel>> from <<角/angle>> relationships):

      1. **If <<同位角/corresponding angle>>s are equal, the two <<直线/straight line>>s are <<平行/parallel>>**
         $$\angle 1 = \angle 5 \Rightarrow a \parallel b$$

      2. **If <<内错角/alternate interior angle>>s are equal, the two <<直线/straight line>>s are <<平行/parallel>>**
         $$\angle 3 = \angle 5 \Rightarrow a \parallel b$$

      3. **If <<同旁内角/co-interior angle>>s are supplementary, the two <<直线/straight line>>s are <<平行/parallel>>**
         $$\angle 3 + \angle 6 = 180° \Rightarrow a \parallel b$$

      **Parallel axiom**: Through a point outside a <<直线/straight line>>, there is one and only one <<直线/straight line>> <<平行/parallel>> to the given <<直线/straight line>>.

      **Corollary**: If two <<直线/straight line>>s are both <<平行/parallel>> to a third <<直线/straight line>>, then these two <<直线/straight line>>s are also <<平行/parallel>> to each other.
    examples:
      - '如果 $\angle 1 = \angle 2$（<<同位角/corresponding angle>>），则 $a \parallel b$'
      - '如果 $\angle 3 = \angle 4$（<<内错角/alternate interior angle>>），则 $a \parallel b$'
      - '如果 $\angle 3 + \angle 5 = 180°$（<<同旁内角/co-interior angle>>），则 $a \parallel b$'
    examplesEn:
      - 'If $\angle 1 = \angle 2$ (<<同位角/corresponding angle>>s), then $a \parallel b$'
      - 'If $\angle 3 = \angle 4$ (<<内错角/alternate interior angle>>s), then $a \parallel b$'
      - 'If $\angle 3 + \angle 5 = 180°$ (<<同旁内角/co-interior angle>>s), then $a \parallel b$'
    hasVisualization: true

  - id: properties-of-parallel-lines
    title: <<平行线/parallel lines>>的性质
    titleEn: Properties of <<平行线/parallel lines>>
    content: |
      <<平行线/parallel lines>>的性质是判定的逆过程（已知<<平行/parallel>>，推出<<角/angle>>的关系）：

      1. **两<<直线/straight line>><<平行/parallel>>，<<同位角/corresponding angle>>相等**
         $$a \parallel b \Rightarrow \angle 1 = \angle 5$$

      2. **两<<直线/straight line>><<平行/parallel>>，<<内错角/alternate interior angle>>相等**
         $$a \parallel b \Rightarrow \angle 3 = \angle 5$$

      3. **两<<直线/straight line>><<平行/parallel>>，<<同旁内角/co-interior angle>>互补**
         $$a \parallel b \Rightarrow \angle 3 + \angle 6 = 180°$$

      **判定与性质的区别**：
      - **判定**：由<<角/angle>>的关系 → 得到<<平行/parallel>>（条件是<<角/angle>>，结论是<<平行/parallel>>）
      - **性质**：由<<平行/parallel>> → 得到<<角/angle>>的关系（条件是<<平行/parallel>>，结论是<<角/angle>>）
    contentEn: |
      Properties of <<平行线/parallel lines>> are the reverse of the criteria (given <<平行/parallel>>, deduce <<角/angle>> relationships):

      1. **If two <<直线/straight line>>s are <<平行/parallel>>, <<同位角/corresponding angle>>s are equal**
         $$a \parallel b \Rightarrow \angle 1 = \angle 5$$

      2. **If two <<直线/straight line>>s are <<平行/parallel>>, <<内错角/alternate interior angle>>s are equal**
         $$a \parallel b \Rightarrow \angle 3 = \angle 5$$

      3. **If two <<直线/straight line>>s are <<平行/parallel>>, <<同旁内角/co-interior angle>>s are supplementary**
         $$a \parallel b \Rightarrow \angle 3 + \angle 6 = 180°$$

      **Difference between criteria and properties**:
      - **Criteria**: From <<角/angle>> relationships → conclude <<平行/parallel>> (condition: <<角/angle>>s; conclusion: <<平行/parallel>>)
      - **Properties**: From <<平行/parallel>> → conclude <<角/angle>> relationships (condition: <<平行/parallel>>; conclusion: <<角/angle>>s)
    examples:
      - '已知 $a \parallel b$，<<截线/transversal>> $c$ 与 $a$ 的交角 $\angle 1 = 70°$，则 $\angle 1$ 的<<同位角/corresponding angle>> $= 70°$，<<内错角/alternate interior angle>> $= 70°$，<<同旁内角/co-interior angle>> $= 110°$'
      - 铁轨的两根轨道是<<平行线/parallel lines>>，枕木是<<截线/transversal>>，因此枕木与两根轨道所成的<<同位角/corresponding angle>>相等
    examplesEn:
      - 'Given $a \parallel b$ and <<截线/transversal>> $c$ forming $\angle 1 = 70°$ with $a$, then the <<同位角/corresponding angle>> of $\angle 1$ $= 70°$, the <<内错角/alternate interior angle>> $= 70°$, and the <<同旁内角/co-interior angle>> $= 110°$'
      - "Railway tracks are <<平行线/parallel lines>> and the sleepers are <<截线/transversal>>s, so the <<同位角/corresponding angle>>s formed by a sleeper and the two tracks are equal"
    hasVisualization: true

  - id: propositions-theorems-proofs
    title: <<命题/proposition>>、<<定理/theorem>>与<<证明/proof>>
    titleEn: "<<命题/proposition>>s, <<定理/theorem>>s, and <<证明/proof>>s"
    content: |
      **<<命题/proposition>>**：判断一件事情的语句叫做<<命题/proposition>>。

      **<<命题/proposition>>的结构**：每个<<命题/proposition>>都由**<<条件/condition>>**（「如果」部分）和**<<结论/conclusion>>**（「那么」部分）组成。

      **<<真命题/true proposition>>与<<假命题/false proposition>>**：
      - <<真命题/true proposition>>：<<条件/condition>>成立时，<<结论/conclusion>>一定成立的<<命题/proposition>>。
      - <<假命题/false proposition>>：<<条件/condition>>成立时，<<结论/conclusion>>不一定成立的<<命题/proposition>>。要说明一个<<命题/proposition>>是<<假命题/false proposition>>，只需举出一个**<<反例/counterexample>>**。

      **<<定理/theorem>>**：经过推理证实的<<真命题/true proposition>>叫做<<定理/theorem>>。

      **<<证明/proof>>**：用已知条件、<<定理/theorem>>、公理等，按照逻辑推理的方法，一步步推出<<结论/conclusion>>的过程。
    contentEn: |
      **<<命题/proposition>>**: A statement that makes a judgment about something is called a <<命题/proposition>>.

      **Structure of a <<命题/proposition>>**: Every <<命题/proposition>> consists of a **<<条件/condition>>** (the "if" part) and a **<<结论/conclusion>>** (the "then" part).

      **<<真命题/true proposition>>s and <<假命题/false proposition>>s**:
      - <<真命题/true proposition>>: A <<命题/proposition>> whose <<结论/conclusion>> is always true when the <<条件/condition>> holds.
      - <<假命题/false proposition>>: A <<命题/proposition>> whose <<结论/conclusion>> is not always true when the <<条件/condition>> holds. To show a <<命题/proposition>> is false, one only needs a single **<<反例/counterexample>>**.

      **<<定理/theorem>>**: A <<真命题/true proposition>> that has been verified through reasoning is called a <<定理/theorem>>.

      **<<证明/proof>>**: The process of deriving a <<结论/conclusion>> step by step using known conditions, <<定理/theorem>>s, axioms, and logical reasoning.
    examples:
      - '<<命题/proposition>>「如果两个<<角/angle>>是<<对顶角/vertical angle>>，那么它们相等」是<<真命题/true proposition>>，也是<<定理/theorem>>'
      - '<<命题/proposition>>「如果两个<<角/angle>>互补，那么它们相等」是<<假命题/false proposition>>。<<反例/counterexample>>：$\angle 1 = 60°$，$\angle 2 = 120°$，互补但不相等'
    examplesEn:
      - 'The <<命题/proposition>> "If two <<角/angle>>s are <<对顶角/vertical angle>>s, then they are equal" is a <<真命题/true proposition>> and a <<定理/theorem>>'
      - 'The <<命题/proposition>> "If two <<角/angle>>s are supplementary, then they are equal" is a <<假命题/false proposition>>. <<反例/counterexample>>: $\angle 1 = 60°$, $\angle 2 = 120°$ are supplementary but not equal'
    hasVisualization: true

