examples:
  - type: 1
    title: <<对顶角/vertical angle>>的计算
    titleEn: Calculating <<对顶角/vertical angle>>s
    question: |
      如图，直线 $AB$ 与直线 $CD$ 相交于点 $O$，$\angle AOC = 40°$。求 $\angle BOD$、$\angle AOD$、$\angle BOC$ 的度数。
    questionEn: |
      As shown, line $AB$ and line $CD$ intersect at point $O$, and $\angle AOC = 40°$. Find the measures of $\angle BOD$, $\angle AOD$, and $\angle BOC$.
    steps:
      - '$\angle AOC$ 与 $\angle BOD$ 是<<对顶角/vertical angle>>，所以 $\angle BOD = \angle AOC = 40°$'
      - '$\angle AOC$ 与 $\angle AOD$ 是<<邻补角/supplementary adjacent angle>>，所以 $\angle AOD = 180° - \angle AOC = 180° - 40° = 140°$'
      - '$\angle BOC$ 与 $\angle AOD$ 是<<对顶角/vertical angle>>，所以 $\angle BOC = \angle AOD = 140°$'
    stepsEn:
      - '$\angle AOC$ and $\angle BOD$ are <<对顶角/vertical angle>>s, so $\angle BOD = \angle AOC = 40°$'
      - '$\angle AOC$ and $\angle AOD$ are <<邻补角/supplementary adjacent angle>>s, so $\angle AOD = 180° - \angle AOC = 180° - 40° = 140°$'
      - '$\angle BOC$ and $\angle AOD$ are <<对顶角/vertical angle>>s, so $\angle BOC = \angle AOD = 140°$'
    answer: '$\angle BOD = 40°$，$\angle AOD = 140°$，$\angle BOC = 140°$。'
    answerEn: '$\angle BOD = 40°$, $\angle AOD = 140°$, $\angle BOC = 140°$.'

  - type: 2
    title: <<垂线/perpendicular line>>与<<点到直线的距离/distance from a point to a line>>
    titleEn: <<垂线/perpendicular line>>s and <<点到直线的距离/distance from a point to a line>>
    question: |
      如图，点 $P$ 在直线 $l$ 外，$PA$、$PB$、$PC$ 分别是从 $P$ 到直线 $l$ 上的点 $A$、$B$、$C$ 的连线，其中 $PB \perp l$，垂足为 $B$。已知 $PA = 5$ cm，$PB = 3$ cm，$PC = 4$ cm。点 $P$ 到直线 $l$ 的距离是多少？
    questionEn: |
      As shown, point $P$ is outside line $l$. $PA$, $PB$, $PC$ are segments from $P$ to points $A$, $B$, $C$ on line $l$, where $PB \perp l$ with <<垂足/foot of perpendicular>> $B$. Given $PA = 5$ cm, $PB = 3$ cm, $PC = 4$ cm. What is the <<点到直线的距离/distance from a point to a line>> from $P$ to $l$?
    steps:
      - "因为 $PB \\perp l$，所以 $\\overline{PB}$ 是从 $P$ 到 $l$ 的<<垂线段/perpendicular segment>>"
      - "<<点到直线的距离/distance from a point to a line>>就是<<垂线段/perpendicular segment>>的长度"
      - "所以<<点到直线的距离/distance from a point to a line>> $= PB = 3$ cm"
      - "注意：$PA = 5$ cm 和 $PC = 4$ cm 都大于 $PB = 3$ cm，验证了<<垂线段/perpendicular segment>>最短"
    stepsEn:
      - "Since $PB \\perp l$, $\\overline{PB}$ is the <<垂线段/perpendicular segment>> from $P$ to $l$"
      - "The <<点到直线的距离/distance from a point to a line>> is the length of the <<垂线段/perpendicular segment>>"
      - "So the <<点到直线的距离/distance from a point to a line>> $= PB = 3$ cm"
      - "Note: $PA = 5$ cm and $PC = 4$ cm are both greater than $PB = 3$ cm, confirming that the <<垂线段/perpendicular segment>> is the shortest"
    answer: "点 $P$ 到直线 $l$ 的距离是 $3$ cm。"
    answerEn: "The distance from point $P$ to line $l$ is $3$ cm."

  - type: 3
    title: 识别<<同位角/corresponding angle>>、<<内错角/alternate interior angle>>、<<同旁内角/co-interior angle>>
    titleEn: "Identifying <<同位角/corresponding angle>>s, <<内错角/alternate interior angle>>s, and <<同旁内角/co-interior angle>>s"
    question: |
      如图，直线 $a$、$b$ 被直线 $c$ 所截，形成 $8$ 个角。$\angle 1$ 和 $\angle 5$ 是什么角？$\angle 3$ 和 $\angle 5$ 是什么角？$\angle 3$ 和 $\angle 6$ 是什么角？
    questionEn: |
      As shown, lines $a$ and $b$ are cut by line $c$, forming $8$ angles. What is the relationship between $\angle 1$ and $\angle 5$? Between $\angle 3$ and $\angle 5$? Between $\angle 3$ and $\angle 6$?
    steps:
      - '$\angle 1$ 和 $\angle 5$ 在<<截线/transversal>> $c$ 的同侧，分别在 $a$、$b$ 的同方向，是<<同位角/corresponding angle>>'
      - '$\angle 3$ 和 $\angle 5$ 在<<截线/transversal>> $c$ 的两侧，都在 $a$、$b$ 之间，是<<内错角/alternate interior angle>>'
      - '$\angle 3$ 和 $\angle 6$ 在<<截线/transversal>> $c$ 的同侧，都在 $a$、$b$ 之间，是<<同旁内角/co-interior angle>>'
    stepsEn:
      - '$\angle 1$ and $\angle 5$ are on the same side of <<截线/transversal>> $c$ and on the same side of lines $a$ and $b$ respectively — they are <<同位角/corresponding angle>>s'
      - '$\angle 3$ and $\angle 5$ are on opposite sides of <<截线/transversal>> $c$ and both between $a$ and $b$ — they are <<内错角/alternate interior angle>>s'
      - '$\angle 3$ and $\angle 6$ are on the same side of <<截线/transversal>> $c$ and both between $a$ and $b$ — they are <<同旁内角/co-interior angle>>s'
    answer: "$\\angle 1$ 和 $\\angle 5$ 是<<同位角/corresponding angle>>；$\\angle 3$ 和 $\\angle 5$ 是<<内错角/alternate interior angle>>；$\\angle 3$ 和 $\\angle 6$ 是<<同旁内角/co-interior angle>>。"
    answerEn: "$\\angle 1$ and $\\angle 5$ are <<同位角/corresponding angle>>s; $\\angle 3$ and $\\angle 5$ are <<内错角/alternate interior angle>>s; $\\angle 3$ and $\\angle 6$ are <<同旁内角/co-interior angle>>s."

  - type: 4
    title: 利用<<平行线/parallel lines>>的判定
    titleEn: Applying criteria for <<平行线/parallel lines>>
    question: |
      如图，直线 $a$、$b$ 被直线 $c$ 所截，$\angle 1 = 63°$，$\angle 2 = 63°$。$\angle 1$ 和 $\angle 2$ 是<<同位角/corresponding angle>>。判断 $a \parallel b$ 是否成立，并说明理由。
    questionEn: |
      As shown, lines $a$ and $b$ are cut by line $c$, $\angle 1 = 63°$, $\angle 2 = 63°$. $\angle 1$ and $\angle 2$ are <<同位角/corresponding angle>>s. Determine whether $a \parallel b$ and explain.
    steps:
      - '因为 $\angle 1 = \angle 2 = 63°$'
      - '又因为 $\angle 1$ 和 $\angle 2$ 是<<同位角/corresponding angle>>'
      - '根据「<<同位角/corresponding angle>>相等，两<<直线/straight line>><<平行/parallel>>」'
      - '所以 $a \parallel b$'
    stepsEn:
      - 'Since $\angle 1 = \angle 2 = 63°$'
      - 'And $\angle 1$ and $\angle 2$ are <<同位角/corresponding angle>>s'
      - 'By the criterion "if <<同位角/corresponding angle>>s are equal, the two <<直线/straight line>>s are <<平行/parallel>>"'
      - 'Therefore $a \parallel b$'
    answer: "$a \\parallel b$。理由：<<同位角/corresponding angle>>相等，两<<直线/straight line>><<平行/parallel>>。"
    answerEn: "$a \\parallel b$. Reason: <<同位角/corresponding angle>>s are equal, so the two <<直线/straight line>>s are <<平行/parallel>>."

  - type: 5
    title: 利用<<平行线/parallel lines>>的性质求角
    titleEn: Using properties of <<平行线/parallel lines>> to find <<角/angle>>s
    question: |
      如图，$a \parallel b$，直线 $c$ 是<<截线/transversal>>，$\angle 1 = 110°$。求 $\angle 1$ 的<<同位角/corresponding angle>>、<<内错角/alternate interior angle>>和<<同旁内角/co-interior angle>>的度数。
    questionEn: |
      As shown, $a \parallel b$ and line $c$ is a <<截线/transversal>>, $\angle 1 = 110°$. Find the measures of the <<同位角/corresponding angle>>, <<内错角/alternate interior angle>>, and <<同旁内角/co-interior angle>> of $\angle 1$.
    steps:
      - '因为 $a \parallel b$，所以<<同位角/corresponding angle>>相等：$\angle 1$ 的<<同位角/corresponding angle>> $= 110°$'
      - '因为 $a \parallel b$，所以<<内错角/alternate interior angle>>相等：$\angle 1$ 的<<内错角/alternate interior angle>> $= 110°$'
      - '因为 $a \parallel b$，所以<<同旁内角/co-interior angle>>互补：$\angle 1$ 的<<同旁内角/co-interior angle>> $= 180° - 110° = 70°$'
    stepsEn:
      - 'Since $a \parallel b$, <<同位角/corresponding angle>>s are equal: the <<同位角/corresponding angle>> of $\angle 1$ $= 110°$'
      - 'Since $a \parallel b$, <<内错角/alternate interior angle>>s are equal: the <<内错角/alternate interior angle>> of $\angle 1$ $= 110°$'
      - 'Since $a \parallel b$, <<同旁内角/co-interior angle>>s are supplementary: the <<同旁内角/co-interior angle>> of $\angle 1$ $= 180° - 110° = 70°$'
    answer: "<<同位角/corresponding angle>> $= 110°$，<<内错角/alternate interior angle>> $= 110°$，<<同旁内角/co-interior angle>> $= 70°$。"
    answerEn: "<<同位角/corresponding angle>> $= 110°$, <<内错角/alternate interior angle>> $= 110°$, <<同旁内角/co-interior angle>> $= 70°$."

  - type: 6
    title: 综合运用判定与性质
    titleEn: Combining criteria and properties of <<平行线/parallel lines>>
    question: |
      如图，$\angle 1 = \angle 2$，$\angle 3 = 72°$。求 $\angle 4$ 的度数。（已知 $\angle 1$ 和 $\angle 2$ 是直线 $a$、$b$ 被直线 $c$ 截得的<<内错角/alternate interior angle>>，$\angle 3$ 和 $\angle 4$ 是直线 $a$、$b$ 被直线 $d$ 截得的<<同旁内角/co-interior angle>>。）
    questionEn: |
      As shown, $\angle 1 = \angle 2$ and $\angle 3 = 72°$. Find $\angle 4$. ($\angle 1$ and $\angle 2$ are <<内错角/alternate interior angle>>s formed by lines $a$ and $b$ cut by line $c$; $\angle 3$ and $\angle 4$ are <<同旁内角/co-interior angle>>s formed by lines $a$ and $b$ cut by line $d$.)
    steps:
      - '因为 $\angle 1 = \angle 2$（<<内错角/alternate interior angle>>相等）'
      - '所以 $a \parallel b$（<<内错角/alternate interior angle>>相等，两<<直线/straight line>><<平行/parallel>>）'
      - '因为 $a \parallel b$，$\angle 3$ 和 $\angle 4$ 是<<同旁内角/co-interior angle>>'
      - '所以 $\angle 3 + \angle 4 = 180°$（两<<直线/straight line>><<平行/parallel>>，<<同旁内角/co-interior angle>>互补）'
      - '$\angle 4 = 180° - \angle 3 = 180° - 72° = 108°$'
    stepsEn:
      - 'Since $\angle 1 = \angle 2$ (<<内错角/alternate interior angle>>s are equal)'
      - 'Therefore $a \parallel b$ (if <<内错角/alternate interior angle>>s are equal, the two <<直线/straight line>>s are <<平行/parallel>>)'
      - 'Since $a \parallel b$, and $\angle 3$ and $\angle 4$ are <<同旁内角/co-interior angle>>s'
      - 'Therefore $\angle 3 + \angle 4 = 180°$ (if two <<直线/straight line>>s are <<平行/parallel>>, <<同旁内角/co-interior angle>>s are supplementary)'
      - '$\angle 4 = 180° - \angle 3 = 180° - 72° = 108°$'
    answer: "$\\angle 4 = 108°$"
    answerEn: "$\\angle 4 = 108°$"

  - type: 7
    title: <<命题/proposition>>的判断与<<反例/counterexample>>
    titleEn: Judging <<命题/proposition>>s and finding <<反例/counterexample>>s
    question: |
      判断以下<<命题/proposition>>是<<真命题/true proposition>>还是<<假命题/false proposition>>：
      (1) 如果两个<<角/angle>>是<<对顶角/vertical angle>>，那么它们相等。
      (2) 如果两个<<角/angle>>相等，那么它们是<<对顶角/vertical angle>>。
    questionEn: |
      Determine whether each <<命题/proposition>> is a <<真命题/true proposition>> or a <<假命题/false proposition>>:
      (1) If two <<角/angle>>s are <<对顶角/vertical angle>>s, then they are equal.
      (2) If two <<角/angle>>s are equal, then they are <<对顶角/vertical angle>>s.
    steps:
      - "（1）这是<<对顶角/vertical angle>>的性质<<定理/theorem>>，已经证明为真。所以是<<真命题/true proposition>>。"
      - "（2）两个<<角/angle>>相等，但不一定是<<对顶角/vertical angle>>。<<反例/counterexample>>：$\\triangle ABC$ 中，$\\angle A = 60°$，$\\angle B = 60°$，它们相等但不是<<对顶角/vertical angle>>。所以是<<假命题/false proposition>>。"
    stepsEn:
      - "(1) This is the property <<定理/theorem>> of <<对顶角/vertical angle>>s, already proven true. So it is a <<真命题/true proposition>>."
      - "(2) Two <<角/angle>>s can be equal without being <<对顶角/vertical angle>>s. <<反例/counterexample>>: In $\\triangle ABC$, $\\angle A = 60°$, $\\angle B = 60°$ — they are equal but not <<对顶角/vertical angle>>s. So it is a <<假命题/false proposition>>."
    answer: "（1）<<真命题/true proposition>>；（2）<<假命题/false proposition>>。"
    answerEn: "(1) <<真命题/true proposition>>; (2) <<假命题/false proposition>>."

commonMistakes:
  - '<<对顶角/vertical angle>>一定相等，但相等的<<角/angle>>不一定是<<对顶角/vertical angle>>。不能由"$\angle 1 = \angle 2$"直接断定它们是<<对顶角/vertical angle>>'
  - '<<点到直线的距离/distance from a point to a line>>是<<垂线段/perpendicular segment>>的长度，不是<<垂线/perpendicular line>>的长度。<<垂线/perpendicular line>>是<<直线/straight line>>，无限长，不能度量'
  - '混淆<<平行线/parallel lines>>的「判定」和「性质」：判定是由<<角/angle>>推<<平行/parallel>>，性质是由<<平行/parallel>>推<<角/angle>>。方向不能反'
  - '<<同位角/corresponding angle>>、<<内错角/alternate interior angle>>、<<同旁内角/co-interior angle>>必须是同一条<<截线/transversal>>截两条<<直线/straight line>>形成的，不能跨不同的<<截线/transversal>>配对'
  - '<<同旁内角/co-interior angle>>互补的前提是两<<直线/straight line>><<平行/parallel>>。如果两<<直线/straight line>>不<<平行/parallel>>，<<同旁内角/co-interior angle>>不一定互补'
  - '证明两条<<直线/straight line>><<平行/parallel>>时，要写清楚使用的是哪一条判定（<<同位角/corresponding angle>>相等 / <<内错角/alternate interior angle>>相等 / <<同旁内角/co-interior angle>>互补），不能只写"所以<<平行/parallel>>"'
commonMistakesEn:
  - '<<对顶角/vertical angle>>s are always equal, but equal <<角/angle>>s are not necessarily <<对顶角/vertical angle>>s. One cannot conclude "$\angle 1$ and $\angle 2$ are <<对顶角/vertical angle>>s" just from "$\angle 1 = \angle 2$"'
  - '<<点到直线的距离/distance from a point to a line>> is the length of the <<垂线段/perpendicular segment>>, not the length of the <<垂线/perpendicular line>>. A <<垂线/perpendicular line>> is a <<直线/straight line>> of infinite length that cannot be measured'
  - 'Confusing "criteria" and "properties" of <<平行线/parallel lines>>: criteria go from <<角/angle>>s to <<平行/parallel>>; properties go from <<平行/parallel>> to <<角/angle>>s. The direction cannot be reversed'
  - '<<同位角/corresponding angle>>s, <<内错角/alternate interior angle>>s, and <<同旁内角/co-interior angle>>s must be formed by the same <<截线/transversal>> cutting two <<直线/straight line>>s — one cannot pair <<角/angle>>s across different <<截线/transversal>>s'
  - '<<同旁内角/co-interior angle>>s are supplementary only when the two <<直线/straight line>>s are <<平行/parallel>>. If the lines are not <<平行/parallel>>, <<同旁内角/co-interior angle>>s are not necessarily supplementary'
  - 'When proving two <<直线/straight line>>s are <<平行/parallel>>, clearly state which criterion is used (<<同位角/corresponding angle>>s equal / <<内错角/alternate interior angle>>s equal / <<同旁内角/co-interior angle>>s supplementary) — do not simply write "therefore <<平行/parallel>>"'

