      question: |
        如图，$AB \parallel CD$，$\angle ABF = 60°$，$\angle DCE = 25°$，点 $F$ 在 $AB$、$CD$ 之间。求 $\angle BFC$ 的度数。
        （提示：过点 $F$ 作 $FG \parallel AB$，则 $FG \parallel CD$。）
      questionEn: |
        As shown, $AB \parallel CD$, $\angle ABF = 60°$, $\angle DCE = 25°$, and point $F$ is between lines $AB$ and $CD$. Find $\angle BFC$.
        (Hint: Draw $FG \parallel AB$ through point $F$, then $FG \parallel CD$.)
      answer: |
        过点 $F$ 作 $FG \parallel AB$。
        因为 $AB \parallel CD$，$FG \parallel AB$，所以 $FG \parallel CD$（两条<<直线/straight line>>都与第三条<<直线/straight line>><<平行/parallel>>，则它们互相<<平行/parallel>>）。

        因为 $FG \parallel AB$，$\angle ABF$ 和 $\angle BFG$ 是<<内错角/alternate interior angle>>，
        所以 $\angle BFG = \angle ABF = 60°$。

        因为 $FG \parallel CD$，$\angle DCE$ 和 $\angle CFG$ 是<<内错角/alternate interior angle>>，
        所以 $\angle CFG = \angle DCE = 25°$。

        $\angle BFC = \angle BFG + \angle CFG = 60° + 25° = 85°$
      answerEn: |
        Draw $FG \parallel AB$ through point $F$.
        Since $AB \parallel CD$ and $FG \parallel AB$, we have $FG \parallel CD$ (if two <<直线/straight line>>s are both <<平行/parallel>> to a third, they are <<平行/parallel>> to each other).

        Since $FG \parallel AB$, $\angle ABF$ and $\angle BFG$ are <<内错角/alternate interior angle>>s,
        so $\angle BFG = \angle ABF = 60°$.

        Since $FG \parallel CD$, $\angle DCE$ and $\angle CFG$ are <<内错角/alternate interior angle>>s,
        so $\angle CFG = \angle DCE = 25°$.

        $\angle BFC = \angle BFG + \angle CFG = 60° + 25° = 85°$
      explanation: |
        这是中考经典的"中间过一点作平行线"题型。通过辅助线 $FG$ 将问题转化为两个<<平行线/parallel lines>>的<<内错角/alternate interior angle>>问题。
      explanationEn: |
        This is a classic exam problem of "drawing a parallel line through an intermediate point." The auxiliary line $FG$ transforms the problem into two <<内错角/alternate interior angle>> problems with <<平行线/parallel lines>>.

    - number: 4
