        (3) Through a point, there is one and only one <<直线/straight line>> <<平行/parallel>> to a given <<直线/straight line>>.
      answer: |
        (1) <<假命题/false proposition>>。<<反例/counterexample>>：$\angle 1 = 60°$，$\angle 2 = 120°$，它们互补，但如果它们不共用一条<<边/side>>（例如在不同位置），就不是<<邻补角/supplementary adjacent angle>>。<<邻补角/supplementary adjacent angle>>除了互补，还要求有公共<<顶点/vertex>>和公共<<边/side>>。

        (2) <<真命题/true proposition>>。这是平行公理的推论：如果两条<<直线/straight line>>都与第三条<<直线/straight line>><<平行/parallel>>，那么它们也互相<<平行/parallel>>。

        (3) <<假命题/false proposition>>。此<<命题/proposition>>缺少条件"该点在已知<<直线/straight line>>外"。如果该点在已知<<直线/straight line>>上，则不存在过该点与已知<<直线/straight line>><<平行/parallel>>的<<直线/straight line>>。正确说法是：过<<直线/straight line>>外一点，有且只有一条<<直线/straight line>>与已知<<直线/straight line>><<平行/parallel>>。
      answerEn: |
        (1) <<假命题/false proposition>>. <<反例/counterexample>>: $\angle 1 = 60°$, $\angle 2 = 120°$ are supplementary, but if they do not share a common <<边/side>> (e.g., they are at different locations), they are not <<邻补角/supplementary adjacent angle>>s. <<邻补角/supplementary adjacent angle>>s require a common <<顶点/vertex>> and a common <<边/side>> in addition to being supplementary.

        (2) <<真命题/true proposition>>. This is a corollary of the parallel axiom: if two <<直线/straight line>>s are both <<平行/parallel>> to a third <<直线/straight line>>, they are <<平行/parallel>> to each other.

        (3) <<假命题/false proposition>>. This <<命题/proposition>> is missing the condition "the point is outside the given <<直线/straight line>>." If the point is on the given <<直线/straight line>>, no <<直线/straight line>> through it can be <<平行/parallel>> to it. The correct statement is: through a point outside a <<直线/straight line>>, there is one and only one <<直线/straight line>> <<平行/parallel>> to the given <<直线/straight line>>.
