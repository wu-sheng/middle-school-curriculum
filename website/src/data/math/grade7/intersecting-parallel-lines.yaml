        (2) 如果 $a \parallel b$，$b \parallel c$，那么 $a \parallel c$。
        (3) 过一点有且只有一条<<直线/straight line>>与已知<<直线/straight line>><<平行/parallel>>。
      questionEn: |
        Determine whether each <<命题/proposition>> is true or false. If false, give a <<反例/counterexample>>:
