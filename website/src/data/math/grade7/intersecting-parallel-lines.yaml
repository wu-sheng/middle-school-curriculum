    - 用字母表示<<角/angle>>，并进行<<角/angle>>的加减运算
    - 识别<<直角/right angle>>、<<锐角/acute angle>>、<<钝角/obtuse angle>>
  canSolveEn:
    - "Calculate two supplementary or complementary <<角/angle>>s"
    - "Use letters to denote <<角/angle>>s and perform addition and subtraction of <<角/angle>>s"
    - "Identify <<直角/right angle>>s, <<锐角/acute angle>>s, and <<钝角/obtuse angle>>s"
