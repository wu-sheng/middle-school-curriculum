  titleEn: "Starting from what you know — what happens when two lines meet?"
  intro: |
    在上一章中，我们学习了直线、射线、线段和角的基本概念。现在我们来研究两条直线的位置关系。
  introEn: |
    In the previous chapter, we learned the basic concepts of lines, rays, segments, and angles. Now we will study the positional relationships between two lines.
  knownNumbers:
    - "<<角/angle>>的概念、表示方法和度量"
    - "<<余角/complementary angle>>和<<补角/supplementary angle>>的概念和性质"
    - "两点确定一条<<直线/straight line>>，两点之间<<线段/line segment>>最短"
  knownNumbersEn:
    - "The concept, notation, and measurement of <<角/angle>>s"
    - "The concepts and properties of <<余角/complementary angle>>s and <<补角/supplementary angle>>s"
    - "Two points determine a <<直线/straight line>>; the <<线段/line segment>> is the shortest path between two points"
  canSolve:
