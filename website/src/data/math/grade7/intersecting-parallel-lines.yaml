title: 相交线与平行线
titleEn: Intersecting and Parallel Lines
chapter: 7
subject: math
grade: grade7
semester: semester2
estimatedTime: 50-70分钟学习 + 35分钟练习
targetAudience: 小学3年级自学生，已学习几何图形初步，自学材料，由简入深

objectives:
  - 理解<<对顶角/vertical angle>>的概念，掌握<<对顶角/vertical angle>>相等的性质
  - 理解<<邻补角/supplementary adjacent angle>>的概念，掌握<<邻补角/supplementary adjacent angle>>互补的性质
  - 掌握<<垂线/perpendicular line>>的概念和性质，理解<<点到直线的距离/distance from a point to a line>>
  - 认识<<同位角/corresponding angle>>、<<内错角/alternate interior angle>>、<<同旁内角/co-interior angle>>
  - 掌握<<平行线/parallel lines>>的判定方法和性质定理
  - 理解<<命题/proposition>>、<<定理/theorem>>、<<证明/proof>>的基本概念，初步学会简单的几何推理
objectivesEn:
  - Understand the concept of <<对顶角/vertical angle>>s and master the property that <<对顶角/vertical angle>>s are equal
  - Understand the concept of <<邻补角/supplementary adjacent angle>>s and master the property that they are supplementary
  - Master the concept and properties of <<垂线/perpendicular line>>s, and understand <<点到直线的距离/distance from a point to a line>>
  - Recognize <<同位角/corresponding angle>>s, <<内错角/alternate interior angle>>s, and <<同旁内角/co-interior angle>>s
  - Master the criteria and properties of <<平行线/parallel lines>>
  - Understand the basic concepts of <<命题/proposition>>s, <<定理/theorem>>s, and <<证明/proof>>s, and learn simple geometric reasoning

