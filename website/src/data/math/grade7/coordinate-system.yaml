      question: |
        已知点 $A(a - 1, 2a + 3)$ 在<<y轴/y-axis>>上，求 $a$ 的值和点 $A$ 的<<坐标/coordinates>>。
      questionEn: |
        Given that point $A(a - 1, 2a + 3)$ is on the <<y轴/y-axis>>, find the value of $a$ and the <<坐标/coordinates>> of $A$.
      correctValue: "a = 1, A(0, 5)"
      answer: "$a = 1$，$A(0, 5)$"
      answerEn: "$a = 1$, $A(0, 5)$"
      explanation: |
        点在<<y轴/y-axis>>上，则<<横坐标/x-coordinate>>为 $0$，所以 $a - 1 = 0$，$a = 1$。
        <<纵坐标/y-coordinate>> $= 2 \times 1 + 3 = 5$，点 $A$ 的<<坐标/coordinates>>为 $(0, 5)$。
      explanationEn: |
        A point on the <<y轴/y-axis>> has <<横坐标/x-coordinate>> equal to $0$, so $a - 1 = 0$, giving $a = 1$.
        <<纵坐标/y-coordinate>> $= 2 \times 1 + 3 = 5$, so the <<坐标/coordinates>> of $A$ are $(0, 5)$.

    - number: 11
      type: 生活应用题
      inputType: open
      section: 五、生活应用题
      sectionEn: "V. Real-Life Application"
      question: |
        以小明家为<<原点/origin>>，向东为<<x轴/x-axis>>正方向，向北为<<y轴/y-axis>>正方向，每个单位长度代表 $100$ 米。学校在小明家东 $300$ 米、北 $400$ 米处，公园在小明家西 $200$ 米、南 $100$ 米处。用<<坐标/coordinates>>表示学校和公园的位置。
      questionEn: |
        Taking Xiao Ming's home as the <<原点/origin>>, east as the positive <<x轴/x-axis>> direction, and north as the positive <<y轴/y-axis>> direction, with each unit representing $100$ meters. The school is $300$ m east and $400$ m north of his home; the park is $200$ m west and $100$ m south of his home. Write the <<坐标/coordinates>> of the school and the park.
      answer: |
        学校在东 $300$ 米（<<横坐标/x-coordinate>> $= 3$），北 $400$ 米（<<纵坐标/y-coordinate>> $= 4$），所以学校的<<坐标/coordinates>>是 $(3, 4)$。
        公园在西 $200$ 米（<<横坐标/x-coordinate>> $= -2$），南 $100$ 米（<<纵坐标/y-coordinate>> $= -1$），所以公园的<<坐标/coordinates>>是 $(-2, -1)$。
      answerEn: |
        The school is $300$ m east (<<横坐标/x-coordinate>> $= 3$) and $400$ m north (<<纵坐标/y-coordinate>> $= 4$), so the school's <<坐标/coordinates>> are $(3, 4)$.
        The park is $200$ m west (<<横坐标/x-coordinate>> $= -2$) and $100$ m south (<<纵坐标/y-coordinate>> $= -1$), so the park's <<坐标/coordinates>> are $(-2, -1)$.
      explanation: |
        向东为正则向西为负，向北为正则向南为负。注意将实际距离除以单位长度 $100$ 米得到<<坐标/coordinates>>值。
      explanationEn: |
        East is positive so west is negative; north is positive so south is negative. Divide the actual distance by the unit length $100$ m to get the <<坐标/coordinates>> values.

    - number: 12
      type: 综合题
      inputType: open
      section: 六、综合题
      sectionEn: "VI. Comprehensive Problem"
      question: |
        在<<平面直角坐标系/Cartesian coordinate system>>中，正方形 $ABCD$ 的四个顶点分别为 $A(1, 1)$、$B(4, 1)$、$C(4, 4)$、$D(1, 4)$。将正方形向右<<平移/translation>> $2$ 个单位、向下<<平移/translation>> $3$ 个单位。

        (1) 求<<平移/translation>>后的四个顶点 $A'$、$B'$、$C'$、$D'$ 的<<坐标/coordinates>>。
        (2) <<平移/translation>>后正方形的边长是否改变？说明理由。
      questionEn: |
        In the <<平面直角坐标系/Cartesian coordinate system>>, square $ABCD$ has vertices $A(1, 1)$, $B(4, 1)$, $C(4, 4)$, $D(1, 4)$. The square is <<平移/translation>>d $2$ units right and $3$ units down.

        (1) Find the <<坐标/coordinates>> of the translated vertices $A'$, $B'$, $C'$, $D'$.
        (2) Does the side length of the square change after <<平移/translation>>? Explain.
      answer: |
        (1) 向右<<平移/translation>> $2$ 个单位：<<横坐标/x-coordinate>>加 $2$；向下<<平移/translation>> $3$ 个单位：<<纵坐标/y-coordinate>>减 $3$。
        $A(1, 1) \to A'(3, -2)$
        $B(4, 1) \to B'(6, -2)$
        $C(4, 4) \to C'(6, 1)$
        $D(1, 4) \to D'(3, 1)$

        (2) 边长不变。<<平移/translation>>前边长 $AB = 4 - 1 = 3$；<<平移/translation>>后边长 $A'B' = 6 - 3 = 3$。<<平移/translation>>不改变图形的形状和大小，只改变位置。
      answerEn: |
        (1) <<平移/translation>> $2$ units right: add $2$ to the <<横坐标/x-coordinate>>; <<平移/translation>> $3$ units down: subtract $3$ from the <<纵坐标/y-coordinate>>.
        $A(1, 1) \to A'(3, -2)$
        $B(4, 1) \to B'(6, -2)$
        $C(4, 4) \to C'(6, 1)$
        $D(1, 4) \to D'(3, 1)$

        (2) The side length does not change. Before <<平移/translation>>: $AB = 4 - 1 = 3$; after <<平移/translation>>: $A'B' = 6 - 3 = 3$. <<平移/translation>> does not change the shape or size of a figure, only its position.
      explanation: |
        <<平移/translation>>的核心规则：每个顶点的<<横坐标/x-coordinate>>和<<纵坐标/y-coordinate>>分别按相同的规则变化。<<平移/translation>>是一种等距变换，不改变图形的形状和大小。
      explanationEn: |
        The core rule of <<平移/translation>>: the <<横坐标/x-coordinate>> and <<纵坐标/y-coordinate>> of every vertex change by the same rule. <<平移/translation>> is an isometric transformation that preserves shape and size.

summary:
