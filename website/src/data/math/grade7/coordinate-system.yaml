examples:
  - type: 1
    title: 用<<有序数对/ordered pair>>表示位置
    titleEn: Representing positions with <<有序数对/ordered pair>>s
    question: |
      在某班的座位中，小明坐在第 $3$ 列第 $4$ 排，小红坐在第 $4$ 列第 $3$ 排。如果用<<有序数对/ordered pair>> $(列, 排)$ 表示，写出他们的位置。他们的位置相同吗？
    questionEn: |
      In a class seating chart, Xiao Ming sits in column $3$, row $4$, and Xiao Hong sits in column $4$, row $3$. If we use <<有序数对/ordered pair>> $(column, row)$ to represent positions, write their positions. Are their positions the same?
    steps:
      - '小明的位置：第 $3$ 列第 $4$ 排，用<<有序数对/ordered pair>>表示为 $(3, 4)$'
      - '小红的位置：第 $4$ 列第 $3$ 排，用<<有序数对/ordered pair>>表示为 $(4, 3)$'
      - '$(3, 4) \neq (4, 3)$，所以他们的位置不同'
    stepsEn:
      - 'Xiao Ming''s position: column $3$, row $4$, represented as <<有序数对/ordered pair>> $(3, 4)$'
      - 'Xiao Hong''s position: column $4$, row $3$, represented as <<有序数对/ordered pair>> $(4, 3)$'
      - '$(3, 4) \neq (4, 3)$, so their positions are different'
    answer: '小明的位置为 $(3, 4)$，小红的位置为 $(4, 3)$，两人位置不同。'
    answerEn: 'Xiao Ming''s position is $(3, 4)$, Xiao Hong''s position is $(4, 3)$; their positions are different.'

  - type: 2
    title: 在<<平面直角坐标系/Cartesian coordinate system>>中确定点的位置
    titleEn: Locating points in the <<平面直角坐标系/Cartesian coordinate system>>
    question: |
      在<<平面直角坐标系/Cartesian coordinate system>>中，标出下列各点，并指出它们分别在第几<<象限/quadrant>>（或哪条<<坐标轴/coordinate axes>>上）：
      $A(3, 2)$，$B(-2, 4)$，$C(-3, -1)$，$D(4, -2)$，$E(0, 3)$，$F(-2, 0)$
    questionEn: |
      In the <<平面直角坐标系/Cartesian coordinate system>>, plot the following points and state which <<象限/quadrant>> (or <<坐标轴/coordinate axes>>) each belongs to:
      $A(3, 2)$, $B(-2, 4)$, $C(-3, -1)$, $D(4, -2)$, $E(0, 3)$, $F(-2, 0)$
    steps:
      - '$A(3, 2)$：<<横坐标/x-coordinate>>为正，<<纵坐标/y-coordinate>>为正，在第一<<象限/quadrant>>'
      - '$B(-2, 4)$：<<横坐标/x-coordinate>>为负，<<纵坐标/y-coordinate>>为正，在第二<<象限/quadrant>>'
      - '$C(-3, -1)$：<<横坐标/x-coordinate>>为负，<<纵坐标/y-coordinate>>为负，在第三<<象限/quadrant>>'
      - '$D(4, -2)$：<<横坐标/x-coordinate>>为正，<<纵坐标/y-coordinate>>为负，在第四<<象限/quadrant>>'
      - '$E(0, 3)$：<<横坐标/x-coordinate>>为 $0$，在<<y轴/y-axis>>上'
      - '$F(-2, 0)$：<<纵坐标/y-coordinate>>为 $0$，在<<x轴/x-axis>>上'
    stepsEn:
      - '$A(3, 2)$: <<横坐标/x-coordinate>> positive, <<纵坐标/y-coordinate>> positive — first <<象限/quadrant>>'
      - '$B(-2, 4)$: <<横坐标/x-coordinate>> negative, <<纵坐标/y-coordinate>> positive — second <<象限/quadrant>>'
      - '$C(-3, -1)$: <<横坐标/x-coordinate>> negative, <<纵坐标/y-coordinate>> negative — third <<象限/quadrant>>'
      - '$D(4, -2)$: <<横坐标/x-coordinate>> positive, <<纵坐标/y-coordinate>> negative — fourth <<象限/quadrant>>'
      - '$E(0, 3)$: <<横坐标/x-coordinate>> is $0$ — on the <<y轴/y-axis>>'
      - '$F(-2, 0)$: <<纵坐标/y-coordinate>> is $0$ — on the <<x轴/x-axis>>'
    answer: '$A$ 在第一<<象限/quadrant>>，$B$ 在第二<<象限/quadrant>>，$C$ 在第三<<象限/quadrant>>，$D$ 在第四<<象限/quadrant>>，$E$ 在<<y轴/y-axis>>上，$F$ 在<<x轴/x-axis>>上。'
    answerEn: '$A$ is in the first <<象限/quadrant>>, $B$ in the second, $C$ in the third, $D$ in the fourth, $E$ on the <<y轴/y-axis>>, $F$ on the <<x轴/x-axis>>.'

  - type: 3
    title: 各<<象限/quadrant>>内点的<<坐标/coordinates>>符号特征
    titleEn: Sign patterns of <<坐标/coordinates>> in each <<象限/quadrant>>
    question: |
      点 $P(a, b)$ 在第二<<象限/quadrant>>，则 $a$ 和 $b$ 分别满足什么条件？
    questionEn: |
      Point $P(a, b)$ is in the second <<象限/quadrant>>. What conditions must $a$ and $b$ satisfy?
    steps:
      - '第二<<象限/quadrant>>在<<x轴/x-axis>>左边、<<y轴/y-axis>>上方'
      - '<<横坐标/x-coordinate>> $a < 0$（在<<x轴/x-axis>>左边）'
      - '<<纵坐标/y-coordinate>> $b > 0$（在<<y轴/y-axis>>上方）'
    stepsEn:
      - 'The second <<象限/quadrant>> is to the left of the <<x轴/x-axis>> and above the <<y轴/y-axis>>'
      - '<<横坐标/x-coordinate>> $a < 0$ (left of the <<y轴/y-axis>>)'
      - '<<纵坐标/y-coordinate>> $b > 0$ (above the <<x轴/x-axis>>)'
    answer: '$a < 0$ 且 $b > 0$。'
    answerEn: '$a < 0$ and $b > 0$.'

  - type: 4
    title: <<坐标轴/coordinate axes>>上点的特征
    titleEn: Characteristics of points on the <<坐标轴/coordinate axes>>
    question: |
      已知点 $M(m + 3, 2m - 4)$ 在<<x轴/x-axis>>上，求 $m$ 的值和点 $M$ 的<<坐标/coordinates>>。
    questionEn: |
      Given that point $M(m + 3, 2m - 4)$ is on the <<x轴/x-axis>>, find the value of $m$ and the <<坐标/coordinates>> of $M$.
    steps:
      - '点在<<x轴/x-axis>>上，则其<<纵坐标/y-coordinate>>为 $0$'
      - '所以 $2m - 4 = 0$'
      - '解方程：$2m = 4$，$m = 2$'
      - '<<横坐标/x-coordinate>> $= m + 3 = 2 + 3 = 5$'
      - '点 $M$ 的<<坐标/coordinates>>为 $(5, 0)$'
    stepsEn:
      - 'A point on the <<x轴/x-axis>> has <<纵坐标/y-coordinate>> equal to $0$'
      - 'So $2m - 4 = 0$'
      - 'Solve: $2m = 4$, $m = 2$'
      - '<<横坐标/x-coordinate>> $= m + 3 = 2 + 3 = 5$'
      - 'The <<坐标/coordinates>> of $M$ are $(5, 0)$'
    answer: '$m = 2$，$M(5, 0)$。'
    answerEn: '$m = 2$, $M(5, 0)$.'

  - type: 5
    title: 用<<坐标/coordinates>>表示<<平移/translation>>
    titleEn: Representing <<平移/translation>> using <<坐标/coordinates>>
    question: |
      将点 $A(2, -3)$ 先向右<<平移/translation>> $3$ 个单位，再向上<<平移/translation>> $5$ 个单位，得到点 $A'$。求 $A'$ 的<<坐标/coordinates>>。
    questionEn: |
      Point $A(2, -3)$ is first <<平移/translation>>d $3$ units to the right, then $5$ units up, to get point $A'$. Find the <<坐标/coordinates>> of $A'$.
    steps:
      - '原来的点 $A(2, -3)$'
      - '向右<<平移/translation>> $3$ 个单位：<<横坐标/x-coordinate>>加 $3$，得 $(2 + 3, -3) = (5, -3)$'
      - '向上<<平移/translation>> $5$ 个单位：<<纵坐标/y-coordinate>>加 $5$，得 $(5, -3 + 5) = (5, 2)$'
    stepsEn:
      - 'Original point $A(2, -3)$'
      - '<<平移/translation>> $3$ units right: <<横坐标/x-coordinate>> increases by $3$, giving $(2 + 3, -3) = (5, -3)$'
      - '<<平移/translation>> $5$ units up: <<纵坐标/y-coordinate>> increases by $5$, giving $(5, -3 + 5) = (5, 2)$'
    answer: '$A''(5, 2)$。'
    answerEn: '$A''(5, 2)$.'

  - type: 6
    title: 用<<坐标/coordinates>>描述图形的<<平移/translation>>
    titleEn: Describing the <<平移/translation>> of a figure using <<坐标/coordinates>>
    question: |
      三角形 $ABC$ 的三个顶点分别为 $A(1, 2)$、$B(4, 2)$、$C(3, 5)$。将三角形 $ABC$ 向左<<平移/translation>> $4$ 个单位、向下<<平移/translation>> $3$ 个单位，求<<平移/translation>>后三个顶点 $A'$、$B'$、$C'$ 的<<坐标/coordinates>>。
    questionEn: |
      Triangle $ABC$ has vertices $A(1, 2)$, $B(4, 2)$, $C(3, 5)$. Translate triangle $ABC$ $4$ units to the left and $3$ units down. Find the <<坐标/coordinates>> of the translated vertices $A'$, $B'$, $C'$.
    steps:
      - '向左<<平移/translation>> $4$ 个单位：每个点的<<横坐标/x-coordinate>>减 $4$'
      - '向下<<平移/translation>> $3$ 个单位：每个点的<<纵坐标/y-coordinate>>减 $3$'
      - '$A(1, 2) \to A''(1-4, 2-3) = A''(-3, -1)$'
      - '$B(4, 2) \to B''(4-4, 2-3) = B''(0, -1)$'
      - '$C(3, 5) \to C''(3-4, 5-3) = C''(-1, 2)$'
    stepsEn:
      - '<<平移/translation>> $4$ units left: subtract $4$ from each <<横坐标/x-coordinate>>'
      - '<<平移/translation>> $3$ units down: subtract $3$ from each <<纵坐标/y-coordinate>>'
      - '$A(1, 2) \to A''(1-4, 2-3) = A''(-3, -1)$'
      - '$B(4, 2) \to B''(4-4, 2-3) = B''(0, -1)$'
      - '$C(3, 5) \to C''(3-4, 5-3) = C''(-1, 2)$'
    answer: '$A''(-3, -1)$，$B''(0, -1)$，$C''(-1, 2)$。'
    answerEn: '$A''(-3, -1)$, $B''(0, -1)$, $C''(-1, 2)$.'

commonMistakes:
  - '<<有序数对/ordered pair>>中两个数的顺序写反：例如把"第 $3$ 列第 $5$ 排"写成 $(5, 3)$ 而不是 $(3, 5)$，应先弄清约定的顺序'
  - '<<象限/quadrant>>的编号顺序搞错：四个<<象限/quadrant>>按逆时针方向编号（从右上角开始），不是顺时针'
  - '把<<坐标轴/coordinate axes>>上的点说成在某个<<象限/quadrant>>内：<<坐标轴/coordinate axes>>上的点不属于任何<<象限/quadrant>>'
  - '<<平移/translation>>时搞混加减方向：向右或向上是加，向左或向下是减；记住"右加左减，上加下减"'
  - '混淆<<横坐标/x-coordinate>>和<<纵坐标/y-coordinate>>：写点的<<坐标/coordinates>>时必须先写 $x$（<<横坐标/x-coordinate>>），再写 $y$（<<纵坐标/y-coordinate>>）'
  - '<<平移/translation>>图形时只移动了部分顶点：<<平移/translation>>时图形的每个点都要按相同的规则变化'
commonMistakesEn:
  - 'Swapping the order of the two numbers in an <<有序数对/ordered pair>>: e.g., writing "column $3$, row $5$" as $(5, 3)$ instead of $(3, 5)$ — always clarify the agreed order first'
  - 'Getting the numbering order of <<象限/quadrant>>s wrong: the four <<象限/quadrant>>s are numbered counterclockwise starting from the upper right, not clockwise'
  - 'Saying a point on a <<坐标轴/coordinate axes>> is in a <<象限/quadrant>>: points on the <<坐标轴/coordinate axes>> do not belong to any <<象限/quadrant>>'
  - 'Confusing the add/subtract direction during <<平移/translation>>: right or up means add, left or down means subtract; remember "right add, left subtract; up add, down subtract"'
  - 'Confusing <<横坐标/x-coordinate>> and <<纵坐标/y-coordinate>>: when writing <<坐标/coordinates>>, always write $x$ (<<横坐标/x-coordinate>>) first, then $y$ (<<纵坐标/y-coordinate>>)'
  - 'Only moving some vertices when <<平移/translation>>ing a figure: every point in the figure must change by the same rule'

