title: 平面直角坐标系
titleEn: Cartesian Coordinate System
chapter: 9
subject: math
grade: grade7
semester: semester2
estimatedTime: 60-80分钟学习 + 40分钟练习
targetAudience: 小学3年级自学生，已学习数轴和有理数，自学材料，由简入深

objectives:
  - 理解<<有序数对/ordered pair>>的概念，能用<<有序数对/ordered pair>>表示物体的位置
  - 理解<<平面直角坐标系/Cartesian coordinate system>>的构成，知道<<x轴/x-axis>>、<<y轴/y-axis>>、<<原点/origin>>和四个<<象限/quadrant>>
  - 能在<<平面直角坐标系/Cartesian coordinate system>>中根据<<坐标/coordinates>>确定点的位置，也能根据点的位置写出其<<坐标/coordinates>>
  - 了解各<<象限/quadrant>>内点的<<坐标/coordinates>>的符号特征
  - 能用<<坐标/coordinates>>表示地理位置
  - 掌握点的<<平移/translation>>在<<坐标/coordinates>>上的变化规律
  - 能利用<<坐标/coordinates>>描述简单图形的位置和变换
objectivesEn:
  - Understand the concept of <<有序数对/ordered pair>> and use <<有序数对/ordered pair>>s to represent the position of objects
  - Understand the structure of the <<平面直角坐标系/Cartesian coordinate system>>, including the <<x轴/x-axis>>, <<y轴/y-axis>>, <<原点/origin>>, and four <<象限/quadrant>>s
  - Be able to locate a point in the <<平面直角坐标系/Cartesian coordinate system>> given its <<坐标/coordinates>>, and write the <<坐标/coordinates>> of a given point
  - Know the sign patterns of <<坐标/coordinates>> in each <<象限/quadrant>>
  - Be able to use <<坐标/coordinates>> to represent geographic locations
  - Master the rules for how <<坐标/coordinates>> change under <<平移/translation>>
  - Be able to use <<坐标/coordinates>> to describe the position and transformation of simple figures

prerequisites:
  title: 从<<数轴/number line>>到<<平面直角坐标系/Cartesian coordinate system>>
  titleEn: From the <<数轴/number line>> to the <<平面直角坐标系/Cartesian coordinate system>>
  intro: |
    在第一章中，我们学过用<<数轴/number line>>表示数。<<数轴/number line>>上的每一个点对应一个实数，一个实数也对应<<数轴/number line>>上唯一的一个点。但是，<<数轴/number line>>只有一条线，只能确定"一维"的位置。
  introEn: |
    In Chapter 1, we learned to represent numbers on a <<数轴/number line>>. Each point on the <<数轴/number line>> corresponds to a real number, and each real number corresponds to a unique point on the <<数轴/number line>>. However, a <<数轴/number line>> is only one line and can only determine positions in "one dimension."
  knownNumbers:
    - '在<<数轴/number line>>上，用一个数 $3$ 就能确定一个点的位置'
    - '教室里，只说"第 $3$ 列"不能确定一个同学的位置，还需要知道"第几排"'
    - '地图上标注一个城市，需要知道<<经度/longitude>>和<<纬度/latitude>>两个数'
  knownNumbersEn:
    - 'On a <<数轴/number line>>, a single number $3$ can determine the position of a point'
    - 'In a classroom, saying only "column $3$" cannot determine a student''s position — we also need to know "which row"'
    - 'To mark a city on a map, we need two numbers: <<经度/longitude>> and <<纬度/latitude>>'
  canSolve:
    - 在<<数轴/number line>>上确定一个点的位置（一维）
  canSolveEn:
    - Determine the position of a point on a <<数轴/number line>> (one dimension)
  cannotSolve:
    - 在平面上确定一个点的位置（二维）——需要两个数
    - '电影院里找座位——需要知道"几排几号"'
    - 地图上找一个地点——需要知道<<经度/longitude>>和<<纬度/latitude>>
  cannotSolveEn:
    - 'Determine the position of a point on a plane (two dimensions) — two numbers are needed'
    - 'Finding a seat in a cinema — need to know "which row and which number"'
    - 'Finding a location on a map — need to know <<经度/longitude>> and <<纬度/latitude>>'
  conclusion: |
    要在平面上确定一个点的位置，一个数是不够的，需要**两个数**。数学上，把这两个有顺序的数组成一个**<<有序数对/ordered pair>>**，记作 $(a, b)$。在此基础上，我们建立**<<平面直角坐标系/Cartesian coordinate system>>**，用两条互相垂直的<<数轴/number line>>来确定平面上任意一个点的位置。
  conclusionEn: |
    To determine the position of a point on a plane, one number is not enough — **two numbers** are needed. In mathematics, these two numbers in a specific order form an **<<有序数对/ordered pair>>**, written as $(a, b)$. Building on this, we establish the **<<平面直角坐标系/Cartesian coordinate system>>**, using two mutually perpendicular <<数轴/number line>>s to locate any point on a plane.

concepts:
  - id: ordered-pair
    hasVisualization: true
    title: <<有序数对/ordered pair>>
    titleEn: <<有序数对/ordered pair>>
    content: |
      用含有两个数的词来表示一个确定的位置，其中各个数表示不同的含义，我们把这种**有顺序的两个数** $a$ 与 $b$ 组成的数对，叫做**<<有序数对/ordered pair>>**，记作 $(a, b)$。

      注意：<<有序数对/ordered pair>>中两个数的**顺序**不能颠倒。$(2, 3)$ 和 $(3, 2)$ 表示的是不同的位置。
    contentEn: |
      When we use a pair of numbers to represent a specific position, where each number has a distinct meaning, we call such a pair of numbers $a$ and $b$ **in a specific order** an **<<有序数对/ordered pair>>**, written as $(a, b)$.

      Note: the **order** of the two numbers in an <<有序数对/ordered pair>> cannot be swapped. $(2, 3)$ and $(3, 2)$ represent different positions.
    examples:
      - '电影院座位"$5$ 排 $3$ 号"可以表示为<<有序数对/ordered pair>> $(5, 3)$'
      - '"$5$ 排 $3$ 号"与"$3$ 排 $5$ 号"是不同的座位，即 $(5, 3) \neq (3, 5)$'
      - '国际象棋中，棋子的位置用列字母和行数字表示，如 $(e, 4)$'
    examplesEn:
      - 'Cinema seat "row $5$, number $3$" can be written as <<有序数对/ordered pair>> $(5, 3)$'
      - '"Row $5$, number $3$" and "row $3$, number $5$" are different seats, i.e., $(5, 3) \neq (3, 5)$'
      - 'In chess, a piece''s position is described by a column letter and row number, e.g., $(e, 4)$'
    notes:
      - '"有序"意味着第一个数和第二个数的意义不同，不能交换'
      - <<有序数对/ordered pair>>可以表示平面上的位置、棋盘格子等
    notesEn:
      - '"Ordered" means the first and second numbers have different meanings and cannot be swapped'
      - <<有序数对/ordered pair>>s can represent positions on a plane, squares on a board, etc.

  - id: cartesian-coordinate-system
    hasVisualization: true
    title: <<平面直角坐标系/Cartesian coordinate system>>
    titleEn: <<平面直角坐标系/Cartesian coordinate system>>
    content: |
      在平面内，两条互相垂直且有公共<<原点/origin>>的<<数轴/number line>>组成**<<平面直角坐标系/Cartesian coordinate system>>**。

      - 水平方向的<<数轴/number line>>叫做**<<x轴/x-axis>>**（也叫<<横轴/horizontal axis>>），向右为正方向
      - 竖直方向的<<数轴/number line>>叫做**<<y轴/y-axis>>**（也叫<<纵轴/vertical axis>>），向上为正方向
      - 两条<<坐标轴/coordinate axes>>的交点叫做**<<原点/origin>>**，用字母 $O$ 表示

      <<平面直角坐标系/Cartesian coordinate system>>把平面分成四个部分，分别叫做**第一<<象限/quadrant>>、第二<<象限/quadrant>>、第三<<象限/quadrant>>、第四<<象限/quadrant>>**。<<坐标轴/coordinate axes>>上的点不属于任何一个<<象限/quadrant>>。
    contentEn: |
      In a plane, two mutually perpendicular <<数轴/number line>>s sharing a common <<原点/origin>> form a **<<平面直角坐标系/Cartesian coordinate system>>**.

      - The horizontal <<数轴/number line>> is called the **<<x轴/x-axis>>** (also called the <<横轴/horizontal axis>>), with the positive direction pointing right
      - The vertical <<数轴/number line>> is called the **<<y轴/y-axis>>** (also called the <<纵轴/vertical axis>>), with the positive direction pointing up
      - The intersection of the two <<坐标轴/coordinate axes>> is called the **<<原点/origin>>**, denoted by the letter $O$

      The <<平面直角坐标系/Cartesian coordinate system>> divides the plane into four regions called the **first <<象限/quadrant>>, second <<象限/quadrant>>, third <<象限/quadrant>>, and fourth <<象限/quadrant>>**. Points on the <<坐标轴/coordinate axes>> do not belong to any <<象限/quadrant>>.
    examples:
      - '<<原点/origin>> $O$ 的<<坐标/coordinates>>是 $(0, 0)$'
      - '点 $A(3, 2)$ 在第一<<象限/quadrant>>，$x = 3$，$y = 2$'
      - '点 $B(-1, 4)$ 在第二<<象限/quadrant>>，$x = -1$，$y = 4$'
      - '点 $C(-2, -3)$ 在第三<<象限/quadrant>>，$x = -2$，$y = -3$'
      - '点 $D(5, -1)$ 在第四<<象限/quadrant>>，$x = 5$，$y = -1$'
    examplesEn:
      - 'The <<坐标/coordinates>> of the <<原点/origin>> $O$ are $(0, 0)$'
      - 'Point $A(3, 2)$ is in the first <<象限/quadrant>>, with $x = 3$, $y = 2$'
      - 'Point $B(-1, 4)$ is in the second <<象限/quadrant>>, with $x = -1$, $y = 4$'
      - 'Point $C(-2, -3)$ is in the third <<象限/quadrant>>, with $x = -2$, $y = -3$'
      - 'Point $D(5, -1)$ is in the fourth <<象限/quadrant>>, with $x = 5$, $y = -1$'
    notes:
      - '第一<<象限/quadrant>>：$(+, +)$；第二<<象限/quadrant>>：$(-, +)$；第三<<象限/quadrant>>：$(-, -)$；第四<<象限/quadrant>>：$(+, -)$'
      - <<坐标轴/coordinate axes>>上的点不在任何<<象限/quadrant>>内
      - 写<<坐标/coordinates>>时，先写<<横坐标/x-coordinate>>（$x$），再写<<纵坐标/y-coordinate>>（$y$）
    notesEn:
      - 'First <<象限/quadrant>>: $(+, +)$; second <<象限/quadrant>>: $(-, +)$; third <<象限/quadrant>>: $(-, -)$; fourth <<象限/quadrant>>: $(+, -)$'
      - Points on the <<坐标轴/coordinate axes>> do not belong to any <<象限/quadrant>>
      - 'When writing <<坐标/coordinates>>, write the <<横坐标/x-coordinate>> ($x$) first, then the <<纵坐标/y-coordinate>> ($y$)'

  - id: coordinates-and-position
    title: 用<<坐标/coordinates>>表示地理位置
    titleEn: Representing geographic locations with <<坐标/coordinates>>
    content: |
      利用<<平面直角坐标系/Cartesian coordinate system>>可以表示地理位置。一般步骤：

      1. 建立<<坐标系/coordinate system>>——选择合适的<<原点/origin>>、正方向和单位长度
      2. 在<<坐标系/coordinate system>>中标出已知地点的位置
      3. 用<<坐标/coordinates>>描述各地点的位置关系

      地图上通常用<<经度/longitude>>和<<纬度/latitude>>来确定地球上任意一点的位置。<<经度/longitude>>相当于<<横坐标/x-coordinate>>，<<纬度/latitude>>相当于<<纵坐标/y-coordinate>>。
    contentEn: |
      The <<平面直角坐标系/Cartesian coordinate system>> can be used to represent geographic locations. The general steps are:

      1. Set up a <<坐标系/coordinate system>> — choose a suitable <<原点/origin>>, positive directions, and unit lengths
      2. Mark the positions of known locations in the <<坐标系/coordinate system>>
      3. Use <<坐标/coordinates>> to describe the positional relationships among locations

      On maps, <<经度/longitude>> and <<纬度/latitude>> are typically used to determine any point on Earth. <<经度/longitude>> corresponds to the <<横坐标/x-coordinate>>, and <<纬度/latitude>> corresponds to the <<纵坐标/y-coordinate>>.
    examples:
      - '以学校为<<原点/origin>>，向东为<<x轴/x-axis>>正方向，向北为<<y轴/y-axis>>正方向，图书馆在学校东 $200$ 米、北 $300$ 米处，记为 $(200, 300)$'
      - '北京的地理<<坐标/coordinates>>大约是东经 $116°$、北纬 $40°$'
    examplesEn:
      - 'Taking the school as the <<原点/origin>>, east as the positive <<x轴/x-axis>> direction, and north as the positive <<y轴/y-axis>> direction, the library at $200$ m east and $300$ m north of the school is written as $(200, 300)$'
      - 'Beijing''s geographic <<坐标/coordinates>> are approximately $116°$ E longitude and $40°$ N latitude'
    notes:
      - 建立<<坐标系/coordinate system>>时，<<原点/origin>>的选取和正方向的规定可以根据实际情况灵活确定
      - 不同的<<坐标系/coordinate system>>选取方式会导致同一地点的<<坐标/coordinates>>不同，但位置关系不变
    notesEn:
      - 'When setting up a <<坐标系/coordinate system>>, the choice of <<原点/origin>> and positive directions can be flexibly determined based on the actual situation'
      - 'Different choices of <<坐标系/coordinate system>> will give different <<坐标/coordinates>> for the same location, but the positional relationships remain unchanged'

  - id: translation-and-coordinates
    hasVisualization: true
    title: 用<<坐标/coordinates>>表示<<平移/translation>>
    titleEn: Representing <<平移/translation>> with <<坐标/coordinates>>
    content: |
      在<<平面直角坐标系/Cartesian coordinate system>>中，将一个图形进行<<平移/translation>>时，图形上每个点的<<坐标/coordinates>>都按相同的规律变化：

      - 向右<<平移/translation>> $a$ 个单位：<<横坐标/x-coordinate>>加 $a$，<<纵坐标/y-coordinate>>不变，即 $(x, y) \to (x + a, y)$
      - 向左<<平移/translation>> $a$ 个单位：<<横坐标/x-coordinate>>减 $a$，<<纵坐标/y-coordinate>>不变，即 $(x, y) \to (x - a, y)$
      - 向上<<平移/translation>> $b$ 个单位：<<横坐标/x-coordinate>>不变，<<纵坐标/y-coordinate>>加 $b$，即 $(x, y) \to (x, y + b)$
      - 向下<<平移/translation>> $b$ 个单位：<<横坐标/x-coordinate>>不变，<<纵坐标/y-coordinate>>减 $b$，即 $(x, y) \to (x, y - b)$
    contentEn: |
      In the <<平面直角坐标系/Cartesian coordinate system>>, when a figure is <<平移/translation>>d, the <<坐标/coordinates>> of every point on the figure change according to the same rule:

      - <<平移/translation>> right by $a$ units: <<横坐标/x-coordinate>> increases by $a$, <<纵坐标/y-coordinate>> unchanged, i.e., $(x, y) \to (x + a, y)$
      - <<平移/translation>> left by $a$ units: <<横坐标/x-coordinate>> decreases by $a$, <<纵坐标/y-coordinate>> unchanged, i.e., $(x, y) \to (x - a, y)$
      - <<平移/translation>> up by $b$ units: <<横坐标/x-coordinate>> unchanged, <<纵坐标/y-coordinate>> increases by $b$, i.e., $(x, y) \to (x, y + b)$
      - <<平移/translation>> down by $b$ units: <<横坐标/x-coordinate>> unchanged, <<纵坐标/y-coordinate>> decreases by $b$, i.e., $(x, y) \to (x, y - b)$
    examples:
      - '点 $A(2, 3)$ 向右<<平移/translation>> $4$ 个单位后变为 $A''(6, 3)$'
      - '点 $B(-1, 5)$ 向下<<平移/translation>> $3$ 个单位后变为 $B''(-1, 2)$'
      - '三角形三个顶点 $A(1,1)$、$B(3,1)$、$C(2,4)$，整体向左<<平移/translation>> $2$ 个单位后变为 $A''(-1,1)$、$B''(1,1)$、$C''(0,4)$'
    examplesEn:
      - 'Point $A(2, 3)$ becomes $A''(6, 3)$ after <<平移/translation>> $4$ units to the right'
      - 'Point $B(-1, 5)$ becomes $B''(-1, 2)$ after <<平移/translation>> $3$ units down'
      - 'A triangle with vertices $A(1,1)$, $B(3,1)$, $C(2,4)$ becomes $A''(-1,1)$, $B''(1,1)$, $C''(0,4)$ after <<平移/translation>> $2$ units to the left'
    notes:
      - '口诀：左右<<平移/translation>>变<<横坐标/x-coordinate>>，上下<<平移/translation>>变<<纵坐标/y-coordinate>>；右加左减，上加下减'
      - <<平移/translation>>不改变图形的形状和大小，只改变位置
    notesEn:
      - 'Mnemonic: horizontal <<平移/translation>> changes the <<横坐标/x-coordinate>>, vertical <<平移/translation>> changes the <<纵坐标/y-coordinate>>; right/up means add, left/down means subtract'
      - <<平移/translation>> does not change the shape or size of a figure, only its position

