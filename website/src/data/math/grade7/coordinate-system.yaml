  - "<<平面直角坐标系/Cartesian coordinate system>>由两条互相垂直的<<数轴/number line>>（<<x轴/x-axis>>和<<y轴/y-axis>>）组成，交点为<<原点/origin>> $O$"
  - '四个<<象限/quadrant>>的<<坐标/coordinates>>符号：第一 $(+,+)$，第二 $(-,+)$，第三 $(-,-)$，第四 $(+,-)$'
  - "<<坐标轴/coordinate axes>>上的点不属于任何<<象限/quadrant>>：<<x轴/x-axis>>上的点<<纵坐标/y-coordinate>>为 $0$，<<y轴/y-axis>>上的点<<横坐标/x-coordinate>>为 $0$"
  - '<<平移/translation>>规律：右加左减变<<横坐标/x-coordinate>>，上加下减变<<纵坐标/y-coordinate>>'
  - "<<平移/translation>>不改变图形的形状和大小，只改变位置"
  - '用<<坐标/coordinates>>可以表示地理位置，关键是确定<<原点/origin>>、正方向和单位长度'
summaryEn:
  - "An <<有序数对/ordered pair>> $(a, b)$ is a pair of numbers in a specific order; the order cannot be reversed"
  - "The <<平面直角坐标系/Cartesian coordinate system>> consists of two mutually perpendicular <<数轴/number line>>s (<<x轴/x-axis>> and <<y轴/y-axis>>), intersecting at the <<原点/origin>> $O$"
  - 'Sign patterns in the four <<象限/quadrant>>s: first $(+,+)$, second $(-,+)$, third $(-,-)$, fourth $(+,-)$'
  - "Points on the <<坐标轴/coordinate axes>> do not belong to any <<象限/quadrant>>: points on the <<x轴/x-axis>> have <<纵坐标/y-coordinate>> $0$, points on the <<y轴/y-axis>> have <<横坐标/x-coordinate>> $0$"
  - '<<平移/translation>> rules: right/left changes the <<横坐标/x-coordinate>> (add/subtract), up/down changes the <<纵坐标/y-coordinate>> (add/subtract)'
  - "<<平移/translation>> does not change the shape or size of a figure, only its position"
  - 'Using <<坐标/coordinates>> to represent geographic locations requires specifying the <<原点/origin>>, positive directions, and unit lengths'

examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知点 $P(2a + 1, a - 2)$ 在第四<<象限/quadrant>>，则 $a$ 的取值范围是（　）
      questionEn: |
        Given that point $P(2a + 1, a - 2)$ is in the fourth <<象限/quadrant>>, the range of $a$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ['$a > -\frac{1}{2}$', '$a < 2$', '$-\frac{1}{2} < a < 2$', '$a > 2$']
          correctValue: '$-\frac{1}{2} < a < 2$'
      answer: '$-\frac{1}{2} < a < 2$'
      answerEn: '$-\frac{1}{2} < a < 2$'
      explanation: |
        第四<<象限/quadrant>>的点满足<<横坐标/x-coordinate>>为正、<<纵坐标/y-coordinate>>为负：
        $2a + 1 > 0$，即 $a > -\frac{1}{2}$
        $a - 2 < 0$，即 $a < 2$
        所以 $-\frac{1}{2} < a < 2$。
      explanationEn: |
        A point in the fourth <<象限/quadrant>> has positive <<横坐标/x-coordinate>> and negative <<纵坐标/y-coordinate>>:
        $2a + 1 > 0$, i.e., $a > -\frac{1}{2}$
        $a - 2 < 0$, i.e., $a < 2$
        Therefore $-\frac{1}{2} < a < 2$.

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        点 $A(-3, 4)$ 关于<<x轴/x-axis>>对称的点的<<坐标/coordinates>>是______，关于<<y轴/y-axis>>对称的点的<<坐标/coordinates>>是______，关于<<原点/origin>>对称的点的<<坐标/coordinates>>是______。
      questionEn: |
        The <<坐标/coordinates>> of the point symmetric to $A(-3, 4)$ with respect to the <<x轴/x-axis>> are ______, with respect to the <<y轴/y-axis>> are ______, and with respect to the <<原点/origin>> are ______.
      correctValue: "(-3, -4); (3, 4); (3, -4)"
      answer: "$(-3, -4)$；$(3, 4)$；$(3, -4)$"
      answerEn: "$(-3, -4)$; $(3, 4)$; $(3, -4)$"
      explanation: |
        关于<<x轴/x-axis>>对称：<<横坐标/x-coordinate>>不变，<<纵坐标/y-coordinate>>变号，即 $(-3, 4) \to (-3, -4)$。
        关于<<y轴/y-axis>>对称：<<横坐标/x-coordinate>>变号，<<纵坐标/y-coordinate>>不变，即 $(-3, 4) \to (3, 4)$。
        关于<<原点/origin>>对称：<<横坐标/x-coordinate>>和<<纵坐标/y-coordinate>>都变号，即 $(-3, 4) \to (3, -4)$。
      explanationEn: |
        Symmetric about the <<x轴/x-axis>>: <<横坐标/x-coordinate>> unchanged, <<纵坐标/y-coordinate>> negated: $(-3, 4) \to (-3, -4)$.
        Symmetric about the <<y轴/y-axis>>: <<横坐标/x-coordinate>> negated, <<纵坐标/y-coordinate>> unchanged: $(-3, 4) \to (3, 4)$.
        Symmetric about the <<原点/origin>>: both negated: $(-3, 4) \to (3, -4)$.

    - number: 3
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        在<<平面直角坐标系/Cartesian coordinate system>>中，点 $A(1, 2)$、$B(4, 2)$、$C(4, 6)$ 是平行四边形 $ABCD$ 的三个顶点。求第四个顶点 $D$ 的<<坐标/coordinates>>。（提示：平行四边形的对角线互相平分）
      questionEn: |
        In the <<平面直角坐标系/Cartesian coordinate system>>, $A(1, 2)$, $B(4, 2)$, $C(4, 6)$ are three vertices of parallelogram $ABCD$. Find the <<坐标/coordinates>> of the fourth vertex $D$. (Hint: the diagonals of a parallelogram bisect each other.)
      answer: |
        在平行四边形 $ABCD$ 中，对角线 $AC$ 和 $BD$ 互相平分。
        $AC$ 的中点为 $\left(\frac{1+4}{2}, \frac{2+6}{2}\right) = \left(\frac{5}{2}, 4\right)$。
        设 $D(x, y)$，则 $BD$ 的中点为 $\left(\frac{4+x}{2}, \frac{2+y}{2}\right)$。
        令两个中点相等：
        $\frac{4+x}{2} = \frac{5}{2}$，解得 $x = 1$
        $\frac{2+y}{2} = 4$，解得 $y = 6$
        所以 $D(1, 6)$。
      answerEn: |
        In parallelogram $ABCD$, diagonals $AC$ and $BD$ bisect each other.
        The midpoint of $AC$ is $\left(\frac{1+4}{2}, \frac{2+6}{2}\right) = \left(\frac{5}{2}, 4\right)$.
        Let $D(x, y)$; the midpoint of $BD$ is $\left(\frac{4+x}{2}, \frac{2+y}{2}\right)$.
        Setting the two midpoints equal:
        $\frac{4+x}{2} = \frac{5}{2}$, so $x = 1$
        $\frac{2+y}{2} = 4$, so $y = 6$
        Therefore $D(1, 6)$.
      explanation: |
        本题综合考查<<坐标/coordinates>>计算和平行四边形的性质。关键是利用"对角线互相平分"这一性质，列方程求出未知顶点的<<坐标/coordinates>>。
      explanationEn: |
        This problem tests <<坐标/coordinates>> computation and parallelogram properties. The key is using the property that diagonals bisect each other to set up equations and find the unknown vertex.

    - number: 4
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        点 $P$ 在<<x轴/x-axis>>上，且到点 $A(0, 3)$ 和点 $B(4, 0)$ 的距离之和最小。求点 $P$ 的<<坐标/coordinates>>及这个最小距离之和。
      questionEn: |
        Point $P$ is on the <<x轴/x-axis>>, and the sum of distances from $P$ to $A(0, 3)$ and $B(4, 0)$ is minimized. Find the <<坐标/coordinates>> of $P$ and the minimum sum of distances.
      answer: |
        因为 $A(0, 3)$ 在<<y轴/y-axis>>上方，$B(4, 0)$ 在<<x轴/x-axis>>上。
        取 $A$ 关于<<x轴/x-axis>>的对称点 $A'(0, -3)$。
        则对于<<x轴/x-axis>>上任意一点 $P$，$PA = PA'$。
        所以 $PA + PB = PA' + PB \geq A'B$（三角不等式）。
        当 $P$ 在线段 $A'B$ 上时取等号。
        $A'B = \sqrt{(4-0)^2 + (0-(-3))^2} = \sqrt{16 + 9} = \sqrt{25} = 5$

        线段 $A'B$ 与<<x轴/x-axis>>的交点即为点 $P$。
        $A'(0, -3)$ 到 $B(4, 0)$ 的直线斜率为 $\frac{0-(-3)}{4-0} = \frac{3}{4}$。
        直线方程：$y - 0 = \frac{3}{4}(x - 4)$，即 $y = \frac{3}{4}x - 3$。
        令 $y = 0$：$\frac{3}{4}x = 3$，$x = 4$。
        所以 $P(4, 0)$，即 $P$ 与 $B$ 重合，最小距离之和为 $5$。
      answerEn: |
        Since $A(0, 3)$ is above the <<x轴/x-axis>> and $B(4, 0)$ is on the <<x轴/x-axis>>.
        Take the reflection of $A$ across the <<x轴/x-axis>>: $A'(0, -3)$.
        For any point $P$ on the <<x轴/x-axis>>, $PA = PA'$.
        So $PA + PB = PA' + PB \geq A'B$ (triangle inequality).
        Equality holds when $P$ lies on segment $A'B$.
        $A'B = \sqrt{(4-0)^2 + (0-(-3))^2} = \sqrt{16 + 9} = \sqrt{25} = 5$

        Point $P$ is the intersection of segment $A'B$ with the <<x轴/x-axis>>.
        The slope from $A'(0, -3)$ to $B(4, 0)$ is $\frac{0-(-3)}{4-0} = \frac{3}{4}$.
        Line equation: $y = \frac{3}{4}x - 3$.
        Setting $y = 0$: $\frac{3}{4}x = 3$, $x = 4$.
        So $P(4, 0)$, meaning $P$ coincides with $B$, and the minimum sum of distances is $5$.
      explanation: |
        这是经典的"将军饮马"问题（最短路径问题）。利用<<坐标/coordinates>>中的对称性，将求最小距离之和转化为求两点之间的直线距离。本题中 $B$ 恰好在<<x轴/x-axis>>上，所以最优点 $P$ 与 $B$ 重合。
      explanationEn: |
        This is the classic "Horse Drinking" problem (shortest path problem). Using symmetry in <<坐标/coordinates>>, the minimization of the sum of distances is transformed into finding the straight-line distance between two points. In this problem, $B$ happens to be on the <<x轴/x-axis>>, so the optimal point $P$ coincides with $B$.
