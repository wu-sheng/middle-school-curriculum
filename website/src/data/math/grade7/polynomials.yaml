summaryEn:
  - "Understood the concepts of <<单项式/monomial>> and <<多项式/polynomial>>, and know they are collectively called <<整式/integral expression>>s"
  - "Can correctly identify the <<系数/coefficient>> and <<次数/degree>> of a <<单项式/monomial>>"
  - "Mastered the conditions for identifying <<同类项/like terms>>: same letters with the same exponents for each corresponding letter"
  - "Learned the method of <<合并同类项/combining like terms>>: add the <<系数/coefficient>>s while keeping letters and exponents unchanged"
  - "Mastered the rules for removing parentheses and can correctly perform addition and subtraction of <<整式/integral expression>>s"
  - "Can use <<整式/integral expression>>s to represent quantitative relationships in practical problems"

examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        下列各式中，是<<单项式/monomial>>的是（　）
      questionEn: |
        Among the following expressions, the one that is a <<单项式/monomial>> is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$x + 1$", "$\\frac{1}{x}$", "$-2x^2y$", "$x^2 + y^2$"]
          correctValue: "$-2x^2y$"
      answer: "$-2x^2y$"
      answerEn: "$-2x^2y$"
      explanation: |
        - $x + 1$ 是<<多项式/polynomial>>，不是<<单项式/monomial>>
        - $\frac{1}{x}$ 字母在分母上，不是<<整式/integral expression>>，更不是<<单项式/monomial>>
        - $-2x^2y$ 是数与字母的乘积，是<<单项式/monomial>> ✓
        - $x^2 + y^2$ 是<<多项式/polynomial>>，不是<<单项式/monomial>>
      explanationEn: |
        - $x + 1$ is a <<多项式/polynomial>>, not a <<单项式/monomial>>
        - $\frac{1}{x}$ has the letter in the denominator — not an <<整式/integral expression>>, let alone a <<单项式/monomial>>
        - $-2x^2y$ is the product of a number and letters — it is a <<单项式/monomial>> ✓
        - $x^2 + y^2$ is a <<多项式/polynomial>>, not a <<单项式/monomial>>

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        化简 $2(a^2 - 2a) - (2a^2 - 3a + 1) = $ ______。
      questionEn: |
        Simplify $2(a^2 - 2a) - (2a^2 - 3a + 1) = $ ______.
      correctValue: "-a-1"
      answer: "$-a - 1$"
      answerEn: "$-a - 1$"
      explanation: |
        $= 2a^2 - 4a - 2a^2 + 3a - 1$
        $= (2a^2 - 2a^2) + (-4a + 3a) + (-1)$
        $= -a - 1$
        注意：先展开 $2(a^2 - 2a) = 2a^2 - 4a$，再去括号并<<合并同类项/combining like terms>>。
      explanationEn: |
        $= 2a^2 - 4a - 2a^2 + 3a - 1$
        $= (2a^2 - 2a^2) + (-4a + 3a) + (-1)$
        $= -a - 1$
        Note: first expand $2(a^2 - 2a) = 2a^2 - 4a$, then remove parentheses and <<合并同类项/combining like terms>>.

    - number: 3
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        下列运算正确的是（　）
      questionEn: |
        Which of the following operations is correct? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - "$3a + 2b = 5ab$"
            - "$5x^2 - 2x^2 = 3$"
            - "$4a^2 - a^2 = 3a^2$"
            - "$3x + 2x = 5x^2$"
          correctValue: "$4a^2 - a^2 = 3a^2$"
      answer: "$4a^2 - a^2 = 3a^2$"
      answerEn: "$4a^2 - a^2 = 3a^2$"
      explanation: |
        - A: $3a$ 和 $2b$ 不是<<同类项/like terms>>，不能合并
        - B: <<系数/coefficient>>相减，字母部分不变，应为 $3x^2$，不是 $3$
        - C: $(4-1)a^2 = 3a^2$，正确 ✓
        - D: $3x + 2x = 5x$，不是 $5x^2$
        这道题考查<<合并同类项/combining like terms>>的常见错误。
      explanationEn: |
        - A: $3a$ and $2b$ are not <<同类项/like terms>> and cannot be combined
        - B: Subtract <<系数/coefficient>>s and keep the letter part; it should be $3x^2$, not $3$
        - C: $(4-1)a^2 = 3a^2$ — correct ✓
        - D: $3x + 2x = 5x$, not $5x^2$
        This question tests common mistakes in <<合并同类项/combining like terms>>.

    - number: 4
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        若 $3x^{m}y^2$ 与 $-5x^3y^{n}$ 是<<同类项/like terms>>，则 $m = $ ______，$n = $ ______。
      questionEn: |
        If $3x^{m}y^2$ and $-5x^3y^{n}$ are <<同类项/like terms>>, then $m = $ ______ and $n = $ ______.
      correctValue: "3, 2"
      answer: "$m = 3$，$n = 2$"
      answerEn: "$m = 3$ and $n = 2$"
      explanation: |
        <<同类项/like terms>>要求相同字母的指数分别相同。
        $x$ 的指数：$m = 3$
        $y$ 的指数：$2 = n$，所以 $n = 2$
        这是中考常见的"逆向考查<<同类项/like terms>>条件"题型。
      explanationEn: |
        <<同类项/like terms>> require the exponents of the same letters to be equal.
        Exponent of $x$: $m = 3$
        Exponent of $y$: $2 = n$, so $n = 2$
        This is a common exam question that tests the conditions for <<同类项/like terms>> in reverse.

    - number: 5
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        先化简，再求值：$(3x^2 - 2xy + y^2) - 2(x^2 - xy - y^2)$，其中 $x = 1$，$y = -2$。
      questionEn: |
        First simplify, then evaluate: $(3x^2 - 2xy + y^2) - 2(x^2 - xy - y^2)$, where $x = 1$ and $y = -2$.
      answer: |
        化简：
        $= 3x^2 - 2xy + y^2 - 2x^2 + 2xy + 2y^2$
        $= (3x^2 - 2x^2) + (-2xy + 2xy) + (y^2 + 2y^2)$
        $= x^2 + 3y^2$

        代入 $x = 1$，$y = -2$：
        $= 1^2 + 3 \times (-2)^2 = 1 + 3 \times 4 = 1 + 12 = 13$
      answerEn: |
        Simplify:
        $= 3x^2 - 2xy + y^2 - 2x^2 + 2xy + 2y^2$
        $= (3x^2 - 2x^2) + (-2xy + 2xy) + (y^2 + 2y^2)$
        $= x^2 + 3y^2$

        Substitute $x = 1$, $y = -2$:
        $= 1^2 + 3 \times (-2)^2 = 1 + 3 \times 4 = 1 + 12 = 13$
      explanation: |
        这道中考题考查"先化简再求值"的综合能力。
        关键步骤：
        1. 先展开 $-2(x^2 - xy - y^2) = -2x^2 + 2xy + 2y^2$
        2. 去括号后<<合并同类项/combining like terms>>，注意 $-2xy + 2xy = 0$ 恰好消掉
        3. 化简后再代入数值计算，**切忌先代入后化简**，那样更容易出错
      explanationEn: |
        This exam question tests the comprehensive ability of "simplify first, then evaluate."
        Key steps:
        1. First expand $-2(x^2 - xy - y^2) = -2x^2 + 2xy + 2y^2$
        2. After removing parentheses, <<合并同类项/combining like terms>>; note that $-2xy + 2xy = 0$ cancels out
        3. Simplify first, then substitute values — **never substitute before simplifying**, as that leads to more errors
