    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        <<多项式/polynomial>> $2x^2 - 3x + 7$ 的<<次数/degree>>是______，<<常数项/constant term>>是______。
      questionEn: |
        The <<次数/degree>> of the <<多项式/polynomial>> $2x^2 - 3x + 7$ is ______, and the <<常数项/constant term>> is ______.
      correctValue: "2, 7"
      answer: "<<次数/degree>>为 $2$，<<常数项/constant term>>为 $7$"
      answerEn: "The <<次数/degree>> is $2$ and the <<常数项/constant term>> is $7$"
      explanation: |
        <<次数/degree>>最高的<<项/term>>是 $2x^2$（二次），所以<<多项式/polynomial>>的<<次数/degree>>是 $2$。不含字母的<<项/term>> $7$ 是<<常数项/constant term>>。
      explanationEn: |
        The <<项/term>> with the highest <<次数/degree>> is $2x^2$ (degree $2$), so the <<多项式/polynomial>> has <<次数/degree>> $2$. The <<项/term>> without letters, $7$, is the <<常数项/constant term>>.

    - number: 3
      type: 填空题
