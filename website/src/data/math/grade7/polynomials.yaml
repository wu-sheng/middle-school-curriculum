      answerEn: "The <<系数/coefficient>> is $-5$ and the <<次数/degree>> is $3$"
      explanation: |
        数字因数 $-5$ 是<<系数/coefficient>>，$x$ 的指数 $3$ 就是<<次数/degree>>。
      explanationEn: |
