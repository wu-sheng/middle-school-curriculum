      question: |
        <<单项式/monomial>> $-5x^3$ 的<<系数/coefficient>>是______，<<次数/degree>>是______。
      questionEn: |
        The <<系数/coefficient>> of the <<单项式/monomial>> $-5x^3$ is ______, and the <<次数/degree>> is ______.
      correctValue: "-5, 3"
