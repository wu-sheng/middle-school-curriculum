      question: |
        $3a + 5a = $ ______。
      questionEn: |
        $3a + 5a = $ ______.
      correctValue: "8a"
      answer: "$8a$"
      answerEn: "$8a$"
      explanation: |
        $3a$ 和 $5a$ 是<<同类项/like terms>>，<<系数/coefficient>>相加：$(3+5)a = 8a$。
      explanationEn: |
        $3a$ and $5a$ are <<同类项/like terms>>; add the <<系数/coefficient>>s: $(3+5)a = 8a$.

    - number: 4
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        化简 $4x^2 - x^2 + 2x - 2x = $ ______。
      questionEn: |
        Simplify $4x^2 - x^2 + 2x - 2x = $ ______.
      correctValue: "3x^2"
      answer: "$3x^2$"
      answerEn: "$3x^2$"
      explanation: |
        合并 $x^2$ 项：$4x^2 - x^2 = 3x^2$。合并 $x$ 项：$2x - 2x = 0$。结果为 $3x^2$。
      explanationEn: |
        Combine $x^2$ <<项/term>>s: $4x^2 - x^2 = 3x^2$. Combine $x$ <<项/term>>s: $2x - 2x = 0$. The result is $3x^2$.

    - number: 5
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $3ab$ 和 $3a^2b$ 是<<同类项/like terms>>。
      questionEn: |
        $3ab$ and $3a^2b$ are <<同类项/like terms>>.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        虽然都含有字母 $a$ 和 $b$，但 $a$ 的指数不同（$1$ 和 $2$），所以不是<<同类项/like terms>>。
      explanationEn: |
        Although both contain the letters $a$ and $b$, the exponent of $a$ differs ($1$ vs. $2$), so they are not <<同类项/like terms>>.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        <<单项式/monomial>> $-y$ 的<<系数/coefficient>>是 $-1$。
      questionEn: |
        The <<系数/coefficient>> of the <<单项式/monomial>> $-y$ is $-1$.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        $-y = -1 \times y$，所以<<系数/coefficient>>是 $-1$。
      explanationEn: |
        $-y = -1 \times y$, so the <<系数/coefficient>> is $-1$.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $\frac{5}{a}$ 是<<单项式/monomial>>。
      questionEn: |
        $\frac{5}{a}$ is a <<单项式/monomial>>.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        字母 $a$ 在分母上，不符合<<单项式/monomial>>的定义。<<单项式/monomial>>要求字母只能在分子或整体中出现。
      explanationEn: |
        The letter $a$ is in the denominator, which does not meet the definition of a <<单项式/monomial>>. A <<单项式/monomial>> requires that letters only appear in the numerator or as a whole.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $(3x + 2) - (x - 1) = 2x + 1$。
      questionEn: |
        $(3x + 2) - (x - 1) = 2x + 1$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        去括号：$3x + 2 - x + 1 = 2x + 3$，不是 $2x + 1$。减号要使括号内每一个<<项/term>>的符号都取反。
      explanationEn: |
        Removing parentheses: $3x + 2 - x + 1 = 2x + 3$, not $2x + 1$. The minus sign reverses the sign of every <<项/term>> inside the parentheses.

    - number: 9
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        下列各组中，是<<同类项/like terms>>的一组是（　）
      questionEn: |
        Among the following groups, the one that consists of <<同类项/like terms>> is ( )
      subInputs:
        - prompt: 选择答案
          options:
            - "$2a$ 和 $2b$"
            - "$3x^2y$ 和 $-x^2y$"
            - "$5ab$ 和 $5a^2b$"
            - "$m$ 和 $m^2$"
          correctValue: "$3x^2y$ 和 $-x^2y$"
      answer: "$3x^2y$ 和 $-x^2y$"
      answerEn: "$3x^2y$ and $-x^2y$"
      explanation: |
        - A: 字母不同（$a$ 和 $b$），不是<<同类项/like terms>>
        - B: 都含 $x^2y$，字母相同、指数分别相同，是<<同类项/like terms>> ✓
        - C: $a$ 的指数不同（$1$ 和 $2$），不是<<同类项/like terms>>
        - D: $m$ 的指数不同（$1$ 和 $2$），不是<<同类项/like terms>>
      explanationEn: |
        - A: Different letters ($a$ vs. $b$) — not <<同类项/like terms>>
        - B: Both contain $x^2y$ with the same letters and exponents — they are <<同类项/like terms>> ✓
        - C: The exponent of $a$ differs ($1$ vs. $2$) — not <<同类项/like terms>>
        - D: The exponent of $m$ differs ($1$ vs. $2$) — not <<同类项/like terms>>

    - number: 10
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: "IV. Calculation"
      question: |
        化简：$(5a^2 - 3a + 2) + (a^2 + 4a - 6)$。
      questionEn: |
        Simplify: $(5a^2 - 3a + 2) + (a^2 + 4a - 6)$.
      answer: |
        $= 5a^2 - 3a + 2 + a^2 + 4a - 6$
        $= (5a^2 + a^2) + (-3a + 4a) + (2 - 6)$
        $= 6a^2 + a - 4$
      answerEn: |
        $= 5a^2 - 3a + 2 + a^2 + 4a - 6$
        $= (5a^2 + a^2) + (-3a + 4a) + (2 - 6)$
        $= 6a^2 + a - 4$
      explanation: |
        加法去括号后符号不变，然后<<合并同类项/combining like terms>>即可。
      explanationEn: |
        When removing parentheses for addition, signs remain unchanged; then <<合并同类项/combining like terms>>.

    - number: 11
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: "IV. Calculation"
      question: |
        化简：$(3x^2 + 2x - 5) - (x^2 - 4x + 3)$。
      questionEn: |
        Simplify: $(3x^2 + 2x - 5) - (x^2 - 4x + 3)$.
      answer: |
        $= 3x^2 + 2x - 5 - x^2 + 4x - 3$
        $= (3x^2 - x^2) + (2x + 4x) + (-5 - 3)$
        $= 2x^2 + 6x - 8$
      answerEn: |
        $= 3x^2 + 2x - 5 - x^2 + 4x - 3$
        $= (3x^2 - x^2) + (2x + 4x) + (-5 - 3)$
        $= 2x^2 + 6x - 8$
      explanation: |
        减法去括号时，第二个括号内每一个<<项/term>>的符号都要取反：$x^2$ 变为 $-x^2$，$-4x$ 变为 $+4x$，$+3$ 变为 $-3$。
      explanationEn: |
        When removing parentheses for subtraction, reverse the sign of every <<项/term>> in the second parentheses: $x^2$ becomes $-x^2$, $-4x$ becomes $+4x$, $+3$ becomes $-3$.

    - number: 12
      type: 综合题
      inputType: open
      section: 五、综合题
      sectionEn: "V. Comprehensive Problem"
      question: |
        一块长方形菜地，长为 $(3x + 2)$ 米，宽为 $(x + 1)$ 米。

        （1）用<<整式/integral expression>>表示这块菜地的周长。
        （2）当 $x = 4$ 时，求菜地的周长。
      questionEn: |
        A rectangular vegetable garden has length $(3x + 2)$ meters and width $(x + 1)$ meters.

        (1) Express the perimeter of this garden as an <<整式/integral expression>>.
        (2) When $x = 4$, find the perimeter of the garden.
      answer: |
        （1）周长 $= 2(3x+2) + 2(x+1) = 6x + 4 + 2x + 2 = 8x + 6$（米）
        （2）当 $x = 4$ 时：$8 \times 4 + 6 = 32 + 6 = 38$（米）
      answerEn: |
        (1) Perimeter $= 2(3x+2) + 2(x+1) = 6x + 4 + 2x + 2 = 8x + 6$ (meters)
        (2) When $x = 4$: $8 \times 4 + 6 = 32 + 6 = 38$ (meters)
      explanation: |
        长方形周长公式：周长 $= 2 \times$ 长 $+ 2 \times$ 宽。先列出<<整式/integral expression>>并化简，再代入具体数值计算。
      explanationEn: |
        Rectangle perimeter formula: perimeter $= 2 \times$ length $+ 2 \times$ width. First write the <<整式/integral expression>> and simplify, then substitute the specific value to calculate.

