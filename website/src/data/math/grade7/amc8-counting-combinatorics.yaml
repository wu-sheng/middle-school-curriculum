title: "\U0001F3C6 AMC 8 扩展：计数与组合基础"
titleEn: "\U0001F3C6 AMC 8 Extension: Counting & Combinatorics"
chapter: 13
subject: math
grade: grade7
semester: semester2
estimatedTime: 约 4–6 课时，每课时 45 分钟
estimatedTimeEn: "4–6 sessions, ~45 min each"
targetAudience: 七年级自学生，已完成方程组与不等式，希望掌握AMC 8核心计数方法

objectives:
  - 掌握加法原理和乘法原理，并能正确区分"或"与"且"的使用场景
  - 理解排列与组合的概念，会用公式 $P(n,r)$ 和 $C(n,r)$ 求解计数问题
  - 学会补集计数法（正难则反），高效解决"至少"类问题
  - 掌握分类讨论法，能将复杂计数问题分解为不重不漏的小问题
  - 培养 AMC 8 计数题的系统思维，避免重复计数和遗漏
objectivesEn:
  - Master the Addition and Multiplication Principles and correctly identify "or" vs. "and" scenarios
  - Understand permutations and combinations; apply $P(n,r)$ and $C(n,r)$ formulas
  - 'Learn complementary counting (count the opposite, then subtract): efficiently solve "at least" problems'
  - Master systematic casework to break complex counting into non-overlapping, exhaustive cases
  - Develop systematic thinking for AMC 8 counting problems, avoiding double-counting and omissions

concepts:
  - id: counting-principles
    title: 加法原理与乘法原理
    titleEn: Addition and Multiplication Principles
    content: |
      **为什么计数是 AMC 8 的核心？**

      在 AMC 8 的 25 道题中，通常有 4–5 道直接考查计数方法，还有 3–4 道概率题的基础也是计数。
      掌握计数原理，就掌握了 AMC 8 近三分之一的分数来源。

      **<<加法原理/Addition Principle>>**

      如果完成一项任务有**两类不同的方法**，第一类有 $m$ 种方案，第二类有 $n$ 种方案，且两类方案**没有重叠**，则总方案数为 $m + n$。

      关键词：**"或"**（做 A **或**做 B）→ 用加法。

      **生活例子**：从北京到上海，可以坐飞机（3 个航班）**或**坐高铁（5 个车次），共有 $3 + 5 = 8$ 种选择。

      **<<乘法原理/Multiplication Principle>>**

      如果完成一项任务需要**两个步骤**，第一步有 $m$ 种选择，第二步有 $n$ 种选择，则总方案数为 $m \times n$。

      关键词：**"且"**（做完 A **然后**做 B）→ 用乘法。

      **生活例子**：吃午餐要选主食（3 种）**和**饮料（4 种），共有 $3 \times 4 = 12$ 种搭配。

      **辨析：什么时候用加法，什么时候用乘法？**

      | 加法原理（或） | 乘法原理（且） |
      |---------------|---------------|
      | 方法之间**互斥** | 步骤之间**独立** |
      | 做完 A **就完成了**任务 | 做完 A **还没完成**，还需要 B |
      | 合并不同的完整方案 | 组合各步骤的选择 |

      **易错点**：很多同学在 AMC 8 中**把加法和乘法搞反**。

      例：从 A 到 C，可以经过 B（2 条路）或经过 D（3 条路）。
      问从 A 到 C 有几条路？答：$2 + 3 = 5$（不是 $2 \times 3 = 6$！因为经 B 和经 D 是**两类方法**，不是两个步骤）

      例：从 A 到 C 必须先经过 B，A 到 B 有 2 条路，B 到 C 有 3 条路。
      问从 A 到 C 有几条路？答：$2 \times 3 = 6$（两个步骤都要完成）

      **推广到多步/多类**：

      加法推广：$m_1 + m_2 + m_3 + \cdots + m_k$

      乘法推广：$m_1 \times m_2 \times m_3 \times \cdots \times m_k$
    contentEn: |
      **Why is counting central to AMC 8?**

      Out of 25 AMC 8 problems, typically 4–5 test counting directly, and another 3–4 probability problems rely on counting as their foundation. Mastering counting principles covers nearly a third of the exam.

      **<<加法原理/Addition Principle>>**

      If a task can be accomplished by **one of two methods** — method A in $m$ ways **or** method B in $n$ ways, with no overlap — then the total number of ways is $m + n$.

      Keyword: **"or"** (do A **or** B) → add.

      **Real-life example**: Travel from Beijing to Shanghai by plane (3 flights) **or** high-speed rail (5 trains): $3 + 5 = 8$ options.

      **<<加法原理/Multiplication Principle>>**

      If a task requires **two steps** — step 1 with $m$ choices **and** step 2 with $n$ choices — then the total number of ways is $m \times n$.

      Keyword: **"and"** (do A **then** B) → multiply.

      **Real-life example**: Choosing lunch requires a main dish (3 options) **and** a drink (4 options): $3 \times 4 = 12$ combos.

      **How to tell addition from multiplication?**

      | Addition (or) | Multiplication (and) |
      |--------------|---------------------|
      | Methods are **mutually exclusive** | Steps are **independent** |
      | Completing A **finishes** the task | Completing A is **not enough** — you still need B |
      | Merge different complete plans | Combine choices across steps |

      **Common mistake**: Many AMC 8 students **confuse addition and multiplication**.

      Example: From A to C, you can go via B (2 routes) or via D (3 routes). Total routes A→C? Answer: $2 + 3 = 5$ (NOT $2 \times 3$! Going via B and via D are two **categories**, not two steps.)

      Example: From A to C you **must** go through B. A→B: 2 routes, B→C: 3 routes. Total A→C? Answer: $2 \times 3 = 6$ (both steps are required.)

      **Extension to multiple steps/categories**:

      Addition: $m_1 + m_2 + m_3 + \cdots + m_k$

      Multiplication: $m_1 \times m_2 \times m_3 \times \cdots \times m_k$
    notes:
      - '判断用加法还是乘法的口诀："分类用加，分步用乘"'
      - '加法原理的关键前提：各类方案之间不能有重叠（互斥）'
      - '乘法原理的关键前提：各步骤之间的选择互不影响（独立）'
    notesEn:
      - 'Mnemonic: "Categories → add; Steps → multiply"'
      - 'Addition requires the categories to be mutually exclusive (no overlap)'
      - 'Multiplication requires the steps to be independent of each other'

  - id: permutations-combinations
    title: 排列与组合
    titleEn: Permutations and Combinations
    content: |
      **<<阶乘/factorial>>**

      $n! = n \times (n-1) \times (n-2) \times \cdots \times 2 \times 1$

      例如：$5! = 5 \times 4 \times 3 \times 2 \times 1 = 120$

      特别规定：$0! = 1$（这不是约定，是有数学理由的——从空集中选 0 个元素恰好只有 1 种方式）

      前几个阶乘值（建议记住）：$1!=1$，$2!=2$，$3!=6$，$4!=24$，$5!=120$，$6!=720$

      **<<排列/Permutation>>——顺序有关**

      从 $n$ 个不同元素中选出 $r$ 个，**按顺序排列**，方案数为：

      $$P(n, r) = \frac{n!}{(n-r)!} = n \times (n-1) \times \cdots \times (n-r+1)$$

      理解方式：第一个位置有 $n$ 种选择，第二个位置有 $n-1$ 种……第 $r$ 个位置有 $n-r+1$ 种。

      **例子**：8 名同学中选 3 人分别担任班长、副班长、学习委员（职位不同，顺序有关）。
      $$P(8, 3) = 8 \times 7 \times 6 = 336$$

      **<<组合/Combination>>——顺序无关**

      从 $n$ 个不同元素中选出 $r$ 个，**不考虑顺序**（只关心"选了谁"），方案数为：

      $$C(n, r) = \binom{n}{r} = \frac{n!}{r!(n-r)!} = \frac{P(n,r)}{r!}$$

      理解方式：先按排列选出 $P(n,r)$ 种，再除以 $r!$（消除同一组的排列重复）。

      **例子**：8 名同学中选 3 人组成一个委员会（没有职位区分，顺序无关）。
      $$C(8, 3) = \frac{8!}{3! \times 5!} = \frac{8 \times 7 \times 6}{3 \times 2 \times 1} = 56$$

      **排列 vs 组合——如何判断？**

      问自己一个问题：**"交换被选中的人的位置，结果会变吗？"**

      - 变 → 排列（站排、分配不同职位、排座位……）
      - 不变 → 组合（选人组队、选菜品、抽签……）

      **<<帕斯卡三角/Pascal's Triangle>>**

      组合数有一个漂亮的递推关系：$C(n, r) = C(n-1, r-1) + C(n-1, r)$

      用三角形排列出来，就是帕斯卡三角（杨辉三角）：
      $$1$$
      $$1 \quad 1$$
      $$1 \quad 2 \quad 1$$
      $$1 \quad 3 \quad 3 \quad 1$$
      $$1 \quad 4 \quad 6 \quad 4 \quad 1$$
      $$1 \quad 5 \quad 10 \quad 10 \quad 5 \quad 1$$

      第 $n$ 行（从 0 开始计数）的第 $r$ 个数就是 $C(n, r)$。

      **常用组合数**（记住能提高做题速度）：

      | $C(n,r)$ | 值 |
      |----------|---|
      | $C(n,0)=C(n,n)$ | $1$ |
      | $C(n,1)=C(n,n-1)$ | $n$ |
      | $C(5,2)$ | $10$ |
      | $C(6,2)$ | $15$ |
      | $C(6,3)$ | $20$ |
      | $C(7,3)$ | $35$ |
      | $C(8,3)$ | $56$ |
      | $C(10,3)$ | $120$ |
    contentEn: |
      **<<阶乘/Factorial>>**

      $n! = n \times (n-1) \times (n-2) \times \cdots \times 2 \times 1$

      Example: $5! = 5 \times 4 \times 3 \times 2 \times 1 = 120$

      By convention: $0! = 1$ (there is exactly one way to choose 0 items from an empty set).

      Memorize the first few: $1!=1$, $2!=2$, $3!=6$, $4!=24$, $5!=120$, $6!=720$

      **<<排列/Permutation>> — order matters**

      Choosing $r$ items from $n$ distinct items and **arranging** them:

      $$P(n, r) = \frac{n!}{(n-r)!} = n \times (n-1) \times \cdots \times (n-r+1)$$

      Think of it this way: the 1st slot has $n$ choices, the 2nd has $n-1$, ..., the $r$-th has $n-r+1$.

      **Example**: From 8 students, choose a president, vice-president, and secretary (different roles, order matters):
      $$P(8, 3) = 8 \times 7 \times 6 = 336$$

      **<<组合/Combination>> — order doesn't matter**

      Choosing $r$ items from $n$ distinct items, **ignoring order** (only "who" is chosen matters):

      $$C(n, r) = \binom{n}{r} = \frac{n!}{r!(n-r)!} = \frac{P(n,r)}{r!}$$

      Idea: first count ordered selections $P(n,r)$, then divide by $r!$ to remove duplicate orderings within each group.

      **Example**: Choose 3 students from 8 to form a committee (no roles, order irrelevant):
      $$C(8, 3) = \frac{8!}{3! \times 5!} = \frac{8 \times 7 \times 6}{3 \times 2 \times 1} = 56$$

      **Permutation vs. Combination — how to tell?**

      Ask yourself: **"If I swap the selected items' positions, does the result change?"**

      - Yes → Permutation (lining up, assigning roles, seating...)
      - No → Combination (forming teams, picking dishes, drawing lots...)

      **<<帕斯卡三角/Pascal's Triangle>>**

      Combinations satisfy a beautiful recurrence: $C(n, r) = C(n-1, r-1) + C(n-1, r)$

      Arranged in a triangle (also known as Yang Hui's Triangle in China):
      $$1$$
      $$1 \quad 1$$
      $$1 \quad 2 \quad 1$$
      $$1 \quad 3 \quad 3 \quad 1$$
      $$1 \quad 4 \quad 6 \quad 4 \quad 1$$
      $$1 \quad 5 \quad 10 \quad 10 \quad 5 \quad 1$$

      The $r$-th entry (0-indexed) in row $n$ equals $C(n, r)$.

      **Useful combination values** (memorize for speed):

      | $C(n,r)$ | Value |
      |----------|-------|
      | $C(n,0)=C(n,n)$ | $1$ |
      | $C(n,1)=C(n,n-1)$ | $n$ |
      | $C(5,2)$ | $10$ |
      | $C(6,2)$ | $15$ |
      | $C(6,3)$ | $20$ |
      | $C(7,3)$ | $35$ |
      | $C(8,3)$ | $56$ |
      | $C(10,3)$ | $120$ |
    notes:
      - '$C(n,r) = C(n, n-r)$——"选 $r$ 个拿走"等同于"选 $n-r$ 个留下"'
      - '排列是"有序选择"，组合是"无序选择"——判断标准是"交换位置结果是否变化"'
      - '帕斯卡三角每行之和为 $2^n$：$C(n,0)+C(n,1)+\cdots+C(n,n)=2^n$'
    notesEn:
      - '$C(n,r) = C(n,n-r)$ — choosing $r$ to take is the same as choosing $n-r$ to leave'
      - 'Permutation = ordered selection; Combination = unordered selection. Test: does swapping change the outcome?'
      - 'Each row of Pascal''s Triangle sums to $2^n$: $C(n,0)+C(n,1)+\cdots+C(n,n)=2^n$'

  - id: complementary-counting
    title: 补集计数法
    titleEn: Complementary Counting
    content: |
      **核心思想：正难则反**

      有些计数问题直接数很麻烦（情况太多、太杂），但如果换个角度，数**不满足条件的方案数**反而很简单。

      $$\text{满足条件的方案数} = \text{总方案数} - \text{不满足条件的方案数}$$

      这就是<<补集计数法/complementary counting>>——先算全集，再减去补集。

      **什么时候用补集计数？**

      当你看到这些关键词时，立刻想到补集计数：
      - **"至少一个"**（at least one）
      - **"不全是"**（not all the same）
      - **"不相邻"**（not adjacent）
      - 直接分类需要讨论大量情况

      **经典例子 1：至少一个 6**

      掷两个骰子，至少出现一个 6 的方案数？

      直接数：(6,1), (6,2), ..., (6,6), (1,6), (2,6), ..., (5,6)——容易遗漏或重复。

      补集法：
      - 总方案数：$6 \times 6 = 36$
      - 没有 6 的方案数：每个骰子只能出 1–5，共 $5 \times 5 = 25$
      - 至少一个 6：$36 - 25 = 11$

      **经典例子 2：不全相同**

      掷 3 个骰子，结果不全相同的方案数？

      补集法：
      - 总方案数：$6^3 = 216$
      - 三个全相同的方案数：(1,1,1), (2,2,2), ..., (6,6,6) = 6
      - 不全相同：$216 - 6 = 210$

      **经典例子 3：不相邻（AMC 8 高频考点）**

      4 个人排成一排，其中 A 和 B 不相邻，有多少种排法？

      补集法：
      - 总排法：$4! = 24$
      - A 和 B 相邻的排法：把 AB 捆绑成一个整体，与另外 2 人共 3 个元素排列 → $3! = 6$ 种，但 AB 内部可以交换 → $6 \times 2 = 12$
      - A 和 B 不相邻：$24 - 12 = 12$

      **补集计数的关键**：
      1. 准确计算"总数"
      2. 准确定义"补集"（反面条件）
      3. 确保补集恰好覆盖了所有不满足条件的情况
    contentEn: |
      **Core idea: when the direct approach is hard, count the opposite**

      Some counting problems are messy to attack head-on (too many cases), but the **complement** — counting what you do NOT want — may be simple.

      $$\text{Wanted} = \text{Total} - \text{Unwanted}$$

      This is <<补集计数法/complementary counting>> — compute the universe, then subtract the complement.

      **When to use complementary counting?**

      Reach for it whenever you see these keywords:
      - **"at least one"**
      - **"not all the same"**
      - **"not adjacent"**
      - Direct casework has too many branches

      **Classic example 1: at least one 6**

      Roll two dice. How many outcomes have at least one 6?

      Direct counting is error-prone (easy to double-count (6,6)).

      Complementary:
      - Total outcomes: $6 \times 6 = 36$
      - No 6 at all: each die shows 1–5, so $5 \times 5 = 25$
      - At least one 6: $36 - 25 = 11$

      **Classic example 2: not all the same**

      Roll 3 dice. How many outcomes are NOT all the same?

      Complementary:
      - Total: $6^3 = 216$
      - All three the same: (1,1,1), (2,2,2), ..., (6,6,6) = 6
      - Not all the same: $216 - 6 = 210$

      **Classic example 3: not adjacent (AMC 8 favorite)**

      4 people stand in a row. How many arrangements have A and B NOT next to each other?

      Complementary:
      - Total arrangements: $4! = 24$
      - A and B adjacent: tie AB into one block → 3 items to arrange → $3! = 6$; AB can swap internally → $6 \times 2 = 12$
      - A and B not adjacent: $24 - 12 = 12$

      **Keys to complementary counting**:
      1. Compute the total accurately
      2. Define the complement precisely
      3. Make sure the complement covers exactly what you don't want
    notes:
      - '"正难则反"是 AMC 8 计数题最常用的技巧——遇到"至少""不全"就该想到'
      - '补集计数最容易犯的错：忘记某些情况也属于补集，导致减少了'
      - '概率题也能用补集：$P(\text{至少一个}) = 1 - P(\text{一个都没有})$'
    notesEn:
      - '"Count the opposite" is the most commonly used AMC 8 counting technique — trigger words: "at least", "not all"'
      - 'Most common error: missing some cases in the complement, so you subtract too little'
      - 'Works for probability too: $P(\text{at least one}) = 1 - P(\text{none})$'

  - id: casework
    title: 分类讨论法
    titleEn: Systematic Casework
    content: |
      **什么是分类讨论？**

      当一个计数问题不能一步到位时，我们把它按某个标准**分成若干类**，分别计数，最后加起来。

      <<分类讨论法/systematic casework>>的两个原则（缺一不可）：

      1. **不重复（互斥）**：任何一个方案只能属于一类（Mutually Exclusive）
      2. **不遗漏（完备）**：所有方案都被某一类包含（Exhaustive）

      简记为：**不重不漏**。

      **如何选择分类标准？**

      好的分类标准能让每一类的计数变简单。常见策略：
      - **按某个关键变量的值分类**：如"第一个数字是几"
      - **按最大/最小值分类**：如"最大的牌是哪张"
      - **按某个约束条件分类**：如"是否包含 0"

      **例子：三位偶数**

      用数字 0, 1, 2, 3, 4 组成无重复数字的三位偶数，有多少个？

      按末位（个位）分类（偶数的个位只能是 0, 2, 4）：

      **Case 1：个位 = 0**
      百位：从 {1,2,3,4} 中选 1 个 → 4 种
      十位：从剩余 3 个中选 1 个 → 3 种
      小计：$4 \times 3 = 12$

      **Case 2：个位 = 2**
      百位：从 {1,3,4}（不能选 0 当百位，也不能再选 2）→ 3 种
      十位：从剩余 3 个（含 0）中选 1 个 → 3 种
      小计：$3 \times 3 = 9$

      **Case 3：个位 = 4**（与 Case 2 对称）
      小计：$3 \times 3 = 9$

      总计：$12 + 9 + 9 = 30$

      **AMC 8 中的分类讨论**

      分类讨论在 AMC 8 中极为常见，特别是：
      - **树形图法**：从第一步开始画分支，逐步展开所有可能
      - **按第一个选择分类**：先固定第一步的选择，再分别处理后续
      - **按特殊元素分类**：比如"0 在/不在百位""某人选/不选"

      **易错点**：
      - **遗漏情况**：忘记某一类（如忘了末位 = 0 和末位 ≠ 0 要分开讨论）
      - **重复计数**：两类之间有交叉
      - **分类不当**：选了一个让计算变复杂的标准
    contentEn: |
      **What is casework?**

      When a counting problem can't be solved in one shot, we split it into **several categories** based on some criterion, count each category separately, and add the results.

      Two principles of <<分类讨论法/systematic casework>> (both are essential):

      1. **No overlap (Mutually Exclusive)**: every outcome belongs to exactly one category
      2. **No gaps (Exhaustive)**: every outcome is covered by some category

      In short: **no double-counting, no omissions**.

      **How to choose the splitting criterion?**

      A good criterion makes each case easy to count. Common strategies:
      - **Split by a key variable's value**: e.g., "what is the first digit?"
      - **Split by max/min value**: e.g., "what is the largest card?"
      - **Split by a constraint**: e.g., "does the number contain 0?"

      **Example: three-digit even numbers**

      Using digits 0, 1, 2, 3, 4 (no repeats), how many three-digit even numbers can you form?

      Split by the units digit (must be 0, 2, or 4 for even):

      **Case 1: units = 0**
      Hundreds: choose from {1,2,3,4} → 4 choices
      Tens: choose from remaining 3 → 3 choices
      Subtotal: $4 \times 3 = 12$

      **Case 2: units = 2**
      Hundreds: from {1,3,4} (0 can't lead, 2 is used) → 3 choices
      Tens: from remaining 3 (including 0) → 3 choices
      Subtotal: $3 \times 3 = 9$

      **Case 3: units = 4** (symmetric to Case 2)
      Subtotal: $3 \times 3 = 9$

      Total: $12 + 9 + 9 = 30$

      **Casework in AMC 8**

      Casework is extremely common on AMC 8, especially:
      - **Tree diagrams**: branch out from the first step, expanding all possibilities
      - **Fix the first choice**: lock in step 1, then handle the rest
      - **Split by a special element**: e.g., "0 is / isn't in the hundreds place", "person X is / isn't selected"

      **Common mistakes**:
      - **Missing a case**: forgetting that units = 0 needs separate treatment from units ≠ 0
      - **Double-counting**: two categories overlap
      - **Poor criterion choice**: picking a split that makes calculation harder
    notes:
      - '分类讨论的口诀："不重不漏"——每个方案恰好属于一类'
      - '画树形图是最直观的分类讨论方式，适合步骤不超过 4 步的问题'
      - '遇到"0"参与的排列问题，一定要单独讨论 0 在首位的情况'
    notesEn:
      - 'Casework mantra: "no overlap, no gaps" — every outcome belongs to exactly one case'
      - 'Tree diagrams are the most visual form of casework; best when there are ≤ 4 steps'
      - 'When 0 is among the digits, always handle "0 in the leading position" as a separate case'

examples:
  - type: 1
    source: "AMC 8 2024 #8"
    title: 树形图分类——Taye 的钱
    titleEn: Tree Diagram Casework — Taye's Money
    question: |
      星期一 Taye 有 $\$2$。之后每天，他要么获得 $\$3$，要么把当前的钱翻倍。
      到星期四（3 天后），Taye 可能拥有多少种**不同的**金额？

      (A) 3 &emsp; (B) 4 &emsp; (C) 5 &emsp; (D) 6 &emsp; (E) 7
    questionEn: |
      On Monday Taye has $\$2$. Every day after that he either gains $\$3$ or doubles his money.
      How many different dollar amounts could Taye have on Thursday (3 days later)?

      (A) 3 &emsp; (B) 4 &emsp; (C) 5 &emsp; (D) 6 &emsp; (E) 7
    steps:
      - '从 $\$2$ 出发，每天有 2 个选择（+3 或 ×2），3 天共有 $2^3 = 8$ 条路径'
      - '画树形图，逐步计算每条路径的结果：'
      - '路径 +3, +3, +3：$2 \to 5 \to 8 \to 11$'
      - '路径 +3, +3, ×2：$2 \to 5 \to 8 \to 16$'
      - '路径 +3, ×2, +3：$2 \to 5 \to 10 \to 13$'
      - '路径 +3, ×2, ×2：$2 \to 5 \to 10 \to 20$'
      - '路径 ×2, +3, +3：$2 \to 4 \to 7 \to 10$'
      - '路径 ×2, +3, ×2：$2 \to 4 \to 7 \to 14$'
      - '路径 ×2, ×2, +3：$2 \to 4 \to 8 \to 11$'
      - '路径 ×2, ×2, ×2：$2 \to 4 \to 8 \to 16$'
      - '8 条路径的结果：11, 16, 13, 20, 10, 14, 11, 16'
      - '去重后的不同金额：$\{10, 11, 13, 14, 16, 20\}$，共 $\mathbf{6}$ 种'
    stepsEn:
      - 'Starting from $\$2$, each day has 2 choices (+3 or ×2), so $2^3 = 8$ paths over 3 days'
      - 'Draw a tree diagram and compute each path:'
      - 'Path +3, +3, +3: $2 \to 5 \to 8 \to 11$'
      - 'Path +3, +3, ×2: $2 \to 5 \to 8 \to 16$'
      - 'Path +3, ×2, +3: $2 \to 5 \to 10 \to 13$'
      - 'Path +3, ×2, ×2: $2 \to 5 \to 10 \to 20$'
      - 'Path ×2, +3, +3: $2 \to 4 \to 7 \to 10$'
      - 'Path ×2, +3, ×2: $2 \to 4 \to 7 \to 14$'
      - 'Path ×2, ×2, +3: $2 \to 4 \to 8 \to 11$'
      - 'Path ×2, ×2, ×2: $2 \to 4 \to 8 \to 16$'
      - 'The 8 outcomes: 11, 16, 13, 20, 10, 14, 11, 16'
      - 'Distinct values: $\{10, 11, 13, 14, 16, 20\}$ — that is $\mathbf{6}$ amounts'
    answer: '(D) 6'
    answerEn: '(D) 6'

  - type: 2
    source: "AMC 8 2020 #23"
    title: 容斥原理分配——五个奖给三人
    titleEn: Inclusion-Exclusion Distribution — Five Awards to Three Students
    question: |
      五个不同的奖项分给三个学生，每个学生至少获得一个奖项。
      有多少种不同的分配方式？

      (A) 120 &emsp; (B) 150 &emsp; (C) 180 &emsp; (D) 210 &emsp; (E) 240
    questionEn: |
      Five different awards are to be given to three students. Each student must receive at least one award.
      In how many ways can the awards be distributed?

      (A) 120 &emsp; (B) 150 &emsp; (C) 180 &emsp; (D) 210 &emsp; (E) 240
    steps:
      - '如果没有"每人至少一个"的限制，每个奖项有 3 个学生可选，总共 $3^5 = 243$ 种'
      - '用<<补集计数法/complementary counting>>减去"至少一个学生没得奖"的情况'
      - '设 $A_i$ = 学生 $i$ 没有获奖的分配方案集合'
      - '|$A_i$| = $2^5 = 32$（奖项只分给另外两人），有 $C(3,1) = 3$ 个这样的集合'
      - '|$A_i \cap A_j$| = $1^5 = 1$（所有奖项给唯一剩下的人），有 $C(3,2) = 3$ 对'
      - '由<<容斥原理/inclusion-exclusion>>：$|A_1 \cup A_2 \cup A_3| = 3 \times 32 - 3 \times 1 = 96 - 3 = 93$'
      - '满足条件的方案数 $= 243 - 93 = \mathbf{150}$'
    stepsEn:
      - 'Without the "at least one each" restriction, each award has 3 choices: $3^5 = 243$ total'
      - 'Use <<补集计数法/complementary counting>> to subtract distributions where at least one student gets nothing'
      - 'Let $A_i$ = set of distributions where student $i$ gets no award'
      - '$|A_i| = 2^5 = 32$ (awards go to the other two only); there are $C(3,1) = 3$ such sets'
      - '$|A_i \cap A_j| = 1^5 = 1$ (all awards go to the one remaining student); $C(3,2)=3$ pairs'
      - 'By <<容斥原理/inclusion-exclusion>>: $|A_1 \cup A_2 \cup A_3| = 3 \times 32 - 3 \times 1 = 93$'
      - 'Valid distributions $= 243 - 93 = \mathbf{150}$'
    answer: '(B) 150'
    answerEn: '(B) 150'

  - type: 3
    source: "AMC 8 2020 #10"
    title: 补集计数——弹珠不相邻
    titleEn: Complementary Counting — Marbles Not Adjacent
    question: |
      Zara 有 4 颗弹珠：Aggie、Bumblebee、Steelie 和 Tiger。
      她想把它们排成一排放在架子上，但不想让 Steelie 和 Tiger 相邻。
      有多少种排法？

      (A) 6 &emsp; (B) 8 &emsp; (C) 12 &emsp; (D) 18 &emsp; (E) 24
    questionEn: |
      Zara has a collection of 4 marbles: an Aggie, a Bumblebee, a Steelie, and a Tiger.
      She wants to display them in a row on a shelf, but does not want to put the Steelie and the Tiger next to each other.
      In how many ways can she do this?

      (A) 6 &emsp; (B) 8 &emsp; (C) 12 &emsp; (D) 18 &emsp; (E) 24
    steps:
      - '总排法：$4! = 24$'
      - '补集：Steelie 和 Tiger 相邻的排法'
      - '把 S 和 T "捆绑"成一个整体，与 A、B 共 3 个元素排列：$3! = 6$'
      - '捆绑内部 S 和 T 可以互换：$6 \times 2 = 12$'
      - 'S 和 T 不相邻的排法 $= 24 - 12 = \mathbf{12}$'
    stepsEn:
      - 'Total arrangements: $4! = 24$'
      - 'Complement: arrangements where S and T ARE adjacent'
      - 'Tie S and T into one block; arrange the block, A, and B as 3 items: $3! = 6$'
      - 'S and T can swap within the block: $6 \times 2 = 12$'
      - 'S and T NOT adjacent: $24 - 12 = \mathbf{12}$'
    answer: '(C) 12'
    answerEn: '(C) 12'

  - type: 4
    source: "AMC 8 2016 #17"
    title: 补集计数——ATM 密码
    titleEn: Complementary Counting — ATM Password
    question: |
      Fred 银行的 ATM 密码由四位数字组成（每位可以是 0 到 9，允许重复）。
      规定密码不能以 9, 1, 1 开头（即前三位不能是 911）。
      有多少种可能的密码？

      (A) 30 &emsp; (B) 7290 &emsp; (C) 9000 &emsp; (D) 9990 &emsp; (E) 9999
    questionEn: |
      An ATM password at Fred's Bank is composed of four digits from 0 to 9, with repeated digits allowed.
      No password may begin with the sequence 9, 1, 1.
      How many passwords are possible?

      (A) 30 &emsp; (B) 7290 &emsp; (C) 9000 &emsp; (D) 9990 &emsp; (E) 9999
    steps:
      - '总密码数：每位有 10 个选择，共 $10^4 = 10000$'
      - '补集：以 911 开头的密码。前三位固定为 9, 1, 1，第四位有 10 个选择，共 10 种'
      - '合法密码数 $= 10000 - 10 = \mathbf{9990}$'
    stepsEn:
      - 'Total passwords: $10^4 = 10000$ (each of 4 digits has 10 choices)'
      - 'Complement: passwords starting with 911. First three fixed, last has 10 choices → 10 passwords'
      - 'Valid passwords $= 10000 - 10 = \mathbf{9990}$'
    answer: '(D) 9990'
    answerEn: '(D) 9990'

