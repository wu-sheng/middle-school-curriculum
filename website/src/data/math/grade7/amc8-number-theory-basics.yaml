      questionEn: 'Find the LCM of 4 and 6 by listing: write multiples of 4 and multiples of 6, find the first common one.'
      hint: '4的倍数：4, 8, 12, 16, ... 6的倍数：6, 12, 18, ...'
      hintEn: 'Multiples of 4: 4, 8, 12, 16, ... Multiples of 6: 6, 12, 18, ...'
      answer: '第一个公共倍数是 12，所以 LCM(4,6) = 12。'
