  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #1"
      section: 整除判断
      question: '$222{,}222 - 22{,}222 - 2{,}222 - 222 - 22 - 2$ 的个位数字是多少？'
      questionEn: 'What is the ones digit of $222{,}222 - 22{,}222 - 2{,}222 - 222 - 22 - 2$?'
      choices:
        - label: A
          content: '0'
        - label: B
          content: '2'
        - label: C
          content: '4'
        - label: D
          content: '6'
        - label: E
          content: '8'
      correctValue: B
      answer: '(B) 2'
      answerEn: '(B) 2'
      explanation: |
        只需关注个位运算：$2 - 2 - 2 - 2 - 2 - 2$。
        逐步计算（注意借位）：$222222 - 22222 = 200000$，个位 0。
        $200000 - 2222 = 197778$，$197778 - 222 = 197556$，$197556 - 22 = 197534$，$197534 - 2 = 197532$。
        个位数字为 $\mathbf{2}$。
      explanationEn: |
        Focus on the ones digit: step by step subtraction.
        $222222 - 22222 = 200000$. $200000 - 2222 = 197778$. $197778 - 222 = 197556$.
        $197556 - 22 = 197534$. $197534 - 2 = 197532$.
        The ones digit is $\mathbf{2}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #7"
      section: 整除判断
      question: |
        五位数 $2018U$ 能被 9 整除。这个数除以 8 的余数是多少？
      questionEn: |
        The 5-digit number $2018U$ is divisible by 9. What is the remainder when this number is divided by 8?
      choices:
        - label: A
          content: '1'
        - label: B
          content: '3'
        - label: C
          content: '5'
        - label: D
          content: '6'
        - label: E
          content: '7'
      correctValue: B
      answer: '(B) 3'
      answerEn: '(B) 3'
      explanation: |
        被 9 整除：各位数字之和 $2+0+1+8+U = 11+U$ 必须是 9 的倍数。
        $U$ 是一位数字（0–9），$11+U$ 在 11–20 之间，唯一的 9 的倍数是 18，所以 $U=7$。
        该数为 $20187$。除以 8 看末三位：$187 \div 8 = 23 \cdots 3$。
        余数为 $\mathbf{3}$。
      explanationEn: |
        Divisibility by 9: digit sum $2+0+1+8+U = 11+U$ must be a multiple of 9.
        Since $U$ is a single digit, $11+U \in [11,20]$, so $11+U=18$, giving $U=7$.
        The number is 20187. For mod 8, check last three digits: $187 = 23 \times 8 + 3$.
        Remainder is $\mathbf{3}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #9"
      section: 整除判断
      question: '2016 的所有不同质因数之和是多少？'
      questionEn: 'What is the sum of the distinct prime integer divisors of 2016?'
      choices:
        - label: A
          content: '9'
        - label: B
          content: '12'
        - label: C
          content: '16'
        - label: D
          content: '49'
        - label: E
          content: '63'
      correctValue: B
      answer: '(B) 12'
      answerEn: '(B) 12'
      explanation: |
        做质因数分解：$2016 \div 2 = 1008$，$\div 2 = 504$，$\div 2 = 252$，$\div 2 = 126$，$\div 2 = 63$。
        $63 = 7 \times 9 = 7 \times 3^2$。
        所以 $2016 = 2^5 \times 3^2 \times 7$，不同质因数为 2、3、7。
        和 $= 2 + 3 + 7 = \mathbf{12}$。
      explanationEn: |
        Prime factorization: $2016 = 2^5 \times 3^2 \times 7$.
        Distinct primes: 2, 3, 7. Sum $= 2+3+7 = \mathbf{12}$.

    - number: 4
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #5"
      section: 整除判断
      question: |
        Aaliyah 投掷两个标准六面骰子，发现两个数的乘积是 6 的倍数。
        以下哪个数**不可能**是两个数的和？
      questionEn: |
        Aaliyah rolls two standard 6-sided dice. She notices that the product of the two numbers rolled is a multiple of 6.
        Which of the following integers cannot be the sum of the two numbers?
      choices:
        - label: A
          content: '5'
        - label: B
          content: '6'
        - label: C
          content: '7'
        - label: D
          content: '8'
        - label: E
          content: '9'
      correctValue: B
      answer: '(B) 6'
      answerEn: '(B) 6'
      explanation: |
        乘积是 6 的倍数，需要同时有因子 2 和因子 3。
        列出所有满足条件的骰子对及其和：
        $(1,6) \to 7$，$(2,3) \to 5$，$(2,6) \to 8$，$(3,2) \to 5$，$(3,4) \to 7$，$(3,6) \to 9$，
        $(4,3) \to 7$，$(4,6) \to 10$，$(5,6) \to 11$，$(6,1) \to 7$，$(6,2) \to 8$，$(6,3) \to 9$，
        $(6,4) \to 10$，$(6,5) \to 11$，$(6,6) \to 12$。
        可能的和：$\{5, 7, 8, 9, 10, 11, 12\}$。和为 6 不可能。
      explanationEn: |
        Product is a multiple of 6, so it needs both a factor of 2 and a factor of 3.
        List all valid dice pairs and sums:
        $(1,6)\to7$, $(2,3)\to5$, $(2,6)\to8$, $(3,4)\to7$, $(3,6)\to9$, $(4,6)\to10$, $(5,6)\to11$, $(6,6)\to12$, etc.
        Possible sums: $\{5,7,8,9,10,11,12\}$. Sum $= 6$ is impossible.

    - number: 5
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #7"
      section: 质因数分解
      question: |
        以下哪个数**不是**完全平方数？

        (A) $1^{2016}$ &emsp; (B) $2^{2017}$ &emsp; (C) $3^{2018}$ &emsp; (D) $4^{2019}$ &emsp; (E) $5^{2020}$
      questionEn: |
        Which of the following numbers is not a perfect square?

        (A) $1^{2016}$ &emsp; (B) $2^{2017}$ &emsp; (C) $3^{2018}$ &emsp; (D) $4^{2019}$ &emsp; (E) $5^{2020}$
      choices:
        - label: A
          content: '$1^{2016}$'
        - label: B
          content: '$2^{2017}$'
        - label: C
          content: '$3^{2018}$'
        - label: D
          content: '$4^{2019}$'
        - label: E
          content: '$5^{2020}$'
      correctValue: B
      answer: '(B) $2^{2017}$'
      answerEn: '(B) $2^{2017}$'
      explanation: |
        完全平方数要求质因数分解中每个质数的指数都是偶数。
        (A) $1^{2016} = 1$，是完全平方数 ✓
        (B) $2^{2017}$：指数 2017 是奇数 → **不是**完全平方数 ✗
        (C) $3^{2018}$：指数 2018 是偶数 ✓
        (D) $4^{2019} = (2^2)^{2019} = 2^{4038}$：指数 4038 是偶数 ✓
        (E) $5^{2020}$：指数 2020 是偶数 ✓
      explanationEn: |
        A perfect square requires every prime to have an even exponent.
        (A) $1^{2016}=1$ ✓ (B) $2^{2017}$: odd exponent → NOT a perfect square ✗
        (C) $3^{2018}$: even ✓ (D) $4^{2019}=2^{4038}$: even ✓ (E) $5^{2020}$: even ✓

    - number: 6
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #17"
      section: 质因数分解
      question: |
        2020 的因数中，有多少个因数本身拥有超过 3 个因数？
      questionEn: |
        How many factors of 2020 have more than 3 factors?
      choices:
        - label: A
          content: '6'
        - label: B
          content: '7'
        - label: C
          content: '8'
        - label: D
          content: '9'
        - label: E
          content: '10'
      correctValue: B
      answer: '(B) 7'
      answerEn: '(B) 7'
      explanation: |
        $2020 = 2^2 \times 5 \times 101$。
        2020 的所有因数：1, 2, 4, 5, 10, 20, 101, 202, 404, 505, 1010, 2020。
        逐一检查因数个数：
        1→1个，2→2个，4→3个，5→2个，10→4个 ✓，20→6个 ✓，
        101→2个，202→4个 ✓，404→6个 ✓，505→4个 ✓，1010→8个 ✓，2020→12个 ✓。
        超过 3 个因数的有：10, 20, 202, 404, 505, 1010, 2020，共 $\mathbf{7}$ 个。
      explanationEn: |
        $2020 = 2^2 \times 5 \times 101$. All factors: 1, 2, 4, 5, 10, 20, 101, 202, 404, 505, 1010, 2020.
        Check factor counts: 1→1, 2→2, 4→3, 5→2, 10→4✓, 20→6✓, 101→2, 202→4✓, 404→6✓, 505→4✓, 1010→8✓, 2020→12✓.
        Those with more than 3 factors: 10, 20, 202, 404, 505, 1010, 2020 — total $\mathbf{7}$.

    - number: 7
      type: 单选题
      inputType: mc
      source: "AMC 8 2022 #3"
      section: 质因数分解
      question: |
        三个正整数 $a$、$b$、$c$ 满足 $a \times b \times c = 100$ 且 $a < b < c$。
        这样的三元组 $(a,b,c)$ 有多少个？
      questionEn: |
        Three positive integers $a$, $b$, $c$ satisfy $a \times b \times c = 100$ and $a < b < c$.
        In how many ways can they be chosen?
      choices:
        - label: A
          content: '0'
        - label: B
          content: '1'
        - label: C
          content: '2'
        - label: D
          content: '3'
        - label: E
          content: '4'
      correctValue: E
      answer: '(E) 4'
      answerEn: '(E) 4'
      explanation: |
        $100 = 2^2 \times 5^2$。枚举所有满足 $a < b < c$ 的三元组：
        $(1, 2, 50)$：$1 \times 2 \times 50 = 100$ ✓
        $(1, 4, 25)$：$1 \times 4 \times 25 = 100$ ✓
        $(1, 5, 20)$：$1 \times 5 \times 20 = 100$ ✓
        $(2, 5, 10)$：$2 \times 5 \times 10 = 100$ ✓
        不合法的：$(1,10,10)$ 和 $(2,2,25)$ 因有重复不满足严格不等式，$(4,5,5)$ 同理。
        共 $\mathbf{4}$ 个。
      explanationEn: |
        $100 = 2^2 \times 5^2$. List all triples with $a<b<c$:
        $(1,2,50)$, $(1,4,25)$, $(1,5,20)$, $(2,5,10)$ — all check out.
        Triples like $(1,10,10)$, $(2,2,25)$, $(4,5,5)$ fail the strict inequality.
        Total: $\mathbf{4}$.

    - number: 8
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #14"
      section: 质因数分解
      question: |
        设 $N$ 是各位数字之积为 120 的最大五位数。$N$ 的各位数字之和是多少？
      questionEn: |
        Let $N$ be the greatest five-digit number whose digits have a product of 120. What is the sum of the digits of $N$?
      choices:
        - label: A
          content: '15'
        - label: B
          content: '16'
        - label: C
          content: '17'
        - label: D
          content: '18'
        - label: E
          content: '20'
      correctValue: D
      answer: '(D) 18'
      answerEn: '(D) 18'
      explanation: |
        要使五位数最大，需让高位数字尽可能大（按降序排列）。
        $120 = 2^3 \times 3 \times 5$。
        尝试首位为 9：$120 \div 9$ 不是整数。首位为 8：$120 \div 8 = 15$，剩余四位数字之积为 15。
        $15 = 5 \times 3 \times 1 \times 1$，数字集合为 $\{8, 5, 3, 1, 1\}$。
        降序排列：$N = 85311$，各位数字之和 $= 8+5+3+1+1 = \mathbf{18}$。
        验证其他方案：$\{6,5,4,1,1\}$ → $65411$（小于 85311）；$\{5,4,3,2,1\}$ → $54321$（更小）。
        85311 确实是最大的。
      explanationEn: |
        To maximize the five-digit number, arrange digits in descending order.
        $120 = 2^3 \times 3 \times 5$. Try leading digit 9: $120/9$ is not an integer.
        Leading digit 8: $120/8=15$. Remaining four digits with product 15: $\{5,3,1,1\}$.
        Digit set $\{8,5,3,1,1\}$ arranged descending: $N=85311$. Digit sum $= 8+5+3+1+1 = \mathbf{18}$.

    - number: 9
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #12"
      section: GCD 与 LCM
      question: |
        大于 1 的最小正整数，满足除以 4、5、6 都余 1，它在以下哪个范围内？
      questionEn: |
        The smallest positive integer greater than 1 that leaves a remainder of 1 when divided by 4, 5, and 6 lies between which pair of numbers?
      choices:
        - label: A
          content: '2 到 19'
        - label: B
          content: '20 到 39'
        - label: C
          content: '40 到 59'
        - label: D
          content: '60 到 79'
        - label: E
          content: '80 到 124'
      correctValue: D
      answer: '(D) 60 到 79'
      answerEn: '(D) 60–79'
      explanation: |
        设 $N \equiv 1 \pmod{4}$，$N \equiv 1 \pmod{5}$，$N \equiv 1 \pmod{6}$。
        则 $N - 1$ 同时被 4、5、6 整除，即 $N-1$ 是 $\text{LCM}(4,5,6)$ 的倍数。
        $\text{LCM}(4,5,6) = 60$。
        最小的 $N > 1$：$N - 1 = 60$，即 $N = 61$。
        61 在 60 到 79 之间。

        💡 **另一种方法——有序枚举：**
        除以 4 余 1 的数：5, 9, 13, 17, 21, 25, 29, 33, 37, 41, 45, 49, 53, 57, 61, ...
        除以 5 余 1 的数：6, 11, 16, 21, 26, 31, 36, 41, 46, 51, 56, 61, ...
        除以 6 余 1 的数：7, 13, 19, 25, 31, 37, 43, 49, 55, 61, ...
        第一个同时出现在三个列表中的数就是 **61**。虽然列举慢一些，但不需要知道 LCM 公式也能做出来！
      explanationEn: |
        $N \equiv 1 \pmod{4,5,6}$ means $N-1$ is divisible by 4, 5, and 6.
        $\text{LCM}(4,5,6)=60$. Smallest $N>1$: $N=60+1=61$, which lies in 60–79.

        💡 **Alternative — Systematic Enumeration:**
        Numbers leaving remainder 1 when divided by 4: 5, 9, 13, 17, 21, 25, 29, 33, 37, 41, 45, 49, 53, 57, 61, ...
        By 5: 6, 11, 16, 21, 26, 31, 36, 41, 46, 51, 56, 61, ...
        By 6: 7, 13, 19, 25, 31, 37, 43, 49, 55, 61, ...
        The first number appearing in all three lists is **61**. Slower than LCM, but works without knowing the formula!

    - number: 10
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #20"
      section: GCD 与 LCM
      question: |
        $a$ 和 $b$ 的最小公倍数为 12，$b$ 和 $c$ 的最小公倍数为 15。
        $a$ 和 $c$ 的最小公倍数的最小可能值是多少？
      questionEn: |
        The LCM of $a$ and $b$ is 12, and the LCM of $b$ and $c$ is 15. What is the least possible value of the LCM of $a$ and $c$?
      choices:
        - label: A
          content: '20'
        - label: B
          content: '30'
        - label: C
          content: '60'
        - label: D
          content: '120'
        - label: E
          content: '180'
      correctValue: A
      answer: '(A) 20'
      answerEn: '(A) 20'
      explanation: |
        $b$ 整除 $\text{LCM}(a,b)=12$ 且 $b$ 整除 $\text{LCM}(b,c)=15$，所以 $b \mid \gcd(12,15)=3$，$b \in \{1,3\}$。
        若 $b=3$：取 $a=4$（$\text{LCM}(4,3)=12$ ✓），$c=5$（$\text{LCM}(3,5)=15$ ✓），$\text{LCM}(4,5)=20$。
        若 $b=1$：$a=12$，$c=15$，$\text{LCM}(12,15)=60$。
        最小值 $= \mathbf{20}$。

        💡 **另一种方法——列表枚举：**
        先列出 12 的因数：1, 2, 3, 4, 6, 12。$b$ 必须是其中之一。
        再列出 15 的因数：1, 3, 5, 15。$b$ 也必须是其中之一。
        两个列表的公共元素：$b \in \{1, 3\}$。
        对每个 $b$，列出 $a$ 和 $c$ 的可能值，算出 LCM(a,c)，取最小即可。
      explanationEn: |
        $b$ divides both 12 and 15, so $b \mid \gcd(12,15)=3$. If $b=3$: $a=4$, $c=5$, $\text{LCM}(4,5)=20$. If $b=1$: $\text{LCM}(12,15)=60$. Minimum is $\mathbf{20}$.

        💡 **Alternative — Table Enumeration:**
        List factors of 12: 1, 2, 3, 4, 6, 12. $b$ must be one of these.
        List factors of 15: 1, 3, 5, 15. $b$ must also be one of these.
        Common values: $b \in \{1, 3\}$.
        For each $b$, list possible $a$ and $c$, compute LCM(a,c), and pick the smallest.

    - number: 11
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #24"
      section: GCD 与 LCM
      question: |
        Sanders 奶奶有三个孙子，分别每 3 天、每 4 天、每 5 天给她打一次电话。
        三人都在 2016 年 12 月 31 日打了电话。在接下来的 2017 年（365 天）中，Sanders 奶奶有多少天**没有**接到电话？
      questionEn: |
        Mrs. Sanders has three grandchildren who call her at intervals of 3 days, 4 days, and 5 days respectively.
        All three called her on December 31, 2016. On how many days during the next year (2017, which has 365 days) did she not receive a phone call?
      choices:
        - label: A
          content: '78'
        - label: B
          content: '80'
        - label: C
          content: '144'
        - label: D
          content: '146'
        - label: E
          content: '152'
      correctValue: D
      answer: '(D) 146'
      answerEn: '(D) 146'
      explanation: |
        用容斥原理求至少接到一个电话的天数：
        每 3 天：$\lfloor 365/3 \rfloor = 121$。每 4 天：$\lfloor 365/4 \rfloor = 91$。每 5 天：$\lfloor 365/5 \rfloor = 73$。
        每 $\text{LCM}(3,4)=12$ 天：$\lfloor 365/12 \rfloor = 30$。
        每 $\text{LCM}(3,5)=15$ 天：$\lfloor 365/15 \rfloor = 24$。
        每 $\text{LCM}(4,5)=20$ 天：$\lfloor 365/20 \rfloor = 18$。
        每 $\text{LCM}(3,4,5)=60$ 天：$\lfloor 365/60 \rfloor = 6$。
        有电话的天数 $= 121+91+73-30-24-18+6 = 219$。
        没有电话 $= 365 - 219 = \mathbf{146}$。
      explanationEn: |
        By inclusion-exclusion:
        Every 3 days: $\lfloor365/3\rfloor=121$. Every 4: 91. Every 5: 73.
        Every 12: 30. Every 15: 24. Every 20: 18. Every 60: 6.
        Days with calls $= 121+91+73-30-24-18+6 = 219$.
        Days without $= 365-219 = \mathbf{146}$.

    - number: 12
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #15"
      section: GCD 与 LCM
      question: '$13^4 - 11^4$ 能被 2 的最高多少次幂整除？'
      questionEn: 'What is the largest power of 2 that is a divisor of $13^4 - 11^4$?'
      choices:
        - label: A
          content: '8'
        - label: B
          content: '16'
        - label: C
          content: '32'
        - label: D
          content: '64'
        - label: E
          content: '128'
      correctValue: C
      answer: '(C) 32'
      answerEn: '(C) 32'
      explanation: |
        用平方差分解：$13^4 - 11^4 = (13^2 + 11^2)(13^2 - 11^2) = (169+121)(169-121) = 290 \times 48$。
        $290 = 2 \times 145 = 2 \times 5 \times 29$。
        $48 = 2^4 \times 3$。
        $290 \times 48 = 2^1 \times 5 \times 29 \times 2^4 \times 3 = 2^5 \times 3 \times 5 \times 29$。
        最高 2 的幂次为 $2^5 = \mathbf{32}$。
      explanationEn: |
        Difference of squares: $13^4-11^4 = (13^2+11^2)(13^2-11^2) = 290 \times 48$.
        $290 = 2 \times 5 \times 29$, $48 = 2^4 \times 3$.
        Product $= 2^5 \times 3 \times 5 \times 29$. Largest power of 2: $2^5 = \mathbf{32}$.

    - number: 13
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #11"
      section: 数字题
      question: |
        有多少个两位数满足：它与其反转数之和等于 132？
      questionEn: |
        Determine how many two-digit numbers satisfy the following property: when the number is added to the number obtained by reversing its digits, the sum is 132.
      choices:
        - label: A
          content: '5'
        - label: B
          content: '7'
        - label: C
          content: '9'
        - label: D
          content: '11'
        - label: E
          content: '12'
      correctValue: B
      answer: '(B) 7'
      answerEn: '(B) 7'
      explanation: |
        设两位数为 $\overline{ab} = 10a+b$，反转为 $10b+a$。
        和 $= (10a+b) + (10b+a) = 11(a+b) = 132$，所以 $a+b=12$。
        合法的两位数：$a$ 从 1 到 9，$b$ 从 0 到 9，$a+b=12$。
        $(a,b) = (3,9), (4,8), (5,7), (6,6), (7,5), (8,4), (9,3)$，共 $\mathbf{7}$ 个。

        💡 **另一种方法——逐个验证：**
        两位数 + 反转数 = 132，所以两位数 < 132。从十位 = 3 开始试：
        39 + 93 = 132 ✓，48 + 84 = 132 ✓，57 + 75 = 132 ✓，66 + 66 = 132 ✓，
        75 + 57 = 132 ✓，84 + 48 = 132 ✓，93 + 39 = 132 ✓。共 7 个。
        这种"逐个试"的方法虽然不如公式快，但不容易出错！
      explanationEn: |
        Let the number be $10a+b$, its reverse $10b+a$. Sum $= 11(a+b) = 132$, so $a+b=12$.
        Valid pairs: $(3,9),(4,8),(5,7),(6,6),(7,5),(8,4),(9,3)$ — total $\mathbf{7}$.

        💡 **Alternative — Try Each Candidate:**
        Number + reverse = 132, so the number < 132. Start from tens digit = 3:
        39+93=132 ✓, 48+84=132 ✓, 57+75=132 ✓, 66+66=132 ✓,
        75+57=132 ✓, 84+48=132 ✓, 93+39=132 ✓. Total: 7.
        Trying each one is slower but much less error-prone!

    - number: 14
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #7"
      section: 数字题
      question: |
        设 $Z$ 是一个六位正整数（如 247247），其前三位数字与后三位数字相同且顺序相同。
        以下哪个数一定是 $Z$ 的因数？
      questionEn: |
        Let $Z$ be a 6-digit positive integer, such as 247247, whose first three digits are the same as its last three digits in the same order. Which of the following numbers must be a factor of $Z$?
      choices:
        - label: A
          content: '11'
        - label: B
          content: '19'
        - label: C
          content: '101'
        - label: D
          content: '111'
        - label: E
          content: '1111'
      correctValue: A
      answer: '(A) 11'
      answerEn: '(A) 11'
      explanation: |
        设前三位为 $\overline{abc}$，则 $Z = \overline{abc} \times 1000 + \overline{abc} = \overline{abc} \times 1001$。
        $1001 = 7 \times 11 \times 13$。
        检查选项：$11 \mid 1001$ ✓，$19 \nmid 1001$，$101 \nmid 1001$，$111 \nmid 1001$，$1111 \nmid 1001$。
        所以 $\mathbf{11}$ 一定是 $Z$ 的因数。
      explanationEn: |
        Let the first three digits form number $N$. Then $Z = N \times 1001$.
        $1001 = 7 \times 11 \times 13$. Among the choices, only 11 divides 1001.
        So $\mathbf{11}$ must be a factor of $Z$.

    - number: 15
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #4"
      section: 数字题
      question: |
        允智把 1 到 9 的整数全部加起来时，不小心漏掉了一个数。她得到的错误结果恰好是一个完全平方数。她漏掉的是哪个数？
      questionEn: |
        When Yunji added all the integers from 1 to 9, she mistakenly left out a number. Her incorrect sum turned out to be a square number. What number did Yunji leave out?
      choices:
        - label: A
          content: '5'
        - label: B
          content: '6'
        - label: C
          content: '7'
        - label: D
          content: '8'
        - label: E
          content: '9'
      correctValue: E
      answer: '(E) 9'
      answerEn: '(E) 9'
      explanation: |
        $1+2+3+\cdots+9 = 45$。漏掉数字 $n$ 后，和为 $45 - n$，需要是完全平方数。
        逐一检查选项：$45-5=40$（非完全平方），$45-6=39$（非），$45-7=38$（非），$45-8=37$（非），
        $45-9=36=6^2$ ✓。漏掉的是 $\mathbf{9}$。
      explanationEn: |
        $1+2+\cdots+9=45$. Removing $n$ gives $45-n$, which must be a perfect square.
        $45-9=36=6^2$ ✓. The missing number is $\mathbf{9}$.

