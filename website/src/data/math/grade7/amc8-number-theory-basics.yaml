examPrep:
  intro: 以下为 AMC 8 真题精选，难度略高于练习题，综合考查数论知识。
  introEn: The following are selected AMC 8 problems at a slightly higher level, testing combined number theory skills.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #8"
      section: 综合
      question: |
        Malcolm 的门牌号是一个两位数。以下四个陈述中，恰好有三个为真：
        (1) 它是质数；(2) 它是偶数；(3) 它能被 7 整除；(4) 它的某个数字是 9。
        这个门牌号的个位数字是多少？
      questionEn: |
        Malcolm's two-digit house number has the property that exactly three of the following four statements about it are true:
        (1) It is prime. (2) It is even. (3) It is divisible by 7. (4) One of its digits is 9.
        What is its units digit?
      choices:
        - label: A
          content: '4'
        - label: B
          content: '6'
        - label: C
          content: '7'
        - label: D
          content: '8'
        - label: E
          content: '9'
      correctValue: D
      answer: '(D) 8'
      answerEn: '(D) 8'
      explanation: |
        恰好三真一假，逐一试哪个为假：
        **假设 (1) 为假**（不是质数），其余三个为真：偶数、被 7 整除、含数字 9。
        偶数且被 7 整除 → 被 14 整除。两位数中 14 的倍数：14, 28, 42, 56, 70, 84, 98。
        含数字 9 的：只有 98。98 不是质数 ✓，偶数 ✓，$98 \div 7 = 14$ ✓，含 9 ✓。恰好三真一假 ✓。
        **假设 (2) 为假**（奇数），要求质数、被 7 整除、含 9。唯一被 7 整除的质数是 7（一位数），无两位数解。
        **假设 (3) 为假**：要求质数、偶数、含 9。唯一的偶质数是 2（一位数），无解。
        **假设 (4) 为假**：要求质数、偶数、被 7 整除。偶质数只有 2，不被 7 整除，无解。
        唯一解：$N = 98$，个位数字为 $\mathbf{8}$。
      explanationEn: |
        Exactly 3 of 4 are true, so exactly 1 is false. Test each case:
        **(1) false**: not prime, but even, divisible by 7, has digit 9. Even multiples of 7 (multiples of 14) with a 9: only 98. Check: not prime ✓, even ✓, $98/7=14$ ✓, has 9 ✓. Works!
        **(2) false**: odd prime divisible by 7 with digit 9 — only prime divisible by 7 is 7 itself (one digit). No solution.
        **(3) false**: even prime with digit 9 — only even prime is 2. No solution.
        **(4) false**: even prime divisible by 7 — impossible. No solution.
        Answer: $N=98$, units digit $\mathbf{8}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #19"
      section: 综合
      question: |
        $5^n$ 能整除 $98! + 99! + 100!$ 的最大正整数 $n$ 是多少？
      questionEn: |
        What is the largest integer $n$ for which $5^n$ is a factor of $98! + 99! + 100!$?
      choices:
        - label: A
          content: '23'
        - label: B
          content: '24'
        - label: C
          content: '25'
        - label: D
          content: '26'
        - label: E
          content: '27'
      correctValue: D
      answer: '(D) 26'
      answerEn: '(D) 26'
      explanation: |
        提公因式：$98! + 99! + 100! = 98!(1 + 99 + 99 \times 100) = 98! \times (1 + 99 + 9900) = 98! \times 10000$。
        $10000 = 10^4 = 2^4 \times 5^4$，所以 $v_5(10000) = 4$。
        用 Legendre 公式求 $v_5(98!)$：
        $\lfloor 98/5 \rfloor + \lfloor 98/25 \rfloor + \lfloor 98/125 \rfloor = 19 + 3 + 0 = 22$。
        因此 $v_5(98! \times 10000) = 22 + 4 = \mathbf{26}$。
      explanationEn: |
        Factor out: $98!+99!+100! = 98!(1+99+99\times100) = 98! \times 10000$.
        $10000 = 2^4 \times 5^4$, so $v_5(10000)=4$.
        Legendre's formula: $v_5(98!) = \lfloor98/5\rfloor + \lfloor98/25\rfloor + \lfloor98/125\rfloor = 19+3+0 = 22$.
        Total: $22+4 = \mathbf{26}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #21"
      section: 综合
      question: |
        有多少个正的三位整数满足：除以 6 余 2，除以 9 余 5，除以 11 余 7？
      questionEn: |
        How many positive three-digit integers have a remainder of 2 when divided by 6, a remainder of 5 when divided by 9, and a remainder of 7 when divided by 11?
      choices:
        - label: A
          content: '1'
        - label: B
          content: '2'
        - label: C
          content: '3'
        - label: D
          content: '4'
        - label: E
          content: '5'
      correctValue: E
      answer: '(E) 5'
      answerEn: '(E) 5'
      explanation: |
        $N \equiv 2 \pmod{6}$：$N$ 是偶数且 $N \equiv 2 \pmod{3}$。
        $N \equiv 5 \pmod{9}$：因为 $5 \equiv 2 \pmod{3}$，自动满足 $N \equiv 2 \pmod{3}$。
        结合"偶数"和"$N \equiv 5 \pmod{9}$"：$N \equiv 5 \pmod{9}$ 的偶数序列为 $14, 32, 50, 68, 86, \ldots$，即 $N \equiv 14 \pmod{18}$。
        再加条件 $N \equiv 7 \pmod{11}$，用中国剩余定理：
        $N = 18k + 14$。需 $18k + 14 \equiv 7 \pmod{11}$，即 $7k \equiv 4 \pmod{11}$。
        $7^{-1} \equiv 8 \pmod{11}$（因 $7 \times 8 = 56 \equiv 1$），所以 $k \equiv 32 \equiv 10 \pmod{11}$。
        $k = 11m + 10$，$N = 198m + 194$。
        三位数范围 $100 \le 198m + 194 \le 999$：$m \in \{0, 1, 2, 3, 4\}$。
        对应 $N \in \{194, 392, 590, 788, 986\}$，共 $\mathbf{5}$ 个。
        验证 $N=194$：$194/6 = 32 \cdots 2$ ✓，$194/9 = 21 \cdots 5$ ✓，$194/11 = 17 \cdots 7$ ✓。
      explanationEn: |
        $N \equiv 2 \pmod{6}$ means $N$ is even and $N \equiv 2 \pmod{3}$.
        $N \equiv 5 \pmod{9}$ automatically gives $N \equiv 2 \pmod{3}$.
        Combining even + mod 9: $N \equiv 14 \pmod{18}$.
        Adding $N \equiv 7 \pmod{11}$ via CRT: $N = 18k+14$, need $7k \equiv 4 \pmod{11}$, so $k \equiv 10 \pmod{11}$.
        $N = 198m + 194$. Three-digit range: $m \in \{0,1,2,3,4\}$, giving $N \in \{194, 392, 590, 788, 986\}$. Total: $\mathbf{5}$.

    - number: 4
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #19"
      section: 综合
      question: |
        如果一个数的各位数字在两个不同数字之间交替出现，就称它为"翻转数"（flippy number）。
        例如 2020 和 37373 是翻转数，而 3883 和 123123 不是。
        有多少个五位翻转数能被 15 整除？
      questionEn: |
        A number is called flippy if its digits alternate between two distinct digits. For example, 2020 and 37373 are flippy, but 3883 and 123123 are not.
        How many five-digit flippy numbers are divisible by 15?
      choices:
        - label: A
          content: '3'
        - label: B
          content: '4'
        - label: C
          content: '5'
        - label: D
          content: '6'
        - label: E
          content: '8'
      correctValue: B
      answer: '(B) 4'
      answerEn: '(B) 4'
      explanation: |
        五位翻转数形如 $ababa$（$a \neq b$，$a \neq 0$）。
        被 15 整除 = 被 3 整除 AND 被 5 整除。
        被 5 整除：末位 $a \in \{0, 5\}$。若 $a=0$，首位也是 0，不是五位数。所以 $a=5$。
        数为 $5b5b5$，各位数字之和 $= 15 + 2b$。
        被 3 整除：$15 + 2b \equiv 0 \pmod{3}$，即 $2b \equiv 0 \pmod{3}$，即 $b \equiv 0 \pmod{3}$。
        $b \in \{0, 3, 6, 9\}$（均不等于 5），对应：50505、53535、56565、59595。
        共 $\mathbf{4}$ 个。
      explanationEn: |
        Five-digit flippy: $ababa$ with $a \neq b$, $a \neq 0$.
        Divisible by 15 means divisible by 3 and 5. Last digit $a \in \{0,5\}$; $a=0$ makes it invalid, so $a=5$.
        Number is $5b5b5$, digit sum $= 15+2b$. Divisible by 3: $2b \equiv 0 \pmod{3}$, so $b \in \{0,3,6,9\}$.
        Numbers: 50505, 53535, 56565, 59595 — total $\mathbf{4}$.

    - number: 5
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #25"
      section: 综合
      question: |
        在 $2^8 + 1$ 和 $2^{18} + 1$ 之间（含两端），有多少个完全立方数？
      questionEn: |
        How many perfect cubes lie between $2^8 + 1$ and $2^{18} + 1$, inclusive?
      choices:
        - label: A
          content: '4'
        - label: B
          content: '9'
        - label: C
          content: '10'
        - label: D
          content: '57'
        - label: E
          content: '58'
      correctValue: E
      answer: '(E) 58'
      answerEn: '(E) 58'
      explanation: |
        $2^8 + 1 = 257$，$2^{18} + 1 = 262145$。
        求满足 $257 \le n^3 \le 262145$ 的正整数 $n$。
        $\sqrt[3]{257} \approx 6.36$，所以 $n \ge 7$（$7^3 = 343 \ge 257$ ✓）。
        $\sqrt[3]{262145} \approx 64.0$，因为 $64^3 = 262144 \le 262145$ ✓，而 $65^3 = 274625 > 262145$。
        所以 $n$ 从 7 到 64，共 $64 - 7 + 1 = \mathbf{58}$ 个完全立方数。
      explanationEn: |
        $2^8+1=257$, $2^{18}+1=262145$.
        Find $n$ with $257 \le n^3 \le 262145$.
        $\sqrt[3]{257}\approx6.36 \Rightarrow n \ge 7$ ($7^3=343$). $64^3=262144 \le 262145$, $65^3=274625>262145$.
        So $n$ ranges from 7 to 64: $64-7+1 = \mathbf{58}$ perfect cubes.
