      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $xy + 2 = 5$ 是<<二元一次方程/linear equation in two variables>>。
      questionEn: |
        $xy + 2 = 5$ is a <<二元一次方程/linear equation in two variables>>.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        $xy$ 项中两个<<未知数/unknown>>相乘，该项次数为 $2$，不满足"一次"的条件。
      explanationEn: |
        In the $xy$ term, two <<未知数/unknown>>s are multiplied, giving degree $2$, which does not satisfy the "first degree" condition.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $\begin{cases} x = 2 \\ y = 1 \end{cases}$ 是<<方程组/system of equations>> $\begin{cases} x + y = 3 \\ 2x + y = 6 \end{cases}$ 的<<解/solution>>。
      questionEn: |
        $\begin{cases} x = 2 \\ y = 1 \end{cases}$ is a <<解/solution>> of the <<方程组/system of equations>> $\begin{cases} x + y = 3 \\ 2x + y = 6 \end{cases}$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        代入第一个<<方程/equation>>：$2 + 1 = 3$，成立。代入第二个<<方程/equation>>：$2 \times 2 + 1 = 5 \neq 6$，不成立。必须同时满足两个<<方程/equation>>才是<<解/solution>>。
      explanationEn: |
        Substitute into the first <<方程/equation>>: $2 + 1 = 3$, true. Into the second: $2 \times 2 + 1 = 5 \neq 6$, false. Both <<方程/equation>>s must be satisfied simultaneously.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        用<<代入消元法/substitution method>>解<<方程组/system of equations>>时，应将变形后的<<式子/expression>>代入另一个<<方程/equation>>（不是变形所用的那个<<方程/equation>>）。
      questionEn: |
        When using the <<代入消元法/substitution method>>, the transformed <<式子/expression>> should be substituted into the other <<方程/equation>> (not the one used for the transformation).
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        如果代入变形所用的那个<<方程/equation>>，会得到恒等式（如 $0 = 0$），无法求出<<未知数/unknown>>的值。
      explanationEn: |
        If you substitute into the same <<方程/equation>> used for transformation, you get an identity (like $0 = 0$) and cannot determine the <<未知数/unknown>>.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        用<<加减消元法/elimination by addition or subtraction>>时，如果两个<<方程/equation>>中某<<未知数/unknown>>的<<系数/coefficient>>互为相反数，应将两个<<方程/equation>>**相加**。
      questionEn: |
        When using <<加减消元法/elimination by addition or subtraction>>, if the <<系数/coefficient>>s of one <<未知数/unknown>> in the two <<方程/equation>>s are opposite numbers, the two <<方程/equation>>s should be **added**.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        <<系数/coefficient>>互为相反数时，相加后该<<未知数/unknown>>的<<系数/coefficient>>之和为 $0$，正好消去。例如 $+3y$ 和 $-3y$ 相加为 $0$。
      explanationEn: |
        When <<系数/coefficient>>s are opposites, their sum is $0$ when the equations are added, eliminating that <<未知数/unknown>>. For example, $+3y$ and $-3y$ sum to $0$.

    - number: 9
      type: 解方程组题
      inputType: open
      section: 三、解方程组
      sectionEn: "III. Solve the System"
      question: |
        用<<代入消元法/substitution method>>解<<方程组/system of equations>>：
        $$\begin{cases} y = 3x - 1 \\ 5x + 2y = 20 \end{cases}$$
      questionEn: |
        Solve by <<代入消元法/substitution method>>:
        $$\begin{cases} y = 3x - 1 \\ 5x + 2y = 20 \end{cases}$$
      answer: |
        将①代入②：$5x + 2(3x - 1) = 20$
        $5x + 6x - 2 = 20$
        $11x = 22$
        $x = 2$
        回代入①：$y = 3 \times 2 - 1 = 5$
        所以 $\begin{cases} x = 2 \\ y = 5 \end{cases}$
      answerEn: |
        Substitute ① into ②: $5x + 2(3x - 1) = 20$
        $5x + 6x - 2 = 20$
        $11x = 22$
        $x = 2$
        Back-substitute into ①: $y = 3 \times 2 - 1 = 5$
        So $\begin{cases} x = 2 \\ y = 5 \end{cases}$
      explanation: |
        ①已经是 $y = \ldots$ 的形式，直接代入②即可<<消元/elimination>>。
      explanationEn: |
        ① is already in the form $y = \ldots$, so substituting directly into ② achieves <<消元/elimination>>.

    - number: 10
      type: 解方程组题
      inputType: open
      section: 三、解方程组
      sectionEn: "III. Solve the System"
      question: |
        用<<加减消元法/elimination by addition or subtraction>>解<<方程组/system of equations>>：
        $$\begin{cases} 4x + 3y = 11 \\ 2x + 3y = 7 \end{cases}$$
      questionEn: |
        Solve by <<加减消元法/elimination by addition or subtraction>>:
        $$\begin{cases} 4x + 3y = 11 \\ 2x + 3y = 7 \end{cases}$$
      answer: |
        $y$ 的<<系数/coefficient>>相同，两式相减：
        ① $-$ ②：$(4x + 3y) - (2x + 3y) = 11 - 7$
        $2x = 4$
        $x = 2$
        代入②：$2 \times 2 + 3y = 7$，$3y = 3$，$y = 1$
        所以 $\begin{cases} x = 2 \\ y = 1 \end{cases}$
      answerEn: |
        The <<系数/coefficient>>s of $y$ are the same; subtract:
        ① $-$ ②: $(4x + 3y) - (2x + 3y) = 11 - 7$
        $2x = 4$
        $x = 2$
        Substitute into ②: $2 \times 2 + 3y = 7$, $3y = 3$, $y = 1$
        So $\begin{cases} x = 2 \\ y = 1 \end{cases}$
      explanation: |
        两个<<方程/equation>>中 $y$ 的<<系数/coefficient>>都是 $3$，<<系数/coefficient>>相同用减法消去 $y$。
      explanationEn: |
        The <<系数/coefficient>> of $y$ is $3$ in both <<方程/equation>>s; same <<系数/coefficient>>s mean we subtract to eliminate $y$.

    - number: 11
      type: 生活应用题
      inputType: open
      section: 四、生活应用题
      sectionEn: "IV. Real-Life Application"
      question: |
        学校组织春游，租大巴和中巴共 $5$ 辆，大巴每辆坐 $50$ 人，中巴每辆坐 $30$ 人，共坐 $190$ 人。问大巴和中巴各租了几辆？请用<<二元一次方程组/system of linear equations in two variables>>解答。
      questionEn: |
        A school rents $5$ buses (large and medium) for a trip. Each large bus seats $50$ people, each medium bus seats $30$ people, and $190$ people need seats. How many of each type were rented? Solve using a <<二元一次方程组/system of linear equations in two variables>>.
      answer: |
        设大巴 $x$ 辆，中巴 $y$ 辆。
        $\begin{cases} x + y = 5 \quad \text{①} \\ 50x + 30y = 190 \quad \text{②} \end{cases}$
        由①得 $y = 5 - x$ ③
        代入②：$50x + 30(5 - x) = 190$
        $50x + 150 - 30x = 190$
        $20x = 40$
        $x = 2$
        $y = 5 - 2 = 3$
        <<检验/verify>>：$2 + 3 = 5$，$50 \times 2 + 30 \times 3 = 100 + 90 = 190$，正确。
        大巴 $2$ 辆，中巴 $3$ 辆。
      answerEn: |
        Let large buses be $x$, medium buses be $y$.
        $\begin{cases} x + y = 5 \quad \text{①} \\ 50x + 30y = 190 \quad \text{②} \end{cases}$
        From ①: $y = 5 - x$ ③
        Substitute into ②: $50x + 30(5 - x) = 190$
        $50x + 150 - 30x = 190$
        $20x = 40$
        $x = 2$
        $y = 5 - 2 = 3$
        <<检验/verify>>: $2 + 3 = 5$, $50 \times 2 + 30 \times 3 = 100 + 90 = 190$, correct.
        $2$ large buses, $3$ medium buses.
      explanation: |
        两个等量关系：车辆总数为 $5$，乘客总数为 $190$。分别列出一个<<方程/equation>>。
      explanationEn: |
        Two equal relationships: total number of buses is $5$, total number of passengers is $190$. Each gives one <<方程/equation>>.

    - number: 12
      type: 综合题
      inputType: open
      section: 五、综合题
      sectionEn: "V. Comprehensive Problem"
      question: |
        甲、乙两人同时从 $A$、$B$ 两地出发相向而行。甲每小时走 $4$ 千米，乙每小时走 $6$ 千米，$3$ 小时后他们相遇。
        (1) $A$、$B$ 两地相距多少千米？
        (2) 相遇时甲、乙各走了多少千米？
        请用<<二元一次方程组/system of linear equations in two variables>>解答，并<<检验/verify>>你的答案。
      questionEn: |
        Two people start simultaneously from locations $A$ and $B$, walking toward each other. Person A walks at $4$ km/h, person B at $6$ km/h. They meet after $3$ hours.
        (1) What is the distance between $A$ and $B$?
        (2) How far did each person walk before they met?
        Solve using a <<二元一次方程组/system of linear equations in two variables>> and <<检验/verify>> your answer.
      answer: |
        设甲走了 $x$ 千米，乙走了 $y$ 千米。
        等量关系1（路程与速度、时间）：$x = 4 \times 3 = 12$，$y = 6 \times 3 = 18$
        也可以列成<<方程组/system of equations>>：
        $\begin{cases} x + y = (4 + 6) \times 3 \quad \text{①（总路程 = 两人路程之和）} \\ x = 4 \times 3 \quad \text{②（甲的路程）} \end{cases}$
        由②：$x = 12$
        代入①：$12 + y = 30$，$y = 18$
        (1) $A$、$B$ 两地相距 $x + y = 12 + 18 = 30$ 千米
        (2) 甲走了 $12$ 千米，乙走了 $18$ 千米
        <<检验/verify>>：$12 + 18 = 30 = (4+6) \times 3$，正确。
      answerEn: |
        Let person A walk $x$ km, person B walk $y$ km.
        Set up the <<方程组/system of equations>>:
        $\begin{cases} x + y = (4 + 6) \times 3 \quad \text{① (total distance = sum of distances)} \\ x = 4 \times 3 \quad \text{② (A's distance)} \end{cases}$
        From ②: $x = 12$
        Substitute into ①: $12 + y = 30$, $y = 18$
        (1) Distance between $A$ and $B$ is $x + y = 12 + 18 = 30$ km
        (2) Person A walked $12$ km, person B walked $18$ km
        <<检验/verify>>: $12 + 18 = 30 = (4+6) \times 3$, correct.
      explanation: |
        行程问题的基本关系：路程 $=$ 速度 $\times$ 时间。相向而行时，相遇意味着两人走的总路程等于两地之间的距离。
      explanationEn: |
        Basic relationship in distance problems: distance $=$ speed $\times$ time. When walking toward each other, meeting means the sum of their distances equals the distance between the two locations.

