  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        若 $\begin{cases} x = 1 \\ y = 2 \end{cases}$ 是<<方程组/system of equations>> $\begin{cases} ax + by = 4 \\ ax - by = 0 \end{cases}$ 的<<解/solution>>，则 $a + b = $（　）
      questionEn: |
        If $\begin{cases} x = 1 \\ y = 2 \end{cases}$ is the <<解/solution>> of the <<方程组/system of equations>> $\begin{cases} ax + by = 4 \\ ax - by = 0 \end{cases}$, then $a + b = $ ( )
      subInputs:
        - prompt: 选择答案
          options: ["$1$", "$2$", "$3$", "$4$"]
          correctValue: "$3$"
      answer: "$3$"
      answerEn: "$3$"
      explanation: |
        将 $x = 1$，$y = 2$ 代入<<方程组/system of equations>>：
        $\begin{cases} a + 2b = 4 \quad \text{①} \\ a - 2b = 0 \quad \text{②} \end{cases}$
        ① $+$ ②：$2a = 4$，$a = 2$
        代入②：$2 - 2b = 0$，$b = 1$
        所以 $a + b = 2 + 1 = 3$。
        这道题考查"已知<<解/solution>>求参数"——把<<解/solution>>代入后，关于 $a$、$b$ 又得到一个新的<<方程组/system of equations>>来求解！
      explanationEn: |
        Substitute $x = 1$, $y = 2$ into the <<方程组/system of equations>>:
        $\begin{cases} a + 2b = 4 \quad \text{①} \\ a - 2b = 0 \quad \text{②} \end{cases}$
        ① $+$ ②: $2a = 4$, $a = 2$
        Substitute into ②: $2 - 2b = 0$, $b = 1$
        So $a + b = 2 + 1 = 3$.
        This problem tests "finding parameters given the <<解/solution>>" — substituting the <<解/solution>> yields a new <<方程组/system of equations>> for $a$ and $b$!

    - number: 2
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        解<<方程组/system of equations>>：
        $$\begin{cases} \frac{x}{2} + \frac{y}{3} = 2 \\ \frac{x}{4} - \frac{y}{6} = \frac{1}{2} \end{cases}$$
      questionEn: |
        Solve the <<方程组/system of equations>>:
        $$\begin{cases} \frac{x}{2} + \frac{y}{3} = 2 \\ \frac{x}{4} - \frac{y}{6} = \frac{1}{2} \end{cases}$$
      answer: |
        ①两边乘以 $6$：$3x + 2y = 12$ ③
        ②两边乘以 $12$：$3x - 2y = 6$ ④
        ③ $+$ ④：$6x = 18$，$x = 3$
        代入③：$9 + 2y = 12$，$2y = 3$，$y = \frac{3}{2}$
        <<解/solution>>为 $\begin{cases} x = 3 \\ y = \frac{3}{2} \end{cases}$
        <<检验/verify>>：代入①，$\frac{3}{2} + \frac{1}{2} = 2$，成立；代入②，$\frac{3}{4} - \frac{1}{4} = \frac{1}{2}$，成立。
      answerEn: |
        Multiply ① by $6$: $3x + 2y = 12$ ③
        Multiply ② by $12$: $3x - 2y = 6$ ④
        ③ $+$ ④: $6x = 18$, $x = 3$
        Substitute into ③: $9 + 2y = 12$, $2y = 3$, $y = \frac{3}{2}$
        <<解/solution>> is $\begin{cases} x = 3 \\ y = \frac{3}{2} \end{cases}$
        <<检验/verify>>: into ①, $\frac{3}{2} + \frac{1}{2} = 2$, true; into ②, $\frac{3}{4} - \frac{1}{4} = \frac{1}{2}$, true.
      explanation: |
        先<<去分母/clearing denominators>>，把含分数的<<方程/equation>>化为整数<<系数/coefficient>>的<<方程/equation>>，再用<<加减消元法/elimination by addition or subtraction>>。
      explanationEn: |
        First <<去分母/clearing denominators>> to convert fractional <<方程/equation>>s to integer <<系数/coefficient>>s, then apply <<加减消元法/elimination by addition or subtraction>>.

    - number: 3
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        一列快车和一列慢车同时从甲、乙两站相向开出。快车每小时行 $80$ 千米，慢车每小时行 $60$ 千米。两车在途中相遇时，快车比慢车多行了 $40$ 千米。求甲、乙两站之间的距离。
      questionEn: |
        A fast train and a slow train depart simultaneously from stations A and B heading toward each other. The fast train travels at $80$ km/h and the slow train at $60$ km/h. When they meet, the fast train has traveled $40$ km more than the slow train. Find the distance between stations A and B.
      answer: |
        设相遇时快车行了 $x$ 千米，慢车行了 $y$ 千米。
        $\begin{cases} x - y = 40 \quad \text{①（快车比慢车多行 $40$ 千米）} \\ \frac{x}{80} = \frac{y}{60} \quad \text{②（时间相同）} \end{cases}$
        由②得 $60x = 80y$，即 $3x = 4y$，$x = \frac{4y}{3}$ ③
        代入①：$\frac{4y}{3} - y = 40$，$\frac{y}{3} = 40$，$y = 120$
        $x = \frac{4 \times 120}{3} = 160$
        甲、乙两站之间的距离 $= x + y = 160 + 120 = 280$ 千米。
        <<检验/verify>>：快车时间 $= \frac{160}{80} = 2$ 小时，慢车时间 $= \frac{120}{60} = 2$ 小时，时间相同，正确。
      answerEn: |
        Let the fast train travel $x$ km and the slow train travel $y$ km when they meet.
        $\begin{cases} x - y = 40 \quad \text{① (fast train travels $40$ km more)} \\ \frac{x}{80} = \frac{y}{60} \quad \text{② (same travel time)} \end{cases}$
        From ②: $60x = 80y$, i.e., $3x = 4y$, $x = \frac{4y}{3}$ ③
        Substitute into ①: $\frac{4y}{3} - y = 40$, $\frac{y}{3} = 40$, $y = 120$
        $x = \frac{4 \times 120}{3} = 160$
        Distance between A and B $= x + y = 160 + 120 = 280$ km.
        <<检验/verify>>: fast train time $= \frac{160}{80} = 2$ h, slow train time $= \frac{120}{60} = 2$ h, same time, correct.
      explanation: |
        关键隐含条件：两车**同时出发、同时相遇**，说明行驶时间相同。这就是第二个等量关系。
      explanationEn: |
        The key hidden condition: the trains **depart simultaneously and meet at the same time**, meaning their travel times are equal. This is the second equal relationship.

    - number: 4
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知关于 $x$、$y$ 的<<方程组/system of equations>> $\begin{cases} 2x + y = k + 1 \\ x + 2y = k - 1 \end{cases}$ 的<<解/solution>>满足 $x + y = 2$，求 $k$ 的值，并求出<<方程组/system of equations>>的<<解/solution>>。
      questionEn: |
        Given that the <<解/solution>> of the <<方程组/system of equations>> $\begin{cases} 2x + y = k + 1 \\ x + 2y = k - 1 \end{cases}$ satisfies $x + y = 2$, find the value of $k$ and the <<解/solution>> of the <<方程组/system of equations>>.
      answer: |
        ① $+$ ②：$(2x + y) + (x + 2y) = (k + 1) + (k - 1)$
        $3x + 3y = 2k$
        $3(x + y) = 2k$
        因为 $x + y = 2$，所以 $3 \times 2 = 2k$，$k = 3$。

        原<<方程组/system of equations>>变为：$\begin{cases} 2x + y = 4 \quad \text{①} \\ x + 2y = 2 \quad \text{②} \end{cases}$
        ① $-$ ②：$x - y = 2$ ③
        又因为 $x + y = 2$ ④
        ③ $+$ ④：$2x = 4$，$x = 2$
        代入④：$y = 0$

        所以 $k = 3$，<<解/solution>>为 $\begin{cases} x = 2 \\ y = 0 \end{cases}$。
        <<检验/verify>>：$2 \times 2 + 0 = 4 = 3 + 1$，成立；$2 + 2 \times 0 = 2 = 3 - 1$，成立；$2 + 0 = 2$，成立。
      answerEn: |
        ① $+$ ②: $(2x + y) + (x + 2y) = (k + 1) + (k - 1)$
        $3x + 3y = 2k$
        $3(x + y) = 2k$
        Since $x + y = 2$: $3 \times 2 = 2k$, $k = 3$.

        The <<方程组/system of equations>> becomes: $\begin{cases} 2x + y = 4 \quad \text{①} \\ x + 2y = 2 \quad \text{②} \end{cases}$
        ① $-$ ②: $x - y = 2$ ③
        Combined with $x + y = 2$ ④
        ③ $+$ ④: $2x = 4$, $x = 2$
        From ④: $y = 0$

        So $k = 3$, and the <<解/solution>> is $\begin{cases} x = 2 \\ y = 0 \end{cases}$.
        <<检验/verify>>: $2 \times 2 + 0 = 4 = 3 + 1$, true; $2 + 0 = 2 = 3 - 1$, true; $2 + 0 = 2$, true.
      explanation: |
        本题考查"整体思想"：不急于分别求 $x$、$y$，而是先把两个<<方程/equation>>相加，利用 $x + y = 2$ 这个条件求出参数 $k$，再回头解<<方程组/system of equations>>。这是中考常见的"已知<<解/solution>>的条件求参数"题型。
      explanationEn: |
        This problem tests "holistic thinking": instead of solving for $x$ and $y$ separately right away, first add the two <<方程/equation>>s and use the condition $x + y = 2$ to find the parameter $k$, then solve the <<方程组/system of equations>>. This is a common exam problem type — "finding a parameter given a condition on the <<解/solution>>."
