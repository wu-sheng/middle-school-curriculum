  questions:
    - number: 1
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        含有______个<<未知数/unknown>>，并且每个<<未知数/unknown>>的次数都是______的<<方程/equation>>，叫做<<二元一次方程/linear equation in two variables>>。
      questionEn: |
        An <<方程/equation>> that contains ______ <<未知数/unknown>>s, and the degree of each <<未知数/unknown>> is ______, is called a <<二元一次方程/linear equation in two variables>>.
      correctValue: "两, 1"
      answer: "两（个）；$1$"
      answerEn: "two; $1$"
      explanation: |
        <<二元一次方程/linear equation in two variables>>的定义中，"二元"指两个<<未知数/unknown>>，"一次"指最高次数为 $1$。
      explanationEn: |
        In the definition of <<二元一次方程/linear equation in two variables>>, "two variables" means two <<未知数/unknown>>s, and "first degree" means the highest power is $1$.

    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        <<方程组/system of equations>> $\begin{cases} x + y = 8 \\ x - y = 2 \end{cases}$ 的<<解/solution>>是 $x = $ ______，$y = $ ______。
      questionEn: |
        The <<解/solution>> of the <<方程组/system of equations>> $\begin{cases} x + y = 8 \\ x - y = 2 \end{cases}$ is $x = $ ______, $y = $ ______.
      correctValue: "5, 3"
      answer: "$x = 5$，$y = 3$"
      answerEn: "$x = 5$, $y = 3$"
      explanation: |
        两式相加：$2x = 10$，$x = 5$；代入第一式：$5 + y = 8$，$y = 3$。
      explanationEn: |
        Add the two equations: $2x = 10$, $x = 5$; substitute into the first: $5 + y = 8$, $y = 3$.

    - number: 3
