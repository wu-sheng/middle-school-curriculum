      sectionEn: "I. Fill in the Blanks"
      question: |
        用<<加减消元法/elimination by addition or subtraction>>解 $\begin{cases} 2x + y = 10 \\ 2x - 3y = 2 \end{cases}$，两式相减消去 $x$，得 $y = $ ______。
      questionEn: |
        Using <<加减消元法/elimination by addition or subtraction>> to solve $\begin{cases} 2x + y = 10 \\ 2x - 3y = 2 \end{cases}$, subtract the equations to eliminate $x$, giving $y = $ ______.
      correctValue: "2"
      answer: "$2$"
      answerEn: "$2$"
      explanation: |
        ① $-$ ②：$(2x + y) - (2x - 3y) = 10 - 2$，$4y = 8$，$y = 2$。
      explanationEn: |
        ① $-$ ②: $(2x + y) - (2x - 3y) = 10 - 2$, $4y = 8$, $y = 2$.

    - number: 5
