      question: |
        解<<方程组/system of equations>>的基本思想是<<消元/elimination>>，即把"______元"转化为"______元"。
      questionEn: |
        The basic idea of solving a <<方程组/system of equations>> is <<消元/elimination>>, that is, converting "______ variables" to "______ variable."
      correctValue: "二, 一"
      answer: "二；一"
      answerEn: "two; one"
      explanation: |
        <<消元/elimination>>的核心思想就是减少<<未知数/unknown>>的个数，把<<二元一次方程组/system of linear equations in two variables>>转化为<<一元一次方程/linear equation in one variable>>来求解。
      explanationEn: |
        The core idea of <<消元/elimination>> is to reduce the number of <<未知数/unknown>>s, converting a <<二元一次方程组/system of linear equations in two variables>> into a <<一元一次方程/linear equation in one variable>> to solve.

    - number: 4
      type: 填空题
      inputType: blank
