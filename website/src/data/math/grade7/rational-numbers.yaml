concepts:
  - id: positive-negative-zero
    title: <<正数/positive number>>、<<负数/negative number>>、<<零/zero>>
    titleEn: "<<正数/positive number>>, <<负数/negative number>>, and <<零/zero>>"
    content: |
      生活中有很多"相反意义的量"——上升与下降、收入与支出、零上与零下。为了区分这些方向相反的量，数学引入了**正号**和**负号**：

      - 规定一个方向为"正"，则相反方向为"负"
      - **<<正数/positive number>>**：大于 $0$ 的数，如 $1, 2.5, \frac{3}{4}$（正号 $+$ 通常省略不写）
      - **<<负数/negative number>>**：小于 $0$ 的数，如 $-1, -2.5, -\frac{3}{4}$（负号 $-$ **不能省略**）

      **$0$ 的特殊地位——它不是"没有"：**

      $0$ 既不是<<正数/positive number>>，也不是<<负数/negative number>>，但它在数学中有多重重要含义：

      - **占位符**：数字 $305$ 中的 $0$ 表示"十位上没有"，如果去掉写成 $35$ 就完全变了
      - **基准**：$0℃$ 不是"没有温度"，而是冰水混合物的温度，是<<正数/positive number>>与<<负数/negative number>>的**分界点**
      - **起点**：在<<数轴/number line>>上，$0$ 是<<原点/origin>>，一切度量从这里开始
      - **分界**：$0$ 把所有数分成两大阵营——左边全是<<负数/negative number>>，右边全是<<正数/positive number>>
    contentEn: |
      In daily life, there are many "quantities with opposite meanings" — rising vs. falling, income vs. expense, above zero vs. below zero. To distinguish these opposite quantities, mathematics introduces the **positive sign** and **negative sign**:

      - Designate one direction as "positive," and the opposite direction is "negative"
      - **<<正数/positive number>>s**: numbers greater than $0$, such as $1, 2.5, \frac{3}{4}$ (the $+$ sign is usually omitted)
      - **<<负数/negative number>>s**: numbers less than $0$, such as $-1, -2.5, -\frac{3}{4}$ (the $-$ sign **cannot be omitted**)

      **The special role of $0$ — it doesn't mean "nothing":**

      $0$ is neither a <<正数/positive number>> nor a <<负数/negative number>>, but it has multiple important meanings in mathematics:

      - **Placeholder**: In the number $305$, the $0$ means "nothing in the tens place" — removing it to get $35$ changes the number entirely
      - **Baseline**: $0℃$ is not "no temperature" — it is the temperature of an ice-water mixture, the **dividing point** between <<正数/positive number>>s and <<负数/negative number>>s
      - **Starting point**: On the <<数轴/number line>>, $0$ is the <<原点/origin>> where all measurements begin
      - **Divider**: $0$ separates all numbers into two camps — <<负数/negative number>>s on the left, <<正数/positive number>>s on the right
    examples:
      - '**温度**：零上 $12℃$ 记作 $+12℃$，零下 $5℃$ 记作 $-5℃$，而 $0℃$ 是冰点——水开始结冰的温度'
      - '**海拔**：珠穆朗玛峰海拔 $+8848.86$ 米，吐鲁番盆地海拔 $-154.31$ 米，海平面定义为 $0$ 米'
      - '**收支**：收入 $200$ 元记作 $+200$，支出 $50$ 元记作 $-50$，收支平衡记作 $0$'
      - '**电梯**：地上 $3$ 层记作 $+3$，地下 $2$ 层记作 $-2$，$1$ 楼（地面）就是基准 $0$'
    examplesEn:
      - '**Temperature**: $12℃$ above zero is written as $+12℃$, $5℃$ below zero as $-5℃$, and $0℃$ is the freezing point — the temperature at which water begins to freeze'
      - '**Altitude**: Mount Everest is $+8848.86$ m, the Turpan Basin is $-154.31$ m, and sea level is defined as $0$ m'
      - '**Finance**: Earning $200$ yuan is $+200$, spending $50$ yuan is $-50$, and breaking even is $0$'
      - '**Elevator**: Floor $3$ above ground is $+3$, basement $2$ is $-2$, and the ground floor is the baseline $0$'
    notes:
      - '**关键区分**：$0$ 既不是<<正数/positive number>>也不是<<负数/negative number>>！这是考试常考的判断题'
      - '正负号表示的是方向，不是大小。$-100$ 虽然数字很大，但它比 $1$ 还小'
      - '同一个数在不同基准下可正可负：$5$ 层楼在地面看是 $+5$，在 $8$ 层看就变成了"低 $3$ 层"'
    notesEn:
      - '**Key distinction**: $0$ is neither a <<正数/positive number>> nor a <<负数/negative number>>! This is frequently tested in exams'
      - 'The sign indicates direction, not magnitude. $-100$ has a large digit, but it is smaller than $1$'
      - 'The same number can be positive or negative depending on the baseline: floor $5$ is $+5$ from the ground, but "$3$ floors below" from floor $8$'

  - id: rational-numbers
    title: <<有理数/rational number>>的概念与分类
    titleEn: Concept and classification of <<有理数/rational number>>s
    content: |
      有了<<正数/positive number>>、<<负数/negative number>>和 $0$，我们现在认识的数就丰富多了。数学上把这些数统一起来，给它们一个总称：

      **<<整数/integer>>**（包括正<<整数/integer>>、$0$、负<<整数/integer>>）和**<<分数/fraction>>**（包括正<<分数/fraction>>、负<<分数/fraction>>）统称为**<<有理数/rational number>>**。

      **为什么叫"有理数"？** 因为它们都能写成两个<<整数/integer>>之比 $\frac{p}{q}$（$q \neq 0$）的形式。例如 $0.75 = \frac{3}{4}$，$-2 = \frac{-2}{1}$，$0 = \frac{0}{1}$。

      **分类方式一（按正负分）：**
    contentEn: |
      With <<正数/positive number>>s, <<负数/negative number>>s, and $0$, we now know a much richer set of numbers. Mathematics gives them a unified name:

      **<<整数/integer>>s** (including positive <<整数/integer>>s, $0$, and negative <<整数/integer>>s) and **<<分数/fraction>>s** (including positive and negative <<分数/fraction>>s) are collectively called **<<有理数/rational number>>s**.

      **Why are they called "rational numbers"?** Because they can all be written as the ratio of two <<整数/integer>>s $\frac{p}{q}$ ($q \neq 0$). For example, $0.75 = \frac{3}{4}$, $-2 = \frac{-2}{1}$, $0 = \frac{0}{1}$.

      **Classification method 1 (by sign):**
    classification:
      - name: 正<<有理数/rational number>>
        nameEn: Positive <<有理数/rational number>>s
        examples: '$1, \frac{1}{2}, 0.3, 2.5, 100$'
        examplesEn: '$1, \frac{1}{2}, 0.3, 2.5, 100$'
      - name: <<零/zero>>
        nameEn: <<零/zero>>
        examples: "$0$（独立一类，不归入正也不归入负）"
        examplesEn: "$0$ (a separate category, neither positive nor negative)"
      - name: 负<<有理数/rational number>>
        nameEn: Negative <<有理数/rational number>>s
        examples: '$-1, -\frac{1}{2}, -0.3, -2.5, -100$'
        examplesEn: '$-1, -\frac{1}{2}, -0.3, -2.5, -100$'
    notes:
      - '**<<小数/decimal>>也是<<有理数/rational number>>**：有限<<小数/decimal>>（如 $0.75$）和无限循环<<小数/decimal>>（如 $0.333\ldots = \frac{1}{3}$）都能写成<<分数/fraction>>形式，所以都是<<有理数/rational number>>'
      - '**分类方式二（按整、分）**：也可以按"<<整数/integer>>"和"<<分数/fraction>>"来分——<<整数/integer>>包括正<<整数/integer>>、$0$、负<<整数/integer>>；<<分数/fraction>>包括正<<分数/fraction>>、负<<分数/fraction>>'
      - '**$0$ 是<<整数/integer>>**：$0$ 属于<<整数/integer>>，但不属于<<正数/positive number>>也不属于<<负数/negative number>>'
      - '到了第 8 章学<<实数/real number>>时，你会发现有些数（如 $\sqrt{2}$、$\pi$）不能写成<<分数/fraction>>形式，它们不是<<有理数/rational number>>'
    notesEn:
      - '**<<小数/decimal>>s are also <<有理数/rational number>>s**: Finite <<小数/decimal>>s (e.g., $0.75$) and infinite repeating <<小数/decimal>>s (e.g., $0.333\ldots = \frac{1}{3}$) can all be written as <<分数/fraction>>s, so they are all <<有理数/rational number>>s'
      - '**Classification method 2 (integer vs. fraction)**: You can also classify by "<<整数/integer>>s" and "<<分数/fraction>>s" — <<整数/integer>>s include positive <<整数/integer>>s, $0$, and negative <<整数/integer>>s; <<分数/fraction>>s include positive and negative <<分数/fraction>>s'
      - '**$0$ is an <<整数/integer>>**: $0$ belongs to <<整数/integer>>s, but is neither a <<正数/positive number>> nor a <<负数/negative number>>'
      - 'In Chapter 8 on <<实数/real number>>s, you will discover that some numbers (like $\sqrt{2}$, $\pi$) cannot be written as <<分数/fraction>>s — they are not <<有理数/rational number>>s'

  - id: number-line
    title: <<数轴/number line>>
    titleEn: <<数轴/number line>>
    content: |
      <<数轴/number line>>是数学中最基本的工具之一。它把抽象的数变成了直线上看得见的点，让数的大小、距离、方向都变得直观。

      画一条<<数轴/number line>>，必须具备**三个要素**（缺一不可）：

      **① <<原点/origin>>**：在直线上取一个点，标上数字 $0$，这就是起点。所有正负都从这里划分。

      **② <<正方向/positive direction>>**：用**箭头**指向右边。箭头指示的方向就是数越来越大的方向。

      **③ <<单位长度/unit length>>**：取**相等的一小段**作为 $1$ 个单位。这个长度必须固定且统一——不能左边一格 $1$ 厘米，右边一格 $2$ 厘米。

      有了这三个要素，<<数轴/number line>>上的每一个点都对应一个数，每一个<<有理数/rational number>>都能在<<数轴/number line>>上找到对应的点。
    contentEn: |
      The <<数轴/number line>> is one of the most fundamental tools in mathematics. It transforms abstract numbers into visible points on a line, making the size, distance, and direction of numbers intuitive.

      To draw a <<数轴/number line>>, you need **three essential elements** (all are required):

      **① <<原点/origin>>**: Choose a point on the line and mark it as $0$. This is the starting point. All positive and negative values are divided from here.

      **② <<正方向/positive direction>>**: An **arrow** pointing to the right. The arrow indicates the direction in which numbers increase.

      **③ <<单位长度/unit length>>**: Choose **equal segments** as $1$ unit. This length must be fixed and consistent — you cannot have one unit be $1$ cm on the left and $2$ cm on the right.

      With these three elements, every point on the <<数轴/number line>> corresponds to a number, and every <<有理数/rational number>> can find its corresponding point on the <<数轴/number line>>.
    examples:
      - '在<<数轴/number line>>上，$3$ 在<<原点/origin>>右边 $3$ 个<<单位长度/unit length>>处；$-2$ 在<<原点/origin>>左边 $2$ 个<<单位长度/unit length>>处'
      - '$0.5$ 在 $0$ 和 $1$ 的正中间；$-1.5$ 在 $-1$ 和 $-2$ 的正中间'
      - '<<数轴/number line>>向右延伸，数越来越大；向左延伸，数越来越小——没有尽头'
    examplesEn:
      - 'On the <<数轴/number line>>, $3$ is $3$ <<单位长度/unit length>>s to the right of the <<原点/origin>>; $-2$ is $2$ <<单位长度/unit length>>s to the left'
      - '$0.5$ is exactly halfway between $0$ and $1$; $-1.5$ is exactly halfway between $-1$ and $-2$'
      - 'The <<数轴/number line>> extends to the right (numbers get larger) and to the left (numbers get smaller) — with no end'
    notes:
      - '**必须有箭头**：箭头表示方向（正方向），没有箭头的直线不是<<数轴/number line>>'
      - '**<<单位长度/unit length>>可以自选**：可以让 $1$ 格代表 $1$，也可以代表 $10$、$100$ 或 $0.5$，但整条线必须一致'
      - '**<<数轴/number line>>的核心用途**：把"数"和"形"统一起来——这个思想叫"数形结合"，贯穿整个初中数学'
    notesEn:
      - '**Must have an arrow**: The arrow indicates direction (positive direction). A line without an arrow is not a <<数轴/number line>>'
      - '**<<单位长度/unit length>> is flexible**: One grid can represent $1$, $10$, $100$, or $0.5$, but the entire line must be consistent'
      - '**Core purpose of the <<数轴/number line>>**: Unifying "numbers" and "shapes" — this idea is called "combining numbers with shapes" and runs throughout middle school mathematics'
    hasVisualization: true

  - id: opposite-numbers
    title: <<相反数/opposite number>>
    titleEn: <<相反数/opposite number>>
    content: |
      只有**符号不同，数字部分相同**的两个数互为<<相反数/opposite number>>。用字母表示：$a$ 的<<相反数/opposite number>>是 $-a$。

      **<<数轴/number line>>上的理解**：互为<<相反数/opposite number>>的两个数，分别在<<原点/origin>> $0$ 的两侧，并且到<<原点/origin>>的**距离相等**。它们关于<<原点/origin>>对称。

      **求<<相反数/opposite number>>的方法**：
      - <<正数/positive number>>的<<相反数/opposite number>>：加上负号 → $5$ 的<<相反数/opposite number>>是 $-5$
      - <<负数/negative number>>的<<相反数/opposite number>>：去掉负号 → $-3$ 的<<相反数/opposite number>>是 $3$
      - $0$ 的<<相反数/opposite number>>：还是 $0$（$0$ 关于自身对称）

      **<<相反数/opposite number>>的重要性质**：互为<<相反数/opposite number>>的两个数相加等于 $0$，即 $a + (-a) = 0$。
    contentEn: |
      Two numbers that have **different signs but the same numerical part** are <<相反数/opposite number>>s of each other. In algebraic notation: the <<相反数/opposite number>> of $a$ is $-a$.

      **Understanding on the <<数轴/number line>>**: Two numbers that are <<相反数/opposite number>>s of each other are on opposite sides of the <<原点/origin>> $0$, and are **equidistant** from the <<原点/origin>>. They are symmetric about the <<原点/origin>>.

      **How to find the <<相反数/opposite number>>**:
      - <<相反数/opposite number>> of a <<正数/positive number>>: add a negative sign → the <<相反数/opposite number>> of $5$ is $-5$
      - <<相反数/opposite number>> of a <<负数/negative number>>: remove the negative sign → the <<相反数/opposite number>> of $-3$ is $3$
      - <<相反数/opposite number>> of $0$: still $0$ ($0$ is symmetric about itself)

      **Key property**: The sum of two <<相反数/opposite number>>s is $0$, i.e., $a + (-a) = 0$.
    examples:
      - '$5$ 和 $-5$ 互为<<相反数/opposite number>>——在<<数轴/number line>>上，它们都距离<<原点/origin>> $5$ 个<<单位长度/unit length>>，一个在左一个在右'
      - '$\frac{2}{3}$ 和 $-\frac{2}{3}$ 互为<<相反数/opposite number>>——小数和分数也有<<相反数/opposite number>>'
      - '$0$ 的<<相反数/opposite number>>是 $0$——$0$ 是唯一一个<<相反数/opposite number>>等于自身的数'
      - '生活类比：向东走 $3$ 步再向西走 $3$ 步，回到原点——$+3$ 和 $-3$ 正好"抵消"'
    examplesEn:
      - '$5$ and $-5$ are <<相反数/opposite number>>s — on the <<数轴/number line>>, both are $5$ <<单位长度/unit length>>s from the <<原点/origin>>, one on each side'
      - '$\frac{2}{3}$ and $-\frac{2}{3}$ are <<相反数/opposite number>>s — decimals and fractions also have <<相反数/opposite number>>s'
      - 'The <<相反数/opposite number>> of $0$ is $0$ — $0$ is the only number whose <<相反数/opposite number>> equals itself'
      - 'Real-life analogy: Walking $3$ steps east then $3$ steps west brings you back to the starting point — $+3$ and $-3$ exactly "cancel out"'

  - id: absolute-value
    title: <<绝对值/absolute value>>
    titleEn: <<绝对值/absolute value>>
    content: |
      **<<绝对值/absolute value>>的几何意义**：一个数的<<绝对值/absolute value>>，就是<<数轴/number line>>上这个数对应的点到**<<原点/origin>>的距离**。

      距离只说远近，不分方向，所以<<绝对值/absolute value>>**永远 $\geq 0$**（非负数）。

      **记法**：数 $a$ 的<<绝对值/absolute value>>记作 $|a|$，读作"$a$ 的<<绝对值/absolute value>>"。

      **分三种情况：**
      - 当 $a > 0$（<<正数/positive number>>）时：$|a| = a$（本身就是正的，距离就是自己）
      - 当 $a = 0$ 时：$|a| = 0$（就在<<原点/origin>>上，距离为 $0$）
      - 当 $a < 0$（<<负数/negative number>>）时：$|a| = -a$（去掉负号，$-a$ 变成正的）

      **注意**：$|-5| = -(-5) = 5$，这里 $-a$ 不是"负数"，而是"$a$ 的<<相反数/opposite number>>"。当 $a$ 本身是<<负数/negative number>>时，$-a$ 反而是<<正数/positive number>>。
    contentEn: |
      **Geometric meaning of <<绝对值/absolute value>>**: The <<绝对值/absolute value>> of a number is the **distance** from the corresponding point on the <<数轴/number line>> to the **<<原点/origin>>**.

      Distance only measures how far, not the direction, so <<绝对值/absolute value>> is **always $\geq 0$** (non-negative).

      **Notation**: The <<绝对值/absolute value>> of number $a$ is written as $|a|$, read as "the <<绝对值/absolute value>> of $a$."

      **Three cases:**
      - When $a > 0$ (<<正数/positive number>>): $|a| = a$ (already positive, the distance is itself)
      - When $a = 0$: $|a| = 0$ (right at the <<原点/origin>>, distance is $0$)
      - When $a < 0$ (<<负数/negative number>>): $|a| = -a$ (remove the negative sign; $-a$ becomes positive)

      **Note**: $|-5| = -(-5) = 5$. Here, $-a$ doesn't mean "a negative number" — it means "the <<相反数/opposite number>> of $a$." When $a$ itself is a <<负数/negative number>>, $-a$ is actually a <<正数/positive number>>.
    examples:
      - '$|5| = 5$——$5$ 在<<数轴/number line>>上距<<原点/origin>> $5$ 个单位'
      - '$|-5| = 5$——$-5$ 也距<<原点/origin>> $5$ 个单位（方向不同，距离相同）'
      - '$|0| = 0$——$0$ 就在<<原点/origin>>上，距离为零'
      - '$|-3.7| = 3.7$，$|\frac{2}{3}| = \frac{2}{3}$——任何数的<<绝对值/absolute value>>都不会是<<负数/negative number>>'
      - '互为<<相反数/opposite number>>的两个数，<<绝对值/absolute value>>相等：$|+8| = |-8| = 8$'
    examplesEn:
      - '$|5| = 5$ — $5$ is $5$ units from the <<原点/origin>> on the <<数轴/number line>>'
      - '$|-5| = 5$ — $-5$ is also $5$ units from the <<原点/origin>> (different direction, same distance)'
      - '$|0| = 0$ — $0$ is at the <<原点/origin>>, so the distance is zero'
      - '$|-3.7| = 3.7$, $|\frac{2}{3}| = \frac{2}{3}$ — the <<绝对值/absolute value>> of any number is never a <<负数/negative number>>'
      - 'Two <<相反数/opposite number>>s have equal <<绝对值/absolute value>>s: $|+8| = |-8| = 8$'
    notes:
      - '**最常见错误**：看到 $|-6|$ 直接写成 $-6$。记住：<<绝对值/absolute value>>=距离，距离不可能为负！'
      - '**$|a| = -a$ 不一定是<<负数/negative number>>**：当 $a = -5$ 时，$-a = -(-5) = 5 > 0$。$-a$ 只是<<相反数/opposite number>>的意思'
      - '<<绝对值/absolute value>>相等的两个数，要么相等，要么互为<<相反数/opposite number>>：$|a| = |b|$ 意味着 $a = b$ 或 $a = -b$'
    notesEn:
      - '**Most common mistake**: Seeing $|-6|$ and writing $-6$. Remember: <<绝对值/absolute value>> = distance, and distance can never be negative!'
      - '**$|a| = -a$ is not necessarily negative**: When $a = -5$, $-a = -(-5) = 5 > 0$. $-a$ just means the <<相反数/opposite number>>'
      - 'Two numbers with equal <<绝对值/absolute value>>s are either equal or <<相反数/opposite number>>s: $|a| = |b|$ means $a = b$ or $a = -b$'

  - id: comparing
    title: <<有理数/rational number>>的大小比较
    titleEn: Comparing the size of <<有理数/rational number>>s
    content: |
      **<<数轴/number line>>比较法（最直观）**：在<<数轴/number line>>上，**右边的数总比左边的大**。这是最根本的比较法则，所有规则都来源于此。

      由此推出的四条规则：

      **① <<正数/positive number>> $>$ $0$ $>$ <<负数/negative number>>**：<<正数/positive number>>在 $0$ 右边，<<负数/negative number>>在 $0$ 左边，所以任何<<正数/positive number>>都大于 $0$，$0$ 大于任何<<负数/negative number>>。

      **② 两个<<正数/positive number>>比较**：直接比数字大小即可。$7 > 3$，因为 $7$ 在 $3$ 的右边。

      **③ 两个<<负数/negative number>>比较**（最容易出错！）：**<<绝对值/absolute value>>大的反而小**。为什么？因为<<绝对值/absolute value>>越大，离 $0$ 越远，在<<数轴/number line>>上越靠左，越小。

      **④ 用<<绝对值/absolute value>>辅助比较**：先比<<绝对值/absolute value>>，再定大小。比如比较 $-3$ 和 $-8$：$|-3| = 3 < 8 = |-8|$，<<绝对值/absolute value>>小的<<负数/negative number>>反而更大，所以 $-3 > -8$。
    contentEn: |
      **<<数轴/number line>> comparison (most intuitive)**: On the <<数轴/number line>>, **numbers to the right are always greater than numbers to the left**. This is the most fundamental comparison rule; all other rules derive from it.

      Four rules derived from this:

      **① <<正数/positive number>> $>$ $0$ $>$ <<负数/negative number>>**: <<正数/positive number>>s are to the right of $0$, and <<负数/negative number>>s are to the left, so any <<正数/positive number>> is greater than $0$, and $0$ is greater than any <<负数/negative number>>.

      **② Comparing two <<正数/positive number>>s**: Simply compare numerical values. $7 > 3$ because $7$ is to the right of $3$.

      **③ Comparing two <<负数/negative number>>s** (most error-prone!): **The one with the larger <<绝对值/absolute value>> is actually smaller**. Why? A larger <<绝对值/absolute value>> means farther from $0$, further to the left on the <<数轴/number line>>, so it is smaller.

      **④ Using <<绝对值/absolute value>> to assist comparison**: First compare <<绝对值/absolute value>>s, then determine the order. E.g., compare $-3$ and $-8$: $|-3| = 3 < 8 = |-8|$; the <<负数/negative number>> with the smaller <<绝对值/absolute value>> is actually larger, so $-3 > -8$.
    examples:
      - '$5 > -100$——任何<<正数/positive number>>都大于任何<<负数/negative number>>，即使数字差距很大'
      - '$0 > -0.001$——$0$ 比任何<<负数/negative number>>都大，哪怕那个<<负数/negative number>>非常接近 $0$'
      - '$-2 > -5$——$|-2| = 2 < 5 = |-5|$，离 $0$ 更近，所以更大'
      - '$-0.1 > -100$——不要被数字迷惑！$-0.1$ 几乎在 $0$ 旁边，$-100$ 远在左边'
      - '排序练习：$-7 < -3 < 0 < 2 < 5$——在<<数轴/number line>>上从左到右'
    examplesEn:
      - '$5 > -100$ — any <<正数/positive number>> is greater than any <<负数/negative number>>, even with large numerical differences'
      - '$0 > -0.001$ — $0$ is greater than any <<负数/negative number>>, even one very close to $0$'
      - '$-2 > -5$ — $|-2| = 2 < 5 = |-5|$, closer to $0$, so greater'
      - '$-0.1 > -100$ — do not be confused by the digits! $-0.1$ is almost at $0$, while $-100$ is far to the left'
      - 'Ordering exercise: $-7 < -3 < 0 < 2 < 5$ — left to right on the <<数轴/number line>>'
    explanation: |
      **生活类比**：欠债 $200$ 元（$-200$）和欠债 $50$ 元（$-50$），谁的"处境更好"？当然是欠得少的！$-50 > -200$。

      **记忆口诀**：正正比数字，负负比距离（离零近的大），正负不用比（正的一定大）。
    explanationEn: |
      **Real-life analogy**: Owing $200$ yuan ($-200$) versus owing $50$ yuan ($-50$) — who is in a "better situation"? Of course, the one who owes less! $-50 > -200$.

      **Memory aid**: For two positives, compare digits; for two negatives, compare distance from zero (closer is greater); positive vs. negative needs no comparison (positive always wins).

