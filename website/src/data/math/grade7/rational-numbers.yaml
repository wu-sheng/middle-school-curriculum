      - Positive <<整数/integer>> set: { }
      - Negative <<分数/fraction>> set: { }
      - <<整数/integer>> set: { }
    steps:
      - '先判断每个数是<<整数/integer>>还是<<分数/fraction>>，是正还是负：'
      - '$-5$：负<<整数/integer>>；$\frac{3}{7}$：正<<分数/fraction>>；$0$：<<整数/integer>>（既不正也不负）'
      - '$-2.8 = -\frac{14}{5}$：负<<分数/fraction>>（<<小数/decimal>>也可以是<<分数/fraction>>！）'
      - '$6$：正<<整数/integer>>；$-\frac{1}{3}$：负<<分数/fraction>>；$0.5 = \frac{1}{2}$：正<<分数/fraction>>'
