examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        如果收入 $500$ 元记作 $+500$ 元，那么支出 $200$ 元应记作（　）
      questionEn: |
        If receiving $500$ yuan is written as $+500$ yuan, then spending $200$ yuan should be written as ( )
      subInputs:
        - prompt: 选择答案
          options: ["$+200$", "$-200$", "$+700$", "$-700$"]
          correctValue: "$-200$"
      answer: "$-200$"
      answerEn: "$-200$"
      explanation: |
        收入和支出是一对相反意义的量。收入 $500$ 元记作 $+500$ 元，所以支出 $200$ 元应记作 $-200$ 元。
      explanationEn: |
        Income and expense are opposite quantities. If receiving $500$ yuan is $+500$, then spending $200$ yuan is $-200$.

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        $-3$ 的<<相反数/opposite number>>是______。
      questionEn: |
        The <<相反数/opposite number>> of $-3$ is ______.
      correctValue: "3"
      answer: "$3$"
      answerEn: "$3$"
      explanation: |
        <<相反数/opposite number>>就是符号相反、数字部分相同的数。$-3$ 的<<相反数/opposite number>>是 $3$。
      explanationEn: |
        The <<相反数/opposite number>> has the opposite sign but the same numerical value. The <<相反数/opposite number>> of $-3$ is $3$.

    - number: 3
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        在<<数轴/number line>>上，与表示 $-1$ 的点距离为 $3$ 个<<单位长度/unit length>>的点表示的数是（　）
      questionEn: |
        On the <<数轴/number line>>, the number(s) represented by the point(s) that are $3$ <<单位长度/unit length>>s from the point $-1$ is/are ( )
      subInputs:
        - prompt: 选择答案
          options: ["$2$", "$-4$", "$2$ 或 $-4$", "$4$ 或 $-2$"]
          correctValue: "$2$ 或 $-4$"
      answer: "$2$ 或 $-4$"
      answerEn: "$2$ or $-4$"
      explanation: |
        在<<数轴/number line>>上，距离 $-1$ 有 $3$ 个<<单位长度/unit length>>的点有两个方向：
        - 向右：$-1 + 3 = 2$
        - 向左：$-1 - 3 = -4$
        所以答案是 $2$ 或 $-4$。
        这道中考题的关键是**不要漏掉另一个方向**！
      explanationEn: |
        On the <<数轴/number line>>, points $3$ <<单位长度/unit length>>s from $-1$ lie in two directions:
        - Right: $-1 + 3 = 2$
        - Left: $-1 - 3 = -4$
        So the answer is $2$ or $-4$.
        The key to this exam question is **don't forget the other direction**!

    - number: 4
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知 $|a| = 5$，$|b| = 3$，且 $a > b$，则 $a - b$ 的值是______。
      questionEn: |
        Given $|a| = 5$, $|b| = 3$, and $a > b$, find the value of $a - b$: ______.
      correctValue: "2或8"
      answer: "$2$ 或 $8$"
      answerEn: "$2$ or $8$"
      explanation: |
        $|a| = 5$，所以 $a = 5$ 或 $a = -5$
        $|b| = 3$，所以 $b = 3$ 或 $b = -3$
        又因为 $a > b$，排除不满足的组合：
        - $a = 5, b = 3$：$a - b = 2$ ✓
        - $a = 5, b = -3$：$a - b = 8$ ✓
        - $a = -5, b = -3$：$a > b$ 不成立（$-5 < -3$），排除
        - $a = -5, b = 3$：$a > b$ 不成立，排除
        所以 $a - b = 2$ 或 $8$。
      explanationEn: |
        $|a| = 5$, so $a = 5$ or $a = -5$
        $|b| = 3$, so $b = 3$ or $b = -3$
        Since $a > b$, we eliminate combinations that don't satisfy:
        - $a = 5, b = 3$: $a - b = 2$ ✓
        - $a = 5, b = -3$: $a - b = 8$ ✓
        - $a = -5, b = -3$: $a > b$ fails ($-5 < -3$), eliminated
        - $a = -5, b = 3$: $a > b$ fails, eliminated
        So $a - b = 2$ or $8$.

    - number: 5
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        某地一天中 $6$ 次测量的温度分别为（单位：℃）：$-3, -1, 0, 4, 2, -2$。
        请你求出这一天的平均温度。
      questionEn: |
        The temperatures measured $6$ times in one day at a certain place are (unit: ℃): $-3, -1, 0, 4, 2, -2$.
        Calculate the average temperature for this day.
      answer: |
        平均温度 $= \frac{(-3) + (-1) + 0 + 4 + 2 + (-2)}{6} = \frac{0}{6} = 0$ ℃
      answerEn: |
        Average temperature $= \frac{(-3) + (-1) + 0 + 4 + 2 + (-2)}{6} = \frac{0}{6} = 0$ ℃
      explanation: |
        这道中考题考查的是<<有理数/rational number>>的加法和平均数计算。
        先求和：$(-3) + (-1) + 0 + 4 + 2 + (-2) = 0$
        再除以测量次数 $6$：$0 ÷ 6 = 0$
        所以这一天的平均温度是 $0$ ℃。
      explanationEn: |
        This exam question tests <<有理数/rational number>> addition and average calculation.
        First sum: $(-3) + (-1) + 0 + 4 + 2 + (-2) = 0$
        Then divide by the number of measurements $6$: $0 ÷ 6 = 0$
        So the average temperature for this day is $0$ ℃.

    - number: 6
      type: 易错选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        下列说法正确的是（　）
        A. $0$ 既不是<<正数/positive number>>也不是<<负数/negative number>>，所以 $0$ 不是<<整数/integer>>
        B. $-a$ 一定是<<负数/negative number>>
        C. 一个数的<<绝对值/absolute value>>一定是<<正数/positive number>>
        D. <<相反数/opposite number>>等于本身的数只有 $0$
      questionEn: |
        Which of the following statements is correct? ( )
        A. $0$ is neither <<正数/positive number>> nor <<负数/negative number>>, so $0$ is not an <<整数/integer>>
        B. $-a$ must be a <<负数/negative number>>
        C. The <<绝对值/absolute value>> of a number must be a <<正数/positive number>>
        D. The only number whose <<相反数/opposite number>> equals itself is $0$
      subInputs:
        - prompt: 选择答案
          options: ["A", "B", "C", "D"]
          correctValue: "D"
      answer: "D"
      answerEn: "D"
      explanation: |
        逐项分析：
        **A 错误**：$0$ 虽然不是正数也不是负数，但 $0$ 是<<整数/integer>>（$0$ 是非负整数的起点）。
        **B 错误**：$-a$ 不一定是负数！当 $a < 0$ 时，$-a > 0$；当 $a = 0$ 时，$-a = 0$。$-a$ 只是 $a$ 的<<相反数/opposite number>>。
        **C 错误**：$|0| = 0$，$0$ 不是正数，所以<<绝对值/absolute value>>不一定是正数，应该说"非负数"。
        **D 正确**：设 $a = -a$，则 $2a = 0$，$a = 0$。只有 $0$ 的<<相反数/opposite number>>等于它本身。
      explanationEn: |
        Analyze each option:
        **A is wrong**: Although $0$ is neither positive nor negative, $0$ IS an <<整数/integer>>.
        **B is wrong**: $-a$ is not necessarily negative! When $a < 0$, $-a > 0$; when $a = 0$, $-a = 0$. $-a$ is simply the <<相反数/opposite number>> of $a$.
        **C is wrong**: $|0| = 0$, and $0$ is not positive, so absolute value is not necessarily positive — it is "non-negative."
        **D is correct**: If $a = -a$, then $2a = 0$, so $a = 0$. Only $0$ equals its own <<相反数/opposite number>>.

    - number: 7
      type: 易错填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        比较大小（用 $<$ 连接）：$-\frac{3}{4}$______$-\frac{2}{3}$
      questionEn: |
        Compare (use $<$ or $>$): $-\frac{3}{4}$______$-\frac{2}{3}$
      correctValue: "<"
      answer: "$-\\frac{3}{4} < -\\frac{2}{3}$"
      answerEn: "$-\\frac{3}{4} < -\\frac{2}{3}$"
      explanation: |
        比较两个负分数的大小，先比较它们的<<绝对值/absolute value>>：
        $\left|-\frac{3}{4}\right| = \frac{3}{4} = 0.75$，$\left|-\frac{2}{3}\right| = \frac{2}{3} \approx 0.667$
        因为 $\frac{3}{4} > \frac{2}{3}$，即<<绝对值/absolute value>>更大，
        所以原数更小：$-\frac{3}{4} < -\frac{2}{3}$
        **易错点**：两个负数比大小，<<绝对值/absolute value>>大的反而小！不能直觉认为"$3 > 2$，所以 $-\frac{3}{4} > -\frac{2}{3}$"。
      explanationEn: |
        To compare two negative fractions, first compare their <<绝对值/absolute value>>s:
        $\left|-\frac{3}{4}\right| = \frac{3}{4} = 0.75$, $\left|-\frac{2}{3}\right| = \frac{2}{3} \approx 0.667$
        Since $\frac{3}{4} > \frac{2}{3}$ (larger <<绝对值/absolute value>>),
        the original number is smaller: $-\frac{3}{4} < -\frac{2}{3}$
        **Common mistake**: For two negative numbers, the one with the larger <<绝对值/absolute value>> is actually smaller!

    - number: 8
      type: 综合解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知 $a$ 是最大的负<<整数/integer>>，$b$ 的<<绝对值/absolute value>>等于 $3$，且 $b < 0$，$c$ 与 $-2$ 互为<<相反数/opposite number>>。
        (1) 求 $a$、$b$、$c$ 的值；
        (2) 在<<数轴/number line>>上表示 $a$、$b$、$c$，并将它们从小到大排列。
      questionEn: |
        Given that $a$ is the largest negative <<整数/integer>>, $|b| = 3$ and $b < 0$, and $c$ is the <<相反数/opposite number>> of $-2$.
        (1) Find the values of $a$, $b$, and $c$.
        (2) Plot $a$, $b$, $c$ on the <<数轴/number line>> and arrange them from smallest to largest.
      answer: |
        (1) $a = -1$，$b = -3$，$c = 2$
        (2) $b < a < c$，即 $-3 < -1 < 2$
      answerEn: |
        (1) $a = -1$, $b = -3$, $c = 2$
        (2) $b < a < c$, i.e., $-3 < -1 < 2$
      explanation: |
        **(1) 求值：**
        - 最大的负<<整数/integer>>：负整数有 $-1, -2, -3, \ldots$，其中最大的是 $a = -1$
        - $|b| = 3$ 且 $b < 0$：<<绝对值/absolute value>>为 $3$ 的数是 $\pm 3$，取负数得 $b = -3$
        - $c$ 与 $-2$ 互为<<相反数/opposite number>>：$c = -(-2) = 2$

        **(2) 排列：**
        在<<数轴/number line>>上，$-3$ 在最左边，$-1$ 在 $-3$ 右边，$2$ 在最右边。
        越靠右越大，所以 $-3 < -1 < 2$，即 $b < a < c$。

        **本题综合考查**：最大负整数、绝对值方程（注意取舍条件）、相反数运算、数轴排列。
      explanationEn: |
        **(1) Finding values:**
        - Largest negative <<整数/integer>>: negative integers are $-1, -2, -3, \ldots$, the largest is $a = -1$
        - $|b| = 3$ and $b < 0$: numbers with <<绝对值/absolute value>> $3$ are $\pm 3$; since $b < 0$, $b = -3$
        - $c$ is the <<相反数/opposite number>> of $-2$: $c = -(-2) = 2$

        **(2) Ordering:**
        On the <<数轴/number line>>, $-3$ is leftmost, $-1$ is to its right, $2$ is rightmost.
        Further right means larger, so $-3 < -1 < 2$, i.e., $b < a < c$.

        **This problem combines**: largest negative integer, absolute value equation (with selection condition), opposite number calculation, and number line ordering.
