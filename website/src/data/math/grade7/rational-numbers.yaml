examples:
  - type: 1
    title: 判断生活情境中的<<正数/positive number>><<负数/negative number>>
    titleEn: Identifying <<正数/positive number>>s and <<负数/negative number>>s in real-life situations
    question: |
      某水库的警戒水位为 $20$ 米。如果把"高于警戒水位"记作正，那么下面的水位应怎样记录？
      - 高于警戒水位 $1.2$ 米
      - 低于警戒水位 $0.8$ 米
      - 正好在警戒水位
    questionEn: |
      A reservoir has a warning water level of $20$ m. If "above warning level" is recorded as positive, how should the following levels be recorded?
      - $1.2$ m above warning level
      - $0.8$ m below warning level
      - Exactly at warning level
    steps:
      - '确定基准：警戒水位 $20$ 米是基准，对应 $0$'
      - '高于警戒水位 $1.2$ 米——正方向，记作 $+1.2$ 米（实际水位 $21.2$ 米）'
      - '低于警戒水位 $0.8$ 米——反方向，记作 $-0.8$ 米（实际水位 $19.2$ 米）'
      - '正好在警戒水位——就是基准本身，记作 $0$ 米（实际水位 $20$ 米）'
      - '**注意**：$0$ 不是"没有水位"，而是"正好达到警戒线"'
    stepsEn:
      - 'Identify the baseline: Warning level $20$ m is the baseline, corresponding to $0$'
      - '$1.2$ m above — positive direction, recorded as $+1.2$ m (actual level $21.2$ m)'
      - '$0.8$ m below — opposite direction, recorded as $-0.8$ m (actual level $19.2$ m)'
      - 'Exactly at warning level — the baseline itself, recorded as $0$ m (actual level $20$ m)'
      - '**Note**: $0$ does not mean "no water level" — it means "exactly at the warning line"'
    answer: '$+1.2$ 米，$-0.8$ 米，$0$ 米'
    answerEn: '$+1.2$ m, $-0.8$ m, $0$ m'

  - type: 2
    title: $0$ 的身份辨析
    titleEn: Understanding the identity of $0$
    question: |
      判断下列说法是否正确，并说明理由：
      (1) $0$ 是<<正数/positive number>>
      (2) $0$ 是<<整数/integer>>
      (3) $0$ 是<<有理数/rational number>>
      (4) $0$ 是最小的<<整数/integer>>
    questionEn: |
      Determine whether the following statements are true or false, and explain:
      (1) $0$ is a <<正数/positive number>>
      (2) $0$ is an <<整数/integer>>
      (3) $0$ is a <<有理数/rational number>>
      (4) $0$ is the smallest <<整数/integer>>
    steps:
      - '(1) **错误**。$0$ 既不是<<正数/positive number>>也不是<<负数/negative number>>，它是正负的分界点'
      - '(2) **正确**。$0$ 是<<整数/integer>>——<<整数/integer>>包括正<<整数/integer>>、零、负<<整数/integer>>三部分'
      - '(3) **正确**。$0$ 是<<整数/integer>>，而<<整数/integer>>属于<<有理数/rational number>>，所以 $0$ 也是<<有理数/rational number>>（$0 = \frac{0}{1}$）'
      - '(4) **错误**。<<整数/integer>>向负方向无限延伸（$-1, -2, -3, \ldots$），没有最小的<<整数/integer>>。$0$ 只是最小的**非负<<整数/integer>>**'
    stepsEn:
      - '(1) **False**. $0$ is neither a <<正数/positive number>> nor a <<负数/negative number>>; it is the dividing point'
      - '(2) **True**. $0$ is an <<整数/integer>> — <<整数/integer>>s include positive <<整数/integer>>s, zero, and negative <<整数/integer>>s'
      - '(3) **True**. $0$ is an <<整数/integer>>, and <<整数/integer>>s are <<有理数/rational number>>s, so $0$ is also a <<有理数/rational number>> ($0 = \frac{0}{1}$)'
      - '(4) **False**. <<整数/integer>>s extend infinitely in the negative direction ($-1, -2, -3, \ldots$), so there is no smallest <<整数/integer>>. $0$ is only the smallest **non-negative <<整数/integer>>**'
    answer: '(1) 错，(2) 对，(3) 对，(4) 错'
    answerEn: '(1) False, (2) True, (3) True, (4) False'

