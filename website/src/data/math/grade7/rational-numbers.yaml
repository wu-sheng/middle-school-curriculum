        将下列各数从小到大排列：$-|-5|$，$-(-3)$，$0$，$-2$，$|{-1}|$
      questionEn: |
        Arrange the following from smallest to largest: $-|-5|$, $-(-3)$, $0$, $-2$, $|{-1}|$
      answer: |
        $-|-5| < -2 < 0 < |-1| < -(-3)$，即 $-5 < -2 < 0 < 1 < 3$
      answerEn: |
        $-|-5| < -2 < 0 < |-1| < -(-3)$, i.e., $-5 < -2 < 0 < 1 < 3$
      explanation: |
        先化简每个表达式：
        - $-|-5| = -(5) = -5$（先求<<绝对值/absolute value>>得 $5$，再取负号）
        - $-(-3) = 3$（$-3$ 的<<相反数/opposite number>>）
        - $0$ 不变
        - $-2$ 不变
        - $|-1| = 1$（<<绝对值/absolute value>>）

        再按大小排列：<<负数/negative number>> $-5 < -2$（<<绝对值/absolute value>>大的更小），然后 $0$，再是<<正数/positive number>> $1 < 3$。
      explanationEn: |
        First simplify each expression:
        - $-|-5| = -(5) = -5$ (first find <<绝对值/absolute value>> to get $5$, then negate)
        - $-(-3) = 3$ (the <<相反数/opposite number>> of $-3$)
        - $0$ unchanged
        - $-2$ unchanged
        - $|-1| = 1$ (<<绝对值/absolute value>>)

        Then order: <<负数/negative number>>s $-5 < -2$ (larger <<绝对值/absolute value>> means smaller), then $0$, then <<正数/positive number>>s $1 < 3$.

