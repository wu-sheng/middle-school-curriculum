  - type: 5
    title: <<相反数/opposite number>>的概念与性质
    titleEn: Concept and properties of <<相反数/opposite number>>s
    question: |
      (1) $-7$ 的<<相反数/opposite number>>是多少？
      (2) 一个数的<<相反数/opposite number>>是 $-3$，这个数是多少？
      (3) 如果 $a$ 与 $b$ 互为<<相反数/opposite number>>，那么 $a + b$ 等于多少？
    questionEn: |
      (1) What is the <<相反数/opposite number>> of $-7$?
      (2) If the <<相反数/opposite number>> of a number is $-3$, what is the number?
      (3) If $a$ and $b$ are <<相反数/opposite number>>s, what is $a + b$?
    steps:
      - '(1) $-7$ 是<<负数/negative number>>，<<相反数/opposite number>>去掉负号，所以 $-7$ 的<<相反数/opposite number>>是 $7$'
      - '(2) 反向思考：谁的<<相反数/opposite number>>是 $-3$？<<相反数/opposite number>>互换符号，所以这个数是 $3$'
      - '    验证：$3$ 的<<相反数/opposite number>>确实是 $-3$ ✓'
      - '(3) 互为<<相反数/opposite number>>的两个数相加等于 $0$，即 $a + b = 0$'
      - '    例如：$5 + (-5) = 0$，$-3 + 3 = 0$。这是<<相反数/opposite number>>最重要的性质'
    stepsEn:
      - '(1) $-7$ is a <<负数/negative number>>; the <<相反数/opposite number>> removes the negative sign, so the <<相反数/opposite number>> of $-7$ is $7$'
      - '(2) Reverse thinking: whose <<相反数/opposite number>> is $-3$? <<相反数/opposite number>>s swap signs, so the number is $3$'
      - '    Verify: the <<相反数/opposite number>> of $3$ is indeed $-3$ ✓'
      - '(3) The sum of two <<相反数/opposite number>>s equals $0$, i.e., $a + b = 0$'
      - '    For example: $5 + (-5) = 0$, $-3 + 3 = 0$. This is the most important property of <<相反数/opposite number>>s'
    answer: '(1) $7$；(2) $3$；(3) $a + b = 0$'
    answerEn: '(1) $7$; (2) $3$; (3) $a + b = 0$'

  - type: 6
    title: <<绝对值/absolute value>>的分类讨论
    titleEn: Case analysis of <<绝对值/absolute value>>
    question: |
      求下列各数的<<绝对值/absolute value>>：$|8|$，$|-3.5|$，$|0|$，$|-\frac{2}{3}|$

      另外，如果 $|x| = 4$，那么 $x$ 等于多少？
    questionEn: |
      Find the <<绝对值/absolute value>> of each: $|8|$, $|-3.5|$, $|0|$, $|-\frac{2}{3}|$

      Also, if $|x| = 4$, what is $x$?
    steps:
      - '$|8| = 8$——<<正数/positive number>>的<<绝对值/absolute value>>等于它本身'
      - '$|-3.5| = 3.5$——<<负数/negative number>>的<<绝对值/absolute value>>等于去掉负号'
      - '$|0| = 0$——$0$ 的<<绝对值/absolute value>>是 $0$'
      - '$|-\frac{2}{3}| = \frac{2}{3}$——<<分数/fraction>>也一样，去掉负号即可'
      - '**关键题**：$|x| = 4$ 意味着 $x$ 到<<原点/origin>>的距离是 $4$'
      - '在<<数轴/number line>>上，距离<<原点/origin>> $4$ 个单位的点有**两个**：$4$ 和 $-4$'
      - '所以 $x = 4$ 或 $x = -4$——**不能只写一个！**'
    stepsEn:
      - '$|8| = 8$ — the <<绝对值/absolute value>> of a <<正数/positive number>> equals itself'
      - '$|-3.5| = 3.5$ — the <<绝对值/absolute value>> of a <<负数/negative number>> is the number without the negative sign'
      - '$|0| = 0$ — the <<绝对值/absolute value>> of $0$ is $0$'
      - '$|-\frac{2}{3}| = \frac{2}{3}$ — same rule applies to <<分数/fraction>>s'
      - '**Key problem**: $|x| = 4$ means the distance from $x$ to the <<原点/origin>> is $4$'
      - 'On the <<数轴/number line>>, there are **two** points $4$ units from the <<原点/origin>>: $4$ and $-4$'
      - 'So $x = 4$ or $x = -4$ — **do not write only one!**'
    answer: '$|8| = 8$，$|-3.5| = 3.5$，$|0| = 0$，$|-\frac{2}{3}| = \frac{2}{3}$；$x = 4$ 或 $x = -4$'
    answerEn: '$|8| = 8$, $|-3.5| = 3.5$, $|0| = 0$, $|-\frac{2}{3}| = \frac{2}{3}$; $x = 4$ or $x = -4$'

  - type: 7
    title: 比较<<有理数/rational number>>的大小
    titleEn: Comparing <<有理数/rational number>>s
    question: |
      用 $>$ 或 $<$ 填空：
      (1) $-3$ ______ $2$
      (2) $-6$ ______ $-1$
      (3) $-0.5$ ______ $0$
      (4) $-\frac{3}{4}$ ______ $-\frac{1}{2}$
    questionEn: |
      Fill in $>$ or $<$:
      (1) $-3$ ______ $2$
      (2) $-6$ ______ $-1$
      (3) $-0.5$ ______ $0$
      (4) $-\frac{3}{4}$ ______ $-\frac{1}{2}$
    steps:
      - '(1) $-3 < 2$：<<负数/negative number>>小于<<正数/positive number>>，直接判断'
      - '(2) $-6 < -1$：两个<<负数/negative number>>比较，用<<绝对值/absolute value>>——$|-6| = 6 > 1 = |-1|$，<<绝对值/absolute value>>大的<<负数/negative number>>反而小'
      - '(3) $-0.5 < 0$：<<负数/negative number>>都小于 $0$'
      - '(4) $-\frac{3}{4} < -\frac{1}{2}$：先比<<绝对值/absolute value>>：$\frac{3}{4} = 0.75 > 0.5 = \frac{1}{2}$，<<绝对值/absolute value>>大的<<负数/negative number>>更小'
      - '**技巧**：比较<<负数/negative number>><<分数/fraction>>时，先化成<<小数/decimal>>或通分更方便'
    stepsEn:
      - '(1) $-3 < 2$: A <<负数/negative number>> is less than a <<正数/positive number>>'
      - '(2) $-6 < -1$: Two <<负数/negative number>>s — use <<绝对值/absolute value>>: $|-6| = 6 > 1 = |-1|$, the <<负数/negative number>> with larger <<绝对值/absolute value>> is smaller'
      - '(3) $-0.5 < 0$: All <<负数/negative number>>s are less than $0$'
      - '(4) $-\frac{3}{4} < -\frac{1}{2}$: Compare <<绝对值/absolute value>>s: $\frac{3}{4} = 0.75 > 0.5 = \frac{1}{2}$, so the <<负数/negative number>> with larger <<绝对值/absolute value>> is smaller'
      - '**Tip**: When comparing negative <<分数/fraction>>s, converting to <<小数/decimal>>s or finding a common denominator is easier'
    answer: '(1) $<$，(2) $<$，(3) $<$，(4) $<$'
    answerEn: '(1) $<$, (2) $<$, (3) $<$, (4) $<$'

  - type: 8
    title: <<数轴/number line>>上的距离与<<绝对值/absolute value>>
    titleEn: Distance on the <<数轴/number line>> and <<绝对值/absolute value>>
    question: |
      在<<数轴/number line>>上，$A$ 点表示 $-2$，$B$ 点表示 $3$。
      (1) $A$ 点到<<原点/origin>>的距离是多少？
      (2) $B$ 点到<<原点/origin>>的距离是多少？
      (3) $A$、$B$ 两点之间的距离是多少？
    questionEn: |
      On the <<数轴/number line>>, point $A$ represents $-2$ and point $B$ represents $3$.
      (1) What is the distance from $A$ to the <<原点/origin>>?
      (2) What is the distance from $B$ to the <<原点/origin>>?
      (3) What is the distance between $A$ and $B$?
    steps:
      - '(1) $A$ 点到<<原点/origin>>的距离 $= |-2| = 2$（<<绝对值/absolute value>>就是到<<原点/origin>>的距离）'
      - '(2) $B$ 点到<<原点/origin>>的距离 $= |3| = 3$'
      - '(3) $A$ 在 $-2$，$B$ 在 $3$，它们分别在<<原点/origin>>两侧'
      - '    $A$ 到<<原点/origin>>距离 $2$，$B$ 到<<原点/origin>>距离 $3$，所以 $AB = 2 + 3 = 5$'
      - '    **公式**：<<数轴/number line>>上两点距离 $= |a - b|$，即 $|{-2} - 3| = |-5| = 5$'
    stepsEn:
      - '(1) Distance from $A$ to <<原点/origin>> $= |-2| = 2$ (<<绝对值/absolute value>> IS the distance to the <<原点/origin>>)'
      - '(2) Distance from $B$ to <<原点/origin>> $= |3| = 3$'
      - '(3) $A$ is at $-2$, $B$ is at $3$; they are on opposite sides of the <<原点/origin>>'
      - '    $A$ is $2$ units from <<原点/origin>>, $B$ is $3$ units from <<原点/origin>>, so $AB = 2 + 3 = 5$'
      - '    **Formula**: Distance between two points on the <<数轴/number line>> $= |a - b|$, i.e., $|{-2} - 3| = |-5| = 5$'
    stepsNumberLine:
      points:
        - value: -2
          label: A
        - value: 0
        - value: 3
          label: B
      min: -5
      max: 5
    answer: '(1) $2$；(2) $3$；(3) $5$'
    answerEn: '(1) $2$; (2) $3$; (3) $5$'

  - type: 9
    title: 多个数的大小排序
    titleEn: Ordering multiple numbers by size
    question: |
      把 $-3.5$，$2$，$0$，$-1$，$|-4|$，$-(-2)$ 从小到大排列。
    questionEn: |
      Arrange $-3.5$, $2$, $0$, $-1$, $|-4|$, $-(-2)$ from smallest to largest.
    steps:
      - '先化简：$|-4| = 4$（<<绝对值/absolute value>>），$-(-2) = 2$（<<相反数/opposite number>>）'
      - '待排列的数变为：$-3.5, 2, 0, -1, 4, 2$'
      - '分类：<<负数/negative number>>有 $-3.5, -1$；$0$；<<正数/positive number>>有 $2, 2, 4$'
      - '<<负数/negative number>>排序：$-3.5 < -1$（$|-3.5| = 3.5 > 1 = |-1|$，<<绝对值/absolute value>>大的更小）'
      - '<<正数/positive number>>排序：$2 = 2 < 4$'
      - '合并：$-3.5 < -1 < 0 < 2 = -(-2) < |-4|$'
    stepsEn:
      - 'First simplify: $|-4| = 4$ (<<绝对值/absolute value>>), $-(-2) = 2$ (<<相反数/opposite number>>)'
      - 'Numbers to order: $-3.5, 2, 0, -1, 4, 2$'
      - 'Categorize: <<负数/negative number>>s are $-3.5, -1$; $0$; <<正数/positive number>>s are $2, 2, 4$'
      - '<<负数/negative number>> order: $-3.5 < -1$ ($|-3.5| = 3.5 > 1 = |-1|$, larger <<绝对值/absolute value>> means smaller)'
      - '<<正数/positive number>> order: $2 = 2 < 4$'
      - 'Combined: $-3.5 < -1 < 0 < 2 = -(-2) < |-4|$'
    answer: '$-3.5 < -1 < 0 < 2 = -(-2) < |-4|$'
    answerEn: '$-3.5 < -1 < 0 < 2 = -(-2) < |-4|$'

  - type: 10
    title: 综合应用——<<相反数/opposite number>>、<<绝对值/absolute value>>与<<数轴/number line>>
    titleEn: Comprehensive application — <<相反数/opposite number>>, <<绝对值/absolute value>>, and the <<数轴/number line>>
    question: |
      $a$ 是最大的负<<整数/integer>>，$b$ 是<<绝对值/absolute value>>最小的数，$c$ 是 $-5$ 的<<相反数/opposite number>>。求 $a$、$b$、$c$ 的值，并在<<数轴/number line>>上标出这三个数。
    questionEn: |
      $a$ is the largest negative <<整数/integer>>, $b$ is the number with the smallest <<绝对值/absolute value>>, and $c$ is the <<相反数/opposite number>> of $-5$. Find the values of $a$, $b$, $c$, and mark them on the <<数轴/number line>>.
    steps:
      - '**求 $a$**：负<<整数/integer>>有 $-1, -2, -3, \ldots$，越靠近 $0$ 越大，所以最大的负<<整数/integer>>是 $a = -1$'
      - '**求 $b$**：<<绝对值/absolute value>>表示到<<原点/origin>>的距离，距离最小为 $0$，所以<<绝对值/absolute value>>最小的数是 $b = 0$'
      - '**求 $c$**：$-5$ 的<<相反数/opposite number>>，符号取反，所以 $c = 5$'
      - '在<<数轴/number line>>上标出 $a = -1$、$b = 0$、$c = 5$'
      - '这道题综合考查了：负<<整数/integer>>的范围、<<绝对值/absolute value>>的几何意义、<<相反数/opposite number>>的定义'
    stepsEn:
      - '**Find $a$**: Negative <<整数/integer>>s are $-1, -2, -3, \ldots$; the closer to $0$, the larger, so the largest negative <<整数/integer>> is $a = -1$'
      - '**Find $b$**: <<绝对值/absolute value>> represents distance to the <<原点/origin>>; the minimum distance is $0$, so the number with the smallest <<绝对值/absolute value>> is $b = 0$'
      - '**Find $c$**: The <<相反数/opposite number>> of $-5$ — reverse the sign, so $c = 5$'
      - 'Mark $a = -1$, $b = 0$, $c = 5$ on the <<数轴/number line>>'
      - 'This problem comprehensively tests: the range of negative <<整数/integer>>s, the geometric meaning of <<绝对值/absolute value>>, and the definition of <<相反数/opposite number>>'
    stepsNumberLine:
      points:
        - value: -1
          label: a
        - value: 0
          label: b
        - value: 5
          label: c
      min: -5
      max: 7
    answer: '$a = -1$，$b = 0$，$c = 5$'
    answerEn: '$a = -1$, $b = 0$, $c = 5$'

commonMistakes:
  - 不要把负号看丢：$-5$ 和 $5$ 完全不是同一个数
  - $0$ 既不是<<正数/positive number>>，也不是<<负数/negative number>>
  - <<相反数/opposite number>>不是"变大"或"变小"，而是"换方向"
  - <<绝对值/absolute value>>不是"去掉两边竖线直接照抄符号"，比如 $|-6|$ 不是 $-6$，而是 $6$
  - 比较两个<<负数/negative number>>时，不是数字大的那个大，而是离 $0$ 近的那个大
commonMistakesEn:
  - "Don't lose the negative sign: $-5$ and $5$ are completely different numbers"
  - "$0$ is neither a <<正数/positive number>> nor a <<负数/negative number>>"
  - "<<相反数/opposite number>> does not mean \"getting bigger\" or \"getting smaller\" — it means \"changing direction\""
  - "<<绝对值/absolute value>> does not mean \"remove the bars and copy the sign directly\" — for example, $|-6|$ is not $-6$, but $6$"
  - "When comparing two <<负数/negative number>>s, the one with the larger digit is not necessarily greater — the one closer to $0$ is greater"

