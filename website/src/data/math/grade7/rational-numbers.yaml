      - '$-2.8 = -\frac{14}{5}$: negative <<分数/fraction>> (<<小数/decimal>>s can also be <<分数/fraction>>s!)'
      - '$6$: positive <<整数/integer>>; $-\frac{1}{3}$: negative <<分数/fraction>>; $0.5 = \frac{1}{2}$: positive <<分数/fraction>>'
      - '**Positive <<整数/integer>> set**: $\{6\}$'
      - '**Negative <<分数/fraction>> set**: $\{-2.8, -\frac{1}{3}\}$'
      - '**<<整数/integer>> set**: $\{-5, 0, 6\}$ — note that $0$ is also an <<整数/integer>>!'
    answer: |
