title: "\U0001F3C6 AMC 8 扩展：应用题建模"
titleEn: "\U0001F3C6 AMC 8 Extension: Word Problem Modeling"
chapter: 14
subject: math
grade: grade7
semester: semester2
estimatedTime: 约 4–5 课时，每课时 45 分钟
estimatedTimeEn: "4–5 sessions, ~45 min each"
targetAudience: 七年级自学生，已完成方程组与不等式，掌握AMC 8核心建模技巧

objectives:
  - 掌握行程问题的核心公式 $d = rt$，能处理相遇、追及、平均速度问题
  - 理解工程问题的工作率模型，会用 $\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$ 求解合作问题
  - 熟练运用比例、百分数、连续百分变化解决混合与折扣问题
  - 掌握"文字 → 方程"的代数建模流程，能灵活选择一元或二元模型
  - 培养 AMC 8 应用题的"估算 → 验证"策略，提升选择题效率
objectivesEn:
  - Master the core formula $d = rt$ for rate–distance–time problems, including meeting, chase, and average-speed scenarios
  - Understand work-rate models and solve cooperative work problems using $\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$
  - Fluently apply ratio, proportion, percent change, and successive percent changes to mixture and discount problems
  - 'Master the "words → equations" algebraic modeling process: flexibly choose one-variable or two-variable setups'
  - 'Develop the AMC 8 "estimate then verify" strategy for multiple-choice efficiency'

concepts:
  - id: rate-distance-time
    title: 行程问题
    titleEn: Rate–Distance–Time Problems
    content: |
      **行程问题为什么重要？**

      在 AMC 8 中，行程问题几乎年年出现，是应用题建模的第一大类。
      所有行程问题的核心只有一个公式：

      $$d = r \times t$$

      其中 $d$ 是<<路程/distance>>，$r$ 是<<速率/rate>>（速度），$t$ 是<<时间/time>>。

      由此可以推导出：$r = \frac{d}{t}$，$t = \frac{d}{r}$。

      **单位换算（AMC 8 常见陷阱）**

      | 换算 | 公式 |
      |------|------|
      | 英里/小时 → 英里/分钟 | $\div 60$ |
      | 分钟 → 小时 | $\div 60$ |
      | 英尺/秒 → 英里/小时 | $\times \frac{3600}{5280} = \times \frac{15}{22}$ |

      很多同学在 AMC 8 中因为单位不统一而出错。**做行程题的第一步永远是统一单位！**

      **<<相对速度/relative speed>>**

      当两个物体同时运动时，我们关注它们之间距离的变化率：

      - **相向而行（迎面）**：相对速度 $= r_1 + r_2$（距离每秒缩短 $r_1 + r_2$）
      - **同向而行（追及）**：相对速度 $= |r_1 - r_2|$（距离每秒缩短 $|r_1 - r_2|$）
      - **背向而行**：相对速度 $= r_1 + r_2$（距离每秒增大 $r_1 + r_2$）

      **相遇问题**：两人从相距 $d$ 的两地出发，相向而行。
      $$\text{相遇时间} = \frac{d}{r_1 + r_2}$$

      **追及问题**：快的追慢的，初始相距 $d$。
      $$\text{追上时间} = \frac{d}{r_{\text{快}} - r_{\text{慢}}}$$

      **<<平均速度/average speed>>（最常考的陷阱！）**

      平均速度**不是**速度的算术平均值！正确公式：

      $$\text{平均速度} = \frac{\text{总路程}}{\text{总时间}}$$

      **经典陷阱**：去程 30 mph，回程 60 mph，平均速度是多少？
      很多人答 45 mph（错！）。正确做法：设单程 $d$。
      去程时间 $= \frac{d}{30}$，回程时间 $= \frac{d}{60}$。
      总时间 $= \frac{d}{30} + \frac{d}{60} = \frac{3d}{60} = \frac{d}{20}$。
      平均速度 $= \frac{2d}{\frac{d}{20}} = 40$ mph。

      **环形跑道问题**

      两人在周长为 $L$ 的环形跑道上跑步：
      - 反向跑：每隔 $\frac{L}{r_1 + r_2}$ 时间相遇一次
      - 同向跑：快者每超慢者一整圈（多跑 $L$），用时 $\frac{L}{r_{\text{快}} - r_{\text{慢}}}$
    contentEn: |
      **Why are rate problems important?**

      Rate–distance–time problems appear on the AMC 8 almost every year and are the most common type of word problem.
      Every rate problem comes down to one formula:

      $$d = r \times t$$

      where $d$ is <<路程/distance>>, $r$ is <<速率/rate>> (speed), and $t$ is <<时间/time>>.

      Rearranging: $r = \frac{d}{t}$, $t = \frac{d}{r}$.

      **Unit conversion (common AMC 8 trap)**

      | Conversion | Formula |
      |-----------|---------|
      | mph → miles/min | $\div 60$ |
      | minutes → hours | $\div 60$ |
      | ft/s → mph | $\times \frac{3600}{5280} = \times \frac{15}{22}$ |

      Many students lose points on AMC 8 because of mismatched units. **Always unify units first!**

      **<<相对速度/Relative speed>>**

      When two objects move simultaneously, focus on how the gap between them changes:

      - **Moving toward each other (meeting)**: relative speed $= r_1 + r_2$
      - **Moving in the same direction (chase)**: relative speed $= |r_1 - r_2|$
      - **Moving apart**: relative speed $= r_1 + r_2$

      **Meeting problem**: Two people start $d$ apart, heading toward each other.
      $$\text{Meeting time} = \frac{d}{r_1 + r_2}$$

      **Chase problem**: Faster chases slower, initial gap $d$.
      $$\text{Catch-up time} = \frac{d}{r_{\text{fast}} - r_{\text{slow}}}$$

      **<<平均速度/Average speed>> (most tested trap!)**

      Average speed is **NOT** the arithmetic mean of the speeds! Correct formula:

      $$\text{Average speed} = \frac{\text{Total distance}}{\text{Total time}}$$

      **Classic trap**: Going at 30 mph, returning at 60 mph. Average speed?
      Many answer 45 mph (wrong!). Correct: let one-way distance $= d$.
      Time there $= \frac{d}{30}$, time back $= \frac{d}{60}$.
      Total time $= \frac{d}{30} + \frac{d}{60} = \frac{d}{20}$.
      Average speed $= \frac{2d}{\frac{d}{20}} = 40$ mph.

      **Circular track problems**

      Two runners on a track of circumference $L$:
      - Opposite directions: they meet every $\frac{L}{r_1 + r_2}$ time units
      - Same direction: the faster laps the slower every $\frac{L}{r_{\text{fast}} - r_{\text{slow}}}$ time units
    notes:
      - '行程问题三要素：路程、速率、时间，知二求一'
      - '平均速度 ≠ 速度平均值——这是 AMC 8 最经典的陷阱之一'
      - '追及问题的关键：用相对速度把两人运动转化为一人运动'
      - '环形跑道问题的本质：追及多跑一整圈 $L$'
    notesEn:
      - 'Three elements of rate problems: distance, rate, time — know two, find the third'
      - 'Average speed ≠ average of speeds — one of the most classic AMC 8 traps'
      - 'Chase problems: use relative speed to reduce two-body motion to one-body motion'
      - 'Circular track: lapping means the faster runner covers one extra circumference $L$'

  - id: work-problems
    title: 工程问题
    titleEn: Work Rate Problems
    content: |
      **工程问题的核心思想**

      <<工程问题/work rate problems>>和行程问题本质相似——把"工作量"类比为"路程"，"工作效率"类比为"速度"。

      **基本模型**

      如果一个人单独完成一项工作需要 $A$ 天，那么他**每天完成的工作量**（工作率）为 $\frac{1}{A}$。

      如果两个人合作：
      $$\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$$

      其中 $T$ 是合作完成的天数。

      **为什么用倒数？**

      想象刷一面墙：
      - 小明 6 小时刷完 → 每小时刷 $\frac{1}{6}$ 面墙
      - 小红 3 小时刷完 → 每小时刷 $\frac{1}{3}$ 面墙
      - 合作：每小时刷 $\frac{1}{6} + \frac{1}{3} = \frac{1}{6} + \frac{2}{6} = \frac{3}{6} = \frac{1}{2}$ 面墙
      - 合作完成时间：$T = 2$ 小时

      **进阶：中途加入/离开**

      如果 A 先独自做了 $t_1$ 小时，然后 B 加入，两人一起做完，总共用了多久？

      A 先做的工作量：$\frac{t_1}{A}$。
      剩余工作量：$1 - \frac{t_1}{A}$。
      两人合作的时间：$t_2 = \frac{1 - \frac{t_1}{A}}{\frac{1}{A} + \frac{1}{B}}$。
      总时间：$t_1 + t_2$。

      **多人合作**

      三人合作：$\frac{1}{A} + \frac{1}{B} + \frac{1}{C} = \frac{1}{T}$

      **工程问题解题步骤**

      1. 设工作总量为 $1$（整体法）
      2. 求出每个人的工作率（$\frac{1}{\text{完成天数}}$）
      3. 根据合作/分段工作列方程
      4. 求解并检验（总工作量 = 1）

      **易错点**

      - 忘记"工作率是倒数"，直接把天数相加（错！6 天和 3 天合作不是 4.5 天）
      - 分段工作时，忘记前一段已完成的工作量
      - 单位不一致：有人用"天"，有人用"小时"
    contentEn: |
      **Core idea of work rate problems**

      <<工程问题/Work rate problems>> are structurally similar to rate–distance–time problems — think of "work" as "distance" and "work rate" as "speed."

      **Basic model**

      If one person finishes a job alone in $A$ days, their **daily work rate** is $\frac{1}{A}$.

      If two people cooperate:
      $$\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$$

      where $T$ is the time to finish together.

      **Why reciprocals?**

      Imagine painting a wall:
      - Ming: 6 hours alone → paints $\frac{1}{6}$ wall per hour
      - Hong: 3 hours alone → paints $\frac{1}{3}$ wall per hour
      - Together: $\frac{1}{6} + \frac{1}{3} = \frac{1}{2}$ wall per hour
      - Time together: $T = 2$ hours

      **Advanced: joining/leaving midway**

      If A works alone for $t_1$ hours, then B joins, how long total?

      A's work done: $\frac{t_1}{A}$.
      Remaining: $1 - \frac{t_1}{A}$.
      Time together: $t_2 = \frac{1 - \frac{t_1}{A}}{\frac{1}{A} + \frac{1}{B}}$.
      Total: $t_1 + t_2$.

      **Multiple workers**

      Three people: $\frac{1}{A} + \frac{1}{B} + \frac{1}{C} = \frac{1}{T}$

      **Problem-solving steps**

      1. Set total work $= 1$ (unit-work method)
      2. Find each person's rate ($\frac{1}{\text{days to finish}}$)
      3. Write an equation based on cooperation / segments
      4. Solve and verify (total work done $= 1$)

      **Common mistakes**

      - Forgetting that rates are reciprocals — adding days directly (wrong! 6 days + 3 days together ≠ 4.5 days)
      - In segmented work, forgetting the portion already completed
      - Mixing units: some in "days," others in "hours"
    notes:
      - '工作率 = 工作量 ÷ 时间 = $\frac{1}{\text{完成天数}}$'
      - '合作效率 = 各人效率之和：$\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$'
      - '6 天和 3 天合作完成需要 2 天（不是 4.5 天！）'
      - '解题第一步：设总工作量为 1'
    notesEn:
      - 'Work rate = work ÷ time = $\frac{1}{\text{days to finish}}$'
      - 'Combined rate = sum of individual rates: $\frac{1}{A} + \frac{1}{B} = \frac{1}{T}$'
      - '6-day and 3-day workers together finish in 2 days (NOT 4.5 days!)'
      - 'Step one: set total work = 1'

  - id: ratio-proportion
    title: 比例与百分数
    titleEn: Ratio, Proportion & Percent
    content: |
      **比例和百分数在 AMC 8 中无处不在**

      AMC 8 每年至少有 3–4 道题直接考查<<比例/ratio>>、<<百分数/percent>>或<<比例方程/proportion>>。这些题看起来简单，但陷阱很多。

      **比例的基本概念**

      $a : b = c : d$（或 $\frac{a}{b} = \frac{c}{d}$）意味着四个量成<<比例/proportion>>。

      **交叉相乘**：$\frac{a}{b} = \frac{c}{d}$ 等价于 $a \times d = b \times c$。

      **例**：如果男女比为 $3:5$，共 40 人，男生有多少人？
      男生 $= 40 \times \frac{3}{3+5} = 40 \times \frac{3}{8} = 15$ 人。

      **<<百分数变化/percent change>>**

      $$\text{变化率} = \frac{\text{新值} - \text{原值}}{\text{原值}} \times 100\%$$

      - 增长 $p\%$：新值 $= \text{原值} \times (1 + \frac{p}{100})$
      - 减少 $p\%$：新值 $= \text{原值} \times (1 - \frac{p}{100})$

      **<<连续百分数变化/successive percent changes>>（AMC 8 高频考点！）**

      先增 $p\%$，再减 $p\%$，结果**不等于**原值！

      $$\text{原值} \times (1 + \frac{p}{100}) \times (1 - \frac{p}{100}) = \text{原值} \times (1 - \frac{p^2}{10000})$$

      结果总是**减少**了！减少量为原值的 $\frac{p^2}{10000}$。

      **例**：商品先涨价 $20\%$，再打八折（降 $20\%$）。
      $1 \times 1.2 \times 0.8 = 0.96$，即变成原价的 $96\%$——亏了 $4\%$！

      **连续百分数的正确做法：逐步乘**

      给了 Pedro $20\%$，剩 $80\%$。再给 Ebony 剩余的 $10\%$，剩 $80\% \times 90\% = 72\%$。
      不能直接算"$20\% + 10\% = 30\%$"（错！因为第二次的基数变了）。

      **<<混合问题/mixture problems>>**

      把不同浓度的溶液混合时，用"溶质守恒"：

      $$c_1 \times V_1 + c_2 \times V_2 = c_{\text{混}} \times (V_1 + V_2)$$

      **例**：30% 盐水 200g 与 50% 盐水 300g 混合，浓度是多少？
      盐总量 $= 0.3 \times 200 + 0.5 \times 300 = 60 + 150 = 210$ g。
      混合浓度 $= \frac{210}{500} = 42\%$。

      **易错点**

      - 连续百分数变化的基数会变——不能直接加减百分数
      - "A 是 B 的百分之几"和"A 比 B 多百分之几"不同！
      - 混合问题中，总量 = 两者之和（别忘了加分母）
    contentEn: |
      **Ratios and percents are everywhere on AMC 8**

      Every year the AMC 8 includes at least 3–4 problems directly testing <<比例/ratio>>, <<百分数/percent>>, or <<比例方程/proportion>>. They look simple, but traps abound.

      **Ratio basics**

      $a : b = c : d$ (or $\frac{a}{b} = \frac{c}{d}$) means the four quantities form a <<比例/proportion>>.

      **Cross-multiplication**: $\frac{a}{b} = \frac{c}{d}$ is equivalent to $a \times d = b \times c$.

      **Example**: Boys to girls $= 3:5$, total 40. Boys $= 40 \times \frac{3}{8} = 15$.

      **<<百分数变化/Percent change>>**

      $$\text{Change rate} = \frac{\text{New} - \text{Original}}{\text{Original}} \times 100\%$$

      - Increase by $p\%$: new $= \text{original} \times (1 + \frac{p}{100})$
      - Decrease by $p\%$: new $= \text{original} \times (1 - \frac{p}{100})$

      **<<连续百分数变化/Successive percent changes>> (AMC 8 favorite!)**

      Increase by $p\%$, then decrease by $p\%$, does NOT return to the original!

      $$\text{original} \times (1 + \frac{p}{100}) \times (1 - \frac{p}{100}) = \text{original} \times (1 - \frac{p^2}{10000})$$

      The result is always **less** than the original — by a factor of $\frac{p^2}{10000}$.

      **Example**: A store raises a price by 20%, then discounts by 20%.
      $1 \times 1.2 \times 0.8 = 0.96$, i.e., 96% of original — a 4% loss!

      **Correct approach to successive percents: multiply step by step**

      Give Pedro 20%, 80% remains. Then give Ebony 10% of the remainder: $80\% \times 90\% = 72\%$.
      You CANNOT compute "$20\% + 10\% = 30\%$" (wrong! — the base changes each time).

      **<<混合问题/Mixture problems>>**

      When mixing solutions of different concentrations, use "solute conservation":

      $$c_1 \times V_1 + c_2 \times V_2 = c_{\text{mix}} \times (V_1 + V_2)$$

      **Example**: Mix 200 g of 30% salt water with 300 g of 50% salt water.
      Total salt $= 0.3 \times 200 + 0.5 \times 300 = 210$ g.
      Mixed concentration $= \frac{210}{500} = 42\%$.

      **Common mistakes**

      - The base changes in successive percent problems — don't add/subtract percentages directly
      - '"A is what percent of B" and "A is what percent MORE than B" are different!'
      - In mixture problems, total volume = sum of both (don't forget to add denominators)
    notes:
      - '交叉相乘：$\frac{a}{b} = \frac{c}{d}$ 等价于 $ad = bc$'
      - '连续百分变化：先涨 $p\%$ 再降 $p\%$，结果降低 $\frac{p^2}{10000}$'
      - '混合问题的核心：溶质（或价值）守恒'
      - '看到"剩余的百分之几"，要用逐步乘法，不能直接加减'
    notesEn:
      - 'Cross-multiply: $\frac{a}{b} = \frac{c}{d}$ iff $ad = bc$'
      - 'Successive percent changes: up $p\%$ then down $p\%$ results in a net decrease of $\frac{p^2}{10000}$'
      - 'Mixture problem core: solute (or value) conservation'
      - 'When you see "percent of the remainder," multiply step by step — never add/subtract percentages directly'

  - id: algebraic-modeling
    title: 代数建模策略
    titleEn: Algebraic Modeling Strategies
    content: |
      **从文字到方程：AMC 8 建模的核心技能**

      AMC 8 应用题的难度不在于计算，而在于**把文字翻译成数学表达式**。
      <<代数建模/algebraic modeling>>就是这个翻译过程。

      **建模四步法**

      1. **读题画图**：仔细读题，画示意图或列表，标出已知和未知
      2. **设未知数**：选择合适的变量（设什么最方便？）
      3. **列方程**：用等量关系把已知和未知联系起来
      4. **解方程并验证**：解出答案后代回原题检验

      **一元 vs. 二元：怎么选？**

      | 情况 | 选择 | 原因 |
      |------|------|------|
      | 只有一个核心未知量 | 一元 | 更简洁 |
      | 两个未知量有直接关系 | 一元（设一个，另一个用它表示） | 如"男生 $x$ 人，女生 $40-x$ 人" |
      | 两个独立未知量 | 二元方程组 | 如年龄问题、鸡兔同笼 |

      **常见文字 → 数学翻译**

      | 中文 | 英文 | 数学表达 |
      |------|------|---------|
      | A 比 B 多 5 | A is 5 more than B | $A = B + 5$ |
      | A 是 B 的 3 倍 | A is 3 times B | $A = 3B$ |
      | A 和 B 的和 | the sum of A and B | $A + B$ |
      | A 比 B 少 20% | A is 20% less than B | $A = 0.8B$ |
      | A 的 $\frac{2}{3}$ | two thirds of A | $\frac{2}{3}A$ |

      **<<逆推法/working backwards>>（AMC 8 神器！）**

      有些题从结果出发，逆向推导更简单。特别适合：
      - 连续操作后求初始值
      - 选择题中直接代入验证

      **例**：某数先乘 2，再加 5，结果是 21。求原数。
      正推：设 $x$，$2x + 5 = 21$，$x = 8$。
      逆推：$21 \xrightarrow{-5} 16 \xrightarrow{\div 2} 8$。结果一样，但逆推更快。

      **<<代入验证法/estimate-then-verify>>（选择题专属策略）**

      AMC 8 是选择题，答案就在 A–E 中。
      如果列方程太复杂，可以：
      1. **估算范围**：大致判断答案量级
      2. **代入验证**：把选项代入题目条件，看哪个满足
      3. **排除法**：排除明显不对的选项

      **例**：如果方程很难解，但知道答案是整数，且选项是 5, 9, 12, 15, 20——可以逐个代入检验。

      **建模的常见错误**

      - "A 比 B 多 5"写成 $A + 5 = B$（反了！应该是 $A = B + 5$）
      - 忘记检验：解出的 $x$ 可能不满足实际约束（如负数、非整数）
      - 设变量太多：能用一个变量表示所有量时，不要用两个
    contentEn: |
      **From words to equations: the core AMC 8 modeling skill**

      AMC 8 word problems are hard not because of computation, but because of **translating words into math**.
      <<代数建模/Algebraic modeling>> is that translation process.

      **Four-step modeling process**

      1. **Read and draw**: read carefully, sketch a diagram or table, label knowns and unknowns
      2. **Define variables**: choose the most convenient variable(s)
      3. **Write equations**: connect knowns and unknowns via equal-quantity relationships
      4. **Solve and verify**: check the answer against the original problem

      **One variable vs. two: how to choose?**

      | Situation | Choice | Reason |
      |-----------|--------|--------|
      | One core unknown | One variable | Simpler |
      | Two unknowns with a direct link | One variable (express the other in terms of it) | E.g., "$x$ boys, $40-x$ girls" |
      | Two independent unknowns | System of equations | E.g., age problems, chicken-rabbit problems |

      **Common word → math translations**

      | Chinese | English | Math |
      |---------|---------|------|
      | A 比 B 多 5 | A is 5 more than B | $A = B + 5$ |
      | A 是 B 的 3 倍 | A is 3 times B | $A = 3B$ |
      | A 和 B 的和 | the sum of A and B | $A + B$ |
      | A 比 B 少 20% | A is 20% less than B | $A = 0.8B$ |
      | A 的 $\frac{2}{3}$ | two thirds of A | $\frac{2}{3}A$ |

      **<<逆推法/Working backwards>> (AMC 8 power tool!)**

      Some problems are easier starting from the result. Especially useful for:
      - Finding the initial value after a sequence of operations
      - Plugging answer choices back in to verify

      **Example**: A number is doubled, then 5 is added, giving 21. Find the number.
      Forward: let $x$, $2x + 5 = 21$, $x = 8$.
      Backward: $21 \xrightarrow{-5} 16 \xrightarrow{\div 2} 8$. Same answer, faster.

      **<<代入验证法/Estimate-then-verify>> (multiple-choice only)**

      AMC 8 is multiple choice — the answer is among A–E.
      If setting up an equation is too complex:
      1. **Estimate the range**: rough order-of-magnitude guess
      2. **Plug in choices**: test each option against the problem conditions
      3. **Eliminate**: remove obviously wrong options first

      **Example**: If the equation is hard to solve but the answer is an integer among 5, 9, 12, 15, 20 — just test each one.

      **Common modeling mistakes**

      - '"A is 5 more than B" written as $A + 5 = B$ (reversed! should be $A = B + 5$)'
      - 'Forgetting to verify: the solved $x$ might violate real constraints (negative, non-integer)'
      - 'Using too many variables: if one variable can express everything, don''t use two'
    notes:
      - '建模四步法：读题画图 → 设未知数 → 列方程 → 解方程验证'
      - '"A 比 B 多"→ $A = B + \text{差}$，主语在等号左边'
      - '逆推法特别适合选择题——从答案出发，看哪个满足条件'
      - '代入验证法是 AMC 8 的效率利器：先估算，再代入最可能的选项'
    notesEn:
      - 'Four steps: read & draw → define variables → write equations → solve & verify'
      - '"A is more than B" → $A = B + \text{difference}$; the subject goes on the left of $=$'
      - 'Working backwards is perfect for multiple choice — start from each answer, check which fits'
      - 'Estimate-then-verify is an AMC 8 efficiency weapon: estimate first, then test the likeliest choice'

examples:
  - type: 1
    source: "AMC 8 2016 #4"
    title: 速率对比——Cheenu 跑步与散步
    titleEn: Rate Comparison — Cheenu Running vs. Walking
    question: |
      小时候，Cheenu 可以在 $3$ 小时 $30$ 分钟内跑完 $15$ 英里。
      现在年纪大了，他可以在 $4$ 小时内走完 $10$ 英里。
      现在每英里比小时候多花多少分钟？

      (A) 6 &emsp; (B) 10 &emsp; (C) 15 &emsp; (D) 18 &emsp; (E) 30
    questionEn: |
      When he was a boy, Cheenu could run $15$ miles in $3$ hours and $30$ minutes.
      As an old man, he can now walk $10$ miles in $4$ hours.
      How many minutes longer per mile does it take him now compared to when he was a boy?

      (A) 6 &emsp; (B) 10 &emsp; (C) 15 &emsp; (D) 18 &emsp; (E) 30
    steps:
      - '小时候：$15$ 英里用 $3$ 小时 $30$ 分钟 $= 210$ 分钟。每英里 $= \frac{210}{15} = 14$ 分钟/英里'
      - '现在：$10$ 英里用 $4$ 小时 $= 240$ 分钟。每英里 $= \frac{240}{10} = 24$ 分钟/英里'
      - '差值 $= 24 - 14 = \mathbf{10}$ 分钟/英里'
    stepsEn:
      - 'As a boy: 15 miles in 3 hr 30 min $= 210$ min. Per mile $= \frac{210}{15} = 14$ min/mi'
      - 'As an old man: 10 miles in 4 hr $= 240$ min. Per mile $= \frac{240}{10} = 24$ min/mi'
      - 'Difference $= 24 - 14 = \mathbf{10}$ min/mi'
    answer: '(B) 10'
    answerEn: '(B) 10'

  - type: 2
    source: "AMC 8 2019 #16"
    title: 平均速度建模——强哥开车
    titleEn: Average Speed Modeling — Qiang Drives
    question: |
      Qiang 以 $30$ 英里/小时的速度开了 $15$ 英里到达叔叔家的高速路入口。
      之后他以 $55$ 英里/小时的速度继续行驶了 $d$ 英里。
      如果全程的平均速度恰好是 $50$ 英里/小时，则 $d$ 等于多少？

      (A) 45 &emsp; (B) 62 &emsp; (C) 90 &emsp; (D) 110 &emsp; (E) 135
    questionEn: |
      Qiang drives $15$ miles at an average speed of $30$ miles per hour.
      He then drives $d$ miles at $55$ miles per hour.
      If his overall average speed for the entire trip is $50$ miles per hour, what is $d$?

      (A) 45 &emsp; (B) 62 &emsp; (C) 90 &emsp; (D) 110 &emsp; (E) 135
    steps:
      - '第一段：$15$ 英里，速度 $30$ mph，时间 $= \frac{15}{30} = 0.5$ 小时'
      - '第二段：$d$ 英里，速度 $55$ mph，时间 $= \frac{d}{55}$ 小时'
      - '平均速度 $= \frac{\text{总路程}}{\text{总时间}}$，代入：$\frac{15 + d}{0.5 + \frac{d}{55}} = 50$'
      - '两边交叉相乘：$15 + d = 50 \times (0.5 + \frac{d}{55}) = 25 + \frac{50d}{55} = 25 + \frac{10d}{11}$'
      - '$15 + d - \frac{10d}{11} = 25$'
      - '$d - \frac{10d}{11} = 10$，即 $\frac{d}{11} = 10$'
      - '$d = \mathbf{110}$'
      - '验证：总路程 $= 15 + 110 = 125$ 英里，总时间 $= 0.5 + \frac{110}{55} = 0.5 + 2 = 2.5$ 小时。平均速度 $= \frac{125}{2.5} = 50$ mph ✓'
    stepsEn:
      - 'Leg 1: 15 miles at 30 mph → time $= \frac{15}{30} = 0.5$ hr'
      - 'Leg 2: $d$ miles at 55 mph → time $= \frac{d}{55}$ hr'
      - 'Average speed $= \frac{\text{total distance}}{\text{total time}}$: $\frac{15+d}{0.5+\frac{d}{55}} = 50$'
      - 'Cross-multiply: $15+d = 50(0.5 + \frac{d}{55}) = 25 + \frac{10d}{11}$'
      - '$15 + d - \frac{10d}{11} = 25$'
      - '$d - \frac{10d}{11} = 10$, so $\frac{d}{11} = 10$'
      - '$d = \mathbf{110}$'
      - 'Check: total distance $= 125$ mi, total time $= 2.5$ hr. Average $= \frac{125}{2.5} = 50$ mph ✓'
    answer: '(D) 110'
    answerEn: '(D) 110'

  - type: 3
    source: "AMC 8 2019 #8"
    title: 连续百分数——Gilda 的弹珠
    titleEn: Successive Percents — Gilda's Marbles
    question: |
      Gilda 有一袋弹珠。她先给了 Pedro $20\%$，然后把剩余的 $10\%$ 给了 Ebony，
      最后把当前剩余的 $25\%$ 给了 Jimmy。Gilda 最终还剩原来的百分之多少？

      (A) 20 &emsp; (B) $33\frac{1}{3}$ &emsp; (C) 38 &emsp; (D) 45 &emsp; (E) 54
    questionEn: |
      Gilda has a bag of marbles. She gives $20\%$ of them to Pedro. Then she gives $10\%$ of what is left to Ebony.
      Then she gives $25\%$ of what is now left to Jimmy. What percentage of her original marbles does Gilda have left?

      (A) 20 &emsp; (B) $33\frac{1}{3}$ &emsp; (C) 38 &emsp; (D) 45 &emsp; (E) 54
    steps:
      - '每次"给出 $p\%$"就等于"保留 $(100-p)\%$"，用逐步乘法计算保留比例'
      - '给 Pedro $20\%$ 后，剩余 $= 100\% \times 80\% = 80\%$'
      - '给 Ebony 剩余的 $10\%$ 后，剩余 $= 80\% \times 90\% = 72\%$'
      - '给 Jimmy 剩余的 $25\%$ 后，剩余 $= 72\% \times 75\% = \mathbf{54\%}$'
      - '注意：不能直接算 $20\% + 10\% + 25\% = 55\%$，因为每次的基数不同！'
    stepsEn:
      - 'Each "give $p\%$" means "keep $(100-p)\%$" — compute the retained fraction step by step'
      - 'After Pedro ($20\%$ given): remaining $= 100\% \times 80\% = 80\%$'
      - 'After Ebony ($10\%$ of remainder given): remaining $= 80\% \times 90\% = 72\%$'
      - 'After Jimmy ($25\%$ of remainder given): remaining $= 72\% \times 75\% = \mathbf{54\%}$'
      - 'Caution: you CANNOT simply add $20\% + 10\% + 25\% = 55\%$ — the base changes each time!'
    answer: '(E) 54'
    answerEn: '(E) 54'

  - type: 4
    source: "AMC 8 2020 #13"
    title: 比例建模——Jamal 的袜子
    titleEn: Proportion Modeling — Jamal's Socks
    question: |
      Jamal 的抽屉里有 $6$ 只绿袜子、$18$ 只紫袜子和 $12$ 只橙袜子。
      他又往抽屉里加了一些紫袜子后，随机取出一只紫袜子的概率变为 $60\%$。
      他加了多少只紫袜子？

      (A) 6 &emsp; (B) 9 &emsp; (C) 12 &emsp; (D) 18 &emsp; (E) 24
    questionEn: |
      Jamal has $6$ green, $18$ purple, and $12$ orange socks in a drawer.
      After adding some purple socks, the probability of randomly choosing a purple sock becomes $60\%$.
      How many purple socks did he add?

      (A) 6 &emsp; (B) 9 &emsp; (C) 12 &emsp; (D) 18 &emsp; (E) 24
    steps:
      - '原来共有 $6 + 18 + 12 = 36$ 只袜子'
      - '设加了 $x$ 只紫袜子。加入后紫袜子总数 $= 18 + x$，袜子总数 $= 36 + x$'
      - '概率条件：$\frac{18 + x}{36 + x} = \frac{3}{5}$（$60\% = \frac{3}{5}$）'
      - '交叉相乘：$5(18 + x) = 3(36 + x)$'
      - '$90 + 5x = 108 + 3x$'
      - '$2x = 18$，$x = \mathbf{9}$'
      - '验证：$18 + 9 = 27$ 只紫袜子，总共 $36 + 9 = 45$ 只。$\frac{27}{45} = \frac{3}{5} = 60\%$ ✓'
    stepsEn:
      - 'Originally $6 + 18 + 12 = 36$ socks total'
      - 'Let $x$ = purple socks added. New purple $= 18 + x$, new total $= 36 + x$'
      - 'Probability condition: $\frac{18+x}{36+x} = \frac{3}{5}$ (since $60\% = \frac{3}{5}$)'
      - 'Cross-multiply: $5(18+x) = 3(36+x)$'
      - '$90 + 5x = 108 + 3x$'
      - '$2x = 18$, so $x = \mathbf{9}$'
      - 'Check: $27$ purple out of $45$ total $= \frac{27}{45} = \frac{3}{5} = 60\%$ ✓'
    answer: '(B) 9'
    answerEn: '(B) 9'

