    - number: 8
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #12"
      section: 工程与建模
      question: |
        Rohan 有 $90$ 条孔雀鱼分在 $4$ 个鱼缸中。
        第二个鱼缸比第一个多 $1$ 条，第三个比第二个多 $2$ 条，第四个比第三个多 $3$ 条。
        第四个鱼缸有多少条鱼？
      questionEn: |
        Rohan has $90$ guppies in $4$ fish tanks. The second tank has $1$ more than the first,
        the third has $2$ more than the second, and the fourth has $3$ more than the third.
        How many guppies are in the fourth tank?
      choices:
        - label: A
          content: '20'
        - label: B
          content: '21'
        - label: C
          content: '23'
        - label: D
          content: '24'
        - label: E
          content: '26'
      correctValue: E
      answer: '(E) 26'
      answerEn: '(E) 26'
      explanation: |
        设第一个鱼缸有 $x$ 条。则：
        第一个 $= x$，第二个 $= x+1$，第三个 $= (x+1)+2 = x+3$，第四个 $= (x+3)+3 = x+6$。
        总和 $= x + (x+1) + (x+3) + (x+6) = 4x + 10 = 90$。
        $4x = 80$，$x = 20$。
        第四个鱼缸 $= 20 + 6 = \mathbf{26}$。

        💡 **另一种方法——代入选项验证：**
        如果第四个鱼缸有 26 条，则第三个 $= 26-3=23$，第二个 $= 23-2=21$，第一个 $= 21-1=20$。
        验算：$20+21+23+26=90$ ✓。
        也可以从选项中间（如 D=24）开始试：第三 21，第二 19，第一 18，总和 $82 \neq 90$，太少 → 试更大的选项。
      explanationEn: |
        Let tank 1 have $x$ guppies. Then:
        Tank 1 $= x$, Tank 2 $= x+1$, Tank 3 $= x+3$, Tank 4 $= x+6$.
        Sum $= 4x + 10 = 90$, so $x = 20$.
        Tank 4 $= 20 + 6 = \mathbf{26}$.

        💡 **Alternative — Plug In Choices:**
        If tank 4 has 26, then tank 3 $= 26-3=23$, tank 2 $= 23-2=21$, tank 1 $= 21-1=20$.
        Check: $20+21+23+26=90$ ✓.
        Or start from the middle choice (D=24): tank 3=21, tank 2=19, tank 1=18, sum $=82 \neq 90$, too small → try larger.

    - number: 9
      type: 单选题
      inputType: mc
      source: "AMC 8 2023 #5"
      section: 工程与建模
      question: |
        一个湖里有 $250$ 条鳟鱼。生物学家随机捕捞了 $180$ 条鱼，其中有 $30$ 条鳟鱼。
        据此估算，湖里总共有多少条鱼？
      questionEn: |
        A lake contains $250$ trout. A biologist nets a random sample of $180$ fish, finding $30$ of them are trout.
        Based on this sample, estimate the total number of fish in the lake.
      choices:
        - label: A
          content: '1250'
        - label: B
          content: '1500'
        - label: C
          content: '1800'
        - label: D
          content: '2000'
        - label: E
          content: '2500'
      correctValue: B
      answer: '(B) 1500'
      answerEn: '(B) 1500'
      explanation: |
        用<<比例方程/proportion>>：样本中鳟鱼占比 $=$ 总体中鳟鱼占比。
        $\frac{30}{180} = \frac{250}{\text{总鱼数}}$。
        总鱼数 $= \frac{250 \times 180}{30} = \mathbf{1500}$。
      explanationEn: |
        Set up a <<比例方程/proportion>>: sample trout ratio = lake trout ratio.
        $\frac{30}{180} = \frac{250}{\text{total}}$.
        Total $= \frac{250 \times 180}{30} = \mathbf{1500}$.

    - number: 10
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #10"
      section: 综合应用
      question: |
        $1980$ 年 $1$ 月，大气中 CO₂ 浓度为 $338$ ppm。
        此后每年以 $1.515$ ppm 的速度稳定增长。
        预计 $2030$ 年 $1$ 月的 CO₂ 浓度最接近下列哪个值？
      questionEn: |
        In January 1980, the atmospheric CO₂ concentration was $338$ ppm.
        It has been increasing at a steady rate of $1.515$ ppm per year.
        What value is the expected CO₂ concentration in January 2030 closest to?
      choices:
        - label: A
          content: '399'
        - label: B
          content: '414'
        - label: C
          content: '420'
        - label: D
          content: '444'
        - label: E
          content: '459'
      correctValue: B
      answer: '(B) 414'
      answerEn: '(B) 414'
      explanation: |
        从 $1980$ 到 $2030$ 共 $50$ 年。
        增长量 $= 50 \times 1.515 = 75.75$ ppm。
        预计值 $= 338 + 75.75 = 413.75 \approx \mathbf{414}$ ppm。
      explanationEn: |
        From 1980 to 2030: 50 years.
        Increase $= 50 \times 1.515 = 75.75$ ppm.
        Expected $= 338 + 75.75 = 413.75 \approx \mathbf{414}$ ppm.

    - number: 11
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #8"
      section: 综合应用
      question: |
        Ricardo 有 $2020$ 枚硬币，全部由 $1$ 美分和 $5$ 美分硬币组成，且每种至少一枚。
        他可能拥有的最大金额与最小金额之差是多少美分？
      questionEn: |
        Ricardo has $2020$ coins, all of which are pennies ($1$¢) and nickels ($5$¢), with at least one of each.
        What is the difference in cents between the greatest and least amounts of money he can have?
      choices:
        - label: A
          content: '8062'
        - label: B
          content: '8068'
        - label: C
          content: '8072'
        - label: D
          content: '8076'
        - label: E
          content: '8082'
      correctValue: C
      answer: '(C) 8072'
      answerEn: '(C) 8072'
      explanation: |
        最大金额：尽量多用 $5$ 美分。$2019$ 枚 $5$¢ $+ 1$ 枚 $1$¢ $= 2019 \times 5 + 1 = 10096$¢。
        最小金额：尽量多用 $1$ 美分。$2019$ 枚 $1$¢ $+ 1$ 枚 $5$¢ $= 2019 + 5 = 2024$¢。
        差 $= 10096 - 2024 = \mathbf{8072}$¢。
      explanationEn: |
        Maximum: use as many nickels as possible. $2019 \times 5 + 1 = 10096$¢.
        Minimum: use as many pennies as possible. $2019 + 5 = 2024$¢.
        Difference $= 10096 - 2024 = \mathbf{8072}$¢.

    - number: 12
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #2"
      section: 综合应用
      question: |
        四个朋友分别赚了 $\$15$、$\$20$、$\$25$、$\$40$。
        他们决定把钱平均分配。赚 $\$40$ 的那个人要给出多少钱？
      questionEn: |
        Four friends do yard work and earn $\$15$, $\$20$, $\$25$, and $\$40$ respectively.
        They decide to split the total amount equally. How much does the friend who earned $\$40$ give to the others?
      choices:
        - label: A
          content: '$\$5$'
        - label: B
          content: '$\$10$'
        - label: C
          content: '$\$15$'
        - label: D
          content: '$\$20$'
        - label: E
          content: '$\$25$'
      correctValue: C
      answer: '(C) $\$15$'
      answerEn: '(C) $\$15$'
      explanation: |
        总收入 $= 15 + 20 + 25 + 40 = 100$ 美元。平均 $= \frac{100}{4} = 25$ 美元。
        赚 $\$40$ 的人需要给出 $40 - 25 = \mathbf{\$15}$。
      explanationEn: |
        Total $= 15 + 20 + 25 + 40 = 100$. Equal share $= \frac{100}{4} = 25$.
        The $\$40$ earner gives $40 - 25 = \mathbf{\$15}$.

summary:
  - '行程问题核心：$d = r \times t$，平均速度 $= \frac{\text{总路程}}{\text{总时间}}$（不是速度的平均值！）'
  - '相对速度：相向 $r_1 + r_2$，同向 $|r_1 - r_2|$，是解决相遇和追及问题的关键'
  - '工程问题核心：工作率为倒数，合作效率 $= \frac{1}{A} + \frac{1}{B} = \frac{1}{T}$'
  - '连续百分数变化必须逐步乘，不能直接加减百分数（基数会变！）'
  - '先涨 $p\%$ 再降 $p\%$，结果恒小于原值，减少量为 $\frac{p^2}{10000}$'
  - '代数建模四步法：读题画图 → 设未知数 → 列方程 → 解方程验证'
  - 'AMC 8 效率策略：逆推法和代入验证法，善用选择题的五个选项'
summaryEn:
  - 'Rate problems: $d = rt$; average speed $= \frac{\text{total distance}}{\text{total time}}$ (NOT the average of speeds!)'
  - 'Relative speed: toward each other $r_1+r_2$, same direction $|r_1-r_2|$ — key to meeting and chase problems'
  - 'Work rate: rates are reciprocals; combined rate $= \frac{1}{A}+\frac{1}{B}=\frac{1}{T}$'
  - 'Successive percent changes must be multiplied step by step — never add/subtract percentages (the base changes!)'
  - 'Up $p\%$ then down $p\%$ always yields less than the original, by $\frac{p^2}{10000}$'
  - 'Algebraic modeling: read & draw → define variables → write equations → solve & verify'
  - 'AMC 8 efficiency: working backwards and plugging in answer choices — leverage the five options'

examPrep:
  intro: 以下为 AMC 8 真题精选，难度高于练习题，综合考查应用题建模能力。
  introEn: The following are selected AMC 8 problems at a higher difficulty level, testing comprehensive word-problem modeling skills.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #16"
      section: 综合
      question: |
        Qiang 以 $30$ mph 开了 $15$ 英里，之后以 $55$ mph 开了 $d$ 英里。
        全程平均速度恰好 $50$ mph，求 $d$。
      questionEn: |
        Qiang drives $15$ miles at $30$ mph, then $d$ miles at $55$ mph.
        His overall average speed is exactly $50$ mph. Find $d$.
      choices:
        - label: A
          content: '45'
        - label: B
          content: '62'
        - label: C
          content: '90'
        - label: D
          content: '110'
        - label: E
          content: '135'
      correctValue: D
      answer: '(D) 110'
      answerEn: '(D) 110'
      explanation: |
        第一段时间 $= \frac{15}{30} = 0.5$ 小时。
        平均速度方程：$\frac{15 + d}{0.5 + \frac{d}{55}} = 50$。
        $15 + d = 25 + \frac{10d}{11}$。
        $\frac{d}{11} = 10$，$d = \mathbf{110}$。
        验证：$\frac{125}{2.5} = 50$ ✓。
      explanationEn: |
        Leg 1 time $= \frac{15}{30} = 0.5$ hr.
        Average speed equation: $\frac{15+d}{0.5+\frac{d}{55}} = 50$.
        $15+d = 25 + \frac{10d}{11}$.
        $\frac{d}{11} = 10$, so $d = \mathbf{110}$.
        Check: $\frac{125}{2.5} = 50$ ✓.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #22"
      section: 综合
      question: |
        一家商店先将商品价格提高 $p\%$，然后降价 $p\%$。
        最终价格是原价的 $84\%$。求 $p$。
      questionEn: |
        A store increases an item's price by $p\%$, then decreases the new price by $p\%$.
        The final price is $84\%$ of the original. Find $p$.
      choices:
        - label: A
          content: '8'
        - label: B
          content: '16'
        - label: C
          content: '20'
        - label: D
          content: '36'
        - label: E
          content: '40'
      correctValue: E
      answer: '(E) 40'
      answerEn: '(E) 40'
      explanation: |
        $(1 + \frac{p}{100})(1 - \frac{p}{100}) = 1 - \frac{p^2}{10000} = 0.84$。
        $\frac{p^2}{10000} = 0.16$，$p^2 = 1600$，$p = \mathbf{40}$。
        验证：$1.4 \times 0.6 = 0.84$ ✓。
      explanationEn: |
        $(1+\frac{p}{100})(1-\frac{p}{100}) = 1 - \frac{p^2}{10000} = 0.84$.
        $\frac{p^2}{10000} = 0.16$, $p^2 = 1600$, $p = \mathbf{40}$.
        Check: $1.4 \times 0.6 = 0.84$ ✓.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #12"
      section: 综合
      question: |
        汽车时钟每过 $30$ 分钟真实时间就快 $5$ 分钟（显示 $35$ 分钟）。
        中午两个钟都准确。当汽车时钟显示 $7{:}00$ PM 时，实际几点？
      questionEn: |
        A car clock gains 5 minutes for every 30 real minutes (shows 35 min per 30 real min).
        Both clocks agree at noon. When the car clock reads $7{:}00$ PM, what is the real time?
      choices:
        - label: A
          content: '$5{:}30$ PM'
        - label: B
          content: '$6{:}00$ PM'
        - label: C
          content: '$6{:}30$ PM'
        - label: D
          content: '$6{:}36$ PM'
        - label: E
          content: '$6{:}42$ PM'
      correctValue: B
      answer: '(B) $6{:}00$ PM'
      answerEn: '(B) $6{:}00$ PM'
      explanation: |
        汽车时钟：真实时间 $= 7 : 6$。
        汽车从 $12{:}00$ 到 $7{:}00$，车钟走了 $420$ 分钟。
        真实时间 $= 420 \times \frac{6}{7} = 360$ 分钟 $= 6$ 小时。
        实际时间 $= \mathbf{6{:}00}$ PM。
      explanationEn: |
        Car-to-real ratio $= 7:6$.
        Car clock: 12:00 to 7:00 PM $= 420$ car-minutes.
        Real time $= 420 \times \frac{6}{7} = 360$ min $= 6$ hr.
        Real time $= \mathbf{6{:}00}$ PM.

    - number: 4
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #16"
      section: 综合
      question: |
        Annie 比 Bonnie 快 $25\%$，同向跑 $400$ 米环形跑道。
        Annie 第一次追上 Bonnie 时跑了几圈？
      questionEn: |
        Annie runs $25\%$ faster than Bonnie on a $400$-meter track, same direction.
        How many laps has Annie completed when she first passes Bonnie?
      choices:
        - label: A
          content: '3'
        - label: B
          content: '3.5'
        - label: C
          content: '4'
        - label: D
          content: '5'
        - label: E
          content: '25'
      correctValue: D
      answer: '(D) 5'
      answerEn: '(D) 5'
      explanation: |
        设 Bonnie 速度 $v$，Annie 速度 $1.25v$。相对速度 $= 0.25v$。
        追上需多跑一圈：$\frac{400}{0.25v} = \frac{1600}{v}$ 的时间。
        Annie 跑 $1.25v \times \frac{1600}{v} = 2000$ 米 $= \mathbf{5}$ 圈。
      explanationEn: |
        Bonnie speed $= v$, Annie $= 1.25v$. Relative speed $= 0.25v$.
        Lapping requires $\frac{400}{0.25v} = \frac{1600}{v}$ time.
        Annie runs $1.25v \times \frac{1600}{v} = 2000$ m $= \mathbf{5}$ laps.

    - number: 5
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #8"
      section: 综合
      question: |
        Ricardo 有 $2020$ 枚硬币（$1$¢ 和 $5$¢ 各至少一枚）。
        最大金额与最小金额之差是多少美分？
      questionEn: |
        Ricardo has $2020$ coins (pennies and nickels, at least one of each).
        What is the difference in cents between the maximum and minimum possible amounts?
      choices:
        - label: A
          content: '8062'
        - label: B
          content: '8068'
        - label: C
          content: '8072'
        - label: D
          content: '8076'
        - label: E
          content: '8082'
      correctValue: C
      answer: '(C) 8072'
      answerEn: '(C) 8072'
      explanation: |
        最大：$2019 \times 5 + 1 = 10096$¢。最小：$2019 + 5 = 2024$¢。
        差 $= 10096 - 2024 = \mathbf{8072}$¢。

        **建模思路**：极端情况法——最大化时尽量多用大面值，最小化时尽量多用小面值。
        约束"至少各一枚"决定了极端情况的边界。
      explanationEn: |
        Max: $2019 \times 5 + 1 = 10096$¢. Min: $2019 + 5 = 2024$¢.
        Difference $= 10096 - 2024 = \mathbf{8072}$¢.

        **Modeling insight**: extreme-case strategy — maximize by using large denominations, minimize by using small ones.
        The "at least one of each" constraint sets the boundary.
