  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #16"
      section: 行程问题
      question: |
        Annie 和 Bonnie 从同一点出发，沿 $400$ 米环形跑道同方向跑步。
        Annie 的速度比 Bonnie 快 $25\%$。
        当 Annie 第一次追上 Bonnie（即从身后超过她）时，Annie 跑了几圈？
      questionEn: |
        Annie and Bonnie run laps on a $400$-meter oval track, starting at the same point and going in the same direction.
        Annie runs $25\%$ faster than Bonnie.
        When Annie first passes Bonnie, how many laps has Annie completed?
      choices:
        - label: A
          content: '3'
        - label: B
          content: '3.5'
        - label: C
          content: '4'
        - label: D
          content: '5'
        - label: E
          content: '25'
      correctValue: D
      answer: '(D) 5'
      answerEn: '(D) 5'
      explanation: |
        设 Bonnie 的速度为 $v$，则 Annie 的速度为 $1.25v$。
        Annie 追上 Bonnie 时，Annie 比 Bonnie 多跑了一整圈（$400$ 米）。
        相对速度 $= 1.25v - v = 0.25v$。
        追上时间 $= \frac{400}{0.25v} = \frac{1600}{v}$。
        Annie 跑的路程 $= 1.25v \times \frac{1600}{v} = 2000$ 米 $= 5$ 圈。
      explanationEn: |
        Let Bonnie's speed be $v$; Annie's is $1.25v$.
        Annie passes Bonnie when she's run exactly one extra lap ($400$ m).
        Relative speed $= 1.25v - v = 0.25v$.
        Catch-up time $= \frac{400}{0.25v} = \frac{1600}{v}$.
        Annie's distance $= 1.25v \times \frac{1600}{v} = 2000$ m $= 5$ laps.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #17"
      section: 行程问题
      question: |
        Bella 和 Ella 住在相距 $2$ 英里的地方（$1$ 英里 $= 5280$ 英尺）。
        Bella 步行、Ella 骑车，同时出发相向而行。Ella 的速度是 Bella 的 $5$ 倍。
        Bella 每步 $2.5$ 英尺。当她们相遇时，Bella 走了多少步？
      questionEn: |
        Bella begins to walk from her house toward Ella's house, which is $2$ miles away ($1$ mile $= 5280$ feet).
        At the same time, Ella begins to ride her bicycle toward Bella's house.
        Ella rides $5$ times as fast as Bella walks, and Bella's steps are each $2.5$ feet long.
        How many steps will Bella have taken when they meet?
      choices:
        - label: A
          content: '704'
        - label: B
          content: '845'
        - label: C
          content: '1056'
        - label: D
          content: '1760'
        - label: E
          content: '3520'
      correctValue: A
      answer: '(A) 704'
      answerEn: '(A) 704'
      explanation: |
        总距离 $= 2 \times 5280 = 10560$ 英尺。
        设 Bella 速度为 $v$，Ella 速度为 $5v$。相向而行，合速度 $= 6v$。
        相遇时间 $= \frac{10560}{6v}$。
        Bella 走的距离 $= v \times \frac{10560}{6v} = \frac{10560}{6} = 1760$ 英尺。
        步数 $= \frac{1760}{2.5} = \mathbf{704}$ 步。
      explanationEn: |
        Total distance $= 2 \times 5280 = 10560$ ft.
        Let Bella's speed $= v$, Ella's $= 5v$. Combined speed $= 6v$.
        Meeting time $= \frac{10560}{6v}$.
        Bella walks $= v \times \frac{10560}{6v} = \frac{10560}{6} = 1760$ ft.
        Steps $= \frac{1760}{2.5} = \mathbf{704}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #12"
      section: 行程问题
      question: |
        中午 $12{:}00$，汽车时钟和手表都显示正确时间。
        汽车时钟走快了——实际每过 $30$ 分钟，它显示过了 $35$ 分钟。
        当汽车时钟显示晚上 $7{:}00$ 时，真实时间是几点？
      questionEn: |
        At noon, both a car clock and a watch show the correct time.
        The car clock gains time — for every 30 real minutes, it shows 35 minutes have passed.
        When the car clock reads $7{:}00$ PM, what is the actual time?
      choices:
        - label: A
          content: '$5{:}30$ PM'
        - label: B
          content: '$6{:}00$ PM'
        - label: C
          content: '$6{:}30$ PM'
        - label: D
          content: '$6{:}36$ PM'
        - label: E
          content: '$6{:}42$ PM'
      correctValue: B
      answer: '(B) $6{:}00$ PM'
      answerEn: '(B) $6{:}00$ PM'
      explanation: |
        汽车时钟与真实时间的比例：$35 : 30 = 7 : 6$。
        即汽车时钟每走 $7$ 分钟，实际只过了 $6$ 分钟。
        汽车从 $12{:}00$ 到 $7{:}00$，汽车时钟走了 $7$ 小时 $= 420$ 分钟。
        真实时间 $= 420 \times \frac{6}{7} = 360$ 分钟 $= 6$ 小时。
        真实时间：$12{:}00 + 6$ 小时 $= \mathbf{6{:}00}$ PM。
      explanationEn: |
        Car-clock-to-real-time ratio: $35 : 30 = 7 : 6$.
        Every 7 car-clock minutes = 6 real minutes.
        Car clock elapsed from 12:00 to 7:00 PM = 7 hr = 420 car-clock minutes.
        Real elapsed time $= 420 \times \frac{6}{7} = 360$ min $= 6$ hr.
        Real time: $12{:}00 + 6$ hr $= \mathbf{6{:}00}$ PM.

    - number: 4
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #1"
      section: 行程问题
      question: |
        Luka 做柠檬水，水量是糖量的 $4$ 倍，糖量是柠檬汁的 $2$ 倍。
        如果他用了 $3$ 杯柠檬汁，需要多少杯水？
      questionEn: |
        Luka is making lemonade. He needs $4$ times as much water as sugar and twice as much sugar as lemon juice.
        He uses $3$ cups of lemon juice. How many cups of water does he need?
      choices:
        - label: A
          content: '6'
        - label: B
          content: '8'
        - label: C
          content: '12'
        - label: D
          content: '18'
        - label: E
          content: '24'
      correctValue: E
      answer: '(E) 24'
      answerEn: '(E) 24'
      explanation: |
        柠檬汁 $= 3$ 杯。糖 $= 2 \times 3 = 6$ 杯。水 $= 4 \times 6 = \mathbf{24}$ 杯。
        本题考查逐步比例关系：柠檬汁 → 糖 → 水，不要跳步直接算。
      explanationEn: |
        Lemon juice $= 3$ cups. Sugar $= 2 \times 3 = 6$ cups. Water $= 4 \times 6 = \mathbf{24}$ cups.
        This tests chained ratio relationships: juice → sugar → water. Don't skip steps.

    - number: 5
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #15"
      section: 比例与百分数
      question: |
        如果 $x$ 的 $15\%$ 等于 $y$ 的 $20\%$，那么 $x$ 是 $y$ 的百分之多少？
      questionEn: |
        Suppose $15\%$ of $x$ equals $20\%$ of $y$. What percent of $x$ is $y$?
      choices:
        - label: A
          content: '5'
        - label: B
          content: '35'
        - label: C
          content: '75'
        - label: D
          content: '133'
        - label: E
          content: '300'
      correctValue: C
      answer: '(C) 75'
      answerEn: '(C) 75'
      explanation: |
        $0.15x = 0.20y$。
        $\frac{y}{x} = \frac{0.15}{0.20} = \frac{15}{20} = \frac{3}{4} = 75\%$。
        所以 $y$ 是 $x$ 的 $\mathbf{75\%}$。
      explanationEn: |
        $0.15x = 0.20y$.
        $\frac{y}{x} = \frac{0.15}{0.20} = \frac{3}{4} = 75\%$.
        So $y$ is $\mathbf{75\%}$ of $x$.

    - number: 6
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #22"
      section: 比例与百分数
      question: |
        一家商店先将某件商品的价格提高了 $p\%$，然后又降价 $p\%$。
        最终价格是原价的 $84\%$。求 $p$ 的值。
      questionEn: |
        A store increased the price of an item by $p\%$ and then decreased the new price by $p\%$.
        The final price was $84\%$ of the original. What is $p$?
      choices:
        - label: A
          content: '8'
        - label: B
          content: '16'
        - label: C
          content: '20'
        - label: D
          content: '36'
        - label: E
          content: '40'
      correctValue: E
      answer: '(E) 40'
      answerEn: '(E) 40'
      explanation: |
        设原价为 $1$。涨 $p\%$ 后为 $(1 + \frac{p}{100})$，再降 $p\%$ 后为：
        $(1 + \frac{p}{100})(1 - \frac{p}{100}) = 1 - \frac{p^2}{10000} = 0.84$。
        $\frac{p^2}{10000} = 0.16$。
        $p^2 = 1600$。
        $p = \mathbf{40}$。

        💡 **另一种方法——代入选项逐个试：**
        原价设为 100。逐个试选项：
        A) $p=8$：$100 \times 1.08 \times 0.92 = 99.36$（不是 84）✗
        B) $p=16$：$100 \times 1.16 \times 0.84 = 97.44$ ✗
        C) $p=20$：$100 \times 1.2 \times 0.8 = 96$ ✗
        D) $p=36$：$100 \times 1.36 \times 0.64 = 87.04$ ✗
        E) $p=40$：$100 \times 1.4 \times 0.6 = 84$ ✓ 答案就是 40！
        AMC 8 是选择题——直接试选项有时比推公式更快！
      explanationEn: |
        Let original price $= 1$. After $+p\%$: $(1+\frac{p}{100})$. After $-p\%$:
        $(1+\frac{p}{100})(1-\frac{p}{100}) = 1 - \frac{p^2}{10000} = 0.84$.
        $\frac{p^2}{10000} = 0.16$.
        $p^2 = 1600$.
        $p = \mathbf{40}$.

        💡 **Alternative — Plug In Each Choice:**
        Let original price $= 100$. Try each option:
        A) $p=8$: $100 \times 1.08 \times 0.92 = 99.36$ (not 84) ✗
        B) $p=16$: $100 \times 1.16 \times 0.84 = 97.44$ ✗
        C) $p=20$: $100 \times 1.2 \times 0.8 = 96$ ✗
        D) $p=36$: $100 \times 1.36 \times 0.64 = 87.04$ ✗
        E) $p=40$: $100 \times 1.4 \times 0.6 = 84$ ✓ Got it!
        On a multiple-choice test, plugging in choices can be faster than deriving a formula!

    - number: 7
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #5"
      section: 比例与百分数
      question: |
        一个水壶装了 $\frac{3}{4}$ 壶水，平均分给 $5$ 个杯子。
        每个杯子里有整壶水的百分之多少？
      questionEn: |
        Three-fourths of a pitcher is filled with water. The water is poured equally into $5$ cups.
        What percent of the full pitcher does each cup contain?
      choices:
        - label: A
          content: '5'
        - label: B
          content: '10'
        - label: C
          content: '15'
