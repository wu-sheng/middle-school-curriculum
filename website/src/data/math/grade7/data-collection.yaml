      question: |
        在<<频数分布直方图/frequency distribution histogram>>中，<<频数/frequency>>最大的那一组表示（　）
      questionEn: |
        In a <<频数分布直方图/frequency distribution histogram>>, the group with the largest <<频数/frequency>> indicates ( )
      subInputs:
        - prompt: 选择答案
          options:
            - 该组的数据值最大
            - 该组中落入的数据个数最多
