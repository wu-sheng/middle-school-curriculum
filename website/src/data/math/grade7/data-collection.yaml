      answer: 该组中落入的数据个数最多
      answerEn: The most data points fall into this group
      explanation: |
        <<频数/frequency>>表示落入该组的数据个数。<<频数/frequency>>最大说明该区间内的数据最多，反映了数据的集中趋势，但并不意味着数值最大或最准确。
      explanationEn: |
        <<频数/frequency>> represents the number of data points falling into that group. The largest <<频数/frequency>> means the most data points are in that interval, reflecting the concentration trend of the data, but it does not mean the values are the largest or most accurate.

    - number: 11
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: "IV. Calculation"
      question: |
        某校对40名学生的每日上网时间（单位：分钟）进行了调查，部分<<频数分布表/frequency distribution table>>如下：

        | 上网时间 | <<频数/frequency>> | <<频率/relative frequency>> |
        |----------|---------|---------|
        | $[0, 30)$ | 6 | $a$ |
        | $[30, 60)$ | 14 | 0.35 |
        | $[60, 90)$ | $b$ | 0.30 |
        | $[90, 120]$ | 8 | $c$ |

        求 $a$、$b$、$c$ 的值。
      questionEn: |
        A school surveyed the daily internet usage time (in minutes) of 40 students. A partial <<频数分布表/frequency distribution table>> is shown below:

        | Internet time | <<频数/frequency>> | <<频率/relative frequency>> |
        |---------------|---------|---------|
        | $[0, 30)$ | 6 | $a$ |
        | $[30, 60)$ | 14 | 0.35 |
        | $[60, 90)$ | $b$ | 0.30 |
        | $[90, 120]$ | 8 | $c$ |

        Find the values of $a$, $b$, and $c$.
      answer: |
        $a = \dfrac{6}{40} = 0.15$

        $b = 0.30 \times 40 = 12$

        $c = \dfrac{8}{40} = 0.20$

        验证：$6 + 14 + 12 + 8 = 40$ ✓
        验证：$0.15 + 0.35 + 0.30 + 0.20 = 1.00$ ✓
      answerEn: |
        $a = \dfrac{6}{40} = 0.15$

        $b = 0.30 \times 40 = 12$

        $c = \dfrac{8}{40} = 0.20$

        Verification: $6 + 14 + 12 + 8 = 40$ ✓
        Verification: $0.15 + 0.35 + 0.30 + 0.20 = 1.00$ ✓
      explanation: |
        利用 $<<频率/relative frequency>> = \dfrac{<<频数/frequency>>}{总数}$ 这一关系，已知其中两个量就可以求第三个量。完成后用<<频数/frequency>>之和与<<频率/relative frequency>>之和分别验证。
      explanationEn: |
        Using the relationship $\text{relative frequency} = \dfrac{\text{frequency}}{\text{total}}$, knowing any two of the three values allows you to find the third. After completion, verify by checking that <<频数/frequency>> values sum to the total and <<频率/relative frequency>> values sum to $1$.

    - number: 12
      type: 综合题
      inputType: open
      section: 五、综合题
      sectionEn: "V. Comprehensive Problem"
      question: |
        某班40名同学的立定跳远成绩（单位：厘米）如下：

        155, 160, 165, 170, 158, 172, 180, 185, 175, 168,
        190, 162, 178, 195, 188, 173, 167, 182, 176, 163,
        171, 186, 169, 192, 177, 164, 183, 174, 161, 179,
        187, 166, 193, 181, 170, 175, 184, 168, 191, 176

        （1）以 $10$ 厘米为组距，将数据分组并制作<<频数分布表/frequency distribution table>>。
        （2）根据<<频数分布表/frequency distribution table>>，指出成绩主要集中在哪个区间。
      questionEn: |
        The standing long jump results (in cm) of 40 students in a class are as follows:

        155, 160, 165, 170, 158, 172, 180, 185, 175, 168,
        190, 162, 178, 195, 188, 173, 167, 182, 176, 163,
        171, 186, 169, 192, 177, 164, 183, 174, 161, 179,
        187, 166, 193, 181, 170, 175, 184, 168, 191, 176

        (1) Using a class width of $10$ cm, group the data and create a <<频数分布表/frequency distribution table>>.
        (2) Based on the <<频数分布表/frequency distribution table>>, identify the interval where scores are mainly concentrated.
      answer: |
        （1）最小值155，最大值195，极差 $= 195 - 155 = 40$，组距10，分4组。

        | 成绩（厘米） | <<频数/frequency>> | <<频率/relative frequency>> |
        |-------------|---------|---------|
        | $[155, 165)$ | 7 | 0.175 |
        | $[165, 175)$ | 12 | 0.300 |
        | $[175, 185)$ | 12 | 0.300 |
        | $[185, 195]$ | 9 | 0.225 |
        | 合计 | 40 | 1.000 |

        （2）成绩主要集中在 $[165, 185)$ 厘米区间，共24人，占 $60\%$。
      answerEn: |
        (1) Minimum 155, maximum 195, range $= 195 - 155 = 40$, class width 10, 4 groups.

        | Score (cm) | <<频数/frequency>> | <<频率/relative frequency>> |
        |------------|---------|---------|
        | $[155, 165)$ | 7 | 0.175 |
        | $[165, 175)$ | 12 | 0.300 |
        | $[175, 185)$ | 12 | 0.300 |
        | $[185, 195]$ | 9 | 0.225 |
        | Total | 40 | 1.000 |

        (2) Scores are mainly concentrated in the $[165, 185)$ cm range, with 24 students, accounting for $60\%$.
      explanation: |
        制作<<频数分布表/frequency distribution table>>的关键步骤：先求极差确定分组范围，再用"画正字"法统计各组<<频数/frequency>>，最后计算<<频率/relative frequency>>并验证总和。
      explanationEn: |
        Key steps for creating a <<频数分布表/frequency distribution table>>: first find the range to determine the grouping, then use tally marks to count the <<频数/frequency>> for each group, and finally calculate the <<频率/relative frequency>> and verify the totals.

