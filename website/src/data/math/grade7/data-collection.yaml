examPrep:
  intro: 以下题目难度略高于课内练习，帮助你巩固本章知识并提升综合运用能力。
  introEn: "These questions are slightly harder than regular exercises to help you consolidate and apply what you have learned in this chapter."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        下列说法正确的是（　）
      questionEn: |
        Which of the following statements is correct? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - '为了了解全国中学生的心理健康状况，应采用<<全面调查/census>>'
            - '<<抽样调查/sampling survey>>的结果比<<全面调查/census>>更准确'
            - '<<抽样调查/sampling survey>>中，<<样本/sample>>的选取要具有随机性和代表性'
            - '<<样本容量/sample size>>越大，调查结果越好，所以应尽可能增大<<样本容量/sample size>>'
          correctValue: '<<抽样调查/sampling survey>>中，<<样本/sample>>的选取要具有随机性和代表性'
      answer: '<<抽样调查/sampling survey>>中，<<样本/sample>>的选取要具有随机性和代表性'
      answerEn: "In a <<抽样调查/sampling survey>>, the selection of the <<样本/sample>> must be random and representative"
      explanation: |
        - A：全国中学生数量庞大，应采用<<抽样调查/sampling survey>>，不是<<全面调查/census>>
        - B：<<全面调查/census>>的结果更精确，<<抽样调查/sampling survey>>是估计值
        - C：正确。<<样本/sample>>必须随机且有代表性，否则结论会有偏差 ✓
        - D：<<样本容量/sample size>>越大成本越高，应在代表性和可行性之间平衡
      explanationEn: |
        - A: The number of middle school students nationwide is huge — <<抽样调查/sampling survey>> should be used, not <<全面调查/census>>
        - B: <<全面调查/census>> results are more precise; <<抽样调查/sampling survey>> provides estimates
        - C: Correct. The <<样本/sample>> must be random and representative; otherwise conclusions will be biased ✓
        - D: A larger <<样本容量/sample size>> costs more; balance between representativeness and feasibility is needed

    - number: 2
      type: 提升计算题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        某校对500名学生进行体重调查，部分<<频数分布表/frequency distribution table>>如下：

        | 体重（千克） | <<频数/frequency>> | <<频率/relative frequency>> |
        |-------------|---------|---------|
        | $[30, 35)$ | 25 | $a$ |
        | $[35, 40)$ | $b$ | 0.30 |
        | $[40, 45)$ | 175 | $c$ |
        | $[45, 50)$ | $d$ | 0.15 |
        | $[50, 55]$ | 50 | 0.10 |

        （1）求 $a$、$b$、$c$、$d$ 的值。
        （2）体重在哪个区间的学生最多？
        （3）体重不足40千克的学生占比多少？
      questionEn: |
        A school surveyed the weight of 500 students. A partial <<频数分布表/frequency distribution table>> is shown below:

        | Weight (kg) | <<频数/frequency>> | <<频率/relative frequency>> |
        |-------------|---------|---------|
        | $[30, 35)$ | 25 | $a$ |
        | $[35, 40)$ | $b$ | 0.30 |
        | $[40, 45)$ | 175 | $c$ |
        | $[45, 50)$ | $d$ | 0.15 |
        | $[50, 55]$ | 50 | 0.10 |

        (1) Find the values of $a$, $b$, $c$, and $d$.
        (2) Which weight interval has the most students?
        (3) What proportion of students weigh less than 40 kg?
      answer: |
        （1）
        $a = \dfrac{25}{500} = 0.05$

        $b = 0.30 \times 500 = 150$

        $c = \dfrac{175}{500} = 0.35$

        $d = 0.15 \times 500 = 75$

        验证：$25 + 150 + 175 + 75 + 50 = 475 + 25 = 500$ ✓
        验证：$0.05 + 0.30 + 0.35 + 0.15 + 0.10 = 0.95 + 0.05 = 1.00$ ✓

        （2）$[40, 45)$ 区间的<<频数/frequency>>最大，为175人，该区间学生最多。

        （3）体重不足40千克的学生人数为 $25 + 150 = 175$ 人，占比 $= \dfrac{175}{500} = 0.35 = 35\%$。
      answerEn: |
        (1)
        $a = \dfrac{25}{500} = 0.05$

        $b = 0.30 \times 500 = 150$

        $c = \dfrac{175}{500} = 0.35$

        $d = 0.15 \times 500 = 75$

        Verification: $25 + 150 + 175 + 75 + 50 = 500$ ✓
        Verification: $0.05 + 0.30 + 0.35 + 0.15 + 0.10 = 1.00$ ✓

        (2) The $[40, 45)$ interval has the largest <<频数/frequency>> of 175 students.

        (3) Students weighing less than 40 kg: $25 + 150 = 175$; proportion $= \dfrac{175}{500} = 0.35 = 35\%$.
      explanation: |
        综合运用<<频数/frequency>>和<<频率/relative frequency>>的关系，灵活求解未知量。注意用两种方式验证结果的正确性。
      explanationEn: |
        Comprehensively apply the relationship between <<频数/frequency>> and <<频率/relative frequency>> to solve for unknowns flexibly. Verify correctness using both methods.

    - number: 3
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        为了了解某社区居民的日均用水量，随机抽取了50户居民进行调查，得到如下<<频数分布表/frequency distribution table>>：

        | 日均用水量（吨） | <<频数/frequency>> |
        |-----------------|---------|
        | $[0, 0.5)$ | 5 |
        | $[0.5, 1)$ | 12 |
        | $[1, 1.5)$ | 18 |
        | $[1.5, 2)$ | 10 |
        | $[2, 2.5]$ | 5 |

        （1）计算各组的<<频率/relative frequency>>。
        （2）若该社区共有2000户居民，估计日均用水量不少于1吨的户数。
      questionEn: |
        To understand the daily water consumption of residents in a community, 50 households were randomly selected for a survey, yielding the following <<频数分布表/frequency distribution table>>:

        | Daily water usage (tons) | <<频数/frequency>> |
        |-------------------------|---------|
        | $[0, 0.5)$ | 5 |
        | $[0.5, 1)$ | 12 |
        | $[1, 1.5)$ | 18 |
        | $[1.5, 2)$ | 10 |
        | $[2, 2.5]$ | 5 |

        (1) Calculate the <<频率/relative frequency>> for each group.
        (2) If the community has 2000 households, estimate the number of households with daily water usage of at least 1 ton.
      answer: |
        （1）各组<<频率/relative frequency>>：
        $[0, 0.5)$：$\dfrac{5}{50} = 0.10$
        $[0.5, 1)$：$\dfrac{12}{50} = 0.24$
        $[1, 1.5)$：$\dfrac{18}{50} = 0.36$
        $[1.5, 2)$：$\dfrac{10}{50} = 0.20$
        $[2, 2.5]$：$\dfrac{5}{50} = 0.10$

        验证：$0.10 + 0.24 + 0.36 + 0.20 + 0.10 = 1.00$ ✓

        （2）日均用水量不少于1吨的<<频率/relative frequency>>为 $0.36 + 0.20 + 0.10 = 0.66$
        估计户数 $= 2000 \times 0.66 = 1320$ 户。
      answerEn: |
        (1) <<频率/relative frequency>> for each group:
        $[0, 0.5)$: $\dfrac{5}{50} = 0.10$
        $[0.5, 1)$: $\dfrac{12}{50} = 0.24$
        $[1, 1.5)$: $\dfrac{18}{50} = 0.36$
        $[1.5, 2)$: $\dfrac{10}{50} = 0.20$
        $[2, 2.5]$: $\dfrac{5}{50} = 0.10$

        Verification: $0.10 + 0.24 + 0.36 + 0.20 + 0.10 = 1.00$ ✓

        (2) The <<频率/relative frequency>> for daily usage of at least 1 ton is $0.36 + 0.20 + 0.10 = 0.66$.
        Estimated number of households $= 2000 \times 0.66 = 1320$.
      explanation: |
        这道题体现了<<抽样调查/sampling survey>>的核心思想：用<<样本/sample>>的<<频率/relative frequency>>来估计<<总体/population>>的情况。<<样本/sample>>中的比例可以推广到<<总体/population>>。
      explanationEn: |
        This problem demonstrates the core idea of <<抽样调查/sampling survey>>: using the <<频率/relative frequency>> of the <<样本/sample>> to estimate the characteristics of the <<总体/population>>. The proportion in the <<样本/sample>> can be extended to the <<总体/population>>.

    - number: 4
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        甲、乙两家工厂各随机抽取了20件产品，测量其长度（单位：毫米），整理后得到如下<<频数分布表/frequency distribution table>>：

        | 长度 | 甲厂<<频数/frequency>> | 乙厂<<频数/frequency>> |
        |------|---------|---------|
        | $[48, 49)$ | 1 | 3 |
        | $[49, 50)$ | 3 | 4 |
        | $[50, 51)$ | 12 | 7 |
        | $[51, 52)$ | 3 | 4 |
        | $[52, 53]$ | 1 | 2 |

        （1）分别计算两厂各组的<<频率/relative frequency>>。
        （2）哪家工厂的产品质量更稳定？请说明理由。
      questionEn: |
        Factories A and B each randomly selected 20 products and measured their lengths (in mm). The results are organized in the following <<频数分布表/frequency distribution table>>:

        | Length | Factory A <<频数/frequency>> | Factory B <<频数/frequency>> |
        |--------|---------|---------|
        | $[48, 49)$ | 1 | 3 |
        | $[49, 50)$ | 3 | 4 |
        | $[50, 51)$ | 12 | 7 |
        | $[51, 52)$ | 3 | 4 |
        | $[52, 53]$ | 1 | 2 |

        (1) Calculate the <<频率/relative frequency>> for each group in both factories.
        (2) Which factory produces more stable products? Explain your reasoning.
      answer: |
        （1）
        甲厂<<频率/relative frequency>>：$0.05$、$0.15$、$0.60$、$0.15$、$0.05$
        乙厂<<频率/relative frequency>>：$0.15$、$0.20$、$0.35$、$0.20$、$0.10$

        （2）甲厂产品质量更稳定。

        理由：甲厂 $[50, 51)$ 区间的<<频率/relative frequency>>为 $0.60$，即 $60\%$ 的产品集中在这一区间，数据较为集中。而乙厂同一区间的<<频率/relative frequency>>仅为 $0.35$，数据较为分散。

        甲厂产品长度集中在标准值附近，波动较小，质量更稳定。
      answerEn: |
        (1)
        Factory A <<频率/relative frequency>>: $0.05$, $0.15$, $0.60$, $0.15$, $0.05$
        Factory B <<频率/relative frequency>>: $0.15$, $0.20$, $0.35$, $0.20$, $0.10$

        (2) Factory A has more stable product quality.

        Reasoning: Factory A has a <<频率/relative frequency>> of $0.60$ in the $[50, 51)$ interval, meaning $60\%$ of products are concentrated in this range, showing more concentrated data. Factory B has only $0.35$ in the same interval, with more dispersed data.

        Factory A's product lengths are concentrated near the standard value with less variation, indicating more stable quality.
      explanation: |
        这道中考提升题综合考查了<<频数分布表/frequency distribution table>>的制作与数据分析能力。比较两组数据的分布特征时，关注数据的集中程度是关键——数据越集中，波动越小，质量越稳定。
      explanationEn: |
        This advanced exam question comprehensively tests the ability to create <<频数分布表/frequency distribution table>>s and analyze data. When comparing the distribution characteristics of two data sets, the key is to focus on how concentrated the data is — more concentrated data means less variation and more stable quality.
