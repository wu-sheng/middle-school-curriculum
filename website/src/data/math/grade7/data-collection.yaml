      explanationEn: |
        Testing the lifespan of light bulbs is a destructive test. Not every bulb can be tested, so <<抽样调查/sampling survey>> should be used.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        在<<频数分布直方图/frequency distribution histogram>>中，各矩形之间应留有间隔。
      questionEn: |
        In a <<频数分布直方图/frequency distribution histogram>>, there should be gaps between the rectangles.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        <<频数分布直方图/frequency distribution histogram>>中的矩形之间没有间隔，这是它与<<条形图/bar chart>>的重要区别。
      explanationEn: |
        There are no gaps between rectangles in a <<频数分布直方图/frequency distribution histogram>>. This is a key difference from a <<条形图/bar chart>>.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        所有<<频率/relative frequency>>之和等于 $1$。
      questionEn: |
        The sum of all <<频率/relative frequency>> values equals $1$.
      correctValue: "对"
      answer: "对"
      answerEn: "True"
      explanation: |
        因为所有<<频数/frequency>>之和等于数据总数，所以所有<<频率/relative frequency>>之和 $= \dfrac{\text{所有<<频数/frequency>>之和}}{\text{总数}} = \dfrac{\text{总数}}{\text{总数}} = 1$。
      explanationEn: |
        Since the sum of all <<频数/frequency>> values equals the total number of data points, the sum of all <<频率/relative frequency>> values $= \dfrac{\text{sum of all frequencies}}{\text{total}} = \dfrac{\text{total}}{\text{total}} = 1$.

