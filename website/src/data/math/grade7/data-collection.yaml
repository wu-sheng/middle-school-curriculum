      section: 一、填空题
      sectionEn: "I. Fill in the Blanks"
      question: |
        某组的<<频数/frequency>>为12，数据总数为60，则该组的<<频率/relative frequency>>为______。
      questionEn: |
        If the <<频数/frequency>> of a group is 12 and the total number of data points is 60, then the <<频率/relative frequency>> of this group is ______.
      correctValue: "0.2"
      answer: "$0.2$"
      answerEn: "$0.2$"
      explanation: |
        $<<频率/relative frequency>> = \dfrac{<<频数/frequency>>}{总数} = \dfrac{12}{60} = 0.2$。
