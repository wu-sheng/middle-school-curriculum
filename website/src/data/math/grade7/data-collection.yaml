      questionEn: |
        If the maximum value of a data set is 98 and the minimum is 42, and the class width is 10, then the data should be divided into at least ______ groups.
      correctValue: "6"
      answer: "6"
      answerEn: "6"
      explanation: |
        极差 $= 98 - 42 = 56$。组数 $= \dfrac{56}{10} = 5.6$，向上取整为 $6$ 组。
      explanationEn: |
        Range $= 98 - 42 = 56$. Number of groups $= \dfrac{56}{10} = 5.6$, rounded up to $6$ groups.

