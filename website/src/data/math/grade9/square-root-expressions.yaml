    question: '化简 $\sqrt{50}$ 的结果是（ ）'
    questionEn: 'The simplified form of $\sqrt{50}$ is ( )'
    options:
      - 'A. $25\sqrt{2}$'
      - 'B. $5\sqrt{2}$'
      - 'C. $5\sqrt{10}$'
      - 'D. $2\sqrt{25}$'
    optionsEn:
      - 'A. $25\sqrt{2}$'
      - 'B. $5\sqrt{2}$'
      - 'C. $5\sqrt{10}$'
      - 'D. $2\sqrt{25}$'
    answer: 'B'
    answerEn: 'B'
    explanation: '$\sqrt{50} = \sqrt{25 \times 2} = \sqrt{25} \cdot \sqrt{2} = 5\sqrt{2}$。A 错（系数应为 $5$，不是 $25$）；C 错（$\sqrt{10}$ 中的被开方数不对）；D 错（$2\sqrt{25} = 2 \times 5 = 10 \neq \sqrt{50}$）。'
    explanationEn: '$\sqrt{50} = \sqrt{25 \times 2} = 5\sqrt{2}$. A is wrong (coefficient should be $5$, not $25$); C is wrong (wrong radicand); D equals $10 \neq \sqrt{50}$.'

  - id: ex7
    type: fill-in
    question: '化简：$\sqrt{45} = $ ___；$\sqrt{98} = $ ___；$\sqrt{108} = $ ___'
    questionEn: 'Simplify: $\sqrt{45} = $ ___; $\sqrt{98} = $ ___; $\sqrt{108} = $ ___'
    answer: '$3\sqrt{5}$；$7\sqrt{2}$；$6\sqrt{3}$'
    answerEn: '$3\sqrt{5}$; $7\sqrt{2}$; $6\sqrt{3}$'
    explanation: '$\sqrt{45}=\sqrt{9\times5}=3\sqrt{5}$；$\sqrt{98}=\sqrt{49\times2}=7\sqrt{2}$；$\sqrt{108}=\sqrt{36\times3}=6\sqrt{3}$'
    explanationEn: '$\sqrt{45}=\sqrt{9\times5}=3\sqrt{5}$; $\sqrt{98}=\sqrt{49\times2}=7\sqrt{2}$; $\sqrt{108}=\sqrt{36\times3}=6\sqrt{3}$'

  - id: ex8
    type: computation
    question: '计算 $\sqrt{12} + \sqrt{27} - \sqrt{75}$'
    questionEn: 'Compute $\sqrt{12} + \sqrt{27} - \sqrt{75}$'
    answer: '$0$'
    answerEn: '$0$'
    explanation: '$\sqrt{12}=2\sqrt{3}$，$\sqrt{27}=3\sqrt{3}$，$\sqrt{75}=5\sqrt{3}$；$2\sqrt{3}+3\sqrt{3}-5\sqrt{3}=(2+3-5)\sqrt{3}=0$'
    explanationEn: '$\sqrt{12}=2\sqrt{3}$, $\sqrt{27}=3\sqrt{3}$, $\sqrt{75}=5\sqrt{3}$; $2\sqrt{3}+3\sqrt{3}-5\sqrt{3}=(2+3-5)\sqrt{3}=0$'

  - id: ex9
    type: computation
    question: '计算 $2\sqrt{3} \cdot 3\sqrt{12}$'
    questionEn: 'Compute $2\sqrt{3} \cdot 3\sqrt{12}$'
    answer: '$36$'
    answerEn: '$36$'
    explanation: '$2\sqrt{3} \cdot 3\sqrt{12} = 6\sqrt{36} = 6 \times 6 = 36$'
    explanationEn: '$2\sqrt{3} \cdot 3\sqrt{12} = 6\sqrt{36} = 6 \times 6 = 36$'

  - id: ex10
    type: computation
    question: '计算 $(\sqrt{5} + 2)(\sqrt{5} - 2)$'
    questionEn: 'Compute $(\sqrt{5} + 2)(\sqrt{5} - 2)$'
    answer: '$1$'
    answerEn: '$1$'
    explanation: '平方差公式：$(\sqrt{5})^{2} - 2^{2} = 5 - 4 = 1$'
    explanationEn: 'Difference of squares: $(\sqrt{5})^{2} - 2^{2} = 5 - 4 = 1$'

  - id: ex11
    type: computation
    question: '对 $\dfrac{6}{\sqrt{3}}$ 进行分母有理化'
    questionEn: 'Rationalize the denominator of $\dfrac{6}{\sqrt{3}}$'
    answer: '$2\sqrt{3}$'
    answerEn: '$2\sqrt{3}$'
    explanation: '$\dfrac{6}{\sqrt{3}} = \dfrac{6\sqrt{3}}{\sqrt{3} \cdot \sqrt{3}} = \dfrac{6\sqrt{3}}{3} = 2\sqrt{3}$'
    explanationEn: '$\dfrac{6}{\sqrt{3}} = \dfrac{6\sqrt{3}}{\sqrt{3} \cdot \sqrt{3}} = \dfrac{6\sqrt{3}}{3} = 2\sqrt{3}$'

  - id: ex12
    type: computation
    question: '对 $\dfrac{4}{\sqrt{3} + 1}$ 进行分母有理化并化简'
    questionEn: 'Rationalize the denominator of $\dfrac{4}{\sqrt{3} + 1}$ and simplify'
    answer: '$2(\sqrt{3} - 1) = 2\sqrt{3} - 2$'
    answerEn: '$2(\sqrt{3} - 1) = 2\sqrt{3} - 2$'
    explanation: '$\dfrac{4}{\sqrt{3}+1} = \dfrac{4(\sqrt{3}-1)}{(\sqrt{3}+1)(\sqrt{3}-1)} = \dfrac{4(\sqrt{3}-1)}{3-1} = \dfrac{4(\sqrt{3}-1)}{2} = 2(\sqrt{3}-1) = 2\sqrt{3}-2$'
    explanationEn: '$\dfrac{4}{\sqrt{3}+1} = \dfrac{4(\sqrt{3}-1)}{(\sqrt{3}+1)(\sqrt{3}-1)} = \dfrac{4(\sqrt{3}-1)}{3-1} = \dfrac{4(\sqrt{3}-1)}{2} = 2(\sqrt{3}-1) = 2\sqrt{3}-2$'

  - id: ex13
    type: computation
    question: '化简 $(\sqrt{6} + \sqrt{2})(\sqrt{6} - \sqrt{2}) - \sqrt{8}$'
    questionEn: 'Simplify $(\sqrt{6} + \sqrt{2})(\sqrt{6} - \sqrt{2}) - \sqrt{8}$'
    answer: '$4 - 2\sqrt{2}$'
    answerEn: '$4 - 2\sqrt{2}$'
    explanation: '第一步：用平方差公式 $(\sqrt{6}+\sqrt{2})(\sqrt{6}-\sqrt{2}) = (\sqrt{6})^{2} - (\sqrt{2})^{2} = 6 - 2 = 4$；第二步：$\sqrt{8} = 2\sqrt{2}$；结果：$4 - 2\sqrt{2}$'
    explanationEn: 'Step 1: difference of squares — $(\sqrt{6}+\sqrt{2})(\sqrt{6}-\sqrt{2}) = (\sqrt{6})^{2} - (\sqrt{2})^{2} = 6 - 2 = 4$; Step 2: $\sqrt{8} = 2\sqrt{2}$; Result: $4 - 2\sqrt{2}$'

  - id: ex14
    type: computation
    question: '已知 $x < 0$，化简 $\sqrt{x^{2}} + \sqrt{(1-x)^{2}}$'
    questionEn: 'Given $x < 0$, simplify $\sqrt{x^{2}} + \sqrt{(1-x)^{2}}$'
    answer: '$1 - 2x$'
    answerEn: '$1 - 2x$'
    explanation: |
      $\sqrt{x^{2}} = |x|$；因为 $x < 0$，所以 $|x| = -x$
      $\sqrt{(1-x)^{2}} = |1-x|$；因为 $x < 0$，所以 $1-x > 1 > 0$，$|1-x| = 1-x$
      结果：$-x + (1-x) = -x + 1 - x = 1 - 2x$
    explanationEn: |
      $\sqrt{x^{2}} = |x|$; since $x < 0$, $|x| = -x$
      $\sqrt{(1-x)^{2}} = |1-x|$; since $x < 0$, $1-x > 1 > 0$, so $|1-x| = 1-x$
      Result: $-x + (1-x) = 1 - 2x$

examPrep:
  intro: |
    以下题目综合考查本章核心概念，包括根式的存在条件、性质应用（特别是 $\sqrt{a^{2}}=|a|$ 的易错点）、化简与运算。请独立思考后再查看答案。
  introEn: |
    The following problems test the key concepts of this chapter comprehensively, including conditions for radical expressions to be defined, property applications (especially the error-prone $\sqrt{a^{2}}=|a|$), simplification, and computation. Work through each problem independently before checking the answer.
  problems:
    - id: ep1
      type: multiple-choice
      question: |
        下列等式中，正确的是（ ）

        A. $\sqrt{(-3)^{2}} = -3$

        B. $\sqrt{3^{2}} = \pm 3$

        C. $(\sqrt{3})^{2} = 3$

        D. $\sqrt{-3^{2}} = 3$
      questionEn: |
        Which of the following equalities is correct? ( )

        A. $\sqrt{(-3)^{2}} = -3$

        B. $\sqrt{3^{2}} = \pm 3$

        C. $(\sqrt{3})^{2} = 3$

        D. $\sqrt{-3^{2}} = 3$
      answer: 'C'
      answerEn: 'C'
      explanation: |
        A 错：$\sqrt{(-3)^{2}} = \sqrt{9} = 3$（不是 $-3$，根号结果恒非负）
        B 错：$\sqrt{3^{2}} = \sqrt{9} = 3$（不是 $\pm 3$；$\pm$ 出现在方程求解中，不出现在根号运算结果中）
        C 正确：$(\sqrt{3})^{2} = 3$（性质一：先开方再平方回到原数，$3 \geq 0$ 满足条件）
        D 错：$-3^{2} = -9 < 0$，$\sqrt{-9}$ 在实数范围内无意义
      explanationEn: |
        A: wrong. $\sqrt{(-3)^{2}} = \sqrt{9} = 3$ (not $-3$; a square root is always non-negative)
        B: wrong. $\sqrt{3^{2}} = \sqrt{9} = 3$ (not $\pm 3$; the $\pm$ sign appears in equation solutions, not in square root results)
        C: correct. $(\sqrt{3})^{2} = 3$ (Property 1: squaring the square root returns the original value; $3 \geq 0$)
        D: wrong. $-3^{2} = -9 < 0$; $\sqrt{-9}$ is undefined in the real numbers

    - id: ep2
      type: fill-in
      question: |
        已知 $a < -1$，化简 $\sqrt{(a+1)^{2}} + \sqrt{(a-1)^{2}} - \sqrt{a^{2}}$ 的结果为 ___
      questionEn: |
        Given $a < -1$, simplify $\sqrt{(a+1)^{2}} + \sqrt{(a-1)^{2}} - \sqrt{a^{2}}$ = ___
      answer: '$-1 - a$（即 $-(a+1)$）'
      answerEn: '$-1 - a$ (i.e. $-(a+1)$)'
      explanation: |
        因为 $a < -1$：
        - $a + 1 < 0$，所以 $\sqrt{(a+1)^{2}} = |a+1| = -(a+1) = -a-1$
        - $a - 1 < -2 < 0$，所以 $\sqrt{(a-1)^{2}} = |a-1| = -(a-1) = -a+1$
        - $a < 0$，所以 $\sqrt{a^{2}} = |a| = -a$

        原式 $= (-a-1) + (-a+1) - (-a) = -a - 1 - a + 1 + a = -a - 1$
      explanationEn: |
        Since $a < -1$:
        - $a + 1 < 0$, so $\sqrt{(a+1)^{2}} = |a+1| = -(a+1) = -a-1$
        - $a - 1 < -2 < 0$, so $\sqrt{(a-1)^{2}} = |a-1| = -(a-1) = -a+1$
        - $a < 0$, so $\sqrt{a^{2}} = |a| = -a$

        Expression $= (-a-1) + (-a+1) - (-a) = -a - 1 - a + 1 + a = -a - 1$

    - id: ep3
      type: computation
      question: '计算 $(\sqrt{3} + \sqrt{2})^{2} - (\sqrt{3} - \sqrt{2})^{2}$'
      questionEn: 'Compute $(\sqrt{3} + \sqrt{2})^{2} - (\sqrt{3} - \sqrt{2})^{2}$'
      answer: '$4\sqrt{6}$'
      answerEn: '$4\sqrt{6}$'
      explanation: |
        方法一（逐项展开）：
        $(\sqrt{3}+\sqrt{2})^{2} = 3 + 2\sqrt{6} + 2 = 5 + 2\sqrt{6}$
        $(\sqrt{3}-\sqrt{2})^{2} = 3 - 2\sqrt{6} + 2 = 5 - 2\sqrt{6}$
        两式相减：$(5+2\sqrt{6}) - (5-2\sqrt{6}) = 4\sqrt{6}$

        方法二（因式分解，更快）：
        利用平方差：$A^{2} - B^{2} = (A+B)(A-B)$，其中 $A = \sqrt{3}+\sqrt{2}$，$B = \sqrt{3}-\sqrt{2}$
        $A + B = 2\sqrt{3}$，$A - B = 2\sqrt{2}$
        $(A+B)(A-B) = 2\sqrt{3} \cdot 2\sqrt{2} = 4\sqrt{6}$
      explanationEn: |
        Method 1 (expand each term):
        $(\sqrt{3}+\sqrt{2})^{2} = 3 + 2\sqrt{6} + 2 = 5 + 2\sqrt{6}$
        $(\sqrt{3}-\sqrt{2})^{2} = 3 - 2\sqrt{6} + 2 = 5 - 2\sqrt{6}$
        Subtract: $(5+2\sqrt{6}) - (5-2\sqrt{6}) = 4\sqrt{6}$

        Method 2 (factor, faster):
        Use $A^{2} - B^{2} = (A+B)(A-B)$ with $A = \sqrt{3}+\sqrt{2}$, $B = \sqrt{3}-\sqrt{2}$
        $A + B = 2\sqrt{3}$, $A - B = 2\sqrt{2}$
        $(A+B)(A-B) = 2\sqrt{3} \cdot 2\sqrt{2} = 4\sqrt{6}$

    - id: ep4
      type: computation
      question: '化简 $\dfrac{1}{\sqrt{2}+1} + \dfrac{1}{\sqrt{3}+\sqrt{2}} + \dfrac{1}{\sqrt{4}+\sqrt{3}}$'
      questionEn: 'Simplify $\dfrac{1}{\sqrt{2}+1} + \dfrac{1}{\sqrt{3}+\sqrt{2}} + \dfrac{1}{\sqrt{4}+\sqrt{3}}$'
      answer: '$1$'
      answerEn: '$1$'
      explanation: |
        对每个分式进行分母有理化（乘以共轭式）：

        $\dfrac{1}{\sqrt{2}+1} = \dfrac{\sqrt{2}-1}{(\sqrt{2}+1)(\sqrt{2}-1)} = \dfrac{\sqrt{2}-1}{2-1} = \sqrt{2}-1$

        $\dfrac{1}{\sqrt{3}+\sqrt{2}} = \dfrac{\sqrt{3}-\sqrt{2}}{3-2} = \sqrt{3}-\sqrt{2}$

        $\dfrac{1}{\sqrt{4}+\sqrt{3}} = \dfrac{\sqrt{4}-\sqrt{3}}{4-3} = \sqrt{4}-\sqrt{3} = 2-\sqrt{3}$

        三项相加（发生"裂项消去"）：
        $(\sqrt{2}-1) + (\sqrt{3}-\sqrt{2}) + (2-\sqrt{3})$
        $= -1 + 2 + (\sqrt{2}-\sqrt{2}) + (\sqrt{3}-\sqrt{3})$
        $= 1$
      explanationEn: |
        Rationalize each fraction (multiply by conjugate):

        $\dfrac{1}{\sqrt{2}+1} = \dfrac{\sqrt{2}-1}{(\sqrt{2}+1)(\sqrt{2}-1)} = \dfrac{\sqrt{2}-1}{2-1} = \sqrt{2}-1$

        $\dfrac{1}{\sqrt{3}+\sqrt{2}} = \dfrac{\sqrt{3}-\sqrt{2}}{3-2} = \sqrt{3}-\sqrt{2}$

        $\dfrac{1}{\sqrt{4}+\sqrt{3}} = \dfrac{\sqrt{4}-\sqrt{3}}{4-3} = 2-\sqrt{3}$

        Add all three (telescoping cancellation):
        $(\sqrt{2}-1) + (\sqrt{3}-\sqrt{2}) + (2-\sqrt{3})$
        $= -1 + 2 + (\sqrt{2}-\sqrt{2}) + (\sqrt{3}-\sqrt{3})$
        $= 1$

    - id: ep5
      type: computation
      question: |
        已知 $x = \sqrt{3} + 1$，$y = \sqrt{3} - 1$，求 $x^{2} + 2xy + y^{2}$ 与 $x^{2} - y^{2}$ 的值。
      questionEn: |
        Given $x = \sqrt{3} + 1$ and $y = \sqrt{3} - 1$, find the values of $x^{2} + 2xy + y^{2}$ and $x^{2} - y^{2}$.
      answer: '$x^{2}+2xy+y^{2}=12$；$x^{2}-y^{2}=4\sqrt{3}$'
      answerEn: '$x^{2}+2xy+y^{2}=12$; $x^{2}-y^{2}=4\sqrt{3}$'
      explanation: |
        先求 $x+y$ 和 $x-y$：
        $x + y = (\sqrt{3}+1) + (\sqrt{3}-1) = 2\sqrt{3}$
        $x - y = (\sqrt{3}+1) - (\sqrt{3}-1) = 2$

        $x^{2} + 2xy + y^{2} = (x+y)^{2} = (2\sqrt{3})^{2} = 4 \times 3 = 12$

        $x^{2} - y^{2} = (x+y)(x-y) = 2\sqrt{3} \times 2 = 4\sqrt{3}$

        （注意：直接展开再计算也可，但先化 $x+y$、$x-y$ 的方法更高效）
      explanationEn: |
        First find $x+y$ and $x-y$:
        $x + y = (\sqrt{3}+1) + (\sqrt{3}-1) = 2\sqrt{3}$
        $x - y = (\sqrt{3}+1) - (\sqrt{3}-1) = 2$

        $x^{2} + 2xy + y^{2} = (x+y)^{2} = (2\sqrt{3})^{2} = 4 \times 3 = 12$

        $x^{2} - y^{2} = (x+y)(x-y) = 2\sqrt{3} \times 2 = 4\sqrt{3}$

        (Direct expansion also works, but computing $x+y$ and $x-y$ first is more efficient.)

summary: |
  本章学习了**<<二次根式/square root expression>>**的完整体系，以下是核心要点：

  **1. 存在条件**：$\sqrt{a}$ 在实数范围内有意义 $\Leftrightarrow$ $a \geq 0$

  **2. 两条基本性质**（必须牢记，尤其是第二条）：
  - $(\sqrt{a})^{2} = a$（$a \geq 0$）
  - $\sqrt{a^{2}} = |a|$（注意：不是 $a$！）

  **3. <<最简根式/simplest radical form>>**：被开方数无分母、无完全平方因数

  **4. 加减法**：先化简为最简根式，识别<<同类根式/like radicals>>，再合并系数

  **5. 乘法**：$\sqrt{a} \cdot \sqrt{b} = \sqrt{ab}$（$a,b \geq 0$），可结合代数公式

  **6. <<有理化/rationalization>>**：去除分母中的根式
  - 单根式：乘以 $\frac{\sqrt{b}}{\sqrt{b}}$
  - 二项式：乘以共轭式，利用平方差公式

  **最易错点**：$\sqrt{(-3)^{2}} = 3$（不是 $-3$）；$\sqrt{2}+\sqrt{3} \neq \sqrt{5}$
summaryEn: |
  This chapter covered the complete system of **<<二次根式/square root expression>>s**. Key takeaways:

  **1. Existence condition**: $\sqrt{a}$ is defined in the reals $\Leftrightarrow$ $a \geq 0$

  **2. Two fundamental properties** (memorize both, especially the second):
  - $(\sqrt{a})^{2} = a$ (for $a \geq 0$)
  - $\sqrt{a^{2}} = |a|$ (note: NOT $a$!)

  **3. <<最简根式/simplest radical form>>**: no fractions under the radical, no perfect square factors under the radical

  **4. Addition/subtraction**: simplify to simplest form first, identify <<同类根式/like radicals>>, then combine coefficients

  **5. Multiplication**: $\sqrt{a} \cdot \sqrt{b} = \sqrt{ab}$ ($a,b \geq 0$); combine with algebraic formulas

  **6. <<有理化/rationalization>>**: eliminate radicals from the denominator
  - Single radical: multiply by $\frac{\sqrt{b}}{\sqrt{b}}$
  - Binomial: multiply by the conjugate using the difference of squares formula

  **Most common mistakes**: $\sqrt{(-3)^{2}} = 3$ (not $-3$); $\sqrt{2}+\sqrt{3} \neq \sqrt{5}$
