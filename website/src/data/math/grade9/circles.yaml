title: 圆
titleEn: Circles
chapter: 8
subject: math
grade: grade9
semester: semester2
estimatedTime: 第1课时 约60分钟 · 第2课时 约60分钟 · 第3课时 约60分钟 · 第4课时 约60分钟 · 第5课时 约60分钟
estimatedTimeEn: "Session 1 ~60 min · Session 2 ~60 min · Session 3 ~60 min · Session 4 ~60 min · Session 5 ~60 min"
targetAudience: 小学3年级自学生（已完成九年级上册和相似），自学材料，由简入深

objectives:
  - 理解<<圆/circle>>的定义，掌握圆心、半径、直径、弦、弧、圆心角、圆周角等基本概念
  - 掌握点与圆、直线与圆、圆与圆的位置关系，能根据距离条件判断位置
  - 理解并应用圆心角与弧、弦的关系定理
  - 掌握<<圆周角定理/inscribed angle theorem>>：圆周角等于同弧对应圆心角的一半
  - 掌握<<切线/tangent>>的判定与切线长定理，能解决内切圆问题
  - 掌握弧长公式和扇形面积公式，能综合运用解决面积计算问题
objectivesEn:
  - Understand the definition of <<圆/circle>> and master basic concepts including center, radius, diameter, chord, arc, central angle, and inscribed angle
  - Master the positional relationships between a point and a circle, a line and a circle, and circle-to-circle, and determine position using distance conditions
  - Understand and apply the relationships between central angles, arcs, and chords
  - 'Master the <<圆周角定理/inscribed angle theorem>>: an inscribed angle equals half the central angle subtending the same arc'
  - Master the tangent determination method and tangent-length theorem, and solve incircle problems
  - Master arc length and sector area formulas, and apply them to area calculations

