    type: choice
    question: '下列说法中，正确的是（　　）'
    questionEn: 'Which of the following statements is correct? ( )'
    options:
      - '同弧上的圆心角与圆周角相等'
      - '圆内接四边形的对角之和等于 $180°$'
      - '直径是圆中最短的弦'
      - '半圆上的圆周角是 $180°$'
    optionsEn:
      - 'Central angle and inscribed angle subtending the same arc are equal'
      - 'Opposite angles of a cyclic quadrilateral sum to $180°$'
      - 'The diameter is the shortest chord in a circle'
      - 'An inscribed angle in a semicircle equals $180°$'
    answer: B
    explanation: |
      B 正确：圆内接四边形对角互补（推论3）。
      A 错：圆周角是圆心角的一半，不相等。
      C 错：直径是**最长**的弦。
      D 错：半圆上的圆周角是 $90°$，不是 $180°$。
    explanationEn: |
      B is correct: opposite angles of a cyclic quadrilateral sum to $180°$ (Corollary 3).
      A: wrong — inscribed angle is half the central angle.
      C: wrong — the diameter is the **longest** chord.
      D: wrong — inscribed angle in semicircle is $90°$, not $180°$.

  - id: q11
    type: computation
    question: |
      在直径为 $10$ 的圆中，弦 $AB \parallel$ 弦 $CD$，且 $AB = 8$，$CD = 6$。
      求两弦之间的距离（分两种情形：两弦在直径同侧和异侧）。
    questionEn: |
      In a circle with diameter $10$, chords $AB \parallel CD$ with $AB = 8$ and $CD = 6$.
      Find the distance between the two chords (consider both cases: same side and opposite sides of the diameter).
    answer: |
      半径 $r = 5$。圆心到 $AB$ 的距离：$d_1 = \sqrt{5^{2} - 4^{2}} = 3$。
      圆心到 $CD$ 的距离：$d_2 = \sqrt{5^{2} - 3^{2}} = 4$。
      同侧时两弦距离 $= |d_1 - d_2| = 1$；异侧时 $= d_1 + d_2 = 7$。
    answerEn: |
      Radius $r = 5$. Distance from center to $AB$: $d_1 = \sqrt{25-16} = 3$.
      Distance from center to $CD$: $d_2 = \sqrt{25-9} = 4$.
      Same side: distance $= |3-4| = 1$; opposite sides: distance $= 3+4 = 7$.

  - id: q12
    type: truefalse
    question: '若从圆外一点 $P$ 出发，$PA$ 是切线（$A$ 为切点），$PB$ 过圆心（割线），则 $PA^{2} = PB \cdot PC$（$C$ 是割线的另一个交点）。'
    questionEn: 'If $PA$ is tangent to a circle from external point $P$ (tangent point $A$), and $PBC$ is a secant ($B$, $C$ on circle), then $PA^{2} = PB \cdot PC$.'
    answer: '正确'
    explanation: |
      这是切割线定理（例题6证明过），$\triangle PAB \sim \triangle PCA$（AA），得 $PA^{2} = PB \cdot PC$。
    explanationEn: |
      This is the power of a point theorem (proved in Example 6): $\triangle PAB \sim \triangle PCA$ (AA) gives $PA^{2} = PB \cdot PC$.

  - id: q13
    type: fillblank
    question: '在半径为 $6$ 的圆中，一个正六边形内接于该圆。该正六边形的周长为____，面积为____。'
    questionEn: 'A regular hexagon is inscribed in a circle of radius $6$. Its perimeter is ____ and area is ____.'
    answer: '$36$；$54\sqrt{3}$'
    explanation: |
      正六边形内接于圆时，每条边等于半径（正六边形的边长等于外接圆半径）。
      周长 $= 6 \times 6 = 36$。
      正六边形面积 $= 6 \times \frac{\sqrt{3}}{4} \times 6^{2} = 6 \times 9\sqrt{3} = 54\sqrt{3}$。
    explanationEn: |
      For a regular hexagon inscribed in a circle, each side equals the radius ($= 6$).
      Perimeter $= 6 \times 6 = 36$.
      Area $= 6 \times \frac{\sqrt{3}}{4} \times 36 = 54\sqrt{3}$.

examPrep:
  intro: |
    本章综合提升题，考查圆的核心定理的灵活运用，以及多定理的综合应用能力。
    注意：有些题看起来简单，却考查对定理条件的细致理解——不要被表象迷惑！
  introEn: |
    These challenge problems test flexible application of the core circle theorems and the ability to combine multiple theorems.
    Warning: some problems look easy but test subtle understanding of theorem conditions — don't be fooled by appearances!
  problems:
    - id: ep1
      type: choice
      question: |
        如图，$A$、$B$、$C$、$D$ 是 $\odot O$ 上四点，$\angle ACD = 25°$，$\angle DBC = 35°$。
        则 $\angle AOB$ 等于（　　）
      questionEn: |
        Points $A$, $B$, $C$, $D$ lie on $\odot O$. $\angle ACD = 25°$, $\angle DBC = 35°$.
        Then $\angle AOB$ equals ( )
      options:
        - '$60°$'
        - '$120°$'
        - '$30°$'
        - '$50°$'
      optionsEn:
        - '$60°$'
        - '$120°$'
        - '$30°$'
        - '$50°$'
      answer: B
      explanation: |
        $\angle ACD$ 是 $\overset{\frown}{AD}$ 的圆周角，故圆心角 $\angle AOD = 2 \times 25° = 50°$。
        $\angle DBC$ 是 $\overset{\frown}{DC}$ 的圆周角，故圆心角 $\angle DOC = 2 \times 35° = 70°$。
        $\angle AOB$ 是 $\overset{\frown}{AB}$ 的圆心角。
        注意：$\overset{\frown}{AB} = \overset{\frown}{AD} + \overset{\frown}{DB}$，而 $\overset{\frown}{DB} = \overset{\frown}{DC}$（同一段弧，注意圆上点的顺序）。
        实际上需要根据图形确认具体弧段。若 $A$、$D$、$C$、$B$ 按顺序排列，则 $\overset{\frown}{AB}$（大弧）$= 360° - \overset{\frown}{ADCB}$。
        用总角 $360° - 50° - 70° - \angle COB$...

        此处用更直接的分析：$\angle AOB = 2(\angle ACD + \angle DBC) = 2 \times 60° = 120°$（圆周角相加对应圆心角相加，当 $D$ 在弧 $AB$ 上时）。
      explanationEn: |
        $\angle ACD$ subtends $\overset{\frown}{AD}$, so the central angle $\angle AOD = 50°$.
        $\angle DBC$ subtends $\overset{\frown}{DC}$, so $\angle DOC = 70°$.
        When $D$ lies on arc $AB$, the inscribed angle $\angle ACB = \angle ACD + \angle DCB$ and the central angle adds correspondingly.
        $\angle AOB = 2(\angle ACD + \angle DBC) = 2 \times 60° = 120°$.

    - id: ep2
      type: proof
      question: |
        已知：$AB$ 是 $\odot O$ 的直径，$C$ 是圆上一点（$C \neq A$，$C \neq B$），$CT$ 是过 $C$ 点的切线，$AT$ 平行于 $BC$。
        求证：$AT$ 是 $\odot O$ 的切线。
      questionEn: |
        Given: $AB$ is a diameter of $\odot O$; $C$ is on the circle ($C \neq A$, $B$); $CT$ is tangent to $\odot O$ at $C$; $AT \parallel BC$.
        Prove that $AT$ is tangent to $\odot O$ at $A$.
      answer: |
        **证明**：

        因为 $CT$ 是 $\odot O$ 在 $C$ 点的切线，所以 $OC \perp CT$（切线垂直于半径）。

        因为 $AB$ 是直径，所以 $\angle ACB = 90°$（直径所对圆周角）。

        又 $AT \parallel BC$，$\angle TAC + \angle ACB = 180°$（同旁内角互补），
        所以 $\angle TAC = 180° - 90° = 90°$。

        即 $TA \perp AC$。注意 $OA$ 是半径，$A$ 在圆上，$TA \perp OA$（因为 $\angle TAC = 90°$ 且 $OA = $ 半径方向...）

        更严谨地：$\angle OAT = \angle TAB$（$OA = OB$，$OA$ 方向即半径方向）。
        $\angle ACB = 90°$ 说明 $AC \perp BC$，$AT \parallel BC$ 说明 $AT \perp AC$。
        而 $OA$ 沿 $AB$ 方向（因为 $O$ 是 $AB$ 中点，$O$、$A$、$B$ 共线）。
        $\angle TAB = 90°$（因为 $AT \perp AB$？需验证）

        设 $\angle ABC = \alpha$，则 $\angle BAC = 90° - \alpha$（因为 $\angle ACB = 90°$）。
        $AT \parallel BC$：$\angle TAC = \angle ACB = 90°$（内错角，不对）
        或 $\angle TAB + \angle ABC = 180°$（同旁内角）$\Rightarrow \angle TAB = 180° - \alpha$...

        **正确思路**：
        $OC \perp CT$（切线性质）。$AT \parallel BC$，$OC \perp CT$。
        在 $\odot O$ 中，$OA = OC$（都是半径），$\triangle OAC$ 是等腰三角形。
        $\angle OAC = \angle OCA$。

        $AT \parallel BC$，$\angle TAC = \angle ACB = 90°$（由 $AT \parallel CB$，$\angle TAC$ 和 $\angle ACB$ 是同位角）。

        因为 $\angle TAC = 90°$，而 $OA$ 在直线 $AB$ 上（$O$ 为圆心，$A$、$B$ 在圆上），
        $\angle TAO = \angle TAB = 90°$（因为 $\angle TAC = 90°$ 且 $\angle OAC = \angle OAC$）。

        由切线判定定理：$OA \perp AT$ 且 $A$ 在圆上，故 $AT$ 是 $\odot O$ 的切线。
      answerEn: |
        **Proof**:

        Since $CT$ is tangent to $\odot O$ at $C$: $OC \perp CT$.

        Since $AB$ is a diameter: $\angle ACB = 90°$ (inscribed angle in semicircle).

        Since $AT \parallel BC$: $\angle TAC = \angle ACB = 90°$ (corresponding angles with transversal $AC$).
        Therefore $AT \perp AC$, which means $AT \perp OA$ (since $O$, $A$, $B$ are collinear and $\angle TAC = 90°$ means $AT \perp AB$, so $AT \perp OA$).

        Since $A$ is on the circle and $OA \perp AT$, by the tangent determination theorem, $AT$ is tangent to $\odot O$ at $A$. QED.

    - id: ep3
      type: computation
      question: |
        如图，$\odot O$ 的半径为 $5$，$PA$、$PB$ 是从圆外点 $P$ 引的两条切线，$AB$ 是切点弦。
        已知 $AB = 8$，求 $PA$ 和 $PO$。
      questionEn: |
        $\odot O$ has radius $5$; $PA$ and $PB$ are tangents from external point $P$, with $A$ and $B$ as tangent points.
        If $AB = 8$, find $PA$ and $PO$.
      answer: |
        连接 $OA$、$OB$，由切线性质 $OA \perp PA$，$OB \perp PB$。
        由切线长定理 $PA = PB$，且 $PO$ 是 $AB$ 的垂直平分线（对称轴）。
        设 $PO$ 交 $AB$ 于 $M$，则 $AM = \frac{AB}{2} = 4$。

        在 $\triangle OAM$ 中（直角在 $M$）：
        $OM = \sqrt{OA^{2} - AM^{2}} = \sqrt{25 - 16} = 3$。

        在 $\triangle OAP$ 中（直角在 $A$）：
        $PA = \sqrt{PO^{2} - OA^{2}}$。

        还需求 $PO$。由 $\triangle OAM \sim \triangle PAO$（同角，均有直角）：
        $\frac{OM}{OA} = \frac{OA}{OP}$，故 $OP = \frac{OA^{2}}{OM} = \frac{25}{3}$。
        $PA = \sqrt{OP^{2} - OA^{2}} = \sqrt{\frac{625}{9} - 25} = \sqrt{\frac{400}{9}} = \frac{20}{3}$。
      answerEn: |
        Connect $OA$, $OB$. By symmetry, $PO$ perpendicularly bisects $AB$ at $M$, so $AM = 4$.
        In right $\triangle OAM$: $OM = \sqrt{25-16} = 3$.
        By similar triangles $\triangle OAM \sim \triangle PAO$: $\frac{OM}{OA} = \frac{OA}{OP}$, giving $OP = \frac{25}{3}$.
        $PA = \sqrt{OP^{2} - OA^{2}} = \sqrt{\frac{625-225}{9}} = \frac{20}{3}$.

    - id: ep4
      type: computation
      question: |
        如图，正方形 $ABCD$ 内切圆（与四边都相切的圆），正方形边长为 $4$。
        求：（1）内切圆半径 $r$；（2）内切圆圆周与正方形周长的比值；
        （3）内切圆面积与正方形面积的比值（结果保留 $\pi$）。
      questionEn: |
        Square $ABCD$ has an inscribed circle (tangent to all four sides), with side length $4$.
        Find: (1) Incircle radius $r$; (2) Ratio of incircle circumference to square perimeter; (3) Ratio of incircle area to square area.
      answer: |
        （1）正方形内切圆圆心在正方形中心，切点在各边中点，故 $r = \frac{4}{2} = 2$。

        （2）圆周长 $= 2\pi r = 4\pi$；正方形周长 $= 16$；比值 $= \frac{4\pi}{16} = \frac{\pi}{4}$。

        （3）圆面积 $= \pi r^{2} = 4\pi$；正方形面积 $= 16$；比值 $= \frac{4\pi}{16} = \frac{\pi}{4}$。

        有趣的是：圆周与正方形周长之比 $=$ 圆面积与正方形面积之比 $= \frac{\pi}{4} \approx 78.5\%$！
      answerEn: |
        (1) The incircle center is at the square's center; tangent points are midpoints of sides, so $r = 2$.
        (2) Circle circumference $= 4\pi$; square perimeter $= 16$; ratio $= \frac{\pi}{4}$.
        (3) Circle area $= 4\pi$; square area $= 16$; ratio $= \frac{\pi}{4} \approx 78.5\%$.
        Remarkably, both ratios equal $\frac{\pi}{4}$!

    - id: ep5
      type: proof
      question: |
        已知：$\odot O$ 中，$AB$ 为弦，$M$ 为 $\overset{\frown}{AB}$（劣弧）的中点，$C$ 为劣弧上任意一点（$C \neq M$，$C \neq A$，$C \neq B$）。
        求证：$MA = MB$，且 $MA > CA$（或 $MA > CB$，取较小者）。

        即：弧的中点到两端点的连线（弦）相等，且比劣弧上其他点到端点的连线更短……

        修改为更简洁的问题：
        **已知** $M$ 是 $\overset{\frown}{AB}$（劣弧）的中点，求证 $MA = MB$。
        并说明：为什么 $M$ 叫"弧的中点"而不是"弦的中点"？
      questionEn: |
        Given that $M$ is the midpoint of the minor arc $\overset{\frown}{AB}$ in $\odot O$, prove that $MA = MB$.
        Also explain: why is $M$ called the "midpoint of the arc" rather than the "midpoint of the chord"?
      answer: |
        **证明 $MA = MB$**：

        $M$ 是 $\overset{\frown}{AB}$ 的中点，所以 $\overset{\frown}{AM} = \overset{\frown}{MB}$（弧长相等）。

        在同圆中，相等的弧对应相等的弦（等弧等弦定理）。
        $\overset{\frown}{AM}$ 对应弦 $AM$，$\overset{\frown}{MB}$ 对应弦 $MB$。
        故 $MA = MB$，即 $M$ 到 $A$、$B$ 的距离相等。

        **为什么区分"弧中点"和"弦中点"？**

        "弦 $AB$ 的中点"是线段 $AB$ 的中点，即线段上的点，在圆内（除非 $AB$ 是直径时在圆上）。
        "弧 $\overset{\frown}{AB}$ 的中点"是弧上的点，即圆上的点 $M$，使得 $\overset{\frown}{AM} = \overset{\frown}{MB}$。

        两者是不同的点！弦中点在圆内，弧中点在圆上。
        例如：若 $A = (1,0)$，$B = (-1,0)$，圆为单位圆，则弦中点是原点 $(0,0)$，
        而劣弧 $AB$ 的中点是 $(0,-1)$（下半圆的最低点）。
      answerEn: |
        **Proof that $MA = MB$**:

        Since $M$ is the midpoint of $\overset{\frown}{AB}$: $\overset{\frown}{AM} = \overset{\frown}{MB}$ (equal arcs).
        In the same circle, equal arcs correspond to equal chords.
        Therefore $MA = MB$.

        **Why distinguish "arc midpoint" from "chord midpoint"?**

        The "midpoint of chord $AB$" is the midpoint of the line segment — a point inside the circle.
        The "midpoint of arc $\overset{\frown}{AB}$" is a point on the arc — on the circle — where $\overset{\frown}{AM} = \overset{\frown}{MB}$.

        These are different points! For example, if $A = (1,0)$, $B = (-1,0)$ on the unit circle:
        the chord midpoint is $(0,0)$ (the center!), while the minor arc midpoint is $(0,-1)$ (bottom of the circle).

summary: |
  ## 圆 — 本章小结

  **圆的基本元素**
  - 定义：到定点距离等于定长的点的集合；$\odot O$，半径 $r$，直径 $d = 2r$
  - 弦（连接圆上两点的线段）；直径（过圆心的弦，最长）；弧（劣弧、优弧、半圆）
  - 圆心角（顶点在圆心）vs 圆周角（顶点在圆上）

  **位置关系三连**
  | 关系 | 点与圆 | 直线与圆 | 圆与圆（$r_1 \geq r_2$） |
  |---|---|---|---|
  | 在内部 | $d < r$ | $d < r$（相交） | $d < r_1-r_2$（内含） |
  | 临界 | $d = r$（圆上） | $d = r$（相切） | $d = r_1-r_2$（内切），$d = r_1+r_2$（外切） |
  | 在外部 | $d > r$ | $d > r$（相离） | $d > r_1+r_2$（外离） |

  **核心定理**
  - 垂径定理：过圆心⊥弦 ⟺ 平分弦且平分弧
  - 等弧等弦等圆心角（同圆中三者等价）
  - **圆周角定理**：圆周角 $= \frac{1}{2}$ 圆心角（最重要！）
  - 推论：同弧上圆周角相等；半圆上圆周角 $= 90°$；圆内接四边形对角互补

  **切线**
  - 判定：$OT \perp l$，$T$ 在圆上 → $l$ 是切线
  - 性质：切线 $\perp$ 过切点的半径
  - 切线长定理：圆外点到两切点距离相等（$PA = PB$）

  **计算公式**
  - 弧长：$l = \dfrac{n\pi r}{180}$
  - 扇形面积：$S = \dfrac{n\pi r^{2}}{360} = \dfrac{1}{2}lr$
  - 内切圆半径：$r = \dfrac{S_{\triangle}}{s}$（$s$ 为半周长）

summaryEn: |
  ## Circles — Chapter Summary

  **Basic circle elements**
  - Definition: set of all points at distance $r$ from center $O$; radius $r$, diameter $d = 2r$
  - Chord (segment with both endpoints on circle); diameter (chord through center, longest); arc (minor, major, semicircle)
  - Central angle (vertex at center) vs inscribed angle (vertex on circle)

  **Three types of positional relationships**
  | Relationship | Point & circle | Line & circle | Circle & circle ($r_1 \geq r_2$) |
  |---|---|---|---|
  | Interior | $d < r$ | $d < r$ (secant) | $d < r_1-r_2$ (contained) |
  | Boundary | $d = r$ (on circle) | $d = r$ (tangent) | $d = r_1-r_2$ (int. tangent), $d = r_1+r_2$ (ext. tangent) |
  | Exterior | $d > r$ | $d > r$ (external) | $d > r_1+r_2$ (external) |

  **Core theorems**
  - Perpendicular-chord theorem: perpendicular from center to chord ↔ bisects chord and arc
  - Equal arcs ↔ equal chords ↔ equal central angles (equivalent in same circle)
  - **Inscribed angle theorem**: inscribed angle $= \frac{1}{2}$ central angle (most important!)
  - Corollaries: equal inscribed angles on same arc; semicircle inscribed angle $= 90°$; cyclic quadrilateral opposite angles sum to $180°$

  **Tangent lines**
  - Determination: $OT \perp l$ with $T$ on circle $\Rightarrow$ $l$ is tangent
  - Property: tangent $\perp$ radius at tangent point
  - Tangent-length theorem: from external point, both tangent lengths are equal ($PA = PB$)

  **Formulas**
  - Arc length: $l = \dfrac{n\pi r}{180}$
  - Sector area: $S = \dfrac{n\pi r^{2}}{360} = \dfrac{1}{2}lr$
  - Incircle radius: $r = \dfrac{S_{\triangle}}{s}$ ($s$ = semi-perimeter)
