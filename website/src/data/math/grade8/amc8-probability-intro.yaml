          content: '$\frac{40}{90}$'
        - label: C
          content: '$\frac{41}{90}$'
        - label: D
          content: '$\frac{1}{2}$'
        - label: E
          content: '$\frac{5}{9}$'
      correctValue: A
      answer: '(A) $\frac{4}{9}$'
      answerEn: '(A) $\frac{4}{9}$'
      explanation: |
        两位正整数共 $90$ 个（$10$ 到 $99$）。
        两位正奇数且两个数字不同：个位从 $\{1, 3, 5, 7, 9\}$ 选（5 种），十位从 $\{1, \ldots, 9\}$ 中选且不等于个位（8 种）。共 $5 \times 8 = 40$ 个。
        $P = \frac{40}{90} = \frac{4}{9}$。
        注意 (A) 和 (B) 数值相同，但 (A) 是最简分数。
      explanationEn: |
        Total two-digit integers: $90$ ($10$ through $99$).
        Odd with distinct digits: units digit from $\{1,3,5,7,9\}$ (5 choices), tens digit from $\{1,...,9\}$ excluding the units digit (8 choices). Total $= 5\times8 = 40$.
        $P = \frac{40}{90} = \frac{4}{9}$.

summary:
  - '<<概率/probability>>的基本公式：$P(A) = \frac{\text{有利结果数}}{\text{总结果数}}$，前提是所有结果等可能'
  - '<<补事件/complement>>法是最强大的概率技巧：$P(\overline{A}) = 1 - P(A)$，特别适合"至少一个"类型的问题'
  - '求概率的核心是计数——用列举法、树状图或组合数数清分子和分母'
  - '<<独立事件/independent events>>用乘法：$P(A \text{ 且 } B) = P(A) \times P(B)$；不放回抽取不是独立事件'
  - '<<条件概率/conditional probability>>：前一步的结果改变后一步的样本空间，用树状图最清晰'
  - 'AMC 8 概率题的解题策略：先确定样本空间 → 再数有利结果 → 检查是否等可能 → 考虑是否用补事件'
summaryEn:
  - 'Basic formula: $P(A) = \frac{\text{favorable}}{\text{total}}$, provided all outcomes are equally likely'
  - 'The <<补事件/complement>> method is the most powerful trick: $P(\overline{A}) = 1 - P(A)$ — especially for "at least one" problems'
  - 'The core of probability is counting — use listing, tree diagrams, or combinations to count numerator and denominator'
  - '<<独立事件/independent events>> use multiplication: $P(A \text{ and } B) = P(A)\times P(B)$; drawing without replacement is NOT independent'
  - '<<条件概率/conditional probability>>: the previous step changes the sample space — tree diagrams give the clearest picture'
  - 'AMC 8 probability strategy: identify the sample space → count favorable outcomes → check equal likelihood → consider complementary counting'

examPrep:
  intro: 以下为 AMC 8 竞赛风格的综合概率题，难度高于练习题，考查概率方法的灵活运用和多步推理。
  introEn: The following are AMC 8 contest-style probability problems at a higher difficulty level, testing flexible application of probability methods and multi-step reasoning.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #25"
      section: 综合
      question: |
        四片睡莲叶排成一圈。一只蟋蟀从一片叶子出发，每次随机跳到其他 3 片叶子中的任意一片（等概率）。4 次跳跃后回到起始叶子的概率是多少？

        (A) $\frac{2}{9}$ &emsp; (B) $\frac{20}{81}$ &emsp; (C) $\frac{7}{27}$ &emsp; (D) $\frac{25}{81}$ &emsp; (E) $\frac{1}{3}$
      questionEn: |
        Four lily pads form a circle. A cricket starts on one pad and hops to one of the other 3 pads at random, equally likely. What is the probability it returns to the starting pad after 4 hops?

        (A) $\frac{2}{9}$ &emsp; (B) $\frac{20}{81}$ &emsp; (C) $\frac{7}{27}$ &emsp; (D) $\frac{25}{81}$ &emsp; (E) $\frac{1}{3}$
      choices:
        - label: A
          content: '$\frac{2}{9}$'
        - label: B
          content: '$\frac{20}{81}$'
        - label: C
          content: '$\frac{7}{27}$'
        - label: D
          content: '$\frac{25}{81}$'
        - label: E
          content: '$\frac{1}{3}$'
      correctValue: C
      answer: '(C) $\frac{7}{27}$'
      answerEn: '(C) $\frac{7}{27}$'
      explanation: |
        用递推法。设 $f(n, k)$ 为跳 $n$ 次后在叶子 $k$ 的路径数（从叶子 1 出发）。
        由对称性，非起点的三片叶子路径数相同。
        $f(0, 1)=1$，其余 $=0$。
        $f(1, 1)=0$，其余各 $=1$。
        $f(2, 1)=3$，其余各 $=2$。
        $f(3, 1)=6$，其余各 $=7$。
        $f(4, 1)=7+7+7=21$。
        总路径 $=3^{4}=81$。$P=\frac{21}{81}=\frac{7}{27}$。
      explanationEn: |
        Use recursion. Let $f(n,k)$ = paths to pad $k$ after $n$ hops (starting at pad 1).
        By symmetry, the three non-start pads always have equal counts.
        $f(0,1)=1$, others $=0$. $f(1,1)=0$, others $=1$. $f(2,1)=3$, others $=2$.
        $f(3,1)=6$, others $=7$. $f(4,1)=7+7+7=21$.
        Total $=3^{4}=81$. $P=\frac{21}{81}=\frac{7}{27}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #21"
      section: 综合
      question: |
        帽子里有 3 个红色筹码和 2 个绿色筹码。每次随机抽出一个（不放回），直到 3 个红色筹码全部被抽出 或 2 个绿色筹码全部被抽出。3 个红色筹码先全部被抽出的概率是多少？

        (A) $\frac{3}{10}$ &emsp; (B) $\frac{2}{5}$ &emsp; (C) $\frac{1}{2}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{7}{10}$
      questionEn: |
        A hat contains 3 red chips and 2 green chips. Chips are drawn one at a time without replacement until all 3 reds or both greens are drawn. What is the probability that all 3 red chips are drawn (before both greens)?

        (A) $\frac{3}{10}$ &emsp; (B) $\frac{2}{5}$ &emsp; (C) $\frac{1}{2}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{7}{10}$
      choices:
        - label: A
          content: '$\frac{3}{10}$'
        - label: B
          content: '$\frac{2}{5}$'
        - label: C
          content: '$\frac{1}{2}$'
        - label: D
          content: '$\frac{3}{5}$'
        - label: E
          content: '$\frac{7}{10}$'
      correctValue: B
      answer: '(B) $\frac{2}{5}$'
      answerEn: '(B) $\frac{2}{5}$'
      explanation: |
        考虑 2 个绿色在 5 个位置中的放法，共 $C(5,2)=10$ 种。
        红色先完 = 第 3 个红色出现在第 2 个绿色之前。
        逐一列举：绿色在 $\{1,5\}$、$\{2,5\}$、$\{3,5\}$、$\{4,5\}$ 时，红色先完成。共 4 种。
        $P = \frac{4}{10} = \frac{2}{5}$。
      explanationEn: |
        Consider the $C(5,2)=10$ ways to place 2 greens among 5 positions.
        Reds win = 3rd red drawn before 2nd green.
        Greens at $\{1,5\}$, $\{2,5\}$, $\{3,5\}$, $\{4,5\}$: reds finish first. 4 arrangements.
        $P=\frac{4}{10}=\frac{2}{5}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #15"
      section: 综合
      question: |
        一个活动中有 50 人戴太阳镜，35 人戴帽子。随机选一个戴帽子的人，他同时戴太阳镜的概率为 $\frac{2}{5}$。那么随机选一个戴太阳镜的人，他同时戴帽子的概率是多少？

        (A) $\frac{14}{50}$ &emsp; (B) $\frac{7}{25}$ &emsp; (C) $\frac{2}{5}$ &emsp; (D) $\frac{4}{7}$ &emsp; (E) $\frac{7}{10}$
      questionEn: |
        At an event, 50 people wear sunglasses and 35 wear caps. A randomly chosen cap-wearer has a $\frac{2}{5}$ probability of also wearing sunglasses. What is the probability that a randomly chosen sunglasses-wearer also wears a cap?

        (A) $\frac{14}{50}$ &emsp; (B) $\frac{7}{25}$ &emsp; (C) $\frac{2}{5}$ &emsp; (D) $\frac{4}{7}$ &emsp; (E) $\frac{7}{10}$
      choices:
        - label: A
          content: '$\frac{14}{50}$'
        - label: B
          content: '$\frac{7}{25}$'
        - label: C
          content: '$\frac{2}{5}$'
        - label: D
          content: '$\frac{4}{7}$'
        - label: E
          content: '$\frac{7}{10}$'
      correctValue: B
      answer: '(B) $\frac{7}{25}$'
      answerEn: '(B) $\frac{7}{25}$'
      explanation: |
        同时戴两样的人数 $= 35 \times \frac{2}{5} = 14$。
        随机选一个戴太阳镜的人（50 人中选），同时戴帽子的概率 $= \frac{14}{50} = \frac{7}{25}$。
      explanationEn: |
        People wearing both $= 35\times\frac{2}{5} = 14$.
        $P(\text{cap}\mid\text{sunglasses}) = \frac{14}{50} = \frac{7}{25}$.

    - number: 4
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        有 6 个人站成一排拍照。其中小明和小红是好朋友，他们想站在相邻位置。所有排列等可能，小明和小红恰好相邻的概率是多少？

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{1}{3}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{1}{2}$
      questionEn: |
        Six people line up for a photo. Two of them, Xiao Ming and Xiao Hong, want to stand next to each other. If all arrangements are equally likely, what is the probability that they are adjacent?

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{1}{3}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{1}{2}$
      choices:
        - label: A
          content: '$\frac{1}{6}$'
        - label: B
          content: '$\frac{1}{5}$'
        - label: C
          content: '$\frac{1}{3}$'
        - label: D
          content: '$\frac{2}{5}$'
        - label: E
          content: '$\frac{1}{2}$'
      correctValue: C
      answer: '(C) $\frac{1}{3}$'
      answerEn: '(C) $\frac{1}{3}$'
      explanation: |
        总排列数 $= 6! = 720$。
        把小明和小红"捆绑"成一个整体，连同其他 4 人共 5 个单元排列：$5! = 120$ 种。
        捆绑内部小明和小红可以互换：$2! = 2$ 种。
        相邻的排列数 $= 120 \times 2 = 240$。
        $P = \frac{240}{720} = \frac{1}{3}$。
      explanationEn: |
        Total arrangements $= 6! = 720$.
        Treat Xiao Ming and Xiao Hong as one unit: $5!= 120$ arrangements of 5 units.
        They can swap within the unit: $2!=2$.
        Adjacent arrangements $= 120\times2 = 240$.
        $P = \frac{240}{720} = \frac{1}{3}$.

    - number: 5
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        一个袋子里有 4 张卡片，分别标有 $1, 2, 3, 4$。随机不放回地抽两张卡片，第一张作十位数、第二张作个位数，组成一个两位数。这个两位数是 $3$ 的倍数的概率是多少？

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{4}$ &emsp; (C) $\frac{1}{3}$ &emsp; (D) $\frac{5}{12}$ &emsp; (E) $\frac{1}{2}$
      questionEn: |
        A bag contains cards labeled $1, 2, 3, 4$. Two cards are drawn without replacement; the first is the tens digit and the second is the units digit, forming a two-digit number. What is the probability this number is a multiple of $3$?

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{4}$ &emsp; (C) $\frac{1}{3}$ &emsp; (D) $\frac{5}{12}$ &emsp; (E) $\frac{1}{2}$
      choices:
        - label: A
          content: '$\frac{1}{6}$'
        - label: B
          content: '$\frac{1}{4}$'
        - label: C
          content: '$\frac{1}{3}$'
        - label: D
          content: '$\frac{5}{12}$'
        - label: E
          content: '$\frac{1}{2}$'
      correctValue: C
      answer: '(C) $\frac{1}{3}$'
      answerEn: '(C) $\frac{1}{3}$'
      explanation: |
        总共 $4 \times 3 = 12$ 种有序选法。
        两位数是 $3$ 的倍数 ⟺ 两位数字之和是 $3$ 的倍数。
        列出所有两位数字之和：
        $(1,2)=3$ ✓，$(1,3)=4$，$(1,4)=5$，
        $(2,1)=3$ ✓，$(2,3)=5$，$(2,4)=6$ ✓，
        $(3,1)=4$，$(3,2)=5$，$(3,4)=7$，
        $(4,1)=5$，$(4,2)=6$ ✓，$(4,3)=7$。
        满足条件的有 4 种：$(1,2), (2,1), (2,4), (4,2)$。
        $P = \frac{4}{12} = \frac{1}{3}$。
      explanationEn: |
        Total ordered pairs: $4\times3=12$.
        Multiple of 3 ⟺ digit sum is a multiple of 3.
        Check all pairs:
        $(1,2)$: sum 3 ✓, $(2,1)$: sum 3 ✓, $(2,4)$: sum 6 ✓, $(4,2)$: sum 6 ✓.
        All others have sums 4, 5, or 7.
        Favorable: 4. $P = \frac{4}{12} = \frac{1}{3}$.
