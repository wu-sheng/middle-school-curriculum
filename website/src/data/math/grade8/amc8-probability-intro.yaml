    In the second semester of Grade 8 we studied data analysis, mastering mean, median, mode, and variance. In the standard PEP curriculum, probability is formally taught in Grade 9. However, probability is a high-frequency topic on the AMC 8 — nearly every year has 2–3 probability questions. This chapter introduces the core probability methods ahead of schedule to prepare for the AMC 8.
