  scaffold:
    - title: '铺垫：硬币概率'
      titleEn: 'Warm-up: Coin Flip Probability'
      question: '抛一枚硬币一次，正面朝上的概率是多少？反面呢？两个概率加起来等于多少？'
      questionEn: 'Flip a coin once. What is the probability of heads? Of tails? What do they add up to?'
      hint: '硬币只有两面，每面出现的机会相同'
      hintEn: 'A coin has two sides, each equally likely'
      answer: '$P(\text{正面}) = \frac{1}{2}$，$P(\text{反面}) = \frac{1}{2}$。加起来 $= 1$（所有可能的概率之和一定是 1）。'
      answerEn: '$P(\text{heads}) = \frac{1}{2}$, $P(\text{tails}) = \frac{1}{2}$. Sum $= 1$ (all probabilities must add to 1).'
    - title: '铺垫：数有利结果'
      titleEn: 'Warm-up: Counting Favorable Outcomes'
      question: '掷一个标准骰子，点数大于 4 的概率是多少？先列出所有"有利结果"。'
      questionEn: 'Roll a standard die. What is the probability of getting more than 4? First list all favorable outcomes.'
      hint: '大于 4 的点数有哪些？总共 6 个面。'
      hintEn: 'Which numbers are greater than 4? There are 6 faces total.'
      answer: '大于 4 的是 5 和 6，共 2 个有利结果。$P = \frac{2}{6} = \frac{1}{3}$'
      answerEn: 'Numbers > 4 are 5 and 6 — 2 favorable outcomes. $P = \frac{2}{6} = \frac{1}{3}$'
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #13"
      section: 基础概率
      question: |
        从 $\{-2, -1, 0, 3, 4, 5\}$ 中随机选两个不同的数，它们的乘积为 $0$ 的概率是多少？

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{1}{4}$ &emsp; (D) $\frac{1}{3}$ &emsp; (E) $\frac{1}{2}$
      questionEn: |
        Two different numbers are randomly selected from the set $\{-2,-1,0,3,4,5\}$. What is the probability that the product is $0$?

        (A) $\frac{1}{6}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{1}{4}$ &emsp; (D) $\frac{1}{3}$ &emsp; (E) $\frac{1}{2}$
      choices:
        - label: A
          content: '$\frac{1}{6}$'
        - label: B
          content: '$\frac{1}{5}$'
        - label: C
          content: '$\frac{1}{4}$'
        - label: D
          content: '$\frac{1}{3}$'
        - label: E
          content: '$\frac{1}{2}$'
      correctValue: D
      answer: '(D) $\frac{1}{3}$'
      answerEn: '(D) $\frac{1}{3}$'
      explanation: |
        乘积为 $0$ 意味着至少有一个数是 $0$。集合中有 $0$，所以只要选中 $0$ 和另一个数即可。
        总共选法：$C(6, 2) = 15$。
        包含 $0$ 的选法：另一个数从剩余 5 个中选 1 个，共 $5$ 种。
        $P = \frac{5}{15} = \frac{1}{3}$。
      explanationEn: |
        Product is $0$ means at least one number is $0$. The set contains $0$, so we need to choose $0$ and one other number.
        Total ways: $C(6,2) = 15$.
        Ways including $0$: choose 1 from remaining 5, so $5$ ways.
        $P = \frac{5}{15} = \frac{1}{3}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #9"
      section: 基础概率
      question: |
        Maria 的弹珠袋中有红色、绿色和蓝色弹珠。绿色弹珠有 $g$ 个，红色弹珠是绿色的一半（即 $\frac{g}{2}$ 个），蓝色弹珠是绿色的两倍（即 $2g$ 个）。以下哪个数可以是弹珠总数？

        (A) 24 &emsp; (B) 30 &emsp; (C) 36 &emsp; (D) 40 &emsp; (E) 28
      questionEn: |
        Maria has a bag of red, green, and blue marbles. She has $g$ green marbles, $\frac{g}{2}$ red marbles, and $2g$ blue marbles. Which of the following could be the total number of marbles?

        (A) 24 &emsp; (B) 30 &emsp; (C) 36 &emsp; (D) 40 &emsp; (E) 28
      choices:
        - label: A
