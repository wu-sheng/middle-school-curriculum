      section: 独立事件与多步实验
      question: |
        一枚均匀硬币连续掷 3 次，至少出现一次正面的概率是多少？

        (A) $\frac{1}{2}$ &emsp; (B) $\frac{3}{4}$ &emsp; (C) $\frac{5}{8}$ &emsp; (D) $\frac{7}{8}$ &emsp; (E) $\frac{15}{16}$
      questionEn: |
        A fair coin is flipped 3 times. What is the probability of getting at least one head?

        (A) $\frac{1}{2}$ &emsp; (B) $\frac{3}{4}$ &emsp; (C) $\frac{5}{8}$ &emsp; (D) $\frac{7}{8}$ &emsp; (E) $\frac{15}{16}$
      choices:
        - label: A
          content: '$\frac{1}{2}$'
        - label: B
          content: '$\frac{3}{4}$'
        - label: C
          content: '$\frac{5}{8}$'
        - label: D
          content: '$\frac{7}{8}$'
        - label: E
          content: '$\frac{15}{16}$'
      correctValue: D
      answer: '(D) $\frac{7}{8}$'
      answerEn: '(D) $\frac{7}{8}$'
      explanation: |
        用补事件法：$P(\text{至少一次正面}) = 1 - P(\text{全是反面})$。
        $P(\text{全是反面}) = \left(\frac{1}{2}\right)^{3} = \frac{1}{8}$。
        $P(\text{至少一次正面}) = 1 - \frac{1}{8} = \frac{7}{8}$。

        💡 **另一种方法——列出全部 8 种结果：**
        3 次掷硬币共 $2^{3} = 8$ 种结果：HHH, HHT, HTH, HTT, THH, THT, TTH, TTT。
        只有 TTT 没有正面，其余 7 种都"至少一次正面"。$P = \frac{7}{8}$。
        只有 8 种结果，全列出来很快——比公式法更不容易出错！
      explanationEn: |
        Complementary counting: $P(\text{at least one head}) = 1 - P(\text{all tails})$.
        $P(\text{all tails}) = \left(\frac{1}{2}\right)^{3} = \frac{1}{8}$.
        $P(\text{at least one head}) = 1 - \frac{1}{8} = \frac{7}{8}$.

        💡 **Alternative — List All 8 Outcomes:**
        3 coin flips give $2^{3}=8$ outcomes: HHH, HHT, HTH, HTT, THH, THT, TTH, TTT.
        Only TTT has no heads; the other 7 have "at least one head." $P = \frac{7}{8}$.
        With only 8 outcomes, listing all is quick and less error-prone than formulas!

