    - number: 10
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #25"
      section: 综合应用
      question: |
        四片睡莲叶排成一圈。一只蟋蟀从一片叶子出发，每次随机跳到其他 3 片叶子中的任意一片（等概率）。跳了 4 次后，蟋蟀回到出发叶子的概率是多少？

        (A) $\frac{2}{9}$ &emsp; (B) $\frac{20}{81}$ &emsp; (C) $\frac{7}{27}$ &emsp; (D) $\frac{25}{81}$ &emsp; (E) $\frac{1}{3}$
      questionEn: |
        Four lily pads are arranged in a circle. A cricket starts on one pad and, at each hop, jumps to one of the other 3 pads at random (equally likely). What is the probability the cricket returns to its starting pad after exactly 4 hops?

        (A) $\frac{2}{9}$ &emsp; (B) $\frac{20}{81}$ &emsp; (C) $\frac{7}{27}$ &emsp; (D) $\frac{25}{81}$ &emsp; (E) $\frac{1}{3}$
      choices:
        - label: A
          content: '$\frac{2}{9}$'
        - label: B
          content: '$\frac{20}{81}$'
        - label: C
          content: '$\frac{7}{27}$'
        - label: D
          content: '$\frac{25}{81}$'
        - label: E
          content: '$\frac{1}{3}$'
      correctValue: C
      answer: '(C) $\frac{7}{27}$'
      answerEn: '(C) $\frac{7}{27}$'
      explanation: |
        设 $f(n, k)$ 为跳 $n$ 次后在第 $k$ 片叶子上的路径数（起点为叶子 1）。
        $f(0, 1) = 1$，$f(0, 2) = f(0, 3) = f(0, 4) = 0$。

        每次可以跳到其他 3 片中的任意一片：
        $f(1, 1) = 0$，$f(1, 2) = f(1, 3) = f(1, 4) = 1$。
        $f(2, 1) = f(1,2)+f(1,3)+f(1,4) = 3$，$f(2, 2) = f(1,1)+f(1,3)+f(1,4) = 2$，同理 $f(2,3)=f(2,4)=2$。
        $f(3, 1) = 2+2+2 = 6$，$f(3, 2) = 3+2+2 = 7$，$f(3,3)=f(3,4)=7$。
        $f(4, 1) = 7+7+7 = 21$。

        总路径数 $= 3^{4} = 81$。$P = \frac{21}{81} = \frac{7}{27}$。
      explanationEn: |
        Let $f(n,k)$ be the number of paths reaching pad $k$ after $n$ hops (starting at pad 1).
        $f(0,1)=1$, $f(0,2)=f(0,3)=f(0,4)=0$.

        At each hop, the cricket jumps to one of the other 3 pads:
        $f(1,1)=0$, $f(1,2)=f(1,3)=f(1,4)=1$.
        $f(2,1)=1+1+1=3$, $f(2,2)=0+1+1=2$, similarly $f(2,3)=f(2,4)=2$.
        $f(3,1)=2+2+2=6$, $f(3,2)=3+2+2=7$, $f(3,3)=f(3,4)=7$.
        $f(4,1)=7+7+7=21$.

        Total paths $=3^{4}=81$. $P=\frac{21}{81}=\frac{7}{27}$.

    - number: 11
