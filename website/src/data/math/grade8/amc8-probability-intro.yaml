      section: 综合应用
      question: |
        从 $1$ 到 $20$ 的整数中随机选一个数。这个数既不是 $2$ 的倍数也不是 $3$ 的倍数的概率是多少？

        (A) $\frac{1}{4}$ &emsp; (B) $\frac{3}{10}$ &emsp; (C) $\frac{7}{20}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{9}{20}$
      questionEn: |
        A number is chosen at random from $1$ to $20$. What is the probability that it is a multiple of neither $2$ nor $3$?

        (A) $\frac{1}{4}$ &emsp; (B) $\frac{3}{10}$ &emsp; (C) $\frac{7}{20}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{9}{20}$
      choices:
        - label: A
          content: '$\frac{1}{4}$'
        - label: B
          content: '$\frac{3}{10}$'
        - label: C
          content: '$\frac{7}{20}$'
        - label: D
          content: '$\frac{2}{5}$'
        - label: E
          content: '$\frac{9}{20}$'
      correctValue: C
      answer: '(C) $\frac{7}{20}$'
      answerEn: '(C) $\frac{7}{20}$'
      explanation: |
        用补事件法（容斥原理）：
        $2$ 的倍数：$2, 4, 6, \ldots, 20$，共 10 个。
        $3$ 的倍数：$3, 6, 9, 12, 15, 18$，共 6 个。
        $6$ 的倍数（既是 $2$ 又是 $3$ 的倍数）：$6, 12, 18$，共 3 个。
        是 $2$ 或 $3$ 的倍数：$10 + 6 - 3 = 13$ 个。
        既不是 $2$ 也不是 $3$ 的倍数：$20 - 13 = 7$ 个。
        $P = \frac{7}{20}$。
      explanationEn: |
        Complementary counting (inclusion-exclusion):
        Multiples of 2: $2,4,6,\ldots,20$ — 10 numbers.
        Multiples of 3: $3,6,9,12,15,18$ — 6 numbers.
        Multiples of 6 (both 2 and 3): $6,12,18$ — 3 numbers.
        Multiple of 2 or 3: $10+6-3=13$.
        Neither: $20-13=7$.
        $P = \frac{7}{20}$.

