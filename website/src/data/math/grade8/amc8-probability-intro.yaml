concepts:
  - id: basic-probability
    title: <<概率/probability>>的基本概念
    titleEn: Basic Concepts of <<概率/probability>>
    hasVisualization: false
    content: |
      **什么是概率？**

      生活中我们经常说"很可能下雨"、"不太可能迟到"。<<概率/probability>>就是用一个**精确的数字**来衡量这种"可能性的大小"。

      掷一枚硬币，正面朝上的概率是 $\frac{1}{2}$——这意味着如果你掷很多很多次，大约一半的次数会出现正面。

      **概率的定义**

      当一个实验的所有结果<<等可能/equally likely>>时（比如掷一枚均匀的骰子，每个面出现的机会相同），事件 $A$ 的概率是：

      $$P(A) = \frac{\text{事件 } A \text{ 包含的结果数}}{\text{所有可能结果的总数}}$$

      这叫做<<古典概型/classical probability model>>。

      **例子：掷一个标准骰子**

      - 所有可能结果：$\{1, 2, 3, 4, 5, 6\}$，共 6 个
      - $P(\text{掷出 3}) = \frac{1}{6}$（只有 1 个有利结果）
      - $P(\text{掷出偶数}) = \frac{|\{2, 4, 6\}|}{6} = \frac{3}{6} = \frac{1}{2}$
      - $P(\text{掷出小于 5}) = \frac{|\{1, 2, 3, 4\}|}{6} = \frac{4}{6} = \frac{2}{3}$

      **概率的基本性质**

      1. **概率的范围**：任何事件的概率都在 $0$ 到 $1$ 之间：$0 \leq P(A) \leq 1$
      2. **必然事件**：一定会发生的事件，概率为 $1$。例如 $P(\text{掷出 1 到 6 之间的数}) = 1$
      3. **不可能事件**：不可能发生的事件，概率为 $0$。例如 $P(\text{掷出 7}) = 0$
      4. **<<对立事件/complementary event>>（补事件）**：事件 $A$ 不发生的概率为

      $$P(\overline{A}) = 1 - P(A)$$

      这是一个**非常有用的技巧**！当直接数"有利结果"很复杂时，不如数"不利结果"——然后用 $1$ 减去。

      **例子：补事件的威力**

      掷两枚骰子，求至少有一枚出现 6 的概率。

      直接数？要考虑"恰好一枚是 6"和"两枚都是 6"两种情况，有点麻烦。
      用补事件：$P(\text{至少一枚 6}) = 1 - P(\text{两枚都不是 6}) = 1 - \frac{5}{6} \times \frac{5}{6} = 1 - \frac{25}{36} = \frac{11}{36}$

      **⚠️ 常见误区**

      - "概率 $= \frac{1}{2}$"不等于"一定是一半一半"——它描述的是长期趋势，单次实验结果不确定
      - 每个结果必须<<等可能/equally likely>>才能用古典概型公式。如果骰子不均匀，就不能简单地用"有利数÷总数"
      - 概率 $= 0$ 不代表"绝对不会发生"（理论上可以区分，但在 AMC 8 中通常就是不会发生）
    contentEn: |
      **What is probability?**

      In daily life we often say "it will probably rain" or "it's unlikely I'll be late." <<概率/probability>> assigns a **precise number** to measure this "degree of likelihood."

      Flip a coin: the probability of heads is $\frac{1}{2}$ — meaning if you flip it many, many times, about half the flips will be heads.

      **Definition of probability**

      When all outcomes of an experiment are <<等可能/equally likely>> (e.g., rolling a fair die — every face has the same chance), the probability of event $A$ is:

      $$P(A) = \frac{\text{number of outcomes in } A}{\text{total number of outcomes}}$$

      This is called the <<古典概型/classical probability model>>.

      **Example: rolling a standard die**

      - All possible outcomes: $\{1, 2, 3, 4, 5, 6\}$, total 6
      - $P(\text{roll a 3}) = \frac{1}{6}$ (1 favorable outcome)
      - $P(\text{roll an even number}) = \frac{|\{2,4,6\}|}{6} = \frac{3}{6} = \frac{1}{2}$
      - $P(\text{roll less than 5}) = \frac{|\{1,2,3,4\}|}{6} = \frac{4}{6} = \frac{2}{3}$

      **Basic properties of probability**

      1. **Range**: Every probability lies between $0$ and $1$: $0 \leq P(A) \leq 1$
      2. **Certain event**: An event guaranteed to occur has probability $1$. E.g., $P(\text{roll 1 through 6}) = 1$
      3. **Impossible event**: An event that cannot occur has probability $0$. E.g., $P(\text{roll a 7}) = 0$
      4. **<<对立事件/complementary event>>**: The probability that $A$ does NOT occur is

      $$P(\overline{A}) = 1 - P(A)$$

      This is an **extremely useful trick**! When counting favorable outcomes is complicated, count the unfavorable ones instead — then subtract from $1$.

      **Example: the power of complementary counting**

      Roll two dice. Find the probability that at least one shows a 6.

      Counting directly? You'd need "exactly one 6" and "both 6s" — a bit tedious.
      Complementary method: $P(\text{at least one 6}) = 1 - P(\text{neither is 6}) = 1 - \frac{5}{6}\times\frac{5}{6} = 1 - \frac{25}{36} = \frac{11}{36}$

      **Common misconceptions**

      - "$P = \frac{1}{2}$" does NOT mean "exactly half the time" — it describes a long-run trend; any single trial is uncertain
      - Outcomes MUST be <<等可能/equally likely>> to apply the classical formula. If the die is unfair, you can't just use "favorable ÷ total"
      - $P = 0$ doesn't mean "absolutely will never happen" (in theory), but in AMC 8 it typically means impossible
    notes:
      - '概率本质上是一个 $0$ 到 $1$ 之间的分数，越接近 $1$ 越可能发生'
      - '补事件公式 $P(\overline{A}) = 1 - P(A)$ 是 AMC 8 概率题的最常用技巧之一'
      - '使用古典概型的前提：所有结果等可能。检查这一点很重要！'
      - '概率可以用分数、小数或百分比表示，AMC 8 中通常用最简分数'
    notesEn:
      - 'Probability is essentially a fraction between $0$ and $1$ — closer to $1$ means more likely'
      - 'The complement formula $P(\overline{A}) = 1 - P(A)$ is one of the most commonly used tricks in AMC 8 probability'
      - 'The classical model requires all outcomes to be equally likely — always check this!'
      - 'Probability can be expressed as a fraction, decimal, or percentage; AMC 8 typically uses simplified fractions'

  - id: counting-for-probability
    title: 用<<计数/counting>>方法求概率
    titleEn: Using <<计数/counting>> Methods to Find Probability
    hasVisualization: false
    content: |
      **概率的本质就是计数**

      古典概率公式 $P(A) = \frac{\text{有利结果数}}{\text{总结果数}}$ 告诉我们：求概率的关键就是**数清楚**——分子数什么、分母数什么。

      **方法 1：列举法（适合结果较少时）**

      当总结果数不多时，把所有可能的结果一个个列出来，数一数哪些满足条件。

      **例子**：从 $\{1, 2, 3, 4, 5\}$ 中选 2 个数，它们的和为偶数的概率？

      所有选法：$C(5, 2) = 10$ 种。
      和为偶数 = 两个都是奇数 或 两个都是偶数。
      奇数 $\{1, 3, 5\}$ 中选 2 个：$C(3, 2) = 3$ 种。
      偶数 $\{2, 4\}$ 中选 2 个：$C(2, 2) = 1$ 种。
      有利结果 $= 3 + 1 = 4$。$P = \frac{4}{10} = \frac{2}{5}$。

      **方法 2：树状图（适合多步实验）**

      当实验分多步进行时，画一棵"树"，每一层是一步的选择。

      **例子**：掷硬币两次，树状图如下：

      第一次：正（H）或 反（T）
      ├── H → 第二次：H 或 T → 结果：HH，HT
      └── T → 第二次：H 或 T → 结果：TH，TT

      一共 4 种等可能结果：$\{HH, HT, TH, TT\}$。
      $P(\text{恰好一次正面}) = \frac{|\{HT, TH\}|}{4} = \frac{2}{4} = \frac{1}{2}$。

      **方法 3：乘法原理 + 组合数（适合结果较多时）**

      当结果太多无法一一列举时，用乘法原理或组合数来计算。

      **例子**：从一副 52 张扑克牌中随机抽 2 张，两张都是红心的概率？

      总结果数：$C(52, 2) = \frac{52 \times 51}{2} = 1326$。
      有利结果（两张都是红心）：$C(13, 2) = \frac{13 \times 12}{2} = 78$。
      $P = \frac{78}{1326} = \frac{1}{17}$。

      **AMC 8 典型场景：非标准骰子**

      AMC 8 喜欢考"不标准"的骰子或卡片。例如面上的数字不是 $1 \sim 6$，而是特别的数字集合。此时关键是：
      1. 弄清楚样本空间（总共多少种结果）
      2. 弄清楚有利结果有多少
      3. 检查每种结果是否等可能

      **⚠️ 常见错误**

      - 分子分母"单位不一致"：分母数的是无序对，分子却数了有序对（或反之）
      - 忘记检查"等可能性"——骰子的 6 个面出现概率相等，但如果改成掷两枚骰子看"和"，各种和出现的概率**不相等**
      - 将"抽取不放回"当成"有放回"来算
    contentEn: |
      **Probability is fundamentally about counting**

      The classical formula $P(A) = \frac{\text{favorable}}{\text{total}}$ tells us: the key to finding probability is **counting correctly** — what goes in the numerator, what goes in the denominator.

      **Method 1: Listing (when outcomes are few)**

      When the total number of outcomes is small, list them all and count which ones satisfy the condition.

      **Example**: Pick 2 numbers from $\{1,2,3,4,5\}$. What is the probability their sum is even?

      Total ways: $C(5,2)=10$.
      Even sum = both odd or both even.
      Odd $\{1,3,5\}$, choose 2: $C(3,2)=3$.
      Even $\{2,4\}$, choose 2: $C(2,2)=1$.
      Favorable $= 3+1=4$. $P = \frac{4}{10} = \frac{2}{5}$.

      **Method 2: Tree diagrams (for multi-step experiments)**

      When an experiment has multiple stages, draw a "tree" where each level represents one step.

      **Example**: Flip a coin twice:

      First flip: H or T
      ├── H → Second flip: H or T → Outcomes: HH, HT
      └── T → Second flip: H or T → Outcomes: TH, TT

      Total 4 equally likely outcomes: $\{HH, HT, TH, TT\}$.
      $P(\text{exactly one head}) = \frac{|\{HT, TH\}|}{4} = \frac{1}{2}$.

      **Method 3: Multiplication principle + combinations (when outcomes are many)**

      When there are too many outcomes to list, use the multiplication principle or combinations.

      **Example**: Draw 2 cards from a standard 52-card deck. What is the probability both are hearts?

      Total: $C(52,2) = 1326$.
      Favorable (both hearts): $C(13,2) = 78$.
      $P = \frac{78}{1326} = \frac{1}{17}$.

      **AMC 8 classic scenario: non-standard dice**

      AMC 8 loves "non-standard" dice or cards — faces labeled with unusual number sets instead of $1$–$6$. The key steps are:
      1. Identify the sample space (how many total outcomes)
      2. Count favorable outcomes
      3. Verify that all outcomes are equally likely

      **Common mistakes**

      - Numerator and denominator "units" don't match: denominator counts unordered pairs but numerator counts ordered ones (or vice versa)
      - Forgetting to check "equally likely" — each die face is equally likely, but when rolling two dice and looking at the SUM, different sums are NOT equally likely
      - Treating "without replacement" as "with replacement"
    notes:
      - '求概率的核心：分子（有利结果数）和分母（总结果数）必须用同一种计数方式'
      - '列举法虽然"笨"，但在 AMC 8 中经常是最可靠的方法——结果数不超过 20-30 时优先考虑'
      - '树状图特别适合两步或三步的实验，能直观看到所有分支'
      - '非标准骰子/卡片：先搞清楚样本空间，再数有利结果'
    notesEn:
      - 'Core of probability: numerator (favorable) and denominator (total) must use the same counting method'
      - 'Listing may seem "brute force," but it is often the most reliable method in AMC 8 — prefer it when total outcomes are at most 20–30'
      - 'Tree diagrams are especially suited for two- or three-step experiments, giving a visual view of all branches'
      - 'Non-standard dice/cards: first determine the sample space, then count favorable outcomes'

  - id: independent-events
    title: <<独立事件/independent events>>
    titleEn: <<独立事件/independent events>>
    hasVisualization: false
    content: |
      **什么是独立事件？**

      两个事件是<<独立/independent>>的，意味着一个事件的发生**不影响**另一个事件的概率。

      典型例子：
      - 掷硬币两次：第一次的结果不影响第二次
      - 掷两枚不同的骰子：每枚骰子的结果互不影响
      - 从袋中取球**放回**后再取：因为放回了，所以第二次取球和第一次独立

      反例（**不独立**）：
      - 从袋中取球**不放回**：取出第一个球后，袋中球的数量和构成都变了，所以第二次取球**依赖于**第一次

      **独立事件的概率乘法法则**

      如果事件 $A$ 和 $B$ 独立，那么：

      $$P(A \text{ 且 } B) = P(A) \times P(B)$$

      **例子**：掷两枚骰子，第一枚出 6 且第二枚出偶数的概率？

      $P(\text{第一枚出 6}) = \frac{1}{6}$，$P(\text{第二枚出偶数}) = \frac{1}{2}$。

      两枚骰子独立，所以 $P(\text{第一枚 6 且第二枚偶数}) = \frac{1}{6} \times \frac{1}{2} = \frac{1}{12}$。

      **推广到多个独立事件**

      掷 $n$ 次硬币，每次独立：

      $P(\text{全是正面}) = \underbrace{\frac{1}{2} \times \frac{1}{2} \times \cdots \times \frac{1}{2}}_{n \text{ 个}} = \left(\frac{1}{2}\right)^{n}$

      **"至少一个"——补事件法的经典应用**

      "至少有一个 X" 的概率往往很难直接算，因为要分成"恰好 1 个"、"恰好 2 个"……太麻烦！

      **技巧**："至少一个" = $1$ $-$ "一个也没有"

      $$P(\text{至少一个 X}) = 1 - P(\text{没有 X})$$

      **例子**：掷 3 次硬币，至少出现一次正面的概率？

      $P(\text{没有正面}) = P(\text{全是反面}) = \left(\frac{1}{2}\right)^{3} = \frac{1}{8}$

      $P(\text{至少一次正面}) = 1 - \frac{1}{8} = \frac{7}{8}$

      如果直接数：要数"恰好 1 次正面" + "恰好 2 次" + "恰好 3 次" = $3 + 3 + 1 = 7$ 种，$P = \frac{7}{8}$。结果一样，但补事件法更快！

      **AMC 8 中的独立事件套路**

      1. **多次掷骰子/翻硬币**：每次独立，用乘法法则
      2. **多步实验**：如果每步不影响下一步，则独立
      3. **"至少一个"问题**：几乎一定用补事件法
    contentEn: |
      **What are independent events?**

      Two events are <<独立/independent>> if one occurring **does not affect** the probability of the other.

      Typical examples:
      - Flipping a coin twice: the first flip doesn't affect the second
      - Rolling two different dice: each die's result is independent of the other
      - Drawing a ball from a bag, **replacing** it, then drawing again: since you replaced it, the second draw is independent of the first

      Counterexample (**not independent**):
      - Drawing from a bag **without replacement**: after removing one ball, the composition of the bag changes, so the second draw **depends on** the first

      **Multiplication rule for independent events**

      If events $A$ and $B$ are independent:

      $$P(A \text{ and } B) = P(A) \times P(B)$$

      **Example**: Roll two dice. Probability that the first shows 6 AND the second shows an even number?

      $P(\text{first is 6}) = \frac{1}{6}$, $P(\text{second is even}) = \frac{1}{2}$.

      The dice are independent, so $P = \frac{1}{6}\times\frac{1}{2} = \frac{1}{12}$.

      **Extending to multiple independent events**

      Flip a coin $n$ times, each flip independent:

      $P(\text{all heads}) = \underbrace{\frac{1}{2}\times\frac{1}{2}\times\cdots\times\frac{1}{2}}_{n} = \left(\frac{1}{2}\right)^{n}$

      **"At least one" — the classic use of complementary counting**

      "At least one X" is often hard to compute directly because you'd need "exactly 1" + "exactly 2" + ... — too tedious!

      **Trick**: "at least one" $= 1 -$ "none at all"

      $$P(\text{at least one X}) = 1 - P(\text{no X})$$

      **Example**: Flip a coin 3 times. Probability of at least one head?

      $P(\text{no heads}) = P(\text{all tails}) = \left(\frac{1}{2}\right)^{3} = \frac{1}{8}$

      $P(\text{at least one head}) = 1 - \frac{1}{8} = \frac{7}{8}$

      Direct counting: "exactly 1 head" + "exactly 2" + "exactly 3" $= 3+3+1 = 7$ outcomes, $P = \frac{7}{8}$. Same answer, but complementary counting is faster!

      **Independent event patterns in AMC 8**

      1. **Multiple die rolls / coin flips**: each trial is independent — use the multiplication rule
      2. **Multi-step experiments**: if each step doesn't affect the next, the steps are independent
      3. **"At least one" problems**: almost always use complementary counting
    notes:
      - '独立事件的关键判断标准：一个事件的发生是否改变了另一个事件的概率？不改变 → 独立'
      - '独立事件用乘法：$P(A \text{ 且 } B) = P(A) \times P(B)$'
      - '"至少一个"问题首选补事件法：$1 - P(\text{一个也没有})$'
      - 'AMC 8 中"有放回"的抽取一定是独立事件，"不放回"的抽取则不独立'
    notesEn:
      - 'Key test for independence: does one event occurring change the probability of the other? If not → independent'
      - 'Independent events use multiplication: $P(A \text{ and } B) = P(A) \times P(B)$'
      - 'For "at least one" problems, prefer complementary counting: $1 - P(\text{none})$'
      - 'In AMC 8, drawing "with replacement" is always independent; "without replacement" is not'

  - id: conditional-probability-intro
    title: <<条件概率/conditional probability>>初步
    titleEn: Introduction to <<条件概率/conditional probability>>
    hasVisualization: false
    content: |
      **当样本空间会变化时**

      在独立事件中，每一步的样本空间不变（比如掷骰子，每次都是 6 个面）。但很多问题中，前一步的结果会**改变**后一步的样本空间。

      **例子：不放回抽球**

      袋子里有 3 个红球和 2 个蓝球。不放回地连续抽 2 个球，两个都是红球的概率是多少？

      第一步：$P(\text{第 1 个红球}) = \frac{3}{5}$（3 红 / 5 总）

      第二步：**已经抽走了 1 个红球**，袋中还剩 2 红 + 2 蓝 = 4 个球。
      $P(\text{第 2 个也是红球} \mid \text{第 1 个是红球}) = \frac{2}{4} = \frac{1}{2}$

      两步合起来：$P(\text{两个都红}) = \frac{3}{5} \times \frac{1}{2} = \frac{3}{10}$

      注意：这里用了乘法，但**不是**独立事件的乘法！第二步的概率 $\frac{1}{2}$ 是在"第一步已经取走一个红球"的**条件下**计算的。

      **条件概率的直觉**

      <<条件概率/conditional probability>> $P(B \mid A)$ 读作"在 $A$ 已经发生的条件下 $B$ 发生的概率"。

      它的意思是：我们**缩小了考虑范围**——不再看所有可能的结果，而只看 $A$ 已经发生的那些结果，在这些结果中 $B$ 发生的比例是多少。

      **树状图法——不放回抽取的最佳工具**

      对于不放回抽取问题，最清晰的方法是画树状图，每一层标上概率：

      第 1 次抽取（5 球中抽 1）：
      ├── 红球 ($\frac{3}{5}$) → 第 2 次（4 球中抽 1）：红 ($\frac{2}{4}$)，蓝 ($\frac{2}{4}$)
      └── 蓝球 ($\frac{2}{5}$) → 第 2 次（4 球中抽 1）：红 ($\frac{3}{4}$)，蓝 ($\frac{1}{4}$)

      每条从根到叶的路径，概率等于路径上各分支概率的乘积：
      - 红红：$\frac{3}{5} \times \frac{2}{4} = \frac{6}{20} = \frac{3}{10}$
      - 红蓝：$\frac{3}{5} \times \frac{2}{4} = \frac{6}{20} = \frac{3}{10}$
      - 蓝红：$\frac{2}{5} \times \frac{3}{4} = \frac{6}{20} = \frac{3}{10}$
      - 蓝蓝：$\frac{2}{5} \times \frac{1}{4} = \frac{2}{20} = \frac{1}{10}$

      所有路径概率之和 $= \frac{3}{10} + \frac{3}{10} + \frac{3}{10} + \frac{1}{10} = 1$ ✓

      **AMC 8 中的条件概率**

      AMC 8 不会直接写"求条件概率"，但经常出现以下场景：
      - 不放回地抽卡片/球/筹码
      - "已知某个条件成立"，求另一个事件的概率
      - 某人先做了一个选择，在此基础上再做判断

      解题关键：弄清楚**每一步的样本空间是什么**，是否因前一步而改变了。

      **⚠️ 条件概率 vs 独立事件——如何区分？**

      | | 独立事件 | 条件概率 |
      |--|---------|---------|
      | 样本空间 | 每步不变 | 会随前一步变化 |
      | 公式 | $P(A \text{ 且 } B) = P(A) \times P(B)$ | $P(A \text{ 且 } B) = P(A) \times P(B \mid A)$ |
      | 典型场景 | 有放回、掷多枚骰子 | 不放回、淘汰赛 |
    contentEn: |
      **When the sample space changes**

      In independent events, the sample space stays the same at each step (e.g., rolling a die — always 6 faces). But in many problems, the result of one step **changes** the sample space for the next.

      **Example: drawing without replacement**

      A bag contains 3 red and 2 blue balls. Draw 2 balls without replacement. What is the probability both are red?

      Step 1: $P(\text{1st red}) = \frac{3}{5}$ (3 red out of 5 total)

      Step 2: **One red ball has been removed.** The bag now has 2 red + 2 blue = 4 balls.
      $P(\text{2nd red} \mid \text{1st red}) = \frac{2}{4} = \frac{1}{2}$

      Combined: $P(\text{both red}) = \frac{3}{5}\times\frac{1}{2} = \frac{3}{10}$

      Note: we used multiplication, but this is **not** the independent-events formula! The second probability $\frac{1}{2}$ was computed **conditional on** the first ball being red.

      **Intuition for conditional probability**

      <<条件概率/conditional probability>> $P(B \mid A)$ is read "the probability of $B$ given that $A$ has occurred."

      It means: we **narrow our view** — instead of looking at all possible outcomes, we only look at those where $A$ occurred, and ask what fraction of those also have $B$.

      **Tree diagrams — the best tool for without-replacement problems**

      For without-replacement problems, the clearest approach is a tree diagram with probabilities on each branch:

      1st draw (from 5 balls):
      ├── Red ($\frac{3}{5}$) → 2nd draw (from 4): Red ($\frac{2}{4}$), Blue ($\frac{2}{4}$)
      └── Blue ($\frac{2}{5}$) → 2nd draw (from 4): Red ($\frac{3}{4}$), Blue ($\frac{1}{4}$)

      Each root-to-leaf path has probability equal to the product of its branch probabilities:
      - Red-Red: $\frac{3}{5}\times\frac{2}{4} = \frac{3}{10}$
      - Red-Blue: $\frac{3}{5}\times\frac{2}{4} = \frac{3}{10}$
      - Blue-Red: $\frac{2}{5}\times\frac{3}{4} = \frac{3}{10}$
      - Blue-Blue: $\frac{2}{5}\times\frac{1}{4} = \frac{1}{10}$

      Sum of all path probabilities $= \frac{3}{10}+\frac{3}{10}+\frac{3}{10}+\frac{1}{10} = 1$ ✓

      **Conditional probability on the AMC 8**

      The AMC 8 won't explicitly say "find the conditional probability," but these scenarios appear often:
      - Drawing cards/balls/chips without replacement
      - "Given that some condition holds," find the probability of another event
      - Someone makes a first choice, then a second decision depends on it

      Key to solving: determine **what the sample space is at each step** and whether it changed due to previous steps.

      **Conditional probability vs. independent events — how to tell?**

      | | Independent events | Conditional probability |
      |--|-------------------|------------------------|
      | Sample space | Same at each step | Changes with previous steps |
      | Formula | $P(A \text{ and } B) = P(A) \times P(B)$ | $P(A \text{ and } B) = P(A) \times P(B \mid A)$ |
      | Typical scenario | With replacement, multiple dice | Without replacement, elimination |
    notes:
      - '条件概率的核心：前一步的结果改变了后一步的样本空间'
      - '树状图是处理不放回问题的最佳工具——每层标上当前条件下的概率'
      - '所有从根到叶的路径概率之和应等于 $1$——这是检验树状图正确性的好方法'
      - 'AMC 8 中不放回抽取非常常见，一定要注意每一步中球/卡片的数量变化'
    notesEn:
      - 'The core of conditional probability: the previous step changes the sample space for the next'
      - 'Tree diagrams are the best tool for without-replacement problems — label each branch with the conditional probability'
      - 'All root-to-leaf path probabilities should sum to $1$ — a great check for correctness'
      - 'Without-replacement draws are very common on AMC 8 — always track how many items remain at each step'

examples:
  - type: 1
    source: "AMC 8 2019 #18"
    title: 非标准骰子的偶数和
    titleEn: Even Sum with Non-Standard Dice
    question: |
      两枚骰子的面上标有数字 $\{1, 2, 3, 5, 7, 8\}$。同时掷两枚骰子，两枚骰子点数之和为偶数的概率是多少？

      (A) $\frac{4}{9}$ &emsp; (B) $\frac{1}{2}$ &emsp; (C) $\frac{5}{9}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{2}{3}$
    questionEn: |
      Each face of two dice is labeled with one of the numbers $\{1, 2, 3, 5, 7, 8\}$. Both dice are rolled. What is the probability that the sum is even?

      (A) $\frac{4}{9}$ &emsp; (B) $\frac{1}{2}$ &emsp; (C) $\frac{5}{9}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{2}{3}$
    steps:
      - '分析数字的奇偶性：奇数面 $\{1, 3, 5, 7\}$ 有 4 个，偶数面 $\{2, 8\}$ 有 2 个'
      - '和为偶数的条件：两个都是奇数 或 两个都是偶数（奇+奇=偶，偶+偶=偶）'
      - '$P(\text{两个都是奇数}) = \frac{4}{6} \times \frac{4}{6} = \frac{16}{36}$'
      - '$P(\text{两个都是偶数}) = \frac{2}{6} \times \frac{2}{6} = \frac{4}{36}$'
      - '$P(\text{和为偶数}) = \frac{16}{36} + \frac{4}{36} = \frac{20}{36} = \frac{5}{9}$'
    stepsEn:
      - 'Analyze parity: odd faces $\{1,3,5,7\}$ — 4 faces; even faces $\{2,8\}$ — 2 faces'
      - 'Sum is even when both odd OR both even (odd+odd=even, even+even=even)'
      - '$P(\text{both odd}) = \frac{4}{6}\times\frac{4}{6} = \frac{16}{36}$'
      - '$P(\text{both even}) = \frac{2}{6}\times\frac{2}{6} = \frac{4}{36}$'
      - '$P(\text{even sum}) = \frac{16}{36}+\frac{4}{36} = \frac{20}{36} = \frac{5}{9}$'
    answer: '(C) $\frac{5}{9}$'
    answerEn: '(C) $\frac{5}{9}$'

  - type: 2
    source: "AMC 8 2016 #21"
    title: 抽筹码——谁先完成？
    titleEn: Drawing Chips — Who Finishes First?
    question: |
      帽子里有 3 个红色筹码和 2 个绿色筹码。每次随机抽出一个（不放回），直到 3 个红色筹码全部被抽出 或 2 个绿色筹码全部被抽出。3 个红色筹码先全部被抽出的概率是多少？

      (A) $\frac{3}{10}$ &emsp; (B) $\frac{2}{5}$ &emsp; (C) $\frac{1}{2}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{7}{10}$
    questionEn: |
      A hat contains 3 red chips and 2 green chips. Chips are drawn one at a time without replacement until all 3 reds or both greens are drawn. What is the probability that all 3 red chips are drawn?

      (A) $\frac{3}{10}$ &emsp; (B) $\frac{2}{5}$ &emsp; (C) $\frac{1}{2}$ &emsp; (D) $\frac{3}{5}$ &emsp; (E) $\frac{7}{10}$
    steps:
      - '**关键思路**：考虑 5 个筹码的所有排列，看 2 个绿色筹码放在哪些位置。'
      - '2 个绿色在 5 个位置中选 2 个的方式有 $C(5, 2) = 10$ 种。'
      - '红色先全部抽出 = 在绿色全部出现之前，3 个红色已经出完。即：游戏结束时抽到第 3 个红色在抽到第 2 个绿色之前。'
      - '逐一检查绿色的位置组合：'
      - '绿色在 $\{1,2\}$：第 2 位就有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{1,3\}$：第 3 位有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{1,4\}$：第 4 位有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{1,5\}$：前 4 位有 3 红 1 绿 → 第 4 位时 3 红完 → 红色先完 ✓'
      - '绿色在 $\{2,3\}$：第 3 位有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{2,4\}$：第 4 位有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{2,5\}$：前 4 位有 3 红 1 绿 → 红色先完 ✓'
      - '绿色在 $\{3,4\}$：第 4 位有 2 绿 → 绿色先完 ✗'
      - '绿色在 $\{3,5\}$：前 4 位（位置 1,2,4 是红）有 3 红 → 红色先完 ✓'
      - '绿色在 $\{4,5\}$：前 3 位全红 → 红色先完 ✓'
      - '红色先完的情况有 4 种：$\{1,5\}$、$\{2,5\}$、$\{3,5\}$、$\{4,5\}$。$P = \frac{4}{10} = \frac{2}{5}$'
    stepsEn:
      - '**Key idea**: Consider all arrangements of 5 chips and check where the 2 greens are placed.'
      - 'There are $C(5,2)=10$ ways to place the 2 greens among 5 positions.'
      - 'Reds win = all 3 reds are drawn before both greens. I.e., the 3rd red appears before the 2nd green.'
      - 'Check each green-position combination:'
      - 'Greens at $\{1,2\}$: 2nd green at position 2 → greens win ✗'
      - 'Greens at $\{1,3\}$: 2nd green at position 3 → greens win ✗'
      - 'Greens at $\{1,4\}$: 2nd green at position 4 → greens win ✗'
      - 'Greens at $\{1,5\}$: positions 2,3,4 have 3 reds → reds finish at position 4 ✓'
      - 'Greens at $\{2,3\}$: 2nd green at position 3 → greens win ✗'
      - 'Greens at $\{2,4\}$: 2nd green at position 4 → greens win ✗'
      - 'Greens at $\{2,5\}$: positions 1,3,4 have 3 reds → reds finish at position 4 ✓'
      - 'Greens at $\{3,4\}$: 2nd green at position 4 → greens win ✗'
      - 'Greens at $\{3,5\}$: positions 1,2,4 have 3 reds → reds finish at position 4 ✓'
      - 'Greens at $\{4,5\}$: positions 1,2,3 all red → reds finish at position 3 ✓'
      - 'Reds win in 4 cases: $\{1,5\}$, $\{2,5\}$, $\{3,5\}$, $\{4,5\}$. $P = \frac{4}{10} = \frac{2}{5}$'
    answer: '(B) $\frac{2}{5}$'
    answerEn: '(B) $\frac{2}{5}$'

  - type: 3
    source: "AMC 8 2017 #10"
    title: 卡片中最大数——组合计数
    titleEn: Largest Card Drawn — Combinatorial Counting
    question: |
      从标有 $1, 2, 3, 4, 5$ 的 5 张卡片中随机抽出 3 张。抽出的卡片中最大的数恰好是 $4$ 的概率是多少？

      (A) $\frac{1}{10}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{3}{10}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{1}{2}$
    questionEn: |
      Three cards are chosen at random from five cards numbered $1, 2, 3, 4, 5$. What is the probability that the largest number drawn is $4$?

      (A) $\frac{1}{10}$ &emsp; (B) $\frac{1}{5}$ &emsp; (C) $\frac{3}{10}$ &emsp; (D) $\frac{2}{5}$ &emsp; (E) $\frac{1}{2}$
    steps:
      - '总选法：$C(5, 3) = 10$'
      - '最大数恰好是 $4$ → 必须选中 $4$，且不能选 $5$（否则 $5$ 才是最大）'
      - '剩下 2 张从 $\{1, 2, 3\}$ 中选：$C(3, 2) = 3$'
      - '$P = \frac{3}{10}$'
    stepsEn:
      - 'Total ways: $C(5,3) = 10$'
      - 'Largest is exactly $4$ → must include $4$, must NOT include $5$ (otherwise $5$ would be largest)'
      - 'Remaining 2 cards from $\{1,2,3\}$: $C(3,2) = 3$'
      - '$P = \frac{3}{10}$'
    answer: '(C) $\frac{3}{10}$'
    answerEn: '(C) $\frac{3}{10}$'

  - type: 4
    source: "AMC 8 2022 #12"
    title: 转盘组合两位数——完全平方数
    titleEn: Spinner Two-Digit Number — Perfect Squares
    question: |
      转盘 A 有四个等可能的数字 $\{5, 6, 7, 8\}$，转盘 B 有四个等可能的数字 $\{1, 2, 3, 4\}$。分别转一次，用 A 的结果作十位、B 的结果作个位组成两位数 $N$。$N$ 是完全平方数的概率是多少？

      (A) $\frac{1}{16}$ &emsp; (B) $\frac{1}{8}$ &emsp; (C) $\frac{1}{4}$ &emsp; (D) $\frac{3}{8}$ &emsp; (E) $\frac{7}{16}$
    questionEn: |
      Spinner A has equally likely outcomes $\{5,6,7,8\}$ and spinner B has equally likely outcomes $\{1,2,3,4\}$. Each spinner is spun once. The two-digit number $N$ is formed with A as the tens digit and B as the units digit. What is the probability that $N$ is a perfect square?

      (A) $\frac{1}{16}$ &emsp; (B) $\frac{1}{8}$ &emsp; (C) $\frac{1}{4}$ &emsp; (D) $\frac{3}{8}$ &emsp; (E) $\frac{7}{16}$
    steps:
      - '总共 $4 \times 4 = 16$ 种等可能的结果'
      - '$N$ 的范围：十位是 $5 \sim 8$，个位是 $1 \sim 4$，所以 $N$ 在 $51$ 到 $84$ 之间'
      - '这个范围内的完全平方数：$8^{2} = 64$，$9^{2} = 81$'
      - '$N = 64$：A 转出 6，B 转出 4 ✓'
      - '$N = 81$：A 转出 8，B 转出 1 ✓'
      - '有利结果 $= 2$。$P = \frac{2}{16} = \frac{1}{8}$'
    stepsEn:
      - 'Total outcomes: $4\times4 = 16$'
      - '$N$ ranges from $51$ to $84$ (tens digit $5$–$8$, units $1$–$4$)'
      - 'Perfect squares in $[51, 84]$: $8^{2}=64$ and $9^{2}=81$'
      - '$N=64$: A spins 6, B spins 4 ✓'
      - '$N=81$: A spins 8, B spins 1 ✓'
      - 'Favorable $= 2$. $P = \frac{2}{16} = \frac{1}{8}$'
    answer: '(B) $\frac{1}{8}$'
    answerEn: '(B) $\frac{1}{8}$'

