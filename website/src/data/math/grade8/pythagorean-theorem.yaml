title: 勾股定理
titleEn: Pythagorean Theorem
chapter: 7
subject: math
grade: grade8
semester: semester2
estimatedTime: 第1课时 约60分钟 · 第2课时 约55分钟 · 第3课时 约55分钟
estimatedTimeEn: Session 1 ~60 min · Session 2 ~55 min · Session 3 ~55 min
targetAudience: 小学3年级自学生（已完成八年级上册数学），自学材料，由简入深

objectives:
  - 理解<<勾股定理/Pythagorean theorem>>的历史来源，体会数学与文明的联系
  - 掌握<<勾股定理/Pythagorean theorem>>：在<<直角三角形/right triangle>>中，$a^{2} + b^{2} = c^{2}$（两直角边平方和等于斜边平方）
  - 能利用勾股定理求直角三角形的未知边长，包括隐含直角三角形的问题
  - 掌握<<勾股定理/Pythagorean theorem>>的逆定理，判断一个三角形是否为直角三角形
  - 认识常见<<勾股数/Pythagorean triple>>，了解勾股数的生成规律
  - 掌握 $45°$-$45°$-$90°$ 和 $30°$-$60°$-$90°$ 两种特殊直角三角形的边长比
objectivesEn:
  - Understand the historical origins of the <<勾股定理/Pythagorean theorem>> and appreciate the connection between mathematics and civilisation
  - 'Master the <<勾股定理/Pythagorean theorem>>: in a <<直角三角形/right triangle>>, $a^{2} + b^{2} = c^{2}$ (the sum of the squares of the two legs equals the square of the hypotenuse)'
  - Use the theorem to find unknown side lengths, including problems with hidden right triangles
  - Master the converse of the <<勾股定理/Pythagorean theorem>> to determine whether a triangle is a right triangle
  - Recognise common <<勾股数/Pythagorean triple>>s and understand how they are generated
  - 'Master the side-length ratios of the two special right triangles: $45°$-$45°$-$90°$ and $30°$-$60°$-$90°$'

prerequisites:
  title: 从小学出发——勾股定理需要的基础知识
  titleEn: Building on Prior Knowledge — What You Need for the Pythagorean Theorem
  intro: |
    勾股定理是初中数学中最重要的定理之一，也是历史上被证明次数最多的定理。
    在学习它之前，先确认你已经掌握了下面这些基础知识：
  introEn: |
    The Pythagorean theorem is one of the most important theorems in middle-school mathematics, and historically the most-proved theorem of all time.
    Before we begin, make sure you are comfortable with the following foundations:
  knownNumbers:
    - '正方形面积公式：边长为 $a$ 的正方形面积 $= a^{2}$'
    - '整式乘法与平方公式（八上）：$(a+b)^{2} = a^{2} + 2ab + b^{2}$'
    - '实数与开方（七下）：$\sqrt{9} = 3$，$\sqrt{2} \approx 1.414$'
    - '三角形的概念（八上）：三角形三边关系、直角三角形的定义'
    - '平面几何：直角的概念，$90°$ 角'
  knownNumbersEn:
    - 'Area of a square: a square with side $a$ has area $a^{2}$'
    - 'Polynomial multiplication and square formulas (Grade 8 Semester 1): $(a+b)^{2} = a^{2} + 2ab + b^{2}$'
    - 'Real numbers and square roots (Grade 7 Semester 2): $\sqrt{9} = 3$, $\sqrt{2} \approx 1.414$'
    - 'Triangle concepts (Grade 8 Semester 1): triangle inequality, definition of right triangle'
    - 'Plane geometry: the concept of a right angle, $90°$'
  canSolve:
    - '计算 $3^{2} + 4^{2}$ 和 $5^{2}$，比较大小'
    - '化简 $\sqrt{50}$ 和 $\sqrt{12}$'
    - '用面积公式计算边长为 $5$ cm 的正方形面积'
  canSolveEn:
    - 'Compute $3^{2} + 4^{2}$ and $5^{2}$, and compare them'
    - 'Simplify $\sqrt{50}$ and $\sqrt{12}$'
    - 'Use the area formula to find the area of a square with side $5$ cm'
  cannotSolve:
    - '直角三角形两直角边为 $3$ 和 $4$，<<斜边/hypotenuse>>是多少？'
    - '三边为 $5$、$12$、$13$ 的三角形是直角三角形吗？'
    - '边长为 $1$ 的正方形，对角线是多少？（$\sqrt{2}$ 是怎么来的？）'
  cannotSolveEn:
    - 'A right triangle has legs $3$ and $4$. What is the <<斜边/hypotenuse>>?'
    - 'Is a triangle with sides $5$, $12$, $13$ a right triangle?'
    - 'What is the diagonal of a unit square? (Where does $\sqrt{2}$ come from?)'
  conclusion: |
    这章将回答以上所有问题。你会发现：**一条简单的等式 $a^{2} + b^{2} = c^{2}$，串联了几何与代数，也贯穿了几千年的数学历史。**
  conclusionEn: |
    This chapter answers all of the above. You will discover that **one simple equation, $a^{2} + b^{2} = c^{2}$, bridges geometry and algebra — and spans thousands of years of mathematical history.**

concepts:
  - id: pythagorean-theorem-discovery
    title: '<<勾股定理/Pythagorean theorem>>的发现——从特例到普遍'
    titleEn: 'Discovering the <<勾股定理/Pythagorean theorem>> — from Special Cases to General Truth'
    hasVisualization: true
    content: |
      **数学史中最古老的定理之一**

      早在 2500 年前，不同文明分别独立发现了这条规律：

      **中国（《周髀算经》）：** 商高（约公元前 1100 年）与周公对话中提到"勾三、股四、弦五"——
      直角三角形中，短直角边（勾）为 $3$，长直角边（股）为 $4$，斜边（弦）为 $5$：
      $$3^{2} + 4^{2} = 9 + 16 = 25 = 5^{2}$$
      中国传统把短边叫"<<勾/shorter leg>>"，长边叫"<<股/longer leg>>"，斜边叫"<<弦/hypotenuse>>"。

      **古埃及：** 埃及工匠用一根打了 $12$ 个等距结的绳子，围成 $3$-$4$-$5$ 的直角三角形，帮助建造神庙和金字塔的直角。

      **古希腊（毕达哥拉斯，约公元前 570–495 年）：** 毕达哥拉斯学派给出了第一个严格证明，因此西方把这条定理叫作"Pythagorean theorem"（毕达哥拉斯定理）。

      **从特例到普遍：**
      我们从 $3$-$4$-$5$ 这个特例出发，验证一下是否一般成立：
      - $5$-$12$-$13$：$25 + 144 = 169 = 13^{2}$ ✓
      - $8$-$15$-$17$：$64 + 225 = 289 = 17^{2}$ ✓
      - 任意直角三角形中，两直角边 $a$、$b$ 和斜边 $c$ 是否总满足 $a^{2} + b^{2} = c^{2}$？

      答案是**肯定的**，这就是<<勾股定理/Pythagorean theorem>>。

      **赵爽弦图（直观感受为什么成立）：**
      把 $4$ 个完全相同的直角三角形（两直角边分别为 $a$、$b$，斜边为 $c$）拼成一个大正方形：
      - 大正方形边长 $= a + b$，面积 $= (a+b)^{2}$
      - 中间剩下一个小正方形，边长 $= c$，面积 $= c^{2}$
      - $4$ 个三角形总面积 $= 4 \times \frac{1}{2}ab = 2ab$
      因此：$c^{2} = (a+b)^{2} - 2ab = a^{2} + 2ab + b^{2} - 2ab = a^{2} + b^{2}$ ✓

      **一句话记忆：** 直角三角形两条直角边各自"长大"成正方形，这两个正方形的面积之和，恰好等于斜边"长大"成的那个正方形的面积。
    contentEn: |
      **One of the oldest theorems in the history of mathematics**

      Over 2,500 years ago, different civilisations independently discovered this relationship:

      **China (Zhou Bi Suan Jing):** Shang Gao (c. 1100 BCE) described the "3-4-5" right triangle in a dialogue with Duke Zhou:
      $$3^{2} + 4^{2} = 9 + 16 = 25 = 5^{2}$$
      In the Chinese tradition, the short leg is called "<<勾/shorter leg>>", the long leg "<<股/longer leg>>", and the hypotenuse "<<弦/hypotenuse>>".

      **Ancient Egypt:** Egyptian craftsmen used a rope with 12 equally spaced knots to form a 3-4-5 right triangle, helping them construct right angles for temples and pyramids.

      **Ancient Greece (Pythagoras, c. 570–495 BCE):** The Pythagorean school provided the first rigorous proof. In the West this theorem is therefore called the "Pythagorean theorem."

      **From special cases to a general truth:**
      Starting from the 3-4-5 example, let's check other cases:
      - $5$-$12$-$13$: $25 + 144 = 169 = 13^{2}$ ✓
      - $8$-$15$-$17$: $64 + 225 = 289 = 17^{2}$ ✓
      - Does $a^{2} + b^{2} = c^{2}$ always hold for any right triangle with legs $a$, $b$ and hypotenuse $c$?

      The answer is **yes** — this is the <<勾股定理/Pythagorean theorem>>.

      **Zhao Shuang's diagram (a visual feel for why it works):**
      Arrange 4 identical right triangles (legs $a$, $b$; hypotenuse $c$) to form a large square:
      - Large square: side $= a + b$, area $= (a+b)^{2}$
      - Inner square left over: side $= c$, area $= c^{2}$
      - Total area of 4 triangles $= 4 \times \frac{1}{2}ab = 2ab$
      Therefore: $c^{2} = (a+b)^{2} - 2ab = a^{2} + 2ab + b^{2} - 2ab = a^{2} + b^{2}$ ✓

      **One-sentence memory aid:** Each leg of a right triangle "grows" into a square; the areas of the two leg-squares add up to exactly the area of the hypotenuse-square.
    examples:
      - '验证 $3$-$4$-$5$：$3^{2} + 4^{2} = 9 + 16 = 25 = 5^{2}$ ✓'
      - '验证 $5$-$12$-$13$：$5^{2} + 12^{2} = 25 + 144 = 169 = 13^{2}$ ✓'
      - '验证 $1$-$1$-$\sqrt{2}$：$1^{2} + 1^{2} = 2 = (\sqrt{2})^{2}$ ✓（等腰直角三角形）'
    examplesEn:
      - 'Verify 3-4-5: $3^{2} + 4^{2} = 9 + 16 = 25 = 5^{2}$ ✓'
      - 'Verify 5-12-13: $5^{2} + 12^{2} = 25 + 144 = 169 = 13^{2}$ ✓'
      - 'Verify 1-1-$\sqrt{2}$: $1^{2} + 1^{2} = 2 = (\sqrt{2})^{2}$ ✓ (isosceles right triangle)'
    notes:
      - '"勾股定理"是中文名，来自中国古代的"勾""股""弦"命名体系'
      - '西方叫"毕达哥拉斯定理"，中国古代早于毕达哥拉斯独立发现了这一规律'
      - '赵爽弦图不仅漂亮，而且是一个严格的代数-几何证明'
    notesEn:
      - '"Gou-gu theorem" is the Chinese name, from the ancient Chinese naming system of gou (shorter leg), gu (longer leg), xian (hypotenuse)'
      - 'The West calls it the Pythagorean theorem; ancient China independently discovered it before Pythagoras'
      - "Zhao Shuang's diagram is not just beautiful — it constitutes a rigorous algebraic-geometric proof"

  - id: pythagorean-theorem-statement
    title: '<<勾股定理/Pythagorean theorem>>的正式表述与证明'
    titleEn: 'Formal Statement and Proof of the <<勾股定理/Pythagorean theorem>>'
    hasVisualization: true
    content: |
      **正式定理：**
      在<<直角三角形/right triangle>> $ABC$ 中，$\angle C = 90°$，$\angle C$ 所对的边为<<斜边/hypotenuse>> $c$（即 $AB$），两条直角边分别为 $a = BC$（$\angle A$ 的对边）和 $b = AC$（$\angle B$ 的对边），则：
      $$a^{2} + b^{2} = c^{2}$$

      **用文字表述：** <<直角三角形/right triangle>>两<<直角边/legs>>的平方和等于<<斜边/hypotenuse>>的平方。

      **面积法证明（赵爽弦图的代数化）：**

      取 $4$ 个完全相同的直角三角形（直角边 $a$、$b$，斜边 $c$），拼成一个大正方形。

      步骤：
      1. 大正方形的边长为 $a + b$，面积为 $(a+b)^{2} = a^{2} + 2ab + b^{2}$
      2. 中间空出的小正方形边长为 $c$（可验证四个角均为直角），面积为 $c^{2}$
      3. $4$ 个三角形的总面积为 $4 \times \frac{1}{2}ab = 2ab$
      4. 由面积关系：大正方形 $=$ 小正方形 $+$ $4$ 个三角形
         $$(a+b)^{2} = c^{2} + 2ab$$
         $$a^{2} + 2ab + b^{2} = c^{2} + 2ab$$
         $$\boxed{a^{2} + b^{2} = c^{2}}$$

      **另一种证明（两个正方形拼图法）：**
      在一个边长为 $(a+b)$ 的大正方形中，以不同方式填入两个小正方形和 $4$ 个三角形：
      - 方法一：边长 $a$ 的正方形 $+$ 边长 $b$ 的正方形 $+$ $4$ 个三角形
        面积 $= a^{2} + b^{2} + 2ab$
      - 方法二：边长 $c$ 的正方形 $+$ $4$ 个三角形
        面积 $= c^{2} + 2ab$
      两种方法面积相等，所以 $a^{2} + b^{2} = c^{2}$ ✓

      **定理告诉我们什么：**
      知道直角三角形的**任意两条边**，就能求出**第三条边**：
      - 已知两直角边 $a$、$b$，求斜边：$c = \sqrt{a^{2} + b^{2}}$
      - 已知斜边 $c$ 和一条直角边 $a$，求另一直角边：$b = \sqrt{c^{2} - a^{2}}$
    contentEn: |
      **Formal theorem:**
      In right triangle $ABC$ with $\angle C = 90°$, let the hypotenuse be $c = AB$ (opposite $\angle C$), and the two legs be $a = BC$ (opposite $\angle A$) and $b = AC$ (opposite $\angle B$). Then:
      $$a^{2} + b^{2} = c^{2}$$

      **In words:** In a <<直角三角形/right triangle>>, the sum of the squares of the two <<直角边/legs>> equals the square of the <<斜边/hypotenuse>>.

      **Area proof (algebraic version of Zhao Shuang's diagram):**

      Take 4 identical right triangles (legs $a$, $b$; hypotenuse $c$) and arrange them to form a large square.

      Steps:
      1. The large square has side $a + b$ and area $(a+b)^{2} = a^{2} + 2ab + b^{2}$
      2. The inner square has side $c$ (you can verify all four angles are right angles) and area $c^{2}$
      3. Total area of 4 triangles $= 4 \times \frac{1}{2}ab = 2ab$
      4. By the area relationship: large square $=$ inner square $+$ 4 triangles
         $$(a+b)^{2} = c^{2} + 2ab$$
         $$a^{2} + 2ab + b^{2} = c^{2} + 2ab$$
         $$\boxed{a^{2} + b^{2} = c^{2}}$$

      **Another proof (two-squares jigsaw):**
      Inside a large square of side $(a+b)$, fill the space in two different ways using two small squares and 4 triangles:
      - Way 1: square of side $a$ + square of side $b$ + 4 triangles → area $= a^{2} + b^{2} + 2ab$
      - Way 2: square of side $c$ + 4 triangles → area $= c^{2} + 2ab$
      Equal areas, so $a^{2} + b^{2} = c^{2}$ ✓

      **What the theorem gives us:**
      Given any **two sides** of a right triangle, we can find the **third**:
      - Given legs $a$ and $b$, find hypotenuse: $c = \sqrt{a^{2} + b^{2}}$
      - Given hypotenuse $c$ and one leg $a$, find the other leg: $b = \sqrt{c^{2} - a^{2}}$
    examples:
      - '两直角边 $a = 3$，$b = 4$：斜边 $c = \sqrt{3^{2} + 4^{2}} = \sqrt{25} = 5$'
      - '斜边 $c = 10$，一直角边 $a = 6$：另一直角边 $b = \sqrt{10^{2} - 6^{2}} = \sqrt{64} = 8$'
      - '两直角边均为 $1$：斜边 $c = \sqrt{1^{2} + 1^{2}} = \sqrt{2}$（无理数！）'
    examplesEn:
      - 'Legs $a = 3$, $b = 4$: hypotenuse $c = \sqrt{3^{2} + 4^{2}} = \sqrt{25} = 5$'
      - 'Hypotenuse $c = 10$, one leg $a = 6$: other leg $b = \sqrt{10^{2} - 6^{2}} = \sqrt{64} = 8$'
      - 'Both legs equal $1$: hypotenuse $c = \sqrt{1^{2} + 1^{2}} = \sqrt{2}$ (an irrational number!)'
    notes:
      - '斜边是直角所对的边，也是三角形中最长的边'
      - '开方结果不一定是整数，要化简根式'
      - '必须先确认是直角三角形，才能使用这条公式'
    notesEn:
      - 'The hypotenuse is opposite the right angle and is always the longest side'
      - 'The square root may not be an integer — simplify the radical form'
      - 'You must first confirm the triangle is a right triangle before applying this formula'

  - id: pythagorean-applications
    title: '<<勾股定理/Pythagorean theorem>>的应用——发现隐藏的直角三角形'
    titleEn: 'Applications of the <<勾股定理/Pythagorean theorem>> — Finding Hidden Right Triangles'
    hasVisualization: true
    content: |
      **最关键的技能：在各种问题中找到直角三角形**

      勾股定理的应用核心，是"**寻找直角**"：只要问题中存在直角三角形（哪怕是隐藏的），就能用 $a^{2} + b^{2} = c^{2}$ 解决。

      **常见的隐藏直角三角形场景：**

      **场景 1：长方形的对角线**
      长方形长 $l$、宽 $w$，对角线 $d$：
      $$d = \sqrt{l^{2} + w^{2}}$$
      因为对角线将长方形分成两个直角三角形。

      **场景 2：等腰三角形的高**
      等腰三角形的顶角高将底边平分，从顶点到底边中点的线段是直角三角形的直角边。
      若腰长 $=$ $a$，底边 $=$ $2b$，则高 $h = \sqrt{a^{2} - b^{2}}$。

      **场景 3：梯子问题**
      梯子长 $l$，梯脚距墙 $d$，梯顶距地高 $h$：
      $$h = \sqrt{l^{2} - d^{2}}$$
      梯子、地面、墙壁构成直角三角形。

      **场景 4：坐标系中两点距离**
      点 $A(x_{1}, y_{1})$ 和点 $B(x_{2}, y_{2})$，水平距离 $= |x_{2} - x_{1}|$，竖直距离 $= |y_{2} - y_{1}|$：
      $$AB = \sqrt{(x_{2}-x_{1})^{2} + (y_{2}-y_{1})^{2}}$$
      这实际上是对角线公式的坐标版本。

      **场景 5：圆中的勾股关系**
      圆的半径 $r$，弦长的一半 $m$，圆心到弦的距离 $d$：
      $$r^{2} = m^{2} + d^{2}$$
      圆心到弦的连线垂直平分弦，形成直角三角形。

      **解题策略：**
      1. 画图：把题目中的几何关系画出来
      2. 找直角：找到 $90°$ 角在哪里
      3. 标清三边：弄清楚哪两边已知，哪边未知
      4. 代入公式：$a^{2} + b^{2} = c^{2}$，解方程
      5. 验证合理性：答案是否为正数，是否比斜边短（直角边）
    contentEn: |
      **The key skill: identifying right triangles in various problems**

      The core of applying the Pythagorean theorem is "**finding the right angle**": whenever a right triangle exists in a problem (even hidden), you can use $a^{2} + b^{2} = c^{2}$.

      **Common hidden right triangle scenarios:**

      **Scenario 1: Diagonal of a rectangle**
      Rectangle with length $l$ and width $w$, diagonal $d$:
      $$d = \sqrt{l^{2} + w^{2}}$$
      The diagonal divides the rectangle into two right triangles.

      **Scenario 2: Height of an isosceles triangle**
      The altitude from the apex of an isosceles triangle bisects the base, creating two right triangles.
      If the equal sides have length $a$ and the base is $2b$, then the height $h = \sqrt{a^{2} - b^{2}}$.

      **Scenario 3: Ladder problem**
      Ladder length $l$, foot of ladder distance $d$ from wall, height reached $h$:
      $$h = \sqrt{l^{2} - d^{2}}$$
      The ladder, ground, and wall form a right triangle.

      **Scenario 4: Distance between two points on a coordinate grid**
      Points $A(x_{1}, y_{1})$ and $B(x_{2}, y_{2})$, horizontal distance $= |x_{2} - x_{1}|$, vertical distance $= |y_{2} - y_{1}|$:
      $$AB = \sqrt{(x_{2}-x_{1})^{2} + (y_{2}-y_{1})^{2}}$$
      This is the coordinate version of the diagonal formula.

      **Scenario 5: Chord in a circle**
      Circle radius $r$, half-chord length $m$, distance from centre to chord $d$:
      $$r^{2} = m^{2} + d^{2}$$
      The line from the centre perpendicular to the chord bisects it, forming a right triangle.

      **Problem-solving strategy:**
      1. Draw a diagram showing the geometric relationships
      2. Find the right angle — locate where the $90°$ angle is
      3. Label the three sides clearly: which two are known, which is unknown
      4. Substitute into $a^{2} + b^{2} = c^{2}$ and solve
      5. Verify the answer is positive and, for a leg, shorter than the hypotenuse
    examples:
      - '长方形长 $6$、宽 $8$，对角线 $= \sqrt{6^{2} + 8^{2}} = \sqrt{100} = 10$'
      - '等腰三角形腰长 $5$，底边 $6$，高 $h = \sqrt{5^{2} - 3^{2}} = \sqrt{16} = 4$'
      - '梯子长 $13$ m，脚距墙 $5$ m，梯顶高 $= \sqrt{13^{2} - 5^{2}} = \sqrt{144} = 12$ m'
      - '点 $A(1, 1)$ 到点 $B(4, 5)$ 的距离 $= \sqrt{(4-1)^{2} + (5-1)^{2}} = \sqrt{9+16} = 5$'
    examplesEn:
      - 'Rectangle with length $6$ and width $8$: diagonal $= \sqrt{6^{2} + 8^{2}} = \sqrt{100} = 10$'
      - 'Isosceles triangle with equal sides $5$ and base $6$: height $h = \sqrt{5^{2} - 3^{2}} = \sqrt{16} = 4$'
      - 'Ladder $13$ m long, foot $5$ m from wall: height reached $= \sqrt{13^{2} - 5^{2}} = \sqrt{144} = 12$ m'
      - 'Distance from $A(1,1)$ to $B(4,5)$: $\sqrt{(4-1)^{2} + (5-1)^{2}} = \sqrt{9+16} = 5$'
    notes:
      - '一定先画图，把"隐含"的直角三角形画出来'
      - '求直角边时，用 $\sqrt{c^{2} - a^{2}}$；求斜边时，用 $\sqrt{a^{2} + b^{2}}$'
      - '结果如果是无理数（如 $\sqrt{7}$），保留根式形式，不要强行化成小数'
    notesEn:
      - 'Always draw a diagram to make the hidden right triangle visible'
      - 'Finding a leg: use $\sqrt{c^{2} - a^{2}}$; finding the hypotenuse: use $\sqrt{a^{2} + b^{2}}$'
      - 'If the result is irrational (e.g. $\sqrt{7}$), leave it in radical form rather than approximating as a decimal'

  - id: converse-theorem
    title: '<<勾股定理/Pythagorean theorem>>的逆定理——判断直角三角形'
    titleEn: 'Converse of the <<勾股定理/Pythagorean theorem>> — Identifying Right Triangles'
    hasVisualization: true
    content: |
      **逆定理的表述：**
      若三角形三边长为 $a$、$b$、$c$，且满足 $a^{2} + b^{2} = c^{2}$（其中 $c$ 是**最长边**），则该三角形是<<直角三角形/right triangle>>，且直角在 $c$ 的对面。

      **关键注意：** 必须用**最长边**作为 $c$！

      **易错陷阱：** 三边为 $(3, 4, 5)$，如果你错误地计算 $3^{2} + 5^{2} = 9 + 25 = 34 \neq 4^{2} = 16$，就会得出"不是直角三角形"的错误结论。必须用最长边 $5$ 作为 $c$！

      **三角形的分类判断：**

      设三角形三边满足 $a \leq b \leq c$（$c$ 是最长边），则：
      - $a^{2} + b^{2} = c^{2}$ → <<直角三角形/right triangle>>（直角在 $c$ 对面）
      - $a^{2} + b^{2} > c^{2}$ → <<锐角三角形/acute triangle>>（三个角都是锐角）
      - $a^{2} + b^{2} < c^{2}$ → <<钝角三角形/obtuse triangle>>（有一个钝角，在 $c$ 对面）

      **直觉理解：**
      - 如果斜边"够长"（$c^{2} = a^{2} + b^{2}$），正好是直角三角形
      - 如果斜边"太长"（$c^{2} > a^{2} + b^{2}$），角度被"撑大"了，变成钝角三角形
      - 如果斜边"不够长"（$c^{2} < a^{2} + b^{2}$），三个角都"缩小"了，变成锐角三角形

      **使用逆定理的步骤：**
      1. 先验证三边能组成三角形（三边关系：任意两边之和大于第三边）
      2. 找出最长边 $c$
      3. 计算 $a^{2} + b^{2}$ 与 $c^{2}$ 的大小关系
      4. 得出结论

      **例题验证：**
      - $(5, 12, 13)$：最长边 $13$，$5^{2} + 12^{2} = 25 + 144 = 169 = 13^{2}$ → **直角三角形** ✓
      - $(5, 6, 7)$：最长边 $7$，$5^{2} + 6^{2} = 25 + 36 = 61 > 49 = 7^{2}$ → **锐角三角形**
      - $(4, 5, 8)$：最长边 $8$，$4^{2} + 5^{2} = 16 + 25 = 41 < 64 = 8^{2}$ → **钝角三角形**
      - $(2, 3, 6)$：$2 + 3 = 5 < 6$，**不能组成三角形**（先用三边关系判断！）
    contentEn: |
      **Statement of the converse:**
      If a triangle has sides $a$, $b$, $c$ satisfying $a^{2} + b^{2} = c^{2}$ (where $c$ is the **longest side**), then the triangle is a <<直角三角形/right triangle>> with the right angle opposite $c$.

      **Critical note:** You must use the **longest side** as $c$!

      **Common trap:** For sides $(3, 4, 5)$, if you mistakenly compute $3^{2} + 5^{2} = 9 + 25 = 34 \neq 4^{2} = 16$, you would wrongly conclude it is not a right triangle. Always use the longest side $5$ as $c$!

      **Classifying triangles:**

      Let sides satisfy $a \leq b \leq c$ (so $c$ is the longest). Then:
      - $a^{2} + b^{2} = c^{2}$ → <<直角三角形/right triangle>> (right angle opposite $c$)
      - $a^{2} + b^{2} > c^{2}$ → <<锐角三角形/acute triangle>> (all angles acute)
      - $a^{2} + b^{2} < c^{2}$ → <<钝角三角形/obtuse triangle>> (one obtuse angle, opposite $c$)

      **Intuition:**
      - If the longest side is exactly "long enough" ($c^{2} = a^{2} + b^{2}$), the triangle is a right triangle
      - If the longest side is "too long" ($c^{2} > a^{2} + b^{2}$), the opposite angle is "stretched open" — obtuse triangle
      - If the longest side is "not long enough" ($c^{2} < a^{2} + b^{2}$), all angles "compress" — acute triangle

      **Steps for using the converse:**
      1. First verify the three sides can form a triangle (triangle inequality: any two sides sum to more than the third)
      2. Identify the longest side $c$
      3. Compute and compare $a^{2} + b^{2}$ with $c^{2}$
      4. State your conclusion

      **Verification examples:**
      - $(5, 12, 13)$: longest side $13$; $5^{2} + 12^{2} = 169 = 13^{2}$ → **right triangle** ✓
      - $(5, 6, 7)$: longest side $7$; $5^{2} + 6^{2} = 61 > 49 = 7^{2}$ → **acute triangle**
      - $(4, 5, 8)$: longest side $8$; $4^{2} + 5^{2} = 41 < 64 = 8^{2}$ → **obtuse triangle**
      - $(2, 3, 6)$: $2 + 3 = 5 < 6$ → **cannot form a triangle** (check triangle inequality first!)
    examples:
      - '$(8, 15, 17)$：$8^{2} + 15^{2} = 64 + 225 = 289 = 17^{2}$ → 直角三角形'
      - '$(3, 4, 6)$：$3^{2} + 4^{2} = 25 < 36 = 6^{2}$ → 钝角三角形'
      - '$(6, 7, 8)$：$6^{2} + 7^{2} = 85 > 64 = 8^{2}$ → 锐角三角形'
    examplesEn:
      - '$(8, 15, 17)$: $8^{2} + 15^{2} = 64 + 225 = 289 = 17^{2}$ → right triangle'
      - '$(3, 4, 6)$: $3^{2} + 4^{2} = 25 < 36 = 6^{2}$ → obtuse triangle'
      - '$(6, 7, 8)$: $6^{2} + 7^{2} = 85 > 64 = 8^{2}$ → acute triangle'
    notes:
      - '【重要】一定先检查三边是否能组成三角形，再判断类型'
      - '用逆定理时，$c$ 必须是最长边，不能随意选取'
      - '$a^{2} + b^{2}$ 与 $c^{2}$ 只差"一点"时，可能是锐角或钝角——不要猜，要精确计算'
    notesEn:
      - '[Important] Always check the triangle inequality first before classifying the triangle type'
      - 'When applying the converse, $c$ must be the longest side — do not choose arbitrarily'
      - 'When $a^{2} + b^{2}$ and $c^{2}$ are close, the triangle may be either acute or obtuse — do not guess; compute precisely'

  - id: pythagorean-triples
    title: '<<勾股数/Pythagorean triple>>——直角三角形的整数边'
    titleEn: '<<勾股数/Pythagorean triple>>s — Integer Sides of Right Triangles'
    hasVisualization: true
    content: |
      **定义：**
      若正整数 $a$、$b$、$c$ 满足 $a^{2} + b^{2} = c^{2}$，则称 $(a, b, c)$ 为一组<<勾股数/Pythagorean triple>>。

      **为什么勾股数重要？**
      并非所有直角三角形的三边都是整数（比如等腰直角三角形的斜边是 $\sqrt{2}$）。
      勾股数给我们带来了"整数边长的直角三角形"，在建筑、测量、计算中特别方便。

      **常见勾股数组（必须记住前三组）：**

      | 勾 $a$ | 股 $b$ | 弦 $c$ | 验证 |
      |--------|--------|--------|------|
      | 3 | 4 | 5 | $9 + 16 = 25$ ✓ |
      | 5 | 12 | 13 | $25 + 144 = 169$ ✓ |
      | 8 | 15 | 17 | $64 + 225 = 289$ ✓ |
      | 7 | 24 | 25 | $49 + 576 = 625$ ✓ |

      **扩展性质：**
      若 $(a, b, c)$ 是勾股数，则 $(ka, kb, kc)$（$k$ 为正整数）也是勾股数。
      - $(3, 4, 5)$ → $(6, 8, 10)$，$(9, 12, 15)$，$(15, 20, 25)$...
      - $(5, 12, 13)$ → $(10, 24, 26)$...
      这是因为：$(ka)^{2} + (kb)^{2} = k^{2}a^{2} + k^{2}b^{2} = k^{2}(a^{2}+b^{2}) = k^{2}c^{2} = (kc)^{2}$

      **勾股数的生成公式（选学）：**
      取正整数 $m > n > 0$，令：
      $$a = m^{2} - n^{2},\quad b = 2mn,\quad c = m^{2} + n^{2}$$
      则 $(a, b, c)$ 是一组勾股数。

      验证：
      $$a^{2} + b^{2} = (m^{2}-n^{2})^{2} + (2mn)^{2}$$
      $$= m^{4} - 2m^{2}n^{2} + n^{4} + 4m^{2}n^{2}$$
      $$= m^{4} + 2m^{2}n^{2} + n^{4} = (m^{2}+n^{2})^{2} = c^{2}\ ✓$$

      用 $m=2, n=1$：$a = 3$，$b = 4$，$c = 5$（经典 $3$-$4$-$5$！）
      用 $m=3, n=2$：$a = 5$，$b = 12$，$c = 13$ ✓
      用 $m=4, n=1$：$a = 15$，$b = 8$，$c = 17$ ✓

      **快速判断技巧：**
      看到"$6$、$8$、$10$"，认出是 $(3,4,5)$ 乘以 $2$，立即确认是直角三角形，不必重新计算。
    contentEn: |
      **Definition:**
      If positive integers $a$, $b$, $c$ satisfy $a^{2} + b^{2} = c^{2}$, then $(a, b, c)$ is called a <<勾股数/Pythagorean triple>>.

      **Why do Pythagorean triples matter?**
      Not every right triangle has integer sides (the isosceles right triangle has hypotenuse $\sqrt{2}$, for example).
      Pythagorean triples give us right triangles with integer side lengths, which are especially convenient in construction, surveying, and computation.

      **Common Pythagorean triples (memorise the first three):**

      | $a$ | $b$ | $c$ | Verification |
      |-----|-----|-----|--------------|
      | 3 | 4 | 5 | $9 + 16 = 25$ ✓ |
      | 5 | 12 | 13 | $25 + 144 = 169$ ✓ |
      | 8 | 15 | 17 | $64 + 225 = 289$ ✓ |
      | 7 | 24 | 25 | $49 + 576 = 625$ ✓ |

      **Scaling property:**
      If $(a, b, c)$ is a Pythagorean triple, so is $(ka, kb, kc)$ for any positive integer $k$.
      - $(3, 4, 5)$ → $(6, 8, 10)$, $(9, 12, 15)$, $(15, 20, 25)$...
      - $(5, 12, 13)$ → $(10, 24, 26)$...
      Proof: $(ka)^{2} + (kb)^{2} = k^{2}(a^{2}+b^{2}) = k^{2}c^{2} = (kc)^{2}$ ✓

      **Generation formula (optional enrichment):**
      For positive integers $m > n > 0$, let:
      $$a = m^{2} - n^{2},\quad b = 2mn,\quad c = m^{2} + n^{2}$$
      Then $(a, b, c)$ is a Pythagorean triple.

      Verification:
      $$a^{2} + b^{2} = (m^{2}-n^{2})^{2} + (2mn)^{2} = m^{4} + 2m^{2}n^{2} + n^{4} = (m^{2}+n^{2})^{2} = c^{2}\ ✓$$

      With $m=2, n=1$: $a=3$, $b=4$, $c=5$ (the classic triple!)
      With $m=3, n=2$: $a=5$, $b=12$, $c=13$ ✓
      With $m=4, n=1$: $a=15$, $b=8$, $c=17$ ✓

      **Quick recognition tip:**
      When you see "6, 8, 10", recognise it as $(3,4,5)$ multiplied by $2$ and immediately confirm it is a right triangle — no recalculation needed.
    examples:
      - '$(6, 8, 10)$ 是勾股数吗？是，$= 2 \times (3, 4, 5)$，验证 $36 + 64 = 100 = 10^{2}$ ✓'
      - '$(9, 40, 41)$？$81 + 1600 = 1681 = 41^{2}$ ✓，是勾股数'
      - '$(10, 24, 26)$？$= 2 \times (5, 12, 13)$ ✓'
    examplesEn:
      - 'Is $(6, 8, 10)$ a Pythagorean triple? Yes, $= 2 \times (3,4,5)$; verify: $36 + 64 = 100 = 10^{2}$ ✓'
      - 'Is $(9, 40, 41)$ a triple? $81 + 1600 = 1681 = 41^{2}$ ✓ — yes'
      - 'Is $(10, 24, 26)$ a triple? $= 2 \times (5, 12, 13)$ ✓'
    notes:
      - '勾股数中的三个数必须是正整数；$(\sqrt{3}, 1, 2)$ 不是勾股数（含无理数）'
      - '遇到大数，先试着分解：两条边的公因数往往能帮你找到对应的基本勾股数'
      - '勾股数有无穷多组，不需要全部记忆，但前三组非常重要'
    notesEn:
      - 'The three numbers in a Pythagorean triple must be positive integers; $(\sqrt{3}, 1, 2)$ is not a triple (it contains an irrational number)'
      - 'For large numbers, try factoring first: a common factor of two sides often reveals the underlying primitive triple'
      - 'There are infinitely many Pythagorean triples; you do not need to memorise them all, but the first three are very important'

  - id: special-right-triangles
    title: 两种特殊直角三角形——边长比的秘密
    titleEn: Two Special Right Triangles — the Secret of Their Side Ratios
    hasVisualization: true
    content: |
      **为什么需要特殊直角三角形？**
      许多几何计算中反复出现两种特殊的直角三角形。记住它们的边长比，可以大大加快解题速度。

      ---

      **类型 1：等腰直角三角形（$45°$-$45°$-$90°$）**

      两直角边相等，设每条直角边长为 $a$，则：
      $$\text{斜边} = \sqrt{a^{2} + a^{2}} = \sqrt{2a^{2}} = a\sqrt{2}$$

      **边长比：** $a : a : a\sqrt{2}$，化简为 $1 : 1 : \sqrt{2}$

      **反推（已知斜边求直角边）：**
      若斜边 $= c$，则直角边 $= \frac{c}{\sqrt{2}} = \frac{c\sqrt{2}}{2}$

      **典型应用：**
      - 正方形的对角线 $= $ 边长 $\times \sqrt{2}$（对角线将正方形分成两个等腰直角三角形）
      - 边长为 $a$ 的正方形，对角线 $= a\sqrt{2}$

      **记忆口诀：** 等腰直角，斜边多乘 $\sqrt{2}$

      ---

      **类型 2：半等边三角形（$30°$-$60°$-$90°$）**

      来源：将等边三角形从顶点作高，把等边三角形分成两个全等的 $30°$-$60°$-$90°$ 直角三角形。

      若等边三角形的边长为 $2a$，则：
      - 高（较长直角边，对 $60°$）$= \sqrt{(2a)^{2} - a^{2}} = \sqrt{4a^{2} - a^{2}} = \sqrt{3a^{2}} = a\sqrt{3}$
      - 短直角边（对 $30°$）$= a$（等边三角形边长的一半）
      - 斜边（对 $90°$）$= 2a$

      **边长比：** $a : a\sqrt{3} : 2a$，化简为 $1 : \sqrt{3} : 2$

      **记忆：** 短边（对 $30°$）是 $1$，长直角边（对 $60°$）是 $\sqrt{3}$，斜边（对 $90°$）是 $2$

      **反推：**
      - 已知短直角边（对 $30°$）$= a$：长直角边 $= a\sqrt{3}$，斜边 $= 2a$
      - 已知斜边 $= c$：短直角边 $= \frac{c}{2}$，长直角边 $= \frac{c\sqrt{3}}{2}$
      - 已知长直角边（对 $60°$）$= b$：短直角边 $= \frac{b}{\sqrt{3}} = \frac{b\sqrt{3}}{3}$，斜边 $= \frac{2b\sqrt{3}}{3}$

      **记忆口诀：** 三十六十九十，边长比 $1:\sqrt{3}:2$，短边翻倍得斜边

      ---

      **综合对比：**

      | 三角形类型 | 角度 | 边长比 |
      |-----------|------|--------|
      | 等腰直角 | $45°$-$45°$-$90°$ | $1 : 1 : \sqrt{2}$ |
      | 半等边 | $30°$-$60°$-$90°$ | $1 : \sqrt{3} : 2$ |
    contentEn: |
      **Why do we need special right triangles?**
      Two particular right triangles appear repeatedly in geometry calculations. Memorising their side ratios greatly speeds up problem-solving.

      ---

      **Type 1: Isosceles right triangle ($45°$-$45°$-$90°$)**

      Both legs are equal. Let each leg have length $a$:
      $$\text{hypotenuse} = \sqrt{a^{2} + a^{2}} = \sqrt{2a^{2}} = a\sqrt{2}$$

      **Side ratio:** $a : a : a\sqrt{2}$, simplified to $1 : 1 : \sqrt{2}$

      **Reverse (given hypotenuse, find leg):**
      If hypotenuse $= c$, then each leg $= \frac{c}{\sqrt{2}} = \frac{c\sqrt{2}}{2}$

      **Typical application:**
      - Diagonal of a square $=$ side length $\times \sqrt{2}$ (the diagonal splits the square into two isosceles right triangles)
      - A square with side $a$ has diagonal $a\sqrt{2}$

      **Memory tip:** Isosceles right triangle — multiply the leg by $\sqrt{2}$ to get the hypotenuse.

      ---

      **Type 2: Half-equilateral triangle ($30°$-$60°$-$90°$)**

      Origin: drop the altitude from a vertex of an equilateral triangle; this splits it into two congruent $30°$-$60°$-$90°$ right triangles.

      If the equilateral triangle has side $2a$:
      - Altitude (longer leg, opposite $60°$) $= \sqrt{(2a)^{2} - a^{2}} = a\sqrt{3}$
      - Short leg (opposite $30°$) $= a$ (half the equilateral triangle's side)
      - Hypotenuse (opposite $90°$) $= 2a$

      **Side ratio:** $a : a\sqrt{3} : 2a$, simplified to $1 : \sqrt{3} : 2$

      **Memory:** short leg (opposite $30°$) is $1$; long leg (opposite $60°$) is $\sqrt{3}$; hypotenuse (opposite $90°$) is $2$

      **Reverse:**
      - Given short leg (opposite $30°$) $= a$: long leg $= a\sqrt{3}$, hypotenuse $= 2a$
      - Given hypotenuse $= c$: short leg $= \frac{c}{2}$, long leg $= \frac{c\sqrt{3}}{2}$
      - Given long leg (opposite $60°$) $= b$: short leg $= \frac{b\sqrt{3}}{3}$, hypotenuse $= \frac{2b\sqrt{3}}{3}$

      **Memory rhyme:** 30-60-90, ratio $1:\sqrt{3}:2$; double the short leg to get the hypotenuse.

      ---

      **Comparison:**

      | Triangle type | Angles | Side ratio |
      |---------------|--------|------------|
      | Isosceles right | $45°$-$45°$-$90°$ | $1 : 1 : \sqrt{2}$ |
      | Half-equilateral | $30°$-$60°$-$90°$ | $1 : \sqrt{3} : 2$ |
    examples:
      - '等腰直角三角形直角边为 $5$，斜边 $= 5\sqrt{2} \approx 7.07$'
      - '$30°$-$60°$-$90°$ 中短边（对 $30°$）$= 4$，长直角边 $= 4\sqrt{3}$，斜边 $= 8$'
      - '正方形边长为 $6$，对角线 $= 6\sqrt{2}$'
      - '等边三角形边长为 $10$，高 $= 5\sqrt{3} \approx 8.66$'
    examplesEn:
      - 'Isosceles right triangle with leg $5$: hypotenuse $= 5\sqrt{2} \approx 7.07$'
      - '$30°$-$60°$-$90°$ with short leg (opposite $30°$) $= 4$: long leg $= 4\sqrt{3}$, hypotenuse $= 8$'
      - 'Square with side $6$: diagonal $= 6\sqrt{2}$'
      - 'Equilateral triangle with side $10$: height $= 5\sqrt{3} \approx 8.66$'
    notes:
      - '这两种三角形的边长比必须熟记，在考试中能节省大量计算时间'
      - '注意区分：$\sqrt{2}$ 用于等腰直角三角形，$\sqrt{3}$ 用于半等边三角形'
      - '已知斜边求直角边时：等腰直角三角形除以 $\sqrt{2}$（即乘以 $\frac{\sqrt{2}}{2}$）；半等边三角形短边除以 $2$'
    notesEn:
      - 'Memorise the side ratios of both triangles — in tests this saves a great deal of computation'
      - 'Key distinction: use $\sqrt{2}$ for the isosceles right triangle; use $\sqrt{3}$ for the half-equilateral triangle'
      - 'Finding a leg from the hypotenuse: for isosceles right, divide by $\sqrt{2}$ (i.e. multiply by $\frac{\sqrt{2}}{2}$); for half-equilateral, the short leg equals half the hypotenuse'

