        一个圆的半径为 6，圆心角为 $120°$ 的<<扇形/sector>>面积是多少？
      questionEn: |
        A circle has radius 6. What is the area of a <<扇形/sector>> with central angle $120°$?
      choices:
        - label: A
          content: '$6\pi$'
        - label: B
          content: '$12\pi$'
        - label: C
          content: '$18\pi$'
