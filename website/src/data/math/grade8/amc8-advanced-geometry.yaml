          content: '$(5, 7)$'
      correctValue: B
      answer: '(B) $(4, 6)$'
      answerEn: '(B) $(4, 6)$'
      explanation: |
        中点公式：$M = \left(\frac{1+7}{2}, \frac{2+10}{2}\right) = \left(\frac{8}{2}, \frac{12}{2}\right) = \mathbf{(4, 6)}$。
      explanationEn: |
        Midpoint formula: $M = \left(\frac{1+7}{2}, \frac{2+10}{2}\right) = \mathbf{(4,6)}$.

