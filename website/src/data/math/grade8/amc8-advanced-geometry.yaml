          content: '$36\pi$'
      correctValue: B
      answer: '(B) $12\pi$'
      answerEn: '(B) $12\pi$'
      explanation: |
        扇形面积 $= \frac{120}{360} \times \pi \times 6^{2} = \frac{1}{3} \times 36\pi = \mathbf{12\pi}$。
      explanationEn: |
        Sector area $= \frac{120}{360}\times\pi\times36 = \frac{1}{3}\times36\pi = \mathbf{12\pi}$.

    - number: 11
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 圆与扇形
      question: |
        一个边长为 $10$ 的正方形内切一个圆（圆的直径等于正方形的边长）。正方形中圆以外的阴影区域面积是多少？
      questionEn: |
        A circle is inscribed in a square of side 10 (the circle's diameter equals the square's side). What is the area of the shaded region inside the square but outside the circle?
      choices:
        - label: A
          content: '$100 - 20\pi$'
        - label: B
          content: '$100 - 25\pi$'
        - label: C
          content: '$100 - 50\pi$'
        - label: D
          content: '$25\pi - 100$'
        - label: E
          content: '$50\pi - 100$'
      correctValue: B
      answer: '(B) $100 - 25\pi$'
      answerEn: '(B) $100 - 25\pi$'
      explanation: |
        正方形面积 $= 10^{2} = 100$。
        内切圆半径 $= \frac{10}{2} = 5$，圆面积 $= \pi \times 5^{2} = 25\pi$。
        阴影面积 $= 100 - 25\pi \approx 100 - 78.5 = 21.5$。
      explanationEn: |
        Square area $= 100$. Inscribed circle radius $= 5$, area $= 25\pi$.
        Shaded area $= 100 - 25\pi \approx 21.5$.

    - number: 12
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 圆与扇形
      question: |
        两个同心圆的半径分别为 $3$ 和 $7$。<<环形/annulus>>（两圆之间的区域）的面积是多少？
      questionEn: |
        Two concentric circles have radii 3 and 7. What is the area of the <<环形/annulus>> (the region between the two circles)?
      choices:
        - label: A
          content: '$16\pi$'
        - label: B
          content: '$30\pi$'
        - label: C
          content: '$40\pi$'
        - label: D
          content: '$49\pi$'
        - label: E
          content: '$58\pi$'
      correctValue: C
      answer: '(C) $40\pi$'
      answerEn: '(C) $40\pi$'
      explanation: |
        环形面积 $= \pi \times 7^{2} - \pi \times 3^{2} = 49\pi - 9\pi = \mathbf{40\pi}$。
        技巧：$\pi(R^{2} - r^{2}) = \pi(7+3)(7-3) = \pi \times 10 \times 4 = 40\pi$。
      explanationEn: |
        Annulus area $= 49\pi - 9\pi = \mathbf{40\pi}$.
        Shortcut: $\pi(7+3)(7-3) = 40\pi$.

