    - number: 9
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 几何变换
      question: |
        正六边形绕中心旋转，在 $0°$ 到 $360°$ 之间（不含 $0°$ 和 $360°$），有几个角度能使它与自身重合？
      questionEn: |
        How many rotation angles strictly between $0°$ and $360°$ map a regular hexagon onto itself?
      choices:
        - label: A
          content: '3'
        - label: B
          content: '4'
        - label: C
          content: '5'
        - label: D
          content: '6'
        - label: E
          content: '12'
      correctValue: C
      answer: '(C) 5'
      answerEn: '(C) 5'
      explanation: |
        正六边形旋转 $60°$、$120°$、$180°$、$240°$、$300°$ 后都与自身重合。
        共 $\mathbf{5}$ 个（不算 $360°$ = 不旋转）。

        💡 **另一种方法——逐个角度验证：**
        正六边形有 6 个顶点。把 $360°$ 分成 6 等份，每份 $60°$。
        逐个试：旋转 $60°$ → 每个顶点移到下一个位置，重合 ✓。$120°$ → 跳两个 ✓。$180°$ → 对面 ✓。$240°$ ✓。$300°$ ✓。$30°$ → 不重合 ✗。
        结论：只有 $60°$ 的倍数才行，共 5 个（$60°, 120°, 180°, 240°, 300°$）。
      explanationEn: |
        A regular hexagon maps to itself under rotations of $60°$, $120°$, $180°$, $240°$, $300°$.
        That's $\mathbf{5}$ rotational symmetries (excluding $360°$ = identity).

        💡 **Alternative — Test Each Angle:**
        A regular hexagon has 6 vertices. Divide $360°$ into 6 equal parts of $60°$ each.
        Try each: $60°$ → each vertex moves to the next, overlap ✓. $120°$ → skip two ✓. $180°$ → opposite ✓. $240°$ ✓. $300°$ ✓. $30°$ → no overlap ✗.
        Only multiples of $60°$ work: 5 angles ($60°, 120°, 180°, 240°, 300°$).

