  scaffold:
    - title: '铺垫：拆分 L 形'
      titleEn: 'Warm-up: Splitting an L-Shape'
      question: '一个 L 形由 $6 \times 2$ 和 $3 \times 4$ 两个矩形拼成（无重叠）。总面积是多少？'
      questionEn: 'An L-shape is made of a $6 \times 2$ and a $3 \times 4$ rectangle (no overlap). What is the total area?'
      hint: '分别算两个矩形面积再相加'
      hintEn: 'Compute each rectangle area, then add'
      answer: '$6 \times 2 + 3 \times 4 = 12 + 12 = 24$'
      answerEn: '$6 \times 2 + 3 \times 4 = 12 + 12 = 24$'
    - title: '铺垫：减法法求阴影'
      titleEn: 'Warm-up: Subtraction Method for Shaded Area'
      question: '一个 $8 \times 8$ 的正方形中间挖去一个 $3 \times 3$ 的正方形。阴影面积是多少？'
      questionEn: 'An $8 \times 8$ square has a $3 \times 3$ square removed from its center. What is the shaded area?'
      hint: '大正方形面积 - 小正方形面积'
      hintEn: 'Large square area - small square area'
      answer: '$64 - 9 = 55$'
      answerEn: '$64 - 9 = 55$'
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 复合图形面积
      question: |
        一个 L 形区域由两个矩形组成：一个 $8 \times 3$ 的矩形和一个 $5 \times 4$ 的矩形（它们共享一条边，不重叠）。这个 L 形的面积是多少？
      questionEn: |
        An L-shaped region is made of two rectangles: an $8 \times 3$ rectangle and a $5 \times 4$ rectangle (sharing one side, no overlap). What is the area of the L-shape?
      choices:
        - label: A
          content: '40'
        - label: B
          content: '42'
        - label: C
          content: '44'
        - label: D
          content: '46'
        - label: E
          content: '52'
      correctValue: C
      answer: '(C) 44'
      answerEn: '(C) 44'
      explanation: |
        加法法：$S = 8 \times 3 + 5 \times 4 = 24 + 20 = \mathbf{44}$。
      explanationEn: |
        Addition method: $S = 8\times3 + 5\times4 = 24+20 = \mathbf{44}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 复合图形面积
      question: |
        一个 $10 \times 10$ 的正方形中间挖去一个 $4 \times 6$ 的矩形。剩余阴影部分的面积是多少？
      questionEn: |
        A $10 \times 10$ square has a $4 \times 6$ rectangle removed from its interior. What is the area of the remaining shaded region?
      choices:
        - label: A
          content: '64'
        - label: B
          content: '72'
        - label: C
          content: '76'
        - label: D
          content: '84'
        - label: E
          content: '96'
      correctValue: C
      answer: '(C) 76'
      answerEn: '(C) 76'
      explanation: |
        减法法：$S = 10^{2} - 4 \times 6 = 100 - 24 = \mathbf{76}$。
      explanationEn: |
        Subtraction method: $S = 10^{2} - 4\times6 = 100-24 = \mathbf{76}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 复合图形面积
      question: |
        两个正方形重叠，大正方形边长 $8$，小正方形边长 $5$，重叠区域是一个 $3 \times 3$ 的正方形。两个正方形所覆盖的总面积（含重叠部分只算一次）是多少？
      questionEn: |
        Two squares overlap. The larger has side 8, the smaller has side 5, and their overlap is a $3 \times 3$ square. What is the total area covered by the two squares (counting the overlap only once)?
      choices:
        - label: A
          content: '80'
        - label: B
          content: '81'
        - label: C
          content: '85'
        - label: D
          content: '89'
        - label: E
          content: '98'
      correctValue: A
      answer: '(A) 80'
      answerEn: '(A) 80'
      explanation: |
        容斥原理：$S = S_{\text{大}} + S_{\text{小}} - S_{\text{重叠}} = 64 + 25 - 9 = \mathbf{80}$。

        💡 **另一种方法——画图分区域：**
        把图形分成三个不重叠的区域：大正方形独有部分 $= 64-9=55$，小正方形独有部分 $= 25-9=16$，重叠部分 $= 9$。
        总覆盖面积 $= 55+16+9 = 80$。画一张维恩图就能直观看出来！
      explanationEn: |
        Inclusion–exclusion: $S = 64 + 25 - 9 = \mathbf{80}$.

        💡 **Alternative — Region Diagram:**
        Divide into three non-overlapping regions: large square only $= 64-9=55$, small square only $= 25-9=16$, overlap $= 9$.
        Total $= 55+16+9=80$. Drawing a Venn diagram makes this visual and intuitive!

    - number: 4
      type: 单选题
      inputType: mc
      source: "AMC 8 2024 #11"
      section: 坐标几何
      question: |
        $\triangle ABC$ 的顶点坐标为 $A(5, 7)$、$B(11, 7)$、$C(3, y)$，其中 $y > 7$。$\triangle ABC$ 的面积为 12。求 $y$ 的值。

        (A) 8 &emsp; (B) 9 &emsp; (C) 10 &emsp; (D) 11 &emsp; (E) 12
      questionEn: |
        The coordinates of $\triangle ABC$ are $A(5,7)$, $B(11,7)$, and $C(3,y)$, with $y > 7$. The area of $\triangle ABC$ is 12. What is the value of $y$?

        (A) 8 &emsp; (B) 9 &emsp; (C) 10 &emsp; (D) 11 &emsp; (E) 12
      choices:
        - label: A
          content: '8'
        - label: B
          content: '9'
        - label: C
          content: '10'
        - label: D
          content: '11'
        - label: E
          content: '12'
      correctValue: D
      answer: '(D) 11'
      answerEn: '(D) 11'
      explanation: |
        $A$ 和 $B$ 的 $y$ 坐标都是 7，所以 $AB$ 是水平底边，底 $= |11-5| = 6$。
        高 $= y - 7$（因为 $y > 7$）。
        $\frac{1}{2} \times 6 \times (y-7) = 12$，$3(y-7) = 12$，$y - 7 = 4$，$y = \mathbf{11}$。
      explanationEn: |
        $A$ and $B$ share $y=7$, so base $AB = |11-5|=6$.
        Height $= y-7$. $\frac{1}{2}\times6\times(y-7)=12$, so $y-7=4$, $y = \mathbf{11}$.

    - number: 5
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 坐标几何
      question: |
        四边形的顶点为 $A(0, 0)$、$B(6, 0)$、$C(8, 5)$、$D(2, 5)$。用<<鞋带公式/Shoelace formula>>求面积。
      questionEn: |
        A quadrilateral has vertices $A(0,0)$, $B(6,0)$, $C(8,5)$, $D(2,5)$. Find its area using the <<鞋带公式/Shoelace formula>>.
      choices:
        - label: A
          content: '25'
        - label: B
          content: '30'
        - label: C
          content: '35'
        - label: D
          content: '40'
        - label: E
          content: '48'
      correctValue: B
      answer: '(B) 30'
      answerEn: '(B) 30'
      explanation: |
        鞋带公式：
        $S = \frac{1}{2}|x_{1}y_{2} - x_{2}y_{1} + x_{2}y_{3} - x_{3}y_{2} + x_{3}y_{4} - x_{4}y_{3} + x_{4}y_{1} - x_{1}y_{4}|$
        $= \frac{1}{2}|0 \cdot 0 - 6 \cdot 0 + 6 \cdot 5 - 8 \cdot 0 + 8 \cdot 5 - 2 \cdot 5 + 2 \cdot 0 - 0 \cdot 5|$
        $= \frac{1}{2}|0 - 0 + 30 - 0 + 40 - 10 + 0 - 0| = \frac{1}{2} \times 60 = \mathbf{30}$。

        验证：这是一个梯形，上底 $CD = |8-2| = 6$，下底 $AB = 6$，高 $= 5$。
        等等——上底和下底相等，这是平行四边形！面积 $= 6 \times 5 = 30$ ✓
      explanationEn: |
        Shoelace formula:
        $S = \frac{1}{2}|0-0+30-0+40-10+0-0| = \frac{1}{2}\times60 = \mathbf{30}$.
        Verify: this is a parallelogram (both horizontal sides have length 6), area $= 6\times5 = 30$ ✓

