examPrep:
  intro: 以下为竞赛风格综合题，难度略高于练习题，考查复合图形、坐标几何、变换和圆面积的灵活综合运用。
  introEn: The following are contest-style questions at a slightly higher level, testing flexible and combined use of composite figures, coordinate geometry, transformations, and circle area.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #4"
      section: 综合
      question: |
        四边形 $ABCD$ 是一个菱形，周长为 52 米。对角线 $\overline{AC}$ 长 24 米。菱形 $ABCD$ 的面积是多少平方米？

        (A) 60 &emsp; (B) 90 &emsp; (C) 105 &emsp; (D) 120 &emsp; (E) 144
      questionEn: |
        Quadrilateral $ABCD$ is a rhombus with perimeter 52 meters. The length of diagonal $\overline{AC}$ is 24 meters. What is the area in square meters of rhombus $ABCD$?

        (A) 60 &emsp; (B) 90 &emsp; (C) 105 &emsp; (D) 120 &emsp; (E) 144
      choices:
        - label: A
          content: '60'
        - label: B
          content: '90'
        - label: C
          content: '105'
        - label: D
          content: '120'
        - label: E
          content: '144'
      correctValue: D
      answer: '(D) 120'
      answerEn: '(D) 120'
      explanation: |
        边长 $= 52 \div 4 = 13$。半对角线 $= 12$。
        勾股定理求另一半对角线：$\sqrt{13^{2} - 12^{2}} = 5$。$BD = 10$。
        面积 $= \frac{1}{2} \times 24 \times 10 = \mathbf{120}$。
      explanationEn: |
        Side $= 13$. Half-diagonal $= 12$. Other half-diagonal $= \sqrt{169-144}=5$. $BD=10$.
        Area $= \frac{1}{2}\times24\times10 = \mathbf{120}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        在一个半径为 $10$ 的半圆上，以直径为底边放置一个内接矩形 $ABCD$（$AB$ 在直径上）。如果 $AB = 16$，求矩形 $ABCD$ 的面积。
      questionEn: |
        A rectangle $ABCD$ is inscribed in a semicircle of radius 10, with side $AB$ on the diameter. If $AB = 16$, what is the area of rectangle $ABCD$?
      choices:
        - label: A
          content: '80'
        - label: B
          content: '96'
        - label: C
          content: '100'
        - label: D
          content: '120'
        - label: E
          content: '160'
      correctValue: B
      answer: '(B) 96'
      answerEn: '(B) 96'
      explanation: |
        半圆圆心在 $AB$ 的中点，半径 $= 10$。$AB$ 的中点到 $A$（或 $B$）的距离 $= 8$。
        矩形的高 $= C$ 到直径的距离。$C$ 在半圆上，到圆心距离 $= 10$，水平距离 $= 8$。
        高 $= \sqrt{10^{2} - 8^{2}} = \sqrt{36} = 6$。
        面积 $= 16 \times 6 = \mathbf{96}$。
      explanationEn: |
        Center of semicircle is the midpoint of $AB$, radius $=10$. Distance from center to $A$ or $B$ is $8$.
        Height of rectangle = distance from $C$ (on semicircle) to diameter.
        $\sqrt{10^{2}-8^{2}} = 6$. Area $= 16\times6 = \mathbf{96}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: 竞赛风格题（改编自同心圆涂色问题）
      section: 综合
      question: |
        三个同心圆的半径分别为 $1$、$2$、$3$。最小圆涂为白色，中间环形涂为灰色，最外环形涂为白色。现在在最外环形中，将一个圆心角为 $\theta$ 的扇形区域也涂为灰色。涂色后灰色区域总面积等于白色区域总面积。求 $\theta$ 的值。

        (A) $108°$ &emsp; (B) $120°$ &emsp; (C) $135°$ &emsp; (D) $144°$ &emsp; (E) $150°$
      questionEn: |
        Three concentric circles have radii 1, 2, and 3. The innermost disk is white, the middle annulus is gray, and the outer annulus is white. In the outer annulus, a sector of central angle $\theta$ is also shaded gray. After this shading, the total gray area equals the total white area. Find $\theta$.

        (A) $108°$ &emsp; (B) $120°$ &emsp; (C) $135°$ &emsp; (D) $144°$ &emsp; (E) $150°$
      choices:
        - label: A
          content: '$108°$'
        - label: B
          content: '$120°$'
        - label: C
          content: '$135°$'
        - label: D
          content: '$144°$'
        - label: E
          content: '$150°$'
      correctValue: A
      answer: '(A) $108°$'
      answerEn: '(A) $108°$'
      explanation: |
        总面积 $= \pi \times 3^{2} = 9\pi$。灰色 = 白色意味着各占 $\frac{9\pi}{2} = 4.5\pi$。

        各区域面积：
        - 最小圆（白色）：$\pi \times 1^{2} = \pi$
        - 中间环（灰色）：$\pi \times 2^{2} - \pi = 3\pi$
        - 最外环（白色）：$\pi \times 3^{2} - \pi \times 2^{2} = 5\pi$

        原来灰色面积 $= 3\pi$，需要增加到 $4.5\pi$，还差 $1.5\pi$。

        在外环中，一个圆心角为 $\theta$ 的扇形被涂灰。该扇形面积为 $\frac{\theta}{360} \times 5\pi$。

        令 $\frac{\theta}{360} \times 5\pi = 1.5\pi$，解得 $\frac{5\theta}{360} = 1.5$，$\theta = \frac{1.5 \times 360}{5} = \mathbf{108°}$。
      explanationEn: |
        Total area $= 9\pi$. Gray = white means each is $\frac{9\pi}{2} = 4.5\pi$.

        Region areas: inner disk (white, $\pi$), middle annulus (gray, $3\pi$), outer annulus (white, $5\pi$).
        Original gray $= 3\pi$, need $4.5\pi$, so $1.5\pi$ more gray is needed.

        The sector in the outer annulus has area $\frac{\theta}{360}\times5\pi$.
        Set $\frac{5\theta}{360} = 1.5$, so $\theta = \frac{1.5\times360}{5} = \mathbf{108°}$.

    - number: 4
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        等边三角形 $ABC$ 的边长为 $6$。在三角形内部，以每个顶点为圆心、$2$ 为半径画弧（弧在三角形内部，即 $60°$ 的扇形）。三角形内未被任何弧覆盖的区域面积是多少？
      questionEn: |
        Equilateral triangle $ABC$ has side length 6. Inside the triangle, arcs of radius 2 are drawn centered at each vertex (each arc is a $60°$ sector inside the triangle). What is the area of the region inside the triangle not covered by any arc?
      choices:
        - label: A
          content: '$9\sqrt{3} - \pi$'
        - label: B
          content: '$9\sqrt{3} - 2\pi$'
        - label: C
          content: '$9\sqrt{3} - 3\pi$'
        - label: D
          content: '$9\sqrt{3} - 4\pi$'
        - label: E
          content: '$18\sqrt{3} - 2\pi$'
      correctValue: B
      answer: '(B) $9\sqrt{3} - 2\pi$'
      answerEn: '(B) $9\sqrt{3} - 2\pi$'
      explanation: |
        等边三角形面积 $= \frac{\sqrt{3}}{4} \times 6^{2} = 9\sqrt{3}$。

        每个顶点处的扇形圆心角 $= 60°$（等边三角形内角），半径 $= 2$。
        每个扇形面积 $= \frac{60}{360} \times \pi \times 2^{2} = \frac{1}{6} \times 4\pi = \frac{2\pi}{3}$。
        三个扇形面积之和 $= 3 \times \frac{2\pi}{3} = 2\pi$。

        因为半径 $2 < 3$（到对边中点的距离），三个扇形不重叠。
        未覆盖面积 $= 9\sqrt{3} - 2\pi$。
      explanationEn: |
        Triangle area $= \frac{\sqrt{3}}{4}\times36 = 9\sqrt{3}$.
        Each vertex sector: angle $60°$, radius $2$, area $= \frac{1}{6}\times4\pi = \frac{2\pi}{3}$.
        Three sectors: $3\times\frac{2\pi}{3} = 2\pi$. Since $2 < 3$ (apothem), no overlap.
        Uncovered area $= 9\sqrt{3} - 2\pi$.

    - number: 5
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        坐标平面上，正方形 $ABCD$ 的顶点为 $A(0, 0)$、$B(8, 0)$、$C(8, 8)$、$D(0, 8)$。点 $E$ 是 $BC$ 的中点，点 $F$ 是 $CD$ 的中点。三角形 $AEF$ 的面积是多少？
      questionEn: |
        In the coordinate plane, square $ABCD$ has vertices $A(0,0)$, $B(8,0)$, $C(8,8)$, $D(0,8)$. Point $E$ is the midpoint of $BC$ and $F$ is the midpoint of $CD$. What is the area of triangle $AEF$?
      choices:
        - label: A
          content: '20'
        - label: B
          content: '24'
        - label: C
          content: '28'
        - label: D
          content: '32'
        - label: E
          content: '36'
      correctValue: B
      answer: '(B) 24'
      answerEn: '(B) 24'
      explanation: |
        $E$ 是 $BC$ 中点：$E = (8, 4)$。$F$ 是 $CD$ 中点：$F = (4, 8)$。

        鞋带公式：$A(0,0)$、$E(8,4)$、$F(4,8)$。
        $S = \frac{1}{2}|0(4-8) + 8(8-0) + 4(0-4)|$
        $= \frac{1}{2}|0 + 64 - 16| = \frac{1}{2} \times 48 = \mathbf{24}$。

        另解（减法法）：$S_{AEF} = S_{\text{正方形}} - S_{\triangle ABE} - S_{\triangle ADF} - S_{\triangle ECF}$
        $= 64 - \frac{1}{2}(8)(4) - \frac{1}{2}(8)(4) - \frac{1}{2}(4)(4) = 64 - 16 - 16 - 8 = 24$ ✓
      explanationEn: |
        $E = (8,4)$, $F = (4,8)$.
        Shoelace: $S = \frac{1}{2}|0(4-8)+8(8-0)+4(0-4)| = \frac{1}{2}|0+64-16| = 24$.
        Alt (subtraction): $64 - 16 - 16 - 8 = \mathbf{24}$ ✓
