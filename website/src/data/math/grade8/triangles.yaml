title: 三角形
titleEn: Triangles
chapter: 1
subject: math
grade: grade8
semester: semester1
estimatedTime: 第1课时 约55分钟 · 第2课时 约55分钟 · 第3课时 约55分钟
estimatedTimeEn: Session 1 ~55 min · Session 2 ~55 min · Session 3 ~55 min
targetAudience: 小学3年级自学生（已完成七年级数学），自学材料，由简入深

objectives:
  - 掌握<<三角形/triangle>>的<<三边关系/triangle inequality>>定理，能判断三条线段能否构成<<三角形/triangle>>
  - 会按边和角对<<三角形/triangle>>进行分类，了解各类<<三角形/triangle>>的特征
  - 了解<<三角形/triangle>>的高、中线、角平分线的概念及其三条交点的位置规律
  - 掌握<<三角形/triangle>>的<<外角/exterior angle>>定理及其推论
  - 能用公式 $(n-2) \times 180°$ 计算<<多边形/polygon>>的<<内角和/sum of interior angles>>
  - 理解任意凸<<多边形/polygon>>的外角和恒等于 $360°$
  - 理解<<三角形/triangle>>的稳定性及其在工程建筑中的应用

objectivesEn:
  - Master the <<三边关系/triangle inequality>> theorem for <<三角形/triangle>>s and determine whether three line segments can form a <<三角形/triangle>>
  - Classify <<三角形/triangle>>s by sides and angles, and understand the features of each type
  - Understand the altitude, median, and angle bisector of a <<三角形/triangle>>, and know where their intersection points lie
  - Master the <<外角/exterior angle>> theorem of a <<三角形/triangle>> and its corollary
  - Use the formula $(n-2) \times 180°$ to compute the <<内角和/sum of interior angles>> of a <<多边形/polygon>>
  - Understand that the sum of exterior angles of any convex <<多边形/polygon>> is always $360°$
  - Understand the rigidity of <<三角形/triangle>>s and its applications in engineering and architecture

prerequisites:
  title: 从七年级出发——已知的几何基础
  titleEn: Building on Grade 7 — geometric foundations already mastered
  intro: |
    七年级我们系统学习了几何图形、角的概念和平行线的性质。进入八年级，几何学习进入新阶段：从认识图形到**推理证明**。
    学习三角形这章之前，先回顾几个关键基础：
  introEn: |
    In Grade 7 we systematically studied geometric figures, the concept of angles, and properties of parallel lines. In Grade 8 geometry moves to a new stage: from recognizing figures to **reasoning and proof**.
    Before studying triangles, let's review a few key foundations:
  knownNumbers:
    - '<<角/angle>>的概念与度量：$\angle ABC$、直角 $90°$、平角 $180°$'
    - '两直线平行时的性质：同位角相等、内错角相等、同旁内角互补'
    - '<<线段/line segment>>的性质：两点之间，线段最短'
    - '小学勾股定理初步：$3$、$4$、$5$ 边长的三角形是直角三角形'
    - '三角形三个角之和等于 $180°$（小学已有直觉）'
  knownNumbersEn:
    - 'Concept and measurement of <<角/angle>>s: $\angle ABC$, right angle $90°$, straight angle $180°$'
    - 'Properties of parallel lines: corresponding angles equal, alternate interior angles equal, co-interior angles supplementary'
    - 'Property of <<线段/line segment>>s: between two points, a line segment is the shortest path'
    - 'Elementary Pythagorean theorem: a triangle with sides $3$, $4$, $5$ is a right triangle'
    - 'The three interior angles of a triangle sum to $180°$ (intuitive knowledge from primary school)'
  canSolve:
    - '识别锐角、直角、钝角'
    - '知道三角形有三条边和三个角'
    - '用量角器量出角的度数'
    - '判断两条直线是否平行，利用平行线求角度'
  canSolveEn:
    - 'Identify acute, right, and obtuse angles'
    - 'Know that a triangle has three sides and three angles'
    - 'Measure angles with a protractor'
    - 'Determine whether two lines are parallel, and use parallel lines to find angles'
  cannotSolve:
    - '三条线段一定能围成三角形吗？什么条件下能围成？'
    - '三角形有哪几种分类，等边三角形和等腰三角形是什么关系？'
    - '三角形的高、中线、角平分线各有什么特点，交点在哪里？'
    - '三角形的外角和内角有什么关系？'
    - '六边形的内角和等于多少度？n 边形呢？'
  cannotSolveEn:
    - 'Can any three line segments always form a triangle? Under what conditions?'
    - 'How are triangles classified, and what is the relationship between equilateral and isosceles triangles?'
    - 'What are the properties of altitudes, medians, and angle bisectors, and where do they intersect?'
    - 'What is the relationship between an exterior angle and the interior angles of a triangle?'
    - 'What is the sum of interior angles of a hexagon? What about an n-gon?'
  conclusion: |
    这一章，我们将把"认识三角形"提升到"理解三角形的深层规律"——学会用逻辑推理解释为什么，而不只是记住结论。
  conclusionEn: |
    In this chapter, we elevate our understanding of triangles from "recognizing them" to "understanding their deep rules" — learning to use logical reasoning to explain *why*, not just memorize conclusions.

concepts:
  - id: triangle-sides
    title: <<三角形/triangle>>的<<三边关系/triangle inequality>>
    titleEn: The <<三边关系/triangle inequality>> of a <<三角形/triangle>>
    hasVisualization: true
    content: |
      **动手探索：吸管实验**

      拿三根吸管（或三根铅笔），分别试试下面三组长度，看哪组能围成三角形：

      - 第一组：$5$ cm、$7$ cm、$10$ cm ——能围成吗？
      - 第二组：$2$ cm、$3$ cm、$6$ cm ——能围成吗？
      - 第三组：$4$ cm、$4$ cm、$4$ cm ——能围成吗？

      动手试试！你会发现：

      第一组**可以**，三根吸管首尾相接，中间留出了空隙，可以弯成一个三角形。
      第二组**不可以**，把 $2$ cm 和 $3$ cm 的吸管拼在一起，总长只有 $5$ cm，还没有第三根的 $6$ cm 长！两短的加起来都不够长，永远碰不到第三根的另一端，三根只能变成一条直线。
      第三组**可以**，三条等长的吸管能围成一个漂亮的等边三角形。

      从这个实验中，我们发现了一个规律——这就是**三边关系定理**！

      **用生活类比理解——走路绕道 vs. 直走**

      想象你站在家（点 $A$），要去学校（点 $C$）。

      有两条路：
      - 直接走：$A \to C$（直线距离，最短！）
      - 绕路走：$A \to$ 公园（点 $B$）$\to C$（先走 $AB$，再走 $BC$）

      绕路一定比直路长！绕路的总距离 $AB + BC$ 永远大于直路 $AC$。

      用数学表达：$AC < AB + BC$，即 $AB + BC > AC$

      这就是"**两点之间，直线最短**"的数学版本，也正是三边关系定理的直觉来源！

      三角形的三个顶点就是三个"地点"，每条边就是两地之间的直线距离。
      从 $A$ 到 $C$ 可以直走，也可以经过 $B$ 绕路——绕路（$a + c$ 或 $b + c$）一定比直走（某一边）更长。

      **正式定理**

      三角形任意两边之和大于第三边：
      $$a + b > c \quad a + c > b \quad b + c > a$$

      三个不等式要**同时成立**！

      **为什么等号不行？**

      如果 $a + b = c$，三根木棒首尾相接之后，$A$、$B$、$C$ 三个端点会排在同一条直线上，根本围不成三角形，面积为零。这叫做**三点共线**，不算三角形！

      **快速判断的技巧（三步法）**

      判断三条线段能不能构成三角形，不用验证三个不等式，只需三步：

      第一步：找出三条边中**最长的那条**（设为 $c$）。
      第二步：把**另外两条边加起来**（$a + b$）。
      第三步：看 $a + b$ 和 $c$ 谁更大：
      - 如果 $a + b > c$，能构成三角形 ✓
      - 如果 $a + b \leq c$，不能构成三角形 ✗

      为什么只验证这一个就够了？
      设 $a \leq b \leq c$（$c$ 最大），只要 $a + b > c$：
      由于 $c \geq b$，所以 $a + c \geq a + b > b$ ——第二个不等式自动成立。
      由于 $c \geq a$，所以 $b + c \geq b + a > a$ ——第三个不等式自动成立。
      所以只验证最短的两边之和是否大于最长边就足够了。

      **推论：两边之差也有限制**

      三边关系定理还有一个"另一面"的推论：**任意两边之差小于第三边**。

      怎么推导的？很简单：

      我们已经知道 $a + b > c$。

      两边同时减去 $b$：$a > c - b$（也就是 $c - b < a$）……①

      我们也知道 $a + c > b$。

      两边同时减去 $c$：$a > b - c$（也就是 $b - c < a$）……②

      ①说的是：$c - b < a$（$b > c$ 时就是 $b - c > 0$，但依然 $< a$）
      ②说的是：$b - c < a$（$c > b$ 时就是 $c - b > 0$，但依然 $< a$）

      把①②合并，不管 $b$ 和 $c$ 谁大，两种情况写在一起就是：$|b - c| < a$

      这就是推论：**两边之差的绝对值小于第三边**。

      **合并结论**

      对于三角形的边 $a$，有：
      $$|b - c| < a < b + c$$

      左边（$|b - c|$）是 $a$ 的最小约束，右边（$b + c$）是 $a$ 的最大约束。

      记忆口诀：**两边之和大于第三边，两边之差小于第三边**

      **易错提醒**

      - $a + b = c$ 时（等于号），三点共线，**不能**围成三角形！
      - 判断时单位要统一，$3$ cm 和 $30$ mm 不能直接比较（先换算）
      - 等边三角形满足条件（$a + a > a$，即 $2a > a$，当然成立）
    contentEn: |
      **Hands-on discovery: the straw experiment**

      Take three straws (or pencils) and test each set of lengths to see which ones can form a triangle:

      - Set 1: $5$ cm, $7$ cm, $10$ cm — can they form a triangle?
      - Set 2: $2$ cm, $3$ cm, $6$ cm — can they form a triangle?
      - Set 3: $4$ cm, $4$ cm, $4$ cm — can they form a triangle?

      Try it! You'll discover:

      Set 1 **works** — the three straws placed end-to-end leave a gap that can be bent into a triangle.
      Set 2 **does not work** — the $2$ cm and $3$ cm straws together are only $5$ cm, which is shorter than the $6$ cm straw. No matter how you arrange them, the two short straws can't reach the other end of the long straw — they just line up straight.
      Set 3 **works** — three equal-length straws form a perfect equilateral triangle.

      From this experiment we discover a rule — this is the **triangle inequality theorem**!

      **Intuitive understanding — taking a detour vs. going straight**

      Imagine you're at home (point $A$) and need to get to school (point $C$).

      Two routes:
      - Go straight: $A \to C$ (shortest possible distance!)
      - Take a detour: $A \to$ park (point $B$) $\to C$ (first walk $AB$, then $BC$)

      The detour is always longer than the direct route! The total detour distance $AB + BC$ is always greater than $AC$.

      In math: $AC < AB + BC$, which means $AB + BC > AC$

      This is the mathematical version of **"the straight line between two points is the shortest path"** — and it is the intuitive heart of the triangle inequality!

      The three vertices of a triangle are like three "locations," and each side is the straight-line distance between two of them. Going from $A$ to $C$ directly is always shorter than going via $B$.

      **The formal theorem**

      In any triangle, the sum of any two sides is greater than the third side:
      $$a + b > c \quad a + c > b \quad b + c > a$$

      All three inequalities must hold **at the same time**!

      **Why can't equality hold?**

      If $a + b = c$, then when you place the three sticks end-to-end, points $A$, $B$, $C$ all fall on the same straight line — no triangle is formed and the area is zero. This is called **collinear points** — not a triangle!

      **The quick-check technique (three steps)**

      To check whether three segments can form a triangle, you don't need to verify all three inequalities. Just three steps:

      Step 1: Find the **longest side** (call it $c$).
      Step 2: **Add the other two sides** ($a + b$).
      Step 3: Compare $a + b$ with $c$:
      - If $a + b > c$ — can form a triangle ✓
      - If $a + b \leq c$ — cannot form a triangle ✗

      Why is checking just this one inequality enough?
      Let $a \leq b \leq c$ ($c$ is longest). If $a + b > c$:
      Since $c \geq b$, we get $a + c \geq a + b > b$ — second inequality holds automatically.
      Since $c \geq a$, we get $b + c \geq b + a > a$ — third inequality holds automatically.
      So checking only the two shortest sides against the longest is sufficient.

      **Corollary: the difference of two sides is also limited**

      The triangle inequality has a "flip side": **the difference of any two sides is less than the third side**.

      How do we derive this? It's straightforward:

      We already know $a + b > c$.

      Subtract $b$ from both sides: $a > c - b$ (i.e. $c - b < a$) …①

      We also know $a + c > b$.

      Subtract $c$ from both sides: $a > b - c$ (i.e. $b - c < a$) …②

      Statement ① says $c - b < a$. Statement ② says $b - c < a$.
      Combining ① and ②, regardless of whether $b > c$ or $b < c$: $|b - c| < a$

      This is the corollary: **the absolute difference of any two sides is less than the third side**.

      **The combined result**

      For any side $a$ of a triangle:
      $$|b - c| < a < b + c$$

      The left side ($|b - c|$) is the lower bound for $a$; the right side ($b + c$) is the upper bound.

      Memory tip: **sum of two sides > third side; difference of two sides < third side**

      **Common mistakes to avoid**

      - When $a + b = c$ (equality), the three points are collinear — **not** a triangle!
      - Make sure units are consistent — $3$ cm and $30$ mm can't be compared directly (convert first)
      - An equilateral triangle does satisfy the condition: $a + a > a$ means $2a > a$, which is always true
    examples:
      - '三条线段 $5$ cm、$7$ cm、$11$ cm 能否构成三角形？找最长边：$11$ cm，两短边之和：$5 + 7 = 12 > 11$ ✓，**能**构成三角形'
      - '三条线段 $2$ cm、$3$ cm、$6$ cm 能否构成三角形？找最长边：$6$ cm，两短边之和：$2 + 3 = 5 < 6$ ✗，**不能**构成三角形（两短边加起来都不够长）'
      - '三条线段 $4$ cm、$4$ cm、$8$ cm 能否构成三角形？找最长边：$8$ cm，两短边之和：$4 + 4 = 8$，等于最长边而不是大于！**不能**构成三角形（三点共线）'
      - '三条线段 $6$ cm、$8$ cm、$10$ cm 能否构成三角形？找最长边：$10$ cm，两短边之和：$6 + 8 = 14 > 10$ ✓，能构成（这还是一个直角三角形！$6^2 + 8^2 = 100 = 10^2$）'
    examplesEn:
      - 'Can $5$ cm, $7$ cm, $11$ cm form a triangle? Longest side: $11$ cm. Sum of shorter two: $5 + 7 = 12 > 11$ ✓ — **yes**, they can form a triangle'
      - 'Can $2$ cm, $3$ cm, $6$ cm form a triangle? Longest side: $6$ cm. Sum of shorter two: $2 + 3 = 5 < 6$ ✗ — **no** (the two short sides combined are not long enough)'
      - 'Can $4$ cm, $4$ cm, $8$ cm form a triangle? Longest side: $8$ cm. Sum of shorter two: $4 + 4 = 8$ — equals the longest, not greater! **No** (the three points are collinear)'
      - 'Can $6$ cm, $8$ cm, $10$ cm form a triangle? Longest side: $10$ cm. Sum of shorter two: $6 + 8 = 14 > 10$ ✓ — yes (this is also a right triangle! $6^2 + 8^2 = 100 = 10^2$)'

  - id: triangle-classification
    title: <<三角形/triangle>>的分类
    titleEn: Classification of <<三角形/triangle>>s
    hasVisualization: true
    content: |
      三角形看起来各种各样，但它们都可以按照两种标准来分类：**看边长**或**看角度**。就像整理玩具一样，先按颜色分，再按大小分——两种方法都有用！

      **按边长分类——三条边是否相等？**

      | 类型 | 条件 | 记忆方法 |
      |------|------|---------|
      | <<等腰三角形/isosceles triangle>> | 恰好两条边相等（腰 = 腰） | "腰"是两条一样长的腿 |
      | <<等边三角形/equilateral triangle>> | 三条边都相等 | "等边"= 边边都相等 |
      | <<不等边三角形/scalene triangle>> | 三条边互不相等 | 三条边各不相同 |

      **等腰三角形的"家族术语"：**
      在等腰三角形中，各个部分有专用名字——
      - **腰**：两条相等的边（像人的两条腿一样）
      - **底边**：不相等的那条边（像凳子的底部）
      - **顶角**：两腰之间夹着的角（在等腰三角形"顶部"的角）
      - **底角**：腰和底边之间的两个角（两个底角**一定相等**！这是等腰三角形的重要性质）

      **重要包含关系：**
      等边三角形是等腰三角形的**特殊情形**！因为等边三角形的三条边都相等，所以任意两条边也相等，自然也是等腰三角形。
      用集合符号表示：<<等边三角形/equilateral triangle>> $\subset$ <<等腰三角形/isosceles triangle>>

      等边三角形的每个角都是 $60°$（因为三角和为 $180°$，三等分就是 $60°$）。

      **按角度分类——最大角是多少度？**

      | 类型 | 条件 | 生活例子 |
      |------|------|---------|
      | <<锐角三角形/acute triangle>> | 三个角都小于 $90°$ | 正三角形旗帜、山峰形状 |
      | <<直角三角形/right triangle>> | 恰好一个角等于 $90°$ | 直角尺、门框角 |
      | <<钝角三角形/obtuse triangle>> | 恰好一个角大于 $90°$ | "塌下去"的三角形 |

      **为什么直角或钝角最多只有一个？**
      三角形三个角之和 $= 180°$。
      如果已经有一个直角 $90°$，剩下两个角之和只有 $90°$，两个都不可能再达到 $90°$。
      如果已经有一个钝角（比如 $100°$），剩下两个角之和只有 $80°$，都是锐角。
      所以：直角三角形和钝角三角形里，都只有一个"特殊角"！

      **两种分类可以组合！**

      同一个三角形可以同时有两个"标签"。

      | 边的分类 | 角的分类 | 举例 |
      |---------|---------|------|
      | 等腰 | 锐角 | 顶角为 $50°$，两底角各为 $65°$ |
      | 等腰 | 直角 | **等腰直角三角形**：顶角 $90°$，两底角各 $45°$ |
      | 等腰 | 钝角 | 顶角为 $120°$，两底角各为 $30°$ |
      | 等边 | 锐角 | 必然是锐角（三角均 $60°$） |
      | 不等边 | 直角 | $3$-$4$-$5$ 直角三角形 |
    contentEn: |
      Triangles come in many shapes, but they can all be sorted using two criteria: **by side lengths** or **by angles**. Like sorting toys — you might sort by color first, then by size — both ways are useful!

      **Sorting by side lengths — are any sides equal?**

      | Type | Condition | Memory tip |
      |------|-----------|------------|
      | <<等腰三角形/isosceles triangle>> | Exactly two sides equal (leg = leg) | "iso" = equal, "sceles" = legs |
      | <<等边三角形/equilateral triangle>> | All three sides equal | "equi" = equal, "lateral" = sides |
      | <<不等边三角形/scalene triangle>> | All three sides different | All sides are unequal |

      **"Family vocabulary" of an isosceles triangle:**
      - **Legs**: the two equal sides (like two equal-length legs)
      - **Base**: the unequal side (like the bottom of a stool)
      - **Apex angle**: the angle between the two legs (at the "top" of the isosceles triangle)
      - **Base angles**: the two angles between a leg and the base (the two base angles are **always equal** — a key property!)

      **Important inclusion relationship:**
      An equilateral triangle is a **special case** of an isosceles triangle! Since all three sides of an equilateral triangle are equal, any two sides are equal — so it qualifies as isosceles too.
      Using set notation: <<等边三角形/equilateral triangle>> $\subset$ <<等腰三角形/isosceles triangle>>

      Each angle of an equilateral triangle is $60°$ (since $180° \div 3 = 60°$).

      **Sorting by angles — how large is the biggest angle?**

      | Type | Condition | Real-life example |
      |------|-----------|-------------------|
      | <<锐角三角形/acute triangle>> | All three angles less than $90°$ | Triangular flag, mountain peak shape |
      | <<直角三角形/right triangle>> | Exactly one angle equals $90°$ | Set square, door frame corner |
      | <<钝角三角形/obtuse triangle>> | Exactly one angle greater than $90°$ | A "collapsed" triangle that leans to one side |

      **Why can there be at most one right or obtuse angle?**
      The three angles of a triangle sum to $180°$.
      If one angle is already $90°$, the remaining two must sum to $90°$ — neither can reach $90°$ again.
      If one angle is obtuse (say $100°$), the remaining two sum to only $80°$ — both must be acute.
      Conclusion: in right and obtuse triangles there is exactly one "special angle."

      **The two classifications can combine!**

      The same triangle can carry two labels at once.

      | Side type | Angle type | Example |
      |-----------|------------|---------|
      | Isosceles | Acute | Apex angle $50°$, base angles each $65°$ |
      | Isosceles | Right | **Isosceles right triangle**: apex $90°$, base angles each $45°$ |
      | Isosceles | Obtuse | Apex angle $120°$, base angles each $30°$ |
      | Equilateral | Acute | Always acute (all angles $60°$) |
      | Scalene | Right | The $3$-$4$-$5$ right triangle |
    examples:
      - '判断：三角形三边为 $5$ cm、$5$ cm、$8$ cm，属于哪类三角形？两边相等，是**等腰三角形**；顶角约为 $106°$（大于 $90°$），两底角各约 $37°$，所以是**钝角三角形** → 等腰钝角三角形'
      - '等腰直角三角形中，已知两腰各为 $3$ cm，顶角为 $90°$，求两底角。解：两底角相等，之和 $= 180° - 90° = 90°$，所以每个底角 $= 45°$'
      - '等边三角形是等腰三角形吗？是！等边三角形三边都相等，任意两边也相等，所以它是等腰三角形的特殊情形'
      - '一个三角形能有两个钝角吗？不能！两个钝角之和已超过 $180°$，加上第三角总和就超过 $180°$ 了，违反三角和定理'
    examplesEn:
      - 'Classify a triangle with sides $5$ cm, $5$ cm, $8$ cm. Two sides equal → **isosceles**. Checking angles: base angles are each about $37°$, apex angle is about $106°$ → **obtuse**. Final answer: isosceles obtuse triangle'
      - 'In an isosceles right triangle with legs each $3$ cm and apex angle $90°$, find the base angles. The two base angles are equal and sum to $180° - 90° = 90°$, so each base angle $= 45°$'
      - 'Is an equilateral triangle also an isosceles triangle? Yes! Since all three sides are equal, any two sides are equal, so it is a special case of isosceles'
      - 'Can a triangle have two obtuse angles? No! Two obtuse angles already sum to more than $180°$ — adding a third angle would exceed $180°$, violating the angle sum theorem'

  - id: triangle-special-lines
    title: <<三角形/triangle>>的高、中线、角平分线
    titleEn: Altitude, Median, and Angle Bisector of a <<三角形/triangle>>
    hasVisualization: true
    content: |
      三角形有三种"特殊线段"，每种都有不同的画法和含义，也各自有特别有趣的性质。最神奇的是：同一种线段的三条，一定都**交于同一个点**！

      **1. 高（<<高/altitude>>）——垂直落下的线**

      **画法**：从三角形的一个顶点，向它的**对边**（或对边的延长线）画一条**垂直**的线段，这条线段叫做"高"，垂直落下的那个点叫"垂足"。

      想象一下：从三角形的"屋顶"往"地面"垂直掉下一条线，这就是高！

      三角形 $\triangle ABC$ 中，从顶点 $A$ 向 $BC$ 画垂线，垂足是 $D$，那么 $AD$ 就是 $BC$ 边上的高。

      **三条高的交点**叫做**<<垂心/orthocenter>>**（用 $H$ 表示）。
      - 锐角三角形：垂心在三角形**内部**（三条高都在内部相交）
      - 直角三角形：垂心就是**直角顶点**本身！（直角顶点向两腰各作的高，就是两腰本身）
      - 钝角三角形：垂心在三角形**外部**（需要延长对边才能找到垂足）

      **2. 中线（<<中线/median>>）——连接顶点和对边中点的线**

      **画法**：先找到一条边的**中点**（把这条边对折，折痕处就是中点），再从对面的顶点画一条线段连过来，这就是"中线"。

      三角形 $\triangle ABC$ 中，$M$ 是 $BC$ 的中点（$BM = MC$），从顶点 $A$ 画线到 $M$，线段 $AM$ 就是 $BC$ 边上的中线。

      **三条中线的交点**叫做**<<重心/centroid>>**（用 $G$ 表示）。
      - 重心始终在三角形**内部**
      - 重心将每条中线分成 $2:1$ 的比例（从顶点到重心的距离 $=$ 中线总长的 $\frac{2}{3}$）
      - 🌟 **动手实验**：剪一个纸三角形，在各边找中点，画出三条中线，找到重心 $G$。然后把铅笔尖顶在 $G$ 点上——纸板能平衡不倒！重心是三角形的"平衡点"。

      **3. 角平分线（<<角平分线/angle bisector>>）——把角一分为二的线**

      **画法**：从一个顶点的角，用量角器或角平分线画法，把这个角**平均分成两半**，画出的射线与对边相交，得到的线段就是"角平分线"。

      三角形 $\triangle ABC$ 中，把 $\angle A$ 平分，射线与 $BC$ 交于点 $D$，线段 $AD$ 就是 $\angle A$ 的角平分线。

      **三条角平分线的交点**叫做**<<内心/incenter>>**（用 $I$ 表示）。
      - 内心始终在三角形**内部**
      - 内心到三条边的距离**相等**（这个距离就是内切圆的半径！）
      - 🌟 **神奇的性质**：以内心为圆心，到边的距离为半径，可以画一个恰好切在三条边上的圆——这叫做三角形的**内切圆**。

      **三类特殊线段对比表：**

      | 线段 | 怎么画 | 三条相交的点 | 交点在哪里 |
      |------|--------|------------|---------|
      | 高 | 顶点向对边作垂线 | 垂心 $H$ | 锐角：内部；直角：直角顶点；钝角：外部 |
      | 中线 | 顶点连对边中点 | 重心 $G$ | 始终在**内部** |
      | 角平分线 | 平分顶角到对边 | 内心 $I$ | 始终在**内部** |

      **三条线段都交于一点——这是为什么？**
      这是几何学里非常美妙的结论。三条高、三条中线、三条角平分线，每种都神奇地交于同一个点，这在数学上被证明是必然的（我们将在后续章节证明）。
    contentEn: |
      A triangle has three types of "special segments," each drawn differently and with its own amazing properties. The most magical fact: all three segments of the same type **always meet at a single point**!

      **1. Altitude — the "drop straight down" segment**

      **How to draw**: From a vertex, drop a perpendicular line to the opposite side (or the extension of the opposite side). The segment from the vertex to the foot of the perpendicular is the **altitude**.

      Picture it: like a raindrop falling straight down from the "roof" of the triangle to the "ground" — that's the altitude!

      In $\triangle ABC$, drop a perpendicular from vertex $A$ to line $BC$; the foot is $D$. Segment $AD$ is the altitude to side $BC$.

      **All three altitudes meet at the <<垂心/orthocenter>>** (denoted $H$):
      - Acute triangle: $H$ is **inside** the triangle
      - Right triangle: $H$ is the **right-angle vertex itself**! (The two legs are their own altitudes)
      - Obtuse triangle: $H$ is **outside** the triangle (the foot falls on the extension of the side)

      **2. Median — the "vertex to midpoint" segment**

      **How to draw**: First find the midpoint of one side (fold the side in half — the crease is the midpoint), then draw a segment from the opposite vertex to that midpoint.

      In $\triangle ABC$, $M$ is the midpoint of $BC$ ($BM = MC$). Segment $AM$ is the median to side $BC$.

      **All three medians meet at the <<重心/centroid>>** (denoted $G$):
      - The centroid is always **inside** the triangle
      - The centroid divides each median in the ratio $2:1$ (distance from vertex to centroid $= \frac{2}{3}$ of the full median length)
      - 🌟 **Try it**: Cut out a paper triangle, mark the midpoints of all three sides, draw the three medians, and find point $G$. Balance the triangle on your pencil tip at $G$ — it stays level! The centroid is the triangle's "balance point."

      **3. Angle bisector — the "split the angle in half" segment**

      **How to draw**: From a vertex, use a protractor to bisect the vertex angle exactly in half. The ray from the vertex meets the opposite side at a point; the segment between the vertex and that point is the **angle bisector**.

      In $\triangle ABC$, bisect $\angle A$; the ray meets $BC$ at $D$. Segment $AD$ is the angle bisector of $\angle A$.

      **All three angle bisectors meet at the <<内心/incenter>>** (denoted $I$):
      - The incenter is always **inside** the triangle
      - The incenter is equidistant from all three sides (that distance is the radius of the inscribed circle!)
      - 🌟 **Cool fact**: Draw a circle centered at $I$ with radius equal to the distance from $I$ to any side — it will touch all three sides perfectly. This is called the triangle's **inscribed circle**.

      **Comparison table:**

      | Segment | How to draw | Meeting point | Location of point |
      |---------|-------------|---------------|-------------------|
      | Altitude | vertex perpendicular to opposite side | Orthocenter $H$ | acute: inside; right: corner; obtuse: outside |
      | Median | vertex to midpoint of opposite side | Centroid $G$ | always **inside** |
      | Angle bisector | bisect vertex angle to opposite side | Incenter $I$ | always **inside** |

      **Why do all three always meet at one point?**
      This is one of geometry's most beautiful results. It can be proved mathematically that each set of three special segments is guaranteed to be concurrent (share exactly one common point). We will see the proof in later chapters.
    examples:
      - '在锐角 $\triangle ABC$ 中，三条高的垂心 $H$ 在三角形内部；用纸折叠法找重心 $G$，纸板在 $G$ 点能平衡'
      - '在钝角 $\triangle ABC$ 中（$\angle A > 90°$），从顶点 $B$ 向 $AC$ 的延长线作垂线，垂足在边的延长线上，垂心 $H$ 在三角形外部'
      - '中线将三角形分成面积相等的两部分；重心将三角形分成面积相等的六部分（可用剪纸实验验证）'
      - '等边三角形的垂心、重心、内心三点合一，都在同一个中心点上'
    examplesEn:
      - 'In an acute triangle, the orthocenter $H$ is inside; use the paper-folding method to find centroid $G$ — the paper triangle balances at $G$'
      - 'In an obtuse triangle ($\angle A > 90°$), the altitude from $B$ falls outside side $AC$ (on its extension); the orthocenter $H$ is outside the triangle'
      - 'A median divides a triangle into two equal-area halves; the centroid divides it into six equal-area pieces (try this with cut paper!)'
      - 'In an equilateral triangle, the orthocenter, centroid, and incenter all coincide at the same center point'

  - id: exterior-angle-theorem
    title: <<三角形/triangle>>的<<外角/exterior angle>>定理
    titleEn: The <<外角/exterior angle>> Theorem of a <<三角形/triangle>>
    hasVisualization: true
    content: |
      **先复习：内角和等于 $180°$**

      我们知道三角形三个内角之和等于 $180°$：
      $$\angle A + \angle B + \angle C = 180°$$

      这是最基本的三角形性质，接下来我们要用它推出一个新的结论！

      **什么是外角？**

      在三角形 $\triangle ABC$ 中，把边 $BC$ 向右延长，延长到点 $D$。
      这时，$\overrightarrow{CA}$ 和 $\overrightarrow{CD}$ 之间形成了一个角，就是 $\angle ACD$。

      $\angle ACD$ 叫做三角形在顶点 $C$ 处的**外角**。

      它和哪个内角**相邻**？和 $\angle ACB$（顶点 $C$ 的内角）相邻，因为它们紧挨着，合在一起成一条直线。
      它和哪两个内角**不相邻**？和 $\angle A$（顶点 $A$ 的内角）、$\angle B$（顶点 $B$ 的内角）不相邻——这两个角在三角形的另外两个顶点，离外角"隔了一段距离"。

      注意：在每个顶点处实际上有**两个**外角（延长左侧和延长右侧各得一个），但这两个外角互为对顶角，大小相等，所以说其中一个就够了。

      **外角定理：发现规律**

      试着用量角器量一下：$\angle ACD$ 等于多少？$\angle A + \angle B$ 等于多少？

      你会发现它们**相等**！这就是外角定理：

      **三角形的一个外角 $=$ 与它不相邻的两个内角之和**
      $$\angle ACD = \angle A + \angle B$$

      **为什么？来推导一下！**

      已知：$\angle A + \angle B + \angle ACB = 180°$（三角内角和）……①

      又知：$\angle ACB + \angle ACD = 180°$（$\angle ACB$ 和 $\angle ACD$ 是补角，它们在一条直线上）……②

      由①②，两式左边都等于 $180°$，所以右边也相等：
      $$\angle A + \angle B + \angle ACB = \angle ACB + \angle ACD$$

      两边同时减去 $\angle ACB$：
      $$\angle A + \angle B = \angle ACD \quad \checkmark$$

      **外角定理的推论**

      外角 $\angle ACD = \angle A + \angle B$，因为它是两个正角加在一起，所以：
      $$\angle ACD > \angle A \quad \text{（外角大于其中一个不相邻内角）}$$
      $$\angle ACD > \angle B \quad \text{（外角大于另一个不相邻内角）}$$

      打比方：外角是 $\angle A$ 和 $\angle B$ "合体"的结果，合体后当然比单独的每一个都要大！

      **解题技巧**

      遇到题目里出现外角：
      第一步：找出这个外角的"两个不相邻内角"（就是三角形另外两个顶点的内角）
      第二步：写出等式：外角 $=$ 两不相邻内角之和
      第三步：代入已知角的度数，解方程

      看到不相邻两内角之和：同样可以想到外角——它等于某个外角！
    contentEn: |
      **Review: interior angle sum equals $180°$**

      We know that the three interior angles of a triangle sum to $180°$:
      $$\angle A + \angle B + \angle C = 180°$$

      This is the most fundamental triangle property, and we will use it to derive something new!

      **What is an exterior angle?**

      In triangle $\triangle ABC$, extend side $BC$ to the right to a new point $D$.
      The angle $\angle ACD$ formed between ray $\overrightarrow{CA}$ and ray $\overrightarrow{CD}$ is an **exterior angle** of the triangle at vertex $C$.

      Which interior angle is it **adjacent** to? It is adjacent to $\angle ACB$ (the interior angle at $C$) — they sit next to each other and together form a straight line.
      Which two interior angles is it **not adjacent** to? $\angle A$ and $\angle B$ — they are at the other two vertices, "separated" from the exterior angle by the triangle.

      Note: at each vertex there are actually **two** exterior angles (one on each side), but they are vertical angles and equal, so we only need to consider one.

      **Exterior angle theorem: spotting the pattern**

      Try measuring with a protractor: how big is $\angle ACD$? How big is $\angle A + \angle B$?

      You'll find they are **equal**! This is the exterior angle theorem:

      **An exterior angle of a triangle $=$ the sum of the two non-adjacent interior angles**
      $$\angle ACD = \angle A + \angle B$$

      **Why? Let's derive it!**

      We know: $\angle A + \angle B + \angle ACB = 180°$ (interior angle sum) …①

      We also know: $\angle ACB + \angle ACD = 180°$ ($\angle ACB$ and $\angle ACD$ are supplementary — they form a straight line) …②

      Since both ① and ② equal $180°$, their left sides must be equal:
      $$\angle A + \angle B + \angle ACB = \angle ACB + \angle ACD$$

      Subtract $\angle ACB$ from both sides:
      $$\angle A + \angle B = \angle ACD \quad \checkmark$$

      **Corollary of the exterior angle theorem**

      Since $\angle ACD = \angle A + \angle B$ is the sum of two positive angles:
      $$\angle ACD > \angle A \quad \text{(exterior angle is greater than either non-adjacent interior angle)}$$
      $$\angle ACD > \angle B$$

      Think of it like this: the exterior angle is $\angle A$ and $\angle B$ "combined." The combination is always bigger than either part alone!

      **Problem-solving technique**

      When you see an exterior angle in a problem:
      Step 1: Identify its two non-adjacent interior angles (the interior angles at the other two vertices)
      Step 2: Write the equation: exterior angle $=$ sum of the two non-adjacent interior angles
      Step 3: Substitute the known angles and solve

      When you see the sum of two interior angles: you can also think backwards — their sum equals some exterior angle!
    examples:
      - '在 $\triangle ABC$ 中，$\angle A = 50°$，$\angle B = 70°$，延长 $BC$ 到 $D$，则 $\angle ACD = \angle A + \angle B = 50° + 70° = 120°$'
      - '已知 $\triangle ABC$ 的外角 $\angle ACD = 115°$，$\angle B = 45°$，求 $\angle A$。解：$\angle A = \angle ACD - \angle B = 115° - 45° = 70°$'
      - '在 $\triangle ABC$ 中，$\angle C$ 的外角为 $130°$，已知 $\angle A = \angle B$，求 $\angle A$。解：$\angle A + \angle B = 130°$，所以 $2\angle A = 130°$，$\angle A = 65°$'
    examplesEn:
      - 'In $\triangle ABC$, $\angle A = 50°$, $\angle B = 70°$; extend $BC$ to $D$: $\angle ACD = 50° + 70° = 120°$'
      - 'Given exterior angle $\angle ACD = 115°$ and $\angle B = 45°$, find $\angle A$. Solution: $\angle A = 115° - 45° = 70°$'
      - 'In $\triangle ABC$, the exterior angle at $C$ is $130°$ and $\angle A = \angle B$. Find $\angle A$. Solution: $\angle A + \angle B = 130°$, so $2\angle A = 130°$, $\angle A = 65°$'

  - id: polygon-angle-sum
    title: <<多边形/polygon>>的<<内角和/sum of interior angles>>与外角和
    titleEn: Sum of Interior and Exterior Angles of a <<多边形/polygon>>
    hasVisualization: true
    content: |
      **多边形内角和公式的推导：**
      把一个 $n$ 边形从某个顶点出发，连接所有不相邻的顶点（对角线），可以把它分割成 $(n-2)$ 个三角形。
      每个三角形的内角和为 $180°$，所以：
      $$\text{n边形内角和} = (n-2) \times 180°$$

      **常见多边形内角和列表：**

      | 多边形 | 边数 $n$ | 内角和 | 正多边形每个角 |
      |--------|---------|--------|--------------|
      | 三角形 | $3$ | $180°$ | $60°$ |
      | 四边形 | $4$ | $360°$ | $90°$ |
      | 五边形 | $5$ | $540°$ | $108°$ |
      | 六边形 | $6$ | $720°$ | $120°$ |
      | 八边形 | $8$ | $1080°$ | $135°$ |
      | $n$ 边形 | $n$ | $(n-2) \times 180°$ | $\frac{(n-2) \times 180°}{n}$ |

      **多边形外角和定理：**
      任意凸多边形的外角和恒等于 $360°$，与边数无关！

      **证明：**
      $n$ 边形有 $n$ 个内角，每个内角对应一个外角，内角与外角互补（和为 $180°$）。
      所有内角之和 + 所有外角之和 $= n \times 180°$
      所以：外角和 $= n \times 180° - (n-2) \times 180° = n \times 180° - n \times 180° + 2 \times 180° = 360°$

      **直观理解：**
      想象一只蚂蚁沿着多边形的边走一圈，每经过一个顶点，就转过一个外角的度数。
      走完一整圈回到原点，蚂蚁一共转了 $360°$（恰好一整圈）。

      **实用技巧：**
      - 已知正多边形每个外角的度数 $\alpha$，可求边数：$n = \frac{360°}{\alpha}$
      - 已知正多边形每个内角的度数 $\beta$，每个外角 $= 180° - \beta$，再求边数
    contentEn: |
      **Derivation of the polygon interior angle sum formula:**
      From one vertex of an $n$-gon, draw diagonals to all non-adjacent vertices, dividing the polygon into $(n-2)$ triangles.
      Each triangle has interior angle sum $180°$, so:
      $$\text{Interior angle sum of an } n\text{-gon} = (n-2) \times 180°$$

      **Interior angle sums of common polygons:**

      | Polygon | Sides $n$ | Interior angle sum | Each angle (regular) |
      |---------|-----------|-------------------|----------------------|
      | Triangle | $3$ | $180°$ | $60°$ |
      | Quadrilateral | $4$ | $360°$ | $90°$ |
      | Pentagon | $5$ | $540°$ | $108°$ |
      | Hexagon | $6$ | $720°$ | $120°$ |
      | Octagon | $8$ | $1080°$ | $135°$ |
      | $n$-gon | $n$ | $(n-2) \times 180°$ | $\frac{(n-2) \times 180°}{n}$ |

      **Exterior angle sum theorem:**
      The sum of the exterior angles of any convex polygon is always $360°$, regardless of the number of sides!

      **Proof:**
      An $n$-gon has $n$ interior angles, each paired with an exterior angle (supplementary, summing to $180°$).
      Sum of all interior angles + Sum of all exterior angles $= n \times 180°$
      Therefore: exterior angle sum $= n \times 180° - (n-2) \times 180° = 360°$

      **Intuitive understanding:**
      Imagine an ant walking along the edges of the polygon. At each vertex, it turns through one exterior angle. After completing the full circuit, the ant has turned a total of $360°$ — exactly one full rotation.

      **Practical tips:**
      - Given the exterior angle $\alpha$ of a regular polygon, find the number of sides: $n = \frac{360°}{\alpha}$
      - Given the interior angle $\beta$ of a regular polygon: exterior angle $= 180° - \beta$, then find $n$
    examples:
      - '八边形内角和：$(8-2) \times 180° = 6 \times 180° = 1080°$'
      - '正六边形每个内角：$\frac{(6-2) \times 180°}{6} = \frac{720°}{6} = 120°$'
      - '一个正多边形每个外角为 $36°$，求边数：$n = \frac{360°}{36°} = 10$，是正十边形'
    examplesEn:
      - 'Interior angle sum of an octagon: $(8-2) \times 180° = 6 \times 180° = 1080°$'
      - 'Each interior angle of a regular hexagon: $\frac{(6-2) \times 180°}{6} = \frac{720°}{6} = 120°$'
      - 'Each exterior angle of a regular polygon is $36°$. Find the number of sides: $n = \frac{360°}{36°} = 10$ — it is a regular decagon'

  - id: triangle-stability
    title: <<三角形/triangle>>的稳定性
    titleEn: Rigidity of the <<三角形/triangle>>
    hasVisualization: true
    content: |
      **核心结论：** 三角形是**刚性**图形——三边长度确定后，三角形的形状和大小唯一确定，无法变形。

      **几何解释（SSS 唯一性）：**
      给定三条边长 $a$、$b$、$c$，满足三边关系时，能且只能组成一种三角形（在全等意义下唯一）。
      换句话说：三角形的三条边一旦固定，所有角度也随之固定，无法在不改变边长的情况下改变形状。

      **与四边形对比：**
      给定四条边长，能组成无数种形状（可以"平行四边形化"地变形）。
      例如：用四根木棒铰接成一个正方形，轻推一角，它会变成菱形——四边形**没有稳定性**。

      **加固四边形的方法：**
      在四边形内部增加一条对角线，就把它分成了两个三角形，从而获得稳定性。
      脚手架、桁架桥、自行车框架都用这个原理。

      **工程与建筑中的应用：**
      - **桥梁桁架**：钢铁桁架桥（如埃菲尔铁塔）大量使用三角形结构，确保在风力和重力下不变形
      - **屋顶椽架**：三角形屋顶骨架比矩形框架更能承受重力
      - **脚手架**：施工脚手架的斜支撑将四边形分成三角形，增加稳定性
      - **自行车车架**：菱形车架（两个三角形）提供最强的稳定性和最轻的重量
      - **电线塔**：高压输电塔大量使用三角形格子结构

      **数学本质：**
      三角形稳定性来自"三边确定一个三角形"（SSS 定理）。
      与之对比：三个角相同（AAA）的三角形可以大小不同（相似但不全等），所以"三角相等"不能确定唯一三角形，也不能说明稳定性——稳定性来自**边长固定**。
    contentEn: |
      **Core conclusion:** A triangle is a **rigid** figure — once the three side lengths are fixed, the shape and size of the triangle are uniquely determined and cannot be deformed.

      **Geometric explanation (SSS uniqueness):**
      Given three side lengths $a$, $b$, $c$ satisfying the triangle inequality, one and only one triangle (up to congruence) can be formed.
      In other words: once the three sides are fixed, all angles are fixed too — the shape cannot change without changing the side lengths.

      **Comparison with quadrilaterals:**
      Given four side lengths, infinitely many shapes are possible (the figure can be "sheared" like a parallelogram).
      Example: four sticks hinged into a square — push one corner and it collapses into a rhombus. Quadrilaterals are **not rigid**.

      **How to stiffen a quadrilateral:**
      Add a diagonal inside the quadrilateral, splitting it into two triangles, thereby gaining rigidity.
      Scaffolding, truss bridges, and bicycle frames all use this principle.

      **Applications in engineering and architecture:**
      - **Bridge trusses**: steel truss bridges (like the Eiffel Tower's base structure) use triangles extensively to resist wind and gravity without deforming
      - **Roof rafters**: triangular roof frames bear gravitational loads better than rectangular frames
      - **Scaffolding**: diagonal braces convert quadrilateral panels into triangles for stability
      - **Bicycle frames**: the diamond frame (two triangles) provides maximum rigidity with minimal weight
      - **Power transmission towers**: high-voltage towers use triangular lattice structures throughout

      **Mathematical essence:**
      The rigidity of the triangle comes from "three sides determine a triangle" (SSS theorem).
      By contrast: triangles with the same three angles (AAA) can differ in size (similar but not congruent), so equal angles alone do not determine a unique triangle and do not imply rigidity — rigidity comes from **fixed side lengths**.
    examples:
      - '正方形框架推一推会变成平行四边形（不稳定），但在对角线位置加一根撑杆后，立即变得稳定'
      - '自行车车架采用两个三角形组成的菱形结构，即使受力也不会变形'
      - '埃菲尔铁塔的钢铁格架充满三角形，使整体结构极其稳固，能抵御强风'
    examplesEn:
      - 'A square frame pushed at a corner turns into a parallelogram (unstable), but adding a diagonal brace immediately makes it rigid'
      - 'A bicycle frame uses a diamond shape (two triangles), which does not deform even under load'
      - 'The Eiffel Tower''s steel lattice is packed with triangles, making the structure extremely stable against strong winds'

realLife:
  title: 生活中的三角形
  titleEn: Triangles in Everyday Life
  intro: |
    <<三角形/triangle>>不只存在于数学课本里——它是自然界和人类建造的世界中最常见的结构之一。
  introEn: |
    <<三角形/triangle>>s don't just live in math textbooks — they are one of the most common structures in both the natural world and human constructions.
  items:
    - title: 三脚架的稳定
      titleEn: Tripod stability
      content: |
        相机三脚架、测量仪器支架都采用三脚结构，三个支撑点确定一个平面，同时三角形结构保证不变形。
      contentEn: |
        Camera tripods and surveying instrument stands use a three-legged structure. Three support points determine a plane, while the triangular structure ensures no deformation.
    - title: 山的形状
      titleEn: Shape of mountains
      content: |
        许多山峰的侧面轮廓近似三角形——自然界中堆积物的稳定倾斜角（安息角）决定了三角形轮廓。
      contentEn: |
        The silhouettes of many mountain peaks approximate triangles — the natural angle of repose of accumulated material produces a triangular profile.
    - title: 蜂巢的六边形
      titleEn: Hexagons in honeycombs
      content: |
        蜂巢的六边形格子可以分割成六个等边三角形，正六边形是最节省材料又能完全铺满平面的正多边形。
      contentEn: |
        The hexagonal cells of a honeycomb can be divided into six equilateral triangles. The regular hexagon uses the least material of any regular polygon that can tile the plane.
    - title: 导航定位的三角测量
      titleEn: Triangulation in navigation
      content: |
        GPS 卫星定位、古代航海和现代大地测量，都利用三角形的三边关系进行位置计算（三角测量法）。
      contentEn: |
        GPS satellite positioning, ancient navigation, and modern geodesy all use the triangle inequality and trigonometry for position calculations (triangulation).

examples:
  - id: ex-triangle-sides-check
    title: 判断三条线段能否构成三角形
    titleEn: Determine whether three lengths can form a triangle
    content: |
      **题目：** 判断下列各组线段能否构成三角形，并说明理由：
      (1) $3$ cm、$5$ cm、$7$ cm
      (2) $2$ cm、$3$ cm、$6$ cm
      (3) $5$ cm、$5$ cm、$10$ cm
    contentEn: |
      **Problem:** Determine whether each set of lengths can form a triangle. Justify your answer.
      (1) $3$ cm, $5$ cm, $7$ cm
      (2) $2$ cm, $3$ cm, $6$ cm
      (3) $5$ cm, $5$ cm, $10$ cm
    steps:
      - step: 1
        content: |
          **方法：** 只需验证"两短边之和 > 最长边"。
        contentEn: |
          **Method:** Only need to verify "sum of two shorter sides > longest side."
      - step: 2
        content: |
          **(1)** 两短边之和：$3 + 5 = 8 > 7$ ✓ → **能**构成三角形
        contentEn: |
          **(1)** Sum of two shorter sides: $3 + 5 = 8 > 7$ ✓ → **can** form a triangle
      - step: 3
        content: |
          **(2)** 两短边之和：$2 + 3 = 5 < 6$ ✗ → **不能**构成三角形（最短两边之和不超过最长边）
        contentEn: |
          **(2)** Sum of two shorter sides: $2 + 3 = 5 < 6$ ✗ → **cannot** form a triangle
      - step: 4
        content: |
          **(3)** 两短边之和：$5 + 5 = 10$，等于最长边 ✗ → **不能**构成三角形（三点共线，退化为线段）
        contentEn: |
          **(3)** Sum of two shorter sides: $5 + 5 = 10$, equals the longest side ✗ → **cannot** form a triangle (the three points are collinear; this degenerates to a line segment)
    answer: (1) 能；(2) 不能；(3) 不能
    answerEn: (1) Yes; (2) No; (3) No

  - id: ex-third-side-range
    title: 求第三边的范围
    titleEn: Find the range of the third side
    content: |
      **题目：** 已知三角形两边长分别为 $4$ cm 和 $9$ cm，求第三边 $x$ 的取值范围。
    contentEn: |
      **Problem:** Two sides of a triangle are $4$ cm and $9$ cm. Find the range of values for the third side $x$.
    steps:
      - step: 1
        content: |
          由三边关系定理，三角形任意两边之差 $<$ 第三边 $<$ 两边之和。
        contentEn: |
          By the triangle inequality, for any two sides, their difference $<$ third side $<$ their sum.
      - step: 2
        content: |
          设第三边为 $x$，则：
          $$|4 - 9| < x < 4 + 9$$
          $$5 < x < 13$$
        contentEn: |
          Let the third side be $x$. Then:
          $$|4 - 9| < x < 4 + 9$$
          $$5 < x < 13$$
      - step: 3
        content: |
          因此，第三边 $x$ 的取值范围为 $5 \text{ cm} < x < 13 \text{ cm}$。
          **注意：** 等号不能取到！$x = 5$ 时三点共线，$x = 13$ 时也三点共线，均不能构成三角形。
        contentEn: |
          Therefore, $5 \text{ cm} < x < 13 \text{ cm}$.
          **Note:** The equality signs cannot be reached! At $x = 5$ or $x = 13$, the three points are collinear and no triangle is formed.
    answer: '$5 \text{ cm} < x < 13 \text{ cm}$'
    answerEn: '$5 \text{ cm} < x < 13 \text{ cm}$'

  - id: ex-exterior-angle
    title: 利用外角定理求角度
    titleEn: Use the exterior angle theorem to find angles
    content: |
      **题目：** 在 $\triangle ABC$ 中，$\angle B = 38°$，延长 $BC$ 到点 $D$，$\angle ACD = 112°$。求 $\angle A$ 和 $\angle ACB$。
    contentEn: |
      **Problem:** In $\triangle ABC$, $\angle B = 38°$. Extend $BC$ to point $D$ and $\angle ACD = 112°$. Find $\angle A$ and $\angle ACB$.
    steps:
      - step: 1
        content: |
          $\angle ACD$ 是 $\triangle ABC$ 的外角，由外角定理：
          $$\angle ACD = \angle A + \angle B$$
        contentEn: |
          $\angle ACD$ is an exterior angle of $\triangle ABC$. By the exterior angle theorem:
          $$\angle ACD = \angle A + \angle B$$
      - step: 2
        content: |
          代入已知值：
          $$112° = \angle A + 38°$$
          $$\angle A = 112° - 38° = 74°$$
        contentEn: |
          Substituting known values:
          $$112° = \angle A + 38°$$
          $$\angle A = 112° - 38° = 74°$$
      - step: 3
        content: |
          $\angle ACB$ 是 $\angle ACD$ 的补角：
          $$\angle ACB = 180° - \angle ACD = 180° - 112° = 68°$$
          验证：$\angle A + \angle B + \angle ACB = 74° + 38° + 68° = 180°$ ✓
        contentEn: |
          $\angle ACB$ is supplementary to $\angle ACD$:
          $$\angle ACB = 180° - 112° = 68°$$
          Check: $74° + 38° + 68° = 180°$ ✓
    answer: '$\angle A = 74°$，$\angle ACB = 68°$'
    answerEn: '$\angle A = 74°$, $\angle ACB = 68°$'

  - id: ex-polygon-angles
    title: 多边形内角和与正多边形的角
    titleEn: Polygon interior angle sum and angles of regular polygons
    content: |
      **题目：**
      (1) 计算八边形的内角和。
      (2) 求正六边形每个内角的度数。
      (3) 已知一个正多边形每个内角为 $150°$，求它的边数。
    contentEn: |
      **Problem:**
      (1) Find the interior angle sum of an octagon.
      (2) Find each interior angle of a regular hexagon.
      (3) A regular polygon has each interior angle equal to $150°$. Find the number of sides.
    steps:
      - step: 1
        content: |
          **(1)** 八边形 $n = 8$：
          $$\text{内角和} = (8-2) \times 180° = 6 \times 180° = 1080°$$
        contentEn: |
          **(1)** Octagon, $n = 8$:
          $$\text{Interior angle sum} = (8-2) \times 180° = 6 \times 180° = 1080°$$
      - step: 2
        content: |
          **(2)** 正六边形 $n = 6$，内角和 $= (6-2) \times 180° = 720°$，每个角：
          $$\frac{720°}{6} = 120°$$
        contentEn: |
          **(2)** Regular hexagon, $n = 6$: interior angle sum $= (6-2) \times 180° = 720°$. Each angle:
          $$\frac{720°}{6} = 120°$$
      - step: 3
        content: |
          **(3)** 每个内角 $150°$ → 每个外角 $= 180° - 150° = 30°$
          外角和 $= 360°$，所以边数 $n = \frac{360°}{30°} = 12$，是**正十二边形**。
        contentEn: |
          **(3)** Each interior angle $150°$ → each exterior angle $= 180° - 150° = 30°$
          Exterior angle sum $= 360°$, so $n = \frac{360°}{30°} = 12$ — a **regular dodecagon**.
    answer: (1) $1080°$；(2) $120°$；(3) $12$ 边形
    answerEn: (1) $1080°$; (2) $120°$; (3) $12$ sides

  - id: ex-median-altitude
    title: 三角形的中线与面积
    titleEn: Medians and area of a triangle
    content: |
      **题目：** 在 $\triangle ABC$ 中，$D$ 是 $BC$ 的中点，$AD$ 是 $BC$ 边上的中线。已知 $\triangle ABD$ 的面积为 $12$ cm²，求 $\triangle ABC$ 的面积。
    contentEn: |
      **Problem:** In $\triangle ABC$, $D$ is the midpoint of $BC$, and $AD$ is the median to $BC$. If the area of $\triangle ABD$ is $12$ cm², find the area of $\triangle ABC$.
    steps:
      - step: 1
        content: |
          $D$ 是 $BC$ 的中点，所以 $BD = DC$。
        contentEn: |
          $D$ is the midpoint of $BC$, so $BD = DC$.
      - step: 2
        content: |
          $\triangle ABD$ 和 $\triangle ACD$ 共享同一顶点 $A$，底边 $BD = DC$，所以两个三角形**等高等底**。
          因此 $S_{\triangle ABD} = S_{\triangle ACD}$。
        contentEn: |
          $\triangle ABD$ and $\triangle ACD$ share the same vertex $A$ and have equal bases $BD = DC$, so they have the same base and the same height.
          Therefore $S_{\triangle ABD} = S_{\triangle ACD}$.
      - step: 3
        content: |
          $$S_{\triangle ABC} = S_{\triangle ABD} + S_{\triangle ACD} = 12 + 12 = 24 \text{ cm}^{2}$$
          **结论**：中线将三角形分成面积相等的两部分。
        contentEn: |
          $$S_{\triangle ABC} = S_{\triangle ABD} + S_{\triangle ACD} = 12 + 12 = 24 \text{ cm}^{2}$$
          **Conclusion**: A median divides the triangle into two parts of equal area.
    answer: '$S_{\triangle ABC} = 24 \text{ cm}^{2}$'
    answerEn: '$S_{\triangle ABC} = 24 \text{ cm}^{2}$'

exercises:
  - id: q1
    type: fill
    question: '判断：三条线段 $6$ cm、$8$ cm、$15$ cm 能否构成三角形？（填"能"或"不能"）'
    questionEn: 'Can segments of $6$ cm, $8$ cm, and $15$ cm form a triangle? (Write "yes" or "no")'
    answer: 不能
    answerEn: 'no'
    explanation: '$6 + 8 = 14 < 15$，两短边之和不大于最长边，不能构成三角形。'
    explanationEn: '$6 + 8 = 14 < 15$. The sum of the two shorter sides does not exceed the longest side, so no triangle is formed.'

  - id: q2
    type: fill
    question: '已知三角形两边长为 $3$ cm 和 $7$ cm，第三边 $x$ 的取值范围是___。'
    questionEn: 'Two sides of a triangle are $3$ cm and $7$ cm. The range of the third side $x$ is ___.'
    answer: '$4 \text{ cm} < x < 10 \text{ cm}$'
    answerEn: '$4 \text{ cm} < x < 10 \text{ cm}$'
    explanation: '$|7-3| < x < 7+3$，即 $4 < x < 10$。'
    explanationEn: '$|7-3| < x < 7+3$, so $4 < x < 10$.'

  - id: q3
    type: fill
    question: '三角形三个内角之和等于___°。'
    questionEn: 'The sum of the three interior angles of a triangle equals ___°.'
    answer: '180'
    answerEn: '180'
    explanation: '三角形内角和定理：任意三角形三个内角之和等于 $180°$。'
    explanationEn: 'Interior angle sum theorem: the three interior angles of any triangle sum to $180°$.'

  - id: q4
    type: choice
    question: |
      在 $\triangle ABC$ 中，延长 $BC$ 到点 $D$，$\angle ACD$ 是 $\angle C$ 的外角。已知 $\angle A = 55°$，$\angle B = 65°$，则 $\angle ACD =$ ？
    questionEn: |
      In $\triangle ABC$, extend $BC$ to $D$. $\angle ACD$ is an exterior angle at $C$. Given $\angle A = 55°$ and $\angle B = 65°$, find $\angle ACD$.
    choices:
      - A. $110°$
      - B. $120°$
      - C. $125°$
      - D. $130°$
    choicesEn:
      - A. $110°$
      - B. $120°$
      - C. $125°$
      - D. $130°$
    answer: B
    answerEn: B
    explanation: '由外角定理：$\angle ACD = \angle A + \angle B = 55° + 65° = 120°$。'
    explanationEn: 'By the exterior angle theorem: $\angle ACD = \angle A + \angle B = 55° + 65° = 120°$.'

  - id: q5
    type: fill
    question: '五边形的内角和等于___°。'
    questionEn: 'The interior angle sum of a pentagon equals ___°.'
    answer: '540'
    answerEn: '540'
    explanation: '$(5-2) \times 180° = 3 \times 180° = 540°$。'
    explanationEn: '$(5-2) \times 180° = 3 \times 180° = 540°$.'

  - id: q6
    type: fill
    question: '任意凸多边形的外角和恒等于___°。'
    questionEn: 'The sum of exterior angles of any convex polygon always equals ___°.'
    answer: '360'
    answerEn: '360'
    explanation: '这是多边形外角和定理，与边数无关，恒为 $360°$。'
    explanationEn: 'This is the exterior angle sum theorem; it equals $360°$ regardless of the number of sides.'

  - id: q7
    type: choice
    question: |
      下列图形中，哪一类始终具有稳定性，不会在不改变边长的情况下变形？
    questionEn: |
      Which of the following figures is always rigid and cannot be deformed without changing side lengths?
    choices:
      - A. 四边形
      - B. 五边形
      - C. 三角形
      - D. 六边形
    choicesEn:
      - A. Quadrilateral
      - B. Pentagon
      - C. Triangle
      - D. Hexagon
    answer: C
    answerEn: C
    explanation: '三角形的三条边确定唯一的形状（SSS 唯一性），因此具有稳定性。其他多边形边数大于 $3$，不具有稳定性。'
    explanationEn: 'Three side lengths determine a unique triangle (SSS uniqueness), so it is rigid. Polygons with more than three sides are not rigid.'

  - id: q8
    type: fill
    question: '在 $\triangle ABC$ 中，$\angle A = 40°$，$\angle B = 75°$，则 $\angle C =$ ___°。'
    questionEn: 'In $\triangle ABC$, $\angle A = 40°$ and $\angle B = 75°$. Find $\angle C$.'
    answer: '65'
    answerEn: '65'
    explanation: '$\angle C = 180° - \angle A - \angle B = 180° - 40° - 75° = 65°$。'
    explanationEn: '$\angle C = 180° - 40° - 75° = 65°$.'

  - id: q9
    type: fill
    question: |
      在 $\triangle ABC$ 中，$\angle C$ 的一个外角为 $140°$，$\angle A = 80°$，则 $\angle B =$ ___°。
    questionEn: |
      In $\triangle ABC$, an exterior angle at $C$ is $140°$ and $\angle A = 80°$. Find $\angle B$.
    answer: '60'
    answerEn: '60'
    explanation: '由外角定理：$\angle A + \angle B = 140°$，所以 $\angle B = 140° - 80° = 60°$。'
    explanationEn: 'By the exterior angle theorem: $\angle A + \angle B = 140°$, so $\angle B = 140° - 80° = 60°$.'

  - id: q10
    type: choice
    question: |
      正多边形每个内角为 $108°$，则该多边形是几边形？
    questionEn: |
      Each interior angle of a regular polygon is $108°$. How many sides does it have?
    choices:
      - A. 四边形
      - B. 五边形
      - C. 六边形
      - D. 八边形
    choicesEn:
      - A. Quadrilateral
      - B. Pentagon
      - C. Hexagon
      - D. Octagon
    answer: B
    answerEn: B
    explanation: '每个外角 $= 180° - 108° = 72°$，边数 $n = \frac{360°}{72°} = 5$，是正五边形。'
    explanationEn: 'Each exterior angle $= 180° - 108° = 72°$. Number of sides $n = \frac{360°}{72°} = 5$ — a regular pentagon.'

  - id: q11
    type: open
    question: |
      **推导题：** 利用三角形内角和定理，证明三角形外角定理（即三角形的外角等于与它不相邻的两个内角之和）。
    questionEn: |
      **Derivation:** Using the triangle interior angle sum theorem, prove the exterior angle theorem (an exterior angle of a triangle equals the sum of the two non-adjacent interior angles).
    answer: |
      **证明：**
      设 $\triangle ABC$ 中，延长 $BC$ 到 $D$，$\angle ACD$ 为外角。
      由内角和定理：$\angle A + \angle B + \angle ACB = 180°$ ①
      由补角定义：$\angle ACB + \angle ACD = 180°$ ②
      由①②，$\angle A + \angle B + \angle ACB = \angle ACB + \angle ACD$
      两边减去 $\angle ACB$，得 $\angle ACD = \angle A + \angle B$。
      证毕。
    answerEn: |
      **Proof:**
      In $\triangle ABC$, extend $BC$ to $D$; let $\angle ACD$ be the exterior angle.
      By the interior angle sum theorem: $\angle A + \angle B + \angle ACB = 180°$ ①
      By the definition of supplementary angles: $\angle ACB + \angle ACD = 180°$ ②
      From ① and ②: $\angle A + \angle B + \angle ACB = \angle ACB + \angle ACD$
      Subtract $\angle ACB$ from both sides: $\angle ACD = \angle A + \angle B$.
      QED.

  - id: q12
    type: fill
    question: |
      一个凸多边形的内角和为 $1440°$，则它是几边形？
    questionEn: |
      The interior angle sum of a convex polygon is $1440°$. How many sides does it have?
    answer: '10边形（十边形）'
    answerEn: '10 (decagon)'
    explanation: |
      $(n-2) \times 180° = 1440°$
      $n - 2 = 8$
      $n = 10$
    explanationEn: |
      $(n-2) \times 180° = 1440°$
      $n - 2 = 8$
      $n = 10$

  - id: q13
    type: open
    question: |
      **综合题：** 在 $\triangle ABC$ 中，$\angle A$ 的外角为 $105°$，$\angle B = \angle C$，求 $\angle B$ 的度数。
    questionEn: |
      **Combined problem:** In $\triangle ABC$, the exterior angle at $A$ is $105°$ and $\angle B = \angle C$. Find $\angle B$.
    answer: |
      $\angle A$ 的外角 $= 105°$，所以 $\angle A = 180° - 105° = 75°$。
      由内角和：$\angle A + \angle B + \angle C = 180°$
      $75° + 2\angle B = 180°$
      $\angle B = \frac{105°}{2} = 52.5°$
    answerEn: |
      The exterior angle at $A$ is $105°$, so $\angle A = 180° - 105° = 75°$.
      By the interior angle sum: $75° + 2\angle B = 180°$
      $\angle B = \frac{105°}{2} = 52.5°$

  - id: q14
    type: open
    question: |
      **三边关系综合：** 等腰三角形的腰长为 $5$ cm，底边长为整数，且三角形的周长不超过 $17$ cm，求底边的所有可能值。
    questionEn: |
      **Combined triangle inequality:** An isosceles triangle has legs of $5$ cm each. The base is an integer length, and the perimeter does not exceed $17$ cm. Find all possible values of the base.
    answer: |
      设底边长为 $a$（正整数），腰长为 $5$ cm。
      **三边关系条件：** $a < 5 + 5 = 10$ 且 $a > |5 - 5| = 0$，所以 $0 < a < 10$。
      **周长条件：** $5 + 5 + a \leq 17$，即 $a \leq 7$。
      综合：$a$ 是满足 $1 \leq a \leq 7$ 的正整数（同时 $a < 10$ 自动满足）。
      底边可能的值为：$1, 2, 3, 4, 5, 6, 7$ cm。
    answerEn: |
      Let the base be $a$ cm (a positive integer) and the legs be $5$ cm each.
      **Triangle inequality:** $a < 5 + 5 = 10$ and $a > 0$, so $0 < a < 10$.
      **Perimeter condition:** $5 + 5 + a \leq 17$, i.e. $a \leq 7$.
      Combined: $a$ is a positive integer with $1 \leq a \leq 7$.
      Possible values: $1, 2, 3, 4, 5, 6, 7$ cm.

  - id: q15
    type: fill
    question: |
      在 $\triangle ABC$ 中，三条中线的交点叫___，三条角平分线的交点叫___，三条高的交点叫___。
    questionEn: |
      In $\triangle ABC$, the intersection of the three medians is called the ___, the three angle bisectors meet at the ___, and the three altitudes meet at the ___.
    answer: '重心；内心；垂心'
    answerEn: 'centroid; incenter; orthocenter'
    explanation: '三角形三类特殊线段各有其交点：中线→重心，角平分线→内心，高→垂心。'
    explanationEn: 'Each type of special segment has its own intersection point: medians → centroid, angle bisectors → incenter, altitudes → orthocenter.'

examPrep:
  intro: |
    以下 5 道题是本章的综合提升题，重点考查各知识点的灵活运用和综合分析能力。
  introEn: |
    The following 5 problems are end-of-chapter challenge problems, focusing on flexible application and integrated analysis of the topics covered.
  problems:
    - id: ep1
      type: open
      question: |
        **外角定理 + 平行线综合：** 如图，$AB \parallel CD$，直线 $EF$ 分别交 $AB$、$CD$ 于点 $M$、$N$，$\angle AMN = 55°$，$\angle MNC = 65°$。在 $\triangle MPN$ 中（$P$ 是 $AB$ 与 $CD$ 之间某点），$MP = NP$，$\angle MPN$ 的外角为多少度？
        提示：先利用平行线性质求 $\angle PMN$ 和 $\angle PNM$，再求 $\angle MPN$，最后求其外角。
      questionEn: |
        **Exterior angle theorem + parallel lines:** Lines $AB \parallel CD$ are cut by transversal $EF$ at $M$ (on $AB$) and $N$ (on $CD$). Given $\angle AMN = 55°$ and $\angle MNC = 65°$. In $\triangle MPN$ (with $P$ between $AB$ and $CD$, and $MP = NP$), what is the exterior angle of $\angle MPN$?
        Hint: first use parallel line properties to find $\angle PMN$ and $\angle PNM$, then find $\angle MPN$, then find its exterior angle.
      answer: |
        $AB \parallel CD$，由同位角（或内错角）：
        $\angle PMN = \angle AMN = 55°$（$P$ 在 $AB$ 下方，$\angle PMN$ 即 $\angle AMN$ 的一部分，视题目具体配置而定；若 $PM$ 方向与 $MN$ 同侧，直接用 $\angle PMN$）

        若题意为 $\angle PMN = 55°$，$\angle PNM = 65°$：
        $\angle MPN = 180° - 55° - 65° = 60°$
        $\angle MPN$ 的外角 $= 180° - 60° = 120°$

        另解（外角定理）：$\angle MPN$ 的外角 $= \angle PMN + \angle PNM = 55° + 65° = 120°$
      answerEn: |
        Since $AB \parallel CD$, by alternate interior angles (or corresponding angles):
        $\angle PMN = 55°$, $\angle PNM = 65°$

        By the exterior angle theorem applied to $\triangle MPN$:
        Exterior angle of $\angle MPN = \angle PMN + \angle PNM = 55° + 65° = 120°$

    - id: ep2
      type: open
      question: |
        **三边关系与周长范围：** 一个等腰三角形，其中一边长为 $6$ cm，另一边长为 $10$ cm。求该三角形所有可能的周长，并判断哪些情况能构成合法的三角形。
      questionEn: |
        **Triangle inequality and perimeter range:** An isosceles triangle has one side of $6$ cm and another of $10$ cm. Find all possible perimeters and determine which configurations form valid triangles.
      answer: |
        等腰三角形有两条相等的边，分两种情况：

        **情况一：腰 $= 6$ cm，底边 $= 10$ cm**
        三边为 $6$、$6$、$10$。验证：$6 + 6 = 12 > 10$ ✓，能构成三角形。
        周长 $= 6 + 6 + 10 = 22$ cm。

        **情况二：腰 $= 10$ cm，底边 $= 6$ cm**
        三边为 $10$、$10$、$6$。验证：$10 + 6 = 16 > 10$ ✓，能构成三角形。
        周长 $= 10 + 10 + 6 = 26$ cm。

        综合：该等腰三角形的周长为 $22$ cm 或 $26$ cm。
        （注意：若理解为"一边 $6$ cm，另一边 $10$ cm"但未指定等腰对应关系，则只有以上两种情况。）
      answerEn: |
        An isosceles triangle has two equal sides. Two cases:

        **Case 1:** Legs $= 6$ cm, base $= 10$ cm
        Sides: $6$, $6$, $10$. Check: $6 + 6 = 12 > 10$ ✓ — valid triangle.
        Perimeter $= 22$ cm.

        **Case 2:** Legs $= 10$ cm, base $= 6$ cm
        Sides: $10$, $10$, $6$. Check: $10 + 6 = 16 > 10$ ✓ — valid triangle.
        Perimeter $= 26$ cm.

        The possible perimeters are $22$ cm and $26$ cm.

    - id: ep3
      type: open
      question: |
        **多边形内外角综合：** 一个凸多边形，其中 $5$ 个内角各为 $150°$，其余内角各为 $120°$，求该多边形的边数。
      questionEn: |
        **Combined interior/exterior angles:** A convex polygon has $5$ interior angles each equal to $150°$ and the remaining interior angles each equal to $120°$. Find the number of sides.
      answer: |
        设该多边形有 $n$ 条边，其中 $5$ 个内角为 $150°$，其余 $(n-5)$ 个内角为 $120°$。

        内角和公式：$(n-2) \times 180°$

        列方程：
        $$5 \times 150° + (n-5) \times 120° = (n-2) \times 180°$$
        $$750° + 120n° - 600° = 180n° - 360°$$
        $$150° + 120n° = 180n° - 360°$$
        $$510° = 60n°$$
        $$n = 8.5$$

        $n$ 不是整数，说明题目条件自身有误，或需重新检查。

        （若改为 $4$ 个 $150°$ 角，其余 $120°$：$4 \times 150 + (n-4) \times 120 = (n-2) \times 180$
        $600 + 120n - 480 = 180n - 360$
        $120 + 120n = 180n - 360$
        $480 = 60n$，$n = 8$。）

        取 $n=8$（八边形）时：$4$ 个 $150°$ 内角，$4$ 个 $120°$ 内角。
        验证：$4 \times 150° + 4 \times 120° = 600° + 480° = 1080° = (8-2) \times 180°$ ✓
      answerEn: |
        Let the polygon have $n$ sides, with $5$ angles of $150°$ and $(n-5)$ angles of $120°$.

        Setting up the equation using the interior angle sum formula:
        $$5 \times 150° + (n-5) \times 120° = (n-2) \times 180°$$
        $$750 + 120n - 600 = 180n - 360$$
        $$150 + 120n = 180n - 360$$
        $$510 = 60n$$
        $$n = 8.5$$

        Since $n$ is not an integer, the given conditions are inconsistent.

        If we adjust to $4$ angles of $150°$:
        $4 \times 150 + (n-4) \times 120 = (n-2) \times 180$
        $n = 8$ (octagon). Check: $4 \times 150° + 4 \times 120° = 1080° = (8-2) \times 180°$ ✓

    - id: ep4
      type: open
      question: |
        **陷阱题——等腰三角形的高：** 等腰三角形 $\triangle ABC$ 中，$AB = AC = 5$ cm，$BC = 6$ cm。从顶点 $A$ 向 $BC$ 作高 $AH$，从顶点 $B$ 向 $AC$ 作高 $BK$。
        (1) 求 $AH$ 的长度（用勾股定理）。
        (2) 判断这两条高的交点（垂心 $H'$）在三角形内部还是外部。
      questionEn: |
        **Trap problem — altitudes of an isosceles triangle:** In isosceles $\triangle ABC$ with $AB = AC = 5$ cm and $BC = 6$ cm, $AH$ is the altitude from $A$ to $BC$, and $BK$ is the altitude from $B$ to $AC$.
        (1) Find the length of $AH$ (use the Pythagorean theorem).
        (2) Determine whether the orthocenter lies inside or outside the triangle.
      answer: |
        **(1) 求 $AH$：**
        等腰三角形 $\triangle ABC$，$AB = AC = 5$ cm，$BC = 6$ cm。
        高 $AH$ 从顶点 $A$ 垂直到底边 $BC$，且由对称性，$H$ 是 $BC$ 的中点，$BH = 3$ cm。
        在直角 $\triangle ABH$ 中：
        $$AH^{2} + BH^{2} = AB^{2}$$
        $$AH^{2} = 5^{2} - 3^{2} = 25 - 9 = 16$$
        $$AH = 4 \text{ cm}$$

        **(2) 判断垂心位置：**
        首先确认这是锐角三角形还是钝角三角形。
        三个角均小于 $90°$（等腰三角形，顶角可由余弦定理算出，约 $73.7°$，底角约 $53.1°$）——是锐角三角形。
        锐角三角形的垂心在三角形**内部**。
      answerEn: |
        **(1) Finding $AH$:**
        In isosceles $\triangle ABC$ with $AB = AC = 5$ cm and $BC = 6$ cm, the altitude from $A$ bisects $BC$ by symmetry, so $BH = 3$ cm.
        In right $\triangle ABH$:
        $$AH^{2} = AB^{2} - BH^{2} = 25 - 9 = 16, \quad AH = 4 \text{ cm}$$

        **(2) Location of the orthocenter:**
        Check whether the triangle is acute. All three angles are less than $90°$ (apex angle $\approx 73.7°$, base angles $\approx 53.1°$) — it is an acute triangle.
        The orthocenter of an acute triangle lies **inside** the triangle.

    - id: ep5
      type: open
      question: |
        **综合推理题：** 在 $\triangle ABC$ 中，$\angle A : \angle B : \angle C = 2 : 3 : 4$。
        (1) 求三个角的度数。
        (2) 判断该三角形的类型（按角分类）。
        (3) 延长 $BC$ 到点 $D$，求 $\angle ACD$，并验证外角定理。
      questionEn: |
        **Integrated reasoning:** In $\triangle ABC$, $\angle A : \angle B : \angle C = 2 : 3 : 4$.
        (1) Find the three angles.
        (2) Classify the triangle by angles.
        (3) Extend $BC$ to $D$, find $\angle ACD$, and verify the exterior angle theorem.
      answer: |
        **(1) 求三角：**
        设 $\angle A = 2k$，$\angle B = 3k$，$\angle C = 4k$。
        由内角和：$2k + 3k + 4k = 180°$
        $9k = 180°$，$k = 20°$
        $\angle A = 40°$，$\angle B = 60°$，$\angle C = 80°$

        **(2) 分类：**
        三个角均小于 $90°$（最大角 $\angle C = 80° < 90°$），是**锐角三角形**。

        **(3) 外角验证：**
        延长 $BC$ 到 $D$，$\angle ACD$ 是 $\angle C$ 的外角：
        由外角定理：$\angle ACD = \angle A + \angle B = 40° + 60° = 100°$
        由补角：$\angle ACD = 180° - \angle C = 180° - 80° = 100°$ ✓
        两种方法结果相同，外角定理得到验证。
      answerEn: |
        **(1) Finding the angles:**
        Let $\angle A = 2k$, $\angle B = 3k$, $\angle C = 4k$.
        $2k + 3k + 4k = 180°$ → $k = 20°$
        $\angle A = 40°$, $\angle B = 60°$, $\angle C = 80°$

        **(2) Classification:**
        All three angles are less than $90°$ (largest is $\angle C = 80°$) — **acute triangle**.

        **(3) Verifying the exterior angle theorem:**
        Extend $BC$ to $D$; $\angle ACD$ is the exterior angle at $C$.
        By exterior angle theorem: $\angle ACD = \angle A + \angle B = 40° + 60° = 100°$
        By supplementary angles: $\angle ACD = 180° - 80° = 100°$ ✓
        Both methods agree — the exterior angle theorem is verified.

summary: |
  本章我们系统学习了<<三角形/triangle>>的核心性质，从简单到深入，构建了完整的三角形知识体系：

  **1. 三边关系：** 三角形任意两边之和 $>$ 第三边，任意两边之差 $<$ 第三边。判断三条线段能否构成三角形时，只需验证两短边之和是否大于最长边。

  **2. 三角形分类：** 按边分为等腰（含等边）和一般三角形；按角分为锐角、直角和钝角三角形。等边三角形是等腰三角形的特殊情形。

  **3. 三条重要线段：** 高（垂心）、中线（重心，分中线为 $2:1$）、角平分线（内心）。垂心的位置随三角形类型而变，内心和重心始终在三角形内部。

  **4. 外角定理：** 三角形的外角等于与它不相邻的两个内角之和，且大于任意一个不相邻的内角。

  **5. 多边形内角和：** $n$ 边形内角和 $= (n-2) \times 180°$；任意凸多边形外角和恒为 $360°$。

  **6. 三角形稳定性：** 三边长度固定则形状唯一，三角形具有刚性，是工程建筑的基础结构单元。

summaryEn: |
  In this chapter we systematically studied the core properties of <<三角形/triangle>>s, progressing from the simple to the deep, and building a complete knowledge framework:

  **1. Triangle inequality:** The sum of any two sides is greater than the third; the difference is less than the third. To check whether three segments form a triangle, it suffices to verify that the sum of the two shorter sides exceeds the longest.

  **2. Classification:** By sides — isosceles (including equilateral) and scalene; by angles — acute, right, and obtuse. Equilateral triangles are a special case of isosceles.

  **3. Three special segments:** Altitude (meeting at the orthocenter), median (meeting at the centroid, which divides each median $2:1$), and angle bisector (meeting at the incenter). The orthocenter's position changes with triangle type; the incenter and centroid always lie inside.

  **4. Exterior angle theorem:** An exterior angle of a triangle equals the sum of the two non-adjacent interior angles, and is greater than either one.

  **5. Polygon angle sums:** Interior angle sum of an $n$-gon $= (n-2) \times 180°$; the exterior angle sum of any convex polygon is always $360°$.

  **6. Triangle rigidity:** Fixed side lengths determine a unique shape — triangles are rigid, making them the fundamental structural unit in engineering and architecture.
