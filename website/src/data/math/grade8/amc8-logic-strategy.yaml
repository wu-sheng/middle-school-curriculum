      source: "AMC 8 2023 #10"
      section: 逆推法与排除法
      question: |
        Harold 吃了一个派的 $\dfrac{1}{4}$。然后 Moose 吃了剩下的 $\dfrac{1}{3}$。然后 Porcupine 吃了 Moose 吃完后剩下的 $\dfrac{1}{3}$。
        这个派还剩多少？
      questionEn: |
        Harold eats $\dfrac{1}{4}$ of a pie. Then Moose eats $\dfrac{1}{3}$ of the remaining pie. Then Porcupine eats $\dfrac{1}{3}$ of what Moose left behind.
        What fraction of the original pie remains?
      choices:
        - label: A
          content: '$\dfrac{1}{12}$'
        - label: B
          content: '$\dfrac{1}{6}$'
        - label: C
          content: '$\dfrac{1}{4}$'
        - label: D
          content: '$\dfrac{1}{3}$'
        - label: E
          content: '$\dfrac{5}{12}$'
      correctValue: D
      answer: '(D) $\dfrac{1}{3}$'
      answerEn: '(D) $\dfrac{1}{3}$'
      explanation: |
        Harold 吃了 $\dfrac{1}{4}$，剩 $\dfrac{3}{4}$。
        Moose 吃了剩下的 $\dfrac{1}{3}$，即 $\dfrac{3}{4} \times \dfrac{1}{3} = \dfrac{1}{4}$，还剩 $\dfrac{3}{4} \times \dfrac{2}{3} = \dfrac{1}{2}$。
        Porcupine 吃了剩下的 $\dfrac{1}{3}$，即 $\dfrac{1}{2} \times \dfrac{1}{3} = \dfrac{1}{6}$，还剩 $\dfrac{1}{2} \times \dfrac{2}{3} = \dfrac{1}{3}$。
        剩余 $\mathbf{\dfrac{1}{3}}$。
      explanationEn: |
        Harold eats $\dfrac{1}{4}$, leaving $\dfrac{3}{4}$.
        Moose eats $\dfrac{1}{3}$ of that: $\dfrac{3}{4}\times\dfrac{2}{3}=\dfrac{1}{2}$ remains.
        Porcupine eats $\dfrac{1}{3}$ of that: $\dfrac{1}{2}\times\dfrac{2}{3}=\dfrac{1}{3}$ remains.
        Remaining: $\mathbf{\dfrac{1}{3}}$.

    - number: 11
      type: 单选题
      inputType: mc
      section: 逆推法与排除法
      question: |
        小明想一个正整数，先乘以 2，再加 3，再乘以 3，最后减 4，得到 35。小明想的数是多少？
      questionEn: |
        Xiao Ming thinks of a positive integer. He multiplies by 2, adds 3, multiplies by 3, then subtracts 4, getting 35. What was his number?
      choices:
        - label: A
          content: '3'
        - label: B
          content: '4'
        - label: C
          content: '5'
        - label: D
          content: '6'
        - label: E
          content: '7'
      correctValue: C
      answer: '(C) 5'
      answerEn: '(C) 5'
      explanation: |
        逆推：从结果 35 出发，把每步操作反过来做。

        $35 \xrightarrow{+4} 39 \xrightarrow{\div 3} 13 \xrightarrow{-3} 10 \xrightarrow{\div 2} 5$

        原来的数是 $\mathbf{5}$。

        正向验证：$5 \times 2 = 10$，$10 + 3 = 13$，$13 \times 3 = 39$，$39 - 4 = 35$ ✓。
      explanationEn: |
        Work backwards from 35, reversing each operation:

        $35 \xrightarrow{+4} 39 \xrightarrow{\div 3} 13 \xrightarrow{-3} 10 \xrightarrow{\div 2} 5$

        The original number is $\mathbf{5}$.

        Forward check: $5\times2=10$, $10+3=13$, $13\times3=39$, $39-4=35$ ✓.

    - number: 12
