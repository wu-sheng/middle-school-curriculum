        - label: E
          content: '无法确定'
      correctValue: C
      answer: '(C) 55'
      answerEn: '(C) 55'
      explanation: |
        **不变量**：每次操作中，擦掉 $a$ 和 $b$，写上 $a+b$。所有数之和保持不变！

        初始和 $= 1 + 2 + \cdots + 10 = \dfrac{10 \times 11}{2} = 55$。

        无论操作顺序如何，最终剩下的数一定是 $\mathbf{55}$。
      explanationEn: |
        **Invariant**: erasing $a$ and $b$ and writing $a+b$ preserves the total sum!

