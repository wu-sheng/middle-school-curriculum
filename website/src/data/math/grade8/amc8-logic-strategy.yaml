    - number: 9
      type: 单选题
      inputType: mc
      source: "AMC 8 2023 #22"
      section: 逆推法与排除法
      question: |
        在一个数列中，从第三项开始，每一项等于前两项之积。已知第六项为 4000。第一项是多少？
      questionEn: |
        In a sequence, each term after the second equals the product of the two preceding terms. The sixth term is 4000. What is the first term?
      choices:
        - label: A
          content: '1'
        - label: B
          content: '2'
        - label: C
          content: '3'
        - label: D
          content: '5'
        - label: E
          content: '10'
      correctValue: D
      answer: '(D) 5'
      answerEn: '(D) 5'
      explanation: |
        设 $a_1 = a$，$a_2 = b$。逐项推导：
        $a_3 = ab$，$a_4 = a_2 \cdot a_3 = ab^{2}$，$a_5 = a_3 \cdot a_4 = a^{2}b^{3}$，$a_6 = a_4 \cdot a_5 = a^{3}b^{5}$。

        所以 $a^{3}b^{5} = 4000$。对 4000 做质因数分解：$4000 = 2^{5} \times 5^{3}$。

        比较：$a^{3} = 5^{3} \Rightarrow a = 5$，$b^{5} = 2^{5} \Rightarrow b = 2$。

        验证：$5, 2, 10, 20, 200, 4000$ ✓。第一项 $= \mathbf{5}$。

        💡 **另一种方法——代入选项逐个试：**
        逐个试 $a_1$ 的值，看哪个能让第六项 $= 4000$。猜 $a_2$ 时从小数开始：
        试 $a_1=5$，$a_2=2$：$5, 2, 10, 20, 200, 4000$ ✓ 找到了！
        试 $a_1=2$，$a_2=?$：$a_6 = a^{3}b^{5} = 8b^{5}$，$b^{5} = 500$，$b$ 不是整数 ✗。
        选择题中只有 5 个选项，最多试 5 次就能找到！
      explanationEn: |
        Let $a_1=a$, $a_2=b$. Derive each term:
        $a_3=ab$, $a_4=ab^{2}$, $a_5=a^{2}b^{3}$, $a_6=a^{3}b^{5}$.

        So $a^{3}b^{5}=4000$. Prime factorization: $4000=2^{5}\times5^{3}$.

        Match: $a^{3}=5^{3}\Rightarrow a=5$, $b^{5}=2^{5}\Rightarrow b=2$.

        Verify: $5, 2, 10, 20, 200, 4000$ ✓. First term $= \mathbf{5}$.

        💡 **Alternative — Try Each Choice:**
        Test each value of $a_1$, guessing small values for $a_2$:
        Try $a_1=5$, $a_2=2$: $5, 2, 10, 20, 200, 4000$ ✓ Found it!
        Try $a_1=2$, $a_2=?$: $a_6 = 8b^{5}$, $b^{5}=500$, not an integer ✗.
        With only 5 choices, you need at most 5 tries!

    - number: 10
      type: 单选题
