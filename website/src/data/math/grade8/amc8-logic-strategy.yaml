title: "\U0001F3C6 AMC 8 扩展：逻辑与策略"
titleEn: "\U0001F3C6 AMC 8 Extension: Logic & Strategy"
chapter: 9
subject: math
grade: grade8
semester: semester1
estimatedTime: 约 3–4 课时，每课时 45 分钟
estimatedTimeEn: "3–4 sessions, ~45 min each"
targetAudience: 八年级自学生，综合运用逻辑推理和策略性解题方法

objectives:
  - 理解<<抽屉原理/Pigeonhole Principle>>，能用它证明"必然存在"类结论
  - 掌握<<奇偶分析/parity analysis>>，利用奇偶性排除不可能情况
  - 理解<<不变量/invariant>>的概念，能识别过程中不变的量并用它证明不可能性
  - 熟练运用<<逆推法/working backwards>>和<<排除法/process of elimination>>快速定位答案
  - 培养 AMC 8 竞赛中"先判断后计算"的策略意识
objectivesEn:
  - 'Understand the <<抽屉原理/Pigeonhole Principle>> and use it to prove "guaranteed existence" conclusions'
  - 'Master <<奇偶分析/parity analysis>>: use parity to rule out impossible cases'
  - 'Understand <<不变量/invariant>>s: identify quantities unchanged by a process and use them to prove impossibility'
  - 'Fluently apply <<逆推法/working backwards>> and <<排除法/process of elimination>> to locate answers quickly'
  - 'Develop the AMC 8 contest strategy of "judge before you compute"'

prerequisites:
