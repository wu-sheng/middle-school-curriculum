        time: 逆推法与排除法（约 15 分钟）
  scaffold:
    - title: '铺垫：简单抽屉原理'
      titleEn: 'Warm-up: Simple Pigeonhole'
      question: '有 5 双袜子（5 种颜色各 2 只）混在一起。闭着眼至少抽几只，才能保证有一双同色的？'
      questionEn: '5 pairs of socks (5 colors, 2 each) are mixed together. Eyes closed, how many must you draw to guarantee a matching pair?'
      hint: '最坏情况：前几只全是不同颜色。颜色有 5 种……'
      hintEn: 'Worst case: first draws are all different colors. There are 5 colors...'
      answer: '最坏情况先抽 5 只、每种颜色各 1 只。第 6 只一定和前面某只同色。答案：6 只。'
      answerEn: 'Worst case: first 5 are all different colors. The 6th must match one. Answer: 6 socks.'
    - title: '铺垫：奇偶性判断'
      titleEn: 'Warm-up: Parity Check'
      question: '不做计算，判断 $37 + 48 + 51$ 的结果是奇数还是偶数？'
      questionEn: 'Without calculating, is $37 + 48 + 51$ odd or even?'
      hint: '奇+偶=奇，奇+奇=偶。先看每个数的奇偶性：37(奇)，48(偶)，51(奇)'
      hintEn: 'odd+even=odd, odd+odd=even. Check each: 37(odd), 48(even), 51(odd)'
      answer: '奇+偶=奇，奇+奇=偶。所以结果是偶数。（验证：37+48+51=136，偶数 ✓）'
      answerEn: 'odd+even=odd, then odd+odd=even. So the result is even. (Check: 37+48+51=136, even ✓)'
    - title: '铺垫：逆推一步操作'
      titleEn: 'Warm-up: Reversing One Operation'
      question: '小明想一个数，乘以 3 后得到 21。原来的数是多少？'
      questionEn: 'Xiao Ming thinks of a number, multiplies by 3, and gets 21. What was the number?'
      hint: '逆推：乘以 3 的逆操作是除以 3'
      hintEn: 'Reverse: the inverse of multiplying by 3 is dividing by 3'
      answer: '$21 \div 3 = 7$。原来的数是 7。'
      answerEn: '$21 \div 3 = 7$. The original number was 7.'
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #8"
      section: 抽屉原理与奇偶分析
      question: '$100 - 98 + 96 - 94 + \cdots + 8 - 6 + 4 - 2$ 的值是多少？'
      questionEn: 'What is the value of $100 - 98 + 96 - 94 + \cdots + 8 - 6 + 4 - 2$?'
      choices:
        - label: A
          content: '20'
        - label: B
          content: '40'
        - label: C
          content: '50'
        - label: D
          content: '80'
        - label: E
          content: '100'
      correctValue: C
      answer: '(C) 50'
      answerEn: '(C) 50'
      explanation: |
        将相邻两项配对：$(100-98)+(96-94)+\cdots+(4-2)$。每对差为 $2$。
        从 100 到 2，每对跨 4 个数，共有 $(100-2)/4+1 = 25$ 对。
        总和 $= 25 \times 2 = \mathbf{50}$。
      explanationEn: |
        Pair adjacent terms: $(100-98)+(96-94)+\cdots+(4-2)$. Each pair equals $2$.
        From 100 to 2, each pair spans 4, so there are $(100-2)/4+1=25$ pairs.
        Total $= 25 \times 2 = \mathbf{50}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2022 #16"
      section: 抽屉原理与奇偶分析
      question: |
        四个数排成一行。前两个数的平均值是 21，中间两个数的平均值是 26，后两个数的平均值是 30。
        第一个数和最后一个数的平均值是多少？
      questionEn: |
        Four numbers are written in a row. The average of the first two is 21, the average of the middle two is 26, and the average of the last two is 30.
        What is the average of the first and last numbers?
      choices:
        - label: A
          content: '24'
        - label: B
          content: '25'
        - label: C
          content: '26'
        - label: D
          content: '27'
        - label: E
          content: '28'
      correctValue: B
      answer: '(B) 25'
      answerEn: '(B) 25'
      explanation: |
        设四个数为 $a, b, c, d$。由题意：$a+b=42$，$b+c=52$，$c+d=60$。
        求 $a+d$：$(a+b)+(c+d)-(b+c) = 42+60-52 = 50$。
        所以 $a+d=50$，平均值 $= 50/2 = \mathbf{25}$。
      explanationEn: |
        Let the four numbers be $a,b,c,d$. Given: $a+b=42$, $b+c=52$, $c+d=60$.
        Find $a+d$: $(a+b)+(c+d)-(b+c)=42+60-52=50$.
        Average of first and last $= 50/2 = \mathbf{25}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2016 #19"
      section: 抽屉原理与奇偶分析
      question: '25 个连续偶数之和为 10000。其中最大的数是多少？'
      questionEn: 'The sum of 25 consecutive even integers is 10000. What is the largest of these 25 consecutive even integers?'
      choices:
        - label: A
          content: '388'
        - label: B
          content: '398'
        - label: C
          content: '412'
        - label: D
          content: '416'
        - label: E
          content: '424'
      correctValue: E
      answer: '(E) 424'
      answerEn: '(E) 424'
      explanation: |
        25 个连续偶数，中间（第 13 个）为 $m$。和 $= 25m = 10000$，所以 $m = 400$。
        最大的是第 25 个，比 $m$ 大 $12 \times 2 = 24$。
        最大值 $= 400 + 24 = \mathbf{424}$。
      explanationEn: |
        The middle (13th) of 25 consecutive even integers is $m$. Sum $= 25m = 10000$, so $m=400$.
        The largest is the 25th, which is $12\times2=24$ more than $m$.
        Largest $= 400+24 = \mathbf{424}$.

    - number: 4
      type: 解答题
      inputType: open
      section: 抽屉原理与奇偶分析
      question: |
        教室里有 13 名同学坐在 12 张课桌旁。用<<抽屉原理/Pigeonhole Principle>>解释为什么至少有一张课桌旁坐了 2 名以上的同学。
      questionEn: |
        A classroom has 13 students seated at 12 desks. Use the <<抽屉原理/Pigeonhole Principle>> to explain why at least one desk must have 2 or more students.
      answer: |
        将 13 名同学视为"物品"，12 张课桌视为"抽屉"。
        因为物品数 $13 > $ 抽屉数 $12$，由抽屉原理，至少有一个抽屉（课桌）包含 $\ge 2$ 个物品（同学）。
      answerEn: |
        Treat the 13 students as "items" and the 12 desks as "boxes."
        Since items $13 > $ boxes $12$, by the Pigeonhole Principle, at least one box (desk) contains $\ge 2$ items (students).

    - number: 5
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #9"
      section: 不变量与逻辑推理
      question: |
        一个 $4 \times 4 \times 4$ 的正方体蛋糕，顶部和四个侧面涂了糖霜（底部没有）。
        将蛋糕切成 64 个 $1 \times 1 \times 1$ 的小方块。有多少个小方块恰好有两个面涂了糖霜？
      questionEn: |
        A $4\times4\times4$ cube-shaped cake has icing on the top and all four side faces (but not the bottom).
        The cake is cut into 64 unit cubes. How many unit cubes have icing on exactly two faces?
      choices:
        - label: A
          content: '12'
        - label: B
          content: '16'
        - label: C
          content: '18'
        - label: D
          content: '20'
        - label: E
          content: '24'
      correctValue: D
      answer: '(D) 20'
      answerEn: '(D) 20'
      explanation: |
        系统分析恰好有 2 面涂糖霜的小方块：

        **顶层**（16 个小方块）：
        - 4 个角块：每个有顶面 + 2 个侧面 = 3 面糖霜（不符合）
        - 8 个边块（非角）：每个有顶面 + 1 个侧面 = 2 面糖霜 ✓ → **8 个**
        - 4 个内部块：只有顶面 = 1 面（不符合）

        **中间两层**（第 2、3 层，各 16 个）：
        - 每层 4 个角块（竖直棱上）：2 个侧面 = 2 面糖霜 ✓ → 每层 4 个，两层共 **8 个**
        - 每层 8 个边块（非角，贴侧面）：1 个侧面 = 1 面（不符合）
        - 内部块：0 面（不符合）

        **底层**（16 个小方块，底面无糖霜）：
        - 4 个角块：2 个侧面 = 2 面糖霜 ✓ → **4 个**
        - 8 个边块（非角，贴侧面）：1 个侧面 = 1 面（不符合）
        - 内部块：0 面（不符合）

        总计：$8 + 8 + 4 = \mathbf{20}$。
      explanationEn: |
        Systematically count cubes with exactly 2 iced faces:

        **Top layer** (16 cubes):
        - 4 corner cubes: top + 2 side faces = 3 iced (not 2)
        - 8 edge cubes (non-corner): top + 1 side = 2 iced ✓ → **8**
        - 4 interior cubes: top only = 1 (not 2)

        **Middle two layers** (layers 2 and 3, 16 each):
        - 4 corner cubes per layer (on vertical edges): 2 side faces = 2 iced ✓ → 2 layers × 4 = **8**
        - Edge cubes (non-corner, on sides): 1 side = 1 (not 2)
        - Interior: 0 (not 2)

        **Bottom layer** (16 cubes, no bottom icing):
        - 4 corner cubes: 2 side faces = 2 iced ✓ → **4**
        - Edge cubes (non-corner): 1 side = 1 (not 2)
        - Interior: 0 (not 2)

        Total: $8 + 8 + 4 = \mathbf{20}$.

    - number: 6
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #17"
      section: 不变量与逻辑推理
      question: |
        若干个箱子用来装金币。如果每个箱子装 9 枚金币，有 2 个箱子空着。
        如果每个箱子装 6 枚金币，剩余 3 枚金币装不下。
        共有多少枚金币？
      questionEn: |
        Gold coins are distributed among several treasure chests. If 9 coins are placed in each chest, 2 chests remain empty.
        If 6 coins are placed in each chest, 3 coins are left over.
        How many gold coins are there?
      choices:
        - label: A
          content: '9'
        - label: B
          content: '27'
        - label: C
          content: '45'
        - label: D
          content: '63'
        - label: E
          content: '81'
      correctValue: C
      answer: '(C) 45'
      answerEn: '(C) 45'
      explanation: |
        设箱子数为 $c$，金币数为 $n$。
        条件一：$n = 9(c - 2) = 9c - 18$（2 个箱子空着）。
        条件二：$n = 6c + 3$（剩余 3 枚）。
        联立：$9c - 18 = 6c + 3$，解得 $3c = 21$，$c = 7$。
        $n = 6 \times 7 + 3 = \mathbf{45}$。
        验证：$45 = 9 \times (7-2) = 9 \times 5$ ✓，$45 = 6 \times 7 + 3$ ✓。

        💡 **另一种方法——代入选项逐个试：**
        直接拿 5 个选项逐个验证：
        (A) $n=9$：每箱 6 个需 $\frac{9-3}{6}=1$ 个箱子；每箱 9 个需 1 个箱子，空 $-1$ 个？不合理 ✗
        (B) $n=27$：每箱 6 个需 4 个箱子余 3 ✓；每箱 9 个需 3 个箱子，空 $4-3=1 \neq 2$ ✗
        (C) $n=45$：每箱 6 个需 7 个箱子余 3 ✓；每箱 9 个用 5 个箱子，空 $7-5=2$ ✓ 答案！
      explanationEn: |
        Let $c$ = number of chests, $n$ = number of coins.
        Condition 1: $n = 9(c-2) = 9c - 18$ (2 chests empty).
        Condition 2: $n = 6c + 3$ (3 coins left over).
        Equate: $9c-18 = 6c+3 \Rightarrow 3c=21 \Rightarrow c=7$.
        $n = 6\times7 + 3 = \mathbf{45}$.
        Check: $45 = 9\times5$ ✓, $45 = 6\times7+3$ ✓.

        💡 **Alternative — Plug In Each Choice:**
        Test each answer directly:
        (A) $n=9$: 6 per chest needs 1 chest remainder 3 ✓; 9 per chest needs 1, empty $= 0 \neq 2$ ✗
        (B) $n=27$: 6 per chest needs 4, remainder 3 ✓; 9 per chest needs 3, empty $= 1 \neq 2$ ✗
        (C) $n=45$: 6 per chest needs 7, remainder 3 ✓; 9 per chest uses 5, empty $= 7-5 = 2$ ✓ Answer!

    - number: 7
      type: 单选题
      inputType: mc
      source: "AMC 8 2018 #5"
      section: 不变量与逻辑推理
      question: '$1 + 3 + 5 + \cdots + 2017 + 2019 - 2 - 4 - 6 - \cdots - 2016 - 2018$ 的值是多少？'
      questionEn: 'What is $1 + 3 + 5 + \cdots + 2017 + 2019 - 2 - 4 - 6 - \cdots - 2016 - 2018$?'
      choices:
        - label: A
          content: '$-1010$'
        - label: B
          content: '$-1009$'
        - label: C
          content: '$1008$'
        - label: D
          content: '$1009$'
        - label: E
          content: '$1010$'
      correctValue: E
      answer: '(E) 1010'
      answerEn: '(E) 1010'
      explanation: |
        重新排列，将相邻奇偶数配对：
        $(1 - 2) + (3 - 4) + (5 - 6) + \cdots + (2017 - 2018) + 2019$

        从 1 到 2018，每对 $(2k-1) - 2k = -1$。共有 $2018/2 = 1009$ 对。
        总和 $= 1009 \times (-1) + 2019 = -1009 + 2019 = \mathbf{1010}$。
      explanationEn: |
        Rearrange by pairing adjacent odd and even:
        $(1-2)+(3-4)+(5-6)+\cdots+(2017-2018)+2019$

        From 1 to 2018, each pair $(2k-1)-2k = -1$. There are $2018/2=1009$ pairs.
        Sum $= 1009\times(-1)+2019 = -1009+2019 = \mathbf{1010}$.

    - number: 8
      type: 单选题
      inputType: mc
      section: 不变量与逻辑推理
      question: |
        黑板上写着数字 $1, 2, 3, \ldots, 10$。每次操作：擦掉两个数 $a, b$，写上 $a + b$。经过 9 次操作后，黑板上只剩一个数。这个数是多少？
      questionEn: |
        The numbers $1, 2, 3, \ldots, 10$ are written on a board. In each step, two numbers $a$ and $b$ are erased and replaced by $a+b$. After 9 steps, only one number remains. What is that number?
      choices:
