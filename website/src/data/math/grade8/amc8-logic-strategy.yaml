summary:
  - '<<抽屉原理/Pigeonhole Principle>>：$n+1$ 个物品放入 $n$ 个抽屉，至少有一个抽屉有 $\ge 2$ 个——关键在于巧妙定义"抽屉"'
  - '<<奇偶分析/Parity analysis>>：同奇偶相加得偶，有偶相乘得偶——用来排除不可能或缩小答案范围'
  - '<<不变量/Invariant>>：找到过程中不变的量，若初始和目标的不变量值不同，则不可能达到'
  - '<<逆推法/Working backwards>>：从已知终点逆向操作回到起点，特别适合多步操作题'
  - '<<排除法/Process of elimination>>：利用奇偶性、量级估算、末位分析快速排除错误选项'
  - '"先判断后计算"——在 AMC 8 中，10 秒的逻辑分析常常能省下 2 分钟的计算'
summaryEn:
  - '<<抽屉原理/Pigeonhole Principle>>: $n+1$ items into $n$ boxes means at least one has $\ge 2$ — the key is defining the "boxes" cleverly'
  - '<<奇偶分析/Parity analysis>>: same parity sums are even, any even factor makes an even product — use to rule out impossibility or narrow choices'
  - '<<不变量/Invariant>>: find a quantity unchanged by the process; if start and target differ, the target is unreachable'
  - '<<逆推法/Working backwards>>: reverse operations from a known endpoint back to the start — ideal for multi-step problems'
  - '<<排除法/Process of elimination>>: use parity, estimation, last-digit analysis to quickly cross out wrong choices'
  - '"Judge before you compute" — on AMC 8, 10 seconds of logical analysis often saves 2 minutes of calculation'

examPrep:
  intro: 以下为综合性较强的 AMC 8 真题精选，需要灵活运用本章的逻辑与策略工具。
  introEn: The following are selected AMC 8 problems of higher difficulty, requiring flexible use of the logic and strategy tools from this chapter.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2020 #22"
      section: 综合
      question: |
        一台机器执行以下操作：如果输入 $N$ 是偶数，输出 $N/2$；如果 $N$ 是奇数，输出 $3N+1$。
        某个正整数 $N$ 经过恰好 6 步操作后得到 1。所有这样的 $N$ 之和是多少？

        (A) 73 &emsp; (B) 74 &emsp; (C) 75 &emsp; (D) 82 &emsp; (E) 83
      questionEn: |
        A machine applies the rule: if $N$ is even, output $N/2$; if odd, output $3N+1$.
        A positive integer $N$ reaches 1 after exactly 6 steps. What is the sum of all such $N$?

        (A) 73 &emsp; (B) 74 &emsp; (C) 75 &emsp; (D) 82 &emsp; (E) 83
      choices:
        - label: A
          content: '73'
        - label: B
          content: '74'
        - label: C
          content: '75'
        - label: D
          content: '82'
        - label: E
          content: '83'
      correctValue: E
      answer: '(E) 83'
      answerEn: '(E) 83'
      explanation: |
        从 $a_6 = 1$ 逆推 6 步。
        $a_5 = 2$（唯一可能）。$a_4 = 4$（唯一）。$a_3 \in \{1, 8\}$。

        分支 $a_3 = 8$：$a_2 = 16$，$a_1 \in \{5, 32\}$。
        从 $a_1 = 32$：$N = 64$。从 $a_1 = 5$：$N = 10$。

        分支 $a_3 = 1$：$a_2 = 2$，$a_1 = 4$，$N \in \{1, 8\}$。

        所有 $N$：$\{1, 8, 10, 64\}$。和 $= 1 + 8 + 10 + 64 = \mathbf{83}$。
      explanationEn: |
        Work backwards from $a_6=1$.
        $a_5=2$ (only option). $a_4=4$ (only option). $a_3 \in \{1,8\}$.

        Branch $a_3=8$: $a_2=16$, $a_1 \in \{5,32\}$.
        From $a_1=32$: $N=64$. From $a_1=5$: $N=10$.

        Branch $a_3=1$: $a_2=2$, $a_1=4$, $N \in \{1,8\}$.

        All $N$: $\{1,8,10,64\}$. Sum $= 1+8+10+64 = \mathbf{83}$.

    - number: 2
      type: 单选题
      inputType: mc
      source: "AMC 8 2017 #21"
      section: 综合
      question: |
        设 $a$、$b$、$c$ 是非零实数，且 $a + b + c = 0$。
        求 $\dfrac{a}{|a|} + \dfrac{b}{|b|} + \dfrac{c}{|c|} + \dfrac{abc}{|abc|}$ 的所有可能值。

        (A) 0 &emsp; (B) 1 和 $-1$ &emsp; (C) 2 和 $-2$ &emsp; (D) 0、2 和 $-2$ &emsp; (E) 0、1 和 $-1$
      questionEn: |
        Let $a$, $b$, $c$ be nonzero reals with $a+b+c=0$.
        What are all possible values of $\dfrac{a}{|a|}+\dfrac{b}{|b|}+\dfrac{c}{|c|}+\dfrac{abc}{|abc|}$?

        (A) 0 &emsp; (B) 1 and $-1$ &emsp; (C) 2 and $-2$ &emsp; (D) 0, 2, and $-2$ &emsp; (E) 0, 1, and $-1$
      choices:
        - label: A
          content: '0'
        - label: B
          content: '1 和 $-1$'
        - label: C
          content: '2 和 $-2$'
        - label: D
          content: '0、2 和 $-2$'
        - label: E
          content: '0、1 和 $-1$'
      correctValue: A
      answer: '(A) 0'
      answerEn: '(A) 0'
      explanation: |
        $a + b + c = 0$ 意味着不能同号，必定两正一负或两负一正。
        两正一负：符号和 $= 1 + 1 - 1 = 1$，积为负，$\dfrac{abc}{|abc|} = -1$。总和 $= 0$。
        两负一正：符号和 $= -1 - 1 + 1 = -1$，积为正，$\dfrac{abc}{|abc|} = 1$。总和 $= 0$。
        唯一可能值为 $\mathbf{0}$。
      explanationEn: |
        $a+b+c=0$ means they can't all share a sign: two share one sign, one is opposite.
        Two positive, one negative: sign sum $=1+1-1=1$, product negative, $\dfrac{abc}{|abc|}=-1$. Total $=0$.
        Two negative, one positive: sign sum $=-1-1+1=-1$, product positive, $\dfrac{abc}{|abc|}=1$. Total $=0$.
        Only possible value: $\mathbf{0}$.

    - number: 3
      type: 单选题
      inputType: mc
      source: "AMC 8 2023 #22"
      section: 综合
      question: |
        在一个数列中，从第三项开始，每一项等于前两项之积。已知第六项为 4000。第一项是多少？

        (A) 1 &emsp; (B) 2 &emsp; (C) 3 &emsp; (D) 5 &emsp; (E) 10
      questionEn: |
        In a sequence, each term from the third onward equals the product of the two preceding terms. The sixth term is 4000. What is the first term?

        (A) 1 &emsp; (B) 2 &emsp; (C) 3 &emsp; (D) 5 &emsp; (E) 10
      choices:
        - label: A
          content: '1'
        - label: B
          content: '2'
        - label: C
          content: '3'
        - label: D
          content: '5'
        - label: E
          content: '10'
      correctValue: D
      answer: '(D) 5'
      answerEn: '(D) 5'
      explanation: |
        设 $a_1 = a, a_2 = b$。
        $a_3 = ab$, $a_4 = ab^{2}$, $a_5 = a^{2}b^{3}$, $a_6 = a^{3}b^{5} = 4000$。

        $4000 = 2^{5} \times 5^{3}$。比较 $a^{3}b^{5}$：$a = 5, b = 2$ 满足 $5^{3} \times 2^{5} = 125 \times 32 = 4000$ ✓。

        第一项 $= \mathbf{5}$。
      explanationEn: |
        Let $a_1=a, a_2=b$.
        $a_3=ab$, $a_4=ab^{2}$, $a_5=a^{2}b^{3}$, $a_6=a^{3}b^{5}=4000$.

        $4000=2^{5}\times5^{3}$. Match $a^{3}b^{5}$: $a=5, b=2$ gives $5^{3}\times2^{5}=125\times32=4000$ ✓.

        First term $= \mathbf{5}$.

    - number: 4
      type: 单选题
      inputType: mc
      section: 综合
      question: |
        黑板上写着 $1, 2, 3, \ldots, 10$。每次操作擦掉任意两个数 $a, b$，写上 $|a - b|$。经过 9 次操作后剩下一个数。以下哪个数**不可能**是最终剩下的数？

        (A) 1 &emsp; (B) 3 &emsp; (C) 5 &emsp; (D) 7 &emsp; (E) 8
      questionEn: |
        The numbers $1, 2, 3, \ldots, 10$ are written on a board. In each step, two numbers $a$ and $b$ are erased and $|a-b|$ is written. After 9 steps, one number remains. Which of the following **cannot** be the final number?

        (A) 1 &emsp; (B) 3 &emsp; (C) 5 &emsp; (D) 7 &emsp; (E) 8
      choices:
        - label: A
          content: '1'
        - label: B
          content: '3'
        - label: C
          content: '5'
        - label: D
          content: '7'
        - label: E
          content: '8'
      correctValue: E
      answer: '(E) 8'
      answerEn: '(E) 8'
      explanation: |
        **不变量分析**：每次操作擦掉 $a, b$，写上 $|a-b|$。

        关键观察：最终结果等于 $|\pm 1 \pm 2 \pm 3 \cdots \pm 10|$（每个数前选 $+$ 或 $-$）。

        初始和 $= 1 + 2 + \cdots + 10 = 55$。如果把某些数从 $+$ 翻转为 $-$，和变为 $55 - 2S$（$S$ 是翻转的数之和）。

        **不变量**：$55 - 2S$ 与 $55$ 的奇偶性相同。$55$ 是奇数，所以最终结果必须是奇数。

        选项中 $8$ 是偶数，所以 $8$ **不可能**。

        验证 $1$ 可能：$55 - 2S = 1$，$S = 27$。需要 $\{1,\ldots,10\}$ 的子集和为 27。如 $\{10, 9, 8\}$，和 $= 27$ ✓。
      explanationEn: |
        **Invariant analysis**: each step erases $a, b$ and writes $|a-b|$.

        Key observation: the final result equals $|\pm1 \pm2 \pm3 \cdots \pm10|$ (choose $+$ or $-$ for each number).

        Initial sum $= 1+2+\cdots+10 = 55$. Flipping some signs gives $55-2S$ ($S$ = sum of flipped numbers).

        **Invariant**: $55-2S$ has the same parity as $55$. Since $55$ is odd, the result must be odd.

        $8$ is even, so $8$ is **impossible**.

        Check that $1$ is possible: $55-2S=1$, $S=27$. Subset $\{10,9,8\}$ sums to $27$ ✓.

    - number: 5
      type: 单选题
      inputType: mc
      section: 综合
      question: |
        有 30 名学生参加考试，每题答对得 4 分，答错扣 1 分，不答得 0 分。共 25 题。
        小红的得分是 87 分。她答对了多少题？

        (A) 20 &emsp; (B) 21 &emsp; (C) 22 &emsp; (D) 23 &emsp; (E) 24
      questionEn: |
        30 students take a test with 25 questions. Each correct answer scores 4 points, each wrong answer loses 1 point, and unanswered questions score 0.
        Xiao Hong scored 87. How many questions did she answer correctly?

        (A) 20 &emsp; (B) 21 &emsp; (C) 22 &emsp; (D) 23 &emsp; (E) 24
      choices:
        - label: A
          content: '20'
        - label: B
          content: '21'
        - label: C
          content: '22'
        - label: D
          content: '23'
        - label: E
          content: '24'
      correctValue: C
      answer: '(C) 22'
      answerEn: '(C) 22'
      explanation: |
        设答对 $r$ 题，答错 $w$ 题，未答 $s$ 题。
        $r + w + s = 25$，$4r - w = 87$。

        从第二个方程：$w = 4r - 87$。代入第一个：$r + 4r - 87 + s = 25$，$5r + s = 112$。

        因为 $w \ge 0$：$4r \ge 87$，$r \ge 21.75$，$r \ge 22$。
        因为 $s \ge 0$：$5r \le 112$，$r \le 22.4$，$r \le 22$。

        所以 $r = \mathbf{22}$。此时 $w = 88 - 87 = 1$，$s = 2$。验证：$22 \times 4 - 1 = 87$ ✓。
      explanationEn: |
        Let $r$ = correct, $w$ = wrong, $s$ = skipped.
        $r+w+s=25$, $4r-w=87$.

        From the second: $w=4r-87$. Substituting: $5r+s=112$.

        $w\ge0$: $r\ge22$. $s\ge0$: $r\le22$. So $r=\mathbf{22}$.
        Check: $w=1, s=2$, score $=22\times4-1=87$ ✓.
