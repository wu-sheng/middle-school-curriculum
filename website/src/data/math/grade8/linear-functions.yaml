      $y = -3 \times (-2) = 6$
    explanationEn: |
      $k = -3 < 0$, so the graph passes through Quadrants II and IV (top-left to bottom-right) and is decreasing.
      $y = -3 \times (-2) = 6$

  - id: q3
    type: fill
    question: |
      <<一次函数/linear function>> $y = 2x - 4$ 的 $y$ 轴截距为______，$x$ 轴截距（零点）为______，图象经过第______、______、______象限。
    questionEn: |
      The <<一次函数/linear function>> $y = 2x - 4$ has $y$-intercept ______, $x$-intercept (zero) ______, and its graph passes through Quadrants ______, ______, and ______.
    answer: '-4；2；一、三、四'
    answerEn: '-4; 2; I, III, IV'
    explanation: |
      $b = -4$（令 $x=0$，$y=-4$），$x$ 轴截距令 $y=0$：$2x-4=0$，$x=2$。
      $k=2>0$（递增），$b=-4<0$：经过第一、三、四象限。
    explanationEn: |
      $b = -4$ (set $x=0$, $y=-4$); $x$-intercept: set $y=0$, $2x-4=0$, $x=2$.
      $k=2>0$ (increasing), $b=-4<0$: passes through Quadrants I, III, IV.

  - id: q4
    type: choice
    question: |
      已知<<一次函数/linear function>> $y = kx + b$，其图象如下描述：从左向右，直线由高变低；且直线与 $y$ 轴的交点在 $x$ 轴下方。则（　）
    questionEn: |
      The graph of a <<一次函数/linear function>> $y = kx + b$ has the following properties: from left to right, the line goes from high to low; and the line crosses the $y$-axis below the $x$-axis. Which is correct?
    options:
      - 'A. $k > 0$，$b > 0$'
      - 'B. $k > 0$，$b < 0$'
      - 'C. $k < 0$，$b > 0$'
      - 'D. $k < 0$，$b < 0$'
    optionsEn:
      - 'A. $k > 0$, $b > 0$'
      - 'B. $k > 0$, $b < 0$'
      - 'C. $k < 0$, $b > 0$'
      - 'D. $k < 0$, $b < 0$'
    answer: D
    explanation: |
      "从高变低"（递减）→ $k < 0$；
      "与 $y$ 轴交点在 $x$ 轴下方"→ $b < 0$。
      选 D。
    explanationEn: |
      "From high to low" (decreasing) → $k < 0$;
      "crosses $y$-axis below $x$-axis" → $b < 0$.
      Answer: D.

  - id: q5
    type: fill
    question: |
      已知<<一次函数/linear function>> $y = kx + b$ 经过点 $(0, 3)$ 和 $(2, 7)$，则 $k$ = ______，$b$ = ______，函数解析式为 $y$ = ______。
    questionEn: |
      The <<一次函数/linear function>> $y = kx + b$ passes through $(0, 3)$ and $(2, 7)$. Find $k$ = ______, $b$ = ______, and the formula $y$ = ______.
    answer: 'k = 2；b = 3；y = 2x + 3'
    answerEn: 'k = 2; b = 3; y = 2x + 3'
    explanation: |
      $(0, 3)$ 是 $y$ 轴上的点，所以直接得 $b = 3$。
      代入 $(2, 7)$：$7 = 2k + 3$，$k = 2$。
      所以 $y = 2x + 3$。
    explanationEn: |
      $(0, 3)$ is on the $y$-axis, so $b = 3$ directly.
      Substitute $(2, 7)$: $7 = 2k + 3$, $k = 2$.
      Therefore $y = 2x + 3$.

  - id: q6
    type: fill
    question: |
      一次函数 $y = kx + b$ 的图象平行于直线 $y = -2x + 1$，且经过点 $(1, 5)$，则该<<一次函数/linear function>>的解析式为 $y$ = ______。
    questionEn: |
      The graph of a <<一次函数/linear function>> $y = kx + b$ is parallel to the line $y = -2x + 1$ and passes through $(1, 5)$. Find the formula $y$ = ______.
    answer: 'y = -2x + 7'
    answerEn: 'y = -2x + 7'
    explanation: |
      平行 → $k = -2$（斜率相同）。
      代入 $(1, 5)$：$5 = -2 \times 1 + b$，$b = 7$。
      所以 $y = -2x + 7$（$b = 7 \neq 1$，确实与 $y = -2x + 1$ 平行）。
    explanationEn: |
      Parallel → $k = -2$ (equal slopes).
      Substitute $(1, 5)$: $5 = -2 \times 1 + b$, $b = 7$.
      Therefore $y = -2x + 7$ ($b = 7 \neq 1$, confirming it is parallel to $y = -2x + 1$).

  - id: q7
    type: truefalse
    question: |
      判断正误：<<一次函数/linear function>> $y = kx + b$ 中，若 $k > 0$ 且 $b > 0$，则函数图象一定经过第一、二、三象限。
    questionEn: |
      True or False: In the <<一次函数/linear function>> $y = kx + b$, if $k > 0$ and $b > 0$, then the graph must pass through Quadrants I, II, and III.
    answer: '正确 / True'
    explanation: |
      $k > 0$：递增，直线从左下向右上（经过第一、三象限方向）。
      $b > 0$：$y$ 轴截距在 $x$ 轴上方，直线经过第二象限。
      $x$ 轴截距 $= -b/k < 0$（负数），所以截距点在负 $x$ 轴上，直线向左延伸会进入第三象限（$x < -b/k$ 时 $y < 0$）——但在原点右侧，直线一直在上方。
      综合：经过第一、二、三象限，**不经过第四象限**。题目说"一、二、三"，**正确** ✓
    explanationEn: |
      $k > 0$: increasing, line goes from bottom-left to top-right (covers Quadrants I and III direction).
      $b > 0$: $y$-intercept above the $x$-axis, so the line enters Quadrant II.
      $x$-intercept $= -b/k < 0$ (negative), so the line extends into Quadrant III on the left.
      Result: passes through Quadrants I, II, and III; does **not** pass through Quadrant IV. The statement says "I, II, III" — **True** ✓

  - id: q8
    type: choice
    question: |
      函数 $y_1 = 2x + 3$ 和 $y_2 = 2x - 1$ 的图象关系是（　）
    questionEn: |
      The graphs of $y_1 = 2x + 3$ and $y_2 = 2x - 1$ are:
    options:
      - A. 相交于一点
      - B. 平行（互不相交）
      - C. 重合
      - D. 垂直
    optionsEn:
      - A. Intersect at one point
      - B. Parallel (do not intersect)
      - C. Coincident
      - D. Perpendicular
    answer: B
    explanation: |
      两函数<<斜率/slope>>相同（都是 $k = 2$），但截距不同（$b_1 = 3 \neq -1 = b_2$），所以两直线**平行**。
    explanationEn: |
      Both functions have the same <<斜率/slope>> ($k = 2$) but different intercepts ($b_1 = 3 \neq -1 = b_2$), so the two lines are **parallel**.

  - id: q9
    type: fill
    question: |
      用图象法解不等式：一次函数 $y = 3x - 6$，当 $y > 0$ 时，$x$ 的取值范围是______；当 $y < 0$ 时，$x$ 的取值范围是______。
    questionEn: |
      Use a graph to solve: for the <<一次函数/linear function>> $y = 3x - 6$, find the range of $x$ when $y > 0$: ______; when $y < 0$: ______.
    answer: 'x > 2；x < 2'
    answerEn: 'x > 2; x < 2'
    explanation: |
      $x$ 轴截距：令 $y = 0$，$3x - 6 = 0$，$x = 2$。
      $k = 3 > 0$（递增），所以：$x > 2$ 时 $y > 0$（直线在 $x$ 轴上方）；$x < 2$ 时 $y < 0$（直线在 $x$ 轴下方）。
    explanationEn: |
      $x$-intercept: set $y = 0$, $3x - 6 = 0$, $x = 2$.
      $k = 3 > 0$ (increasing), so: $x > 2$ gives $y > 0$ (line above $x$-axis); $x < 2$ gives $y < 0$ (line below $x$-axis).

  - id: q10
    type: fill
    question: |
      已知两<<一次函数/linear function>>：$y_1 = x + 3$ 和 $y_2 = -2x + 6$。
      （1）两直线的交点坐标是（______，______）。
      （2）满足 $y_1 > y_2$ 的 $x$ 的范围是______。
    questionEn: |
      Given two <<一次函数/linear function>>s: $y_1 = x + 3$ and $y_2 = -2x + 6$.
      (1) The intersection point of the two lines is (______, ______).
      (2) The range of $x$ satisfying $y_1 > y_2$ is ______.
    answer: '(1, 4)；x > 1'
    answerEn: '(1, 4); x > 1'
    explanation: |
      令 $y_1 = y_2$：$x + 3 = -2x + 6$，$3x = 3$，$x = 1$；代入：$y = 4$。交点 $(1, 4)$。
      $y_1 > y_2$：$x + 3 > -2x + 6$，$3x > 3$，$x > 1$。
    explanationEn: |
      Set $y_1 = y_2$: $x + 3 = -2x + 6$, $3x = 3$, $x = 1$; substitute: $y = 4$. Intersection $(1, 4)$.
      $y_1 > y_2$: $x + 3 > -2x + 6$, $3x > 3$, $x > 1$.

  - id: q11
    type: choice
    question: |
      某<<一次函数/linear function>>图象过点 $(a, 3)$ 和 $(a+2, 7)$，则该函数的<<斜率/slope>> $k$ 等于（　）
    questionEn: |
      A <<一次函数/linear function>> passes through $(a, 3)$ and $(a+2, 7)$. Its <<斜率/slope>> $k$ equals:
    options:
      - 'A. $\dfrac{4}{2} = 2$'
      - 'B. $\dfrac{7}{a+2}$'
      - 'C. $\dfrac{4}{a}$'
      - 'D. 无法确定'
    optionsEn:
      - 'A. $\dfrac{4}{2} = 2$'
      - 'B. $\dfrac{7}{a+2}$'
      - 'C. $\dfrac{4}{a}$'
      - 'D. Cannot be determined'
    answer: A
    explanation: |
      $k = \dfrac{y_2 - y_1}{x_2 - x_1} = \dfrac{7 - 3}{(a+2) - a} = \dfrac{4}{2} = 2$
      注意：$a$ 的具体值不影响<<斜率/slope>>的计算——只要两点的纵坐标差为 $4$，横坐标差为 $2$，斜率就是 $2$。
    explanationEn: |
      $k = \dfrac{y_2 - y_1}{x_2 - x_1} = \dfrac{7 - 3}{(a+2) - a} = \dfrac{4}{2} = 2$
      Note: the specific value of $a$ does not affect the slope calculation — as long as the difference in $y$-values is 4 and in $x$-values is 2, the slope is 2.

  - id: q12
    type: fill
    question: |
      某工厂电费的计算方式：每月用电量不超过 $100$ 度时，单价 $0.5$ 元/度；超过 $100$ 度的部分，单价 $0.8$ 元/度。
      （1）若本月用电 $80$ 度，电费为______元。
      （2）若本月用电 $x$ 度（$x > 100$），电费 $y$ = ______元（用含 $x$ 的式子表示）。
      （3）若本月电费为 $74$ 元，用电量为______度。
    questionEn: |
      A factory's electricity billing: up to 100 kWh per month at 0.5 yuan/kWh; above 100 kWh, the excess is charged at 0.8 yuan/kWh.
      (1) If this month's usage is 80 kWh, the bill is ______ yuan.
      (2) If this month's usage is $x$ kWh ($x > 100$), the bill $y$ = ______ yuan (express in terms of $x$).
      (3) If this month's bill is 74 yuan, the usage is ______ kWh.
    answer: '40；y = 0.8x - 30；130'
    answerEn: '40; y = 0.8x - 30; 130'
    explanation: |
      (1) $80 \times 0.5 = 40$ 元。
      (2) 前 $100$ 度：$100 \times 0.5 = 50$ 元；超出 $(x-100)$ 度：$(x-100) \times 0.8$ 元。
      $y = 50 + 0.8(x-100) = 50 + 0.8x - 80 = 0.8x - 30$
      (3) $0.8x - 30 = 74$，$0.8x = 104$，$x = 130$ 度。
    explanationEn: |
      (1) $80 \times 0.5 = 40$ yuan.
      (2) First 100 kWh: $100 \times 0.5 = 50$ yuan; excess $(x-100)$ kWh: $(x-100) \times 0.8$ yuan.
      $y = 50 + 0.8(x-100) = 50 + 0.8x - 80 = 0.8x - 30$
      (3) $0.8x - 30 = 74$, $0.8x = 104$, $x = 130$ kWh.

  - id: q13
    type: fill
    question: |
      已知<<正比例函数/direct proportion function>> $y = kx$ 和<<一次函数/linear function>> $y = x + b$ 的图象交于点 $(2, m)$。
      （1）求 $m$ 的值（用 $k$ 和 $b$ 表示，或直接求出）。
      （2）若还知道交点在第一象限，且 $k = 3$，求 $b$ 的取值范围，并求交点坐标。
    questionEn: |
      The graphs of the <<正比例函数/direct proportion function>> $y = kx$ and the <<一次函数/linear function>> $y = x + b$ intersect at $(2, m)$.
      (1) Find the value of $m$ (express in terms of $k$ and $b$, or find it directly).
      (2) If the intersection point is in Quadrant I and $k = 3$, find the range of $b$ and the intersection coordinates.
    answer: '(1) m = 2k（或 m = 2 + b）；(2) b < -2（使第一象限），但m>0要求m=2k=6>0成立，b = -4，交点 (2,6)'
    answerEn: '(1) m = 2k (or m = 2 + b); (2) b = -4, intersection (2, 6)'
    explanation: |
      (1) 交点 $(2, m)$ 在两函数图象上：
      代入 $y = kx$：$m = 2k$
      代入 $y = x + b$：$m = 2 + b$
      所以 $2k = 2 + b$，$m = 2k$（也可写 $m = 2 + b$）。

      (2) $k = 3$：$m = 2 \times 3 = 6$，所以交点为 $(2, 6)$。
      由 $m = 2 + b$：$6 = 2 + b$，$b = -4$。
      验证：交点 $(2, 6)$ 在第一象限（$x = 2 > 0$，$y = 6 > 0$）✓
    explanationEn: |
      (1) The intersection point $(2, m)$ lies on both graphs:
      From $y = kx$: $m = 2k$
      From $y = x + b$: $m = 2 + b$
      So $2k = 2 + b$ and $m = 2k$ (equivalently $m = 2 + b$).

      (2) With $k = 3$: $m = 2 \times 3 = 6$, so the intersection is $(2, 6)$.
      From $m = 2 + b$: $6 = 2 + b$, $b = -4$.
      Check: $(2, 6)$ is in Quadrant I ($x = 2 > 0$, $y = 6 > 0$) ✓

examPrep:
  title: 章末提升
  titleEn: Challenge
  intro: |
    本章综合提升题，重点考查<<一次函数/linear function>>的综合运用、易错点和多知识点交叉。难度高于课内练习，请认真分析。
  introEn: |
    End-of-chapter challenge problems focusing on comprehensive application of <<一次函数/linear function>>s, common errors, and cross-topic reasoning. Difficulty is above the regular exercises.
  problems:
    - id: ep1
      type: choice
      question: |
        已知<<一次函数/linear function>> $y = (m-1)x + m^{2} - 1$，若该函数的图象经过原点，则 $m$ 的值为（　）
      questionEn: |
        The graph of the <<一次函数/linear function>> $y = (m-1)x + m^{2} - 1$ passes through the origin. The value of $m$ is:
      options:
        - 'A. $m = 1$'
        - 'B. $m = -1$'
        - 'C. $m = 1$ 或 $m = -1$'
        - 'D. $m = -1$（排除 $m=1$）'
      optionsEn:
        - 'A. $m = 1$'
        - 'B. $m = -1$'
        - 'C. $m = 1$ or $m = -1$'
        - 'D. $m = -1$ (excluding $m = 1$)'
      answer: D
      explanation: |
        图象过原点 → 令 $x = 0$，$y = 0$：$b = m^{2} - 1 = 0$，解得 $m = 1$ 或 $m = -1$。

        但必须满足<<一次函数/linear function>>的条件：$k = m - 1 \neq 0$，即 $m \neq 1$。

        所以排除 $m = 1$（若 $m = 1$，则 $k = 0$，函数变成常数函数 $y = 0$，不是一次函数）。

        因此只有 $m = -1$ 满足条件：$k = -1 - 1 = -2 \neq 0$，$b = 1 - 1 = 0$ ✓
      explanationEn: |
        Graph passes through origin → set $x = 0$, $y = 0$: $b = m^{2} - 1 = 0$, giving $m = 1$ or $m = -1$.

        But the <<一次函数/linear function>> condition requires $k = m - 1 \neq 0$, i.e., $m \neq 1$.

        Exclude $m = 1$ (it gives $k = 0$, making the function constant $y = 0$, not a linear function).

        Only $m = -1$ works: $k = -1 - 1 = -2 \neq 0$, $b = 1 - 1 = 0$ ✓

    - id: ep2
      type: solve
      question: |
        直线 $l_1: y = 2x + 3$ 和直线 $l_2: y = -x + 6$ 交于点 $A$。
        （1）求点 $A$ 的坐标。
        （2）过点 $A$ 且平行于 $y$ 轴的直线方程是什么？（提示：$y$ 轴方向的直线形如 $x = a$）
        （3）过点 $A$ 作一条直线 $l_3$，使 $l_3$ 与 $x$ 轴的交点恰好是 $l_1$ 与 $x$ 轴交点的右侧 $2$ 个单位。求 $l_3$ 的函数表达式。
      questionEn: |
        Lines $l_1: y = 2x + 3$ and $l_2: y = -x + 6$ intersect at point $A$.
        (1) Find the coordinates of $A$.
        (2) What is the equation of the line through $A$ parallel to the $y$-axis?
        (3) Draw a line $l_3$ through $A$ such that $l_3$ intersects the $x$-axis exactly 2 units to the right of where $l_1$ meets the $x$-axis. Find the formula for $l_3$.
      answer: |
        (1) 令 $2x+3 = -x+6$：$3x = 3$，$x = 1$；$y = 5$。点 $A(1, 5)$。
        (2) 过 $(1,5)$ 且平行于 $y$ 轴：$x = 1$。
        (3) $l_1$ 的 $x$ 轴截距：令 $y=0$，$2x+3=0$，$x = -\dfrac{3}{2}$。其右侧 $2$ 个单位：$x = -\dfrac{3}{2} + 2 = \dfrac{1}{2}$。
        $l_3$ 过 $A(1,5)$ 和 $\left(\dfrac{1}{2}, 0\right)$。
        $k = \dfrac{5-0}{1-\frac{1}{2}} = \dfrac{5}{\frac{1}{2}} = 10$；代入 $y = 10x + b$，用点 $(1,5)$：$5 = 10 + b$，$b = -5$。
        所以 $l_3: y = 10x - 5$。
      answerEn: |
        (1) Set $2x+3 = -x+6$: $3x = 3$, $x = 1$; $y = 5$. Point $A(1, 5)$.
        (2) Through $(1,5)$ parallel to the $y$-axis: $x = 1$.
        (3) $x$-intercept of $l_1$: set $y=0$, $2x+3=0$, $x = -\dfrac{3}{2}$. Two units to the right: $x = -\dfrac{3}{2} + 2 = \dfrac{1}{2}$.
        $l_3$ passes through $A(1,5)$ and $\left(\dfrac{1}{2}, 0\right)$.
        $k = \dfrac{5-0}{1-\frac{1}{2}} = \dfrac{5}{\frac{1}{2}} = 10$; using $y = 10x + b$ with $(1,5)$: $5 = 10 + b$, $b = -5$.
        Therefore $l_3: y = 10x - 5$.

    - id: ep3
      type: solve
      question: |
        一辆汽车从甲城出发前往乙城，出发时油箱满油 $60$ 升，行驶过程中油量 $y$（升）与行驶里程 $x$（千米）满足<<一次函数/linear function>> $y = -0.1x + 60$（$0 \leq x \leq 600$）。

        （1）当行驶 $200$ 千米时，油箱剩余多少升？
        （2）油量不足 $20$ 升时需要加油，最晚应该在行驶多少千米时加油？
        （3）若甲乙两城相距 $600$ 千米，到达乙城时恰好用完燃油，验证此结论是否正确，并说明该<<一次函数/linear function>>各参数的实际含义。
      questionEn: |
        A car departs from City A to City B with a full tank of 60 litres. The oil remaining $y$ (litres) as a function of distance $x$ (km) is $y = -0.1x + 60$ ($0 \leq x \leq 600$).

        (1) How much oil remains after 200 km?
        (2) Refuelling is needed when oil drops below 20 litres. What is the latest distance at which the driver must refuel?
        (3) The two cities are 600 km apart. Verify whether the car arrives at City B with exactly 0 litres remaining, and explain the real-world meaning of each parameter in the <<一次函数/linear function>>.
      answer: |
        (1) $y = -0.1 \times 200 + 60 = -20 + 60 = 40$ 升。

        (2) 令 $y < 20$：$-0.1x + 60 < 20$，$-0.1x < -40$，$x > 400$。
        所以行驶超过 $400$ 千米后油量不足 $20$ 升，最晚在 $x = 400$ 千米时加油。

        (3) 令 $x = 600$：$y = -0.1 \times 600 + 60 = -60 + 60 = 0$ 升。恰好用完 ✓

        参数含义：
        - $k = -0.1$：每行驶 $1$ 千米消耗 $0.1$ 升燃油（油耗 $= 10$ 升/百千米）
        - $b = 60$：出发时（$x = 0$）油箱满油 $60$ 升
        - 定义域 $0 \leq x \leq 600$：从出发到终点的完整行程
      answerEn: |
        (1) $y = -0.1 \times 200 + 60 = -20 + 60 = 40$ litres.

        (2) Set $y < 20$: $-0.1x + 60 < 20$, $-0.1x < -40$, $x > 400$.
        So oil drops below 20 litres after 400 km; refuel no later than $x = 400$ km.

        (3) Set $x = 600$: $y = -0.1 \times 600 + 60 = -60 + 60 = 0$ litres. Exactly empty ✓

        Meanings of parameters:
        - $k = -0.1$: the car consumes 0.1 litres per km (fuel efficiency = 10 litres per 100 km)
        - $b = 60$: at departure ($x = 0$), the tank holds 60 litres
        - Domain $0 \leq x \leq 600$: the complete journey from departure to destination

    - id: ep4
      type: solve
      question: |
        在平面直角坐标系中，直线 $l: y = kx + b$ 与 $x$ 轴、$y$ 轴围成一个三角形（设 $k \neq 0$，$b \neq 0$）。

        （1）用 $k$ 和 $b$ 表示该三角形两直角边的长度（即 $x$ 轴截距的绝对值和 $y$ 轴截距的绝对值）。
        （2）若 $k = -2$，$b = 4$，求此三角形的面积。
        （3）若三角形面积为 $9$，且直线过点 $(3, 0)$，求该<<一次函数/linear function>>所有可能的解析式。
      questionEn: |
        In a coordinate system, the line $l: y = kx + b$ forms a triangle with the $x$-axis and $y$-axis (assume $k \neq 0$, $b \neq 0$).

        (1) Express the lengths of the two legs of this right triangle in terms of $k$ and $b$ (i.e., the absolute values of the $x$-intercept and $y$-intercept).
        (2) If $k = -2$ and $b = 4$, find the area of the triangle.
        (3) If the area of the triangle is 9 and the line passes through $(3, 0)$, find all possible formulas for the <<一次函数/linear function>>.
      answer: |
        (1) $y$ 轴截距：$|b|$（即两直角边之一的长度）。
        $x$ 轴截距：令 $y = 0$，$x = -\dfrac{b}{k}$，所以 $x$ 轴截距绝对值为 $\left|\dfrac{b}{k}\right| = \dfrac{|b|}{|k|}$。

        (2) $k = -2$，$b = 4$：
        $y$ 轴截距 $= |4| = 4$；$x$ 轴截距 $= \left|\dfrac{4}{-2}\right| = 2$。
        三角形面积 $= \dfrac{1}{2} \times 2 \times 4 = 4$。

        (3) 直线过 $(3, 0)$，即 $x$ 轴截距为 $3$，$\left|\dfrac{b}{k}\right| = 3$，即 $b = 3k$ 或 $b = -3k$。
        面积 $= \dfrac{1}{2} \times |x\text{截距}| \times |b| = \dfrac{1}{2} \times 3 \times |b| = 9$，所以 $|b| = 6$，$b = 6$ 或 $b = -6$。

        情形一：$b = 6$，$x$ 轴截距 $= 3$，则 $k = -\dfrac{6}{3} = -2$。函数：$y = -2x + 6$。
        情形二：$b = -6$，$x$ 轴截距 $= 3$，则 $k = \dfrac{6}{3} = 2$。函数：$y = 2x - 6$。

        验证情形一：过 $(3,0)$？$y = -2(3) + 6 = 0$ ✓；面积 $= \dfrac{1}{2} \times 3 \times 6 = 9$ ✓
        验证情形二：过 $(3,0)$？$y = 2(3) - 6 = 0$ ✓；面积 $= \dfrac{1}{2} \times 3 \times 6 = 9$ ✓
      answerEn: |
        (1) $y$-intercept: $|b|$. $x$-intercept: set $y = 0$, $x = -\dfrac{b}{k}$, absolute value $= \dfrac{|b|}{|k|}$.

        (2) $k = -2$, $b = 4$: $y$-intercept $= 4$; $x$-intercept $= 2$. Area $= \dfrac{1}{2} \times 2 \times 4 = 4$.

        (3) Line passes through $(3, 0)$, so $x$-intercept $= 3$.
        Area $= \dfrac{1}{2} \times 3 \times |b| = 9$, so $|b| = 6$, giving $b = 6$ or $b = -6$.

        Case 1: $b = 6$, $k = -\dfrac{6}{3} = -2$. Function: $y = -2x + 6$.
        Case 2: $b = -6$, $k = \dfrac{6}{3} = 2$. Function: $y = 2x - 6$.

    - id: ep5
      type: solve
      question: |
        甲、乙两人同时从 $A$ 地出发前往 $B$ 地（$AB$ 两地距离 $24$ 千米）。甲步行，速度 $4$ 千米/时；乙骑自行车，速度 $12$ 千米/时，但乙比甲晚出发 $1$ 小时。

        设出发后 $t$ 小时（$t$ 从甲出发时算起），甲距 $A$ 地的距离为 $s_1$，乙距 $A$ 地的距离为 $s_2$。

        （1）分别写出 $s_1$ 和 $s_2$ 关于 $t$ 的函数表达式（注意乙的有效时间范围）。
        （2）乙在何时追上甲（即 $s_1 = s_2$）？追上时两人都在 $A$ 地还是 $B$ 地之间吗？
        （3）甲、乙分别何时到达 $B$ 地？谁先到达？
      questionEn: |
        Person A and Person B both travel from City A to City B (24 km apart). A walks at 4 km/h; B cycles at 12 km/h but departs 1 hour later than A.

        Let $t$ be the time in hours since A's departure. Let $s_1$ and $s_2$ be the distances from City A for A and B respectively.

        (1) Write the formulas for $s_1$ and $s_2$ as functions of $t$ (note the valid time range for B).
        (2) When does B catch up with A (i.e., $s_1 = s_2$)? Are both still between A and B at that point?
        (3) When does each person arrive at City B? Who arrives first?
      answer: |
        (1) $s_1 = 4t$（$0 \leq t \leq 6$，甲 $6$ 小时到达）

        乙在 $t = 1$ 时出发，所以有效时间是 $t \geq 1$：
        $s_2 = 12(t - 1)$（$1 \leq t \leq 3$，乙 $2$ 小时骑完，即在 $t = 3$ 时到达）

        (2) 令 $s_1 = s_2$：$4t = 12(t-1)$，$4t = 12t - 12$，$-8t = -12$，$t = 1.5$ 小时。
        追上时：$s_1 = 4 \times 1.5 = 6$ 千米（距 $A$ 地 $6$ 千米，仍在 $AB$ 之间，因为 $AB = 24$ 千米）✓

        (3) 甲到 $B$ 地：$4t = 24$，$t = 6$ 小时（即从甲出发后 $6$ 小时）。
        乙到 $B$ 地：$12(t-1) = 24$，$t - 1 = 2$，$t = 3$ 小时。
        乙先到达（$t = 3 < t = 6$）。

        实际含义：虽然乙晚出发 $1$ 小时，但速度是甲的 $3$ 倍，所以乙比甲早 $3$ 小时到达。
      answerEn: |
        (1) $s_1 = 4t$ ($0 \leq t \leq 6$; A arrives in 6 hours)

        B departs at $t = 1$, valid time $t \geq 1$:
        $s_2 = 12(t - 1)$ ($1 \leq t \leq 3$; B arrives at $t = 3$)

        (2) Set $s_1 = s_2$: $4t = 12(t-1)$, $4t = 12t - 12$, $-8t = -12$, $t = 1.5$ hours.
        At catch-up: $s_1 = 4 \times 1.5 = 6$ km from A (still between A and B, since $AB = 24$ km) ✓

        (3) A arrives at B: $4t = 24$, $t = 6$ hours. B arrives at B: $12(t-1) = 24$, $t = 3$ hours.
        B arrives first ($t = 3 < t = 6$).

        Interpretation: although B departed 1 hour later, B's speed is 3 times A's, so B arrives 3 hours earlier.

summary: |
  **本章核心要点回顾**

  **1. 函数的概念**
  - <<函数/function>>：$x$ 的每个值对应唯一的 $y$ 值
  - <<自变量/independent variable>> $x$，<<因变量/dependent variable>> $y$，记法 $y = f(x)$
  - 表示方式：公式、表格、图象（三种方法互相补充）

  **2. 正比例函数 $y = kx$（$k \neq 0$）**
  - 图象：过原点的直线
  - $k > 0$：经过第一、三象限，递增；$k < 0$：经过第二、四象限，递减
  - $|k|$ 越大，直线越陡

  **3. 一次函数 $y = kx + b$（$k \neq 0$）**
  - 图象：直线（两点定一线：常用两截距点）
  - $y$ 轴截距 $(0, b)$；$x$ 轴截距（零点）$\left(-\dfrac{b}{k}, 0\right)$
  - $b$ 的作用：将 $y = kx$ 的图象上下平移 $b$ 个单位

  **4. $k$（<<斜率/slope>>）和 $b$（<<截距/intercept>>）的几何意义**
  - $k$：变化率，$x$ 增加 $1$ 时 $y$ 变化 $k$；决定直线倾斜方向和程度
  - $b$：直线与 $y$ 轴的交点高度
  - 平行线：$k$ 相同，$b$ 不同；重合线：$k$、$b$ 都相同

  **5. 待定系数法**
  - 已知两点 → 建立关于 $k$、$b$ 的二元一次方程组 → 解出 $k$ 和 $b$

  **6. 一次函数与方程、不等式的联系（数形结合）**
  - $kx + b = 0$ 的解 = 直线与 $x$ 轴的交点横坐标
  - $kx + b > 0$（$k > 0$）的解集：$x > -\dfrac{b}{k}$（直线在 $x$ 轴上方的区域）
  - 方程组的解 = 两直线交点坐标

summaryEn: |
  **Key takeaways for this chapter**

  **1. The concept of a function**
  - <<函数/function>>: each value of $x$ maps to exactly one value of $y$
  - <<自变量/independent variable>> $x$, <<因变量/dependent variable>> $y$, notation $y = f(x)$
  - Three representations: formula, table, graph (each complements the others)

  **2. Direct proportion function $y = kx$ ($k \neq 0$)**
  - Graph: straight line through the origin
  - $k > 0$: Quadrants I and III, increasing; $k < 0$: Quadrants II and IV, decreasing
  - Larger $|k|$ → steeper line

  **3. Linear function $y = kx + b$ ($k \neq 0$)**
  - Graph: straight line (two points determine a line; use the two intercepts)
  - $y$-intercept $(0, b)$; $x$-intercept (zero) $\left(-\dfrac{b}{k}, 0\right)$
  - Role of $b$: shifts the graph of $y = kx$ up or down by $b$ units

  **4. Geometric meaning of $k$ (<<斜率/slope>>) and $b$ (<<截距/intercept>>)**
  - $k$: rate of change — $y$ changes by $k$ for each unit increase in $x$; determines tilt direction and steepness
  - $b$: height where the line meets the $y$-axis
  - Parallel lines: same $k$, different $b$; coincident lines: same $k$ and same $b$

  **5. Method of undetermined coefficients**
  - Given two points → set up a $2 \times 2$ system in $k$ and $b$ → solve for $k$ and $b$

  **6. Connection between linear functions, equations, and inequalities (algebra meets geometry)**
  - Solution to $kx + b = 0$ = $x$-coordinate of intersection with $x$-axis
  - Solution set of $kx + b > 0$ (for $k > 0$): $x > -\dfrac{b}{k}$ (region where line is above $x$-axis)
  - Solution to a system = coordinates of the intersection of two lines
