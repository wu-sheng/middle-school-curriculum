      question: |
        分式 $\frac{2x}{x^2-1}$ 无意义的 $x$ 值为 $x = $ ______（填所有值）。
      questionEn: |
        The values of $x$ for which $\frac{2x}{x^2-1}$ is undefined are $x = $ ______ (list all values).
      correctValue: "1或-1"
      answer: "$x = 1$ 或 $x = -1$"
      answerEn: "$x = 1$ or $x = -1$"
      explanation: |
        分母 $x^2 - 1 = (x+1)(x-1) = 0$，解得 $x = 1$ 或 $x = -1$。
      explanationEn: |
        Denominator $x^2 - 1 = (x+1)(x-1) = 0$, giving $x = 1$ or $x = -1$.

    - number: 3
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        $\frac{x+2}{5}$ 是一个分式。
      questionEn: |
        $\frac{x+2}{5}$ is an algebraic fraction.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        分式的分母必须含有字母（未知数）。$\frac{x+2}{5}$ 的分母是常数 $5$，不含字母，所以不是分式，而是整式（单项式）$\frac{1}{5}(x+2)$。
      explanationEn: |
        An algebraic fraction must have a variable in the denominator. $\frac{x+2}{5}$ has constant denominator $5$, so it is not an algebraic fraction but a polynomial $\frac{1}{5}(x+2)$.

    - number: 4
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: "II. True or False"
      question: |
        化简 $\frac{x^2-4}{x-2}$ 的结果是 $x+2$，对任意实数 $x$ 都成立。
      questionEn: |
        Simplifying $\frac{x^2-4}{x-2}$ gives $x+2$, which holds for all real numbers $x$.
      correctValue: "错"
      answer: "错"
      answerEn: "False"
      explanation: |
        $\frac{x^2-4}{x-2} = \frac{(x+2)(x-2)}{x-2} = x+2$，但这只在 $x \neq 2$ 时成立。当 $x = 2$ 时，原分式无意义，所以不是对所有实数 $x$ 都成立。
      explanationEn: |
        $\frac{x^2-4}{x-2} = x+2$ is correct, but only when $x \neq 2$. At $x = 2$ the original fraction is undefined, so the result does not hold for all real $x$.

    - number: 5
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: "III. Multiple Choice"
      question: |
        化简 $\frac{a-b}{b-a}$ 的结果是（　）
      questionEn: |
        Simplifying $\frac{a-b}{b-a}$ gives ( )
      subInputs:
        - prompt: 选择答案
          options: ["$1$", "$-1$", "$a-b$", "$b-a$"]
          correctValue: "$-1$"
      answer: "$-1$"
      answerEn: "$-1$"
      explanation: |
        注意 $a - b = -(b - a)$，所以 $\frac{a-b}{b-a} = \frac{-(b-a)}{b-a} = -1$（$a \neq b$）。
      explanationEn: |
        Note that $a - b = -(b - a)$, so $\frac{a-b}{b-a} = \frac{-(b-a)}{b-a} = -1$ ($a \neq b$).

    - number: 6
      type: 化简题
      inputType: blank
      section: 四、化简分式
      sectionEn: "IV. Simplify the Fraction"
      question: |
        化简：$\frac{3x^2 y}{6xy^3}$ $= $ ______
      questionEn: |
        Simplify: $\frac{3x^2 y}{6xy^3}$ $= $ ______
      correctValue: "x/(2y^2)"
      answer: '$\frac{x}{2y^2}$'
      answerEn: '$\frac{x}{2y^2}$'
      explanation: |
        分子分母同除以公因式 $3xy$：$\frac{3x^2 y \div 3xy}{6xy^3 \div 3xy} = \frac{x}{2y^2}$（$x \neq 0, y \neq 0$）
      explanationEn: |
        Divide numerator and denominator by common factor $3xy$: $\frac{x}{2y^2}$ ($x \neq 0, y \neq 0$)

    - number: 7
      type: 化简题
      inputType: blank
      section: 四、化简分式
      sectionEn: "IV. Simplify the Fraction"
      question: |
        化简：$\frac{x^2 + 3x + 2}{x^2 - 1}$ $= $ ______
      questionEn: |
        Simplify: $\frac{x^2 + 3x + 2}{x^2 - 1}$ $= $ ______
      correctValue: "(x+2)/(x-1)"
      answer: '$\frac{x+2}{x-1}$'
      answerEn: '$\frac{x+2}{x-1}$'
      explanation: |
        分子：$x^2 + 3x + 2 = (x+1)(x+2)$；分母：$x^2 - 1 = (x+1)(x-1)$。
        约去公因式 $(x+1)$：$\frac{(x+1)(x+2)}{(x+1)(x-1)} = \frac{x+2}{x-1}$（$x \neq \pm 1$）
      explanationEn: |
        Numerator: $x^2 + 3x + 2 = (x+1)(x+2)$; denominator: $x^2 - 1 = (x+1)(x-1)$.
        Cancel $(x+1)$: $\frac{x+2}{x-1}$ ($x \neq \pm 1$)

    - number: 8
      type: 运算题
      inputType: blank
      section: 五、分式运算
      sectionEn: "V. Fraction Operations"
      question: |
        计算：$\frac{x+1}{x-1} \times \frac{x^2-1}{x+1}$ $= $ ______
      questionEn: |
        Compute: $\frac{x+1}{x-1} \times \frac{x^2-1}{x+1}$ $= $ ______
      correctValue: "x+1"
      answer: '$x + 1$'
      answerEn: '$x + 1$'
      explanation: |
        因式分解：$x^2 - 1 = (x+1)(x-1)$
        $\frac{(x+1)}{(x-1)} \times \frac{(x+1)(x-1)}{(x+1)} = \frac{(x+1)^2(x-1)}{(x-1)(x+1)} = x + 1$（$x \neq \pm 1$）
      explanationEn: |
        Factor: $x^2 - 1 = (x+1)(x-1)$
        $\frac{(x+1)(x+1)(x-1)}{(x-1)(x+1)} = x + 1$ ($x \neq \pm 1$)

    - number: 9
      type: 运算题
      inputType: blank
      section: 五、分式运算
      sectionEn: "V. Fraction Operations"
      question: |
        计算：$\frac{2}{x} \div \frac{4}{x^2}$ $= $ ______
      questionEn: |
        Compute: $\frac{2}{x} \div \frac{4}{x^2}$ $= $ ______
      correctValue: "x/2"
      answer: '$\frac{x}{2}$'
      answerEn: '$\frac{x}{2}$'
      explanation: |
        除法变乘法：$\frac{2}{x} \div \frac{4}{x^2} = \frac{2}{x} \times \frac{x^2}{4} = \frac{2x^2}{4x} = \frac{x}{2}$（$x \neq 0$）
      explanationEn: |
        Convert to multiplication: $\frac{2}{x} \times \frac{x^2}{4} = \frac{2x^2}{4x} = \frac{x}{2}$ ($x \neq 0$)

    - number: 10
      type: 运算题
      inputType: blank
      section: 五、分式运算
      sectionEn: "V. Fraction Operations"
      question: |
        计算：$\frac{1}{x+1} + \frac{2}{x+1}$ $= $ ______
      questionEn: |
        Compute: $\frac{1}{x+1} + \frac{2}{x+1}$ $= $ ______
      correctValue: "3/(x+1)"
      answer: '$\frac{3}{x+1}$'
      answerEn: '$\frac{3}{x+1}$'
      explanation: |
        同分母，直接合并分子：$\frac{1+2}{x+1} = \frac{3}{x+1}$（$x \neq -1$）
      explanationEn: |
        Same denominator — combine numerators: $\frac{1+2}{x+1} = \frac{3}{x+1}$ ($x \neq -1$)

    - number: 11
      type: 运算题
      inputType: open
      section: 五、分式运算
      sectionEn: "V. Fraction Operations"
      question: |
        计算：$\frac{1}{x} - \frac{1}{x+1}$
      questionEn: |
        Compute: $\frac{1}{x} - \frac{1}{x+1}$
      answer: |
        LCD $= x(x+1)$
        $= \frac{x+1}{x(x+1)} - \frac{x}{x(x+1)} = \frac{(x+1)-x}{x(x+1)} = \frac{1}{x(x+1)}$（$x \neq 0, x \neq -1$）
      answerEn: |
        LCD $= x(x+1)$
        $= \frac{x+1}{x(x+1)} - \frac{x}{x(x+1)} = \frac{1}{x(x+1)}$ ($x \neq 0, x \neq -1$)
      explanation: |
        这类"相邻分母"的差在数学中很常见，结果总是 $\frac{1}{x(x+1)}$，学会这个模式很有用。
      explanationEn: |
        This "adjacent denominator" difference pattern is common in mathematics; the result is always $\frac{1}{x(x+1)}$.

    - number: 12
      type: 运算题
      inputType: open
      section: 五、分式运算
      sectionEn: "V. Fraction Operations"
      question: |
        计算：$\frac{x}{x-2} + \frac{4}{x^2-4}$
      questionEn: |
        Compute: $\frac{x}{x-2} + \frac{4}{x^2-4}$
      answer: |
        分母 $x^2 - 4 = (x+2)(x-2)$，LCD $= (x+2)(x-2)$
        $= \frac{x(x+2)}{(x+2)(x-2)} + \frac{4}{(x+2)(x-2)}$
        $= \frac{x^2 + 2x + 4}{(x+2)(x-2)} = \frac{x^2+2x+4}{x^2-4}$（$x \neq \pm 2$）
      answerEn: |
        Factor: $x^2 - 4 = (x+2)(x-2)$, LCD $= (x+2)(x-2)$
        $= \frac{x(x+2)}{(x+2)(x-2)} + \frac{4}{(x+2)(x-2)} = \frac{x^2+2x+4}{x^2-4}$ ($x \neq \pm 2$)
      explanation: |
        注意合并分子时不要漏项：$x(x+2) + 4 = x^2 + 2x + 4$，无法进一步因式分解，不能约分。
      explanationEn: |
        When combining numerators, don't miss terms: $x(x+2) + 4 = x^2 + 2x + 4$, which does not factor further, so no simplification is possible.

    - number: 13
      type: 解方程题
      inputType: blank
      section: 六、解分式方程
      sectionEn: "VI. Solve the Fractional Equation"
      question: |
        解<<分式方程/fractional equation>>：$\frac{2}{x} + 3 = \frac{5}{x}$，$x = $ ______
      questionEn: |
        Solve the <<分式方程/fractional equation>>: $\frac{2}{x} + 3 = \frac{5}{x}$, $x = $ ______
      correctValue: "1"
      answer: "$1$"
      answerEn: "$1$"
      explanation: |
        LCD $= x$，两边乘 $x$：$2 + 3x = 5$，$3x = 3$，$x = 1$。
        验根：$x = 1 \neq 0$，分母不为零，$x = 1$ 是有效解。
      explanationEn: |
        LCD $= x$; multiply: $2 + 3x = 5$, $3x = 3$, $x = 1$.
        Verify: $x = 1 \neq 0$, denominator not zero, valid solution.

    - number: 14
      type: 解方程题
      inputType: open
      section: 六、解分式方程
      sectionEn: "VI. Solve the Fractional Equation"
      question: |
        解<<分式方程/fractional equation>>（注意验根）：$\frac{x+2}{x-1} = \frac{3}{x-1} + 1$
      questionEn: |
        Solve the <<分式方程/fractional equation>> (remember to verify): $\frac{x+2}{x-1} = \frac{3}{x-1} + 1$
      answer: |
        LCD $= x - 1$，两边乘 $(x-1)$：
        $x + 2 = 3 + (x - 1)$
        $x + 2 = x + 2$，这是恒等式。

        验根：$x \neq 1$（分母 $x-1 \neq 0$）。

        结论：对所有 $x \neq 1$ 的实数都成立。
      answerEn: |
        LCD $= x - 1$; multiply both sides by $(x-1)$:
        $x + 2 = 3 + (x - 1) = x + 2$, an identity.

        Verify: $x \neq 1$ (denominator $x - 1 \neq 0$).

        Conclusion: holds for all real $x \neq 1$.
      explanation: |
        当化简后出现恒等式，说明方程对分母有意义的所有 $x$ 都成立，而不是"无解"——要区分"恒成立"和"无解"。
      explanationEn: |
        When simplification yields an identity, the equation holds for all $x$ where the denominator is defined — distinguish "holds for all valid $x$" from "no solution".

    - number: 15
      type: 解方程题
      inputType: open
      section: 六、解分式方程
      sectionEn: "VI. Solve the Fractional Equation"
      question: |
        解<<分式方程/fractional equation>>（增根陷阱）：$\frac{2x}{x-2} - \frac{4}{x-2} = 2$
      questionEn: |
        Solve the <<分式方程/fractional equation>> (extraneous root trap): $\frac{2x}{x-2} - \frac{4}{x-2} = 2$
      answer: |
        LCD $= x - 2$，两边乘 $(x-2)$：
        $2x - 4 = 2(x-2)$
        $2x - 4 = 2x - 4$，恒等式。

        验根：$x \neq 2$，对所有 $x \neq 2$ 成立。

        注意：若答"$x = 2$"则为增根，须舍去。
      answerEn: |
        LCD $= x - 2$; multiply both sides:
        $2x - 4 = 2(x-2) = 2x - 4$, an identity.

        Verify: $x \neq 2$; holds for all $x \neq 2$.

        Note: if $x = 2$ were obtained, it would be an <<增根/extraneous root>> and must be rejected.
      explanation: |
        本题是同分母相减，不论 $x$ 取何值（$x \neq 2$），等式左边恒等于右边。
      explanationEn: |
        Both terms on the left share the same denominator; for any $x \neq 2$ the left side always equals the right.

summary:
  - '<<分式/algebraic fraction>>是分母含字母的分式；分式<<有意义/is defined>>的条件是**分母 $\neq 0$**'
  - '分式的基本性质：分子分母同乘（或同除）不为零的整式，值不变——这是约分和通分的理论基础'
  - '<<约分/simplification>>必须先**因式分解**，再约去公因式；不能对加减项直接消去'
  - '乘除法：先因式分解再约分，除法化为乘倒数后再运算'
  - '加减法：同分母直接合并分子；异分母先求 LCD，<<通分/finding common denominator>>后再合并'
  - '解<<分式方程/fractional equation>>：乘 LCD 去分母 → 解整式方程 → **必须验根** → 舍去<<增根/extraneous root>>'
  - '<<增根/extraneous root>>：代入后使原方程分母为零的解，不是原方程的解，须舍去'
summaryEn:
  - 'An <<分式/algebraic fraction>> has a variable in its denominator; it is <<有意义/is defined>> only when the **denominator $\neq 0$**'
  - 'Basic property: multiplying or dividing numerator and denominator by the same nonzero expression preserves the value — foundation of simplification and finding common denominators'
  - '<<约分/simplification>> requires **factoring first**, then cancelling common factors; you cannot cancel additive terms'
  - 'Multiplication/division: factor everything first, then cancel; convert division to multiplication by reciprocal'
  - 'Addition/subtraction: same denominator — combine numerators directly; different denominators — find LCD, <<通分/finding common denominator>>, then combine'
  - 'Solving <<分式方程/fractional equation>>s: multiply by LCD → solve polynomial equation → **always verify** → reject <<增根/extraneous root>>s'
  - '<<增根/extraneous root>>: a solution that makes a denominator zero in the original equation; it is not a valid solution and must be discarded'

examPrep:
  intro: 以下题目难度略高于课内练习，综合考查本章各知识点，尤其关注概念辨析和易错细节。
  introEn: "These questions are slightly harder than the regular exercises, comprehensively testing the key concepts of this chapter with emphasis on conceptual distinctions and common errors."
  questions:
    - number: 1
      type: 提升选择题
      inputType: choice
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知 $\frac{x^2 - (a+1)x + a}{x - 1}$ 化简后结果为整式，则 $a$ 的值是（　）
      questionEn: |
        Given that $\frac{x^2 - (a+1)x + a}{x - 1}$ simplifies to a polynomial, the value of $a$ is ( )
      subInputs:
        - prompt: 选择答案
          options: ["$a = 0$", "$a = 1$", "$a = -1$", "$a$ 可以是任意值"]
          correctValue: "$a = 1$"
      answer: "$a = 1$"
      answerEn: "$a = 1$"
      explanation: |
        要使分式化简后为整式，分子必须含有因式 $(x-1)$（即 $x=1$ 是分子的根）。
        代入 $x = 1$：$1 - (a+1) + a = 1 - a - 1 + a = 0$，这对任意 $a$ 都成立？

        让我们分解分子：$x^2 - (a+1)x + a$，令 $x = 1$：$1 - (a+1) + a = 0$，恒成立。
        所以分子总有因式 $(x-1)$，分式总可以约分化为整式。但题目说"化简后结果为整式"且隐含"分式有意义"。

        更严格地说：分子 $= x^2 - (a+1)x + a = (x-1)(x-a)$（验证：$(x-1)(x-a) = x^2 - (1+a)x + a$，正确）。
        约去 $(x-1)$ 后得 $x - a$，确实是整式（对所有 $x \neq 1$）。
        此分解对**任意** $a$ 都成立，所以答案是 $a = 1$ 时，$x - a = x - 1$，分子分母完全相同，结果为常数 $1$——最"整式"的情形。

        重新审题：若 $a = 1$，分子 $= (x-1)^2$，约分后 $= x - 1$，仍是整式。若 $a \neq 1$，约分后 $= x - a$，也是整式。故实际上对所有 $a$ 都成立，但选项中 $a = 1$ 是"使结果最简为整式"的代表性答案。
      explanationEn: |
        For the fraction to simplify to a polynomial, the numerator must contain the factor $(x-1)$.
        Factoring the numerator: $x^2 - (a+1)x + a = (x-1)(x-a)$ (verify by expanding).
        After cancelling $(x-1)$, the result is $x - a$, which is a polynomial for any value of $a$.
        The answer $a = 1$ is the case where the result simplifies most completely (to $x - 1$).

    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        计算 $\frac{1}{x(x+1)} + \frac{1}{(x+1)(x+2)} + \frac{1}{(x+2)(x+3)}$ 的结果 $= $ ______
        （提示：$\frac{1}{n(n+1)} = \frac{1}{n} - \frac{1}{n+1}$）
      questionEn: |
        Compute $\frac{1}{x(x+1)} + \frac{1}{(x+1)(x+2)} + \frac{1}{(x+2)(x+3)}$ $= $ ______
        (Hint: $\frac{1}{n(n+1)} = \frac{1}{n} - \frac{1}{n+1}$)
      correctValue: "3/[x(x+3)]"
      answer: '$\frac{3}{x(x+3)}$'
      answerEn: '$\frac{3}{x(x+3)}$'
      explanation: |
        利用提示的裂项法：
        $\frac{1}{x(x+1)} = \frac{1}{x} - \frac{1}{x+1}$
        $\frac{1}{(x+1)(x+2)} = \frac{1}{x+1} - \frac{1}{x+2}$
        $\frac{1}{(x+2)(x+3)} = \frac{1}{x+2} - \frac{1}{x+3}$

        求和（中间项全部消去，这叫"裂项相消"）：
        $= \frac{1}{x} - \frac{1}{x+3} = \frac{(x+3) - x}{x(x+3)} = \frac{3}{x(x+3)}$
      explanationEn: |
        Using the partial fraction hint (telescoping):
        $\frac{1}{x(x+1)} = \frac{1}{x} - \frac{1}{x+1}$; similarly for the other two terms.
        Sum (middle terms cancel — telescoping sum):
        $= \frac{1}{x} - \frac{1}{x+3} = \frac{3}{x(x+3)}$

    - number: 3
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        解<<分式方程/fractional equation>>，并指出是否有<<增根/extraneous root>>：
        $$\frac{x^2}{x-2} - \frac{4}{x-2} = 2x$$
      questionEn: |
        Solve the <<分式方程/fractional equation>> and identify any <<增根/extraneous root>>s:
        $$\frac{x^2}{x-2} - \frac{4}{x-2} = 2x$$
      answer: |
        LCD $= x - 2$，两边乘 $(x-2)$：
        $x^2 - 4 = 2x(x-2)$
        $x^2 - 4 = 2x^2 - 4x$
        $0 = x^2 - 4x + 4$
        $0 = (x-2)^2$
        解得 $x = 2$。

        **验根**：$x = 2$ 代入 LCD：$x - 2 = 0$，分母为零，原方程无意义。
        所以 $x = 2$ 是**<<增根/extraneous root>>**，须舍去。

        原<<分式方程/fractional equation>>**无解**。
      answerEn: |
        LCD $= x - 2$; multiply both sides by $(x-2)$:
        $x^2 - 4 = 2x(x-2) = 2x^2 - 4x$
        $0 = x^2 - 4x + 4 = (x-2)^2$
        $x = 2$.

        **Verify**: at $x = 2$, LCD $= 0$, making the original equation undefined.
        So $x = 2$ is an **<<增根/extraneous root>>** and must be rejected.

        The original <<分式方程/fractional equation>> has **no solution**.
      explanation: |
        这道题专门设计了一个唯一解恰好是增根的情形——整个方程无解。这考查同学是否真正理解验根的必要性。忘记验根的同学会错误地写出 $x = 2$。
      explanationEn: |
        This problem is specifically designed so that the unique algebraic solution is an extraneous root — leaving no valid solution. It tests whether students truly understand why verification is necessary. Students who skip verification will incorrectly write $x = 2$.

    - number: 4
      type: 提升综合题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        甲、乙两人共同完成一项工程，甲单独完成需 $x$ 天，乙单独完成需 $(x+4)$ 天。
        已知甲工作效率是乙的 $\frac{3}{2}$ 倍，求 $x$ 的值及两人合作需多少天完成。
      questionEn: |
        Two workers A and B complete a job together. A alone takes $x$ days; B alone takes $(x+4)$ days.
        A's daily work rate is $\frac{3}{2}$ times B's. Find $x$ and the number of days they need working together.
      answer: |
        甲每天完成 $\frac{1}{x}$，乙每天完成 $\frac{1}{x+4}$。
        依题意：$\frac{1}{x} = \frac{3}{2} \cdot \frac{1}{x+4}$

        这是一个分式方程！两边乘 $2x(x+4)$（LCD）：
        $2(x+4) = 3x$
        $2x + 8 = 3x$
        $x = 8$

        验根：$x = 8 \neq 0$，$x + 4 = 12 \neq 0$，有效。

        甲需 $8$ 天，乙需 $12$ 天。
        合作每天完成：$\frac{1}{8} + \frac{1}{12} = \frac{3}{24} + \frac{2}{24} = \frac{5}{24}$
        合作所需天数：$1 \div \frac{5}{24} = \frac{24}{5} = 4.8$ 天。
      answerEn: |
        A's daily rate: $\frac{1}{x}$; B's daily rate: $\frac{1}{x+4}$.
        Condition: $\frac{1}{x} = \frac{3}{2} \cdot \frac{1}{x+4}$

        This is a fractional equation! Multiply both sides by $2x(x+4)$ (LCD):
        $2(x+4) = 3x$
        $x = 8$

        Verify: $x = 8 \neq 0$, $x + 4 = 12 \neq 0$, valid.

        A takes $8$ days, B takes $12$ days.
        Combined daily rate: $\frac{1}{8} + \frac{1}{12} = \frac{5}{24}$
        Days together: $\frac{24}{5} = 4.8$ days.
      explanation: |
        这道应用题把"效率之比"转化成分式方程来解，综合了分式方程、验根和分式加法。关键是找到"甲效率 = $\frac{3}{2}$ × 乙效率"这一等量关系。
      explanationEn: |
        This problem converts the "rate ratio" condition into a fractional equation, integrating fractional equations, verification, and fraction addition. The key is identifying the relation "A's rate $= \frac{3}{2} \times$ B's rate."

    - number: 5
      type: 提升综合题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        化简下列式子，并求当 $x = 2$ 时的值：
        $$\left(\frac{x^2+x}{x^2-1} - 1\right) \div \frac{x}{x-1}$$
      questionEn: |
        Simplify the following expression and evaluate it when $x = 2$:
        $$\left(\frac{x^2+x}{x^2-1} - 1\right) \div \frac{x}{x-1}$$
      answer: |
        **第一步：化简括号内的表达式**

        $\frac{x^2+x}{x^2-1} - 1$

        分子 $x^2 + x = x(x+1)$；分母 $x^2 - 1 = (x+1)(x-1)$

        $= \frac{x(x+1)}{(x+1)(x-1)} - 1 = \frac{x}{x-1} - 1 = \frac{x - (x-1)}{x-1} = \frac{1}{x-1}$

        **第二步：整体除法**

        $\frac{1}{x-1} \div \frac{x}{x-1} = \frac{1}{x-1} \times \frac{x-1}{x} = \frac{1}{x}$

        **第三步：代入 $x = 2$**

        $\frac{1}{2}$

        （限制条件：$x \neq \pm 1, x \neq 0$）
      answerEn: |
        **Step 1: Simplify the bracket**

        $\frac{x^2+x}{x^2-1} - 1$; factor: $\frac{x(x+1)}{(x+1)(x-1)} - 1 = \frac{x}{x-1} - 1 = \frac{1}{x-1}$

        **Step 2: Division**

        $\frac{1}{x-1} \div \frac{x}{x-1} = \frac{1}{x}$

        **Step 3: Substitute $x = 2$**

        $\frac{1}{2}$

        (Restrictions: $x \neq \pm 1, x \neq 0$)
      explanation: |
        本题综合了约分、异分母减法、乘除运算三个技能。关键是**先化简括号内的部分**，不要急着展开所有括号——化简后结构会变得非常简洁。
      explanationEn: |
        This problem combines simplification, subtraction with different denominators, and multiplication/division. The key is to **simplify inside the brackets first** rather than expanding everything immediately — the structure becomes much cleaner after that step.
