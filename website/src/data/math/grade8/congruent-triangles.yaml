title: 全等三角形
titleEn: Congruent Triangles
chapter: 2
subject: math
grade: grade8
semester: semester1
estimatedTime: 第1课时 约60分钟 · 第2课时 约55分钟 · 第3课时 约55分钟
estimatedTimeEn: "Session 1 ~60 min · Session 2 ~55 min · Session 3 ~55 min"
targetAudience: 小学3年级自学生（已完成七年级数学），自学材料，由简入深

objectives:
  - 理解<<全等图形/congruent figures>>和<<全等三角形/congruent triangles>>的概念，能识别两个全等三角形的<<对应顶点/corresponding vertices>>、<<对应边/corresponding sides>>和<<对应角/corresponding angles>>
  - 掌握全等三角形的性质：<<对应边/corresponding sides>>相等，<<对应角/corresponding angles>>相等
  - 掌握三角形全等的四种判定方法：<<SSS/SSS>>、<<SAS/SAS>>、<<ASA/ASA>>、<<AAS/AAS>>
  - 掌握直角三角形的特殊判定方法：<<HL/HL>>（斜边和直角边）
  - 理解<<角平分线/angle bisector>>的性质定理，并能应用
  - 学会在几何证明中添加<<辅助线/auxiliary line>>，掌握常见辅助线策略
objectivesEn:
  - Understand the concepts of <<全等图形/congruent figures>> and <<全等三角形/congruent triangles>>, and identify <<对应顶点/corresponding vertices>>, <<对应边/corresponding sides>>, and <<对应角/corresponding angles>>
  - 'Master the properties of congruent triangles: <<对应边/corresponding sides>> are equal and <<对应角/corresponding angles>> are equal'
  - 'Master the four congruence criteria: <<SSS/SSS>>, <<SAS/SAS>>, <<ASA/ASA>>, <<AAS/AAS>>'
  - 'Master the special congruence criterion for right triangles: <<HL/HL>> (Hypotenuse-Leg)'
  - Understand and apply the <<角平分线/angle bisector>> property theorem
  - Learn to add <<辅助线/auxiliary line>>s in geometric proofs and master common strategies

prerequisites:
  title: 从已有知识出发——什么叫做"完全相同"？
  titleEn: "Starting from what you know — what does it mean to be 'completely identical'?"
  intro: |
    七年级我们学习了三角形的基本概念，学会了几何证明的基本语言（已知、求证、证明），
    也研究了平行线与角的关系。八年级的几何从"全等"出发——两个三角形什么时候形状、大小完全一样？
  introEn: |
    In Grade 7 we learned the basic concepts of triangles, the language of geometric proof
    (Given, Prove, Proof), and the relationships between parallel lines and angles.
    Grade 8 geometry starts from "congruence" — when do two triangles have exactly the same shape and size?
  knownNumbers:
    - '三角形的概念：三条边、三个顶点、三个内角'
    - '三角形内角和为 $180°$'
    - 角、线段的度量与比较
    - '<<垂线/perpendicular line>>、<<角平分线/angle bisector>>、<<中线/median>>的基本概念'
    - 简单几何推理：用"∵…∴…"写证明步骤
  knownNumbersEn:
    - 'Concept of triangles: three sides, three vertices, three interior angles'
    - 'The sum of interior angles of a triangle is $180°$'
    - Measuring and comparing angles and segments
    - 'Basic concepts of <<垂线/perpendicular line>>s, <<角平分线/angle bisector>>s, and <<中线/median>>s'
    - Simple geometric reasoning with "∵…∴…" proof steps
  cannotSolve:
    - 两个形状、大小完全一样的图形，叫什么？有什么性质？
    - '满足什么条件才能判断 $\triangle ABC \cong \triangle DEF$？'
    - 如何用全等三角形证明两条线段相等或两个角相等？
    - 如何添加辅助线构造全等三角形？
  cannotSolveEn:
    - "What do we call two figures with the same shape and size? What properties do they have?"
    - 'Under what conditions can we determine $\triangle ABC \cong \triangle DEF$?'
    - "How do we use congruent triangles to prove two segments or angles are equal?"
    - "How do we add auxiliary lines to construct congruent triangles?"
  conclusion: |
    本章将系统学习全等三角形的判定方法（SSS、SAS、ASA、AAS、HL），掌握添加辅助线的策略，
    学会用全等三角形进行几何推理和证明。
  conclusionEn: |
    This chapter systematically studies the congruence criteria (SSS, SAS, ASA, AAS, HL),
    teaches auxiliary line strategies, and develops skills for geometric reasoning and proof
    using congruent triangles.

concepts:
  - id: congruent-figures
    title: 全等图形与全等三角形
    titleEn: Congruent Figures and Congruent Triangles
    hasVisualization: true
    content: |
      **先想一个生活问题：**

      你有一把饼干切模（比如星形），按下去切出来的每一块饼干是否完全一样？是的！
      无论怎么放，每块饼干的形状和大小都完全相同——这就是"全等"的直觉。

      **什么是全等图形？**

      如果一个图形能通过**平移（搬动）、旋转（转动）、翻折（翻面）**，和另一个图形**完全重叠**，这两个图形就叫做<<全等图形/congruent figures>>。

      "完全重叠"的意思是：每一个点、每一条边、每一个角，都能找到对应的点、边、角完全重合。

      几个生活例子：
      - 两张相同的扑克牌（一张正面，一张背面）——全等！翻一个面就能重合
      - 用同一个模具印出的两个橡皮章——全等
      - 工厂流水线生产的同款手机——全等

      **什么不是全等？**
      - 一张 A4 纸和一张 A5 纸——形状相同但大小不同，不是全等（叫"相似"）
      - 一个三角形和一个正方形——形状不同，更不是全等

      **全等三角形**

      两个三角形全等，用符号写成：$\triangle ABC \cong \triangle DEF$

      符号"$\cong$"读作"全等于"，意思是这两个三角形能完全重叠。

      **最关键的细节——对应顺序！**

      写 $\triangle ABC \cong \triangle DEF$ 的时候，字母的顺序就说明了哪个顶点对哪个顶点：

      | $\triangle ABC$ 的顶点 | 对应 | $\triangle DEF$ 的顶点 |
      |---------------------|------|---------------------|
      | $A$ | $\leftrightarrow$ | $D$ |
      | $B$ | $\leftrightarrow$ | $E$ |
      | $C$ | $\leftrightarrow$ | $F$ |

      从对应顶点，我们可以马上读出**对应边**和**对应角**：
      - 对应边（长度相等）：$AB = DE$，$BC = EF$，$AC = DF$
      - 对应角（度数相等）：$\angle A = \angle D$，$\angle B = \angle E$，$\angle C = \angle F$

      **超级重要！** $\triangle ABC \cong \triangle DEF$ 和 $\triangle ABC \cong \triangle EDF$ 是**完全不同的**！
      前者说 $A$ 对应 $D$，后者说 $A$ 对应 $E$。对应关系不同，等量关系也就不同。
      写全等关系时，**一定先找准哪个角对哪个角**，再确定顶点字母顺序。
    contentEn: |
      **Start with a real-life question:**

      You have a cookie cutter in the shape of a star. Every cookie you cut out is exactly the same, right?
      No matter how you place them, every cookie has the same shape and size — this is the intuition behind "congruence."

      **What are congruent figures?**

      If one figure can be **translated (slid), rotated (turned), or reflected (flipped)** to perfectly overlap another figure, the two figures are called <<全等图形/congruent figures>>.

      "Perfectly overlap" means every point, every side, and every angle can be matched up exactly with a corresponding point, side, or angle.

      Some real-life examples:
      - Two identical playing cards (one face-up, one face-down) — congruent! Flip one and they match
      - Two rubber stamps made from the same mold — congruent
      - Two phones of the same model from the factory — congruent

      **What is NOT congruent?**
      - An A4 sheet of paper and an A5 sheet — same shape but different size (this is called "similar," not congruent)
      - A triangle and a square — different shapes entirely

      **Congruent triangles**

      Two congruent triangles are written: $\triangle ABC \cong \triangle DEF$

      The symbol "$\cong$" is read "is congruent to," meaning the two triangles can perfectly overlap.

      **The most important detail — the order of correspondence!**

      When we write $\triangle ABC \cong \triangle DEF$, the order of letters tells us which vertex matches which:

      | Vertex in $\triangle ABC$ | Corresponds to | Vertex in $\triangle DEF$ |
      |--------------------------|----------------|--------------------------|
      | $A$ | $\leftrightarrow$ | $D$ |
      | $B$ | $\leftrightarrow$ | $E$ |
      | $C$ | $\leftrightarrow$ | $F$ |

      From the corresponding vertices, we can immediately read off the **corresponding sides** and **corresponding angles**:
      - Corresponding sides (equal lengths): $AB = DE$, $BC = EF$, $AC = DF$
      - Corresponding angles (equal measures): $\angle A = \angle D$, $\angle B = \angle E$, $\angle C = \angle F$

      **Super important!** $\triangle ABC \cong \triangle DEF$ and $\triangle ABC \cong \triangle EDF$ are **completely different!**
      The first says $A$ corresponds to $D$; the second says $A$ corresponds to $E$. Different correspondences mean different equal relationships.
      When writing a congruence statement, **always find which angles match first**, then determine the vertex letter order.
    examples:
      - '已知 $\triangle ABC \cong \triangle PQR$，$AB = 6$ cm，$\angle B = 50°$，求 $PQ$ 和 $\angle Q$。解：$A \leftrightarrow P$，$B \leftrightarrow Q$，所以对应边 $PQ = AB = 6$ cm，对应角 $\angle Q = \angle B = 50°$'
      - '两张相同的邮票，一张正放一张倒放——全等！翻面后能完全重合'
      - '正方形的对角线把它分成 $4$ 个三角形，其中位置对角的两个三角形全等（可以旋转 $180°$ 重合）'
      - '已知 $\triangle ABC \cong \triangle DEF$，若 $AC = 8$，$\angle A = 35°$，则 $DF = 8$，$\angle D = 35°$（注意 $A \leftrightarrow D$）'
    examplesEn:
      - 'Given $\triangle ABC \cong \triangle PQR$, $AB = 6$ cm, $\angle B = 50°$. Find $PQ$ and $\angle Q$. Since $A \leftrightarrow P$ and $B \leftrightarrow Q$: $PQ = AB = 6$ cm and $\angle Q = \angle B = 50°$'
      - 'Two identical stamps, one right-side up and one upside-down — they are congruent! Flip one over and they overlap perfectly'
      - 'The diagonals of a square divide it into 4 triangles; the two triangles at opposite corners are congruent (rotate one by $180°$)'
      - 'Given $\triangle ABC \cong \triangle DEF$, if $AC = 8$ and $\angle A = 35°$, then $DF = 8$ and $\angle D = 35°$ (note $A \leftrightarrow D$)'

  - id: properties-of-congruent-triangles
    title: 全等三角形的性质——对应关系的威力
    titleEn: Properties of Congruent Triangles — The Power of Correspondence
    hasVisualization: true
    content: |
      **核心性质**：全等三角形的<<对应边/corresponding sides>>相等，<<对应角/corresponding angles>>相等。

      这句话看起来简单，但它是整章几何推理的**武器**：
      - 想证明**两条线段相等**？→ 找到包含这两条线段的两个全等三角形，它们是对应边
      - 想证明**两个角相等**？→ 找到包含这两个角的两个全等三角形，它们是对应角

      **如何找对应元素？**

      方法一：根据全等式的顶点顺序直接读出。
      $\triangle ABC \cong \triangle DEF$ → 第一个字母对应第一个字母，依此类推。

      方法二：观察图形，找到"特征角"或"特征边"。
      - 两个三角形中相等的那个角（或最长的那条边），通常在全等式中处于相同位置。

      **实战技巧——逆向思维**：

      证明两条线段相等时，不要先找全等三角形，而是先问：
      "这两条线段在哪两个三角形里？这两个三角形能全等吗？需要什么条件？"
      再检查已知条件是否能满足这些需求。

      **注意**：全等三角形的<<周长/perimeter>>相等，<<面积/area>>相等，但反过来不成立——
      周长、面积相等的两个三角形不一定全等。
    contentEn: |
      **Core property**: In congruent triangles, <<对应边/corresponding sides>> are equal
      and <<对应角/corresponding angles>> are equal.

      This sounds simple, but it is the **weapon** for all geometric reasoning in this chapter:
      - Want to prove **two segments are equal**? → Find two congruent triangles containing those segments as corresponding sides
      - Want to prove **two angles are equal**? → Find two congruent triangles containing those angles as corresponding angles

      **How to find corresponding elements?**

      Method 1: Read directly from the vertex order in the congruence statement.
      $\triangle ABC \cong \triangle DEF$ → first letter matches first letter, and so on.

      Method 2: Observe the figure for "characteristic angles" or "characteristic sides."
      The equal angle (or longest side) in each triangle usually occupies the same position in the congruence statement.

      **Practical tip — reverse thinking:**

      When proving two segments equal, don't start by hunting for congruent triangles. Instead ask:
      "Which two triangles contain these segments? Can those triangles be congruent? What conditions are needed?"
      Then check whether the given information satisfies those conditions.

      **Note**: Congruent triangles have equal <<周长/perimeter>>s and <<面积/area>>s,
      but the converse is false — two triangles with the same perimeter and area are not necessarily congruent.
    examples:
      - '已知 $\triangle ABC \cong \triangle DEF$，$BC = 7$ cm，求 $EF$。解：$EF = BC = 7$ cm（对应边相等）'
      - '已知 $\triangle ABC \cong \triangle DEF$，$\angle A = 50°$，$\angle B = 70°$，求 $\angle F$。解：$\angle C = 180° - 50° - 70° = 60°$，$F$ 对应 $C$，$\angle F = 60°$'
      - '如图，$D$ 是 $BC$ 中点，$AB = EC$，$\angle ABD = \angle ECD$。要证 $AD = ED$，先找包含 $AD$、$ED$ 的两个三角形：$\triangle ABD$ 和 $\triangle ECD$，再证这两个三角形全等'
      - '两个三角形面积都是 $6$ cm²，周长都是 $12$ cm，但形状可以完全不同——面积、周长相等不能推出全等'
    examplesEn:
      - 'Given $\triangle ABC \cong \triangle DEF$ and $BC = 7$ cm, find $EF$. Solution: $EF = BC = 7$ cm (corresponding sides are equal)'
      - 'Given $\triangle ABC \cong \triangle DEF$, $\angle A = 50°$, $\angle B = 70°$, find $\angle F$. Solution: $\angle C = 180° - 50° - 70° = 60°$; since $F$ corresponds to $C$, $\angle F = 60°$'
      - 'As shown, $D$ is the midpoint of $BC$, $AB = EC$, $\angle ABD = \angle ECD$. To prove $AD = ED$, first identify the triangles containing $AD$ and $ED$: $\triangle ABD$ and $\triangle ECD$, then prove those triangles congruent'
      - 'Two triangles can both have area $6$ cm² and perimeter $12$ cm but look completely different — equal area and perimeter do not imply congruence'

  - id: congruence-sss-sas
    title: 全等判定：SSS 与 SAS
    titleEn: 'Congruence Criteria: SSS and SAS'
    hasVisualization: true
    content: |
      判定两个三角形全等，不需要验证所有 $6$ 个元素（$3$ 条边 $+ 3$ 个角），
      只需要验证其中 $3$ 个**特定组合**就够了。

      ---

      **SSS（边边边）**：三边分别相等的两个三角形全等。

      如果 $AB = DE$，$BC = EF$，$AC = DF$，则 $\triangle ABC \cong \triangle DEF$（SSS）。

      **为什么 SSS 成立？**——三角形的"刚性"。
      给定三根固定长度的木棒，拼成三角形后，**形状唯一确定**，无法改变。
      这就是现实中桥梁、屋顶、铁塔都用三角形框架的原因——三角形是所有多边形中唯一形状固定的！
      四边形（如平行四边形）可以被压扁变形，而三角形不能。

      ---

      **SAS（边角边）**：两边及其**夹角**分别相等的两个三角形全等。

      如果 $AB = DE$，$\angle B = \angle E$，$BC = EF$（$\angle B$ 是 $AB$ 和 $BC$ 的夹角），
      则 $\triangle ABC \cong \triangle DEF$（SAS）。

      **注意夹角**：SAS 中的角必须是两条边的**夹角**（"三明治"中间的那个角），
      不能是旁边的角。

      **为什么"两边一角"（SSA）不行？**
      已知两边和一个**非夹角**，三角形的形状**不唯一**！
      例如：$a = 5$，$b = 3$，$\angle A = 30°$，可以画出**两个不同的三角形**都满足这些条件。
      这种情况叫做"SSA 的二义性"，是几何中的经典陷阱。
      记住：**SSA 不是判定定理**。

      ---

      **使用技巧**：
      - 看到两边相等 + 夹角相等 → 优先考虑 SAS
      - 看到三边都标了相等 → 用 SSS
      - 如果只有两边相等，角又不是夹角 → SSA 不成立，需要另找条件
    contentEn: |
      To prove two triangles congruent, we do not need to verify all $6$ elements (3 sides + 3 angles).
      We only need to verify $3$ elements in specific combinations.

      ---

      **SSS (Side-Side-Side)**: Two triangles with three pairs of equal sides are congruent.

      If $AB = DE$, $BC = EF$, $AC = DF$, then $\triangle ABC \cong \triangle DEF$ (SSS).

      **Why does SSS work? — Triangle rigidity.**
      Given three sticks of fixed length, once assembled into a triangle the **shape is uniquely determined**
      and cannot be changed. This is why bridges, roofs, and towers use triangular frames —
      a triangle is the only polygon whose shape is completely rigid!
      A quadrilateral (like a parallelogram) can be collapsed and deformed; a triangle cannot.

      ---

      **SAS (Side-Angle-Side)**: Two triangles with two pairs of equal sides and the **included angle** equal are congruent.

      If $AB = DE$, $\angle B = \angle E$, $BC = EF$ (where $\angle B$ is the angle between $AB$ and $BC$),
      then $\triangle ABC \cong \triangle DEF$ (SAS).

      **Watch out for "included angle"**: The angle in SAS must be **between** the two sides
      (the filling in the sandwich), not beside them.

      **Why doesn't SSA work?**
      Given two sides and a **non-included** angle, the triangle shape is **not unique**!
      For example, with $a = 5$, $b = 3$, $\angle A = 30°$, you can draw **two different triangles**
      satisfying these conditions. This is called the "SSA ambiguity" — a classic trap in geometry.
      Remember: **SSA is not a congruence criterion**.

      ---

      **Practical tips:**
      - Two equal sides + included angle → try SAS first
      - Three sides all marked equal → use SSS
      - Only two equal sides, angle is not included → SSA fails, find another condition
    examples:
      - '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$AB = DE = 4$ cm，$BC = EF = 6$ cm，$AC = DF = 5$ cm，由 SSS 得 $\triangle ABC \cong \triangle DEF$'
      - '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$AB = DE = 3$ cm，$\angle ABC = \angle DEF = 50°$，$BC = EF = 7$ cm，由 SAS 得 $\triangle ABC \cong \triangle DEF$'
      - 'SSA 陷阱：$AB = 5$，$AC = 3$，$\angle B = 30°$，可以画出两个不同的 $\triangle ABC$，说明 SSA 不能判定全等'
      - '等腰三角形 $\triangle ABC$ 中，$AB = AC$，$D$ 是 $BC$ 中点，则 $BD = DC$，$AD$ 公共边，由 SSS 得 $\triangle ABD \cong \triangle ACD$'
    examplesEn:
      - 'In $\triangle ABC$ and $\triangle DEF$: $AB = DE = 4$ cm, $BC = EF = 6$ cm, $AC = DF = 5$ cm. By SSS, $\triangle ABC \cong \triangle DEF$'
      - 'In $\triangle ABC$ and $\triangle DEF$: $AB = DE = 3$ cm, $\angle ABC = \angle DEF = 50°$, $BC = EF = 7$ cm. By SAS, $\triangle ABC \cong \triangle DEF$'
      - 'SSA trap: $AB = 5$, $AC = 3$, $\angle B = 30°$ — two different triangles $\triangle ABC$ can be drawn, showing SSA does not determine congruence'
      - 'In isosceles $\triangle ABC$ with $AB = AC$, let $D$ be the midpoint of $BC$. Then $BD = DC$, $AD$ is common, so by SSS: $\triangle ABD \cong \triangle ACD$'

  - id: congruence-asa-aas
    title: 全等判定：ASA 与 AAS
    titleEn: 'Congruence Criteria: ASA and AAS'
    hasVisualization: true
    content: |
      **ASA（角边角）**：两角及其**夹边**分别相等的两个三角形全等。

      如果 $\angle B = \angle E$，$BC = EF$，$\angle C = \angle F$（$BC$ 是 $\angle B$ 和 $\angle C$ 的夹边），
      则 $\triangle ABC \cong \triangle DEF$（ASA）。

      **直观理解**：固定一条边 $BC$，在两端各"架"一个固定角度，两条射线的交点就是顶点 $A$。
      因为两个角度和夹边都固定，顶点 $A$ 的位置唯一确定，所以三角形唯一确定。

      ---

      **AAS（角角边）**：两角及其**非夹边**分别相等的两个三角形全等。

      如果 $\angle B = \angle E$，$\angle C = \angle F$，$AC = DF$（$AC$ 是 $\angle B$ 的对边，不是夹边），
      则 $\triangle ABC \cong \triangle DEF$（AAS）。

      **为什么 AAS 成立？**
      由三角形内角和 $180°$，若两对角相等，第三对角也必相等（$\angle A = \angle D$），
      所以 AAS 本质上可以转化为 ASA——先用角和等推出第三个角相等，再用 ASA 判定。

      ---

      **ASA vs AAS 的区别**：
      - ASA：已知边是**两角的夹边**
      - AAS：已知边是**其中一个角的对边**（非夹边）

      口诀帮助记忆：ASA 是"角-边-角"夹住（就像三明治），AAS 是"角-角-边"排在旁边。

      ---

      **AAA 不成立**！三个角都相等只能保证两个三角形**相似**（形状相同），
      不能保证**全等**（大小也相同）。
      一个小三角形和一个大三角形可以有完全相同的三个角，但它们不全等。

      **总结四种判定**（不含 HL）：
      | 判定 | 条件 | 关键注意 |
      |------|------|---------|
      | SSS | 三边相等 | 无限制 |
      | SAS | 两边夹角相等 | 必须是夹角 |
      | ASA | 两角夹边相等 | 必须是夹边 |
      | AAS | 两角及对边相等 | 边是角的对边 |
      | ~~SSA~~ | ~~两边非夹角~~ | ~~不成立！~~ |
      | ~~AAA~~ | ~~三角相等~~ | ~~只能证相似~~ |
    contentEn: |
      **ASA (Angle-Side-Angle)**: Two triangles with two pairs of equal angles and the **included side** equal are congruent.

      If $\angle B = \angle E$, $BC = EF$, $\angle C = \angle F$ (where $BC$ is the side between $\angle B$ and $\angle C$),
      then $\triangle ABC \cong \triangle DEF$ (ASA).

      **Intuition**: Fix side $BC$ and "prop" a fixed angle at each end; the two rays meet at vertex $A$.
      Since both angles and the included side are fixed, vertex $A$ is uniquely determined,
      so the triangle is uniquely determined.

      ---

      **AAS (Angle-Angle-Side)**: Two triangles with two pairs of equal angles and a **non-included** side equal are congruent.

      If $\angle B = \angle E$, $\angle C = \angle F$, $AC = DF$ (where $AC$ is opposite to $\angle B$, not between the angles),
      then $\triangle ABC \cong \triangle DEF$ (AAS).

      **Why does AAS work?**
      Since angle sums equal $180°$, if two pairs of angles are equal, the third pair must also be equal
      ($\angle A = \angle D$), so AAS reduces to ASA — use the angle-sum property first,
      then apply ASA.

      ---

      **Distinguishing ASA vs AAS:**
      - ASA: the known side is the **included side** between the two angles
      - AAS: the known side is the **opposite side** of one of the angles (not included)

      Memory aid: ASA = "angle-side-angle" sandwiches the side; AAS = "angle-angle-side" has the side on the outside.

      ---

      **AAA does not work!** Three equal angles only guarantee **similarity** (same shape),
      not **congruence** (same size too).
      A small triangle and a large triangle can have the same three angles but are not congruent.

      **Summary of four criteria** (excluding HL):
      | Criterion | Conditions | Key note |
      |-----------|-----------|----------|
      | SSS | Three equal sides | No restriction |
      | SAS | Two sides + included angle equal | Must be included angle |
      | ASA | Two angles + included side equal | Must be included side |
      | AAS | Two angles + opposite side equal | Side opposite one angle |
      | ~~SSA~~ | ~~Two sides + non-included angle~~ | ~~Not valid!~~ |
      | ~~AAA~~ | ~~Three equal angles~~ | ~~Only proves similarity~~ |
    examples:
      - '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$\angle B = \angle E = 40°$，$BC = EF = 8$ cm，$\angle C = \angle F = 60°$，由 ASA 得 $\triangle ABC \cong \triangle DEF$'
      - '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$\angle A = \angle D = 50°$，$\angle B = \angle E = 70°$，$BC = EF = 5$ cm（$BC$ 是 $\angle A$ 的对边），由 AAS 得 $\triangle ABC \cong \triangle DEF$'
      - 'AAA 反例：边长为 $3, 4, 5$ 的直角三角形与边长为 $6, 8, 10$ 的直角三角形三个角完全相同，但不全等'
      - '平行线 $AB \parallel CD$，直线 $EF$ 与它们分别交于 $M$、$N$，$M$ 是 $EN$ 的中点，则可以用 ASA 证明 $\triangle EMB \cong \triangle NMD$（利用对顶角和内错角）'
    examplesEn:
      - 'In $\triangle ABC$ and $\triangle DEF$: $\angle B = \angle E = 40°$, $BC = EF = 8$ cm, $\angle C = \angle F = 60°$. By ASA, $\triangle ABC \cong \triangle DEF$'
      - 'In $\triangle ABC$ and $\triangle DEF$: $\angle A = \angle D = 50°$, $\angle B = \angle E = 70°$, $BC = EF = 5$ cm ($BC$ is opposite $\angle A$). By AAS, $\triangle ABC \cong \triangle DEF$'
      - 'AAA counterexample: a right triangle with sides $3, 4, 5$ and one with sides $6, 8, 10$ have identical angles but are not congruent'
      - 'With $AB \parallel CD$ and line $EF$ meeting them at $M$ and $N$ where $M$ is the midpoint of $EN$, use ASA to prove $\triangle EMB \cong \triangle NMD$ (using vertical angles and alternate interior angles)'

  - id: congruence-hl
    title: 直角三角形的全等判定——HL
    titleEn: Congruence of Right Triangles — HL
    hasVisualization: true
    content: |
      直角三角形是一类特殊三角形——它有一个固定的 $90°$ 角。
      因为这个角已知，所以判定两个直角三角形全等只需要额外验证两个元素，而不是三个。

      **HL（斜边-直角边）判定**：

      如果两个直角三角形的<<斜边/hypotenuse>>相等，且有一条<<直角边/leg>>相等，
      则这两个直角三角形全等。

      记法：设 $\triangle ABC$ 和 $\triangle DEF$ 都有直角，$\angle C = \angle F = 90°$，
      $AB$（斜边）$= DE$（斜边），$BC$（直角边）$= EF$（直角边），
      则 $\triangle ABC \cong \triangle DEF$（HL）。

      **为什么 HL 成立——用勾股定理理解**：

      已知斜边 $c$ 和一条直角边 $a$，由勾股定理 $a^{2} + b^{2} = c^{2}$，
      另一条直角边 $b = \sqrt{c^{2} - a^{2}}$ 唯一确定。
      所以三条边全部确定，再由 SSS 得全等。HL 本质上是直角三角形版的 SSS。

      **注意**：HL 只适用于**直角三角形**，普通三角形不能用。

      **HL 与 SSA 的区别**：
      一般三角形中，"两边一角（非夹角）"（SSA）不能判定全等。
      但直角三角形中，斜边是最长的边，直角是固定的 $90°$，
      HL 是特殊情况下 SSA 成立的特例，因为勾股定理消除了直角三角形中第三边的二义性。

      **实战**：遇到直角三角形全等问题，先找斜边是否相等，再找直角边是否相等。
    contentEn: |
      A right triangle is a special triangle with one fixed $90°$ angle.
      Since this angle is already known, we only need to verify two more elements (instead of three)
      to prove two right triangles congruent.

      **HL (Hypotenuse-Leg) criterion:**

      If two right triangles have equal <<斜边/hypotenuse>>s and one pair of equal <<直角边/leg>>s,
      the two right triangles are congruent.

      Notation: let $\triangle ABC$ and $\triangle DEF$ both be right triangles with $\angle C = \angle F = 90°$.
      If $AB$ (hypotenuse) $= DE$ (hypotenuse) and $BC$ (leg) $= EF$ (leg),
      then $\triangle ABC \cong \triangle DEF$ (HL).

      **Why HL works — understanding via the Pythagorean theorem:**

      Given hypotenuse $c$ and leg $a$, the Pythagorean theorem $a^{2} + b^{2} = c^{2}$
      uniquely determines the other leg $b = \sqrt{c^{2} - a^{2}}$.
      So all three sides are determined, and congruence follows by SSS.
      HL is essentially the right-triangle version of SSS.

      **Note**: HL applies only to **right triangles**, not general triangles.

      **HL vs SSA:**
      In general triangles, SSA (two sides + non-included angle) does not guarantee congruence.
      But in right triangles, the hypotenuse is always the longest side and the right angle is fixed at $90°$.
      HL is essentially SSA "unlocked" for this special case — the Pythagorean theorem eliminates the ambiguity.

      **Strategy**: When facing right-triangle congruence, first check if hypotenuses are equal, then check legs.
    examples:
      - '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$\angle C = \angle F = 90°$，斜边 $AB = DE = 10$ cm，直角边 $BC = EF = 6$ cm，由 HL 得 $\triangle ABC \cong \triangle DEF$，另一直角边也相等：$AC = DF = \sqrt{10^{2} - 6^{2}} = 8$ cm'
      - '点 $P$ 在线段 $AB$ 的垂直平分线上，$PM \perp AB$（$M$ 为中点），则在 $\triangle PMA$ 和 $\triangle PMB$ 中：$\angle PMA = \angle PMB = 90°$，$PM$ 公共边，$MA = MB$，由 HL 得 $\triangle PMA \cong \triangle PMB$，故 $PA = PB$'
      - '用 HL 解释为什么垂直平分线上的点到两端点等距'
      - '注意区分斜边和直角边：斜边是直角对面的边（最长），两条直角边夹直角'
    examplesEn:
      - 'In $\triangle ABC$ and $\triangle DEF$: $\angle C = \angle F = 90°$, hypotenuse $AB = DE = 10$ cm, leg $BC = EF = 6$ cm. By HL, $\triangle ABC \cong \triangle DEF$, and the other leg is also equal: $AC = DF = \sqrt{10^{2} - 6^{2}} = 8$ cm'
      - 'Point $P$ lies on the perpendicular bisector of segment $AB$, with $PM \perp AB$ ($M$ midpoint). In $\triangle PMA$ and $\triangle PMB$: $\angle PMA = \angle PMB = 90°$, $PM$ is common, $MA = MB$. By HL, $\triangle PMA \cong \triangle PMB$, so $PA = PB$'
      - 'Use HL to explain why every point on the perpendicular bisector of a segment is equidistant from the two endpoints'
      - 'Remember: the hypotenuse is opposite the right angle (always the longest side); the two legs form the right angle'

  - id: auxiliary-lines
    title: 辅助线的添加策略——几何证明的关键技能
    titleEn: Auxiliary Line Strategies — The Key Skill in Geometric Proof
    hasVisualization: true
    content: |
      **什么是<<辅助线/auxiliary line>>？**

      在原图中已知条件不够直接使用某个判定定理时，
      可以在图中**添加新的线段**（辅助线），创造出可以应用定理的"新三角形"。
      辅助线不改变图的几何关系，只是帮助我们"看见"隐藏的全等关系。

      辅助线是**高手和新手的分水岭**——大多数难题都需要添加辅助线才能解决。
      关键在于"为什么要这样添，而不是那样添"，理解背后的几何动机。

      ---

      **策略一：延长线段至两倍（倍长中线法）**

      **适用场景**：题目涉及某条边的<<中点/midpoint>>，想利用中点构造全等。

      **做法**：延长中线 $AD$（$D$ 是 $BC$ 中点）至点 $E$，使 $DE = AD$，连 $CE$。

      **为什么有效**：$BD = DC$（中点），$AD = DE$（延长），$\angle ADB = \angle EDC$（对顶角），
      由 SAS 得 $\triangle ABD \cong \triangle ECD$，从而 $AB = EC$、$\angle ABD = \angle ECD$（内错角，可得平行）。

      ---

      **策略二：取中点连线（构造中位线）**

      **适用场景**：已知多个中点，或需要连接两边中点来转化问题。

      **做法**：连接两边中点 $M$、$N$（$M$ 是 $AB$ 中点，$N$ 是 $AC$ 中点），
      得到<<中位线/midsegment>> $MN \parallel BC$，$MN = \frac{1}{2}BC$。

      **实战**：连中点常常能把复杂图形分割为若干全等三角形。

      ---

      **策略三：过点作平行线**

      **适用场景**：需要把一个角"搬运"到另一个位置，或利用平行线产生等角。

      **做法**：过某顶点 $A$ 作 $AD \parallel BC$，利用平行线产生的同位角或内错角。

      **为什么有效**：平行线使得<<同位角/corresponding angles>>相等、<<内错角/alternate interior angles>>相等，
      可以把分散在两个三角形中的角"凑"到同一个三角形里，方便用 ASA 或 AAS。

      ---

      **策略四：连接图中已有两点**

      **适用场景**：图中有两个点但没有线段连接，连上之后可以出现新的三角形。

      **做法**：连 $AC$（对角线）、连 $BD$（另一条对角线）等。

      **典型例子**：四边形 $ABCD$ 中，连对角线 $AC$ 后，把四边形分成 $\triangle ABC$ 和 $\triangle ACD$，
      再对每个三角形单独分析。

      ---

      **策略五：作某角的平分线 / 某边的垂线**

      **适用场景**：已知角平分线性质（到两边等距），或需要构造直角三角形。

      **做法**：过某点作已知角的<<平分线/bisector>>，或作某边的<<垂线/perpendicular>>。

      **为什么有效**：角平分线把一个角分成两个相等的角，很容易配合 ASA/AAS 形成全等。

      ---

      **选择辅助线的思路（逆推法）**：
      1. 先明确目标：要证什么（线段相等？角相等？）
      2. 确定载体：这两个元素分别在哪两个三角形里？
      3. 检查缺口：要让这两个三角形全等，还缺哪个条件？
      4. 补充缺口：能否通过添加辅助线制造出缺少的条件？
    contentEn: |
      **What is an <<辅助线/auxiliary line>>?**

      When the given conditions are not enough to directly apply a congruence criterion,
      we add a **new line segment** (auxiliary line) to create new triangles where a theorem can be applied.
      An auxiliary line does not change any geometric relationship in the figure —
      it only helps us "see" hidden congruences.

      Auxiliary lines mark the **divide between novice and expert** — most challenging problems require them.
      The key insight is understanding *why* we draw a particular line, not just *that* we draw it.

      ---

      **Strategy 1: Extend a segment to double its length (doubling the median)**

      **When to use**: The problem involves the <<中点/midpoint>> of a side and you want to exploit it.

      **Method**: Extend median $AD$ ($D$ is midpoint of $BC$) to point $E$ so that $DE = AD$, then connect $CE$.

      **Why it works**: $BD = DC$ (midpoint), $AD = DE$ (by construction), $\angle ADB = \angle EDC$ (vertical angles).
      By SAS: $\triangle ABD \cong \triangle ECD$, giving $AB = EC$ and $\angle ABD = \angle ECD$
      (alternate interior angles, implying parallelism).

      ---

      **Strategy 2: Connect midpoints (constructing a midsegment)**

      **When to use**: Multiple midpoints are given, or connecting midpoints simplifies the problem.

      **Method**: Connect midpoints $M$ and $N$ of two sides ($M$ on $AB$, $N$ on $AC$),
      obtaining the <<中位线/midsegment>> $MN \parallel BC$ and $MN = \frac{1}{2}BC$.

      **In practice**: Connecting midpoints often divides a complex figure into several congruent triangles.

      ---

      **Strategy 3: Draw a parallel line through a point**

      **When to use**: You need to "transport" an angle to a different location, or generate equal angles via parallel lines.

      **Method**: Through vertex $A$, draw $AD \parallel BC$; use equal <<同位角/corresponding angles>> or <<内错角/alternate interior angles>>.

      **Why it works**: Parallel lines make <<同位角/corresponding angles>> equal and <<内错角/alternate interior angles>> equal,
      "assembling" scattered angles into a single triangle for an ASA or AAS argument.

      ---

      **Strategy 4: Connect two existing points**

      **When to use**: Two points exist in the figure with no segment between them; connecting them creates new triangles.

      **Method**: Draw diagonal $AC$, diagonal $BD$, etc.

      **Typical example**: In quadrilateral $ABCD$, drawing diagonal $AC$ splits it into $\triangle ABC$ and $\triangle ACD$
      for separate analysis.

      ---

      **Strategy 5: Draw an angle bisector or perpendicular**

      **When to use**: Angle bisector properties are relevant (equal distances to sides), or you need to construct a right triangle.

      **Method**: Draw the <<平分线/bisector>> of a given angle through a point, or drop a <<垂线/perpendicular>> to a side.

      **Why it works**: An angle bisector splits an angle into two equal parts, easily combining with ASA/AAS for congruence.

      ---

      **Choosing auxiliary lines — reverse reasoning:**
      1. State the goal: what are you proving (segments equal? angles equal?)?
      2. Identify the triangles: which two triangles contain those elements?
      3. Find the gap: what condition is missing to prove those triangles congruent?
      4. Fill the gap: can an auxiliary line supply the missing condition?
    examples:
      - '证明等腰三角形 $\triangle ABC$（$AB = AC$）两底角相等：作顶角 $\angle A$ 的平分线 $AD$，由 SAS（$AB = AC$，$\angle BAD = \angle CAD$，$AD$ 公共）得 $\triangle ABD \cong \triangle ACD$，故 $\angle B = \angle C$'
      - 'D 是 $\triangle ABC$ 的 $BC$ 边中点，$E$ 是 $AD$ 延长线上使 $DE = AD$ 的点，连 $CE$：由倍长中线构造 $\triangle ABD \cong \triangle ECD$（SAS），从而 $AB = CE$，$AB \parallel CE$'
      - '四边形 $ABCD$ 中 $AB = CD$，$AD \parallel BC$，连对角线 $AC$：在 $\triangle ABC$ 和 $\triangle CDA$ 中，利用平行线内错角和 $AC$ 公共边，用 AAS 证明全等'
      - '过等腰三角形顶点作底边的垂线：这条垂线同时是角平分线、中线和高，把等腰三角形分成两个全等的直角三角形（HL）'
    examplesEn:
      - 'Prove the base angles of isosceles $\triangle ABC$ ($AB = AC$) are equal: draw the bisector $AD$ of vertex angle $\angle A$. By SAS ($AB = AC$, $\angle BAD = \angle CAD$, $AD$ common), $\triangle ABD \cong \triangle ACD$, so $\angle B = \angle C$'
      - '$D$ is the midpoint of $BC$ in $\triangle ABC$; $E$ is on the extension of $AD$ with $DE = AD$; connect $CE$. Doubling the median gives $\triangle ABD \cong \triangle ECD$ (SAS), so $AB = CE$ and $AB \parallel CE$'
      - 'In quadrilateral $ABCD$ with $AB = CD$ and $AD \parallel BC$, draw diagonal $AC$. In $\triangle ABC$ and $\triangle CDA$, use alternate interior angles from the parallel lines and $AC$ as a common side to prove congruence by AAS'
      - 'Drop a perpendicular from the apex of an isosceles triangle to the base: this line is simultaneously the angle bisector, median, and altitude, splitting the isosceles triangle into two congruent right triangles (HL)'

realLife:
  title: 生活中的全等三角形
  titleEn: Congruent Triangles in Real Life
  items:
    - title: 桥梁与建筑中的三角形框架
      titleEn: Triangular frames in bridges and buildings
      content: |
        工程师在桥梁、屋顶、铁塔中大量使用三角形框架，正是因为三角形的"刚性"——
        给定三边长度，三角形形状唯一确定，不会变形。
        这是 SSS 判定定理在工程中的直接应用。
      contentEn: |
        Engineers use triangular frames extensively in bridges, roofs, and towers precisely because
        of triangle rigidity — given three side lengths, the shape is uniquely fixed and cannot deform.
        This is a direct engineering application of the SSS criterion.
    - title: 镜像对称——翻折全等
      titleEn: Mirror symmetry — reflection congruence
      content: |
        蝴蝶的翅膀、人脸的左右两半、剪纸艺术——对称图形的两半是互相全等的（通过翻折重合）。
        折叠对称轴，两半可以完全重合，正是全等的定义。
      contentEn: |
        Butterfly wings, the two halves of a human face, paper-cutting art — the two halves of a
        symmetric figure are congruent to each other (they coincide when folded along the axis of symmetry).
        Folding along the line of symmetry makes them perfectly overlap, which is exactly the definition of congruence.
    - title: 工厂批量生产——复制全等图形
      titleEn: Factory mass production — copying congruent shapes
      content: |
        工厂用同一套模具批量生产零件，每个零件都和模具全等。
        质检时，只要检验某个关键尺寸（某几条边或某几个角）是否符合标准，
        就能判断产品是否合格——这正是三角形只需 $3$ 个元素就能确定全等的思想。
      contentEn: |
        Factories use a single mold to mass-produce parts; each part is congruent to the mold.
        Quality control only needs to check a few key dimensions (certain sides or angles) against the standard —
        this is the same idea as needing only 3 elements to determine triangle congruence.

examples:
  - id: ex1
    title: 辨认全等三角形与对应元素
    titleEn: Identifying congruent triangles and corresponding elements
    difficulty: 1
    type: proof
    question: |
      已知 $\triangle ABC \cong \triangle DEF$，其中 $AB = 3$ cm，$BC = 4$ cm，$CA = 5$ cm，$\angle B = 60°$。
      （1）写出所有对应边和对应角；
      （2）求 $DE$、$EF$、$FD$ 的长和 $\angle D$、$\angle E$、$\angle F$ 的大小。
    questionEn: |
      Given $\triangle ABC \cong \triangle DEF$, where $AB = 3$ cm, $BC = 4$ cm, $CA = 5$ cm, $\angle B = 60°$.
      (1) List all corresponding sides and corresponding angles.
      (2) Find the lengths of $DE$, $EF$, $FD$ and the measures of $\angle D$, $\angle E$, $\angle F$.
    steps:
      - step: '从全等式 $\triangle ABC \cong \triangle DEF$ 读出顶点对应关系：$A \leftrightarrow D$，$B \leftrightarrow E$，$C \leftrightarrow F$'
        stepEn: 'Read vertex correspondence from $\triangle ABC \cong \triangle DEF$: $A \leftrightarrow D$, $B \leftrightarrow E$, $C \leftrightarrow F$'
      - step: '对应边：$AB \leftrightarrow DE$，$BC \leftrightarrow EF$，$CA \leftrightarrow FD$；对应角：$\angle A \leftrightarrow \angle D$，$\angle B \leftrightarrow \angle E$，$\angle C \leftrightarrow \angle F$'
        stepEn: 'Corresponding sides: $AB \leftrightarrow DE$, $BC \leftrightarrow EF$, $CA \leftrightarrow FD$; corresponding angles: $\angle A \leftrightarrow \angle D$, $\angle B \leftrightarrow \angle E$, $\angle C \leftrightarrow \angle F$'
      - step: '由对应边相等：$DE = AB = 3$ cm，$EF = BC = 4$ cm，$FD = CA = 5$ cm'
        stepEn: 'By equal corresponding sides: $DE = AB = 3$ cm, $EF = BC = 4$ cm, $FD = CA = 5$ cm'
      - step: '由对应角相等：$\angle E = \angle B = 60°$；$\angle D = \angle A$，$\angle F = \angle C$（其它两角的值需额外条件才能确定）'
        stepEn: 'By equal corresponding angles: $\angle E = \angle B = 60°$; the other angles $\angle D$ and $\angle F$ equal $\angle A$ and $\angle C$ respectively, which can be found if more information is given'
    answer: '$DE = 3$ cm，$EF = 4$ cm，$FD = 5$ cm，$\angle E = 60°$；$\angle D = \angle A$，$\angle F = \angle C$（需知 $\angle A$ 或 $\angle C$ 的具体值才能确定）'
    answerEn: '$DE = 3$ cm, $EF = 4$ cm, $FD = 5$ cm, $\angle E = 60°$; $\angle D = \angle A$ and $\angle F = \angle C$ (specific values depend on knowing $\angle A$ or $\angle C$)'
    explanation: |
      全等式中顶点的书写顺序决定了全部对应关系，是解题的第一步，也是最容易写错的地方。
      养成"先写对应、再读数据"的习惯，可以避免对应错误。
    explanationEn: |
      The order of vertices in the congruence statement determines all correspondences —
      this is the first step in solving such problems and the most common source of error.
      Develop the habit of "write correspondences first, then read off data."

  - id: ex2
    title: 用 SSS 证明线段相等
    titleEn: Proving segments equal using SSS
    difficulty: 2
    type: proof
    question: |
      如图，$D$ 是线段 $BC$ 的中点，$AB = EC$，$AD = ED$。
      求证：$\angle B = \angle ECB$。
    questionEn: |
      As shown, $D$ is the midpoint of segment $BC$, $AB = EC$, $AD = ED$.
      Prove: $\angle B = \angle ECB$.
    steps:
      - step: '分析：要证 $\angle B = \angle ECB$，这两个角分别在 $\triangle ABD$ 和 $\triangle ECD$ 中，考虑证这两个三角形全等'
        stepEn: 'Analysis: to prove $\angle B = \angle ECB$, these angles are in $\triangle ABD$ and $\triangle ECD$ respectively; consider proving these triangles congruent'
      - step: '在 $\triangle ABD$ 和 $\triangle ECD$ 中：$AB = EC$（已知），$AD = ED$（已知），$BD = CD$（$D$ 是 $BC$ 中点）'
        stepEn: 'In $\triangle ABD$ and $\triangle ECD$: $AB = EC$ (given), $AD = ED$ (given), $BD = CD$ ($D$ is midpoint of $BC$)'
      - step: '∴ 三边分别相等，由 SSS 得 $\triangle ABD \cong \triangle ECD$'
        stepEn: '∴ Three pairs of sides are equal; by SSS, $\triangle ABD \cong \triangle ECD$'
      - step: '∴ 对应角相等：$\angle ABD = \angle ECD$，即 $\angle B = \angle ECB$'
        stepEn: '∴ Corresponding angles are equal: $\angle ABD = \angle ECD$, i.e., $\angle B = \angle ECB$'
    answer: '∵ $AB = EC$，$AD = ED$，$BD = CD$，∴ $\triangle ABD \cong \triangle ECD$（SSS），∴ $\angle B = \angle ECB$'
    answerEn: '∵ $AB = EC$, $AD = ED$, $BD = CD$, ∴ $\triangle ABD \cong \triangle ECD$ (SSS), ∴ $\angle B = \angle ECB$'
    explanation: |
      证明角相等 → 找全等三角形 → 验证三边（SSS）。
      中点条件给了一对相等边，再加上两对已知相等的边，恰好凑成 SSS。
    explanationEn: |
      To prove angles equal → find congruent triangles → verify three sides (SSS).
      The midpoint condition gives one pair of equal sides; combined with the two given equal pairs, SSS is satisfied.

  - id: ex3
    title: 用 ASA 证明角相等
    titleEn: Proving angles equal using ASA
    difficulty: 2
    type: proof
    question: |
      如图，$AB \parallel CD$，$AD$ 和 $BC$ 相交于点 $O$，$OA = OD$。
      求证：$OB = OC$。
    questionEn: |
      As shown, $AB \parallel CD$, $AD$ and $BC$ intersect at point $O$, $OA = OD$.
      Prove: $OB = OC$.
    steps:
      - step: '要证 $OB = OC$，这两条线段在 $\triangle OAB$ 和 $\triangle ODC$ 中，考虑用 ASA 证这两个三角形全等'
        stepEn: 'To prove $OB = OC$, these segments are in $\triangle OAB$ and $\triangle ODC$; plan to use ASA to prove these triangles congruent'
      - step: '∵ $AB \parallel CD$，∴ $\angle OAB = \angle ODC$（内错角相等）'
        stepEn: '∵ $AB \parallel CD$, ∴ $\angle OAB = \angle ODC$ (alternate interior angles)'
      - step: '∵ $AD$ 和 $BC$ 相交于 $O$，∴ $\angle AOB = \angle DOC$（对顶角相等）'
        stepEn: '∵ $AD$ and $BC$ intersect at $O$, ∴ $\angle AOB = \angle DOC$ (vertical angles)'
      - step: '又 $OA = OD$（已知），∴ 在 $\triangle OAB$ 和 $\triangle ODC$ 中：$\angle OAB = \angle ODC$，$OA = OD$，$\angle AOB = \angle DOC$，由 ASA 得 $\triangle OAB \cong \triangle ODC$'
        stepEn: 'Also $OA = OD$ (given). In $\triangle OAB$ and $\triangle ODC$: $\angle OAB = \angle ODC$, $OA = OD$, $\angle AOB = \angle DOC$. By ASA, $\triangle OAB \cong \triangle ODC$'
      - step: '∴ 对应边相等：$OB = OC$'
        stepEn: '∴ Corresponding sides are equal: $OB = OC$'
    answer: '由平行线内错角和对顶角，用 ASA 得 $\triangle OAB \cong \triangle ODC$，故 $OB = OC$'
    answerEn: 'Using alternate interior angles (from parallel lines) and vertical angles, ASA gives $\triangle OAB \cong \triangle ODC$, so $OB = OC$'
    explanation: |
      ASA 的特征：一条已知边（$OA = OD$），加上两端的角（一个来自平行线，一个来自对顶角）。
      角度来源是关键，平行线和对顶角是最常用的"角度来源"。
    explanationEn: |
      The ASA pattern: one known side ($OA = OD$) plus the angles at each end (one from parallel lines, one from vertical angles).
      The source of the angles is crucial; parallel lines and vertical angles are the most common angle sources.

  - id: ex4
    title: 需要辅助线的证明题
    titleEn: A proof problem requiring auxiliary lines
    difficulty: 3
    type: proof
    question: |
      在 $\triangle ABC$ 中，$D$ 是 $BC$ 的中点，$E$ 是 $AD$ 延长线上的点，且 $DE = AD$。
      连接 $BE$，求证：$BE \parallel AC$。
    questionEn: |
      In $\triangle ABC$, $D$ is the midpoint of $BC$, $E$ is a point on the extension of $AD$
      with $DE = AD$. Connect $BE$. Prove: $BE \parallel AC$.
    steps:
      - step: '分析：要证 $BE \parallel AC$，需要找到能说明平行的角度关系（内错角相等或同位角相等）。考虑通过全等三角形建立联系。'
        stepEn: 'Analysis: to prove $BE \parallel AC$, we need an angle relationship proving parallelism (equal alternate interior angles or corresponding angles). Plan to use congruent triangles to establish the link.'
      - step: '观察已知条件：$BD = CD$（$D$ 是中点），$AD = DE$（已知），$\angle BDA = \angle CDE$（对顶角）。这正好是 SAS！'
        stepEn: 'Observe: $BD = CD$ ($D$ is midpoint), $AD = DE$ (given), $\angle BDA = \angle CDE$ (vertical angles). This is exactly SAS!'
      - step: '在 $\triangle ABD$ 和 $\triangle ECD$ 中：$BD = CD$，$\angle BDA = \angle CDE$，$AD = DE$，由 SAS 得 $\triangle ABD \cong \triangle ECD$'
        stepEn: 'In $\triangle ABD$ and $\triangle ECD$: $BD = CD$, $\angle BDA = \angle CDE$, $AD = DE$. By SAS, $\triangle ABD \cong \triangle ECD$'
      - step: '∴ $\angle ABD = \angle ECD$（对应角），即 $\angle ABC = \angle ECB$'
        stepEn: '∴ $\angle ABD = \angle ECD$ (corresponding angles), i.e., $\angle ABC = \angle ECB$'
      - step: '∵ $\angle ABC = \angle ECB$，这是 $BE$ 和 $AC$ 关于截线 $BC$ 的内错角相等，∴ $BE \parallel AC$'
        stepEn: '∵ $\angle ABC = \angle ECB$ are alternate interior angles for lines $BE$ and $AC$ cut by transversal $BC$, ∴ $BE \parallel AC$'
    answer: '由 SAS，$\triangle ABD \cong \triangle ECD$，得 $\angle ABD = \angle ECD$（内错角相等），故 $BE \parallel AC$'
    answerEn: 'By SAS, $\triangle ABD \cong \triangle ECD$, giving $\angle ABD = \angle ECD$ (equal alternate interior angles), so $BE \parallel AC$'
    explanation: |
      这道题的辅助线思路是"倍长中线"：延长中线 $AD$ 至 $DE = AD$，构造对顶角 + 中点，
      自然生成 SAS。辅助线的位置和长度都由"构造所需条件"决定，不是随意的。
    explanationEn: |
      The auxiliary line idea here is "doubling the median": extending median $AD$ to $DE = AD$
      creates a vertical angle + midpoint combination that naturally yields SAS.
      The position and length of the auxiliary line are determined by the conditions needed, not chosen arbitrarily.

  - id: ex5
    title: 直角三角形 HL 判定应用
    titleEn: Applying HL to right triangles
    difficulty: 2
    type: proof
    question: |
      如图，$AB \perp BC$，$DC \perp BC$，$AC = BD$。
      求证：$\angle ABC = \angle DCB$。
    questionEn: |
      As shown, $AB \perp BC$, $DC \perp BC$, $AC = BD$.
      Prove: $\angle ABC = \angle DCB$.
    steps:
      - step: '∵ $AB \perp BC$，∴ $\angle ABC = 90°$；∵ $DC \perp BC$，∴ $\angle DCB = 90°$。这是两个直角三角形。'
        stepEn: '∵ $AB \perp BC$, ∴ $\angle ABC = 90°$; ∵ $DC \perp BC$, ∴ $\angle DCB = 90°$. We have two right triangles.'
      - step: '在 $\triangle ABC$ 和 $\triangle DCB$ 中：$\angle ABC = \angle DCB = 90°$（直角），$AC = BD$（斜边相等），$BC$ 是公共边（直角边相等）'
        stepEn: 'In $\triangle ABC$ and $\triangle DCB$: $\angle ABC = \angle DCB = 90°$ (right angles), $AC = BD$ (hypotenuses equal), $BC$ is a common side (legs equal)'
      - step: '由 HL 得 $\triangle ABC \cong \triangle DCB$'
        stepEn: 'By HL, $\triangle ABC \cong \triangle DCB$'
      - step: '∴ 对应角相等：$\angle ACB = \angle DBC$（即 $\triangle ABC$ 与 $\triangle DCB$ 的对应角相等）'
        stepEn: '∴ Corresponding angles: $\angle BAC = \angle CDB$ and $\angle BCA = \angle CBD$'
    answer: '两直角三角形（直角在 $B$ 和 $C$），斜边 $AC = BD$，公共直角边 $BC$，由 HL 得 $\triangle ABC \cong \triangle DCB$，故所有对应元素相等'
    answerEn: 'Two right triangles (right angles at $B$ and $C$), hypotenuse $AC = BD$, common leg $BC$. By HL, $\triangle ABC \cong \triangle DCB$, so all corresponding elements are equal'
    explanation: |
      HL 题目的标志：两个直角 + 斜边相等 + 一条直角边（可以是公共边）。
      注意全等式中的顶点顺序要和直角位置对应：$\triangle ABC \cong \triangle DCB$，
      $B$ 对应 $C$（都是直角顶点）。
    explanationEn: |
      The HL pattern: two right angles + equal hypotenuses + one equal leg (often a common side).
      Note the vertex order in the congruence statement must align with the right angle positions:
      $\triangle ABC \cong \triangle DCB$ — $B$ corresponds to $C$ (both right-angle vertices).

  - id: ex6
    title: 综合证明——角平分线与全等三角形
    titleEn: Comprehensive proof — angle bisector and congruent triangles
    difficulty: 3
    type: proof
    question: |
      如图，$OP$ 是 $\angle AOB$ 的角平分线，$PC \perp OA$ 于 $C$，$PD \perp OB$ 于 $D$。
      求证：$PC = PD$。
    questionEn: |
      As shown, $OP$ bisects $\angle AOB$, $PC \perp OA$ at $C$, $PD \perp OB$ at $D$.
      Prove: $PC = PD$.
    steps:
      - step: '∵ $PC \perp OA$，∴ $\angle PCO = 90°$；∵ $PD \perp OB$，∴ $\angle PDO = 90°$'
        stepEn: '∵ $PC \perp OA$, ∴ $\angle PCO = 90°$; ∵ $PD \perp OB$, ∴ $\angle PDO = 90°$'
      - step: '在 $\triangle OCP$ 和 $\triangle ODP$ 中：$\angle OCP = \angle ODP = 90°$，$OP$ 是公共边（斜边），$\angle COP = \angle DOP$（$OP$ 是角平分线）'
        stepEn: 'In $\triangle OCP$ and $\triangle ODP$: $\angle OCP = \angle ODP = 90°$, $OP$ is a common side (hypotenuse), $\angle COP = \angle DOP$ ($OP$ bisects the angle)'
      - step: '由 AAS（两角 $\angle OCP = \angle ODP$，$\angle COP = \angle DOP$，斜边 $OP$ 公共）得 $\triangle OCP \cong \triangle ODP$'
        stepEn: 'By AAS (two angles $\angle OCP = \angle ODP$, $\angle COP = \angle DOP$, and common hypotenuse $OP$), $\triangle OCP \cong \triangle ODP$'
      - step: '∴ 对应边相等：$PC = PD$'
        stepEn: '∴ Corresponding sides: $PC = PD$'
    answer: '∵ 两直角（$\angle OCP = \angle ODP = 90°$）+ 公共斜边 $OP$ + 角平分线（$\angle COP = \angle DOP$），由 AAS（或 HL）得 $\triangle OCP \cong \triangle ODP$，故 $PC = PD$'
    answerEn: '∵ two right angles ($\angle OCP = \angle ODP = 90°$) + common hypotenuse $OP$ + angle bisector ($\angle COP = \angle DOP$). By AAS (or HL), $\triangle OCP \cong \triangle ODP$, so $PC = PD$'
    explanation: |
      这是<<角平分线/angle bisector>>性质定理的证明：角平分线上的点到角的两边距离相等。
      反过来也成立：到角两边距离相等的点在角平分线上。
      这个定理在后续证明题中经常用到。
    explanationEn: |
      This is the proof of the <<角平分线/angle bisector>> property theorem: a point on an angle bisector
      is equidistant from the two sides of the angle.
      The converse also holds: a point equidistant from both sides of an angle lies on the bisector.
      This theorem is frequently used in subsequent proofs.

exercises:
  - number: 1
    type: fill
    difficulty: 1
    question: '全等三角形的<<对应边/corresponding sides>>____，<<对应角/corresponding angles>>____。'
    questionEn: 'In congruent triangles, <<对应边/corresponding sides>> are ____ and <<对应角/corresponding angles>> are ____.'
    answer: '相等；相等'
    answerEn: 'equal; equal'
    explanation: 全等三角形最基本的性质，记住"对应"两字，不能乱配对。
    explanationEn: The most basic property of congruent triangles; remember the word "corresponding" — pairing must be correct.

  - number: 2
    type: fill
    difficulty: 1
    question: '已知 $\triangle ABC \cong \triangle PQR$，则 $A$ 对应的顶点是____，$BC$ 对应的边是____，$\angle C$ 对应的角是____。'
    questionEn: 'Given $\triangle ABC \cong \triangle PQR$, the vertex corresponding to $A$ is ____, the side corresponding to $BC$ is ____, and the angle corresponding to $\angle C$ is ____.'
    answer: '$P$；$QR$；$\angle R$'
    answerEn: '$P$; $QR$; $\angle R$'
    explanation: '从全等式 $\triangle ABC \cong \triangle PQR$ 读出：第一位 $A \leftrightarrow P$，第二、三位 $BC \leftrightarrow QR$，第三位 $C \leftrightarrow R$。'
    explanationEn: 'From $\triangle ABC \cong \triangle PQR$: position 1 gives $A \leftrightarrow P$, positions 2–3 give $BC \leftrightarrow QR$, position 3 gives $C \leftrightarrow R$.'

  - number: 3
    type: judgment
    difficulty: 1
    question: '两个面积相等的三角形一定全等。'
    questionEn: 'Two triangles with equal areas must be congruent.'
    answer: '错误'
    answerEn: 'False'
    explanation: '反例：底 $2$、高 $6$ 的三角形与底 $3$、高 $4$ 的三角形面积都是 $6$，但形状完全不同。'
    explanationEn: 'Counterexample: a triangle with base 2 and height 6 has the same area (6) as one with base 3 and height 4, but they are different shapes.'

  - number: 4
    type: judgment
    difficulty: 2
    question: '已知两边和一个角对应相等，两个三角形一定全等。'
    questionEn: 'If two sides and one angle of a triangle are equal to two sides and one angle of another triangle, the two triangles must be congruent.'
    answer: '错误'
    answerEn: 'False'
    explanation: '只有当角是两边的夹角时才能用 SAS 判定全等。若角不是夹角（SSA），存在二义性，不能保证全等。'
    explanationEn: 'Congruence requires the angle to be the included angle (SAS). If the angle is not included (SSA), ambiguity exists and congruence is not guaranteed.'

  - number: 5
    type: choice
    difficulty: 1
    question: |
      下列说法中正确的是（  ）
      A. 三个角对应相等的两个三角形全等
      B. 两边和一个角对应相等的两个三角形全等
      C. 三条边对应相等的两个三角形全等
      D. 两个角对应相等的两个三角形全等
    questionEn: |
      Which of the following statements is correct? (  )
      A. Two triangles with three pairs of equal angles are congruent
      B. Two triangles with two equal sides and one equal angle are congruent
      C. Two triangles with three pairs of equal sides are congruent
      D. Two triangles with two pairs of equal angles are congruent
    answer: C
    answerEn: C
    explanation: 'A 错（AAA 只能证相似）；B 错（SSA 不成立）；C 正确（SSS）；D 错（条件不足）。'
    explanationEn: 'A: wrong (AAA only proves similarity); B: wrong (SSA is not valid); C: correct (SSS); D: wrong (insufficient conditions).'

  - number: 6
    type: fill
    difficulty: 2
    question: '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$AB = DE$，$\angle A = \angle D$，再加上条件____，可以由 SAS 判定 $\triangle ABC \cong \triangle DEF$。'
    questionEn: 'In $\triangle ABC$ and $\triangle DEF$, $AB = DE$, $\angle A = \angle D$. Adding the condition ____ allows us to conclude $\triangle ABC \cong \triangle DEF$ by SAS.'
    answer: '$AC = DF$（$\angle A$ 的夹边）'
    answerEn: '$AC = DF$ (the side included by $\angle A$)'
    explanation: 'SAS 需要"两边夹角"，$\angle A$ 是 $AB$ 和 $AC$ 的夹角，所以需要 $AC = DF$。若写 $BC = EF$（对边）则不能用 SAS。'
    explanationEn: 'SAS requires the included angle: $\angle A$ is between $AB$ and $AC$, so we need $AC = DF$. Writing $BC = EF$ (opposite side) would not allow SAS.'

  - number: 7
    type: fill
    difficulty: 2
    question: '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$\angle B = \angle E$，$\angle C = \angle F$，$BC = EF$，可以用____判定 $\triangle ABC \cong \triangle DEF$。'
    questionEn: 'In $\triangle ABC$ and $\triangle DEF$, $\angle B = \angle E$, $\angle C = \angle F$, $BC = EF$. Which criterion proves $\triangle ABC \cong \triangle DEF$?'
    answer: ASA
    answerEn: ASA
    explanation: '$BC$ 是 $\angle B$ 和 $\angle C$ 的夹边，满足"角-边-角"，用 ASA。'
    explanationEn: '$BC$ is the included side between $\angle B$ and $\angle C$, satisfying "angle-side-angle": use ASA.'

  - number: 8
    type: fill
    difficulty: 2
    question: '在 $\triangle ABC$ 和 $\triangle DEF$ 中，$\angle B = \angle E$，$\angle A = \angle D$，$BC = EF$，可以用____判定 $\triangle ABC \cong \triangle DEF$（注意 $BC$ 与 $\angle A$ 的关系）。'
    questionEn: 'In $\triangle ABC$ and $\triangle DEF$, $\angle B = \angle E$, $\angle A = \angle D$, $BC = EF$. Which criterion proves congruence? (Note the relationship between $BC$ and $\angle A$.)'
    answer: AAS
    answerEn: AAS
    explanation: '$BC$ 是 $\angle A$ 的对边（非夹边），两角已知，用 AAS。也可先由内角和推出 $\angle C = \angle F$，再用 ASA。'
    explanationEn: '$BC$ is opposite to $\angle A$ (not the included side between the two known angles): use AAS. Alternatively, use the angle-sum property to get $\angle C = \angle F$, then apply ASA.'

  - number: 9
    type: open
    difficulty: 2
    question: |
      已知等腰三角形 $\triangle ABC$，$AB = AC$，$D$ 是 $BC$ 的中点。
      （1）证明：$\angle ABD = \angle ACD$；
      （2）证明：$AD \perp BC$。
    questionEn: |
      In isosceles $\triangle ABC$ with $AB = AC$, $D$ is the midpoint of $BC$.
      (1) Prove: $\angle ABD = \angle ACD$.
      (2) Prove: $AD \perp BC$.
    answer: |
      （1）在 $\triangle ABD$ 和 $\triangle ACD$ 中：
      $AB = AC$（已知），$BD = CD$（$D$ 是中点），$AD$ 为公共边，
      由 SSS 得 $\triangle ABD \cong \triangle ACD$，
      故对应角 $\angle ABD = \angle ACD$。

      （2）由全等，$\angle ADB = \angle ADC$（对应角）。
      又 $\angle ADB + \angle ADC = 180°$（直线 $BC$ 上的两角），
      故 $\angle ADB = \angle ADC = 90°$，即 $AD \perp BC$。
    answerEn: |
      (1) In $\triangle ABD$ and $\triangle ACD$:
      $AB = AC$ (given), $BD = CD$ ($D$ is midpoint), $AD$ is common.
      By SSS, $\triangle ABD \cong \triangle ACD$,
      so corresponding angles $\angle ABD = \angle ACD$.

      (2) From congruence, $\angle ADB = \angle ADC$ (corresponding angles).
      Also $\angle ADB + \angle ADC = 180°$ (angles on line $BC$),
      so $\angle ADB = \angle ADC = 90°$, meaning $AD \perp BC$.
    explanation: |
      这道题说明等腰三角形的"三线合一"：顶点到底边中点的连线，同时是角平分线、中线和高。
      这三条线"合一"是等腰三角形的标志性性质。
    explanationEn: |
      This problem demonstrates the "three-in-one" property of isosceles triangles: the line from the apex
      to the midpoint of the base is simultaneously the angle bisector, the median, and the altitude.
      These three lines coinciding is a hallmark property of isosceles triangles.

  - number: 10
    type: open
    difficulty: 2
    question: |
      如图，$\angle MON$ 的角平分线 $OP$，$PA \perp OM$ 于 $A$，$PB \perp ON$ 于 $B$。
      求证：$PA = PB$，$OA = OB$。
    questionEn: |
      The bisector $OP$ of $\angle MON$, with $PA \perp OM$ at $A$ and $PB \perp ON$ at $B$.
      Prove: $PA = PB$ and $OA = OB$.
    answer: |
      在 $\triangle OAP$ 和 $\triangle OBP$ 中：
      $\angle OAP = \angle OBP = 90°$（垂线），$OP$ 为公共边（斜边），
      $\angle AOP = \angle BOP$（角平分线），
      由 AAS 得 $\triangle OAP \cong \triangle OBP$，
      故 $PA = PB$（对应边），$OA = OB$（对应边）。
    answerEn: |
      In $\triangle OAP$ and $\triangle OBP$:
      $\angle OAP = \angle OBP = 90°$ (perpendiculars), $OP$ is a common side (hypotenuse),
      $\angle AOP = \angle BOP$ (angle bisector).
      By AAS (or HL), $\triangle OAP \cong \triangle OBP$,
      so $PA = PB$ (corresponding sides) and $OA = OB$ (corresponding sides).
    explanation: |
      角平分线性质定理：角平分线上的点到角两边的距离相等。
      这是后续圆的内切圆心、三角形角平分线交点等概念的基础。
    explanationEn: |
      Angle bisector property theorem: a point on the bisector of an angle is equidistant from the two sides.
      This is foundational for later topics like the incenter of a triangle and inscribed circles.

  - number: 11
    type: open
    difficulty: 3
    question: |
      如图，在 $\triangle ABC$ 中，$AB = AC$，$D$、$E$ 分别是 $AB$、$AC$ 上的点，且 $AD = AE$。
      求证：$BD = CE$。
    questionEn: |
      In $\triangle ABC$ with $AB = AC$, points $D$ and $E$ lie on $AB$ and $AC$ respectively with $AD = AE$.
      Prove: $BD = CE$.
    answer: |
      ∵ $AB = AC$，$AD = AE$，
      ∴ $BD = AB - AD = AC - AE = CE$。

      （更严格的证法：在 $\triangle ABE$ 和 $\triangle ACD$ 中，
      $AB = AC$，$AE = AD$，$\angle A$ 公共，
      由 SAS 得 $\triangle ABE \cong \triangle ACD$，
      故 $BE = CD$……但题目只要求 $BD = CE$，直接用等式计算即可。）
    answerEn: |
      ∵ $AB = AC$, $AD = AE$,
      ∴ $BD = AB - AD = AC - AE = CE$.

      (More rigorous: in $\triangle ABE$ and $\triangle ACD$, $AB = AC$, $AE = AD$, $\angle A$ is common.
      By SAS, $\triangle ABE \cong \triangle ACD$, giving $BE = CD$.
      But for proving $BD = CE$ directly, the calculation above is sufficient.)
    explanation: |
      有时候不需要全等三角形，直接用等式代入就更简洁。
      遇到"减法结构"（如 $BD = AB - AD$），先尝试等式计算，再考虑全等。
    explanationEn: |
      Sometimes direct arithmetic with equalities is simpler than finding congruent triangles.
      When you see a "subtraction structure" (like $BD = AB - AD$), try arithmetic first before looking for congruence.

  - number: 12
    type: open
    difficulty: 3
    question: |
      如图，$AB \parallel CD$，$AB = CD$，$AC$ 与 $BD$ 相交于点 $O$。
      求证：$OA = OD$，$OB = OC$。
    questionEn: |
      As shown, $AB \parallel CD$, $AB = CD$, and $AC$ intersects $BD$ at point $O$.
      Prove: $OA = OD$ and $OB = OC$.
    answer: |
      在 $\triangle OAB$ 和 $\triangle ODC$ 中：
      $\angle OAB = \angle ODC$（$AB \parallel CD$，内错角），
      $AB = CD$（已知），
      $\angle OBA = \angle OCD$（$AB \parallel CD$，内错角），
      由 ASA 得 $\triangle OAB \cong \triangle ODC$，
      故 $OA = OD$，$OB = OC$（对应边相等）。
    answerEn: |
      In $\triangle OAB$ and $\triangle ODC$:
      $\angle OAB = \angle ODC$ ($AB \parallel CD$, alternate interior angles),
      $AB = CD$ (given),
      $\angle OBA = \angle OCD$ ($AB \parallel CD$, alternate interior angles).
      By ASA, $\triangle OAB \cong \triangle ODC$,
      so $OA = OD$ and $OB = OC$ (corresponding sides).
    explanation: |
      $AB \parallel CD$ 且 $AB = CD$ 是平行四边形的条件！（一组对边平行且相等）
      这个证明说明：平行四边形的对角线互相平分——经典结论。
    explanationEn: |
      $AB \parallel CD$ and $AB = CD$ are the conditions for a parallelogram (one pair of opposite sides parallel and equal).
      This proof establishes that the diagonals of a parallelogram bisect each other — a classic result.

  - number: 13
    type: open
    difficulty: 3
    question: |
      如图，$PA$、$PB$ 是圆的两条切线（$A$、$B$ 是切点），$O$ 是圆心。
      已知 $OA \perp PA$，$OB \perp PB$（切线与半径垂直）。
      求证：$PA = PB$（从圆外一点作两切线，切线段相等）。
    questionEn: |
      $PA$ and $PB$ are two tangents to a circle (with tangent points $A$ and $B$), $O$ is the center.
      Given $OA \perp PA$ and $OB \perp PB$ (tangent perpendicular to radius).
      Prove: $PA = PB$ (tangent segments from an external point are equal).
    answer: |
      在 $\triangle OAP$ 和 $\triangle OBP$ 中：
      $\angle OAP = \angle OBP = 90°$（切线与半径垂直），
      $OP$ 为公共边（斜边），
      $OA = OB$（圆的半径相等，直角边），
      由 HL 得 $\triangle OAP \cong \triangle OBP$，
      故 $PA = PB$（对应边相等）。
    answerEn: |
      In $\triangle OAP$ and $\triangle OBP$:
      $\angle OAP = \angle OBP = 90°$ (tangent perpendicular to radius),
      $OP$ is a common side (hypotenuse),
      $OA = OB$ (equal radii, legs).
      By HL, $\triangle OAP \cong \triangle OBP$,
      so $PA = PB$ (corresponding sides).
    explanation: |
      这是圆的切线长定理的证明，将在九年级圆的章节中正式学习。
      这里预先感受一下 HL 在直角三角形（切线半径垂直构成直角）中的应用。
    explanationEn: |
      This is the proof of the tangent-length theorem, which will be formally studied in the Grade 9 chapter on circles.
      Here we preview how HL applies when tangent-radius perpendicularity creates right triangles.

examPrep:
  intro: 综合运用全等三角形的判定与性质，重点考查辅助线的添加与几何推理能力。难度高于课内练习，注意易错点。
  introEn: Comprehensive application of congruence criteria and properties, with emphasis on auxiliary lines and geometric reasoning. Difficulty above in-class exercises; watch for common traps.
  problems:
    - number: 1
      type: choice
      difficulty: 3
      question: |
        下列条件中，能判定 $\triangle ABC \cong \triangle DEF$ 的是（  ）
        A. $AB = DE$，$BC = EF$，$\angle A = \angle D$
        B. $\angle A = \angle D$，$\angle B = \angle E$，$\angle C = \angle F$
        C. $AB = DE$，$\angle B = \angle E$，$BC = EF$
        D. $\angle A = \angle D$，$\angle B = \angle E$，$AB = DE$
      questionEn: |
        Which of the following conditions proves $\triangle ABC \cong \triangle DEF$? (  )
        A. $AB = DE$, $BC = EF$, $\angle A = \angle D$
        B. $\angle A = \angle D$, $\angle B = \angle E$, $\angle C = \angle F$
        C. $AB = DE$, $\angle B = \angle E$, $BC = EF$
        D. $\angle A = \angle D$, $\angle B = \angle E$, $AB = DE$
      answer: 'C 和 D 都正确'
      answerEn: 'Both C and D are correct'
      explanation: |
        A：$\angle A$ 是 $AB$ 和 $AC$ 的夹角，不是 $AB$ 和 $BC$ 的夹角，所以 $AB$、$BC$、$\angle A$ 是 SSA，不成立。
        B：AAA，只能证相似，不能证全等。
        C：$AB = DE$，$\angle B = \angle E$（夹角），$BC = EF$，这是 SAS，成立。
        D：$\angle A = \angle D$，$\angle B = \angle E$，$AB = DE$（$AB$ 是 $\angle A$ 和 $\angle B$ 的夹边），这是 ASA，成立。
      explanationEn: |
        A: $\angle A$ is between $AB$ and $AC$, not between $AB$ and $BC$, so $AB$, $BC$, $\angle A$ form SSA — not valid.
        B: AAA proves similarity only, not congruence.
        C: $AB = DE$, $\angle B = \angle E$ (included angle), $BC = EF$ — this is SAS, valid.
        D: $\angle A = \angle D$, $\angle B = \angle E$, $AB = DE$ ($AB$ is between $\angle A$ and $\angle B$) — this is ASA, valid.

    - number: 2
      type: proof
      difficulty: 3
      question: |
        如图，在 $\triangle ABC$ 中，$\angle ACB = 90°$，$CD \perp AB$ 于 $D$，$CE$ 是 $\angle ACB$ 的角平分线，$EF \perp AB$ 于 $F$。
        求证：$F$ 是 $DB$ 的中点。
      questionEn: |
        In $\triangle ABC$, $\angle ACB = 90°$, $CD \perp AB$ at $D$, and $CE$ bisects $\angle ACB$, with $EF \perp AB$ at $F$.
        Prove: $F$ is the midpoint of $DB$.
      answer: |
        **证明：**
        ∵ $CE$ 是 $\angle ACB$ 的角平分线，$CD \perp AB$，$EF \perp AB$，
        ∴ $CD \perp BC$……（此处题意复杂，重新梳理）

        实际思路：
        $CE$ 平分 $\angle ACB = 90°$，所以 $\angle DCE = \angle ECB = 45°$（$CD \perp AB$ 意味着 $\angle CDB = 90°$，$CD$ 是 $AB$ 上的高）。

        在 $\triangle CDF$ 和 $\triangle CDB$ 中（$F$ 在 $AB$ 上，$EF \perp AB$，$E$ 在 $BC$ 上）：
        用<<角平分线/angle bisector>>性质，$CE$ 平分 $\angle BCA$，$D$、$F$ 是到两边的垂足，
        则 $CD = CF$（角平分线上的点 $C$……此处 $C$ 本身在角平分线上，需调整）。

        **标准解法**：利用 $\triangle CDF \cong \triangle CBF$（$\angle CDF = \angle CBF = 90°$，$CF$ 公共，$\angle DCF = \angle BCF = 45°$，由 AAS），
        故 $DF = BF$，即 $F$ 是 $DB$ 中点。
      answerEn: |
        **Proof:**
        Since $CE$ bisects $\angle ACB = 90°$, we have $\angle DCE = \angle ECB = 45°$.

        In $\triangle CDF$ and $\triangle CBF$:
        $\angle CDF = \angle CBF = 90°$ (both $CD \perp AB$ and $EF \perp AB$ give right angles),
        $CF$ is a common side,
        $\angle DCF = \angle BCF = 45°$ (since $CE$ bisects the $90°$ angle).
        By AAS, $\triangle CDF \cong \triangle CBF$,
        so $DF = BF$, i.e., $F$ is the midpoint of $DB$.
      explanation: |
        关键：角平分线把直角分成两个 $45°$，使得对应角相等，配合公共边和直角，用 AAS 完成证明。
      explanationEn: |
        Key insight: the angle bisector splits the right angle into two $45°$ angles, creating equal angles.
        Combined with the common side and right angles, AAS completes the proof.

    - number: 3
      type: proof
      difficulty: 4
      question: |
        如图，$AD$ 是 $\triangle ABC$ 的角平分线，$DE \perp AB$ 于 $E$，$DF \perp AC$ 于 $F$，$G$ 是 $BC$ 上的点，$DG \perp BC$ 于 $G$。
        求证：$DE = DF = DG$。
      questionEn: |
        $AD$ bisects angle $A$ of $\triangle ABC$, $DE \perp AB$ at $E$, $DF \perp AC$ at $F$, and $DG \perp BC$ at $G$ ($G$ on $BC$).
        Prove: $DE = DF = DG$.
      answer: |
        **证明 $DE = DF$：**
        在 $\triangle ADE$ 和 $\triangle ADF$ 中：
        $\angle AED = \angle AFD = 90°$（垂线），
        $AD$ 公共（斜边），
        $\angle DAE = \angle DAF$（$AD$ 是角平分线），
        由 AAS 得 $\triangle ADE \cong \triangle ADF$，
        故 $DE = DF$。

        **证明 $DE = DG$（即 $DF = DG$）：**
        在 $\triangle BDE$ 和 $\triangle BDG$ 中：
        $\angle BED = \angle BGD = 90°$，
        $BD$ 公共（斜边），
        $BE = AB - AE$，$BG$ 在 $BC$ 上……

        更简洁：利用已证的 $DE = DF$，再证 $DF = DG$。
        在 $\triangle CDF$ 和 $\triangle CDG$ 中：
        $\angle CFD = \angle CGD = 90°$，$CD$ 公共，$\angle FCD = \angle GCD$（……$CD$ 不一定是角平分线）。

        **正确思路**：$D$ 在 $\angle A$ 的角平分线上，由角平分线性质，$D$ 到 $AB$、$AC$ 的距离相等，即 $DE = DF$。
        但 $DG = DE = DF$ 需要额外条件（$D$ 也在 $\angle B$ 或 $\angle C$ 的角平分线上，即 $D$ 是内心）。
        若题目成立，则 $D$ 是三角形的内心。
      answerEn: |
        **Proving $DE = DF$:**
        In $\triangle ADE$ and $\triangle ADF$:
        $\angle AED = \angle AFD = 90°$ (perpendiculars), $AD$ is common (hypotenuse),
        $\angle DAE = \angle DAF$ ($AD$ is angle bisector).
        By AAS (or HL), $\triangle ADE \cong \triangle ADF$, so $DE = DF$.

        **Proving $DE = DG$:**
        Since $D$ lies on the bisector of $\angle A$, we have $DE = DF$ (equal distances to the two sides of $\angle A$).
        If $D$ also lies on the bisector of $\angle B$, then $DE = DG$ (equal distances to the two sides of $\angle B$).
        This means $D$ is the incenter of $\triangle ABC$ — the point equidistant from all three sides.
      explanation: |
        三角形的三条角平分线交于一点（<<内心/incenter>>），内心到三边的距离相等（<<内切圆/inscribed circle>>的半径）。
        这是一个重要定理的几何含义。
      explanationEn: |
        The three angle bisectors of a triangle meet at a single point (the <<内心/incenter>>),
        which is equidistant from all three sides (the radius of the <<内切圆/inscribed circle>>).
        This is the geometric meaning of an important theorem.

    - number: 4
      type: proof
      difficulty: 4
      question: |
        如图，在正方形 $ABCD$ 中，$E$ 是 $BC$ 上的点，$AF \perp AE$，$AF = AE$，$F$ 在 $CD$ 的延长线上。
        求证：$BE = DF$。
      questionEn: |
        In square $ABCD$, $E$ is a point on $BC$, $AF \perp AE$, $AF = AE$, and $F$ lies on the extension of $CD$.
        Prove: $BE = DF$.
      answer: |
        **证明：**
        在 $\triangle ABE$ 和 $\triangle ADF$ 中：
        $AB = AD$（正方形的边相等），
        $\angle ABE = \angle ADF = 90°$（正方形的角），
        $\angle BAE + \angle DAF = ?$

        由于 $\angle BAE + \angle AEF = 90°$（$\triangle ABE$ 中，$\angle B = 90°$），
        而 $\angle AEF = \angle EAF + \angle AFE$……

        **更直接的方法**：
        $\angle BAE + \angle EAF + \angle FAD = \angle BAD = 90°$（正方形），
        $\angle EAF = 90°$（已知 $AF \perp AE$），这与 $\angle BAD = 90°$ 矛盾，说明 $\angle BAE + \angle FAD = 0°$，不可能。

        重新理解题意：$\angle BAE + \angle DAF$——在 $\triangle ABE$ 中，$\angle BAE = 90° - \angle AEB$；在 $\triangle ADF$ 中，$\angle DAF = 90° - \angle AFD$……

        **标准解法**：
        在 $\triangle ABE$ 和 $\triangle ADF$ 中，$AB = AD$，$AE = AF$，$\angle BAE = \angle DAF$
        （因为 $\angle BAE + \angle EAD = 90°$ 且 $\angle EAD + \angle DAF = \angle EAF = 90°$，故 $\angle BAE = \angle DAF$）。
        由 SAS 得 $\triangle ABE \cong \triangle ADF$，故 $BE = DF$。
      answerEn: |
        **Proof:**
        In $\triangle ABE$ and $\triangle ADF$:
        $AB = AD$ (sides of square),
        $AE = AF$ (given),
        $\angle BAE = \angle DAF$ because:
        $\angle BAE + \angle EAD = \angle BAD = 90°$, and
        $\angle EAD + \angle DAF = \angle EAF = 90°$ (since $AF \perp AE$),
        so $\angle BAE = \angle DAF$.
        By SAS, $\triangle ABE \cong \triangle ADF$, so $BE = DF$.
      explanation: |
        关键技巧：利用两个 $90°$ 角（正方形内角和垂直关系）推导 $\angle BAE = \angle DAF$。
        "借助两个直角做差"得到相等的角是处理正方形问题的常用手法。
      explanationEn: |
        Key technique: use two $90°$ angles (square's interior angle and the perpendicularity condition)
        to derive $\angle BAE = \angle DAF$. "Subtracting from two right angles" to get equal angles
        is a standard approach in problems involving squares.

    - number: 5
      type: proof
      difficulty: 4
      question: |
        如图，$\triangle ABC$ 中，$\angle ABC = \angle ACB$，$D$、$E$ 分别是 $AB$、$AC$ 的中点，$DF \perp BC$ 于 $F$，$EG \perp BC$ 于 $G$。
        求证：$DF = EG$。
      questionEn: |
        In $\triangle ABC$, $\angle ABC = \angle ACB$, $D$ and $E$ are midpoints of $AB$ and $AC$, $DF \perp BC$ at $F$, $EG \perp BC$ at $G$.
        Prove: $DF = EG$.
      answer: |
        **证明：**
        ∵ $\angle ABC = \angle ACB$，∴ $\triangle ABC$ 是等腰三角形，$AB = AC$。
        ∵ $D$、$E$ 分别是 $AB$、$AC$ 的中点，∴ $BD = \frac{1}{2}AB$，$CE = \frac{1}{2}AC$，故 $BD = CE$。
        在 $\triangle BDF$ 和 $\triangle CEG$ 中：
        $\angle BFD = \angle CGE = 90°$，
        $\angle DBF = \angle ECG$（即 $\angle B = \angle C$，已知），
        $BD = CE$，
        由 AAS 得 $\triangle BDF \cong \triangle CEG$，
        故 $DF = EG$（对应边相等）。
      answerEn: |
        **Proof:**
        ∵ $\angle ABC = \angle ACB$, ∴ $\triangle ABC$ is isosceles with $AB = AC$.
        ∵ $D$ and $E$ are midpoints of $AB$ and $AC$, ∴ $BD = \frac{1}{2}AB = \frac{1}{2}AC = CE$.
        In $\triangle BDF$ and $\triangle CEG$:
        $\angle BFD = \angle CGE = 90°$ (perpendiculars),
        $\angle DBF = \angle ECG$ (i.e., $\angle B = \angle C$, given),
        $BD = CE$ (shown above).
        By AAS, $\triangle BDF \cong \triangle CEG$, so $DF = EG$.
      explanation: |
        这道题综合了：等腰三角形性质（等角对等边）→ 中点产生相等线段 → AAS 判定全等 → 对应边相等。
        每一步都建立在上一步的结论上，体现几何推理的链式结构。
      explanationEn: |
        This problem chains together: isosceles triangle property (equal angles → equal sides) →
        midpoints produce equal segments → AAS congruence → equal corresponding sides.
        Each step builds on the previous conclusion, illustrating the chain structure of geometric reasoning.

summary: |
  本章系统学习了全等三角形的核心知识：

  **1. 全等的概念与记法**
  全等图形可以通过平移、旋转、翻折完全重合。$\triangle ABC \cong \triangle DEF$ 中，顶点字母顺序决定所有对应关系。

  **2. 全等的性质**
  对应边相等，对应角相等。这是证明线段相等和角相等的核心工具。

  **3. 四种判定方法**
  - SSS（三边相等）：体现三角形的刚性
  - SAS（两边夹角相等）：注意必须是夹角
  - ASA（两角夹边相等）：注意必须是夹边
  - AAS（两角和一边相等）：边是某角的对边
  - **不成立**：SSA（二义性）、AAA（只能证相似）

  **4. HL（直角三角形）**
  斜边和一条直角边相等的两个直角三角形全等。本质是勾股定理消除了 SSA 的二义性。

  **5. 辅助线策略**
  倍长中线、取中点连线、过点作平行线、连接两点、作角平分线或垂线。
  关键是"逆推法"：从目标出发，确定需要哪两个三角形全等，再分析需要什么条件，最后添加辅助线补充条件。

  **学习这章的意义**：全等三角形是几何证明的"基本武器"。
  掌握它，就掌握了证明线段相等、角相等的基本方法，为后续的平行四边形、圆等更复杂的几何章节打好基础。
summaryEn: |
  This chapter provided a systematic study of congruent triangles:

  **1. Concept and notation of congruence**
  Congruent figures can coincide perfectly through translation, rotation, or reflection.
  In $\triangle ABC \cong \triangle DEF$, the order of vertex letters determines all correspondences.

  **2. Properties of congruent triangles**
  Corresponding sides are equal; corresponding angles are equal.
  This is the core tool for proving segments and angles equal.

  **3. Four congruence criteria**
  - SSS (three equal sides): reflects triangle rigidity
  - SAS (two sides + included angle equal): the angle must be included
  - ASA (two angles + included side equal): the side must be included
  - AAS (two angles + a side equal): the side is opposite one of the angles
  - **Not valid**: SSA (ambiguous case), AAA (proves similarity only)

  **4. HL (right triangles)**
  Two right triangles with equal hypotenuses and one equal leg are congruent.
  The Pythagorean theorem eliminates the SSA ambiguity in this special case.

  **5. Auxiliary line strategies**
  Doubling the median, connecting midpoints, drawing parallel lines, connecting two points,
  drawing angle bisectors or perpendiculars.
  The key is reverse reasoning: start from the goal, identify which two triangles need to be congruent,
  determine what conditions are needed, then add auxiliary lines to supply those conditions.

  **Why this chapter matters**: Congruent triangles are the "basic weapon" of geometric proof.
  Mastering this chapter equips you with the fundamental method for proving segments and angles equal,
  laying the foundation for more advanced topics like parallelograms and circles.
