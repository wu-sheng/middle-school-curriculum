        So it's a right triangle with legs 5 and 12. Area $= \frac{1}{2}\times5\times12=30$.
        **Contest tip**: When sides are integers, first check for Pythagorean triples (3-4-5, 5-12-13, 8-15-17) — you can skip Heron's formula entirely!

