    - number: 1
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #21"
      section: 底×高与坐标面积
      question: |
        直线 $y = 5$、$y = 1 + x$ 和 $y = 1 - x$ 围成的三角形面积是多少？
      questionEn: |
        What is the area of the triangle formed by the lines $y = 5$, $y = 1 + x$, and $y = 1 - x$?
      choices:
        - label: A
          content: '4'
        - label: B
          content: '8'
        - label: C
          content: '10'
        - label: D
          content: '12'
        - label: E
          content: '16'
      correctValue: E
      answer: '(E) 16'
      answerEn: '(E) 16'
      explanation: |
        求三条直线的交点：
        $y=5$ 与 $y=1+x$：$5=1+x$，$x=4$，交点 $(4, 5)$。
        $y=5$ 与 $y=1-x$：$5=1-x$，$x=-4$，交点 $(-4, 5)$。
        $y=1+x$ 与 $y=1-x$：$1+x=1-x$，$x=0$，交点 $(0, 1)$。
        底 $= |4-(-4)| = 8$（$y=5$ 上的水平线段），高 $= |5-1| = 4$。
        面积 $= \frac{1}{2} \times 8 \times 4 = \mathbf{16}$。
