        一个菱形的边长为 10，较短的对角线长为 12。这个菱形的面积是多少？
      questionEn: |
        A rhombus has side length 10 and a shorter diagonal of length 12. What is its area?
      choices:
        - label: A
          content: '80'
        - label: B
          content: '96'
        - label: C
          content: '100'
        - label: D
          content: '120'
        - label: E
          content: '160'
      correctValue: B
      answer: '(B) 96'
      answerEn: '(B) 96'
      explanation: |
        对角线互相垂直平分，半条短对角线 $= 6$。
        用勾股定理：半条长对角线 $= \sqrt{10^{2} - 6^{2}} = \sqrt{64} = 8$，长对角线 $= 16$。
        面积 $= \frac{1}{2} \times 12 \times 16 = \mathbf{96}$。
      explanationEn: |
        Diagonals bisect perpendicularly: half short diagonal $= 6$.
        Half long diagonal $= \sqrt{100-36} = 8$, full $= 16$.
        Area $= \frac{1}{2}\times12\times16 = \mathbf{96}$.

    - number: 10
      type: 单选题
      inputType: mc
      source: 教学原创题
      section: 四边形与综合
      question: |
        梯形的两条平行边长分别为 8 和 14，两条腰长分别为 5 和 5（等腰梯形）。求面积。
      questionEn: |
        An isosceles trapezoid has parallel sides of length 8 and 14, and legs of length 5 each. Find its area.
      choices:
        - label: A
          content: '33'
        - label: B
          content: '40'
        - label: C
          content: '44'
        - label: D
          content: '50'
        - label: E
          content: '55'
      correctValue: C
      answer: '(C) 44'
      answerEn: '(C) 44'
      explanation: |
        等腰梯形的高可以用勾股定理求：底边差 $= 14 - 8 = 6$，每侧多出 $3$。
        高 $= \sqrt{5^{2} - 3^{2}} = \sqrt{16} = 4$。
        面积 $= \frac{1}{2} \times (8 + 14) \times 4 = \frac{1}{2} \times 22 \times 4 = \mathbf{44}$。
      explanationEn: |
        Height of isosceles trapezoid: extra base on each side $= \frac{14-8}{2}=3$.
        Height $= \sqrt{25-9}=4$.
        Area $= \frac{1}{2}(8+14)\times4 = \mathbf{44}$.

    - number: 11
      type: 单选题
      inputType: mc
      source: "AMC 8 2019 #24 改编"
      section: 四边形与综合
      question: |
        在 $\triangle ABC$ 中，$AB = 5$，$BC = 7$，$AC = 8$。点 $D$ 是 $\overline{AC}$ 的中点。$\triangle ABD$ 的面积是多少？
      questionEn: |
        In $\triangle ABC$, $AB = 5$, $BC = 7$, and $AC = 8$. Point $D$ is the midpoint of $\overline{AC}$. What is the area of $\triangle ABD$?
      choices:
        - label: A
          content: '$5\sqrt{3}$'
        - label: B
          content: '10'
        - label: C
          content: '$4\sqrt{6}$'
        - label: D
          content: '$6\sqrt{2}$'
        - label: E
          content: '$5\sqrt{6}$'
      correctValue: A
      answer: '(A) $5\sqrt{3}$'
      answerEn: '(A) $5\sqrt{3}$'
      explanation: |
        先用海伦公式求 $\triangle ABC$ 面积：$s = \frac{5+7+8}{2} = 10$。
        $S_{ABC} = \sqrt{10 \times 5 \times 3 \times 2} = \sqrt{300} = 10\sqrt{3}$。
        $D$ 是 $AC$ 中点，$\triangle ABD$ 和 $\triangle BDC$ 共享从 $B$ 到 $AC$ 的高，底之比 $= AD : DC = 1 : 1$。
        所以 $S_{ABD} = \frac{1}{2} \times 10\sqrt{3} = \mathbf{5\sqrt{3}}$。
      explanationEn: |
        Heron's for $\triangle ABC$: $s=10$, $S = \sqrt{10\times5\times3\times2} = 10\sqrt{3}$.
        $D$ is the midpoint of $AC$, so $\triangle ABD$ has half the area: $\frac{1}{2}\times10\sqrt{3} = \mathbf{5\sqrt{3}}$.

    - number: 12
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 四边形与综合
      question: |
        在直角 $\triangle ABC$ 中，$\angle C = 90°$，$AC = 5$，$BC = 12$，$AB = 13$。点 $D$ 在 $\overline{AB}$ 上，使得 $CD \perp AB$。$CD$ 的长度是多少？
      questionEn: |
        In right $\triangle ABC$ with $\angle C = 90°$, $AC = 5$, $BC = 12$, and $AB = 13$. Point $D$ is on $\overline{AB}$ such that $CD \perp AB$. What is the length of $CD$?
      choices:
        - label: A
          content: '$\frac{30}{13}$'
        - label: B
          content: '$\frac{48}{13}$'
        - label: C
          content: '$\frac{60}{13}$'
        - label: D
          content: '$\frac{72}{13}$'
        - label: E
          content: '5'
      correctValue: C
      answer: '(C) $\frac{60}{13}$'
      answerEn: '(C) $\frac{60}{13}$'
      explanation: |
        $\triangle ABC$ 面积 $= \frac{1}{2} \times AC \times BC = \frac{1}{2} \times 5 \times 12 = 30$。
        $CD$ 是斜边 $AB$ 上的高。以 $AB = 13$ 为底，$CD$ 为高：
        $\frac{1}{2} \times 13 \times CD = 30$，所以 $CD = \frac{60}{13}$。
        这是一个经典技巧：**用两种方式表达同一个三角形的面积**，从而求出未知长度。
      explanationEn: |
        Area of $\triangle ABC = \frac{1}{2}\times5\times12=30$.
        $CD$ is the altitude to hypotenuse $AB=13$:
        $\frac{1}{2}\times13\times CD = 30$, so $CD = \frac{60}{13}$.
        Classic technique: **express the same triangle's area in two ways** to find an unknown length.

summary:
  - '面积公式选择策略：已知底和高 → 底×高；已知坐标 → 鞋带公式；已知三边 → 海伦公式'
  - '<<海伦公式/Heron''s formula>>：$S = \sqrt{s(s-a)(s-b)(s-c)}$，其中 $s = \frac{a+b+c}{2}$，是处理"三边已知、高未知"的利器'
  - '菱形面积 $= \frac{1}{2} \times d_{1} \times d_{2}$，对角线互相垂直平分，常与勾股定理联合使用'
  - '<<鞋带公式/Shoelace formula>>对任意简单多边形有效，是坐标几何题的首选'
  - '面积比技巧：共享同一条高的两个三角形，面积之比等于底之比'
  - 'AMC 8 面积题的核心：快速选对公式 + 验算验证'
summaryEn:
  - 'Formula selection: base & height known → base×height; coordinates → Shoelace; three sides → Heron''s'
  - '<<海伦公式/Heron''s formula>>: $S = \sqrt{s(s-a)(s-b)(s-c)}$ where $s=\frac{a+b+c}{2}$ — the tool for "sides known, height unknown"'
  - 'Rhombus area $= \frac{1}{2} \times d_{1} \times d_{2}$; diagonals bisect perpendicularly; often combined with the Pythagorean theorem'
  - '<<鞋带公式/Shoelace formula>> works for any simple polygon — the go-to for coordinate geometry'
