concepts:
  - id: triangle-area-basics
    title: <<三角形/triangle>>面积公式汇总
    titleEn: <<三角形/triangle>> Area Formula Toolkit
    hasVisualization: true
    content: |
      **最基本的公式——底 × 高**

      你在小学就学过：三角形面积 $= \frac{1}{2} \times$ 底 $\times$ 高。

      这个公式虽然简单，但有一个限制：你**必须知道高**。很多 AMC 8 题目并不直接告诉你高是多少——这时就需要其他公式了。

      **公式 1：底 × 高（适用于已知一边和对应高的情况）**

      $$S = \frac{1}{2} \times b \times h$$

      其中 $b$ 是底边长度，$h$ 是底边上的高。

      **技巧**：如果两个顶点的 $y$ 坐标相同（在同一条水平线上），那么这两点之间的线段就是天然的"底"，第三个点到这条水平线的垂直距离就是"高"。

      例如：$A(2, 3)$、$B(8, 3)$ 在同一水平线 $y = 3$ 上，底 $= |8 - 2| = 6$。若 $C(5, 7)$，高 $= |7 - 3| = 4$，面积 $= \frac{1}{2} \times 6 \times 4 = 12$。

      **公式 2：<<鞋带公式/Shoelace formula>>（适用于已知三个顶点坐标）**

      当三个顶点坐标已知为 $A(x_{1}, y_{1})$、$B(x_{2}, y_{2})$、$C(x_{3}, y_{3})$ 时：

      $$S = \frac{1}{2} |x_{1}(y_{2} - y_{3}) + x_{2}(y_{3} - y_{1}) + x_{3}(y_{1} - y_{2})|$$

      这个公式的名字来源：把坐标排成两列交叉相乘，像系鞋带一样。

      **为什么有用？** 你不需要先找底和高——直接代入坐标就能算出面积！在 AMC 8 的坐标几何题中，这是最快的方法。

      **记忆口诀**：三个 $x$ 分别乘对面两个 $y$ 之差，加起来取绝对值除以 2。

      **关键洞察：选对公式就是竞赛的关键**

      | 已知条件 | 最优公式 | 典型场景 |
      |---------|---------|---------|
      | 一条边和对应高 | 底 × 高 | 水平/垂直底边 |
      | 三个顶点坐标 | 鞋带公式 | 坐标几何题 |
      | 三条边长度 | 海伦公式（下节） | 已知三边、无坐标 |
    contentEn: |
      **The most basic formula — base × height**

      You learned in primary school: triangle area $= \frac{1}{2} \times$ base $\times$ height.

      This formula is simple but has a limitation: you **must know the height**. Many AMC 8 problems don't directly give you the height — that's when you need other formulas.

      **Formula 1: base × height (when you know one side and its corresponding height)**

      $$S = \frac{1}{2} \times b \times h$$

      where $b$ is the base length and $h$ is the height to that base.

      **Tip**: If two vertices share the same $y$-coordinate (on the same horizontal line), the segment between them is a natural "base," and the vertical distance from the third point to that line is the "height."

      Example: $A(2,3)$ and $B(8,3)$ lie on $y=3$, so base $= |8-2|=6$. If $C(5,7)$, height $= |7-3|=4$, area $= \frac{1}{2}\times6\times4=12$.

      **Formula 2: <<鞋带公式/Shoelace formula>> (when you know three vertex coordinates)**

      Given vertices $A(x_{1},y_{1})$, $B(x_{2},y_{2})$, $C(x_{3},y_{3})$:

      $$S = \frac{1}{2}|x_{1}(y_{2}-y_{3}) + x_{2}(y_{3}-y_{1}) + x_{3}(y_{1}-y_{2})|$$

      The name comes from cross-multiplying coordinates in two columns, like lacing a shoe.

      **Why is it useful?** You don't need to find the base and height first — just plug in coordinates! For AMC 8 coordinate geometry problems, this is the fastest method.

      **Memory aid**: Each $x$ multiplies the difference of the other two $y$-values; add them up, take the absolute value, and divide by 2.

      **Key insight: choosing the right formula is the key to competitions**

      | Known information | Best formula | Typical scenario |
      |-------------------|-------------|-----------------|
      | One side and its height | base × height | horizontal/vertical base |
      | Three vertex coordinates | Shoelace formula | coordinate geometry |
      | Three side lengths | Heron's formula (next section) | sides known, no coordinates |
    notes:
      - '鞋带公式也叫"坐标面积公式"，可扩展到多边形——把顶点按顺序列出，交叉相乘求和'
      - '当底边水平或垂直时，底×高最快；当底边倾斜时，鞋带公式更方便'
      - '鞋带公式结果取绝对值，所以顶点顺序（顺时针/逆时针）不影响结果'
    notesEn:
      - 'The Shoelace formula (also called the "coordinate area formula") extends to any polygon — list vertices in order and cross-multiply'
      - 'When the base is horizontal or vertical, base×height is fastest; when the base is slanted, the Shoelace formula is more convenient'
      - 'The absolute value in the Shoelace formula means vertex order (clockwise/counterclockwise) does not affect the result'

  - id: herons-formula
    title: <<海伦公式/Heron's formula>>
    titleEn: <<海伦公式/Heron's formula>>
    hasVisualization: true
    content: |
      **什么时候需要海伦公式？**

      想象这样一道题："三角形三边长分别是 13、14、15，求面积。"

      你知道底×高公式，但这里**高是多少？** 题目没告诉你，也不容易直接看出来。
      这正是<<海伦公式/Heron's formula>>大显身手的场景——**只要知道三边，就能直接算面积**，不需要先求高！

      **公式**

      设三角形三边长为 $a$、$b$、$c$，先计算<<半周长/semi-perimeter>>：

      $$s = \frac{a + b + c}{2}$$

      然后面积为：

      $$S = \sqrt{s(s-a)(s-b)(s-c)}$$

      **历史小知识**：这个公式以古希腊数学家<<海伦/Heron of Alexandria>>（约公元 60 年）命名。虽然叫"海伦公式"，但可能更早由阿基米德发现。

      **完整例题：三边为 13、14、15**

      第一步：算半周长
      $$s = \frac{13 + 14 + 15}{2} = \frac{42}{2} = 21$$

      第二步：代入海伦公式
      $$S = \sqrt{21 \times (21-13) \times (21-14) \times (21-15)}$$
      $$= \sqrt{21 \times 8 \times 7 \times 6}$$

      第三步：化简根号内的乘积
      $$21 \times 8 = 168, \quad 7 \times 6 = 42$$
      $$168 \times 42 = 7056$$
      $$S = \sqrt{7056} = 84$$

      第四步：用底×高验证
      取底 $= 14$，则高 $h = \frac{2 \times 84}{14} = 12$。
      高的脚把底边分成两段，设为 $x$ 和 $14-x$：
      $$13^{2} = 12^{2} + x^{2} \Rightarrow x^{2} = 169 - 144 = 25 \Rightarrow x = 5$$
      $$15^{2} = 12^{2} + (14-5)^{2} = 144 + 81 = 225 \text{ ✓}$$
      验证成功！面积确实是 $\mathbf{84}$。

      **什么时候用海伦公式？**

      ✅ 知道三边长度，不知道高 → 用海伦公式
      ✅ 三边是整数，想快速求面积 → 海伦公式很方便
      ❌ 已知坐标 → 用鞋带公式更快
      ❌ 已知底和高 → 直接底×高最快

      **常见错误**

      ⚠️ 忘记先算 $s$，直接用 $a$、$b$、$c$ 代入 → 结果完全错误
      ⚠️ $s$ 算错（尤其当边长不是整数时）→ 一定要仔细计算 $\frac{a+b+c}{2}$
      ⚠️ 根号内出现负数 → 说明三边不满足三角不等式（不能构成三角形）

      **海伦公式与底×高公式的关系**

      海伦公式本质上和底×高公式是等价的！它只是帮你"绕过"了求高这一步。
      数学上可以证明：海伦公式 = 把勾股定理求高的过程"打包"进了一个公式。
      所以它不是新的数学，而是一个**高效的计算工具**。
    contentEn: |
      **When do you need Heron's formula?**

      Imagine this problem: "A triangle has sides 13, 14, and 15. Find its area."

      You know the base×height formula, but **what is the height?** The problem doesn't tell you, and it's not obvious.
      This is exactly when <<海伦公式/Heron's formula>> shines — **given just the three sides, you can compute the area directly**, without finding the height first!

      **The formula**

      Let the three sides be $a$, $b$, $c$. First compute the <<半周长/semi-perimeter>>:

      $$s = \frac{a + b + c}{2}$$

      Then the area is:

      $$S = \sqrt{s(s-a)(s-b)(s-c)}$$

      **Historical note**: This formula is named after <<海伦/Heron of Alexandria>> (circa 60 AD), though it may have been discovered earlier by Archimedes.

      **Worked example: sides 13, 14, 15**

      Step 1: Compute the semi-perimeter
      $$s = \frac{13+14+15}{2} = \frac{42}{2} = 21$$

      Step 2: Plug into Heron's formula
      $$S = \sqrt{21 \times (21-13) \times (21-14) \times (21-15)}$$
      $$= \sqrt{21 \times 8 \times 7 \times 6}$$

      Step 3: Simplify the product under the radical
      $$21 \times 8 = 168, \quad 7 \times 6 = 42$$
      $$168 \times 42 = 7056$$
      $$S = \sqrt{7056} = 84$$

      Step 4: Verify with base×height
      Take base $= 14$, then height $h = \frac{2 \times 84}{14} = 12$.
      The foot of the height splits the base into $x$ and $14-x$:
      $$13^{2} = 12^{2} + x^{2} \Rightarrow x^{2} = 25 \Rightarrow x = 5$$
      $$15^{2} = 12^{2} + 9^{2} = 144 + 81 = 225 \text{ ✓}$$
      Verified! The area is indeed $\mathbf{84}$.

      **When to use Heron's formula?**

      ✅ Three sides known, height unknown → use Heron's formula
      ✅ Integer sides, quick area needed → Heron's formula is convenient
      ❌ Coordinates given → Shoelace formula is faster
      ❌ Base and height known → base×height is fastest

      **Common mistakes**

      ⚠️ Forgetting to compute $s$ first and plugging in $a$, $b$, $c$ directly → completely wrong
      ⚠️ Computing $s$ incorrectly (especially for non-integer sides) → double-check $\frac{a+b+c}{2}$
      ⚠️ Negative value under the radical → the three sides violate the triangle inequality

      **Relationship between Heron's formula and base×height**

      Heron's formula is mathematically equivalent to the base×height formula! It just lets you "skip" finding the height.
      It can be proved that Heron's formula "packages" the process of using the Pythagorean theorem to find the height into a single formula.
      So it's not new math — it's an **efficient computational tool**.
    notes:
      - '海伦公式适用于知道三边求面积的场景，AMC 8 中经常出现'
      - '当三边是整数时，可以用海伦公式快速验算'
      - '半周长 $s$ 一定要先算对——这是最常见的错误来源'
      - '若 $s(s-a)(s-b)(s-c)$ 不是完全平方数，面积就是无理数（用根号表示）'
    notesEn:
      - 'Heron''s formula is ideal when three sides are known — it appears frequently in AMC 8'
      - 'When sides are integers, Heron''s formula provides a quick verification'
      - 'Getting the semi-perimeter $s$ right is critical — this is the most common source of error'
      - 'If $s(s-a)(s-b)(s-c)$ is not a perfect square, the area is irrational (expressed with a radical)'

  - id: quadrilateral-area-decomposition
    title: 四边形面积的三角形分解法
    titleEn: Quadrilateral Area via Triangle Decomposition
    hasVisualization: true
    content: |
      **从三角形到四边形——分解思想**

      三角形是最基本的多边形。任何四边形都可以沿一条对角线分成两个三角形，分别求面积再相加。这就是**三角形分解法**。

      **菱形面积——对角线公式**

      <<菱形/rhombus>>有一个特别简洁的面积公式：

      $$S = \frac{1}{2} \times d_{1} \times d_{2}$$

      其中 $d_{1}$、$d_{2}$ 是两条对角线的长度。

      **为什么成立？** 菱形的两条对角线互相垂直平分。沿对角线分成 4 个直角三角形，每个的两直角边分别是 $\frac{d_{1}}{2}$ 和 $\frac{d_{2}}{2}$。

      4 个三角形面积之和 $= 4 \times \frac{1}{2} \times \frac{d_{1}}{2} \times \frac{d_{2}}{2} = \frac{d_{1} \times d_{2}}{2}$

      **AMC 8 常见套路：已知菱形的边和一条对角线，求面积**

      关键步骤：
      1. 菱形四边相等，所以 $\text{边} = \frac{\text{周长}}{4}$
      2. 对角线互相垂直平分，形成直角三角形
      3. 用勾股定理求另一条对角线
      4. 用对角线公式算面积

      **一般四边形——对角线分割法**

      对于不规则四边形 $ABCD$，沿对角线 $AC$ 分成 $\triangle ABC$ 和 $\triangle ACD$。

      如果知道坐标，分别对两个三角形用鞋带公式，再相加。

      **鞋带公式的四边形扩展**

      鞋带公式可以直接扩展到四边形！顶点按顺序（顺时针或逆时针）为 $(x_{1},y_{1})$、$(x_{2},y_{2})$、$(x_{3},y_{3})$、$(x_{4},y_{4})$ 时：

      $$S = \frac{1}{2}|x_{1}y_{2} - x_{2}y_{1} + x_{2}y_{3} - x_{3}y_{2} + x_{3}y_{4} - x_{4}y_{3} + x_{4}y_{1} - x_{1}y_{4}|$$

      **梯形面积——也可以用分解法理解**

      梯形面积 $= \frac{1}{2}(a + b) \times h$（$a$、$b$ 是上下底，$h$ 是高）。

      这其实等于沿对角线分成两个三角形：
      - 底为 $a$、高为 $h$ 的三角形：面积 $\frac{1}{2}ah$
      - 底为 $b$、高为 $h$ 的三角形：面积 $\frac{1}{2}bh$
      - 总面积 $= \frac{1}{2}(a+b)h$ ✓
    contentEn: |
      **From triangles to quadrilaterals — the decomposition idea**

      A triangle is the most basic polygon. Any quadrilateral can be split into two triangles along a diagonal; compute each area and add them up. This is the **triangle decomposition method**.

      **Rhombus area — the diagonal formula**

      A <<菱形/rhombus>> has a particularly elegant area formula:

      $$S = \frac{1}{2} \times d_{1} \times d_{2}$$

      where $d_{1}$ and $d_{2}$ are the two diagonals.

      **Why does it work?** The diagonals of a rhombus are perpendicular bisectors of each other. They split the rhombus into 4 right triangles, each with legs $\frac{d_{1}}{2}$ and $\frac{d_{2}}{2}$.

      Total area $= 4 \times \frac{1}{2} \times \frac{d_{1}}{2} \times \frac{d_{2}}{2} = \frac{d_{1} \times d_{2}}{2}$

      **Common AMC 8 pattern: given a rhombus's side and one diagonal, find the area**

      Key steps:
      1. All sides of a rhombus are equal, so side $= \frac{\text{perimeter}}{4}$
      2. The diagonals are perpendicular bisectors → right triangles
      3. Use the Pythagorean theorem to find the other diagonal
      4. Use the diagonal formula for the area

      **General quadrilateral — diagonal splitting**

      For an irregular quadrilateral $ABCD$, cut along diagonal $AC$ to get $\triangle ABC$ and $\triangle ACD$.

      If coordinates are known, apply the Shoelace formula to each triangle and add.

      **Shoelace formula extended to quadrilaterals**

      The Shoelace formula extends directly to quadrilaterals! With vertices in order $(x_{1},y_{1})$, $(x_{2},y_{2})$, $(x_{3},y_{3})$, $(x_{4},y_{4})$:

      $$S = \frac{1}{2}|x_{1}y_{2} - x_{2}y_{1} + x_{2}y_{3} - x_{3}y_{2} + x_{3}y_{4} - x_{4}y_{3} + x_{4}y_{1} - x_{1}y_{4}|$$

      **Trapezoid area — understood via decomposition**

      Trapezoid area $= \frac{1}{2}(a+b) \times h$ (where $a$, $b$ are the parallel sides and $h$ is the height).

      This equals the sum of two triangles along a diagonal:
      - Triangle with base $a$ and height $h$: area $\frac{1}{2}ah$
      - Triangle with base $b$ and height $h$: area $\frac{1}{2}bh$
      - Total $= \frac{1}{2}(a+b)h$ ✓
    notes:
      - '菱形对角线互相垂直平分——这是面积公式成立的关键'
      - 'AMC 8 中菱形题常给周长和一条对角线，需要用勾股定理求另一条'
      - '鞋带公式对任意简单多边形都有效（顶点按顺序排列）'
    notesEn:
      - 'Rhombus diagonals are perpendicular bisectors of each other — this is key to the formula'
      - 'AMC 8 rhombus problems often give the perimeter and one diagonal; use Pythagoras for the other'
      - 'The Shoelace formula works for any simple polygon (vertices listed in order)'

examples:
  - type: 1
    source: "AMC 8 2019 #4"
    title: 菱形面积——对角线法
    titleEn: Rhombus Area — Diagonal Method
    question: |
      四边形 $ABCD$ 是一个菱形，周长为 52 米。对角线 $\overline{AC}$ 长 24 米。菱形 $ABCD$ 的面积是多少平方米？

      (A) 60 &emsp; (B) 90 &emsp; (C) 105 &emsp; (D) 120 &emsp; (E) 144
    questionEn: |
      Quadrilateral $ABCD$ is a rhombus with perimeter 52 meters. The length of diagonal $\overline{AC}$ is 24 meters. What is the area in square meters of rhombus $ABCD$?

      (A) 60 &emsp; (B) 90 &emsp; (C) 105 &emsp; (D) 120 &emsp; (E) 144
    steps:
      - '菱形四边相等，边长 $= 52 \div 4 = 13$ 米'
      - '菱形对角线互相垂直平分，半条 $AC = 12$ 米'
      - '用勾股定理求半条 $BD$：$\sqrt{13^{2} - 12^{2}} = \sqrt{169 - 144} = \sqrt{25} = 5$ 米'
      - '完整的 $BD = 2 \times 5 = 10$ 米'
      - '菱形面积 $= \frac{1}{2} \times AC \times BD = \frac{1}{2} \times 24 \times 10 = \mathbf{120}$'
    stepsEn:
      - 'All sides of a rhombus are equal: side $= 52 \div 4 = 13$ m'
      - 'Diagonals bisect each other perpendicularly: half of $AC = 12$ m'
      - 'Pythagorean theorem for half of $BD$: $\sqrt{13^{2}-12^{2}} = \sqrt{25} = 5$ m'
      - 'Full $BD = 2 \times 5 = 10$ m'
      - 'Rhombus area $= \frac{1}{2} \times 24 \times 10 = \mathbf{120}$'
    answer: '(D) 120'
    answerEn: '(D) 120'

  - type: 2
    source: "AMC 8 2024 #11"
    title: 坐标三角形面积——底×高法
    titleEn: Coordinate Triangle Area — Base × Height
    question: |
      $\triangle ABC$ 的顶点坐标为 $A(5, 7)$、$B(11, 7)$、$C(3, y)$，其中 $y > 7$。$\triangle ABC$ 的面积为 12。求 $y$ 的值。

      (A) 8 &emsp; (B) 9 &emsp; (C) 10 &emsp; (D) 11 &emsp; (E) 12
    questionEn: |
      The coordinates of $\triangle ABC$ are $A(5,7)$, $B(11,7)$, and $C(3,y)$, with $y > 7$. The area of $\triangle ABC$ is 12. What is the value of $y$?

      (A) 8 &emsp; (B) 9 &emsp; (C) 10 &emsp; (D) 11 &emsp; (E) 12
    steps:
      - '$A$ 和 $B$ 的 $y$ 坐标相同（都是 7），所以 $AB$ 是水平线段，底 $= |11 - 5| = 6$'
      - '高 = 点 $C$ 到直线 $y = 7$ 的垂直距离 $= |y - 7|$。因为 $y > 7$，所以高 $= y - 7$'
      - '面积 $= \frac{1}{2} \times 6 \times (y - 7) = 3(y - 7) = 12$'
      - '$y - 7 = 4$，$y = \mathbf{11}$'
    stepsEn:
      - '$A$ and $B$ share $y$-coordinate 7, so $AB$ is horizontal with base $= |11-5| = 6$'
      - 'Height = perpendicular distance from $C$ to line $y=7$, which is $|y-7| = y-7$ (since $y>7$)'
      - 'Area $= \frac{1}{2}\times6\times(y-7) = 3(y-7) = 12$'
      - '$y-7=4$, so $y = \mathbf{11}$'
    answer: '(D) 11'
    answerEn: '(D) 11'

  - type: 3
    source: 教学原创题
    title: 海伦公式直接应用
    titleEn: Direct Application of Heron's Formula
    question: |
      三角形三边长分别为 $a = 13$，$b = 14$，$c = 15$。用<<海伦公式/Heron's formula>>求这个三角形的面积。
    questionEn: |
      A triangle has sides $a = 13$, $b = 14$, $c = 15$. Use <<海伦公式/Heron's formula>> to find the area.
    steps:
      - '第一步：计算半周长 $s = \frac{13 + 14 + 15}{2} = \frac{42}{2} = 21$'
      - '第二步：代入海伦公式 $S = \sqrt{21 \times (21-13) \times (21-14) \times (21-15)} = \sqrt{21 \times 8 \times 7 \times 6}$'
      - '第三步：化简 $21 \times 8 = 168$，$7 \times 6 = 42$，$168 \times 42 = 7056$'
      - '第四步：$S = \sqrt{7056} = 84$'
      - '验证：取底 $= 14$，高 $= \frac{2 \times 84}{14} = 12$。用勾股定理：$13^{2} - 12^{2} = 25$，$\sqrt{25} = 5$；$15^{2} - 12^{2} = 81$，$\sqrt{81} = 9$；$5 + 9 = 14$ = 底 ✓'
    stepsEn:
      - 'Step 1: semi-perimeter $s = \frac{13+14+15}{2} = 21$'
      - 'Step 2: Heron''s formula $S = \sqrt{21 \times 8 \times 7 \times 6}$'
      - 'Step 3: simplify $21\times8=168$, $7\times6=42$, $168\times42=7056$'
      - 'Step 4: $S = \sqrt{7056} = 84$'
      - 'Verify: base $=14$, height $= 2\times84/14 = 12$. Pythagorean check: $13^{2}-12^{2}=25$, so $5$; $15^{2}-12^{2}=81$, so $9$; $5+9=14$ ✓'
    answer: '84'
    answerEn: '84'

  - type: 4
    source: "AMC 8 2017 #16"
    title: 等周长分割与面积比
    titleEn: Equal-Perimeter Partition and Area Ratio
    question: |
      在 $\triangle ABC$ 中，$AC = 3$，$AB = 4$，$BC = 5$。点 $D$ 在 $\overline{BC}$ 上，使得 $\triangle ACD$ 和 $\triangle ABD$ 的周长相等。$\triangle ABD$ 的面积是多少？

      (A) $\frac{3}{4}$ &emsp; (B) $\frac{3}{2}$ &emsp; (C) $2$ &emsp; (D) $\frac{12}{5}$ &emsp; (E) $\frac{5}{2}$
    questionEn: |
      In $\triangle ABC$, $AC = 3$, $AB = 4$, and $BC = 5$. Point $D$ is on $\overline{BC}$ such that the perimeters of $\triangle ACD$ and $\triangle ABD$ are equal. What is the area of $\triangle ABD$?

      (A) $\frac{3}{4}$ &emsp; (B) $\frac{3}{2}$ &emsp; (C) $2$ &emsp; (D) $\frac{12}{5}$ &emsp; (E) $\frac{5}{2}$
    steps:
      - '判断三角形类型：$AC^{2} + AB^{2} = 9 + 16 = 25 = BC^{2}$，所以 $\angle A = 90°$'
      - '设 $BD = x$，则 $CD = 5 - x$。周长相等：$(3 + CD + AD) = (4 + BD + AD)$'
      - '$AD$ 在两边同时出现，抵消！得到 $3 + CD = 4 + BD$，即 $CD - BD = 1$'
      - '联立 $BD + CD = 5$ 和 $CD - BD = 1$，解得 $BD = 2$，$CD = 3$'
      - '$\triangle ABD$ 和 $\triangle ACD$ 共享从 $A$ 到 $BC$ 的高，面积之比 $= BD : CD = 2 : 3$'
      - '$\triangle ABC$ 面积 $= \frac{1}{2} \times 3 \times 4 = 6$（直角在 $A$）'
      - '$\triangle ABD$ 面积 $= \frac{2}{5} \times 6 = \frac{12}{5}$'
    stepsEn:
      - 'Identify triangle type: $AC^{2}+AB^{2}=9+16=25=BC^{2}$, so $\angle A=90°$'
      - 'Let $BD=x$, $CD=5-x$. Equal perimeters: $(3+CD+AD)=(4+BD+AD)$'
      - '$AD$ cancels! So $3+CD=4+BD$, giving $CD-BD=1$'
      - 'With $BD+CD=5$ and $CD-BD=1$: $BD=2$, $CD=3$'
      - '$\triangle ABD$ and $\triangle ACD$ share the height from $A$ to $BC$, so area ratio $= BD:CD = 2:3$'
      - 'Area of $\triangle ABC = \frac{1}{2}\times3\times4=6$ (right angle at $A$)'
      - 'Area of $\triangle ABD = \frac{2}{5}\times6 = \frac{12}{5}$'
    answer: '(D) $\frac{12}{5}$'
    answerEn: '(D) $\frac{12}{5}$'

