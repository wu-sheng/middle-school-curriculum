examPrep:
  intro: 以下为竞赛风格综合题，难度略高于练习题，考查面积公式的灵活运用和多步推理。
  introEn: The following are contest-style questions at a slightly higher level, testing flexible use of area formulas and multi-step reasoning.
  questions:
    - number: 1
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        三角形三边长为 9、10、17。这个三角形的面积是多少？
      questionEn: |
        A triangle has sides 9, 10, and 17. What is its area?
      choices:
        - label: A
          content: '24'
        - label: B
          content: '30'
        - label: C
          content: '36'
        - label: D
          content: '40'
        - label: E
          content: '45'
      correctValue: C
      answer: '(C) 36'
      answerEn: '(C) 36'
      explanation: |
        $s = \frac{9+10+17}{2} = 18$。
        $S = \sqrt{18 \times (18-9) \times (18-10) \times (18-17)} = \sqrt{18 \times 9 \times 8 \times 1} = \sqrt{1296} = \mathbf{36}$。
        验证：取底 $= 17$，高 $h = \frac{2 \times 36}{17} = \frac{72}{17}$。
        $BD = \sqrt{9^{2} - h^{2}} = \sqrt{81 - \frac{5184}{289}} = \sqrt{\frac{18225}{289}} = \frac{135}{17}$。
        $DC = 17 - \frac{135}{17} = \frac{154}{17}$。
        验证：$DC^{2} + h^{2} = \frac{23716 + 5184}{289} = \frac{28900}{289} = 100 = 10^{2}$ ✓
      explanationEn: |
        $s=18$. $S = \sqrt{18\times9\times8\times1} = \sqrt{1296} = \mathbf{36}$.
        Verify with base $=17$: height $h=\frac{72}{17}$; check second side $\sqrt{(\frac{154}{17})^{2}+h^{2}}=10$ ✓

    - number: 2
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        正三角形的边长为 6。用海伦公式求面积。
      questionEn: |
        An equilateral triangle has side length 6. Use Heron's formula to find its area.
      choices:
        - label: A
          content: '$6\sqrt{3}$'
        - label: B
          content: '$9\sqrt{3}$'
        - label: C
          content: '$12\sqrt{3}$'
        - label: D
          content: '$18\sqrt{3}$'
        - label: E
          content: '$36\sqrt{3}$'
      correctValue: B
      answer: '(B) $9\sqrt{3}$'
      answerEn: '(B) $9\sqrt{3}$'
      explanation: |
        $s = \frac{6+6+6}{2} = 9$。
        $S = \sqrt{9 \times 3 \times 3 \times 3} = \sqrt{243} = \sqrt{81 \times 3} = 9\sqrt{3}$。
        验证：正三角形面积公式 $= \frac{\sqrt{3}}{4} \times 6^{2} = 9\sqrt{3}$ ✓
      explanationEn: |
        $s=9$. $S = \sqrt{9\times3\times3\times3} = \sqrt{243} = 9\sqrt{3}$.
        Verify: equilateral triangle area $= \frac{\sqrt{3}}{4}\times36 = 9\sqrt{3}$ ✓

    - number: 3
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        在坐标平面上，四边形 $ABCD$ 的顶点为 $A(0,0)$、$B(4,0)$、$C(5,3)$、$D(1,4)$。用鞋带公式求面积。
      questionEn: |
        In the coordinate plane, quadrilateral $ABCD$ has vertices $A(0,0)$, $B(4,0)$, $C(5,3)$, $D(1,4)$. Find its area using the Shoelace formula.
      choices:
        - label: A
          content: '13.5'
        - label: B
          content: '14'
        - label: C
          content: '14.5'
        - label: D
          content: '15'
        - label: E
          content: '16'
      correctValue: C
      answer: '(C) 14.5'
      answerEn: '(C) 14.5'
      explanation: |
        鞋带公式（四边形版本），顶点按顺序排列：
        正向乘积之和：$x_{A}y_{B} + x_{B}y_{C} + x_{C}y_{D} + x_{D}y_{A} = 0 + 12 + 20 + 0 = 32$。
        反向乘积之和：$y_{A}x_{B} + y_{B}x_{C} + y_{C}x_{D} + y_{D}x_{A} = 0 + 0 + 3 + 0 = 3$。
        $S = \frac{1}{2}|32 - 3| = \frac{29}{2} = \mathbf{14.5}$。
      explanationEn: |
        Shoelace (quadrilateral version), vertices in order:
        Forward: $0+12+20+0=32$. Backward: $0+0+3+0=3$.
        $S = \frac{1}{2}|32-3| = \mathbf{14.5}$.

    - number: 4
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        在 $\triangle ABC$ 中，$AB = 15$，$BC = 14$，$CA = 13$。点 $D$ 在 $BC$ 上，$AD \perp BC$。$BD$ 的长度是多少？
      questionEn: |
        In $\triangle ABC$, $AB = 15$, $BC = 14$, $CA = 13$. Point $D$ is on $BC$ such that $AD \perp BC$. What is the length of $BD$?
      choices:
        - label: A
          content: '7'
        - label: B
          content: '8'
        - label: C
          content: '9'
        - label: D
          content: '10'
        - label: E
          content: '11'
      correctValue: C
      answer: '(C) 9'
      answerEn: '(C) 9'
      explanation: |
        先用海伦公式求面积：$s = \frac{15+14+13}{2} = 21$。
        $S = \sqrt{21 \times 6 \times 7 \times 8} = \sqrt{7056} = 84$。
        以 $BC = 14$ 为底，高 $AD = \frac{2 \times 84}{14} = 12$。
        用勾股定理求 $BD$：$BD = \sqrt{AB^{2} - AD^{2}} = \sqrt{225 - 144} = \sqrt{81} = \mathbf{9}$。
        验证：$DC = 14 - 9 = 5$，$\sqrt{AD^{2} + DC^{2}} = \sqrt{144 + 25} = \sqrt{169} = 13 = CA$ ✓
      explanationEn: |
        Heron's: $s=21$, $S=\sqrt{21\times6\times7\times8}=84$.
        Height to $BC$: $AD=\frac{2\times84}{14}=12$.
        $BD=\sqrt{15^{2}-12^{2}}=\sqrt{81}=\mathbf{9}$.
        Check: $DC=5$, $\sqrt{144+25}=13=CA$ ✓

    - number: 5
      type: 单选题
      inputType: mc
      source: 竞赛风格题
      section: 综合
      question: |
        菱形 $ABCD$ 的对角线 $AC$ 和 $BD$ 满足 $AC = 2BD$。若菱形面积为 64，则菱形的边长是多少？
      questionEn: |
        Rhombus $ABCD$ has diagonals $AC$ and $BD$ with $AC = 2BD$. If the area of the rhombus is 64, what is the side length?
      choices:
        - label: A
          content: '8'
        - label: B
          content: '$4\sqrt{5}$'
        - label: C
          content: '$6\sqrt{2}$'
        - label: D
          content: '10'
        - label: E
          content: '$8\sqrt{2}$'
      correctValue: B
      answer: '(B) $4\sqrt{5}$'
      answerEn: '(B) $4\sqrt{5}$'
      explanation: |
        设 $BD = d$，则 $AC = 2d$。面积 $= \frac{1}{2} \times AC \times BD = \frac{1}{2} \times 2d \times d = d^{2} = 64$。
        所以 $d = 8$，$BD = 8$，$AC = 16$。
        对角线互相垂直平分：半条 $BD = 4$，半条 $AC = 8$。
        边长 $= \sqrt{4^{2} + 8^{2}} = \sqrt{16 + 64} = \sqrt{80} = 4\sqrt{5}$。
      explanationEn: |
        Let $BD=d$, $AC=2d$. Area $= \frac{1}{2}\times2d\times d = d^{2} = 64$, so $d=8$.
        Half-diagonals: 4 and 8. Side $= \sqrt{16+64} = \sqrt{80} = 4\sqrt{5}$.
