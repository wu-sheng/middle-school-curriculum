        $y=5 \cap y=1-x$: $x=-4$, point $(-4,5)$.
        $y=1+x \cap y=1-x$: $x=0$, point $(0,1)$.
        Base $= 8$ (horizontal at $y=5$), height $= 4$.
        Area $= \frac{1}{2}\times8\times4 = \mathbf{16}$.

