examples:
  - id: ex1
    title: 幂的运算法则综合计算
    titleEn: Combined computation using power rules
    question: '计算：$(1)\ a^{3} \cdot a^{2} \cdot a$；$(2)\ (-2x^{2})^{3}$；$(3)\ (x^{3})^{2} \cdot x^{4}$'
    questionEn: 'Compute: $(1)\ a^{3} \cdot a^{2} \cdot a$; $(2)\ (-2x^{2})^{3}$; $(3)\ (x^{3})^{2} \cdot x^{4}$'
    type: computation
    solution:
      steps:
        - '$(1)\ a^{3} \cdot a^{2} \cdot a = a^{3+2+1} = a^{6}$（同底数幂相乘，指数相加）'
        - '$(2)\ (-2x^{2})^{3} = (-2)^{3} \cdot (x^{2})^{3} = -8x^{6}$（积的乘方 + 幂的乘方）'
        - '$(3)\ (x^{3})^{2} \cdot x^{4} = x^{6} \cdot x^{4} = x^{10}$（先算幂的乘方，再算同底数幂相乘）'
    solutionEn:
      steps:
        - '$(1)\ a^{3} \cdot a^{2} \cdot a = a^{3+2+1} = a^{6}$ (same-base multiplication — add exponents)'
        - '$(2)\ (-2x^{2})^{3} = (-2)^{3} \cdot (x^{2})^{3} = -8x^{6}$ (power of a product + power of a power)'
        - '$(3)\ (x^{3})^{2} \cdot x^{4} = x^{6} \cdot x^{4} = x^{10}$ (first apply power of a power, then same-base multiplication)'
    answer: '$(1)\ a^{6}$；$(2)\ -8x^{6}$；$(3)\ x^{10}$'
    answerEn: '$(1)\ a^{6}$; $(2)\ -8x^{6}$; $(3)\ x^{10}$'

  - id: ex2
    title: 多项式乘法展开
    titleEn: Expanding polynomial products
    question: '展开计算：$(2x - 3)(3x^{2} + x - 2)$'
    questionEn: 'Expand: $(2x - 3)(3x^{2} + x - 2)$'
    type: computation
    solution:
      steps:
        - '用第一个多项式的每一项乘以第二个多项式的每一项：'
        - '$2x \cdot 3x^{2} = 6x^{3}$'
        - '$2x \cdot x = 2x^{2}$'
        - '$2x \cdot (-2) = -4x$'
        - '$(-3) \cdot 3x^{2} = -9x^{2}$'
        - '$(-3) \cdot x = -3x$'
        - '$(-3) \cdot (-2) = 6$'
        - '合并同类项：$6x^{3} + (2x^{2} - 9x^{2}) + (-4x - 3x) + 6$'
        - '$= 6x^{3} - 7x^{2} - 7x + 6$'
    solutionEn:
      steps:
        - 'Multiply every term in the first polynomial by every term in the second:'
        - '$2x \cdot 3x^{2} = 6x^{3}$'
        - '$2x \cdot x = 2x^{2}$'
        - '$2x \cdot (-2) = -4x$'
        - '$(-3) \cdot 3x^{2} = -9x^{2}$'
        - '$(-3) \cdot x = -3x$'
        - '$(-3) \cdot (-2) = 6$'
        - 'Combine like terms: $6x^{3} + (2x^{2} - 9x^{2}) + (-4x - 3x) + 6$'
        - '$= 6x^{3} - 7x^{2} - 7x + 6$'
    answer: '$6x^{3} - 7x^{2} - 7x + 6$'
    answerEn: '$6x^{3} - 7x^{2} - 7x + 6$'

  - id: ex3
    title: 用<<平方差公式/difference of squares formula>>巧算
    titleEn: Quick calculation using the <<平方差公式/difference of squares formula>>
    question: '用<<平方差公式/difference of squares formula>>计算：$(1)\ 39 \times 41$；$(2)\ 995 \times 1005$'
    questionEn: 'Use the <<平方差公式/difference of squares formula>> to compute: $(1)\ 39 \times 41$; $(2)\ 995 \times 1005$'
    type: application
    solution:
      steps:
        - '$(1)\ 39 \times 41 = (40 - 1)(40 + 1) = 40^{2} - 1^{2} = 1600 - 1 = 1599$'
        - '$(2)\ 995 \times 1005 = (1000 - 5)(1000 + 5) = 1000^{2} - 5^{2} = 1000000 - 25 = 999975$'
        - '关键：找到两个数的"平均数"作为 $a$，两个数与平均数的"距离"作为 $b$'
    solutionEn:
      steps:
        - '$(1)\ 39 \times 41 = (40 - 1)(40 + 1) = 40^{2} - 1^{2} = 1600 - 1 = 1599$'
        - '$(2)\ 995 \times 1005 = (1000 - 5)(1000 + 5) = 1000^{2} - 5^{2} = 1000000 - 25 = 999975$'
        - 'Key: identify the average of the two numbers as $a$, and the distance from the average as $b$'
    answer: '$(1)\ 1599$；$(2)\ 999975$'
    answerEn: '$(1)\ 1599$; $(2)\ 999975$'

  - id: ex4
    title: <<完全平方公式/perfect square trinomial formula>>的应用与易错辨析
    titleEn: Applying the <<完全平方公式/perfect square trinomial formula>> and spotting errors
    question: '$(1)$ 展开 $(3x - 2y)^{2}$；$(2)$ 判断以下计算是否正确：$(a + 4)^{2} = a^{2} + 16$，并说明理由'
    questionEn: '$(1)$ Expand $(3x - 2y)^{2}$; $(2)$ Determine whether the following is correct: $(a + 4)^{2} = a^{2} + 16$, and explain your reasoning'
    type: mixed
    solution:
      steps:
        - '$(1)$ 令 $A = 3x$，$B = 2y$，套用 $(A - B)^{2} = A^{2} - 2AB + B^{2}$：'
        - '$(3x - 2y)^{2} = (3x)^{2} - 2 \cdot 3x \cdot 2y + (2y)^{2} = 9x^{2} - 12xy + 4y^{2}$'
        - '$(2)$ **不正确。** $(a + 4)^{2} = a^{2} + 2 \cdot a \cdot 4 + 4^{2} = a^{2} + 8a + 16$'
        - '错误原因：漏掉了中间的 $2ab$ 项。用 $a = 3$ 验算：$(3+4)^{2} = 49$，而 $3^{2}+16 = 25 \neq 49$。'
    solutionEn:
      steps:
        - '$(1)$ Let $A = 3x$, $B = 2y$, apply $(A - B)^{2} = A^{2} - 2AB + B^{2}$:'
        - '$(3x - 2y)^{2} = (3x)^{2} - 2 \cdot 3x \cdot 2y + (2y)^{2} = 9x^{2} - 12xy + 4y^{2}$'
        - '$(2)$ **Incorrect.** $(a + 4)^{2} = a^{2} + 2 \cdot a \cdot 4 + 4^{2} = a^{2} + 8a + 16$'
        - 'Reason: the middle term $2ab$ is missing. Check with $a = 3$: $(3+4)^{2} = 49$, but $3^{2}+16 = 25 \neq 49$.'
    answer: '$(1)\ 9x^{2} - 12xy + 4y^{2}$；$(2)$ 不正确，正确结果是 $a^{2} + 8a + 16$'
    answerEn: '$(1)\ 9x^{2} - 12xy + 4y^{2}$; $(2)$ Incorrect; the correct result is $a^{2} + 8a + 16$'

  - id: ex5
    title: 综合运用多个法则化简
    titleEn: Simplification combining multiple rules
    question: '化简：$(x + 2)^{2} - (x + 3)(x - 3)$'
    questionEn: 'Simplify: $(x + 2)^{2} - (x + 3)(x - 3)$'
    type: simplification
    solution:
      steps:
        - '展开 $(x + 2)^{2} = x^{2} + 4x + 4$（完全平方公式）'
        - '展开 $(x + 3)(x - 3) = x^{2} - 9$（平方差公式）'
        - '相减：$(x^{2} + 4x + 4) - (x^{2} - 9)$'
        - '$= x^{2} + 4x + 4 - x^{2} + 9$（去括号，注意括号前是减号）'
        - '$= 4x + 13$'
    solutionEn:
      steps:
        - 'Expand $(x + 2)^{2} = x^{2} + 4x + 4$ (perfect square formula)'
        - 'Expand $(x + 3)(x - 3) = x^{2} - 9$ (difference of squares formula)'
        - 'Subtract: $(x^{2} + 4x + 4) - (x^{2} - 9)$'
        - '$= x^{2} + 4x + 4 - x^{2} + 9$ (remove parentheses — note the minus sign in front)'
        - '$= 4x + 13$'
    answer: '$4x + 13$'
    answerEn: '$4x + 13$'

  - id: ex6
    title: 面积问题——用乘法公式建模
    titleEn: Area problem — modelling with multiplication formulas
    question: '一个正方形的边长为 $(a + 2)$ cm，从中剪去一个边长为 $2$ cm 的小正方形（角落处）。用公式表示剩余面积，并化简。'
    questionEn: 'A square has side length $(a + 2)$ cm. A small square with side length $2$ cm is cut from one corner. Express the remaining area using a formula and simplify.'
    type: application
    solution:
      steps:
        - '大正方形面积 $= (a + 2)^{2} = a^{2} + 4a + 4$（完全平方公式）'
        - '小正方形面积 $= 2^{2} = 4$'
        - '剩余面积 $= (a + 2)^{2} - 4 = a^{2} + 4a + 4 - 4 = a^{2} + 4a$'
        - '因式分解（预告）：$= a(a + 4)$'
        - '验证：若 $a = 3$，大正方形边长为 $5$ cm，面积 $= 25$；剪去 $4$，剩余 $21 = 3 \times 7$，与公式 $a(a+4) = 3 \times 7 = 21$ 吻合。'
    solutionEn:
      steps:
        - 'Area of large square $= (a + 2)^{2} = a^{2} + 4a + 4$ (perfect square formula)'
        - 'Area of small square $= 2^{2} = 4$'
        - 'Remaining area $= (a + 2)^{2} - 4 = a^{2} + 4a + 4 - 4 = a^{2} + 4a$'
        - 'Factored form (preview): $= a(a + 4)$'
        - 'Check: if $a = 3$, the large square has side $5$ cm and area $25$; remove $4$, leaving $21 = 3 \times 7$, matching $a(a+4) = 3 \times 7 = 21$.'
    answer: '$a^{2} + 4a$ cm²'
    answerEn: '$a^{2} + 4a$ cm²'

