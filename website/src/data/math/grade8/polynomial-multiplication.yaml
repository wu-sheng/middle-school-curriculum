    answer: '错误'
    answerEn: 'False'
    explanation: '漏掉了中间项 $2ab$。正确公式：$(a + b)^{2} = a^{2} + 2ab + b^{2}$。反例：$a = 3, b = 4$：$(3+4)^{2} = 49 \neq 9 + 16 = 25$'
    explanationEn: 'The middle term $2ab$ is missing. Correct formula: $(a + b)^{2} = a^{2} + 2ab + b^{2}$. Counterexample: $a = 3, b = 4$: $(3+4)^{2} = 49 \neq 9 + 16 = 25$'

  - id: q9
    type: computation
    question: '计算 $16a^{5}b^{3} \div (-4a^{3}b)$'
    questionEn: 'Compute $16a^{5}b^{3} \div (-4a^{3}b)$'
    answer: '$-4a^{2}b^{2}$'
    answerEn: '$-4a^{2}b^{2}$'
    explanation: '$\frac{16}{-4} \cdot a^{5-3} \cdot b^{3-1} = -4a^{2}b^{2}$'
    explanationEn: '$\frac{16}{-4} \cdot a^{5-3} \cdot b^{3-1} = -4a^{2}b^{2}$'

  - id: q10
    type: computation
    question: '化简：$(3x^{4} - 9x^{3} + 6x^{2}) \div 3x^{2}$'
    questionEn: 'Simplify: $(3x^{4} - 9x^{3} + 6x^{2}) \div 3x^{2}$'
    answer: '$x^{2} - 3x + 2$'
    answerEn: '$x^{2} - 3x + 2$'
    explanation: '每项分别除以 $3x^{2}$：$x^{2} - 3x + 2$'
    explanationEn: 'Divide each term by $3x^{2}$: $x^{2} - 3x + 2$'

  - id: q11
    type: simplification
    question: '化简：$(x - 1)^{2} + (x + 1)^{2}$'
    questionEn: 'Simplify: $(x - 1)^{2} + (x + 1)^{2}$'
    answer: '$2x^{2} + 2$'
    answerEn: '$2x^{2} + 2$'
    explanation: '$(x^{2} - 2x + 1) + (x^{2} + 2x + 1) = 2x^{2} + 2$（中间项 $-2x$ 和 $+2x$ 抵消）'
    explanationEn: '$(x^{2} - 2x + 1) + (x^{2} + 2x + 1) = 2x^{2} + 2$ (the middle terms $-2x$ and $+2x$ cancel)'

  - id: q12
    type: simplification
    question: '化简：$(a + b)(a - b) - a(a - 2b)$'
    questionEn: 'Simplify: $(a + b)(a - b) - a(a - 2b)$'
    answer: '$2ab - b^{2}$'
    answerEn: '$2ab - b^{2}$'
    explanation: '$(a+b)(a-b) = a^{2} - b^{2}$；$a(a-2b) = a^{2} - 2ab$；相减：$(a^{2}-b^{2}) - (a^{2}-2ab) = a^{2} - b^{2} - a^{2} + 2ab = 2ab - b^{2}$'
    explanationEn: '$(a+b)(a-b) = a^{2} - b^{2}$; $a(a-2b) = a^{2} - 2ab$; subtract: $(a^{2}-b^{2}) - (a^{2}-2ab) = a^{2} - b^{2} - a^{2} + 2ab = 2ab - b^{2}$'

  - id: q13
    type: application
    question: '一块长为 $(2x + 1)$ m、宽为 $(2x - 1)$ m 的长方形土地，求它的面积（用乘法公式计算并化简）。'
    questionEn: 'A rectangular plot has length $(2x + 1)$ m and width $(2x - 1)$ m. Find its area using a multiplication formula and simplify.'
    answer: '$4x^{2} - 1$ m²'
    answerEn: '$4x^{2} - 1$ m²'
    explanation: '$(2x + 1)(2x - 1) = (2x)^{2} - 1^{2} = 4x^{2} - 1$（平方差公式）'
    explanationEn: '$(2x + 1)(2x - 1) = (2x)^{2} - 1^{2} = 4x^{2} - 1$ (difference of squares formula)'

  - id: q14
    type: fill-in
    question: |
      找出下面计算中的错误并改正：
      $(2x - 3)^{2} = 4x^{2} - 9$
      错误在于：___，正确结果是___
    questionEn: |
      Find the error in the following calculation and correct it:
      $(2x - 3)^{2} = 4x^{2} - 9$
      The error is: ___, and the correct result is ___
    answer: '漏掉了中间项 $2 \times 2x \times 3 = 12x$；正确结果：$4x^{2} - 12x + 9$'
    answerEn: 'The middle term $2 \times 2x \times 3 = 12x$ is missing; correct result: $4x^{2} - 12x + 9$'
    explanation: '误用了平方差公式。$(2x)^{2} - 3^{2} = 4x^{2} - 9$ 对应的是 $(2x + 3)(2x - 3)$，而不是 $(2x - 3)^{2}$。完全平方公式：$(2x-3)^{2} = 4x^{2} - 12x + 9$'
    explanationEn: 'The difference of squares formula was incorrectly applied. $(2x)^{2} - 3^{2} = 4x^{2} - 9$ corresponds to $(2x + 3)(2x - 3)$, not $(2x - 3)^{2}$. Perfect square: $(2x-3)^{2} = 4x^{2} - 12x + 9$'

  - id: q15
    type: computation
    question: '计算 $199 \times 201$（要求用乘法公式，不用笔算）'
    questionEn: 'Compute $199 \times 201$ using a multiplication formula (no long multiplication allowed)'
    answer: '$39999$'
    answerEn: '$39999$'
    explanation: '$199 \times 201 = (200 - 1)(200 + 1) = 200^{2} - 1 = 40000 - 1 = 39999$'
    explanationEn: '$199 \times 201 = (200 - 1)(200 + 1) = 200^{2} - 1 = 40000 - 1 = 39999$'

examPrep:
  intro: |
    以下 5 道题目是本章的综合提升练习，覆盖本章各个知识点的综合应用与易错环节。
    建议先独立思考，再查看解析。
  introEn: |
    The following 5 problems are comprehensive challenge exercises for this chapter, covering integrated applications and common errors across all topics.
    Try each problem independently before checking the solution.
  problems:
    - id: ep1
      type: multiple-choice
      question: |
        下列计算中，正确的是（　　）
        A. $a^{3} \cdot a^{3} = a^{9}$
        B. $(a^{3})^{2} = a^{5}$
        C. $(-a)^{4} = a^{4}$
        D. $(2a)^{3} = 2a^{3}$
      questionEn: |
        Which of the following calculations is correct? (　　)
        A. $a^{3} \cdot a^{3} = a^{9}$
        B. $(a^{3})^{2} = a^{5}$
        C. $(-a)^{4} = a^{4}$
        D. $(2a)^{3} = 2a^{3}$
      answer: C
      answerEn: C
      explanation: |
        A 错：$a^{3} \cdot a^{3} = a^{6}$（指数相加，$3+3=6$，不是 $3 \times 3 = 9$）
        B 错：$(a^{3})^{2} = a^{6}$（指数相乘，$3 \times 2 = 6$，不是 $3+2=5$）
        C 对：$(-a)^{4} = (-1)^{4} \cdot a^{4} = 1 \cdot a^{4} = a^{4}$（偶次方负号消失）
        D 错：$(2a)^{3} = 2^{3} \cdot a^{3} = 8a^{3}$（系数也要乘方）
      explanationEn: |
        A wrong: $a^{3} \cdot a^{3} = a^{6}$ (add exponents: $3+3=6$, not $3 \times 3 = 9$)
        B wrong: $(a^{3})^{2} = a^{6}$ (multiply exponents: $3 \times 2 = 6$, not $3+2=5$)
        C correct: $(-a)^{4} = (-1)^{4} \cdot a^{4} = 1 \cdot a^{4} = a^{4}$ (even power removes the minus)
        D wrong: $(2a)^{3} = 2^{3} \cdot a^{3} = 8a^{3}$ (the coefficient must also be raised to the power)

    - id: ep2
      type: fill-in
      question: |
        已知 $(x + a)^{2} = x^{2} + bx + 9$，求 $a$ 和 $b$ 的值。
      questionEn: |
        Given $(x + a)^{2} = x^{2} + bx + 9$, find the values of $a$ and $b$.
      answer: '$a = 3$（或 $a = -3$），$b = 6$（或 $b = -6$）'
      answerEn: '$a = 3$ (or $a = -3$), $b = 6$ (or $b = -6$)'
      explanation: |
        展开左边：$(x + a)^{2} = x^{2} + 2ax + a^{2}$
        对比右边 $x^{2} + bx + 9$，得：
        - 常数项：$a^{2} = 9$，所以 $a = 3$ 或 $a = -3$
        - 中间项系数：$b = 2a$
        当 $a = 3$ 时，$b = 6$；当 $a = -3$ 时，$b = -6$
      explanationEn: |
        Expand the left side: $(x + a)^{2} = x^{2} + 2ax + a^{2}$
        Comparing with $x^{2} + bx + 9$:
        - Constant term: $a^{2} = 9$, so $a = 3$ or $a = -3$
        - Coefficient of middle term: $b = 2a$
        When $a = 3$, $b = 6$; when $a = -3$, $b = -6$

    - id: ep3
      type: computation
      question: |
        化简：$(x + y)^{2} - (x - y)^{2}$
        （提示：直接展开，观察能消去什么）
      questionEn: |
        Simplify: $(x + y)^{2} - (x - y)^{2}$
        (Hint: expand directly and observe what cancels)
      answer: '$4xy$'
      answerEn: '$4xy$'
      explanation: |
        展开：$(x + y)^{2} = x^{2} + 2xy + y^{2}$
        展开：$(x - y)^{2} = x^{2} - 2xy + y^{2}$
        相减：$(x^{2} + 2xy + y^{2}) - (x^{2} - 2xy + y^{2})$
        $= x^{2} + 2xy + y^{2} - x^{2} + 2xy - y^{2}$
        $= 4xy$
        （$x^{2}$ 和 $y^{2}$ 全部消去，只剩中间项！）
      explanationEn: |
        Expand: $(x + y)^{2} = x^{2} + 2xy + y^{2}$
        Expand: $(x - y)^{2} = x^{2} - 2xy + y^{2}$
        Subtract: $(x^{2} + 2xy + y^{2}) - (x^{2} - 2xy + y^{2})$
        $= x^{2} + 2xy + y^{2} - x^{2} + 2xy - y^{2}$
        $= 4xy$
        (The $x^{2}$ and $y^{2}$ terms all cancel — only the middle terms remain!)

    - id: ep4
      type: open
      question: |
        【陷阱题】一个学生计算了 $(m - n)^{2} + 2mn$，他的步骤如下：
        $(m - n)^{2} + 2mn = m^{2} - n^{2} + 2mn$
        请指出错误，并给出正确结果。
        （提示：完全平方公式和平方差公式长得很像，要分清楚！）
      questionEn: |
        [Trap problem] A student computed $(m - n)^{2} + 2mn$ as follows:
        $(m - n)^{2} + 2mn = m^{2} - n^{2} + 2mn$
        Identify the error and give the correct result.
        (Hint: the perfect square and difference of squares formulas look similar — be careful!)
      answer: |
        错误：学生把 $(m - n)^{2}$ 当成了 $(m+n)(m-n)$ 的平方差公式，写成了 $m^{2} - n^{2}$。
        实际上 $(m - n)^{2} = m^{2} - 2mn + n^{2}$（完全平方公式！）
        正确计算：
        $(m - n)^{2} + 2mn = (m^{2} - 2mn + n^{2}) + 2mn = m^{2} + n^{2}$
      answerEn: |
        Error: the student mistakenly applied the difference of squares formula to $(m - n)^{2}$, writing $m^{2} - n^{2}$.
        In fact, $(m - n)^{2} = m^{2} - 2mn + n^{2}$ (perfect square trinomial formula!)
        Correct computation:
        $(m - n)^{2} + 2mn = (m^{2} - 2mn + n^{2}) + 2mn = m^{2} + n^{2}$

    - id: ep5
      type: open
      question: |
        综合题：已知正方形边长为 $a + b$，从中挖去一个边长为 $a - b$ 的同心正方形（$a > b > 0$）。
        $(1)$ 用多项式表达两个正方形的面积；
        $(2)$ 用乘法公式化简剩余部分（圆环形区域）的面积；
        $(3)$ 若 $a = 5, b = 3$，计算实际面积。
      questionEn: |
        Comprehensive problem: A square has side length $a + b$. From it, a concentric square with side length $a - b$ is removed ($a > b > 0$).
        $(1)$ Express the areas of both squares as polynomials.
        $(2)$ Use a multiplication formula to simplify the remaining (frame-shaped) area.
        $(3)$ If $a = 5, b = 3$, compute the actual area.
      answer: |
        $(1)$ 大正方形面积 $= (a+b)^{2} = a^{2}+2ab+b^{2}$；小正方形面积 $= (a-b)^{2} = a^{2}-2ab+b^{2}$
        $(2)$ 剩余面积 $= (a+b)^{2} - (a-b)^{2}$
        $= (a^{2}+2ab+b^{2}) - (a^{2}-2ab+b^{2})$
        $= 4ab$
        （也可以用平方差：$[(a+b)+(a-b)][(a+b)-(a-b)] = 2a \cdot 2b = 4ab$）
        $(3)$ 当 $a=5, b=3$：剩余面积 $= 4 \times 5 \times 3 = 60$ cm²
        验证：大正方形 $(5+3)^{2} = 64$，小正方形 $(5-3)^{2} = 4$，差 $= 60$ ✓
      answerEn: |
        $(1)$ Large square area $= (a+b)^{2} = a^{2}+2ab+b^{2}$; small square area $= (a-b)^{2} = a^{2}-2ab+b^{2}$
        $(2)$ Remaining area $= (a+b)^{2} - (a-b)^{2}$
        $= (a^{2}+2ab+b^{2}) - (a^{2}-2ab+b^{2})$
        $= 4ab$
        (Alternative using difference of squares: $[(a+b)+(a-b)][(a+b)-(a-b)] = 2a \cdot 2b = 4ab$)
        $(3)$ When $a=5, b=3$: remaining area $= 4 \times 5 \times 3 = 60$ cm²
        Check: large square $(5+3)^{2} = 64$, small square $(5-3)^{2} = 4$, difference $= 60$ ✓

summary: |
  本章学习了整式的乘除运算，核心是掌握**幂的运算法则**和**两大乘法公式**。

  **幂的三条乘法法则：**
  - 同底数幂相乘：$a^{m} \cdot a^{n} = a^{m+n}$（底数不变，指数相加）
  - 幂的乘方：$(a^{m})^{n} = a^{mn}$（指数相乘）
  - 积的乘方：$(ab)^{n} = a^{n}b^{n}$（每个因数都乘方）

  **整式乘法：**
  - 单项式 × 多项式：分配律，逐项相乘
  - 多项式 × 多项式：每项 × 每项，再合并同类项

  **两大公式（必须熟记）：**
  - <<平方差公式/difference of squares formula>>：$(a+b)(a-b) = a^{2} - b^{2}$（两项，无中间项）
  - <<完全平方公式/perfect square trinomial formula>>：$(a \pm b)^{2} = a^{2} \pm 2ab + b^{2}$（三项，中间项是 $2ab$）

  **最大易错点：** $(a + b)^{2} \neq a^{2} + b^{2}$，必须加上 $2ab$！

  **整式除法：**
  - 同底数幂相除：$a^{m} \div a^{n} = a^{m-n}$（指数相减）
  - 多项式 ÷ 单项式：每项分别相除

  这些法则为下一章**因式分解**（乘法公式的逆用）打好了基础。
summaryEn: |
  This chapter covered multiplication and division of polynomials. The core is mastering the **rules of exponents** and the **two key multiplication formulas**.

  **Three rules for multiplying powers:**
  - Same-base multiplication: $a^{m} \cdot a^{n} = a^{m+n}$ (base unchanged, add exponents)
  - Power of a power: $(a^{m})^{n} = a^{mn}$ (multiply exponents)
  - Power of a product: $(ab)^{n} = a^{n}b^{n}$ (each factor is raised to the power)

  **Polynomial multiplication:**
  - Monomial × polynomial: distributive law, multiply term by term
  - Polynomial × polynomial: every term × every term, then combine like terms

  **Two essential formulas (must be memorised):**
  - <<平方差公式/difference of squares formula>>: $(a+b)(a-b) = a^{2} - b^{2}$ (two terms, no middle term)
  - <<完全平方公式/perfect square trinomial formula>>: $(a \pm b)^{2} = a^{2} \pm 2ab + b^{2}$ (three terms; the middle term is $2ab$)

  **Biggest error to avoid:** $(a + b)^{2} \neq a^{2} + b^{2}$ — you must add $2ab$!

  **Polynomial division:**
  - Same-base division: $a^{m} \div a^{n} = a^{m-n}$ (subtract exponents)
  - Polynomial ÷ monomial: divide each term separately

  These rules lay the groundwork for the next chapter — **factoring** (applying the multiplication formulas in reverse).
