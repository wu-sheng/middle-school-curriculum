  questions:
    - number: 1
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: 'I. Fill in the Blanks'
      question: |
        多项式 $10a^{2}b - 15ab^{2}$ 的<<公因式/common factor>>是______，因式分解结果为______。
      questionEn: |
        The <<公因式/common factor>> of the polynomial $10a^{2}b - 15ab^{2}$ is ______, and its factored form is ______.
      correctValue: '5ab, 5ab(2a-3b)'
      answer: '公因式为 $5ab$，因式分解为 $5ab(2a - 3b)$'
      answerEn: 'The <<公因式/common factor>> is $5ab$; the factored form is $5ab(2a - 3b)$'
      explanation: |
        系数：$\gcd(10, 15) = 5$；字母：都有 $a$（最小指数 $1$）和 $b$（最小指数 $1$）。
        公因式为 $5ab$。提出后：$10a^{2}b \div 5ab = 2a$，$15ab^{2} \div 5ab = 3b$。
        故 $10a^{2}b - 15ab^{2} = 5ab(2a - 3b)$。
      explanationEn: |
        Coefficients: $\gcd(10, 15) = 5$; letters: both have $a$ (min exponent $1$) and $b$ (min exponent $1$).
        Common factor is $5ab$. After factoring: $10a^{2}b \div 5ab = 2a$, $15ab^{2} \div 5ab = 3b$.
        So $10a^{2}b - 15ab^{2} = 5ab(2a - 3b)$.

    - number: 2
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: 'I. Fill in the Blanks'
      question: |
        $x^{2} - 49 = (x + \underline{\quad})(x - \underline{\quad})$。
      questionEn: |
        $x^{2} - 49 = (x + \underline{\quad})(x - \underline{\quad})$.
      correctValue: '7, 7'
      answer: '$(x+7)(x-7)$'
      answerEn: '$(x+7)(x-7)$'
      explanation: |
        $49 = 7^{2}$，所以 $x^{2} - 49 = x^{2} - 7^{2} = (x+7)(x-7)$（平方差公式）。
      explanationEn: |
        $49 = 7^{2}$, so $x^{2} - 49 = x^{2} - 7^{2} = (x+7)(x-7)$ (difference of squares formula).

    - number: 3
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: 'I. Fill in the Blanks'
      question: |
        $x^{2} - 8x + 16 = (\underline{\quad\quad})^{2}$。
      questionEn: |
        $x^{2} - 8x + 16 = (\underline{\quad\quad})^{2}$.
      correctValue: 'x-4'
      answer: '$(x-4)^{2}$'
      answerEn: '$(x-4)^{2}$'
      explanation: |
        检验：首项 $x^{2}$ ✓；末项 $16 = 4^{2}$ ✓；中间项 $-8x = -2 \times x \times 4$ ✓（负号）。
        所以 $x^{2} - 8x + 16 = (x-4)^{2}$。
      explanationEn: |
        Check: first term $x^{2}$ ✓; last term $16 = 4^{2}$ ✓; middle term $-8x = -2 \times x \times 4$ ✓ (negative sign).
        So $x^{2} - 8x + 16 = (x-4)^{2}$.

    - number: 4
      type: 填空题
      inputType: blank
      section: 一、填空题
      sectionEn: 'I. Fill in the Blanks'
      question: |
        $3x^{2} - 27 = 3(\underline{\quad\quad\quad\quad})$，完全分解为______。
      questionEn: |
        $3x^{2} - 27 = 3(\underline{\quad\quad\quad\quad})$; the complete factored form is ______.
      correctValue: 'x^2-9, 3(x+3)(x-3)'
      answer: '$3(x^{2}-9)$，完全分解为 $3(x+3)(x-3)$'
      answerEn: '$3(x^{2}-9)$; the complete factored form is $3(x+3)(x-3)$'
      explanation: |
        先提公因式 $3$：$3x^{2} - 27 = 3(x^{2} - 9)$。
        再对括号内用平方差：$x^{2} - 9 = (x+3)(x-3)$。
        完全分解：$3(x+3)(x-3)$。
      explanationEn: |
        First factor out $3$: $3x^{2} - 27 = 3(x^{2} - 9)$.
        Then apply difference of squares inside: $x^{2} - 9 = (x+3)(x-3)$.
        Complete factored form: $3(x+3)(x-3)$.

    - number: 5
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: 'II. True or False'
      question: |
        $x^{2} + 9 = (x+3)(x-3)$。
      questionEn: |
        $x^{2} + 9 = (x+3)(x-3)$.
      correctValue: '错'
      answer: '错'
      answerEn: 'False'
      explanation: |
        $(x+3)(x-3) = x^{2} - 9$，不是 $x^{2} + 9$。平方差公式要求两项之间是"减号"，$x^{2} + 9$ 是平方**和**，在实数范围内不能用平方差公式分解。
      explanationEn: |
        $(x+3)(x-3) = x^{2} - 9$, not $x^{2} + 9$. The difference of squares formula requires a minus sign between the two terms. $x^{2} + 9$ is a sum of squares and cannot be factored using this formula over the real numbers.

    - number: 6
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: 'II. True or False'
      question: |
        $x^{2} + 4x + 4 = (x+2)^{2}$ 是正确的因式分解。
      questionEn: |
        $x^{2} + 4x + 4 = (x+2)^{2}$ is a correct factorization.
      correctValue: '对'
      answer: '对'
      answerEn: 'True'
      explanation: |
        检验：首项 $x^{2}$ ✓；末项 $4 = 2^{2}$ ✓；中间项 $4x = 2 \times x \times 2$ ✓。展开验证：$(x+2)^{2} = x^{2} + 4x + 4$ ✓。
      explanationEn: |
        Check: first term $x^{2}$ ✓; last term $4 = 2^{2}$ ✓; middle term $4x = 2 \times x \times 2$ ✓. Verify by expanding: $(x+2)^{2} = x^{2} + 4x + 4$ ✓.

    - number: 7
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: 'II. True or False'
      question: |
        $2x^{2} - 2 = 2(x+1)(x-1)$ 是彻底的因式分解。
      questionEn: |
        $2x^{2} - 2 = 2(x+1)(x-1)$ is a complete factorization.
      correctValue: '对'
      answer: '对'
      answerEn: 'True'
      explanation: |
        先提公因式 $2$：$2(x^{2}-1)$；再对括号内用平方差：$2(x+1)(x-1)$。
        每个因式（$2$，$x+1$，$x-1$）都不能再分解，分解是彻底的。
      explanationEn: |
        First factor out $2$: $2(x^{2}-1)$; then apply difference of squares: $2(x+1)(x-1)$.
        Each factor ($2$, $x+1$, $x-1$) cannot be factored further — the factorization is complete.

    - number: 8
      type: 判断题
      inputType: truefalse
      section: 二、判断题
      sectionEn: 'II. True or False'
      question: |
        对 $-2x^{2} + 8x$ 进行因式分解：$-2x^{2} + 8x = -2x(x + 4)$。
      questionEn: |
        The factorization $-2x^{2} + 8x = -2x(x + 4)$ is correct.
      correctValue: '错'
      answer: '错'
      answerEn: 'False'
      explanation: |
        提出公因式 $-2x$ 后：$-2x^{2} \div (-2x) = x$，$8x \div (-2x) = -4$。
        所以正确结果是 $-2x(x - 4)$，不是 $-2x(x + 4)$。
        检验：$-2x(x-4) = -2x^{2} + 8x$ ✓。
      explanationEn: |
        After factoring out $-2x$: $-2x^{2} \div (-2x) = x$, $8x \div (-2x) = -4$.
        So the correct result is $-2x(x - 4)$, not $-2x(x + 4)$.
        Verify: $-2x(x-4) = -2x^{2} + 8x$ ✓.

    - number: 9
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: 'III. Multiple Choice'
      question: |
        下列各式中，能用<<平方差公式/difference of squares formula>>分解的是（　）
      questionEn: |
        Among the following, the expression that can be factored using the <<平方差公式/difference of squares formula>> is ( )
      subInputs:
        - prompt: 选择答案
          options:
            - '$x^{2} + 4$'
            - '$x^{2} - 3$'
            - '$4x^{2} - 9$'
            - '$x^{2} + 2x - 1$'
          correctValue: '$4x^{2} - 9$'
      answer: '$4x^{2} - 9$'
      answerEn: '$4x^{2} - 9$'
      explanation: |
        - A：$x^{2} + 4$ 是平方和，不能用平方差公式
        - B：$3$ 不是完全平方数（$\sqrt{3}$ 是无理数），不符合整数范围内的平方差分解
        - C：$4x^{2} = (2x)^{2}$，$9 = 3^{2}$，两项都是完全平方，中间是减号 → $4x^{2} - 9 = (2x+3)(2x-3)$ ✓
        - D：三项式，有中间项，不是二项式，不符合平方差模式
      explanationEn: |
        - A: $x^{2} + 4$ is a sum of squares — difference of squares formula does not apply
        - B: $3$ is not a perfect square ($\sqrt{3}$ is irrational) — does not fit integer factoring with difference of squares
        - C: $4x^{2} = (2x)^{2}$, $9 = 3^{2}$, both terms are perfect squares with a minus sign between → $4x^{2} - 9 = (2x+3)(2x-3)$ ✓
        - D: A trinomial (three terms) — does not fit the difference of squares pattern

    - number: 10
      type: 选择题
      inputType: choice
      section: 三、选择题
      sectionEn: 'III. Multiple Choice'
      question: |
        下列哪个式子是 $x^{2} - 6x + 9$ 的正确因式分解？（　）
      questionEn: |
        Which of the following is the correct factorization of $x^{2} - 6x + 9$? ( )
      subInputs:
        - prompt: 选择答案
          options:
            - '$(x-3)(x+3)$'
            - '$(x-3)^{2}$'
            - '$(x+3)^{2}$'
            - '$(x-9)(x-1)$'
          correctValue: '$(x-3)^{2}$'
      answer: '$(x-3)^{2}$'
      answerEn: '$(x-3)^{2}$'
      explanation: |
        检验完全平方：末项 $9 = 3^{2}$ ✓；中间项 $-6x = -2 \times x \times 3$ ✓（负号，对应 $(a-b)^{2}$）。
        故 $x^{2} - 6x + 9 = (x-3)^{2}$。
        排除 A（$(x-3)(x+3) = x^{2}-9$，错）；排除 C（$(x+3)^{2} = x^{2}+6x+9$，中间项符号错）；排除 D（展开为 $x^{2}-10x+9$，错）。
      explanationEn: |
        Check perfect square: last term $9 = 3^{2}$ ✓; middle term $-6x = -2 \times x \times 3$ ✓ (negative → $(a-b)^{2}$).
        So $x^{2} - 6x + 9 = (x-3)^{2}$.
        Eliminate A ($(x-3)(x+3) = x^{2}-9$, wrong); eliminate C ($(x+3)^{2} = x^{2}+6x+9$, wrong sign on middle term); eliminate D (expands to $x^{2}-10x+9$, wrong).

    - number: 11
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: 'IV. Calculation'
      question: |
        对下列各式进行彻底的<<因式分解/factorization>>：

        （1）$4x^{2} - 4xy + y^{2}$
        （2）$2a^{3}b - 8ab^{3}$
      questionEn: |
        Completely factor each of the following:

        (1) $4x^{2} - 4xy + y^{2}$
        (2) $2a^{3}b - 8ab^{3}$
      answer: |
        （1）$4x^{2} = (2x)^{2}$，$y^{2} = y^{2}$，中间项 $-4xy = -2 \times 2x \times y$ ✓
        $4x^{2} - 4xy + y^{2} = (2x - y)^{2}$

        （2）先提公因式：$\gcd(2,8) = 2$，字母公因式为 $ab$（$a$ 最小指数 $1$，$b$ 最小指数 $1$），公因式为 $2ab$
        $2a^{3}b - 8ab^{3} = 2ab(a^{2} - 4b^{2})$
        再用平方差：$a^{2} - 4b^{2} = a^{2} - (2b)^{2} = (a+2b)(a-2b)$
        最终：$2ab(a+2b)(a-2b)$
      answerEn: |
        (1) $4x^{2} = (2x)^{2}$, $y^{2} = y^{2}$, middle term $-4xy = -2 \times 2x \times y$ ✓
        $4x^{2} - 4xy + y^{2} = (2x - y)^{2}$

        (2) Factor out common factor: $\gcd(2,8) = 2$; letter common factor is $ab$ ($a$ min exponent $1$, $b$ min exponent $1$); common factor is $2ab$
        $2a^{3}b - 8ab^{3} = 2ab(a^{2} - 4b^{2})$
        Then apply difference of squares: $a^{2} - 4b^{2} = a^{2} - (2b)^{2} = (a+2b)(a-2b)$
        Final: $2ab(a+2b)(a-2b)$
      explanation: |
        （1）是完全平方三项式，用完全平方公式逆用。（2）必须先提公因式，否则括号内 $a^{2}-4b^{2}$ 无法用公式直接套。
      explanationEn: |
        (1) This is a perfect square trinomial — apply the reverse of the perfect square formula. (2) The common factor must be factored out first; otherwise the remaining $a^{2}-4b^{2}$ cannot be directly matched to the formula.

    - number: 12
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: 'IV. Calculation'
      question: |
        指出下列因式分解的错误，并给出正确答案：

        （1）错误：$6x^{2} - 6 = 6(x+1)(x-1)$（已给出答案，请判断对错并说明）
        （2）错误：$x^{2} + 4x + 4 = x(x + 4) + 4$（说明为什么这不是因式分解）
      questionEn: |
        Identify the error in each factorization below and give the correct answer:

        (1) Given: $6x^{2} - 6 = 6(x+1)(x-1)$. Judge whether it is correct and explain.
        (2) Given: $x^{2} + 4x + 4 = x(x + 4) + 4$. Explain why this is not a factorization.
      answer: |
        （1）$6x^{2} - 6 = 6(x^{2} - 1) = 6(x+1)(x-1)$，这个结果是**正确的**。
        展开验证：$6(x+1)(x-1) = 6(x^{2}-1) = 6x^{2}-6$ ✓

        （2）$x(x+4) + 4$ 是一个**和**（加法），不是**积**（乘法），所以不是因式分解。
        因式分解的结果必须是乘积的形式。
        正确的因式分解：$x^{2} + 4x + 4 = (x+2)^{2}$（完全平方）
      answerEn: |
        (1) $6x^{2} - 6 = 6(x^{2} - 1) = 6(x+1)(x-1)$ — this result is **correct**.
        Verify by expanding: $6(x+1)(x-1) = 6(x^{2}-1) = 6x^{2}-6$ ✓

        (2) $x(x+4) + 4$ is a **sum** (addition), not a **product** (multiplication), so it is not a factorization.
        The result of factorization must be in product form.
        Correct factorization: $x^{2} + 4x + 4 = (x+2)^{2}$ (perfect square)
      explanation: |
        因式分解的本质：把多项式写成**乘积**。任何含加减号连接的最终结果都不符合因式分解的定义。
      explanationEn: |
        The essence of factorization is writing a polynomial as a **product**. Any final result connected by addition or subtraction signs does not satisfy the definition of factorization.

    - number: 13
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: 'IV. Calculation'
      question: |
        利用<<因式分解/factorization>>简便计算 $102^{2} - 2^{2}$。
      questionEn: |
        Use <<因式分解/factorization>> to evaluate $102^{2} - 2^{2}$ conveniently.
      answer: |
        $102^{2} - 2^{2} = (102+2)(102-2) = 104 \times 100 = 10400$
      answerEn: |
        $102^{2} - 2^{2} = (102+2)(102-2) = 104 \times 100 = 10400$
      explanation: |
        识别平方差：$a = 102$，$b = 2$；$(a+b)(a-b) = 104 \times 100$，整百数相乘心算极为方便。
      explanationEn: |
        Recognize the difference of squares: $a = 102$, $b = 2$; $(a+b)(a-b) = 104 \times 100$ — multiplying by a round number is easy to do mentally.

    - number: 14
      type: 计算题
      inputType: open
      section: 四、计算题
      sectionEn: 'IV. Calculation'
      question: |
        用因式分解法解方程：$x^{2} - 4x + 4 = 0$。
      questionEn: |
        Solve the equation by factorization: $x^{2} - 4x + 4 = 0$.
      answer: |
        $x^{2} - 4x + 4 = (x-2)^{2} = 0$
        所以 $x - 2 = 0$，$x = 2$。
        （方程有唯一解，称为重根）
      answerEn: |
        $x^{2} - 4x + 4 = (x-2)^{2} = 0$
        So $x - 2 = 0$, giving $x = 2$.
        (The equation has a unique solution, called a repeated root.)
      explanation: |
        完全平方式等于零，只有一个解。这说明 $y = x^{2} - 4x + 4$ 的图像恰好与 $x$ 轴只有一个切点（先了解概念，后续坐标几何会详细学习）。
      explanationEn: |
        A perfect square equal to zero has exactly one solution. This means the graph of $y = x^{2} - 4x + 4$ is tangent to the $x$-axis at exactly one point (you will study this in detail in coordinate geometry later).

    - number: 15
      type: 综合题
      inputType: open
      section: 五、综合题
      sectionEn: 'V. Comprehensive Problem'
      question: |
        已知 $a - b = 5$，$ab = 6$，求 $a^{2} - 2ab + b^{2}$ 的值，以及 $a^{2} - b^{2}$ 的值。
      questionEn: |
        Given $a - b = 5$ and $ab = 6$, find the value of $a^{2} - 2ab + b^{2}$, and also the value of $a^{2} - b^{2}$.
      answer: |
        $a^{2} - 2ab + b^{2} = (a-b)^{2} = 5^{2} = 25$

        对于 $a^{2} - b^{2} = (a+b)(a-b)$：
        需要先求 $a + b$。
        由 $(a+b)^{2} = (a-b)^{2} + 4ab = 25 + 24 = 49$，得 $a + b = \pm 7$。
        所以 $a^{2} - b^{2} = (a+b)(a-b) = (\pm 7) \times 5 = \pm 35$。
      answerEn: |
        $a^{2} - 2ab + b^{2} = (a-b)^{2} = 5^{2} = 25$

        For $a^{2} - b^{2} = (a+b)(a-b)$:
        We first need $a + b$.
        Since $(a+b)^{2} = (a-b)^{2} + 4ab = 25 + 24 = 49$, we get $a + b = \pm 7$.
        So $a^{2} - b^{2} = (a+b)(a-b) = (\pm 7) \times 5 = \pm 35$.
      explanation: |
        这道题的关键是：**不要先求 $a$、$b$ 的值，而是直接用因式分解公式代入已知条件**。
        $a^{2} - 2ab + b^{2}$ 就是完全平方 $(a-b)^{2}$，直接代入 $a-b=5$ 即可。
        $a^{2} - b^{2}$ 是平方差 $(a+b)(a-b)$，需要额外用恒等式 $(a+b)^{2} = (a-b)^{2} + 4ab$ 求出 $a+b$。
      explanationEn: |
        The key insight: **do not solve for $a$ and $b$ individually — directly apply factoring formulas with the given conditions**.
        $a^{2} - 2ab + b^{2}$ is the perfect square $(a-b)^{2}$; substitute $a-b=5$ directly.
        $a^{2} - b^{2}$ is the difference of squares $(a+b)(a-b)$; use the identity $(a+b)^{2} = (a-b)^{2} + 4ab$ to find $a+b$ first.

