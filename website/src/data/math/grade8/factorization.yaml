    - number: 2
      type: 提升填空题
      inputType: blank
      section: 章末提升
      sectionEn: Challenge
      question: |
        若 $x^{2} + kx + 16$ 是完全平方三项式，则 $k$ 的值为______。
      questionEn: |
        If $x^{2} + kx + 16$ is a perfect square trinomial, then $k = $ ______.
      correctValue: '8或-8'
      answer: '$k = 8$ 或 $k = -8$'
      answerEn: '$k = 8$ or $k = -8$'
      explanation: |
        $16 = 4^{2}$，所以若 $x^{2} + kx + 16 = (x \pm 4)^{2}$，则中间项须为 $\pm 2 \times x \times 4 = \pm 8x$。
        故 $k = 8$ 或 $k = -8$。
        验证：$(x+4)^{2} = x^{2} + 8x + 16$ ✓；$(x-4)^{2} = x^{2} - 8x + 16$ ✓。
      explanationEn: |
        $16 = 4^{2}$, so if $x^{2} + kx + 16 = (x \pm 4)^{2}$, the middle term must be $\pm 2 \times x \times 4 = \pm 8x$.
        Hence $k = 8$ or $k = -8$.
        Verify: $(x+4)^{2} = x^{2} + 8x + 16$ ✓; $(x-4)^{2} = x^{2} - 8x + 16$ ✓.

    - number: 3
      type: 提升计算题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        对 $x^{4} - y^{4}$ 进行彻底的因式分解，并利用结果计算 $(\sqrt{2})^{4} - 1^{4}$。
      questionEn: |
        Completely factor $x^{4} - y^{4}$, then use the result to evaluate $(\sqrt{2})^{4} - 1^{4}$.
      answer: |
        分解：$x^{4} - y^{4} = (x^{2})^{2} - (y^{2})^{2} = (x^{2}+y^{2})(x^{2}-y^{2})$
        继续分解：$x^{2} - y^{2} = (x+y)(x-y)$
        完全分解：$x^{4} - y^{4} = (x^{2}+y^{2})(x+y)(x-y)$

        代入 $x = \sqrt{2}$，$y = 1$：
        $= ((\sqrt{2})^{2} + 1^{2})(\sqrt{2}+1)(\sqrt{2}-1)$
        $= (2+1)(\sqrt{2}+1)(\sqrt{2}-1)$
        $= 3 \times ((\sqrt{2})^{2} - 1^{2})$（又是平方差！）
        $= 3 \times (2-1) = 3 \times 1 = 3$

        验证：$(\sqrt{2})^{4} - 1^{4} = 4 - 1 = 3$ ✓
      answerEn: |
        Factorization: $x^{4} - y^{4} = (x^{2})^{2} - (y^{2})^{2} = (x^{2}+y^{2})(x^{2}-y^{2})$
        Continue: $x^{2} - y^{2} = (x+y)(x-y)$
        Complete factorization: $x^{4} - y^{4} = (x^{2}+y^{2})(x+y)(x-y)$

        Substitute $x = \sqrt{2}$, $y = 1$:
        $= ((\sqrt{2})^{2} + 1^{2})(\sqrt{2}+1)(\sqrt{2}-1)$
        $= (2+1)(\sqrt{2}+1)(\sqrt{2}-1)$
        $= 3 \times ((\sqrt{2})^{2} - 1^{2})$ (another difference of squares!)
        $= 3 \times (2-1) = 3 \times 1 = 3$

        Verify: $(\sqrt{2})^{4} - 1^{4} = 4 - 1 = 3$ ✓
      explanation: |
        这道题展示了因式分解的链式应用——每次分解后都继续检查能否再分解，最终利用因式形式简化了看似复杂的计算。
      explanationEn: |
        This problem demonstrates chained factorization — after each step, check whether further factoring is possible. Ultimately, the factored form simplifies what would otherwise be a complicated calculation.

    - number: 4
      type: 提升计算题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        化简 $\dfrac{a^{2} - b^{2}}{a^{2} - 2ab + b^{2}}$（其中 $a \neq b$）。
      questionEn: |
        Simplify $\dfrac{a^{2} - b^{2}}{a^{2} - 2ab + b^{2}}$ (where $a \neq b$).
      answer: |
        分子：$a^{2} - b^{2} = (a+b)(a-b)$（平方差）
        分母：$a^{2} - 2ab + b^{2} = (a-b)^{2}$（完全平方）

        $$\frac{a^{2} - b^{2}}{a^{2} - 2ab + b^{2}} = \frac{(a+b)(a-b)}{(a-b)^{2}} = \frac{a+b}{a-b}$$

        （约去公因式 $(a-b)$，前提是 $a \neq b$，即 $a-b \neq 0$）
      answerEn: |
        Numerator: $a^{2} - b^{2} = (a+b)(a-b)$ (difference of squares)
        Denominator: $a^{2} - 2ab + b^{2} = (a-b)^{2}$ (perfect square)

        $$\frac{a^{2} - b^{2}}{a^{2} - 2ab + b^{2}} = \frac{(a+b)(a-b)}{(a-b)^{2}} = \frac{a+b}{a-b}$$

        (Cancel the common factor $(a-b)$; this requires $a \neq b$, i.e. $a-b \neq 0$)
      explanation: |
        因式分解是化简分式的核心工具：先分解分子分母，再约去公因式。注意约分的前提条件（分母不为零）。
      explanationEn: |
        Factorization is the key tool for simplifying fractions: factor both numerator and denominator first, then cancel the common factor. Always state the condition under which the cancellation is valid (denominator ≠ 0).

    - number: 5
      type: 提升解答题
      inputType: open
      section: 章末提升
      sectionEn: Challenge
      question: |
        已知 $m + n = 7$，$mn = 10$，利用因式分解方法，求：

        （1）$m^{2} + 2mn + n^{2}$ 的值
        （2）$m^{2} - n^{2}$ 的值（需要先求 $m - n$）
        （3）方程 $x^{2} - 7x + 10 = 0$ 的解
      questionEn: |
        Given $m + n = 7$ and $mn = 10$, use factorization to find:

        (1) The value of $m^{2} + 2mn + n^{2}$
        (2) The value of $m^{2} - n^{2}$ (you need to find $m - n$ first)
        (3) The solutions of the equation $x^{2} - 7x + 10 = 0$
      answer: |
        （1）$m^{2} + 2mn + n^{2} = (m+n)^{2} = 7^{2} = 49$

        （2）$(m-n)^{2} = (m+n)^{2} - 4mn = 49 - 40 = 9$，故 $m - n = \pm 3$。
        $m^{2} - n^{2} = (m+n)(m-n) = 7 \times (\pm 3) = \pm 21$

        （3）$x^{2} - 7x + 10 = 0$
        需找两数积为 $10$、和为 $-7$：$(-2) \times (-5) = 10$，$(-2)+(-5) = -7$ ✓
        $x^{2} - 7x + 10 = (x-2)(x-5) = 0$
        所以 $x = 2$ 或 $x = 5$

        （注意：（3）中 $m=2, n=5$ 或 $m=5, n=2$ 正好满足 $m+n=7$，$mn=10$，与已知条件吻合）
      answerEn: |
        (1) $m^{2} + 2mn + n^{2} = (m+n)^{2} = 7^{2} = 49$

        (2) $(m-n)^{2} = (m+n)^{2} - 4mn = 49 - 40 = 9$, so $m - n = \pm 3$.
        $m^{2} - n^{2} = (m+n)(m-n) = 7 \times (\pm 3) = \pm 21$

        (3) $x^{2} - 7x + 10 = 0$
        Find two numbers with product $10$ and sum $-7$: $(-2) \times (-5) = 10$, $(-2)+(-5) = -7$ ✓
        $x^{2} - 7x + 10 = (x-2)(x-5) = 0$
        So $x = 2$ or $x = 5$

        (Note: in (3), $m=2, n=5$ or $m=5, n=2$ exactly satisfies $m+n=7$ and $mn=10$ — consistent with the given conditions)
      explanation: |
        这道综合题把代值技巧、恒等式、因式分解三种方法串联起来，体现了因式分解的灵活性。
        在（3）中，"找两数积为常数项、和为一次项系数"是分解二次三项式的重要方法（十字相乘法的雏形）。
      explanationEn: |
        This comprehensive problem links substitution, algebraic identities, and factorization together, illustrating the flexibility of factorization.
        In (3), "finding two numbers whose product equals the constant term and whose sum equals the linear coefficient" is an important technique for factoring quadratic trinomials (a preview of the cross-multiplication method).
