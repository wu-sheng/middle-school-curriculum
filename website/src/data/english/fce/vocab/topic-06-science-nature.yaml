    phonetic: '/rɪˈnjuːəbl/'
    partOfSpeech: adjective
    definition: 'A source of energy that never runs out, such as wind, sunlight, or water power'
    definitionZh: '可再生的，永远不会用完的能源，如风能、太阳能或水力'
    exampleSentence: 'Solar panels use renewable energy from the sun, which will shine for billions of years.'
    exampleSentenceZh: '太阳能板使用来自太阳的可再生能源，太阳将照耀数十亿年。'
