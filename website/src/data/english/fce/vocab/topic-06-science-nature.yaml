    definitionZh: '迁徙，从一个地方移到另一个地方，通常每年在同一时间'
    exampleSentence: 'Every autumn, millions of monarch butterflies migrate from Canada to Mexico — a journey of over 4,000 kilometres.'
    exampleSentenceZh: '每年秋天，数百万只帝王蝶从加拿大迁徙到墨西哥——旅程超过4,000公里。'
