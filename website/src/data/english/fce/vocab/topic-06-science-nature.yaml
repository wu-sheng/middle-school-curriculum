  # ============================================
  # D151: V0751-V0755 — Core Ecosystem Words
  # ============================================

  - id: V0751
    word: ecosystem
    phonetic: '/ˈiːkəʊˌsɪstəm/'
    partOfSpeech: noun
    definition: 'A community of living things and their environment, all working together as a system'
    definitionZh: '生态系统，由生物群落及其环境共同组成的系统'
    exampleSentence: 'A pond is a tiny ecosystem where frogs, fish, insects, and water plants all depend on each other.'
    exampleSentenceZh: '池塘是一个小型生态系统，青蛙、鱼、昆虫和水草都彼此依赖。'
    wordFamily:
      - form: ecological
        partOfSpeech: adjective
      - form: ecology
        partOfSpeech: noun
      - form: ecologist
        partOfSpeech: noun
    collocations:
      - 'fragile ecosystem'
      - 'marine ecosystem'
      - 'ecosystem services'
    synonyms: [environment, habitat, biome]
    antonyms: []
    level: 3
    firstAppear: D151
    reviewSchedule: [D152, D154, D158, D165, D181]

  - id: V0752
    word: habitat
    phonetic: '/ˈhæbɪtæt/'
    partOfSpeech: noun
    definition: 'The natural home or environment where a plant or animal normally lives'
    definitionZh: '栖息地，动植物通常生活的自然环境'
    exampleSentence: 'The Arctic is the natural habitat of polar bears, where they hunt seals on the ice.'
    exampleSentenceZh: '北极是北极熊的自然栖息地，它们在冰面上捕猎海豹。'
    wordFamily:
      - form: inhabit
        partOfSpeech: verb
      - form: inhabitant
        partOfSpeech: noun
    collocations:
      - 'natural habitat'
      - 'habitat loss'
      - 'habitat destruction'
    synonyms: [home, environment, territory]
    antonyms: []
    level: 3
    firstAppear: D151
    reviewSchedule: [D152, D154, D158, D165, D181]

  - id: V0753
    word: species
    phonetic: '/ˈspiːʃiːz/'
    partOfSpeech: noun
    definition: 'A group of animals or plants that are similar and can produce young together'
    definitionZh: '物种，一群相似的、能繁殖后代的动物或植物'
    exampleSentence: 'Scientists have discovered over 8 million species on Earth, but many more are still unknown.'
    exampleSentenceZh: '科学家已经在地球上发现了超过800万个物种，但还有更多仍未被发现。'
    wordFamily: []
    collocations:
      - 'endangered species'
      - 'invasive species'
      - 'native species'
    synonyms: [type, kind, variety]
    antonyms: []
    level: 3
    firstAppear: D151
    reviewSchedule: [D152, D154, D158, D165, D181]

  - id: V0754
    word: biodiversity
    phonetic: '/ˌbaɪəʊdaɪˈvɜːsəti/'
    partOfSpeech: noun
    definition: 'The variety of different plants, animals, and other living things in an area'
    definitionZh: '生物多样性，一个区域内不同动植物和其他生物的多样性'
    exampleSentence: 'Rainforests have the highest biodiversity on Earth — one tree can be home to hundreds of insect species.'
    exampleSentenceZh: '雨林拥有地球上最高的生物多样性——一棵树上就能生活着数百种昆虫。'
    wordFamily:
      - form: biodiverse
        partOfSpeech: adjective
    collocations:
      - 'rich biodiversity'
      - 'biodiversity loss'
      - 'protect biodiversity'
    synonyms: [variety of life, biological diversity]
    antonyms: []
    level: 3
    firstAppear: D151
    reviewSchedule: [D152, D154, D158, D165, D181]

  - id: V0755
    word: conservation
    phonetic: '/ˌkɒnsəˈveɪʃn/'
    partOfSpeech: noun
    definition: 'The protection of natural things such as animals, plants, and forests to prevent them being destroyed'
    definitionZh: '保护，对动物、植物和森林等自然事物的保护，以防止其被破坏'
    exampleSentence: 'Thanks to conservation efforts, the number of giant pandas has slowly increased over the past twenty years.'
    exampleSentenceZh: '多亏了保护工作，大熊猫的数量在过去二十年中缓慢增长。'
    wordFamily:
      - form: conserve
        partOfSpeech: verb
      - form: conservationist
        partOfSpeech: noun
    collocations:
