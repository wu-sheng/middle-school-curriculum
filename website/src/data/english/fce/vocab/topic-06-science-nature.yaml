    definitionZh: '灭绝，不再存在的状态；某个物种的所有成员都已死亡'
    exampleSentence: 'The dinosaurs faced extinction about 66 million years ago when a huge asteroid hit Earth.'
    exampleSentenceZh: '恐龙大约在6600万年前面临灭绝，当时一颗巨大的小行星撞击了地球。'
    wordFamily:
      - form: extinct
        partOfSpeech: adjective
    collocations:
