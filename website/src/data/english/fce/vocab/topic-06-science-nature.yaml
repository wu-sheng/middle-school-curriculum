    definitionZh: '污染，引入环境中的有害物质，使环境变脏或危险'
    exampleSentence: 'Plastic pollution in the ocean kills over one million seabirds every year.'
    exampleSentenceZh: '海洋中的塑料污染每年杀死超过一百万只海鸟。'
    wordFamily:
