    definitionZh: '大气层，包围地球的气体层，我们呼吸的空气，也保护我们免受太空的危害'
    exampleSentence: 'The atmosphere acts like a blanket around Earth, keeping us warm enough to survive.'
    exampleSentenceZh: '大气层像地球周围的一条毯子，使我们保持足够温暖以生存。'
