    reviewSchedule: [D153, D155, D159, D166, D182]

  - id: V0759
    word: sustainable
    phonetic: '/səˈsteɪnəbl/'
    partOfSpeech: adjective
    definition: 'Able to continue for a long time without harming the environment'
    definitionZh: '可持续的，能够长期持续而不损害环境的'
    exampleSentence: 'Using bamboo straws instead of plastic ones is a sustainable choice that helps protect the ocean.'
    exampleSentenceZh: '使用竹子吸管代替塑料吸管是一种有助于保护海洋的可持续选择。'
    wordFamily:
