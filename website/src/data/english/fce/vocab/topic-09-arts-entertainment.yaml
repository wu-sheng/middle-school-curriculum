    definitionZh: '推荐，建议某人阅读、观看或尝试某物，因为它很好'
    exampleSentence: 'I would highly recommend this book to anyone who enjoys adventure stories.'
    exampleSentenceZh: '我强烈推荐这本书给所有喜欢冒险故事的人。'
    wordFamily:
      - form: recommendation
        partOfSpeech: noun
      - form: recommended
        partOfSpeech: adjective
