    definitionZh: '批评，表达对某事的不满或指出其缺点'
    exampleSentence: 'Some critics criticised the film for its slow pace, but I thought it was beautifully atmospheric.'
    exampleSentenceZh: '一些评论家批评这部电影节奏慢，但我觉得它气氛很美。'
    wordFamily:
      - form: criticism
