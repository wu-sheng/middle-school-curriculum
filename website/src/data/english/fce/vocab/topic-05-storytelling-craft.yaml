    definition: 'The main events of a story, devised and presented as an interconnected sequence'
    definitionZh: '情节，故事线'
    exampleSentence: 'The plot thickened when the detective found a mysterious letter hidden inside the old clock.'
    exampleSentenceZh: '当侦探发现藏在旧钟里的神秘信件时，情节变得更加复杂了。'
    wordFamily: []
    collocations:
