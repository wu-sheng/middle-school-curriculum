    partOfSpeech: noun
    definition: 'A spoken or written account of connected events; a story'
    definitionZh: '叙事，故事'
    exampleSentence: 'The author created a gripping narrative about a young girl lost in an enchanted forest.'
    exampleSentenceZh: '作者创作了一个关于一个迷失在魔法森林中的女孩的扣人心弦的故事。'
    wordFamily:
      - form: narrator
        partOfSpeech: noun
