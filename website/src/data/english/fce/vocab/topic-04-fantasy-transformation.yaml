  # ============================================

  - id: V0451
    word: transform
    phonetic: '/trænsˈfɔːm/'
    partOfSpeech: verb
    definition: 'To change something completely in form, appearance, or character'
    definitionZh: '变形，转变'
    exampleSentence: 'The young wizard learned to transform a stone into a golden egg during class.'
    exampleSentenceZh: '小巫师在课堂上学会了把石头变成金蛋。'
    wordFamily:
      - form: transformation
        partOfSpeech: noun
      - form: transformer
        partOfSpeech: noun
      - form: transformative
        partOfSpeech: adjective
    collocations:
