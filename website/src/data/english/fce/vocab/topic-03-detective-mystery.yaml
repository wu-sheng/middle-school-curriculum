    phonetic: '/səˈspekt/'
    partOfSpeech: verb
    definition: 'To believe that something is probably true, especially something bad'
    definitionZh: '怀疑，猜想'
    exampleSentence: 'I suspect that the librarian knows more about the missing book than she is saying.'
    exampleSentenceZh: '我怀疑图书管理员对丢失的书知道的比她说的要多。'
