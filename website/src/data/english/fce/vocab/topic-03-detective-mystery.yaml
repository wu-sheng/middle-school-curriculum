    partOfSpeech: verb
    definition: 'To examine something carefully to discover the truth'
    definitionZh: '调查，研究'
    exampleSentence: 'The young detective decided to investigate the mysterious footprints in the garden.'
    exampleSentenceZh: '年轻的侦探决定调查花园里那些神秘的脚印。'
    wordFamily:
      - form: investigation
        partOfSpeech: noun
      - form: investigator
