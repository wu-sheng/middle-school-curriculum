    phonetic: '/ˈædvəkeɪt/'
    partOfSpeech: verb
    definition: 'To publicly support or recommend a particular cause, idea, or policy'
    definitionZh: '倡导，拥护；公开支持或推荐某一事业、想法或政策'
    exampleSentence: 'Many teachers advocate learning coding from a young age because it develops logical thinking.'
    exampleSentenceZh: '许多教师倡导从小学习编程，因为它能培养逻辑思维。'
