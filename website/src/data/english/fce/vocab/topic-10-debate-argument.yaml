    reviewSchedule: [D272, D274, D278, D285, D301]

  - id: V1504
    word: assert
    phonetic: '/əˈsɜːt/'
    partOfSpeech: verb
    definition: 'To state something firmly and confidently as a fact'
    definitionZh: '断言，声明；坚定自信地陈述某事为事实'
    exampleSentence: 'The headteacher asserted that the new school rules would make everyone happier.'
    exampleSentenceZh: '校长断言新的校规会让大家更快乐。'
    wordFamily:
      - form: assertion
        partOfSpeech: noun
      - form: assertive
        partOfSpeech: adjective
      - form: assertively
        partOfSpeech: adverb
