vocab:
  # ============================================
  # D271: V1501-V1505 — Core Debate Verbs
  # ============================================

  - id: V1501
    word: argue
    phonetic: '/ˈɑːɡjuː/'
    partOfSpeech: verb
    definition: 'To give reasons or evidence to support an idea or opinion, or to disagree with someone'
    definitionZh: '论证，争论；提供理由或证据来支持一个想法或观点，或与某人意见不同'
    exampleSentence: 'Many students argue that homework should be reduced because it takes away free time.'
    exampleSentenceZh: '许多学生认为应该减少作业，因为作业占用了他们的自由时间。'
    wordFamily:
      - form: argument
        partOfSpeech: noun
      - form: arguable
        partOfSpeech: adjective
      - form: arguably
        partOfSpeech: adverb
    collocations:
      - 'argue that'
      - 'argue for/against'
      - 'argue convincingly'
    synonyms: [claim, contend, maintain]
    antonyms: [agree, concede, accept]
    level: 3
    firstAppear: D271
    reviewSchedule: [D272, D274, D278, D285, D301]

  - id: V1502
    word: claim
    phonetic: '/kleɪm/'
    partOfSpeech: verb
    definition: 'To say that something is true, even though you have not proved it'
    definitionZh: '声称，宣称；说某事是真的，即使你还没有证明它'
    exampleSentence: 'Some people claim that video games make children violent, but there is little evidence for this.'
    exampleSentenceZh: '有些人声称电子游戏会让孩子变得暴力，但几乎没有证据支持这一点。'
    wordFamily:
      - form: claim
        partOfSpeech: noun
      - form: claimant
        partOfSpeech: noun
    collocations:
      - 'claim that'
      - 'claim to be'
      - 'false claim'
    synonyms: [assert, state, declare]
    antonyms: [deny, refute, disprove]
    level: 3
    firstAppear: D271
    reviewSchedule: [D272, D274, D278, D285, D301]

  - id: V1503
    word: maintain
    phonetic: '/meɪnˈteɪn/'
    partOfSpeech: verb
    definition: 'To continue to say that something is true, even when others disagree'
    definitionZh: '坚持认为，坚持主张；即使别人不同意，仍继续说某事是真的'
    exampleSentence: 'She maintains that reading paper books is better than reading on a screen.'
    exampleSentenceZh: '她坚持认为读纸质书比在屏幕上阅读更好。'
    wordFamily:
      - form: maintenance
        partOfSpeech: noun
    collocations:
