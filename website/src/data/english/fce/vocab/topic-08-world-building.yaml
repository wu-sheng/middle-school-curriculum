    definitionZh: '后果，某个行为或情况的结果，尤指不好的结果'
    exampleSentence: 'One consequence of building too many factories near the river is that the water becomes polluted.'
    exampleSentenceZh: '在河边建太多工厂的一个后果是水会受到污染。'
    wordFamily:
      - form: consequent
        partOfSpeech: adjective
      - form: consequently
        partOfSpeech: adverb
    collocations:
      - 'serious consequence'
      - 'as a consequence'
      - 'face the consequences'
