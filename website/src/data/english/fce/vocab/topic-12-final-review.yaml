# Topic 12: Final Review — Commonly Confused Words & Exam Traps (Month 12)
# V1901-V2100 — B2 level vocabulary
# Final quest theme: words students often get wrong, exam traps, commonly confused pairs

topic: "Final Review & Exam Traps"
topicZh: "终极复习与考试陷阱"
vocab:
  # ============================================
  # D331: V1901-V1905 — Confusing Pairs: affect/effect, advice/advise
  # ============================================

  - id: V1901
    word: affect
    phonetic: '/əˈfekt/'
    partOfSpeech: verb
    definition: 'To have an influence on or cause a change in something'
    definitionZh: '影响，对某事产生影响或引起变化'
    exampleSentence: 'The bad weather affected our plans for the school trip.'
    exampleSentenceZh: '恶劣的天气影响了我们的学校旅行计划。'
    wordFamily:
      - form: affected
        partOfSpeech: adjective
      - form: affection
        partOfSpeech: noun
    collocations:
      - 'badly affect'
      - 'seriously affect'
      - 'affect the outcome'
    synonyms: [influence, impact, alter]
    antonyms: []
    confusedWith: 'effect (noun) — "affect" is the VERB, "effect" is the NOUN'
    confusedWithZh: 'effect（名词）——"affect"是动词，"effect"是名词'
    level: 4
    firstAppear: D331
    reviewSchedule: [D332, D334, D338, D345, D355]

  - id: V1902
    word: effect
    phonetic: '/ɪˈfekt/'
    partOfSpeech: noun
    definition: 'A change that is the result of an action or other cause'
    definitionZh: '效果，结果，由某个行为或原因引起的变化'
    exampleSentence: 'The new rules had a positive effect on student behaviour.'
    exampleSentenceZh: '新规则对学生行为产生了积极影响。'
    wordFamily:
      - form: effective
        partOfSpeech: adjective
      - form: effectively
        partOfSpeech: adverb
      - form: effectiveness
        partOfSpeech: noun
    collocations:
      - 'have an effect on'
      - 'side effect'
      - 'positive/negative effect'
    synonyms: [result, consequence, outcome]
    antonyms: [cause]
    confusedWith: 'affect (verb) — "effect" is the NOUN, "affect" is the VERB'
    confusedWithZh: 'affect（动词）——"effect"是名词，"affect"是动词'
    level: 4
    firstAppear: D331
    reviewSchedule: [D332, D334, D338, D345, D355]

  - id: V1903
    word: advice
    phonetic: '/ədˈvaɪs/'
    partOfSpeech: noun
    definition: 'A suggestion about what someone should do in a particular situation (uncountable)'
    definitionZh: '建议，关于某人在特定情况下应该做什么的建议（不可数）'
    exampleSentence: 'My teacher gave me some useful advice about studying for exams.'
    exampleSentenceZh: '老师给了我一些关于备考的有用建议。'
    wordFamily:
      - form: advise
        partOfSpeech: verb
      - form: adviser
        partOfSpeech: noun
      - form: advisable
        partOfSpeech: adjective
    collocations:
      - 'give advice'
      - 'take advice'
      - 'a piece of advice'
    synonyms: [guidance, recommendation, suggestion]
    antonyms: []
    confusedWith: 'advise (verb, /ədˈvaɪz/) — "advice" is the NOUN with /s/ sound, "advise" is the VERB with /z/ sound'
    confusedWithZh: 'advise（动词，/ədˈvaɪz/）——"advice"是名词，发/s/音；"advise"是动词，发/z/音'
    level: 4
    firstAppear: D331
    reviewSchedule: [D332, D334, D338, D345, D355]

  - id: V1904
    word: advise
    phonetic: '/ədˈvaɪz/'
    partOfSpeech: verb
    definition: 'To give someone a recommendation about what they should do'
    definitionZh: '建议，向某人推荐他们应该做什么'
    exampleSentence: 'I would advise you to start revising at least two weeks before the exam.'
    exampleSentenceZh: '我建议你至少在考试前两周开始复习。'
    wordFamily:
      - form: advice
        partOfSpeech: noun
      - form: adviser
        partOfSpeech: noun
      - form: advisory
        partOfSpeech: adjective
    collocations:
      - 'strongly advise'
      - 'advise against'
      - 'advise someone to do something'
    synonyms: [recommend, suggest, counsel]
    antonyms: [discourage]
    level: 4
    firstAppear: D331
    reviewSchedule: [D332, D334, D338, D345, D355]

  - id: V1905
    word: although
    phonetic: '/ɔːlˈðoʊ/'
    partOfSpeech: conjunction
    definition: 'Despite the fact that; used to introduce a contrasting idea'
    definitionZh: '尽管，虽然；用来引入对比的想法'
    exampleSentence: 'Although the exam was difficult, I felt I had prepared well enough.'
    exampleSentenceZh: '尽管考试很难，我觉得自己准备得够充分了。'
    wordFamily: []
    collocations:
      - 'although it is true that'
      - 'although many people'
    synonyms: [though, even though, despite the fact that]
    antonyms: []
    confusedWith: 'despite/in spite of + noun/gerund (NOT "despite that..." or "although + noun")'
    confusedWithZh: 'despite/in spite of + 名词/动名词（不是"despite that..."或"although + 名词"）'
    level: 4
    firstAppear: D331
    reviewSchedule: [D332, D334, D338, D345, D355]

  # ============================================
  # D332: V1906-V1910 — despite vs although, lose vs loose
  # ============================================

  - id: V1906
    word: despite
    phonetic: '/dɪˈspaɪt/'
    partOfSpeech: preposition
    definition: 'Without being affected by; in spite of (followed by a noun or gerund, NOT a clause)'
    definitionZh: '尽管（后接名词或动名词，不接从句）'
    exampleSentence: 'Despite the rain, the sports day went ahead as planned.'
    exampleSentenceZh: '尽管下雨，运动会还是按计划进行了。'
    wordFamily: []
    collocations:
      - 'despite the fact that'
      - 'despite being'
      - 'despite this'
    synonyms: [in spite of, notwithstanding, regardless of]
    antonyms: [because of, due to]
    confusedWith: 'although (conjunction + clause) vs despite (preposition + noun/gerund). WRONG: "Despite it rained." CORRECT: "Despite the rain." or "Although it rained."'
    confusedWithZh: 'although（连词+从句）vs despite（介词+名词/动名词）。错误："Despite it rained." 正确："Despite the rain." 或 "Although it rained."'
    level: 4
    firstAppear: D332
    reviewSchedule: [D333, D335, D339, D346, D356]

  - id: V1907
    word: lose
    phonetic: '/luːz/'
    partOfSpeech: verb
    definition: 'To no longer have something, or to fail to win'
    definitionZh: '失去，丢失；输掉'
    exampleSentence: 'I always lose my keys — I really need to be more careful.'
    exampleSentenceZh: '我总是丢钥匙——我真的需要更小心。'
    wordFamily:
      - form: loss
        partOfSpeech: noun
      - form: lost
        partOfSpeech: adjective
      - form: loser
        partOfSpeech: noun
    collocations:
      - 'lose weight'
      - 'lose track of time'
      - 'lose patience'
    synonyms: [misplace, forfeit, be defeated]
    antonyms: [find, win, gain]
    confusedWith: 'loose (adjective, /luːs/) — "lose" is a VERB (one o), "loose" is an ADJECTIVE (two o''s)'
    confusedWithZh: 'loose（形容词，/luːs/）——"lose"是动词（一个o），"loose"是形容词（两个o）'
    level: 4
    firstAppear: D332
    reviewSchedule: [D333, D335, D339, D346, D356]

  - id: V1908
    word: loose
    phonetic: '/luːs/'
    partOfSpeech: adjective
    definition: 'Not firmly fixed in place; not tight or compact'
    definitionZh: '松的，不紧的，不牢固的'
    exampleSentence: 'My shoelaces are loose — I need to tie them before I trip.'
    exampleSentenceZh: '我的鞋带松了——我得在绊倒之前系好它们。'
    wordFamily:
      - form: loosely
        partOfSpeech: adverb
      - form: loosen
        partOfSpeech: verb
    collocations:
      - 'loose clothing'
      - 'come loose'
      - 'loose ends'
    synonyms: [slack, relaxed, unfastened]
    antonyms: [tight, firm, secure]
    level: 4
    firstAppear: D332
    reviewSchedule: [D333, D335, D339, D346, D356]

  - id: V1909
    word: currently
    phonetic: '/ˈkʌrəntli/'
    partOfSpeech: adverb
    definition: 'At the present time; now'
    definitionZh: '目前，现在'
    exampleSentence: 'I am currently reading a fascinating book about space exploration.'
    exampleSentenceZh: '我目前正在读一本关于太空探索的迷人书籍。'
    wordFamily:
      - form: current
        partOfSpeech: adjective
      - form: currency
        partOfSpeech: noun
    collocations:
      - 'currently available'
      - 'currently working on'
      - 'is currently'
    synonyms: [presently, at present, now]
    antonyms: [formerly, previously]
    confusedWith: 'actually (= in fact, not "currently"). "Actually" is a false friend in many languages.'
    confusedWithZh: 'actually（= 事实上，不是"目前"）。"Actually"在许多语言中是"假朋友"。'
    level: 4
    firstAppear: D332
    reviewSchedule: [D333, D335, D339, D346, D356]

  - id: V1910
    word: actually
    phonetic: '/ˈæktʃuəli/'
    partOfSpeech: adverb
    definition: 'Used to emphasise that something is true, especially when it is surprising or different from what was expected'
    definitionZh: '实际上，事实上（用来强调某事是真实的，尤其当它令人惊讶或与预期不同时）'
    exampleSentence: 'I thought the test would be hard, but it was actually quite easy.'
    exampleSentenceZh: '我以为考试会很难，但实际上相当容易。'
    wordFamily:
      - form: actual
        partOfSpeech: adjective
    collocations:
      - 'actually quite'
      - 'not actually'
      - 'actually happened'
    synonyms: [in fact, really, in reality]
    antonyms: [supposedly, apparently]
    level: 4
    firstAppear: D332
    reviewSchedule: [D333, D335, D339, D346, D356]

  # ============================================
  # D333: V1911-V1915 — borrow/lend, rise/raise, remember/remind
  # ============================================

  - id: V1911
    word: borrow
    phonetic: '/ˈbɒroʊ/'
    partOfSpeech: verb
    definition: 'To take something from someone with the intention of giving it back'
    definitionZh: '借入，从某人那里拿东西并打算归还'
    exampleSentence: 'Can I borrow your dictionary? I will give it back after the lesson.'
    exampleSentenceZh: '我能借你的字典吗？下课后我会还给你。'
    wordFamily:
      - form: borrower
        partOfSpeech: noun
      - form: borrowing
        partOfSpeech: noun
    collocations:
      - 'borrow from'
      - 'borrow money'
      - 'borrow a book'
    synonyms: [use temporarily]
    antonyms: [lend, return]
    confusedWith: 'lend — you BORROW from someone, you LEND to someone. "Can I borrow your pen?" NOT "Can I lend your pen?"'
    confusedWithZh: 'lend——你从别人那里BORROW，你LEND给别人。"Can I borrow your pen?"不是"Can I lend your pen?"'
    level: 4
    firstAppear: D333
    reviewSchedule: [D334, D336, D340, D347, D357]

  - id: V1912
    word: lend
    phonetic: '/lend/'
    partOfSpeech: verb
    definition: 'To give something to someone for a short time, expecting them to give it back'
    definitionZh: '借出，把东西给某人用一段时间，期望他们归还'
    exampleSentence: 'Could you lend me your umbrella? It is raining outside.'
    exampleSentenceZh: '你能借给我你的雨伞吗？外面在下雨。'
    wordFamily:
      - form: lender
        partOfSpeech: noun
      - form: lending
        partOfSpeech: noun
    collocations:
      - 'lend a hand'
      - 'lend money to'
      - 'lend support'
    synonyms: [loan, let someone use]
    antonyms: [borrow, take]
    level: 4
    firstAppear: D333
    reviewSchedule: [D334, D336, D340, D347, D357]

  - id: V1913
    word: rise
    phonetic: '/raɪz/'
    partOfSpeech: verb
    definition: 'To move upwards; to increase (no object needed — intransitive)'
    definitionZh: '上升，升高；增加（不需要宾语——不及物动词）'
    exampleSentence: 'The sun rises in the east and sets in the west.'
    exampleSentenceZh: '太阳从东方升起，在西方落下。'
    wordFamily:
      - form: rise
        partOfSpeech: noun
      - form: rising
        partOfSpeech: adjective
    collocations:
      - 'rise sharply'
      - 'rise to the occasion'
      - 'prices rise'
    synonyms: [increase, go up, climb]
    antonyms: [fall, drop, decrease]
    confusedWith: 'raise (transitive — needs an object). "The sun RISES" but "Please RAISE your hand."'
    confusedWithZh: 'raise（及物动词——需要宾语）。"The sun RISES"但"Please RAISE your hand."'
    level: 4
    firstAppear: D333
    reviewSchedule: [D334, D336, D340, D347, D357]

  - id: V1914
    word: raise
    phonetic: '/reɪz/'
    partOfSpeech: verb
    definition: 'To lift something to a higher position; to increase something (needs an object — transitive)'
    definitionZh: '举起，提升；增加（需要宾语——及物动词）'
    exampleSentence: 'The school decided to raise money for charity by organising a fun run.'
    exampleSentenceZh: '学校决定通过组织趣味跑步来为慈善事业筹款。'
    wordFamily:
      - form: raise
        partOfSpeech: noun
    collocations:
      - 'raise awareness'
      - 'raise money'
      - 'raise a question'
    synonyms: [lift, elevate, increase]
    antonyms: [lower, reduce, drop]
    level: 4
    firstAppear: D333
    reviewSchedule: [D334, D336, D340, D347, D357]

  - id: V1915
    word: remind
    phonetic: '/rɪˈmaɪnd/'
    partOfSpeech: verb
    definition: 'To make someone remember something; to cause someone to think of something'
    definitionZh: '提醒，使某人想起某事'
    exampleSentence: 'Please remind me to bring my homework tomorrow.'
    exampleSentenceZh: '请提醒我明天带作业。'
    wordFamily:
      - form: reminder
        partOfSpeech: noun
    collocations:
      - 'remind someone of'
      - 'remind someone to do'
      - 'that reminds me'
    synonyms: [prompt, jog someone''s memory]
    antonyms: []
    confusedWith: 'remember (= recall by yourself) vs remind (= someone ELSE helps you recall). "I remember the answer" but "She reminded me of the answer."'
    confusedWithZh: 'remember（=自己回忆）vs remind（=别人帮你回忆）。"I remember the answer"但"She reminded me of the answer."'
    level: 4
    firstAppear: D333
    reviewSchedule: [D334, D336, D340, D347, D357]

  # ============================================
  # D334: V1916-V1920 — say/tell, do/make, avoid common errors
  # ============================================

  - id: V1916
    word: eventually
    phonetic: '/ɪˈventʃuəli/'
    partOfSpeech: adverb
    definition: 'In the end, especially after a long time or a lot of effort'
    definitionZh: '最终，终于，尤其是在很长时间或很多努力之后'
    exampleSentence: 'After trying many different approaches, I eventually found the right answer.'
    exampleSentenceZh: '在尝试了许多不同的方法后，我终于找到了正确答案。'
    wordFamily:
      - form: eventual
        partOfSpeech: adjective
      - form: eventuality
        partOfSpeech: noun
    collocations:
      - 'eventually succeed'
      - 'eventually realise'
      - 'will eventually'
    synonyms: [finally, in the end, ultimately]
    antonyms: [immediately, at once]
    confusedWith: 'False friend in some languages where "eventually" means "possibly." In English it ALWAYS means "in the end."'
    confusedWithZh: '在一些语言中，"eventually"是假朋友，意思是"可能"。但在英语中，它总是意思"最终"。'
    level: 4
    firstAppear: D334
    reviewSchedule: [D335, D337, D341, D348, D358]

  - id: V1917
    word: sensible
    phonetic: '/ˈsensəbl/'
    partOfSpeech: adjective
    definition: 'Having or showing good judgement; practical and reasonable'
    definitionZh: '明智的，合理的，有判断力的'
    exampleSentence: 'It is sensible to check your answers before handing in the exam paper.'
    exampleSentenceZh: '交卷前检查答案是明智的。'
    wordFamily:
      - form: sensibly
        partOfSpeech: adverb
      - form: sense
        partOfSpeech: noun
    collocations:
      - 'sensible decision'
      - 'sensible approach'
      - 'perfectly sensible'
    synonyms: [practical, reasonable, wise]
    antonyms: [foolish, impractical, silly]
    confusedWith: 'sensitive (= easily hurt emotionally or physically). "She is sensible" (= wise) vs "She is sensitive" (= easily upset).'
    confusedWithZh: 'sensitive（=情感或身体上容易受伤）。"She is sensible"（=明智的）vs "She is sensitive"（=敏感的）。'
    level: 4
    firstAppear: D334
    reviewSchedule: [D335, D337, D341, D348, D358]

  - id: V1918
    word: sensitive
    phonetic: '/ˈsensətɪv/'
    partOfSpeech: adjective
    definition: 'Quick to notice and be affected by small changes, or easily upset'
    definitionZh: '敏感的，容易注意到并受到微小变化影响的，或容易受伤的'
    exampleSentence: 'Be careful what you say — she is very sensitive about her exam results.'
    exampleSentenceZh: '说话注意——她对自己的考试成绩非常敏感。'
    wordFamily:
      - form: sensitivity
        partOfSpeech: noun
      - form: sensitively
        partOfSpeech: adverb
      - form: insensitive
        partOfSpeech: adjective
    collocations:
      - 'sensitive to'
      - 'sensitive issue'
      - 'highly sensitive'
    synonyms: [delicate, touchy, perceptive]
    antonyms: [insensitive, thick-skinned, unfeeling]
    level: 4
    firstAppear: D334
    reviewSchedule: [D335, D337, D341, D348, D358]

  - id: V1919
    word: principal
    phonetic: '/ˈprɪnsəpl/'
    partOfSpeech: adjective
    definition: 'Most important; main; chief'
    definitionZh: '主要的，最重要的，首要的'
    exampleSentence: 'The principal reason for my success was regular practice.'
    exampleSentenceZh: '我成功的主要原因是定期练习。'
    wordFamily: []
    collocations:
      - 'principal reason'
      - 'principal aim'
      - 'the principal'
    synonyms: [main, chief, primary]
    antonyms: [minor, secondary]
    confusedWith: 'principle (noun = a basic rule or belief). "The principal reason" (adjective) vs "a basic principle" (noun).'
    confusedWithZh: 'principle（名词=基本规则或信念）。"The principal reason"（形容词）vs "a basic principle"（名词）。'
    level: 5
    firstAppear: D334
    reviewSchedule: [D335, D337, D341, D348, D358]

  - id: V1920
    word: principle
    phonetic: '/ˈprɪnsəpl/'
    partOfSpeech: noun
    definition: 'A basic truth, law, or belief that guides behaviour or reasoning'
    definitionZh: '原则，基本真理、法则或信念'
    exampleSentence: 'She refused to cheat because it went against her principles.'
    exampleSentenceZh: '她拒绝作弊，因为这违背了她的原则。'
    wordFamily:
      - form: principled
        partOfSpeech: adjective
      - form: unprincipled
        partOfSpeech: adjective
    collocations:
      - 'basic principle'
      - 'in principle'
      - 'on principle'
    synonyms: [rule, belief, standard]
    antonyms: []
    level: 5
    firstAppear: D334
    reviewSchedule: [D335, D337, D341, D348, D358]

  # ============================================
  # D335: V1921-V1925 — succeed/achieve, opportunity, considerable
  # ============================================

  - id: V1921
    word: succeed
    phonetic: '/səkˈsiːd/'
    partOfSpeech: verb
    definition: 'To achieve what you have been trying to do; to do well'
    definitionZh: '成功，达到你一直在努力做的事'
    exampleSentence: 'If you practise every day, you will eventually succeed.'
    exampleSentenceZh: '如果你每天练习，你最终会成功。'
    wordFamily:
      - form: success
        partOfSpeech: noun
      - form: successful
        partOfSpeech: adjective
      - form: successfully
        partOfSpeech: adverb
      - form: successive
        partOfSpeech: adjective
    collocations:
      - 'succeed in doing'
      - 'succeed at'
      - 'determined to succeed'
    synonyms: [accomplish, achieve, triumph]
    antonyms: [fail, lose]
    confusedWith: 'succeed in + gerund (NOT "succeed to do"). "She succeeded in passing the exam" NOT "She succeeded to pass."'
    confusedWithZh: 'succeed in + 动名词（不是"succeed to do"）。"She succeeded in passing the exam"不是"She succeeded to pass."'
    level: 4
    firstAppear: D335
    reviewSchedule: [D336, D338, D342, D349, D359]

  - id: V1922
    word: achieve
    phonetic: '/əˈtʃiːv/'
    partOfSpeech: verb
    definition: 'To successfully reach a goal or result through effort'
    definitionZh: '实现，通过努力成功达到目标或结果'
    exampleSentence: 'She achieved the highest score in the class on the reading paper.'
    exampleSentenceZh: '她在阅读试卷上取得了全班最高分。'
    wordFamily:
      - form: achievement
        partOfSpeech: noun
      - form: achievable
        partOfSpeech: adjective
      - form: achiever
        partOfSpeech: noun
    collocations:
      - 'achieve a goal'
      - 'achieve success'
      - 'achieve a high score'
    synonyms: [accomplish, attain, reach]
    antonyms: [fail, miss]
    level: 4
    firstAppear: D335
    reviewSchedule: [D336, D338, D342, D349, D359]

  - id: V1923
    word: opportunity
    phonetic: '/ˌɒpəˈtjuːnəti/'
    partOfSpeech: noun
    definition: 'A chance to do something; a favourable set of circumstances'
    definitionZh: '机会，做某事的可能性；有利的环境'
    exampleSentence: 'The exam gives you the opportunity to show everything you have learned.'
    exampleSentenceZh: '考试给你展示你所学到的一切的机会。'
    wordFamily: []
    collocations:
      - 'golden opportunity'
      - 'take the opportunity'
      - 'opportunity to do/of doing'
    synonyms: [chance, opening, possibility]
    antonyms: [obstacle]
    confusedWith: 'possibility (= something that may happen) vs opportunity (= a chance you can take). Also: "opportunity to do" or "opportunity of doing" — NOT "opportunity of do."'
    confusedWithZh: 'possibility（=可能发生的事）vs opportunity（=你可以利用的机会）。另外："opportunity to do"或"opportunity of doing"——不是"opportunity of do"。'
    level: 4
    firstAppear: D335
    reviewSchedule: [D336, D338, D342, D349, D359]

  - id: V1924
    word: considerable
    phonetic: '/kənˈsɪdərəbl/'
    partOfSpeech: adjective
