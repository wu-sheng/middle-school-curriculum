        explanationZh: '"warm enough to bathe" = "not too cold to bathe"。"warm"翻转为"cold"并加"not"。'

  # ─────────────────────────────────────────────
  # Lesson 4: Comparisons — The Sky Dragon's Observatory
  # ─────────────────────────────────────────────
  - id: Q04-L04
    title: 'Comparisons — The Sky Dragon''s Observatory'
    titleZh: '比较句 — 天龙的天文台'

    introduction: |
      High above the Academy, you climb to the Sky Dragon's Observatory — a glass dome
      on the tallest tower. A silver sky dragon named Zephyr hovers outside, her scales
      reflecting the sunset.

      "Up here," says Professor Thornwing, "we can see everything side by side and COMPARE
      them. Zephyr is faster THAN Blaze. Ripple is AS graceful AS a dancer. Boulder is NOT
      AS light AS Zephyr."

      "In English, there are several ways to compare things:
      - AS...AS: 'She is as brave as a lion.' (equal comparison)
      - NOT AS...AS: 'He is not as tall as his brother.' (unequal — polite way)
      - LESS...THAN: 'This potion is less effective than that one.' (unequal — direct)
      - MORE...THAN / -ER THAN: 'Dragons are more intelligent than most animals.'

      In FCE Part 4, you often need to switch between these comparison patterns while keeping
      the meaning exactly the same. The key is understanding which direction the comparison
      points — and then reversing it."
    introductionZh: |
      在学院的高处，你爬上了天龙的天文台——最高塔楼上的一个玻璃穹顶。一条银色的天龙
      名叫 Zephyr 悬停在外面，鳞片反射着夕阳。

      "在这里，"Thornwing 教授说，"我们可以把一切并排看并进行比较。Zephyr 比 Blaze 更快。
      Ripple 和舞者一样优雅。Boulder 不如 Zephyr 轻。"

      "在英语中，有几种比较事物的方式：
      - AS...AS：'She is as brave as a lion.'（等量比较）
      - NOT AS...AS：'He is not as tall as his brother.'（不等量——礼貌方式）
      - LESS...THAN：'This potion is less effective than that one.'（不等量——直接方式）
      - MORE...THAN / -ER THAN：'Dragons are more intelligent than most animals.'

      在 FCE Part 4 中，你经常需要在这些比较句型之间切换，同时保持意思完全相同。
      关键是理解比较的方向——然后反转它。"

    rules:
      - pattern: 'not as...as ↔ comparative + than'
        meaning: 'These express the same inequality from opposite perspectives'
        meaningZh: '这两种从相反角度表达同样的不等关系'
        examples:
          - base: 'Fire dragons are bigger than water dragons.'
            transformed: 'Water dragons are not as big as fire dragons.'
            sentence: 'Flip the subjects and change "bigger than" to "not as big as." Both say fire dragons are the larger ones.'
            sentenceZh: '交换主语，把"bigger than"改为"not as big as"。两句都说火龙更大。'
          - base: 'Blaze is not as fast as Zephyr.'
            transformed: 'Zephyr is faster than Blaze.'
            sentence: '"Not as fast as" → the second item is faster. Flip subjects and use comparative "faster than."'
            sentenceZh: '"not as fast as" → 第二个更快。交换主语，用比较级"faster than"。'

      - pattern: 'less...than ↔ not as...as'
        meaning: 'Both express that something has a lower degree of a quality'
        meaningZh: '两者都表达某事具有较低程度的品质'
        examples:
          - base: 'This spell is less difficult than the previous one.'
            transformed: 'This spell is not as difficult as the previous one.'
            sentence: '"Less difficult than" = "not as difficult as." These are directly interchangeable.'
            sentenceZh: '"less difficult than" = "not as difficult as"。这两者可以直接互换。'
          - base: 'Earth dragons are not as common as fire dragons.'
            transformed: 'Earth dragons are less common than fire dragons.'
            sentence: '"Not as common as" = "less common than." Simple swap — same meaning.'
            sentenceZh: '"not as common as" = "less common than"。简单替换——意思相同。'

      - pattern: 'as...as (equal comparison)'
        meaning: 'States that two things are equal in a quality'
        meaningZh: '表示两个事物在某种品质上相等'
        examples:
          - base: 'Tom is just as clever as his sister.'
            transformed: 'Tom and his sister are equally clever.'
            sentence: '"Just as clever as" = "equally clever." Both express exact equality.'
            sentenceZh: '"just as clever as" = "equally clever"。两者都表达完全相等。'

    tips:
      - 'Key trick: "A is not as X as B" = "B is more X than A." The second item in "not as...as" is the one with MORE.'
      - '"Less" works like "not as...as" but sounds more formal. Use whichever the key word requires.'
      - 'Watch for adjective direction: "not as expensive" might become "cheaper than" — you may need to flip the adjective entirely.'
      - 'Double-check: after transforming, read both sentences and ask — do they point the same way? Does the same person/thing come out on top?'
      - 'FCE key words: AS, THAN, LESS, NOT — these tell you which comparison pattern to use.'
    tipsZh:
      - '关键技巧："A is not as X as B" = "B is more X than A"。"not as...as"中的第二项是更多的那个。'
      - '"less"和"not as...as"效果相同，但听起来更正式。根据关键词要求选择。'
      - '注意形容词方向："not as expensive"可能变成"cheaper than"——你可能需要完全翻转形容词。'
      - '双重检查：转换后，读两个句子并问——它们指向同一方向吗？同一个人/事物胜出吗？'
      - 'FCE 关键词：AS、THAN、LESS、NOT——这些告诉你使用哪种比较句型。'

    practicePreview:
      - id: Q04-L04-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          Earth dragons are slower than sky dragons.
          Sky dragons are _____ earth dragons. (FAST)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          地龙比天龙慢。
          天龙比 _____ 地龙。(FAST)
        answer: 'faster than'
        explanation: '"Earth dragons are slower" → flip subjects → "Sky dragons are faster than." Same inequality, different direction.'
        explanationZh: '"地龙更慢" → 交换主语 → "天龙比地龙更快"。同样的不等关系，不同方向。'

      - id: Q04-L04-P02
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The healing potion is not as effective as the energy potion.
          The healing potion is _____ the energy potion. (LESS)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          治疗药水不如能量药水有效。
          治疗药水 _____ 能量药水。(LESS)
        answer: 'less effective than'
        explanation: '"Not as effective as" = "less effective than." Direct swap — both mean the healing potion is weaker.'
        explanationZh: '"not as effective as" = "less effective than"。直接替换——都表示治疗药水效果更弱。'

      - id: Q04-L04-P03
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          No other student in the class is as talented as Mia.
          Mia is the _____ in the class. (MOST)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          班上没有其他学生像Mia一样有才华。
          Mia是班上 _____ 。(MOST)
        answer: 'most talented student'
        explanation: '"No other X is as...as Y" = "Y is the most..." This converts an equal comparison (with nobody matching) into a superlative.'
        explanationZh: '"No other X is as...as Y" = "Y is the most..."。这将一个等量比较（没有人匹配）转换为最高级。'

  # ─────────────────────────────────────────────
  # Lesson 5: Cause/Result Connectors — The Shadow Dragon's Web
  # ─────────────────────────────────────────────
  - id: Q04-L05
    title: 'Cause/Result Connectors — The Shadow Dragon''s Web'
    titleZh: '因果连接词 — 影龙之网'

    introduction: |
      In the darkest corner of the Academy, you find the Shadow Dragon's Web — a room
      covered in threads of dark silk connecting different ideas. A shadow dragon named
      Dusk materialises from the darkness.

      "Everything is connected," Dusk whispers. "Cause leads to effect. Reason leads to
      result. But there are MANY ways to express these connections:

      BECAUSE → DUE TO / OWING TO
      ALTHOUGH → DESPITE / IN SPITE OF
      SO → THEREFORE / AS A RESULT
      BECAUSE OF → SINCE / AS

      These are all different threads in the same web. They connect the same two ideas,
      but the grammar changes. BECAUSE and ALTHOUGH are followed by clauses (subject + verb).
      DUE TO and DESPITE are followed by nouns or -ing forms. This is the key difference."
    introductionZh: |
      在学院最黑暗的角落，你发现了影龙之网——一个房间布满了连接不同想法的暗丝线。
      一条叫 Dusk 的影龙从黑暗中现身。

      "一切都是相互联系的，"Dusk 低声说。"原因导致结果。理由导致效果。但有很多方式
      来表达这些联系：

      BECAUSE → DUE TO / OWING TO
      ALTHOUGH → DESPITE / IN SPITE OF
      SO → THEREFORE / AS A RESULT
      BECAUSE OF → SINCE / AS

      这些都是同一张网中的不同丝线。它们连接同样的两个想法，但语法不同。
      BECAUSE 和 ALTHOUGH 后面跟从句（主语 + 动词）。DUE TO 和 DESPITE 后面跟
      名词或 -ing 形式。这是关键区别。"

    rules:
      - pattern: 'because + clause ↔ due to / owing to / because of + noun/-ing'
        meaning: 'Express the same cause-effect relationship with different grammar'
        meaningZh: '用不同语法表达相同的因果关系'
        examples:
          - base: 'The flight was cancelled because the weather was terrible.'
            transformed: 'The flight was cancelled due to the terrible weather.'
            sentence: '"Because + clause" → "due to + noun phrase." Convert "the weather was terrible" to "the terrible weather."'
            sentenceZh: '"because + 从句" → "due to + 名词短语"。将"天气很糟糕"转换为"糟糕的天气"。'
          - base: 'We stayed inside because it was raining heavily.'
            transformed: 'We stayed inside because of the heavy rain.'
            sentence: '"Because + clause" → "because of + noun." Convert "it was raining heavily" to "the heavy rain."'
            sentenceZh: '"because + 从句" → "because of + 名词"。将"下着大雨"转换为"大雨"。'
          - base: 'Due to his illness, Tom missed the dragon race.'
            transformed: 'Because Tom was ill, he missed the dragon race.'
            sentence: '"Due to + noun" → "because + clause." Expand the noun back into a full clause.'
            sentenceZh: '"due to + 名词" → "because + 从句"。将名词扩展回完整从句。'

      - pattern: 'although + clause ↔ despite / in spite of + noun/-ing'
        meaning: 'Express the same contrast/concession with different grammar'
        meaningZh: '用不同语法表达相同的转折/让步关系'
        examples:
          - base: 'Although he was tired, he continued training.'
            transformed: 'Despite being tired, he continued training.'
            sentence: '"Although + clause" → "despite + -ing." Convert "he was tired" to "being tired."'
            sentenceZh: '"although + 从句" → "despite + -ing"。将"he was tired"转换为"being tired"。'
          - base: 'In spite of the danger, the riders flew through the storm.'
            transformed: 'Although it was dangerous, the riders flew through the storm.'
            sentence: '"In spite of + noun" → "although + clause." Expand "the danger" to "it was dangerous."'
            sentenceZh: '"in spite of + 名词" → "although + 从句"。将"the danger"扩展为"it was dangerous"。'

    tips:
      - 'GRAMMAR KEY: because/although/since/as → followed by CLAUSES (subject + verb). Due to/despite/in spite of/because of → followed by NOUNS or -ING forms.'
      - 'Converting clause to noun: "the weather was bad" → "the bad weather" or "the weather being bad."'
      - 'Converting clause to -ing: "he was tired" → "being tired" | "she had studied hard" → "having studied hard."'
      - '"Despite" and "in spite of" mean the same thing and are fully interchangeable.'
      - 'Common FCE trap: "despite" is NEVER followed by "of." It is "despite the rain" NOT "despite of the rain." But "in spite of the rain" is correct.'
    tipsZh:
      - '语法关键：because/although/since/as → 后面跟从句（主语 + 动词）。Due to/despite/in spite of/because of → 后面跟名词或 -ing 形式。'
      - '从句转名词："the weather was bad" → "the bad weather" 或 "the weather being bad"。'
      - '从句转 -ing："he was tired" → "being tired" | "she had studied hard" → "having studied hard"。'
      - '"despite"和"in spite of"意思相同，完全可以互换。'
      - '常见 FCE 陷阱："despite"后面永远不跟"of"。是"despite the rain"不是"despite of the rain"。但"in spite of the rain"是正确的。'

    practicePreview:
      - id: Q04-L05-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The dragon show was cancelled because the weather was stormy.
          The dragon show was cancelled _____ stormy weather. (DUE)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          龙展因为暴风雨天气取消了。
          龙展因为 _____ 暴风雨天气取消了。(DUE)
        answer: 'due to the'
        explanation: '"Because the weather was stormy" → "due to the stormy weather." Clause converts to noun phrase.'
        explanationZh: '"because the weather was stormy" → "due to the stormy weather"。从句转换为名词短语。'

      - id: Q04-L05-P02
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          Although she was frightened, she climbed onto the dragon.
          Despite _____, she climbed onto the dragon. (BEING)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          虽然她很害怕，但她还是爬上了龙背。
          尽管 _____，她还是爬上了龙背。(BEING)
        answer: 'being frightened'
        explanation: '"Although she was frightened" → "despite being frightened." The clause becomes an -ing form.'
        explanationZh: '"although she was frightened" → "despite being frightened"。从句变为 -ing 形式。'

      - id: Q04-L05-P03
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          In spite of his young age, Leo passed the dragon riding exam.
          _____ very young, Leo passed the dragon riding exam. (ALTHOUGH)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          尽管年纪小，Leo还是通过了龙骑术考试。
          _____ 很年轻，Leo还是通过了龙骑术考试。(ALTHOUGH)
        answer: 'Although he was'
        explanation: '"In spite of his young age" → "Although he was very young." Noun phrase expands to a full clause.'
        explanationZh: '"in spite of his young age" → "although he was very young"。名词短语扩展为完整从句。'

  # ─────────────────────────────────────────────
  # Lesson 6: Emphasis and Cleft Sentences — The Crystal Dragon's Hall of Light
  # ─────────────────────────────────────────────
  - id: Q04-L06
    title: 'Emphasis and Cleft Sentences — The Crystal Dragon''s Hall of Light'
    titleZh: '强调与分裂句 — 水晶龙的光之殿堂'

    introduction: |
      For your final lesson, Professor Thornwing leads you to the Crystal Dragon's Hall of
      Light — a dazzling chamber where every surface reflects and amplifies light. A transparent
      crystal dragon named Prism floats in the centre, casting rainbows in every direction.

      "Prism teaches the most advanced transformation," says the Professor. "EMPHASIS. Sometimes
      you need to highlight one particular part of a sentence — to put a spotlight on it, just as
      Prism puts a spotlight on light."

      "The main tool for emphasis in English is the CLEFT SENTENCE. 'Cleft' means 'split' —
      you split a normal sentence into two parts to emphasise one piece:

      Normal: 'Maya won the race.'
      Emphasis on WHO: 'It was Maya who won the race.'
      Emphasis on WHAT: 'What Maya won was the race.'

      In FCE Part 4, cleft sentences appear regularly. The key words are often IT, WAS, WHO,
      or WHAT. Mastering this pattern puts you at the top level of transformation skill!"
    introductionZh: |
      最后一课，Thornwing 教授带你来到水晶龙的光之殿堂——一个耀眼的大厅，每个表面
      都反射和放大光线。一条透明的水晶龙名叫 Prism 漂浮在中央，向四面八方投射彩虹。

      "Prism 教授最高级的变换，"教授说。"强调。有时你需要突出句子的某个特定部分——
      给它打上聚光灯，就像 Prism 给光线打聚光灯一样。"

      "英语中强调的主要工具是分裂句。'Cleft'的意思是'分裂'——你把一个普通句子
      分成两部分来强调其中一个：

      普通：'Maya won the race.'（Maya赢了比赛。）
      强调谁：'It was Maya who won the race.'（是Maya赢了比赛。）
      强调什么：'What Maya won was the race.'（Maya赢的是比赛。）

      在 FCE Part 4 中，分裂句经常出现。关键词通常是 IT、WAS、WHO 或 WHAT。
      掌握这个句型会让你达到变换技能的顶级水平！"

    rules:
      - pattern: 'It + be + emphasised element + who/that + rest of sentence'
        meaning: 'Splits the sentence to put a spotlight on the person, thing, time, or place you want to emphasise'
        meaningZh: '将句子分开，把聚光灯打在你想强调的人、物、时间或地点上'
        examples:
          - base: 'Tom found the dragon egg in the forest.'
            transformed: 'It was Tom who found the dragon egg in the forest.'
            sentence: 'Emphasis on WHO did it. "It was + person + who + rest." Use "who" for people.'
            sentenceZh: '强调谁做的。"It was + 人 + who + 其余部分"。人用"who"。'
          - base: 'Tom found the dragon egg in the forest.'
            transformed: 'It was in the forest that Tom found the dragon egg.'
            sentence: 'Emphasis on WHERE. "It was + place + that + rest." Use "that" for things, places, and times.'
            sentenceZh: '强调在哪里。"It was + 地点 + that + 其余部分"。事物、地点和时间用"that"。'
          - base: 'Tom found the dragon egg in the forest.'
            transformed: 'It was the dragon egg that Tom found in the forest.'
            sentence: 'Emphasis on WHAT was found. "It was + thing + that + rest."'
            sentenceZh: '强调找到了什么。"It was + 事物 + that + 其余部分"。'

      - pattern: 'What + subject + verb + be + emphasised element'
        meaning: 'A "pseudo-cleft" that uses "what" to highlight the important part at the end'
        meaningZh: '用"what"在句末突出重要部分的"伪分裂句"'
        examples:
          - base: 'I need more practice time.'
            transformed: 'What I need is more practice time.'
            sentence: '"What + I + need" focuses attention on the answer: "more practice time." The emphasis falls on the last element.'
            sentenceZh: '"What + I + need"把注意力集中在答案上："更多练习时间"。强调落在最后一个元素上。'
          - base: 'She loved the flying lesson most.'
            transformed: 'What she loved most was the flying lesson.'
            sentence: '"What + she + loved most" builds anticipation. "The flying lesson" gets the spotlight at the end.'
            sentenceZh: '"What + she + loved most"制造了期待感。"飞行课"在最后获得聚光灯。'

    tips:
      - 'Use "who" for people and "that" for everything else (things, places, times, reasons).'
      - '"It was...that" can emphasise almost any part of the sentence — just move the emphasised part after "It was" and keep the rest after "that."'
      - 'The tense of "be" should match the original: present → "It is...who/that", past → "It was...who/that."'
      - '"What..." cleft sentences always put the emphasised element at the END. This creates a dramatic reveal effect.'
      - 'FCE key words for cleft sentences: IT, WAS, WHO, WHAT, THAT. When you see these, think emphasis!'
      - 'Common pattern: "The thing that surprised me was..." = "What surprised me was..." (What-cleft).'
    tipsZh:
      - '人用"who"，其他一切（事物、地点、时间、原因）用"that"。'
      - '"It was...that"几乎可以强调句子的任何部分——只需把被强调的部分移到"It was"后面，其余部分放在"that"后面。'
      - '"be"的时态应与原句匹配：现在时 → "It is...who/that"，过去时 → "It was...who/that"。'
      - '"What..."分裂句总是把被强调的元素放在末尾。这创造了戏剧性的揭示效果。'
      - 'FCE 分裂句关键词：IT、WAS、WHO、WHAT、THAT。看到这些就想到强调！'
      - '常见句型："The thing that surprised me was..." = "What surprised me was..."（What-分裂句）。'

    practicePreview:
      - id: Q04-L06-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          Professor Thornwing started the Dragon Academy.
          It _____ started the Dragon Academy. (WAS)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          Thornwing教授创办了龙学院。
          _____ 创办了龙学院。(WAS)
        answer: 'was Professor Thornwing who'
        explanation: 'It-cleft emphasising the person: "It was + person + who + rest." The spotlight is on Professor Thornwing.'
        explanationZh: '强调人物的 It-分裂句："It was + 人 + who + 其余部分"。聚光灯打在Thornwing教授身上。'

      - id: Q04-L06-P02
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          I really need a good night's sleep before the exam.
          _____ is a good night's sleep before the exam. (WHAT)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          考试前我真的需要好好睡一觉。
          _____ 是考试前好好睡一觉。(WHAT)
        answer: 'What I really need'
        explanation: 'What-cleft: "What + I + really need" puts the emphasis on the answer "a good night''s sleep." The important element is revealed at the end.'
        explanationZh: 'What-分裂句："What + I + really need"把强调放在答案"好好睡一觉"上。重要元素在最后揭示。'

      - id: Q04-L06-P03
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The dragon chose Maya, not Tom.
          It was _____ the dragon chose. (MAYA)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          龙选择了Maya，不是Tom。
          _____ 龙选择的。(MAYA)
        answer: 'Maya that'
        explanation: 'It-cleft emphasising the object (who was chosen): "It was Maya that the dragon chose." The contrast with Tom is implied by the emphasis.'
        explanationZh: 'It-分裂句强调宾语（谁被选中）："It was Maya that the dragon chose"。与Tom的对比通过强调暗示出来。'
