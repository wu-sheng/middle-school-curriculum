id: Q04
title: 'Dragon Academy'
titleZh: '龙学院'
subtitle: 'Master the art of sentence transformation!'
subtitleZh: '掌握句子变换的艺术！'
month: 4
fceMapping: 'Use of English Part 4 (Key Word Transformation)'

theme:
  setting: 'A Dragon Academy where each dragon type teaches a different transformation pattern'
  settingZh: '一所龙学院，每种龙教授不同的句子变换模式'
  mascot: 'Professor Thornwing, the wise headmaster who speaks in transformations'
  mascotZh: 'Thornwing 教授，睿智的校长，说话总爱用句子变换'

objectives:
  - 'Transform sentences between active and passive voice'
  - 'Convert direct speech to reported speech and vice versa'
  - 'Rewrite sentences using so...that / too...to / enough...to patterns'
  - 'Express comparisons using as...as, not as...as, and less...than'
  - 'Transform cause/result sentences using different connectors'
  - 'Recognise and produce emphasis structures (cleft sentences)'

objectivesZh:
  - '在主动语态和被动语态之间转换句子'
  - '直接引语和间接引语的互相转换'
  - '使用 so...that / too...to / enough...to 句型改写句子'
  - '使用 as...as, not as...as, less...than 表达比较'
  - '使用不同连接词转换因果句'
  - '识别和使用强调结构（分裂句）'

lessons:
  # ─────────────────────────────────────────────
  # Lesson 1: Active ↔ Passive — The Fire Dragon's Forge
  # ─────────────────────────────────────────────
  - id: Q04-L01
    title: 'Active ↔ Passive — The Fire Dragon''s Forge'
    titleZh: '主动语态 ↔ 被动语态 — 火龙的锻造炉'

    introduction: |
      Welcome to the Fire Dragon's Forge! Professor Thornwing leads you into a vast cavern
      where a magnificent fire dragon named Blaze is hammering glowing metal on an anvil.

      "In this forge," says the Professor, "sentences are like metal — they can be shaped in
      different ways. The MEANING stays the same, but the FORM changes. This is the heart
      of Key Word Transformation."

      He picks up two swords from the rack. One is labelled "ACTIVE" and the other "PASSIVE."
      "These are two ways of saying the same thing. In the ACTIVE form, the doer comes first:
      'The dragon broke the chain.' In the PASSIVE form, the thing affected comes first:
      'The chain was broken by the dragon.' Same event. Different focus."

      "Blaze will teach you when to use each form — and how to transform one into the other
      perfectly. In the FCE exam, this is one of the most common transformation types. Master
      it here, and you'll earn points every time!"
    introductionZh: |
      欢迎来到火龙的锻造炉！Thornwing 教授带你走进一个巨大的洞穴，一条壮丽的
      名叫 Blaze 的火龙正在铁砧上锤打发光的金属。

      "在这个锻造炉里，"教授说，"句子就像金属——它们可以被塑造成不同的形状。
      意思保持不变，但形式改变了。这就是关键词变换的核心。"

      他从架子上拿起两把剑。一把标着"主动"，另一把标着"被动"。
      "这是表达同一件事的两种方式。在主动形式中，施动者在前：
      'The dragon broke the chain.'（龙打断了链条。）在被动形式中，受影响的事物在前：
      'The chain was broken by the dragon.'（链条被龙打断了。）同一事件，不同焦点。"

      "Blaze 会教你何时使用每种形式——以及如何完美地进行转换。在 FCE 考试中，
      这是最常见的变换类型之一。在这里掌握它，每次都能拿分！"

    rules:
      - pattern: 'Active → Passive'
        meaning: 'Move the object to subject position, add "be + past participle", optionally add "by + agent"'
        meaningZh: '将宾语移到主语位置，加"be + 过去分词"，可选择加"by + 施动者"'
        examples:
          - base: 'The fire dragon destroyed the old bridge.'
            transformed: 'The old bridge was destroyed by the fire dragon.'
            sentence: 'The object "the old bridge" becomes the subject. The verb "destroyed" becomes "was destroyed." The agent "the fire dragon" follows "by."'
            sentenceZh: '宾语"旧桥"变成主语。动词"destroyed"变为"was destroyed"。施动者"火龙"跟在"by"后面。'
          - base: 'Students must wear safety helmets during flight.'
            transformed: 'Safety helmets must be worn during flight.'
            sentence: 'With modal verbs, the pattern is: modal + be + past participle. "By students" is dropped when the agent is obvious or unimportant.'
            sentenceZh: '情态动词的被动形式：情态动词 + be + 过去分词。当施动者明显或不重要时，"by students"可以省略。'
          - base: 'They are building a new dragon stable.'
            transformed: 'A new dragon stable is being built.'
            sentence: 'Present continuous passive: is/are + being + past participle. The agent "they" is dropped as it is vague.'
            sentenceZh: '现在进行时被动：is/are + being + 过去分词。施动者"they"因为模糊而省略。'

      - pattern: 'Passive → Active'
        meaning: 'Move the agent (after "by") to subject position and change the verb back to active form'
        meaningZh: '将施动者（"by"后面的）移到主语位置，动词改回主动形式'
        examples:
          - base: 'The letter was delivered by a messenger dragon.'
            transformed: 'A messenger dragon delivered the letter.'
            sentence: 'The agent "a messenger dragon" becomes the subject. The verb returns to simple past active: "delivered."'
            sentenceZh: '施动者"信使龙"变成主语。动词恢复为一般过去时主动形式："delivered"。'
          - base: 'The potion has been prepared by the healer.'
            transformed: 'The healer has prepared the potion.'
            sentence: 'Present perfect passive → present perfect active. "has been prepared" becomes "has prepared."'
            sentenceZh: '现在完成时被动 → 现在完成时主动。"has been prepared"变为"has prepared"。'

    tips:
      - 'In FCE Part 4, the key word is often "by" or "was/were/been" — this signals a passive transformation.'
      - 'Keep the tense the same! If the original is past simple, the passive must also be past simple.'
      - 'Modal verbs in passive: can be done, should be finished, must be completed, might be seen.'
      - 'Drop "by + agent" when the agent is obvious, unknown, or unimportant (e.g., "by people", "by someone").'
      - 'Watch out for phrasal verbs: "They called off the match" → "The match was called off" (keep the particle!).'
    tipsZh:
      - '在 FCE Part 4 中，关键词常常是"by"或"was/were/been"——这提示需要被动转换。'
      - '保持时态一致！如果原句是一般过去时，被动句也必须是一般过去时。'
      - '情态动词被动：can be done, should be finished, must be completed, might be seen。'
      - '当施动者明显、未知或不重要时，省略"by + 施动者"（如"by people"、"by someone"）。'
      - '注意短语动词："They called off the match" → "The match was called off"（保留小品词！）。'

    practicePreview:
      - id: Q04-L01-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          A sky dragon carried the message across the kingdom.
          The message _____ across the kingdom by a sky dragon. (WAS)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          一只天龙把消息传遍了整个王国。
          消息 _____ 整个王国，由一只天龙传递。(WAS)
        answer: 'was carried'
        explanation: 'Active "carried" → Passive "was carried." The tense stays as past simple.'
        explanationZh: '主动"carried" → 被动"was carried"。时态保持为一般过去时。'

      - id: Q04-L01-P02
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The healer is preparing the healing potion right now.
          The healing potion _____ by the healer right now. (BEING)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          治愈师正在准备治疗药水。
          治疗药水 _____ 治愈师准备。(BEING)
        answer: 'is being prepared'
        explanation: 'Present continuous active → Present continuous passive: is + being + past participle.'
        explanationZh: '现在进行时主动 → 现在进行时被动：is + being + 过去分词。'

      - id: Q04-L01-P03
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          You must return all library spell books before Friday.
          All library spell books _____ before Friday. (RETURNED)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          你必须在周五前归还所有图书馆咒语书。
          所有图书馆咒语书 _____ 周五前。(RETURNED)
        answer: 'must be returned'
        explanation: 'Modal + active → Modal + be + past participle. "Must return" → "must be returned."'
        explanationZh: '情态动词 + 主动 → 情态动词 + be + 过去分词。"must return" → "must be returned"。'

  # ─────────────────────────────────────────────
  # Lesson 2: Direct ↔ Reported Speech — The Water Dragon's Mirror Pool
  # ─────────────────────────────────────────────
  - id: Q04-L02
    title: 'Direct ↔ Reported Speech — The Water Dragon''s Mirror Pool'
    titleZh: '直接引语 ↔ 间接引语 — 水龙的镜面池'

    introduction: |
      Professor Thornwing takes you to a still, silver pool deep within the Academy. A graceful
      water dragon named Ripple glides across the surface, creating perfect reflections.

      "See how the pool reflects everything?" says the Professor. "Reported speech works like
      a reflection. When someone says something directly — that's direct speech: 'I love flying.'
      When you REPORT what they said — that's reported speech: She said she loved flying."

      "The reflection is the same image, but it looks slightly different — the pronoun changes
      from 'I' to 'she', and the tense shifts back from 'love' to 'loved.' These shifts are the
      key to mastering reported speech."

      "Ripple will show you the patterns. In FCE Part 4, the key word is often SAID, TOLD,
      or ASKED. When you see these words, you know a reported speech transformation is needed."
    introductionZh: |
      Thornwing 教授带你来到学院深处一个平静的银色水池。一条优美的水龙名叫 Ripple
      在水面上滑行，创造出完美的倒影。

      "看到水池如何反映一切了吗？"教授说。"间接引语就像倒影。当某人直接说话时——
      那是直接引语：'I love flying.'（我喜欢飞行。）当你转述他们说的话时——那是间接引语：
      She said she loved flying.（她说她喜欢飞行。）"

      "倒影是同样的图像，但看起来略有不同——代词从'I'变成'she'，时态从'love'
      回退到'loved'。这些变化是掌握间接引语的关键。"

      "Ripple 会展示这些模式。在 FCE Part 4 中，关键词通常是 SAID、TOLD 或 ASKED。
      当你看到这些词时，你就知道需要进行间接引语转换。"

    rules:
      - pattern: 'Tense Shift in Reported Speech'
        meaning: 'When the reporting verb is in the past (said/told), tenses typically shift one step back'
        meaningZh: '当引述动词是过去时（said/told），时态通常向后退一步'
        examples:
          - base: '"I am learning Dragon Language," said Tom.'
            transformed: 'Tom said he was learning Dragon Language.'
            sentence: 'Present continuous "am learning" shifts to past continuous "was learning." "I" changes to "he."'
            sentenceZh: '现在进行时"am learning"变为过去进行时"was learning"。"I"变为"he"。'
          - base: '"I have finished my homework," she told me.'
            transformed: 'She told me she had finished her homework.'
            sentence: 'Present perfect "have finished" shifts to past perfect "had finished." Note: "told me" requires an object.'
            sentenceZh: '现在完成时"have finished"变为过去完成时"had finished"。注意："told me"需要宾语。'
          - base: '"I will fly tomorrow," the rider promised.'
            transformed: 'The rider promised he would fly the next day.'
            sentence: '"Will" shifts to "would." "Tomorrow" changes to "the next day." Time expressions shift too!'
            sentenceZh: '"will"变为"would"。"tomorrow"变为"the next day"。时间表达也要变！'

      - pattern: 'Reported Questions'
        meaning: 'Yes/No questions use "if/whether"; Wh-questions keep the question word but use statement word order'
        meaningZh: '是非问句使用"if/whether"；特殊疑问句保留疑问词但使用陈述语序'
        examples:
          - base: '"Are you coming to the dragon race?" she asked.'
            transformed: 'She asked if I was coming to the dragon race.'
            sentence: 'Yes/No question → "asked if/whether" + statement order. No question mark in reported speech.'
            sentenceZh: '是非问句 → "asked if/whether" + 陈述语序。间接引语中没有问号。'
          - base: '"Where did you find the egg?" he asked.'
            transformed: 'He asked where I had found the egg.'
            sentence: 'Wh-question: keep "where" + statement word order (subject before verb). "Did find" → "had found."'
            sentenceZh: '特殊疑问句：保留"where" + 陈述语序（主语在动词前）。"did find" → "had found"。'

    tips:
      - 'SAID vs TOLD: "said" can stand alone ("He said...") but "told" needs an object ("He told me...").'
      - 'Time/place shifts: today → that day, here → there, this → that, ago → before, last week → the previous week.'
      - 'Do NOT shift tenses if the statement is still true: "She said the earth is round" — still a fact!'
      - 'Commands in reported speech: "Close the door" → He told me to close the door. (told + object + to infinitive)'
      - 'In FCE, watch for the key word carefully — it tells you which direction to transform (direct → reported or reported → direct).'
    tipsZh:
      - 'SAID vs TOLD："said"可以独立使用（"He said..."），但"told"需要宾语（"He told me..."）。'
      - '时间/地点转换：today → that day, here → there, this → that, ago → before, last week → the previous week。'
      - '如果陈述仍然是事实，不要变换时态："She said the earth is round"——仍然是事实！'
      - '间接引语中的命令："Close the door" → He told me to close the door.（told + 宾语 + to 不定式）'
      - '在 FCE 中，仔细看关键词——它告诉你转换的方向（直接引语 → 间接引语还是反过来）。'

    practicePreview:
      - id: Q04-L02-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          "I can speak Dragon Language," said Maya.
          Maya said that _____ Dragon Language. (COULD)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          "我会说龙语，"Maya说。
          Maya说她 _____ 龙语。(COULD)
        answer: 'she could speak'
        explanation: '"Can" shifts to "could" in reported speech. "I" becomes "she."'
        explanationZh: '"can"在间接引语中变为"could"。"I"变为"she"。'

      - id: Q04-L02-P02
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          "Did you see the shadow dragon last night?" Tom asked me.
          Tom asked me _____ the shadow dragon the previous night. (HAD)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          "你昨晚看到影龙了吗？"Tom问我。
          Tom问我 _____ 前一天晚上的影龙。(HAD)
        answer: 'if I had seen'
        explanation: 'Yes/No question → "asked if" + statement order. "Did see" → "had seen." "Last night" → "the previous night."'
        explanationZh: '是非问句 → "asked if" + 陈述语序。"did see" → "had seen"。"last night" → "the previous night"。'

      - id: Q04-L02-P03
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The teacher told us to hand in our dragon reports.
          "_____ your dragon reports," the teacher said to us. (HAND)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          老师让我们交龙的报告。
          "_____ 你们的龙报告，"老师对我们说。(HAND)
        answer: 'Hand in'
        explanation: 'Reported command → Direct command. "Told us to hand in" → "Hand in" (imperative).'
        explanationZh: '间接命令 → 直接命令。"told us to hand in" → "Hand in"（祈使句）。'

  # ─────────────────────────────────────────────
  # Lesson 3: so...that / too...to / enough...to — The Earth Dragon's Cavern
  # ─────────────────────────────────────────────
  - id: Q04-L03
    title: 'so...that / too...to / enough...to — The Earth Dragon''s Cavern'
    titleZh: 'so...that / too...to / enough...to — 地龙的洞穴'

    introduction: |
      Deep underground, you enter the Earth Dragon's Cavern. A massive brown dragon called
      Boulder is arranging enormous rocks into different formations. Some rocks are stacked
      high, others are spread wide, and some block narrow passages.

      "Ah, visitors!" Boulder rumbles. "Let me teach you about SIZE and DEGREE. In English,
      there are three ways to talk about how much or how little something is:

      1. SO...THAT — 'The rock was so heavy THAT nobody could lift it.'
      2. TOO...TO — 'The rock was TOO heavy TO lift.'
      3. ENOUGH...TO — 'The rock was light ENOUGH TO carry.'

      These three patterns express the same idea in different ways — like arranging the same
      rocks in different formations. In FCE Part 4, you will often need to switch between them.
      The key word will tell you which pattern to use."
    introductionZh: |
      在地下深处，你进入了地龙的洞穴。一条巨大的棕色龙叫 Boulder，正在把巨石排列成
      不同的阵型。有些石头堆得很高，有些摊得很广，还有些挡住了狭窄的通道。

      "啊，来客了！"Boulder 隆隆地说。"让我教你们关于大小和程度。在英语中，有三种方式
      来谈论某件事情多或少：

      1. SO...THAT — 'The rock was so heavy THAT nobody could lift it.'（石头太重了以至于没人能举起来。）
      2. TOO...TO — 'The rock was TOO heavy TO lift.'（石头太重了，举不动。）
      3. ENOUGH...TO — 'The rock was light ENOUGH TO carry.'（石头够轻，可以搬。）

      这三种句型用不同的方式表达同样的意思——就像把同样的石头排成不同的阵型。
      在 FCE Part 4 中，你经常需要在它们之间切换。关键词会告诉你使用哪种句型。"

    rules:
      - pattern: 'so + adjective + that + clause'
        meaning: 'Expresses a degree that leads to a result'
        meaningZh: '表达导致某个结果的程度'
        examples:
          - base: 'The tunnel was too narrow to walk through.'
            transformed: 'The tunnel was so narrow that we could not walk through it.'
            sentence: '"Too narrow to walk through" = "so narrow that we could not walk through it." Note: add subject and object in the that-clause.'
            sentenceZh: '"too narrow to walk through" = "so narrow that we could not walk through it"。注意：that 从句中要加主语和宾语。'
          - base: 'The dragon was strong enough to carry five people.'
            transformed: 'The dragon was so strong that it could carry five people.'
            sentence: '"Enough to" (positive ability) → "so...that...could" (positive result). The meaning is the same.'
            sentenceZh: '"enough to"（积极能力）→ "so...that...could"（积极结果）。意思相同。'

      - pattern: 'too + adjective + to + verb'
        meaning: 'Something is excessively adjective, making the action impossible'
        meaningZh: '某事过于……，使动作不可能'
        examples:
          - base: 'The cave was so dark that we could not see anything.'
            transformed: 'The cave was too dark to see anything.'
            sentence: '"So dark that we could not see" → "too dark to see." The negative meaning is built into "too."'
            sentenceZh: '"so dark that we could not see" → "too dark to see"。否定意义已经包含在"too"中。'
          - base: 'She is not old enough to fly a dragon alone.'
            transformed: 'She is too young to fly a dragon alone.'
            sentence: '"Not old enough" = "too young." Flip the adjective to its opposite when switching patterns.'
            sentenceZh: '"not old enough" = "too young"。切换句型时将形容词换成反义词。'

      - pattern: 'adjective + enough + to + verb'
        meaning: 'Something has sufficient quality for the action to be possible'
        meaningZh: '某事具有足够的品质使动作成为可能'
        examples:
          - base: 'The potion was so warm that we could drink it immediately.'
            transformed: 'The potion was warm enough to drink immediately.'
            sentence: '"So warm that we could drink" → "warm enough to drink." Positive result = enough pattern.'
            sentenceZh: '"so warm that we could drink" → "warm enough to drink"。积极结果 = enough 句型。'
          - base: 'The dragon was too small to carry a rider.'
            transformed: 'The dragon was not big enough to carry a rider.'
            sentence: '"Too small to" = "not big enough to." Remember to flip the adjective AND add "not."'
            sentenceZh: '"too small to" = "not big enough to"。记得翻转形容词并加"not"。'

    tips:
      - 'TOO always implies a negative result (impossible). ENOUGH implies a positive result (possible).'
      - 'When converting "too...to" ↔ "enough...to", flip the adjective: too small = not big enough, too expensive = not cheap enough.'
      - 'When converting to "so...that", you must add a subject and a full clause: "so heavy THAT nobody could move it" (not just "so heavy that move").'
      - 'FCE key words: TOO, ENOUGH, SO, THAT — these signal which pattern to use.'
      - 'Common trap: "enough" comes AFTER the adjective ("old enough") but BEFORE a noun ("enough money").'
    tipsZh:
      - 'TOO 总是暗示否定结果（不可能）。ENOUGH 暗示积极结果（可能）。'
      - '在"too...to"和"enough...to"之间转换时，翻转形容词：too small = not big enough，too expensive = not cheap enough。'
      - '转换为"so...that"时，必须加主语和完整从句："so heavy THAT nobody could move it"（不只是"so heavy that move"）。'
      - 'FCE 关键词：TOO、ENOUGH、SO、THAT——这些提示使用哪种句型。'
      - '常见陷阱："enough"在形容词后面（"old enough"），但在名词前面（"enough money"）。'

    practicePreview:
      - id: Q04-L03-P01
        question: |
          Complete the second sentence so it means the same as the first, using the word given. Use 2-5 words including the word given.

          The dragon egg was too heavy for the child to carry.
          The dragon egg was _____ the child could not carry it. (SO)
        questionZh: |
          用所给单词完成第二个句子，使其与第一个句子意思相同。使用2-5个单词（包括所给单词）。

          龙蛋太重了，孩子搬不动。
          龙蛋 _____ 孩子搬不动它。(SO)
        answer: 'so heavy that'
        explanation: '"Too heavy to carry" → "so heavy that [someone] could not carry it." The result clause needs a subject and verb.'
        explanationZh: '"too heavy to carry" → "so heavy that [某人] could not carry it"。结果从句需要主语和动词。'

      - id: Q04-L03-P02
        question: |
