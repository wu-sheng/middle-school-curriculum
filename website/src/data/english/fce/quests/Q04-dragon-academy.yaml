          她还不够 _____ 进入龙学院。(ENOUGH)
        answer: 'old enough to'
        explanation: '"So young that she cannot" → "not old enough to." Flip "young" to "old" and add "not."'
        explanationZh: '"so young that she cannot" → "not old enough to"。"young"翻转为"old"并加"not"。'

