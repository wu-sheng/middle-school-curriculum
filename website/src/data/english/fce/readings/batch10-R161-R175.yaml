  - id: R170
    title: 'The Hidden World of Caves'
    titleZh: '洞穴的隐秘世界'
    level: 4
    wordCount: 390
    topic: environment
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about cave ecosystems and exploration'
    passage: |
      Deep beneath the surface of the Earth, in total darkness and silence, lies a world that few humans have ever seen. Caves are some of the most mysterious environments on our planet, home to extraordinary creatures and geological formations that have taken millions of years to develop.

      The most familiar cave formations are stalactites and stalagmites. Stalactites hang from the ceiling like stone icicles, formed drop by drop over thousands of years as mineral-rich water seeps through the rock above. Stalagmites grow upwards from the floor where the dripping water lands. When a stalactite and stalagmite meet, they form a column that can be several metres tall.

      Perhaps even more remarkable are the creatures that have adapted to live in complete darkness. Cave-dwelling species, known as troglobites, have evolved in extraordinary ways. Many have lost their eyes entirely, as sight is useless in the dark. Instead, they have developed enhanced senses of touch and smell to navigate their environment. Some cave fish have transparent skin, and certain cave insects have developed elongated legs and antennae to feel their way through the darkness.

      Caves also provide valuable scientific information. Like tree rings, the mineral layers in cave formations record climate conditions over thousands of years. Scientists have used cave data to reconstruct temperature and rainfall patterns going back hundreds of thousands of years — information that is essential for understanding how our climate is changing.

      Furthermore, caves have played a significant role in human history. Some of the world's oldest art — cave paintings in France and Spain dating back over 30,000 years — was created deep underground. These paintings of animals, handprints, and geometric shapes offer a window into the minds of our ancient ancestors.

      Today, caves face threats from pollution, tourism, and climate change. Even the presence of tourists can alter the delicate environment inside a cave — the heat from human bodies, the carbon dioxide from breathing, and artificial lighting can all damage formations and disturb cave ecosystems. Many famous caves now limit visitor numbers or have closed certain sections to protect them.

      The world beneath our feet remains largely unexplored. Scientists estimate that we have discovered less than half of the Earth's cave systems. Who knows what wonders still await in the darkness below?
    passageZh: |
      在地球表面之下深处，在完全的黑暗和寂静中，存在着一个很少有人见过的世界。洞穴是我们星球上最神秘的环境之一，是非凡生物和经过数百万年形成的地质构造的家园。

      最常见的洞穴形成物是钟乳石和石笋。钟乳石像石冰柱一样悬挂在天花板上，随着富含矿物质的水渗透上方的岩石，经过数千年一滴一滴形成。石笋从地面向上生长，在滴水着陆的地方。当钟乳石和石笋相遇时，它们形成一根可以有几米高的柱子。

      也许更值得注意的是适应在完全黑暗中生活的生物。被称为洞穴居民的洞穴栖息物种以非凡的方式进化。许多已经完全失去了眼睛，因为在黑暗中视觉是无用的。相反，它们发展了增强的触觉和嗅觉来导航环境。一些洞穴鱼有透明的皮肤，某些洞穴昆虫发展了细长的腿和触角来在黑暗中摸索。

      洞穴还提供了有价值的科学信息。像年轮一样，洞穴形成物中的矿物层记录了数千年的气候条件。科学家已经利用洞穴数据重建了追溯数十万年的温度和降雨模式——这些信息对于理解我们的气候如何变化至关重要。

      此外，洞穴在人类历史中扮演了重要角色。世界上一些最古老的艺术——法国和西班牙的洞穴壁画，可追溯到30000多年前——是在地下深处创作的。这些动物、手印和几何形状的画作提供了了解我们古代祖先心灵的窗口。

      今天，洞穴面临着污染、旅游和气候变化的威胁。即使是游客的存在也能改变洞穴内的微妙环境——人体的热量、呼吸产生的二氧化碳和人工照明都能破坏形成物和干扰洞穴生态系统。许多著名的洞穴现在限制游客人数或关闭了某些区域以保护它们。

      我们脚下的世界在很大程度上仍未被探索。科学家估计我们发现了不到地球洞穴系统的一半。谁知道在下面的黑暗中还有什么奇迹在等待？
