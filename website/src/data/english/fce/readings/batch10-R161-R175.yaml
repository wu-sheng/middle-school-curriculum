  - id: R173
    title: 'The Great Barrier Reef: A Fight for Survival'
    titleZh: '大堡礁：生存之战'
    level: 4
    wordCount: 400
    topic: environment
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about threats to the Great Barrier Reef'
    passage: |
      Stretching over 2,300 kilometres along the northeast coast of Australia, the Great Barrier Reef is the largest living structure on Earth — so vast that it is visible from space. Home to over 1,500 species of fish, 400 types of coral, and countless other marine organisms, it is one of the most biodiverse ecosystems in the world. Yet this natural wonder is fighting for its survival.

      The greatest threat to the reef is coral bleaching, caused by rising ocean temperatures. When water becomes too warm, corals expel the tiny algae that live inside them and provide their vibrant colours. Without these algae, the corals turn white and, if conditions do not improve, eventually die. Since 2016, the Great Barrier Reef has experienced four mass bleaching events — more than in the entire previous century.

      Ocean acidification poses an additional challenge. As the ocean absorbs increasing amounts of carbon dioxide from the atmosphere, the water becomes more acidic. This makes it harder for corals to build their calcium carbonate skeletons, weakening the very structure of the reef.

      Human activity adds further pressure. Agricultural runoff carries fertilisers and pesticides into the ocean, encouraging the growth of harmful algae that smother coral. Coastal development destroys the mangrove forests that filter sediment before it reaches the reef. And although commercial fishing is regulated, illegal fishing continues to damage certain areas.

      Conservation efforts are substantial. The Australian government has invested billions of dollars in reef protection, and scientists are developing innovative solutions such as breeding heat-resistant coral varieties and using underwater robots to plant coral larvae. Marine protected areas restrict harmful activities, and community education programmes raise awareness among tourists and locals.

      The future of the Great Barrier Reef ultimately depends on global action to reduce greenhouse gas emissions. Even the most effective local conservation measures cannot protect the reef if ocean temperatures continue to rise. As marine biologist David Attenborough has warned, the reef is a canary in the coal mine — its fate signals what the rest of the natural world can expect.

      Losing the Great Barrier Reef would not only be an ecological catastrophe but also an economic one. Reef tourism contributes approximately six billion dollars to the Australian economy annually and supports over 60,000 jobs.
    passageZh: |
      沿着澳大利亚东北海岸延伸超过2300公里，大堡礁是地球上最大的活结构——如此庞大以至于从太空都能看到。这里是超过1500种鱼类、400种珊瑚和无数其他海洋生物的家园，是世界上最具生物多样性的生态系统之一。然而，这个自然奇观正在为生存而战。

      对礁石最大的威胁是由海洋温度升高引起的珊瑚白化。当水变得太暖时，珊瑚会排出生活在其内部并提供鲜艳颜色的微小藻类。没有这些藻类，珊瑚变白，如果条件不改善，最终会死亡。自2016年以来，大堡礁已经经历了四次大规模白化事件——比之前整个世纪都多。

      海洋酸化构成了额外的挑战。随着海洋从大气中吸收越来越多的二氧化碳，水变得更酸。这使珊瑚更难建造它们的碳酸钙骨架，削弱了礁石的结构本身。

      人类活动增加了进一步的压力。农业径流将肥料和杀虫剂带入海洋，促进有害藻类的生长，这些藻类窒息珊瑚。沿海开发破坏了在沉积物到达礁石之前过滤它们的红树林。虽然商业捕鱼受到监管，但非法捕鱼继续损害某些地区。

      保护工作是大规模的。澳大利亚政府已投资数十亿美元用于礁石保护，科学家们正在开发创新解决方案，如培育耐热珊瑚品种和使用水下机器人种植珊瑚幼虫。海洋保护区限制有害活动，社区教育项目提高游客和当地人的意识。

      大堡礁的未来最终取决于全球减少温室气体排放的行动。即使最有效的当地保护措施也不能在海洋温度继续上升时保护礁石。正如海洋生物学家大卫·阿滕伯勒警告的，礁石是煤矿中的金丝雀——它的命运预示着自然界其他部分可以预期的未来。

      失去大堡礁不仅是一场生态灾难，也是经济灾难。礁石旅游每年为澳大利亚经济贡献约60亿美元，支持超过60000个工作岗位。
