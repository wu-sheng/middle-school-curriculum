  # R163 – The History of Board Games (Level 4, ~370 words)
  # ============================================================
  - id: R163
    title: 'The History of Board Games'
    titleZh: '桌游的历史'
    level: 4
    wordCount: 370
    topic: culture
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about the fascinating history of board games'
    passage: |
      Long before video games and smartphones, people entertained themselves with board games. Archaeological evidence suggests that board games are among the oldest forms of human entertainment, dating back at least 5,000 years. The Royal Game of Ur, discovered in a tomb in modern-day Iraq, is believed to be one of the earliest known examples.

      [1]

      In ancient Egypt, a game called Senet was so popular that boards have been found in the tombs of pharaohs, including Tutankhamun. Historians believe the Egyptians thought the game had a spiritual significance — winning at Senet was believed to bring good fortune in the afterlife. Meanwhile, in ancient China, the strategy game Go was being played as early as 2,500 years ago and remains one of the most complex games ever invented.

      [2]

      The modern board game industry began in the nineteenth century, when printing technology made it possible to produce games cheaply. Monopoly, one of the world's best-selling games, was first marketed in 1935 during the Great Depression. It is perhaps ironic that a game about making money became wildly popular at a time when millions of people had very little.

      [3]

      Today, board games are experiencing an unexpected revival. Despite the dominance of digital entertainment, sales of board games have been growing steadily for over a decade. Experts suggest several reasons for this trend. Board games bring people together face-to-face in an age when most social interaction happens through screens. They require no electricity, no internet connection, and no expensive equipment.

      Furthermore, modern board games have become increasingly sophisticated. Games like Settlers of Catan and Ticket to Ride combine strategy with storytelling in ways that appeal to both children and adults. Board game cafes, where customers can choose from hundreds of games while enjoying food and drinks, have opened in cities around the world.

      Perhaps what makes board games so enduring is their fundamental simplicity. At their core, they are about sitting around a table with people you enjoy spending time with, thinking, laughing, and having fun together. No technology can truly replace that experience.
    passageZh: |
      在电子游戏和智能手机出现很久之前，人们就通过桌游来娱乐自己。考古证据表明桌游是人类最古老的娱乐形式之一，至少可以追溯到5000年前。在现代伊拉克一座墓葬中发现的乌尔王室游戏被认为是已知最早的例子之一。

      [1]

      在古埃及，一种叫做塞尼特的游戏非常流行，以至于在法老的墓葬中都发现了游戏板，包括图坦卡蒙的墓葬。历史学家认为埃及人觉得这个游戏具有精神意义——在塞尼特中获胜被认为能在来世带来好运。与此同时，在古代中国，围棋早在2500年前就已被下，至今仍然是有史以来最复杂的游戏之一。

      [2]

      现代桌游产业始于19世纪，当时印刷技术使廉价生产游戏成为可能。大富翁（Monopoly），世界上最畅销的游戏之一，于1935年大萧条期间首次上市。一个关于赚钱的游戏在数百万人几乎一无所有的时候变得极其流行，这也许是讽刺的。

      [3]

      如今，桌游正在经历一场意想不到的复兴。尽管数字娱乐占主导地位，桌游的销售额已经稳步增长了十多年。专家提出了这一趋势的几个原因。在一个大多数社交互动通过屏幕进行的时代，桌游让人们面对面地聚在一起。它们不需要电力、不需要互联网连接，也不需要昂贵的设备。

      此外，现代桌游变得越来越复杂。像卡坦岛和车票之旅这样的游戏以吸引儿童和成人的方式将策略与故事结合起来。桌游咖啡馆——顾客可以在享用食物和饮料的同时从数百种游戏中选择——已经在世界各地的城市开设。

      也许使桌游如此持久的是它们根本的简单性。从本质上说，它们是关于和你喜欢共度时光的人坐在桌旁，一起思考、笑和玩乐。没有技术能真正替代这种体验。
