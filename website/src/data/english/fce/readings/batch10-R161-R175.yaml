    passage: |
      Most students know that sleep is important, but few realise just how essential it is for learning and memory. Research conducted over the past two decades has revealed that sleep is not simply a period of rest — it is an active process during which the brain consolidates memories, solves problems, and prepares for the next day's learning.

      [1]

      During sleep, the brain cycles through several stages, each with a specific function. In the deep sleep stages, the brain replays and strengthens the neural pathways formed during the day. This means that the vocabulary words you studied before bed are literally being reinforced while you sleep. Scientists have shown that students who sleep well after studying remember significantly more than those who stay awake.

      [2]

      The rapid eye movement (REM) stage of sleep, during which most dreaming occurs, appears to play a particularly important role in creative thinking and problem-solving. A famous study found that people were 33 per cent more likely to solve a difficult puzzle after a period of REM sleep than after the same amount of time spent awake. This may explain why some of history's greatest ideas came to people in their dreams.

      [3]

      Unfortunately, teenagers are among the most sleep-deprived groups in society. The combination of early school start times, homework, and screen use means that many teenagers get far less than the recommended eight to ten hours per night. The consequences for learning are significant: studies show that sleep-deprived students perform worse in exams, have poorer concentration, and are more likely to experience anxiety.

      What can students do to improve their sleep? Experts recommend establishing a regular bedtime routine, avoiding screens for at least an hour before bed, and keeping the bedroom cool and dark. Exercise during the day helps, but intense exercise too close to bedtime can actually make it harder to fall asleep.

      The message from sleep science is clear: if you want to perform your best in an exam, getting enough sleep is just as important as revising the material. In fact, a good night's sleep may be the most effective study technique of all.
    passageZh: |
      大多数学生知道睡眠很重要，但很少有人意识到它对学习和记忆究竟有多重要。过去二十年的研究揭示，睡眠不仅仅是一段休息时间——它是大脑巩固记忆、解决问题和为第二天的学习做准备的积极过程。

      [1]

