  # R161 – The Rise of Electric Cars (Level 4, ~380 words)
  # ============================================================
  - id: R161
    title: 'The Rise of Electric Cars'
    titleZh: '电动汽车的崛起'
    level: 4
    wordCount: 380
    topic: technology
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about the growth of electric vehicles'
    passage: |
      For over a century, petrol and diesel engines have dominated the world's roads. However, a significant transformation is now taking place. Electric vehicles, or EVs, are rapidly becoming a viable alternative to traditional cars, and some experts predict that by 2040, the majority of new cars sold will be electric.

      [1]

      The technology behind electric cars has improved dramatically in the last decade. Early EVs could only travel about 100 kilometres on a single charge, which made them impractical for long journeys. Modern electric cars, however, can travel over 500 kilometres before needing to be recharged. Furthermore, charging stations are being installed at an increasing rate across Europe, Asia, and North America, making it easier than ever to own an EV.

      [2]

      One of the main advantages of electric cars is their environmental impact — or rather, their lack of it. Unlike petrol cars, EVs produce zero emissions while driving. This is particularly significant in cities, where air pollution from vehicles contributes to serious health problems. Studies indicate that switching to electric transport could reduce urban air pollution by up to 40 per cent.

      [3]

      Nevertheless, electric cars are not without their challenges. The batteries required to power them contain rare minerals such as lithium and cobalt, which must be mined from the earth. This mining process can itself cause environmental damage. Additionally, if the electricity used to charge EVs comes from coal-fired power stations, the overall carbon benefit is reduced.

      Despite these concerns, the trend towards electric vehicles appears to be irreversible. Governments around the world are offering financial incentives to encourage people to switch, and several countries have announced plans to ban the sale of new petrol and diesel cars within the next two decades. The automotive industry is investing billions in developing better batteries, and each year brings new innovations.

      The question is no longer whether electric cars will replace petrol vehicles, but how quickly this transition will happen. For the planet's sake, many scientists argue that it cannot happen fast enough.
    passageZh: |
      一个多世纪以来，汽油和柴油发动机主导着世界的道路。然而，一场重大转变正在发生。电动汽车（EV）正迅速成为传统汽车的可行替代品，一些专家预测到2040年，销售的大多数新车将是电动的。

      [1]

      在过去十年中，电动汽车背后的技术有了显著改善。早期的电动汽车单次充电只能行驶约100公里，这使得长途旅行不切实际。然而，现代电动汽车在需要充电之前可以行驶超过500公里。此外，充电站正在欧洲、亚洲和北美以越来越快的速度安装，使拥有电动汽车比以往更容易。

      [2]

      电动汽车的主要优势之一是它们的环境影响——或者说，缺乏环境影响。与汽油车不同，电动汽车在行驶时零排放。这在城市中特别重要，那里的车辆空气污染导致严重的健康问题。研究表明，转向电动交通可以将城市空气污染减少多达40%。

      [3]

      然而，电动汽车并非没有挑战。为它们提供动力的电池含有锂和钴等稀有矿物，必须从地球上开采。这种开采过程本身可能造成环境损害。此外，如果用于给电动汽车充电的电力来自燃煤电站，整体碳效益就会降低。

      尽管有这些担忧，电动汽车的趋势似乎不可逆转。世界各国政府正在提供财政激励来鼓励人们转换，几个国家已经宣布计划在未来二十年内禁止销售新的汽油和柴油汽车。汽车行业正在投资数十亿开发更好的电池，每年都带来新的创新。

      问题不再是电动汽车是否会取代汽油车，而是这种转变会多快发生。为了地球的利益，许多科学家认为它不可能发生得太快。
