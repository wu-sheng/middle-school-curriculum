  - id: R169
    title: 'Why Do We Forget?'
    titleZh: '为什么我们会遗忘？'
    level: 4
    wordCount: 400
    topic: science
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about the science of forgetting and memory'
    passage: |
      Within one hour of learning something new, you will have forgotten approximately 50 per cent of it. Within 24 hours, you will have forgotten around 70 per cent. After a week, the figure rises to nearly 90 per cent. This alarming pattern, first described by German psychologist Hermann Ebbinghaus in 1885, is known as the "forgetting curve."

      Understanding why we forget is crucial for effective exam preparation. The brain does not store memories like a computer stores files. Instead, memories are formed through connections between neurons — brain cells that communicate through electrical and chemical signals. When you learn something new, these connections are initially weak and fragile. Without reinforcement, they gradually fade.

      The good news is that each time you review information, the neural connections become stronger and more durable. The key insight from memory science is that the most effective time to review is just before you are about to forget. This principle forms the basis of "spaced repetition" — a learning technique where you review material at gradually increasing intervals.

      For vocabulary learning, spaced repetition is particularly effective. If you learn a new word today, you should review it tomorrow, then three days later, then a week later, then two weeks later. Each successful review pushes the memory further into long-term storage. This is far more efficient than cramming — studying the same word twenty times in one evening and then never looking at it again.

      Another factor that affects memory is the way information is encoded in the first place. Simply reading a word and its definition is what psychologists call "shallow processing." If you use the word in a sentence, connect it to a personal experience, or visualise an image related to it, you engage in "deep processing," which creates stronger, longer-lasting memories.

      The message for FCE candidates is encouraging: you do not need a perfect memory to succeed. You need a systematic approach to reviewing material and a willingness to engage deeply with new words and structures rather than passively reading them. The forgetting curve is real, but with the right strategies, it can be overcome.
    passageZh: |
      在学习新东西的一小时内，你将忘记大约50%。在24小时内，你将忘记大约70%。一周后，这个数字上升到近90%。这种令人震惊的模式由德国心理学家赫尔曼·艾宾浩斯于1885年首次描述，被称为"遗忘曲线"。

      理解为什么我们会遗忘对有效的备考至关重要。大脑不像计算机存储文件那样存储记忆。相反，记忆是通过神经元之间的连接形成的——神经元是通过电信号和化学信号进行通信的大脑细胞。当你学习新东西时，这些连接最初是脆弱的。没有强化，它们会逐渐消退。

      好消息是每次复习信息时，神经连接变得更强更持久。记忆科学的关键洞见是，最有效的复习时间是在你即将遗忘之前。这一原则构成了"间隔重复"的基础——一种以逐渐增加的间隔复习材料的学习技巧。

      对于词汇学习，间隔重复特别有效。如果你今天学了一个新词，你应该明天复习，然后三天后，然后一周后，然后两周后。每次成功的复习都会将记忆推入长期存储。这比死记硬背要高效得多——在一个晚上学同一个词二十次然后再也不看它。

      影响记忆的另一个因素是信息最初编码的方式。仅仅阅读一个词和它的定义是心理学家所说的"浅层处理"。如果你在句子中使用这个词，将它与个人经历联系起来，或可视化与之相关的图像，你就进行了"深层处理"，这创造了更强、更持久的记忆。

      给FCE考生的信息是令人鼓舞的：你不需要完美的记忆力才能成功。你需要一个系统的复习方法，以及愿意深入参与新词汇和结构而不是被动阅读它们。遗忘曲线是真实的，但用正确的策略，它可以被克服。
