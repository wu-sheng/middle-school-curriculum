  # ============================================================
  # R167 – The Power of Mistakes (Level 4, ~380 words)
  # ============================================================
  - id: R167
    title: 'The Power of Mistakes'
    titleZh: '错误的力量'
    level: 4
    wordCount: 380
    topic: science
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about growth mindset and learning from errors'
    passage: |
      Most students dread making mistakes. A wrong answer on a test, a spelling error in an essay, or a grammar slip in conversation can feel embarrassing and discouraging. However, a growing body of scientific research suggests that mistakes are not just unavoidable — they are actually essential for learning.

      Neuroscientists have discovered that the brain responds to errors in a surprisingly productive way. When you make a mistake, your brain generates a specific electrical signal called an error-related negativity, or ERN. This signal triggers increased attention and deeper processing of the information. In other words, your brain works harder when you get something wrong than when you get it right.

      A landmark study at Michigan State University divided students into two groups based on their attitudes towards mistakes. The "growth mindset" group believed that intelligence could be developed through effort, while the "fixed mindset" group believed intelligence was a permanent trait. When both groups were given a challenging test, the growth mindset students showed stronger ERN signals after making mistakes — their brains were actively learning from the errors. The fixed mindset students, however, showed weaker responses, suggesting their brains were essentially ignoring the mistakes.

      The implications for exam preparation are significant. Students who review their errors carefully — understanding not just what the correct answer is, but why they got it wrong — learn more effectively than those who simply move on. Error analysis, where you categorise and study your mistakes, is one of the most powerful learning strategies available.

      This principle applies across all areas of the FCE exam. In Use of English, analysing why you chose the wrong word helps you recognise patterns and avoid similar mistakes in future. In writing, understanding examiner feedback on grammar errors leads to more accurate essays next time. In reading, working out why you misunderstood a passage improves your comprehension skills.

      The next time you make a mistake, try not to feel frustrated. Instead, think of it as your brain receiving a valuable upgrade. Every error is a lesson in disguise — and the students who learn from their mistakes are the ones who ultimately succeed.
    passageZh: |
      大多数学生害怕犯错。测试中的一个错误答案、作文中的一个拼写错误，或对话中的一个语法失误都会让人感到尴尬和沮丧。然而，越来越多的科学研究表明，错误不仅仅是不可避免的——它们实际上对学习至关重要。

      神经科学家发现大脑以一种令人惊讶的有成效方式应对错误。当你犯错时，你的大脑会产生一种叫做错误相关负波（ERN）的特定电信号。这个信号触发了对信息的更多关注和更深层处理。换句话说，当你做错时，你的大脑比做对时工作更努力。

      密歇根州立大学的一项里程碑式研究根据学生对错误的态度将他们分为两组。"成长型思维"组相信智力可以通过努力发展，而"固定型思维"组相信智力是永久的特质。当两组都接受一项具有挑战性的测试时，成长型思维的学生在犯错后显示出更强的ERN信号——他们的大脑正在积极从错误中学习。而固定型思维的学生显示出较弱的反应，表明他们的大脑基本上忽略了错误。

      这对考试准备的意义是显著的。仔细审查错误的学生——不仅理解正确答案是什么，还理解为什么做错了——比那些简单跳过的学生学得更有效。错误分析，即分类和研究你的错误，是最有力的学习策略之一。

      这一原则适用于FCE考试的所有方面。在语言运用中，分析为什么选错了词帮助你识别模式并在将来避免类似错误。在写作中，理解考官对语法错误的反馈使下次的作文更准确。在阅读中，弄清楚为什么误解了文章能提高你的理解能力。

      下次犯错时，尽量不要感到沮丧。相反，把它想成你的大脑正在接受宝贵的升级。每个错误都是伪装的课程——而那些从错误中学习的学生最终会成功。
