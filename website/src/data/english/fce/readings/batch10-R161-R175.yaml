  # ============================================================
  # R164 – How Languages Die (Level 4, ~410 words)
  # ============================================================
  - id: R164
    title: 'How Languages Die'
    titleZh: '语言如何消亡'
    level: 4
    wordCount: 410
    topic: culture
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about endangered languages'
    passage: |
      There are currently approximately 7,000 languages spoken around the world. By the end of this century, linguists predict that nearly half of them will have disappeared. A language dies when its last native speaker passes away, and this is happening at an alarming rate — roughly one language is lost every two weeks.

      [1]

      The process of language death typically follows a predictable pattern. First, a dominant language — often English, Spanish, Mandarin, or another major world language — becomes associated with economic opportunity and social status. Parents begin to speak this dominant language to their children, believing it will give them better prospects. The children grow up bilingual but gradually use their ancestral language less and less.

      [2]

      Within two or three generations, the original language may only be spoken by elderly members of the community. When they die, the language dies with them. This is not merely a cultural loss — each language represents a unique way of understanding and describing the world. Languages contain knowledge about local plants, animals, weather patterns, and medicinal remedies that may not exist in any other form.

      [3]

      Efforts to save endangered languages are increasing. In New Zealand, the Maori language has been revived through immersion schools where children learn entirely in Maori. Wales has successfully promoted the Welsh language through bilingual education and Welsh-language television. In Australia, indigenous communities are using technology to record and teach their languages before the last speakers are gone.

      Nevertheless, linguists acknowledge that it is impossible to save every endangered language. The key, they argue, is to document as many as possible — recording vocabulary, grammar, stories, and songs — so that even if a language ceases to be spoken, its knowledge is preserved for future generations.

      The death of a language is not simply a matter of people choosing to speak something else. It is the disappearance of an entire world view — a unique lens through which humanity has understood the universe. Every language lost represents a library burning down, its books never to be read again.
    passageZh: |
      目前世界上大约有7000种语言。到本世纪末，语言学家预测其中近一半将消失。当一种语言的最后一位母语使用者去世时，这种语言就死了，而这正以惊人的速度发生——大约每两周就有一种语言消失。

      [1]

      语言消亡的过程通常遵循可预测的模式。首先，一种主导语言——通常是英语、西班牙语、普通话或其他主要世界语言——与经济机会和社会地位联系在一起。父母开始对孩子说这种主导语言，相信这会给他们更好的前景。孩子们长大后会说两种语言，但逐渐越来越少地使用他们的祖先语言。

      [2]

      在两三代人之内，原始语言可能只有社区的年长成员才说。当他们去世时，语言也随之消亡。这不仅仅是文化损失——每种语言代表着理解和描述世界的独特方式。语言包含着关于当地植物、动物、天气模式和药用配方的知识，这些知识可能不以任何其他形式存在。

      [3]

      拯救濒危语言的努力正在增加。在新西兰，毛利语通过全浸入式学校得到了复兴，孩子们完全用毛利语学习。威尔士通过双语教育和威尔士语电视节目成功推广了威尔士语。在澳大利亚，原住民社区正在使用技术录制和教授他们的语言，趁最后的使用者还在。

      然而，语言学家承认，拯救每一种濒危语言是不可能的。他们认为，关键是尽可能多地记录——记录词汇、语法、故事和歌曲——这样即使一种语言不再被使用，它的知识也为后代保存下来。

      一种语言的消亡不仅仅是人们选择说其他语言的问题。它是整个世界观的消失——人类理解宇宙的独特镜头。每一种消失的语言都代表着一座图书馆被烧毁，它的书再也不能被阅读。
