    passage: |
      High in the White Mountains of California, far from any road or trail, stands a bristlecone pine tree named Methuselah. At over 4,850 years old, it is one of the oldest known living organisms on Earth. When this tree was a sapling, the pyramids of Egypt had not yet been built.

      [1]

      Bristlecone pines survive in conditions that would kill most other trees. They grow at altitudes above 3,000 metres where the soil is thin, the air is dry, and winter temperatures plunge far below freezing. Paradoxically, it is precisely these harsh conditions that help them live so long. Growing slowly in poor soil means they develop extremely dense wood that is highly resistant to insects, fungi, and rot.

      [2]

      Scientists study ancient trees for several important reasons. Tree rings — the concentric circles visible when a tree is cut — provide a precise record of climate conditions going back thousands of years. Each ring represents one year of growth: wide rings indicate favourable conditions with plenty of rain, while narrow rings reveal years of drought or extreme cold.

      [3]

      By studying bristlecone pine rings, researchers have been able to reconstruct a detailed climate history of the region stretching back over 9,000 years. This data has proven invaluable for understanding long-term climate patterns and predicting future changes. Furthermore, the chemical composition of each ring can reveal information about volcanic eruptions, forest fires, and even the levels of carbon dioxide in the ancient atmosphere.

      Sadly, many ancient trees face threats from climate change, logging, and disease. Conservation organisations are working to protect these irreplaceable living records. The exact location of Methuselah, for instance, is kept secret to prevent vandalism.

      These ancient trees remind us that the natural world operates on timescales far beyond our own brief lives. A single bristlecone pine has witnessed the rise and fall of civilisations, survived ice ages and droughts, and continues to grow, one tiny ring at a time.
    passageZh: |
      在加利福尼亚白山高处，远离任何道路或小径，矗立着一棵名叫玛土撒拉的刺果松。它有超过4850年的历史，是地球上已知最古老的活有机体之一。当这棵树还是幼苗时，埃及的金字塔还没有建造。

      [1]

      刺果松在大多数其他树木会死亡的条件下存活。它们生长在海拔3000米以上的地方，那里土壤稀薄、空气干燥、冬季气温远低于零度。矛盾的是，正是这些严酷的条件帮助它们活得如此之长。在贫瘠的土壤中缓慢生长意味着它们发展出极其致密的木材，对昆虫、真菌和腐烂具有高度抵抗力。

      [2]

      科学家研究古树有几个重要原因。年轮——当树被砍伐时可见的同心圆——提供了追溯数千年的气候条件的精确记录。每个环代表一年的生长：宽环表示有利条件和充足的雨水，而窄环揭示了干旱或极端寒冷的年份。

      [3]

      通过研究刺果松的年轮，研究人员已经能够重建追溯9000多年的该地区详细气候历史。这些数据对理解长期气候模式和预测未来变化非常宝贵。此外，每个环的化学成分可以揭示关于火山喷发、森林火灾，甚至古代大气中二氧化碳水平的信息。

      遗憾的是，许多古树面临气候变化、伐木和疾病的威胁。保护组织正在努力保护这些不可替代的活记录。例如，玛土撒拉的确切位置是保密的，以防止破坏行为。

      这些古树提醒我们，自然界在远超我们短暂生命的时间尺度上运作。一棵刺果松见证了文明的兴衰，经历了冰河时期和干旱，并继续生长，一次一个微小的年轮。
