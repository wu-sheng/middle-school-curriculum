  - id: R175
    title: 'The Invention of Writing'
    titleZh: '文字的发明'
    level: 4
    wordCount: 390
    topic: history
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about the history and significance of writing'
    passage: |
      Of all the inventions in human history, writing may be the most transformative. Before writing existed, knowledge could only be passed from one generation to the next through spoken word. Memories faded, stories changed with each retelling, and complex information could easily be lost. The invention of writing changed everything.

      The earliest known writing system, cuneiform, developed in Mesopotamia around 3,400 BCE. Initially, it was used for a surprisingly practical purpose — keeping records of grain and livestock. Traders needed a reliable way to track what they owned and what they owed. Over time, however, this simple accounting system evolved into something far more powerful: a tool for recording history, laws, literature, and scientific knowledge.

      Around the same time, the ancient Egyptians developed hieroglyphics — a beautiful but complex system using pictures and symbols. Unlike cuneiform, hieroglyphics were used extensively for religious texts and monumental inscriptions. The ability to write was restricted to a small class of highly trained scribes, making literacy a mark of power and status.

      The development of alphabets revolutionised writing by dramatically reducing the number of symbols needed. The Phoenician alphabet, created around 1,050 BCE, used just 22 letters to represent all the sounds of their language. This simplicity made writing much easier to learn, and the Phoenician system became the ancestor of almost every alphabet used in the world today, including Greek, Latin, Arabic, and Hebrew.

      The invention of the printing press by Johannes Gutenberg in around 1440 was the next great leap. Before printing, every book had to be copied by hand — a process that could take months. Gutenberg's press made books affordable and widely available for the first time, leading to an explosion of literacy, education, and the spread of ideas across Europe.

      Today, we are living through another revolution in writing — the digital age. More text is produced in a single day on the internet than was written in the entire first millennium. Yet the fundamental purpose of writing remains unchanged: to preserve human knowledge and allow ideas to travel across time and space.
    passageZh: |
      在人类历史上所有的发明中，文字可能是最具变革性的。在文字存在之前，知识只能通过口头语言从一代传给下一代。记忆会消退，故事每次重述都会改变，复杂的信息很容易丢失。文字的发明改变了一切。

      最早已知的书写系统，楔形文字，大约在公元前3400年在美索不达米亚发展起来。最初，它被用于一个令人惊讶的实际目的——记录谷物和牲畜。商人需要一种可靠的方式来追踪他们拥有什么和欠什么。然而，随着时间推移，这种简单的会计系统演变成了更强大的东西：一种记录历史、法律、文学和科学知识的工具。

      大约在同一时间，古埃及人发展了象形文字——一种美丽但复杂的使用图片和符号的系统。与楔形文字不同，象形文字被广泛用于宗教文本和纪念碑铭文。写作能力仅限于一小类经过高度训练的抄写员，使识字成为权力和地位的标志。

      字母表的发展通过大幅减少所需的符号数量革命性地改变了书写。腓尼基字母表，大约在公元前1050年创建，只用22个字母来表示他们语言的所有声音。这种简洁使写作更容易学习，腓尼基系统成为今天世界上使用的几乎所有字母表的祖先，包括希腊语、拉丁语、阿拉伯语和希伯来语。

      约翰内斯·古腾堡在大约1440年发明的印刷机是下一个伟大的飞跃。在印刷之前，每本书都必须手工抄写——这个过程可能需要数月。古腾堡的印刷机首次使书籍变得便宜且广泛可得，导致了识字率、教育和思想在欧洲传播的爆炸式增长。

      今天，我们正在经历另一场写作革命——数字时代。互联网上一天产生的文本比整个第一千年写的都多。然而，写作的基本目的保持不变：保存人类知识并允许思想跨越时间和空间旅行。
