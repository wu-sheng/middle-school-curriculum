    passage: |
      In the clear blue waters off the coast of Cancun, Mexico, something extraordinary lies beneath the surface. Over 500 life-sized sculptures rest on the seabed, forming the world's largest underwater museum — MUSA, the Museo Subacuatico de Arte. Visitors must either dive or take a glass-bottomed boat to see this remarkable collection.

      The museum was created by British sculptor Jason deCaires Taylor in 2009. His original intention was not merely to create art — it was to save a dying coral reef. The nearby Mesoamerican Reef, the second-largest reef system in the world, was being damaged by millions of tourists who visited each year. The underwater museum was designed to draw visitors away from the fragile reef and towards a new artificial attraction.

      The sculptures themselves are made from a special pH-neutral cement that encourages coral and marine life to grow on their surfaces. Over time, the grey statues become colourful living structures covered in coral, sponges, and algae. Fish make their homes in the hollows, and rays and turtles swim among the figures. In this way, the art does not just occupy space on the seabed — it actively creates new habitat for marine creatures.

      The project has been remarkably successful. Since MUSA opened, tourism to the natural reef has decreased by approximately 30 per cent, giving it time to recover. Meanwhile, the artificial reef created by the sculptures has developed its own thriving ecosystem. Scientists studying the site have recorded over 200 species of fish and coral living on and around the statues.

      Taylor has since created similar underwater museums in the Bahamas, the Canary Islands, and Australia's Great Barrier Reef. Each installation is designed to address a specific local environmental issue while creating a unique artistic experience.

      The concept of underwater museums illustrates an important principle: art and science do not have to be separate. When creativity and environmental awareness work together, the results can be both beautiful and beneficial. As Taylor himself has said: "The ocean does not need us. We need the ocean. These sculptures are a reminder of that."
    passageZh: |
      在墨西哥坎昆海岸清澈的蓝色水域中，水面之下有着非凡的东西。超过500座真人大小的雕塑安放在海底，构成了世界上最大的水下博物馆——MUSA，即水下艺术博物馆。游客必须潜水或乘坐玻璃底船才能看到这个非凡的收藏。

      该博物馆由英国雕塑家Jason deCaires Taylor于2009年创建。他最初的意图不仅仅是创造艺术——而是拯救一个正在死去的珊瑚礁。附近的中美洲礁石，世界第二大礁石系统，正被每年数百万游客所损害。水下博物馆旨在将游客从脆弱的礁石引向一个新的人工景点。

      雕塑本身由一种特殊的pH中性水泥制成，鼓励珊瑚和海洋生物在其表面生长。随着时间推移，灰色的雕像变成了被珊瑚、海绵和藻类覆盖的色彩缤纷的活结构。鱼在空洞中安家，鳐鱼和海龟在人物之间游泳。这样，艺术不只是占据海底空间——它积极地为海洋生物创造新的栖息地。

      这个项目非常成功。自MUSA开放以来，到自然礁石的旅游减少了约30%，给了它恢复的时间。与此同时，雕塑创造的人工礁石发展了自己繁荣的生态系统。研究该地点的科学家记录了超过200种鱼类和珊瑚在雕像上和周围生活。

      Taylor后来在巴哈马、加那利群岛和澳大利亚大堡礁创建了类似的水下博物馆。每个装置都旨在解决特定的当地环境问题，同时创造独特的艺术体验。

      水下博物馆的概念说明了一个重要原则：艺术和科学不必是分开的。当创造力和环保意识结合在一起时，结果可以既美丽又有益。正如Taylor本人所说："海洋不需要我们。我们需要海洋。这些雕塑是对此的提醒。"
