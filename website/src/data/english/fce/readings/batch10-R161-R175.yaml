  # R162 – The Secret Life of Soil (Level 4, ~400 words)
  # ============================================================
  - id: R162
    title: 'The Secret Life of Soil'
    titleZh: '土壤的秘密生命'
    level: 4
    wordCount: 400
    topic: science
    tags: [Q11, month-11]
    source:
      type: 'original'
      note: 'Original passage about the hidden ecosystem in soil'
    passage: |
      Beneath our feet lies one of the most complex ecosystems on Earth, yet most people walk over it every day without giving it a second thought. A single teaspoon of healthy soil contains more living organisms than there are people on the entire planet — approximately eight billion bacteria, along with thousands of species of fungi, protozoa, and tiny invertebrates.

      [1]

      Soil is far more than just dirt. It is a living, breathing system that performs several functions essential to life on Earth. First and foremost, soil provides the nutrients that plants need to grow. Without soil, there would be no crops, no forests, and no grasslands. Consequently, every animal that depends on plants for food — including humans — ultimately depends on soil.

      [2]

      Furthermore, soil plays a crucial role in regulating the Earth's climate. Healthy soil stores enormous quantities of carbon — more than all the world's forests combined. When soil is damaged by intensive farming or deforestation, this carbon is released into the atmosphere as carbon dioxide, contributing to global warming. Scientists estimate that protecting and restoring soil could reduce global greenhouse gas emissions by up to 25 per cent.

      [3]

      Despite its importance, soil is under serious threat. The United Nations has warned that one-third of the world's topsoil has already been degraded. It takes nature approximately 500 years to produce just two centimetres of topsoil, yet poor farming practices can destroy it in a matter of decades. Erosion, pollution, and the overuse of chemical fertilisers are all contributing to this crisis.

      There is, however, growing awareness of the problem. Farmers around the world are adopting regenerative agriculture techniques, such as crop rotation, composting, and reduced tillage, which help to rebuild soil health. Schools and universities are including soil science in their curricula for the first time.

      Perhaps the most important step is simply to change how we think about soil. It is not an inexhaustible resource to be exploited — it is a living ecosystem that needs protection. As one scientist put it: "We are standing on the solution to many of the world's biggest problems. We just need to look down."
    passageZh: |
      在我们脚下存在着地球上最复杂的生态系统之一，但大多数人每天走过它却没有给予它第二个想法。一茶匙健康的土壤含有的活的有机体比整个星球上的人口还多——大约八十亿细菌，以及数千种真菌、原生动物和微小的无脊椎动物。

      [1]

      土壤远不只是泥土。它是一个活的、会呼吸的系统，执行着对地球上的生命至关重要的几项功能。首先，土壤提供植物生长所需的养分。没有土壤，就不会有庄稼、森林和草原。因此，每种依赖植物作为食物的动物——包括人类——最终都依赖土壤。

      [2]

      此外，土壤在调节地球气候方面发挥着至关重要的作用。健康的土壤储存着大量的碳——比世界上所有的森林加在一起还多。当土壤因集约化农业或森林砍伐而受损时，这些碳以二氧化碳的形式释放到大气中，导致全球变暖。科学家估计，保护和恢复土壤可以减少全球温室气体排放高达25%。

      [3]

      尽管土壤很重要，但它正面临严重威胁。联合国警告说，世界上三分之一的表土已经退化。大自然大约需要500年才能产生仅仅两厘米的表土，但不良的耕作方式可以在几十年内将其摧毁。侵蚀、污染和化肥的过度使用都在加剧这一危机。

      然而，人们对这个问题的意识正在增长。世界各地的农民正在采用再生农业技术，如轮作、堆肥和减少耕作，这有助于重建土壤健康。学校和大学首次将土壤科学纳入课程。

      也许最重要的一步是简单地改变我们对土壤的看法。它不是一种可以利用的取之不尽的资源——它是一个需要保护的活的生态系统。正如一位科学家所说："我们正站在世界上许多最大问题的解决方案上。我们只需要向下看。"
