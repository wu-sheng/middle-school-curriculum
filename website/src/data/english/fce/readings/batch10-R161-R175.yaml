      [2]

      快速眼动（REM）睡眠阶段，大部分做梦发生在此期间，似乎在创造性思维和问题解决中发挥着特别重要的作用。一项著名的研究发现，人们经过一段REM睡眠后解决困难谜题的可能性比清醒相同时间后高33%。这也许解释了为什么历史上一些最伟大的想法是人们在梦中想到的。

      [3]

      不幸的是，青少年是社会中最缺乏睡眠的群体之一。早期的上学时间、家庭作业和屏幕使用的结合意味着许多青少年每晚远远不到推荐的八到十小时。对学习的后果是显著的：研究表明，睡眠不足的学生在考试中表现更差，注意力更差，更有可能感到焦虑。

