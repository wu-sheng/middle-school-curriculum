    source:
      type: 'original'
      note: 'Original passage about how colours affect emotions and behaviour'
    passage: |
      Why do fast-food restaurants often use red and yellow in their branding? Why are hospitals painted in calming shades of blue and green? The answer lies in colour psychology — the study of how colours influence human emotions and behaviour.

      Research has shown that colours can have a measurable effect on our mood, concentration, and even physical responses. Red, for instance, has been found to increase heart rate and create a sense of urgency, which is why it is commonly used in sale signs and warning labels. Blue, on the other hand, has a calming effect that can lower blood pressure and reduce anxiety.

      In education, colour psychology has practical applications. Studies suggest that writing notes in blue ink can improve memory retention, while reading text highlighted in yellow makes key information easier to recall. Some research even indicates that the colour of a room can affect exam performance — students in blue rooms tend to be more creative, while those in red rooms show better attention to detail.

      Companies spend millions on choosing the right colours for their brands. Green is associated with nature and health, which is why it is favoured by organic food companies and environmental organisations. Purple suggests luxury and creativity, making it popular with premium beauty brands. Orange conveys energy and enthusiasm, often appearing in children's products and sports brands.

      However, it is important to note that colour associations are not universal. While white represents purity and cleanliness in Western cultures, it is associated with mourning in many Asian cultures. Red symbolises danger in some countries but luck and prosperity in China. Cultural context significantly influences how people perceive and respond to colours.

      Understanding colour psychology can be surprisingly useful in everyday life. Choosing the right colours for your study space, your presentation slides, or even your exam-day outfit might give you a small but meaningful advantage. The world is full of colour — and it is influencing you more than you probably realise.
    passageZh: |
      为什么快餐店经常在品牌中使用红色和黄色？为什么医院被涂成令人平静的蓝色和绿色？答案在于色彩心理学——研究颜色如何影响人类情感和行为的学科。

      研究表明颜色可以对我们的情绪、注意力甚至身体反应产生可测量的影响。例如，红色被发现可以增加心率并产生紧迫感，这就是为什么它通常用于促销标志和警告标签。另一方面，蓝色具有镇静效果，可以降低血压并减少焦虑。

      在教育中，色彩心理学有实际应用。研究表明，用蓝色墨水写笔记可以提高记忆保持，而阅读用黄色突出显示的文本使关键信息更容易回忆。一些研究甚至表明，房间的颜色可以影响考试表现——蓝色房间中的学生往往更有创造力，而红色房间中的学生在注意细节方面表现更好。

      公司花费数百万选择适合品牌的颜色。绿色与自然和健康相关联，这就是为什么它受到有机食品公司和环保组织的青睐。紫色暗示奢华和创意，使其在高端美容品牌中很受欢迎。橙色传达活力和热情，经常出现在儿童产品和运动品牌中。

      然而，重要的是要注意颜色联想并不是普遍的。虽然白色在西方文化中代表纯洁和清洁，但在许多亚洲文化中它与哀悼相关。红色在一些国家象征危险，但在中国象征好运和繁荣。文化背景显著影响人们如何感知和回应颜色。

      理解色彩心理学在日常生活中可能出奇地有用。为你的学习空间、演示幻灯片甚至考试日的服装选择正确的颜色可能给你一个小但有意义的优势。世界充满了色彩——它影响你的程度可能比你意识到的要大。
