  # ============================================================
  # R043 – How Detectives Read Body Language (Level 3, ~310 words, forensic-science)
  # ============================================================
  - id: R043
    title: 'How Detectives Read Body Language'
    titleZh: '侦探如何读懂肢体语言'
    level: 3
    wordCount: 310
    topic: forensic-science
    tags: [Q03, month-3]
    passage: |
      When detectives interview a suspect, they listen carefully to what the person says. But experienced detectives also pay close attention to something else — body language. The way people move, sit, and use their hands can reveal a great deal about what they are really thinking.

      For example, when people are nervous, they often touch their face or neck without realising it. They may also avoid eye contact, looking down or to the side instead of at the person speaking to them. Crossing arms tightly across the chest can be a sign that someone feels defensive or is trying to hide something.

      However, reading body language is not simple. A good detective knows that one gesture alone does not prove anything. A person might cross their arms simply because the room is cold, not because they are lying. That is why detectives look for clusters — groups of signals that appear together. If someone avoids eye contact, fidgets constantly, and speaks in a higher voice than usual, the combination of these signals may suggest they are uncomfortable.

      Detectives also watch for changes in behaviour. If a suspect has been calm and relaxed throughout an interview but suddenly becomes stiff and quiet when asked a specific question, that shift is important. It does not necessarily mean the person is guilty, but it tells the detective that the question touched on something sensitive.

      Interestingly, skilled liars are often aware of these signals and try to control them. They may force themselves to maintain eye contact or keep their hands still. But even then, tiny movements called "micro-expressions" — lasting only a fraction of a second — can give them away. These fleeting expressions are almost impossible to fake.

      Understanding body language is a useful skill — not just for detectives, but for everyone in daily life.
    passageZh: |
      当侦探审问嫌疑人时，他们会仔细听对方说了什么。但有经验的侦探还会密切关注另一样东西——肢体语言。人们移动、坐着和使用双手的方式能透露出他们真正在想什么。

      例如，当人们紧张时，他们经常会不自觉地摸脸或脖子。他们也可能回避目光接触，向下看或看向一边，而不是看着和他们说话的人。双臂紧紧交叉在胸前可能是某人感到防备或试图隐藏某事的信号。

      然而，解读肢体语言并不简单。一个好的侦探知道，单独一个动作并不能证明什么。一个人交叉双臂可能只是因为房间很冷，而不是因为他在说谎。所以侦探会寻找"集群"——一组同时出现的信号。如果某人回避目光接触、不停地坐立不安、说话的声音比平时高，这些信号的组合可能暗示他们感到不自在。

      侦探还会观察行为的变化。如果一个嫌疑人在整个审问过程中一直很冷静放松，但在被问到某个特定问题时突然变得僵硬和沉默，这种转变是很重要的。这不一定意味着这个人有罪，但它告诉侦探这个问题触及了某些敏感的东西。

      有趣的是，老练的说谎者通常知道这些信号，并试图控制它们。他们可能强迫自己保持目光接触或让手保持不动。但即便如此，被称为"微表情"的微小动作——只持续几分之一秒——也会暴露他们。这些转瞬即逝的表情几乎不可能伪装。

      理解肢体语言是一项有用的技能——不仅对侦探有用，对日常生活中的每个人都有用。
    vocabHighlights:
      - word: defensive
        ref: V0329
      - word: fidgets
        ref: V0330
      - word: fleeting
        ref: V0331
    questions:
