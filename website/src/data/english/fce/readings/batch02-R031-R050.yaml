    passage: |
      Last summer, Oliver visited the International Spy Museum in Washington, D.C. with his family. He had always loved spy films, but he never imagined that real spy gadgets could be even more amazing than the ones in movies.

      The museum had hundreds of real tools used by spies throughout history. Oliver's favourite was a lipstick that was actually a tiny pistol, used during the Cold War. There was also a hollow coin that could hide a secret message inside. Even a normal-looking shoe had a hidden compartment in the heel for carrying microfilm.

      One exhibit showed how spies communicated secretly. Before mobile phones and the internet, spies used invisible ink to write messages on ordinary paper. The ink could only be seen when heated over a flame. They also used "dead drops" — secret locations where one spy would leave a message for another to collect later, so the two would never have to meet face to face.

      Oliver was especially impressed by a camera disguised as a button. It was so small that no one would notice it, but it could take clear photographs. He learned that during wartime, tiny cameras like these helped gather important information that saved many lives.

      At the end of the tour, Oliver tried a spy challenge. He had to spot hidden cameras in a fake room, decode a secret message, and identify a suspicious person from a crowd of photos. He completed it in record time.

      "Being a spy is not just about cool gadgets," the guide explained. "It is about paying attention, thinking quickly, and staying calm under pressure."
    passageZh: |
      去年夏天，奥利弗和家人参观了华盛顿特区的国际间谍博物馆。他一直喜欢间谍电影，但他从没想到真正的间谍工具竟然比电影里的还要神奇。

      博物馆里有数百件历史上间谍真正使用过的工具。奥利弗最喜欢的是一支口红——它其实是冷战时期使用的一把微型手枪。还有一枚可以在里面藏秘密信息的空心硬币。甚至一只看起来普通的鞋子，鞋跟里也有一个隐藏的夹层用来携带微缩胶片。

      一个展区展示了间谍如何秘密通信。在手机和互联网出现之前，间谍用隐形墨水在普通纸上写信息。这种墨水只有在火焰上加热后才能看到。他们还使用"死信箱"——秘密地点，一个间谍在那里留下信息，另一个间谍稍后去取，这样两个人就永远不需要面对面见面。

      让奥利弗印象最深的是一个伪装成纽扣的相机。它小到没人会注意到，但却能拍出清晰的照片。他了解到在战争时期，像这样的微型相机帮助收集了重要情报，挽救了许多生命。

      参观结束时，奥利弗参加了一个间谍挑战。他需要在一个模拟房间里找出隐藏的摄像头、破解一条秘密信息，并从一堆照片中辨认出可疑人物。他以创纪录的时间完成了挑战。

