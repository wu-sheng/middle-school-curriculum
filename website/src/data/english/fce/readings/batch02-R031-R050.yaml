  # ============================================================
  # R044 – The Cipher Wheel (Level 2, ~290 words, code-breaking)
  # ============================================================
  - id: R044
    title: 'The Cipher Wheel'
    titleZh: '密码转盘'
    level: 2
    wordCount: 290
    topic: code-breaking
    tags: [Q03, month-3]
    passage: |
      In history class, Mr Wallace showed his students a fascinating tool — a cipher wheel. It was a simple device made of two circular discs, one smaller than the other, pinned together at the centre so they could rotate. Both discs had the twenty-six letters of the alphabet printed around the edge.

      "This," said Mr Wallace, "is one of the oldest code-making tools in the world. It was invented over five hundred years ago by a man named Leon Battista Alberti."

      He demonstrated how it worked. By turning the inner disc, each letter on the outer disc would line up with a different letter on the inner disc. For example, if you turned the wheel so that A on the outer disc matched D on the inner disc, then every A in your message would be written as D. B would become E, C would become F, and so on.

      "But here is the clever part," Mr Wallace continued. "Unlike a simple Caesar cipher, the cipher wheel can be reset in the middle of a message. After every five words, you can turn the wheel to a new position. This means the same letter can be encoded differently each time it appears, making the code much harder to break."

      The students were excited to try. Mr Wallace gave each pair a cardboard cipher wheel to make. They spent the rest of the lesson encoding messages and challenging their partners to decode them. Some students changed the wheel position after every three words, making their codes extremely tricky.

      At the end of class, Mr Wallace smiled. "Codes and ciphers protected real secrets for centuries. Today, similar ideas protect your passwords and messages on the internet — just with much bigger numbers."
    passageZh: |
      历史课上，华莱士老师给学生们展示了一个迷人的工具——密码转盘。这是一个简单的装置，由两个圆盘组成，一个比另一个小，用一个钉子在中心固定在一起，可以转动。两个圆盘的边缘都印着二十六个英文字母。

      "这，"华莱士老师说，"是世界上最古老的加密工具之一。它是五百多年前由一个叫莱昂·巴蒂斯塔·阿尔贝蒂的人发明的。"

      他演示了它的工作原理。转动内盘，外盘上的每个字母就会与内盘上不同的字母对齐。例如，如果你转动转盘，使外盘上的A与内盘上的D对齐，那么你信息中的每个A都会被写成D。B会变成E，C会变成F，以此类推。

      "但聪明的地方在这里，"华莱士老师继续说，"与简单的凯撒密码不同，密码转盘可以在信息中途重新设置。每隔五个单词，你就可以把转盘转到一个新位置。这意味着同一个字母每次出现时可以被编码成不同的字母，使密码更难破解。"

      学生们兴奋地想要尝试。华莱士老师给每对搭档发了一个硬纸板做的密码转盘来制作。他们用剩余的课堂时间编码信息，挑战搭档来解码。有些学生每三个单词就变换一次转盘位置，使他们的密码极其难解。

      下课时，华莱士老师笑着说："密码几百年来保护着真正的秘密。今天，类似的原理保护着你在互联网上的密码和信息——只是用了大得多的数字。"
