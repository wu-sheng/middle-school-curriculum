  # ============================================================
  # R031 – The Missing Necklace (Level 2, ~280 words, mystery)
  # ============================================================
  - id: R031
    title: 'The Missing Necklace'
    titleZh: '消失的项链'
    level: 2
    wordCount: 280
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      Mrs Parker kept her favourite pearl necklace in a small blue box on her dressing table. Every evening before bed, she would open the box, check the necklace, and close it again. It was a habit she had followed for twenty years.

      One Friday morning, the box was empty. Mrs Parker searched the entire bedroom — under pillows, behind furniture, even inside her shoes. The necklace was nowhere to be found. She called her neighbour, Detective Ling, for help.

      Detective Ling examined the room carefully. The window was locked from the inside. The bedroom door had no scratches or damage. Nothing else was missing. She asked Mrs Parker three questions: Who visited the house yesterday? Did you open the box last night? Was anything different about the room this morning?

      Mrs Parker thought hard. Her grandson Tommy had visited after school. She had opened the box as usual before sleeping. And this morning, she noticed her cat was sleeping on the dressing table — which was unusual because the cat normally slept on the sofa.

      Detective Ling smiled. She lifted the dressing table's heavy cloth and looked underneath. There, tangled in the fabric, was the pearl necklace. The cat had knocked the box over during the night while jumping onto the table. The pearls had slid off the edge and caught in the cloth.

      Mrs Parker laughed with relief. It was not a crime after all — just a curious cat. She thanked Detective Ling and made a mental note to keep the box in her locked drawer from now on.
    passageZh: |
      帕克太太把她最喜欢的珍珠项链放在梳妆台上一个蓝色小盒子里。每天晚上睡觉前，她都会打开盒子，检查一下项链，然后再合上。这个习惯她已经保持了二十年。

      一个星期五早上，盒子是空的。帕克太太搜遍了整个卧室——枕头底下、家具后面，甚至鞋子里面。项链怎么也找不到了。她打电话给邻居凌侦探求助。

      凌侦探仔细检查了房间。窗户从里面锁着，卧室门上没有任何刮痕或损坏。其他东西都没有丢。她问了帕克太太三个问题：昨天谁来过家里？你昨晚打开盒子了吗？今天早上房间有什么不同的地方吗？

      帕克太太仔细想了想。她的孙子汤米放学后来过。她睡前照常打开了盒子。今天早上，她注意到她的猫睡在梳妆台上——这很不寻常，因为猫通常睡在沙发上。

      凌侦探笑了。她掀起梳妆台上厚厚的桌布往下面看。项链就缠在布料里。猫在夜里跳上桌子时把盒子撞翻了，珍珠滑下了桌边，挂在了桌布上。

      帕克太太如释重负地笑了。这根本不是什么犯罪——只是一只好奇的猫。她感谢了凌侦探，并在心里记下以后要把盒子放在上锁的抽屉里。
    vocabHighlights:
      - word: examined
        ref: V0301
      - word: tangled
        ref: V0302
      - word: relief
        ref: V0303
    questions:
      - id: R031-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'A detective who catches a jewellery thief'
          B: 'How a missing necklace was found with the help of a detective'
          C: 'A grandmother who loses her memory'
          D: 'Why cats should not be kept as pets'
        answer: 'B'
        explanation: 'The passage tells the story of a necklace that went missing and how Detective Ling figured out what happened to it.'
        explanationZh: '文章讲述了一条项链失踪以及凌侦探如何弄清楚发生了什么事的故事。'
      - id: R031-Q2
        type: detail
        question: 'How did Detective Ling know to look under the table cloth?'
        questionZh: '凌侦探怎么知道要看桌布下面的？'
        options:
          A: 'She saw the cat playing with the necklace'
          B: 'Mrs Parker told her the cat was in an unusual place'
          C: 'She found scratch marks on the table'
          D: 'Tommy told her where the necklace was'
        answer: 'B'
        explanation: 'Mrs Parker mentioned the cat was sleeping on the dressing table, which was unusual. This clue helped the detective figure out the cat had been on the table during the night.'
        explanationZh: '帕克太太提到猫睡在梳妆台上，这很不寻常。这个线索帮助侦探推断出猫在夜里上过桌子。'
      - id: R031-Q3
        type: inference
        question: 'Why did Detective Ling ask about visitors to the house?'
        questionZh: '凌侦探为什么要问谁来过家里？'
        options:
          A: 'She wanted to invite them for tea'
          B: 'She needed to rule out whether someone had taken the necklace'
          C: 'She thought Tommy had broken the box'
          D: 'She was curious about Mrs Parker''s family'
        answer: 'B'
        explanation: 'A detective investigates all possibilities. By asking who visited, she was checking whether any person could have been responsible before considering other explanations.'
        explanationZh: '侦探会调查所有的可能性。通过询问谁来访过，她在排除是否有人拿走了项链，然后再考虑其他解释。'
      - id: R031-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "mental note" most likely mean?'
        questionZh: '文中的"mental note"最可能是什么意思？'
        options:
          A: 'A note written on paper'
          B: 'A message sent by phone'
          C: 'A reminder kept in one''s mind'
          D: 'A letter to a friend'
        answer: 'C'
        explanation: '"Mental" relates to the mind. A "mental note" means remembering something in your head without writing it down.'
        explanationZh: '"mental"与头脑有关。"mental note"意思是在心里记住某件事，不用写下来。'

  # ============================================================
  # R032 – The Footprints in the Garden (Level 2, ~290 words, mystery)
  # ============================================================
  - id: R032
    title: 'The Footprints in the Garden'
    titleZh: '花园里的脚印'
    level: 2
    wordCount: 290
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      On Saturday morning, Mia looked out of her window and gasped. Someone had walked through her mother's flower garden during the night. There were large, muddy footprints leading from the garden gate to the shed at the back, and then back to the gate again.

      Her mother was upset. Several rose bushes had been trampled. Mia decided to investigate. She put on her rain boots and followed the trail carefully. The footprints were deep, which meant the person was either heavy or carrying something heavy. Near the shed, the footprints became closer together, as if the person had slowed down or stopped.

      Mia checked the shed door. It was still locked, but she noticed something interesting — there were fresh scratches around the keyhole. Someone had tried to open the lock but failed. She also found a small scrap of blue fabric caught on a nail beside the door.

      Mia thought about what she knew. The person had come through the gate, so they knew where it was. They had tried to get into the shed. And they wore something blue. She remembered that her neighbour, Mr Chen, had asked her father last week if he could borrow the lawnmower, which was kept in the shed. Mr Chen often wore a blue jacket.

      Mia knocked on Mr Chen's door. He looked embarrassed and admitted that he had come over late at night to borrow the lawnmower, hoping to return it before anyone noticed. He apologised for the flowers and promised to replace every damaged bush.

      Mia was proud of her detective work. She had solved the case using only observation and reasoning — no fancy equipment needed.
    passageZh: |
      星期六早上，米娅望向窗外，倒吸了一口气。夜里有人走过了她妈妈的花园。从花园大门到后面的小棚屋，再从棚屋回到大门，地上有一串又大又脏的泥脚印。

      她妈妈很难过。好几丛玫瑰被踩坏了。米娅决定调查一下。她穿上雨靴，小心翼翼地沿着脚印走。脚印很深，说明这个人要么很重，要么搬着很重的东西。在棚屋附近，脚印变得更密集了，好像这个人放慢了速度或者停了下来。

      米娅检查了棚屋的门。门还锁着，但她注意到一件有趣的事——钥匙孔周围有新的刮痕。有人试图打开锁但没有成功。她还在门边的一颗钉子上发现了一小块蓝色布料。

      米娅想了想她知道的信息。这个人从大门进来的，说明他知道大门在哪里。他试图进入棚屋。他穿着蓝色的衣服。她想起来邻居陈先生上周问过她爸爸能不能借用割草机，割草机就放在棚屋里。陈先生经常穿一件蓝色外套。

      米娅敲了敲陈先生的门。他看起来很不好意思，承认自己深夜过来想借割草机，希望在别人发现之前还回来。他为踩坏的花道了歉，并承诺替换每一丛被损坏的玫瑰。

      米娅为自己的侦探工作感到骄傲。她只用了观察和推理就破了案——根本不需要什么高级设备。
    vocabHighlights:
      - word: investigate
        ref: V0304
      - word: trampled
        ref: V0305
      - word: observation
        ref: V0306
    questions:
      - id: R032-Q1
        type: detail
        question: 'What clue did Mia find on the shed door?'
        questionZh: '米娅在棚屋门上发现了什么线索？'
        options:
          A: 'A broken key inside the lock'
          B: 'Fresh scratches around the keyhole and a scrap of blue fabric'
          C: 'A note left by the visitor'
          D: 'Muddy handprints on the handle'
        answer: 'B'
        explanation: 'The passage states Mia noticed "fresh scratches around the keyhole" and "a small scrap of blue fabric caught on a nail beside the door."'
        explanationZh: '文章说米娅注意到"钥匙孔周围有新的刮痕"和"门边的一颗钉子上有一小块蓝色布料"。'
      - id: R032-Q2
        type: inference
        question: 'Why were the footprints deeper than normal?'
        questionZh: '为什么脚印比正常的要深？'
        options:
          A: 'The ground was frozen solid'
          B: 'The person was probably carrying heavy equipment'
          C: 'The person was running very fast'
          D: 'The shoes were specially designed for gardening'
        answer: 'B'
        explanation: 'Mia noted the footprints were deep, meaning the person was heavy or carrying something heavy. Since Mr Chen planned to carry a lawnmower back, this explains the deeper prints.'
        explanationZh: '米娅注意到脚印很深，说明人很重或者搬着重东西。因为陈先生打算搬割草机回去，所以脚印更深。'
      - id: R032-Q3
        type: main-idea
        question: 'What is the best title for this passage?'
        questionZh: '这篇文章最好的标题是什么？'
        options:
          A: 'How to Grow Roses'
          B: 'A Young Detective Solves a Garden Mystery'
          C: 'The Dangerous Neighbour Next Door'
          D: 'A Night-Time Robbery'
        answer: 'B'
        explanation: 'The passage is about Mia using clues and reasoning to figure out who walked through the garden — classic detective work by a young girl.'
        explanationZh: '文章讲的是米娅利用线索和推理弄清楚了谁走过了花园——一个小女孩的经典侦探工作。'
      - id: R032-Q4
        type: vocabulary-in-context
        question: 'What does "scrap" mean in "a small scrap of blue fabric"?'
        questionZh: '"a small scrap of blue fabric"中的"scrap"是什么意思？'
        options:
          A: 'A roll'
          B: 'A tiny torn piece'
          C: 'A stain'
          D: 'A button'
        answer: 'B'
        explanation: 'A "scrap" means a small piece that has been torn or cut off from something larger. Here it refers to a tiny piece of fabric from clothing.'
        explanationZh: '"scrap"指从较大物品上撕下或剪下的一小块。这里指的是从衣服上扯下的一小块布。'

  # ============================================================
  # R033 – Sherlock Holmes and the Dancing Men (Level 2, ~300 words, famous detectives)
  # ============================================================
  - id: R033
    title: 'Sherlock Holmes and the Dancing Men'
    titleZh: '福尔摩斯与跳舞小人'
    level: 2
    wordCount: 300
    topic: famous-detectives
    tags: [Q03, month-3]
    passage: |
      Sherlock Holmes is perhaps the most famous detective in all of literature. He was created by the British writer Sir Arthur Conan Doyle in 1887. Holmes lives at 221B Baker Street in London with his loyal friend, Dr John Watson.

      What makes Holmes so remarkable is his method of solving crimes. He does not rely on guesswork. Instead, he uses careful observation and logical reasoning. He notices tiny details that others miss — the mud on a shoe, the way a letter is folded, or the kind of tobacco ash left behind. From these small clues, he builds a complete picture of what happened.

      One of the most interesting Holmes stories is "The Adventure of the Dancing Men." In this story, a man receives strange messages — little stick figures that look like children's drawings. Most people think they are just silly pictures, but Holmes realises they are actually a secret code. Each figure represents a letter of the alphabet. By studying the patterns and counting how often each figure appears, Holmes cracks the code and solves the mystery.

      Holmes often said to Watson, "You see, but you do not observe." He meant that most people look at things without really paying attention. A good detective must train their eyes and mind to notice what is important and ignore what is not.

      Today, 221B Baker Street is a real museum in London. Thousands of visitors come every year to see Holmes's famous sitting room, complete with his violin, his magnifying glass, and his pipe. Even though Holmes is a fictional character, his influence on real-world detective work is enormous.
    passageZh: |
      夏洛克·福尔摩斯大概是整个文学作品中最出名的侦探了。他由英国作家阿瑟·柯南·道尔爵士在1887年创造。福尔摩斯和他忠实的朋友约翰·华生医生住在伦敦贝克街221B号。

      让福尔摩斯如此出众的是他破案的方法。他不依赖猜测，而是运用仔细的观察和逻辑推理。他能注意到别人忽略的微小细节——鞋上的泥巴、信件折叠的方式，或者留下的烟灰种类。从这些小线索中，他能还原出事情的全貌。

      最有趣的福尔摩斯故事之一是《跳舞小人的冒险》。在这个故事里，一个人收到了奇怪的信息——看起来像儿童画的火柴小人。大多数人觉得这只是些无聊的涂鸦，但福尔摩斯意识到它们其实是一种密码。每个小人代表一个字母。通过研究图案并计算每个小人出现的频率，福尔摩斯破解了密码，解开了谜团。

      福尔摩斯经常对华生说："你看到了，但你没有观察。"他的意思是大多数人看东西时并没有真正用心注意。一个好侦探必须训练自己的眼睛和头脑，去注意重要的东西，忽略不重要的。

      如今，贝克街221B号是伦敦的一座真正的博物馆。每年有成千上万的游客来参观福尔摩斯著名的起居室，里面有他的小提琴、放大镜和烟斗。尽管福尔摩斯是一个虚构人物，但他对现实世界侦探工作的影响是巨大的。
    vocabHighlights:
      - word: logical
        ref: V0307
      - word: fictional
        ref: V0308
    questions:
      - id: R033-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'The life story of Arthur Conan Doyle'
          B: 'Sherlock Holmes and what makes him a great detective'
          C: 'How to visit museums in London'
          D: 'The history of secret codes'
        answer: 'B'
        explanation: 'The passage introduces Sherlock Holmes, explains his detective methods, gives an example story, and mentions his lasting influence.'
        explanationZh: '文章介绍了福尔摩斯，解释了他的侦探方法，举了一个故事的例子，并提到了他持久的影响。'
      - id: R033-Q2
        type: detail
        question: 'How did Holmes crack the code of the dancing men?'
        questionZh: '福尔摩斯是怎么破解跳舞小人密码的？'
        options:
          A: 'He found a key hidden in a book'
          B: 'He studied the patterns and how often each figure appeared'
          C: 'Watson translated the figures for him'
          D: 'He asked the man who sent the messages'
        answer: 'B'
        explanation: 'The passage says Holmes cracked the code "by studying the patterns and counting how often each figure appears."'
        explanationZh: '文章说福尔摩斯"通过研究图案并计算每个小人出现的频率"破解了密码。'
      - id: R033-Q3
        type: inference
        question: 'What did Holmes mean by "You see, but you do not observe"?'
        questionZh: '福尔摩斯说"你看到了，但你没有观察"是什么意思？'
        options:
          A: 'Watson needed glasses'
          B: 'People often look at things without noticing important details'
          C: 'Watson was not a good doctor'
          D: 'Observation is only useful for scientists'
        answer: 'B'
        explanation: 'The passage explains that Holmes meant "most people look at things without really paying attention" — there is a difference between casually seeing and carefully observing.'
        explanationZh: '文章解释了福尔摩斯的意思是"大多数人看东西时并没有真正用心注意"——随意地看和仔细地观察是有区别的。'
      - id: R033-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "remarkable" mean?'
        questionZh: '文中"remarkable"是什么意思？'
        options:
          A: 'Ordinary and common'
          B: 'Unusually impressive or outstanding'
          C: 'Difficult to understand'
          D: 'Funny and entertaining'
        answer: 'B'
        explanation: '"Remarkable" means worthy of attention because it is unusual or impressive. Here it describes Holmes''s exceptional detective skills.'
        explanationZh: '"remarkable"意思是因为不寻常或令人印象深刻而值得关注。这里形容福尔摩斯出色的侦探技能。'

  # ============================================================
  # R034 – The Secret Code Club (Level 2, ~280 words, code-breaking)
  # ============================================================
  - id: R034
    title: 'The Secret Code Club'
    titleZh: '秘密密码俱乐部'
    level: 2
    wordCount: 280
    topic: code-breaking
    tags: [Q03, month-3]
    passage: |
      Every Wednesday after school, five friends met in Zara's tree house for their Secret Code Club. They had one rule: all messages between members must be written in code.

      Their favourite code was the Caesar cipher. It works by shifting each letter a certain number of places in the alphabet. For example, with a shift of three, A becomes D, B becomes E, and so on. So the word "CAT" would become "FDW." To read the message, you simply shift the letters back.

      One day, Zara found a note in her locker that read: "PHHW PH DW WKH OLEUDUB." She recognised it immediately as a Caesar cipher with a shift of three. She decoded it: "MEET ME AT THE LIBRARY." It was from her friend Kai, who wanted to show her a new book about Egyptian hieroglyphics.

      The club also invented their own codes. Leo created a colour code where each colour stood for a word. A red dot meant "meeting today," a blue dot meant "cancelled," and a green dot meant "bring snacks." They would stick these coloured dots on their school bags as secret signals.

      Maya preferred number codes. She would replace each letter with its position in the alphabet — A was 1, B was 2, C was 3, and so on. Her messages looked like maths homework, which was the perfect disguise.

      The club members loved the challenge of creating codes that were hard to break. They often tested each other with new puzzles. It was not just fun — they were learning about patterns, logic, and problem-solving without even realising it.
    passageZh: |
      每周三放学后，五个朋友会在扎拉的树屋里开秘密密码俱乐部的会。他们有一个规矩：成员之间的所有信息必须用密码写。

      他们最喜欢的密码是凯撒密码。它的原理是把每个字母在字母表中向后移动一定的位数。例如，移动三位的话，A变成D，B变成E，以此类推。所以"CAT"这个词就会变成"FDW"。要读懂信息，只需要把字母往回移就行了。

      有一天，扎拉在储物柜里发现了一张纸条，上面写着："PHHW PH DW WKH OLEUDUB。"她立刻认出这是一个移动三位的凯撒密码。她解码出来："MEET ME AT THE LIBRARY"（在图书馆见我）。这是她的朋友凯写的，他想给她看一本关于埃及象形文字的新书。

      俱乐部还发明了自己的密码。利奥创造了一种颜色密码，每种颜色代表一个词。红点表示"今天开会"，蓝点表示"取消"，绿点表示"带零食"。他们会把这些彩色圆点贴在书包上作为秘密信号。

      玛雅更喜欢数字密码。她用每个字母在字母表中的位置来替换——A是1，B是2，C是3，以此类推。她的消息看起来就像数学作业，这是完美的伪装。

      俱乐部成员们喜欢创造难以破解的密码的挑战。他们经常用新谜题互相考验。这不仅仅是好玩——他们在不知不觉中学习了关于规律、逻辑和解决问题的知识。
    vocabHighlights:
      - word: cipher
        ref: V0309
      - word: disguise
        ref: V0310
    questions:
      - id: R034-Q1
        type: detail
        question: 'What does a green dot on a school bag mean in the club''s colour code?'
        questionZh: '在俱乐部的颜色密码中，书包上的绿点代表什么？'
        options:
          A: 'Meeting today'
          B: 'Meeting cancelled'
          C: 'Bring snacks'
          D: 'New code available'
        answer: 'C'
        explanation: 'The passage states that "a green dot meant bring snacks."'
        explanationZh: '文章说"绿点表示带零食"。'
      - id: R034-Q2
        type: inference
        question: 'Why was Maya''s number code described as "the perfect disguise"?'
        questionZh: '为什么玛雅的数字密码被称为"完美的伪装"？'
        options:
          A: 'Because nobody at school could count'
          B: 'Because the numbers looked like ordinary schoolwork, so no one would suspect a hidden message'
          C: 'Because the teacher had taught them this code'
          D: 'Because Maya was the best at maths in the school'
        answer: 'B'
        explanation: 'The passage says her messages "looked like maths homework," implying that other people would not suspect the numbers were actually a secret code.'
        explanationZh: '文章说她的消息"看起来就像数学作业"，意思是其他人不会怀疑这些数字其实是密码。'
      - id: R034-Q3
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'How to do well in maths class'
          B: 'A group of friends who enjoy creating and using secret codes'
          C: 'The history of codes used in wars'
          D: 'How to build a tree house'
