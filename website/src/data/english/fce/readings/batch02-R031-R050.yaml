  # ============================================================
  # R045 – The Case of the Missing Homework (Level 2, ~280 words, mystery)
  # ============================================================
  - id: R045
    title: 'The Case of the Missing Homework'
    titleZh: '消失的作业案'
    level: 2
    wordCount: 280
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      Jake was sure he had put his science homework on his desk before breakfast. But when he came back to his room, the papers were gone. His little sister Emma was playing in the hallway, looking innocent.

      "Did you take my homework?" Jake asked. Emma shook her head. "I didn't go in your room," she said. Jake was not convinced, but he needed evidence.

      First, he examined his desk. There were no crumbs or juice stains, which ruled out his theory that Emma had been eating in his room. Then he noticed something — his window was open about ten centimetres. He always closed it before bed. Had someone opened it?

      Jake looked at the floor beneath the window. There were no footprints or signs that anyone had climbed in. But he did see several small white feathers near the windowsill. He looked outside and saw the neighbour's pigeon coop just across the garden wall.

      Suddenly, Jake understood. The pigeons often perched on his windowsill in the morning. One of them must have pushed the window open wider with its body, and the breeze had blown his loose papers out the window.

      He ran downstairs and searched the garden. Sure enough, his homework pages were scattered across the flower beds, slightly damp from the morning dew. One sheet was even resting on top of the pigeon coop.

      Jake gathered his papers, dried them carefully, and rewrote the parts that were smudged. From that day on, he kept his homework inside a folder with a clasp — and he made sure to close his window completely before leaving his room.

      He also apologised to Emma for suspecting her. She just grinned and said, "You should be a detective, Jake."
    passageZh: |
      杰克确信他在吃早饭前把科学作业放在了书桌上。但当他回到房间时，纸不见了。他的妹妹艾玛在走廊里玩，看起来一脸无辜。

      "你拿了我的作业吗？"杰克问。艾玛摇了摇头。"我没有进你的房间，"她说。杰克不太相信，但他需要证据。

      首先，他检查了书桌。上面没有碎屑或果汁痕迹，这排除了艾玛在他房间里吃东西的可能。然后他注意到了一件事——他的窗户开了大约十厘米。他睡前总是关着窗的。是有人打开了它吗？

      杰克看了看窗户下面的地板。没有脚印或有人爬进来的痕迹。但他确实在窗台附近看到了几根白色的小羽毛。他望向窗外，看到邻居的鸽棚就在花园围墙对面。

      突然，杰克明白了。鸽子早上经常停在他的窗台上。其中一只一定是用身体把窗户推得更开了，微风把他散放的纸吹出了窗外。

      他跑到楼下在花园里搜索。果然，他的作业纸散落在花坛上，被晨露弄得有点潮湿。有一张甚至落在了鸽棚顶上。

      杰克收好了他的纸，小心地擦干，重新写了模糊的部分。从那天起，他把作业放在一个带扣子的文件夹里——并且确保离开房间前把窗户完全关好。

      他还向艾玛道了歉，因为之前怀疑了她。她只是咧嘴一笑说："你应该去当侦探，杰克。"
