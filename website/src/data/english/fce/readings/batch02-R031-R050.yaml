  # ============================================================
  # R039 – Fingerprints Never Lie (Level 3, ~310 words, forensic-science)
  # ============================================================
  - id: R039
    title: 'Fingerprints Never Lie'
    titleZh: '指纹不会说谎'
    level: 3
    wordCount: 310
    topic: forensic-science
    tags: [Q03, month-3]
    passage: |
      Every person in the world has a unique set of fingerprints. Even identical twins, who share the same DNA, have different fingerprints. This makes fingerprints one of the most reliable tools in crime investigation.

      Fingerprints are formed before birth, during the early months in the womb. The patterns are created by the pressure of the baby's fingers pressing against the surrounding fluid. Because this pressure is slightly different each time, no two fingerprints are ever exactly the same. Once formed, fingerprints remain unchanged for a person's entire life — they cannot be altered even by cuts or burns, as the same pattern grows back.

      There are three main types of fingerprint patterns: loops, whorls, and arches. Loops are the most common, found in about sixty percent of people. Whorls look like tiny spirals and are found in about thirty-five percent of people. Arches are the rarest, appearing in only about five percent.

      Police have used fingerprints to solve crimes for over a hundred years. When a person touches a surface, they leave behind an invisible print made of natural oils from the skin. Detectives use special powder or chemicals to make these hidden prints visible. The prints are then photographed and compared against a database of known fingerprints.

      In 1902, a burglar in London named Harry Jackson became one of the first people convicted using fingerprint evidence. He had left a clear thumbprint on a freshly painted windowsill. The print matched his records perfectly, and he was found guilty.

      Today, fingerprint technology is even more advanced. Smartphones use fingerprint sensors to unlock, and airports use them to verify travellers' identities. What was once a detective's secret weapon has become part of everyday life.
    passageZh: |
      世界上每个人都有一组独一无二的指纹。即使是共享相同DNA的同卵双胞胎，指纹也各不相同。这使得指纹成为刑事侦查中最可靠的工具之一。

      指纹在出生前就形成了，在子宫中的头几个月里。这些纹路是由婴儿手指按压周围液体产生的压力形成的。因为每次的压力略有不同，所以没有两个指纹是完全相同的。一旦形成，指纹在人的一生中保持不变——即使被割伤或烧伤也无法改变，因为同样的纹路会重新长出来。

      指纹纹路主要有三种类型：环形纹、斗形纹和弓形纹。环形纹最常见，大约百分之六十的人有这种纹路。斗形纹看起来像微小的螺旋，大约百分之三十五的人有这种纹路。弓形纹最罕见，只出现在大约百分之五的人身上。

      警察使用指纹破案已经超过一百年了。当一个人触摸表面时，会留下一个由皮肤天然油脂形成的隐形印记。侦探使用特殊的粉末或化学试剂让这些隐藏的指纹变得可见。然后对指纹进行拍照，并与已知指纹数据库进行比对。

      1902年，伦敦的一个窃贼哈里·杰克逊成为最早通过指纹证据被定罪的人之一。他在一个刚粉刷过的窗台上留下了一个清晰的拇指印。指纹与他的记录完全吻合，他被判有罪。

      如今，指纹技术更加先进了。智能手机使用指纹传感器解锁，机场用指纹验证旅客身份。曾经是侦探秘密武器的东西，已经成为日常生活的一部分。
