        type: detail
        question: 'Why do detectives look for "clusters" of body language signals?'
        questionZh: '侦探为什么要寻找肢体语言信号的"集群"？'
        options:
          A: 'Because a single gesture can have many innocent explanations'
          B: 'Because they want to confuse the suspect'
          C: 'Because body language is always accurate'
          D: 'Because suspects always make the same gestures'
        answer: 'A'
        explanation: 'The passage explains that "one gesture alone does not prove anything" since there can be innocent reasons, so detectives look for multiple signals appearing together.'
        explanationZh: '文章解释"单独一个动作并不能证明什么"，因为可能有无辜的原因，所以侦探会寻找多个同时出现的信号。'
      - id: R043-Q2
        type: inference
        question: 'If a calm suspect suddenly becomes stiff when asked about a specific topic, what can the detective conclude?'
        questionZh: '如果一个冷静的嫌疑人在被问到某个特定话题时突然变得僵硬，侦探能得出什么结论？'
        options:
          A: 'The suspect is definitely lying'
          B: 'The suspect is feeling cold'
          C: 'The topic is likely sensitive or important to the suspect'
          D: 'The suspect did not understand the question'
        answer: 'C'
        explanation: 'The passage says a sudden change "does not necessarily mean the person is guilty" but indicates the question "touched on something sensitive." So the detective can conclude the topic matters to the suspect, not that they are necessarily guilty.'
        explanationZh: '文章说突然的变化"不一定意味着这个人有罪"，但表明问题"触及了某些敏感的东西"。所以侦探可以得出这个话题对嫌疑人很重要，而不一定是他们有罪。'
