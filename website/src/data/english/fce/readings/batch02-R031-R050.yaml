      各种理论像野火一样传播开来。有人说那个房间闹鬼。有人说一位前校长在那里藏了宝藏。还有几个学生认为里面装着老师不想让人看到的旧考试卷。

      十岁的罗茜决心找到真相。她首先查看了学校的建筑平面图，那些平面图展示在校长办公室附近的一个玻璃柜里。平面图显示13号房间和其他教室大小一样。没什么异常。

      接着，罗茜问了学校管理员达菲先生关于那个房间的事。他犹豫了一下才回答。"就是储藏室，"他很快地说，没有看她的眼睛。罗茜注意到他拿着一串至少有三十把钥匙的钥匙圈——其中一把有一个标着"13"的红色标签。

      星期三放学后，罗茜看到达菲先生带着几个大箱子进了13号房间。她在附近等着。二十分钟后，他出来了，但箱子没带出来。第二天早上，罗茜听到优美的钢琴声从走廊飘来。声音来自13号房间。

      罗茜终于去问了音乐老师金老师。金老师笑了。"13号房间是新的音乐教室。我们一直在为下个月的学校音乐会秘密布置它。钢琴上周送到了，我们要保密到揭幕那天。"

      13号房间的谜底远没有鬼魂或宝藏那么戏剧性。但罗茜并不失望。她使用了真正的侦探技能——调查、询问和观察——来揭开真相，这感觉和任何虚构的推理故事一样令人兴奋。
