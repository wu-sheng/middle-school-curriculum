  - id: R047
    title: 'The Invisible Ink Experiment'
    titleZh: '隐形墨水实验'
    level: 2
    wordCount: 280
    topic: spy-gadgets
    tags: [Q03, month-3]
    passage: |
      In science class, Ms Wen taught her students how to make invisible ink using lemon juice. "Spies have used this trick for hundreds of years," she explained. "It is simple, but it really works."

      Each student received a small cup of lemon juice, a cotton bud, and a sheet of white paper. Ms Wen told them to dip the cotton bud into the juice and write a secret message on the paper. At first, the wet juice was slightly visible, but as it dried, the writing disappeared completely. The paper looked blank.

      "Now comes the exciting part," said Ms Wen. She held a piece of paper above a warm lamp. After a few seconds, brown letters began to appear, as if by magic. The class gasped. The message read: "SCIENCE IS AMAZING."

      Ms Wen explained the chemistry behind it. Lemon juice contains citric acid. When the acid is heated, it breaks down and turns brown faster than the paper around it. This creates a contrast that makes the writing visible. "Any acidic liquid works," she added. "Milk, vinegar, and even onion juice can be used as invisible ink."

      The students spent the rest of the lesson writing secret messages to each other. They used the classroom heater to reveal them. Some students wrote jokes, others wrote riddles, and a few wrote secret club passwords.

      At the end of class, Ms Wen gave them a challenge for homework. "Write a message using invisible ink and bring it to school tomorrow. Your partner must figure out how to reveal it without being told the method."

      The classroom buzzed with excitement. For once, everyone was actually looking forward to doing their homework.
