  # ============================================================
  # R041 – The Vanishing Painting (Level 3, ~310 words, mystery)
  # ============================================================
  - id: R041
    title: 'The Vanishing Painting'
    titleZh: '消失的画'
    level: 3
    wordCount: 310
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      The Greenfield Art Gallery was hosting its annual exhibition. The star of the show was a painting called "Moonlight Garden" by a local artist, Ms Huang. On the opening night, over two hundred guests admired the beautiful artwork. But the next morning, the gallery owner, Mr Brooks, discovered the painting was gone. In its place hung an exact copy.

      Mr Brooks called the police. Officer Patel examined the scene. The gallery had security cameras, but they showed nothing unusual — no one had entered or left the building after closing time. The alarm system had not been triggered. It seemed impossible.

      Officer Patel studied the copy carefully. It was almost perfect, but she noticed one difference: the real painting had a tiny ladybird hidden in the bottom-left corner — a signature detail that Ms Huang put in all her work. The copy did not have it.

      Patel then reviewed the guest list from opening night. She learned that one guest, a man named Mr Voss, was a professional art restorer — someone who repairs old paintings. He had the skills to create a convincing copy. Security footage showed Mr Voss carrying a large portfolio case when he arrived, big enough to hold a painting.

      When questioned, Mr Voss admitted everything. He had spent three months creating the copy at home. On opening night, while other guests were distracted by the speeches, he had swapped the paintings. He believed no one would ever notice the difference.

      He was wrong. Ms Huang's ladybird was her secret mark, known only to her and a few close friends. Mr Voss had studied photographs of the painting but had never seen the original up close until that night — by which time it was too late to add the detail to his copy.
    passageZh: |
      格林菲尔德美术馆正在举办年度展览。展览的明星是当地艺术家黄女士的一幅画，名叫《月光花园》。开幕之夜，超过两百位嘉宾欣赏了这幅美丽的作品。但第二天早上，画廊老板布鲁克斯先生发现画不见了。原来的位置挂着一幅一模一样的复制品。

      布鲁克斯先生报了警。帕特尔警官检查了现场。画廊有监控摄像头，但画面没有异常——关门后没有人进出过大楼。警报系统也没有被触发。这似乎不可能。

      帕特尔警官仔细研究了复制品。它几乎完美，但她注意到了一个区别：真画的左下角藏着一只小瓢虫——这是黄女士在所有作品中都会放的标志性细节。复制品上没有。

      然后帕特尔审查了开幕之夜的宾客名单。她发现有一位叫沃斯先生的客人是专业的艺术品修复师——专门修复旧画的人。他有制作逼真复制品的技能。监控录像显示沃斯先生到达时携带着一个大画夹，大到足以装下一幅画。

      被询问时，沃斯先生承认了一切。他在家花了三个月制作复制品。开幕之夜，趁其他客人被演讲分散注意力时，他调换了两幅画。他以为没人会注意到区别。

      他错了。黄女士的瓢虫是她的秘密标记，只有她和几个亲密朋友知道。沃斯先生研究过这幅画的照片，但直到那天晚上才第一次近距离看到原作——那时要在复制品上加上这个细节已经太晚了。
