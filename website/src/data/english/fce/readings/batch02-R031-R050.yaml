      哈娜喜欢周六上午在镇上的图书馆度过。一个下雨天，她在浏览历史区时，一张折叠的羊皮纸从一本关于小镇建镇历史的旧书里掉了出来。那是一张手绘地图，因年代久远而泛黄，上面画着她能部分认出的街道和建筑。

      地图上有三个用红圈标记的位置：老钟楼、米勒溪上的石桥，以及图书馆本身。每个圆圈旁边都有一个小数字——7、3和12。地图底部有人写道："三个数字相遇之处，知识在等待。"

      哈娜的第一个想法是这些数字可能是密码。但密码是什么意思？她更仔细地研究了地图。图书馆的圆圈旁边是数字12。她环顾图书馆，注意到书架是有编号的。她走到12号书架，发现了一本带书签的儿童百科全书。书签上写着一个词："耐心。"

      在接下来的两个周末，哈娜去了钟楼和石桥。在钟楼，她从入口数了七块石头，在第七块石头上发现了一个小小的刻字："好奇。"在石桥上，她从北端数了三块木板，在下面发现了另一个刻出来的词："勇气。"

      耐心。好奇。勇气。哈娜意识到这些不是通向金银珠宝的线索。它们是这个镇的建镇价值观，由最早的定居者写下。那本旧书证实了这一点——小镇的格言是"有了耐心、好奇和勇气，任何挑战都能应对。"

