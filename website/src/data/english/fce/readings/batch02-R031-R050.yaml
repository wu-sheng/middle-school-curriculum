  - id: R050
    title: 'The Junior Detective Handbook'
    titleZh: '少年侦探手册'
    level: 3
    wordCount: 310
    topic: detective-skills
    tags: [Q03, month-3]
    passage: |
      If you have ever dreamed of being a detective, here are five essential skills from the Junior Detective Handbook that every budding investigator should practise.

      First, learn to observe. A good detective notices things that others walk right past — the colour of a car, the number on a door, the direction the wind is blowing. Try this exercise: look at a room for thirty seconds, then close your eyes and list everything you remember. With practice, you will be surprised how much more you start to notice.

      Second, ask good questions. Detectives do not just ask "What happened?" They ask "When exactly did it happen? Who was nearby? What did you hear?" The more specific your questions, the more useful the answers will be.

      Third, keep detailed notes. Memory is unreliable. Even professional detectives write everything down because small details that seem unimportant at first can turn out to be the key to solving a case. Carry a small notebook wherever you go.

      Fourth, think logically. When you have gathered your clues, arrange them in order. Look for patterns. Ask yourself: what do these facts tell me? What do they not tell me? Eliminate the impossible, and whatever remains — no matter how unlikely — must contain the truth.

      Fifth, and perhaps most importantly, stay open-minded. It is tempting to decide on an answer early and then only look for evidence that supports it. Good detectives resist this urge. They follow the evidence wherever it leads, even if it takes them somewhere unexpected.

      These five skills — observation, questioning, note-taking, logical thinking, and open-mindedness — are not just useful for solving mysteries. They help you do better in school, understand people around you, and make smarter decisions every day. Anyone can think like a detective. All it takes is practice.
    passageZh: |
      如果你曾经梦想成为一名侦探，这里有《少年侦探手册》中每个有志于成为调查员的人都应该练习的五项基本技能。

      第一，学会观察。一个好的侦探会注意到别人直接走过去忽略的东西——一辆车的颜色、门上的数字、风吹来的方向。试试这个练习：看一个房间三十秒，然后闭上眼睛列出你记住的所有东西。经过练习，你会惊讶地发现自己开始注意到了多得多的东西。

      第二，问好问题。侦探不只是问"发生了什么？"他们会问"到底是什么时候发生的？当时谁在附近？你听到了什么？"你的问题越具体，得到的答案就越有用。

      第三，记详细的笔记。记忆是不可靠的。即使是专业侦探也会把所有东西记下来，因为起初看似不重要的小细节，最后可能成为破案的关键。随身带一个小笔记本。

      第四，逻辑思考。当你收集了线索后，按顺序排列它们。寻找规律。问自己：这些事实告诉了我什么？它们没有告诉我什么？排除不可能的，剩下的——不管多么不太可能——一定包含着真相。

      第五，也许是最重要的，保持开放的心态。人们很容易早早地做出一个结论，然后只寻找支持它的证据。好的侦探会抵制这种冲动。他们跟着证据走，无论证据把他们带到哪里，即使是意想不到的地方。

      这五项技能——观察、提问、记笔记、逻辑思维和开放心态——不仅对解谜有用。它们能帮助你在学校表现更好、理解周围的人，每天做出更明智的决定。任何人都能像侦探一样思考。所需要的只是练习。
