      每个学生收到一小杯柠檬汁、一根棉签和一张白纸。温老师让他们把棉签蘸上果汁，在纸上写一条秘密信息。起初，湿的果汁稍微能看到，但干了以后，字迹就完全消失了。纸看起来是空白的。

      "现在到了激动人心的部分了，"温老师说。她把一张纸放在一盏暖灯上方。几秒钟后，棕色的字母开始出现了，就像变魔术一样。全班都惊叫起来。信息写着："SCIENCE IS AMAZING"（科学真奇妙）。

