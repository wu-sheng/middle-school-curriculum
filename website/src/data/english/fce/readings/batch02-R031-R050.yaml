  # ============================================================
  # R049 – The Mystery of Room 13 (Level 3, ~320 words, mystery)
  # ============================================================
  - id: R049
    title: 'The Mystery of Room 13'
    titleZh: '13号房间之谜'
    level: 3
    wordCount: 320
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      Oakwood Primary School had a mystery that every student knew about. Room 13, at the end of the second-floor corridor, was always locked. No lessons were held there. The windows were covered with thick curtains from the inside. Naturally, this made the students wildly curious.

      Theories spread like wildfire. Some said the room was haunted. Others claimed a former headmaster had hidden treasure there. A few students believed it contained old exam papers that teachers did not want anyone to see.

      Ten-year-old Rosie was determined to find the truth. She started by looking at the school's building plans, which were displayed in a glass case near the main office. The plans showed that Room 13 was the same size as the other classrooms. Nothing unusual.

      Next, Rosie asked the school caretaker, Mr Duffy, about the room. He hesitated before answering. "It's just storage," he said quickly, not meeting her eyes. Rosie noticed that he was holding a key ring with at least thirty keys — one of them had a red tag marked "13."

      On Wednesday after school, Rosie saw Mr Duffy entering Room 13 with several large boxes. She waited nearby. Twenty minutes later, he came out without the boxes. The next morning, Rosie heard beautiful piano music floating through the corridor. It was coming from Room 13.

      Rosie finally asked her music teacher, Ms Kim. Ms Kim smiled. "Room 13 is the new music studio. We have been setting it up as a surprise for the school concert next month. The piano was delivered last week, and we are keeping it secret until the big reveal."

      The mystery of Room 13 turned out to be far less dramatic than ghosts or treasure. But Rosie was not disappointed. She had used real detective skills — research, questioning, and observation — to uncover the truth, and that felt just as exciting as any fictional mystery.
