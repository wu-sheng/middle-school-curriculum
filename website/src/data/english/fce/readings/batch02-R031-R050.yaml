    topic: treasure-hunt
    tags: [Q03, month-3]
    passage: |
      Hana loved spending her Saturday mornings at the town library. One rainy day, she was browsing the history section when a folded piece of parchment fell out of an old book about the town's founding. It was a hand-drawn map, yellowed with age, showing streets and buildings she partly recognised.

      The map had three locations marked with red circles: the old clock tower, the stone bridge over Miller's Creek, and the library itself. Next to each circle was a tiny number — 7, 3, and 12. At the bottom of the map, someone had written: "Where three numbers meet, knowledge awaits."

      Hana's first thought was that the numbers might be a code. But a code for what? She studied the map more carefully. The library circle had the number 12 next to it. She looked around the library and noticed the shelves were numbered. She walked to shelf 12 and found a children's encyclopaedia with a bookmark inside. The bookmark had a single word: "Patience."

      Over the next two weekends, Hana visited the clock tower and the bridge. At the clock tower, she counted seven stones from the entrance and found a small engraving on the seventh stone: "Curiosity." At the bridge, she counted three wooden planks from the north end and found another word carved underneath: "Courage."

      Patience. Curiosity. Courage. Hana realised these were not clues to a treasure of gold or jewels. They were the founding values of the town, written by its original settlers. The old book confirmed this — the town's motto was "With patience, curiosity, and courage, any challenge can be met."

      Hana carefully placed the map back inside the book. She hoped someone else would find it one day and enjoy the same adventure she had experienced.
