      第一个谜题贴在墙上，上面写着："我有城市却没有房屋，有森林却没有树木，有水却没有鱼。我是什么？"几个学生喊出了自己的猜测。然后安妮卡安静地举起了手。"地图，"她说。里维拉女士点点头，交出了第一块拼图。

