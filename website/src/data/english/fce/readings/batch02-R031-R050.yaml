    passage: |
      When the students of Class 4B arrived on Monday morning, they found a surprise. Their classroom was locked, and there was a large sign on the door that read: "Solve the three puzzles to earn your key." It was from their teacher, Ms Rivera, who stood nearby with a big smile.

      The first puzzle was taped to the wall. It said: "I have cities but no houses, forests but no trees, and water but no fish. What am I?" Several students shouted out guesses. Then Anika raised her hand quietly. "A map," she said. Ms Rivera nodded and handed over the first piece of a jigsaw.

      The second puzzle was hidden inside a library book that Ms Rivera had placed on a bench. The bookmark inside read: "What has keys but cannot open locks?" The class discussed it excitedly. "A piano!" called out Ravi. Ms Rivera gave them the second piece.

      For the final puzzle, students had to follow a trail of sticky notes around the school. Each note had an arrow and one letter. When they collected all the letters and rearranged them, they spelled the word "TEAMWORK." Ms Rivera handed over the last jigsaw piece.

      The three pieces, when put together, showed a picture of a key and a number — the code to a combination lock hanging on the door. The students typed it in, and the door opened to reveal a classroom decorated with balloons and a banner that read: "Welcome to Mystery Month!"

      Ms Rivera explained that for the next four weeks, they would be reading detective stories and solving puzzles. The whole class cheered. It was going to be the best month of the year.
