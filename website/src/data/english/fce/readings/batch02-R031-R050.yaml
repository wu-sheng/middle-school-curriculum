      学生们用剩余的课堂时间互相写秘密信息。他们用教室的暖气来显示信息。有些学生写笑话，有些写谜语，还有一些写秘密俱乐部密码。

      下课时，温老师给了他们一个家庭作业挑战。"用隐形墨水写一条信息，明天带到学校来。你的搭档必须在没有被告知方法的情况下想办法让信息显示出来。"

