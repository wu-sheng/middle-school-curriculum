    passage: |
      Most people have heard of Sherlock Holmes, but not everyone knows about his younger sister, Enola. Enola Holmes is a fictional character created by American author Nancy Springer. In the book series, Enola is fourteen years old and just as clever as her famous brother — perhaps even more so.

      When Enola's mother disappears on Enola's birthday, her two older brothers, Sherlock and Mycroft, want to send her to a boarding school to learn to be a "proper lady." But Enola has other plans. She runs away to London to search for her mother on her own.

      What makes Enola special is that she solves mysteries using different skills from Sherlock. While Sherlock relies on logic and science, Enola uses her knowledge of art, flowers, and secret messages. She is also a master of disguise — she can change her appearance so completely that even Sherlock cannot recognise her.

      Enola's name is important too. If you spell "Enola" backwards, it becomes "alone." Her mother chose this name on purpose, as a reminder that being alone does not mean being weak. Throughout the stories, Enola proves this again and again. She faces danger bravely, helps people in trouble, and refuses to let anyone tell her what she cannot do.

      The books were so popular that Netflix made them into films starring Millie Bobby Brown. The films show Enola breaking the rules of her time — Victorian England — where girls were expected to be quiet and obedient. Instead, Enola is adventurous, independent, and determined.

      Enola Holmes teaches young readers an important lesson: you do not need to be grown up to make a difference. All you need is curiosity, courage, and the willingness to think for yourself.
    passageZh: |
      大多数人听说过夏洛克·福尔摩斯，但不是所有人都知道他的妹妹伊诺拉。伊诺拉·福尔摩斯是美国作家南希·斯普林格创造的虚构人物。在系列小说中，伊诺拉十四岁，和她著名的哥哥一样聪明——也许甚至更聪明。

      当伊诺拉的母亲在她生日那天失踪后，她的两个哥哥夏洛克和迈克罗夫特想把她送去寄宿学校学做一个"得体的淑女"。但伊诺拉有自己的计划。她独自逃到伦敦去寻找母亲。

      伊诺拉的特别之处在于她用与夏洛克不同的技能来破案。夏洛克依靠逻辑和科学，而伊诺拉利用她对艺术、花卉和秘密信息的知识。她还是伪装大师——她能把自己的外貌改变得如此彻底，连夏洛克都认不出她。

      伊诺拉的名字也很有意义。如果你把"Enola"倒过来拼，就变成了"alone"（孤独）。她母亲是故意取这个名字的，提醒她独自一人并不意味着软弱。在整个故事中，伊诺拉一次又一次地证明了这一点。她勇敢地面对危险，帮助有困难的人，并拒绝让任何人告诉她什么做不到。

      这套书太受欢迎了，Netflix把它们拍成了由米莉·鲍比·布朗主演的电影。电影展现了伊诺拉打破她所处时代——维多利亚时期英国——的规则，那时候女孩被期望安静和顺从。而伊诺拉却是冒险的、独立的、坚定的。

