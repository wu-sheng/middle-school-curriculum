    tags: [Q03, month-3]
    passage: |
      For her ninth birthday, Lily's parents took her and three friends to an escape room called "The Wizard's Library." They had sixty minutes to find the hidden key and unlock the door to escape.

      The room looked like an old library. Bookshelves lined every wall, and a large wooden desk sat in the centre. A clock on the wall began counting down. The first clue was written on a card: "The answer hides where knowledge sleeps."

      Lily thought about the clue. Where does knowledge sleep? In books, of course! She began pulling books off the shelf. Behind one book, she found a small envelope with a four-digit number: 4-7-2-1. Her friend Noah spotted a locked box on the desk with a number pad. He typed in the code, and the box clicked open. Inside was a magnifying glass and another clue: "Look closer at what you cannot see."

      They were confused at first. Then Lily held the magnifying glass over the desk. Under the glass, she could see tiny invisible ink writing that said, "The third painting from the left." They rushed to the paintings on the wall. Behind the third painting, there was a small metal key.

      With fifteen minutes still on the clock, Lily put the key in the door and turned it. The door swung open, and a bell rang to celebrate their victory. They had escaped!

      The staff member told them that most groups take more than fifty minutes. Lily's team had done it in forty-five. "The secret," Lily said, grinning, "is to think about what the words really mean, not just what they say."
