  # ============================================================
  # R038 – The Treasure Map Riddle (Level 2, ~290 words, treasure-hunt)
  # ============================================================
  - id: R038
    title: 'The Treasure Map Riddle'
    titleZh: '藏宝图之谜'
    level: 2
    wordCount: 290
    topic: treasure-hunt
    tags: [Q03, month-3]
    passage: |
      When Grace's grandpa moved to a care home, the family was clearing out his old house. In the attic, Grace found a folded piece of paper inside a dusty tin box. It was a hand-drawn map of the garden, with an X marked near the old oak tree.

      Grace showed it to her dad. He laughed. "Your grandpa always talked about burying a time capsule when he was young, but we never believed him." Grace was determined to find out if the story was true.

      Armed with a small shovel, Grace went to the garden. The oak tree was enormous now, with roots spreading in every direction. The X on the map was near the north side of the tree. Grace started digging carefully. After about twenty minutes, the shovel hit something hard.

      It was a metal biscuit tin, rusted but still sealed. Grace pried it open with trembling hands. Inside, wrapped in an old newspaper from 1968, she found several treasures: a collection of marbles, a handwritten letter, three old coins, and a small black-and-white photograph of a boy standing beside the same oak tree — except the tree was tiny.

      The letter read: "To whoever finds this — I buried these on my tenth birthday. I hope the tree has grown as tall as I dreamed. Take care of it for me."

      Grace recognised the handwriting. It was her grandpa's. She brought the tin to him at the care home. His eyes filled with tears. "I buried that fifty-six years ago," he whispered. "I had almost forgotten."

      Grace made a plan. She would bury her own time capsule beside the tree and leave a map for her future grandchildren to find.
    passageZh: |
      格雷丝的爷爷搬去养老院后，家人在清理他的老房子。在阁楼上，格雷丝在一个落满灰尘的铁盒子里发现了一张折叠的纸。那是一幅手绘的花园地图，在老橡树附近标了一个X。

      格雷丝把地图拿给爸爸看。爸爸笑了。"你爷爷总说他年轻时埋了一个时间胶囊，但我们从来不信。"格雷丝决心要查清这个故事是不是真的。

      格雷丝带着一把小铲子去了花园。橡树现在长得非常大，树根向四面八方伸展。地图上的X在树的北面。格雷丝开始小心翼翼地挖。大约二十分钟后，铲子碰到了一个硬东西。

      那是一个金属饼干盒，已经生锈了但还密封着。格雷丝颤抖着双手把它撬开了。里面用一张1968年的旧报纸包着几件宝贝：一堆弹珠、一封手写的信、三枚旧硬币，还有一张小的黑白照片，照片上一个男孩站在同一棵橡树旁——只不过树还很小。

      信上写着："给找到这个的人——我在我十岁生日那天埋下了这些。我希望这棵树长得跟我梦想的一样高。请替我照顾好它。"

      格雷丝认出了那个笔迹。那是爷爷的字。她把铁盒带到养老院给爷爷看。他的眼里充满了泪水。"我五十六年前埋下的，"他低声说，"我几乎都忘了。"

      格雷丝做了一个计划。她要在树旁埋下自己的时间胶囊，并留下一张地图给她未来的孙辈去发现。
