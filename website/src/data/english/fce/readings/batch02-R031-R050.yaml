    passage: |
      The Natural History Museum was hosting a special overnight event for children. Fifty students set up sleeping bags in the dinosaur hall, surrounded by towering skeletons. Before lights out, the museum guide, Dr Kapoor, announced a surprise activity: a mystery game.

      "Somewhere in this museum," she said, "I have hidden a golden fossil replica. The first team to find it wins a special prize. You will receive clues every thirty minutes. Stay in your assigned zones and work together."

      The first clue arrived at nine o'clock: "I live where the earth tells its story in layers." Team Blue discussed the clue. "Layers of earth — that sounds like the geology section," said Priya. They hurried there and found the second clue taped under a display of sedimentary rocks: "Follow the creatures that ruled the sky before birds."

      Team Blue thought carefully. What creatures ruled the sky before birds? Pterosaurs — flying reptiles from the dinosaur age. They searched the pterosaur exhibit and found the third clue inside a model nest: "I rest where the smallest things make the biggest difference."

      This was the hardest clue. The team argued about its meaning. Then quiet Ben spoke up. "The microbiology section. Bacteria and viruses are the smallest living things, but they change everything." The team raced to the microbiology display.

      Behind a glass case of magnified bacteria models, tucked into a corner, was the golden fossil replica, gleaming under a spotlight. Team Blue had won.

      Dr Kapoor congratulated them. "You solved each clue by connecting knowledge from different subjects — geology, palaeontology, and biology. That is exactly what real scientists do. They do not work in one field alone. They make connections."

      As the students returned to their sleeping bags, the dinosaur skeletons seemed to watch over them like ancient guardians. It was a night none of them would forget.
