  # ============================================================
  # R042 – The Dog Detective (Level 2, ~280 words, mystery)
  # ============================================================
  - id: R042
    title: 'The Dog Detective'
    titleZh: '狗侦探'
    level: 2
    wordCount: 280
    topic: mystery
    tags: [Q03, month-3]
    passage: |
      Every day after school, ten-year-old Sam walked his dog, Biscuit, through the park. Biscuit was a beagle with an extraordinary sense of smell. One Tuesday, something unusual happened.

      As they passed the playground, Biscuit suddenly pulled hard on his lead and dragged Sam towards the bushes near the pond. There, half-hidden under some leaves, was a small red backpack. Sam opened it carefully. Inside were school textbooks, a pencil case, and a lunchbox with the name "Yuki Tanaka" written on the lid.

      Sam knew Yuki. She was in the year above him at school. He had heard that she was very upset because she had lost her backpack on the way home the day before. It contained her homework and her favourite pen — a gift from her grandmother.

      Sam looked through the bag more carefully. The homework was still there, but the pencil case was open and several items were missing, including the special pen. Biscuit sniffed around the bushes and then pulled Sam along a trail towards the other side of the park. Near a bench, Biscuit stopped and began digging at the soft ground. Just below the surface, wrapped in a tissue, was a shiny purple pen with gold stars.

      Sam brought the backpack and the pen to school the next day. Yuki was overjoyed. "How did you find it?" she asked. Sam pointed at Biscuit, who was waiting outside the school gate, wagging his tail proudly.

      From that day on, the kids at school called Biscuit "Detective Biscuit." Whenever someone lost something in the park, they would ask Sam and Biscuit for help. And Biscuit, following his nose, almost always found it.
    passageZh: |
      每天放学后，十岁的萨姆都会带着他的狗饼干去公园散步。饼干是一只比格犬，有着非凡的嗅觉。一个星期二，发生了一件不寻常的事。

      当他们经过游乐场时，饼干突然用力拽住牵引绳，把萨姆拖向池塘旁的灌木丛。那里，半藏在树叶下面的，是一个红色小书包。萨姆小心翼翼地打开了它。里面有学校课本、一个铅笔盒和一个午餐盒，午餐盒盖上写着"田中由纪"的名字。

      萨姆认识由纪。她是学校比他高一年级的同学。他听说她因为前一天回家路上丢了书包而非常难过。书包里有她的作业和她最喜欢的钢笔——奶奶送给她的礼物。

      萨姆更仔细地翻看了书包。作业还在，但铅笔盒是打开的，好几样东西不见了，包括那支特别的钢笔。饼干在灌木丛周围嗅了嗅，然后沿着一条小路把萨姆拽到公园的另一边。在一张长椅附近，饼干停下来开始在松软的泥土里挖。就在地表下面，用纸巾包着的，是一支闪亮的紫色星星金色花纹的钢笔。

      第二天萨姆把书包和钢笔带到了学校。由纪欣喜若狂。"你怎么找到的？"她问。萨姆指了指正在校门外等着、骄傲地摇着尾巴的饼干。

      从那天起，学校的孩子们都叫饼干"饼干侦探"。每当有人在公园丢了东西，他们就会找萨姆和饼干帮忙。而饼干，跟着他的鼻子，几乎总能找到。
