  # ============================================================
  # R011 – How Ancient Egyptians Built the Pyramids (Level 1.5, ~250 words, science)
  # ============================================================
  - id: R011
    title: 'Building the Impossible: The Great Pyramids'
    titleZh: '建造不可能之物：大金字塔'
    level: 1.5
    wordCount: 252
    topic: science
    tags: [Q01, month-1]
    passage: |
      The Great Pyramid of Giza is one of the most impressive structures ever built. It was constructed around 4,500 years ago, long before machines, cranes, or even iron tools existed. For centuries, people have wondered: how did the ancient Egyptians manage to build something so enormous?

      The pyramid is made of roughly 2.3 million stone blocks, each weighing about 2,500 kilograms — as heavy as a large car. The blocks were cut from limestone quarries using copper tools and wooden wedges. Workers would hammer the wedges into cracks in the rock, then soak them with water. As the wood expanded, it split the stone apart.

      Getting the blocks to the building site was another challenge. Scientists believe the Egyptians placed the blocks on wooden sledges and dragged them across the sand. Recent experiments have shown that pouring water in front of the sledge reduced friction and made it much easier to pull.

      The biggest mystery is how they raised the blocks to the top. Some historians think they built long ramps that spiralled around the pyramid as it grew taller. Others believe they used an internal ramp hidden inside the structure itself. No one knows for certain which method was used.

      What we do know is that tens of thousands of skilled workers — not slaves, as was once believed — spent about twenty years building the Great Pyramid. They were well-fed, lived in nearby villages, and took pride in their extraordinary achievement. The pyramid still stands today as proof of what humans can accomplish with teamwork and determination.
    passageZh: |
      吉萨大金字塔是人类有史以来建造的最令人赞叹的建筑之一。它建于大约4500年前，远在机器、起重机甚至铁器发明之前。几个世纪以来，人们一直在想：古埃及人是怎么建造出如此巨大的东西的？

      金字塔由大约230万块石头组成，每块重约2500公斤——和一辆大型汽车一样重。石块是用铜制工具和木楔从石灰岩采石场切割出来的。工人们把木楔敲入岩石的裂缝中，然后用水浸泡。当木头膨胀时，就会把石头撑裂。

      把石块运到建筑工地是另一个挑战。科学家认为埃及人把石块放在木橇上，在沙地上拖拉。最近的实验表明，在木橇前方洒水可以减少摩擦力，使拉动变得更加容易。

      最大的谜团是他们如何把石块升到顶部。一些历史学家认为他们建造了随金字塔增高而螺旋上升的长坡道。另一些人认为他们使用了隐藏在金字塔结构内部的坡道。没有人确切知道到底使用了哪种方法。

      我们确实知道的是，数万名技术熟练的工人——不是曾经认为的奴隶——花了大约二十年建造了大金字塔。他们吃得很好，住在附近的村庄里，并且为自己非凡的成就感到自豪。金字塔今天仍然矗立，证明了人类通过团队合作和决心能够取得怎样的成就。
