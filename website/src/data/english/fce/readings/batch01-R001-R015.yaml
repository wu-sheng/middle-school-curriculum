  # ============================================================
  # R015 – A Dragon Afraid of Fire (Level 1.5, ~250 words, fantasy)
  # ============================================================
  - id: R015
    title: 'Ember the Timid Dragon'
    titleZh: '胆小的龙安伯'
    level: 1.5
    wordCount: 253
    topic: fantasy
    tags: [Q01, month-1]
    passage: |
      In the Valley of Smoke, every dragon could breathe fire before their first birthday. Every dragon, that is, except Ember. Whenever he tried, all that came out was a tiny puff of grey smoke and a sneeze.

      The other young dragons teased him constantly. "What kind of dragon is afraid of fire?" they laughed. Ember felt ashamed. He spent his days alone by the river, watching the water flow and wishing he were different.

      One cold winter night, a terrible snowstorm hit the valley. The wind howled so fiercely that even the strongest dragons struggled to keep their fires burning. Families huddled together in their caves, shivering. The storm blocked the entrance to the main cave with a wall of ice, trapping dozens of dragons inside.

      The fire-breathing dragons tried to melt the ice, but the wind kept blowing their flames out. They needed someone who could get close to the ice wall without being pushed back by the wind. That was when the eldest dragon looked at Ember.

      "You are small and light," she said. "The wind will not push you as hard. Can you squeeze through the gap at the top?"

      Ember was terrified, but he nodded. He climbed the icy wall, squeezed through a narrow crack, and reached the other side. There, he found dry wood and signalled the dragons inside to aim their fire at the crack. Together, they melted the wall from both sides.

      That night, the valley celebrated Ember as a hero. He learned that being different was not a weakness — it was the very thing that made him special.
    passageZh: |
      在烟雾谷，每条龙在一岁之前就能喷火。每一条龙都能——除了安伯。每当他试着喷火时，出来的只是一小缕灰烟和一个喷嚏。

      其他小龙不停地取笑他。"什么样的龙会怕火？"他们笑着说。安伯感到很羞耻。他整天独自待在河边，看着水流，希望自己不一样。

      一个寒冷的冬夜，一场可怕的暴风雪袭击了山谷。风呼啸得如此猛烈，连最强壮的龙也难以保持火焰不灭。龙的家庭们挤在洞穴里，瑟瑟发抖。暴风雪用一面冰墙封住了主洞穴的入口，把几十条龙困在了里面。

      会喷火的龙试图融化冰墙，但风不停地把火焰吹灭。他们需要一个能靠近冰墙而不被风推回去的人。就在这时，最年长的龙看向了安伯。

      "你又小又轻，"她说。"风不会把你推得那么厉害。你能从顶部的缝隙挤过去吗？"

      安伯非常害怕，但他点了点头。他爬上冰墙，从一条狭窄的裂缝中挤了过去，到达了另一边。在那里，他找到了干木头，并向里面的龙示意让他们朝裂缝喷火。大家一起从两边融化了冰墙。

      那天晚上，整个山谷都把安伯当作英雄来庆祝。他明白了，与众不同不是弱点——恰恰是让他特别的东西。
