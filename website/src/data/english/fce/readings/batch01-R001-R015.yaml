  # ============================================================
  # R012 – A Detective Cat (Level 1.5, ~250 words, detective)
  # ============================================================
  - id: R012
    title: 'Inspector Whiskers'
    titleZh: '胡须探长'
    level: 1.5
    wordCount: 248
    topic: detective
    tags: [Q01, month-1]
    passage: |
      Everyone on Maple Street knew Whiskers. He was a large ginger cat with bright green eyes and an unusually serious expression. His owner, Mrs Chen, joked that he looked like a detective. She had no idea how right she was.

      The trouble began when things started disappearing from gardens around the neighbourhood. Mr Patterson lost his favourite gardening gloves. The Sharma family's welcome mat vanished overnight. Even little Tommy's toy dinosaur went missing from the front steps.

      Nobody could figure out what was going on. Then Mrs Chen noticed something interesting. Every morning, Whiskers would sit by the living room window and stare at the house across the street with great concentration. She decided to follow his gaze.

      Across the street lived a young fox. Mrs Chen had seen it a few times at dusk, but she had never paid much attention. Now she watched as the fox crept out of the bushes, grabbed a gardening glove from a neighbour's porch, and carried it under the shed at the end of the lane.

      Mrs Chen told the neighbours, and together they looked under the shed. There, in a neat pile, were all the missing items — gloves, the welcome mat, Tommy's dinosaur, and even a pair of slippers that nobody had reported missing yet.

      The fox, it turned out, had been collecting soft objects to make its den more comfortable. The neighbours laughed and agreed to leave the fox some old blankets instead. As for Whiskers, he received a tin of his favourite tuna as a reward for his detective work.
    passageZh: |
      枫叶街上人人都认识胡须。他是一只大橘猫，有着明亮的绿眼睛和一副异常严肃的表情。他的主人陈太太开玩笑说他看起来像个侦探。她不知道自己说得多对。

      麻烦开始于附近花园里的东西接连消失。帕特森先生丢了他最喜欢的园艺手套。夏尔马一家的门垫一夜之间不见了。甚至小汤米放在门口台阶上的玩具恐龙也失踪了。

      没人能弄清楚发生了什么。然后陈太太注意到一件有趣的事。每天早上，胡须都会坐在客厅窗边，全神贯注地盯着对面的房子。她决定顺着他的目光看去。

      街对面住着一只年轻的狐狸。陈太太在黄昏时见过它几次，但从未太在意。现在她看到狐狸从灌木丛里溜出来，从邻居的门廊上叼走一只园艺手套，然后把它衔到巷子尽头小棚子下面。

      陈太太告诉了邻居们，大家一起去小棚子下面查看。那里，整齐地堆着所有失踪的物品——手套、门垫、汤米的恐龙，甚至还有一双还没人报失的拖鞋。

      原来，狐狸一直在收集柔软的东西来让自己的窝更舒适。邻居们哈哈大笑，决定给狐狸留一些旧毯子代替。至于胡须，他得到了一罐最爱的金枪鱼作为侦探工作的奖赏。
