  # ============================================================
  # R008 – The Legend of a Phoenix Feather (Level 1, ~220 words, fantasy)
  # ============================================================
  - id: R008
    title: 'The Phoenix Feather'
    titleZh: '凤凰的羽毛'
    level: 1
    wordCount: 225
    topic: fantasy
    tags: [Q01, month-1]
    passage: |
      Long ago, in a kingdom surrounded by mountains, there lived a young girl named Mei. Her village was suffering from a terrible drought. The rivers had dried up, the crops were dying, and the animals had fled to find water.

      An old storyteller told Mei about the phoenix — a magical bird that lived at the top of the highest mountain. "If you find one of its golden feathers," he said, "you can make a single wish. But the climb is dangerous, and many have tried and failed."

      Mei set off at dawn. The mountain path was steep and covered in loose stones. Thorny bushes scratched her arms, and cold wind blew against her face. Several times she wanted to give up, but she thought of her family and kept going.

      After two days of climbing, she reached the peak. There, sitting on a nest of flames, was the most beautiful bird she had ever seen. Its feathers glowed like liquid gold. The phoenix looked at Mei with kind eyes and dropped a single feather at her feet.

      Mei held the feather and whispered her wish. Dark clouds gathered in the sky, and rain began to fall — gently at first, then in a steady, wonderful downpour. Far below, she could hear her village cheering.

      Mei climbed down the mountain with a grateful heart, knowing she had saved her home.
    passageZh: |
      很久以前，在一个被群山环绕的王国里，住着一个叫小梅的女孩。她的村庄正遭受着严重的干旱。河流干涸了，庄稼快要枯死，动物们也逃走去寻找水源。

      一位老说书人告诉小梅关于凤凰的故事——一只住在最高山峰上的神奇之鸟。"如果你找到它的一根金色羽毛，"他说，"你就可以许一个愿望。但那段路非常危险，许多人尝试过都失败了。"

      小梅在黎明时出发了。山路陡峭，满是松散的碎石。荆棘刮伤了她的手臂，冷风吹打着她的脸。好几次她想放弃，但一想到家人，她就继续前行。

      爬了两天之后，她终于到达了山顶。那里，坐在一个火焰筑成的巢上，是她见过的最美丽的鸟。它的羽毛像流动的黄金一样闪耀。凤凰用慈祥的目光看着小梅，在她脚边落下了一根羽毛。

      小梅握着羽毛，轻声说出了她的愿望。乌云在天空聚集，雨开始下了——起初很轻柔，然后变成了稳定而美妙的倾盆大雨。在远远的山下，她能听到村民们的欢呼声。

      小梅怀着感恩的心走下了山，知道自己拯救了家园。
