  # ============================================================
  # R006 – A Hidden Map in a Library Book (Level 1, ~220 words, adventure)
  # ============================================================
  - id: R006
    title: 'The Map Inside the Book'
    titleZh: '书中的地图'
    level: 1
    wordCount: 218
    topic: adventure
    tags: [Q01, month-1]
    passage: |
      Lily loved the old library at the end of her street. It smelled like dust and stories. One rainy afternoon, she pulled a thick book from the top shelf. As she opened it, a folded piece of paper fell out and landed on the floor.

      It was a hand-drawn map. The paper was yellow and worn at the edges. At the top, someone had written in ink: "Follow the path to find what was lost." Lily's heart beat faster. She studied the map carefully. It showed the library building, the garden behind it, and a large oak tree with an X marked at its roots.

      Lily grabbed her raincoat and rushed outside. The garden was quiet and wet. She found the oak tree easily — it was the biggest tree she had ever seen. At the base of the trunk, between two thick roots, she noticed a loose stone. She pulled it aside and discovered a small metal box underneath.

      Inside the box, there was a collection of old postcards from around the world — Paris, Cairo, Tokyo, and many more. On the back of each postcard, someone had written a short message about their adventure in that city.

      Lily spent the rest of the afternoon reading every single postcard. She decided that one day, she would visit all those places herself.
    passageZh: |
      莉莉非常喜欢她家街尾的那座老图书馆。那里闻起来有灰尘和故事的味道。一个下雨的午后，她从最高的书架上抽出一本厚书。当她翻开时，一张折叠的纸掉了出来，落在地上。

      那是一张手绘的地图。纸张发黄，边缘已经磨损。顶部有人用墨水写着："沿着路径，找到失落之物。"莉莉的心跳加速了。她仔细研究地图，上面画着图书馆的建筑、后面的花园，还有一棵大橡树，树根处标了一个X。

      莉莉抓起雨衣冲了出去。花园安静而湿润。她很容易就找到了那棵橡树——那是她见过的最大的树。在树干底部、两条粗壮的树根之间，她发现了一块松动的石头。她把石头搬开，在下面发现了一个小铁盒。

      盒子里面是一些来自世界各地的旧明信片——巴黎、开罗、东京等等。每张明信片的背面，有人写了一段在那个城市冒险的简短留言。

      莉莉用剩下的整个下午读完了每一张明信片。她决定有一天，自己也要去所有那些地方。
