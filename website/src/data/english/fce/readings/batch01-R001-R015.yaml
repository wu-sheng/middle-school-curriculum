  # ============================================================
  # R007 – A Boy Builds a Robot (Level 1, ~220 words, science/adventure)
  # ============================================================
  - id: R007
    title: 'The Spare-Parts Robot'
    titleZh: '废旧零件机器人'
    level: 1
    wordCount: 222
    topic: science
    tags: [Q01, month-1]
    passage: |
      Twelve-year-old Marco loved taking things apart. Old radios, broken clocks, and his grandmother's toaster — nothing was safe. His bedroom was full of wires, screws, and circuit boards. His parents worried that he was just making a mess, but Marco had a plan.

      He wanted to build a robot that could help around the house. For weeks, he collected spare parts from the recycling centre. He found motors from old washing machines, sensors from a toy car, and a small screen from a broken tablet. Piece by piece, he put everything together.

      The robot was not beautiful. It was short and clumsy, with mismatched wheels and a dented metal body. Marco named it Clanky because of the noise it made when it moved. But Clanky could do something amazing — it could pick up objects from the floor and carry them to a basket.

      Marco entered Clanky in the school science fair. At first, the other students laughed at the funny-looking machine. Then Marco pressed the start button. Clanky rolled across the stage, picked up a tennis ball, and dropped it neatly into a basket. The audience went silent, then burst into applause.

      Marco won first prize. The judges said what impressed them most was not the technology, but Marco's determination to build something useful from things other people had thrown away.
    passageZh: |
      十二岁的马可最喜欢拆东西。旧收音机、坏掉的钟、奶奶的烤面包机——什么都逃不过。他的卧室堆满了电线、螺丝和电路板。他的父母担心他只是在搞破坏，但马可有一个计划。

      他想造一个能帮忙做家务的机器人。连续好几周，他从回收站收集零件。他找到了旧洗衣机的马达、玩具车的传感器，还有坏平板电脑的小屏幕。一点一点地，他把所有东西组装在一起。

      这个机器人算不上漂亮。它又矮又笨拙，轮子大小不一，金属身体上还有凹痕。马可给它取名叫"咔啦"，因为它移动时会发出这种声音。但咔啦能做一件很厉害的事——它能从地上捡起物品并把它们搬到篮子里。

      马可带着咔啦参加了学校的科学展。一开始，其他同学嘲笑这台外表滑稽的机器。然后马可按下了启动按钮。咔啦滚过舞台，捡起一个网球，整齐地扔进了篮子里。观众先是沉默，然后爆发出掌声。

      马可获得了一等奖。评委说最让他们印象深刻的不是技术，而是马可用别人扔掉的东西造出有用之物的决心。
