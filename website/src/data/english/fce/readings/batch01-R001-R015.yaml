  # ============================================================
  # R009 – An Underwater City (Level 1, ~220 words, adventure)
  # ============================================================
  - id: R009
    title: 'The City Beneath the Waves'
    titleZh: '波浪下的城市'
    level: 1
    wordCount: 223
    topic: adventure
    tags: [Q01, month-1]
    passage: |
      A team of divers had been exploring the coast of a small Greek island for months. They were looking for ancient pottery, but what they found was far more exciting.

      Thirty metres below the surface, diver Elena spotted something unusual — a row of stone columns covered in seaweed. As the team swam closer, they realised they were looking at the remains of an entire city. There were walls, doorways, and what appeared to be a marketplace. Fish swam through the ruins as if they were streets.

      The scientists believed the city had sunk during an earthquake more than two thousand years ago. They found clay pots, bronze tools, and even a stone statue of a woman holding a basket of fruit. Everything was covered in a thick layer of sand and coral, which had protected the objects from damage.

      News of the discovery spread quickly. Historians called it one of the most important underwater finds in decades. The city could teach us a great deal about how people lived in ancient Greece.

      Elena said the moment she saw the columns was unforgettable. "It was like swimming through a ghost town," she told reporters. "You could almost imagine people walking through those doorways thousands of years ago."

      The team plans to return next summer to continue their exploration.
    passageZh: |
      一支潜水队已经在一座希腊小岛的海岸探索了好几个月。他们原本在寻找古代陶器，但发现的东西远比这更令人兴奋。

      在水面以下三十米处，潜水员艾琳娜发现了一些不寻常的东西——一排覆盖着海藻的石柱。当团队游近后，他们意识到自己正看着一整座城市的遗迹。那里有墙壁、门道，还有看似集市的地方。鱼群在废墟中穿梭，仿佛那些是街道。

      科学家认为这座城市在两千多年前的一次地震中沉入了海底。他们找到了陶罐、青铜工具，甚至还有一尊手捧水果篮的女性石像。所有东西都覆盖着厚厚的沙子和珊瑚，这反而保护了这些物品免受损坏。

      发现的消息迅速传开了。历史学家称这是几十年来最重要的水下发现之一。这座城市能让我们更多地了解古希腊人是怎样生活的。

      艾琳娜说她看到那些石柱的那一刻令人难忘。"就像在一座鬼城里游泳，"她对记者说。"你几乎能想象几千年前人们穿过那些门道的样子。"

      团队计划明年夏天回来继续探索。
