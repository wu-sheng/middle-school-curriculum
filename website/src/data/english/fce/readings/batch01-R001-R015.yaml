  # ============================================================
  # R010 – A Magical Garden That Blooms at Night (Level 1, ~220 words, fantasy)
  # ============================================================
  - id: R010
    title: 'The Midnight Garden'
    titleZh: '午夜花园'
    level: 1
    wordCount: 220
    topic: fantasy
    tags: [Q01, month-1]
    passage: |
      Behind the oldest house on Willow Lane, there was a garden that nobody talked about. During the day, it looked like any other patch of weeds and dry earth. But every night, when the clock struck twelve, something magical happened.

      The first person to discover the secret was a girl named Rosa. She had trouble sleeping one summer night and looked out of her window. To her amazement, the garden was glowing. Flowers she had never seen before were blooming everywhere — silver roses, blue tulips, and tiny golden bells that chimed in the breeze.

      Rosa crept downstairs and tiptoed into the garden. The air smelled like honey and warm rain. Fireflies danced between the petals, and the moonlight made everything shimmer. In the centre of the garden stood a fountain that had been dry and cracked during the day. Now, sparkling water flowed from it, and small glowing fish swam in its pool.

      Rosa visited the garden every night that summer. She tried to tell her friends, but when she brought them during the day, they saw only weeds. Nobody believed her.

      On the last night of summer, Rosa found a note tucked inside a silver rose. It read: "This garden belongs to those who believe. Come back whenever you need wonder."

      Rosa smiled. She knew she would always believe.
    passageZh: |
      在柳树巷最古老的房子后面，有一座没人谈论的花园。白天，它看起来和任何一块杂草丛生的干土地没什么两样。但每天晚上，当钟敲十二下时，神奇的事情就会发生。

      第一个发现这个秘密的人是一个叫罗莎的女孩。一个夏夜她睡不着，望向窗外。让她惊讶的是，花园在发光。她从未见过的花朵到处盛开——银色的玫瑰、蓝色的郁金香，还有在微风中叮当作响的金色小铃铛。

      罗莎蹑手蹑脚地下楼，踮着脚走进了花园。空气里弥漫着蜂蜜和温暖雨水的气味。萤火虫在花瓣间飞舞，月光让一切都闪闪发亮。花园中央有一座喷泉，白天它是干涸破裂的。现在，闪闪发光的水从中流出，小小的发光鱼在水池里游来游去。

      那个夏天，罗莎每晚都去花园。她试着告诉朋友们，但白天带他们去时，他们只看到杂草。没人相信她。

      夏天的最后一个晚上，罗莎在一朵银色玫瑰里发现了一张纸条。上面写着："这座花园属于相信的人。每当你需要奇迹时，就回来吧。"

      罗莎微笑了。她知道自己永远都会相信。
