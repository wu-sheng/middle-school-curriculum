  # ============================================================
  # R001 – A Clever Octopus (Level 1, ~200 words, animals)
  # ============================================================
  - id: R001
    title: 'The Great Octopus Escape'
    titleZh: '章鱼大逃亡'
    level: 1
    wordCount: 210
    topic: animals
    tags: [Q01, month-1]
    passage: |
      At the city aquarium, there lived an octopus called Otto. He was no ordinary octopus. The keepers often found strange things happening at night. Lights flickered on and off. Toys moved from one tank to another. Nobody could explain it.

      One morning, a keeper named Sarah arrived early. She noticed something extraordinary. Otto's tank was empty! She searched everywhere and finally found him in the next room, sitting happily inside a bucket of crabs. He had climbed out of his tank, crossed the wet floor, and opened the lid of the bucket all by himself.

      Scientists say that octopuses are among the most intelligent creatures in the sea. They can solve puzzles, open jars, and even recognise different human faces. Otto proved this was true. He had watched the keepers carry the crab bucket past his tank every evening, and he had figured out exactly where it went.

      After the escape, the aquarium put a special lock on Otto's tank. But Otto did not seem to mind. He had already eaten all the crabs he wanted. The keepers now check on him twice every night — just in case he has another clever plan.
    passageZh: |
      在城市水族馆里，住着一只叫奥托的章鱼。他可不是一只普通的章鱼。管理员经常发现夜里会出现一些奇怪的事情。灯忽明忽暗，玩具从一个鱼缸跑到另一个鱼缸。没人能解释这是怎么回事。

      一天早上，一位叫莎拉的管理员很早就到了。她发现了一件非同寻常的事——奥托的鱼缸是空的！她到处寻找，终于在隔壁房间找到了他，他正开心地坐在一桶螃蟹里面。他自己爬出了鱼缸，穿过湿漉漉的地板，还打开了桶盖。

      科学家说章鱼是海洋中最聪明的生物之一。它们能解开谜题、打开罐子，甚至能认出不同的人脸。奥托证明了这一点。他一直看着管理员每天晚上提着螃蟹桶经过他的鱼缸，并且弄清楚了桶被放在哪里。

      逃跑事件之后，水族馆给奥托的鱼缸装上了特殊的锁。但奥托似乎并不在意。他已经吃够了想吃的螃蟹。管理员现在每晚检查他两次——以防他又有了什么聪明的计划。
    vocabHighlights:
      - word: extraordinary
        ref: V0001
      - word: intelligent
        ref: V0002
      - word: recognise
        ref: V0003
    questions:
      - id: R001-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'How aquariums take care of sea animals'
          B: 'A clever octopus that escaped from its tank'
          C: 'Why octopuses are dangerous pets'
          D: 'The daily work of aquarium keepers'
        answer: 'B'
        explanation: 'The whole passage tells the story of Otto the octopus escaping his tank to reach a bucket of crabs, highlighting how intelligent octopuses are.'
        explanationZh: '整篇文章讲述了章鱼奥托从鱼缸里逃出来去找螃蟹桶的故事，突出了章鱼的聪明才智。'
      - id: R001-Q2
        type: detail
        question: 'Where did Sarah find Otto?'
        questionZh: '莎拉在哪里找到了奥托？'
        options:
          A: 'In another fish tank'
          B: 'On the wet floor near his tank'
          C: 'In a bucket of crabs in the next room'
          D: 'Outside the aquarium building'
        answer: 'C'
        explanation: 'The passage states that Sarah "found him in the next room, sitting happily inside a bucket of crabs."'
        explanationZh: '文章说莎拉"在隔壁房间找到了他，他正开心地坐在一桶螃蟹里面"。'
      - id: R001-Q3
        type: detail
        question: 'What did the aquarium do after Otto escaped?'
        questionZh: '奥托逃跑后水族馆做了什么？'
        options:
          A: 'They moved Otto to a bigger tank'
          B: 'They put a special lock on his tank'
          C: 'They gave Otto more crabs to eat'
          D: 'They released Otto into the ocean'
        answer: 'B'
        explanation: 'The passage says "the aquarium put a special lock on Otto''s tank" after the escape.'
        explanationZh: '文章说逃跑之后"水族馆给奥托的鱼缸装上了特殊的锁"。'
      - id: R001-Q4
        type: inference
        question: 'Why did Otto not try to escape again?'
        questionZh: '为什么奥托没有再试图逃跑？'
        options:
          A: 'Because the lock was too strong for him'
          B: 'Because he was afraid of the keepers'
          C: 'Because he had already eaten all the crabs he wanted'
          D: 'Because he forgot how to open the lid'
        answer: 'C'
        explanation: 'The passage hints that Otto "did not seem to mind" because "he had already eaten all the crabs he wanted," suggesting his goal was accomplished.'
        explanationZh: '文章暗示奥托"似乎并不在意"，因为"他已经吃够了想吃的螃蟹"，这说明他的目的已经达到了。'

  # ============================================================
  # R002 – A Dog That Predicts Earthquakes (Level 1, ~200 words, animals)
  # ============================================================
  - id: R002
    title: 'Biscuit the Earthquake Dog'
    titleZh: '地震预报犬饼干'
    level: 1
    wordCount: 205
    topic: animals
    tags: [Q01, month-1]
    passage: |
      In a small town in Japan, a golden retriever named Biscuit became famous for a very unusual reason. He could sense earthquakes before they happened.

      It started one autumn afternoon. Biscuit suddenly began barking loudly and running in circles. His owner, Mr Tanaka, thought the dog was just being silly. But ten minutes later, the ground shook. It was a small earthquake. After that, Mr Tanaka paid close attention to Biscuit's behaviour.

      Over the next two years, Biscuit warned the family five more times. Each time, he would whine, pace around the house, and refuse to eat. Within an hour, an earthquake would follow. Mr Tanaka told his neighbours, and soon the whole town relied on Biscuit for early warnings.

      Scientists believe some animals can detect tiny vibrations in the ground that humans cannot feel. Dogs have extremely sensitive hearing and can pick up sounds at frequencies far beyond what people can hear. These abilities may help them notice changes deep underground.

      Biscuit is now twelve years old. He is slower than before, but the town still watches him carefully. Whenever Biscuit starts acting strangely, everyone knows it is time to prepare.
    passageZh: |
      在日本一个小镇上，一只叫饼干的金毛寻回犬因为一个非常特别的原因出了名。他能在地震发生之前感知到地震。

      事情起源于一个秋天的下午。饼干突然开始大声吠叫，并且不停转圈跑。他的主人田中先生觉得狗只是在犯傻。但十分钟后，地面开始摇晃——那是一次小地震。从那以后，田中先生开始密切关注饼干的行为。

      在接下来的两年里，饼干又警告了家人五次。每次他都会呜咽、在屋里来回走动，并且拒绝吃东西。一小时之内，地震就会来临。田中先生告诉了邻居们，很快整个小镇都依赖饼干来提前预警。

      科学家认为有些动物能探测到人类感觉不到的地面微小振动。狗拥有极其灵敏的听觉，能听到远超人类听力范围的声音频率。这些能力可能帮助它们察觉到地下深处的变化。

      饼干现在十二岁了。他比以前慢了很多，但小镇上的人们仍然密切关注着他。每当饼干开始表现异常，大家就知道该做准备了。
    vocabHighlights:
      - word: vibrations
        ref: V0004
      - word: sensitive
        ref: V0005
    questions:
      - id: R002-Q1
        type: main-idea
        question: 'What is the best title for this passage?'
        questionZh: '这篇文章最好的标题是什么？'
        options:
          A: 'How to Train a Dog'
          B: 'A Dog That Can Sense Earthquakes'
          C: 'The Biggest Earthquake in Japan'
          D: 'Why Dogs Bark at Night'
        answer: 'B'
        explanation: 'The passage is about Biscuit, a dog who can predict earthquakes by sensing vibrations before they happen.'
        explanationZh: '文章讲的是饼干这只狗能在地震发生前感知到振动从而预测地震。'
      - id: R002-Q2
        type: detail
        question: 'How did Biscuit behave before an earthquake?'
        questionZh: '地震之前饼干表现出什么行为？'
        options:
          A: 'He hid under the bed and slept'
          B: 'He whined, paced around, and refused to eat'
          C: 'He ran outside and dug holes in the garden'
          D: 'He sat quietly and stared at the wall'
        answer: 'B'
        explanation: 'The passage states that Biscuit "would whine, pace around the house, and refuse to eat" before earthquakes.'
        explanationZh: '文章说饼干在地震前"会呜咽、在屋里来回走动，并且拒绝吃东西"。'
      - id: R002-Q3
        type: detail
        question: 'How many times did Biscuit warn his family over two years?'
        questionZh: '两年里饼干一共警告了家人几次？'
        options:
          A: 'Three times'
          B: 'Four times'
          C: 'Five times'
          D: 'Six times'
        answer: 'C'
        explanation: 'The passage says "Biscuit warned the family five more times" over the next two years (in addition to the first time).'
        explanationZh: '文章说在接下来两年里"饼干又警告了家人五次"（第一次之外）。'
      - id: R002-Q4
        type: inference
        question: 'Why does the whole town still watch Biscuit carefully?'
        questionZh: '为什么整个小镇仍然密切关注饼干？'
        options:
          A: 'Because he is a very expensive dog'
          B: 'Because they are worried about his health'
          C: 'Because his behaviour can warn them about earthquakes'
          D: 'Because he is the oldest dog in town'
        answer: 'C'
        explanation: 'The passage implies the town relies on Biscuit as an early warning system. "Whenever Biscuit starts acting strangely, everyone knows it is time to prepare."'
        explanationZh: '文章暗示小镇依赖饼干作为地震预警。"每当饼干开始表现异常，大家就知道该做准备了。"'

  # ============================================================
  # R003 – How Chameleons Change Colour (Level 1, ~200 words, science/nature)
  # ============================================================
  - id: R003
    title: 'The Colour-Changing Secret'
    titleZh: '变色的秘密'
    level: 1
    wordCount: 208
    topic: nature
    tags: [Q01, month-1]
    passage: |
      Chameleons are famous for changing colour, but most people do not know why they do it. Many think it is only for camouflage — to hide from enemies. In fact, the real reasons are much more interesting.

      A chameleon's skin has special cells called chromatophores. These tiny cells contain different coloured pigments. When the chameleon feels a strong emotion — like anger, fear, or excitement — its brain sends signals to the chromatophores. The cells then expand or shrink, which changes the colour that we see on the surface.

      Temperature also plays a big role. When a chameleon is cold, it turns darker to absorb more heat from the sun. When it is warm, it becomes lighter to reflect sunlight and stay cool. This is a brilliant way to control body temperature without moving at all.

      Chameleons also change colour to communicate with each other. A bright colour often means "stay away" to rivals, while softer colours can signal friendliness. Males turn vivid greens and blues when they want to impress a female.

      So the next time you see a chameleon, remember — it is not just trying to hide. It might be showing off, warming up, or having a conversation with a friend.
    passageZh: |
      变色龙以变换颜色而闻名，但大多数人并不知道它们为什么要这样做。许多人认为这只是为了伪装——躲避敌人。实际上，真正的原因要有趣得多。

      变色龙的皮肤里有一种叫做色素细胞的特殊细胞。这些微小的细胞含有不同颜色的色素。当变色龙感受到强烈的情绪——比如愤怒、恐惧或兴奋时——大脑就会向色素细胞发送信号。这些细胞随后会扩张或收缩，从而改变我们在表面看到的颜色。

      温度也起着很大的作用。当变色龙感到寒冷时，它会变暗以从阳光中吸收更多热量。当它感到温暖时，就变浅来反射阳光、保持凉爽。这是一种不用移动就能调节体温的巧妙方法。

      变色龙还通过变色来相互交流。鲜艳的颜色通常是在告诉对手"离远点"，而柔和的颜色则表示友好。雄性变色龙想要吸引雌性时，会变成鲜艳的绿色和蓝色。

      所以下次你看到变色龙时，记住——它不只是在试图隐藏自己。它可能是在炫耀、取暖，或者在和朋友聊天。
    vocabHighlights:
      - word: camouflage
        ref: V0006
      - word: pigments
        ref: V0007
      - word: absorb
        ref: V0008
    questions:
      - id: R003-Q1
        type: main-idea
        question: 'What is the main idea of this passage?'
        questionZh: '这篇文章的主旨是什么？'
        options:
          A: 'Chameleons change colour only to hide from enemies'
          B: 'Chameleons change colour for several different reasons'
          C: 'Chameleons are the most colourful reptiles'
          D: 'Scientists have discovered a new species of chameleon'
        answer: 'B'
        explanation: 'The passage explains that chameleons change colour for multiple reasons: emotions, temperature control, and communication — not just camouflage.'
        explanationZh: '文章解释了变色龙变色有多种原因：情绪、温度调节和交流——不仅仅是伪装。'
      - id: R003-Q2
        type: detail
        question: 'What are chromatophores?'
        questionZh: '什么是色素细胞？'
        options:
          A: 'Tiny bones inside a chameleon''s tail'
          B: 'Special cells in the skin that contain coloured pigments'
          C: 'A type of food that chameleons eat'
          D: 'Muscles that help chameleons climb trees'
        answer: 'B'
        explanation: 'The passage defines chromatophores as "special cells" in the skin that "contain different coloured pigments."'
        explanationZh: '文章将色素细胞定义为皮肤中"含有不同颜色色素"的"特殊细胞"。'
      - id: R003-Q3
        type: detail
        question: 'What happens when a chameleon is cold?'
        questionZh: '当变色龙感到寒冷时会怎样？'
        options:
          A: 'It turns lighter to stay cool'
          B: 'It turns darker to absorb more heat'
          C: 'It stops changing colour completely'
          D: 'It hides underground until it warms up'
        answer: 'B'
        explanation: 'The passage states: "When a chameleon is cold, it turns darker to absorb more heat from the sun."'
        explanationZh: '文章说："当变色龙感到寒冷时，它会变暗以从阳光中吸收更多热量。"'
      - id: R003-Q4
        type: inference
        question: 'If a male chameleon turns bright green, what is it probably doing?'
        questionZh: '如果一只雄性变色龙变成了鲜绿色，它可能在做什么？'
        options:
          A: 'It is feeling very cold'
          B: 'It is hiding from a predator'
          C: 'It is trying to impress a female'
          D: 'It is about to fall asleep'
        answer: 'C'
        explanation: 'The passage says "Males turn vivid greens and blues when they want to impress a female," so a bright green colour suggests courtship behaviour.'
        explanationZh: '文章说"雄性变色龙想要吸引雌性时，会变成鲜艳的绿色和蓝色"，所以鲜绿色暗示求偶行为。'

  # ============================================================
  # R004 – The Migration of Monarch Butterflies (Level 1, ~200 words, nature)
  # ============================================================
  - id: R004
    title: 'The Incredible Journey of the Monarchs'
    titleZh: '帝王蝶的不可思议之旅'
    level: 1
    wordCount: 212
    topic: nature
    tags: [Q01, month-1]
    passage: |
      Every autumn, millions of monarch butterflies begin one of the longest journeys in the animal kingdom. They fly from Canada and the northern United States all the way to central Mexico — a distance of up to 4,800 kilometres.

      What makes this migration truly remarkable is that no single butterfly completes the round trip. The butterflies that fly south in autumn spend the winter resting in the forests of Mexico. In spring, they begin flying north again, but they lay eggs along the way and then die. Their children continue the journey northward. It takes three or four generations to reach Canada again.

      Yet somehow, the great-great-grandchildren know exactly where to go when autumn returns. Scientists are still amazed by this. They believe the butterflies use a combination of the sun's position and the Earth's magnetic field to navigate.

      The forests where the monarchs spend winter are very important. Local people in Mexico call the arriving butterflies "the souls of the ancestors" and celebrate their return every year. Sadly, these forests are shrinking because of logging and climate change.

      Many countries are now working together to protect the monarch butterflies and the forests they depend on. It would be a great loss if this incredible journey ever came to an end.
    passageZh: |
      每年秋天，数百万只帝王蝶开始动物界最漫长的旅程之一。它们从加拿大和美国北部一路飞到墨西哥中部——距离长达4800公里。

      使这次迁徙真正了不起的是，没有一只蝴蝶能完成整个往返旅程。秋天南飞的蝴蝶在墨西哥的森林里度过冬天。春天，它们开始再次北飞，但沿途产卵后就死去了。它们的后代继续北上的旅程。要经过三到四代才能再次回到加拿大。

      然而不知何故，到了秋天，曾曾孙辈们竟然确切知道该飞向哪里。科学家们对此仍然感到惊奇。他们认为蝴蝶利用太阳的位置和地球磁场的组合来导航。

      帝王蝶过冬的森林非常重要。墨西哥当地人把飞来的蝴蝶称为"祖先的灵魂"，每年都会庆祝它们的到来。遗憾的是，由于伐木和气候变化，这些森林正在缩小。

      许多国家正在合作保护帝王蝶和它们赖以生存的森林。如果这段不可思议的旅程有一天终结了，那将是巨大的损失。
    vocabHighlights:
      - word: migration
        ref: V0009
      - word: remarkable
        ref: V0010
      - word: navigate
        ref: V0011
    questions:
      - id: R004-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'How butterflies are different from moths'
          B: 'The long migration journey of monarch butterflies'
          C: 'Why Mexico has many beautiful forests'
          D: 'How scientists study insects in Canada'
        answer: 'B'
        explanation: 'The passage describes the monarch butterflies'' incredible migration from Canada to Mexico and back over multiple generations.'
        explanationZh: '文章描述了帝王蝶从加拿大到墨西哥再返回的、跨越数代的不可思议的迁徙。'
      - id: R004-Q2
        type: detail
        question: 'How far do monarch butterflies fly during their migration?'
        questionZh: '帝王蝶在迁徙中飞行多远？'
        options:
          A: 'Up to 480 kilometres'
          B: 'Up to 1,200 kilometres'
          C: 'Up to 4,800 kilometres'
          D: 'Up to 48,000 kilometres'
        answer: 'C'
        explanation: 'The passage states the distance is "up to 4,800 kilometres."'
        explanationZh: '文章说距离"长达4800公里"。'
      - id: R004-Q3
        type: detail
        question: 'How many generations does it take to complete the round trip?'
        questionZh: '完成一次往返旅程需要几代蝴蝶？'
        options:
          A: 'One generation'
          B: 'Two generations'
          C: 'Three or four generations'
          D: 'Five or six generations'
        answer: 'C'
        explanation: 'The passage says "It takes three or four generations to reach Canada again."'
        explanationZh: '文章说"要经过三到四代才能再次回到加拿大"。'
      - id: R004-Q4
        type: inference
        question: 'Why are people in many countries working together to help monarch butterflies?'
        questionZh: '为什么很多国家的人在合作帮助帝王蝶？'
        options:
          A: 'Because monarch butterflies are worth a lot of money'
          B: 'Because the butterflies'' winter forests are in danger'
          C: 'Because monarchs carry pollen that helps farmers'
          D: 'Because monarchs are the national symbol of Mexico'
        answer: 'B'
        explanation: 'The passage explains that the forests are "shrinking because of logging and climate change," which threatens the monarchs'' survival, motivating international cooperation.'
        explanationZh: '文章解释了森林"由于伐木和气候变化正在缩小"，这威胁到帝王蝶的生存，促使了国际合作。'

  # ============================================================
  # R005 – A Parrot That Learned to Count (Level 1, ~200 words, animals)
  # ============================================================
  - id: R005
    title: 'Polly Counts to Ten'
    titleZh: '波莉数到十'
    level: 1
    wordCount: 205
    topic: animals
    tags: [Q01, month-1]
    passage: |
      Dr Irene Pepper was a scientist who studied animal intelligence. For years, she worked with an African grey parrot named Polly. Most people thought parrots could only copy sounds without understanding them. Dr Pepper wanted to prove them wrong.

      She began by showing Polly different objects — blocks, balls, and buttons — in various colours. She would hold up three red blocks and say "three." After months of patient training, Polly could look at a group of objects and say the correct number, up to ten.

      But Polly could do more than just count. If Dr Pepper showed her five green balls and asked, "How many green?" Polly would answer "five." If she then asked, "How many blue?" Polly would say "none." She truly understood what the numbers meant.

      Other scientists were amazed. Some tested Polly themselves and confirmed that her answers were not just tricks. She could even add small numbers together. When shown two nuts and then three more, she would say "five."

      Polly lived for thirty years and became one of the most famous research animals in history. Her story changed the way scientists think about bird brains — which, it turns out, are much cleverer than anyone expected.
    passageZh: |
      艾琳·佩珀博士是一位研究动物智力的科学家。多年来，她一直和一只叫波莉的非洲灰鹦鹉一起工作。大多数人认为鹦鹉只会模仿声音，并不理解含义。佩珀博士想证明他们是错的。

      她先给波莉展示不同的物品——积木、球和纽扣——各种颜色的。她会举起三块红色积木说"三"。经过几个月耐心的训练，波莉能看着一组物品说出正确的数量，最多到十。

      但波莉能做的不只是数数。如果佩珀博士给她看五个绿色球并问"多少个绿色的？"波莉会回答"五个"。如果她接着问"多少个蓝色的？"波莉会说"没有"。她真正理解了数字的含义。

      其他科学家都很惊讶。一些人亲自测试了波莉，确认她的回答不只是把戏。她甚至能把小数字加在一起。当看到两颗坚果然后又来了三颗时，她会说"五"。

      波莉活了三十年，成为历史上最著名的研究动物之一。她的故事改变了科学家对鸟类大脑的看法——事实证明，鸟类比任何人预想的都要聪明得多。
