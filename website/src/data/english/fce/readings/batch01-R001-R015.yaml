  # ============================================================
  # R013 – The Race to the South Pole (Level 1.5, ~250 words, adventure)
  # ============================================================
  - id: R013
    title: 'The Race to the South Pole'
    titleZh: '南极争夺战'
    level: 1.5
    wordCount: 255
    topic: adventure
    tags: [Q01, month-1]
    passage: |
      In 1911, two teams set out on one of the greatest races in history — the race to reach the South Pole first. One team was led by Roald Amundsen from Norway. The other was led by Robert Scott from Britain. Both men were experienced explorers, but they had very different approaches.

      Amundsen planned carefully. He chose to use sled dogs, which were fast and well-suited to icy conditions. He set up supply stations along the route and marked them clearly with flags so they would be easy to find, even in blizzards. His team wore fur clothing, which kept them warm and dry.

      Scott, on the other hand, relied partly on motor sledges and ponies. The motors broke down in the extreme cold, and the ponies struggled in the deep snow. His team eventually had to pull the heavy sledges themselves. Their clothing was also less effective against the freezing temperatures.

      Amundsen reached the South Pole on 14 December 1911, more than a month before Scott. When Scott's team finally arrived on 17 January 1912, they found the Norwegian flag already flying there. The disappointment was crushing.

      Tragically, Scott and his four companions did not survive the return journey. They ran out of food and fuel, and a terrible blizzard trapped them in their tent. Their frozen journals were found months later by a search party.

      The story of the South Pole race teaches us that careful preparation can make the difference between success and failure, especially when facing nature's greatest challenges.
    passageZh: |
      1911年，两支队伍开始了历史上最伟大的竞赛之一——争夺第一个到达南极的荣誉。一支队伍由挪威人罗阿尔德·阿蒙森率领，另一支由英国人罗伯特·斯科特率领。两人都是经验丰富的探险家，但他们的方式截然不同。

      阿蒙森计划周密。他选择使用雪橇犬，速度快且非常适应冰雪条件。他沿途设立了补给站，并用旗帜清晰标记，这样即使在暴风雪中也容易找到。他的团队穿着皮毛衣物，保暖又防潮。

      而斯科特则部分依赖机动雪橇和马匹。发动机在极端寒冷中坏了，马匹在深雪中举步维艰。他的团队最终不得不自己拉着沉重的雪橇。他们的衣服在抵御严寒方面也不太有效。

      阿蒙森于1911年12月14日到达南极点，比斯科特早了一个多月。当斯科特的团队终于在1912年1月17日抵达时，他们发现挪威国旗已经在那里飘扬。那种失望是毁灭性的。

      悲剧的是，斯科特和他的四位同伴没有在返程中幸存。他们的食物和燃料耗尽了，一场可怕的暴风雪把他们困在帐篷里。几个月后，搜索队找到了他们被冻住的日记。

      南极竞赛的故事告诉我们，周密的准备能决定成败，尤其是在面对自然界最大挑战的时候。
