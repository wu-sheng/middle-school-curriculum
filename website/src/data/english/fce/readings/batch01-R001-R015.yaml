  # ============================================================
  # R014 – Why Some Animals Glow in the Dark (Level 1.5, ~250 words, science)
  # ============================================================
  - id: R014
    title: 'Living Lights: Animals That Glow'
    titleZh: '活着的灯：会发光的动物'
    level: 1.5
    wordCount: 250
    topic: science
    tags: [Q01, month-1]
    passage: |
      Deep in the ocean, where sunlight cannot reach, something extraordinary happens. Tiny creatures light up the darkness like underwater stars. This ability is called bioluminescence, and it is one of nature's most fascinating tricks.

      Bioluminescence works through a chemical reaction inside an animal's body. A substance called luciferin reacts with oxygen to produce light. Unlike a light bulb, this process creates almost no heat, which is why scientists call it "cold light." Many different animals can produce it — from jellyfish and squid to certain types of beetles and mushrooms on land.

      But why would an animal want to glow? There are several clever reasons. Some deep-sea fish use light to attract prey. The anglerfish, for example, has a glowing lure that dangles above its mouth. When a smaller fish swims toward the light, the anglerfish snaps it up. Other creatures glow to confuse predators. Some squid release glowing ink into the water, creating a bright cloud that allows them to escape while their enemy is distracted.

      Fireflies, which are actually beetles, use their flashing lights to find a partner. Each species has its own unique pattern of flashes, so a firefly always knows which signals belong to its own kind.

      Scientists are now studying bioluminescence for practical uses. The genes that make jellyfish glow have already been used in medical research to track diseases inside the human body. One day, glowing plants might even replace street lights, saving energy and helping the environment.

      The living lights of nature still have many secrets to reveal.
    passageZh: |
      在阳光无法到达的深海中，不可思议的事情正在发生。微小的生物像水下的星星一样照亮了黑暗。这种能力叫做生物发光，是大自然最迷人的本领之一。

      生物发光通过动物体内的化学反应实现。一种叫做荧光素的物质与氧气反应产生光。与灯泡不同，这个过程几乎不产生热量，这就是科学家称之为"冷光"的原因。许多不同的动物都能产生它——从水母和鱿鱼到陆地上某些种类的甲虫和蘑菇。

      但动物为什么要发光呢？有好几个巧妙的原因。一些深海鱼用光来吸引猎物。比如，鮟鱇鱼头上悬挂着一个发光的"诱饵"。当小鱼游向光源时，鮟鱇鱼一口把它吃掉。其他生物发光是为了迷惑捕食者。有些鱿鱼会向水中释放发光的墨汁，制造出明亮的烟幕，趁敌人分心时逃跑。

      萤火虫其实是甲虫，它们用闪烁的光来寻找伴侣。每个物种都有自己独特的闪烁模式，所以萤火虫总是知道哪些信号是同类发出的。

      科学家现在正在研究生物发光的实际用途。使水母发光的基因已经被用于医学研究中追踪人体内的疾病。有一天，发光的植物甚至可能取代路灯，节约能源并保护环境。

      大自然的生命之光还有许多秘密等待揭示。
