  - id: R025
    title: 'The Search for the Snow Leopard'
    titleZh: '寻找雪豹'
    level: 2
    wordCount: 303
    topic: adventure
    tags: [Q02, month-2]
    passage: |
      High in the mountains of Central Asia, where the air is thin and the wind
      howls through frozen passes, lives one of the world's most elusive creatures:
      the snow leopard. Dr Mei Zhang, a wildlife biologist who had spent fifteen
      years studying big cats, was leading an expedition to photograph one in the
      wild — something very few people have ever managed to do.

      Snow leopards, which are sometimes called "ghosts of the mountains," are
      incredibly difficult to spot. Their pale grey fur, covered in dark rosette
      patterns, blends perfectly with the rocky mountainside. They live at altitudes
      of up to 5,500 metres and hunt mainly at dawn and dusk, when the light is dim.

      Dr Zhang's team set up camp at 4,000 metres in the Tian Shan mountains of
      Kyrgyzstan. For three weeks, they placed camera traps along mountain ridges
      and near streams where prey animals came to drink. Every morning, the team
      hiked for hours to check the cameras, battling freezing temperatures that
      dropped to minus thirty degrees.

      On the twenty-second day, when hope was beginning to fade, one camera captured
      something extraordinary: a female snow leopard with two cubs walking along a
      narrow ledge. The images showed the mother teaching her young ones how to
      navigate the steep terrain. In one remarkable photograph, a cub was leaping
      across a gap between two rocks while the mother watched carefully.

      Dr Zhang said the photographs were among the best ever taken of snow leopards
      in the wild. But she also shared worrying news: there are fewer than 7,000
      snow leopards left in the world, and their habitat is shrinking due to climate
      change. "These magnificent animals need our protection," she said. "If we do
      not act now, future generations may only ever see them in photographs."
    passageZh: |
      在中亚的高山上，空气稀薄，寒风呼啸穿过冰冻的山口，生活着世界上最神出鬼没的
      动物之一：雪豹。梅·张博士是一位研究大型猫科动物十五年的野生动物学家，她正带
      领一个探险队在野外拍摄雪豹——很少有人能做到这一点。

      雪豹有时被称为"山中幽灵"，极其难以发现。它们淡灰色的皮毛上覆盖着深色的玫瑰
      花纹，与岩石山坡完美融合。它们生活在高达5,500米的海拔，主要在黎明和黄昏时分
      捕猎，那时光线昏暗。

      张博士的团队在吉尔吉斯斯坦天山4,000米处扎营。三个星期里，他们沿着山脊和猎
      物来喝水的溪流附近放置了相机陷阱。每天早上，团队徒步数小时检查相机，与降至
      零下三十度的严寒作斗争。

      在第二十二天，当希望开始消退时，一台相机捕捉到了非凡的画面：一只带着两只幼
      崽的雌性雪豹沿着狭窄的岩架行走。图像显示母亲在教小雪豹如何穿越陡峭的地形。
      在一张令人惊叹的照片中，一只幼崽正在两块岩石之间的间隙跳跃，而母亲在一旁仔
      细观察。

      张博士说这些照片是有史以来在野外拍摄到的最好的雪豹照片之一。但她也分享了令
      人担忧的消息：世界上只剩下不到7,000只雪豹，由于气候变化，它们的栖息地正在缩
      小。"这些壮丽的动物需要我们的保护，"她说。"如果我们现在不采取行动，后代可能
      只能在照片中看到它们了。"
