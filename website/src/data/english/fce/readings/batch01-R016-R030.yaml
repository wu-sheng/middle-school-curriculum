  - id: R024
    title: 'The Secret Code on the School Trip'
    titleZh: '校园旅行中的秘密密码'
    level: 2
    wordCount: 308
    topic: detective
    tags: [Q02, month-2]
    passage: |
      Emma Park loved puzzles more than anything. So when her class visited an old
      country house that had once belonged to a famous spy, she could not stop
      looking at everything closely. While her classmates admired the grand staircase
      and the beautiful gardens, Emma was drawn to a series of strange scratches on
      the library wall.

      The tour guide, who noticed Emma's interest, explained that the house's former
      owner, Colonel Blackwood, had been a codebreaker during the Second World War.
      "Some people believe he hid a secret message somewhere in this house," said
      the guide with a smile, "but nobody has ever found it."

      That was all Emma needed to hear. She took a photograph of the scratches and
      spent the entire bus ride home studying them. The marks were arranged in groups
      of five, which reminded her of something she had learned in her maths class —
      a tally system. But these tallies were different. Some lines were vertical,
      some horizontal, and some diagonal.

      That evening, Emma researched military codes from the 1940s and found something
      that matched perfectly: a pigpen cipher, which was a simple code that replaced
      letters with geometric shapes. She carefully decoded each group of marks and
      watched in amazement as words began to appear: "BENEATH THE THIRD STONE OF
      THE EASTERN FIREPLACE."

      Emma emailed the country house museum with her discovery. The curator, who
      was sceptical at first, agreed to investigate. When workers lifted the third
      stone of the eastern fireplace, they found a small metal box containing
      Colonel Blackwood's personal diary and several documents that historians
      described as extremely valuable.

      Emma received a special award from the museum, and her photograph was placed
      in the exhibition next to the decoded message. She had cracked a code that
      had remained unsolved for over seventy years.
    passageZh: |
      艾玛·帕克比什么都喜欢解谜。所以当她的班级参观一座曾属于一位著名间谍的老乡村
      庄园时，她忍不住仔细打量每样东西。当同学们在欣赏宏伟的楼梯和美丽的花园时，
      艾玛被图书馆墙上一系列奇怪的刮痕吸引住了。

      导游注意到了艾玛的兴趣，解释说这座房子的前任主人布莱克伍德上校曾是二战时期
      的密码破译员。"有人相信他在这座房子里藏了一条秘密信息，"导游笑着说，"但从来
      没有人找到过。"

      这就是艾玛需要听到的。她拍下了刮痕的照片，整个回家的巴士旅程都在研究它们。
      这些标记以五个为一组排列，让她想起了在数学课上学到的东西——计数系统。但这些
      计数符号不同。有些线是竖的，有些是横的，有些是斜的。

      那天晚上，艾玛研究了1940年代的军事密码，找到了一个完美匹配的东西：猪圈密码，
      这是一种用几何形状替代字母的简单密码。她仔细解读了每组标记，惊奇地看着文字
      开始出现："在东边壁炉的第三块石头下面。"

      艾玛将她的发现通过电子邮件发给了乡村庄园博物馆。馆长起初持怀疑态度，但还是
      同意调查。当工人们掀起东边壁炉的第三块石头时，他们发现了一个小金属盒，里面
      装着布莱克伍德上校的个人日记和几份被历史学家描述为极其珍贵的文件。

      艾玛获得了博物馆的特别奖，她的照片被放在展览中解码信息的旁边。她破解了一个
      七十多年来无人能解的密码。
