    passage: |
      Maya Chen, who was only twelve years old, had always dreamed of becoming a
      detective. So when the school's most valuable painting disappeared from the
      art room, she knew this was her chance.

      The painting, which showed a beautiful sunset over the ocean, had been donated
      by a famous local artist. It had hung on the wall for fifteen years. On Monday
      morning, the art teacher, Mrs Palmer, arrived to find an empty frame and a
      small scratch on the window ledge.

      The headteacher called the police, but Maya had already started her own
      investigation. She noticed three important clues that the adults had missed.
      First, there were tiny flakes of blue paint on the floor beneath the window —
      but the painting was mostly orange and red. Second, the scratch on the window
      ledge was on the inside, not the outside, which meant the window had been
      opened from within the school. Third, she noticed muddy footprints that led
      not to the main entrance, but toward the science block.

      Maya remembered that the science department had recently received new blue
      paint for their display boards. She hurried to the science corridor, where
      she found more blue paint flakes near a storage cupboard. Inside the cupboard,
      hidden behind a stack of textbooks, was the missing painting.

      But who had taken it? Maya checked the sign-out sheet for the science building
      and found that only one person had been in the building over the weekend — Mr
      Davis, the caretaker, who had reported a broken lock on Saturday. When
      questioned, Mr Davis admitted he had moved the painting because he was worried
      about a leak in the art room ceiling. He had planned to return it on Monday
      but forgot.

      The mystery was solved, and Maya became the school's youngest detective hero.
