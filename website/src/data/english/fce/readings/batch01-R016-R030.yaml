  - id: R027
    title: 'From Jungle Beans to Candy Bars'
    titleZh: '从丛林豆子到糖果棒'
    level: 2.5
    wordCount: 322
    topic: science
    tags: [Q02, month-2]
    passage: |
      The next time you bite into a chocolate bar, consider this: the journey from
      raw cacao bean to finished chocolate is one of the most remarkable
      transformations in the history of food. It is a story that stretches back over
      3,000 years, beginning in the steamy rainforests of Central America.

      The ancient Maya and Aztec civilisations were the first people known to use
      cacao. However, their chocolate was nothing like what we eat today. They
      ground roasted cacao beans into a paste, mixed it with water, chilli peppers,
      and cornmeal, and drank it as a bitter, frothy beverage. The Aztecs valued
      cacao so highly that they used the beans as currency — ten beans could buy
      a rabbit, and a hundred could buy a slave.

      When Spanish explorers arrived in Mexico in the sixteenth century, they
      encountered this unusual drink and brought cacao beans back to Europe. At
      first, Europeans found the bitter taste unpleasant, so they began adding
      sugar and vanilla. The sweetened drink quickly became fashionable among
      wealthy Europeans, and chocolate houses — similar to modern coffee shops —
      appeared in London, Paris, and Amsterdam.

      The real breakthrough came in 1828, when a Dutch chemist named Coenraad van
      Houten invented a press that could separate cacao butter from the ground
      beans. This innovation made it possible to create smooth, solid chocolate
      for the first time. In 1847, a British company called J.S. Fry & Sons
      produced the world's first chocolate bar by combining cacao powder, sugar,
      and melted cacao butter.

      Today, the global chocolate industry is worth over 130 billion dollars, and
      approximately 4.7 million tonnes of cacao beans are harvested each year,
      mainly in West Africa. Yet the basic process remains surprisingly similar to
      what the Maya practised thousands of years ago: harvest the pods, ferment the
      beans, dry them in the sun, and roast them to release that irresistible
      chocolate flavour.
    passageZh: |
      下次你咬一口巧克力棒的时候，想想这个：从生可可豆到成品巧克力的旅程，是食品
      历史上最了不起的转变之一。这个故事可以追溯到3,000多年前，始于中美洲闷热的
      雨林。

      古代玛雅和阿兹特克文明是已知最早使用可可的人。然而，他们的巧克力完全不像我
      们今天吃的。他们把烘烤过的可可豆磨成糊状，与水、辣椒和玉米面混合，作为一种
      苦涩的泡沫饮料饮用。阿兹特克人非常重视可可，甚至用可可豆当货币——十颗豆子可
      以买一只兔子，一百颗可以买一个奴隶。

      十六世纪西班牙探险家到达墨西哥时，他们遇到了这种不寻常的饮料，并把可可豆带
      回了欧洲。起初，欧洲人觉得苦味令人不快，所以他们开始加入糖和香草。加了糖的
      饮料迅速在富裕的欧洲人中流行起来，巧克力屋——类似于现代的咖啡店——在伦敦、巴
      黎和阿姆斯特丹出现了。

      真正的突破发生在1828年，一位名叫科恩拉德·范·豪顿的荷兰化学家发明了一种压力
      机，可以从研磨的豆子中分离可可脂。这项创新使得首次制造出光滑固体巧克力成为
      可能。1847年，一家名为J.S.弗莱父子公司的英国公司将可可粉、糖和融化的可可脂
      结合在一起，生产出了世界上第一根巧克力棒。

      今天，全球巧克力产业价值超过1,300亿美元，每年收获大约470万吨可可豆，主要在
      西非。然而，基本过程与数千年前玛雅人的做法惊人地相似：收获豆荚、发酵豆子、
      在阳光下晾晒，然后烘烤以释放那令人无法抗拒的巧克力风味。
