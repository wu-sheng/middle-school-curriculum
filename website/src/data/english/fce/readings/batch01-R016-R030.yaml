    tags: [Q02, month-2]
    passage: |
      On a grey October morning, the entire town of Willowbrook gathered in the
      square to witness something that had not happened in a century. Buried beneath
      the old oak tree in the centre of the square was a copper box that had been
      placed there exactly one hundred years ago. Today, it would finally be opened.

      Mayor Hartley, who could barely contain her excitement, carefully lifted the
      corroded lid. Inside, wrapped in oilcloth that had kept the moisture out for
      a hundred years, were objects that told the story of a very different world.
      There was a handwritten letter from the town's 1926 mayor, a copy of the local
      newspaper dated 15th October 1926, three photographs of the town centre, a
      child's drawing of a horse and cart, and a sealed glass bottle containing
      seeds from the town's famous apple orchard.

      The crowd fell silent as Mayor Hartley read the letter aloud. "To the people
      of Willowbrook, one hundred years from now," it began. "We are a small town
      of 800 souls. We have just received our first motor car. The children attend
      a one-room schoolhouse, and our main industry is apple farming. We wonder
      what your world looks like. Do you still tend the orchard? Do the children
      still play by the river?"

      Many people in the crowd were visibly moved. The photographs showed a town
      that was both recognisable and utterly transformed. The church and the oak
      tree were still standing, but everything else had changed — the dirt roads
      were now paved, the horse-drawn carts replaced by cars, and the one-room
      school was now a modern building with a computer lab.

      The townspeople decided to plant the century-old apple seeds and bury a new
      time capsule for the year 2126. This time, they included a smartphone, a USB
      drive of family photos, a face mask from the pandemic years, and letters from
      every child in the local school, each one beginning with: "To the people of
      Willowbrook, one hundred years from now..."
    passageZh: |
      在一个灰蒙蒙的十月早晨，整个柳溪镇的人聚集在广场上，见证一件百年来从未发生
      过的事情。广场中央老橡树下面埋着一个铜盒子，正好是一百年前放在那里的。今天，
      它终于要被打开了。

      哈特利镇长几乎抑制不住自己的激动，小心地揭开了腐蚀的盖子。里面用油布包裹着
      ——油布已经为这些物品挡了一百年的潮气——是一些讲述着完全不同世界的物品。有一
      封1926年镇长手写的信，一份标注日期为1926年10月15日的当地报纸，三张镇中心的
      照片，一幅孩子画的马车图画，还有一个密封的玻璃瓶，里面装着镇上著名苹果园的
      种子。

      当哈特利镇长大声朗读那封信时，人群安静了下来。"致一百年后的柳溪镇人民，"信
      的开头写道。"我们是一个只有800人的小镇。我们刚刚有了第一辆汽车。孩子们在一
      间教室的学校上学，我们的主要产业是种苹果。我们想知道你们的世界是什么样的。你
      们还在照料果园吗？孩子们还在河边玩耍吗？"

      人群中许多人明显被感动了。照片展示了一个既熟悉又彻底改变了的小镇。教堂和橡
      树还在，但其他一切都变了——土路变成了铺好的路面，马车被汽车取代，一间教室的
      学校现在是一栋有电脑室的现代建筑。

      镇民们决定种下百年前的苹果种子，并为2126年埋下一个新的时间胶囊。这次，他们
      放入了一部智能手机、一个装满全家福的U盘、一个疫情年代的口罩，以及当地学校每
      个孩子写的一封信，每封信都以这样开头："致一百年后的柳溪镇人民……"
