  - id: R020
    title: 'The Secret Life of Trees'
    titleZh: '树木的秘密生活'
    level: 2
    wordCount: 286
    topic: science
    tags: [Q02, month-2]
    passage: |
      If you walk through a quiet forest, you might think that the trees around you
      are standing alone, each one separate from the others. But beneath your feet,
      something incredible is happening. The trees are talking to each other — through
      an underground network of fungi.

      Scientists have discovered that tree roots are connected by tiny threads of
      fungi called mycelium. These threads spread through the soil like a vast
      internet, linking nearly every tree in the forest. Researchers have nicknamed
      this system the "Wood Wide Web."

      Through this network, trees can share food. A tall tree with plenty of
      sunlight can send sugars through the fungi to a smaller tree growing in the
      shade. Mother trees — the oldest and largest in the forest — have been found
      to send extra nutrients to their own seedlings, helping them survive in the
      dark forest floor.

      But the network does more than share food. When a tree is attacked by insects,
      it can send chemical warning signals through the fungi. Neighbouring trees
      receive these signals and begin producing defensive chemicals in their leaves
      before the insects even reach them. It is as if the trees have their own
      alarm system.

      Some scientists believe that trees even share resources with sick neighbours.
      When a tree is dying, it sometimes releases its stored nutrients into the
      network for others to use. In this way, the forest acts less like a group
      of individuals and more like a single, connected community.

      These discoveries have changed the way many people think about forests. Trees
      are not competing against each other for survival. Instead, they cooperate,
      communicate, and care for one another in ways that scientists are only
      beginning to understand.
    passageZh: |
      如果你走过一片安静的森林，你可能会认为周围的树木各自独立，彼此分开。但在你脚
      下，不可思议的事情正在发生。树木正在通过地下真菌网络互相交流。

      科学家发现，树根通过一种叫做菌丝的微小真菌线相连。这些线在土壤中像一个巨大
      的互联网一样扩展，将森林中几乎每棵树都连接起来。研究人员给这个系统起了个绰
      号叫"树木万维网"。

      通过这个网络，树木可以分享食物。一棵有充足阳光的高大树木可以通过真菌向一棵
      生长在阴影中的小树发送糖分。母树——森林中最老最大的树——被发现会向自己的幼苗
      发送额外的营养物质，帮助它们在阴暗的林地上存活。

      但这个网络不仅仅分享食物。当一棵树遭受昆虫攻击时，它可以通过真菌发送化学警
      告信号。邻近的树木接收到这些信号后，会在昆虫到达之前就开始在叶子中产生防御
      性化学物质。就好像树木有自己的警报系统一样。

      一些科学家认为，树木甚至会与生病的邻居分享资源。当一棵树要死亡时，它有时会
      将储存的营养物质释放到网络中供其他树木使用。这样，森林的表现不像一群个体，
      更像一个紧密联系的社区。

      这些发现改变了许多人对森林的看法。树木并不是在为生存而互相竞争。相反，它们
      合作、交流，并以科学家才刚刚开始理解的方式互相关爱。
