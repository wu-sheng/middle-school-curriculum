    passage: |
      In the highest peaks of the Kunlun Mountains, where clouds wrapped around
      the summits like silk scarves, there lived an old woman named Grandmother
      Yun. The villagers in the valley below whispered that she was the last of the
      Dragon Keepers — a line of guardians who had protected the mountain dragons
      for over a thousand years.

      Nobody had seen a dragon in living memory, and most people believed they were
      nothing more than legends. But Grandmother Yun knew the truth. Deep inside a
      cave behind a frozen waterfall, the last dragon in the world was sleeping. It
      had been asleep for two hundred years, and it was her duty to watch over it
      until the day it woke.

      Every morning, Grandmother Yun climbed the steep path to the cave, carrying
      dried herbs that she burned at the entrance. The fragrant smoke, which she
      called "dragon's breath," kept the cave warm and protected the sleeping
      creature from the bitter mountain cold. She checked the dragon's enormous
      scales, each one the size of a dinner plate and shimmering with colours that
      shifted between emerald green and deep sapphire blue.

      One winter, a young girl named Lin arrived at Grandmother Yun's door, sent
      by her parents to learn traditional medicine. The old woman recognised
      something in Lin's eyes — the same quiet determination that every Dragon
      Keeper had possessed. Slowly, she began teaching Lin the ancient knowledge:
      which herbs to burn, which songs to sing at the cave entrance, and how to
      read the subtle changes in the dragon's breathing that indicated when it
      might finally stir.

      "The dragon will wake when the world needs it most," Grandmother Yun told
      Lin on a snowy evening. "And when it does, you must be ready." She placed a
      jade pendant around Lin's neck — the symbol of the Dragon Keepers that had
      been passed down through forty generations. "You are no longer just my
      student," she whispered. "You are the next Keeper."
    passageZh: |
      在昆仑山的最高峰上，云朵像丝巾一样缠绕着山顶，住着一位名叫云奶奶的老妇人。
      山谷下面的村民低声说她是最后一位守龙人——一个保护山龙超过一千年的守护者家族。

      在世人的记忆中没有人见过龙，大多数人认为龙不过是传说。但云奶奶知道真相。在
      一个冰冻瀑布后面的洞穴深处，世界上最后一条龙正在沉睡。它已经睡了两百年，而
      她的责任就是守护它，直到它醒来的那天。

      每天早上，云奶奶都会爬上通往洞穴的陡峭小路，携带着干燥的草药在洞口燃烧。那
      芳香的烟雾，她称之为"龙息"，让洞穴保持温暖，保护沉睡的生灵免受刺骨的山间寒
      冷。她检查龙巨大的鳞片，每一片都有餐盘那么大，闪烁着在翡翠绿和深蓝宝石色之
      间变幻的色彩。

      一个冬天，一个名叫林的小女孩来到云奶奶的门前，被父母送来学习传统医学。老妇
      人在林的眼中认出了什么——每一位守龙人都具备的那种安静的坚定。慢慢地，她开始
      教林古老的知识：要烧什么草药，要在洞口唱什么歌，以及如何读懂龙呼吸中微妙的
      变化，那些变化预示着它何时可能终于要苏醒。

      "当世界最需要它的时候，龙就会醒来，"云奶奶在一个雪夜告诉林。"当那一天到来时，
      你必须做好准备。"她将一块玉坠挂在林的脖子上——这是传承了四十代的守龙人的象征。
      "你不再只是我的学生了，"她低声说。"你是下一位守护者。"
