  - id: R026
    title: 'The Puzzle-Solving Octopus'
    titleZh: '解谜的章鱼'
    level: 2.5
    wordCount: 318
    topic: science
    tags: [Q02, month-2]
    passage: |
      When scientists at the Seattle Aquarium placed a locked jar of shrimp inside
      an octopus tank, they expected the experiment to take days. Instead, the
      octopus studied the jar for a few minutes, wrapped its flexible arms around
      the lid, and unscrewed it in under two minutes. The researchers were
      astonished. This was no accident — the octopus had figured out how the jar
      worked by watching the scientists open similar containers.

      Octopuses are widely considered to be the most intelligent invertebrates on
      Earth. Despite having no bones and a body made mostly of soft tissue, they
      possess approximately 500 million neurons — roughly the same number as a dog.
      Remarkably, about two-thirds of these neurons are located in their arms, which
      means each arm can taste, touch, and even "think" independently.

      In laboratories around the world, octopuses have demonstrated abilities that
      were once thought to be limited to mammals and birds. They can navigate complex
      mazes, recognise individual human faces, and use tools. In one famous
      experiment, an octopus in New Zealand named Inky escaped from his tank by
      squeezing through a tiny gap, crawling across the floor, and sliding down a
      drainpipe into the ocean. The aquarium staff only discovered his escape the
      next morning.

      Perhaps most impressive is the octopus's ability to solve problems it has
      never encountered before. Scientists have observed octopuses carrying coconut
      shells across the ocean floor and assembling them into shelters — a behaviour
      that requires planning and forethought, which are considered signs of advanced
      intelligence.

      However, there is a tragic side to octopus intelligence. Most species live
      for only one to two years. This means that unlike humans, who pass knowledge
      from generation to generation, each octopus must learn everything from scratch.
      Scientists wonder what these extraordinary creatures could achieve if they
      lived longer — and whether they might one day be recognised as having rights
      similar to other intelligent animals.
    passageZh: |
      当西雅图水族馆的科学家把一个装着虾的密封罐放进章鱼水箱时，他们预计实验需要
      好几天。然而，章鱼研究了罐子几分钟，用它灵活的触手缠绕住盖子，不到两分钟就
      拧开了。研究人员惊呆了。这不是偶然——章鱼通过观察科学家打开类似容器，已经弄
      懂了罐子的工作原理。

      章鱼被广泛认为是地球上最聪明的无脊椎动物。尽管没有骨骼，身体主要由软组织组
      成，它们拥有大约5亿个神经元——大约与一只狗的数量相同。值得注意的是，这些神经
      元中大约三分之二位于它们的触手中，这意味着每条触手都能独立地品尝、触摸，甚
      至"思考"。

      在世界各地的实验室里，章鱼展示了曾被认为仅限于哺乳动物和鸟类的能力。它们能
      穿越复杂的迷宫，识别不同人的面孔，还能使用工具。在一个著名的实验中，新西兰
      一只名叫"墨水"的章鱼通过挤过一个小缝隙逃出了水箱，爬过地板，滑下排水管进入
      了大海。水族馆工作人员第二天早上才发现它逃走了。

      也许最令人印象深刻的是章鱼解决从未遇到过的问题的能力。科学家观察到章鱼在海
      底搬运椰子壳，并将它们组装成庇护所——这种行为需要规划和预见能力，被视为高级
      智慧的标志。

      然而，章鱼的智慧也有悲剧的一面。大多数种类只能活一到两年。这意味着与人类不
      同——人类可以将知识代代相传——每只章鱼都必须从零开始学习一切。科学家们好奇，
      如果这些非凡的生物活得更久，它们能取得什么成就——以及它们是否有朝一日会被承
      认拥有与其他聪明动物类似的权利。
    vocabHighlights:
      - word: astonished
        ref: V0083
      - word: demonstrate
        ref: V0110
      - word: approximately
        ref: V0100
    questions:
      - id: R026-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
