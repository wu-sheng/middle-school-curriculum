  - id: R023
    title: 'The Cave of Ancient Drawings'
    titleZh: '古老洞画的洞穴'
    level: 2
    wordCount: 305
    topic: adventure
    tags: [Q02, month-2]
    passage: |
      It was the last day of summer camp, and twelve-year-old Lily and her friends
      were hiking through a rocky valley that nobody had explored before. The trail,
      which was barely visible among the tall grass, led them to the base of a steep
      cliff. There, half-hidden behind a curtain of ivy, was the entrance to a cave.

      "Should we go in?" whispered Tom, who was already reaching for his torch.
      Lily nodded, and the three friends squeezed through the narrow opening.

      Inside, the cave was surprisingly large. Their torch beams swept across the
      walls, and suddenly Lily gasped. The walls were covered in paintings — animals,
      handprints, and strange symbols that looked ancient. There were deer with
      enormous antlers, bears standing on their hind legs, and what appeared to be
      a mammoth with long curved tusks.

      "These must be thousands of years old," said Aisha, who had read about cave
      art in her history class. "People painted these during the Ice Age, using
      natural pigments like charcoal and red ochre."

      The friends explored deeper and found a chamber where the ceiling was covered
      with dots and lines that formed patterns. Aisha suggested they might represent
      stars and constellations — a prehistoric map of the night sky.

      Lily carefully photographed everything with her phone, making sure not to
      touch any of the paintings, which she knew could be damaged by the oils on
      human skin. When they returned to camp, their leader immediately contacted
      the local university.

      Within a week, archaeologists arrived and confirmed that the paintings were
      approximately 15,000 years old. The children had made one of the most
      significant archaeological discoveries in the region. Their names were
      published in the local newspaper, and the cave, which was named "Lily's
      Cave," became a protected heritage site.
    passageZh: |
      那是夏令营的最后一天，十二岁的莉莉和她的朋友们正在一个从未有人探索过的岩石
      山谷中徒步。小径在高高的草丛中几乎看不见，把他们带到了一面陡峭悬崖的底部。
      在那里，半隐藏在一帘常春藤后面的，是一个洞穴的入口。

      "我们应该进去吗？"汤姆低声说，他已经在伸手拿手电筒了。莉莉点了点头，三个朋
      友挤过了狭窄的洞口。

      里面的洞穴出人意料地大。他们的手电筒光束扫过墙壁，突然莉莉倒吸一口气。墙上
      覆盖着绘画——动物、手印和看起来很古老的奇怪符号。有长着巨大鹿角的鹿，用后腿
      站立的熊，还有看起来像长着弯曲长牙的猛犸象。

      "这些一定有数千年的历史了，"艾莎说，她在历史课上读过关于洞穴艺术的内容。
      "人们在冰河时代用木炭和赤铁矿等天然颜料画了这些。"

      朋友们深入探索，发现了一个天花板上覆盖着点和线的房间，它们形成了图案。艾莎
      认为这些可能代表星星和星座——一幅史前的夜空地图。

      莉莉用手机仔细地拍下了一切，确保不触碰任何绘画，因为她知道人体皮肤上的油脂
      可能会损坏它们。当他们回到营地时，领队立刻联系了当地大学。

      不到一周，考古学家就来了，确认这些绘画大约有15,000年的历史。孩子们做出了该
      地区最重要的考古发现之一。他们的名字被发表在当地报纸上，洞穴被命名为"莉莉
      洞穴"，成为受保护的遗产地。
