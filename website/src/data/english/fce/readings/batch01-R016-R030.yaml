  - id: R016
    title: 'The Dance of the Honeybees'
    titleZh: '蜜蜂的舞蹈'
    level: 2
    wordCount: 280
    topic: science
    tags: [Q01, month-2]
    passage: |
      Deep inside a busy beehive, something remarkable is happening. A honeybee
      has just returned from a field of sunflowers, and she has important news to
      share with her sisters. But honeybees cannot speak. So how does she tell them
      where the food is? She dances.

      Scientists discovered that honeybees use two special dances to communicate.
      The first is called the "round dance." When flowers are close to the hive —
      less than fifty metres away — the bee walks in small circles. This tells the
      other bees, "There is food nearby! Go out and search for it!"

      However, when the food source is far away, the bee performs a more complicated
      dance called the "waggle dance." She moves in a figure-eight pattern while
      shaking her body from side to side. The direction she faces during the straight
      part of the dance shows the other bees which way to fly. The speed of her
      waggle tells them how far they need to travel. A slower waggle means the food
      is further away.

      What makes this even more extraordinary is that the bees can understand the
      angle of the dance in relation to the sun. Even on cloudy days, bees can
      detect the sun's position using special cells in their eyes that sense
      ultraviolet light.

      Karl von Frisch, an Austrian scientist, spent decades studying these dances.
      In 1973, he won the Nobel Prize for his discoveries. Thanks to his patient
      work, we now know that honeybees have one of the most sophisticated
      communication systems in the animal kingdom — all without saying a single word.
    passageZh: |
      在繁忙的蜂巢深处，一件了不起的事情正在发生。一只蜜蜂刚刚从一片向日葵田回来，
      她有重要的消息要和姐妹们分享。但是蜜蜂不会说话。那她怎么告诉它们食物在哪里呢？
      她用跳舞来传达信息。

      科学家发现蜜蜂用两种特殊的舞蹈来交流。第一种叫做"圆圈舞"。当花朵离蜂巢很
      近——不到五十米——蜜蜂会绕小圈行走。这告诉其他蜜蜂："附近有食物！出去找找吧！"

      然而，当食物来源很远时，蜜蜂会表演一种更复杂的舞蹈，叫做"摇摆舞"。她以8字形
      的路线移动，同时左右摇摆身体。她在舞蹈直线部分面对的方向，告诉其他蜜蜂该往哪
      个方向飞。她摇摆的速度告诉它们需要飞多远。摇摆越慢，说明食物越远。

      更令人惊叹的是，蜜蜂能够理解舞蹈角度与太阳的关系。即使在阴天，蜜蜂也能利用
      眼睛中感应紫外光的特殊细胞来探测太阳的位置。

      奥地利科学家卡尔·冯·弗里施花了几十年研究这些舞蹈。1973年，他因这些发现获得了
      诺贝尔奖。多亏了他耐心的工作，我们现在知道蜜蜂拥有动物界最精妙的交流系统之
      一——而这一切都不需要说一个字。
    vocabHighlights:
      - word: remarkable
        ref: V0089
      - word: sophisticated
        ref: V0102
      - word: complicated
        ref: V0078
    questions:
      - id: R016-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'The life cycle of honeybees in a beehive'
          B: 'How honeybees use dances to share information about food'
          C: 'Why Karl von Frisch won the Nobel Prize'
          D: 'The difference between honeybees and other insects'
        answer: B
        explanation: 'The passage focuses on explaining the two types of dances honeybees use to communicate the location of food sources to other bees.'
        explanationZh: '文章重点解释了蜜蜂用来向其他蜜蜂传达食物位置的两种舞蹈。'
      - id: R016-Q2
        type: detail
        question: 'What does the "round dance" tell other bees?'
        questionZh: '"圆圈舞"告诉其他蜜蜂什么？'
        options:
          A: 'That the food is far away and they need to fly for a long time'
          B: 'That the food is nearby, less than fifty metres from the hive'
          C: 'That there is danger near the hive'
          D: 'That the bee is tired and needs help'
        answer: B
        explanation: 'The passage states that when flowers are close — less than fifty metres away — the bee performs the round dance.'
        explanationZh: '文章指出，当花朵距离蜂巢很近——不到五十米时，蜜蜂会表演圆圈舞。'
      - id: R016-Q3
        type: detail
        question: 'During the waggle dance, what does the speed of the waggle indicate?'
        questionZh: '在摇摆舞中，摇摆的速度说明了什么？'
        options:
          A: 'The type of flower the bee found'
          B: 'How many bees should go to find the food'
          C: 'How far away the food source is'
          D: 'The size of the food source'
        answer: C
        explanation: 'The passage explains that the speed of the waggle tells the bees how far they need to travel — a slower waggle means further away.'
        explanationZh: '文章解释说，摇摆的速度告诉蜜蜂需要飞多远——摇摆越慢，说明越远。'
      - id: R016-Q4
        type: inference
        question: 'What can we infer about honeybee communication from this passage?'
        questionZh: '从这篇文章中，我们可以推断出关于蜜蜂交流的什么信息？'
        options:
          A: 'Honeybees are more intelligent than all other insects'
          B: 'Honeybees can only find food on sunny days'
          C: 'Honeybee dances carry precise and detailed information'
          D: 'Scientists still do not understand how the dances work'
        answer: C
        explanation: 'The passage describes how the dances convey direction, distance, and location relative to the sun, which shows the dances carry precise and detailed information.'
        explanationZh: '文章描述了舞蹈如何传达方向、距离和相对于太阳的位置，这说明舞蹈携带了精确而详细的信息。'

  - id: R017
    title: 'The Mystery of the Bermuda Triangle'
    titleZh: '百慕大三角之谜'
    level: 2
    wordCount: 285
    topic: science
    tags: [Q01, month-2]
    passage: |
      For over a century, sailors and pilots have feared a strange region of the
      Atlantic Ocean known as the Bermuda Triangle. This area, which stretches
      between Miami, Bermuda, and Puerto Rico, has been linked to the mysterious
      disappearance of ships and aircraft. But is the Bermuda Triangle truly
      dangerous, or is it just a collection of myths?

      The legend began in 1945 when five US Navy planes, called Flight 19, vanished
      during a training exercise. The pilots reported that their compasses had
      stopped working and they could not tell which direction was north. A rescue
      plane sent to find them also disappeared. No wreckage was ever found.

      Since then, dozens of ships and planes have reportedly gone missing in the
      area. Some people have suggested supernatural explanations — underwater alien
      bases, time portals, or even sea monsters. However, scientists have proposed
      more logical theories.

      One popular explanation involves methane gas. Large amounts of methane are
      trapped beneath the ocean floor. If this gas is suddenly released, it could
      create bubbles that reduce the water's density, causing ships to sink rapidly.
      The gas could also affect aircraft engines if it rises into the air.

      Another theory points to unusual weather patterns. The Bermuda Triangle is
      known for sudden, violent storms that can appear without warning. These storms
      could easily bring down small aircraft or capsize boats.

      Most experts today believe that the Bermuda Triangle is not actually more
      dangerous than any other part of the ocean. The number of accidents in this
      area is similar to other busy shipping routes. Perhaps the real mystery is
      why we find the idea of the Bermuda Triangle so fascinating.
    passageZh: |
      一个多世纪以来，水手和飞行员一直害怕大西洋上一个被称为百慕大三角的奇怪区域。
      这片区域位于迈阿密、百慕大和波多黎各之间，与船只和飞机的神秘消失有关。但百慕
      大三角真的危险吗，还是只是一系列神话？

      传说始于1945年，五架美国海军飞机——被称为第19飞行编队——在训练中消失了。飞行
      员报告说他们的指南针停止了工作，无法辨别哪个方向是北方。一架被派去寻找他们的
      救援飞机也消失了。从未找到任何残骸。

      从那以后，据报道有几十艘船和飞机在该地区失踪。一些人提出了超自然的解释——水下
      外星人基地、时间传送门，甚至海怪。然而，科学家们提出了更合理的理论。

      一个流行的解释涉及甲烷气体。大量的甲烷被困在海底之下。如果这种气体突然释放，
      可能会产生气泡，降低水的密度，导致船只迅速下沉。如果气体上升到空气中，也可能
      影响飞机引擎。

      另一种理论指向异常的天气模式。百慕大三角以突然出现的猛烈风暴而闻名，这些风暴
      可能毫无预警地出现。这些风暴很容易击落小型飞机或掀翻船只。

      今天大多数专家认为，百慕大三角实际上并不比海洋的其他任何部分更危险。该地区的
      事故数量与其他繁忙的航运路线相似。也许真正的谜团是，为什么我们觉得百慕大三角
      的故事如此引人入胜。
    vocabHighlights:
      - word: vanished
        ref: V0085
      - word: mysterious
        ref: V0091
    questions:
      - id: R017-Q1
        type: main-idea
        question: 'What is the main purpose of this passage?'
        questionZh: '这篇文章的主要目的是什么？'
        options:
          A: 'To prove that the Bermuda Triangle is extremely dangerous'
          B: 'To explain the mystery of the Bermuda Triangle and scientific theories about it'
          C: 'To describe the story of Flight 19 in detail'
          D: 'To convince readers that aliens exist under the ocean'
        answer: B
        explanation: 'The passage presents the Bermuda Triangle mystery and then offers scientific explanations, ultimately suggesting it may not be as dangerous as people think.'
        explanationZh: '文章介绍了百慕大三角之谜，然后提供了科学解释，最终暗示它可能没有人们想象的那么危险。'
      - id: R017-Q2
        type: detail
        question: 'What happened to the rescue plane sent to find Flight 19?'
        questionZh: '被派去寻找第19飞行编队的救援飞机怎么了？'
        options:
          A: 'It found the wreckage of Flight 19'
          B: 'It returned safely to base'
          C: 'It also disappeared without a trace'
          D: 'It was damaged by a storm but landed safely'
        answer: C
        explanation: 'The passage states that "A rescue plane sent to find them also disappeared. No wreckage was ever found."'
        explanationZh: '文章指出"一架被派去寻找他们的救援飞机也消失了。从未找到任何残骸。"'
      - id: R017-Q3
        type: detail
        question: 'According to the passage, how could methane gas cause ships to sink?'
        questionZh: '根据文章，甲烷气体如何可能导致船只沉没？'
        options:
          A: 'By creating a poisonous cloud over the water'
          B: 'By making the water freeze suddenly'
          C: 'By creating bubbles that reduce the water density'
          D: 'By causing an explosion on the ocean surface'
        answer: C
        explanation: 'The passage explains that methane gas could "create bubbles that reduce the water''s density, causing ships to sink rapidly."'
        explanationZh: '文章解释说甲烷气体可能"产生气泡，降低水的密度，导致船只迅速下沉。"'
      - id: R017-Q4
        type: inference
        question: 'What does the author most likely believe about the Bermuda Triangle?'
        questionZh: '作者最可能对百慕大三角持什么看法？'
        options:
          A: 'It is the most dangerous place on Earth'
          B: 'The supernatural explanations are probably correct'
          C: 'Its reputation is exaggerated and it is not unusually dangerous'
          D: 'Scientists will never understand what happens there'
        answer: C
        explanation: 'The final paragraph states that experts believe the area is not more dangerous than other ocean regions, and the author suggests the real mystery is why people find it so fascinating.'
        explanationZh: '最后一段指出专家认为该地区并不比其他海域更危险，作者暗示真正的谜团是为什么人们觉得它如此引人入胜。'

  - id: R018
    title: 'Life on the International Space Station'
    titleZh: '国际空间站上的生活'
    level: 2
    wordCount: 282
    topic: science
    tags: [Q02, month-2]
    passage: |
      Imagine waking up every morning and floating out of your sleeping bag. That
      is what life is like for astronauts living on the International Space Station,
      or ISS. This enormous structure orbits the Earth at a speed of about 28,000
      kilometres per hour, completing one full orbit every ninety minutes.

      Living in space is very different from life on Earth. Because there is almost
      no gravity, everything floats — including the astronauts themselves. They must
      strap themselves into sleeping bags attached to the walls so they do not drift
      away while sleeping. Eating is also a challenge. Food comes in special packets,
      and astronauts must be careful not to let crumbs float away, as they could
      damage equipment.

      Exercise is essential on the space station. Without gravity, astronauts' muscles
      and bones become weaker over time. To prevent this, each crew member exercises
      for about two hours every day using specially designed machines, including a
      treadmill and a resistance device.

      The astronauts' work involves conducting scientific experiments that cannot be
      done on Earth. They study how plants grow without gravity, test new materials,
      and even research how the human body changes during long space flights. These
      experiments help scientists prepare for future missions to the Moon and Mars.

      One of the most memorable parts of life on the ISS is the view. Astronauts
      can see sixteen sunrises and sixteen sunsets every single day. Many astronauts
      have said that looking down at our planet changed the way they think about
      Earth. Seeing how thin the atmosphere is reminds them how precious and fragile
      our home truly is.
    passageZh: |
      想象一下每天早上醒来就从睡袋里飘出来。这就是住在国际空间站（ISS）上的宇航员
      的生活。这个巨大的结构以大约每小时28,000公里的速度绕地球运行，每九十分钟完成
      一次完整的绕行。

      在太空中的生活与地球上的生活非常不同。因为几乎没有重力，一切都会漂浮——包括宇
      航员自己。他们必须把自己绑在固定在墙上的睡袋里，这样睡觉时就不会飘走。吃东西
      也是一个挑战。食物装在特殊的袋子里，宇航员必须小心不要让碎屑飘走，因为碎屑可
      能损坏设备。

      在空间站上锻炼是必不可少的。没有重力的情况下，宇航员的肌肉和骨骼会随着时间变
      弱。为了防止这种情况，每个机组成员每天使用专门设计的机器锻炼大约两个小时，包
      括跑步机和阻力训练器。

      宇航员的工作包括进行在地球上无法完成的科学实验。他们研究植物在没有重力的情况
      下如何生长，测试新材料，甚至研究人体在长时间太空飞行中如何变化。这些实验帮助
      科学家为未来的月球和火星任务做准备。

      在国际空间站生活最令人难忘的部分之一是风景。宇航员每天可以看到十六次日出和十
      六次日落。许多宇航员说，从太空俯瞰我们的星球改变了他们看待地球的方式。看到大
      气层有多薄，让他们意识到我们的家园是多么珍贵和脆弱。
    vocabHighlights:
      - word: essential
        ref: V0095
      - word: fragile
        ref: V0108
    questions:
      - id: R018-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'The history of how the ISS was built'
          B: 'What daily life is like for astronauts on the ISS'
          C: 'How to become an astronaut'
          D: 'The dangers of living in space'
        answer: B
        explanation: 'The passage describes various aspects of daily life on the ISS, including sleeping, eating, exercising, working, and the view.'
        explanationZh: '文章描述了国际空间站上日常生活的各个方面，包括睡觉、吃饭、锻炼、工作和观景。'
      - id: R018-Q2
        type: detail
        question: 'Why must astronauts exercise for two hours every day?'
        questionZh: '为什么宇航员必须每天锻炼两个小时？'
        options:
          A: 'Because there is nothing else to do on the station'
          B: 'Because the space station is very large and hard to move around'
          C: 'Because without gravity, their muscles and bones become weaker'
          D: 'Because they need to be strong enough to repair the station'
        answer: C
        explanation: 'The passage states that "Without gravity, astronauts'' muscles and bones become weaker over time," which is why daily exercise is essential.'
        explanationZh: '文章指出"没有重力的情况下，宇航员的肌肉和骨骼会随着时间变弱"，这就是每天锻炼必不可少的原因。'
      - id: R018-Q3
        type: detail
        question: 'How many sunrises can astronauts see each day on the ISS?'
        questionZh: '在国际空间站上，宇航员每天能看到多少次日出？'
        options:
          A: 'One'
          B: 'Two'
          C: 'Eight'
          D: 'Sixteen'
        answer: D
        explanation: 'The passage clearly states that "Astronauts can see sixteen sunrises and sixteen sunsets every single day."'
        explanationZh: '文章明确指出"宇航员每天可以看到十六次日出和十六次日落。"'
      - id: R018-Q4
        type: inference
        question: 'Why does the author mention that astronauts can see how thin the atmosphere is?'
        questionZh: '作者为什么提到宇航员能看到大气层有多薄？'
        options:
          A: 'To suggest that the atmosphere might disappear soon'
          B: 'To show that astronauts have very good eyesight'
          C: 'To suggest that seeing Earth from space gives a new perspective on our planet'
          D: 'To explain why astronauts feel homesick'
        answer: C
        explanation: 'The passage says that looking at Earth "changed the way they think about Earth" and made them realise how "precious and fragile" our home is, suggesting a new perspective.'
        explanationZh: '文章说从太空看地球"改变了他们看待地球的方式"，让他们意识到我们的家园多么"珍贵和脆弱"，这暗示了一种新的视角。'

  - id: R019
    title: 'How Wolves Changed the Rivers'
    titleZh: '狼如何改变了河流'
    level: 2
    wordCount: 283
    topic: nature
    tags: [Q02, month-2]
    passage: |
      In 1995, something extraordinary happened in Yellowstone National Park in the
      United States. After being absent for seventy years, wolves were brought back
      to the park. Nobody expected what happened next — the wolves changed the rivers.

      Before the wolves returned, the park's elk population had grown very large.
      The elk ate so much grass and so many young trees that the riverbanks became
      bare. Without tree roots to hold the soil together, the banks crumbled and the
      rivers became wide and shallow. Many animals that depended on trees and deep
      water began to disappear.

      When the wolves arrived, they hunted the elk. But more importantly, the elk
      changed their behaviour. They stopped spending so much time near the rivers
      and valleys, where wolves could easily catch them. Instead, they moved to
      higher ground where they could see danger approaching.

      With fewer elk eating the plants near the rivers, something amazing happened.
      Trees and bushes began to grow again along the riverbanks. Willows, aspens,
      and cottonwoods shot up, some growing five times taller in just six years.

      The returning trees brought back other animals. Songbirds nested in the
      branches. Beavers returned and built dams, creating pools where fish and frogs
      could live. The tree roots strengthened the riverbanks, making the rivers
      narrower and deeper. The channels became more fixed instead of wandering
      across the valley floor.

      Scientists call this a "trophic cascade" — when a change at the top of the
      food chain creates a series of effects all the way down. The return of just
      forty-one wolves transformed an entire ecosystem. It showed us that nature
      is far more connected than we ever imagined.
    passageZh: |
      1995年，美国黄石国家公园发生了一件非凡的事情。在消失了七十年之后，狼被重新引
      入了公园。没有人预料到接下来会发生什么——狼改变了河流。

      在狼回来之前，公园的麋鹿数量已经变得非常多。麋鹿吃了太多的草和嫩树，河岸变
      得光秃秃的。没有树根来固定土壤，河岸崩塌了，河流变得又宽又浅。许多依赖树木
      和深水的动物开始消失。

      当狼到来时，它们猎杀麋鹿。但更重要的是，麋鹿改变了它们的行为。它们不再花那
      么多时间待在河边和山谷里，因为狼在那里很容易抓到它们。相反，它们移到了更高的
      地方，在那里可以看到危险来临。

      由于河边吃植物的麋鹿减少了，奇妙的事情发生了。树木和灌木开始重新在河岸生长。
      柳树、白杨和三角叶杨迅速长高，有些在短短六年内就长到了原来的五倍高。

      回归的树木带回了其他动物。鸣禽在枝头筑巢。河狸回来筑坝，创造了鱼和青蛙可以
      生活的水塘。树根加固了河岸，使河流变窄变深。河道变得更加固定，不再在谷底四处
      游荡。

      科学家称这为"营养级联"——当食物链顶端的变化在整个链条上产生一系列影响。仅仅
      四十一只狼的回归就改变了整个生态系统。这向我们展示了自然的联系远比我们想象的
      要紧密得多。
    vocabHighlights:
      - word: extraordinary
        ref: V0076
      - word: transformed
        ref: V0112
      - word: ecosystem
        ref: V0098
    questions:
      - id: R019-Q1
        type: main-idea
        question: 'What is the best title for this passage?'
        questionZh: '哪个标题最适合这篇文章？'
        options:
          A: 'The Dangerous Wolves of Yellowstone'
          B: 'How Wolves Created a Chain Reaction That Changed a Whole Ecosystem'
          C: 'Why Elk Are Afraid of Rivers'
          D: 'The History of Yellowstone National Park'
        answer: B
        explanation: 'The passage describes how reintroducing wolves caused a trophic cascade that affected elk behaviour, plant growth, other animals, and even the rivers themselves.'
