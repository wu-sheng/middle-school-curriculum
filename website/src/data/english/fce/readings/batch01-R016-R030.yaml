  - id: R022
    title: 'Atlantis — Fact or Fiction?'
    titleZh: '亚特兰蒂斯——事实还是虚构？'
    level: 2
    wordCount: 298
    topic: adventure
    tags: [Q02, month-2]
    passage: |
      For thousands of years, people have been fascinated by the legend of Atlantis,
      a powerful island civilisation that supposedly sank beneath the ocean in a
      single day. The story, which was first told by the ancient Greek philosopher
      Plato around 360 BC, has inspired countless explorers to search for this
      lost city. But did Atlantis really exist?

      According to Plato, Atlantis was a magnificent island located beyond the
      "Pillars of Hercules," which most historians believe refers to the Strait of
      Gibraltar. The island was home to an advanced civilisation with grand palaces,
      harbours filled with ships, and rings of water that surrounded the city centre.
      The people of Atlantis were wealthy and powerful, but they became greedy and
      arrogant. As punishment, the gods sent earthquakes and floods that swallowed
      the entire island.

      Many researchers have tried to find a real place that could have inspired the
      legend. One popular theory connects Atlantis to the Minoan civilisation on
      the island of Crete, which was partially destroyed by a massive volcanic
      eruption around 1600 BC. The eruption, which came from the nearby island of
      Thera, created enormous tsunamis that devastated coastal cities.

      Other explorers have searched for Atlantis in places as varied as Antarctica,
      the Caribbean, and even the Sahara Desert, where satellite images have
      revealed ancient river systems that could once have supported a great city.

      However, most scholars believe that Plato invented Atlantis as a philosophical
      story — a warning about what happens when powerful nations become too proud.
      Whether Atlantis was real or imaginary, the legend continues to capture our
      imagination. Perhaps that is the true power of a great story: it does not
      need to be true to teach us something important.
    passageZh: |
      几千年来，人们一直对亚特兰蒂斯的传说着迷——一个据说在一天之内沉入海底的强大
      岛屿文明。这个故事最早由古希腊哲学家柏拉图在大约公元前360年讲述，激励了无数
      探险家去寻找这座失落的城市。但亚特兰蒂斯真的存在过吗？

      根据柏拉图的描述，亚特兰蒂斯是一座位于"赫拉克勒斯之柱"之外的壮丽岛屿，大多
      数历史学家认为那是指直布罗陀海峡。岛上是一个先进的文明，有宏伟的宫殿、满载船
      只的港口，以及环绕城市中心的水环。亚特兰蒂斯人富有而强大，但他们变得贪婪和傲
      慢。作为惩罚，众神降下了地震和洪水，吞没了整座岛屿。

      许多研究人员试图找到一个可能启发了这一传说的真实地点。一个流行的理论将亚特兰
      蒂斯与克里特岛上的米诺斯文明联系起来，那个文明在大约公元前1600年被一次巨大的
      火山喷发部分摧毁。那次从附近的锡拉岛爆发的火山，产生了巨大的海啸，摧毁了沿海
      城市。

      其他探险家在各种各样的地方寻找亚特兰蒂斯，从南极洲、加勒比海到撒哈拉沙漠——
      卫星图像在那里发现了古代河流系统，那里曾经可能支撑着一座伟大的城市。

      然而，大多数学者认为柏拉图发明了亚特兰蒂斯作为一个哲学故事——警告强大的国家
      变得太骄傲会发生什么。无论亚特兰蒂斯是真实的还是想象的，这个传说继续捕获着
      我们的想象力。也许这就是一个伟大故事的真正力量：它不需要是真实的，也能教给
      我们重要的东西。
