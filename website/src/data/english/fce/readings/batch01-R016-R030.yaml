  - id: R029
    title: 'Why Do We Dream?'
    titleZh: '我们为什么会做梦？'
    level: 2.5
    wordCount: 319
    topic: science
    tags: [Q02, month-2]
    passage: |
      Every night, as you fall asleep, your brain begins creating a private cinema
      just for you. Some dreams are wonderful — you might fly over mountains or
      discover a magical world. Others are confusing or frightening. But why do we
      dream at all? Despite decades of research, scientists still cannot fully
      agree on the answer.

      Dreams occur mainly during a stage of sleep called REM, which stands for
      Rapid Eye Movement. During REM sleep, your eyes move quickly behind your
      closed eyelids, your heart rate increases, and your brain becomes almost as
      active as when you are awake. Most people experience four to six periods of
      REM sleep each night, which means you probably have several dreams — even if
      you cannot remember them in the morning.

      One of the most widely accepted theories suggests that dreams help us process
      emotions. When something upsetting or exciting happens during the day, your
      brain replays these experiences during sleep, helping you make sense of your
      feelings. This could explain why people often dream about events that worried
      or thrilled them.

      Another theory proposes that dreaming helps consolidate memories. While you
      sleep, your brain sorts through the enormous amount of information you
      absorbed during the day, deciding what to keep and what to discard. Some
      researchers believe that dreams are a side effect of this sorting process —
      like watching a librarian shuffle books into different shelves.

      A more recent theory, proposed by neuroscientist Erik Hoel, suggests that
      dreams serve as a kind of training simulation. By creating strange and
      unexpected scenarios, your brain prepares you to handle surprising situations
      in real life. This would explain why dreams are often bizarre and illogical —
      the strangeness is the point.

      Whatever the true purpose of dreams may be, one thing is certain: they are a
      fundamental part of being human. People across every culture and throughout
      all of history have wondered about their dreams — and it seems we will
      continue wondering for some time yet.
    passageZh: |
      每天晚上，当你入睡时，你的大脑开始为你创建一个私人电影院。有些梦很美妙——你
      可能飞越群山或发现一个魔法世界。有些梦令人困惑或恐惧。但我们为什么会做梦呢？
      尽管经过了几十年的研究，科学家们仍然无法完全就答案达成一致。

      梦主要发生在一个叫做REM的睡眠阶段，REM代表快速眼动。在REM睡眠期间，你的眼
      球在闭合的眼皮后面快速运动，心率加快，大脑变得几乎和清醒时一样活跃。大多数
      人每晚经历四到六个REM睡眠周期，这意味着你可能做了好几个梦——即使早上你记不住
      它们。

      最广泛接受的理论之一认为，梦帮助我们处理情绪。当白天发生令人不安或兴奋的事
      情时，你的大脑在睡眠中重放这些经历，帮助你理解自己的感受。这可以解释为什么
      人们经常梦到让他们担忧或兴奋的事件。

      另一种理论提出，做梦有助于巩固记忆。当你睡觉时，你的大脑整理白天吸收的大量
      信息，决定保留什么、丢弃什么。一些研究人员认为，梦是这个整理过程的副产品——
      就像看着图书管理员把书分拣到不同的书架上。

      一个更新的理论由神经科学家埃里克·霍尔提出，认为梦起着一种训练模拟的作用。通
      过创建奇怪和意想不到的场景，你的大脑为你准备好应对现实生活中的突发情况。这可
      以解释为什么梦经常是离奇和不合逻辑的——奇怪本身就是目的。

      无论梦的真正目的是什么，有一件事是确定的：它们是人类的基本组成部分。每个文化
      和整个历史中的人们都曾对自己的梦感到好奇——看起来我们还会继续好奇一段时间。
