  # ============================================================
  # R075 – From Page to Screen (Level 3, ~340 words)
  # ============================================================
  - id: R075
    title: 'From Page to Screen: How Books Become Movies'
    titleZh: '从纸页到银幕：书如何变成电影'
    level: 3
    wordCount: 340
    topic: book-adaptations
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Original passage about the process of adapting books into films'
    passage: |
      When a popular book is turned into a movie, fans often argue about the changes. "The book was better!" is one of the most common complaints. But adapting a book into a film is far more complex than simply filming the story page by page.

      The first challenge is length. An average novel contains around 80,000 words, which would take about twelve hours to read aloud. A typical film is only two hours long. This means that a screenwriter must decide what to keep, what to change, and what to cut entirely. Subplots, minor characters, and inner thoughts often disappear because they are difficult to show on screen.

      The second challenge is showing instead of telling. Books can describe what a character is thinking: "She felt a wave of sadness wash over her." A film cannot show thoughts directly. Instead, the director must use facial expressions, music, camera angles, and lighting to convey the same emotion. This is why casting — choosing the right actor — is so crucial.

      Some adaptations make surprisingly large changes. In the Harry Potter films, the character Peeves the poltergeist was removed entirely. In The Lord of the Rings, the character Tom Bombadil never appears. These decisions upset some fans but were necessary to keep the films at a manageable length.

      However, films can also add something that books cannot: a visual and musical experience. The soaring soundtrack of The Lord of the Rings, the magical world brought to life in Harry Potter, and the stunning animation of Studio Ghibli films all create emotions that words alone cannot achieve.

      Interestingly, some authors prefer the film version of their own stories. Roald Dahl reportedly loved the animated version of James and the Giant Peach, saying it captured the spirit of the story better than he had imagined. This reminds us that a good adaptation is not about being identical to the book — it is about capturing the same feeling in a different medium.
    passageZh: |
      当一本受欢迎的书被改编成电影时，粉丝们经常争论改动的部分。"书比电影好！"是最常见的抱怨之一。但把一本书改编成电影比简单地逐页拍摄要复杂得多。

      第一个挑战是篇幅。一本普通的小说大约有八万字，大声朗读需要大约十二小时。一部典型的电影只有两个小时长。这意味着编剧必须决定保留什么、改变什么、以及完全删掉什么。副线情节、次要角色和内心想法常常消失，因为它们在银幕上很难展示。

      第二个挑战是"展示而非叙述"。书可以描述角色在想什么："一股悲伤涌上她的心头。"电影不能直接展示想法。相反，导演必须用面部表情、音乐、镜头角度和灯光来传达相同的情感。这就是为什么选角——选择合适的演员——如此重要。

      有些改编做了令人惊讶的大幅改动。在哈利波特电影中，皮皮鬼这个角色被完全删除。在《指环王》中，汤姆·邦巴迪尔从未出现。这些决定让一些粉丝不满，但为了保持电影在可控的长度内是必要的。

      然而，电影也能添加书做不到的东西：视觉和音乐体验。《指环王》激昂的原声音乐、哈利波特中被赋予生命的魔法世界、以及吉卜力工作室电影令人惊叹的动画，都创造了仅靠文字无法实现的情感。

      有趣的是，一些作者更喜欢自己故事的电影版。据说罗尔德·达尔喜爱《詹姆斯和巨桃》的动画版，说它比他想象的更好地捕捉了故事的精神。这提醒我们，好的改编不是要和书一模一样——而是要在不同的媒介中捕捉相同的感觉。
    vocabHighlights:
      - word: convey
        ref: V0677
      - word: captivating
        ref: V0610
    questions:
