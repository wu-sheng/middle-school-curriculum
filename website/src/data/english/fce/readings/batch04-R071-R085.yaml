  - id: R078
    title: 'How J.K. Rowling Created Harry Potter''s World'
    titleZh: 'J.K.罗琳如何创造了哈利波特的世界'
    level: 3
    wordCount: 350
    topic: famous-authors
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Various interviews with J.K. Rowling'
      author: 'J.K. Rowling'
      note: 'Original passage based on publicly documented facts about Rowling''s creative process'
    passage: |
      The idea for Harry Potter came to J.K. Rowling on a delayed train from Manchester to London in 1990. As she stared out of the window, the image of a thin, dark-haired boy who did not know he was a wizard appeared in her mind. By the time she arrived in London, she had planned out the entire seven-book series in her head.

      What many people do not know is how much planning Rowling did before she started writing the first novel. She spent five years creating the world of Harry Potter — drawing maps of Hogwarts, inventing the rules of Quidditch, writing backstories for every character, and creating a detailed timeline that covered decades of magical history.

      Rowling kept notebooks filled with charts and diagrams. One famous chart showed every chapter of Order of the Phoenix, with columns tracking which characters appeared, which subplots advanced, and which clues were planted for later books. This level of planning ensured that details mentioned in Book One would become important in Book Seven.

      Perhaps most impressively, Rowling wrote the final chapter of the last book very early in the process. She knew exactly how the story would end before she had finished the first book. This meant that the entire series was carefully foreshadowed from the very beginning.

      Rowling's process teaches us that great stories require immense preparation. The magic of Harry Potter was not just imagination — it was organisation. By planning her world in extraordinary detail, Rowling created a story that felt real and consistent across seven books and over a million words.

      For young writers, the lesson is clear: before you write the first sentence of your story, spend time thinking about your characters, your setting, and most importantly, how your story will end. A story with a planned ending is always more satisfying than one that simply stops.
    passageZh: |
      哈利波特的灵感在1990年一趟从曼彻斯特到伦敦的晚点火车上降临到了J.K.罗琳身上。当她凝视着窗外时，一个瘦弱、黑发、不知道自己是巫师的男孩的形象出现在她脑海中。到她到达伦敦时，她已经在脑海中规划好了整个七本书的系列。

      许多人不知道的是，罗琳在开始写第一部小说之前做了多少规划。她花了五年时间创造哈利波特的世界——画霍格沃茨的地图、发明魁地奇的规则、为每个角色写背景故事，以及创建一个涵盖数十年魔法历史的详细时间线。

      罗琳的笔记本里写满了图表和图解。一张著名的图表展示了《凤凰社》的每一章，用列追踪哪些角色出现了、哪些副线情节推进了、以及为后面的书埋下了哪些线索。这种程度的规划确保了第一本书中提到的细节会在第七本书中变得重要。

      也许最令人印象深刻的是，罗琳在创作过程中很早就写好了最后一本书的最后一章。在完成第一本书之前，她就确切地知道故事将如何结束。这意味着整个系列从一开始就被精心地设置了伏笔。

      罗琳的创作过程教我们，伟大的故事需要大量的准备。哈利波特的魔法不仅仅是想象力——还有组织能力。通过对她的世界进行非凡的详细规划，罗琳创造了一个跨越七本书、超过一百万字仍然感觉真实和一致的故事。

      对于年轻作家来说，教训很明确：在你写故事的第一句话之前，花时间思考你的角色、你的场景，以及最重要的，你的故事将如何结束。一个有计划结局的故事总是比一个简单停下的故事更令人满足。
