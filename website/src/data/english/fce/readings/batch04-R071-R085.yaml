        answer: 'B'
        explanation: 'The story shows how Yohei''s greed and curiosity (breaking the promise not to watch) destroyed his relationship with the grateful crane.'
        explanationZh: '故事展示了与平的贪婪和好奇（打破了不偷看的承诺）如何毁掉了他与感恩仙鹤的关系。'
