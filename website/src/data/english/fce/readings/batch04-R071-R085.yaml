  # ============================================================
  # R071 – How Roald Dahl Wrote His Stories (Level 3, ~320 words)
  # ============================================================
  - id: R071
    title: 'How Roald Dahl Wrote His Stories'
    titleZh: '罗尔德·达尔是如何写故事的'
    level: 3
    wordCount: 320
    topic: famous-authors
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Boy: Tales of Childhood'
      author: 'Roald Dahl'
      note: 'Original passage about Dahl''s writing habits, based on documented facts from his biography'
    passage: |
      Roald Dahl, the author of Charlie and the Chocolate Factory and Matilda, had a very particular writing routine. Every day, he would walk to a small brick hut at the bottom of his garden. Inside, there was an old armchair, a board across his lap, and six yellow pencils sharpened to perfect points.

      Dahl wrote everything by hand on yellow American legal pads. He never used a typewriter or a computer. He believed that writing by hand helped him think more carefully about every single word. He would write for exactly two hours in the morning and two hours in the afternoon, never more.

      What made Dahl's stories so captivating was his ability to see the world through a child's eyes. He once said that the key to writing for children was to "conspire with them against adults." His villains — Miss Trunchbull, the Grand High Witch, Mr and Mrs Twit — were always exaggerated and grotesque, which children found hilarious rather than truly frightening.

      Dahl kept an "ideas book" — a small notebook where he jotted down story ideas whenever they came to him. Most of these ideas never became finished stories. He estimated that out of every hundred ideas, only one or two were good enough to develop. This shows that even the most successful writers produce far more failed ideas than successful ones.

      Perhaps the most surprising fact about Dahl is that he rewrote his stories many times. Charlie and the Chocolate Factory went through five completely different drafts before it was published. The first version was so different that you would hardly recognise it as the same story. Dahl believed that rewriting was the most important part of writing — more important than the first draft.
    passageZh: |
      罗尔德·达尔是《查理和巧克力工厂》和《玛蒂尔达》的作者，他有一套非常独特的写作习惯。每天，他都会走到花园尽头的一间小砖屋。里面有一把旧扶手椅、一块搁在膝盖上的木板，和六支削得尖尖的黄色铅笔。

      达尔用手写在黄色的美国法律用纸上。他从不用打字机或电脑。他相信手写能帮助他对每个词都更加仔细地思考。他每天上午写两个小时，下午写两个小时，绝不多写。

      达尔的故事之所以如此吸引人，是因为他能用孩子的眼睛看世界。他曾经说过，为孩子写作的关键是"和他们一起密谋对付大人"。他笔下的反派——特朗奇布尔小姐、最高女巫、特维特先生和太太——总是被夸张和荒诞化的，孩子们觉得他们滑稽而不是真正可怕。

      达尔一直保存着一本"创意笔记本"——一个小本子，每当想到故事创意时就随手记下来。大多数创意最终没有变成完整的故事。他估计每一百个创意中，只有一两个够好到可以发展下去。这说明即使最成功的作家，产生的失败创意也比成功的多得多。

      关于达尔最令人惊讶的事实也许是他会多次重写故事。《查理和巧克力工厂》在出版前经历了五个完全不同的草稿版本。第一个版本与最终版本差异之大，你几乎认不出它是同一个故事。达尔相信重写是写作中最重要的部分——比第一稿更重要。
    vocabHighlights:
      - word: captivating
        ref: V0610
      - word: draft
        ref: V0679
      - word: revise
        ref: V0680
    questions:
      - id: R071-Q1
        type: main-idea
        question: 'What is the main purpose of this passage?'
        questionZh: '这篇文章的主要目的是什么？'
        options:
          A: 'To explain why Roald Dahl is the best children''s author ever'
          B: 'To describe Roald Dahl''s writing habits and what made his stories successful'
          C: 'To encourage children to read Charlie and the Chocolate Factory'
          D: 'To compare Dahl''s writing methods with those of other authors'
        answer: 'B'
        explanation: 'The passage focuses on how Dahl wrote (his routine, tools, and process) and what made his stories captivating (child''s perspective, rewriting).'
        explanationZh: '文章集中描述了达尔如何写作（他的习惯、工具和过程）以及是什么让他的故事引人入胜（孩子视角、重写）。'
      - id: R071-Q2
        type: detail
        question: 'How many hours did Dahl write each day?'
        questionZh: '达尔每天写多少小时？'
        options:
          A: 'Two hours in total'
          B: 'Four hours in total'
          C: 'Six hours in total'
          D: 'As many hours as he could manage'
        answer: 'B'
        explanation: 'The passage says he wrote "exactly two hours in the morning and two hours in the afternoon" — four hours total.'
        explanationZh: '文章说他"每天上午写两个小时，下午写两个小时"——总共四个小时。'
      - id: R071-Q3
        type: inference
        question: 'What can we learn from the fact that Dahl rewrote Charlie and the Chocolate Factory five times?'
        questionZh: '从达尔将《查理和巧克力工厂》重写了五次这一事实中，我们能学到什么？'
        options:
          A: 'Dahl was not a very talented writer and needed many attempts'
          B: 'Good writing requires patience and willingness to revise'
          C: 'The first version of a story is always the worst'
          D: 'Children''s books are harder to write than adult books'
        answer: 'B'
        explanation: 'The passage emphasises that "rewriting was the most important part of writing," suggesting that revision and patience are key to good writing.'
        explanationZh: '文章强调"重写是写作中最重要的部分"，说明修改和耐心是好写作的关键。'
      - id: R071-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "conspire" most likely mean?'
        questionZh: '文中的"conspire"最可能是什么意思？'
        options:
          A: 'To argue with someone loudly'
          B: 'To secretly plan together'
          C: 'To write a book about someone'
          D: 'To teach someone a lesson'
        answer: 'B'
        explanation: 'Dahl said the key was to "conspire with children against adults" — meaning to secretly side with children, creating stories where children outsmart adults.'
        explanationZh: '达尔说关键是"和孩子们一起密谋对付大人"——意思是暗中站在孩子一边，创作孩子智胜大人的故事。'

  # ============================================================
  # R072 – The Three-Act Structure (Level 3, ~340 words)
  # ============================================================
  - id: R072
    title: 'The Three-Act Structure: How All Stories Work'
    titleZh: '三幕结构：所有故事的运作方式'
    level: 3
    wordCount: 340
    topic: story-structure
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Educational passage about narrative structure for young learners'
    passage: |
      Have you ever noticed that most stories — whether they are books, films, or even fairy tales — follow a similar pattern? This pattern is called the Three-Act Structure, and it has been used by storytellers for thousands of years.

      Act One is called the Setup. This is where we meet the main character and learn about their world. Everything seems normal — until something happens that changes everything. This moment is called the "inciting incident." In Cinderella, the inciting incident is the invitation to the ball. In Harry Potter, it is the letter from Hogwarts. Without this moment, there would be no story.

      Act Two is the Confrontation — the longest part of any story. The main character faces challenges, makes friends and enemies, and tries to achieve their goal. But things keep getting worse. Just when you think the character might succeed, a new obstacle appears. This rising tension is what keeps you turning pages. Act Two usually ends with the darkest moment — when all hope seems lost.

      Act Three is the Resolution. The character finds the courage, the clue, or the idea they need to face their biggest challenge. The climax arrives — the most exciting scene in the entire story. Then the loose ends are tied up and the story reaches its conclusion. The character is usually different from the person they were at the beginning. Cinderella has found her confidence. Harry has found his family.

      Understanding this structure will not only help you enjoy stories more — it will help you write better ones. When you plan a story for the FCE exam, think: What is my character's normal world? What changes everything? What obstacles will they face? What is the darkest moment? How will they overcome it? If you can answer these questions before you start writing, you already have a blueprint for a great story.
    passageZh: |
      你是否注意到大多数故事——无论是书、电影还是童话故事——都遵循类似的模式？这个模式叫做三幕结构，讲故事的人已经使用了几千年。

      第一幕叫做"铺垫"。我们在这里认识主角并了解他们的世界。一切看起来都很正常——直到发生了什么改变一切。这个时刻叫做"触发事件"。在灰姑娘中，触发事件是舞会的邀请。在哈利波特中，是来自霍格沃茨的信。没有这个时刻，就不会有故事。

      第二幕是"冲突"——任何故事中最长的部分。主角面临挑战，结交朋友和敌人，并试图实现他们的目标。但情况不断恶化。就在你以为角色可能要成功时，一个新的障碍出现了。这种不断上升的紧张感就是让你翻页的动力。第二幕通常以最黑暗的时刻结束——当所有希望似乎都消失了的时候。

      第三幕是"解决"。角色找到了他们需要的勇气、线索或想法来面对最大的挑战。高潮到来了——整个故事中最激动人心的场景。然后松散的线头被收拢，故事走向结论。角色通常与开始时的自己不同。灰姑娘找到了自信。哈利找到了他的家人。

      理解这个结构不仅能帮你更好地欣赏故事——还能帮你写出更好的故事。当你为FCE考试计划故事时，想想：我的角色的正常世界是什么？什么改变了一切？他们会面临什么障碍？最黑暗的时刻是什么？他们将如何克服？如果你在开始写作前能回答这些问题，你就已经有了一个好故事的蓝图。
    vocabHighlights:
      - word: climax
        ref: V0612
      - word: resolution
        ref: V0613
      - word: tension
        ref: V0605
    questions:
      - id: R072-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲什么？'
        options:
          A: 'Why fairy tales are better than modern stories'
          B: 'The three-part pattern that most stories follow'
          C: 'How to write a perfect story for an exam'
          D: 'The history of storytelling from ancient times'
        answer: 'B'
        explanation: 'The passage explains the Three-Act Structure (Setup, Confrontation, Resolution) that most stories share.'
        explanationZh: '文章解释了大多数故事共有的三幕结构（铺垫、冲突、解决）。'
      - id: R072-Q2
        type: detail
        question: 'According to the passage, what is an "inciting incident"?'
        questionZh: '根据文章，"触发事件"是什么？'
        options:
          A: 'The climax of the story'
          B: 'The moment something changes in the character''s normal world'
          C: 'The resolution at the end'
          D: 'The darkest moment in Act Two'
        answer: 'B'
        explanation: 'The passage defines it as the moment when "something happens that changes everything" in the character''s normal world.'
        explanationZh: '文章定义它为角色正常世界中"发生了什么改变一切"的时刻。'
      - id: R072-Q3
        type: inference
        question: 'Why does the writer mention Cinderella and Harry Potter?'
        questionZh: '为什么作者提到灰姑娘和哈利波特？'
        options:
          A: 'To show that these are the only stories that use the Three-Act Structure'
          B: 'To give familiar examples that readers will recognise'
          C: 'To prove that old stories are better than new ones'
          D: 'To encourage readers to read these specific books'
        answer: 'B'
        explanation: 'The writer uses well-known stories as examples to make the abstract concept of story structure easier to understand.'
        explanationZh: '作者使用广为人知的故事作为例子，使故事结构这个抽象概念更容易理解。'
      - id: R072-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "loose ends" most likely mean?'
        questionZh: '文中的"loose ends"最可能是什么意思？'
        options:
          A: 'Ropes that are not tied properly'
          B: 'Parts of the story that have not been explained or resolved yet'
          C: 'Mistakes that the writer made'
          D: 'Extra characters who are not important'
        answer: 'B'
        explanation: 'In storytelling, "tying up loose ends" means resolving all the unanswered questions and unfinished storylines.'
        explanationZh: '在讲故事中，"收拢松散的线头"意思是解决所有未回答的问题和未完成的故事线。'

  # ============================================================
  # R073 – A Young Writers' Workshop (Level 3, ~350 words)
  # ============================================================
  - id: R073
    title: 'A Day at the Young Writers'' Workshop'
    titleZh: '小作家工作坊的一天'
    level: 3
    wordCount: 350
    topic: creative-writing
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Fictional account of a creative writing workshop for children'
    passage: |
      Last Saturday, I attended a Young Writers' Workshop at the city library. I was nervous because I had never shared my writing with strangers before, but Mum said it would be a wonderful experience. She was right.

      The workshop was led by Ms Chen, a children's book author who has published twelve novels. She began by asking us a surprising question: "What is the hardest part of writing a story?" Most of us said "the beginning." Ms Chen smiled and said, "Actually, the hardest part is rewriting. Anyone can write a first draft. The real magic happens when you go back and make it better."

      Our first exercise was called "The Five-Sense Challenge." Ms Chen gave us a photograph of a market in Morocco and asked us to describe it using all five senses in exactly fifty words. It was much harder than I expected. I kept going over fifty words and had to cut sentences ruthlessly. But the result was surprisingly vivid — every word earned its place.

      Next, we practised "showing not telling." Ms Chen wrote "The boy was angry" on the board and challenged us to convey the same emotion without using the word "angry." One girl wrote: "He slammed the door so hard the pictures rattled on the wall." Everyone agreed that was much more powerful.

      The afternoon session focused on dialogue. We worked in pairs, writing conversations between characters with opposite personalities — a shy person and a confident one, a villain and a hero. Ms Chen taught us that good dialogue reveals character: a nervous person uses short sentences and questions, while a confident person speaks in commands and statements.

      By the end of the day, I had learned more about writing in six hours than I had in an entire year of English classes. The most important lesson was this: writing is not about talent — it is about practice, revision, and being willing to throw away your favourite sentence if it does not serve the story.
    passageZh: |
      上周六，我参加了市图书馆举办的小作家工作坊。我很紧张，因为我从未在陌生人面前分享过我的写作，但妈妈说这会是一次很棒的经历。她说对了。

      工作坊由陈老师主持，她是一位已出版十二本小说的儿童书作家。她开始时问了我们一个令人惊讶的问题："写故事最难的部分是什么？"我们大多数人都说"开头"。陈老师笑着说："实际上，最难的部分是重写。任何人都能写出第一稿。真正的魔法发生在你回头去把它改得更好的时候。"

      我们的第一个练习叫做"五感挑战"。陈老师给我们一张摩洛哥市场的照片，让我们用五十个词描述它，使用全部五种感官。这比我预想的难多了。我总是超过五十个词，不得不无情地删减句子。但结果出乎意料地生动——每个词都占有一席之地。

      接下来，我们练习"展示而非叙述"。陈老师在黑板上写了"那个男孩很生气"，挑战我们不用"生气"这个词来传达同样的情感。一个女孩写道："他砰地一声关上门，墙上的画框都在晃动。"大家都同意这有力多了。

      下午的课程聚焦对话。我们两人一组，写性格相反的角色之间的对话——一个害羞的人和一个自信的人，一个反派和一个英雄。陈老师教我们，好的对话能揭示角色：紧张的人用短句和问句，自信的人用命令句和陈述句。

      到了一天结束的时候，我在六个小时里学到的写作知识比我在整整一年的英语课上学到的还多。最重要的教训是：写作不是天赋——而是练习、修改，以及愿意扔掉你最喜欢的句子，如果它不为故事服务的话。
    vocabHighlights:
      - word: vivid
        ref: V0615
      - word: convey
        ref: V0677
      - word: revise
        ref: V0680
    questions:
      - id: R073-Q1
        type: main-idea
        question: 'What is the writer''s main message about the workshop?'
        questionZh: '作者关于工作坊的主要信息是什么？'
        options:
          A: 'Writing workshops are only useful for talented writers'
          B: 'The workshop taught practical skills that improved her writing'
          C: 'Ms Chen is the best writing teacher in the city'
          D: 'Libraries should hold writing workshops every weekend'
        answer: 'B'
        explanation: 'The writer describes specific techniques learned (five senses, showing not telling, dialogue) and concludes that she learned more in one day than in a year of classes.'
        explanationZh: '作者描述了学到的具体技巧（五感、展示而非叙述、对话），并总结说一天学到的比一年英语课还多。'
      - id: R073-Q2
        type: detail
        question: 'What was the "Five-Sense Challenge"?'
        questionZh: '"五感挑战"是什么？'
        options:
          A: 'Describing a photograph using all five senses in exactly fifty words'
          B: 'Writing a story that includes five different characters'
          C: 'Guessing what an object is by touching, smelling, and tasting it'
          D: 'Reading a passage aloud with five different emotions'
        answer: 'A'
        explanation: 'The passage says they were given a photograph and asked to "describe it using all five senses in exactly fifty words."'
        explanationZh: '文章说他们被给了一张照片，被要求"用五十个词描述它，使用全部五种感官"。'
      - id: R073-Q3
        type: inference
        question: 'Why does Ms Chen say "rewriting" is the hardest part of writing?'
        questionZh: '为什么陈老师说"重写"是写作中最难的部分？'
        options:
          A: 'Because it takes the longest time to do'
          B: 'Because most people give up after the first draft and do not improve their work'
          C: 'Because rewriting requires a computer and most students do not have one'
          D: 'Because teachers do not teach rewriting skills in school'
        answer: 'B'
        explanation: 'Ms Chen says "Anyone can write a first draft" but "the real magic happens when you go back and make it better" — implying that most people stop at the first draft.'
        explanationZh: '陈老师说"任何人都能写出第一稿"但"真正的魔法发生在你回头改进的时候"——暗示大多数人在第一稿就停下了。'
      - id: R073-Q4
        type: vocabulary-in-context
        question: 'What does "ruthlessly" mean in the passage?'
        questionZh: '文中的"ruthlessly"是什么意思？'
        options:
          A: 'Carefully and gently'
          B: 'Without hesitation or mercy'
          C: 'Lazily and carelessly'
          D: 'Happily and eagerly'
        answer: 'B'
        explanation: 'The writer had to "cut sentences ruthlessly" to stay within fifty words — meaning she had to remove sentences without hesitation, even if she liked them.'
        explanationZh: '作者不得不"无情地删减句子"来保持在五十个词以内——意味着她不得不毫不犹豫地删除句子，即使她喜欢它们。'

  # ============================================================
  # R074 – Cinderella Around the World (Level 3, ~360 words)
  # ============================================================
  - id: R074
    title: 'Cinderella Around the World'
    titleZh: '世界各地的灰姑娘'
    level: 3
    wordCount: 360
    topic: fairy-tales-cultures
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Cinderella Stories from Around the World'
      author: 'Various cultural traditions'
      note: 'Original passage comparing Cinderella variants across cultures'
    passage: |
      Most people know the story of Cinderella — the kind girl who is mistreated by her stepfamily, attends a magical ball, and is eventually recognised by a prince through a glass slipper. But did you know that there are over five hundred versions of this story from cultures around the world?

      The oldest known Cinderella story comes from ancient China. Written down over a thousand years ago, it tells the tale of Ye Xian, a girl whose dead mother returns as a magical fish. When her stepmother kills the fish, Ye Xian buries the bones, which grant her wishes. She attends a festival in a beautiful dress and golden shoes. When she loses one shoe, the king uses it to find her.

      In the Egyptian version, a girl named Rhodopis has her sandal stolen by an eagle, which drops it in the lap of the Pharaoh. He searches the kingdom for the sandal's owner and eventually finds Rhodopis. This story was written down in the first century BC — nearly two thousand years before the French version we know today.

      The Korean Cinderella, Kongji, is helped by magical animals — a toad, birds, and an ox — rather than a fairy godmother. In the Native American version from the Algonquin people, a girl called Rough Face Girl proves her worth not through beauty but through her ability to see an invisible warrior that nobody else can see.

      What is fascinating is that despite the differences in setting, costumes, and magical helpers, the core of the story remains the same across every culture: a good person is treated unfairly, receives magical help, and is ultimately recognised for their true worth. This suggests that certain human experiences — feeling overlooked, dreaming of a better life, and believing in fairness — are universal.

      These variations remind us that stories connect us across time and geography. The next time you write a story, remember: you are part of a tradition that stretches back thousands of years.
    passageZh: |
      大多数人都知道灰姑娘的故事——一个善良的女孩被继母家庭虐待，参加了一场魔法舞会，最终通过一只玻璃鞋被王子认出。但你知道世界各地有超过五百个版本的这个故事吗？

      已知最古老的灰姑娘故事来自中国古代。一千多年前被记录下来，讲述了叶限的故事，她去世的母亲变成了一条神奇的鱼。当继母杀了鱼后，叶限埋葬了鱼骨，鱼骨能满足她的愿望。她穿着美丽的衣裙和金色的鞋子参加了节日庆典。当她丢了一只鞋时，国王用它来找到了她。

      在埃及版本中，一个名叫罗多庇斯的女孩的凉鞋被一只鹰偷走，鹰把它丢到了法老的膝上。他在全国寻找凉鞋的主人，最终找到了罗多庇斯。这个故事写于公元前一世纪——比我们今天知道的法国版本早了近两千年。

      韩国版灰姑娘孔吉得到的是神奇动物的帮助——蟾蜍、鸟和牛——而不是仙女教母。在北美阿尔冈昆人的原住民版本中，一个叫"粗面女孩"的女孩证明自己的价值不是通过美貌，而是通过她能看到一个别人都看不见的隐形战士。

      引人入胜的是，尽管在场景、服饰和魔法帮手上有差异，这个故事的核心在每种文化中都保持不变：一个好人被不公平对待，得到魔法帮助，最终因其真正的价值被认可。这说明某些人类经验——感到被忽视、梦想更好的生活、相信公平——是普遍的。

      这些变体提醒我们，故事跨越时间和地理把我们连接在一起。下次你写故事时，记住：你是一个延续了数千年的传统的一部分。
