  - id: R076
    title: 'The Girl Who Wrote a Bestseller at Fifteen'
    titleZh: '十五岁写出畅销书的女孩'
    level: 3
    wordCount: 310
    topic: famous-authors
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Eragon'
      author: 'Christopher Paolini'
      note: 'Original passage inspired by the true story of young authors, adapted for age-appropriateness'
    passage: |
      In 2003, a fantasy novel called Eragon appeared in bookshops around the world. It told the gripping story of a farm boy who discovers a dragon egg and becomes a dragon rider. What shocked the literary world was the author's age — Christopher Paolini was only fifteen when he began writing it.

      Paolini was home-schooled by his parents in rural Montana, USA. He graduated from high school at fifteen and, with no idea what to do next, decided to write the book he had always wanted to read — an epic fantasy adventure. He spent a whole year writing the first draft by hand.

      The first version was, by his own admission, terrible. But instead of giving up, Paolini spent another entire year rewriting and revising. His parents helped him self-publish the book, and the family travelled to schools and libraries to sell copies from the boot of their car.

      The breakthrough came when the author Carl Hiaasen's stepson found a copy of Eragon and loved it. Hiaasen recommended it to his publisher, and within months, Eragon had a major publishing deal. It eventually sold over thirty million copies worldwide and was translated into forty-nine languages.

      Paolini's story teaches several important lessons about writing. First, age does not determine ability — a teenager can write a bestseller. Second, the first draft is never good enough — Paolini's success came from his willingness to rewrite relentlessly. Third, perseverance matters — selling books from a car boot showed incredible determination.

      Most importantly, Paolini started by writing what he loved. He was passionate about dragons, swords, and epic quests, and that passion shines through every page. As he later said: "Write what excites you. If you are bored by your own story, your reader will be too."
    passageZh: |
      2003年，一本叫《龙骑士》的奇幻小说出现在世界各地的书店。它讲述了一个农场男孩发现龙蛋并成为龙骑士的扣人心弦的故事。令文学界震惊的是作者的年龄——克里斯托弗·鲍里尼开始写这本书时只有十五岁。

      鲍里尼在美国蒙大拿州的乡下由父母在家教育。他十五岁就从高中毕业，不知道接下来该做什么，于是决定写他一直想读的书——一个史诗般的奇幻冒险故事。他花了整整一年手写第一稿。

      第一个版本，用他自己的话说，很糟糕。但他没有放弃，又花了整整一年重写和修改。他的父母帮他自出版了这本书，全家人带着书去学校和图书馆，从汽车后备箱里卖书。

      转机出现在作家卡尔·希亚森的继子发现了一本《龙骑士》并非常喜欢。希亚森把它推荐给了他的出版商，几个月内，《龙骑士》就获得了一个大型出版合同。它最终在全球售出超过三千万册，被翻译成四十九种语言。

      鲍里尼的故事教给我们关于写作的几个重要教训。首先，年龄不决定能力——一个少年可以写出畅销书。其次，第一稿永远不够好——鲍里尼的成功来自于他不懈重写的意愿。第三，坚持很重要——从汽车后备箱卖书展示了不可思议的决心。

      最重要的是，鲍里尼从写他热爱的东西开始。他对龙、剑和史诗般的冒险充满热情，这种热情在每一页上都闪耀着。正如他后来所说："写让你兴奋的东西。如果你自己都觉得你的故事无聊，你的读者也会这样。"
