  - id: R079
    title: 'The Power of the Opening Line'
    titleZh: '开头句的力量'
    level: 3
    wordCount: 320
    topic: story-structure
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Original passage analysing famous opening lines from children''s literature'
    passage: |
      The opening line of a story is like a doorway — it invites the reader to step inside a new world. Some opening lines are so famous that people remember them even if they have never finished the book.

      Consider this: "It was a dark and stormy night." This classic opening, from an 1830 novel by Edward Bulwer-Lytton, sets the mood immediately. We feel the wind, hear the rain, and sense that something dramatic is about to happen. However, it has been used so many times that it has become a cliché — a reminder that original openings are more effective.

      Roald Dahl opened Charlie and the Chocolate Factory with: "These two very old people are the father and mother of Mr Bucket." It is simple, direct, and immediately raises a question — who is Mr Bucket, and why does his family matter?

      J.K. Rowling began Harry Potter with: "Mr and Mrs Dursley, of number four, Privet Drive, were proud to say that they were perfectly normal, thank you very much." This line is brilliant because it tells us something is definitely NOT normal — otherwise, why mention it?

      What makes an opening line work? First, it creates curiosity — the reader wants to know more. Second, it establishes tone — is the story funny, serious, mysterious? Third, it introduces something specific — a character, a place, or an action. The worst openings are vague and general: "It was a nice day and a boy went outside."

      For FCE story writing, your opening line matters enormously. You are usually given a first sentence, but how you continue it determines whether the examiner wants to keep reading. After the given sentence, add sensory details, create a question, or introduce a problem immediately. Make every word count from the very first line.
    passageZh: |
      故事的开头句就像一扇门——它邀请读者走进一个新的世界。有些开头句如此著名，即使没有读完整本书的人也记得它们。

      想想这个："那是一个黑暗的暴风雨之夜。"这个经典开头来自1830年爱德华·布尔沃-利顿的小说，它立刻设定了气氛。我们能感受到风、听到雨声，并感觉到某些戏剧性的事情即将发生。然而，它被用了太多次，已经变成了陈词滥调——提醒我们原创的开头更有效。

      罗尔德·达尔的《查理和巧克力工厂》这样开头："这两位非常老的人是巴克特先生的父亲和母亲。"简单、直接，并立刻提出了一个问题——巴克特先生是谁？为什么他的家庭很重要？

      J.K.罗琳的哈利波特这样开头："住在小惠金区女贞路4号的德思礼夫妇非常自豪地说，他们完全正常，谢谢。"这句话很精妙，因为它告诉我们某些东西肯定不正常——否则为什么要提到呢？

      是什么让一个开头句有效？首先，它创造了好奇心——读者想知道更多。其次，它确立了基调——故事是有趣的、严肃的还是神秘的？第三，它介绍了具体的东西——一个角色、一个地方或一个动作。最差的开头是模糊和笼统的："天气很好，一个男孩出去了。"

      对于FCE故事写作，你的开头句非常重要。通常会给你一个第一句话，但你如何继续它决定了考官是否想继续读下去。在给定的句子之后，添加感官细节，创造一个问题，或立即引入一个矛盾。从第一行开始就让每个词都有价值。
