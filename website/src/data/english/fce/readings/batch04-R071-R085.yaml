  - id: R081
    title: 'Why We Love Villains'
    titleZh: '我们为什么喜欢反派'
    level: 3
    wordCount: 340
    topic: story-structure
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Original passage analysing the role of villains in storytelling'
    passage: |
      Every great story needs a great villain. Without Captain Hook, Peter Pan would have nothing to fight. Without the White Witch, the children in Narnia would face no danger. Without Voldemort, Harry Potter would just be a boy attending a very unusual school. Villains create conflict, and conflict drives stories forward.

      But what makes a truly memorable villain? The answer, surprisingly, is not how evil they are — it is how understandable they are. The most compelling villains have reasons for their behaviour that we can almost sympathise with. The Grinch hated Christmas not because he was born evil, but because he was lonely. Maleficent in the modern retelling was motivated by heartbreak and betrayal. Even Voldemort was once a scared, abandoned child.

      This does not mean we excuse their actions. It means we understand them. A villain who is simply "evil for no reason" is flat and forgettable. A villain with a painful past and twisted logic is fascinating. We might even catch ourselves thinking: "If that had happened to me, would I have turned out differently?"

      Good villains also serve as mirrors for the hero. They often have similar abilities or backgrounds, but made different choices. Harry and Voldemort are both orphans raised in the Muggle world. The difference is that Harry chose love and friendship, while Voldemort chose power and fear. This contrast makes both characters more interesting.

      For young writers, the lesson is valuable: when creating an antagonist for your story, give them a reason for their actions. Perhaps they were hurt in the past. Perhaps they believe they are doing the right thing. Perhaps they want something completely understandable — love, respect, or safety — but pursue it in the wrong way.

      A story with a complex villain is always more gripping than one with a cardboard cutout bad guy. As the saying goes: every villain is the hero of their own story.
    passageZh: |
      每个伟大的故事都需要一个伟大的反派。没有胡克船长，彼得潘就没有什么可以对抗的。没有白女巫，纳尼亚的孩子们就不会面临危险。没有伏地魔，哈利波特只是一个上着一所非常不寻常的学校的男孩。反派创造冲突，冲突推动故事前进。

      但什么才是真正令人难忘的反派？答案出人意料地不是他们有多邪恶——而是他们有多可以理解。最引人注目的反派有我们几乎可以同情的行为原因。格林奇讨厌圣诞节不是因为他生来邪恶，而是因为他很孤独。现代翻拍中的玛琳菲森是因为心碎和背叛。甚至伏地魔曾经也是一个害怕的、被遗弃的孩子。

      这并不意味着我们为他们的行为开脱。而是我们理解他们。一个仅仅"无缘无故就邪恶"的反派是扁平的、容易忘记的。一个有痛苦过去和扭曲逻辑的反派是迷人的。我们甚至可能发现自己在想："如果那件事发生在我身上，我会不一样吗？"

      好的反派也是英雄的镜子。他们通常有相似的能力或背景，但做出了不同的选择。哈利和伏地魔都是在麻瓜世界长大的孤儿。区别在于哈利选择了爱和友谊，而伏地魔选择了权力和恐惧。这种对比使两个角色都更有趣。

      对于年轻作家来说，这个教训很有价值：当你为故事创造反派时，给他们一个行动的理由。也许他们过去受过伤害。也许他们相信自己在做正确的事。也许他们想要完全可以理解的东西——爱、尊重或安全——但用错误的方式追求。

      一个有复杂反派的故事总是比一个有纸板剪切坏人的故事更扣人心弦。正如俗话所说：每个反派都是他们自己故事的英雄。
