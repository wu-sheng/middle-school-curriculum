  - id: R077
    title: 'Japanese Fairy Tales: The Crane Wife'
    titleZh: '日本童话：仙鹤妻子'
    level: 3
    wordCount: 330
    topic: fairy-tales-cultures
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Tsuru no Ongaeshi (The Grateful Crane)'
      author: 'Japanese folktale'
      note: 'Original retelling of the traditional Japanese folk story'
    passage: |
      Long ago in Japan, a poor weaver named Yohei found a crane caught in a hunter's trap. He carefully freed the bird and watched it fly away. That night, a beautiful woman appeared at his door, asking for shelter from the snow. Her name was Tsuru, and she offered to become his wife.

      Tsuru was a skilled weaver. She asked Yohei to build her a loom and promised to weave cloth for him to sell at the market. However, she had one condition: he must never watch her while she worked. Night after night, Tsuru shut herself in the weaving room. The cloth she produced was extraordinarily beautiful — as soft as clouds and as bright as moonlight. Merchants paid fortunes for it.

      Yohei grew wealthy, but gradually his curiosity overwhelmed him. One evening, he could not resist any longer. He crept to the door and peered through a crack. To his astonishment, there was no woman inside — only a crane, pulling feathers from its own body and weaving them into cloth. The crane was thinner and weaker with each piece of fabric it produced.

      Tsuru noticed him watching. Her eyes filled with sadness. She was the crane he had saved, and she had been repaying his kindness with the only gift she had — her own feathers. Now that her secret was revealed, she could stay no longer. She transformed back into a crane and flew away into the winter sky, never to return.

      This story, known as Tsuru no Ongaeshi, teaches several timeless lessons. It speaks about gratitude — Tsuru's desire to repay kindness. It warns about greed — Yohei's growing desire for more cloth. And it explores the price of secrets — when trust is broken, something precious is lost forever.
    passageZh: |
      很久以前在日本，一个贫穷的织工叫与平，他发现一只鹤被猎人的陷阱困住了。他小心翼翼地放了鹤，看着它飞走。那天晚上，一位美丽的女子出现在他门前，请求避雪。她叫鹤，愿意成为他的妻子。

      鹤是一位技艺精湛的织工。她请与平为她造一台织布机，并答应为他织布拿到市场上卖。但她有一个条件：他绝对不能看她织布。一夜又一夜，鹤把自己关在织布房里。她织出的布料格外美丽——柔如云彩，亮如月光。商人们出大价钱买它。

      与平变得富有了，但渐渐地好奇心压倒了他。一天晚上，他再也忍不住了。他悄悄走到门口，透过缝隙偷看。令他震惊的是，里面没有女人——只有一只鹤，从自己身上拔下羽毛织成布。每织一匹布，鹤就变得更瘦更虚弱。

      鹤发现他在看。她的眼中充满了悲伤。她就是他救的那只鹤，她一直在用她唯一拥有的礼物——她自己的羽毛——来报答他的善意。现在她的秘密被揭露了，她不能再待下去了。她变回了一只鹤，飞入冬天的天空，再也没有回来。

      这个故事被称为"鹤之报恩"，教给我们几个永恒的教训。它讲的是感恩——鹤希望报答善意。它警告贪婪——与平对更多布料日益增长的渴望。它探索了秘密的代价——当信任被打破时，珍贵的东西永远失去了。
    vocabHighlights:
