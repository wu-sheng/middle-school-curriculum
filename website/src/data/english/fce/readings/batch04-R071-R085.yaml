  - id: R084
    title: 'Studio Ghibli: Stories that Touch the Heart'
    titleZh: '吉卜力工作室：触动心灵的故事'
    level: 3
    wordCount: 350
    topic: book-adaptations
    tags: [Q05, month-5]
    source:
      type: 'inspired-by'
      title: 'Various Studio Ghibli films'
      author: 'Hayao Miyazaki'
      note: 'Original passage about Ghibli''s storytelling approach based on publicly available interviews'
    passage: |
      Studio Ghibli, the Japanese animation studio founded by Hayao Miyazaki, has created some of the most beloved films in the world — Spirited Away, My Neighbour Totoro, and Howl's Moving Castle among them. What makes these films so captivating is not just their beautiful art, but the way they tell stories.

      Unlike many Western animated films, Ghibli stories do not always have clear villains. In My Neighbour Totoro, there is no antagonist at all — the story is simply about two sisters moving to the countryside and befriending magical forest spirits. The tension comes not from a battle between good and evil, but from the girls' worry about their sick mother. This quieter kind of storytelling can be just as gripping as an action-packed adventure.

      Miyazaki once said that he wanted to create films where "the children can feel their own courage and their own dignity." His protagonists are often ordinary girls who discover inner strength through kindness rather than fighting. Chihiro in Spirited Away saves her parents not by defeating a monster, but by working hard, being brave, and remembering who she is.

      Ghibli films are also famous for their settings. The bathhouse in Spirited Away, the forest in Princess Mononoke, and the moving castle in Howl's Moving Castle are described with such extraordinary detail that they feel like real places you could visit. Miyazaki and his team spend months researching real locations before designing their fictional worlds.

      Another Ghibli trademark is meaningful pauses. In many films, there are moments where nothing dramatic happens — a character sits quietly, watches clouds, or eats a meal. Miyazaki calls these moments "ma" — a Japanese concept meaning the space between actions. These pauses give the audience time to feel emotions deeply, rather than rushing from one exciting scene to the next.

      For young storytellers, Ghibli teaches a valuable lesson: a story does not need explosions to be powerful. Sometimes the most moving moments are the quietest ones.
    passageZh: |
      吉卜力工作室是由宫崎骏创立的日本动画工作室，创作了世界上最受喜爱的一些电影——《千与千寻》、《龙猫》和《哈尔的移动城堡》等。让这些电影如此迷人的不仅仅是美丽的画面，还有它们讲故事的方式。

      不像许多西方动画电影，吉卜力的故事并不总是有明确的反派。在《龙猫》中，根本没有反派——故事只是关于两个姐妹搬到乡下并与神奇的森林精灵成为朋友。紧张感不是来自善恶之间的战斗，而是来自女孩们对生病母亲的担忧。这种更安静的叙事方式可以和动作冒险一样扣人心弦。

      宫崎骏曾经说过，他想创作"让孩子们能感受到自己的勇气和尊严"的电影。他的主角通常是普通的女孩，通过善良而不是战斗来发现内在的力量。《千与千寻》中的千寻拯救父母不是靠打败怪物，而是靠努力工作、勇敢和记住自己是谁。

      吉卜力电影还以其场景而闻名。《千与千寻》中的澡堂、《幽灵公主》中的森林和《哈尔的移动城堡》中的移动城堡描绘得如此详尽，它们感觉像是你可以去参观的真实地方。宫崎骏和他的团队花几个月时间研究真实地点，然后才设计他们的虚构世界。

      吉卜力的另一个标志是有意义的停顿。在许多电影中，有些时刻什么戏剧性的事情都没发生——一个角色静静地坐着、看云或吃饭。宫崎骏把这些时刻称为"间"——一个日本概念，意思是动作之间的空间。这些停顿给观众时间深深地感受情感，而不是从一个激动人心的场景匆匆赶到下一个。

      对于年轻的讲故事者来说，吉卜力教给我们宝贵的一课：故事不需要爆炸就能有力量。有时最感人的时刻是最安静的时刻。
