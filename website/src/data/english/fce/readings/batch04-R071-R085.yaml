  - id: R085
    title: 'The Art of the Short Story'
    titleZh: '短篇故事的艺术'
    level: 3
    wordCount: 340
    topic: creative-writing
    tags: [Q05, month-5]
    source:
      type: 'original'
      note: 'Original passage about the craft of writing short stories, relevant to FCE story writing'
    passage: |
      Writing a short story is like carving a sculpture. A novelist can use an entire block of marble, but a short story writer must work with a small stone. Every chip matters. Every word must earn its place.

      The most important rule of short story writing is focus. A novel can follow multiple characters across many locations and time periods. A short story works best when it focuses on one character, one problem, and one moment of change. As the American writer Edgar Allan Poe said, every word in a short story should contribute to a "single effect" — one overall feeling or message.

      This is especially relevant for FCE story writing, where you have only 140 to 190 words. In that space, you need a beginning, a middle, and an end. You need a character who changes. And you need at least one moment that makes the reader feel something. That is a lot to pack into a small space.

      The secret is to start as close to the action as possible. Do not waste words on background information. If your character is trapped in a cave, start in the cave — do not spend thirty words explaining how they got there. The reader is smart enough to fill in the gaps.

      Another technique is the "iceberg method," made famous by Ernest Hemingway. Like an iceberg, most of the story remains below the surface. You do not need to explain everything. If a character wipes tears from their eyes, you do not need to write "She was sad." The reader already knows.

      Finally, endings matter enormously in short stories. A strong ending can transform a good story into an unforgettable one. The best short story endings either surprise the reader, reveal something unexpected, or leave them thinking long after they have finished reading. In just a few words, a great ending can change the meaning of everything that came before.
    passageZh: |
      写短篇故事就像雕刻雕塑。小说家可以使用整块大理石，但短篇小说作家必须用一块小石头工作。每一刀都很重要。每个词都必须有存在的价值。

      短篇故事写作最重要的规则是聚焦。小说可以在多个地点和时间段追踪多个角色。短篇小说在聚焦一个角色、一个问题和一个变化时刻时效果最好。正如美国作家爱伦·坡所说，短篇故事中的每个词都应该有助于一个"单一效果"——一个整体的感觉或信息。

      这对FCE故事写作特别相关，你只有140到190个词。在这个空间里，你需要开头、中间和结尾。你需要一个会变化的角色。你还需要至少一个让读者有感触的时刻。这在小空间里要装很多东西。

      秘诀是尽可能靠近动作开始。不要浪费词语在背景信息上。如果你的角色被困在洞穴里，就从洞穴开始——不要花三十个词解释他们是怎么到那里的。读者足够聪明，能自己填补空白。

      另一个技巧是"冰山法"，由海明威推广。就像冰山一样，故事的大部分留在水面以下。你不需要解释所有东西。如果一个角色擦去眼泪，你不需要写"她很伤心"。读者已经知道了。

      最后，结尾在短篇故事中极其重要。一个有力的结尾可以把一个好故事变成一个令人难忘的故事。最好的短篇故事结尾要么给读者惊喜，要么揭示意想不到的东西，要么让他们在读完很久之后仍在思考。仅用几个词，一个伟大的结尾就能改变之前所有内容的意义。
