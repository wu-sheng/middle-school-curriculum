  - id: R141
    title: 'What Makes a Great Video Game?'
    titleZh: '什么造就了一款伟大的电子游戏？'
    level: 3
    wordCount: 340
    topic: game review
    tags: [Q09, month-9]
    source:
      type: 'original'
      note: 'Original passage about the elements of great game design'
    passage: |
      With thousands of new video games released every year, only a handful are remembered as truly great. What separates a forgettable game from a masterpiece? Game designers and players tend to agree on four key ingredients.

      First, a great game needs intuitive controls. The player should be able to pick up the controller and start playing without needing to read a manual. The best games teach you how to play through the gameplay itself. Mario games are a perfect example — the first level gently introduces every mechanic you need, so by the time the real challenges begin, you already know what to do.

      Second, great games offer a sense of progression. Players need to feel that they are getting better, unlocking new abilities, and moving towards a goal. This is why games use levels, experience points, and achievement badges — they provide constant feedback that keeps players motivated and engaged.

      Third, the best games balance challenge with reward. If a game is too easy, players get bored. If it is too hard, they get frustrated and quit. The sweet spot is when a challenge feels difficult but achievable — when you fail, you want to try again because you know you were close. Game designers call this "flow state," and it is what makes great games so addictive.

      Finally, many of the greatest games tell a compelling story. Games like "The Last of Us" and "Undertale" have stories that rival the best novels and films. Players become emotionally invested in the characters, making every decision feel meaningful and every victory feel earned.

      Of course, not every great game needs all four elements. Tetris has no story but remains one of the most beloved games ever made. Minecraft has no levels but has captivated over 300 million players. What truly matters is that the game creates an experience that the player cannot forget.
    passageZh: |
      每年有数千款新电子游戏发布，只有少数被记住为真正伟大的。是什么将一款容易被遗忘的游戏与一部杰作区分开来？游戏设计师和玩家倾向于认同四个关键要素。

      首先，一款伟大的游戏需要直觉的操控。玩家应该能拿起控制器就开始玩，不需要阅读说明书。最好的游戏通过游戏本身教你如何玩。马里奥游戏就是一个完美的例子——第一关轻柔地介绍了你需要的每个机制，所以当真正的挑战开始时，你已经知道该怎么做了。

      其次，伟大的游戏提供进步感。玩家需要感觉到他们在变得更好、解锁新能力、向目标前进。这就是为什么游戏使用关卡、经验值和成就徽章——它们提供持续的反馈，保持玩家的动力和参与度。

      第三，最好的游戏在挑战和奖励之间取得平衡。如果游戏太简单，玩家会感到无聊。如果太难，他们会感到沮丧并放弃。最佳点是当一个挑战感觉困难但可以实现——当你失败时，你想再试一次，因为你知道你差一点就成功了。游戏设计师称之为"心流状态"，这就是让伟大游戏如此让人上瘾的原因。

      最后，许多最伟大的游戏讲述了引人入胜的故事。像《最后生还者》和《传说之下》这样的游戏有着可以与最好的小说和电影媲美的故事。玩家在情感上投入到角色中，使每个决定都感觉有意义，每次胜利都感觉是赢得的。

      当然，不是每款伟大的游戏都需要所有四个元素。俄罗斯方块没有故事，但仍然是有史以来最受喜爱的游戏之一。我的世界没有关卡，但吸引了超过3亿玩家。真正重要的是游戏创造了一种玩家无法忘记的体验。
