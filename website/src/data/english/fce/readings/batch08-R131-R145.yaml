      这一增长背后的技术很简单：智能手机。在智能手机之前，听有声书需要专用设备或CD。现在，Audible和Libby等应用让任何人都可以即时下载和收听数千本书，无论他们是在公共汽车上、遛狗还是做家务。

      但有声书真的算是"阅读"吗？这个问题引起了分歧。有人认为听是一种被动活动，不像阅读文本那样深度激活大脑。然而，研究讲述了不同的故事。神经科学家的研究表明，大脑以非常相似的方式处理有声书和印刷文本，激活相同的语言理解和情感反应区域。

