    passage: |
      Hanging behind bulletproof glass in the Louvre Museum in Paris, the Mona Lisa is the most visited painting in the world. Over 10 million people come to see it every year. But what makes this relatively small portrait — just 77 by 53 centimetres — so extraordinarily famous?

      Leonardo da Vinci began painting the Mona Lisa around 1503 and is believed to have worked on it for several years. The subject is thought to be Lisa Gherardini, the wife of a wealthy merchant from Florence. However, the painting's true fascination lies not in who the subject is, but in how Leonardo painted her.

      The Mona Lisa's smile is perhaps the most discussed detail in all of art history. Depending on where you look, she appears to be smiling or not smiling. Scientists have discovered that this effect is caused by Leonardo's use of sfumato — a technique where the edges of features are softened and blurred, creating an ambiguous expression that seems to change as you look at it.

      However, the Mona Lisa was not always the world's most famous painting. For centuries, it was respected but not extraordinary. Its fame skyrocketed in 1911 when an Italian handyman named Vincenzo Peruggia stole it from the Louvre. The theft made front-page news worldwide, and when the painting was recovered two years later, it had become the most recognised artwork on the planet.

      Today, visiting the Mona Lisa can be a disappointing experience for some tourists. The painting is much smaller than expected, and the room is always crowded with visitors holding up phones to take photographs. Nevertheless, standing before a 500-year-old painting by one of history's greatest minds remains a genuinely moving experience for those who take the time to look carefully at its extraordinary detail.
