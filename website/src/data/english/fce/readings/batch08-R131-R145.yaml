        explanationZh: '"让它如此革命性的是……故事的讲述方式：通过嘻哈、R&B和说唱音乐，由多元化的演员阵容表演。"'
      - id: R144-Q2
        type: vocabulary-in-context
        question: 'What does "deliberate" mean in the passage?'
        questionZh: '文中的"deliberate"是什么意思？'
        options:
          A: 'Accidental and unplanned'
