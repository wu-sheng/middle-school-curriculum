      达芬奇大约在1503年开始画蒙娜丽莎，据信他画了好几年。画中人被认为是Lisa Gherardini，佛罗伦萨一位富商的妻子。然而，这幅画真正的魅力不在于画中人是谁，而在于达芬奇如何画她。

      蒙娜丽莎的微笑也许是所有艺术史上讨论最多的细节。根据你看的角度不同，她似乎在微笑或没有微笑。科学家发现这种效果是由达芬奇使用渐隐法造成的——一种将特征边缘柔化和模糊的技术，创造出一种模糊的表情，随着你的观看似乎在变化。

