  # ============================================================
  # R131 – Why Everyone Loves Harry Potter (Level 3, ~340 words)
  # ============================================================
  - id: R131
    title: 'Why Everyone Loves Harry Potter'
    titleZh: '为什么所有人都爱哈利·波特'
    level: 3
    wordCount: 340
    topic: book review
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Harry Potter and the Philosopher''s Stone'
      author: 'J.K. Rowling'
      note: 'Original passage inspired by the cultural impact of the Harry Potter series'
    passage: |
      When J.K. Rowling published "Harry Potter and the Philosopher's Stone" in 1997, few people expected it to become one of the most successful book series in history. Today, over 500 million copies have been sold worldwide, and the stories have been translated into more than 80 languages.

      [1]

      The story follows Harry Potter, an orphan who discovers on his eleventh birthday that he is a wizard. He is invited to attend Hogwarts School of Witchcraft and Wizardry, where he makes lifelong friends and faces a powerful dark enemy. What makes the series special is not just the magic — it is the way Rowling creates characters that feel like real people with genuine emotions.

      [2]

      One reason for the series' enormous popularity is that it grows up with its readers. The first book is written for children aged eight or nine, with short chapters and simple language. By the final book, the themes are much darker and more complex, dealing with death, sacrifice, and the nature of good and evil. Readers who started the series as children were teenagers by the time the last book came out.

      [3]

      Furthermore, the books have had a remarkable impact on reading habits. Studies have shown that children who read Harry Potter are more likely to continue reading other books. Libraries and bookshops reported a significant increase in children's book sales during the Potter years. Teachers around the world credit the series with turning reluctant readers into enthusiastic bookworms.

      Perhaps the greatest achievement of Harry Potter is that it proved children's literature could be both commercially successful and critically respected. It changed the publishing industry forever and showed that a story about a boy wizard could capture the hearts of millions.
    passageZh: |
      当J.K.罗琳于1997年出版《哈利·波特与魔法石》时，很少有人预料到它会成为历史上最成功的丛书之一。如今，全球已售出超过5亿册，故事被翻译成80多种语言。

      [1]

      故事讲述了哈利·波特，一个在十一岁生日时发现自己是巫师的孤儿。他被邀请去霍格沃茨魔法学校上学，在那里他结交了终生的朋友并面对一个强大的黑暗敌人。让这套丛书特别的不仅仅是魔法——而是罗琳创造的角色让人感觉像真人一样有真实的情感。

      [2]

      该系列极其受欢迎的一个原因是它和读者一起成长。第一本书是为八九岁的孩子写的，章节短、语言简单。到最后一本书时，主题更加黑暗和复杂，涉及死亡、牺牲和善恶的本质。从小读这套丛书的读者到最后一本出版时已经是青少年了。

      [3]

      此外，这些书对阅读习惯产生了显著的影响。研究表明，读过哈利·波特的孩子更有可能继续阅读其他书籍。图书馆和书店报告说，在波特时代儿童图书销量显著增加。世界各地的教师都称赞这套丛书将不愿阅读的孩子变成了热情的书虫。

      也许哈利·波特最大的成就是证明了儿童文学可以既在商业上成功，又受到评论界的尊重。它永远改变了出版业，并表明一个关于男孩巫师的故事可以俘获数百万人的心。
    vocabHighlights:
      - word: recommend
        ref: V1301
      - word: masterpiece
        ref: V1329
      - word: captivating
        ref: V1307
    questions:
      - id: R131-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'But the journey to publication was far from easy. Rowling was famously rejected by twelve publishers before Bloomsbury agreed to print just 500 copies of the first book.'
          B: 'The films made even more money than the books, earning billions at the box office.'
          C: 'Many other fantasy series have tried to copy the Harry Potter formula, but none have matched its success.'
        answer: 'A'
        explanation: 'Gap [1] follows the paragraph about the book''s massive success. "But the journey to publication was far from easy" provides a contrast (despite the success, it nearly did not happen), leading naturally into the plot summary.'
        explanationZh: '空缺[1]在关于这本书巨大成功的段落之后。"But the journey to publication was far from easy"提供了对比（尽管成功了，但差点没能实现），自然引向情节摘要。'
      - id: R131-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Hogwarts is divided into four houses, each with its own personality and values.'
          B: 'Readers see themselves in characters like Hermione, who proves that hard work and intelligence are just as powerful as any spell, or Neville, who shows that bravery comes in many forms.'
          C: 'The Quidditch matches are some of the most exciting scenes in the series.'
        answer: 'B'
        explanation: 'Gap [2] follows the statement about characters feeling like real people. B gives specific examples (Hermione, Neville) that support this point about character depth.'
        explanationZh: '空缺[2]在关于角色感觉像真人的陈述之后。B给出了具体例子（赫敏、纳威）来支持关于角色深度的观点。'
      - id: R131-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'J.K. Rowling later wrote other books under the pen name Robert Galbraith.'
          B: 'This clever structure meant that the audience never outgrew the story — the story grew with them.'
          C: 'The final book sold 11 million copies in its first 24 hours.'
        answer: 'B'
        explanation: 'Gap [3] follows the paragraph about the series growing up with readers. "This clever structure" refers back to this idea, and "never outgrew the story" summarises the point before moving to the next paragraph.'
        explanationZh: '空缺[3]在关于丛书和读者一起成长的段落之后。"This clever structure"指代这个想法，"never outgrew the story"在转到下一段之前总结了这一点。'
      - id: R131-Q4
        type: vocabulary-in-context
        question: 'What does "reluctant" mean in the passage?'
        questionZh: '文中的"reluctant"是什么意思？'
        options:
          A: 'Extremely enthusiastic about something'
          B: 'Not willing or eager to do something'
          C: 'Very talented at doing something'
          D: 'Completely unable to do something'
        answer: 'B'
        explanation: '"Reluctant readers" are children who do not want to read. "Reluctant" means unwilling or hesitant.'
        explanationZh: '"Reluctant readers"是不想读书的孩子。"Reluctant"意思是不情愿的或犹豫的。'

  # ============================================================
  # R132 – Percy Jackson: Greek Myths for Modern Kids (Level 3, ~350 words)
  # ============================================================
  - id: R132
    title: 'Percy Jackson: Greek Myths for Modern Kids'
    titleZh: '珀西·杰克逊：现代孩子的希腊神话'
    level: 3
    wordCount: 350
    topic: book review
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Percy Jackson and the Lightning Thief'
      author: 'Rick Riordan'
      note: 'Original passage about the Percy Jackson series and its approach to mythology'
    passage: |
      What do you get when you combine Greek mythology with a modern American school story? The answer is Percy Jackson, one of the most popular children's book series of the 21st century. Written by Rick Riordan, the five-book series has sold over 45 million copies and been adapted into films and a Disney+ television series.

      The story follows twelve-year-old Percy, who has always felt different from other children. He struggles at school, gets into trouble constantly, and has been expelled from six schools in six years. Then, on a school trip to a museum, his maths teacher turns into a monster and tries to attack him.

      [1]

      What makes the Percy Jackson books so appealing to young readers is how Riordan makes ancient mythology feel fresh and relevant. The Greek gods live on Mount Olympus — which happens to sit on top of the Empire State Building in New York. The entrance to the Underworld is in Los Angeles. Medusa runs a garden shop. These clever modern twists make myths that are thousands of years old feel exciting and accessible.

      [2]

      Furthermore, Rick Riordan originally created these stories for his son, who has ADHD and dyslexia. In the books, Percy also has these conditions — but they are explained as signs of his godly heritage. His ADHD is actually battlefield reflexes, and his dyslexia exists because his brain is wired for ancient Greek. This representation has meant a great deal to readers who see themselves reflected in the hero.

      [3]

      The series has also sparked a genuine interest in Greek mythology among young readers. Teachers report that students who have read Percy Jackson often know more about Greek myths than those who have studied them in textbooks. Riordan proved that the best way to teach children about ancient history is not through dry facts, but through exciting, funny, and heartfelt stories.
    passageZh: |
      把希腊神话和现代美国校园故事结合在一起会怎样？答案就是珀西·杰克逊，21世纪最受欢迎的儿童丛书之一。由Rick Riordan撰写，这套五本书的系列已经售出超过4500万册，并被改编成电影和Disney+电视剧。

      故事讲述了十二岁的珀西，他一直觉得自己和其他孩子不同。他在学校里挣扎，不断惹麻烦，六年内被六所学校开除。然后，在一次学校博物馆参观中，他的数学老师变成了一个怪物并试图攻击他。

      [1]

      让珀西·杰克逊系列书对年轻读者如此有吸引力的是Riordan如何让古老的神话感觉新鲜和相关。希腊诸神住在奥林匹斯山上——恰好坐落在纽约帝国大厦的顶部。冥界的入口在洛杉矶。美杜莎经营着一家花园商店。这些巧妙的现代转折让数千年前的神话感觉令人兴奋和易于理解。

      [2]

      此外，Rick Riordan最初是为他的儿子创作这些故事的，他的儿子有注意力缺陷多动症和阅读障碍。在书中，珀西也有这些情况——但它们被解释为他神圣血统的标志。他的注意力缺陷多动症实际上是战场反应能力，他的阅读障碍存在是因为他的大脑是为古希腊语而设计的。这种代表性对那些在英雄身上看到自己影子的读者来说意义重大。

      [3]

      这套丛书还激发了年轻读者对希腊神话的真正兴趣。教师报告说，读过珀西·杰克逊的学生通常比在教科书中学习过希腊神话的学生知道更多。Riordan证明了教孩子关于古代历史的最好方式不是通过枯燥的事实，而是通过令人兴奋、有趣和真挚的故事。
    vocabHighlights:
      - word: appealing
        ref: V1318
      - word: adaptation
        ref: V1311
      - word: genuine
        ref: V1334
    questions:
      - id: R132-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Percy soon discovers that he is the son of Poseidon, the Greek god of the sea, and that the mythological world is very much alive and hidden within modern-day America.'
          B: 'Greek mythology has been studied in schools for centuries.'
          C: 'The museum had an impressive collection of ancient Greek pottery.'
        answer: 'A'
        explanation: 'Gap [1] follows the monster attack. A explains WHY this happened (Percy is a demigod), connecting the school life to the mythological world.'
        explanationZh: '空缺[1]在怪物攻击之后。A解释了为什么会发生这种事（珀西是半神），将校园生活与神话世界联系起来。'
      - id: R132-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'The books also feature many exciting battle scenes between heroes and monsters.'
          B: 'However, the humour is perhaps the series'' greatest strength. Percy''s first-person narration is witty, sarcastic, and laugh-out-loud funny, making even the most dangerous situations entertaining to read about.'
          C: 'Rick Riordan has also written series about Egyptian and Norse mythology.'
        answer: 'B'
        explanation: 'Gap [2] follows the paragraph about modern twists on mythology. B adds another key appeal (humour) and transitions naturally to the next paragraph about the personal origins of the series.'
        explanationZh: '空缺[2]在关于神话现代转折的段落之后。B增加了另一个关键吸引力（幽默），并自然过渡到关于系列个人起源的下一段。'
      - id: R132-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Many readers have written to Riordan thanking him for making them feel seen and accepted.'
          B: 'The Disney+ adaptation was released in 2023 to largely positive reviews.'
          C: 'Greek mythology features gods, heroes, and monsters in dramatic stories.'
        answer: 'A'
        explanation: 'Gap [3] follows the paragraph about representation of ADHD and dyslexia. A directly connects to readers'' emotional responses to this representation.'
        explanationZh: '空缺[3]在关于注意力缺陷多动症和阅读障碍代表性的段落之后。A直接与读者对这种代表性的情感反应相关。'
      - id: R132-Q4
        type: vocabulary-in-context
        question: 'What does "sparked" mean in the final paragraph?'
        questionZh: '最后一段中的"sparked"是什么意思？'
        options:
          A: 'Destroyed completely'
          B: 'Started or triggered'
          C: 'Questioned seriously'
          D: 'Copied exactly'
        answer: 'B'
        explanation: '"Sparked an interest" means "started or triggered an interest." Like a spark starting a fire, the books ignited curiosity about mythology.'
        explanationZh: '"Sparked an interest"意思是"激发了兴趣"。就像火花点燃火焰一样，这些书点燃了对神话的好奇心。'

  # ============================================================
  # R133 – The Magic of Frozen (Level 3, ~330 words)
  # ============================================================
  - id: R133
    title: 'The Magic of Frozen'
    titleZh: '《冰雪奇缘》的魔力'
    level: 3
    wordCount: 330
    topic: movie review
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Frozen (2013 film)'
      author: 'Walt Disney Animation Studios'
      note: 'Original passage about the cultural impact of the Frozen franchise'
    passage: |
      When "Frozen" was released in 2013, nobody could have predicted just how enormous its impact would be. The film earned over 1.2 billion dollars at the box office, and its signature song "Let It Go" became one of the most recognisable melodies on the planet.

      The story is loosely based on Hans Christian Andersen's fairy tale "The Snow Queen," but Disney transformed it into something entirely original. Princess Elsa has magical ice powers that she cannot control. After accidentally freezing her kingdom, she flees to the mountains to live alone. Her sister Anna sets out on a dangerous journey to bring Elsa home and save their kingdom.

      [1]

      What sets Frozen apart from earlier Disney films is its message about female empowerment. Unlike classic Disney princesses who wait to be rescued by a prince, Anna and Elsa save each other through the power of sisterly love. The film's climax features an act of true love that is not romantic — it is between two sisters. This was groundbreaking for Disney.

      [2]

      The success of "Let It Go," performed by Idina Menzel, deserves special mention. The song became a global phenomenon, with children around the world singing it in dozens of languages. It captured the feeling of breaking free from expectations and being proud of who you are — a message that resonated with audiences of all ages.

      [3]

      The sequel, "Frozen 2," was released in 2019 and explored deeper themes of identity, change, and doing what is right even when it is scary. It proved that the Frozen franchise was not a one-hit wonder but a genuinely meaningful story with staying power.
    passageZh: |
      当《冰雪奇缘》于2013年上映时，没人能预料到它的影响会如此巨大。这部电影在票房上赚了超过12亿美元，其标志性歌曲"Let It Go"成为了地球上最广为人知的旋律之一。

      这个故事大致基于安徒生的童话《冰雪女王》，但迪士尼将其转变成了完全原创的东西。艾尔莎公主拥有无法控制的冰魔法力量。在意外冻结了她的王国之后，她逃到山里独自生活。她的妹妹安娜踏上了一段危险的旅程，要把艾尔莎带回家并拯救她们的王国。

      [1]

      让《冰雪奇缘》与早期迪士尼电影不同的是它关于女性赋权的信息。与等待被王子拯救的经典迪士尼公主不同，安娜和艾尔莎通过姐妹之爱的力量互相拯救。电影的高潮展示了一个真爱之举，不是浪漫的——而是姐妹之间的。这对迪士尼来说是开创性的。

      [2]

      由Idina Menzel演唱的"Let It Go"的成功值得特别提及。这首歌成为全球现象，世界各地的孩子用数十种语言演唱它。它捕捉到了摆脱期望和为自己感到自豪的感觉——这个信息引起了所有年龄段观众的共鸣。

      [3]

      续集《冰雪奇缘2》于2019年上映，探索了关于身份、变化和即使害怕也要做正确事情的更深层主题。它证明了冰雪奇缘系列不是昙花一现，而是一个真正有意义的、持久的故事。
    vocabHighlights:
      - word: soundtrack
        ref: V1313
      - word: sequel
        ref: V1310
      - word: outstanding
        ref: V1306
    questions:
      - id: R133-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Along the way, Anna is joined by Kristoff, a rugged ice harvester, his reindeer Sven, and Olaf, a magical snowman who dreams of experiencing summer.'
          B: 'Disney has produced animated films since 1937.'
          C: 'The costumes in the film were designed by multiple award-winning artists.'
        answer: 'A'
        explanation: 'Gap [1] follows Anna setting out on her journey. A introduces the companions who join her, which is the natural next story beat.'
        explanationZh: '空缺[1]在安娜踏上旅程之后。A介绍了加入她的伙伴们，这是自然的下一个故事节拍。'
      - id: R133-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Disney made several other animated films the same year.'
          B: 'This shift in storytelling inspired many other studios to create films with stronger, more independent female characters.'
          C: 'The film was nominated for several technical awards.'
        answer: 'B'
        explanation: 'Gap [2] follows the paragraph about Frozen''s groundbreaking female empowerment message. B shows the IMPACT of this shift on the wider industry.'
        explanationZh: '空缺[2]在关于冰雪奇缘开创性女性赋权信息的段落之后。B展示了这一转变对更广泛行业的影响。'
      - id: R133-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Idina Menzel had previously starred in the musical "Wicked" on Broadway.'
          B: 'Indeed, "Let It Go" won the Academy Award for Best Original Song, further cementing Frozen''s place in animation history.'
          C: 'Many parents complained that their children played the song on repeat.'
        answer: 'B'
        explanation: 'Gap [3] follows the paragraph about the song''s cultural impact. B adds the award recognition and transitions to the sequel discussion.'
        explanationZh: '空缺[3]在关于这首歌文化影响的段落之后。B增加了奖项认可并过渡到续集讨论。'
      - id: R133-Q4
        type: vocabulary-in-context
        question: 'What does "resonated" mean in the passage?'
        questionZh: '文中的"resonated"是什么意思？'
        options:
          A: 'Annoyed or frustrated people'
          B: 'Was meaningful and emotionally powerful for people'
          C: 'Was difficult for people to understand'
          D: 'Sounded very loud and clear'
        answer: 'B'
        explanation: '"Resonated with audiences" means the message felt personally meaningful and emotionally powerful to them.'
        explanationZh: '"Resonated with audiences"意思是这个信息对他们来说有个人意义和情感力量。'

  # ============================================================
  # R134 – Minecraft: Building a World of Creativity (Level 3, ~360 words)
  # ============================================================
  - id: R134
    title: 'Minecraft: Building a World of Creativity'
    titleZh: '我的世界：建造创意的世界'
    level: 3
    wordCount: 360
    topic: game review
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Minecraft'
      author: 'Mojang Studios'
      note: 'Original passage about the cultural significance of Minecraft'
    passage: |
      With over 300 million copies sold, Minecraft is the best-selling video game of all time. But unlike most blockbuster games, it has no story to follow, no enemies to defeat, and no levels to complete. So why has a game made of simple blocks become a worldwide phenomenon?

      The answer lies in creativity. Minecraft gives players a randomly generated world made entirely of blocks — earth, stone, wood, water, and hundreds of other materials. Players can mine these resources and use them to build anything they can imagine, from a small wooden house to a full-scale replica of the Eiffel Tower.

      [1]

      The game offers two main modes. In Survival Mode, players must gather resources, build shelter, and protect themselves from monsters that appear at night. In Creative Mode, there are no threats and unlimited resources — it is a pure building sandbox. This flexibility means Minecraft appeals to both adventure seekers and creative builders.

      [2]

      What truly sets Minecraft apart, however, is its use in education. Over 35 million students worldwide use Minecraft Education Edition in their classrooms. Teachers use it to teach subjects ranging from mathematics and history to coding and environmental science. Students have recreated historical monuments, built models of human cells, and programmed working calculators — all inside the game.

      [3]

      Furthermore, Minecraft has created one of the largest online communities in gaming history. Players share their creations on YouTube, where Minecraft content generates billions of views each year. The game has inspired an entire generation of young people to become builders, designers, and even programmers. Perhaps that is the real magic of Minecraft: it does not tell you what to do — it lets you decide.
    passageZh: |
      售出超过3亿份，我的世界是有史以来最畅销的电子游戏。但与大多数大作游戏不同，它没有要遵循的故事、没有要打败的敌人、没有要完成的关卡。那么为什么一个由简单方块组成的游戏会成为世界性的现象？

      答案在于创造力。我的世界给予玩家一个完全由方块——泥土、石头、木头、水和数百种其他材料——组成的随机生成的世界。玩家可以挖掘这些资源并用它们建造任何想象得到的东西，从一个小木屋到一个完整比例的埃菲尔铁塔复制品。

      [1]

      游戏提供两种主要模式。在生存模式中，玩家必须收集资源、建造庇护所并保护自己免受夜间出现的怪物的攻击。在创意模式中，没有威胁且资源无限——它是一个纯粹的建造沙盒。这种灵活性意味着我的世界同时吸引冒险家和创意建造者。

      [2]

      然而，真正让我的世界与众不同的是它在教育中的应用。全球超过3500万学生在课堂上使用我的世界教育版。教师用它来教授从数学和历史到编程和环境科学的各种科目。学生们重建了历史古迹、建造了人体细胞模型、编程了可运行的计算器——所有这些都在游戏中完成。

      [3]

      此外，我的世界创建了游戏史上最大的在线社区之一。玩家在YouTube上分享他们的创作，我的世界内容每年产生数十亿次观看。这款游戏激发了整整一代年轻人成为建造者、设计师，甚至程序员。也许这才是我的世界真正的魔力：它不告诉你该做什么——它让你自己决定。
