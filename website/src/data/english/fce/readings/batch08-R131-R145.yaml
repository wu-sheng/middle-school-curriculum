  - id: R144
    title: 'The Musical That Changed Everything: Hamilton'
    titleZh: '改变一切的音乐剧：汉密尔顿'
    level: 4
    wordCount: 380
    topic: theatre review
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Hamilton: An American Musical'
      author: 'Lin-Manuel Miranda'
      note: 'Original passage about Hamilton and its impact on musical theatre'
    passage: |
      In 2015, a musical about Alexander Hamilton — one of America's founding fathers — opened on Broadway and became the biggest cultural phenomenon in theatre history. What made it so revolutionary was not its subject matter, but how the story was told: through hip-hop, R&B, and rap music, performed by a diverse cast of actors.

      Lin-Manuel Miranda, who wrote the music, lyrics, and book, got the idea while reading a biography of Hamilton on holiday. He imagined Hamilton's life — an immigrant who rose from poverty to become one of the most important figures in American history — as a hip-hop story. "This is a hip-hop story," Miranda later said. "It's the story of someone who uses words to get ahead."

      The result was unlike anything Broadway had ever seen. Characters who were historically white were played by Black, Latino, and Asian actors. King George III sang a pop ballad. Thomas Jefferson performed a rap battle with Hamilton. These creative choices were not random — they were a deliberate statement that American history belongs to everyone.

      Critics were overwhelmed. The show received 16 Tony nominations — the most in history — and won 11. It also won the Pulitzer Prize for Drama. Tickets became almost impossible to get, with prices reaching thousands of dollars on resale websites.

      But Hamilton's real impact went far beyond Broadway. The cast recording became one of the best-selling albums of 2016, introducing millions of people to musical theatre through streaming platforms. A filmed version released on Disney+ in 2020 reached an even wider audience, allowing families worldwide to experience the show from home.

      Most importantly, Hamilton proved that musical theatre could be modern, diverse, and relevant to a new generation. It showed that the stories of the past could be told in the language of the present — and that doing so could create something truly extraordinary.
    passageZh: |
      2015年，一部关于美国开国元勋之一亚历山大·汉密尔顿的音乐剧在百老汇首演，成为剧场历史上最大的文化现象。让它如此革命性的不是主题，而是故事的讲述方式：通过嘻哈、R&B和说唱音乐，由一个多元化的演员阵容表演。

      写了音乐、歌词和剧本的Lin-Manuel Miranda在假期阅读汉密尔顿的传记时得到了灵感。他将汉密尔顿的一生——一个从贫困中崛起成为美国历史上最重要人物之一的移民——想象成一个嘻哈故事。"这是一个嘻哈故事，"Miranda后来说。"这是一个用文字出人头地的人的故事。"

      结果是百老汇从未见过的东西。历史上是白人的角色由黑人、拉丁裔和亚裔演员扮演。乔治三世国王唱了一首流行民谣。托马斯·杰斐逊与汉密尔顿进行了说唱对决。这些创意选择不是随机的——它们是一个刻意的声明：美国历史属于每个人。

      评论家们被折服了。这部剧获得了16项托尼奖提名——历史上最多——赢得了11项。它还获得了普利策戏剧奖。门票几乎不可能买到，在转售网站上价格达到数千美元。

      但汉密尔顿的真正影响远远超出了百老汇。演员录音成为2016年最畅销的专辑之一，通过流媒体平台向数百万人介绍了音乐剧。2020年在Disney+上发布的录制版本触及了更广泛的观众，让全世界的家庭都能在家体验这场演出。

      最重要的是，汉密尔顿证明了音乐剧可以是现代的、多元化的，并且与新一代人相关。它表明过去的故事可以用现在的语言来讲述——而这样做可以创造出真正非凡的东西。
