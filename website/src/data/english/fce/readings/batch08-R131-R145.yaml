      绘本常被认为只适合很小的孩子。然而，一些最有力和感人的故事是以绘本的形式讲述的。从Maurice Sendak的《野兽国》到陈志勇的《抵岸》，绘本证明了图像可以讲述文字无法单独讲述的故事。

      绘本的魔力在于文字和插图之间的关系。在最好的绘本中，文字和图片都无法单独讲述完整的故事。读者必须将两者结合才能理解真正发生的事情。这使得阅读绘本成为一种主动的、引人入胜的体验——远非一些人想象的被动活动。

      伟大的绘本插画家是真正的艺术家。他们对颜色、构图和视角的选择会影响我们对故事的感受。从上方展示的角色看起来渺小而脆弱。没有任何文字的跨页可以创造一个强有力的沉默时刻。暖色调暗示安全；冷色调暗示危险。

      此外，绘本越来越多地被用来处理悲伤、心理健康、移民和残疾等困难话题。像Oliver Jeffers的《心和瓶子》这样的书以一种对幼儿来说足够温和但深刻到让成年人感动落泪的方式探索了失去。

