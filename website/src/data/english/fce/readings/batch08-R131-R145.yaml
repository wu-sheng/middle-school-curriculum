    topic: book review
    tags: [Q09, month-9]
    source:
      type: 'original'
      note: 'Original passage about why picture books matter for readers of all ages'
    passage: |
      Picture books are often dismissed as being only for very young children. However, some of the most powerful and moving stories ever written have been told in picture book format. From Maurice Sendak's "Where the Wild Things Are" to Shaun Tan's "The Arrival," picture books prove that images can tell stories that words alone cannot.

      The magic of a picture book lies in the relationship between text and illustration. In the best picture books, neither the words nor the pictures can tell the full story alone. The reader must combine both to understand what is really happening. This makes reading a picture book an active, engaging experience — far from the passive activity that some people imagine.

      Great picture book illustrators are true artists. They make choices about colour, composition, and perspective that affect how we feel about the story. A character shown from above looks small and vulnerable. A double-page spread without any text can create a powerful moment of silence. Warm colours suggest safety; cold colours suggest danger.

      Furthermore, picture books are increasingly being used to tackle difficult topics such as grief, mental health, immigration, and disability. Books like "The Heart and the Bottle" by Oliver Jeffers explore loss in a way that is gentle enough for young children but deep enough to move adults to tears.

      The truth is that picture books are not just for children — they are for anyone who believes that a story can be told in many different ways. As the famous illustrator Chris Riddell once said, "A picture book is a gallery you can hold in your hands."
