  # ============================================================
  - id: R135
    title: 'The History of Cinema: From Silent Films to Streaming'
    titleZh: '电影史：从无声电影到流媒体'
    level: 4
    wordCount: 380
    topic: film history
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'A Short History of Film'
      author: 'Various sources'
      note: 'Original passage about the evolution of cinema technology'
    passage: |
      The story of cinema begins in 1895, when two French brothers, Auguste and Louis Lumiere, showed the first moving pictures to a paying audience in Paris. The films were only about 50 seconds long and had no sound, but the audience was amazed — some people even screamed when they saw a train moving towards them on screen.

      For the next three decades, all films were silent. Actors had to express emotions entirely through facial expressions and body language, and orchestras played live music in the theatre to set the mood. Title cards with written text appeared between scenes to explain the story.

      [1]

      Everything changed in 1927 when "The Jazz Singer" became the first feature film with synchronised dialogue. Suddenly, actors could speak, and audiences could hear music and sound effects. Within just two years, silent films had almost completely disappeared. Many silent film stars lost their careers because their voices did not match the characters they had played.

      [2]

      The next major revolution came with colour. Although experiments with colour film began in the 1900s, it was not until the late 1930s that colour films became common. "The Wizard of Oz" in 1939 famously starts in black and white before bursting into vivid colour — a moment that still amazes viewers today.

      [3]

      The most recent transformation has been the rise of streaming services. Platforms like Netflix, Disney+, and Amazon Prime have changed how we watch films. Instead of going to a cinema, millions of people now watch new releases at home. Some filmmakers worry that this shift is destroying the magic of the big-screen experience. Others argue that streaming has made films more accessible to people who live far from cinemas or cannot afford regular tickets.

      One thing is certain: from those first flickering images in a Paris basement to the high-definition streams on our phones today, cinema has never stopped evolving. And the best part? The story is far from over.
    passageZh: |
      电影的故事始于1895年，两位法国兄弟奥古斯特和路易斯·卢米埃尔在巴黎首次向付费观众展示了活动影像。这些电影只有大约50秒长且没有声音，但观众惊叹不已——有些人在看到火车在银幕上向他们驶来时甚至尖叫了。

      在接下来的三十年里，所有电影都是无声的。演员必须完全通过面部表情和肢体语言来表达情感，管弦乐队在剧院里现场演奏音乐来营造气氛。带有文字的字幕卡出现在场景之间来解释故事。

      [1]

      1927年一切都改变了，当时《爵士歌手》成为第一部有同步对话的故事片。突然间，演员可以说话了，观众可以听到音乐和音效。在短短两年内，无声电影几乎完全消失了。许多无声电影明星失去了事业，因为他们的声音与他们扮演的角色不匹配。

      [2]

      下一次重大革命是彩色电影。尽管彩色电影的实验始于1900年代，但直到1930年代末彩色电影才变得普遍。1939年的《绿野仙踪》以黑白开始，然后突然转为鲜艳的色彩——这一时刻至今仍让观众惊叹。

      [3]

      最近的一次变革是流媒体服务的兴起。Netflix、Disney+和Amazon Prime等平台改变了我们看电影的方式。数百万人现在在家里观看新片，而不是去电影院。一些电影制作人担心这种转变正在破坏大银幕体验的魔力。另一些人认为流媒体让远离电影院或负担不起经常买票的人更容易看到电影。

      有一件事是确定的：从巴黎地下室中最初的闪烁影像到今天我们手机上的高清流媒体，电影从未停止演变。而最好的部分是？故事远未结束。
