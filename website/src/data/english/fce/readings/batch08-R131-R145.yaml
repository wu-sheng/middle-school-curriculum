  - id: R136
    title: 'How Music Changed the Movies'
    titleZh: '音乐如何改变了电影'
    level: 3
    wordCount: 340
    topic: music in film
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'Film Music: A History'
      author: 'Various sources'
      note: 'Original passage about the role of music in cinema'
    passage: |
      Imagine watching the shower scene in a horror film without any music. Not very scary, is it? Film music has the extraordinary power to change how we feel about what we see on screen. A happy scene becomes sad with minor-key strings. A quiet walk through a forest becomes terrifying with a low, pulsing beat.

      The importance of music in film was recognised from the very beginning. Even during the silent film era, cinemas hired pianists or small orchestras to play live accompaniment. Different types of music were matched to different emotions — fast and exciting for chase scenes, slow and gentle for romance.

      [1]

      When sound films arrived in the late 1920s, composers could create original scores that were permanently attached to the film. Max Steiner's score for "King Kong" in 1933 is often considered the first great film soundtrack. It showed Hollywood that music could be just as important as dialogue and acting.

      [2]

      Today, some of the most famous pieces of music in the world come from films. John Williams, who composed the music for Star Wars, Harry Potter, and Jurassic Park, is perhaps the greatest film composer of all time. His melodies are so powerful that hearing just the first few notes can instantly transport you to a galaxy far, far away.

      [3]

      Modern films also use popular songs alongside original scores. The "Guardians of the Galaxy" films, for example, feature a playlist of classic 1970s rock songs that became as famous as the films themselves. This blending of original composition and existing music has opened new creative possibilities for filmmakers and introduced young audiences to music from past decades.
    passageZh: |
      想象一下在没有任何音乐的情况下看恐怖片中的淋浴场景。不太可怕，对吧？电影音乐有着非凡的力量，可以改变我们对银幕上所看到的内容的感受。一个快乐的场景配上小调弦乐就变得悲伤。一个安静的森林漫步配上低沉的脉冲节拍就变得恐怖。

      音乐在电影中的重要性从一开始就被认识到了。即使在无声电影时代，电影院也雇佣钢琴师或小型管弦乐队来现场伴奏。不同类型的音乐配合不同的情绪——追逐场景用快速而激动的，浪漫场景用缓慢而温柔的。

      [1]

      当有声电影在1920年代末到来时，作曲家可以创作永久附在电影上的原创配乐。Max Steiner为1933年《金刚》创作的配乐通常被认为是第一部伟大的电影配乐。它向好莱坞表明音乐可以和对话和演技一样重要。

      [2]

      今天，世界上一些最著名的音乐作品来自电影。John Williams为星球大战、哈利·波特和侏罗纪公园作曲，也许是有史以来最伟大的电影作曲家。他的旋律如此有力，仅听到开头几个音符就能立即把你带到一个遥远的星系。

      [3]

      现代电影也在原创配乐之外使用流行歌曲。例如，《银河护卫队》电影以一系列经典1970年代摇滚歌曲为特色，这些歌曲变得和电影本身一样出名。这种原创作曲和现有音乐的融合为电影制作人开辟了新的创意可能性，并将年轻观众引入了过去几十年的音乐。
