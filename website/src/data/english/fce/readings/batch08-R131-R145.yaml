  - id: R143
    title: 'Behind the Scenes: How Animated Films Are Made'
    titleZh: '幕后：动画电影是怎么制作的'
    level: 4
    wordCount: 370
    topic: animation
    tags: [Q09, month-9]
    source:
      type: 'inspired-by'
      title: 'The Pixar Story'
      author: 'Various sources'
      note: 'Original passage about the process of creating animated films'
    passage: |
      When you watch an animated film like "Inside Out 2" or "Spider-Verse," every frame looks effortless — as if the characters simply sprang to life on their own. In reality, creating a single animated feature film takes between three and five years and involves hundreds of talented artists, engineers, and storytellers.

      The process begins with a script and storyboards — thousands of rough drawings that show what happens in each scene. Directors and writers spend months refining the story, often completely changing major plot points along the way. Pixar famously reworked the entire story of "Toy Story 2" just nine months before its release date.

      Once the story is approved, character designers create the look of every character. They draw hundreds of sketches, experimenting with different body shapes, facial features, and clothing until they find the perfect design. At Pixar, the character must look appealing from every angle and be expressive enough to convey emotion without speaking.

      The next stage is modelling and rigging. 3D artists build digital models of each character and create an internal "skeleton" that allows animators to move the character naturally. A single character like Buzz Lightyear has over 100 movable parts in his face alone, enabling incredibly subtle expressions.

      Then comes the animation itself. Animators move characters frame by frame, typically producing just three to four seconds of finished animation per week. A feature film contains roughly 130,000 individual frames — each one carefully crafted by hand.

      Finally, lighting artists add virtual lights to every scene, and effects artists create elements like water, fire, hair, and cloth. The rendering process — where the computer calculates how light interacts with every surface — can take up to 24 hours for a single frame.

      The result of all this effort is a film that audiences enjoy for 90 minutes, often unaware of the extraordinary craftsmanship behind every second.
    passageZh: |
      当你看《头脑特工队2》或《蜘蛛侠：纵横宇宙》等动画电影时，每一帧看起来都毫不费力——好像角色只是自己活了过来。实际上，创作一部动画电影需要三到五年，涉及数百名才华横溢的艺术家、工程师和故事讲述者。

      这个过程从剧本和故事板开始——数千张粗略的图画展示每个场景中发生的事情。导演和编剧花几个月时间打磨故事，经常在过程中彻底改变主要情节点。Pixar曾在上映日期前仅九个月重新制作了整个《玩具总动员2》的故事。

      故事获批后，角色设计师创建每个角色的外观。他们画数百张草图，尝试不同的体型、面部特征和服装，直到找到完美的设计。在Pixar，角色必须从每个角度看都有吸引力，并且足够有表现力，能在不说话的情况下传达情感。

      下一个阶段是建模和绑定。3D艺术家为每个角色建立数字模型，并创建内部"骨架"让动画师能自然地移动角色。像巴斯光年这样的单个角色，仅面部就有超过100个可移动部分，能够展现极其细微的表情。

      然后是动画本身。动画师逐帧移动角色，通常每周只能完成三到四秒的成品动画。一部动画电影包含大约130,000个独立帧——每一帧都经过精心手工制作。

      最后，灯光师为每个场景添加虚拟灯光，特效师创建水、火、头发和布料等元素。渲染过程——计算机计算光如何与每个表面互动——对于单帧来说可能需要长达24小时。

      所有这些努力的结果是一部观众在90分钟内享受的电影，他们往往没有意识到每一秒背后的非凡工艺。
