  - id: R145
    title: 'Why Do We Love Scary Stories?'
    titleZh: '我们为什么喜欢恐怖故事？'
    level: 4
    wordCount: 360
    topic: literature analysis
    tags: [Q09, month-9]
    source:
      type: 'original'
      note: 'Original passage about the psychology of why humans enjoy horror fiction'
    passage: |
      Humans have been telling scary stories since the beginning of civilisation. Ancient cultures gathered around fires to share tales of monsters and ghosts. Today, horror novels, films, and games are a billion-dollar industry. But why do we enjoy being frightened?

      Psychologists have identified several reasons. The most basic is the thrill of the "fight or flight" response. When we encounter something scary — even in a book or film — our bodies release adrenaline, the same chemical that helps us react to real danger. This creates a rush of excitement that many people find pleasurable, especially because we know we are actually safe.

      Another reason is curiosity. Horror stories allow us to explore our deepest fears in a controlled environment. What would it be like to be chased by a monster? How would you survive on a haunted island? Through scary stories, we can experience these situations without any real risk. It is like a safe practice run for dealing with fear.

      Furthermore, horror teaches us about ourselves. The best horror stories are not just about monsters — they use frightening situations to explore real human emotions such as grief, loneliness, isolation, and the fear of the unknown. Mary Shelley's "Frankenstein," for example, is really about the dangers of unchecked ambition and the need for human connection.

      For young readers, age-appropriate scary stories serve an important developmental purpose. They help children learn to manage their emotions, understand that fear is a normal feeling, and develop resilience. Series like R.L. Stine's "Goosebumps" introduce children to the thrill of being scared in a gentle, humorous way that never becomes overwhelming.

      Of course, not everyone enjoys horror, and that is perfectly fine. But for those of us who love a good scare, there is something deeply satisfying about closing a terrifying book, putting it on the shelf, and thinking: "That was brilliant. Now, what can I read next?"
    passageZh: |
      自文明开始以来，人类就一直在讲恐怖故事。古代文明围着火堆分享关于怪物和鬼魂的故事。今天，恐怖小说、电影和游戏是一个数十亿美元的产业。但我们为什么喜欢被吓到？

      心理学家已经找到了几个原因。最基本的是"战斗或逃跑"反应的刺激。当我们遇到可怕的东西时——即使是在书或电影中——我们的身体会释放肾上腺素，这种化学物质帮助我们对真正的危险做出反应。这创造了许多人觉得愉悦的兴奋感，特别是因为我们知道自己实际上是安全的。

      另一个原因是好奇心。恐怖故事让我们在一个受控的环境中探索我们最深的恐惧。被怪物追赶会是什么样子？你如何在闹鬼的岛上生存？通过恐怖故事，我们可以在没有任何真正风险的情况下体验这些情况。这就像是应对恐惧的安全练习。

      此外，恐怖教会我们关于自己的东西。最好的恐怖故事不仅仅是关于怪物——它们使用令人恐惧的情况来探索真实的人类情感，如悲伤、孤独、隔离和对未知的恐惧。例如，玛丽·雪莱的《弗兰肯斯坦》实际上是关于不受控制的野心的危险和人际联系的需要。

      对于年轻读者来说，适合年龄的恐怖故事有重要的发展目的。它们帮助孩子学会管理情绪、理解恐惧是一种正常的感觉、并发展韧性。像R.L. Stine的《鸡皮疙瘩》系列以温和、幽默的方式向孩子介绍被吓到的刺激，从不变得过分。

      当然，不是每个人都喜欢恐怖，这完全没问题。但对于我们这些喜欢好的惊吓的人来说，合上一本恐怖的书、把它放在书架上、然后想："那太精彩了。接下来我能读什么？"有一种深深的满足感。
