  - id: R137
    title: 'Theatre for Young Audiences: Why Live Shows Matter'
    titleZh: '青少年剧场：为什么现场表演很重要'
    level: 3
    wordCount: 320
    topic: theatre
    tags: [Q09, month-9]
    source:
      type: 'original'
      note: 'Original passage about the importance of live theatre for children'
    passage: |
      In an age of streaming services and video games, you might wonder whether live theatre still matters. The answer, according to both researchers and theatre directors, is a resounding yes. In fact, theatre may be more important for young people now than ever before.

      Unlike watching a screen, attending a live performance is a shared experience. You sit in a darkened room with hundreds of other people, breathing the same air, feeling the same emotions. When something funny happens, you laugh together. When something sad happens, you can hear the person next to you catch their breath. This shared emotional experience is something that no screen can replicate.

      [1]

      Furthermore, live theatre teaches valuable skills. Studies have shown that children who regularly attend the theatre develop stronger empathy — the ability to understand and share the feelings of others. They also show improved concentration, as a live show demands your full attention for the entire performance. There is no pause button, no rewind, and no second screen to distract you.

      [2]

      Many cities now offer affordable theatre programmes specifically designed for young audiences. Shows like "Matilda the Musical" and "The Lion King" have introduced millions of children to the magic of live performance. These productions combine music, dance, acting, and spectacular set design to create an experience that is completely different from watching a film.

      [3]

      So the next time you have the chance to see a live show, take it. You might be surprised by how deeply it moves you — and by how different it feels from anything you have ever watched on a screen.
    passageZh: |
      在流媒体服务和电子游戏的时代，你可能会想现场剧场是否还重要。据研究人员和剧场导演说，答案是响亮的"是"。事实上，剧场对年轻人来说可能比以往任何时候都更重要。

      与看屏幕不同，参加现场表演是一种共享体验。你和数百人坐在昏暗的房间里，呼吸着同样的空气，感受着同样的情绪。当有趣的事情发生时，你们一起笑。当悲伤的事情发生时，你可以听到旁边的人屏住呼吸。这种共享的情感体验是任何屏幕都无法复制的。

      [1]

      此外，现场剧场教授宝贵的技能。研究表明，经常观看剧场表演的孩子会发展出更强的共情能力——理解和分享他人感受的能力。他们还表现出更好的注意力，因为现场表演要求你在整个表演期间全神贯注。没有暂停键、没有倒退、没有第二块屏幕来分散你的注意力。

      [2]

      许多城市现在提供专门为年轻观众设计的经济实惠的剧场项目。像《玛蒂尔达音乐剧》和《狮子王》这样的演出已经向数百万孩子介绍了现场表演的魔力。这些制作结合了音乐、舞蹈、表演和壮观的舞台设计，创造了与看电影完全不同的体验。

      [3]

      所以下次你有机会看现场演出时，抓住它。你可能会惊讶于它如何深深地触动你——以及它与你在屏幕上看过的任何东西有多么不同的感觉。
