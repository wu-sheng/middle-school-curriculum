  # ============================================================
  # R101 – The Idiom Jungle (Level 3, ~320 words)
  # ============================================================
  - id: R101
    title: 'The Idiom Jungle'
    titleZh: '成语丛林'
    level: 3
    wordCount: 320
    topic: idiom origins
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'Oxford Learner Dictionary: Idiom Origins'
      author: 'Oxford University Press'
      note: 'Original passage inspired by research on English idiom histories'
    passage: |
      Every language has its own collection of strange phrases that do not mean what the individual words suggest. In English, we call these "idioms," and learning them is like exploring a jungle full of surprises.

      [1]

      Take the idiom "break the ice," for example. Today, it means to make people feel more comfortable in an awkward social situation. But where did it come from? In the past, when trade ships could not pass through frozen waterways, smaller boats were sent ahead to break the ice and create a path. This act of clearing the way became a metaphor for making social situations easier.

      [2]

      Another fascinating idiom is "let the cat out of the bag." Hundreds of years ago, dishonest market sellers would sometimes put a cat in a bag and pretend it was a more expensive piglet. If someone opened the bag and the cat jumped out, the trick was revealed. Today, the phrase simply means to accidentally tell a secret.

      [3]

      Some idioms travel across languages. The Chinese expression "add legs to a snake" (画蛇添足) has a similar idea to the English phrase "too many cooks spoil the broth" — both warn against doing too much. Learning the stories behind idioms not only helps you remember them but also opens a window into how different cultures think.

      Understanding idioms is essential for the FCE exam, where they often appear in reading passages and Use of English exercises. The best way to learn them is through reading and conversation — the more you encounter them in real contexts, the more naturally you will use them yourself.
    passageZh: |
      每种语言都有自己独特的奇怪短语——这些短语的意思和字面上的意思不一样。在英语中，我们称之为"idioms"（习语/成语），学习它们就像探索一片充满惊喜的丛林。

      [1]

      以"break the ice"（打破僵局）这个习语为例。今天，它的意思是让人们在尴尬的社交场合中感到更自在。但它是怎么来的呢？在过去，当贸易船无法通过结冰的水道时，会派小船先去破冰开路。这种清除障碍的行为后来成了让社交场合更轻松的比喻。

      [2]

      另一个有趣的习语是"let the cat out of the bag"（泄露秘密）。几百年前，不诚实的市场商贩有时会把一只猫装在袋子里，假装是一只更贵的小猪仔。如果有人打开袋子，猫跳了出来，骗局就被揭穿了。今天，这个短语只是表示不小心说出了一个秘密。

      [3]

      有些习语可以跨语言传播。中国的成语"画蛇添足"和英语短语"too many cooks spoil the broth"（厨子多了烧坏汤）有类似的含义——两者都告诫不要做得太多。了解习语背后的故事不仅能帮助你记住它们，还能打开一扇了解不同文化思维方式的窗户。

      理解习语对 FCE 考试至关重要，它们经常出现在阅读文章和 Use of English 练习中。学习它们最好的方法是通过阅读和对话——你在真实语境中遇到它们越多，就越能自然地使用它们。
    vocabHighlights:
      - word: metaphor
        ref: V1003
      - word: essential
        ref: V1015
      - word: encounter
        ref: V0919
    questions:
      - id: R101-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Many English idioms have surprising historical origins that date back hundreds of years.'
          B: 'English grammar rules are different from Chinese grammar rules.'
          C: 'The FCE exam tests vocabulary, grammar, reading, and listening skills.'
        answer: 'A'
        explanation: 'Gap [1] comes after the introduction about idioms and before examples of specific idiom origins. "Surprising historical origins" bridges to the examples that follow.'
        explanationZh: '空缺[1]在关于习语的介绍之后，在具体习语来源的例子之前。"令人惊讶的历史起源"衔接到后面的例子。'
      - id: R101-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Ships in the 18th century were built from oak wood and could carry hundreds of passengers.'
          B: 'Similarly, many other everyday English expressions have roots in historical events and old customs.'
          C: 'The weather in England is often cold and rainy during the winter months.'
        answer: 'B'
        explanation: '"Similarly" connects the "break the ice" example to the next example ("let the cat out of the bag"), showing they both have historical roots.'
        explanationZh: '"Similarly"将"break the ice"的例子与下一个例子"let the cat out of the bag"连接起来，显示它们都有历史渊源。'
      - id: R101-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Cats have been popular pets in England since the Roman period.'
          B: 'These examples show that idioms are not just random phrases — they carry the wisdom and humour of past generations.'
          C: 'Market sellers today use electronic payment systems instead of cash.'
        answer: 'B'
        explanation: '"These examples" refers back to both idiom stories, and "wisdom and humour of past generations" bridges to the next paragraph about idioms crossing cultures.'
        explanationZh: '"These examples"指代前面两个习语故事，"过去几代人的智慧和幽默"衔接到下一段关于习语跨文化传播的内容。'
      - id: R101-Q4
        type: vocabulary-in-context
        question: 'What does "metaphor" mean in the passage?'
        questionZh: '文中的"metaphor"是什么意思？'
        options:
          A: 'A type of ship used for trade'
          B: 'A word or phrase used to describe something by comparing it to something else'
          C: 'A historical event that changed the English language'
          D: 'A type of puzzle or riddle'
        answer: 'B'
        explanation: 'The passage explains that the real act of breaking ice "became a metaphor" — i.e., was used as a comparison — for making social situations easier.'
        explanationZh: '文章解释说破冰的真实行为"成为了一个比喻"——即被用作一种对比——来形容让社交场合更轻松。'

  # ============================================================
  # R102 – Why Do Languages Change? (Level 3, ~330 words)
  # ============================================================
  - id: R102
    title: 'Why Do Languages Change?'
    titleZh: '语言为什么会变化？'
    level: 3
    wordCount: 330
    topic: language evolution
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'BBC Bitesize: History of the English Language'
      author: 'BBC'
      note: 'Original passage inspired by language evolution research'
    passage: |
      If you could travel back in time to England in the year 1000, you would not understand a single word anyone said. Old English sounds so different from Modern English that it might as well be a foreign language. So how did English change so dramatically?

      Languages change for several reasons. Firstly, when different groups of people meet, their languages mix. English, for instance, borrowed thousands of words from French after the Norman Conquest in 1066. Words like "beef," "justice," and "adventure" all came from French.

      [1]

      Secondly, new inventions and ideas need new words. A hundred years ago, nobody used words like "internet," "selfie," or "emoji." As technology develops, language must keep up. Young people are especially creative with language — they invent slang that sometimes becomes part of standard English.

      [2]

      Thirdly, pronunciation changes naturally over time. The way people in London spoke in Shakespeare's time was quite different from how they speak today. Vowel sounds, in particular, shifted dramatically during a period that linguists call the "Great Vowel Shift."

      [3]

      Today, English continues to evolve faster than ever. Social media, global travel, and the internet connect people from different cultures, and new words and phrases spread around the world in hours rather than centuries. Some language experts worry that many smaller languages will disappear as English becomes more dominant. Nevertheless, history shows that languages are remarkably tough — they bend, borrow, and blend, but they rarely break completely.

      Understanding how language changes helps us appreciate why English has so many irregular spellings and unusual phrases. It also reminds us that every word we use has a story behind it.
    passageZh: |
      如果你能穿越时空回到公元1000年的英国，你一个字都听不懂。古英语听起来和现代英语如此不同，简直像一门外语。那么英语是怎样发生如此巨大的变化的呢？

      语言变化有几个原因。首先，当不同的人群相遇时，他们的语言会混合。例如，1066年诺曼征服之后，英语从法语中借用了数千个词汇。"beef"（牛肉）、"justice"（正义）和"adventure"（冒险）等词都来自法语。

      [1]

      其次，新的发明和想法需要新的词汇。一百年前，没有人使用"internet"（互联网）、"selfie"（自拍）或"emoji"（表情符号）这样的词。随着科技发展，语言必须跟上。年轻人在语言方面特别有创造力——他们发明的俚语有时会成为标准英语的一部分。

      [2]

      第三，发音会随时间自然变化。莎士比亚时代伦敦人的说话方式与今天大不相同。特别是元音发生了巨大的变化，语言学家称之为"元音大转移"。

      [3]

      今天，英语继续以前所未有的速度演变。社交媒体、全球旅行和互联网将不同文化的人们联系在一起，新词新语在几小时内就能传遍世界，而不是几个世纪。一些语言专家担心，随着英语变得更加主导，许多小语种将会消失。然而，历史表明语言是非常顽强的——它们弯曲、借用、融合，但很少完全断裂。

      了解语言如何变化有助于我们理解为什么英语有这么多不规则拼写和不寻常的短语。它也提醒我们，我们使用的每个词背后都有一个故事。
    vocabHighlights:
      - word: dramatically
        ref: V0997
      - word: evolve
        ref: V0998
      - word: dominant
        ref: V1014
    questions:
      - id: R102-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'As a result, nearly 30% of modern English words have French origins, making English one of the most blended languages in the world.'
          B: 'The Norman Conquest was a battle that took place near Hastings in southern England.'
          C: 'French cuisine is famous around the world for its delicate flavours.'
        answer: 'A'
        explanation: '"As a result" shows the consequence of borrowing French words — 30% of English has French origins. This extends the point before moving to the next reason.'
        explanationZh: '"As a result"展示了借用法语词的结果——30%的英语有法语起源。这扩展了前面的观点，再过渡到下一个原因。'
      - id: R102-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'For example, the word "cool" originally meant low temperature, but young people gave it a new meaning — "impressive" or "good."'
          B: 'The internet was invented in the 1990s by Tim Berners-Lee.'
          C: 'Learning vocabulary is one of the most important parts of studying English.'
        answer: 'A'
        explanation: 'This gives a concrete example of young people changing language (slang "cool"), directly supporting the previous sentence about youth creativity.'
        explanationZh: '这给出了一个年轻人改变语言的具体例子（俚语"cool"），直接支持前一句关于年轻人创造力的内容。'
      - id: R102-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Shakespeare wrote 37 plays and 154 sonnets during his lifetime.'
          B: 'Such changes explain why English spelling often does not match pronunciation — many spellings were fixed before sounds finished changing.'
          C: 'London is the capital city of England and has a population of about nine million.'
        answer: 'B'
        explanation: '"Such changes" refers to the pronunciation shifts just described. The explanation about spelling vs. pronunciation bridges naturally to the conclusion about modern English.'
        explanationZh: '"Such changes"指代刚描述的发音变化。关于拼写与发音不匹配的解释自然过渡到关于现代英语的结论。'
      - id: R102-Q4
        type: vocabulary-in-context
        question: 'What does "dominant" mean in the passage?'
        questionZh: '文中的"dominant"是什么意思？'
        options:
          A: 'Quiet and unimportant'
          B: 'Old and traditional'
          C: 'More powerful and influential than others'
          D: 'Difficult to learn'
        answer: 'C'
        explanation: 'The passage says smaller languages may disappear as English becomes "more dominant" — meaning more powerful and widely used.'
        explanationZh: '文章说随着英语变得"more dominant"——即更强大和更广泛使用——许多小语种可能消失。'

  # ============================================================
  # R103 – Lost in Translation (Level 3, ~340 words)
  # ============================================================
  - id: R103
    title: 'Lost in Translation'
    titleZh: '翻译中丢失的意思'
    level: 3
    wordCount: 340
    topic: lost in translation
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'Mental Floss: Untranslatable Words'
      author: 'Mental Floss'
      note: 'Original passage inspired by cross-language translation challenges'
    passage: |
      Have you ever tried to translate a joke from Chinese to English, only to find that it is not funny any more? This common experience reveals one of the biggest challenges in language: some ideas simply do not translate well.

      Every language has words that have no exact equivalent in other languages. In Japanese, "komorebi" describes the way sunlight filters through the leaves of trees, creating dancing patterns of light and shadow. English has no single word for this beautiful image. Similarly, the German word "Schadenfreude" means the secret pleasure you feel when someone else fails — a concept that English speakers recognise but cannot express in one word.

      [1]

      Idioms are particularly tricky to translate. The English expression "it is raining cats and dogs" makes perfect sense to English speakers, but if you translate it word by word into Chinese, people would be very confused. Likewise, the Chinese idiom "对牛弹琴" (playing the lute to a cow) has a clear meaning in Chinese, but its literal translation sounds strange in English.

      [2]

      Professional translators must be creative problem-solvers. When they encounter an untranslatable word, they have several strategies. They can explain the concept using several words, find the closest equivalent, or sometimes simply borrow the original word. That is why English has adopted words like "kung fu," "tofu," and "typhoon" from Chinese.

      [3]

      Technology has made translation easier than ever — you can translate entire paragraphs with a single click. However, machine translation still struggles with idioms, humour, and cultural references. A computer might translate "break a leg" (meaning "good luck") as a literal instruction about bones. This is why human translators remain essential, especially for literature, poetry, and any text where meaning goes beyond the surface of words.
    passageZh: |
      你有没有试过把一个中文笑话翻译成英文，结果发现一点都不好笑了？这种常见的经历揭示了语言中最大的挑战之一：有些想法就是翻译不好。

      每种语言都有在其他语言中没有确切对应词的词汇。在日语中，"木漏れ日"（komorebi）描述的是阳光透过树叶洒下来，创造出光影舞动的图案。英语中没有一个词能表达这个美丽的画面。同样，德语词"Schadenfreude"意思是当别人失败时你感到的那种隐秘的快感——英语使用者能理解这个概念，但无法用一个词来表达。

      [1]

      习语翻译尤其棘手。英语表达"it is raining cats and dogs"（下猫下狗，意为倾盆大雨）对英语使用者来说完全能理解，但如果逐字翻译成中文，人们会非常困惑。同样，中文成语"对牛弹琴"在中文中意思很清楚，但其直译在英语中听起来很奇怪。

      [2]

      专业翻译人员必须是有创造力的问题解决者。当他们遇到无法翻译的词时，有几种策略。他们可以用几个词来解释这个概念，找到最接近的对应词，或者有时直接借用原词。这就是为什么英语从中文中引入了"kung fu"（功夫）、"tofu"（豆腐）和"typhoon"（台风）等词。

      [3]

      科技让翻译变得前所未有的简单——你可以一键翻译整段文字。然而，机器翻译在处理习语、幽默和文化参考时仍然很困难。电脑可能会把"break a leg"（意为"祝好运"）翻译成关于骨头的字面指令。这就是为什么人工翻译仍然至关重要，特别是对于文学、诗歌以及任何含义超越字面的文本。
    vocabHighlights:
      - word: equivalent
        ref: V1000
      - word: encounter
        ref: V0919
      - word: essential
        ref: V1015
    questions:
      - id: R103-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Chinese has many similar untranslatable treasures, such as "缘分" (yuánfèn), which describes the fate or destiny that brings people together.'
          B: 'Japanese is one of the most widely spoken languages in Asia.'
          C: 'Many students find learning German grammar particularly difficult.'
        answer: 'A'
        explanation: 'Gap [1] follows examples from Japanese and German. A Chinese example continues the pattern of showing untranslatable words from different languages.'
        explanationZh: '空缺[1]在日语和德语的例子之后。一个中文例子延续了展示不同语言中不可翻译词汇的模式。'
      - id: R103-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'The best way to learn idioms is to read as many English books as possible.'
          B: 'These differences show that translation is not just about swapping words — it is about understanding the culture behind the language.'
          C: 'Chinese students study English from primary school all the way through university.'
        answer: 'B'
        explanation: '"These differences" refers to the idiom translation examples. The sentence bridges from idiom problems to the next paragraph about translator strategies.'
        explanationZh: '"These differences"指代习语翻译的例子。这句话从习语问题过渡到下一段关于翻译策略的内容。'
      - id: R103-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Such borrowing has enriched English with flavours from nearly every language on Earth.'
          B: 'China has a population of over 1.4 billion people.'
          C: 'Translators usually work from home using a computer.'
        answer: 'A'
        explanation: '"Such borrowing" refers to the strategy of borrowing words from other languages. It extends the point before the technology paragraph.'
        explanationZh: '"Such borrowing"指代从其他语言借用词汇的策略。它在科技段落之前扩展了这个观点。'
      - id: R103-Q4
        type: vocabulary-in-context
        question: 'What does "equivalent" mean in the passage?'
        questionZh: '文中的"equivalent"是什么意思？'
        options:
          A: 'A word that sounds similar in another language'
          B: 'A word or expression with the same meaning in another language'
          C: 'A word that is difficult to pronounce'
          D: 'A word that has multiple meanings'
        answer: 'B'
        explanation: 'The passage says some words have "no exact equivalent" — meaning no word with exactly the same meaning — in other languages.'
        explanationZh: '文章说有些词在其他语言中"没有确切的对应词"——即没有意思完全相同的词。'

  # ============================================================
  # R104 – The Jungle Explorer's Phrasebook (Level 3, ~310 words)
  # ============================================================
  - id: R104
    title: 'The Jungle Explorer''s Phrasebook'
    titleZh: '丛林探险家的常用语手册'
    level: 3
    wordCount: 310
    topic: phrasal verbs
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage teaching phrasal verbs through adventure narrative'
    passage: |
      Maya was excited to set off on her first jungle expedition with Dr. Torres, a famous botanist. She had taken up photography last year, and this trip was a golden opportunity to photograph rare orchids deep in the rainforest.

      On the first morning, they set off before sunrise. Maya had to keep up with Dr. Torres, who walked incredibly fast. "Do not fall behind!" he called. "The monkeys get curious if you stand still for too long."

      By midday, they had run out of water. Dr. Torres pointed out a small stream nearby. "We can fill in our bottles here," he said. "But first, let me figure out if this water is safe to drink." He checked the water carefully and gave the thumbs up.

      As they went through a particularly dense section of the jungle, Maya came across something astonishing — a flower she had never seen before. "Dr. Torres, come and look at this!" she whispered excitedly.

      He turned up moments later, his eyes wide with surprise. "Do you know what this is?" he asked. "It is a Ghost Orchid — one of the rarest flowers in the world! Scientists have been looking for this species in this jungle for years, but nobody has come up with proof that it grows here."

      Maya carefully took a photograph. She could not get over how beautiful the white petals looked against the dark green leaves.

      "Well," Dr. Torres said, smiling, "your photograph will make a real difference. It will help us set up a conservation area to protect this species."

      As they headed back to camp, Maya thought about the day's events. She had almost given up photography last year when she felt she was not improving. Now she was glad she had carried on. Sometimes you just need to hold on a little longer, and amazing things turn out to happen.
    passageZh: |
      Maya 很兴奋能和著名植物学家 Torres 博士一起踏上她的第一次丛林探险。她去年开始学摄影，这次旅行是拍摄雨林深处稀有兰花的绝佳机会。

      第一天早上，他们在日出前就出发了。Maya 必须跟上 Torres 博士，他走得非常快。"别落后！"他喊道。"如果你站着不动太久，猴子们会好奇的。"

      到中午，他们的水喝完了。Torres 博士指出附近有一条小溪。"我们可以在这里把水壶灌满，"他说。"不过先让我看看这水能不能喝。"他仔细检查了水质，然后竖起了大拇指。

      当他们穿过一段特别茂密的丛林时，Maya 偶然发现了一个令人惊叹的东西——一朵她从未见过的花。"Torres 博士，快来看这个！"她兴奋地低声说。

      他很快出现了，眼睛因惊讶而睁大。"你知道这是什么吗？"他问。"这是一朵幽灵兰花——世界上最稀有的花之一！科学家们多年来一直在这片丛林里寻找这个物种，但没有人能证明它生长在这里。"

      Maya 小心翼翼地拍了一张照片。她无法相信白色的花瓣映衬着深绿色的叶子是如此美丽。

      "嗯，"Torres 博士微笑着说，"你的照片将会产生真正的影响。它将帮助我们建立一个保护区来保护这个物种。"

      在回营地的路上，Maya 想着这一天发生的事。她去年几乎放弃了摄影，因为觉得自己没有进步。现在她很高兴自己坚持了下来。有时候你只需要再坚持一会儿，美好的事情就会发生。
