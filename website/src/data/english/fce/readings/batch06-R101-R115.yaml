  # ============================================================
  # R113 – Tongue Twisters and Word Play (Level 3, ~300 words)
  # ============================================================
  - id: R113
    title: 'Tongue Twisters and Word Play'
    titleZh: '绕口令与文字游戏'
    level: 3
    wordCount: 300
    topic: language play
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage about linguistic wordplay and tongue twisters'
    passage: |
      "She sells seashells by the seashore." Try saying that five times fast! Tongue twisters are phrases that are difficult to say quickly because they contain similar sounds. Every language has them, and they serve a surprising number of purposes.

      Actors and news presenters use tongue twisters as warm-up exercises before performances. Repeating "red lorry, yellow lorry" or "unique New York" helps their mouths get ready for clear speech. Speech therapists also use tongue twisters to help children overcome pronunciation difficulties.

      Beyond tongue twisters, English is full of playful language tricks. Puns — jokes that use words with double meanings — have been popular since Shakespeare's time. When someone says "I used to be a banker, but I lost interest," the word "interest" works in two ways: losing interest in a job AND losing bank interest.

      Palindromes are words or phrases that read the same forwards and backwards. "Racecar," "madam," and "level" are all palindromes. Even whole sentences can be palindromes: "Was it a rat I saw?"

      Spoonerisms occur when a speaker accidentally swaps the first sounds of two words. Instead of saying "a well-boiled icicle," someone might say "a well-oiled bicycle." These are named after William Archibald Spooner, an Oxford professor who was famous for making such slips.

      Understanding word play is valuable for language learners because it deepens your understanding of how English sounds and meanings work. Many FCE reading passages include puns, idioms, and play on words. If you can recognise these tricks, you will find it much easier to understand the writer's tone and intention.

      The next time you come across a play on words, do not just read past it — stop and figure out why it is clever. Your vocabulary and reading skills will thank you!
    passageZh: |
      "She sells seashells by the seashore。"试着快速说五遍！绕口令是因为包含相似的发音而很难快速说出的短语。每种语言都有，而且它们的用途出奇地多。

      演员和新闻主播在表演前使用绕口令作为热身练习。重复说"red lorry, yellow lorry"或"unique New York"帮助他们的嘴巴为清晰发音做好准备。语言治疗师也用绕口令来帮助儿童克服发音困难。

      除了绕口令，英语中充满了有趣的语言技巧。双关语——使用具有双重含义的词的笑话——自莎士比亚时代以来就很流行。当有人说"I used to be a banker, but I lost interest"（我以前是银行家，但我失去了兴趣/利息），"interest"这个词有两层含义：对工作失去兴趣和失去银行利息。

      回文是正读和反读都一样的词或短语。"Racecar"（赛车）、"madam"（女士）和"level"（水平）都是回文。甚至整个句子也可以是回文："Was it a rat I saw?"（我看到的是一只老鼠吗？）

      首音误换（Spoonerisms）发生在说话者不小心交换了两个词的首音时。不说"a well-boiled icicle"，有人可能说成"a well-oiled bicycle"。这种现象以牛津教授 William Archibald Spooner 命名，他因经常犯这种口误而闻名。

      理解文字游戏对语言学习者很有价值，因为它能加深你对英语发音和意义运作方式的理解。许多 FCE 阅读文章包含双关语、习语和文字游戏。如果你能识别这些技巧，就会更容易理解作者的语气和意图。

      下次你遇到文字游戏时，不要只是读过去——停下来想想它为什么巧妙。你的词汇和阅读能力会感谢你的！
