  # ============================================================
  # R107 – The Phrase That Saved a Life (Level 3-4, ~360 words)
  # ============================================================
  - id: R107
    title: 'The Phrase That Saved a Life'
    titleZh: '救了一条命的短语'
    level: 4
    wordCount: 360
    topic: jungle adventures
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original adventure story featuring phrasal verbs in context'
    passage: |
      When twelve-year-old Kai signed up for a jungle survival course in Borneo, he expected to learn how to build shelters and identify edible plants. He did not expect that a simple English phrase would save his life.

      On the third day of the course, the group set off on a long hike through the rainforest. Kai had fallen behind the others because he stopped to take photographs of a bright blue butterfly. When he looked up, the trail had disappeared. He was completely alone.

      At first, Kai tried to work out which direction the group had gone. He looked for broken branches and footprints, but the dense jungle floor gave away nothing. As the hours passed, he began to feel frightened. He had already run out of water, and the light was fading.

      Then Kai remembered something the instructor had told them on the first day: "If you get lost, do not go through the jungle trying to find your way back. Stay where you are, make noise, and wait." The instructor had called this the STOP rule — Sit, Think, Observe, Plan.

      Kai sat down on a fallen tree trunk. He thought carefully. He observed his surroundings — there was a small clearing nearby. He came up with a plan: he would blow his emergency whistle every thirty seconds and pile bright leaves in the clearing so a search party could spot him from above.

      Forty minutes later, Kai heard voices. "Hold on! We are coming!" someone shouted. The instructor and two guides turned up, looking relieved. They had retraced the path and figured out where Kai had taken a wrong turn.

      "You did exactly the right thing," the instructor said. "Most people who get lost in a jungle panic and try to find their own way out. That is how they get into even more trouble."

      Back at camp, Kai looked up the word "resilience" in his dictionary. It meant "the ability to recover from difficulties." He smiled. That was exactly what today had taught him — along with a new appreciation for phrasal verbs.
    passageZh: |
      当十二岁的 Kai 报名参加婆罗洲的丛林生存课程时，他以为自己会学到如何搭建庇护所和辨认可食用的植物。他没想到一个简单的英语短语会救了他的命。

      课程第三天，小组出发进行了一次穿越雨林的长途徒步。Kai 因为停下来拍一只亮蓝色蝴蝶的照片而落在了其他人后面。当他抬头时，小路消失了。他完全孤身一人。

      起初，Kai 试图判断小组走的方向。他寻找折断的树枝和脚印，但茂密的丛林地面没有透露任何线索。随着时间的流逝，他开始感到害怕。水已经喝完了，光线也在变暗。

      然后 Kai 想起了教练第一天告诉他们的话："如果你迷路了，不要穿过丛林试图找回去的路。待在原地，制造声响，等待。"教练把这叫做 STOP 法则——坐下、思考、观察、计划。

      Kai 坐在一棵倒下的树干上。他仔细思考。他观察周围——附近有一小片空地。他想出了一个计划：每三十秒吹一次应急哨子，在空地上堆放颜色鲜艳的树叶，这样搜救队从上方就能发现他。

      四十分钟后，Kai 听到了声音。"坚持住！我们来了！"有人喊道。教练和两名向导出现了，看起来松了一口气。他们循着原路找到了 Kai 走错的地方。

      "你做得完全正确，"教练说。"大多数在丛林中迷路的人会惊慌失措，试图自己找到出路。那样反而会陷入更大的麻烦。"

      回到营地后，Kai 在字典里查了"resilience"这个词。意思是"从困难中恢复的能力"。他笑了。这正是今天教给他的——以及对短语动词的全新认识。
