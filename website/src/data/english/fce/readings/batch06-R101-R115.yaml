  # ============================================================
  # R114 – The Power of "Please" and "Thank You" (Level 3, ~310 words)
  # ============================================================
  - id: R114
    title: 'The Power of "Please" and "Thank You"'
    titleZh: '"请"和"谢谢"的力量'
    level: 3
    wordCount: 310
    topic: communication styles
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage about politeness conventions across cultures'
    passage: |
      In English-speaking countries, the words "please," "thank you," and "sorry" are used far more frequently than many visitors expect. A British person might say "sorry" when someone else bumps into them, "thank you" to the bus driver when getting off, and "please" even when ordering food at a fast-food restaurant. To speakers of other languages, this can seem excessive.

      The reason lies in what linguists call "politeness strategies." Different cultures have different rules about how direct you can be. In many English-speaking cultures, being too direct is considered rude, even if the words themselves are perfectly polite. For instance, saying "Give me the salt" is grammatically correct, but most British people would say "Could you pass the salt, please?" instead.

      This indirectness extends to how English speakers make requests and give criticism. Rather than saying "Your essay is bad," a teacher might say "There are some areas where your essay could be improved." Rather than saying "No," someone might say "I am afraid that might be a bit difficult." Understanding these softening techniques is important for the FCE Speaking and Writing exams.

      In contrast, some cultures value directness. In Dutch culture, for example, being straightforward is seen as honest and respectful. Saying "No, I do not want to come" is perfectly acceptable, whereas in British culture, the same sentence might sound blunt or impolite.

      Neither approach is better — they are simply different communication styles. However, being aware of these differences is essential for anyone learning a new language. The words you choose, the way you ask questions, and even the number of times you say "thank you" all send messages about who you are and how you relate to others.

      As the old saying goes, "Manners maketh man" — and in English, those manners often come wrapped in the magic words "please" and "thank you."
    passageZh: |
      在英语国家，"please""thank you"和"sorry"的使用频率远比许多外国访客预期的要高。一个英国人可能在别人撞到他们时说"sorry"，下公交车时对司机说"thank you"，甚至在快餐店点餐时也说"please"。对于说其他语言的人来说，这可能看起来太夸张了。

      原因在于语言学家所说的"礼貌策略"。不同文化对于你可以多直接有不同的规则。在许多英语文化中，太直接被认为是粗鲁的，即使用词本身完全没问题。例如，说"Give me the salt"（把盐给我）语法上是正确的，但大多数英国人会说"Could you pass the salt, please?"（你能把盐递过来吗？）

      这种间接性延伸到英语使用者提出请求和给出批评的方式。与其说"Your essay is bad"（你的作文不好），老师可能会说"There are some areas where your essay could be improved"（你的作文有一些可以改进的地方）。与其说"No"（不），有人可能会说"I am afraid that might be a bit difficult"（恐怕那可能有点困难）。理解这些缓和技巧对 FCE 口语和写作考试很重要。

      相比之下，一些文化重视直接性。例如在荷兰文化中，直截了当被视为诚实和尊重。说"No, I do not want to come"（不，我不想来）完全可以接受，而在英国文化中，同样的话可能听起来太生硬或不礼貌。

      两种方式都没有更好之分——它们只是不同的交流方式。然而，了解这些差异对任何学习新语言的人都至关重要。你选择的词汇、提问的方式，甚至说"thank you"的次数，都在传递关于你是谁以及你如何与他人相处的信息。

      正如那句老话说的，"Manners maketh man"（礼仪造就人）——在英语中，那些礼仪往往包裹在"please"和"thank you"这两个魔法词中。
    vocabHighlights:
      - word: in contrast
        ref: V1000
      - word: essential
        ref: V1015
