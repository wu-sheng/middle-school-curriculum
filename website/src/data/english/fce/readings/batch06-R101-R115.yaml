  # ============================================================
  # R106 – The Body Language Code (Level 3, ~320 words)
  # ============================================================
  - id: R106
    title: 'The Body Language Code'
    titleZh: '身体语言密码'
    level: 3
    wordCount: 320
    topic: communication styles
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage about non-verbal communication across cultures'
    passage: |
      Words make up only a small part of how we communicate. Research suggests that up to 93% of communication is non-verbal — through facial expressions, gestures, posture, and tone of voice. Understanding body language is like learning a secret code that everyone uses but few people study.

      A genuine smile, for instance, is not just about the mouth. Scientists have found that a real smile involves muscles around the eyes, creating small wrinkles called "crow's feet." A fake smile only uses the mouth muscles. This difference is so reliable that researchers named the real smile the "Duchenne smile" after the French doctor who first described it.

      However, body language is not universal. The same gesture can have completely different meanings in different cultures. In many Western countries, nodding your head means "yes" and shaking it means "no." In Bulgaria, it is the opposite — nodding means "no" and shaking means "yes." Imagine the confusion this could cause!

      Eye contact is another area where cultures differ significantly. In British and American culture, making eye contact shows confidence and honesty. In contrast, in some East Asian cultures, looking directly at an older person can be seen as disrespectful. Neither approach is right or wrong — they are simply different cultural codes.

      Gestures can also be misleading. The "thumbs up" sign is positive in most countries, but in some parts of the Middle East, it is considered rude. The "OK" hand sign means "everything is fine" in America, but it can be offensive in Brazil.

      For the FCE exam, understanding body language vocabulary is useful in the Listening and Speaking sections. More importantly, being aware of body language helps you communicate more effectively in real life. As the saying goes, "Actions speak louder than words" — and that is one idiom that is true in every language.
    passageZh: |
      言语只占我们交流方式的一小部分。研究表明，高达93%的交流是非语言的——通过面部表情、手势、姿态和语调。理解身体语言就像学习一种所有人都在使用但很少有人研究的密码。

      例如，一个真诚的微笑不仅仅是嘴巴的事。科学家发现，真正的微笑涉及眼周的肌肉，形成被称为"鱼尾纹"的小皱纹。假笑只使用嘴部肌肉。这种差异非常可靠，研究人员以首先描述它的法国医生的名字将真笑命名为"杜兴微笑"。

      然而，身体语言并不是通用的。同一个手势在不同文化中可能有完全不同的含义。在许多西方国家，点头表示"是"，摇头表示"不是"。在保加利亚正好相反——点头表示"不"，摇头表示"是"。想象一下这可能造成的困惑！

      眼神交流是另一个文化差异显著的领域。在英国和美国文化中，保持眼神交流表示自信和诚实。相比之下，在一些东亚文化中，直视年长者可能被视为不尊重。两种方式没有对错之分——它们只是不同的文化密码。

      手势也可能造成误解。"竖大拇指"在大多数国家是积极的，但在中东一些地区被认为是粗鲁的。"OK"手势在美国表示"一切都好"，但在巴西可能是冒犯性的。

      对于 FCE 考试，理解身体语言词汇在听力和口语部分很有用。更重要的是，意识到身体语言有助于你在现实生活中更有效地交流。俗话说，"行动胜于言辞"——这是一个在每种语言中都成立的成语。
