  # ============================================================
  # R111 – The Secret Language of Flowers (Level 3, ~320 words)
  # ============================================================
  - id: R111
    title: 'The Secret Language of Flowers'
    titleZh: '花的秘密语言'
    level: 3
    wordCount: 320
    topic: idiom origins
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'Smithsonian: The Language of Flowers'
      author: 'Smithsonian Magazine'
      note: 'Original passage inspired by the history of floriography'
    passage: |
      Before text messages, emails, and even telephones existed, people in Victorian England found a creative way to express feelings they could not say out loud — they sent flowers. Each type of flower had a specific meaning, and sending someone a carefully chosen bouquet was like writing a coded letter.

      Red roses, as most people know, stand for romantic love. But did you know that yellow roses originally meant jealousy? A single daisy represented innocence, while a bunch of forget-me-nots meant "remember me forever." Sending someone marigolds was not a compliment — they stood for grief and despair.

      This system was known as "floriography," and it became incredibly popular in the 1800s. People even published special dictionaries that listed the meaning of every flower. A young man might send a woman a bouquet of red tulips (a declaration of love), and she might reply with a sprig of laurel (meaning "I return your affection") or a yellow carnation (meaning "I am not interested").

      The language of flowers gave rise to several English idioms that we still use today. "Pushing up daisies" is a humorous way to say someone has died. "Coming up roses" means everything is going well. "A shrinking violet" describes a very shy person.

      Interestingly, flower meanings differ between cultures. In China, chrysanthemums are associated with good luck and happiness, which is why they are popular during festivals. In many European countries, however, chrysanthemums are linked to funerals and mourning. This cultural difference has led to several awkward situations when well-meaning visitors bring the wrong flowers to someone's home.

      Although floriography has largely fallen out of everyday use, its legacy lives on in our language. The next time someone gives you flowers, you might want to look up what they really mean — the message could be more than just "happy birthday"!
    passageZh: |
      在短信、电子邮件甚至电话出现之前，维多利亚时代的英国人找到了一种创造性的方式来表达他们无法说出口的感情——他们送花。每种花都有特定的含义，送人一束精心挑选的花束就像写一封密码信。

      红玫瑰，大多数人都知道，代表浪漫的爱情。但你知道黄玫瑰最初表示嫉妒吗？一朵雏菊代表纯真，而一束勿忘我意味着"永远记住我"。送人万寿菊可不是恭维——它们代表悲伤和绝望。

      这个系统被称为"花语学"（floriography），在19世纪变得非常流行。人们甚至出版了列出每种花含义的特殊词典。一个年轻人可能会送一个女人一束红色郁金香（爱的告白），而她可能回以一枝月桂（意为"我回应你的爱意"）或一朵黄色康乃馨（意为"我不感兴趣"）。

      花的语言催生了几个我们今天仍在使用的英语习语。"Pushing up daisies"是说某人已经去世的幽默说法。"Coming up roses"意味着一切都很顺利。"A shrinking violet"形容一个非常害羞的人。

      有趣的是，花的含义在不同文化之间有所不同。在中国，菊花与好运和幸福相关，这就是为什么它们在节日期间很受欢迎。然而在许多欧洲国家，菊花与葬礼和哀悼有关。这种文化差异导致了好意的访客给别人送错花的尴尬情况。

      虽然花语学在日常使用中已经大部分被淘汰了，但它的遗产在我们的语言中延续着。下次有人送你花时，你可能想查查它们真正的含义——消息可能不仅仅是"生日快乐"！
