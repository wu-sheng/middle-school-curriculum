  # ============================================================
  # R109 – The Emoji Revolution (Level 3, ~330 words)
  # ============================================================
  - id: R109
    title: 'The Emoji Revolution'
    titleZh: '表情符号革命'
    level: 3
    wordCount: 330
    topic: language evolution
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'The Guardian: How Emojis Changed Communication'
      author: 'The Guardian'
      note: 'Original passage inspired by the cultural impact of emojis'
    passage: |
      In 1999, a Japanese artist named Shigetaka Kurita designed 176 tiny pictures to help people express emotions in text messages. He called them "emoji" — a Japanese word meaning "picture character." Nobody expected these simple drawings to become a global language used by billions of people every day.

      Today, there are over 3,600 different emojis, and new ones are added every year. They range from facial expressions and hand gestures to animals, food, flags, and even mythical creatures. In 2015, the "Face with Tears of Joy" emoji was named Word of the Year by Oxford Dictionaries — the first time a picture had ever received this honour.

      Emojis have changed the way we communicate in several important ways. Firstly, they add emotional context to text messages. The sentence "I got your message" can feel cold or unfriendly in a text. Add a smiley face, and it immediately feels warm and positive. In other words, emojis do the job that tone of voice and facial expressions do in face-to-face conversation.

      Secondly, emojis can communicate across language barriers. A heart emoji means love in every country. A thumbs-up means approval everywhere. This universal quality makes emojis a kind of modern pictographic language — similar to how ancient Egyptians used hieroglyphics thousands of years ago.

      However, emojis are not without problems. The same emoji can be interpreted differently by different people. Research shows that the "slightly smiling face" emoji is seen as friendly by some people but sarcastic by others. Cultural differences also play a role — in China, the simple smiley face is sometimes used to express disapproval or awkwardness rather than happiness.

      Despite these challenges, emojis are here to stay. They have become an essential part of digital communication, particularly among young people. Whether you love them or find them annoying, there is no denying that emojis have made our messages more colourful — quite literally.
    passageZh: |
      1999年，一位名叫栗田穣崇的日本艺术家设计了176个小图片，帮助人们在短信中表达情感。他称它们为"emoji"——一个日语词，意为"图画文字"。没有人预料到这些简单的图画会成为每天数十亿人使用的全球语言。

      今天，有超过3600种不同的表情符号，每年还在增加新的。从面部表情和手势到动物、食物、旗帜，甚至神话生物。2015年，"笑哭"表情符号被牛津词典评为年度词汇——这是一张图片首次获得这一荣誉。

      表情符号在几个重要方面改变了我们的交流方式。首先，它们为短信添加了情感背景。"我收到你的消息了"这句话在短信中可能感觉冷淡或不友好。加上一个笑脸，马上就感觉温暖和积极了。换句话说，表情符号承担了面对面交谈中语调和面部表情的功能。

      其次，表情符号可以跨越语言障碍进行交流。一个爱心表情在每个国家都代表爱。一个竖大拇指在任何地方都表示赞同。这种通用性使表情符号成为一种现代象形文字语言——类似于古埃及人几千年前使用象形文字的方式。

      然而，表情符号也不是没有问题。同一个表情符号可能被不同的人有不同的理解。研究表明，"微微笑脸"表情符号被一些人视为友好的，但被另一些人视为讽刺的。文化差异也起着作用——在中国，简单的笑脸有时用来表达不满或尴尬，而不是快乐。

      尽管存在这些挑战，表情符号已经成为数字通信的重要组成部分，尤其是在年轻人中。无论你喜欢它们还是觉得它们烦人，不可否认的是，表情符号确实让我们的信息更加多彩——真的是字面意义上的。
