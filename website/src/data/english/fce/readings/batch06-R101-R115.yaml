  # ============================================================
  # R112 – The Art of Persuasion (Level 4, ~350 words)
  # ============================================================
  - id: R112
    title: 'The Art of Persuasion'
    titleZh: '说服的艺术'
    level: 4
    wordCount: 350
    topic: communication styles
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'TED-Ed: The Art of Rhetoric'
      author: 'TED-Ed'
      note: 'Original passage inspired by Aristotle rhetoric for young learners'
    passage: |
      Over two thousand years ago, the Greek philosopher Aristotle identified three powerful tools that speakers use to persuade their audience. He called them ethos, pathos, and logos. Today, these same three tools are used in everything from advertising to political speeches — and understanding them can help you write better FCE essays.

      Ethos is about trust. When a doctor tells you to eat more vegetables, you are more likely to listen than if a stranger on the street says the same thing. The doctor has ethos — credibility and authority. In your writing, you build ethos by showing that you know what you are talking about. Using relevant facts and examples makes your argument more trustworthy.

      Pathos is about emotion. Advertisers use pathos constantly — think of the charity adverts that show sad animals or hungry children. These images make you feel something, and that emotion pushes you to act. In essay writing, you can use pathos by including personal stories or vivid descriptions that help the reader connect emotionally with your argument. However, be careful — too much emotion without logic can make your writing seem unreliable.

      Logos is about logic. This is the backbone of any good argument. Logos involves using facts, statistics, and clear reasoning. If you claim that homework is harmful, you need evidence to support that claim — for instance, a study showing that too much homework causes stress. Without logos, your argument is just an opinion.

      The most persuasive writing combines all three. Imagine you are writing an essay about protecting the environment. You might start with a shocking statistic (logos), follow it with a vivid description of a polluted beach (pathos), and then reference a respected scientist's recommendation (ethos).

      In the FCE Writing exam, essays that use all three elements tend to score higher because they show mature thinking and effective communication. The next time you write an argument, ask yourself: "Am I using ethos, pathos, AND logos?" If the answer is yes, you are on your way to writing like a true persuader.
    passageZh: |
      两千多年前，希腊哲学家亚里士多德确定了演讲者用来说服听众的三个强大工具。他称它们为 ethos（品格可信度）、pathos（情感诉求）和 logos（逻辑论证）。今天，从广告到政治演讲，到处都在使用这三个工具——理解它们可以帮助你写出更好的 FCE 作文。

      Ethos 关乎信任。当医生告诉你多吃蔬菜时，你比街上陌生人说同样的话更可能听从。医生拥有 ethos——可信度和权威性。在写作中，你通过展示自己了解所谈论的内容来建立 ethos。使用相关的事实和例子使你的论点更可信。

      Pathos 关乎情感。广告商不断使用 pathos——想想那些展示悲伤动物或饥饿儿童的慈善广告。这些画面让你产生感受，而这种情感推动你采取行动。在作文写作中，你可以通过加入个人故事或生动的描述来使用 pathos，帮助读者在情感上与你的论点产生联系。不过要小心——没有逻辑支撑的过多情感会让你的写作看起来不可靠。

      Logos 关乎逻辑。这是任何好论点的支柱。Logos 涉及使用事实、统计数据和清晰的推理。如果你声称作业有害，你需要证据来支持这个说法——例如，一项研究表明过多的作业会导致压力。没有 logos，你的论点只是一个观点。

      最有说服力的写作将三者结合在一起。想象你正在写一篇关于保护环境的文章。你可以从一个令人震惊的统计数据开始（logos），然后用一段对被污染海滩的生动描述跟进（pathos），再引用一位受人尊敬的科学家的建议（ethos）。

      在 FCE 写作考试中，使用所有三个要素的文章往往得分更高，因为它们展示了成熟的思维和有效的沟通。下次你写论述文时，问问自己："我是否同时使用了 ethos、pathos 和 logos？"如果答案是肯定的，你就在通往真正说服者的路上了。
    vocabHighlights:
      - word: persuade
