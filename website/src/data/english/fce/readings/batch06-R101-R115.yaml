  # ============================================================
  # R108 – Make or Do? The Great Collocation Challenge (Level 3, ~300 words)
  # ============================================================
  - id: R108
    title: 'Make or Do? The Great Collocation Challenge'
    titleZh: 'Make 还是 Do？搭配大挑战'
    level: 3
    wordCount: 300
    topic: collocations
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage explaining make vs do collocations'
    passage: |
      If you have ever been confused about whether to say "make homework" or "do homework," you are not alone. The difference between "make" and "do" is one of the trickiest collocation puzzles in English — and even advanced learners sometimes get it wrong.

      The general rule is simple but imperfect. We use "do" for tasks, jobs, and activities that do not produce a physical thing: do homework, do research, do the washing up, do your best. We use "make" when we create or produce something: make a cake, make a decision, make a speech, make friends.

      However, there are many exceptions. We say "make a mistake" even though a mistake is not something we create on purpose. We say "do someone a favour" even though a favour could be seen as something you produce. The truth is, these combinations simply need to be memorised — they are fixed collocations that developed over centuries.

      Here is a useful trick: think of "do" as performing an action (like a robot following instructions) and "make" as being creative (like an artist creating something new). This works for most cases. You "do" the dishes because washing is a routine task. You "make" a plan because planning requires creativity.

      Other tricky pairs include "say" versus "tell" (we say something TO someone, but tell someone something), and "take" versus "have" (we take a break, take a photo, but have a shower, have a rest). In each case, the verb and noun form a partnership — like dance partners who always dance together.

      The best way to learn collocations is not by memorising rules, but by reading widely and noticing which words appear together. When you come across a new collocation, write it down as a whole phrase, not as separate words. Your brain will remember the partnership more easily that way.
    passageZh: |
      如果你曾经困惑过该说"make homework"还是"do homework"，那你不是一个人。"Make"和"do"的区别是英语中最棘手的搭配难题之一——即使是高级学习者有时也会搞错。

      总体规则很简单但并不完美。我们用"do"来表示任务、工作和不产生实物的活动：do homework（做作业）、do research（做研究）、do the washing up（洗碗）、do your best（尽力而为）。我们用"make"来表示创造或产生某物：make a cake（做蛋糕）、make a decision（做决定）、make a speech（发表演讲）、make friends（交朋友）。

      然而，有很多例外。我们说"make a mistake"（犯错误），即使错误不是我们故意创造的。我们说"do someone a favour"（帮某人一个忙），即使帮忙可以被看作是你产生的东西。事实是，这些组合就是需要记忆的——它们是经过几个世纪发展而来的固定搭配。

      这里有一个有用的技巧：把"do"想成执行一个动作（像机器人按照指令行事），把"make"想成有创造力（像艺术家创造新东西）。这在大多数情况下都适用。你"do"碗碟因为洗碗是日常任务。你"make"计划因为制定计划需要创造力。

      其他棘手的搭配对包括"say"和"tell"（我们 say something TO someone，但 tell someone something），以及"take"和"have"（我们 take a break、take a photo，但 have a shower、have a rest）。在每种情况下，动词和名词形成搭配——就像总是在一起跳舞的舞伴。

      学习搭配最好的方法不是死记硬背规则，而是广泛阅读并注意哪些词经常一起出现。当你遇到一个新搭配时，把它作为一个完整的短语写下来，而不是单独的词。这样你的大脑会更容易记住这个搭配组合。
