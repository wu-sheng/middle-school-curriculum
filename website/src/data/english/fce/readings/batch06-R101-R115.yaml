  # ============================================================
  # R115 – How a Dictionary Is Made (Level 4, ~340 words)
  # ============================================================
  - id: R115
    title: 'How a Dictionary Is Made'
    titleZh: '词典是怎么编出来的'
    level: 4
    wordCount: 340
    topic: language evolution
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'Oxford English Dictionary Blog'
      author: 'OED'
      note: 'Original passage inspired by the OED editorial process'
    passage: |
      Most people use dictionaries every day without ever wondering how the words got there in the first place. Making a dictionary is one of the most complex and time-consuming projects in the world of language.

      The Oxford English Dictionary (OED), one of the most famous dictionaries in the world, took over seventy years to complete its first edition. The project began in 1857, and the final volume was not published until 1928. During that time, thousands of volunteers read books, newspapers, and letters, writing down examples of how each word was used. These examples, written on small slips of paper, were sent to the editors in Oxford, who used them to write definitions.

      Today, the process is far more efficient thanks to technology. Dictionary makers use enormous computer databases that contain billions of words from books, websites, newspapers, and social media. These databases — called "corpora" — allow editors to see exactly how a word is used, how its meaning has changed over time, and which collocations it typically appears in.

      But how does a new word get into the dictionary? Dictionary editors follow strict rules. A new word must appear in a wide range of sources over a sustained period of time. It is not enough for a word to appear in a single article or go viral on social media for one week. The editors need evidence that the word has become a permanent part of the language.

      Some recent additions to major dictionaries include "selfie" (2013), "emoji" (2015), and "doomscrolling" (2020). Each of these words had to prove itself by appearing consistently in newspapers, books, and everyday conversation before the editors approved them.

      Surprisingly, words are rarely removed from dictionaries. Even words that nobody uses any more — like "snollygoster" (a dishonest politician) — remain in the dictionary with a note that they are archaic. In this way, dictionaries serve as a museum of language, preserving words from every era of English history.
    passageZh: |
      大多数人每天使用词典，却从未想过这些词最初是怎么进入词典的。编写词典是语言世界中最复杂、最耗时的项目之一。

      《牛津英语词典》（OED）是世界上最著名的词典之一，其第一版花了七十多年才完成。该项目始于1857年，最后一卷直到1928年才出版。在此期间，数千名志愿者阅读书籍、报纸和信件，记录每个词的使用方式。这些写在小纸条上的例子被寄到牛津的编辑那里，编辑们用它们来撰写定义。

      今天，由于科技的进步，这个过程高效多了。词典编纂者使用包含数十亿词汇的巨大计算机数据库，这些词汇来自书籍、网站、报纸和社交媒体。这些数据库——被称为"语料库"——让编辑能够准确地看到一个词是如何使用的，它的含义随时间如何变化，以及它通常出现在哪些搭配中。

      但是一个新词怎么才能进入词典呢？词典编辑遵循严格的规则。新词必须在持续的时间段内出现在广泛的来源中。一个词仅在一篇文章中出现或在社交媒体上火了一周是不够的。编辑需要证据证明这个词已成为语言的永久部分。

      一些近期被收入主要词典的词包括"selfie"（2013年）、"emoji"（2015年）和"doomscrolling"（2020年）。每一个词都必须通过在报纸、书籍和日常对话中持续出现来证明自己，才能得到编辑的批准。

      令人惊讶的是，词很少从词典中被删除。即使是没人再使用的词——比如"snollygoster"（不诚实的政客）——也保留在词典中，并附有注释说明它们已经过时。这样，词典就像一座语言博物馆，保存着英语历史每个时期的词汇。
