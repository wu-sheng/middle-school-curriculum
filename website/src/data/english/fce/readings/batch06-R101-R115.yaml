  # ============================================================
  # R110 – When Gestures Go Wrong (Level 3, ~310 words)
  # ============================================================
  - id: R110
    title: 'When Gestures Go Wrong'
    titleZh: '当手势闹笑话'
    level: 3
    wordCount: 310
    topic: lost in translation
    tags: [Q07, month-7]
    source:
      type: original
      note: 'Original passage about cross-cultural gesture misunderstandings'
    passage: |
      When Lisa, a British exchange student, arrived in Greece for the first time, she made an embarrassing mistake within the first hour. As her host family's car pulled up at the airport, she smiled and held up her open palm to wave hello. Her host mother looked shocked and turned away.

      Lisa had no idea what she had done wrong. In Britain, showing an open palm is a friendly wave. However, in Greece, this gesture — called the "moutza" — is one of the rudest things you can do. It is similar to showing someone a rude finger in other cultures.

      This kind of cross-cultural misunderstanding happens more often than you might think. Here are some other gestures that can get you into trouble abroad:

      The head nod: As mentioned earlier, in Bulgaria, nodding means "no." Several travellers have accidentally ordered food they did not want because they nodded to be polite!

      Crossing your fingers: In Britain, crossing your fingers means "good luck." In Vietnam, it is an offensive gesture.

      Pointing with your index finger: In Malaysia and Indonesia, pointing at someone with your finger is considered very rude. Instead, people point with their thumb or their whole hand.

      The lesson from these stories is clear: when you travel to a new country, do some research about local customs before you go. Even a small amount of preparation can save you from embarrassing situations.

      For language learners, understanding gestures is just as important as learning vocabulary and grammar. Communication is not only about the words we use — it is about the whole package of signals we send, from our facial expressions to the way we move our hands. Being aware of these differences makes us better communicators and more respectful travellers.
    passageZh: |
      当英国交换生 Lisa 第一次到达希腊时，她在第一个小时内就犯了一个尴尬的错误。当寄宿家庭的车在机场停下来时，她微笑着举起张开的手掌挥手打招呼。她的寄宿妈妈看起来很震惊，转过身去了。

      Lisa 完全不知道自己做错了什么。在英国，展示张开的手掌是友好的挥手。然而在希腊，这个手势——被称为"moutza"——是你能做的最粗鲁的事情之一。它类似于在其他文化中向别人竖中指。

      这种跨文化误解比你想象的更常发生。以下是一些可能在国外惹麻烦的手势：

      点头：如前所述，在保加利亚，点头表示"不"。好几个旅行者因为礼貌地点头而意外点了不想要的食物！

      交叉手指：在英国，交叉手指表示"好运"。在越南，这是一个冒犯性的手势。

      用食指指人：在马来西亚和印度尼西亚，用手指指人被认为非常粗鲁。人们会用拇指或整只手来指。

      这些故事的教训很明确：当你去一个新的国家旅行时，出发前了解一下当地的习俗。即使是少量的准备也能让你避免尴尬的情况。

      对于语言学习者来说，理解手势和学习词汇语法一样重要。交流不仅仅是关于我们使用的词汇——而是关于我们发送的全部信号，从面部表情到手部动作。意识到这些差异能让我们成为更好的沟通者和更尊重人的旅行者。
