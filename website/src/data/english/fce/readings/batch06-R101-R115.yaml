  # ============================================================
  # R105 – How Animals Communicate (Level 3, ~350 words)
  # ============================================================
  - id: R105
    title: 'How Animals Communicate'
    titleZh: '动物如何交流'
    level: 3
    wordCount: 350
    topic: communication styles
    tags: [Q07, month-7]
    source:
      type: 'inspired-by'
      title: 'National Geographic Kids: Animal Communication'
      author: 'National Geographic'
      note: 'Original passage inspired by animal communication research'
    passage: |
      When we think about communication, we tend to focus on human language — words, sentences, and grammar. However, the animal kingdom has developed an astonishing variety of ways to share information, and some of them are remarkably sophisticated.

      Honeybees are perhaps the most famous animal communicators. When a bee discovers a good source of food, it returns to the hive and performs a special movement known as the "waggle dance." By changing the angle and duration of the dance, the bee tells the other bees exactly where the food is, how far away it is, and even how much there is. Scientists have studied this dance for decades and are still amazed by its precision.

      [1]

      Dolphins use a complex system of clicks, whistles, and body movements to communicate. Each dolphin has its own unique "signature whistle" — essentially a name that other dolphins use to call it. Researchers have found that dolphins can remember these signature whistles for over twenty years, even after being separated from each other.

      [2]

      Even plants communicate, though not with sounds. When a caterpillar starts eating a plant's leaves, the plant releases chemical signals into the air. Nearby plants pick up these signals and start producing chemicals that make their leaves taste bitter, so the caterpillar moves on. In other words, the damaged plant warns its neighbours about the danger.

      [3]

      What makes animal communication different from human language? Linguists point out that animal communication is primarily about immediate needs — food, danger, mating. Human language, on the other hand, can discuss the past, imagine the future, and even talk about things that do not exist. We can tell jokes, write poetry, and argue about abstract ideas like justice and freedom. This ability to use language creatively is, as far as we know, uniquely human.
    passageZh: |
      当我们想到交流时，往往会关注人类的语言——词汇、句子和语法。然而，动物王国已经发展出了种类惊人的信息共享方式，其中一些非常复杂。

      蜜蜂也许是最著名的动物交流者。当一只蜜蜂发现了良好的食物来源时，它会回到蜂巢并表演一种被称为"摇摆舞"的特殊动作。通过改变舞蹈的角度和持续时间，蜜蜂可以告诉其他蜜蜂食物在哪里、有多远，甚至有多少。科学家们研究这种舞蹈已经几十年了，仍然对其精确性感到惊叹。

      [1]

      海豚使用复杂的咔嗒声、哨声和身体动作系统来交流。每只海豚都有自己独特的"签名哨声"——本质上就是其他海豚用来呼唤它的名字。研究人员发现，海豚可以记住这些签名哨声超过二十年，即使在彼此分开之后。

      [2]

      就连植物也会交流，尽管不是通过声音。当毛毛虫开始吃一棵植物的叶子时，植物会向空气中释放化学信号。附近的植物接收到这些信号后，开始产生使叶子味道变苦的化学物质，这样毛毛虫就会离开。换句话说，受损的植物警告了邻居们关于危险的消息。

      [3]

      动物交流和人类语言有什么不同？语言学家指出，动物交流主要涉及即时需求——食物、危险、交配。而人类语言可以讨论过去、想象未来，甚至谈论不存在的事物。我们可以讲笑话、写诗、争论正义和自由等抽象概念。据我们所知，这种创造性地使用语言的能力是人类独有的。
