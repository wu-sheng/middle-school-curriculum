    passage: |
      Once a year, Dragon Academy hosted the Grand Dragon Fair — a three-day celebration that brought together dragon trainers, potion sellers, spell crafters, and magical creature enthusiasts from across the realm. It was the most anticipated event of the school calendar.

      The fair took place on the vast meadow behind the academy. Hundreds of colourful tents were set up, each one selling or demonstrating something different. In one tent, visitors could watch a blacksmith forge enchanted horseshoes using dragon fire. In another, a healer demonstrated potions that could cure almost any illness. A third tent offered dragon egg omelettes — made from unfertilised eggs, of course.

      The highlight of the fair was the Dragon Talent Show. Dragons from different academies participated in events that showcased their unique abilities. Fire dragons competed in flame-art competitions, creating beautiful shapes and pictures in the sky. Ice dragons built elaborate ice sculptures that glittered in the sunlight. Water dragons performed synchronised swimming routines in the academy lake.

      This year, an unexpected participant stole the show. A tiny, ordinary-looking brown dragon named Pip belonged to a first-year student. Pip could not breathe fire, create ice, or control water. Instead, he had a peculiar talent that nobody had seen before — he could change the colour of anything he touched. With a gentle tap of his nose, he turned a grey stone into a brilliant blue, a brown leaf into shimmering gold, and even the judges' table into a rainbow of colours.

      The crowd was amazed. Pip won first place, and his proud rider beamed with joy. The event demonstrated an important principle that everyone at Dragon Academy already knew — the most remarkable abilities are often found in the most unexpected places.
    passageZh: |
      每年一次，龙之学院举办盛大龙之集市——一个为期三天的庆典，汇聚了来自全国各地的驯龙师、药剂商人、咒语工匠和魔法生物爱好者。这是校历上最令人期待的活动。

      集市在学院后面的广阔草地上举行。数百个彩色帐篷被搭起来，每个都在出售或展示不同的东西。在一个帐篷里，游客可以观看铁匠用龙火锻造魔法马蹄铁。在另一个帐篷里，治疗师展示能治愈几乎任何疾病的药剂。第三个帐篷提供龙蛋煎蛋——当然是用未受精的蛋做的。

      集市的亮点是龙之才艺秀。来自不同学院的龙参加展示其独特能力的活动。火龙参加火焰艺术比赛，在天空中创造美丽的形状和图案。冰龙建造在阳光下闪闪发光的精美冰雕。水龙在学院湖中表演同步游泳。

      今年，一个意想不到的参赛者抢了风头。一条名叫皮普的小小的、外表普通的棕色龙属于一个一年级学生。皮普不能喷火、制造冰或控制水。相反，他有一种以前没有人见过的奇特天赋——他能改变他触碰的任何东西的颜色。轻轻地用鼻子一碰，他把灰色的石头变成了鲜亮的蓝色，把棕色的叶子变成了闪闪发光的金色，甚至把评委桌变成了彩虹色。

      人群惊叹不已。皮普赢得了第一名，他骄傲的骑手高兴得满脸笑容。这个活动展示了龙之学院每个人都已经知道的一个重要原则——最了不起的能力往往在最意想不到的地方找到。
