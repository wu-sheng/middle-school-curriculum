    passage: |
      At Dragon Academy, every student dreaded one class — Advanced Potions with Master Grimshaw. He was strict, rarely smiled, and had a reputation for giving the hardest exams in the school. Students whispered that he had never given a single student top marks in thirty years.

      Nevertheless, his potions were legendary. He could brew a liquid that made broken bones heal in seconds, create a spray that turned iron into gold, and mix a cream that allowed humans to breathe underwater for an entire day. Despite his unfriendly manner, even the other professors acknowledged his brilliance.

      One afternoon, a curious student named Rosa noticed something strange. Master Grimshaw's hands were covered in tiny burn marks. When she asked about them, he paused and, for the first time, gave a genuine smile.

      "Every one of these burns represents a failed experiment," he said. "Before I created the bone-healing potion, I failed four hundred and twelve times. Before the underwater cream, I failed six hundred and ninety times."

      Rosa was shocked. "But you're the best potion maker in the world! How could you fail so many times?"

      Grimshaw sat down and looked at her. "That is precisely why I am the best. Most people try something three or four times, and if it doesn't work, they give up. I never stop. Each failure teaches me something the previous attempt did not. Failure is not the opposite of success — it is the pathway to success."

      From that day on, Rosa saw Master Grimshaw differently. His strictness was not cruelty. It was his way of teaching students that excellence requires persistence and determination. His burns were not marks of failure — they were badges of someone who never stopped trying.

      At the end of the year, Rosa became the first student in thirty years to receive top marks from Master Grimshaw.
    passageZh: |
      在龙之学院，每个学生都害怕一门课——格里姆肖大师的高级药剂课。他很严格，很少笑，以出全校最难的考试而闻名。学生们窃窃私语说他三十年来从未给过任何学生满分。

      尽管如此，他的药剂是传奇级的。他能调制出让骨折在几秒钟内愈合的液体，创造出将铁变成金的喷雾，以及调配出让人类在水下呼吸整整一天的乳霜。尽管他态度不友好，连其他教授都承认他的才华。

      一天下午，一个好奇的学生罗莎注意到了一些奇怪的事情。格里姆肖大师的手上布满了小小的烧伤痕迹。当她问起时，他停了下来，第一次露出了真诚的微笑。

      "这些烧伤中的每一个都代表一次失败的实验，"他说。"在我创造出骨骼愈合药水之前，我失败了四百一十二次。在水下乳霜之前，我失败了六百九十次。"

      罗莎很震惊。"但你是世界上最好的药剂师！你怎么能失败那么多次？"

      格里姆肖坐下来看着她。"这正是我成为最好的原因。大多数人尝试三四次，如果不成功就放弃了。我从不停止。每次失败都教给我之前尝试中没有学到的东西。失败不是成功的反面——它是通向成功的道路。"

      从那天起，罗莎对格里姆肖大师有了不同的看法。他的严格不是残酷。这是他教学生们卓越需要坚持和决心的方式。他的烧伤不是失败的标记——它们是一个永不放弃的人的徽章。

      在学年结束时，罗莎成为三十年来第一个获得格里姆肖大师满分的学生。
