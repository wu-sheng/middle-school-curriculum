  # ============================================================
  # R066 – The Dragon Who Collected Words (Level 2, ~290 words, fantasy)
  # ============================================================
  - id: R066
    title: 'The Dragon Who Collected Words'
    titleZh: '收集文字的龙'
    level: 2
    wordCount: 290
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'original'
    passage: |
      Most dragons collected treasure — gold coins, precious gems, and shining armour. But Sage, a small green dragon at Dragon Academy, collected something entirely different. She collected words.

      Every day, Sage would fly around the academy, listening carefully to conversations. When she heard an interesting word, she would catch it in a small crystal jar. The word would appear inside the jar as a glowing letter, floating like a tiny firefly. Her cave was filled with thousands of these jars, each containing a beautiful word.

      Her favourites were long, unusual words that sounded like music: "magnificent," "nevertheless," "extraordinary." She also loved words that felt warm and kind: "compassion," "gratitude," "friendship." But she deliberately avoided collecting words that were cruel or hurtful.

      One day, a new student asked Sage why she collected words instead of gold. The dragon tilted her head and replied, "Gold cannot make someone smile when they are sad. Gold cannot explain how a sunset makes you feel. Gold cannot tell a story that changes someone's life. Words can do all of these things."

      Professor Wing was so impressed by Sage's collection that she asked the dragon to help teach vocabulary classes. Sage would open a jar, release a word into the air, and the students would watch it float and shimmer while they learned its meaning. The words seemed to come alive, making them much easier to remember.

      By the end of the year, the students in Sage's class had the highest vocabulary scores in the academy. But more importantly, they had learned to appreciate the power of language — that the right word, spoken at the right time, can be worth more than all the gold in the world.
    passageZh: |
      大多数龙收集宝藏——金币、宝石和闪亮的盔甲。但龙之学院的一条小绿龙赛琪收集的东西完全不同。她收集文字。

      每天，赛琪都会在学院周围飞行，仔细听着对话。当她听到一个有趣的词时，就会用一个小水晶罐子把它捕捉下来。这个词会以发光的字母形式出现在罐子里，像一只小萤火虫一样漂浮。她的洞穴里摆满了成千上万个这样的罐子，每个都装着一个美丽的词。

      她最喜欢的是那些听起来像音乐一样的长而不寻常的词："magnificent"、"nevertheless"、"extraordinary"。她也喜欢感觉温暖善意的词："compassion"、"gratitude"、"friendship"。但她刻意避免收集残酷或伤人的词。

      有一天，一个新生问赛琪为什么收集词而不是金子。龙歪了歪头回答说："金子不能让伤心的人微笑。金子不能解释日落让你有什么感受。金子不能讲述一个改变某人生活的故事。但文字可以做到所有这些事情。"

      温教授对赛琪的收藏非常印象深刻，请这条龙帮忙教词汇课。赛琪会打开一个罐子，把一个词释放到空中，学生们看着它漂浮和闪烁，同时学习它的含义。这些词似乎活了过来，让它们更容易记住。

      到学年结束时，赛琪班上的学生在学院中获得了最高的词汇分数。但更重要的是，他们学会了欣赏语言的力量——在正确的时间说出正确的词，可以比世界上所有的金子都更有价值。
