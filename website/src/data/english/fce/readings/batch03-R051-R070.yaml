    passage: |
      Beyond the Northern Mountains, past the frozen rivers and through the Everwhite Pass, lay the Ice Kingdom — a vast land where it was always winter. The ground was permanently covered in thick snow, the trees were encased in crystal ice, and the temperature never rose above freezing.

      The Ice Kingdom was ruled by Queen Frost, an ancient ice dragon who had lived for over a thousand years. Unlike fire dragons, who were hot-tempered and explosive, ice dragons were calm, patient, and extraordinarily wise. Queen Frost could create entire palaces from ice using just her breath, and she governed her kingdom with fairness and compassion.

      The kingdom was inhabited by a variety of magical creatures — snow wolves with silver fur, ice foxes that could become invisible in blizzards, and frost fairies who tended the frozen gardens. Despite the harsh conditions, the creatures thrived because they had evolved to suit their environment perfectly.

      Students at Dragon Academy were occasionally permitted to visit the Ice Kingdom on educational expeditions. However, these visits required considerable preparation. Students had to acquire special enchanted clothing that kept them warm, learn basic ice-walking techniques to prevent slipping on the smooth surfaces, and study the customs of ice dragons so as not to cause offence.

      The most memorable part of any visit was meeting Queen Frost herself. She would welcome visitors in her Great Hall, a magnificent room carved entirely from blue ice, with pillars that sparkled like diamonds. She would answer questions about the history of her kingdom, the nature of ice magic, and the importance of balance between fire and ice in the magical world.

      "Fire and ice are not enemies," Queen Frost would say. "They are two halves of the same whole. Without cold, there can be no appreciation of warmth. Without darkness, light has no meaning. The world needs both."
    passageZh: |
      越过北方山脉，穿过冰冻的河流和永白山口，就是冰之王国——一片永远是冬天的广袤土地。地面永久覆盖着厚厚的雪，树木包裹在晶莹的冰中，温度从未升到零度以上。

      冰之王国由冰霜女王统治，她是一条古老的冰龙，已经活了一千多年。与脾气暴躁、爆发力强的火龙不同，冰龙是冷静的、耐心的，且拥有非凡的智慧。冰霜女王仅用呼吸就能创造出整座冰宫，她以公正和怜悯治理她的王国。

      王国里栖息着各种各样的魔法生物——银色毛皮的雪狼、能在暴风雪中隐形的冰狐，以及照料冰冻花园的霜之仙子。尽管条件恶劣，这些生物却茁壮成长，因为它们已经完美地进化以适应环境。

      龙之学院的学生偶尔被允许参加前往冰之王国的教育考察。然而，这些访问需要大量准备。学生必须获得特殊的魔法保暖衣物，学习基本的冰面行走技巧以防在光滑的表面上滑倒，还要学习冰龙的习俗以免冒犯。

      任何访问中最难忘的部分是见到冰霜女王本人。她会在她的大厅里欢迎访客，那是一个完全由蓝冰雕刻而成的宏伟房间，柱子像钻石一样闪闪发光。她会回答关于她王国的历史、冰魔法的本质以及魔法世界中火与冰之间平衡的重要性等问题。

      "火和冰不是敌人，"冰霜女王会说。"它们是同一个整体的两半。没有寒冷，就无法感激温暖。没有黑暗，光明就没有意义。世界需要两者。"
