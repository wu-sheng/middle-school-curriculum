  # ============================================================
  # R058 – Dragons of the East (Level 3, ~330 words, fantasy/culture)
  # ============================================================
  - id: R058
    title: 'Dragons of the East'
    titleZh: '东方之龙'
    level: 3
    wordCount: 330
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'original'
    passage: |
      In Western stories, dragons are often portrayed as fierce, fire-breathing monsters that guard treasure and kidnap princesses. However, in Eastern cultures — particularly in China, Japan, and Korea — dragons are seen in a completely different way. This distinction is one of the most fascinating contrasts in world mythology.

      Chinese dragons, known as "lóng," are symbols of power, wisdom, and good fortune. Unlike their Western counterparts, they do not have wings. Instead, they fly through the sky using magic. They are long and serpentine, with scales that shimmer like jewels. In Chinese mythology, dragons control water — they bring rain to farmers, protect rivers, and govern the seas. Seeing a dragon was considered an extremely positive sign.

      Japanese dragons, called "ryū," share many similarities with Chinese dragons but have some unique features. They are often associated with the sea and water. In Japanese legends, the Dragon King lives in a magnificent palace beneath the ocean and controls the tides.

      Korean dragons, known as "yong," are believed to be benevolent creatures that bring blessings to people. According to Korean mythology, a great serpent that survives for a thousand years and gathers a special pearl can transform into a dragon. This transformation represents patience and perseverance.

      Despite their differences, Eastern dragons share important qualities. They are generally wise, powerful, and connected to nature. Whereas Western dragons are frequently enemies that heroes must defeat, Eastern dragons are helpers and protectors who deserve respect.

      At Dragon Academy, Professor Lin teaches a popular course called "Dragons Across Cultures." She emphasises that neither the Eastern nor the Western view is more correct. "Different cultures created different dragon stories to explain the world around them," she says. "Understanding both perspectives makes us better dragon scholars — and better human beings."
    passageZh: |
      在西方故事中，龙通常被描绘成凶猛的、喷火的怪物，守护宝藏，绑架公主。然而，在东方文化中——特别是在中国、日本和韩国——龙被以完全不同的方式看待。这种区别是世界神话中最迷人的对比之一。

      中国龙，被称为"龙"，是力量、智慧和好运的象征。与西方的龙不同，它们没有翅膀。相反，它们用魔法飞过天空。它们长而蛇形，鳞片像宝石一样闪烁。在中国神话中，龙掌控水——它们为农民带来雨水，保护河流，统治海洋。看到龙被认为是极其吉祥的征兆。

      日本龙，称为"竜"，与中国龙有许多相似之处，但也有一些独特的特征。它们通常与海洋和水有关。在日本传说中，龙王住在海底一座宏伟的宫殿中，控制着潮汐。

      韩国龙，称为"龙"，被认为是给人们带来祝福的善良生物。根据韩国神话，一条存活了一千年并收集到一颗特殊珍珠的大蛇可以变成龙。这种变形代表着耐心和毅力。

      尽管有这些差异，东方龙有着共同的重要品质。它们通常是智慧的、强大的，与自然相联系。然而西方龙经常是英雄必须打败的敌人，东方龙则是值得尊重的帮助者和保护者。

      在龙之学院，林教授教授一门受欢迎的课程，叫做"跨文化之龙"。她强调东方和西方的观点都不是更正确的。"不同的文化创造了不同的龙的故事来解释周围的世界，"她说。"理解两种视角使我们成为更好的龙之学者——也成为更好的人。"
