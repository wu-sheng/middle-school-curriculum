      尼斯的第一次有记录的目击可以追溯到公元565年，当时一位爱尔兰修道士据说在尼斯河看到了一只"水兽"。此后，已有数千次报告的目击记录。一些人描述了从水中升起的长脖子。其他人提到水面上移动的驼峰。1934年拍摄的一张著名照片似乎显示了这个生物的头和脖子，但后来被揭露是一个骗局。

