      在云层之上，银角山山顶的一个洞穴里，住着世界上最古老的龙。他的名字叫托蒙德，已经两千多岁了。他的鳞片，曾经是明亮的金色，随着年龄变成了银色。他的火焰，曾经热到能融化石头，现在几乎只是温暖的呼吸。但他的头脑依然锋利如初。

      一个春天的早晨，一个叫爱子的年轻学生爬上山顶，想为她的研究项目向托蒙德请教。她花了三天才到达洞穴。当她筋疲力尽、瑟瑟发抖地到达时，老龙正在等待。

      "我知道你要来，"托蒙德说，声音低沉而温柔。"我能感知那些寻求知识的人的决心。问你的问题吧。"

      爱子准备了很多问题，但在那一刻，只有一个感觉是对的。"如果你能给世界留下一条智慧，那会是什么？"

      托蒙德沉默了很长时间。雪花飘过洞口。最后，他开口了。

      "当我年轻时，我相信成为最强大的龙才是重要的。我打仗、守护宝藏、什么都不怕。但力量会消退。宝藏失去意义。真正持久的——真正重要的——是你对他人展现的善意。每一个我帮助过的生物，每一只我庇护的受伤的鸟，每一个我引路回家的迷路旅人——那些才是现在给我带来快乐的记忆。"

      他停顿了一下，然后继续说。"世界不会记得你有多强大。它会记得你让别人有什么感受。那才是你真正的遗产。"

      爱子用颤抖的手把他的话写在笔记本上。她感谢了老龙，开始了漫长的回家旅程。她当时不知道，但托蒙德那天晚上闭上了眼睛，再也没有醒来。他给世界的最后礼物，就是在一个寒冷的春天早晨与一个年轻女孩分享的智慧。
