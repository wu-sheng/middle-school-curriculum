      每个人看到的都不一样。一个害羞的学生可能会看到自己自信地站在人群面前发表演讲。一个药剂学不好的男孩可能看到自己成为出色的药剂大师，周围围绕着各种颜色的发光瓶子。一个害怕飞行的女孩可能看到自己骑在壮丽的龙身上穿越云层，开心地大笑。

