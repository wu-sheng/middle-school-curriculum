readings:
  # ============================================================
  # R051 – The Dragon Whisperer (Level 2, ~290 words, fantasy)
  # ============================================================
  - id: R051
    title: 'The Dragon Whisperer'
    titleZh: '龙语者'
    level: 2
    wordCount: 290
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'inspired-by'
      title: 'How to Train Your Dragon'
      author: 'Cressida Cowell'
      note: 'Original passage inspired by themes of human-dragon bonding from the series'
    passage: |
      On the island of Drakenmoor, most people believed that dragons were fierce creatures that could never be tamed. For centuries, the villagers had built tall walls and lit bonfires every night to keep the dragons away. Nobody questioned this tradition.

      Then came Elara, a girl who was different. She did not see dragons as enemies. When she was seven, she found a baby dragon with an injured wing near the river. Instead of running away, she gently carried it home and made a bandage from soft cloth. She fed it warm soup and sang to it until it fell asleep.

      The villagers were horrified. They said the dragon would grow up and destroy the village. Nevertheless, Elara refused to abandon the creature. She named it Ember and cared for it every day.

      As months passed, something remarkable happened. Ember did not attack anyone. Instead, it began helping the village. It used its fire breath to light the blacksmith's forge in the morning. It carried heavy logs from the forest. It even caught fish for the elderly neighbours who could no longer walk to the river.

      Gradually, the villagers' perception of dragons changed. They realised that fear had prevented them from seeing the truth — dragons were intelligent, loyal creatures who responded to kindness.

      Elara eventually became the first Dragon Whisperer of Drakenmoor. She established a school where children learned to communicate with dragons through patience and respect. The tall walls were taken down, and bonfires were no longer lit in fear — instead, they became celebrations where humans and dragons gathered together.
    passageZh: |
      在德拉肯沼岛上，大多数人相信龙是永远无法驯服的凶猛生物。几个世纪以来，村民们建了高墙，每晚点燃篝火来驱赶龙。没有人质疑这个传统。

      然后来了埃拉拉，一个与众不同的女孩。她不把龙看作敌人。七岁时，她在河边发现了一条翅膀受伤的小龙。她没有跑开，而是轻轻地把它抱回家，用柔软的布做了绷带。她给它喂温热的汤，唱歌哄它入睡。

      村民们吓坏了。他们说这条龙长大后会摧毁村庄。尽管如此，埃拉拉拒绝抛弃这个小生物。她给它取名为"余烬"，每天照顾它。

      几个月过去了，了不起的事情发生了。余烬没有攻击任何人。相反，它开始帮助村庄。早上用火焰呼吸点燃铁匠的锻炉，从森林里搬运沉重的木头，甚至为不能再走到河边的老邻居们抓鱼。

      渐渐地，村民们对龙的看法改变了。他们意识到恐惧阻止了他们看到真相——龙是聪明、忠诚的生物，它们会回应善意。

      埃拉拉最终成为德拉肯沼的第一位龙语者。她建立了一所学校，孩子们在那里学习通过耐心和尊重与龙沟通。高墙被拆除了，篝火不再因恐惧而点燃——相反，它们变成了人类和龙共聚的庆典。
    vocabHighlights:
      - word: fierce
        ref: V0487
      - word: perception
        ref: V0473
      - word: remarkable
        ref: V0485
    questions:
      - id: R051-Q1
        type: main-idea
        question: 'What is the main message of this passage?'
        questionZh: '这篇文章的主要信息是什么？'
        options:
          A: 'Dragons are too dangerous to live near humans'
          B: 'Kindness and understanding can change how people see things'
          C: 'Building walls is the best way to protect a village'
          D: 'Only special people can talk to dragons'
        answer: 'B'
        explanation: 'The passage shows how Elara''s kindness towards a dragon changed the entire village''s attitude, demonstrating that understanding can overcome fear.'
        explanationZh: '文章展示了埃拉拉对一条龙的善意如何改变了整个村庄的态度，说明理解可以战胜恐惧。'
      - id: R051-Q2
        type: detail
        question: 'What did Ember do to help the village?'
        questionZh: '余烬做了什么来帮助村庄？'
        options:
          A: 'It guarded the village walls at night'
          B: 'It taught the children to fly'
          C: 'It lit the forge, carried logs, and caught fish'
          D: 'It scared away other dangerous animals'
        answer: 'C'
        explanation: 'The passage specifically mentions Ember lighting the blacksmith''s forge, carrying heavy logs, and catching fish for elderly neighbours.'
        explanationZh: '文章明确提到余烬点燃铁匠的锻炉、搬运沉重的木头，以及为老邻居们抓鱼。'
      - id: R051-Q3
        type: inference
        question: 'Why did the villagers eventually take down the tall walls?'
        questionZh: '为什么村民们最终拆除了高墙？'
        options:
          A: 'The walls were too old and falling apart'
          B: 'They no longer feared dragons and wanted to welcome them'
          C: 'Elara ordered them to do it'
          D: 'The dragons burned the walls down'
        answer: 'B'
        explanation: 'The walls were built out of fear. Once the villagers no longer feared dragons and saw them as friends, the walls were no longer needed.'
        explanationZh: '高墙是出于恐惧而建造的。一旦村民们不再害怕龙并把它们视为朋友，墙壁就不再需要了。'
      - id: R051-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "abandon" most likely mean?'
        questionZh: '文中的"abandon"最可能是什么意思？'
        options:
          A: 'To feed someone'
          B: 'To give up and leave behind'
          C: 'To make friends with'
          D: 'To take care of'
        answer: 'B'
        explanation: 'Elara "refused to abandon" the dragon, meaning she would not leave it behind or give up on caring for it, even though the villagers wanted her to.'
        explanationZh: '埃拉拉"拒绝抛弃"这条龙，意思是即使村民希望她这样做，她也不会丢下它或放弃照顾它。'

  # ============================================================
  # R052 – The Sorting Hat of Dragon Academy (Level 2, ~300 words, fantasy)
  # ============================================================
  - id: R052
    title: 'The Sorting Hat of Dragon Academy'
    titleZh: '龙之学院的分院帽'
    level: 2
    wordCount: 300
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'inspired-by'
      title: 'Harry Potter and the Philosopher''s Stone'
      author: 'J.K. Rowling'
      note: 'Original passage inspired by the concept of magical school sorting'
    passage: |
      Every September, new students arrived at Dragon Academy feeling anxious and excited. The most important event of their first day was the Bonding Ceremony, where each student would be matched with a young dragon.

      Unlike ordinary schools, Dragon Academy did not sort students into classes based on their age or test scores. Instead, the academy used something far more unusual — a magical crystal called the Heartstone. The Heartstone could sense a person's true character and match them with the dragon whose personality was most compatible.

      When eleven-year-old Kai stepped forward, the Heartstone glowed bright orange. A small, energetic fire dragon immediately flew down from the rafters and landed on his shoulder. The crowd cheered. Fire dragons chose people who were courageous and passionate.

      Next came Mei, a quiet girl who loved reading. The crystal turned a deep blue, and a graceful water dragon glided across the hall to rest at her feet. Water dragons were drawn to people who were thoughtful and patient.

      The last student was Tomás, who looked nervous. He waited for a long time, but no dragon appeared. Some students began to whisper. Then, from the shadows behind the stage, a tiny silver dragon crept forward. It was a rare shadow dragon — the kind that chose people with extraordinary imagination and the ability to see beyond what others could see.

      Professor Wing smiled and addressed the hall. "The Heartstone never makes mistakes," she said. "It does not measure how strong or clever you are. It measures who you truly are inside. That is what matters most."

      Tomás grinned and gently stroked the silver dragon's head. He had found his partner for life.
    passageZh: |
      每年九月，新生们怀着焦虑和兴奋的心情来到龙之学院。入学第一天最重要的活动是结缘仪式，每个学生都会与一条幼龙配对。

      与普通学校不同，龙之学院不按年龄或考试成绩将学生分班。相反，学院使用了一种更不寻常的东西——一颗叫做"心石"的魔法水晶。心石能感知一个人的真实性格，并将其与性格最匹配的龙配对。

      当十一岁的凯走上前时，心石发出明亮的橙色光。一条小而活泼的火龙立即从屋梁上飞下来，落在他的肩膀上。人群欢呼起来。火龙会选择勇敢和热情的人。

      接下来是梅，一个喜欢阅读的安静女孩。水晶变成了深蓝色，一条优雅的水龙滑过大厅，趴在她脚边。水龙被沉思和耐心的人所吸引。

      最后一个学生是托马斯，他看起来很紧张。他等了很久，但没有龙出现。一些学生开始窃窃私语。然后，从舞台后面的阴影中，一条小小的银色龙爬了出来。这是一条罕见的暗影龙——这种龙会选择拥有非凡想象力、能看到别人看不到的东西的人。

      温教授微笑着对大厅说："心石从不犯错，"她说。"它不衡量你有多强壮或多聪明。它衡量的是你内心真正是什么样的人。那才是最重要的。"

      托马斯咧嘴笑了，轻轻抚摸着银色龙的头。他找到了自己一生的伙伴。
    vocabHighlights:
      - word: anxious
        ref: V0504
      - word: courageous
        ref: V0501
      - word: extraordinary
        ref: V0485
    questions:
      - id: R052-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'How students take exams at Dragon Academy'
          B: 'How new students are matched with their dragons at the Bonding Ceremony'
          C: 'Why fire dragons are the best type of dragon'
          D: 'How Tomás trained his silver dragon'
        answer: 'B'
        explanation: 'The passage describes the Bonding Ceremony where new students are matched with dragons based on their inner character using the Heartstone.'
        explanationZh: '文章描述了结缘仪式，新生们通过心石根据内在品格与龙配对。'
      - id: R052-Q2
        type: detail
        question: 'What type of dragon chose Mei?'
        questionZh: '什么类型的龙选择了梅？'
        options:
          A: 'A fire dragon'
          B: 'A shadow dragon'
          C: 'A water dragon'
          D: 'A storm dragon'
        answer: 'C'
        explanation: 'The passage states that a water dragon glided across the hall to Mei, because water dragons are drawn to thoughtful and patient people.'
        explanationZh: '文章说一条水龙滑过大厅来到梅身边，因为水龙被沉思和耐心的人所吸引。'
      - id: R052-Q3
        type: inference
        question: 'Why did Tomás have to wait longer than the other students?'
        questionZh: '为什么托马斯要比其他学生等更久？'
        options:
          A: 'He was too nervous for the Heartstone to work'
          B: 'His matching dragon was rare and hiding in the shadows'
          C: 'The Heartstone was broken that day'
          D: 'No dragon wanted to choose him'
        answer: 'B'
        explanation: 'The shadow dragon was hiding behind the stage in the shadows. Its shy, hidden nature meant it took longer to come forward, but it was the right match for Tomás.'
        explanationZh: '暗影龙藏在舞台后面的阴影中。它害羞、隐藏的性格意味着它需要更长时间才能走出来，但它是托马斯的正确匹配。'
      - id: R052-Q4
        type: author-purpose
        question: 'What does Professor Wing mean when she says "The Heartstone never makes mistakes"?'
        questionZh: '温教授说"心石从不犯错"是什么意思？'
        options:
          A: 'The crystal is very expensive and well-made'
          B: 'Every student will always get a fire dragon'
          C: 'The matching is based on true character, which is always accurate'
          D: 'Students should not complain about their dragons'
        answer: 'C'
        explanation: 'Professor Wing is emphasising that inner character is what truly matters, and the Heartstone always accurately reads who a person really is inside.'
        explanationZh: '温教授强调的是内在品格才是真正重要的，心石总是能准确地读出一个人内心的真实面貌。'

  # ============================================================
  # R053 – Shape-Shifters of the Northern Forest (Level 2, ~310 words, fantasy)
  # ============================================================
  - id: R053
    title: 'Shape-Shifters of the Northern Forest'
    titleZh: '北方森林的变形者'
    level: 2
    wordCount: 310
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'original'
    passage: |
      Deep in the Northern Forest, there lives a group of creatures that few people have ever seen. They are called Shape-Shifters — beings who can alter their form to look like any animal in the forest. One moment they might appear as a deer drinking from a stream; the next, they could transform into an eagle soaring above the treetops.

      Professor Oakley, a scholar at Dragon Academy, spent twenty years studying these mysterious beings. She discovered that Shape-Shifters do not change their form for fun. Each transformation serves a specific purpose. When they sense danger, they shift into fast animals like wolves or hawks. When they need rest, they become something small and hidden, like a mouse or a caterpillar.

      The most fascinating discovery was about their true form. Despite all their changes, every Shape-Shifter has an original shape that they return to when they feel completely safe. Professor Oakley described it as a tall, slender figure with silver skin and eyes that change colour with their mood — blue for calm, green for curiosity, and amber for joy.

      Shape-Shifters are not dangerous to humans. In fact, they tend to avoid people entirely. However, there is one exception. If a human shows genuine kindness to a forest animal — feeding an injured bird or protecting a fox from a trap — a Shape-Shifter may reveal itself and offer a gift. These gifts are usually small enchanted objects: a stone that glows in the dark, or a feather that always points north.

      Professor Oakley concluded her research by saying, "Shape-Shifters remind us that what we see on the outside is not always the full truth. The ability to look beyond appearances is one of the most valuable skills a person can possess."
    passageZh: |
      在北方森林的深处，住着一群很少有人见过的生物。它们被称为变形者——能够改变形态，看起来像森林中任何动物的存在。这一刻它们可能看起来像一只在溪边饮水的鹿；下一刻，它们又变成一只翱翔在树梢之上的鹰。

      龙之学院的学者奥克利教授花了二十年研究这些神秘的生物。她发现变形者改变形态并不是为了好玩。每次变形都有特定的目的。当它们感知到危险时，会变成快速的动物，如狼或鹰。当它们需要休息时，会变成小而隐蔽的东西，如老鼠或毛毛虫。

      最迷人的发现是关于它们的真实形态。尽管有各种变化，每个变形者都有一个原始形态，当它们感到完全安全时就会恢复。奥克利教授将其描述为一个高而纤细的身影，有银色的皮肤和随心情变化颜色的眼睛——蓝色代表平静，绿色代表好奇，琥珀色代表喜悦。

      变形者对人类没有危险。事实上，它们通常完全避开人类。然而，有一个例外。如果一个人对森林动物表现出真正的善意——喂养受伤的鸟或保护狐狸免受陷阱伤害——变形者可能会现身并赠送一件礼物。这些礼物通常是小型魔法物品：一块在黑暗中发光的石头，或一根总是指向北方的羽毛。

      奥克利教授总结她的研究时说："变形者提醒我们，我们在外表看到的并不总是全部真相。能够看穿表象是一个人能拥有的最有价值的技能之一。"
    vocabHighlights:
      - word: alter
        ref: V0453
      - word: scholar
        ref: V0506
      - word: possess
        ref: V0491
    questions:
      - id: R053-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲了什么？'
        options:
          A: 'How to catch Shape-Shifters in the forest'
          B: 'The habits, true form, and nature of Shape-Shifters'
          C: 'Why Professor Oakley left Dragon Academy'
          D: 'The dangers of walking in the Northern Forest'
        answer: 'B'
        explanation: 'The passage describes what Shape-Shifters are, why they transform, what they really look like, and how they interact with humans.'
        explanationZh: '文章描述了变形者是什么、为什么变形、真实外貌是什么样的，以及它们如何与人类互动。'
      - id: R053-Q2
        type: detail
        question: 'When do Shape-Shifters return to their true form?'
        questionZh: '变形者什么时候恢复真实形态？'
        options:
          A: 'When they are hungry'
          B: 'When they feel completely safe'
          C: 'When the moon is full'
          D: 'When a human asks them to'
        answer: 'B'
        explanation: 'The passage states that every Shape-Shifter returns to its original shape "when they feel completely safe."'
        explanationZh: '文章说每个变形者"当它们感到完全安全时"就会恢复原始形态。'
      - id: R053-Q3
        type: inference
        question: 'Why might a Shape-Shifter give a gift to a human?'
        questionZh: '为什么变形者可能会给人类一件礼物？'
        options:
          A: 'To trick the human into entering the forest'
          B: 'To reward kindness shown to forest animals'
          C: 'To make the human become a Shape-Shifter too'
          D: 'To ask for help escaping from danger'
        answer: 'B'
        explanation: 'The passage says a Shape-Shifter may reveal itself and offer a gift when a human shows genuine kindness to a forest animal.'
        explanationZh: '文章说当人类对森林动物表现出真正的善意时，变形者可能会现身并赠送礼物。'
      - id: R053-Q4
        type: vocabulary-in-context
        question: 'In the passage, what does "genuine" most likely mean?'
        questionZh: '文中"genuine"最可能是什么意思？'
        options:
          A: 'Fake or pretended'
          B: 'Quick and careless'
          C: 'Real and sincere'
          D: 'Frightened and nervous'
        answer: 'C'
        explanation: '"Genuine kindness" means kindness that is real and comes from the heart, not pretended or fake.'
        explanationZh: '"Genuine kindness"意思是真诚的、发自内心的善意，不是假装或虚假的。'

  # ============================================================
  # R054 – The Phoenix Egg (Level 2, ~290 words, fantasy)
  # ============================================================
  - id: R054
    title: 'The Phoenix Egg'
    titleZh: '凤凰之蛋'
    level: 2
    wordCount: 290
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'inspired-by'
      title: 'Harry Potter and the Chamber of Secrets'
      author: 'J.K. Rowling'
      note: 'Original passage inspired by the concept of the phoenix and its rebirth cycle'
    passage: |
      In the highest tower of Dragon Academy, there was a room that only the headmaster could enter. Inside sat a golden egg the size of a football, resting on a bed of warm ashes. This was the Phoenix Egg — the most precious object in the entire school.

      Every hundred years, the egg would begin to glow. The glow would intensify over several weeks, changing from soft amber to brilliant white. Then, one morning, the shell would crack and a tiny phoenix would emerge, no bigger than a sparrow. The old phoenix, which had been growing weaker, would burst into flames and vanish — but from those very flames, the egg would form again.

      Professor Wing explained this cycle to her students. "The phoenix teaches us an important lesson about transformation," she said. "Endings are not always sad. Sometimes, what looks like destruction is actually the beginning of something new."

      The students were fascinated. One girl asked, "Does the new phoenix remember its previous life?" Professor Wing thought for a moment. "We believe it carries the wisdom of all its past lives, even if it cannot remember specific events. That is why the phoenix is considered the wisest creature in the magical world."

      The academy's phoenix was called Lumina. Despite being reborn countless times, Lumina always recognised the headmaster and would sing a beautiful melody whenever students felt discouraged. Her song had the remarkable ability to restore hope in anyone who heard it.

      As the students left the tower, they understood that Lumina was more than just a magical bird. She was a living symbol of renewal — proof that even after the darkest moments, light always returns.
    passageZh: |
      在龙之学院最高的塔楼里，有一个只有校长能进入的房间。里面放着一颗足球大小的金蛋，躺在温暖的灰烬床上。这就是凤凰之蛋——整个学校最珍贵的物品。

      每一百年，蛋就会开始发光。光芒会在几周内增强，从柔和的琥珀色变为耀眼的白色。然后某天早上，蛋壳会裂开，一只不比麻雀大的小凤凰会出现。年老的凤凰，已经变得越来越虚弱，会燃烧成火焰并消失——但正是从那些火焰中，蛋会再次形成。

      温教授向学生们解释了这个循环。"凤凰给我们上了关于变形的重要一课，"她说。"结束并不总是悲伤的。有时候，看起来像毁灭的东西实际上是新事物的开始。"

      学生们很着迷。一个女孩问："新的凤凰还记得它前世的生活吗？"温教授想了一会儿。"我们相信它承载着过去所有生命的智慧，即使它不能记住具体的事件。这就是为什么凤凰被认为是魔法世界中最有智慧的生物。"

      学院的凤凰叫露米娜。尽管已经重生了无数次，露米娜总是认得校长，每当学生们感到沮丧时，她就会唱一首美妙的旋律。她的歌声有着非凡的能力，能恢复任何听到它的人的希望。

      当学生们离开塔楼时，他们明白了露米娜不仅仅是一只魔法鸟。她是重生的活象征——证明即使在最黑暗的时刻之后，光明总会回来。
    vocabHighlights:
      - word: intensify
        ref: V0595
      - word: emerge
        ref: V0497
      - word: restore
        ref: V0500
    questions:
      - id: R054-Q1
        type: main-idea
        question: 'What is the main theme of this passage?'
        questionZh: '这篇文章的主题是什么？'
        options:
          A: 'How to raise a phoenix from an egg'
          B: 'Transformation and renewal — endings can lead to new beginnings'
          C: 'The headmaster''s favourite pet bird'
          D: 'Why fire is dangerous in a school'
        answer: 'B'
        explanation: 'The passage focuses on the phoenix''s cycle of death and rebirth as a symbol that endings can lead to new, beautiful beginnings.'
        explanationZh: '文章围绕凤凰的死亡与重生循环，将其作为结束可以带来美好新开始的象征。'
      - id: R054-Q2
        type: detail
        question: 'How does the egg change before the phoenix is born?'
        questionZh: '凤凰出生前蛋是如何变化的？'
        options:
          A: 'It gets colder and turns blue'
          B: 'It glows from soft amber to brilliant white over several weeks'
          C: 'It shakes violently for three days'
          D: 'It grows larger and changes shape'
        answer: 'B'
