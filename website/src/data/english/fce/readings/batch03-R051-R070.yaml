    passage: |
      Of all the species studied at Dragon Academy, the Glass Dragon was the most difficult to observe. As its name suggests, a Glass Dragon is almost completely transparent. When it stands still, it is virtually invisible — you can see right through it, like looking through a window.

      Despite its fragile-sounding name, the Glass Dragon is not delicate at all. Its transparent scales are actually harder than diamond. The only way to spot one in the wild is to look for the subtle shimmer it creates when light passes through its body, similar to the effect of sunlight through a crystal.

      Professor Oakley dedicated an entire semester to teaching students how to find Glass Dragons. "You cannot find them by looking," she explained. "You must listen. Glass Dragons make a faint humming sound, like a tuning fork. If you close your eyes and focus, you can hear them from twenty metres away."

      The students tried this technique during a field trip to Crystal Valley, where a small group of Glass Dragons was known to inhabit the area. At first, nobody could hear anything. The forest was full of other sounds — birds singing, leaves rustling, water flowing.

      Then Kai closed his eyes and breathed slowly. Gradually, beneath all the other sounds, he detected a soft, steady hum. He pointed to his left and whispered, "There." Professor Oakley used a special spray that made the dragon's outline temporarily visible. Sure enough, a magnificent Glass Dragon stood just three metres away, watching them with curious, diamond-bright eyes.

      "The lesson here goes beyond dragons," Professor Oakley said. "In life, the most important things are often the hardest to see. You have to learn to look — and listen — in different ways."
    passageZh: |
      在龙之学院研究的所有龙种中，玻璃龙是最难观察的。顾名思义，玻璃龙几乎完全透明。当它静止不动时，实际上是隐形的——你可以直接看穿它，就像透过窗户看一样。

      尽管名字听起来很脆弱，玻璃龙一点也不娇弱。它的透明鳞片实际上比钻石还硬。在野外发现它们的唯一方法是寻找光线穿过它身体时产生的微妙光泽，类似于阳光穿过水晶的效果。

      奥克利教授用了整整一个学期教学生如何发现玻璃龙。"你不能用看的方式找到它们，"她解释说。"你必须用听的。玻璃龙会发出微弱的嗡嗡声，像音叉一样。如果你闭上眼睛集中注意力，你可以从二十米外听到它们。"

      学生们在前往水晶谷的实地考察中尝试了这种技巧，那里据知有一小群玻璃龙栖息。起初，没有人能听到什么。森林里充满了其他声音——鸟鸣、树叶沙沙声、流水声。

      然后凯闭上眼睛，缓慢呼吸。渐渐地，在所有其他声音之下，他听到了一种柔和、稳定的嗡嗡声。他指向左边低声说："那里。"奥克利教授使用了一种特殊喷雾，使龙的轮廓暂时可见。果然，一条壮丽的玻璃龙就站在三米外，用好奇的、钻石般明亮的眼睛看着他们。

      "这里的教训不仅仅关于龙，"奥克利教授说。"在生活中，最重要的东西往往是最难看到的。你必须学会用不同的方式去看——和去听。"
