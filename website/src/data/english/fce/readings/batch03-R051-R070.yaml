      title: 'Percy Jackson and the Lightning Thief'
      author: 'Rick Riordan'
      note: 'Original passage inspired by the concept of hidden magical worlds alongside our own'
    passage: |
      When twelve-year-old Zara found a strange letter in her school locker, she assumed it was a prank. The letter was written on shimmering blue paper in silver ink, and it began: "Dear human friend, my name is Kael. I am a student at Dragon Academy, and I would like to be your pen pal."

      At first, Zara laughed. Dragon Academy? That sounded like something from a fantasy novel. But she decided to write back, just for fun. She left her reply in the same locker, not expecting anything to happen. The next morning, the reply was gone and a new letter had appeared.

      Over the following weeks, Zara and Kael exchanged dozens of letters. Kael described his classes — dragon riding, potion brewing, and ancient languages. In return, Zara told him about her world — mathematics, science, and football. They were both astonished by how different yet similar their lives were.

      "We have homework too," Kael wrote, "but ours sometimes bites." Zara laughed at this and replied, "Our homework doesn't bite, but it can still be quite painful."

      The letters were converted from one realm to another through a magical portal hidden inside the locker. Neither Zara nor Kael fully understood how it worked, but they were grateful for the connection.

      Eventually, Kael asked the question Zara had been wondering about herself. "Do you think we will ever meet in person?" Zara thought carefully before answering.

      "I don't know," she wrote. "But does it matter? Through your letters, I have seen dragons, explored magical forests, and learned about a world I never knew existed. You have expanded my horizons without us ever meeting face to face. Some of the best friendships in history were built entirely through letters."

      Kael's reply was simple: "You are the wisest human I have never met."
    passageZh: |
      当十二岁的扎拉在学校储物柜里发现一封奇怪的信时，她以为是恶作剧。这封信写在闪闪发光的蓝色纸上，用银色墨水写着："亲爱的人类朋友，我的名字是凯尔。我是龙之学院的学生，我想成为你的笔友。"

      一开始，扎拉笑了。龙之学院？听起来像是奇幻小说里的东西。但她决定回信，就当好玩。她把回信留在同一个储物柜里，不期望会发生什么。第二天早上，回信不见了，出现了一封新的信。

      在接下来的几周里，扎拉和凯尔交换了几十封信。凯尔描述了他的课程——骑龙、制作药剂和古代语言。作为回报，扎拉告诉他她的世界——数学、科学和足球。他们都惊讶于彼此的生活如此不同却又如此相似。

      "我们也有作业，"凯尔写道，"但我们的作业有时会咬人。"扎拉笑着回复："我们的作业不会咬人，但它仍然可以很痛苦。"

      这些信通过隐藏在储物柜里的一个魔法传送门从一个国度转换到另一个国度。扎拉和凯尔都不完全理解它是如何工作的，但他们很感激这种联系。

      最终，凯尔问了扎拉自己也一直在想的问题。"你觉得我们会面对面见面吗？"扎拉在回答前仔细想了想。

      "我不知道，"她写道。"但这重要吗？通过你的信，我看到了龙，探索了魔法森林，了解了一个我从不知道存在的世界。你在我们从未见面的情况下拓宽了我的视野。历史上一些最好的友谊完全是通过书信建立的。"

      凯尔的回信很简单："你是我从未见过的最有智慧的人类。"
