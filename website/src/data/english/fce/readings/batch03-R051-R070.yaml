    passage: |
      Old Master Birch had been making wands for sixty years. His workshop, hidden behind a waterfall near Dragon Academy, was filled with shelves of wands made from every kind of wood — oak, willow, cherry, and even dragon-bone. Each wand contained a core of magical material: phoenix feather, dragon heartstring, or unicorn hair.

      His apprentice, a twelve-year-old boy named Felix, was learning the craft. But he was frustrated. Despite following every instruction perfectly, the wands he made never worked properly. They would spark, fizzle, or simply do nothing at all.

      "What am I doing wrong?" Felix asked one day, holding up yet another failed wand.

      Master Birch examined the wand carefully. The wood was carved perfectly. The core was inserted correctly. The measurements were precise. "There is nothing wrong with your technique," he said. "The problem is something else entirely."

      He led Felix to a tree at the edge of the forest. "Touch this tree," he said. "What do you feel?"

      Felix placed his hand on the bark. "It's rough. And cold."

      Birch shook his head. "You feel only the surface. Close your eyes. Listen. This tree has been growing for two hundred years. It has survived storms, droughts, and forest fires. Can you feel its strength? Its history?"

      Felix closed his eyes and concentrated. Slowly, he began to sense something — a faint pulse, like a heartbeat, deep within the wood. He gasped.

      "That," said Master Birch, "is what your wands are missing. You have been treating wood as a material. But wood is alive. It has energy and memory. A great wand-maker does not merely shape wood — they listen to it and let it guide them."

      From that day, Felix approached his work differently. His next wand hummed with power the moment it was finished.
    passageZh: |
      老伯奇大师制作魔杖已经六十年了。他的工坊藏在龙之学院附近一个瀑布后面，架子上摆满了用各种木材制作的魔杖——橡木、柳树、樱桃木，甚至龙骨。每根魔杖都包含一种魔法材料的核心：凤凰羽毛、龙心弦或独角兽毛发。

      他的学徒，一个十二岁的男孩叫菲利克斯，正在学习这门手艺。但他很沮丧。尽管完美地遵循了每一条指示，他做的魔杖从来都不能正常工作。它们会冒火花、嘶嘶作响，或者什么都不做。

      "我做错了什么？"菲利克斯有一天问道，举起又一根失败的魔杖。

      伯奇大师仔细检查了魔杖。木头雕刻得完美。核心插入正确。尺寸精确。"你的技术没有任何问题，"他说。"问题完全在别的地方。"

      他带菲利克斯来到森林边缘的一棵树旁。"摸摸这棵树，"他说。"你感觉到什么？"

      菲利克斯把手放在树皮上。"它很粗糙。而且很冷。"

      伯奇摇了摇头。"你只感觉到表面。闭上眼睛。听。这棵树已经生长了两百年。它经受住了暴风雨、干旱和森林火灾。你能感觉到它的力量吗？它的历史？"

      菲利克斯闭上眼睛，集中注意力。慢慢地，他开始感受到一些东西——一种微弱的脉搏，像心跳一样，深藏在木头里。他倒吸了一口气。

      "那，"伯奇大师说，"就是你的魔杖缺少的东西。你一直把木头当作一种材料。但木头是活的。它有能量和记忆。一位伟大的魔杖师不仅仅是塑造木头——他们倾听木头，让它引导自己。"

      从那天起，菲利克斯用不同的方式对待工作。他做的下一根魔杖一完成就嗡嗡作响，充满了力量。
