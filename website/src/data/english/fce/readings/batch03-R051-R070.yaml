    passage: |
      On her first day at Dragon Academy, Lian received a folded piece of parchment from the school librarian. "This is your academy map," the librarian said. "It will help you find your way."

      Lian opened the map and frowned. It appeared to be blank — just empty cream-coloured paper. She was about to complain when she noticed tiny ink lines slowly spreading across the surface, as if an invisible hand were drawing. Within seconds, a detailed map of the academy had appeared.

      Over the next few days, Lian discovered something remarkable. The map was not fixed. It shifted and changed depending on where she needed to go. When she was hungry, a golden line appeared leading to the dining hall. When she was looking for her dragon, the map showed a dotted trail to the stables. When she was lost, the corridors around her current position would expand in detail, whereas distant areas would fade to give her room to focus.

      The most fascinating feature appeared during exam week. Lian was searching for the library and the map revealed a shortcut she had never seen — through a hidden corridor behind a painting of a sleeping dragon. She followed it and arrived at the library in half the usual time.

      Her friend Marco was jealous. "My map never shows shortcuts," he complained. Lian compared their maps and realised something. The maps were not identical. Each one adapted to its owner. Lian's map showed shortcuts because she was always in a hurry. Marco's map highlighted quiet gardens because he loved peaceful places.

      "These maps don't just show the school," Lian concluded. "They show us something about ourselves." The librarian, overhearing this, smiled and whispered, "Now you understand."
