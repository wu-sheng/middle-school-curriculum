    passage: |
      At Dragon Academy, the final exam for first-year students was not a written test. It was something far more challenging — the Sky Trial. Each student had to fly with their dragon through a course above the mountains, facing obstacles that tested both skill and trust.

      The morning of the trial, fourteen students gathered at the launch platform. Their dragons stood beside them, sensing the tension. Professor Wing addressed the group. "This test is not about speed," she said. "It is about how well you and your dragon work together. A rider who does not trust their dragon will fail, regardless of how fast they fly."

      The course had three stages. First, riders had to navigate through a narrow canyon where strong winds changed direction without warning. This required the rider to communicate clearly with their dragon using gentle knee pressure and voice commands.

      The second stage was the Cloud Maze — a series of thick clouds enchanted to shift and move. Riders could not see more than a few metres ahead. They had to rely entirely on their dragon's instincts to find the correct path.

      The final stage was the most nerve-wracking. Riders had to leap off their dragon in mid-air, fall freely for five seconds, and trust that their dragon would catch them before they hit the ground. This demonstrated the ultimate bond between rider and dragon.

      Most students passed, though several admitted they had hesitated during the free fall. One student, however, stood out. Mei and her water dragon completed the course without a single mistake. When asked her secret, Mei smiled and said, "I stopped trying to control everything. I trusted my dragon, and she trusted me. That is all it takes."

      Professor Wing nodded. "That," she told the class, "is the most valuable lesson you will ever learn."
    passageZh: |
      在龙之学院，一年级学生的期末考试不是笔试。它是远更具挑战性的——天空试炼。每个学生必须和他们的龙飞过山脉上方的一条赛道，面对考验技巧和信任的障碍。

      试炼的早晨，十四个学生聚集在发射平台。他们的龙站在身边，感知着紧张的气氛。温教授对大家讲话。"这个考试不是关于速度，"她说。"它是关于你和你的龙合作得有多好。一个不信任自己龙的骑手会失败，不管飞得多快。"

      赛道有三个阶段。首先，骑手必须穿越一条狭窄的峡谷，那里的强风会毫无预警地改变方向。这要求骑手用轻柔的膝盖压力和声音指令与龙清晰地沟通。

      第二阶段是云迷宫——一系列被施了魔法会移动变化的浓云。骑手看不到前方几米以外。他们必须完全依赖龙的本能来找到正确的路径。

      最后一个阶段是最紧张的。骑手必须在空中从龙身上跳下来，自由下落五秒钟，然后相信他们的龙会在他们落地前接住他们。这展示了骑手和龙之间的终极纽带。

      大多数学生都通过了，不过有几个承认他们在自由落体时犹豫了。然而，有一个学生脱颖而出。梅和她的水龙毫无失误地完成了赛道。当被问到她的秘诀时，梅微笑着说："我不再试图控制一切。我信任我的龙，她信任我。这就是全部所需。"

      温教授点点头。"这，"她对全班说，"是你们将学到的最有价值的课。"
