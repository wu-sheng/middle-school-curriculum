      In the entrance hall of Dragon Academy, there hung an enormous mirror in an ornate golden frame. At first glance, it appeared to be an ordinary mirror. But anyone who stood in front of it for more than ten seconds would discover its secret — it did not show your reflection. Instead, it showed who you could become.

      Each person saw something different. A shy student might see herself standing confidently before a crowd, giving a speech. A boy who struggled with potions might see himself as a brilliant potion master, surrounded by glowing bottles of every colour. A girl who feared flying might see herself soaring through the clouds on a magnificent dragon, laughing with joy.

      The mirror was called the Looking Glass of Possibility. It had been created centuries ago by a wizard who believed that the biggest obstacle to achievement was not lack of talent, but lack of belief. "If you cannot imagine yourself succeeding," the wizard had written, "you will never even try."

      However, the mirror came with a warning carved into its frame: "Do not mistake what you see for what you have already achieved. A vision without effort is merely a dream."

      Professor Wing often brought struggling students to stand before the mirror. "Look carefully," she would say. "The person you see is real. That is you — not some fantasy version of you. It is who you can genuinely become if you work hard and believe in yourself."

      Many students found the experience profoundly moving. Some returned to the mirror regularly for encouragement. Others visited it only once, but carried the image in their hearts forever. The mirror could not do the work for them, but it gave them something equally valuable — the knowledge that their potential was real.
