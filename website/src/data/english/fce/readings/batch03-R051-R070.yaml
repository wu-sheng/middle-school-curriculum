      High above the clouds, in a cave carved into the peak of Mount Silverhorn, lived the oldest dragon in the world. His name was Tormund, and he was over two thousand years old. His scales, once bright gold, had turned silver with age. His fire, once hot enough to melt stone, was now barely a warm breath. But his mind remained as sharp as ever.

      One spring morning, a young student named Aiko climbed to the summit to ask Tormund a question for her research project. It took her three days to reach the cave. When she arrived, exhausted and shivering, the old dragon was waiting.

      "I knew you were coming," Tormund said, his voice deep and gentle. "I can feel the determination of those who seek knowledge. Ask your question."

      Aiko had prepared many questions, but in that moment, only one felt right. "If you could pass on one piece of wisdom to the world, what would it be?"

      Tormund was silent for a long time. Snowflakes drifted through the cave entrance. Finally, he spoke.

      "When I was young, I believed that being the most powerful dragon was what mattered. I fought battles, guarded treasures, and feared nothing. But power fades. Treasure loses its meaning. What endures — what truly matters — is the kindness you show to others. Every creature I helped, every wounded bird I sheltered, every lost traveller I guided home — those are the memories that bring me joy now."

      He paused, then continued. "The world will not remember how strong you were. It will remember how you made others feel. That is your true legacy."

      Aiko wrote his words in her notebook with trembling hands. She thanked the old dragon and began her long journey home. She did not know it then, but Tormund closed his eyes that evening and did not wake again. His final gift to the world was the wisdom he had shared with a young girl on a cold spring morning.
