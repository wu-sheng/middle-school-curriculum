  # ============================================================
  # R070 – The Graduation Flight (Level 3, ~350 words, fantasy)
  # ============================================================
  - id: R070
    title: 'The Graduation Flight'
    titleZh: '毕业飞行'
    level: 3
    wordCount: 350
    topic: fantasy
    tags: [Q04, month-4]
    source:
      type: 'original'
    passage: |
      The Graduation Flight was the final tradition at Dragon Academy — a ceremony that marked the end of a student's training and the beginning of their journey into the world. Every graduating class performed it differently, but the core ritual remained the same.

      On the morning of graduation, students gathered at Dawn Peak, the highest point on the academy grounds. Each student stood beside their dragon, wearing the silver cloak of a fully trained rider. Professor Wing addressed them for the last time as students.

      "You arrived here as strangers to yourselves," she said. "You were uncertain, anxious, and full of doubt. You did not know what you were capable of. Through years of study, practice, and perseverance, you have transformed — not into different people, but into the best versions of who you already were."

      She paused and looked at each student. "Today, you will fly one final time as academy students. When you land, you will be graduates — dragon riders who carry the legacy of this school wherever you go."

      One by one, the students mounted their dragons. The morning sun painted the sky in shades of gold and pink. A gentle wind swept across the peak. Then, at the sound of a silver horn, they launched into the air together.

      They flew in a great spiral above the academy — past the towers where they had studied, over the lake where they had trained, and through the forest where they had faced their fears. Each location held memories that would last a lifetime.

      At the highest point of the spiral, they released their cloaks into the wind. The silver fabric caught the sunlight and drifted slowly back to earth like falling stars. This symbolised letting go of the student identity and embracing the future.

      As they descended, tears streamed down many faces — not from sadness, but from gratitude. Gratitude for the teachers who had guided them, the dragons who had chosen them, and the friendships that had sustained them.

      The ceremony concluded with Professor Wing's traditional farewell: "Go forth with courage. The world needs what only you can give."
    passageZh: |
      毕业飞行是龙之学院的最后一个传统——一个标志着学生训练结束和踏入世界之旅开始的仪式。每一届毕业班的表现都不同，但核心仪式保持不变。

      毕业那天早上，学生们聚集在曙光峰——学院场地的最高点。每个学生站在自己的龙旁边，穿着正式骑手的银色斗篷。温教授最后一次以学生的身份对他们讲话。

      "你们来到这里时对自己还是陌生人，"她说。"你们不确定、焦虑、充满怀疑。你们不知道自己能做什么。通过多年的学习、练习和坚持，你们已经改变了——不是变成了不同的人，而是变成了你们本来就是的人的最好版本。"

      她停顿了一下，看着每个学生。"今天，你们将作为学院的学生最后一次飞行。当你们着陆时，你们将是毕业生——无论走到哪里都承载着这所学校遗产的龙骑士。"

      学生们一个接一个地骑上了他们的龙。晨曦将天空染成金色和粉色。一阵轻风掠过山峰。然后，在银号角的声音中，他们一起飞向天空。

      他们在学院上空做了一个大螺旋飞行——飞过他们学习过的塔楼，越过他们训练过的湖泊，穿过他们面对恐惧的森林。每个地方都有终生难忘的记忆。

      在螺旋的最高点，他们将斗篷释放到风中。银色的布料捕捉了阳光，像流星一样缓缓飘回地面。这象征着放下学生身份，拥抱未来。

      当他们下降时，许多人脸上流下了泪水——不是因为悲伤，而是因为感激。感激指导他们的老师，选择他们的龙，以及支撑他们的友谊。

      仪式以温教授传统的告别词结束："勇敢前行。世界需要只有你们才能给予的东西。"
