    source:
      type: 'original'
    passage: |
      The library at Dragon Academy was unlike any other. It had thousands of books, but what made it truly special was that the books could move. They floated gently between shelves, rearranging themselves based on what each reader needed.

      When a student walked in, the books would sense their mood and purpose. If a student was studying for a history exam, books about dragon history would float down from the high shelves and arrange themselves on the nearest table. If someone was feeling sad, a book of cheerful dragon stories would nudge itself off the shelf and hover near their shoulder.

      The library also had a Restricted Section protected by an elaborate spell. Only advanced students with special permission could enter. Inside were books so old that their pages had to be handled with enchanted gloves. Some books were written in ancient dragon language and could only be read by holding a translation crystal above the text.

      The librarian, Mr Ash, was a quiet man who had worked there for forty years. He claimed he had read every book in the library at least twice. "Books are like dragons," he liked to say. "Each one has a personality. Some are friendly and easy to approach. Others are difficult and require patience. But every single one has something valuable to teach you."

      One peculiar rule governed the library: books that were not returned on time would fly back by themselves, sometimes bursting through open windows during class. This had caused many embarrassing moments — particularly for students who tried to pretend they had already returned their books.

      Despite its quirks, every student agreed the library was their favourite place in the entire academy.
    passageZh: |
      龙之学院的图书馆与众不同。它有数千本书，但真正让它特别的是这些书会移动。它们轻轻地在书架之间漂浮，根据每个读者的需要重新排列自己。

      当学生走进来时，书本会感知他们的心情和目的。如果学生正在为历史考试复习，关于龙之历史的书会从高架子上飘下来，排列在最近的桌子上。如果有人感到悲伤，一本欢快的龙故事书会从书架上挤出来，悬浮在他们肩膀附近。

      图书馆还有一个被精心设计的咒语保护的禁区。只有获得特别许可的高年级学生才能进入。里面的书太古老了，必须戴着魔法手套才能翻页。一些书是用古龙语写的，只有在文字上方举着翻译水晶才能阅读。

      图书管理员阿什先生是一个安静的人，在那里工作了四十年。他声称自己至少把图书馆里的每一本书都读了两遍。"书就像龙，"他喜欢说。"每一本都有自己的个性。有些友好、容易接近。有些困难、需要耐心。但每一本都有有价值的东西教给你。"

