  - id: R160
    title: 'Why Every Child Should Learn to Debate'
    titleZh: '为什么每个孩子都应该学习辩论'
    level: 4
    wordCount: 380
    topic: opinion article
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Why Every Child Should Learn to Debate'
      author: 'Xinbloom Team'
      note: 'Original opinion article on the value of debate for young people'
    passage: |
      In a world flooded with information, opinions, and arguments, the ability to think clearly, speak persuasively, and listen respectfully has never been more important. I believe that every school should teach debating as a core skill — not just in an after-school club, but as part of the regular curriculum.

      Debating teaches children to organise their thoughts. When preparing a speech, students must research a topic, identify the strongest arguments, and present them in a logical order. This process improves not just their speaking, but their writing too. A child who can structure a debate speech can structure an essay.

      [1]

      Equally important, debating teaches children to listen. Good debaters do not just wait for their turn to speak — they pay close attention to what the other side says, looking for weaknesses in the argument and opportunities to respond. In a world where people increasingly shout at each other on social media without listening, this skill is more valuable than ever.

      [2]

      Debating also builds confidence. Many students who join debating societies describe themselves as shy before they started. The safe, structured environment of a debate — where everyone gets equal time and personal attacks are forbidden — helps nervous students find their voice.

      [3]

      Perhaps most importantly, debating teaches children that disagreement can be respectful. Two people can hold completely opposite views and still treat each other with courtesy and kindness. In an age of increasing polarisation, this may be the most vital lesson of all.

      Schools have a responsibility to prepare children not just for exams, but for life. Debating does exactly that.
    passageZh: |
      在一个充斥着信息、观点和论证的世界里，清晰思考、有说服力地表达和尊重地倾听的能力从未像现在这样重要。我认为每所学校都应该将辩论作为核心技能来教授——不仅仅是在课外社团中，而是作为常规课程的一部分。

      辩论教会孩子组织思想。在准备演讲时，学生必须研究话题、找出最有力的论点，并按逻辑顺序呈现。这个过程不仅提高了他们的口语，也提高了写作。能构建辩论演讲的孩子就能构建议论文。

      [1]

      同样重要的是，辩论教会孩子倾听。好的辩手不只是等着轮到自己说话——他们密切关注对方的发言，寻找论点中的弱点和回应的机会。在一个人们越来越多地在社交媒体上互相喊叫而不倾听的世界里，这项技能比以往任何时候都更有价值。

      [2]

      辩论还建立自信。许多加入辩论社的学生描述自己开始之前很害羞。辩论的安全、有结构的环境——每个人有平等的时间，禁止人身攻击——帮助紧张的学生找到自己的声音。

      [3]

      也许最重要的是，辩论教会孩子分歧可以是尊重的。两个人可以持有完全相反的观点，但仍然以礼貌和善意对待彼此。在一个越来越两极化的时代，这可能是最重要的一课。

      学校有责任不仅为考试做准备，也为生活做准备。辩论正是这样做的。
