    questions:
      - id: R147-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Homework has existed since ancient Rome, when students were asked to practise writing at home.'
          B: 'Parents, too, often see homework as a valuable way to stay informed about what their children are learning at school.'
          C: 'Many teachers dislike marking homework because it takes up their evenings.'
        answer: 'B'
        explanation: 'Gap [1] follows the paragraph supporting homework. B adds another supporting point (parents'' perspective) before the essay transitions to the opposing view with "On the other hand."'
        explanationZh: '空缺[1]在支持作业的段落之后。B添加了另一个支持观点（家长的视角），在文章用"On the other hand"过渡到反对观点之前。'
      - id: R147-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'In Finland, one of the world''s highest-performing education systems, students receive very little homework — yet they consistently achieve excellent results in international tests.'
          B: 'Some students prefer doing homework on their tablets rather than in exercise books.'
          C: 'The average school day starts at 8:30 and finishes at 3:30.'
        answer: 'A'
        explanation: 'Gap [2] follows the argument that homework causes stress. A provides a powerful real-world example (Finland) that supports the anti-homework position before "Moreover" introduces another point.'
        explanationZh: '空缺[2]在关于作业导致压力的论点之后。A提供了一个有力的真实案例（芬兰）支持反作业立场，在"Moreover"引入另一个观点之前。'
      - id: R147-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'This is a point that even supporters of homework find difficult to argue against.'
          B: 'Most children prefer playing to doing homework.'
          C: 'Schools in Japan give more homework than schools in Sweden.'
        answer: 'A'
        explanation: 'Gap [3] follows the strong point about inequality. A acknowledges the strength of this argument ("even supporters find it difficult to argue against") and transitions to the solution paragraph.'
        explanationZh: '空缺[3]在关于不平等的有力论点之后。A承认了这个论点的力量（"即使支持者也很难反驳"），并过渡到解决方案段落。'
      - id: R147-Q4
        type: vocabulary-in-context
        question: 'What does "widen the gap" mean in the passage?'
        questionZh: '文中的"widen the gap"是什么意思？'
        options:
          A: 'Make the difference between two groups smaller'
          B: 'Make the difference between two groups larger'
          C: 'Create a new type of homework'
          D: 'Help all students equally'
        answer: 'B'
        explanation: '"Widen the gap" means to make the difference larger. In this context, homework could make the inequality between rich and poor students even worse.'
        explanationZh: '"Widen the gap"意思是使差距更大。在这个语境中，作业可能使贫富学生之间的不平等变得更加严重。'

  # ============================================================
  # R148 – Screen Time: Friend or Foe? (Level 4, ~380 words)
  # ============================================================
  - id: R148
    title: 'Screen Time: Friend or Foe?'
    titleZh: '屏幕时间：朋友还是敌人？'
    level: 4
    wordCount: 380
    topic: debate article
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Screen Time: Friend or Foe?'
      author: 'Xinbloom Team'
      note: 'Original debate article about screen time for children'
    passage: |
      Every generation has its worries about what children do in their spare time. In the 1950s, parents fretted about television. In the 1980s, it was video games. Today, the big concern is screen time — the hours children spend on phones, tablets, and computers.

      Critics of screen time argue that too many hours in front of a screen can harm children's physical health. Sitting for long periods leads to poor posture and reduced physical activity, which can contribute to obesity. Additionally, the blue light from screens can interfere with sleep, making it harder for children to fall asleep at night.

      [1]

      However, supporters of technology point out that not all screen time is equal. Watching cartoons for three hours is very different from spending an hour learning to code or exploring an educational app. A child who uses a tablet to read e-books, practise maths, or create digital art is using technology in a way that is clearly beneficial.

      [2]

      The key, most experts agree, is balance. The World Health Organisation recommends that children aged 5 to 12 should have no more than two hours of recreational screen time per day. This leaves plenty of room for educational use while still encouraging physical play and face-to-face social interaction.

      [3]

      Perhaps the most important thing is not how much screen time children have, but what they do with it. Parents and teachers who guide children towards high-quality, educational content — and who set clear limits on entertainment — are giving their children the best of both worlds.

      In the end, screens are tools. Like any tool, they can be used well or badly. The responsibility lies not with the technology itself, but with the adults who help children learn to use it wisely.
    passageZh: |
      每一代人都有对孩子课余时间做什么的担忧。1950年代，家长们担心电视。1980年代是电子游戏。今天，最大的担忧是屏幕时间——孩子花在手机、平板和电脑上的时间。

      批评屏幕时间的人认为在屏幕前花太多时间会损害孩子的身体健康。长时间坐着导致不良姿势和减少体育活动，这可能导致肥胖。此外，屏幕的蓝光会干扰睡眠，使孩子晚上更难入睡。

      [1]

      然而，技术的支持者指出并非所有屏幕时间都是一样的。看三小时动画片与花一小时学编程或探索教育应用非常不同。用平板阅读电子书、练习数学或创作数字艺术的孩子是在以明显有益的方式使用技术。

      [2]

      大多数专家认为，关键在于平衡。世界卫生组织建议5到12岁的孩子每天的娱乐性屏幕时间不应超过两小时。这为教育使用留出了充足的空间，同时仍然鼓励体育游戏和面对面的社交互动。

      [3]

      也许最重要的不是孩子有多少屏幕时间，而是他们用屏幕做什么。引导孩子使用高质量教育内容并为娱乐设定明确限制的家长和教师，正在给孩子们两全其美的体验。

      最终，屏幕是工具。像任何工具一样，它们可以被善用或被滥用。责任不在于技术本身，而在于帮助孩子学会明智使用它的成年人。
    vocabHighlights:
      - word: contribute
        ref: V1571
      - word: beneficial
        ref: V1543
      - word: moderate
        ref: V1618
    questions:
      - id: R148-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'There is also growing concern about the effect of social media on children''s mental health. Studies suggest that comparing themselves to others online can lower self-esteem and increase feelings of loneliness.'
          B: 'The first smartphone was released in 2007.'
          C: 'Many adults also spend too much time on their phones.'
        answer: 'A'
        explanation: 'Gap [1] follows physical health concerns. A adds mental health concerns (social media, self-esteem) — a natural extension before the "However" transition to the opposing view.'
        explanationZh: '空缺[1]在身体健康担忧之后。A添加了心理健康担忧（社交媒体、自尊心）——在"However"过渡到反对观点之前的自然延伸。'
      - id: R148-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Tablets are more expensive than books.'
          B: 'Moreover, screen-based communication helps children stay in touch with friends and family who live far away, and online communities can provide support for children with shared interests or challenges.'
          C: 'Some parents do not allow their children to use any screens at all.'
        answer: 'B'
        explanation: 'Gap [2] follows the argument that educational screen time is beneficial. B adds another positive point (social connection) using "Moreover" to build the case before the paragraph about balance.'
        explanationZh: '空缺[2]在关于教育性屏幕时间有益的论点之后。B使用"Moreover"添加了另一个积极观点（社交联系），在关于平衡的段落之前加强论证。'
      - id: R148-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Interestingly, some schools have started teaching "digital well-being" as a subject, helping children understand how to manage their own screen habits responsibly.'
          B: 'Video games were invented in the 1970s.'
          C: 'Children should exercise for at least one hour every day.'
        answer: 'A'
        explanation: 'Gap [3] follows the WHO recommendation about balance. A extends this idea by showing that schools are actively teaching digital responsibility, leading naturally into the concluding paragraphs.'
        explanationZh: '空缺[3]在世卫组织关于平衡的建议之后。A通过展示学校正在积极教授数字责任来延伸这个想法，自然地引向结尾段落。'
      - id: R148-Q4
        type: vocabulary-in-context
        question: 'What does "foe" mean in the title?'
        questionZh: '标题中的"foe"是什么意思？'
        options:
          A: 'A type of electronic device'
          B: 'An enemy or something harmful'
          C: 'A close friend or companion'
          D: 'A tool used for studying'
        answer: 'B'
        explanation: '"Foe" is a formal word meaning enemy or opponent. The title asks whether screen time is helpful (friend) or harmful (foe).'
        explanationZh: '"Foe"是一个正式词汇，意思是敌人或对手。标题问的是屏幕时间是有帮助的（朋友）还是有害的（敌人）。'

  # ============================================================
  # R149 – Should Coding Be Taught in Every School? (Level 4, ~390 words)
  # ============================================================
  - id: R149
    title: 'Should Coding Be Taught in Every School?'
    titleZh: '每所学校都应该教编程吗？'
    level: 4
    wordCount: 390
    topic: persuasive essay
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Should Coding Be Taught in Every School?'
      author: 'Xinbloom Team'
      note: 'Original persuasive essay on coding education for young learners'
    passage: |
      In the 21st century, computers are everywhere — in our homes, our schools, our pockets, and even on our wrists. Yet most children leave school without understanding how these machines actually work. Should coding be made a compulsory subject in every school? I believe the answer is yes.

      First and foremost, coding develops logical thinking and problem-solving skills. When children write a computer program, they must break a complex task into small, manageable steps. This process — known as "computational thinking" — is useful far beyond the world of computers. It helps students approach any problem in a structured, systematic way.

      [1]

      Furthermore, the job market is changing rapidly. According to the World Economic Forum, many of the most in-demand jobs of the future will require some understanding of technology. Even if a child does not become a software engineer, knowing the basics of coding will be an advantage in fields like medicine, architecture, music, and even art.

      [2]

      Admittedly, there are challenges. Not all schools have enough computers or trained teachers. Introducing coding as a compulsory subject would require significant investment in equipment and teacher training. Some people also worry that adding another subject to an already crowded curriculum would put too much pressure on students.

      [3]

      Nevertheless, countries like Estonia, Singapore, and the United Kingdom have already made coding part of their national curriculum, and the results are encouraging. Students report that they enjoy coding because it feels creative — like building something with digital Lego bricks. Teachers say it helps even the quietest students come alive, because there is always more than one way to solve a coding problem.

      In conclusion, while the challenges are real, the benefits of teaching coding to all students are too important to ignore. The question is no longer whether we should teach coding, but how we can do it in a way that is fun, inclusive, and effective.
    passageZh: |
      在21世纪，电脑无处不在——在我们的家里、学校里、口袋里，甚至在我们的手腕上。然而大多数孩子离开学校时并不理解这些机器实际上是如何工作的。编程是否应该成为每所学校的必修课？我认为答案是肯定的。

      首先，编程培养逻辑思维和解决问题的能力。当孩子编写计算机程序时，他们必须将复杂的任务分解成小的、可管理的步骤。这个过程——被称为"计算思维"——远远超出了计算机世界的用途。它帮助学生以结构化、系统化的方式处理任何问题。

      [1]

      此外，就业市场正在快速变化。据世界经济论坛称，未来许多最受欢迎的工作都需要对技术有一定的了解。即使一个孩子不成为软件工程师，了解编程基础知识在医学、建筑、音乐甚至艺术领域都将是一种优势。

      [2]

      诚然，存在挑战。并非所有学校都有足够的电脑或受过培训的教师。将编程作为必修课需要在设备和教师培训上进行大量投入。有些人还担心在已经满满当当的课程中再增加一门学科会给学生带来太大压力。

      [3]

      尽管如此，爱沙尼亚、新加坡和英国等国家已经将编程纳入国家课程，结果令人鼓舞。学生们报告说他们喜欢编程，因为它感觉很有创造性——就像用数字乐高积木搭建东西。教师们说它甚至帮助最安静的学生活跃起来，因为解决编程问题总有不止一种方法。

      总之，虽然挑战确实存在，但向所有学生教授编程的好处太重要了，不容忽视。问题不再是我们是否应该教编程，而是我们如何以有趣、包容和有效的方式去教。
