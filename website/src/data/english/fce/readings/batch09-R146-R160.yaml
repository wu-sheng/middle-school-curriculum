  # ============================================================
  # R146 – Should Schools Have Pets? (Level 4, ~370 words)
  # ============================================================
  - id: R146
    title: 'Should Schools Have Pets?'
    titleZh: '学校应该养宠物吗？'
    level: 4
    wordCount: 370
    topic: persuasive essay
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Should Schools Have Pets?'
      author: 'Xinbloom Team'
      note: 'Original opinion article for young learners on the debate topic of school pets'
    passage: |
      Imagine walking into your classroom and being greeted by a friendly rabbit or a tank full of colourful fish. In recent years, a growing number of schools around the world have introduced classroom pets, and the results have been overwhelmingly positive.

      [1]

      Supporters of school pets argue that animals teach children responsibility. When students take turns feeding the rabbit or cleaning the fish tank, they learn that other living things depend on them. This sense of duty can carry over into other areas of their lives, such as keeping their rooms tidy or completing homework on time.

      [2]

      Furthermore, research suggests that being around animals can reduce stress and anxiety. A study by the American Humane Association found that students in classrooms with pets showed improved attendance and fewer behavioural problems. Children who were normally shy or reluctant to speak in class became more confident when they could talk about the class pet.

      [3]

      However, not everyone agrees. Critics point out that some children are allergic to animal fur, which could cause serious health problems. Moreover, caring for an animal costs money — food, bedding, and veterinary visits all add up. Schools with limited budgets may struggle to afford these expenses.

      Despite these valid concerns, many schools have found practical solutions. Choosing pets that do not cause allergies, such as fish or reptiles, addresses the health issue. Meanwhile, fundraising activities or parent donations can cover the costs.

      In my opinion, the benefits of school pets clearly outweigh the drawbacks. They create a warmer, more caring classroom environment and teach valuable life lessons that textbooks simply cannot provide.
    passageZh: |
      想象走进教室时被一只友好的兔子或一缸五颜六色的鱼迎接。近年来，世界各地越来越多的学校引入了教室宠物，结果非常积极。

      [1]

      学校宠物的支持者认为动物能教会孩子责任感。当学生轮流喂兔子或清洁鱼缸时，他们了解到其他生物依赖他们。这种责任感可以延伸到他们生活的其他方面，比如保持房间整洁或按时完成作业。

      [2]

      此外，研究表明与动物在一起可以减少压力和焦虑。美国人道协会的一项研究发现，有宠物的教室里学生出勤率提高，行为问题减少。平时害羞或不愿在课堂上发言的孩子在能谈论班级宠物时变得更自信。

      [3]

      然而，并非所有人都同意。批评者指出一些孩子对动物毛发过敏，这可能导致严重的健康问题。而且，照顾动物需要花钱——食物、垫料和兽医费用加起来不少。预算有限的学校可能很难负担这些开支。

      尽管这些担忧是合理的，许多学校已经找到了实际的解决方案。选择不会导致过敏的宠物，如鱼类或爬行动物，可以解决健康问题。同时，筹款活动或家长捐款可以覆盖费用。

      在我看来，学校宠物的好处明显大于缺点。它们营造了更温暖、更有爱心的教室环境，教授教科书无法提供的宝贵人生课程。
    vocabHighlights:
      - word: argue
        ref: V1501
      - word: responsibility
        ref: V1547
      - word: beneficial
        ref: V1543
    questions:
      - id: R146-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'But is this just a fun distraction, or does having a pet in the classroom genuinely help children learn and grow? Let us examine the evidence.'
          B: 'The most popular school pets are hamsters, rabbits, and guinea pigs.'
          C: 'Many parents worry that their children spend too much time on screens.'
        answer: 'A'
        explanation: 'Gap [1] follows the introduction about schools introducing pets. A provides a transition question that sets up the rest of the essay, which examines the evidence for and against.'
        explanationZh: '空缺[1]在关于学校引入宠物的介绍之后。A提供了一个过渡性问题，为文章其余部分的论证铺垫。'
      - id: R146-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Fish are easier to care for than dogs because they do not need walking.'
          B: 'In addition to responsibility, school pets can also improve children''s emotional well-being and social skills.'
          C: 'Some schools have even started keeping farm animals like chickens and goats.'
        answer: 'B'
        explanation: 'Gap [2] sits between the paragraph about responsibility and the one about reduced stress. B provides a bridge by introducing "emotional well-being and social skills" as another benefit.'
        explanationZh: '空缺[2]位于关于责任感和减少压力的段落之间。B通过引入"情感健康和社交技能"作为另一个好处来提供过渡。'
      - id: R146-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'One school in London reported that reading scores improved by 15% after introducing a classroom cat that children could read aloud to.'
          B: 'Animals have been kept as pets for thousands of years.'
          C: 'The headteacher said she preferred dogs to cats.'
        answer: 'A'
        explanation: 'Gap [3] follows research about pets reducing stress and improving confidence. A gives a specific example (reading to a cat) that adds further evidence before the "However" counterargument.'
        explanationZh: '空缺[3]在关于宠物减少压力和提高自信的研究之后。A给出一个具体的例子（对着猫朗读）为转向"However"反论点之前增加更多证据。'
      - id: R146-Q4
        type: vocabulary-in-context
        question: 'What does "overwhelmingly" mean in the first paragraph?'
        questionZh: '第一段中的"overwhelmingly"是什么意思？'
        options:
          A: 'Slightly or barely'
          B: 'To a very great degree; very strongly'
          C: 'In a confusing or unclear way'
          D: 'Slowly and gradually'
        answer: 'B'
        explanation: '"Overwhelmingly positive" means the results were extremely positive — almost entirely in favour. It emphasises how strong the positive outcome was.'
        explanationZh: '"Overwhelmingly positive"意思是结果极其积极——几乎完全是有利的。它强调了积极结果的强度。'

  # ============================================================
  # R147 – The Great Homework Debate (Level 4, ~400 words)
  # ============================================================
  - id: R147
    title: 'The Great Homework Debate'
    titleZh: '作业大辩论'
    level: 4
    wordCount: 400
    topic: opinion article
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'The Great Homework Debate'
      author: 'Xinbloom Team'
      note: 'Original opinion article exploring both sides of the homework debate'
    passage: |
      Should schools give homework, or should learning stop when the bell rings at the end of the day? This is one of the most hotly debated topics in education, and people on both sides feel very strongly about it.

      Those who support homework argue that it helps students practise what they have learned in class. Without regular revision, children may quickly forget new information. Furthermore, homework teaches important life skills such as time management and self-discipline. Students who learn to organise their time and work independently at a young age are better prepared for secondary school and beyond.

      [1]

      On the other hand, opponents of homework claim that children already spend six or seven hours at school each day. Adding more work at home means less time for playing, reading for pleasure, spending time with family, and simply being a child. Research from Stanford University suggests that too much homework can lead to stress, sleep problems, and even a dislike of learning.

      [2]

      Moreover, homework can create inequality. Children from wealthy families often have quiet rooms, helpful parents, and access to the internet. Meanwhile, students from less privileged backgrounds may not have these advantages, which means homework could widen the gap between rich and poor students rather than closing it.

      [3]

      So what is the answer? Perhaps the solution lies somewhere in the middle. Many education experts now recommend "meaningful homework" — short, focused tasks that genuinely help students learn, rather than long worksheets that keep them busy without a clear purpose. Some schools have replaced traditional homework with "home learning," where students choose projects based on their own interests.

      Ultimately, the goal should be to develop a love of learning that lasts a lifetime. Whether that requires homework or not is a question each school must answer for itself.
    passageZh: |
      学校应该布置作业，还是放学铃响后学习就该停止？这是教育界争论最激烈的话题之一，双方都对此感到非常强烈。

      支持作业的人认为它帮助学生练习在课堂上学到的内容。没有定期复习，孩子可能很快就会忘记新信息。此外，作业教授重要的生活技能，如时间管理和自律。从小学会安排时间和独立工作的学生为中学及以后的学习做好了更好的准备。

      [1]

      另一方面，作业的反对者声称孩子每天已经在学校待六七个小时了。在家再增加更多工作意味着更少的时间去玩耍、自由阅读、与家人共度时光以及做一个孩子。斯坦福大学的研究表明，太多作业会导致压力、睡眠问题，甚至对学习的厌恶。

      [2]

      而且，作业可能造成不平等。来自富裕家庭的孩子通常有安静的房间、乐于帮助的父母和互联网。与此同时，来自较贫困背景的学生可能没有这些优势，这意味着作业可能会扩大而非缩小贫富学生之间的差距。

      [3]

      那答案是什么？也许解决方案就在中间。许多教育专家现在推荐"有意义的作业"——简短、有针对性的任务，真正帮助学生学习，而不是让他们忙碌却没有明确目的的长篇练习卷。一些学校已将传统作业替换为"家庭学习"，让学生根据自己的兴趣选择项目。

      最终，目标应该是培养持续一生的学习热爱。这是否需要作业，是每所学校必须自己回答的问题。
    vocabHighlights:
      - word: debate
        ref: V1576
