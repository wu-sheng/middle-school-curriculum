  # R155 – Should Robots Replace Teachers? (Level 4, ~380 words)
  # ============================================================
  - id: R155
    title: 'Should Robots Replace Teachers?'
    titleZh: '机器人应该取代教师吗？'
    level: 4
    wordCount: 380
    topic: debate article
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Should Robots Replace Teachers?'
      author: 'Xinbloom Team'
      note: 'Original debate article on AI and education'
    passage: |
      Artificial intelligence is transforming industries around the world. Self-driving cars, smart assistants, and robot surgeons are no longer science fiction. But could AI ever replace human teachers in the classroom?

      Supporters of AI in education argue that technology can provide personalised learning like no human teacher can. An AI system can analyse each student's strengths and weaknesses and create a perfectly tailored learning programme. If a student struggles with fractions, the AI offers extra practice. If another student finds fractions easy, the AI moves them ahead to more challenging material.

      Moreover, AI never gets tired, never has a bad day, and can work with hundreds of students simultaneously. It can provide instant feedback on homework and tests, freeing human teachers to spend more time on creative activities and one-to-one support.

      [1]

      However, critics argue that teaching is about far more than delivering information. Good teachers inspire, motivate, and connect with their students on an emotional level. They notice when a child is upset, encourage shy students to participate, and celebrate achievements in a way that makes children feel valued.

      [2]

      Furthermore, learning is a deeply social experience. Children learn not only from the content of a lesson but from working with classmates, sharing ideas, and resolving disagreements. A robot might teach the curriculum perfectly, but it cannot teach empathy, teamwork, or the art of respectful debate.

      [3]

      The most likely future is one where AI and human teachers work together. AI handles the routine tasks — marking, data analysis, personalised practice — while human teachers focus on what they do best: inspiring young minds, building relationships, and helping children grow not just as students, but as people.

      Technology should serve education, not the other way round.
    passageZh: |
      人工智能正在改变世界各地的行业。自动驾驶汽车、智能助手和机器人外科医生不再是科幻小说。但AI能否取代教室里的人类教师？

      教育中AI的支持者认为技术可以提供人类教师无法比拟的个性化学习。AI系统可以分析每个学生的优势和劣势，创建完美定制的学习计划。如果一个学生在分数方面有困难，AI提供额外练习。如果另一个学生觉得分数很简单，AI就让他们前进到更有挑战性的内容。

      而且，AI永远不会疲倦，永远不会有糟糕的一天，可以同时与数百名学生一起工作。它可以对作业和测试提供即时反馈，让人类教师有更多时间用于创意活动和一对一支持。

      [1]

      然而，批评者认为教学远不止传递信息。好的教师在情感层面上激励、鼓舞学生并与他们建立联系。他们注意到孩子不开心时，鼓励害羞的学生参与，并以让孩子们感到被重视的方式庆祝成就。

      [2]

      此外，学习是一种深度的社交体验。孩子不仅从课程内容中学习，还从与同学合作、分享想法和解决分歧中学习。机器人可能完美地教授课程，但它不能教授同理心、团队合作或尊重辩论的艺术。

      [3]

      最可能的未来是AI和人类教师一起工作。AI处理日常任务——批改、数据分析、个性化练习——而人类教师专注于他们最擅长的事情：激发年轻的思想，建立关系，帮助孩子不仅作为学生而且作为人成长。

      技术应该服务于教育，而不是反过来。
