  # ============================================================
  # R153 – Social Media: A Double-Edged Sword (Level 4, ~410 words)
  # ============================================================
  - id: R153
    title: 'Social Media: A Double-Edged Sword'
    titleZh: '社交媒体：双刃剑'
    level: 4
    wordCount: 410
    topic: debate article
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Social Media: A Double-Edged Sword'
      author: 'Xinbloom Team'
      note: 'Original debate article about social media for young people'
    passage: |
      Social media has become a normal part of life for millions of young people. Platforms like Instagram, TikTok, and YouTube allow children and teenagers to share their creativity, connect with friends, and learn about the world. But at what cost?

      On the positive side, social media gives young people a voice. A thirteen-year-old who cares about the environment can create a video about recycling that reaches thousands of viewers. Students who feel alone in their interests can find online communities of people who share their passion for coding, drawing, or astronomy.

      [1]

      However, the negative effects of social media are well documented. Cyberbullying — mean or threatening behaviour online — is a growing problem. Research shows that children who experience cyberbullying are more likely to suffer from anxiety, depression, and low self-esteem. Unlike traditional bullying, which stops when you leave school, cyberbullying can follow children everywhere, even into their bedrooms.

      [2]

      Furthermore, social media platforms are designed to be addictive. Features like notifications, likes, and infinite scrolling encourage users to keep checking their phones. A study by Common Sense Media found that the average teenager checks social media over 100 times per day. This constant distraction can be detrimental to sleep, homework, and real-world relationships.

      [3]

      Despite these serious concerns, banning social media entirely is probably not the answer. Instead, schools and parents should focus on teaching "digital citizenship" — the skills and knowledge needed to use the internet safely and responsibly. Children should learn to recognise fake news, protect their privacy, manage their time online, and treat others with kindness in digital spaces.

      Social media, like fire, is a powerful tool. In the right hands, it warms and lights the way. In the wrong hands, it can burn. Our job as a society is to teach young people how to use it wisely.
    passageZh: |
      社交媒体已经成为数百万年轻人生活中正常的一部分。Instagram、TikTok和YouTube等平台允许儿童和青少年分享创意、与朋友联系和了解世界。但代价是什么？

      从积极的一面来说，社交媒体给年轻人一个声音。一个关心环境的十三岁孩子可以创作一个关于回收的视频，传播给数千名观众。在自己兴趣方面感到孤独的学生可以在网上找到分享编程、画画或天文学热情的社区。

      [1]

      然而，社交媒体的负面影响有充分的记录。网络欺凌——在网上的恶意或威胁行为——是一个日益严重的问题。研究表明经历过网络欺凌的孩子更容易患上焦虑、抑郁和低自尊。与传统欺凌不同，传统欺凌在你离开学校时就停止了，而网络欺凌可以跟随孩子到任何地方，甚至到他们的卧室。

      [2]

      此外，社交媒体平台被设计成令人上瘾的。通知、点赞和无限滚动等功能鼓励用户不断查看手机。Common Sense Media的一项研究发现，普通青少年每天查看社交媒体超过100次。这种持续的分心对睡眠、作业和现实世界的关系可能是有害的。

      [3]

      尽管存在这些严重的担忧，完全禁止社交媒体可能不是答案。相反，学校和家长应该专注于教授"数字公民"——安全和负责任地使用互联网所需的技能和知识。孩子们应该学会识别假新闻、保护隐私、管理在线时间，并在数字空间中善待他人。

      社交媒体像火一样是一种强大的工具。在正确的手中，它温暖和照亮道路。在错误的手中，它可能燃烧。我们作为社会的工作是教年轻人如何明智地使用它。
