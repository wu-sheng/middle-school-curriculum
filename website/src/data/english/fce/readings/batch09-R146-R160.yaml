  # ============================================================
  # R150 – The School Uniform Question (Level 4, ~380 words)
  # ============================================================
  - id: R150
    title: 'The School Uniform Question'
    titleZh: '校服问题'
    level: 4
    wordCount: 380
    topic: balanced argument
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'The School Uniform Question'
      author: 'Xinbloom Team'
      note: 'Original balanced argument article about school uniforms'
    passage: |
      Walk into almost any school in the United Kingdom, Japan, or China, and you will see rows of students in matching uniforms. But step into a school in the United States, Sweden, or France, and children wear whatever they like. The question of whether students should wear uniforms remains one of the most controversial topics in education.

      Supporters of uniforms believe they create a sense of belonging and school pride. When everyone wears the same clothes, students focus on learning rather than fashion. Uniforms can also prevent bullying based on clothing — nobody is teased for wearing the wrong brand or having last year's trainers.

      [1]

      Furthermore, uniforms save families time and money. Parents do not need to buy expensive outfits for school, and children do not waste time every morning deciding what to wear. A recent survey in the UK found that families with school uniforms spent 30% less on children's clothing each year.

      However, opponents of uniforms argue that they limit self-expression. Clothing is one way young people show their personality and creativity. Forcing everyone to look the same, they say, sends the message that individuality is not valued.

      [2]

      There is also the argument that uniforms do not actually solve the problems they claim to address. Students who want to bully others will find ways to do so regardless of what everyone is wearing. And real equality comes from respect and understanding, not from matching clothes.

      [3]

      In the end, perhaps the debate about uniforms is really about something bigger: what do we value most in education — conformity or creativity, discipline or freedom? The answer likely depends on the culture and values of each individual community.
    passageZh: |
      走进几乎任何一所英国、日本或中国的学校，你会看到穿着统一校服的学生。但走进美国、瑞典或法国的学校，孩子们穿自己喜欢的衣服。学生是否应该穿校服仍然是教育界最有争议的话题之一。

      校服的支持者认为它们创造了归属感和学校自豪感。当每个人都穿一样的衣服时，学生专注于学习而不是时尚。校服还可以防止基于穿着的欺凌——没有人因为穿错品牌或穿去年的球鞋而被嘲笑。

      [1]

      此外，校服为家庭节省时间和金钱。父母不需要为学校买昂贵的衣服，孩子们也不会每天早上浪费时间决定穿什么。英国最近的一项调查发现，有校服的家庭每年在孩子衣服上的花费少了30%。

      然而，校服的反对者认为它们限制了自我表达。穿着是年轻人展示个性和创造力的一种方式。他们说，强迫每个人看起来一样，传递了个性不被重视的信息。

      [2]

      还有一种观点认为校服实际上并不能解决它们声称要解决的问题。想要欺凌别人的学生无论大家穿什么都会找到方法。而真正的平等来自尊重和理解，不是来自穿一样的衣服。

      [3]

      最终，关于校服的辩论也许真正讨论的是更大的问题：我们在教育中最看重什么——一致性还是创造力，纪律还是自由？答案可能取决于每个社区的文化和价值观。
    vocabHighlights:
