      author: 'Xinbloom Team'
      note: 'Original narrative about joining a school debating society'
    passage: |
      When Maya's teacher suggested she join the school debating society, her first reaction was pure terror. "Stand up in front of people and argue?" she thought. "I can barely order food in a restaurant without feeling nervous."

      But curiosity won over fear, and Maya went to the first meeting. The debate coach, Mr Okafor, explained that debating was not about being the loudest voice in the room. "The best debaters," he said, "are the best listeners. Before you can argue against someone, you must truly understand what they believe and why."

      [1]

      Maya's first debate was on the motion "This house believes school uniforms should be abolished." She was assigned to the opposition — she had to defend uniforms, even though she personally disliked them. At first, this seemed impossible. How could she argue for something she did not believe in?

      [2]

      That evening, Maya researched the topic thoroughly. She found statistics about bullying, read articles about equality, and even interviewed her parents. On debate day, she stood up, took a deep breath, and delivered her speech. Her hands shook, but her arguments were clear and well-supported.

      To her amazement, her team won. But the real victory, Maya realised, was not the trophy. It was the discovery that she could understand and present a viewpoint she did not personally share. "That," said Mr Okafor with a smile, "is the true purpose of debate."

      [3]

      Three months later, Maya was the most active member of the debating society. She had learned that great debaters do not just convince others — they allow themselves to be convinced too.
    passageZh: |
      当玛雅的老师建议她加入学校辩论社时，她的第一反应是纯粹的恐惧。"站在人们面前争论？"她想。"我在餐厅点菜都紧张得说不出来。"

      但好奇心战胜了恐惧，玛雅去参加了第一次会议。辩论教练Okafor先生解释说辩论不是关于在房间里做最大声的人。"最好的辩手，"他说，"是最好的倾听者。在你反驳某人之前，你必须真正理解他们相信什么以及为什么。"

      [1]

      玛雅的第一次辩论的主题是"本院认为校服应该被废除。"她被分配到反方——她必须为校服辩护，尽管她个人不喜欢校服。起初，这似乎不可能。她怎么能为自己不相信的东西辩护？

      [2]

      那天晚上，玛雅彻底研究了这个话题。她找到了关于欺凌的统计数据，阅读了关于平等的文章，甚至采访了她的父母。辩论日那天，她站起来，深吸一口气，发表了她的演讲。她的手在抖，但她的论点清晰且有充分的支持。

      令她惊讶的是，她的团队赢了。但真正的胜利，玛雅意识到，不是奖杯。而是发现她能理解和表达一个她个人不认同的观点。"这，"Okafor先生微笑着说，"才是辩论的真正目的。"

      [3]

      三个月后，玛雅成为辩论社最活跃的成员。她学到了伟大的辩手不仅说服别人——他们也允许自己被说服。
