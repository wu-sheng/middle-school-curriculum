  # ============================================================
  # R151 – Video Games: Not Just Child's Play (Level 4, ~400 words)
  # ============================================================
  - id: R151
    title: 'Video Games: Not Just Child''s Play'
    titleZh: '电子游戏：不只是小孩子的玩具'
    level: 4
    wordCount: 400
    topic: persuasive essay
    tags: [Q10, month-10]
    source:
      type: 'original'
      title: 'Video Games: Not Just Child''s Play'
      author: 'Xinbloom Team'
      note: 'Original persuasive essay about the benefits and risks of video games'
    passage: |
      When many adults hear the words "video games," they immediately think of wasted time and lazy children. But is this view fair, or is it based on outdated stereotypes? The truth about video games is far more nuanced than most people realise.

      It is undeniably true that some children spend far too long playing games. When gaming replaces homework, exercise, and sleep, it becomes a problem. Studies show that children who play more than three hours a day are more likely to experience difficulties with concentration and social skills.

      However, a growing body of research suggests that moderate gaming can actually be beneficial. Strategy games like Minecraft and Civilisation develop problem-solving and planning skills. Multiplayer games teach teamwork and communication, as players must coordinate with others to achieve goals. Even fast-paced action games have been shown to improve hand-eye coordination and reaction times.

      [1]

      Moreover, video games are increasingly being used as educational tools. "Game-based learning" platforms use the excitement of gaming to make difficult subjects like maths, science, and languages more engaging. When learning feels like a game, students are more motivated and tend to remember information better.

      [2]

      Critics rightly point out that some games contain violence and inappropriate content. This is a valid concern, and parents should always check age ratings before allowing children to play a new game. However, banning all games because some are unsuitable is like banning all books because some contain difficult themes.

      [3]

      The key message is clear: video games are neither entirely good nor entirely bad. Like television, social media, and even homework, they are best enjoyed in moderation. With proper guidance from parents and teachers, gaming can be a positive, enriching part of a child's life — not just child's play, but a pathway to skills that matter in the modern world.
    passageZh: |
      当许多成年人听到"电子游戏"这个词时，他们立刻想到的是浪费时间和懒惰的孩子。但这种看法公平吗，还是基于过时的刻板印象？电子游戏的真相比大多数人意识到的要微妙得多。

      不可否认的是，一些孩子花太长时间玩游戏。当游戏取代了作业、运动和睡眠时，它就成了一个问题。研究表明，每天玩超过三小时的孩子更容易在注意力和社交技能方面遇到困难。

      然而，越来越多的研究表明适度游戏实际上可能是有益的。像Minecraft和文明这样的策略游戏培养解决问题和规划能力。多人游戏教授团队合作和沟通，因为玩家必须与他人协调以实现目标。即使是快节奏的动作游戏也被证明能提高手眼协调和反应速度。

      [1]

      而且，电子游戏越来越多地被用作教育工具。"基于游戏的学习"平台利用游戏的刺激感使数学、科学和语言等难科目更有吸引力。当学习感觉像游戏时，学生更有动力，也倾向于更好地记忆信息。

      [2]

      批评者正确地指出一些游戏包含暴力和不适当的内容。这是一个合理的担忧，家长应该在允许孩子玩新游戏之前检查年龄分级。然而，因为一些游戏不合适就禁止所有游戏，就像因为一些书包含困难主题就禁止所有书一样。

      [3]

      关键信息很明确：电子游戏既不完全好也不完全坏。像电视、社交媒体甚至作业一样，它们最好适度享受。在家长和教师的适当指导下，游戏可以成为孩子生活中积极、丰富的一部分——不仅仅是小孩子的玩具，而是通向现代世界重要技能的途径。
