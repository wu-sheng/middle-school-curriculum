      author: 'Xinbloom Team'
      note: 'Original narrative about a school debate on classroom pets'
    passage: |
      When Mrs Chen announced that the school was considering getting a classroom pet, she did not expect the fierce debate that followed. Within a day, the school was divided into two camps.

      Team Paws, led by eleven-year-old Lily, argued passionately in favour. "Pets teach us empathy and responsibility," Lily declared in assembly. "Studies show that children who care for animals become kinder and more patient. Our class hamster would bring us together as a team."

      [1]

      Team Scales — so named because their preferred pet was a goldfish — was led by Tom, who had a different perspective. "Not everyone likes furry animals," he said. "My sister is allergic to hamsters. A goldfish would be perfect because nobody is allergic to fish, they are quiet, and watching them swim is proven to reduce stress."

      [2]

      Team No Pets, organised by careful-thinking Mia, presented the strongest counterargument. "Who looks after the pet during holidays?" she asked. "Who pays the vet bills if it gets sick? And what happens if a student accidentally hurts it? The school has limited money, and that money should be spent on books and sports equipment."

      [3]

      After three weeks of debate, the school held a vote. The result surprised everyone: the majority voted for Team Scales' goldfish compromise. Mrs Chen smiled. "You have just learned more about democracy, persuasion, and compromise from this debate than from any textbook I could have given you."
