        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Moreover, many readers say that paper books are simply more enjoyable. There is something special about holding a real book — the texture of the pages, the cover art, even the way a well-loved book falls open at your favourite chapter.'
          B: 'The first printed book was the Gutenberg Bible in 1455.'
          C: 'Libraries lend both paper books and e-books.'
