  - id: R181
    title: 'The Psychology of Colour'
    titleZh: '色彩心理学'
    level: 5
    wordCount: 440
    topic: psychology
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about how colours affect mood and behaviour'
    passage: |
      Have you ever noticed that fast-food restaurants are often decorated in red and yellow? Or that hospitals tend to use calming shades of blue and green? These colour choices are not accidental — they are based on decades of research into colour psychology, the study of how different colours affect human emotions and behaviour.

      Red, for example, has been shown to increase heart rate and stimulate appetite, which is precisely why so many food brands use it in their logos and restaurant designs. Blue, on the other hand, creates feelings of calm and trust, making it the most popular colour for banks, social media platforms, and corporate websites.

      However, the relationship between colour and emotion is not as straightforward as it might seem. Cultural context plays a significant role. In Western countries, white is associated with purity and weddings, while in many Asian cultures, white is the colour of mourning. Similarly, red symbolises luck and prosperity in China but can represent danger or warning in Europe.

      Age also influences colour perception. Young children are typically drawn to bright, saturated colours like primary red, blue, and yellow. As people grow older, their preferences tend to shift towards softer, more muted tones. This is partly biological — the lens of the eye yellows with age, affecting how we perceive colours — and partly cultural, as we learn to associate certain colours with sophistication or maturity.

      The practical applications of colour psychology extend far beyond marketing. Schools have experimented with painting classrooms in colours that promote concentration. Some studies suggest that blue-green tones can help students focus, while warm colours like orange can encourage creativity and social interaction. Prison authorities have even painted holding cells in a specific shade of pink — known as Baker-Miller Pink — which has been shown to reduce aggressive behaviour.

      Perhaps the most important lesson from colour psychology is the reminder that our environment shapes our emotions more than we realise. The colours of the walls around us, the clothes we wear, and even the colour of our study materials can subtly influence how we feel and how well we perform. Next time you sit down to study, you might want to consider whether the colours around you are helping or hindering your concentration.
    passageZh: |
      你有没有注意到快餐店经常用红色和黄色装饰？或者医院倾向于使用令人平静的蓝色和绿色？这些颜色选择不是偶然的——它们基于数十年对色彩心理学的研究，即研究不同颜色如何影响人类情感和行为。

      例如，红色已被证明能增加心率和刺激食欲，这正是为什么这么多食品品牌在其标志和餐厅设计中使用它。另一方面，蓝色创造平静和信任的感觉，使其成为银行、社交媒体平台和企业网站最受欢迎的颜色。

      然而，颜色和情感之间的关系并不像看起来那么简单。文化背景起着重要作用。在西方国家，白色与纯洁和婚礼相关，而在许多亚洲文化中，白色是丧葬的颜色。同样，红色在中国象征运气和繁荣，但在欧洲可能代表危险或警告。

      年龄也影响颜色感知。幼儿通常被明亮、饱和的颜色所吸引，如原色红、蓝、黄。随着年龄增长，偏好往往转向更柔和、更淡雅的色调。这部分是生物学原因——眼睛的晶状体随着年龄变黄，影响我们感知颜色——部分是文化原因，因为我们学会将某些颜色与精致或成熟联系起来。

      色彩心理学的实际应用远远超出营销领域。学校尝试将教室涂成促进集中注意力的颜色。一些研究表明，蓝绿色调可以帮助学生集中注意力，而橙色等暖色可以鼓励创造力和社交互动。监狱当局甚至将拘留室涂成一种特定的粉红色——被称为Baker-Miller粉红色——已被证明可以减少攻击性行为。

      也许色彩心理学最重要的教训是提醒我们，环境对情感的塑造比我们意识到的更大。我们周围墙壁的颜色、我们穿的衣服，甚至学习材料的颜色都可以微妙地影响我们的感受和表现。下次你坐下来学习时，你可能想考虑一下周围的颜色是在帮助还是阻碍你的注意力。
