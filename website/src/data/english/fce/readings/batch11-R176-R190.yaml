  - id: R189
    title: 'The Invention of the Internet'
    titleZh: '互联网的发明'
    level: 4
    wordCount: 420
    topic: technology and history
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about the history of the internet'
    passage: |
      It is almost impossible to imagine daily life without the internet, yet this technology that we take for granted is younger than most people's parents. The story of how the internet came to be is a fascinating tale of military research, academic collaboration, and unexpected consequences.

      The internet's origins can be traced back to 1969, when the United States Department of Defence created ARPANET, a network designed to allow military computers to communicate with each other even if some were destroyed in a nuclear attack. The first message ever sent over ARPANET was "LO" — the system crashed before the sender could finish typing "LOGIN."

      Throughout the 1970s and 1980s, the network expanded to include universities and research institutions. Scientists used it to share data, exchange emails, and collaborate on projects across vast distances. However, the network was text-based and extremely difficult to use. Only computer experts could navigate its complex commands.

      The breakthrough came in 1989, when Tim Berners-Lee, a British scientist working at CERN in Switzerland, invented the World Wide Web. His creation made the internet accessible to ordinary people by introducing clickable links, web pages, and web addresses. "I just had to take the hypertext idea and connect it to the internet," Berners-Lee later explained, modestly describing one of the most significant inventions in human history.

      What makes Berners-Lee's achievement even more remarkable is that he chose not to patent his invention. Had he done so, he could have become one of the richest people in the world. Instead, he made the World Wide Web freely available to everyone, believing that universal access to information would benefit all of humanity.

      Today, over 5 billion people — more than 60% of the world's population — use the internet regularly. We use it to learn, to work, to communicate, to shop, and to entertain ourselves. It has transformed every aspect of modern life, from how we read news to how we make friends.

      Yet the internet is still remarkably young. Just as the printing press took centuries to reshape society fully, we are likely still in the early stages of understanding how the internet will transform human civilisation. The full impact of this extraordinary invention remains to be seen.
    passageZh: |
      几乎不可能想象没有互联网的日常生活，然而这项我们视为理所当然的技术比大多数人的父母还年轻。互联网如何产生的故事是一个关于军事研究、学术合作和意想不到的后果的迷人故事。

      互联网的起源可以追溯到1969年，当时美国国防部创建了ARPANET，一个旨在允许军事计算机即使一些被核攻击摧毁也能相互通信的网络。通过ARPANET发送的第一条消息是"LO"——系统在发送者打完"LOGIN"之前就崩溃了。

      在整个1970年代和1980年代，网络扩展到包括大学和研究机构。科学家们用它来共享数据、交换电子邮件和跨越遥远距离合作项目。然而，网络是基于文本的，使用起来极其困难。只有计算机专家才能驾驭其复杂的命令。

      突破来自1989年，当时在瑞士CERN工作的英国科学家Tim Berners-Lee发明了万维网。他的创作通过引入可点击链接、网页和网址，使互联网对普通人变得可用。"我只需要将超文本的想法与互联网连接起来，"Berners-Lee后来解释说，谦虚地描述了人类历史上最重大的发明之一。

      使Berners-Lee的成就更加非凡的是，他选择不为他的发明申请专利。如果他这样做了，他可能成为世界上最富有的人之一。相反，他使万维网对所有人免费开放，相信信息的普遍获取将造福全人类。

      今天，超过50亿人——世界人口的60%以上——经常使用互联网。我们用它来学习、工作、交流、购物和娱乐。它改变了现代生活的方方面面，从我们如何阅读新闻到如何交朋友。

      然而，互联网仍然非常年轻。正如印刷术花了几个世纪才完全重塑社会一样，我们可能仍处于理解互联网将如何改变人类文明的早期阶段。这项非凡发明的全部影响还有待观察。
