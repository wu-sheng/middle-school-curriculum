  # ============================================================
  # R176 – The Future of Libraries (Level 4, ~420 words)
  # FCE Part 5 style: Multiple choice
  # ============================================================
  - id: R176
    title: 'The Future of Libraries'
    titleZh: '图书馆的未来'
    level: 4
    wordCount: 420
    topic: technology and society
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about the evolving role of libraries in the digital age'
    passage: |
      When people think of libraries, they often picture rows of dusty bookshelves and strict librarians whispering "Shh!" But modern libraries are undergoing a remarkable transformation that would surprise anyone who has not visited one recently.

      Today's libraries are becoming community hubs where people go not just to borrow books but to attend workshops, use 3D printers, learn coding, and even record podcasts. The British Library in London, for example, offers free Wi-Fi, business advice sessions, and exhibition spaces alongside its vast collection of over 170 million items.

      However, this transformation has not been without controversy. Some traditionalists argue that libraries should focus on what they do best — lending books and promoting reading. They worry that filling libraries with technology and social events will drive away the quiet readers who have always been their most loyal visitors.

      On the other hand, library supporters point out that without adapting, libraries risk becoming irrelevant. Statistics show that book borrowing has declined by approximately 40% in the past decade, while the number of people using library computers and attending library events has increased significantly. Libraries that have embraced change report higher visitor numbers than ever before.

      Perhaps the most convincing argument for modernisation comes from the libraries themselves. Manchester Central Library spent £50 million on a renovation that included a performance space, a media lounge, and a children's area with interactive floors. Since reopening, the library has welcomed over two million visitors — more than double the number before the renovation.

      Meanwhile, in Helsinki, Finland, the Oodi library has become one of the country's most popular buildings. It features a cinema, a recording studio, sewing machines, and gaming consoles alongside its traditional book collection. Far from driving away readers, these attractions have actually increased book borrowing by 15%.

      The evidence suggests that the future of libraries lies not in choosing between tradition and innovation but in combining both. A library that offers 3D printing workshops during the day and a peaceful reading room in the evening serves its community far better than one that insists on doing only one thing.

      As one librarian put it: "Our mission has always been to connect people with knowledge. The format may have changed from scrolls to printed books to digital screens, but the mission remains the same."
    passageZh: |
      当人们想到图书馆时，他们常常想象一排排积满灰尘的书架和小声说"嘘！"的严肃图书管理员。但现代图书馆正在经历一场显著的转变，这会让任何最近没去过的人感到惊讶。

      今天的图书馆正在成为社区中心，人们去那里不仅是借书，还参加工作坊、使用3D打印机、学习编程，甚至录制播客。例如，伦敦的大英图书馆在其超过1.7亿件藏品旁边提供免费Wi-Fi、商业咨询和展览空间。

      然而，这种转变并非没有争议。一些传统主义者认为，图书馆应该专注于它们最擅长的事——借书和促进阅读。他们担心用技术和社交活动填满图书馆会赶走那些一直是最忠实访客的安静读者。

      另一方面，图书馆支持者指出，如果不适应变化，图书馆就有变得无关紧要的风险。统计数据显示，在过去十年中借书量下降了大约40%，而使用图书馆电脑和参加图书馆活动的人数显著增加。那些拥抱变化的图书馆报告说访客数量比以往任何时候都多。

      也许最令人信服的现代化论据来自图书馆本身。曼彻斯特中央图书馆花了5000万英镑进行翻新，包括一个表演空间、一个媒体休息室和一个带互动地板的儿童区。自重新开放以来，该图书馆已接待了超过200万名访客——是翻新前的两倍多。

      与此同时，在芬兰赫尔辛基，Oodi图书馆已成为该国最受欢迎的建筑之一。它除了传统的图书收藏外，还设有电影院、录音室、缝纫机和游戏机。这些设施非但没有赶走读者，反而使借书量增加了15%。

      证据表明，图书馆的未来不在于在传统和创新之间做选择，而在于将两者结合。一个白天提供3D打印工作坊、晚上提供安静阅读室的图书馆比一个只坚持做一件事的图书馆更好地服务社区。

      正如一位图书管理员所说："我们的使命一直是将人们与知识联系起来。形式可能从卷轴变成了印刷书籍再到数字屏幕，但使命始终如一。"
    vocabHighlights:
      - word: transformation
        ref: V1990
      - word: controversy
        ref: V2002
      - word: approximately
        ref: V1977
    questions:
      - id: R176-Q1
        type: multiple-choice
        question: 'What does the writer say about modern libraries in the first two paragraphs?'
        questionZh: '作者在前两段中对现代图书馆说了什么？'
        options:
          A: 'They have removed all their books to make space for technology.'
          B: 'They are offering a much wider range of services than before.'
          C: 'They are less popular than they were in the past.'
          D: 'They are only used by young people who prefer technology.'
        answer: 'B'
        explanation: 'The passage describes libraries becoming "community hubs" with workshops, 3D printers, coding, and podcasts — a wider range of services.'
        explanationZh: '文章描述图书馆正在成为"社区中心"，提供工作坊、3D打印机、编程和播客——更广泛的服务范围。'
      - id: R176-Q2
        type: multiple-choice
        question: 'What concern do traditionalists have?'
        questionZh: '传统主义者有什么担忧？'
        options:
          A: 'Libraries will become too expensive to maintain.'
          B: 'Children will stop reading books entirely.'
          C: 'Technology and events may discourage quiet readers from visiting.'
          D: 'Librarians will lose their jobs to technology.'
        answer: 'C'
        explanation: 'The traditionalists "worry that filling libraries with technology and social events will drive away the quiet readers."'
        explanationZh: '传统主义者"担心用技术和社交活动填满图书馆会赶走安静的读者。"'
      - id: R176-Q3
        type: multiple-choice
        question: 'What does the Manchester Central Library example demonstrate?'
        questionZh: '曼彻斯特中央图书馆的例子说明了什么？'
        options:
          A: 'Renovations always cost too much money.'
          B: 'Investment in modernisation can dramatically increase visitor numbers.'
          C: 'Libraries should focus on performance spaces.'
          D: 'Older libraries cannot compete with new ones.'
        answer: 'B'
        explanation: 'After £50 million renovation, the library welcomed "more than double the number" of visitors, demonstrating that modernisation works.'
        explanationZh: '经过5000万英镑的翻新后，图书馆接待了"两倍多"的访客，证明现代化是有效的。'
      - id: R176-Q4
        type: multiple-choice
        question: 'What does the writer conclude about the future of libraries?'
        questionZh: '作者对图书馆的未来得出了什么结论？'
        options:
          A: 'They should replace all books with digital resources.'
          B: 'They should return to their traditional role of lending books.'
          C: 'They should combine traditional and innovative services.'
          D: 'They will eventually be replaced by the internet.'
        answer: 'C'
        explanation: '"The future of libraries lies not in choosing between tradition and innovation but in combining both."'
        explanationZh: '"图书馆的未来不在于在传统和创新之间做选择，而在于将两者结合。"'
      - id: R176-Q5
        type: vocabulary-in-context
        question: 'What does "irrelevant" mean in this passage?'
        questionZh: '文中的"irrelevant"是什么意思？'
        options:
          A: 'Very expensive'
          B: 'No longer useful or important'
          C: 'Extremely old-fashioned'
          D: 'Difficult to find'
        answer: 'B'
        explanation: '"Risk becoming irrelevant" means risk becoming no longer useful or important in people''s lives.'
        explanationZh: '"有变得无关紧要的风险"意味着有在人们生活中不再有用或重要的风险。'

  # ============================================================
  # R177 – How Animals Prepare for Winter (Level 4, ~440 words)
  # FCE Part 6 style: Gapped text
  # ============================================================
  - id: R177
    title: 'How Animals Prepare for Winter'
    titleZh: '动物如何为冬天做准备'
    level: 4
    wordCount: 440
    topic: nature and science
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about animal winter survival strategies'
    passage: |
      As autumn leaves begin to fall and temperatures drop, animals across the Northern Hemisphere face a crucial challenge: how to survive the long, cold winter months when food is scarce and conditions are harsh.

      [1]

      Hibernation is perhaps the most well-known winter survival strategy. Bears, hedgehogs, and certain species of bats enter a state of deep sleep in which their body temperature drops dramatically, their heartbeat slows to just a few beats per minute, and their breathing becomes almost undetectable. This allows them to survive for months without eating, living entirely off the fat reserves they built up during autumn.

      [2]

      Migration is another remarkable strategy. Rather than enduring the cold, millions of birds, butterflies, and even whales travel thousands of kilometres to warmer regions. The Arctic tern holds the record for the longest migration of any animal, travelling approximately 70,000 kilometres from the Arctic to the Antarctic and back again every year.

      [3]

      A third group of animals neither hibernates nor migrates but instead adapts to winter conditions. Squirrels, for example, spend autumn collecting and burying thousands of nuts and seeds, creating hidden food stores called caches. Remarkably, they can remember the location of most of these caches even months later, though they inevitably forget some — which is actually beneficial, as the forgotten nuts often grow into new trees.

      [4]

      Finally, some animals change their appearance to survive winter. The Arctic fox and the snowshoe hare, for instance, grow thick white fur that provides both insulation against the cold and camouflage against predators in the snow. In spring, their fur gradually changes back to brown or grey to match the landscape once more.

      Whatever strategy they use, all these animals demonstrate the incredible ability of nature to find solutions to even the most challenging problems.
    passageZh: |
      当秋叶开始飘落、气温下降时，北半球的动物面临一个至关重要的挑战：如何在食物稀缺、条件恶劣的漫长寒冬中生存。

      [1]

      冬眠可能是最著名的冬季生存策略。熊、刺猬和某些种类的蝙蝠进入深度睡眠状态，体温急剧下降，心跳减慢到每分钟只有几次，呼吸几乎无法察觉。这使它们能够在不进食的情况下存活数月，完全依靠秋季积累的脂肪储备生存。

      [2]

      迁徙是另一种了不起的策略。数百万只鸟类、蝴蝶甚至鲸鱼不忍受寒冷，而是旅行数千公里到温暖的地区。北极燕鸥保持着所有动物中最长的迁徙记录，每年从北极到南极来回旅行约70,000公里。

      [3]

      第三组动物既不冬眠也不迁徙，而是适应冬季条件。例如，松鼠在秋天花时间收集和埋藏数千颗坚果和种子，创建称为"缓存"的隐藏食物储备。令人惊叹的是，即使几个月后它们也能记住大部分缓存的位置，尽管不可避免地会忘记一些——这实际上是有益的，因为被遗忘的坚果往往会长成新的树。

      [4]

      最后，一些动物改变外表来度过冬天。例如，北极狐和雪靴兔会长出厚厚的白色皮毛，既能抵御寒冷又能在雪地中伪装自己躲避捕食者。春天，它们的皮毛逐渐变回棕色或灰色，再次与景观融为一体。

      无论使用什么策略，所有这些动物都展示了大自然找到解决最具挑战性问题的方案的不可思议的能力。
    vocabHighlights:
      - word: crucial
        ref: V1976
      - word: approximately
        ref: V1977
      - word: inevitable
        ref: V1972
    questions:
      - id: R177-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'Scientists have identified three main strategies that animals use to cope with winter: hibernation, migration, and adaptation.'
          B: 'Winter is the season that most people dislike, especially when it snows heavily.'
          C: 'Climate change is making winters shorter in many parts of the world.'
        answer: 'A'
        explanation: 'Gap [1] is between the introduction (the challenge of winter) and the first strategy (hibernation). A introduces the three strategies that the rest of the passage will explain.'
        explanationZh: '空缺[1]在引言（冬天的挑战）和第一个策略（冬眠）之间。A介绍了文章其余部分将解释的三种策略。'
      - id: R177-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Some scientists believe that humans could also benefit from hibernation on long space journeys.'
          B: 'However, not all animals can afford to sleep through winter. For species that live in open habitats, staying still for months would make them easy prey.'
          C: 'The longest-sleeping hibernator is the edible dormouse, which can hibernate for up to eleven months.'
        answer: 'B'
        explanation: 'Gap [2] transitions from hibernation to migration. B explains WHY some animals cannot hibernate, creating a natural bridge to migration as an alternative.'
        explanationZh: '空缺[2]从冬眠过渡到迁徙。B解释了为什么一些动物不能冬眠，自然引出迁徙作为替代方案。'
      - id: R177-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'However, migration is not without risks. Many birds die during their journeys due to storms, exhaustion, or encounters with predators.'
          B: 'Butterflies are the most beautiful insects in the world.'
          C: 'Scientists use satellite tracking to study bird migration patterns.'
        answer: 'A'
        explanation: 'Gap [3] follows the migration paragraph. A adds a balancing point about the risks of migration, before the text moves on to the third strategy (adaptation).'
        explanationZh: '空缺[3]在迁徙段落之后。A添加了关于迁徙风险的平衡观点，然后文章转向第三种策略（适应）。'
      - id: R177-Q4
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [4]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[4]？'
        options:
          A: 'Penguins huddle together in large groups to share body heat during Antarctic blizzards.'
          B: 'Other adapters include the red fox, which grows a thicker coat in winter, and the beaver, which builds an underwater food store near its lodge.'
          C: 'Squirrels are popular characters in many children''s stories and cartoons.'
        answer: 'B'
        explanation: 'Gap [4] follows the squirrel example and comes before the paragraph about appearance changes. B gives more examples of adapters, bridging between the food-storing squirrels and the colour-changing animals.'
        explanationZh: '空缺[4]在松鼠的例子之后，在外表变化段落之前。B给出了更多适应者的例子，在储存食物的松鼠和改变颜色的动物之间架起桥梁。'

  # ============================================================
  # R178 – The Secret Life of Sleep (Level 4, ~450 words)
  # FCE Part 5 style: Multiple choice
  # ============================================================
  - id: R178
    title: 'The Secret Life of Sleep'
    titleZh: '睡眠的秘密生活'
    level: 4
    wordCount: 450
    topic: health and science
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about the science of sleep and its importance for learning'
    passage: |
      Most people spend approximately one-third of their lives asleep, yet until recently, scientists knew surprisingly little about why we sleep or what happens inside our brains during this time. Thanks to modern brain-scanning technology, we are now beginning to understand that sleep is far more active — and far more important — than anyone previously imagined.

      During sleep, your brain goes through several distinct stages in repeating cycles of roughly 90 minutes. The first stages are light sleep, during which your muscles relax and your brain waves slow down. This is followed by deep sleep, when your body repairs itself, building new cells and strengthening the immune system. Finally comes REM (Rapid Eye Movement) sleep, during which your eyes move quickly behind your closed eyelids and your brain becomes almost as active as when you are awake. This is the stage when most dreaming occurs.

      What makes sleep particularly relevant for students is its role in memory and learning. Research has consistently shown that information studied before sleep is remembered significantly better than information studied at other times. During deep sleep, the brain replays the day's learning experiences, transferring information from short-term memory to long-term storage. Without adequate sleep, this process is disrupted, and much of what you learned during the day is lost.

      Even more remarkably, sleep helps the brain make connections between different pieces of information. Many famous scientific discoveries have occurred during or immediately after sleep. The German chemist August Kekulé reportedly dreamed of a snake biting its own tail, which inspired him to discover the ring structure of benzene. While most of us will not make world-changing discoveries in our sleep, our brains are nevertheless working hard to organise and connect the information we have absorbed during the day.

      The implications for exam preparation are clear. Students who sacrifice sleep to cram more information into their heads are actually making their situation worse. Studies show that students who sleep for eight hours after studying retain approximately 30% more information than those who stay up all night revising. Furthermore, lack of sleep impairs concentration, problem-solving ability, and emotional regulation — all essential skills for performing well in exams.

      The message from sleep science is simple: if you want to do well in your exams, one of the most effective things you can do is get a good night's sleep. Your brain will thank you for it.
    passageZh: |
      大多数人一生中大约三分之一的时间在睡觉，然而直到最近，科学家对我们为什么睡觉或在这段时间里大脑内部发生了什么知之甚少。多亏了现代脑部扫描技术，我们现在开始理解，睡眠远比任何人之前想象的更加活跃——也更加重要。

      在睡眠期间，你的大脑经历几个不同的阶段，以大约90分钟为周期重复循环。第一个阶段是浅睡眠，肌肉放松，脑波减慢。接着是深度睡眠，身体自我修复，建立新细胞并增强免疫系统。最后是快速眼动（REM）睡眠，你的眼睛在闭合的眼睑后快速移动，大脑几乎和醒着时一样活跃。这是大部分做梦发生的阶段。

      使睡眠与学生特别相关的是它在记忆和学习中的作用。研究一致表明，睡前学习的信息比其他时间学习的信息记忆效果显著更好。在深度睡眠期间，大脑重放白天的学习经历，将信息从短期记忆转移到长期存储。没有充足的睡眠，这个过程会被打断，白天学到的大部分内容都会丢失。

      更令人惊叹的是，睡眠帮助大脑在不同的信息之间建立联系。许多著名的科学发现是在睡眠期间或之后发生的。据报道，德国化学家凯库勒梦见一条蛇咬住自己的尾巴，这启发他发现了苯的环状结构。虽然我们大多数人不会在睡梦中做出改变世界的发现，但我们的大脑仍在努力组织和连接我们白天吸收的信息。

      对考试准备的启示是明确的。牺牲睡眠来往脑子里塞更多信息的学生实际上是在让情况变得更糟。研究表明，学习后睡八个小时的学生比通宵复习的学生多记住大约30%的信息。此外，缺乏睡眠会损害注意力、解决问题的能力和情绪调节——这些都是考试中表现良好所需的基本技能。

      睡眠科学的信息很简单：如果你想在考试中表现好，你能做的最有效的事情之一就是好好睡一觉。你的大脑会感谢你的。
    vocabHighlights:
      - word: approximately
        ref: V1977
      - word: consistently
        ref: V1962
      - word: adequate
        ref: V1950
    questions:
      - id: R178-Q1
        type: multiple-choice
        question: 'According to the passage, what happens during REM sleep?'
        questionZh: '根据文章，快速眼动睡眠期间会发生什么？'
        options:
          A: 'The body builds new cells and repairs itself.'
          B: 'The brain becomes very active and most dreaming happens.'
          C: 'The muscles relax and brain waves slow down.'
          D: 'Information is transferred to long-term memory.'
        answer: 'B'
        explanation: 'The passage states during REM sleep "your brain becomes almost as active as when you are awake. This is the stage when most dreaming occurs."'
        explanationZh: '文章指出快速眼动睡眠期间"你的大脑几乎和醒着时一样活跃。这是大部分做梦发生的阶段。"'
      - id: R178-Q2
        type: multiple-choice
        question: 'Why is sleep particularly important for students?'
        questionZh: '为什么睡眠对学生特别重要？'
        options:
          A: 'It helps them wake up earlier for morning classes.'
          B: 'It plays a crucial role in memory formation and learning.'
          C: 'It prevents them from feeling bored during lessons.'
          D: 'It helps them eat less food.'
        answer: 'B'
        explanation: '"Information studied before sleep is remembered significantly better" and the brain transfers information from short-term to long-term memory during sleep.'
        explanationZh: '"睡前学习的信息记忆效果显著更好"并且大脑在睡眠期间将信息从短期记忆转移到长期存储。'
      - id: R178-Q3
        type: multiple-choice
        question: 'What does the example of Kekulé illustrate?'
        questionZh: '凯库勒的例子说明了什么？'
        options:
          A: 'Scientists need more sleep than other people.'
          B: 'Dreams always contain useful scientific information.'
          C: 'Sleep helps the brain make connections between ideas.'
          D: 'Chemistry is best studied at night.'
        answer: 'C'
        explanation: 'The Kekulé example supports the claim that "sleep helps the brain make connections between different pieces of information."'
        explanationZh: '凯库勒的例子支持了"睡眠帮助大脑在不同信息之间建立联系"的说法。'
      - id: R178-Q4
        type: multiple-choice
        question: 'According to the passage, students who stay up all night revising will:'
        questionZh: '根据文章，通宵复习的学生会：'
        options:
          A: 'remember about 30% more information.'
          B: 'perform better due to extra study time.'
          C: 'remember less than those who slept properly.'
          D: 'feel more confident in the exam.'
        answer: 'C'
        explanation: '"Students who sleep for eight hours after studying retain approximately 30% more information than those who stay up all night" — so sleep-deprived students remember LESS.'
        explanationZh: '"学习后睡八个小时的学生比通宵的学生多记住大约30%的信息"——所以缺睡的学生记住的更少。'

  # ============================================================
  # R179 – The Rise of E-Sports (Level 4, ~430 words)
  # FCE Part 7 style: Multiple matching
  # ============================================================
  - id: R179
    title: 'Young E-Sports Champions'
    titleZh: '年轻的电竞冠军'
    level: 4
    wordCount: 430
    topic: technology and entertainment
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about four young e-sports competitors'
    passage: |
      We asked four young e-sports players about their experiences in competitive gaming.

      ALEX (age 14, strategy games):
      I started playing competitive strategy games when I was eleven. What surprised me most was how much planning and teamwork is involved. People think gaming is just pressing buttons, but in our team, we spend hours analysing our opponents' strategies before a tournament. My parents were reluctant at first, but when they saw how it improved my problem-solving skills and taught me to work under pressure, they became fully supportive. The biggest challenge is balancing gaming with schoolwork — I have a strict rule that homework always comes first.

      BELLA (age 13, puzzle games):
      I was always good at maths puzzles, so competitive puzzle gaming felt like a natural fit. The turning point for me was winning a regional competition when I was twelve. Suddenly, I went from being "the quiet girl who likes maths" to someone people actually wanted to talk to. What I love most is the community — other puzzle gamers are incredibly supportive and friendly. We share strategies and encourage each other, even when we are competing against each other.

      CARLOS (age 15, racing games):
      The thing that surprised me about competitive racing games was the physical demands. I train my reflexes for two hours every day, and I do actual physical exercise because quick reaction times require a healthy body. Some people assume gamers are lazy, but professional e-sports players are actually some of the most disciplined people I know. The hardest part was dealing with losing. In my first year of competition, I lost far more often than I won, and I had to learn not to let defeat crush my confidence.

      DIANA (age 12, creative building games):
      In creative building competitions, you get a theme and 30 minutes to build something amazing. I love the time pressure — it forces you to think fast and make quick decisions. My proudest moment was when my underwater city design won first place at a national competition. What people do not realise is how much creativity is involved. You need artistic skills, spatial awareness, and the ability to tell a story through your design. My dream is to become an architect, and I think competitive building has given me a head start.
    passageZh: |
      我们询问了四位年轻的电竞选手关于他们竞技游戏经历。

      ALEX（14岁，策略游戏）：
      我十一岁开始玩竞技策略游戏。最让我惊讶的是其中涉及多少规划和团队合作。人们认为游戏只是按按钮，但在我们的团队中，我们在锦标赛前花数小时分析对手的策略。我父母起初不太情愿，但当他们看到这如何提高了我的问题解决能力并教会我在压力下工作时，他们变得完全支持。最大的挑战是平衡游戏和学业——我有一个严格的规则，作业永远排第一。

      BELLA（13岁，益智游戏）：
      我一直擅长数学谜题，所以竞技益智游戏感觉很适合。转折点是我十二岁时赢得了区域比赛。突然间，我从"那个喜欢数学的安静女孩"变成了人们真正想交谈的人。我最喜欢的是社区——其他益智游戏玩家非常支持和友好。即使我们在互相竞争，我们也会分享策略并互相鼓励。

      CARLOS（15岁，赛车游戏）：
      关于竞技赛车游戏最让我惊讶的是体能要求。我每天训练反应能力两个小时，我也做实际的体育锻炼，因为快速反应时间需要健康的身体。有些人以为游戏玩家很懒，但职业电竞选手实际上是我认识的最有纪律的人。最困难的部分是处理失败。在我竞赛的第一年，我输的次数远多于赢的次数，我不得不学会不让失败摧毁我的信心。

      DIANA（12岁，创意建造游戏）：
      在创意建造比赛中，你会得到一个主题和30分钟来建造令人惊叹的东西。我喜欢时间压力——它迫使你快速思考和做出快速决策。我最骄傲的时刻是我的水下城市设计在全国比赛中获得第一名。人们没有意识到的是其中涉及多少创造力。你需要艺术技能、空间意识和通过设计讲故事的能力。我的梦想是成为建筑师，我认为竞技建造给了我一个良好的开端。
