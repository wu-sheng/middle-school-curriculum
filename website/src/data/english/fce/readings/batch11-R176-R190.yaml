  - id: R184
    title: 'Learning From Mistakes'
    titleZh: '从错误中学习'
    level: 4
    wordCount: 420
    topic: education and psychology
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about growth mindset and the value of making mistakes'
    passage: |
      When Thomas Edison was asked about his many failed attempts to create a working light bulb, he famously replied: "I have not failed. I have just found 10,000 ways that will not work." This attitude — seeing mistakes not as failures but as essential steps in the learning process — is at the heart of what psychologists now call a "growth mindset."

      Research by Professor Carol Dweck of Stanford University has demonstrated that students who believe intelligence can be developed through effort tend to achieve significantly more than those who believe intelligence is fixed. When students with a growth mindset make a mistake, they see it as useful information that tells them what to work on next. Students with a fixed mindset, however, interpret mistakes as proof that they are not clever enough.

      The implications for exam preparation are profound. Students who fear making mistakes often avoid challenging practice questions, stick to material they already know, and give up quickly when something is difficult. Ironically, this cautious approach prevents them from developing the very skills they need.

      In contrast, students who embrace mistakes actively seek out difficult questions, learn from their errors, and treat each wrong answer as an opportunity to understand something more deeply. Brain imaging studies have shown that when a person makes a mistake and then corrects it, the neural pathways involved become stronger than if they had got the answer right the first time.

      So how can you develop a growth mindset for your exam preparation? First, keep an "error log" — a notebook where you record every mistake you make in practice tests, along with the correct answer and a brief explanation of why you went wrong. Reviewing this log regularly is one of the most effective study techniques available.

      Second, change how you talk to yourself about mistakes. Instead of thinking "I got that wrong — I am terrible at grammar," try "I got that wrong — now I know I need to practise reported speech more." The first response leads to discouragement; the second leads to improvement.

      Finally, remember that every expert was once a beginner who made countless mistakes. The difference between those who succeed and those who do not is not the number of mistakes they make — it is what they do with those mistakes afterwards.
    passageZh: |
      当托马斯·爱迪生被问到他多次失败的制造灯泡尝试时，他著名地回答说："我没有失败。我只是找到了10,000种行不通的方法。"这种态度——将错误视为学习过程中的必要步骤而非失败——正是心理学家现在所称的"成长心态"的核心。

      斯坦福大学Carol Dweck教授的研究证明，相信智力可以通过努力发展的学生往往比相信智力是固定的学生取得更多成就。当具有成长心态的学生犯错时，他们将其视为有用的信息，告诉他们接下来该在哪里努力。然而，具有固定心态的学生将错误解读为他们不够聪明的证明。

      对考试准备的启示是深远的。害怕犯错的学生常常避开有挑战性的练习题，只做他们已经知道的内容，遇到困难就很快放弃。讽刺的是，这种谨慎的方法恰恰阻碍了他们发展所需的技能。

      相比之下，拥抱错误的学生主动寻找困难的题目，从错误中学习，把每个错误答案当作更深入理解某事的机会。脑成像研究表明，当一个人犯错然后纠正时，相关的神经通路比第一次就答对要更强。

      那么你如何为考试准备培养成长心态呢？首先，保留一个"错误日志"——一本笔记本，记录你在练习测试中犯的每个错误，以及正确答案和你为什么出错的简短解释。定期复习这个日志是最有效的学习技巧之一。

      其次，改变你对错误的自我对话。不要想"我答错了——我语法太差了"，试试"我答错了——现在我知道我需要更多练习间接引语。"第一种反应导致气馁；第二种导致进步。

      最后，记住每个专家都曾经是犯过无数错误的初学者。成功者和不成功者之间的区别不是他们犯错的次数——而是他们之后如何处理这些错误。
