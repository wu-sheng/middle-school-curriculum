    passage: |
      The world's oceans are in trouble. Every year, approximately eight million tonnes of plastic waste end up in our seas, threatening marine life and contaminating the food chain. Scientists estimate that by 2050, there could be more plastic in the ocean than fish by weight. But a growing movement of young activists is determined to change this.

      Fourteen-year-old Mia Chen from Singapore started a beach clean-up project when she was just ten. "I went to the beach with my family and was shocked by the amount of rubbish," she explains. "There were plastic bottles, food wrappers, and even an old television. I decided that I had to do something." What began as a weekend activity with a few friends has grown into an organisation with over 500 regular volunteers that has removed more than 20 tonnes of waste from Singapore's coastline.

      However, Mia is quick to point out that beach clean-ups alone are not sufficient. "Cleaning up is important," she says, "but it is like mopping the floor while the tap is still running. We also need to turn off the tap — which means reducing the amount of plastic we produce and use in the first place."

      This is where education plays a crucial role. Mia's organisation runs workshops in schools, teaching children about the impact of single-use plastics and showing them practical alternatives. "When young people understand the consequences of their choices, they make better decisions," she observes. "My classmates now bring reusable water bottles and lunch containers instead of buying plastic-wrapped food."

      The approach is gaining momentum worldwide. In the United Kingdom, school students have successfully campaigned for their cafeterias to replace plastic straws with paper ones. In Kenya, a group of teenagers invented a machine that turns plastic waste into building materials. And in Japan, a twelve-year-old designed a biodegradable packaging material made from seaweed.

      Nevertheless, some critics argue that young activists are being unrealistic. They maintain that completely eliminating plastic is neither achievable nor desirable, since plastic plays an essential role in medicine, food safety, and many other areas. The challenge, they suggest, is not to ban plastic entirely but to manage it more responsibly.

      Mia acknowledges this point. "I am not against all plastic," she clarifies. "I am against unnecessary plastic — the kind we use once for five minutes and then throw away, even though it takes 450 years to decompose. If we can eliminate that, we will have made an enormous difference."

      Whether or not these young campaigners succeed in transforming the world, they are already demonstrating something remarkable: that age is no obstacle to making a positive impact.
    passageZh: |
      世界的海洋正面临困境。每年，大约800万吨塑料废物最终进入我们的海洋，威胁海洋生物并污染食物链。科学家估计到2050年，按重量计算海洋中的塑料可能比鱼还多。但越来越多的年轻活动家下定决心要改变这一状况。

      来自新加坡的14岁Mia Chen在她十岁时就开始了海滩清洁项目。"我和家人去海滩，被垃圾的数量震惊了，"她解释说。"有塑料瓶、食品包装纸，甚至还有一台旧电视。我决定我必须做点什么。"最初只是和几个朋友的周末活动，已经发展成为一个拥有500多名定期志愿者的组织，已经从新加坡海岸线上清除了超过20吨的废物。

      然而，Mia很快指出，仅仅清理海滩是不够的。"清洁很重要，"她说，"但这就像水龙头还开着时擦地板。我们还需要关掉水龙头——这意味着首先减少我们生产和使用的塑料量。"

      这就是教育发挥关键作用的地方。Mia的组织在学校举办工作坊，教孩子们一次性塑料的影响，并向他们展示实际的替代品。"当年轻人理解他们选择的后果时，他们会做出更好的决定，"她观察到。"我的同学们现在带可重复使用的水瓶和午餐盒，而不是买塑料包装的食品。"

      这种方法在全世界获得动力。在英国，学生成功地为学校食堂用纸吸管替换塑料吸管进行了运动。在肯尼亚，一群青少年发明了一种将塑料废物变成建筑材料的机器。在日本，一个十二岁的孩子设计了一种由海藻制成的可生物降解包装材料。

      然而，一些批评者认为年轻活动家不切实际。他们认为完全消除塑料既不可实现也不可取，因为塑料在医学、食品安全和许多其他领域发挥着重要作用。他们建议，挑战不是完全禁止塑料，而是更负责任地管理它。

      Mia承认这一点。"我不反对所有塑料，"她澄清说。"我反对不必要的塑料——那种我们使用一次只用五分钟然后扔掉的，尽管它需要450年才能分解。如果我们能消除那些，我们就已经产生了巨大的改变。"

      无论这些年轻活动家是否成功改变了世界，他们已经展示了一些了不起的东西：年龄不是产生积极影响的障碍。
