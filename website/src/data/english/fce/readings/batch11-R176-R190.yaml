  - id: R183
    title: 'The History of Writing'
    titleZh: '书写的历史'
    level: 5
    wordCount: 470
    topic: history and language
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about the evolution of writing systems'
    passage: |
      The ability to write is so fundamental to modern life that it is easy to forget it was invented. For most of human history — roughly 95% of it — people communicated exclusively through speech. Writing is a relatively recent development, and its invention approximately 5,000 years ago transformed human civilisation in ways that are still shaping our world today.

      [1]

      The earliest known writing system, called cuneiform, was developed by the Sumerians in ancient Mesopotamia around 3,400 BCE. It consisted of wedge-shaped marks pressed into soft clay tablets using a reed stylus. Initially, cuneiform was used primarily for keeping records — counting grain, recording debts, and listing the contents of warehouses. It was essentially an accounting tool, not a form of creative expression.

      [2]

      Over the following centuries, writing systems evolved to become more versatile. The Egyptians developed hieroglyphics, an elegant system that combined pictures with sounds. The Chinese created characters that represented whole words or concepts. And around 1,050 BCE, the Phoenicians invented something revolutionary: an alphabet — a system of just 22 symbols that could represent any spoken sound.

      [3]

      The Phoenician alphabet was so efficient that it spread rapidly around the Mediterranean. The Greeks adapted it, adding vowels for the first time. The Romans then modified the Greek alphabet into Latin letters — the same letters you are reading right now. Every time you write an English sentence, you are using a technology that traces its roots back over 3,000 years to traders on the coast of modern-day Lebanon.

      [4]

      Today, writing faces perhaps its biggest transformation since the invention of the printing press in the 15th century. Digital technology has changed not only HOW we write but WHAT we write. Text messages, social media posts, and emails have created entirely new forms of written communication — shorter, faster, and more informal than anything that came before. Whether this represents progress or decline remains one of the great debates of our time.
    passageZh: |
      书写能力对现代生活如此基本，以至于很容易忘记它是被发明出来的。在人类历史的大部分时间——大约95%——人们只通过语言交流。书写是一项相对较新的发展，它大约5000年前的发明以至今仍在塑造我们世界的方式改变了人类文明。

      [1]

      最早已知的书写系统叫楔形文字，由苏美尔人在大约公元前3400年的古美索不达米亚发展出来。它由用芦苇笔压入软黏土板的楔形标记组成。最初，楔形文字主要用于记录——计算谷物、记录债务和列出仓库的内容。它本质上是一种会计工具，而不是一种创造性表达形式。

      [2]

      在接下来的几个世纪中，书写系统演变得更加多功能。埃及人发展了象形文字，一种将图片与声音结合的优雅系统。中国人创造了代表整个词或概念的字符。大约在公元前1050年，腓尼基人发明了革命性的东西：字母表——一个只有22个符号的系统，可以代表任何口语声音。

      [3]

      腓尼基字母表非常高效，迅速传播到地中海周围。希腊人对其进行了改编，首次添加了元音。罗马人随后将希腊字母修改为拉丁字母——你现在正在阅读的相同字母。每次你写一个英语句子，你都在使用一项可以追溯到3000多年前在今天黎巴嫩海岸的商人的技术。

      [4]

      今天，书写面临着可能是自15世纪印刷术发明以来最大的转变。数字技术不仅改变了我们如何书写，还改变了我们书写什么。短信、社交媒体帖子和电子邮件创造了全新的书面交流形式——比以前的任何形式都更短、更快、更非正式。这代表着进步还是衰退仍然是我们时代的一大辩论。
