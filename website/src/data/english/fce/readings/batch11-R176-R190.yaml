  - id: R186
    title: 'Artificial Intelligence and Homework'
    titleZh: '人工智能与作业'
    level: 5
    wordCount: 480
    topic: technology and education
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about AI in education — discussion essay style'
    passage: |
      Artificial intelligence tools like ChatGPT have sparked an intense debate in schools around the world. Some educators see AI as a revolutionary learning tool that can help students understand difficult concepts. Others view it as a threat to genuine learning, arguing that if students can get AI to write their essays, they will never develop real writing skills.

      Those who support AI in education point out that it can act as a personal tutor available 24 hours a day. A student struggling with reported speech at midnight can ask an AI to explain the rules, provide examples, and create practice exercises. Unlike a human teacher, AI never gets tired, impatient, or frustrated. Furthermore, AI can adapt its explanations to match each student's level, providing simpler explanations for beginners and more detailed ones for advanced learners.

      However, opponents raise several valid concerns. The most fundamental is that learning requires effort, and AI removes that effort. When a student writes an essay themselves, they must organise their ideas, choose vocabulary carefully, and construct sentences that communicate their meaning clearly. This process — however slow and painful — is what actually builds writing skills. If an AI does this work instead, the student's brain never develops these crucial abilities.

      There is also the issue of accuracy. AI tools occasionally produce information that sounds convincing but is completely wrong — a phenomenon known as "hallucination." Students who rely on AI without checking its output may end up learning incorrect information, which could be particularly damaging in an exam situation.

      A middle ground is emerging in many schools. Rather than banning AI entirely or allowing unrestricted use, teachers are developing strategies to integrate AI thoughtfully. For example, students might use AI to generate a first draft and then critically evaluate and improve it, or they might compare their own essay with an AI-generated one to identify areas for improvement.

      Perhaps the most balanced approach was suggested by a fourteen-year-old student in an interview: "I use AI like I use a dictionary — it helps me when I am stuck, but I do not copy from it. If I asked AI to write my essay for me, I would pass the homework but fail the exam, because in the exam room there is no AI — there is only me and my brain."

      This insight captures the essential truth about learning: there are no shortcuts. Whether you are preparing for an FCE exam or learning any other skill, the effort you invest in the process IS the learning. Tools can help, but they cannot replace the hard work that creates genuine understanding.
    passageZh: |
      像ChatGPT这样的人工智能工具在世界各地的学校引发了激烈的辩论。一些教育工作者认为AI是一种革命性的学习工具，可以帮助学生理解困难的概念。其他人则认为它是对真正学习的威胁，认为如果学生可以让AI写他们的作文，他们将永远无法发展真正的写作技能。

      支持AI在教育中应用的人指出，它可以充当全天候的私人导师。一个在午夜对间接引语感到困惑的学生可以请AI解释规则、提供例子并创建练习。不像人类教师，AI永远不会感到疲倦、不耐烦或沮丧。此外，AI可以调整其解释以匹配每个学生的水平，为初学者提供更简单的解释，为高级学习者提供更详细的解释。

      然而，反对者提出了几个有效的担忧。最根本的是，学习需要努力，而AI消除了这种努力。当学生自己写一篇文章时，他们必须组织想法、仔细选择词汇、构建清楚传达意思的句子。这个过程——无论多么缓慢和痛苦——才是真正建立写作技能的过程。如果AI代替完成这项工作，学生的大脑永远不会发展这些关键能力。

      还有准确性的问题。AI工具偶尔会产生听起来令人信服但完全错误的信息——这种现象被称为"幻觉"。依赖AI而不检查其输出的学生可能最终学到错误的信息，这在考试情况下可能特别有害。

      许多学校正在出现一种折中方案。教师不是完全禁止AI或允许不受限制地使用，而是在制定策略来深思熟虑地整合AI。例如，学生可以使用AI生成初稿，然后批判性地评估和改进它，或者他们可以将自己的文章与AI生成的文章进行比较，以确定需要改进的领域。

      也许最平衡的方法是一位十四岁的学生在采访中提出的："我使用AI就像使用字典一样——当我卡住时它帮助我，但我不从它那里抄。如果我让AI为我写作文，我会通过作业但考试会不及格，因为考场里没有AI——只有我和我的大脑。"

      这个见解捕捉了关于学习的基本真理：没有捷径。无论你是在准备FCE考试还是学习任何其他技能，你在过程中投入的努力就是学习。工具可以帮助，但它们不能取代创造真正理解的辛勤工作。
