  - id: R190
    title: 'Your Brain on Exam Day'
    titleZh: '考试当天你的大脑'
    level: 5
    wordCount: 470
    topic: psychology and exams
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about the neuroscience of exam performance — final reading of the course'
    passage: |
      You have studied for months. You have memorised vocabulary, practised grammar, read dozens of passages, and written essay after essay. But on exam morning, something strange happens — your heart races, your palms sweat, and suddenly you cannot remember a single word of English. What is going on inside your brain?

      The answer involves a tiny almond-shaped structure deep inside your brain called the amygdala. The amygdala is your brain's alarm system. When it detects a potential threat — and yes, it treats an important exam as a threat — it triggers the "fight or flight" response. Your body floods with stress hormones like cortisol and adrenaline, preparing you to either fight the danger or run away from it.

      In moderate amounts, these stress hormones are actually helpful. They sharpen your focus, increase your energy, and help you think more quickly. This is why a little nervousness before an exam can actually improve your performance. Athletes call this state "being in the zone" — a level of alertness that enhances performance.

      However, when stress becomes too intense, the opposite happens. High levels of cortisol interfere with the prefrontal cortex — the part of your brain responsible for logical thinking, planning, and retrieving memories. This is why severe anxiety can make your mind "go blank" even though you studied thoroughly. The information is still there in your brain; you simply cannot access it because the stress response is blocking the retrieval pathway.

      The good news is that understanding this process gives you power over it. Here are three evidence-based strategies that neuroscientists recommend:

      First, reframe your anxiety. Instead of telling yourself "I am so nervous, I am going to fail," say "My body is getting ready to perform at its best." Research shows that people who interpret their racing heart as excitement rather than fear perform significantly better on tests.

      Second, use deep breathing. The 4-4-4 technique — breathe in for 4 seconds, hold for 4 seconds, breathe out for 4 seconds — activates the parasympathetic nervous system, which counteracts the stress response. Just three rounds of this breathing can reduce cortisol levels noticeably.

      Third, start with an easy question. Answering one question correctly creates a small dopamine reward in your brain, which boosts confidence and begins to calm the amygdala. This positive momentum makes subsequent questions feel easier.

      Remember: exam anxiety is not a sign of weakness. It is your brain trying to help you in the only way it knows how. With the strategies above, you can channel that energy into peak performance rather than panic. You have the knowledge. You have the skills. Now go and show the world what twelve months of dedicated learning have achieved.
    passageZh: |
      你已经学习了好几个月。你背了词汇、练习了语法、阅读了几十篇文章、写了一篇又一篇作文。但在考试的早晨，奇怪的事情发生了——你心跳加速、手心出汗，突然你想不起一个英语单词。你的大脑里发生了什么？

      答案涉及你大脑深处一个杏仁状的微小结构，叫做杏仁核。杏仁核是你大脑的警报系统。当它检测到潜在威胁时——是的，它将重要的考试视为威胁——它触发"战斗或逃跑"反应。你的身体充满了皮质醇和肾上腺素等压力激素，准备让你要么与危险战斗，要么逃跑。

      适量的这些压力激素实际上是有帮助的。它们使你的注意力更加集中、增加你的精力、帮助你更快地思考。这就是为什么考试前一点紧张实际上可以提高你的表现。运动员称这种状态为"在状态中"——一种增强表现的警觉水平。

      然而，当压力变得过于强烈时，相反的事情发生了。高水平的皮质醇会干扰前额皮层——大脑中负责逻辑思维、计划和检索记忆的部分。这就是为什么严重的焦虑会让你的大脑"一片空白"，即使你学习得很充分。信息仍然在你的大脑中；你只是无法访问它，因为压力反应阻塞了检索通路。

      好消息是，理解这个过程可以让你控制它。以下是神经科学家推荐的三个基于证据的策略：

      第一，重新定义你的焦虑。不要告诉自己"我太紧张了，我会失败的"，而说"我的身体正在准备以最佳状态表现。"研究表明，将心跳加速解读为兴奋而非恐惧的人在考试中表现显著更好。

      第二，使用深呼吸。4-4-4技巧——吸气4秒、屏住4秒、呼气4秒——激活副交感神经系统，抵消压力反应。仅三轮这样的呼吸就能明显降低皮质醇水平。

      第三，从一道简单的题目开始。正确回答一道题会在你的大脑中产生少量的多巴胺奖励，这会增强信心并开始平静杏仁核。这种积极的势头使后续的题目感觉更容易。

      记住：考试焦虑不是软弱的表现。这是你的大脑试图以它唯一知道的方式帮助你。有了以上策略，你可以将那种能量引导到巅峰表现而不是恐慌。你有知识。你有技能。现在去向世界展示十二个月专注学习所取得的成就吧。
