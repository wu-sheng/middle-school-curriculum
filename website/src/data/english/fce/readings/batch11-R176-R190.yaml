  - id: R188
    title: 'The Language of Music'
    titleZh: '音乐的语言'
    level: 5
    wordCount: 450
    topic: music and culture
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about how music acts as a universal language'
    passage: |
      People often call music a "universal language," but is this description accurate? Can a piece of music composed in Japan truly communicate the same emotions to a listener in Brazil or Nigeria? Recent research suggests that the answer is more nuanced than we might expect.

      A groundbreaking study published in the journal Science tested whether people from different cultures could recognise the emotional content of unfamiliar music. Researchers played recordings of Western classical music, traditional Indian ragas, and Amazonian tribal songs to listeners who had never encountered these styles before. The results were striking: participants across all cultures could correctly identify whether a piece of music was intended to express happiness, sadness, or fear at rates significantly above chance.

      This suggests that certain musical features are associated with specific emotions regardless of cultural background. Fast tempo and major keys tend to sound happy everywhere, while slow tempo and minor keys sound sad. Sudden loud sounds trigger fear responses in listeners from every culture tested. These associations may be rooted in biology rather than culture — babies as young as five months show similar emotional responses to different types of music.

      However, the relationship between music and emotion becomes much more complex beyond these basic categories. Whether a particular piece of music sounds nostalgic, triumphant, mysterious, or romantic depends heavily on the listener's cultural experience and personal memories. A melody that brings tears of joy to one person may leave another completely indifferent.

      Furthermore, music communicates far more than just emotions. In many cultures, music carries specific social meanings. A particular rhythm might signal a wedding celebration, a funeral procession, or a call to prayer. These culturally specific meanings are completely invisible to outsiders, no matter how musical they are.

      Perhaps the most honest description is that music is a partially universal language. It can communicate basic emotions across cultures with remarkable reliability, but its deeper, more complex meanings require shared cultural knowledge to be fully understood. In this way, music is rather like human facial expressions — everyone recognises a smile, but the subtle differences between a polite smile, a nervous smile, and a genuine smile can only be read by someone who shares the cultural context.

      What makes music so powerful, then, is not that it transcends all cultural barriers — it does not — but that it can create a starting point for communication between people who share nothing else in common.
    passageZh: |
      人们常把音乐称为"通用语言"，但这个描述准确吗？一首在日本创作的音乐能否真正向巴西或尼日利亚的听者传达相同的情感？最近的研究表明，答案比我们预期的更加复杂。

      发表在《科学》杂志上的一项开创性研究测试了不同文化的人是否能识别不熟悉音乐的情感内容。研究人员向从未接触过这些风格的听者播放了西方古典音乐、传统印度拉格和亚马逊部落歌曲的录音。结果令人震惊：所有文化的参与者都能以显著高于随机概率的比率正确识别一首音乐是否旨在表达快乐、悲伤或恐惧。

      这表明某些音乐特征与特定情感相关联，无论文化背景如何。快节奏和大调在任何地方听起来都很欢快，而慢节奏和小调听起来悲伤。突然的大声音在所有测试文化的听者中都会触发恐惧反应。这些关联可能根植于生物学而非文化——五个月大的婴儿对不同类型的音乐表现出类似的情感反应。

      然而，超越这些基本类别，音乐和情感之间的关系变得更加复杂。一首特定的音乐是否听起来怀旧、胜利、神秘或浪漫，很大程度上取决于听者的文化经验和个人记忆。让一个人喜极而泣的旋律可能让另一个人完全无动于衷。

      此外，音乐传达的远不止情感。在许多文化中，音乐承载着特定的社会意义。特定的节奏可能暗示婚礼庆典、葬礼队伍或祈祷的呼唤。这些文化特定的意义对外人来说是完全不可见的，无论他们多有音乐素养。

      也许最诚实的描述是，音乐是一种部分通用的语言。它可以以令人惊叹的可靠性跨文化传达基本情感，但其更深层、更复杂的意义需要共同的文化知识才能被完全理解。在这方面，音乐很像人类的面部表情——每个人都能认出微笑，但礼貌微笑、紧张微笑和真诚微笑之间的微妙区别只有分享文化背景的人才能读懂。

      那么，使音乐如此强大的不是它超越了所有文化障碍——它并没有——而是它可以为没有其他共同点的人之间的交流创造一个起点。
