  - id: R185
    title: 'Four Students, Four Study Styles'
    titleZh: '四个学生，四种学习风格'
    level: 5
    wordCount: 450
    topic: education
    tags: [Q12, month-12]
    source:
      type: 'original'
      note: 'Original passage about different study techniques — multiple matching format'
    passage: |
      We asked four students who recently passed their FCE exam to share their most effective study strategies.

      EMMA: "I am a visual learner, so I turned everything into colour-coded mind maps. Each grammar topic had its own colour — blue for tenses, green for conditionals, purple for reported speech. I stuck these mind maps on my bedroom wall and reviewed them every morning while brushing my teeth. The best part was that during the exam, I could literally picture where each rule was on my wall and remember it instantly."

      JAMES: "For me, the key was daily routine. I studied English for exactly 45 minutes every single day — no exceptions. Even on weekends and holidays. Some days I did not feel like studying, but I sat down and did it anyway. Over twelve months, those 45-minute sessions added up to over 270 hours of practice. Consistency was more important than intensity."

      SARAH: "I found that teaching others was the best way to learn. Every week, I explained a grammar rule or vocabulary topic to my younger brother, who is learning English at a lower level. If I could not explain something simply, it meant I did not really understand it. This forced me to think deeply about every topic and identify the gaps in my own knowledge."

      OLIVER: "Practice tests were everything for me. I did one full practice test every weekend for the last three months before the exam. The first few were terrible — I ran out of time, made silly mistakes, and felt frustrated. But by the tenth practice test, I knew exactly how to manage my time, which question types to tackle first, and what my personal weak points were. The real exam felt easy because I had already done it so many times."
    passageZh: |
      我们请四位最近通过FCE考试的学生分享他们最有效的学习策略。

      EMMA："我是视觉学习者，所以我把所有东西都变成了颜色编码的思维导图。每个语法主题有自己的颜色——蓝色代表时态，绿色代表条件句，紫色代表间接引语。我把这些思维导图贴在卧室墙上，每天早上刷牙时复习。最棒的是，考试时我真的能想象每条规则在墙上的位置，立即回忆起来。"

      JAMES："对我来说，关键是每日惯例。我每天恰好学习英语45分钟——没有例外。即使在周末和假期。有些天我不想学习，但我还是坐下来做了。十二个月内，那些45分钟的学习加起来超过270小时的练习。一致性比强度更重要。"

      SARAH："我发现教别人是最好的学习方式。每周，我向正在学较低水平英语的弟弟解释一个语法规则或词汇主题。如果我不能简单地解释某事，就意味着我并不真正理解它。这迫使我深入思考每个主题并找出自己知识的空白。"

      OLIVER："练习测试对我来说就是一切。考试前最后三个月，我每个周末做一套完整的模拟试题。前几次很糟糕——我时间不够、犯低级错误、感到沮丧。但到第十次模拟测试时，我确切知道如何管理时间、先做哪种题型、以及我个人的弱点是什么。真正的考试感觉很容易，因为我已经做了那么多次了。"
