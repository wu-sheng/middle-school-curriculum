  # ============================================================
  # R116 – The City That Never Stops Growing (Level 3, ~340 words)
  # ============================================================
  - id: R116
    title: 'The City That Never Stops Growing'
    titleZh: '永不停歇的城市'
    level: 3
    wordCount: 340
    topic: city planning
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'National Geographic: Megacities'
      author: 'National Geographic'
      note: 'Original passage inspired by research on global urbanization trends'
    passage: |
      In 1950, only two cities in the world had more than ten million people: New York and Tokyo. Today, there are over thirty such megacities, and the number is still growing. By 2050, experts predict that nearly 70% of the world's population will live in urban areas.

      [1]

      One of the biggest challenges facing megacities is providing enough housing for everyone. In many rapidly growing cities, people arrive faster than new homes can be built. As a result, informal settlements — sometimes called slums — appear on the edges of cities, where families build shelters from whatever materials they can find.

      [2]

      However, some cities have found creative solutions to the housing problem. Singapore, for example, built thousands of high-rise apartment blocks that house over 80% of its population. These buildings include shops, schools, and parks on different levels, creating complete neighbourhoods in the sky.

      [3]

      Transportation is another major challenge. When millions of people need to travel to work every day, roads become impossibly crowded. Cities like Bogota in Colombia have solved this by building dedicated bus lanes that carry passengers quickly across the city, while Copenhagen in Denmark has built so many cycling paths that more people now cycle to work than drive.

      Clean water, waste management, and air quality are also fundamental concerns. A city that cannot provide clean drinking water or remove waste safely will eventually face serious health problems. Tokyo, often ranked as the world's best-managed megacity, processes its waste so efficiently that it recycles over 40% of all rubbish.

      The future of our planet depends on how well we design and manage our cities. As more people move to urban areas, the decisions we make today about infrastructure, housing, and transport will shape the world for generations to come.
    passageZh: |
      1950年，世界上只有两座城市拥有超过一千万人口：纽约和东京。如今，这样的超大城市已经超过三十座，数字仍在增长。到2050年，专家预测世界上近70%的人口将生活在城市地区。

      [1]

      超大城市面临的最大挑战之一是为每个人提供足够的住房。在许多快速增长的城市中，人口涌入的速度超过了新房建设的速度。因此，非正式定居点——有时称为贫民窟——出现在城市边缘，家庭用他们能找到的任何材料搭建避难所。

      [2]

      然而，一些城市找到了解决住房问题的创造性方案。例如，新加坡建造了数千栋高层公寓楼，容纳了超过80%的人口。这些建筑在不同楼层设有商店、学校和公园，在空中创造了完整的社区。

      [3]

      交通是另一个主要挑战。当数百万人每天需要上班时，道路变得拥挤不堪。哥伦比亚的波哥大通过建设专用公交车道来快速运送乘客穿越城市，而丹麦的哥本哈根建造了如此多的自行车道，以至于现在骑自行车上班的人比开车的还多。

      清洁饮水、废物管理和空气质量也是基本关注点。一个无法提供清洁饮用水或安全清除废物的城市最终将面临严重的健康问题。东京常被评为世界上管理最好的超大城市，其废物处理效率如此之高，回收了超过40%的垃圾。

      我们星球的未来取决于我们如何设计和管理城市。随着越来越多的人搬到城市地区，我们今天关于基础设施、住房和交通的决策将影响未来几代人的世界。
    vocabHighlights:
      - word: infrastructure
        ref: V1142
      - word: urban
        ref: V1141
      - word: fundamental
        ref: V1105
    questions:
      - id: R116-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'This rapid urbanization creates both opportunities and problems that city planners must address.'
          B: 'Many people prefer living in the countryside because it is quieter and less polluted.'
          C: 'The first skyscrapers were built in Chicago in the late 1800s.'
        answer: 'A'
        explanation: 'Gap [1] follows statistics about growing megacities. "This rapid urbanization" refers to the population growth described, and it transitions to the challenges discussed next.'
        explanationZh: '空缺[1]在关于超大城市增长的统计数据之后。"This rapid urbanization"指代所描述的人口增长，过渡到接下来讨论的挑战。'
      - id: R116-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'These communities often lack basic services like clean water, electricity, and schools.'
          B: 'New York City was founded by Dutch settlers in the 17th century.'
          C: 'Solar panels are becoming cheaper and more efficient every year.'
        answer: 'A'
        explanation: '"These communities" refers to the informal settlements described in the previous paragraph. It adds detail about the problems they face, before the contrast with Singapore.'
        explanationZh: '"These communities"指代前一段描述的非正式定居点。它补充了关于这些社区面临问题的细节，在与新加坡形成对比之前。'
      - id: R116-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'Singapore is a small island nation in Southeast Asia with a tropical climate.'
          B: 'Such innovative approaches show that with good planning, even the densest cities can offer comfortable living.'
          C: 'Electric cars are expected to replace petrol vehicles within the next two decades.'
        answer: 'B'
        explanation: '"Such innovative approaches" refers to Singapore''s high-rise solution. This bridges to the next topic (transportation) by concluding the housing discussion.'
        explanationZh: '"Such innovative approaches"指代新加坡的高层解决方案。通过总结住房讨论，过渡到下一个话题（交通）。'
      - id: R116-Q4
        type: vocabulary-in-context
        question: 'What does "dedicated" mean in "dedicated bus lanes"?'
        questionZh: '在"dedicated bus lanes"中，"dedicated"是什么意思？'
        options:
          A: 'Very enthusiastic and hardworking'
          B: 'Reserved for one particular purpose only'
          C: 'Extremely expensive to build'
          D: 'Recently opened to the public'
        answer: 'B'
        explanation: '"Dedicated bus lanes" are lanes reserved only for buses — no other vehicles can use them. This helps buses move faster.'
        explanationZh: '"Dedicated bus lanes"是仅供公交车使用的车道——其他车辆不能使用。这有助于公交车更快地行驶。'

  # ============================================================
  # R117 – The Rise and Fall of Pompeii (Level 3, ~350 words)
  # ============================================================
  - id: R117
    title: 'The Rise and Fall of Pompeii'
    titleZh: '庞贝城的兴衰'
    level: 3
    wordCount: 350
    topic: ancient civilizations
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'BBC History: Pompeii'
      author: 'BBC'
      note: 'Original passage based on historical accounts of Pompeii'
    passage: |
      In 79 AD, the Roman city of Pompeii was one of the most prosperous towns in the empire. Located near the Bay of Naples in southern Italy, it had a population of about 11,000 people, with elegant houses, busy markets, a large amphitheatre, and even a complex water system.

      Life in Pompeii was comfortable and exciting. Citizens could watch gladiator fights at the amphitheatre, relax at the public baths, or shop for goods from across the Roman Empire. The streets were paved with stone, and stepping stones helped pedestrians cross without getting their feet muddy.

      However, Pompeii was built in the shadow of Mount Vesuvius, a volcano that had been quiet for centuries. On the morning of 24 August 79 AD, Vesuvius suddenly erupted. A massive cloud of ash, rock, and gas shot twenty kilometres into the sky. Within hours, day turned to night as ash blocked out the sun.

      Most residents fled immediately, but some stayed behind to protect their homes or collect their valuables. By the next morning, the city was buried under six metres of volcanic ash. Everything — buildings, streets, gardens, and sadly, many people — was frozen in time.

      Pompeii remained hidden for nearly 1,700 years until workers digging a canal accidentally discovered the ruins in 1748. Since then, archaeologists have carefully excavated the city, revealing an extraordinary snapshot of ancient Roman life. They found preserved loaves of bread, wall paintings still showing their original colours, and even graffiti scratched into walls by ordinary citizens.

      Today, Pompeii is one of the most visited archaeological sites in the world. Walking through its ancient streets, you can see bakeries, temples, homes, and the forum where people gathered to discuss politics. The ruins serve as both a fascinating window into the past and a powerful reminder of nature's unstoppable force.
    passageZh: |
      公元79年，罗马城市庞贝是帝国中最繁荣的城镇之一。它位于意大利南部那不勒斯湾附近，人口约11,000人，拥有优雅的房屋、繁忙的市场、大型露天剧场，甚至还有复杂的供水系统。

      庞贝的生活舒适而令人兴奋。市民可以在露天剧场观看角斗士比赛，在公共浴室放松，或购买来自罗马帝国各地的商品。街道铺着石头，踏脚石帮助行人过马路时不会弄脏脚。

      然而，庞贝建在维苏威火山的阴影下，这座火山已经沉寂了几个世纪。公元79年8月24日早晨，维苏威火山突然喷发。巨大的灰烬、岩石和气体云柱射向二十公里的高空。几个小时内，白天变成了黑夜，因为灰烬遮住了太阳。

      大多数居民立即逃离，但有些人留下来保护家园或收集贵重物品。到第二天早上，这座城市被埋在六米深的火山灰下。一切——建筑、街道、花园，以及遗憾的是许多人——都被冻结在时间中。

      庞贝被隐藏了近1,700年，直到1748年挖掘运河的工人偶然发现了废墟。从那以后，考古学家仔细地发掘了这座城市，揭示了古罗马生活的非凡快照。他们发现了保存完好的面包、仍然显示着原始颜色的壁画，甚至还有普通市民刻在墙上的涂鸦。

      今天，庞贝是世界上访问量最大的考古遗址之一。走在它古老的街道上，你可以看到面包店、寺庙、住宅和人们聚集讨论政治的广场。废墟既是一扇迷人的回望过去的窗口，也是对大自然不可阻挡力量的有力提醒。
    vocabHighlights:
      - word: civilization
        ref: V1131
      - word: excavate
        ref: V1239
      - word: preserve
        ref: V1154
    questions:
      - id: R117-Q1
        type: multiple-choice
        question: 'Why was Pompeii considered a prosperous city?'
        questionZh: '为什么庞贝被认为是一座繁荣的城市？'
        options:
          A: 'It was the capital of the Roman Empire.'
          B: 'It had elegant houses, markets, an amphitheatre, and a water system.'
          C: 'It was the largest city in the world at that time.'
          D: 'It had more than one million inhabitants.'
        answer: 'B'
        explanation: 'The passage lists elegant houses, busy markets, a large amphitheatre, and a complex water system as evidence of prosperity.'
        explanationZh: '文章列举了优雅的房屋、繁忙的市场、大型露天剧场和复杂的供水系统作为繁荣的证据。'
      - id: R117-Q2
        type: multiple-choice
        question: 'What happened to Pompeii on 24 August 79 AD?'
        questionZh: '公元79年8月24日庞贝发生了什么？'
        options:
          A: 'An earthquake destroyed most of the buildings.'
          B: 'Enemy soldiers invaded and burned the city.'
          C: 'Mount Vesuvius erupted and buried the city in ash.'
          D: 'A flood from the sea swept through the streets.'
        answer: 'C'
        explanation: 'Mount Vesuvius erupted and the city was buried under six metres of volcanic ash.'
        explanationZh: '维苏威火山喷发，城市被埋在六米深的火山灰下。'
      - id: R117-Q3
        type: vocabulary-in-context
        question: 'What does "snapshot" mean in "an extraordinary snapshot of ancient Roman life"?'
        questionZh: '"an extraordinary snapshot of ancient Roman life"中的"snapshot"是什么意思？'
        options:
          A: 'A photograph taken quickly'
          B: 'A preserved picture of how life was at one moment in time'
          C: 'A painting by an ancient artist'
          D: 'A detailed history book'
        answer: 'B'
        explanation: 'Here "snapshot" is used figuratively — Pompeii gives us a frozen-in-time picture of daily life in ancient Rome.'
        explanationZh: '这里"snapshot"是比喻用法——庞贝给了我们一幅古罗马日常生活的定格画面。'
      - id: R117-Q4
        type: multiple-choice
        question: 'When was Pompeii rediscovered?'
        questionZh: '庞贝是什么时候被重新发现的？'
        options:
          A: 'In 79 AD, shortly after the eruption'
          B: 'During the Middle Ages, around 1200 AD'
          C: 'In 1748, by workers digging a canal'
          D: 'In 1900, by a team of archaeologists'
        answer: 'C'
        explanation: 'The passage states that workers digging a canal accidentally discovered the ruins in 1748.'
        explanationZh: '文章指出挖掘运河的工人在1748年偶然发现了废墟。'

  # ============================================================
  # R118 – Building Worlds in Minecraft (Level 3, ~320 words)
  # ============================================================
  - id: R118
    title: 'Building Worlds in Minecraft'
    titleZh: '在我的世界中建造世界'
    level: 3
    wordCount: 320
    topic: virtual worlds
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Wired: How Minecraft Changed Gaming'
      author: 'Wired Magazine'
      note: 'Original passage about Minecraft as a creative platform'
    passage: |
      When Markus Persson released the first version of Minecraft in 2009, he could never have imagined what it would become. What started as a simple game about placing blocks has grown into one of the most popular creative platforms in history, with over 238 million copies sold.

      In Minecraft, players explore a world made entirely of blocks — cubes of stone, wood, dirt, water, and dozens of other materials. There are no rules about what you must build. Some players construct simple houses, while others create entire cities, complete with roads, railways, and working traffic lights.

      What makes Minecraft special is that it combines creativity with engineering. To build a functioning door, you need to understand how redstone circuits work — Minecraft's version of electrical wiring. To design a beautiful cathedral, you need to think about symmetry, proportion, and perspective. In this way, players learn real-world skills without realizing it.

      Schools around the world now use Minecraft: Education Edition in their classrooms. Students in Denmark recreated the entire country in Minecraft to study geography. In Japan, students built models of historical buildings to learn about architecture and history. A group of students in the UK even designed a sustainable city of the future as a school project.

      Perhaps most impressively, a team of volunteers called Build the Earth is trying to recreate the entire planet in Minecraft at a 1:1 scale. They have already completed detailed models of famous landmarks including the Eiffel Tower, the Great Wall of China, and the Sydney Opera House.

      Minecraft proves that when you give people the freedom to create, the results can be extraordinary. It is not just a game — it is a tool for imagination, collaboration, and learning that continues to inspire millions of young builders around the world.
    passageZh: |
      当 Markus Persson 在2009年发布第一版我的世界时，他从未想象过它会变成什么样子。从一个简单的放置方块的游戏开始，它已经发展成为历史上最受欢迎的创意平台之一，销售量超过2.38亿份。

      在我的世界中，玩家探索一个完全由方块组成的世界——石头、木头、泥土、水以及数十种其他材料的立方体。对于你必须建造什么没有规则。有些玩家建造简单的房屋，而另一些人则创造整座城市，配有道路、铁路和可用的交通灯。

      让我的世界特别的是它将创造力与工程学结合在一起。要建造一扇能用的门，你需要了解红石电路的工作原理——我的世界版本的电线。要设计一座美丽的大教堂，你需要考虑对称、比例和透视。通过这种方式，玩家在不知不觉中学习了现实世界的技能。

      世界各地的学校现在在课堂上使用我的世界：教育版。丹麦的学生在我的世界中重建了整个国家来学习地理。在日本，学生建造了历史建筑的模型来学习建筑和历史。英国的一群学生甚至设计了一座未来可持续发展的城市作为学校项目。

      也许最令人印象深刻的是，一个名为"建造地球"的志愿者团队正试图以1:1的比例在我的世界中重建整个地球。他们已经完成了包括埃菲尔铁塔、中国长城和悉尼歌剧院在内的著名地标的详细模型。

      我的世界证明，当你给人们创造的自由时，结果可以是非凡的。它不仅仅是一个游戏——它是一个激发想象力、协作和学习的工具，继续激励着全世界数百万年轻建造者。
    vocabHighlights:
      - word: creative
        ref: V1158
      - word: symmetry
        ref: V1240
      - word: collaborate
        ref: V1201
    questions:
      - id: R118-Q1
        type: multiple-choice
        question: 'What makes Minecraft different from most other games?'
        questionZh: '是什么让我的世界与大多数其他游戏不同？'
        options:
          A: 'It has the best graphics of any game.'
          B: 'It combines creativity with engineering and has no fixed rules.'
          C: 'It can only be played by one person at a time.'
          D: 'It was designed specifically for schools.'
        answer: 'B'
        explanation: 'The passage emphasizes that Minecraft combines creativity with engineering and has no rules about what to build.'
        explanationZh: '文章强调我的世界将创造力与工程学结合，并且对建造什么没有规则。'
      - id: R118-Q2
        type: multiple-choice
        question: 'What is the "Build the Earth" project trying to do?'
        questionZh: '"建造地球"项目试图做什么？'
        options:
          A: 'Build new cities in the real world.'
          B: 'Recreate the entire planet in Minecraft at actual size.'
          C: 'Design a new version of the Minecraft game.'
          D: 'Teach every child in the world to code.'
        answer: 'B'
        explanation: 'The project aims to recreate the entire planet in Minecraft at a 1:1 scale.'
        explanationZh: '该项目旨在以1:1的比例在我的世界中重建整个地球。'
      - id: R118-Q3
        type: vocabulary-in-context
        question: 'What does "platform" mean in "one of the most popular creative platforms"?'
        questionZh: '"one of the most popular creative platforms"中的"platform"是什么意思？'
        options:
          A: 'A raised flat surface you stand on'
          B: 'A computer system or environment for creating things'
          C: 'A type of shoe with a thick sole'
          D: 'A train station where passengers wait'
        answer: 'B'
        explanation: 'Here "platform" means a digital system or environment that people use to create and share content.'
        explanationZh: '这里"platform"指的是人们用来创建和分享内容的数字系统或环境。'

  # ============================================================
  # R119 – How Ancient Rome Built Its Roads (Level 3, ~330 words)
  # ============================================================
  - id: R119
    title: 'How Ancient Rome Built Its Roads'
    titleZh: '古罗马如何修建道路'
    level: 3
    wordCount: 330
    topic: ancient civilizations
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Smithsonian Magazine: Roman Roads'
      author: 'Smithsonian'
      note: 'Original passage based on Roman engineering history'
    passage: |
      The Roman Empire built over 80,000 kilometres of roads — enough to circle the Earth twice. These roads were so well constructed that some of them are still used today, nearly two thousand years after they were built. How did the Romans achieve this remarkable feat of engineering?

      First, Roman engineers surveyed the land carefully. They preferred straight routes because they were shorter and allowed soldiers to march faster. When a hill was in the way, they sometimes cut through it rather than going around. When they reached a river, they built bridges from stone arches — a technique so effective that many Roman bridges still stand.

      The construction process itself was brilliantly designed. Workers began by digging a deep trench, about one metre down. They filled the bottom layer with large stones for drainage, so rainwater would not collect and weaken the road. Above this, they placed a layer of crushed stone mixed with cement. Finally, they laid flat paving stones on top, with a slight curve from centre to edge so that water would run off to the sides.

      The result was a road surface that could support heavy carts, thousands of marching soldiers, and centuries of use. The phrase "All roads lead to Rome" comes from the fact that the network was designed with Rome at its centre, connecting the capital to every corner of the empire.

      Roman roads did more than just move soldiers. They facilitated trade between distant provinces, carried messages from the emperor to local governors, and allowed ideas, languages, and cultures to spread across Europe, North Africa, and the Middle East. In many ways, Roman roads were the internet of the ancient world — a network that connected people and transformed society.

      Today, many modern European highways follow the exact routes that Roman engineers mapped out two thousand years ago. Their legacy is literally built into the ground beneath our feet.
    passageZh: |
      罗马帝国修建了超过80,000公里的道路——足以绕地球两圈。这些道路建造得如此之好，以至于其中一些在建成近两千年后仍在使用。罗马人是如何实现这一非凡的工程壮举的？

      首先，罗马工程师仔细勘测了地形。他们偏好直线路线，因为更短，让士兵行军更快。当山丘挡道时，他们有时会直接穿过而不是绕行。当到达河流时，他们用石拱建造桥梁——这种技术如此有效，许多罗马桥梁至今仍然屹立。

      建造过程本身设计精妙。工人们首先挖一条深约一米的沟渠。底层填充大石头用于排水，这样雨水不会积聚并削弱道路。在此之上，放置一层碎石与水泥的混合物。最后，在顶部铺设平整的铺路石，从中心到边缘有轻微的弧度，使水流向两侧。

      结果是一个可以承受重型马车、数千名行军士兵和数百年使用的路面。"条条大路通罗马"这句话来自这样一个事实：路网以罗马为中心设计，将首都与帝国的每个角落连接起来。

      罗马道路的作用不仅仅是运送士兵。它们促进了遥远省份之间的贸易，将皇帝的信息传递给地方总督，并使思想、语言和文化在欧洲、北非和中东传播。在许多方面，罗马道路是古代世界的互联网——一个连接人们并改变社会的网络。

      今天，许多现代欧洲高速公路沿着罗马工程师两千年前规划的完全相同的路线。他们的遗产确确实实地建在我们脚下的土地中。
    vocabHighlights:
      - word: facilitate
        ref: V1120
      - word: construct
        ref: V1129
      - word: legacy
        ref: V1300
    questions:
      - id: R119-Q1
        type: multiple-choice
        question: 'Why did Roman engineers prefer straight roads?'
        questionZh: '为什么罗马工程师偏好直路？'
        options:
          A: 'Straight roads were cheaper to build.'
