  - id: R127
    title: 'What Makes a Good Neighbourhood?'
    titleZh: '什么造就了好社区？'
    level: 3
    wordCount: 320
    topic: building communities
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Happy City by Charles Montgomery'
      author: 'Charles Montgomery'
      note: 'Original passage inspired by urban happiness research'
    passage: |
      What makes some neighbourhoods wonderful places to live while others feel unfriendly and lonely? Researchers have spent years trying to answer this question, and their findings might surprise you.

      A good neighbourhood does not need expensive houses or fancy restaurants. What matters most is walkability — the ability to walk easily from place to place. Studies show that people who live in walkable neighbourhoods are healthier because they exercise more, happier because they meet more neighbours, and wealthier because they spend less money on petrol and car repairs.

      Trees also make a huge difference. Research from Toronto found that having ten or more trees on a city block improved residents' health as much as being seven years younger or earning $10,000 more per year. Trees clean the air, reduce stress, provide shade in summer, and make streets feel safer and more welcoming.

      The speed of traffic matters too. On streets where cars drive slowly, children play outside, neighbours chat on the pavement, and local shops thrive. On fast, busy roads, people stay indoors, and communities become fragmented. The famous urban planner Donald Appleyard discovered that residents on quiet streets had three times as many friends as those living on busy roads.

      Mixed-use development — where homes, shops, offices, and parks are all in the same area — also creates better neighbourhoods. When you can buy bread, post a letter, and sit in a park without driving anywhere, life becomes more convenient, social, and enjoyable.

      Finally, good neighbourhoods feel safe. This does not necessarily mean more police or security cameras. Jane Jacobs argued that the best security comes from "eyes on the street" — ordinary people going about their daily lives, naturally watching over their community.

      The recipe for a great neighbourhood, then, is surprisingly simple: trees, walkable streets, mixed-use buildings, slow traffic, and neighbours who know each other.
    passageZh: |
      是什么让一些社区成为美好的居住地，而另一些却让人感到不友好和孤独？研究人员花了数年时间试图回答这个问题，他们的发现可能会让你惊讶。

      一个好社区不需要昂贵的房子或高档餐厅。最重要的是步行性——从一个地方轻松步行到另一个地方的能力。研究表明，居住在步行友好社区的人更健康，因为他们锻炼更多；更快乐，因为他们遇到更多邻居；更富有，因为他们在汽油和汽车维修上花费更少。

      树木也有巨大的影响。多伦多的研究发现，一个城市街区有十棵或更多的树能改善居民的健康，效果相当于年轻七岁或每年多赚10,000美元。树木净化空气、减少压力、在夏天提供阴凉，使街道感觉更安全、更温馨。

      交通速度也很重要。在汽车缓慢行驶的街道上，孩子们在外面玩耍，邻居们在人行道上聊天，当地商店蓬勃发展。在快速繁忙的道路上，人们待在室内，社区变得支离破碎。著名的城市规划师唐纳德·阿普尔亚德发现，安静街道上的居民拥有的朋友数量是繁忙道路上居民的三倍。

      混合用途开发——住宅、商店、办公室和公园都在同一区域——也创造了更好的社区。当你不用开车就能买面包、寄信和坐在公园里时，生活变得更方便、更有社交性和更愉快。

      最后，好的社区让人感到安全。这不一定意味着更多的警察或安全摄像头。简·雅各布斯认为，最好的安全来自"街道上的眼睛"——普通人在进行日常生活时自然地守护他们的社区。

      那么，一个好社区的配方出奇地简单：树木、步行友好的街道、混合用途建筑、缓慢的交通和互相认识的邻居。
    vocabHighlights:
