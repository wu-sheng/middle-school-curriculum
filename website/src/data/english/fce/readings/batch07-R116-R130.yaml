  - id: R124
    title: 'Green Cities of the Future'
    titleZh: '未来的绿色城市'
    level: 3
    wordCount: 340
    topic: city planning
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'BBC Future: Eco-Cities'
      author: 'BBC'
      note: 'Original passage about sustainable city design concepts'
    passage: |
      What will cities look like in fifty years? Many urban planners believe that the cities of the future will be greener, cleaner, and more connected to nature than anything we see today.

      One of the most exciting ideas is the "sponge city." In a traditional city, rain falls on concrete and asphalt, which cannot absorb water. As a result, heavy rain causes flooding. A sponge city solves this problem by incorporating green roofs, parks, and permeable pavements that soak up rainwater like a sponge. China has already started building sponge cities in over thirty locations.

      Another concept is the "15-minute city," where everything residents need — shops, schools, parks, hospitals, and workplaces — is within a fifteen-minute walk or bicycle ride from their home. Paris has adopted this idea, closing some streets to cars and adding bicycle lanes to encourage people to walk and cycle instead of drive.

      Vertical farming is also changing how cities think about food. Instead of transporting vegetables hundreds of kilometres from rural farms, some cities are growing food inside tall buildings using artificial light and recycled water. A single vertical farm can produce as much food as a traditional farm ten times its size.

      Energy is perhaps the biggest challenge. Currently, cities consume over 75% of the world's energy and produce more than 70% of carbon emissions. However, new technologies like solar windows, which generate electricity from sunlight while still being transparent, could transform every building into a small power station.

      Singapore is leading the way with its "City in a Garden" vision. The Gardens by the Bay feature enormous artificial trees called Supertrees, which collect solar energy, harvest rainwater, and act as vertical gardens — all while looking spectacular at night when they light up.

      The green city of the future is not just a dream. Piece by piece, city by city, it is already being built.
    passageZh: |
      五十年后城市会是什么样子？许多城市规划者认为，未来的城市将比我们今天看到的任何城市都更绿色、更清洁、与自然更紧密相连。

      最令人兴奋的概念之一是"海绵城市"。在传统城市中，雨水落在不能吸水的混凝土和沥青上。因此，暴雨会导致洪水。海绵城市通过结合绿色屋顶、公园和可渗透路面来解决这个问题，它们像海绵一样吸收雨水。中国已经在三十多个地点开始建设海绵城市。

      另一个概念是"15分钟城市"，居民需要的一切——商店、学校、公园、医院和工作场所——都在步行或骑自行车十五分钟内可达。巴黎已经采用了这个理念，关闭了一些街道的汽车通行，并增加了自行车道，鼓励人们步行和骑自行车而不是开车。

      垂直农业也在改变城市对食物的思考方式。一些城市不再从数百公里外的农村农场运输蔬菜，而是在高层建筑内利用人工光照和循环水种植食物。一个垂直农场可以生产出传统农场十倍面积的食物量。

      能源也许是最大的挑战。目前，城市消耗了世界上超过75%的能源，产生了超过70%的碳排放。然而，像太阳能窗户这样的新技术——在透明的同时从阳光中产生电力——可以将每栋建筑变成一个小型发电站。

      新加坡以其"花园中的城市"愿景引领潮流。滨海湾花园拥有名为"超级树"的巨大人工树，它们收集太阳能、收集雨水并充当垂直花园——所有这些在夜晚灯光亮起时看起来都十分壮观。

      未来的绿色城市不仅仅是梦想。一点一点，一个城市一个城市，它已经在建设中了。
    vocabHighlights:
