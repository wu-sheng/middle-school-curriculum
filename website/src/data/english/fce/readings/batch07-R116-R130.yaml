        type: multiple-choice
        question: 'Why were Roman arch bridges so successful?'
        questionZh: '为什么罗马拱桥如此成功？'
        options:
          A: 'They were painted bright colours to attract attention.'
          B: 'They distributed weight evenly across a curved surface.'
          C: 'They were built using iron and steel.'
          D: 'They could only carry pedestrians, not vehicles.'
        answer: 'B'
