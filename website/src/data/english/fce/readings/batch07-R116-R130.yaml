  - id: R126
    title: 'How Bridges Connect Communities'
    titleZh: '桥梁如何连接社区'
    level: 3
    wordCount: 330
    topic: city planning
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Engineering for Kids: Bridges'
      author: 'Various'
      note: 'Original passage about bridge engineering and community connection'
    passage: |
      Bridges are more than just structures that cross water or valleys. They connect communities, enable trade, and transform the way people live. Without bridges, many cities simply could not exist.

      The earliest bridges were probably fallen trees placed across streams. Ancient Romans improved on this by building stone arch bridges that distributed weight evenly across a curved surface. This design was so effective that some Roman bridges are still carrying traffic two thousand years later.

      During the Industrial Revolution, engineers developed new materials and techniques. Iron and steel allowed bridges to span much greater distances than stone. The Brooklyn Bridge in New York, completed in 1883, was one of the first suspension bridges to use steel cables. When it opened, it connected Manhattan and Brooklyn for the first time, transforming two separate cities into one.

      Today's engineers face even greater challenges. The Hong Kong-Zhuhai-Macau Bridge, opened in 2018, stretches 55 kilometres across the Pearl River Delta, making it the longest sea-crossing bridge in the world. It includes an underwater tunnel to allow large ships to pass and was designed to withstand typhoons and earthquakes.

      But not all bridges are grand engineering projects. Some of the most important bridges are small and simple. In rural areas of developing countries, a basic footbridge over a river can mean the difference between children walking to school safely and having to swim through dangerous water. The Bridges to Prosperity charity has built over 350 footbridges in poor communities, connecting over one million people to schools, hospitals, and markets.

      Whether enormous or modest, bridges represent one of humanity's most fundamental instincts: the desire to reach the other side, to connect with others, and to overcome the obstacles that nature places in our path. Every bridge tells the story of a community that refused to be divided.
    passageZh: |
      桥梁不仅仅是跨越水面或山谷的结构。它们连接社区、促进贸易，并改变人们的生活方式。没有桥梁，许多城市根本无法存在。

      最早的桥梁可能是放在溪流上的倒下的树木。古罗马人通过建造石拱桥加以改进，这种桥将重量均匀分布在弧形表面上。这种设计如此有效，以至于一些罗马桥梁在两千年后仍在承载交通。

      工业革命期间，工程师们开发了新材料和新技术。铁和钢使桥梁能够跨越比石头大得多的距离。1883年建成的纽约布鲁克林大桥是首批使用钢缆的吊桥之一。它开通时首次连接了曼哈顿和布鲁克林，将两个独立的城市变成了一个。

      今天的工程师面临着更大的挑战。2018年通车的港珠澳大桥横跨珠江三角洲55公里，是世界上最长的跨海大桥。它包括一条海底隧道以允许大型船舶通过，并被设计为能抵御台风和地震。

      但并非所有桥梁都是宏大的工程项目。一些最重要的桥梁小而简单。在发展中国家的农村地区，河上的一座基本人行桥可能意味着孩子们安全步行上学和不得不游过危险水域之间的区别。"通向繁荣的桥梁"慈善机构已经在贫困社区建造了350多座人行桥，将超过一百万人与学校、医院和市场连接起来。

      无论巨大还是简朴，桥梁代表了人类最基本的本能之一：到达另一边的渴望，与他人联系的渴望，以及克服自然在我们前进道路上设置的障碍的渴望。每座桥梁都讲述了一个拒绝被分割的社区的故事。
    vocabHighlights:
