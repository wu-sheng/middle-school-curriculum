        type: multiple-choice
        question: 'What is the main idea behind a "sponge city"?'
        questionZh: '"海绵城市"背后的主要理念是什么？'
        options:
          A: 'Building cities entirely out of soft materials'
          B: 'Using green roofs and permeable surfaces to absorb rainwater'
          C: 'Making cities float on water like a sponge'
          D: 'Replacing all concrete with natural stone'
        answer: 'B'
        explanation: 'Sponge cities incorporate green roofs, parks, and permeable pavements that soak up rainwater.'
        explanationZh: '海绵城市结合了绿色屋顶、公园和可渗透路面来吸收雨水。'
      - id: R124-Q2
        type: vocabulary-in-context
