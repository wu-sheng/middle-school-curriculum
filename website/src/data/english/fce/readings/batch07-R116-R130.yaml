        question: 'According to the passage, what is the most important quality of a good neighbourhood?'
        questionZh: '根据文章，好社区最重要的品质是什么？'
        options:
          A: 'Having expensive houses and fancy restaurants'
          B: 'Walkability — the ability to walk easily from place to place'
          C: 'Having a large police force'
          D: 'Being located in a major city'
        answer: 'B'
        explanation: 'The passage says what matters most is walkability — the ability to walk easily from place to place.'
        explanationZh: '文章说最重要的是步行性——从一个地方轻松步行到另一个地方的能力。'

  - id: R128
    title: 'Underwater Cities: Science Fiction or Future Reality?'
    titleZh: '水下城市：科幻还是未来现实？'
    level: 4
    wordCount: 350
    topic: city planning
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Popular Science: Living Under the Sea'
      author: 'Various'
      note: 'Original passage about underwater habitat concepts'
    passage: |
      As the world's population grows and sea levels rise, some architects are asking a bold question: could humans live underwater? While it sounds like science fiction, several serious projects are already exploring this possibility.

      The concept is not entirely new. In the 1960s, the famous ocean explorer Jacques Cousteau built Conshelf, an underwater habitat where researchers lived and worked on the seabed for up to a month. Although the experiment was successful, the technology at the time was too expensive and limited for large-scale underwater living.

      Today, advances in engineering have made the idea more feasible. Japanese construction company Shimizu Corporation has designed Ocean Spiral, a concept for an underwater city that would house 5,000 people. The design features a massive sphere floating just below the ocean surface, connected by a spiral pathway to the seabed three kilometres below. Energy would come from ocean thermal differences, and food would be grown using deep-sea nutrients.

      However, building cities underwater presents enormous challenges. Water pressure increases with depth, requiring incredibly strong materials for construction. Supplying fresh air, removing waste, and maintaining comfortable temperatures all require sophisticated engineering. Furthermore, the psychological effects of living without natural sunlight could be significant — research shows that humans need daylight to maintain healthy sleep patterns and mood.

      Despite these difficulties, some experts believe underwater habitats could become necessary rather than optional. With climate change threatening coastal cities worldwide, parts of cities like Miami, Shanghai, and Jakarta could be underwater by 2100. Learning to build in and on the ocean may become an essential survival skill for future generations.

      For now, underwater cities remain in the design phase. But as one architect noted, "Every building that exists today was once impossible. The only question is not whether we can build underwater, but when we will choose to."
    passageZh: |
      随着世界人口增长和海平面上升，一些建筑师提出了一个大胆的问题：人类能生活在水下吗？虽然听起来像科幻小说，但已经有几个严肃的项目在探索这种可能性。

      这个概念并不完全是新的。在1960年代，著名的海洋探险家雅克·库斯托建造了大陆架，这是一个水下栖息地，研究人员在海底生活和工作长达一个月。虽然实验很成功，但当时的技术对于大规模水下生活来说太昂贵且有限。

      今天，工程学的进步使这个想法更加可行。日本建筑公司清水建设设计了"海洋螺旋"，一个可容纳5,000人的水下城市概念。设计特点是一个漂浮在海面下方的巨大球体，通过螺旋通道连接到三公里以下的海底。能源来自海洋温差，食物利用深海营养物质种植。

      然而，在水下建造城市面临巨大的挑战。水压随深度增加，需要极其坚固的建筑材料。供应新鲜空气、清除废物和保持舒适温度都需要复杂的工程。此外，没有自然阳光生活的心理影响可能很大——研究表明人类需要日光来维持健康的睡眠模式和情绪。

      尽管存在这些困难，一些专家认为水下栖息地可能变成必需品而非可选项。随着气候变化威胁着全球沿海城市，到2100年，迈阿密、上海和雅加达等城市的部分地区可能会在水下。学习在海洋中和海洋上建造可能成为未来几代人的基本生存技能。

      目前，水下城市仍处于设计阶段。但正如一位建筑师所说："今天存在的每栋建筑都曾经是不可能的。唯一的问题不是我们能否在水下建造，而是我们何时选择这样做。"
