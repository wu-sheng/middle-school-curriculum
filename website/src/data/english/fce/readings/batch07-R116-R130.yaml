  - id: R129
    title: 'The Silk Road: A Highway of Ideas'
    titleZh: '丝绸之路：思想的高速公路'
    level: 3
    wordCount: 340
    topic: ancient civilizations
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'BBC History: The Silk Road'
      author: 'BBC'
      note: 'Original passage about the cultural impact of the Silk Road'
    passage: |
      When most people think of the Silk Road, they imagine camel caravans carrying silk and spices across desert sands. But the Silk Road was much more than a trade route — it was one of history's greatest highways of ideas, religions, and inventions.

      The Silk Road was not a single road but a network of routes stretching over 6,400 kilometres from China to the Mediterranean Sea. Merchants, monks, soldiers, and scholars travelled these paths for over 1,500 years, from around 130 BC to 1453 AD. Along the way, they carried not only goods but also knowledge, languages, and beliefs.

      Paper and printing, two of China's greatest inventions, spread westward along the Silk Road and eventually transformed European society. Gunpowder followed the same route, changing warfare forever. In the other direction, mathematics and astronomical knowledge from the Islamic world travelled eastward to China.

      The exchange was not limited to technology. Buddhism spread from India to China through Silk Road merchants and monks, becoming one of China's major religions. Islam spread along the same routes to Central Asia. Christianity reached as far as China, where a seventh-century stone monument in Xi'an records the arrival of Christian missionaries.

      Cities along the Silk Road flourished as centres of trade and learning. Samarkand, in modern Uzbekistan, became famous for its stunning blue-tiled mosques and libraries. Dunhuang, in western China, housed the Mogao Caves — over 700 caves filled with Buddhist paintings and manuscripts, preserved in the dry desert air for over a thousand years.

      Today, China's Belt and Road Initiative is sometimes called the "New Silk Road." Like its ancient predecessor, it aims to connect countries through trade, infrastructure, and cultural exchange. The Silk Road may have closed, but the human desire to connect, share, and learn from distant cultures remains as strong as ever.
    passageZh: |
      当大多数人想到丝绸之路时，他们想象的是骆驼商队穿越沙漠运送丝绸和香料。但丝绸之路远不止是一条贸易路线——它是历史上最伟大的思想、宗教和发明的高速公路之一。

      丝绸之路不是一条单一的道路，而是一个从中国延伸到地中海超过6,400公里的路线网络。商人、僧侣、士兵和学者在这些道路上行走了1,500多年，从大约公元前130年到公元1453年。一路上，他们不仅携带货物，还携带知识、语言和信仰。

      纸和印刷术，中国最伟大的两项发明，沿丝绸之路向西传播，最终改变了欧洲社会。火药沿同一路线传播，永远改变了战争。反方向，来自伊斯兰世界的数学和天文知识向东传播到中国。

      交流不仅限于技术。佛教通过丝绸之路的商人和僧侣从印度传播到中国，成为中国的主要宗教之一。伊斯兰教沿同一路线传播到中亚。基督教远达中国，西安的一块七世纪石碑记录了基督教传教士的到来。

      丝绸之路沿线的城市作为贸易和学习中心蓬勃发展。现代乌兹别克斯坦的撒马尔罕以其令人惊叹的蓝色瓷砖清真寺和图书馆而闻名。中国西部的敦煌拥有莫高窟——超过700个洞窟，充满佛教绘画和手稿，在干燥的沙漠空气中保存了一千多年。

      今天，中国的"一带一路"倡议有时被称为"新丝绸之路"。像它的古老前身一样，它旨在通过贸易、基础设施和文化交流来连接国家。丝绸之路可能已经关闭，但人类与远方文化联系、分享和学习的愿望仍然一如既往地强烈。
    vocabHighlights:
      - word: trade
        ref: V1161
      - word: flourish
        ref: V1241
      - word: heritage
        ref: V1152
    questions:
      - id: R129-Q1
        type: multiple-choice
        question: 'According to the passage, what was the Silk Road''s most important function?'
        questionZh: '根据文章，丝绸之路最重要的功能是什么？'
        options:
          A: 'Transporting silk from China to Europe'
          B: 'Spreading ideas, religions, and inventions between civilizations'
          C: 'Providing a route for military campaigns'
          D: 'Connecting different animal habitats'
        answer: 'B'
        explanation: 'The passage emphasizes that the Silk Road was a highway of ideas, religions, and inventions, not just trade goods.'
        explanationZh: '文章强调丝绸之路是思想、宗教和发明的高速公路，不仅仅是贸易商品。'

  - id: R130
    title: 'From Huts to Skyscrapers: How Buildings Evolved'
    titleZh: '从茅屋到摩天大楼：建筑如何演变'
    level: 3
    wordCount: 350
    topic: architecture
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'A Short History of Buildings'
      author: 'Various'
      note: 'Original passage tracing the history of building design'
    passage: |
      The story of human buildings is the story of human ambition. From the earliest shelters to the tallest skyscrapers, every advance in architecture reflects a new challenge that humans needed to overcome.

      The first human dwellings were simple shelters made from animal skins, branches, and leaves. Around 12,000 years ago, when people began farming and settling in one place, they started building more permanent structures from mud bricks dried in the sun. These were the first houses as we know them.

      The ancient Egyptians took building to a new level with their pyramids. The Great Pyramid of Giza, built around 2560 BC, stood 146 metres tall and remained the tallest structure in the world for over 3,800 years. Engineers still debate exactly how it was constructed without modern machinery.

      Roman architects revolutionized building with two key innovations: the arch and concrete. Arches allowed them to build enormous structures like the Colosseum, while Roman concrete — a mixture of volcanic ash, lime, and seawater — was so durable that many Roman buildings still stand today.

      The Gothic cathedrals of medieval Europe pushed architecture skyward with pointed arches and flying buttresses — external supports that allowed walls to be thinner and windows to be larger. The result was buildings filled with coloured light from enormous stained-glass windows.

      The real revolution came in the 1880s when engineers in Chicago discovered that a steel frame could support an entire building, removing the need for thick walls. This made skyscrapers possible. The Home Insurance Building, completed in 1885 with ten storeys, is considered the world's first skyscraper.

      Today, the Burj Khalifa in Dubai reaches 828 metres — nearly six times the height of the Great Pyramid. But height is no longer the only goal. Modern architects are designing buildings that generate their own electricity, clean the air around them, and adapt their shape to changing weather conditions. The story of architecture is far from over.
    passageZh: |
      人类建筑的故事就是人类雄心的故事。从最早的避难所到最高的摩天大楼，建筑的每一次进步都反映了人类需要克服的新挑战。

      最早的人类住所是用兽皮、树枝和树叶制成的简单避难所。大约12,000年前，当人们开始耕种并定居时，他们开始用在阳光下晒干的泥砖建造更持久的结构。这些就是我们所知道的最早的房子。

      古埃及人用金字塔将建筑提升到了新的水平。大约公元前2560年建造的吉萨大金字塔高146米，在超过3,800年间一直是世界上最高的建筑。工程师们至今仍在争论它是如何在没有现代机械的情况下建造的。

      罗马建筑师用两项关键创新革命了建筑：拱门和混凝土。拱门使他们能够建造像罗马斗兽场这样的巨大建筑，而罗马混凝土——火山灰、石灰和海水的混合物——如此耐用，以至于许多罗马建筑至今仍然屹立。

      中世纪欧洲的哥特式大教堂用尖拱和飞扶壁——外部支撑，使墙壁可以更薄、窗户可以更大——将建筑推向天空。结果是充满了巨大彩色玻璃窗投射的彩色光线的建筑。

      真正的革命发生在1880年代，芝加哥的工程师发现钢框架可以支撑整栋建筑，不再需要厚墙。这使摩天大楼成为可能。1885年竣工的家庭保险大楼有十层，被认为是世界上第一座摩天大楼。

      今天，迪拜的哈利法塔高828米——几乎是大金字塔高度的六倍。但高度不再是唯一的目标。现代建筑师正在设计能自己发电、净化周围空气、并根据天气变化调整形状的建筑。建筑的故事远未结束。
