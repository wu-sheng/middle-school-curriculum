  # ============================================================
  # R122 – Building Communities, Not Just Houses (Level 3, ~340 words)
  # ============================================================
  - id: R122
    title: 'Building Communities, Not Just Houses'
    titleZh: '建设社区，而不仅仅是房子'
    level: 3
    wordCount: 340
    topic: building communities
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Habitat for Humanity: Community Building'
      author: 'Various'
      note: 'Original passage about community-focused urban planning'
    passage: |
      Imagine two neighbourhoods. In the first, all the houses look exactly the same. There are no parks, no shops within walking distance, and no places for neighbours to meet. People drive everywhere, and most residents do not know each other's names. In the second neighbourhood, houses surround a shared garden. There is a small market, a playground, and benches where elderly people sit and chat. Children play safely in the streets, and everyone knows their neighbours.

      Which neighbourhood would you rather live in? Most people choose the second — and yet, for decades, many cities built neighbourhoods that looked more like the first. The reason was efficiency. It was cheaper and faster to build identical houses in rows, with wide roads designed for cars rather than people.

      However, urban planners have learned that a good neighbourhood needs more than just houses. It needs what they call "third places" — spaces that are neither home nor work, where people can gather naturally. Coffee shops, libraries, parks, and community centres all serve as third places.

      Research shows that people who live in neighbourhoods with strong communities are happier, healthier, and safer. When neighbours know each other, they look out for each other. Children have more adults watching over them. Elderly people feel less lonely. Crime decreases because strangers stand out in a close-knit community.

      Some modern architects are now designing neighbourhoods specifically to encourage interaction. They place front porches close to the pavement so that people can easily chat with passers-by. They build shared gardens and communal kitchens. They design walking paths that naturally bring people together at central gathering points.

      Building a community takes more than bricks and concrete. It requires thoughtful design that puts human connection at the centre. After all, a house is just a building — but a community is where people truly feel at home.
    passageZh: |
      想象两个社区。在第一个社区中，所有房子看起来一模一样。没有公园，步行距离内没有商店，也没有邻居见面的地方。人们到处开车，大多数居民不知道彼此的名字。在第二个社区，房子围绕着一个共享花园。有一个小市场、一个游乐场，还有老人坐着聊天的长椅。孩子们在街上安全地玩耍，每个人都认识他们的邻居。

      你更愿意住在哪个社区？大多数人选择第二个——然而，几十年来，许多城市建造的社区看起来更像第一个。原因是效率。成排建造相同的房子更便宜更快，宽阔的道路是为汽车而非行人设计的。

      然而，城市规划者已经认识到，一个好的社区需要的不仅仅是房子。它需要他们所说的"第三空间"——既不是家也不是工作场所的空间，人们可以在这里自然地聚集。咖啡店、图书馆、公园和社区中心都充当第三空间。

      研究表明，生活在社区关系牢固的社区中的人更快乐、更健康、更安全。当邻居互相认识时，他们会互相照看。孩子有更多的成年人看护他们。老年人不那么孤独。犯罪率下降，因为陌生人在一个紧密的社区中很引人注目。

      一些现代建筑师现在专门设计鼓励互动的社区。他们把前廊靠近人行道，方便人们与路人聊天。他们建造共享花园和公共厨房。他们设计的步行道自然地将人们引向中心聚集点。

      建设一个社区需要的不仅仅是砖头和混凝土。它需要将人际联系放在中心位置的深思熟虑的设计。毕竟，房子只是一栋建筑——但社区才是人们真正感到家的地方。
