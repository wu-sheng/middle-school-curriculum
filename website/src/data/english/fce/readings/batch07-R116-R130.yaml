  # ============================================================
  # R123 – The Hanging Gardens: Real or Legend? (Level 4, ~370 words)
  # ============================================================
  - id: R123
    title: 'The Hanging Gardens: Real or Legend?'
    titleZh: '空中花园：真实还是传说？'
    level: 4
    wordCount: 370
    topic: ancient civilizations
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'History Channel: Seven Wonders of the Ancient World'
      author: 'Various historians'
      note: 'Original passage about the Hanging Gardens of Babylon mystery'
    passage: |
      The Hanging Gardens of Babylon are one of the Seven Wonders of the Ancient World — and the only one that may never have existed at all. Ancient writers described them as a magnificent structure of terraced gardens, rising high above the city of Babylon in modern-day Iraq. Trees, flowers, and waterfalls cascaded down the levels, creating a green paradise in the middle of the desert.

      According to legend, King Nebuchadnezzar II built the gardens around 600 BC as a gift for his wife, Amytis, who missed the green hills of her homeland in Media. The structure was said to be about 23 metres tall — roughly the height of a seven-storey building — with an ingenious water system that pumped river water from the Euphrates up to the highest level.

      However, there is a significant problem with this story. No archaeological evidence of the gardens has ever been found in Babylon, despite extensive excavations. Furthermore, Babylonian records from that period — which carefully documented the king's other building projects — make no mention of any hanging gardens.

      This mystery has led scholars to propose several theories. Some believe the gardens existed but were destroyed by earthquakes and floods long before modern archaeology began. Others suggest that the gardens were actually located in the Assyrian city of Nineveh, about 500 kilometres north of Babylon, where archaeologists have found evidence of elaborate garden structures and aqueducts.

      A third theory is that the gardens were entirely fictional — a story invented by Greek writers who had never visited Babylon but wanted to impress their readers with tales of exotic Eastern wonders.

      Whatever the truth, the Hanging Gardens remain one of history's most fascinating mysteries. They represent the human desire to create beauty and bring nature into our built environment — an ambition that city planners and architects share to this day. Every rooftop garden, indoor park, and green building in a modern city carries a little of the spirit of those legendary gardens of ancient Babylon.
    passageZh: |
      巴比伦空中花园是古代世界七大奇迹之一——也是唯一一个可能从未存在过的。古代作家将它们描述为壮丽的阶梯式花园结构，高高耸立在今天伊拉克境内的巴比伦城上方。树木、花卉和瀑布层层叠叠倾泻而下，在沙漠中央创造了一个绿色天堂。

      据传说，尼布甲尼撒二世国王在大约公元前600年建造了花园，作为送给妻子阿米提斯的礼物，她思念故乡米底亚的绿色山丘。据说这个结构约23米高——大约相当于七层楼——配有巧妙的供水系统，将幼发拉底河的水泵送到最高层。

      然而，这个故事有一个重大问题。尽管进行了大量挖掘，但从未在巴比伦发现过花园的考古证据。此外，那个时期的巴比伦记录——详细记载了国王的其他建筑项目——没有提到任何空中花园。

      这个谜团促使学者们提出了几种理论。一些人认为花园确实存在，但在现代考古学开始之前就被地震和洪水摧毁了。另一些人认为花园实际上位于巴比伦以北约500公里的亚述城市尼尼微，考古学家在那里发现了精心设计的花园结构和水渠的证据。

      第三种理论是花园完全是虚构的——由从未到过巴比伦的希腊作家编造的故事，他们想用异域东方奇迹的故事来打动读者。

      不管真相如何，空中花园仍然是历史上最引人入胜的谜团之一。它们代表了人类创造美丽并将自然带入建筑环境的愿望——这种雄心至今仍为城市规划者和建筑师所共有。现代城市中的每一个屋顶花园、室内公园和绿色建筑都承载着古巴比伦传奇花园的一点精神。
    vocabHighlights:
      - word: significant
        ref: V1113
      - word: theory
        ref: V1115
      - word: evidence
        ref: V0776
