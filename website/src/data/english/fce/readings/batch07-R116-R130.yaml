  # ============================================================
  # R120 – The Dream of Utopia (Level 4, ~360 words)
  # ============================================================
  - id: R120
    title: 'The Dream of Utopia'
    titleZh: '乌托邦之梦'
    level: 4
    wordCount: 360
    topic: utopian societies
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'Philosophy for Kids: Imaginary Worlds'
      author: 'Various'
      note: 'Original passage about the concept of utopia through history'
    passage: |
      In 1516, an English writer named Thomas More published a book called "Utopia." In it, he described an imaginary island where everyone lived in peace, shared their wealth equally, and worked only six hours a day. The word "utopia" comes from Greek, meaning "no place" — because More knew that such a perfect society could never truly exist.

      Nevertheless, the dream of utopia has fascinated people for thousands of years. The ancient Greek philosopher Plato imagined an ideal city called Kallipolis, governed by wise philosophers rather than politicians. In ancient China, the poet Tao Yuanming wrote about Peach Blossom Spring, a hidden valley where people lived in harmony, completely cut off from the troubles of the outside world.

      In the 19th century, some people tried to turn utopian dreams into reality. Robert Owen, a factory owner from Wales, built a model community called New Harmony in the United States, where workers shared profits and children received free education. Although New Harmony eventually failed, Owen's ideas influenced modern laws about workers' rights and education.

      Today, architects and urban planners continue to envision ideal cities. Some propose "garden cities" surrounded by green belts of farmland, where nature and technology exist side by side. Others imagine "smart cities" managed by artificial intelligence, where traffic flows automatically, energy is generated from renewable sources, and waste is recycled with zero pollution.

      However, critics point out that one person's utopia can be another person's nightmare. A society where everything is perfectly controlled might feel more like a prison than a paradise. Freedom, creativity, and even a certain amount of chaos are essential parts of human life that no perfect system can entirely replace.

      Perhaps the real value of utopian thinking is not in reaching perfection, but in giving us something to aim for. Every time we build a new park, improve a school, or design a more accessible building, we take one small step closer to making our world a better place — even if true utopia remains forever just out of reach.
    passageZh: |
      1516年，一位名叫托马斯·莫尔的英国作家出版了一本名为《乌托邦》的书。在书中，他描述了一个想象中的岛屿，人人和平相处，平等分享财富，每天只工作六个小时。"utopia"这个词来自希腊语，意思是"不存在的地方"——因为莫尔知道这样完美的社会永远不可能真正存在。

      尽管如此，乌托邦之梦已经吸引了人们数千年。古希腊哲学家柏拉图想象了一座名为"美丽城"的理想城市，由智慧的哲学家而非政治家治理。在古代中国，诗人陶渊明写了《桃花源记》，描述了一个隐藏的山谷，人们和谐地生活，完全与外界的烦恼隔绝。

      19世纪，一些人试图将乌托邦梦想变为现实。来自威尔士的工厂主罗伯特·欧文在美国建立了一个名为"新和谐"的模范社区，工人分享利润，孩子接受免费教育。虽然新和谐最终失败了，但欧文的思想影响了现代关于工人权利和教育的法律。

      今天，建筑师和城市规划者继续设想理想城市。有人提出被农田绿化带包围的"田园城市"，自然与技术并存。另一些人想象由人工智能管理的"智慧城市"，交通自动流通，能源来自可再生资源，废物零污染回收。

      然而，批评者指出，一个人的乌托邦可能是另一个人的噩梦。一个一切都被完美控制的社会可能感觉更像监狱而非天堂。自由、创造力，甚至一定程度的混乱，都是人类生活的重要组成部分，任何完美的制度都无法完全替代。

      也许乌托邦思维的真正价值不在于达到完美，而在于给我们一个奋斗的目标。每当我们建造一个新公园、改善一所学校或设计一栋更无障碍的建筑时，我们都向让世界变得更美好迈出了一小步——即使真正的乌托邦永远遥不可及。
    vocabHighlights:
      - word: utopia
        ref: V1196
      - word: vision
        ref: V1197
