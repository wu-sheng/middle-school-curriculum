  - id: R125
    title: 'The Forbidden City: A City Within a City'
    titleZh: '紫禁城：城中之城'
    level: 4
    wordCount: 380
    topic: ancient civilizations
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'National Geographic: The Forbidden City'
      author: 'National Geographic'
      note: 'Original passage about the architecture and history of the Forbidden City'
    passage: |
      In the heart of Beijing stands a palace complex so vast that it contains 9,999 rooms. The Forbidden City, also known as the Palace Museum, was home to Chinese emperors for nearly 500 years, from 1420 to 1912. It is one of the best-preserved examples of ancient palace architecture in the world.

      The construction of the Forbidden City began in 1406 under Emperor Yongle of the Ming Dynasty. Over one million workers spent fourteen years building it. The complex covers 720,000 square metres — roughly the size of 100 football pitches — and is surrounded by a 52-metre-wide moat and thick walls standing over seven metres tall.

      Every detail of the Forbidden City was designed with symbolic meaning. The colour red, which dominates the walls and gates, represents good fortune and joy. The golden-yellow tiles on the roofs were reserved exclusively for the emperor, as yellow symbolised supreme power. The number nine, considered the luckiest number in Chinese culture, appears repeatedly — in the rows of roof decorations, the number of door studs, and even in the layout of the buildings.

      The complex is divided into two main sections. The Outer Court was used for state ceremonies and official business. It contains three enormous halls, the largest of which — the Hall of Supreme Harmony — was where the emperor held court and made important announcements. The Inner Court was the emperor's private residence, where he lived with his family and servants.

      One of the most remarkable features is the drainage system. The entire complex slopes gently from north to south, and over a thousand carved stone dragon heads along the edges of terraces act as water spouts during rain, channelling water away from the buildings efficiently.

      Today, the Forbidden City receives over 19 million visitors each year, making it the most visited palace in the world. Walking through its ancient halls and courtyards, visitors can still feel the grandeur and precision of the architects who designed this extraordinary city within a city five centuries ago.
    passageZh: |
      在北京的中心矗立着一座宫殿建筑群，如此庞大以至于包含9,999个房间。紫禁城，也被称为故宫博物院，是中国皇帝近500年的居所，从1420年到1912年。它是世界上保存最好的古代宫殿建筑范例之一。

      紫禁城的建造始于1406年，由明朝永乐皇帝下令。超过一百万名工人花了十四年时间建造。建筑群占地720,000平方米——大约相当于100个足球场——周围环绕着52米宽的护城河和超过七米高的厚城墙。

      紫禁城的每一个细节都具有象征意义。主导墙壁和大门的红色代表好运和喜悦。屋顶上的金黄色琉璃瓦专属于皇帝，因为黄色象征最高权力。数字九，在中国文化中被认为是最吉利的数字，反复出现——在屋顶装饰的排列中、门钉的数量中，甚至在建筑的布局中。

      建筑群分为两个主要部分。外朝用于国家典礼和公务。它包含三个巨大的殿堂，其中最大的——太和殿——是皇帝举行朝会和发布重要公告的地方。内廷是皇帝的私人住所，他与家人和仆人住在那里。

      最引人注目的特征之一是排水系统。整个建筑群从北向南缓缓倾斜，台阶边缘有超过一千个雕刻的石龙头在下雨时充当出水口，有效地将水从建筑物中引走。

      今天，紫禁城每年接待超过1900万游客，是世界上参观人数最多的宫殿。走过它古老的大殿和庭院，游客仍然能感受到五百年前设计这座非凡"城中之城"的建筑师们的宏伟和精确。
