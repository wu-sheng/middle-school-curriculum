        question: 'What does "span" mean in "bridges to span much greater distances"?'
        questionZh: '"bridges to span much greater distances"中的"span"是什么意思？'
        options:
          A: 'To decorate something'
          B: 'To cross or extend across a distance'
          C: 'To measure the height of something'
          D: 'To build something quickly'
        answer: 'B'
