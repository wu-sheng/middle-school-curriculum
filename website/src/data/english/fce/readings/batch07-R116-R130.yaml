  # ============================================================
  # R121 – SimCity: Managing a Virtual Metropolis (Level 3, ~330 words)
  # ============================================================
  - id: R121
    title: 'SimCity: Managing a Virtual Metropolis'
    titleZh: 'SimCity：管理虚拟大都市'
    level: 3
    wordCount: 330
    topic: virtual worlds
    tags: [Q08, month-8]
    source:
      type: 'inspired-by'
      title: 'The History of SimCity'
      author: 'Various gaming publications'
      note: 'Original passage about SimCity and urban planning concepts'
    passage: |
      Long before Minecraft, there was SimCity. Created by Will Wright in 1989, SimCity gave players the power to design, build, and manage an entire city from scratch. Unlike most games at the time, which were about fighting enemies or scoring points, SimCity was about solving problems — and the problems were surprisingly real.

      As mayor of your virtual city, you had to make difficult decisions. Where should you build homes? Where should factories go? How many police stations and fire stations did the city need? If you built too many factories near residential areas, citizens would complain about pollution. If you raised taxes too high, people would leave. If you did not invest in roads and public transport, traffic jams would paralyse the city.

      The genius of SimCity was that it taught players about cause and effect without them realising they were learning. Every decision had consequences. Building a nuclear power plant generated cheap electricity but carried the risk of a meltdown. Ignoring crime led to abandoned neighbourhoods. Spending too much money led to bankruptcy.

      Will Wright later explained that he was inspired by a book called "The Death and Life of Great American Cities" by Jane Jacobs, a famous urban planner. Jacobs argued that the best cities are messy, diverse, and built for people rather than cars. Many of her ideas are reflected in SimCity's scoring system, which rewards cities that balance housing, green space, public services, and economic activity.

      SimCity was not just entertainment. Universities used it to teach urban planning. The United States military used a version to practise managing cities after conflicts. Even real city planners admitted that the game had given them useful insights about how complex systems interact.

      Today, SimCity's legacy lives on in hundreds of city-building games. More importantly, it proved that games can be powerful tools for understanding the real world.
    passageZh: |
      在我的世界之前很久，就有了模拟城市。由 Will Wright 于1989年创作，模拟城市赋予玩家从零开始设计、建造和管理整座城市的权力。与当时大多数关于打败敌人或得分的游戏不同，模拟城市是关于解决问题的——而这些问题出奇地真实。

      作为虚拟城市的市长，你必须做出困难的决定。应该在哪里建造房屋？工厂应该放在哪里？城市需要多少警察局和消防站？如果你在住宅区附近建太多工厂，市民会抱怨污染。如果你把税率提得太高，人们会离开。如果你不投资道路和公共交通，交通堵塞会瘫痪城市。

      模拟城市的天才之处在于它在玩家不知不觉中教会了他们因果关系。每个决定都有后果。建造核电站产生廉价电力，但有熔毁的风险。忽视犯罪导致社区被遗弃。花太多钱导致破产。

      Will Wright 后来解释说，他受到了著名城市规划师简·雅各布斯的书《美国大城市的死与生》的启发。雅各布斯认为最好的城市是杂乱的、多样的，为人而非为汽车建造的。她的许多想法都反映在模拟城市的评分系统中，该系统奖励平衡住房、绿色空间、公共服务和经济活动的城市。

      模拟城市不仅仅是娱乐。大学用它来教授城市规划。美国军方使用一个版本来练习在冲突后管理城市。甚至真正的城市规划者也承认这款游戏给了他们关于复杂系统如何互动的有用洞见。

      今天，模拟城市的遗产延续在数百款城市建设游戏中。更重要的是，它证明了游戏可以是理解现实世界的强大工具。
