  - id: R093
    title: 'The Great Animal Migration'
    titleZh: '动物大迁徙'
    level: 3
    wordCount: 300
    topic: animal behaviour
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'BBC Earth: The Great Migration'
      author: 'BBC'
      note: 'Original passage about animal migration for young readers'
    passage: |
      Every year, billions of animals undertake incredible journeys across the planet. From tiny monarch butterflies to massive humpback whales, these migrations are among the most spectacular events in nature.

      The wildebeest migration in East Africa is perhaps the most famous. Over 1.5 million wildebeest, along with hundreds of thousands of zebras and gazelles, travel in a huge circle across the Serengeti. They follow the rains, searching for fresh grass. The journey covers approximately 3,000 kilometres and takes a full year to complete.

      However, not all migrations happen on land. Arctic terns make the longest migration of any animal, flying from the Arctic to the Antarctic and back again — a round trip of about 70,000 kilometres every year. This small bird sees more daylight than any other creature on Earth because it follows the summer from pole to pole.

      What triggers migration? Scientists believe it is a combination of factors. Changing day length, temperature shifts, and food availability all play a role. Furthermore, many animals appear to have a built-in compass. Salmon use the Earth's magnetic field to navigate thousands of kilometres back to the exact river where they were born. Sea turtles use a similar system to return to the same beach where they hatched, even after 30 years of ocean travel.

      Climate change is disrupting these ancient patterns. As temperatures shift, the timing of food availability changes, but migration schedules cannot always keep up. As a result, some birds arrive at their breeding grounds only to find that the insects they depend on have already peaked weeks earlier. Scientists call this a "mismatch," and it threatens the survival of species that have migrated successfully for millions of years.
    passageZh: |
      每年，数十亿动物在地球上进行令人难以置信的旅程。从微小的帝王蝶到巨大的座头鲸，这些迁徙是自然界中最壮观的事件之一。

      东非的角马迁徙也许是最著名的。超过150万头角马，以及数十万头斑马和瞪羚，在塞伦盖蒂上以巨大的圆圈旅行。它们追随雨水，寻找新鲜的草地。旅程约3,000公里，需要整整一年才能完成。

      然而，并非所有迁徙都发生在陆地上。北极燕鸥进行所有动物中最长的迁徙，从北极飞到南极再返回——每年往返约70,000公里。这种小鸟看到的日光比地球上任何其他生物都多，因为它从一个极到另一个极追随夏天。

      什么触发了迁徙？科学家们认为这是多种因素的组合。日照时间的变化、温度的转变和食物的可用性都起着作用。此外，许多动物似乎有内置的指南针。鲑鱼利用地球磁场导航数千公里回到它们出生的确切河流。海龟使用类似的系统在30年的海洋旅行后回到它们孵化的同一个海滩。

      气候变化正在打乱这些古老的模式。随着温度变化，食物可用性的时间也在改变，但迁徙时间表并不能总是跟上。因此，一些鸟类到达繁殖地时发现它们依赖的昆虫已经在几周前达到高峰。科学家们称之为"不匹配"，它威胁着已经成功迁徙了数百万年的物种的生存。
