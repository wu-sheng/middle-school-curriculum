  - id: R094
    title: 'The Rainforest Pharmacy'
    titleZh: '雨林药房'
    level: 3
    wordCount: 300
    topic: rainforest ecology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'National Geographic Kids: Rainforests'
      author: 'National Geographic'
      note: 'Original passage about rainforest medicinal plants for young readers'
    passage: |
      Deep inside tropical rainforests, some of the most powerful medicines on Earth grow on ordinary-looking trees and plants. Scientists estimate that about 25% of all modern medicines originally come from rainforest plants — yet only 1% of tropical plants have been studied for their medical potential.

      One of the most famous examples is the rosy periwinkle, a small pink flower from Madagascar. Chemicals from this plant are used to treat childhood leukaemia, increasing the survival rate from 20% to over 80%. Similarly, quinine — extracted from the bark of the cinchona tree in South American rainforests — has been used to treat malaria for hundreds of years.

      Indigenous communities have known about these natural remedies for generations. They have used plants to heal wounds, reduce fevers, and fight infections long before modern scientists arrived. Today, many pharmaceutical companies work with indigenous healers to identify plants that might lead to new medicines.

      However, deforestation threatens to destroy these natural resources before they can be discovered. An area of rainforest the size of a football pitch is cut down every six seconds. As a result, plant species are going extinct before scientists can even study them. Some researchers call this "burning the library before reading the books."

      Conservation organizations argue that protecting rainforests is not just an environmental issue — it is a medical one. The cure for diseases that currently have no treatment might be growing in a rainforest right now. For this reason, many countries are creating protected reserves and supporting sustainable forestry practices.

      The rainforest is truly a pharmacy waiting to be explored. Every time a new plant compound is tested, it could lead to a breakthrough that saves thousands of lives.
    passageZh: |
      在热带雨林深处，地球上一些最强效的药物生长在看似普通的树木和植物上。科学家估计约25%的现代药物最初来自雨林植物——然而只有1%的热带植物被研究过其医学潜力。

      最著名的例子之一是长春花，一种来自马达加斯加的小粉花。这种植物中的化学物质用于治疗儿童白血病，使存活率从20%提高到超过80%。类似地，奎宁——从南美雨林中的金鸡纳树树皮中提取——已经被用于治疗疟疾数百年。

      原住民社区世代相传这些天然疗法。早在现代科学家到来之前，他们就已经使用植物来治疗伤口、退烧和对抗感染。今天，许多制药公司与原住民治疗师合作，识别可能产生新药的植物。

      然而，森林砍伐威胁着在这些天然资源被发现之前就将其摧毁。每六秒就有一片足球场大小的雨林被砍伐。因此，植物物种在科学家能够研究它们之前就已灭绝。一些研究人员称之为"在读书之前烧掉图书馆"。

      保护组织认为保护雨林不仅仅是环境问题——它还是医学问题。目前无法治疗的疾病的治愈方法可能正在某个雨林中生长。因此，许多国家正在建立保护区并支持可持续林业实践。

      雨林真正是一个等待探索的药房。每次测试一种新的植物化合物，都可能带来拯救数千人生命的突破。
