  - id: R097
    title: 'The Incredible Tardigrade'
    titleZh: '不可思议的水熊虫'
    level: 3
    wordCount: 290
    topic: biology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'BBC Earth: Tardigrades'
      author: 'BBC'
      note: 'Original passage about tardigrade survival for young readers'
    passage: |
      If you could choose any animal's superpower, you might want the abilities of the tardigrade. Also known as "water bears" because of their round, bear-like shape, these microscopic creatures are the toughest animals on Earth.

      Tardigrades are tiny — most species are less than 0.5 millimetres long, smaller than a grain of sand. You would need a microscope to see one. Despite their small size, they can survive conditions that would instantly kill any other animal.

      They can withstand temperatures from minus 272 degrees Celsius — just above absolute zero — to 150 degrees Celsius. They can survive pressures six times greater than the deepest part of the ocean. They can tolerate radiation doses hundreds of times higher than what would kill a human. Moreover, they have survived being sent into the vacuum of outer space on a European Space Agency mission in 2007.

      How do they do it? When conditions become extreme, tardigrades enter a state called cryptobiosis. They curl into a tiny ball called a "tun," losing up to 97% of their water. In this dried-out state, their metabolism slows to nearly zero. They can remain in this state for decades and spring back to life when water returns.

      Scientists are fascinated by tardigrades because understanding their survival mechanisms could have practical applications. Their proteins might help develop better vaccines that do not need refrigeration or create materials that protect astronauts from radiation during long space missions.

      There are over 1,300 known species of tardigrade, found in every environment on Earth — from the peaks of the Himalayas to the bottom of the ocean, from tropical rainforests to Antarctic ice sheets. Such remarkable adaptability explains why they have survived all five mass extinction events in Earth's history.
    passageZh: |
      如果你可以选择任何动物的超能力，你可能想要水熊虫的能力。也被称为"水熊"因为它们圆圆的、像熊一样的形状，这些微观生物是地球上最坚韧的动物。

      水熊虫非常小——大多数物种不到0.5毫米长，比一粒沙子还小。你需要显微镜才能看到一只。尽管体型小，它们可以在会立即杀死其他任何动物的条件下生存。

      它们可以承受从零下272摄氏度——仅比绝对零度高一点——到150摄氏度的温度。它们可以承受比海洋最深处大六倍的压力。它们可以忍受比杀死人类剂量高数百倍的辐射。此外，它们在2007年欧洲航天局的任务中成功在外太空真空中存活。

      它们是怎么做到的？当条件变得极端时，水熊虫进入一种叫做隐生的状态。它们蜷缩成一个叫做"桶"的小球，失去高达97%的水分。在这种脱水状态下，它们的新陈代谢几乎降到零。它们可以在这种状态下保持数十年，当水回来时重新复活。

      科学家们对水熊虫着迷，因为了解它们的生存机制可能有实际应用。它们的蛋白质可能有助于开发不需要冷藏的更好的疫苗，或创造在长期太空任务中保护宇航员免受辐射的材料。

      目前已知有超过1,300种水熊虫，在地球上的每个环境中都能找到——从喜马拉雅山顶到海底，从热带雨林到南极冰盖。如此非凡的适应能力解释了为什么它们在地球历史上的所有五次大灭绝中都存活了下来。
