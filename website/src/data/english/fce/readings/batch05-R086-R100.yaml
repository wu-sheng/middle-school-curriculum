  # ============================================================
  # R086 – The Secret Life of Octopuses (Level 3, ~320 words)
  # ============================================================
  - id: R086
    title: 'The Secret Life of Octopuses'
    titleZh: '章鱼的秘密生活'
    level: 3
    wordCount: 320
    topic: marine biology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'National Geographic Kids: Octopuses'
      author: 'National Geographic'
      note: 'Original passage inspired by research on octopus intelligence'
    passage: |
      For a long time, scientists believed that only mammals could be truly intelligent. However, research over the past twenty years has shown that octopuses are among the smartest creatures on the planet.

      Octopuses have about 500 million neurons — more than most other invertebrates. What makes them even more unusual is that two-thirds of these neurons are located in their eight arms, not in their brain. This means each arm can taste, touch, and even make decisions independently.

      [1]

      In one famous experiment at a New Zealand aquarium, an octopus named Inky escaped from his tank by squeezing through a narrow drain pipe and sliding across the floor to the sea. The staff found nothing but a trail of water the next morning. Inky had planned his route and waited until the room was empty before making his move.

      [2]

      Furthermore, octopuses are master builders. Some species collect coconut shells and carry them across the ocean floor to use as portable shelters. Scientists consider this a form of tool use — a behaviour once thought to be unique to primates and birds.

      [3]

      Perhaps the most remarkable ability is their camouflage. Octopuses can change their colour, pattern, and even skin texture in less than a second. They achieve this using special cells called chromatophores, which contain tiny sacs of pigment that expand or contract to create different colours. As a result, an octopus can perfectly match the appearance of coral, seaweed, or even the sandy ocean floor.

      Despite these extraordinary abilities, octopuses live surprisingly short lives — most species survive for only one to two years. Nevertheless, in that brief time, they demonstrate a level of intelligence that continues to amaze researchers around the world.
    passageZh: |
      长期以来，科学家们认为只有哺乳动物才能真正拥有智慧。然而，过去二十年的研究表明，章鱼是地球上最聪明的生物之一。

      章鱼有大约5亿个神经元——比大多数其他无脊椎动物都多。更不寻常的是，这些神经元的三分之二位于它们的八条手臂中，而不是大脑中。这意味着每条手臂都可以独立地品尝、触摸，甚至做出决定。

      [1]

      在新西兰水族馆的一个著名实验中，一只名叫 Inky 的章鱼通过挤过一条狭窄的排水管并滑过地面逃到了大海。第二天早上，工作人员只发现了一条水痕。Inky 事先规划了路线，等到房间里没人时才行动。

      [2]

      此外，章鱼是大师级的建造者。有些种类收集椰子壳并把它们搬过海底，用作可移动的庇护所。科学家认为这是一种工具使用——这种行为曾被认为是灵长类和鸟类独有的。

      [3]

      也许最了不起的能力是它们的伪装。章鱼可以在不到一秒钟内改变颜色、图案，甚至皮肤纹理。它们通过被称为色素细胞的特殊细胞来实现这一点，这些细胞包含微小的色素囊，通过膨胀或收缩来产生不同的颜色。因此，章鱼可以完美地模仿珊瑚、海藻，甚至沙质海底的外观。

      尽管拥有这些非凡的能力，章鱼的寿命却出奇地短——大多数物种只能存活一到两年。然而，在这短暂的时间里，它们展现出的智慧水平继续让世界各地的研究人员感到惊叹。
    vocabHighlights:
      - word: organism
        ref: V0766
      - word: camouflage
        ref: V0796
      - word: evidence
        ref: V0776
    questions:
      - id: R086-Q1
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [1]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[1]？'
        options:
          A: 'These remarkable brain structures allow octopuses to solve complex problems that would challenge most other animals.'
          B: 'Coral reefs provide shelter for thousands of marine species around the world.'
          C: 'Dolphins are also known for their intelligence and playful behaviour.'
        answer: 'A'
        explanation: 'Gap [1] follows a paragraph about octopus neurons in their arms. "These remarkable brain structures" refers back to the neurons described, and "solve complex problems" leads naturally into the Inky escape story.'
        explanationZh: '空缺[1]在描述章鱼手臂中神经元的段落之后。"These remarkable brain structures"指代所描述的神经元，"solve complex problems"自然引出 Inky 逃跑的故事。'
      - id: R086-Q2
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [2]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[2]？'
        options:
          A: 'Such behaviour shows that octopuses can plan ahead and remember spatial information.'
          B: 'The aquarium was closed for repairs the following week.'
          C: 'Octopuses eat mostly crabs, shrimp, and small fish.'
        answer: 'A'
        explanation: 'Gap [2] follows the Inky escape story. "Such behaviour" refers to the planned escape, and it bridges to the next paragraph about tool use (another sign of intelligence).'
        explanationZh: '空缺[2]在 Inky 逃跑故事之后。"Such behaviour"指代有计划的逃跑，衔接到下一段关于工具使用（另一个智慧的标志）。'
      - id: R086-Q3
        type: gapped-text
        question: 'Which paragraph (A, B, or C) best fits gap [3]?'
        questionZh: '哪个段落（A、B或C）最适合填入空缺[3]？'
        options:
          A: 'However, the tool use debate continues among marine biologists who disagree about the definition.'
          B: 'This is not the only surprising skill these creatures possess.'
          C: 'Fish populations have been declining due to overfishing in many parts of the world.'
        answer: 'B'
        explanation: 'Gap [3] comes after tool use and before camouflage. "This is not the only surprising skill" bridges from tool use to the next ability (camouflage), keeping the flow of listing remarkable abilities.'
        explanationZh: '空缺[3]在工具使用之后、伪装之前。"This is not the only surprising skill"从工具使用过渡到下一个能力（伪装），保持了列举非凡能力的流畅性。'
      - id: R086-Q4
        type: vocabulary-in-context
        question: 'What does "portable" mean in the passage?'
        questionZh: '文中的"portable"是什么意思？'
        options:
          A: 'Very heavy and difficult to move'
          B: 'Easy to carry from place to place'
          C: 'Made of natural materials'
          D: 'Designed for underwater use'
        answer: 'B'
        explanation: 'Octopuses "carry" coconut shells "across the ocean floor" to use as shelters. "Portable" means something you can carry around — a movable shelter.'
        explanationZh: '章鱼"搬运"椰子壳"穿过海底"来用作庇护所。"Portable"意思是你可以随身携带的——一个可移动的庇护所。'

  # ============================================================
  # R087 – How Bees Talk to Each Other (Level 3, ~310 words)
  # ============================================================
  - id: R087
    title: 'How Bees Talk to Each Other'
    titleZh: '蜜蜂如何互相交流'
    level: 3
    wordCount: 310
    topic: animal communication
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'TED-Ed: The Waggle Dance of the Honeybee'
      author: 'TED-Ed'
      note: 'Original passage inspired by Karl von Frisch research on bee communication'
    passage: |
      When a honeybee discovers a patch of delicious flowers, it faces a problem: how can it tell the other 50,000 bees in the hive exactly where to go? The answer is one of the most amazing forms of communication in the animal kingdom — the waggle dance.

      When the scout bee returns to the dark hive, it performs a special figure-eight dance on the vertical surface of the honeycomb. The direction of the straight part of the dance tells other bees which way to fly relative to the sun. If the bee waggles upward, the food is towards the sun. If it waggles to the left, the food is to the left of the sun.

      The duration of the waggle is equally important. A longer waggle means the food is farther away. Scientists have calculated that each second of waggling represents approximately one kilometre of distance. As a result, bees can communicate the exact location of flowers up to 10 kilometres away.

      Furthermore, the energy and enthusiasm of the dance tells other bees about the quality of the food source. A bee that has found a rich patch of nectar dances faster and more vigorously than one that has found only a few flowers. Consequently, more bees will be recruited to the better food sources.

      This remarkable communication system was first decoded by Austrian scientist Karl von Frisch in the 1940s. Initially, many scientists refused to believe that insects could communicate such precise information. Nevertheless, repeated experiments confirmed his findings, and he was awarded the Nobel Prize in 1973.

      Recent research has revealed even more complexity. Bees can adjust their dance for wind speed, and they can even tell other bees about the danger of predators near the food source. Such sophisticated communication from a brain smaller than a pinhead continues to astonish scientists.
    passageZh: |
      当一只蜜蜂发现一片美味的花丛时，它面临一个问题：如何准确地告诉蜂巢中其他50,000只蜜蜂去哪里？答案是动物王国中最令人惊叹的交流方式之一——摇摆舞。

      当侦察蜂回到黑暗的蜂巢时，它在蜂巢垂直表面上跳一种特殊的8字形舞蹈。舞蹈直线部分的方向告诉其他蜜蜂相对于太阳应该往哪个方向飞。如果蜜蜂向上摇摆，食物在太阳方向。如果向左摇摆，食物在太阳左边。

      摇摆的持续时间同样重要。更长的摇摆意味着食物更远。科学家计算出每秒钟的摇摆大约代表一公里的距离。因此，蜜蜂可以传达10公里以外花朵的确切位置。

      此外，舞蹈的能量和热情告诉其他蜜蜂食物源的质量。发现了丰富花蜜的蜜蜂比只发现了几朵花的蜜蜂跳得更快更有力。因此，更多的蜜蜂会被招募到更好的食物源。

      这个非凡的交流系统最初是由奥地利科学家 Karl von Frisch 在1940年代破译的。起初，许多科学家拒绝相信昆虫能传达如此精确的信息。然而，反复的实验证实了他的发现，他在1973年获得了诺贝尔奖。

      最近的研究揭示了更多的复杂性。蜜蜂可以根据风速调整舞蹈，甚至可以告诉其他蜜蜂食物源附近有捕食者的危险。来自比针头还小的大脑的如此复杂的交流方式继续让科学家们感到惊叹。
    vocabHighlights:
      - word: observation
        ref: V0775
      - word: evidence
        ref: V0776
      - word: species
        ref: V0753
    questions:
      - id: R087-Q1
        type: main-idea
        question: 'What is the main purpose of the waggle dance?'
        questionZh: '摇摆舞的主要目的是什么？'
        options:
          A: 'To entertain other bees in the hive'
          B: 'To communicate the exact location and quality of food'
          C: 'To choose a new queen for the colony'
          D: 'To warn the hive about approaching storms'
        answer: 'B'
        explanation: 'The passage explains that the waggle dance communicates direction, distance, and quality of food sources.'
        explanationZh: '文章解释了摇摆舞传达食物源的方向、距离和质量。'
      - id: R087-Q2
        type: detail
        question: 'How does the bee indicate that food is closer or farther away?'
        questionZh: '蜜蜂如何表示食物更近或更远？'
        options:
          A: 'By changing the speed of the dance'
          B: 'By facing a different direction'
          C: 'By varying the length of the waggle'
          D: 'By making different sounds'
        answer: 'C'
        explanation: 'The passage states "A longer waggle means the food is farther away" — duration indicates distance.'
        explanationZh: '文章指出"更长的摇摆意味着食物更远"——持续时间表示距离。'
      - id: R087-Q3
        type: inference
        question: 'Why did Karl von Frisch receive the Nobel Prize?'
        questionZh: 'Karl von Frisch 为什么获得诺贝尔奖？'
        options:
          A: 'He invented a machine to translate bee language'
          B: 'He trained bees to dance in specific patterns'
          C: 'He decoded and proved how bees communicate through dance'
          D: 'He discovered a new species of honeybee'
        answer: 'C'
        explanation: 'The passage says he "decoded" the dance system and "repeated experiments confirmed his findings," leading to the Nobel Prize.'
        explanationZh: '文章说他"破译"了舞蹈系统，"反复实验证实了他的发现"，从而获得诺贝尔奖。'
      - id: R087-Q4
        type: vocabulary-in-context
        question: 'What does "recruited" most likely mean in the passage?'
        questionZh: '文中的"recruited"最可能是什么意思？'
        options:
          A: 'Punished and sent away'
          B: 'Attracted and brought to help'
          C: 'Lost and confused'
          D: 'Frightened and scared off'
        answer: 'B'
        explanation: 'More bees will be "recruited" to better food sources — they are attracted and sent to help collect nectar from the best flowers.'
        explanationZh: '更多蜜蜂会被"招募"到更好的食物源——它们被吸引并派去帮助从最好的花朵上采集花蜜。'

  # ============================================================
  # R088 – What Killed the Dinosaurs? (Level 3, ~340 words)
  # ============================================================
  - id: R088
    title: 'What Killed the Dinosaurs?'
    titleZh: '什么杀死了恐龙？'
    level: 3
    wordCount: 340
    topic: paleontology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'BBC Earth: Dinosaur Extinction'
      author: 'BBC'
      note: 'Original passage summarizing leading extinction theories for young readers'
    passage: |
      Sixty-six million years ago, dinosaurs ruled the Earth. They had been the dominant creatures on the planet for over 160 million years. Then, quite suddenly, they disappeared. What could have caused such a massive extinction?

      Initially, scientists had many different theories. Some suggested that a deadly disease spread among dinosaur populations. Others believed that small mammals ate dinosaur eggs, slowly reducing their numbers over thousands of years. However, none of these theories could explain why so many different species — both on land and in the sea — all vanished at the same time.

      The breakthrough came in 1980, when physicist Luis Alvarez and his son Walter discovered an unusual layer of clay in rocks dating from exactly 66 million years ago. This clay contained extremely high levels of iridium — a metal that is rare on Earth but common in asteroids. The Alvarez team proposed a bold hypothesis: a massive asteroid had struck the Earth, causing a global catastrophe.

      Subsequently, in 1991, scientists found the "smoking gun" — a giant crater buried beneath the Yucatan Peninsula in Mexico. The Chicxulub crater is approximately 180 kilometres wide, suggesting the asteroid was about 10 kilometres across — roughly the size of a city.

      Scientists now believe the impact triggered a chain of devastating events. The collision launched trillions of tonnes of dust and rock into the atmosphere. As a result, sunlight was blocked for months, temperatures dropped dramatically, and plants could not photosynthesize. Without plants, herbivorous dinosaurs starved. Consequently, the carnivores that preyed on them also perished.

      Nevertheless, not all life was destroyed. Small mammals, birds, crocodiles, and sea turtles managed to survive. These survivors eventually evolved to fill the ecological gaps left by the dinosaurs. In fact, without the asteroid impact, mammals might never have become the dominant animals — and humans might never have existed at all.
    passageZh: |
      六千六百万年前，恐龙统治着地球。它们作为地球上的统治生物已超过1.6亿年。然后，相当突然地，它们消失了。什么可能导致了如此大规模的灭绝？

      最初，科学家们有许多不同的理论。有些人认为一种致命疾病在恐龙种群中传播。另一些人相信小型哺乳动物偷吃恐龙蛋，在数千年里慢慢减少了它们的数量。然而，这些理论都无法解释为什么如此多不同的物种——无论是陆地上的还是海洋中的——都在同一时间消失了。

      突破发生在1980年，物理学家 Luis Alvarez 和他的儿子 Walter 在恰好可以追溯到6600万年前的岩石中发现了一层不寻常的粘土。这层粘土含有极高水平的铱——一种在地球上很稀有但在小行星中很常见的金属。Alvarez 团队提出了一个大胆的假说：一颗巨大的小行星撞击了地球，造成了全球性灾难。

      随后，1991年，科学家们找到了"确凿证据"——一个埋在墨西哥尤卡坦半岛地下的巨大陨石坑。希克苏鲁伯陨石坑宽约180公里，表明小行星大约10公里宽——大致相当于一座城市的大小。

      科学家们现在认为撞击引发了一连串毁灭性事件。碰撞将数万亿吨灰尘和岩石送入大气层。因此，阳光被阻挡了数月，温度急剧下降，植物无法进行光合作用。没有植物，食草恐龙饿死了。随之而来的是，以它们为食的食肉恐龙也灭亡了。

      然而，并非所有生命都被摧毁。小型哺乳动物、鸟类、鳄鱼和海龟设法存活了下来。这些幸存者最终进化填补了恐龙留下的生态空缺。事实上，如果没有小行星撞击，哺乳动物可能永远不会成为统治动物——人类也可能根本不会存在。
    vocabHighlights:
      - word: extinction
        ref: V0757
      - word: hypothesis
        ref: V0773
      - word: asteroid
        ref: V0814
    questions:
      - id: R088-Q1
        type: main-idea
        question: 'What is the passage mainly about?'
        questionZh: '这篇文章主要讲什么？'
        options:
          A: 'The different species of dinosaurs that existed'
          B: 'How scientists discovered the cause of dinosaur extinction'
          C: 'Why mammals are more intelligent than dinosaurs'
          D: 'The life cycle of the Tyrannosaurus Rex'
        answer: 'B'
        explanation: 'The passage traces the scientific journey from early theories to the asteroid impact discovery.'
        explanationZh: '文章追溯了从早期理论到小行星撞击发现的科学历程。'
      - id: R088-Q2
        type: detail
        question: 'What evidence did the Alvarez team find in 1980?'
        questionZh: 'Alvarez 团队在1980年发现了什么证据？'
        options:
          A: 'A giant crater in Mexico'
          B: 'Dinosaur bones with disease marks'
          C: 'A clay layer with high levels of iridium'
          D: 'Fossil eggs eaten by mammals'
        answer: 'C'
        explanation: 'The passage states they found "an unusual layer of clay" with "extremely high levels of iridium."'
        explanationZh: '文章指出他们发现了"一层不寻常的粘土"，含有"极高水平的铱"。'
      - id: R088-Q3
        type: inference
        question: 'What does the passage suggest about the relationship between the asteroid impact and human existence?'
        questionZh: '文章暗示小行星撞击与人类存在之间有什么关系？'
        options:
          A: 'The asteroid nearly killed all human ancestors'
          B: 'Humans helped prevent a second asteroid strike'
          C: 'Without the extinction of dinosaurs, humans might not have evolved'
          D: 'Humans descended directly from dinosaurs'
        answer: 'C'
        explanation: 'The last paragraph states "without the asteroid impact, mammals might never have become dominant — and humans might never have existed."'
        explanationZh: '最后一段指出"如果没有小行星撞击，哺乳动物可能永远不会成为统治者——人类也可能根本不会存在"。'
      - id: R088-Q4
        type: vocabulary-in-context
        question: 'What does "devastating" most likely mean?'
        questionZh: '"devastating"最可能是什么意思？'
        options:
          A: 'Slightly annoying'
          B: 'Extremely destructive'
          C: 'Pleasantly surprising'
          D: 'Gradually improving'
        answer: 'B'
        explanation: 'A "chain of devastating events" led to dinosaur extinction — these events were massively destructive.'
        explanationZh: '"一连串毁灭性事件"导致了恐龙灭绝——这些事件具有巨大的破坏性。'

  # ============================================================
  # R089 – Journey to Mars (Level 3, ~330 words)
  # ============================================================
  - id: R089
    title: 'Journey to Mars'
    titleZh: '火星之旅'
    level: 3
    wordCount: 330
    topic: space exploration
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'NASA Kids Club: Mars Exploration'
      author: 'NASA'
      note: 'Original passage about Mars missions for young readers'
    passage: |
      Humans have been fascinated by Mars for thousands of years. The ancient Romans named it after their god of war because of its blood-red colour. Today, Mars is the planet we are most likely to visit first. But what would it take to send humans there?

      The journey itself presents enormous challenges. Mars is approximately 225 million kilometres from Earth, and a spacecraft would take about seven months to get there. During this time, astronauts would face dangerous levels of cosmic radiation, muscle loss from zero gravity, and the psychological stress of being confined in a small space for months.

      Furthermore, landing on Mars is extraordinarily difficult. The planet has a thin atmosphere — only about 1% as thick as Earth's — which makes it hard to slow down a heavy spacecraft. NASA engineers call the landing process "seven minutes of terror" because so much can go wrong.

      Once on the surface, astronauts would face an environment hostile to human life. The average temperature is minus 60 degrees Celsius. The atmosphere is 95% carbon dioxide, meaning humans cannot breathe outside without a spacesuit. Moreover, dust storms on Mars can cover the entire planet and last for months, blocking solar power and reducing visibility to zero.

      Despite these challenges, space agencies around the world are working towards a crewed Mars mission. NASA plans to send humans to Mars in the 2030s. Meanwhile, private companies like SpaceX are developing reusable rockets that could make the journey more affordable.

      Scientists believe that studying Mars could answer one of humanity's biggest questions: has life ever existed beyond Earth? Evidence suggests that Mars once had rivers, lakes, and possibly even oceans of liquid water. If microscopic life once thrived there, it would change our understanding of the universe forever. Such a discovery would prove that Earth is not unique — and that life may exist throughout the cosmos.
    passageZh: |
      数千年来，人类一直对火星着迷。古罗马人以他们的战神来命名它，因为它的血红色。今天，火星是我们最有可能首先访问的星球。但把人类送到那里需要什么？

      旅程本身就面临着巨大的挑战。火星距离地球约2.25亿公里，飞船大约需要七个月才能到达。在此期间，宇航员将面临危险的宇宙辐射、零重力导致的肌肉萎缩，以及数月被限制在狭小空间中的心理压力。

      此外，在火星着陆极其困难。这颗行星的大气层很薄——只有地球的约1%——这使得减速重型飞船变得困难。NASA工程师将着陆过程称为"恐怖七分钟"，因为太多事情可能出错。

      一旦到达火星表面，宇航员将面临一个对人类生命充满敌意的环境。平均温度为零下60摄氏度。大气层95%是二氧化碳，意味着人类不穿宇航服就无法在外面呼吸。此外，火星上的沙尘暴可以覆盖整个星球并持续数月，阻断太阳能并将能见度降为零。

      尽管面临这些挑战，世界各地的太空机构都在朝着载人火星任务努力。NASA计划在2030年代将人类送上火星。与此同时，像SpaceX这样的私人公司正在开发可重复使用的火箭，使旅程更加经济实惠。

      科学家们相信研究火星可以回答人类最大的问题之一：地球之外是否存在过生命？证据表明火星曾经有河流、湖泊，甚至可能有液态水的海洋。如果微小的生命曾经在那里繁荣，它将永远改变我们对宇宙的理解。这样的发现将证明地球并非独一无二——生命可能存在于整个宇宙中。
