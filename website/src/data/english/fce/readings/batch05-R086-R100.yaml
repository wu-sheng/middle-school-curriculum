  - id: R091
    title: 'The Colourful World of Coral Reefs'
    titleZh: '珊瑚礁的多彩世界'
    level: 3
    wordCount: 310
    topic: coral reefs
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'National Geographic Kids: Coral Reefs'
      author: 'National Geographic'
      note: 'Original passage about coral reef ecosystems for young readers'
    passage: |
      Coral reefs are sometimes called the "rainforests of the sea" because they support an astonishing variety of life. Although they cover less than 1% of the ocean floor, they are home to approximately 25% of all marine species. How can such a small area support so much life?

      The answer lies in the relationship between coral and a type of tiny algae called zooxanthellae. These microscopic organisms live inside the coral's tissue and produce food through photosynthesis. In return, the coral provides the algae with a safe home and the nutrients they need to grow. This partnership is so efficient that it allows coral reefs to thrive in waters that are otherwise low in nutrients.

      However, this delicate balance is under threat. When ocean temperatures rise even slightly — by just 1 or 2 degrees Celsius — the coral becomes stressed and expels the algae. Without the colourful algae, the coral turns white, a process known as bleaching. If temperatures return to normal quickly, the algae can return and the coral can recover. Nevertheless, if the heat lasts too long, the coral starves and dies.

      Furthermore, coral reefs face other dangers. Ocean acidification, caused by the absorption of carbon dioxide, makes it harder for coral to build their calcium carbonate skeletons. Pollution from land — including fertilizers, sewage, and plastic waste — smothers coral and blocks sunlight.

      Despite these challenges, there is hope. Scientists are breeding heat-resistant coral varieties in laboratories and transplanting them onto damaged reefs. Community groups around the world are creating marine protected areas where fishing and pollution are banned. Moreover, some reefs have shown remarkable resilience, recovering naturally when given enough time and protection.

      The fight to save coral reefs is a race against time. If global temperatures continue to rise, scientists estimate that up to 90% of the world's reefs could be lost by 2050. For the millions of species that depend on them — including humans — this would be a catastrophe.
    passageZh: |
      珊瑚礁有时被称为"海洋的雨林"，因为它们支持着惊人的生命多样性。尽管它们只覆盖了不到1%的海底面积，却是约25%海洋物种的家园。如此小的区域怎么能支持如此多的生命？

      答案在于珊瑚和一种叫做虫黄藻的微小藻类之间的关系。这些微观生物生活在珊瑚的组织内，通过光合作用产生食物。作为回报，珊瑚为藻类提供安全的家和它们生长所需的营养。这种伙伴关系如此高效，使珊瑚礁能在原本缺乏营养的水域中繁荣生长。

      然而，这种脆弱的平衡正受到威胁。当海洋温度即使只是轻微上升——仅1到2摄氏度——珊瑚就会受到压力并排出藻类。没有了彩色藻类，珊瑚变白，这个过程被称为白化。如果温度迅速恢复正常，藻类可以回来，珊瑚可以恢复。然而，如果高温持续太久，珊瑚就会饿死。

      此外，珊瑚礁还面临其他危险。由吸收二氧化碳引起的海洋酸化使珊瑚更难建造碳酸钙骨骼。来自陆地的污染——包括化肥、污水和塑料垃圾——窒息珊瑚并阻挡阳光。

      尽管面临这些挑战，仍有希望。科学家们正在实验室中培育耐热珊瑚品种并将它们移植到受损的珊瑚礁上。世界各地的社区团体正在创建禁止捕鱼和污染的海洋保护区。此外，一些珊瑚礁在获得足够的时间和保护后，表现出了显著的恢复力。

      拯救珊瑚礁是一场与时间的赛跑。如果全球温度继续上升，科学家估计到2050年世界上多达90%的珊瑚礁可能消失。对于依赖珊瑚礁的数百万物种——包括人类——来说，这将是一场灾难。
