  - id: R096
    title: 'How Trees Talk to Each Other'
    titleZh: '树木如何互相交流'
    level: 3
    wordCount: 300
    topic: ecology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'TED Talk: Suzanne Simard — How Trees Talk'
      author: 'Suzanne Simard'
      note: 'Original passage inspired by Simard research on fungal networks'
    passage: |
      For centuries, people imagined forests as places where trees compete silently for sunlight and water. However, ground-breaking research by Canadian scientist Suzanne Simard has revealed a very different picture: trees actually cooperate and communicate through a hidden underground network.

      Beneath the forest floor, tree roots connect with a vast web of fungal threads called mycorrhizal networks. Scientists have nicknamed this system the "wood wide web." Through these networks, trees can share sugar, water, and even warning signals with their neighbours.

      Simard discovered that older trees — which she calls "mother trees" — actively support younger trees growing in the shade. A mother tree can recognize her own seedlings and send them extra nutrients through the fungal network. Furthermore, when a mother tree is dying, she transfers her stored carbon to nearby trees, ensuring the forest remains healthy after she is gone.

      Perhaps the most remarkable finding is that trees can warn each other about danger. When a tree is attacked by insects, it releases chemical signals through the fungal network. Neighbouring trees receive these signals and begin producing defensive chemicals before the insects even reach them. As a result, an entire forest can prepare for an attack within hours.

      These discoveries have changed the way scientists think about forests. Instead of viewing trees as individual competitors, they now see forests as cooperative communities where trees of different species support each other. This understanding has important implications for forest management — cutting down the largest, oldest trees may damage the entire network and weaken the forest as a whole.
    passageZh: |
      几个世纪以来，人们想象森林是树木默默竞争阳光和水的地方。然而，加拿大科学家 Suzanne Simard 的突破性研究揭示了一个非常不同的画面：树木实际上通过一个隐藏的地下网络合作和交流。

      在森林地面之下，树根与一个巨大的真菌丝网络相连，称为菌根网络。科学家们给这个系统取了个绰号"木联网"。通过这些网络，树木可以与邻居分享糖分、水分，甚至警告信号。

      Simard 发现年长的树——她称之为"母树"——积极支持在阴影中生长的年幼树木。母树可以识别自己的幼苗并通过真菌网络向它们输送额外的营养。此外，当母树临近死亡时，她会将储存的碳转移给附近的树木，确保森林在她离开后仍然健康。

      也许最了不起的发现是树木可以互相警告危险。当一棵树被昆虫攻击时，它会通过真菌网络释放化学信号。邻近的树木接收到这些信号后会在昆虫到达之前就开始产生防御化学物质。因此，整个森林可以在几小时内为攻击做好准备。

      这些发现改变了科学家对森林的看法。他们不再把树木视为个体竞争者，而是将森林视为合作社区，不同物种的树木互相支持。这种理解对森林管理有重要启示——砍伐最大最古老的树可能会损害整个网络并削弱整片森林。
    vocabHighlights:
