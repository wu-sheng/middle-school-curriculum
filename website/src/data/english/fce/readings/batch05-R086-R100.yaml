  - id: R092
    title: 'Climate Change Explained for Kids'
    titleZh: '给孩子的气候变化科普'
    level: 3
    wordCount: 320
    topic: climate change
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'NASA Climate Kids'
      author: 'NASA'
      note: 'Original passage explaining climate change for young readers'
    passage: |
      Imagine wrapping Earth in a warm blanket. That is essentially what greenhouse gases do. They trap heat from the sun inside our atmosphere, keeping the planet warm enough for life. Without this natural "greenhouse effect," Earth would be a frozen wasteland about 33 degrees colder than it is today.

      The problem is that humans are making the blanket too thick. Since the Industrial Revolution in the 1800s, we have been burning enormous quantities of fossil fuels — coal, oil, and natural gas — for energy. This releases carbon dioxide and other greenhouse gases into the atmosphere. As a result, the blanket is trapping more heat than before, and global temperatures are rising.

      The effects are already visible. Arctic ice is melting at an alarming rate. Sea levels have risen by about 20 centimetres since 1900. Extreme weather events — floods, droughts, and heatwaves — are becoming more frequent and more severe. Furthermore, many animal species are being forced to migrate to cooler areas or face extinction.

      However, it is not all bad news. People around the world are working on solutions. Renewable energy sources like solar panels and wind turbines are becoming cheaper every year. Electric cars are replacing petrol vehicles. Countries are planting billions of trees to absorb carbon dioxide from the air.

      Young people are also making a difference. Millions of students have joined climate marches to demand action from world leaders. Schools are teaching children to reduce, reuse, and recycle. Even small daily choices — like walking instead of driving or eating less meat — can help reduce your carbon footprint.

      Scientists agree that we still have time to prevent the worst effects of climate change. Nevertheless, they warn that we must act quickly. The decisions made in the next ten years will determine the future of our planet for centuries to come.
    passageZh: |
      想象给地球裹上一条温暖的毯子。这基本上就是温室气体所做的。它们将太阳的热量困在大气层中，使地球保持足够温暖以维持生命。没有这种自然的"温室效应"，地球将是一个比现在冷约33度的冰冻荒地。

      问题是人类使毯子变得太厚了。自1800年代工业革命以来，我们一直在燃烧大量化石燃料——煤、石油和天然气——来获取能源。这将二氧化碳和其他温室气体释放到大气中。结果，毯子困住的热量比以前更多，全球温度正在上升。

      影响已经可见。北极冰正在以惊人的速度融化。自1900年以来海平面上升了约20厘米。极端天气事件——洪水、干旱和热浪——变得更加频繁和严重。此外，许多动物物种被迫迁移到更凉爽的地区或面临灭绝。

      然而，并非全是坏消息。世界各地的人们正在努力寻找解决方案。太阳能板和风力涡轮机等可再生能源每年都在变得更便宜。电动汽车正在取代汽油车。各国正在种植数十亿棵树来吸收空气中的二氧化碳。

      年轻人也在做出改变。数百万学生参加了气候游行，要求世界领导人采取行动。学校正在教孩子们减少、重复使用和回收。即使是小小的日常选择——比如步行而不是开车、少吃肉——都能帮助减少你的碳足迹。

      科学家们一致认为我们仍有时间防止气候变化的最严重影响。然而，他们警告说我们必须迅速行动。未来十年做出的决定将决定我们星球未来几个世纪的命运。
