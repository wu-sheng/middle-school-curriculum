  - id: R099
    title: 'Saving the Snow Leopard'
    titleZh: '拯救雪豹'
    level: 3
    wordCount: 290
    topic: conservation
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'WWF: Snow Leopard Conservation'
      author: 'WWF'
      note: 'Original passage about snow leopard conservation efforts'
    passage: |
      High in the mountains of Central Asia, one of the world's most beautiful cats lives in almost total secrecy. The snow leopard is so rarely seen by humans that local people call it the "ghost of the mountains." With fewer than 7,000 left in the wild, this magnificent creature is fighting for survival.

      Snow leopards live at altitudes between 3,000 and 5,500 metres, in some of the harshest conditions on Earth. Their thick fur — covered in grey and black rosette patterns — provides excellent camouflage against the rocky terrain. Their extraordinarily long tails, nearly as long as their bodies, help them balance on steep cliffs and keep warm when wrapped around their faces during snowstorms.

      However, several factors threaten their existence. Climate change is pushing their prey — mountain goats and sheep — to higher elevations where food is scarcer. Poachers hunt them for their beautiful fur, which can sell for thousands of dollars on the black market. Furthermore, as human settlements expand into mountain areas, snow leopards sometimes kill livestock, leading herders to hunt them in retaliation.

      Conservation groups are fighting back. The Snow Leopard Trust works with local communities to create "insurance programmes" — when a snow leopard kills a goat, the farmer is compensated financially. This removes the motivation for revenge killing. Moreover, camera traps placed across mountain ranges help scientists track snow leopard populations and movements.

      Perhaps the most innovative solution is "predator-proof corrals" — strong enclosures that protect livestock at night. Since these corrals were introduced in several villages, snow leopard killings by farmers have dropped by over 90%.

      The road to recovery is long, but these efforts offer genuine hope. As one conservationist said, "We don't just save snow leopards — we save the entire mountain ecosystem they help maintain."
    passageZh: |
      在中亚的高山上，世界上最美丽的猫科动物之一几乎在完全的隐秘中生活。雪豹很少被人类看到，当地人称它为"山上的幽灵"。野外仅剩不到7,000只，这种壮丽的生物正在为生存而战。

      雪豹生活在海拔3,000到5,500米之间，在地球上最严酷的条件下。它们厚厚的毛——覆盖着灰色和黑色的玫瑰花纹——在岩石地形中提供了出色的伪装。它们异常长的尾巴——几乎和身体一样长——帮助它们在陡峭的悬崖上保持平衡，在暴风雪中缠绕在脸上保暖。

      然而，几个因素威胁着它们的生存。气候变化正在把它们的猎物——山羊和山羊——推向更高的海拔，那里食物更稀缺。偷猎者猎杀它们是为了美丽的毛皮，在黑市上可以卖到数千美元。此外，随着人类定居点扩展到山区，雪豹有时会杀死牲畜，导致牧民进行报复性猎杀。

      保护团体正在反击。雪豹信托与当地社区合作创建"保险计划"——当雪豹杀死一只山羊时，农民得到经济补偿。这消除了报复性杀戮的动机。此外，放置在山脉各处的相机陷阱帮助科学家追踪雪豹的种群和活动。

      也许最创新的解决方案是"防捕食者围栏"——在夜间保护牲畜的坚固围栏。自从这些围栏被引入几个村庄以来，农民杀害雪豹的数量下降了90%以上。

