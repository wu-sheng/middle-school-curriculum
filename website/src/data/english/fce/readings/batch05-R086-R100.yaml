  - id: R090
    title: 'Creatures of the Deep Sea'
    titleZh: '深海生物'
    level: 3
    wordCount: 300
    topic: marine biology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'BBC Earth: The Deep'
      author: 'BBC'
      note: 'Original passage about deep-sea creatures for young readers'
    passage: |
      More than 80% of the ocean remains unexplored. The deepest parts are so dark, cold, and pressurised that they seem like another planet. Nevertheless, thousands of extraordinary creatures call this extreme environment home.

      In the midnight zone, below 1,000 metres, no sunlight reaches. Many deep-sea animals have evolved an amazing ability called bioluminescence — they produce their own light using chemical reactions inside their bodies. The anglerfish, for example, has a glowing lure on top of its head that attracts prey in the darkness. Other creatures, like certain species of jellyfish, flash bright blue light to confuse predators.

      At even greater depths, the pressure is immense. At the bottom of the Mariana Trench, 11 kilometres down, the pressure is over 1,000 times that at the surface. Despite this, scientists have discovered snailfish, shrimp-like amphipods, and even single-celled organisms thriving there. These creatures have special proteins in their cells that prevent their bodies from being crushed.

      Food is scarce in the deep ocean because there is no sunlight for photosynthesis. As a result, many deep-sea animals depend on "marine snow" — tiny particles of dead organisms and waste that slowly drift down from the surface. Some communities, however, have found a completely different food source: hydrothermal vents. These underwater volcanoes release superheated water rich in minerals, supporting entire ecosystems without any sunlight at all.

      Perhaps the strangest deep-sea creature is the giant squid. Growing up to 13 metres long, it has the largest eyes in the animal kingdom — each one the size of a dinner plate. Such enormous eyes help it detect the faintest flickers of bioluminescent light in the total darkness of the deep ocean.
    passageZh: |
      超过80%的海洋仍未被探索。最深的部分如此黑暗、寒冷和高压，以至于它们看起来像另一个星球。然而，数千种非凡的生物在这种极端环境中安家。

      在1,000米以下的午夜区，没有阳光到达。许多深海动物进化出了一种叫做生物发光的惊人能力——它们利用体内的化学反应产生自己的光。例如，鮟鱇鱼头顶上有一个发光的诱饵，在黑暗中吸引猎物。其他生物，如某些种类的水母，闪烁明亮的蓝光来迷惑捕食者。

      在更深的地方，压力是巨大的。在马里亚纳海沟底部，11公里深处，压力是水面的1,000倍以上。尽管如此，科学家们发现了蜗牛鱼、类似虾的端足类动物，甚至单细胞生物在那里繁荣生长。这些生物的细胞中有特殊的蛋白质，防止它们的身体被压碎。

      深海中食物稀缺，因为没有阳光进行光合作用。因此，许多深海动物依赖"海洋雪"——从水面慢慢飘落的死亡生物体和废物的微小颗粒。然而，一些群落找到了完全不同的食物来源：热液喷口。这些水下火山释放出富含矿物质的过热水，在完全没有阳光的情况下支持着整个生态系统。

      也许最奇怪的深海生物是巨型乌贼。它可以长到13米长，拥有动物界最大的眼睛——每只有一个餐盘那么大。如此巨大的眼睛帮助它在深海完全的黑暗中探测到最微弱的生物发光闪烁。
    vocabHighlights:
      - word: organism
        ref: V0766
      - word: predator
        ref: V0767
