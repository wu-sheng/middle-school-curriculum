  - id: R095
    title: 'Why Renewable Energy Matters'
    titleZh: '为什么可再生能源很重要'
    level: 3
    wordCount: 310
    topic: renewable energy
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'TED-Ed: Renewable Energy Explained'
      author: 'TED-Ed'
      note: 'Original passage about renewable energy sources for young readers'
    passage: |
      Every time you turn on a light, charge your phone, or ride in a car, you are using energy. For over 200 years, most of this energy has come from burning fossil fuels — coal, oil, and natural gas. However, these fuels create serious problems: they release carbon dioxide that warms the planet, they cause air pollution that harms our health, and they will eventually run out.

      Renewable energy offers a cleaner alternative. Unlike fossil fuels, renewable sources — such as sunlight, wind, and water — will never be used up. The sun will continue shining for another five billion years, the wind will keep blowing, and rivers will keep flowing. Furthermore, these sources produce little or no carbon dioxide, making them far better for the climate.

      Solar energy is growing the fastest. Modern solar panels can convert about 20% of sunlight into electricity. In sunny countries like China, India, and Australia, massive solar farms now generate enough power for millions of homes. Moreover, the cost of solar panels has dropped by over 90% since 2010, making them affordable for ordinary families.

      Wind power is equally promising. Countries like Denmark already generate over 50% of their electricity from wind turbines. Offshore wind farms — built in the sea where winds are stronger and more constant — are becoming increasingly popular in Europe and Asia.

      Nevertheless, renewable energy is not perfect. The sun does not always shine, and the wind does not always blow. This creates a storage problem: how do you save excess energy for cloudy or calm days? Scientists are working on better batteries and other storage solutions to solve this challenge.

      Despite these obstacles, the transition to renewable energy is accelerating. In 2023, renewable sources generated over 30% of global electricity for the first time. Experts predict this will reach 50% by 2030. The age of fossil fuels is slowly coming to an end.
    passageZh: |
      每次你开灯、给手机充电或坐车时，你都在使用能量。200多年来，大部分能量来自燃烧化石燃料——煤、石油和天然气。然而，这些燃料造成了严重的问题：它们释放的二氧化碳使地球变暖，造成危害健康的空气污染，而且最终会耗尽。

      可再生能源提供了更清洁的替代方案。与化石燃料不同，可再生能源——如阳光、风和水——永远不会被用完。太阳还将继续发光五十亿年，风将继续吹，河流将继续流淌。此外，这些能源几乎不产生二氧化碳，对气候好得多。

      太阳能增长最快。现代太阳能板可以将约20%的阳光转化为电力。在中国、印度和澳大利亚等阳光充足的国家，大型太阳能农场现在能为数百万家庭供电。而且，自2010年以来太阳能板的成本下降了90%以上，普通家庭也能负担得起。

      风能同样前景光明。丹麦等国家已经从风力涡轮机中产生了超过50%的电力。海上风电场——建在海上，那里风力更强更稳定——在欧洲和亚洲越来越受欢迎。

      然而，可再生能源并不完美。太阳并不总是照耀，风也不总是吹。这造成了储能问题：如何为阴天或无风天储存多余的能量？科学家们正在开发更好的电池和其他储能方案来解决这个挑战。

      尽管存在这些障碍，向可再生能源的过渡正在加速。2023年，可再生能源首次产生了全球30%以上的电力。专家预测到2030年将达到50%。化石燃料时代正在慢慢走向终结。
