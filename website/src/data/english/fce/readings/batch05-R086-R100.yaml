  - id: R098
    title: 'The Language of Dolphins'
    titleZh: '海豚的语言'
    level: 3
    wordCount: 300
    topic: animal communication
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'National Geographic: Dolphin Communication'
      author: 'National Geographic'
      note: 'Original passage about dolphin communication research'
    passage: |
      Dolphins are widely considered to be among the most intelligent animals on Earth. However, what truly sets them apart is their sophisticated communication system. Recent research suggests that dolphin communication may be far more complex than scientists previously imagined.

      Each bottlenose dolphin develops a unique "signature whistle" within the first few months of life — essentially a name that other dolphins use to call them. When two dolphins that know each other meet, they exchange signature whistles as a greeting. Furthermore, dolphins can remember the signature whistles of individuals they have not seen for over 20 years.

      Beyond individual names, dolphins use a wide variety of clicks, whistles, and body movements to share information. High-frequency clicks are used for echolocation — a sonar-like system that helps dolphins "see" underwater by bouncing sound off objects. Lower-frequency sounds appear to serve a social function, expressing emotions or coordinating group activities.

      In 2016, researchers at the Karadag Nature Reserve in Ukraine made a breakthrough discovery. They recorded two dolphins — named Yasha and Yana — taking turns to produce sequences of clicks that the other listened to without interrupting. The researchers suggested that this pattern resembled human conversation, with each dolphin waiting for the other to finish before responding.

      Nevertheless, translating dolphin language remains extremely difficult. Unlike human language, which uses words made of individual sounds, dolphin communication appears to be holistic — each sound conveys a complete idea rather than being built from smaller units. Consequently, creating a "dolphin dictionary" has proven to be far more challenging than scientists initially hoped.

      What is clear is that dolphins have a level of social intelligence that rivals that of great apes. Such findings continue to raise important questions about animal consciousness and our responsibility to protect these remarkable creatures.
    passageZh: |
      海豚被普遍认为是地球上最聪明的动物之一。然而，真正使它们与众不同的是它们复杂的交流系统。最近的研究表明，海豚的交流可能比科学家之前想象的要复杂得多。

      每只宽吻海豚在生命的最初几个月内都会发展出一种独特的"签名哨声"——本质上是其他海豚用来叫它们的名字。当两只认识的海豚相遇时，它们交换签名哨声作为问候。此外，海豚可以记住超过20年没见过的个体的签名哨声。

      除了个人名字，海豚还使用各种各样的咔嗒声、哨声和身体动作来分享信息。高频咔嗒声用于回声定位——一种类似声纳的系统，帮助海豚通过将声音弹射到物体上来"看到"水下环境。较低频率的声音似乎具有社交功能，表达情感或协调群体活动。

      2016年，乌克兰卡拉达格自然保护区的研究人员取得了突破性发现。他们录下了两只海豚——名叫 Yasha 和 Yana——轮流产生咔嗒声序列，另一只在不打断的情况下倾听。研究人员认为这种模式类似于人类对话，每只海豚等待对方说完再回应。

      然而，翻译海豚语言仍然极其困难。与使用由单个声音组成的单词的人类语言不同，海豚的交流似乎是整体性的——每个声音传达一个完整的想法，而不是由更小的单元构建。因此，创建"海豚词典"被证明比科学家最初希望的要困难得多。

      很明显的是，海豚拥有与类人猿相媲美的社会智能水平。这些发现继续提出关于动物意识和我们保护这些了不起生物的责任的重要问题。
