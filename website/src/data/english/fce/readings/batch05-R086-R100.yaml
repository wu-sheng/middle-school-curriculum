  - id: R100
    title: 'The Ocean''s Invisible Forest'
    titleZh: '海洋的隐形森林'
    level: 3
    wordCount: 310
    topic: marine ecology
    tags: [Q06, month-6]
    source:
      type: 'inspired-by'
      title: 'TED-Ed: Phytoplankton'
      author: 'TED-Ed'
      note: 'Original passage about the importance of phytoplankton'
    passage: |
      When people think about the oxygen they breathe, they usually thank trees and forests. However, the truth is that over half of the world's oxygen comes from a source most people have never seen — tiny organisms called phytoplankton floating in the ocean.

      Phytoplankton are microscopic plant-like organisms that live near the surface of the ocean where sunlight can reach. Like trees, they use photosynthesis to convert carbon dioxide and sunlight into food, releasing oxygen as a by-product. Although each individual phytoplankton is invisible to the naked eye, together they form a vast "invisible forest" that produces more oxygen than all the world's trees combined.

      Furthermore, phytoplankton play a crucial role in the global carbon cycle. They absorb billions of tonnes of carbon dioxide from the atmosphere each year. When they die, many sink to the ocean floor, taking the carbon with them and locking it away for thousands of years. Scientists call this process the "biological pump" because it effectively pumps carbon from the atmosphere into the deep ocean.

      Despite their importance, phytoplankton populations have been declining. Studies suggest that warming ocean temperatures have reduced phytoplankton numbers by approximately 40% since 1950. As waters warm, the surface layer becomes more stable and stops mixing with the nutrient-rich deeper water. Consequently, phytoplankton near the surface cannot get the nutrients they need to grow.

      This decline has alarming consequences. Phytoplankton are the foundation of the entire marine food chain. Small fish eat phytoplankton, larger fish eat the small fish, and so on. If phytoplankton disappear, the effects would cascade through every level of ocean life.

      Scientists are now monitoring phytoplankton populations from space using satellites that detect the green colour of chlorophyll in the water. Such technology allows them to track changes across the entire ocean in real time and sound the alarm if populations drop too quickly.
    passageZh: |
      当人们想到呼吸的氧气时，通常会感谢树木和森林。然而，事实是世界上超过一半的氧气来自一个大多数人从未见过的来源——漂浮在海洋中被称为浮游植物的微小生物。

      浮游植物是微观的类植物生物，生活在阳光能到达的海洋表面附近。像树木一样，它们利用光合作用将二氧化碳和阳光转化为食物，释放氧气作为副产品。虽然每个浮游植物对肉眼来说是看不见的，但它们共同形成了一个巨大的"隐形森林"，产生的氧气比世界上所有树木加在一起还多。

      此外，浮游植物在全球碳循环中扮演着关键角色。它们每年从大气中吸收数十亿吨二氧化碳。当它们死亡时，许多沉到海底，带着碳一起沉下并将其封存数千年。科学家称这个过程为"生物泵"，因为它有效地将碳从大气泵入深海。

      尽管它们很重要，浮游植物的数量一直在下降。研究表明，自1950年以来，海洋温度升高已使浮游植物数量减少了约40%。随着水温升高，表层变得更稳定，停止与富含营养的深层水混合。因此，表层附近的浮游植物无法获得生长所需的营养。

      这种下降有令人担忧的后果。浮游植物是整个海洋食物链的基础。小鱼吃浮游植物，大鱼吃小鱼，以此类推。如果浮游植物消失，影响将级联传递到海洋生命的每一个层级。

      科学家们现在正在从太空用卫星监测浮游植物种群，这些卫星可以检测水中叶绿素的绿色。这种技术使他们能够实时追踪整个海洋的变化，如果种群下降过快就发出警报。
