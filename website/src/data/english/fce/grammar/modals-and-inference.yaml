    type: fill-blank
    tags: [reported-speech, Q03, difficulty-2]
    context: detective
    question: '"Where is the key?" asked the inspector. → The inspector asked where the key _____.'
    questionZh: '"钥匙在哪里？"检查员问道。 → 检查员问钥匙____。'
    answer: 'was'
    explanation: "In reported questions, 'is' shifts to 'was', and we use statement word order (not question order)."
    explanationZh: '在间接疑问句中，is 变为 was，并且使用陈述句语序（不是疑问句语序）。'
    grammarPoint: 'Reported speech: questions'
