    options:
      A: 'has / checked'
      B: 'had / checked'
      C: 'have / checked'
      D: 'was / checking'
    answer: 'B'
    explanation: "Present perfect 'have checked' shifts to past perfect 'had checked' in reported speech."
    explanationZh: '现在完成时 have checked 在间接引语中变为过去完成时 had checked。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
    difficulty: 2

