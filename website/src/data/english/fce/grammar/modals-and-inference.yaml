      B: 'not to touch'
      C: 'not touching'
      D: "didn't touch"
    answer: 'B'
    explanation: "Reported imperatives use 'told/warned + object + (not) to + infinitive'. The correct form is 'not to touch'."
    explanationZh: '间接引语中的祈使句用 told/warned + 宾语 + (not) to + 动词原形。正确形式是 not to touch。'
    grammarPoint: 'Reported speech: imperatives'
    relatedQuest: Q03
    difficulty: 2

