    answer: 'A'
    explanation: "'Should' does not change in reported speech — it stays as 'should'. (Could, might, would also do not change.)"
    explanationZh: 'should 在间接引语中不变——还是 should。（could、might、would 也不变。）'
    grammarPoint: 'Reported speech: modal shift'
    relatedQuest: Q03
    difficulty: 4

