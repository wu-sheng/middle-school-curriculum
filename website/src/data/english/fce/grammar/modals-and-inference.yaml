      A: "mustn't"
      B: "don't have to"
      C: "can't"
      D: "shouldn't"
    answer: 'B'
    explanation: "The club provides one, so bringing your own is optional, not forbidden. 'Don't have to' = it is not necessary."
    explanationZh: '俱乐部提供了，所以自己带是可选的，不是禁止的。don''t have to = 不必。'
