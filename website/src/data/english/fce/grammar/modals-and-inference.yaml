  - id: G0299
    type: multiple-choice
    tags: [mixed-review, Q03, difficulty-4]
    context: detective
    question: 'The guard reported that the alarm _____ at exactly 3 am and that he _____ anyone near the building.'
    questionZh: '保安报告说警报在凌晨3点整____，他____大楼附近的任何人。'
    options:
      A: 'had gone off / hadn''t seen'
      B: 'went off / didn''t see'
      C: 'has gone off / hasn''t seen'
      D: 'goes off / doesn''t see'
    answer: 'A'
    explanation: "Reported speech requires tense backshift. Both 'went off' and 'didn't see' (past simple) shift to past perfect: 'had gone off' / 'hadn't seen'."
    explanationZh: '间接引语需要时态后退。went off 和 didn''t see（一般过去时）都变为过去完成时：had gone off / hadn''t seen。'
