    answer: 'there / next day'
    explanation: "In reported speech, 'here' becomes 'there' and 'tomorrow' becomes 'the next day' (or 'the following day')."
    explanationZh: '在间接引语中，here 变为 there，tomorrow 变为 the next day（或 the following day）。'
