      C: "needn't"
      D: "might not"
    answer: 'A'
    explanation: "A confidential file = you are forbidden to read it. 'Mustn't' = prohibition. 'Don't have to' would mean 'it is optional', which is wrong here."
    explanationZh: '机密文件 = 禁止阅读。mustn''t = 禁止。don''t have to 意思是"不必"，在这里不对。'
