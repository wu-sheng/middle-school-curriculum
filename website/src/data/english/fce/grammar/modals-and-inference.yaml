    explanation: "'Have to' expresses external obligation — the building is closing, so we have no choice."
    explanationZh: 'have to 表示外部义务——大楼要关门了，我们别无选择。'
    grammarPoint: 'Must vs Have to'
    relatedQuest: Q03
    difficulty: 2

  - id: G0247
    type: multiple-choice
    tags: [modals-mixed, Q03, difficulty-2]
