      B: 'would'
      C: 'might'
      D: 'could'
    answer: 'B'
    explanation: "'If I were you, I would...' is a standard way to give advice. 'Would' pairs with the second conditional structure."
    explanationZh: 'If I were you, I would... 是给建议的标准用法。would 与第二条件句结构搭配。'
