  - id: G0300
    type: fill-blank
    tags: [mixed-review, Q03, difficulty-4]
    context: detective
    question: 'The famous detective said: "I _____ (solve) over 500 cases in my career, and this _____ (be) the strangest one yet." Report this speech.'
    questionZh: '著名侦探说："我职业生涯中____（solve）了500多个案子，这____（be）迄今为止最奇怪的一个。"请转述。'
    answer: 'had solved / was'
    explanation: "Reported speech: 'have solved' (present perfect) → 'had solved' (past perfect); 'is' (present simple) → 'was' (past simple)."
    explanationZh: '间接引语：have solved（现在完成时）→ had solved（过去完成时）；is（一般现在时）→ was（一般过去时）。'
    grammarPoint: 'Reported speech: mixed tense shifts'
