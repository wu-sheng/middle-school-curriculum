    type: fill-blank
    tags: [reported-speech, Q03, difficulty-4]
    context: detective
    question: '"The suspect might have escaped through the back door," Officer Chen told me. → Officer Chen told me the suspect _____ through the back door.'
    questionZh: '"嫌疑人可能从后门逃跑了，"陈警官告诉我。 → 陈警官告诉我嫌疑人____从后门逃跑了。'
    answer: 'might have escaped'
    explanation: "'Might have escaped' does not change in reported speech. 'Might' is already a past-shifted form."
    explanationZh: 'might have escaped 在间接引语中不变。might 本身已经是退后的形式。'
    grammarPoint: 'Reported speech: modal shift'
    relatedQuest: Q03
    difficulty: 4

  - id: G0277
    type: multiple-choice
    tags: [reported-speech, Q03, difficulty-4]
