    questionZh: '"你看到任何可疑的人了吗？"警官问我。 → 警官问我____任何可疑的人。'
    options:
      A: 'if I had seen'
      B: 'if I saw'
      C: 'did I see'
      D: 'that I saw'
    answer: 'A'
    explanation: "Yes/no questions use 'if/whether' in reported speech. 'Did you see' (past simple) shifts to 'had seen' (past perfect)."
    explanationZh: '是非问句在间接引语中用 if/whether。did you see（一般过去时）变为 had seen（过去完成时）。'
    grammarPoint: 'Reported speech: questions'
    relatedQuest: Q03
    difficulty: 2

  - id: G0270
    type: fill-blank
    tags: [reported-speech, Q03, difficulty-3]
    context: detective
    question: '"I was sleeping when the alarm went off," said Mr Fox. → Mr Fox said he _____ when the alarm _____.'
    questionZh: '"警报响时我在睡觉，"狐狸先生说。 → 狐狸先生说警报____时他____。'
    answer: 'had been sleeping / had gone off'
    explanation: "Past continuous 'was sleeping' shifts to past perfect continuous 'had been sleeping'. Past simple 'went off' shifts to past perfect 'had gone off'."
    explanationZh: '过去进行时 was sleeping 变为过去完成进行时 had been sleeping。一般过去时 went off 变为过去完成时 had gone off。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
    difficulty: 3

