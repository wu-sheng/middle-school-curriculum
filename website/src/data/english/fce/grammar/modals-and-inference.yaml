    difficulty: 4

  # ============================================================
  # G0241–G0260: Mixed modals
  # Obligation (must/have to/should) vs Deduction (must/can't/might)
  # ============================================================
  - id: G0241
    type: multiple-choice
    tags: [modals-mixed, Q03, difficulty-1]
    context: detective
    question: 'You _____ touch the evidence! It is against the rules.'
    questionZh: '你____碰证据！这违反规定。'
    options:
      A: "mustn't"
      B: "can't (deduction)"
      C: "needn't"
      D: "might not"
    answer: 'A'
    explanation: "Here 'mustn't' means 'you are not allowed to'. This is obligation/prohibition, not deduction."
    explanationZh: '这里 mustn''t 表示"你不被允许"。这是义务/禁止，不是推测。'
    grammarPoint: 'Must: obligation vs deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0242
    type: multiple-choice
    tags: [modals-mixed, Q03, difficulty-1]
    context: detective
    question: 'Detectives _____ wear gloves at a crime scene. It is required.'
    questionZh: '侦探在犯罪现场____戴手套。这是要求。'
    options:
      A: 'must'
      B: 'might'
      C: 'could'
      D: 'would'
    answer: 'A'
    explanation: "'Must' here expresses obligation — it is a rule that detectives follow."
    explanationZh: '这里 must 表示义务——这是侦探要遵守的规定。'
    grammarPoint: 'Must: obligation vs deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0243
    type: fill-blank
    tags: [modals-mixed, Q03, difficulty-1]
    context: detective
    question: 'The suspect looks very nervous. He _____ (must / know) something about the crime.'
    questionZh: '嫌疑人看起来很紧张。他____（must / know）关于犯罪的事情。'
    answer: 'must know'
    explanation: "'Must know' here is deduction — we believe he knows something because he looks nervous."
    explanationZh: '这里 must know 是推测——我们认为他知道什么，因为他看起来很紧张。'
    grammarPoint: 'Must: obligation vs deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0244
    type: multiple-choice
    tags: [modals-mixed, Q03, difficulty-2]
    context: detective
    question: 'Is "must" used for obligation or deduction? "You must report any clues to the detective."'
    questionZh: '"must"在这里表示义务还是推测？"You must report any clues to the detective."'
    options:
      A: 'obligation'
      B: 'deduction'
      C: 'possibility'
      D: 'suggestion'
    answer: 'A'
    explanation: "'You must report' = you are required to report. This is an obligation, not a guess about what is true."
    explanationZh: 'You must report = 你必须报告。这是义务，不是关于事实的猜测。'
    grammarPoint: 'Must: obligation vs deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0245
    type: multiple-choice
    tags: [modals-mixed, Q03, difficulty-2]
    context: detective
    question: 'Is "must" used for obligation or deduction? "She must be the new detective — she has a badge."'
    questionZh: '"must"在这里表示义务还是推测？"She must be the new detective — she has a badge."'
    options:
      A: 'obligation'
      B: 'deduction'
      C: 'ability'
      D: 'permission'
    answer: 'B'
    explanation: "'Must be' followed by evidence (she has a badge) = deduction. We are guessing based on evidence, not giving an order."
    explanationZh: 'must be 后跟证据（她有徽章）= 推测。我们在根据证据猜测，不是在下命令。'
    grammarPoint: 'Must: obligation vs deduction'
    relatedQuest: Q03
    difficulty: 2

