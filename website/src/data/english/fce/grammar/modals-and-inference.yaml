      B: 'she had never seen that man before'
      C: 'she never saw that man before'
      D: 'she had never seen this man ago'
    answer: 'B'
    explanation: "Present perfect → past perfect; 'this man' → 'that man'; 'before' stays the same. Full tense + pronoun + demonstrative shifts."
    explanationZh: '现在完成时 → 过去完成时；this man → that man；before 不变。完整的时态 + 代词 + 指示词变化。'
    grammarPoint: 'Reported speech: full shifts'
    relatedQuest: Q03
    difficulty: 4

