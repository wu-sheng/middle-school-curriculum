      C: 'last day'
      D: 'the yesterday'
    answer: 'B'
    explanation: "In reported speech, 'yesterday' shifts to 'the day before' (or 'the previous day'). Also 'this' becomes 'that'."
    explanationZh: '在间接引语中，yesterday 变为 the day before（或 the previous day）。另外 this 变为 that。'
    grammarPoint: 'Reported speech: time/place shifts'
    relatedQuest: Q03
    difficulty: 3

