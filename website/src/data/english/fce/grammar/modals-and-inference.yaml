    options:
      A: 'She asked me where was the evidence.'
      B: 'She asked me where the evidence was.'
      C: 'She asked me where is the evidence.'
      D: 'She asked me where the evidence is.'
    answer: 'B'
    explanation: "Reported questions need statement word order (subject + verb), not question order. And tense shifts back: is → was."
    explanationZh: '间接疑问句需要陈述句语序（主语 + 动词），不是疑问句语序。时态也要退后：is → was。'
    grammarPoint: 'Reported speech: questions'
    relatedQuest: Q03
    difficulty: 4

