category: 'Modals & Inference'
categoryZh: '情态动词与推断'
questions:
  # ============================================================
  # G0201–G0220: Modal verbs for present deduction
  # must / can't / might / could + be / have
  # ============================================================
  - id: G0201
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-1]
    context: detective
    question: 'The lights are off. They _____ be at home.'
    questionZh: '灯都关了。他们____在家。'
    options:
      A: "mustn't"
      B: "can't"
      C: "shouldn't"
      D: "needn't"
    answer: 'B'
    explanation: "We use 'can't' for strong negative deduction about the present. The evidence (lights off) strongly suggests they are not home."
    explanationZh: '用 can''t 表示对现在的强烈否定推测。证据（灯关着）强烈暗示他们不在家。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0202
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-1]
    context: detective
    question: 'There is a wet umbrella by the door. It _____ be raining outside.'
    questionZh: '门口有一把湿雨伞。外面____在下雨。'
    options:
      A: 'must'
      B: 'might'
      C: 'would'
      D: 'shall'
    answer: 'A'
    explanation: "The wet umbrella is strong evidence, so we use 'must' for a confident deduction."
    explanationZh: '湿雨伞是很强的证据，所以用 must 表示有把握的推测。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0203
    type: fill-blank
    tags: [modals-present, Q03, difficulty-1]
    context: detective
    question: 'Someone left muddy footprints in the hall. The thief _____ (must / be) still nearby.'
    questionZh: '有人在大厅留下了泥脚印。小偷____（must / be）还在附近。'
    answer: 'must be'
    explanation: "We use 'must be' for a strong present deduction based on clear evidence (fresh muddy footprints)."
    explanationZh: '用 must be 表示基于明显证据（新鲜泥脚印）的强烈推测。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0204
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-1]
    context: detective
    question: 'I hear music from the house. Someone _____ be inside.'
    questionZh: '我听到房子里有音乐声。____有人在里面。'
    options:
      A: 'must'
      B: 'mustn''t'
      C: 'can'
      D: 'shall'
    answer: 'A'
    explanation: "Music playing is strong evidence that someone is inside. We use 'must' for confident deduction."
    explanationZh: '音乐声是有人在里面的有力证据。用 must 表示有把握的推测。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0205
    type: fill-blank
    tags: [modals-present, Q03, difficulty-1]
    context: detective
    question: 'The dog is barking at the window. There _____ (might / be) a stranger in the garden.'
    questionZh: '狗在对着窗户叫。花园里____（might / be）有陌生人。'
    answer: 'might be'
    explanation: "The dog barking is some evidence but not conclusive, so we use 'might be' for a possibility."
    explanationZh: '狗叫是一些证据但不确定，所以用 might be 表示可能。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0206
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'Detective Fox found a red hair on the chair. The suspect _____ have red hair.'
    questionZh: '狐狸侦探在椅子上发现了一根红头发。嫌疑人____有红头发。'
    options:
      A: 'must'
      B: 'can'
      C: 'would'
      D: 'shall'
    answer: 'A'
    explanation: "Direct physical evidence (a red hair) leads to a strong deduction. 'Must' expresses near certainty."
    explanationZh: '直接的物证（一根红头发）引出有力的推断。must 表示几乎确定。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0207
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'The window is locked from inside. The thief _____ have come in through the window.'
    questionZh: '窗户从里面锁着。小偷____是从窗户进来的。'
    options:
      A: 'must'
      B: "can't"
      C: 'might'
      D: 'should'
    answer: 'B'
    explanation: "If the window is locked from inside, it is impossible for the thief to have entered that way. We use 'can't' for logical impossibility."
    explanationZh: '如果窗户从里面锁着，小偷不可能从窗户进来。用 can''t 表示逻辑上不可能。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0208
    type: fill-blank
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'The cookie jar is empty, but nobody admits eating them. It _____ (could / be) the cat — cats love fish, not cookies!'
    questionZh: '饼干罐空了，但没人承认吃了。____（could / be）是猫干的——猫喜欢鱼，不喜欢饼干！'
    answer: "could be"
    explanation: "'Could be' expresses a weak possibility. It is unlikely the cat ate cookies, but we cannot completely rule it out."
    explanationZh: 'could be 表示较弱的可能性。猫吃饼干不太可能，但不能完全排除。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0209
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'The suspect says he is a chef, but he does not know how to crack an egg. He _____ be telling the truth.'
    questionZh: '嫌疑人说他是厨师，但他不会打鸡蛋。他____在说实话。'
    options:
      A: 'must'
      B: "can't"
      C: 'will'
      D: 'shall'
    answer: 'B'
    explanation: "A chef who cannot crack an egg is contradictory. 'Can''t be' expresses that we are almost sure he is lying."
    explanationZh: '不会打鸡蛋的厨师自相矛盾。can''t 表示我们几乎确定他在撒谎。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0210
    type: fill-blank
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'The treasure map is written in code. The person who made it _____ (must / be) very clever.'
    questionZh: '藏宝图是用密码写的。画这张图的人____（must / be）非常聪明。'
    answer: 'must be'
    explanation: "Writing in code requires intelligence. This strong evidence supports 'must be' for a confident deduction."
    explanationZh: '用密码写东西需要智慧。有力的证据支持用 must be 表示自信的推测。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0211
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-2]
    context: detective
    question: 'The suspect has paint on her hands. She _____ be the one who drew the graffiti.'
    questionZh: '嫌疑人手上有油漆。她____就是画涂鸦的人。'
    options:
      A: 'might'
      B: "can't"
      C: 'mustn''t'
      D: 'would'
    answer: 'A'
    explanation: "Paint on her hands is some evidence, but she could be an artist. 'Might' shows it is possible but not certain."
    explanationZh: '手上有油漆是一些证据，但她可能是画家。might 表示可能但不确定。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0212
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'Choose the correct sentence about present deduction.'
    questionZh: '选出关于现在推测的正确句子。'
    options:
      A: 'He mustn''t be the thief — he was at school.'
      B: 'He can''t be the thief — he was at school.'
      C: 'He shouldn''t be the thief — he was at school.'
      D: 'He won''t be the thief — he was at school.'
    answer: 'B'
    explanation: "For negative deduction (logical impossibility), we use 'can't', not 'mustn't'. 'Mustn't' means 'it is forbidden', not 'it is impossible'."
    explanationZh: '表示否定推测（逻辑上不可能）用 can''t，不用 mustn''t。mustn''t 表示"禁止"，不是"不可能"。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0213
    type: fill-blank
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'The safe is still locked and the code has not been cracked. The diamonds _____ (must / still / be) inside.'
    questionZh: '保险箱还锁着，密码没有被破解。钻石____（must / still / be）在里面。'
    answer: 'must still be'
    explanation: "If the safe is locked and uncracked, the diamonds logically must still be inside. 'Must still be' combines deduction with 'still' for ongoing state."
    explanationZh: '如果保险箱锁着且密码没被破解，钻石在逻辑上一定还在里面。must still be 将推测与 still（仍然）结合。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0214
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'There are two suspects: Mr Green and Miss White. Mr Green has an alibi. The thief _____ be Miss White.'
    questionZh: '有两个嫌疑人：格林先生和怀特小姐。格林先生有不在场证明。小偷____是怀特小姐。'
    options:
      A: 'might'
      B: 'could'
      C: 'must'
      D: 'should'
    answer: 'C'
    explanation: "If there are only two suspects and one has an alibi, the other must be the thief. This is a logical certainty."
    explanationZh: '如果只有两个嫌疑人而其中一个有不在场证明，那么另一个一定是小偷。这是逻辑上的确定。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0215
    type: fill-blank
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'The letter is written in French. The writer _____ (can''t / be) from Japan — or _____ they?'
    questionZh: '信是用法语写的。写信人____（can''t / be）是日本人——还是____？'
    answer: "can't be / can"
    explanation: "At first glance, a French letter suggests the writer is not Japanese (can't be). But the second part questions this — a Japanese person could know French."
    explanationZh: '乍一看，法语信暗示写信人不是日本人（can''t be）。但后半句质疑这一点——日本人也可能懂法语。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0216
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'Nobody has been in this room for years. The fresh flowers on the table _____ be real.'
    questionZh: '这个房间已经好几年没人进来了。桌上的鲜花____是真的。'
    options:
      A: 'must'
      B: "can't"
      C: 'will'
      D: 'shall'
    answer: 'B'
    explanation: "Fresh flowers cannot survive for years without water. If nobody entered, the flowers can't be real — they must be fake."
    explanationZh: '鲜花不浇水不可能存活几年。如果没人进来，花不可能是真的——一定是假的。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0217
    type: fill-blank
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'The fingerprints on the glass are tiny. The person who held it _____ (must / have) very small hands.'
    questionZh: '玻璃杯上的指纹很小。拿过杯子的人____（must / have）有一双很小的手。'
    answer: 'must have'
    explanation: "Tiny fingerprints are direct evidence of small hands. Here 'must have' means 'must possess' (present state), not past deduction."
    explanationZh: '小指纹是小手的直接证据。这里 must have 表示"一定拥有"（现在状态），不是过去推测。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0218
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-3]
    context: detective
    question: 'The cake is half-eaten but the dog looks guilty. It _____ be the dog who ate it.'
    questionZh: '蛋糕被吃了一半，但狗看起来很心虚。____是狗吃的。'
    options:
      A: 'could'
      B: 'shall'
      C: 'would'
      D: 'need'
    answer: 'A'
    explanation: "The dog looking guilty is some evidence but not proof. 'Could' expresses possibility — it is one explanation among others."
    explanationZh: '狗看起来心虚是一些证据但不是证据。could 表示可能性——这是几种解释之一。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0219
    type: multiple-choice
    tags: [modals-present, Q03, difficulty-4]
    context: detective
    question: 'Which sentence uses a modal of deduction INCORRECTLY?'
    questionZh: '哪个句子错误地使用了表推测的情态动词？'
    options:
      A: 'She must be tired — she has been working all day.'
      B: 'He can''t be serious — that is a silly idea.'
      C: 'They mustn''t be at home — no one answers the door.'
      D: 'It could be a trap — be careful!'
    answer: 'C'
    explanation: "'Mustn't' means 'it is forbidden', NOT 'I deduce they are not'. The correct form is 'can't be at home'."
    explanationZh: 'mustn''t 表示"禁止"，不是"推测不是"。正确的说法是 can''t be at home。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 4

  - id: G0220
    type: fill-blank
    tags: [modals-present, Q03, difficulty-4]
    context: detective
    question: 'Rank these sentences from most certain to least certain: (a) It must be Tom. (b) It could be Tom. (c) It might be Tom. Write the letters in order: _____'
    questionZh: '将这些句子按确定程度从高到低排列：(a) It must be Tom. (b) It could be Tom. (c) It might be Tom. 按顺序写出字母：_____'
    answer: 'a, c, b'
    explanation: "'Must' = almost certain. 'Might' = possible. 'Could' = weakly possible (even less sure than 'might' in many contexts). Order: must > might > could."
    explanationZh: 'must = 几乎确定。might = 可能。could = 较弱的可能性（很多语境下比 might 更不确定）。顺序：must > might > could。'
    grammarPoint: 'Modals for present deduction'
    relatedQuest: Q03
    difficulty: 4

  # ============================================================
  # G0221–G0240: Modal verbs for past deduction
  # must have / can't have / might have / could have + past participle
  # ============================================================
  - id: G0221
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-1]
    context: detective
    question: 'The ground is wet. It _____ rained last night.'
    questionZh: '地面是湿的。昨晚____下过雨。'
    options:
      A: 'must have'
      B: 'can have'
      C: 'should'
      D: 'would have'
    answer: 'A'
    explanation: "Wet ground is strong evidence of past rain. 'Must have + past participle' is used for confident deduction about the past."
    explanationZh: '地面湿是过去下雨的有力证据。must have + 过去分词用于对过去的有把握推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0222
    type: fill-blank
    tags: [modals-past, Q03, difficulty-1]
    context: detective
    question: 'The cookie jar was full this morning, but now it is empty. Someone _____ (must / eat) all the cookies.'
    questionZh: '饼干罐今早还是满的，现在空了。有人____（must / eat）了所有饼干。'
    answer: 'must have eaten'
    explanation: "The jar going from full to empty is clear evidence. 'Must have eaten' = past deduction with certainty."
    explanationZh: '饼干罐从满变空是明显的证据。must have eaten = 对过去有把握的推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0223
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-1]
    context: detective
    question: 'The vase is broken but the cat was outside all day. The cat _____ broken it.'
    questionZh: '花瓶碎了，但猫一整天都在外面。猫____打碎的。'
    options:
      A: 'must have'
      B: "can't have"
      C: 'should have'
      D: 'would have'
    answer: 'B'
    explanation: "If the cat was outside all day, it is logically impossible for it to have broken the vase. 'Can't have + past participle' = impossible past deduction."
    explanationZh: '如果猫一整天都在外面，逻辑上不可能是它打碎的花瓶。can''t have + 过去分词 = 不可能的过去推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0224
    type: fill-blank
    tags: [modals-past, Q03, difficulty-1]
    context: detective
    question: 'I saw a shadow in the garden at midnight. It _____ (might / be) a fox.'
    questionZh: '我午夜在花园看到一个影子。那____（might / be）是只狐狸。'
    answer: 'might have been'
    explanation: "We are guessing about something in the past. A shadow is not enough to be sure, so 'might have been' shows possibility."
    explanationZh: '我们在猜测过去的事。一个影子不足以确定，所以 might have been 表示可能性。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 1

  - id: G0225
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-2]
    context: detective
    question: 'The witness saw a tall person running away. It _____ been Mr Short — he is only 150 cm tall.'
    questionZh: '目击者看到一个高个子跑掉了。那____是矮个子先生——他只有150厘米高。'
    options:
      A: 'must have'
      B: "can't have"
      C: 'might have'
      D: 'should have'
    answer: 'B'
    explanation: "A tall person running away cannot be Mr Short (150 cm). 'Can't have been' expresses logical impossibility in the past."
    explanationZh: '高个子不可能是150厘米的矮个子先生。can''t have been 表示对过去的逻辑上不可能。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0226
    type: fill-blank
    tags: [modals-past, Q03, difficulty-2]
    context: detective
    question: 'The secret message was written in invisible ink. The spy _____ (must / use) a special pen.'
    questionZh: '秘密信息是用隐形墨水写的。间谍____（must / use）了一支特殊的笔。'
    answer: 'must have used'
    explanation: "Invisible ink requires a special pen. Strong evidence leads to 'must have used' — a confident past deduction."
    explanationZh: '隐形墨水需要特殊的笔。有力证据引出 must have used——有把握的过去推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0227
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-2]
    context: detective
    question: 'The painting disappeared during the night. The guard _____ been sleeping!'
    questionZh: '画在夜间消失了。保安____在睡觉！'
    options:
      A: 'could have'
      B: "can't have"
      C: 'must have'
      D: 'would have'
    answer: 'C'
    explanation: "If the painting disappeared on his watch, the guard almost certainly was not doing his job. 'Must have been' expresses a strong deduction about the past."
    explanationZh: '如果画在他值班时消失了，保安几乎肯定没在履行职责。must have been 表示对过去的强烈推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0228
    type: fill-blank
    tags: [modals-past, Q03, difficulty-2]
    context: detective
    question: 'The door was locked but the jewels are gone. The thief _____ (could / come) in through the chimney.'
    questionZh: '门是锁着的但珠宝不见了。小偷____（could / come）从烟囱进来的。'
    answer: 'could have come'
    explanation: "'Could have come' suggests one possible way the thief entered. It is a possibility, not a certainty."
    explanationZh: 'could have come 提出小偷进入的一种可能方式。这是一种可能，不是确定。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0229
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-2]
    context: detective
    question: 'The footprints in the snow lead to the shed. The suspect _____ hidden there.'
    questionZh: '雪地上的脚印通向小屋。嫌疑人____躲在那里。'
    options:
      A: 'might have'
      B: 'will have'
      C: 'shall have'
      D: 'need have'
    answer: 'A'
    explanation: "Footprints leading to the shed suggest the suspect possibly hid there, but we cannot be 100% sure. 'Might have' = possible past event."
    explanationZh: '通向小屋的脚印暗示嫌疑人可能躲在那里，但我们不能100%确定。might have = 过去可能发生的事。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 2

  - id: G0230
    type: fill-blank
    tags: [modals-past, Q03, difficulty-3]
    context: detective
    question: 'There were no fingerprints on the weapon. The criminal _____ (must / wear) gloves.'
    questionZh: '凶器上没有指纹。犯罪分子____（must / wear）了手套。'
    answer: 'must have worn'
    explanation: "No fingerprints strongly suggests gloves were worn. 'Must have worn' = confident deduction about what happened."
    explanationZh: '没有指纹强烈暗示戴了手套。must have worn = 对过去发生的事有把握的推测。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0231
    type: multiple-choice
    tags: [modals-past, Q03, difficulty-3]
    context: detective
    question: 'Miss Plum says she was at the cinema, but the cinema was closed yesterday. She _____.'
    questionZh: '梅小姐说她在电影院，但电影院昨天关门了。她____。'
    options:
      A: 'must have lied'
      B: 'might have lied'
      C: 'could have lied'
      D: "needn't have lied"
    answer: 'A'
    explanation: "If the cinema was closed, her alibi is impossible. She must have lied — this is a logical certainty."
    explanationZh: '如果电影院关门了，她的不在场证明不可能成立。她一定撒了谎——这是逻辑上的确定。'
    grammarPoint: 'Modals for past deduction'
    relatedQuest: Q03
    difficulty: 3

  - id: G0232
    type: fill-blank
    tags: [modals-past, Q03, difficulty-3]
    context: detective
    question: 'The alarm did not go off, so the thief _____ (can''t / enter) through the front door. It has a sensor.'
