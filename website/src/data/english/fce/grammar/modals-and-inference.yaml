    type: multiple-choice
    tags: [reported-speech, Q03, difficulty-3]
    context: detective
    question: '"I found this clue yesterday," said the detective. → The detective said he had found that clue _____.'
    questionZh: '"我昨天发现了这条线索，"侦探说。 → 侦探说他____发现了那条线索。'
    options:
      A: 'yesterday'
