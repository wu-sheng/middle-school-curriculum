    explanation: "'Shouldn't have happened' = it was wrong that it happened. We criticise a past event."
    explanationZh: 'shouldn''t have happened = 这件事不应该发生。我们在批评一个过去的事件。'
    grammarPoint: 'Should have for past criticism'
