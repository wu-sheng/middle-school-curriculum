      A: 'The thief must has escaped through the window.'
      B: 'The thief must have escaped through the window.'
      C: 'The thief must had escaped through the window.'
      D: 'The thief must to have escaped through the window.'
    answer: 'B'
    explanation: "Modal + have + past participle: must have escaped. No 'has', 'had', or 'to' after 'must'."
    explanationZh: '情态动词 + have + 过去分词：must have escaped。must 后面不加 has、had 或 to。'
    grammarPoint: 'Modal perfect structure'
    relatedQuest: Q03
    difficulty: 4

