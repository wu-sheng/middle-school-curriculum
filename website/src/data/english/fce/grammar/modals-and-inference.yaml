    question: '"I can hear footsteps," whispered the spy. → The spy whispered that she _____ hear footsteps.'
    questionZh: '"我能听到脚步声，"间谍低声说。 → 间谍低声说她____听到脚步声。'
    answer: 'could'
    explanation: "'Can' shifts to 'could' in reported speech."
    explanationZh: '间接引语中 can 变为 could。'
