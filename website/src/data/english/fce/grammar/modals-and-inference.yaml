    questionZh: '"我会找到小偷的，"熊猫侦探说。 → 熊猫侦探说他____找到小偷。'
    options:
      A: 'will'
      B: 'would'
      C: 'can'
      D: 'shall'
    answer: 'B'
    explanation: "'Will' shifts to 'would' in reported speech."
    explanationZh: '间接引语中 will 变为 would。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
    difficulty: 1

