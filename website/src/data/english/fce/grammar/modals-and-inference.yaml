    explanation: "Reported requests use 'asked + object + to + infinitive'. 'Please help' → 'asked them to help'."
    explanationZh: '间接引语中的请求用 asked + 宾语 + to + 动词原形。Please help → asked them to help。'
    grammarPoint: 'Reported speech: requests'
    relatedQuest: Q03
    difficulty: 4

  - id: G0279
    type: multiple-choice
    tags: [reported-speech, Q03, difficulty-4]
    context: detective
    question: '"I have never seen this man before," the shopkeeper told the police. → The shopkeeper told the police that _____.'
