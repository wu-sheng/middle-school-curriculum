    question: '"We are looking for the missing necklace," said the police. → The police said they _____ for the missing necklace.'
    questionZh: '"我们正在寻找丢失的项链，"警察说。 → 警察说他们____丢失的项链。'
    answer: 'were looking'
    explanation: "Present continuous 'are looking' shifts to past continuous 'were looking' in reported speech."
    explanationZh: '现在进行时 are looking 在间接引语中变为过去进行时 were looking。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
