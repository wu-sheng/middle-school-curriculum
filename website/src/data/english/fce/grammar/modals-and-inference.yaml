  # ============================================================
  # G0261–G0280: Reported speech
  # Direct → indirect speech (for witness statements)
  # ============================================================
  - id: G0261
    type: multiple-choice
    tags: [reported-speech, Q03, difficulty-1]
    context: detective
    question: 'The witness said: "I saw a man in a black coat." → The witness said she _____ a man in a black coat.'
    questionZh: '目击者说："我看到一个穿黑外套的男人。" → 目击者说她____一个穿黑外套的男人。'
    options:
      A: 'saw'
      B: 'had seen'
      C: 'sees'
      D: 'has seen'
    answer: 'B'
    explanation: "In reported speech, past simple ('saw') shifts back to past perfect ('had seen')."
    explanationZh: '在间接引语中，一般过去时（saw）退一步变成过去完成时（had seen）。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
    difficulty: 1

  - id: G0262
    type: fill-blank
    tags: [reported-speech, Q03, difficulty-1]
    context: detective
    question: '"I am innocent!" the suspect shouted. → The suspect shouted that he _____ innocent.'
    questionZh: '"我是无辜的！"嫌疑人喊道。 → 嫌疑人喊道他____无辜的。'
    answer: 'was'
    explanation: "Present simple 'am' shifts to past simple 'was' in reported speech."
    explanationZh: '一般现在时 am 在间接引语中变为一般过去时 was。'
    grammarPoint: 'Reported speech: tense shift'
    relatedQuest: Q03
    difficulty: 1

