  # ============================================================
  # G0581–G0600: Mixed connectors review in scientific passages
  # ============================================================
  - id: G0581
    type: multiple-choice
    tags: [mixed-review, Q06, difficulty-2]
    context: nature
    question: 'The Arctic is warming twice as fast as the rest of the planet. _____, many Arctic animals are struggling to survive.'
    questionZh: '北极变暖的速度是其他地区的两倍。_____ 许多北极动物正在挣扎求生。'
    options:
      A: 'Furthermore'
      B: 'As a result'
      C: 'Initially'
      D: 'Meanwhile'
    answer: 'B'
    explanation: 'Warming (cause) → animals struggling (result). "As a result" connects cause and effect.'
    explanationZh: '变暖（原因）→ 动物挣扎（结果）。"As a result"连接因果关系。'
    grammarPoint: 'Mixed: result connector'
    relatedQuest: Q06
    difficulty: 2

