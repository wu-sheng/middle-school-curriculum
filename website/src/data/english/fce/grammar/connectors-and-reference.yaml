    type: multiple-choice
    tags: [sequence-time, Q06, difficulty-2]
    context: nature
    question: 'The researchers were studying whale songs in the Pacific Ocean. _____, a different team in the Atlantic was making a similar discovery.'
    questionZh: '研究人员正在太平洋研究鲸歌。_____ 大西洋的另一个团队正在做出类似的发现。'
    options:
      A: 'Subsequently'
      B: 'Initially'
      C: 'Meanwhile'
      D: 'Eventually'
    answer: 'C'
    explanation: '"Meanwhile" means "at the same time." Two events are happening simultaneously in different places.'
