    questionZh: '首先，毛毛虫结茧。_____ 它变成了蝴蝶。'
    answer: 'Eventually'
    acceptableAnswers: ['Eventually', 'Then', 'Finally']
    explanation: '"Eventually" means "after a period of time." The transformation happens over time, not instantly.'
    explanationZh: '"Eventually"意思是"经过一段时间后"。变态是在一段时间内发生的，不是瞬间的。'
    grammarPoint: 'Sequence connector: Eventually'
    relatedQuest: Q06
    difficulty: 1

  - id: G0564
    type: multiple-choice
    tags: [sequence-time, Q06, difficulty-2]
