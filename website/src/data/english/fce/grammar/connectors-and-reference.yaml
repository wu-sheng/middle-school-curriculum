      D: 'Eventually'
    answer: 'B'
    explanation: '"Subsequently" means "after that" or "following this." Scientists responded AFTER the volcano started rumbling.'
    explanationZh: '"Subsequently"意思是"之后"或"随后"。科学家们在火山开始隆隆作响之后做出了回应。'
