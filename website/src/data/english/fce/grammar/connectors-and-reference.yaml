    explanation: 'Both sentences state interesting facts about octopuses. "What is more" adds another surprising fact.'
    explanationZh: '两个句子都陈述了关于章鱼的有趣事实。"What is more"补充了另一个令人惊讶的事实。'
    grammarPoint: 'Mixed: addition connector'
