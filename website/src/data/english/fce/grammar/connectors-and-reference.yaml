  # ============================================================
  # G0561–G0580: Sequence/Time connectors
  # Initially, Subsequently, Meanwhile, Eventually, In the meantime
  # ============================================================
  - id: G0561
    type: multiple-choice
    tags: [sequence-time, Q06, difficulty-1]
    context: nature
    question: '_____, scientists believed that the Earth was the centre of the universe.'
    questionZh: '_____ 科学家们相信地球是宇宙的中心。'
    options:
      A: 'Eventually'
      B: 'Subsequently'
      C: 'Initially'
      D: 'Meanwhile'
    answer: 'C'
    explanation: '"Initially" means "at the beginning" or "at first." It introduces the starting point of a timeline.'
    explanationZh: '"Initially"意思是"最初"或"起初"。它引入时间线的起点。'
    grammarPoint: 'Sequence connector: Initially'
    relatedQuest: Q06
    difficulty: 1

  - id: G0562
    type: multiple-choice
    tags: [sequence-time, Q06, difficulty-1]
    context: nature
    question: 'The baby bird fell from the nest. _____, its mother flew down and carried it back to safety.'
    questionZh: '小鸟从巢里掉了下来。_____ 它的妈妈飞下来把它带回安全的地方。'
    options:
      A: 'Initially'
      B: 'Meanwhile'
      C: 'Immediately'
      D: 'Eventually'
    answer: 'C'
    explanation: '"Immediately" means "right away, without any delay." The mother acted instantly.'
    explanationZh: '"Immediately"意思是"立即，毫不迟延"。母鸟立刻采取了行动。'
    grammarPoint: 'Time connector: Immediately'
    relatedQuest: Q06
    difficulty: 1

  - id: G0563
    type: fill-blank
    tags: [sequence-time, Q06, difficulty-1]
