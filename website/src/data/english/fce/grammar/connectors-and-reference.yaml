category: 'Connectors & Reference Words'
categoryZh: '连接词与指代词'
questions:
  # ============================================================
  # G0501–G0520: Addition/Contrast connectors
  # However, Furthermore, Moreover, Nevertheless, On the other hand
  # Nature/Science theme
  # ============================================================
  - id: G0501
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'Dolphins are highly intelligent. _____, they can learn new tricks and solve complex puzzles.'
    questionZh: '海豚非常聪明。_____ 它们能学习新技巧并解决复杂的谜题。'
    options:
      A: 'However'
      B: 'Furthermore'
      C: 'Nevertheless'
      D: 'On the other hand'
    answer: 'B'
    explanation: 'The second sentence ADDS more evidence of dolphin intelligence. "Furthermore" introduces additional supporting information.'
    explanationZh: '第二句补充了更多海豚聪明的证据。"Furthermore"引入额外的支持信息。'
    grammarPoint: 'Addition connector: Furthermore'
    relatedQuest: Q06
    difficulty: 1

  - id: G0502
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'Many people think spiders are dangerous. _____, most spider species are completely harmless to humans.'
    questionZh: '许多人认为蜘蛛很危险。_____ 大多数蜘蛛物种对人类完全无害。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'However'
      D: 'In addition'
    answer: 'C'
    explanation: 'The second sentence CONTRASTS with the first (dangerous vs. harmless). "However" signals an unexpected contrast.'
    explanationZh: '第二句与第一句形成对比（危险 vs. 无害）。"However"表示意外的对比。'
    grammarPoint: 'Contrast connector: However'
    relatedQuest: Q06
    difficulty: 1

  - id: G0503
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'Rainforests produce a huge amount of oxygen. _____, they absorb large quantities of carbon dioxide.'
    questionZh: '雨林产生大量氧气。_____ 它们还吸收大量二氧化碳。'
    answer: 'Moreover'
    acceptableAnswers: ['Moreover', 'Furthermore', 'In addition']
    explanation: 'Both sentences describe POSITIVE things about rainforests. "Moreover" or "Furthermore" add extra supporting points.'
    explanationZh: '两个句子都描述了雨林的好处。"Moreover"或"Furthermore"补充额外的支持性观点。'
    grammarPoint: 'Addition connector: Moreover'
    relatedQuest: Q06
    difficulty: 1

  - id: G0504
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'Pandas eat almost nothing but bamboo. _____, bamboo has very little nutrition, so pandas must eat up to 38 kilograms every day.'
    questionZh: '熊猫几乎只吃竹子。_____ 竹子的营养价值很低，所以熊猫每天必须吃多达38公斤。'
    options:
      A: 'Furthermore'
      B: 'However'
      C: 'On the other hand'
      D: 'Nevertheless'
    answer: 'B'
    explanation: 'There is a surprising contrast: pandas depend on bamboo, BUT bamboo has little nutrition. "However" signals this unexpected problem.'
    explanationZh: '存在令人惊讶的对比：熊猫依赖竹子，但竹子营养很少。"However"表示这个意外的问题。'
    grammarPoint: 'Contrast connector: However'
    relatedQuest: Q06
    difficulty: 1

  - id: G0505
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'The experiment failed three times. _____, the scientists did not give up and tried again.'
    questionZh: '实验失败了三次。_____ 科学家们没有放弃，又试了一次。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'Nevertheless'
      D: 'In addition'
    answer: 'C'
    explanation: '"Nevertheless" means "despite that" — the scientists continued despite the failures. It shows persistence against difficulty.'
    explanationZh: '"Nevertheless"意思是"尽管如此"——科学家们不顾失败继续研究。它表示面对困难的坚持。'
    grammarPoint: 'Contrast connector: Nevertheless'
    relatedQuest: Q06
    difficulty: 1

  - id: G0506
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-1]
    context: nature
    question: 'Some people want to build a new road through the forest. _____, environmentalists argue that this would destroy rare animal habitats.'
    questionZh: '有人想在森林中修建一条新公路。_____ 环保人士认为这会破坏稀有动物的栖息地。'
    answer: 'On the other hand'
    acceptableAnswers: ['On the other hand', 'However']
    explanation: '"On the other hand" introduces an opposing viewpoint. It signals a shift from one perspective to another.'
    explanationZh: '"On the other hand"引入一个相反的观点。它标志着从一个角度转向另一个角度。'
    grammarPoint: 'Contrast connector: On the other hand'
    relatedQuest: Q06
    difficulty: 1

  - id: G0507
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Electric cars produce no exhaust fumes. _____, they are much quieter than petrol cars, which reduces noise pollution.'
    questionZh: '电动汽车不产生尾气。_____ 它们比汽油车安静得多，减少了噪音污染。'
    options:
      A: 'However'
      B: 'Nevertheless'
      C: 'What is more'
      D: 'On the other hand'
    answer: 'C'
    explanation: '"What is more" adds another advantage of electric cars. Both sentences describe positive features, so we need an addition connector.'
    explanationZh: '"What is more"补充了电动汽车的另一个优点。两个句子都描述了正面特征，所以需要补充连接词。'
    grammarPoint: 'Addition connector: What is more'
    relatedQuest: Q06
    difficulty: 2

  - id: G0508
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Whales can hold their breath for up to 90 minutes. _____, they must eventually return to the surface to breathe air.'
    questionZh: '鲸鱼可以屏住呼吸长达90分钟。_____ 它们最终必须回到水面呼吸空气。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'Nevertheless'
      D: 'In addition'
    answer: 'C'
    explanation: 'Despite the impressive breath-holding, they still MUST breathe. "Nevertheless" shows the limitation despite the ability.'
    explanationZh: '尽管屏息能力令人印象深刻，它们仍然必须呼吸。"Nevertheless"表示尽管有能力但仍有限制。'
    grammarPoint: 'Contrast connector: Nevertheless'
    relatedQuest: Q06
    difficulty: 2

  - id: G0509
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Coral reefs protect coastlines from storms. _____, they provide food and income for millions of people worldwide.'
    questionZh: '珊瑚礁保护海岸线免受风暴侵袭。_____ 它们为全世界数百万人提供食物和收入。'
    answer: 'In addition'
    acceptableAnswers: ['In addition', 'Furthermore', 'Moreover']
    explanation: 'The second sentence adds another benefit of coral reefs. Any addition connector works here.'
    explanationZh: '第二句补充了珊瑚礁的另一个好处。任何补充连接词都适用。'
    grammarPoint: 'Addition connector: In addition'
    relatedQuest: Q06
    difficulty: 2

  - id: G0510
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Solar energy is clean and renewable. _____, solar panels are becoming cheaper every year, making them accessible to more families.'
    questionZh: '太阳能是清洁和可再生的。_____ 太阳能板每年都在变便宜，让更多家庭能负担得起。'
    options:
      A: 'However'
      B: 'On the other hand'
      C: 'Furthermore'
      D: 'Nevertheless'
    answer: 'C'
    explanation: 'Both sentences are positive points about solar energy. "Furthermore" adds another supporting argument.'
    explanationZh: '两个句子都是关于太阳能的正面观点。"Furthermore"补充了另一个支持论点。'
    grammarPoint: 'Addition connector: Furthermore'
    relatedQuest: Q06
    difficulty: 2

  - id: G0511
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Plastic bags are cheap to produce. _____, they take up to 500 years to decompose and cause terrible damage to ocean life.'
    questionZh: '塑料袋生产成本低。_____ 它们需要长达500年才能分解，并对海洋生物造成可怕的损害。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'However'
      D: 'In addition'
    answer: 'C'
    explanation: 'Cheap to produce is positive, but slow decomposition is very negative. "However" marks this strong contrast.'
    explanationZh: '生产成本低是正面的，但分解缓慢是非常负面的。"However"标记了这种强烈的对比。'
    grammarPoint: 'Contrast connector: However'
    relatedQuest: Q06
    difficulty: 2

  - id: G0512
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Cheetahs are the fastest land animals, reaching speeds of 112 km/h. _____, they can only maintain this speed for about 30 seconds before they overheat.'
    questionZh: '猎豹是最快的陆地动物，速度可达112公里/小时。_____ 它们只能维持这个速度约30秒就会过热。'
    answer: 'However'
    acceptableAnswers: ['However', 'Nevertheless']
    explanation: 'The speed is impressive, but the limitation is unexpected. "However" or "Nevertheless" signal this contrast.'
    explanationZh: '速度令人印象深刻，但限制是意外的。"However"或"Nevertheless"表示这种对比。'
    grammarPoint: 'Contrast connector'
    relatedQuest: Q06
    difficulty: 2

  - id: G0513
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Tigers are solitary animals that hunt alone. Wolves, _____, hunt together in packs and share their food.'
    questionZh: '老虎是独居动物，独自捕猎。另一方面，狼 _____ 成群结队一起捕猎并分享食物。'
    options:
      A: 'furthermore'
      B: 'on the other hand'
      C: 'moreover'
      D: 'in addition'
    answer: 'B'
    explanation: 'The text compares two different hunting strategies: solitary (tigers) vs. pack (wolves). "On the other hand" shows this comparison.'
    explanationZh: '文本比较了两种不同的狩猎策略：独居（老虎）vs. 群体（狼）。"On the other hand"表示这种比较。'
    grammarPoint: 'Contrast connector: On the other hand'
    relatedQuest: Q06
    difficulty: 2

  - id: G0514
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Octopuses have no bones at all. _____, they can squeeze through tiny gaps no bigger than a coin.'
    questionZh: '章鱼完全没有骨骼。_____ 它们可以挤过不比硬币大的小缝隙。'
    options:
      A: 'However'
      B: 'As a result'
      C: 'Nevertheless'
      D: 'On the other hand'
    answer: 'B'
    explanation: 'Having no bones is the CAUSE; squeezing through gaps is the RESULT. "As a result" shows cause and effect, not contrast.'
    explanationZh: '没有骨骼是原因；能挤过缝隙是结果。"As a result"表示因果关系，不是对比。'
    grammarPoint: 'Result connector: As a result'
    relatedQuest: Q06
    difficulty: 2

  - id: G0515
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Bees are essential for pollinating crops. _____, they produce honey, which humans have used as food and medicine for thousands of years.'
    questionZh: '蜜蜂对于给农作物授粉至关重要。_____ 它们还生产蜂蜜，人类数千年来一直将其用作食物和药物。'
    answer: 'Moreover'
    acceptableAnswers: ['Moreover', 'Furthermore', 'In addition', 'What is more']
    explanation: 'Both sentences describe benefits of bees. Any addition connector works here.'
    explanationZh: '两个句子都描述了蜜蜂的好处。任何补充连接词都适用。'
    grammarPoint: 'Addition connector'
    relatedQuest: Q06
    difficulty: 2

  - id: G0516
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-2]
    context: nature
    question: 'Wind energy is completely renewable. _____, wind turbines can be noisy and some people think they spoil the view.'
    questionZh: '风能是完全可再生的。_____ 风力涡轮机可能很吵，有些人认为它们破坏了景观。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'However'
      D: 'What is more'
    answer: 'C'
    explanation: 'The first sentence is positive about wind energy, but the second presents disadvantages. "However" connects this contrast.'
    explanationZh: '第一句对风能持正面态度，但第二句提出了缺点。"However"连接这种对比。'
    grammarPoint: 'Contrast connector: However'
    relatedQuest: Q06
    difficulty: 2

  - id: G0517
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-3]
    context: nature
    question: 'The Great Barrier Reef has suffered severe bleaching events in recent years. _____, scientists remain hopeful that parts of the reef can recover if ocean temperatures stabilise.'
    questionZh: '大堡礁近年来遭受了严重的白化事件。_____ 科学家们仍然希望如果海洋温度稳定，珊瑚礁的部分区域可以恢复。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'Nevertheless'
      D: 'In addition'
    answer: 'C'
    explanation: 'Despite the bad news (bleaching), there is hope. "Nevertheless" means "despite this" and introduces a more positive counterpoint.'
    explanationZh: '尽管有坏消息（白化），但仍有希望。"Nevertheless"意为"尽管如此"，引入了一个更积极的反面观点。'
    grammarPoint: 'Contrast connector: Nevertheless'
    relatedQuest: Q06
    difficulty: 3

  - id: G0518
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-3]
    context: nature
    question: 'Elephants have an amazing memory. _____, research has shown they can remember the locations of water sources even after twenty years.'
    questionZh: '大象有惊人的记忆力。_____ 研究表明它们即使过了二十年也能记住水源的位置。'
    answer: 'In fact'
    acceptableAnswers: ['In fact', 'Indeed', 'Furthermore']
    explanation: '"In fact" strengthens and supports the first claim with specific evidence. "Furthermore" would also add information.'
    explanationZh: '"In fact"用具体证据加强和支持第一个主张。"Furthermore"也可以补充信息。'
    grammarPoint: 'Reinforcement connector: In fact'
    relatedQuest: Q06
    difficulty: 3

  - id: G0519
    type: multiple-choice
    tags: [addition-contrast, Q06, difficulty-3]
    context: nature
    question: 'Crocodiles are sometimes called "living fossils" because they have barely changed in 200 million years. _____, their brains have actually evolved significantly over time.'
    questionZh: '鳄鱼有时被称为"活化石"因为它们在2亿年中几乎没有变化。_____ 它们的大脑实际上随时间发生了显著进化。'
    options:
      A: 'Furthermore'
      B: 'Moreover'
      C: 'However'
      D: 'In addition'
    answer: 'C'
    explanation: '"Barely changed" vs "actually evolved significantly" is a clear contrast. "However" signals this unexpected difference.'
    explanationZh: '"几乎没有变化"vs"实际上显著进化"是明显的对比。"However"表示这个意外的差异。'
    grammarPoint: 'Contrast connector: However'
    relatedQuest: Q06
    difficulty: 3

  - id: G0520
    type: fill-blank
    tags: [addition-contrast, Q06, difficulty-3]
    context: nature
    question: 'Recycling plastic is important. _____, reducing the amount of plastic we use in the first place is even more effective.'
    questionZh: '回收塑料很重要。_____ 首先减少我们使用的塑料量更为有效。'
    answer: 'However'
    acceptableAnswers: ['However', 'Nevertheless']
    explanation: 'Recycling is good, BUT reducing is better. "However" introduces the stronger point that contrasts with (and outweighs) recycling.'
    explanationZh: '回收很好，但减少使用更好。"However"引入了一个更强的观点，与回收形成对比（并优于它）。'
    grammarPoint: 'Contrast connector'
    relatedQuest: Q06
    difficulty: 3

  # ============================================================
  # G0521–G0540: Cause/Result connectors
  # As a result, Consequently, Therefore, Due to, Owing to
  # ============================================================
  - id: G0521
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-1]
    context: nature
    question: 'The river was heavily polluted with chemicals. _____, all the fish in that section died within a week.'
    questionZh: '这条河被化学物质严重污染了。_____ 该河段的所有鱼在一周内死亡。'
    options:
      A: 'Furthermore'
      B: 'As a result'
      C: 'However'
      D: 'Nevertheless'
    answer: 'B'
    explanation: 'The pollution CAUSED the fish to die. "As a result" shows that the second event happened BECAUSE of the first.'
    explanationZh: '污染导致了鱼的死亡。"As a result"表明第二个事件是因为第一个事件而发生的。'
    grammarPoint: 'Result connector: As a result'
    relatedQuest: Q06
    difficulty: 1

  - id: G0522
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-1]
    context: nature
    question: 'Arctic ice is melting at a record rate. _____, polar bears are struggling to find enough food.'
    questionZh: '北极冰以创纪录的速度融化。_____ 北极熊正在挣扎着寻找足够的食物。'
    options:
      A: 'Moreover'
      B: 'However'
      C: 'Consequently'
      D: 'Nevertheless'
    answer: 'C'
    explanation: 'Melting ice CAUSES food shortage for bears. "Consequently" shows a cause-result connection.'
    explanationZh: '冰的融化导致了熊的食物短缺。"Consequently"表示因果关系。'
    grammarPoint: 'Result connector: Consequently'
    relatedQuest: Q06
    difficulty: 1

  - id: G0523
    type: fill-blank
    tags: [cause-result, Q06, difficulty-1]
    context: nature
    question: 'The forest fire destroyed thousands of hectares of woodland. _____, many animals lost their homes.'
    questionZh: '森林火灾烧毁了数千公顷的林地。_____ 许多动物失去了家园。'
    answer: 'As a result'
    acceptableAnswers: ['As a result', 'Consequently', 'Therefore']
    explanation: 'The fire is the CAUSE; animals losing homes is the EFFECT. Any result connector works here.'
    explanationZh: '火灾是原因；动物失去家园是结果。任何结果连接词都适用。'
    grammarPoint: 'Result connector'
    relatedQuest: Q06
    difficulty: 1

  - id: G0524
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-1]
    context: nature
    question: '_____ the heavy rain, the school trip to the nature reserve was cancelled.'
    questionZh: '_____ 大雨，去自然保护区的学校旅行被取消了。'
    options:
      A: 'As a result'
      B: 'Furthermore'
      C: 'Due to'
      D: 'Nevertheless'
    answer: 'C'
    explanation: '"Due to" + noun/gerund states the CAUSE at the beginning of the sentence. It means "because of."'
    explanationZh: '"Due to" + 名词/动名词在句子开头说明原因。意思是"由于"。'
    grammarPoint: 'Cause connector: Due to'
    relatedQuest: Q06
    difficulty: 1

  - id: G0525
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-2]
    context: nature
    question: 'Trees absorb carbon dioxide from the atmosphere. _____, planting more trees is one of the best ways to fight climate change.'
    questionZh: '树木从大气中吸收二氧化碳。_____ 种更多的树是对抗气候变化的最佳方式之一。'
    options:
      A: 'However'
      B: 'Nevertheless'
      C: 'Therefore'
      D: 'On the other hand'
    answer: 'C'
    explanation: 'The fact that trees absorb CO2 leads to the CONCLUSION that planting trees fights climate change. "Therefore" shows this logical reasoning.'
    explanationZh: '树木吸收二氧化碳的事实导致种植树木可以对抗气候变化的结论。"Therefore"表示这种逻辑推理。'
    grammarPoint: 'Result connector: Therefore'
    relatedQuest: Q06
    difficulty: 2

  - id: G0526
    type: fill-blank
    tags: [cause-result, Q06, difficulty-2]
    context: nature
    question: '_____ the drought, farmers in the region lost nearly 80% of their crops last summer.'
    questionZh: '_____ 干旱，该地区的农民去年夏天损失了近80%的庄稼。'
    answer: 'Owing to'
    acceptableAnswers: ['Owing to', 'Due to', 'Because of']
    explanation: '"Owing to" + noun works like "Due to" — it introduces the cause. "Owing to the drought" = "Because of the drought."'
    explanationZh: '"Owing to" + 名词的用法类似于"Due to"——引入原因。"Owing to the drought" = "Because of the drought"。'
    grammarPoint: 'Cause connector: Owing to'
    relatedQuest: Q06
    difficulty: 2

  - id: G0527
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-2]
    context: nature
    question: 'The new wildlife reserve banned all hunting and fishing. _____, bird populations in the area doubled within just three years.'
    questionZh: '新的野生动物保护区禁止了所有狩猎和捕鱼。_____ 该地区的鸟类数量在短短三年内翻了一倍。'
    options:
      A: 'However'
      B: 'As a result'
      C: 'Nevertheless'
      D: 'On the other hand'
    answer: 'B'
    explanation: 'The ban on hunting CAUSED bird populations to increase. "As a result" connects this cause and effect.'
    explanationZh: '禁止狩猎导致鸟类数量增加。"As a result"连接这个因果关系。'
    grammarPoint: 'Result connector: As a result'
    relatedQuest: Q06
    difficulty: 2

  - id: G0528
    type: multiple-choice
    tags: [cause-result, Q06, difficulty-2]
    context: nature
    question: 'Coral bleaching occurs when ocean temperatures rise too high. _____, the colourful algae inside the coral are expelled, turning the reef white.'
    questionZh: '当海洋温度过高时，珊瑚白化就会发生。_____ 珊瑚体内的彩色藻类被排出，使珊瑚礁变白。'
    options:
      A: 'Furthermore'
      B: 'Consequently'
      C: 'Nevertheless'
      D: 'On the other hand'
    answer: 'B'
    explanation: 'High temperatures CAUSE algae expulsion. "Consequently" shows the result of the temperature rise.'
    explanationZh: '高温导致藻类被排出。"Consequently"展示了温度上升的结果。'
    grammarPoint: 'Result connector: Consequently'
    relatedQuest: Q06
    difficulty: 2

  - id: G0529
    type: fill-blank
    tags: [cause-result, Q06, difficulty-2]
    context: nature
    question: 'Bees are dying in large numbers. _____, scientists are warning that our food supply could be seriously affected.'
    questionZh: '蜜蜂正在大量死亡。_____ 科学家们警告说我们的食物供应可能会受到严重影响。'
    answer: 'For this reason'
    acceptableAnswers: ['For this reason', 'As a result', 'Consequently', 'Therefore']
    explanation: 'Bee deaths could CAUSE food supply problems. "For this reason" explains WHY scientists are worried.'
