  - id: G0429
    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'The treasure map _____ (be) hidden in the library for over a hundred years before anyone found it.'
    questionZh: '宝藏地图在被发现之前已经在图书馆 _____（be）了一百多年。'
    answer: 'had been'
    explanation: 'Past perfect (had been) shows the duration of hiding before the discovery.'
    explanationZh: '过去完成时（had been）表示发现之前隐藏的时间长度。'
    grammarPoint: 'Past perfect for duration before past event'
    relatedQuest: Q05
