    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'The knight recognised the sword — it _____ (belong) to his father.'
    questionZh: '骑士认出了那把剑——它曾经 _____（belong）他的父亲。'
