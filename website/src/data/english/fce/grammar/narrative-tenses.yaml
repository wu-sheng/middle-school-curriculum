    questionZh: '她在 _____ 地图时，突然 _____ 了一条隐藏的信息。'
    options:
      A: 'studied / discovered'
      B: 'was studying / discovered'
      C: 'was studying / was discovering'
      D: 'studied / was discovering'
    answer: 'B'
    explanation: 'Past continuous (was studying) for the ongoing activity; past simple (discovered) for the sudden discovery.'
    explanationZh: '过去进行时（was studying）表示持续活动；一般过去时（discovered）表示突然的发现。'
    grammarPoint: 'Past continuous + past simple'
    relatedQuest: Q05
