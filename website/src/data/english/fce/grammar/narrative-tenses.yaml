    explanationZh: '一般过去时（began, stared）表示突然事件，过去进行时（was smiling）表示持续的画面，一般过去时（was）表示辨认，过去完成时（had seen）表示之前反复出现的经历。'
    grammarPoint: 'Full narrative tense mix'
