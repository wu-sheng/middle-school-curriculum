  # ============================================================
  # G0461-G0480: Direct speech punctuation and formatting
  # ============================================================
  - id: G0461
    type: multiple-choice
    tags: [direct-speech, Q05, difficulty-1]
    context: storytelling
    question: 'Which sentence has correct direct speech punctuation?'
    questionZh: '哪个句子的直接引语标点是正确的？'
    options:
      A: '"Follow me" she said.'
      B: '"Follow me," she said.'
      C: '"Follow me", she said.'
      D: '"Follow me." She said.'
    answer: 'B'
    explanation: 'The comma goes INSIDE the speech marks, before the closing quotation mark. The reporting clause ("she said") is part of the same sentence.'
    explanationZh: '逗号放在引号内，在结束引号之前。引述从句（"she said"）是同一个句子的一部分。'
    grammarPoint: 'Direct speech: comma inside speech marks'
    relatedQuest: Q05
    difficulty: 1

