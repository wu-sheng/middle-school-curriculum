  - id: G0490
    type: fill-blank
    tags: [mixed-narrative, Q05, difficulty-3]
    context: storytelling
    question: 'Eventually, she _____ (find) what she _____ (look) for — a tiny golden key that someone _____ (hide) behind the painting centuries ago.'
