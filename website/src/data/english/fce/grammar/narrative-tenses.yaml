    questionZh: '侦探在 _____（examine）脚印，同时助手在 _____（take）照片。'
    answer: 'was examining / was taking'
    explanation: 'Two simultaneous ongoing activities — both use past continuous.'
    explanationZh: '两个同时进行的活动——都用过去进行时。'
