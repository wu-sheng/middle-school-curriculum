      D: '"Watch out!", she screamed.'
    answer: 'C'
    explanation: 'Exclamation mark goes inside the speech marks. "She" is lowercase because it continues the same sentence.'
    explanationZh: '感叹号放在引号内。"She"用小写，因为它继续同一个句子。'
