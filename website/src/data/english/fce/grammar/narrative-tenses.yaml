    answer: 'had worn'
    explanation: '"Once" + past perfect shows the completed event that triggered the next action.'
    explanationZh: '"Once" + 过去完成时表示触发下一个动作的已完成事件。'
    grammarPoint: 'Once + past perfect'
    relatedQuest: Q05
    difficulty: 2

