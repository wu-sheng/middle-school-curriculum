  - id: G0415
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'The old man _____ (sit) by the fire and _____ (tell) stories to the children.'
    questionZh: '老人 _____（sit）在火炉旁，给孩子们 _____（tell）故事。'
    answer: 'was sitting / was telling'
    explanation: 'Both actions are happening simultaneously as background scene-setting, so both use past continuous.'
    explanationZh: '两个动作同时发生作为背景场景，所以都用过去进行时。'
    grammarPoint: 'Past continuous for parallel actions'
    relatedQuest: Q05
