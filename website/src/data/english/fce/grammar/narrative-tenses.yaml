    answer: 'had just finished / began / had never seen'
    explanation: 'Past perfect (had just finished) for the completed action, past simple (began) for the new event, past perfect (had never seen) for the backstory.'
    explanationZh: '过去完成时（had just finished）表示完成的动作，一般过去时（began）表示新事件，过去完成时（had never seen）表示背景。'
