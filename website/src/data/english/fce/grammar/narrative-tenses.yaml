      B: 'hadn''t opened'
      C: 'don''t open'
      D: 'haven''t opened'
    answer: 'B'
    explanation: '"I wish I hadn''t opened" expresses regret about a past action — past perfect after "wish."'
    explanationZh: '"I wish I hadn''t opened"表达对过去行为的遗憾——"wish"后用过去完成时。'
