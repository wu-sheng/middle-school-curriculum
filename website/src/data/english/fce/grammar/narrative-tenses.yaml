    tags: [mixed-narrative, Q05, difficulty-3]
    context: storytelling
    question: 'All of a sudden, the painting _____ (begin) to glow. The girl _____ (stare) at it in disbelief — the woman in the portrait _____ (smile) at her. It _____ (be) the same face she _____ (see) in her dreams every night for the past year.'
    questionZh: '突然间，画 _____（begin）发光。女孩 _____（stare）着它难以置信——画中的女人在 _____（smile）她。那 _____（be）她过去一年每晚都在梦中 _____（see）到的同一张脸。'
