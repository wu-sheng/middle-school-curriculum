  # ============================================================
  # G0421-G0440: Past perfect for backstory/flashback
  # ============================================================
  - id: G0421
    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'She realised she _____ (leave) her bag on the train.'
    questionZh: '她意识到她把包 _____（leave）在了火车上。'
    answer: 'had left'
    explanation: 'Past perfect (had left) shows that leaving the bag happened BEFORE the moment of realising.'
    explanationZh: '过去完成时（had left）表示忘带包发生在意识到之前。'
    grammarPoint: 'Past perfect for earlier event'
    relatedQuest: Q05
    difficulty: 2

  - id: G0422
    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'By the time they arrived, the dragon _____ (already / fly) away.'
    questionZh: '到他们到达时，龙 _____（already / fly）走了。'
    answer: 'had already flown'
    explanation: 'Past perfect with "already" emphasises that the flying happened before their arrival.'
    explanationZh: '过去完成时搭配"already"强调飞走发生在他们到达之前。'
    grammarPoint: 'By the time + past perfect'
    relatedQuest: Q05
    difficulty: 2

  - id: G0423
    type: multiple-choice
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'The explorers were exhausted because they _____ for twelve hours without rest.'
    questionZh: '探险者们精疲力竭，因为他们已经 _____ 了十二个小时没有休息。'
    options:
      A: 'walked'
      B: 'had walked'
      C: 'were walking'
      D: 'have walked'
    answer: 'B'
    explanation: 'Past perfect (had walked) explains the reason for their current (past) state of exhaustion.'
    explanationZh: '过去完成时（had walked）解释了他们当时（过去）疲惫的原因。'
    grammarPoint: 'Past perfect for cause/reason'
    relatedQuest: Q05
    difficulty: 2

  - id: G0424
    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'He _____ (never / see) such a beautiful castle before that day.'
    questionZh: '在那天之前，他从未 _____（see）过如此美丽的城堡。'
    answer: 'had never seen'
    explanation: 'Past perfect with "never...before" shows a first-time experience up to a point in the past.'
    explanationZh: '过去完成时搭配"never...before"表示直到过去某一时刻的第一次经历。'
    grammarPoint: 'Past perfect with never...before'
    relatedQuest: Q05
    difficulty: 2

