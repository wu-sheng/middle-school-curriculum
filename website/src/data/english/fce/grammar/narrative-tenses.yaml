  - id: G0436
    type: multiple-choice
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'The detective knew exactly who the criminal was — he _____ the clues for weeks.'
    questionZh: '侦探确切地知道罪犯是谁——他已经 _____ 线索好几周了。'
    options:
      A: 'studied'
      B: 'had been studying'
      C: 'was studying'
      D: 'studies'
