    explanation: 'Each new speaker should start on a new line/paragraph. This makes dialogue easier to follow.'
    explanationZh: '每个新说话人应该在新行/段落开始。这使对话更容易跟读。'
    grammarPoint: 'New speaker = new paragraph'
    relatedQuest: Q05
    difficulty: 2

  - id: G0473
    type: fill-blank
    tags: [direct-speech, Q05, difficulty-2]
    context: storytelling
    question: 'Rewrite with an action beat instead of "said": "I can''t believe it," she said.'
    questionZh: '用动作描写替代"said"重写："我不敢相信，"她说。'
    answer: '"I can''t believe it." She pressed her hands against the glass, staring at the treasure inside.'
    explanation: 'Replacing "she said" with an action (pressing hands, staring) shows emotion through movement rather than a reporting verb.'
    explanationZh: '用动作（按手、盯着）替代"她说"，通过动作而非引述动词展示情感。'
    grammarPoint: 'Action beats replacing said'
    relatedQuest: Q05
    difficulty: 2

