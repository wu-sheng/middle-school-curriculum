  # ============================================================
  # G0481-G0500: Mixed narrative tenses review
  # ============================================================
  - id: G0481
    type: fill-blank
    tags: [mixed-narrative, Q05, difficulty-2]
    context: storytelling
    question: 'She _____ (walk) home when she _____ (realise) she _____ (forget) her keys at school.'
    questionZh: '她正在 _____（walk）回家时 _____（realise）她把钥匙 _____（forget）在学校了。'
    answer: 'was walking / realised / had forgotten'
    explanation: 'Three tenses working together: past continuous (background), past simple (sudden realisation), past perfect (earlier event).'
    explanationZh: '三种时态协同工作：过去进行时（背景）、一般过去时（突然意识到）、过去完成时（更早的事件）。'
    grammarPoint: 'Three narrative tenses combined'
    relatedQuest: Q05
    difficulty: 2

  - id: G0482
    type: fill-blank
    tags: [mixed-narrative, Q05, difficulty-2]
    context: storytelling
    question: 'The castle _____ (stand) on the hill for centuries. Nobody _____ (ever / enter) it until that stormy night.'
    questionZh: '城堡在山上 _____（stand）了几个世纪。直到那个暴风雨之夜，没有人 _____（enter）过它。'
    answer: 'had stood / had ever entered'
    explanation: 'Both past perfect forms set the backstory before the main narrative begins.'
    explanationZh: '两个过去完成时形式在主叙述开始之前设定了背景故事。'
    grammarPoint: 'Past perfect for backstory setting'
    relatedQuest: Q05
    difficulty: 2

  - id: G0483
    type: fill-blank
    tags: [mixed-narrative, Q05, difficulty-2]
    context: storytelling
    question: 'While the storm _____ (rage) outside, the children _____ (sit) by the fire. Their grandmother _____ (tell) them a story she _____ (hear) as a child.'
    questionZh: '暴风雨 _____（rage）的同时，孩子们 _____（sit）在火炉旁。他们的祖母给他们讲了一个她小时候 _____（hear）到的故事。'
    answer: 'was raging / were sitting / told / had heard'
    explanation: 'Past continuous (scene-setting), past continuous (parallel action), past simple (main action), past perfect (earlier event).'
    explanationZh: '过去进行时（场景设定）、过去进行时（平行动作）、一般过去时（主要动作）、过去完成时（更早的事件）。'
    grammarPoint: 'All narrative tenses in one passage'
    relatedQuest: Q05
    difficulty: 2

  - id: G0484
    type: multiple-choice
    tags: [mixed-narrative, Q05, difficulty-2]
    context: storytelling
    question: 'By the time the rescue team arrived, the flood _____ most of the village.'
    questionZh: '到救援队到达时，洪水已经 _____ 了大部分村庄。'
    options:
      A: 'destroyed'
      B: 'had destroyed'
      C: 'was destroying'
      D: 'has destroyed'
    answer: 'B'
    explanation: '"By the time" + past simple requires past perfect for the event that happened first.'
    explanationZh: '"By the time" + 一般过去时要求过去完成时表示先发生的事件。'
    grammarPoint: 'By the time + past perfect'
    relatedQuest: Q05
    difficulty: 2

  - id: G0485
    type: fill-blank
    tags: [mixed-narrative, Q05, difficulty-2]
    context: storytelling
    question: '"I _____ (never / fly) on a dragon before!" she _____ (exclaim) as they _____ (soar) over the mountains.'
    questionZh: '"我以前从来没有 _____（fly）过龙！"当他们 _____（soar）越过山脉时，她 _____（exclaim）道。'
    answer: 'have never flown / exclaimed / soared'
    explanation: 'Present perfect inside the speech (her current experience), past simple for the reporting verb and the action.'
    explanationZh: '引述内用现在完成时（她当前的经历），引述动词和动作用一般过去时。'
