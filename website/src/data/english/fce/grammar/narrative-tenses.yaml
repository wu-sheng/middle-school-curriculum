    options:
      A: '"Where are you going," he asked?'
      B: '"Where are you going?" he asked.'
      C: '"Where are you going?" He asked.'
      D: '"Where are you going" he asked?'
    answer: 'B'
    explanation: 'Question marks go inside the speech marks. "He asked" continues the same sentence with a lowercase letter.'
    explanationZh: '问号放在引号内。"He asked"以小写字母继续同一个句子。'
    grammarPoint: 'Direct speech: question mark inside speech marks'
    relatedQuest: Q05
    difficulty: 1

