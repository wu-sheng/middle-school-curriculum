  - id: G0430
    type: multiple-choice
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'No sooner _____ the door than a cold wind blew through the room.'
    questionZh: '她刚 _____ 门，一阵冷风就吹过了房间。'
    options:
      A: 'she had opened'
      B: 'had she opened'
      C: 'she opened'
      D: 'she was opening'
    answer: 'B'
    explanation: '"No sooner had...than" uses inverted past perfect. The door opening happened immediately before the wind.'
    explanationZh: '"No sooner had...than"使用过去完成时倒装。开门紧接着就刮风了。'
    grammarPoint: 'No sooner had...than (inversion)'
    relatedQuest: Q05
    difficulty: 2

