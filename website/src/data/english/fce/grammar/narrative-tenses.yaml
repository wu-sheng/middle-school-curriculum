      B: 'shook'
      C: 'has shaken'
      D: 'shakes'
    answer: 'B'
    explanation: '"All of a sudden" introduces a sudden, completed event — past simple is correct.'
    explanationZh: '"All of a sudden"引入一个突然的、完成的事件——一般过去时是正确的。'
    grammarPoint: 'All of a sudden + past simple'
    relatedQuest: Q05
