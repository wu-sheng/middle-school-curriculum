    questionZh: '英雄 _____（defeat）怪物之后，村民们庆祝了一整夜。'
    answer: 'had defeated'
    explanation: '"After" + past perfect shows the sequence: first the defeat, then the celebration.'
    explanationZh: '"After" + 过去完成时表明顺序：先战胜，然后庆祝。'
    grammarPoint: 'After + past perfect'
    relatedQuest: Q05
    difficulty: 2

  - id: G0428
