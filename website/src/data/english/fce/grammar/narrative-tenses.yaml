    explanation: 'Past simple (found) for the main event, past perfect continuous (had been looking) for the ongoing search, past perfect (had hidden) for the ancient hiding.'
    explanationZh: '一般过去时（found）表示主要事件，过去完成进行时（had been looking）表示持续的搜索，过去完成时（had hidden）表示古老的隐藏。'
