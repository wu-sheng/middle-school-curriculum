    type: fill-blank
    tags: [past-perfect, Q05, difficulty-2]
    context: storytelling
    question: 'She looked at the ruined castle. It _____ (once / be) the most beautiful building in the kingdom.'
    questionZh: '她看着那座废墟城堡。它曾经 _____（be）王国里最美丽的建筑。'
    answer: 'had once been'
