      C: 'has opened'
      D: 'opens'
    answer: 'B'
    explanation: '"The moment" signals an instantaneous event, which takes past simple. Both events happened one after the other.'
    explanationZh: '"The moment"标志着瞬间事件，使用一般过去时。两个事件相继发生。'
    grammarPoint: 'The moment + past simple'
    relatedQuest: Q05
    difficulty: 2

  - id: G0417
