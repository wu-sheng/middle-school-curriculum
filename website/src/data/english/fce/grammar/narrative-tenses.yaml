    explanation: 'Inside direct speech, present perfect (have you been) and present perfect continuous (have been waiting) reflect the character''s present perspective.'
    explanationZh: '在直接引语中，现在完成时（have you been）和现在完成进行时（have been waiting）反映角色的当前视角。'
