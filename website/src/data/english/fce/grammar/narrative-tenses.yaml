category: 'Narrative Tenses'
categoryZh: '叙事时态'
questions:
  # ============================================================
  # G0401-G0420: Past simple vs past continuous in narratives
  # ============================================================
  - id: G0401
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-1]
    context: storytelling
    question: 'She _____ (walk) through the forest when she _____ (hear) a strange noise.'
    questionZh: '她正在穿过森林时，她 _____（hear）到了一个奇怪的声音。'
    answer: 'was walking / heard'
    explanation: 'Past continuous (was walking) for the background action in progress; past simple (heard) for the sudden event that interrupted it.'
    explanationZh: '过去进行时（was walking）表示正在进行的背景动作；一般过去时（heard）表示打断的突然事件。'
    grammarPoint: 'Past continuous vs past simple'
    relatedQuest: Q05
    difficulty: 1

  - id: G0402
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-1]
    context: storytelling
    question: 'The children _____ (play) in the garden when it _____ (start) to rain.'
    questionZh: '孩子们在花园里 _____（play）时，天开始 _____（start）下雨了。'
    answer: 'were playing / started'
    explanation: 'Past continuous (were playing) sets the scene; past simple (started) introduces the new event.'
    explanationZh: '过去进行时（were playing）设定场景；一般过去时（started）引入新事件。'
    grammarPoint: 'Past continuous vs past simple'
    relatedQuest: Q05
    difficulty: 1

  - id: G0403
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-1]
    context: storytelling
    question: 'While the wizard _____ a spell, the candle went out.'
    questionZh: '当巫师正在 _____ 咒语时，蜡烛灭了。'
    options:
      A: 'cast'
      B: 'was casting'
      C: 'casted'
      D: 'has cast'
    answer: 'B'
    explanation: '"While" signals a longer background action (past continuous: was casting). The candle going out is the shorter, interrupting event.'
    explanationZh: '"While"标志着较长的背景动作（过去进行时：was casting）。蜡烛灭了是较短的打断事件。'
    grammarPoint: 'While + past continuous'
    relatedQuest: Q05
    difficulty: 1

  - id: G0404
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-1]
    context: storytelling
    question: 'I _____ (read) a book when someone _____ (knock) on the door.'
    questionZh: '我正在 _____（read）一本书时，有人 _____（knock）了门。'
    answer: 'was reading / knocked'
    explanation: 'Past continuous for the ongoing activity; past simple for the interruption.'
    explanationZh: '过去进行时表示正在进行的活动；一般过去时表示打断。'
    grammarPoint: 'Past continuous vs past simple'
    relatedQuest: Q05
    difficulty: 1

  - id: G0405
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-1]
    context: storytelling
    question: 'The sun _____ when the adventurers set off on their journey.'
    questionZh: '当冒险者们出发时，太阳正在 _____。'
    options:
      A: 'rose'
      B: 'was rising'
      C: 'has risen'
      D: 'rises'
    answer: 'B'
    explanation: 'The sun rising is the background scene-setting action (past continuous). The adventurers setting off is the main event (past simple).'
    explanationZh: '太阳升起是背景场景设定动作（过去进行时）。冒险者出发是主要事件（一般过去时）。'
    grammarPoint: 'Past continuous for scene-setting'
    relatedQuest: Q05
    difficulty: 1

  - id: G0406
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'While Tom _____ (climb) the tower, the rope suddenly _____ (snap).'
    questionZh: '当Tom正在 _____（climb）塔楼时，绳子突然 _____（snap）了。'
    answer: 'was climbing / snapped'
    explanation: '"While" + past continuous for the longer action; past simple for the sudden event.'
    explanationZh: '"While" + 过去进行时表示较长动作；一般过去时表示突发事件。'
    grammarPoint: 'While + past continuous, past simple'
    relatedQuest: Q05
    difficulty: 2

  - id: G0407
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'She _____ nervously as the teacher read out the exam results.'
    questionZh: '当老师宣布考试成绩时，她紧张地 _____。'
    options:
      A: 'waited'
      B: 'was waiting'
      C: 'waits'
      D: 'had waited'
    answer: 'B'
    explanation: 'Both actions happened simultaneously. "Was waiting" (past continuous) describes the ongoing state during the teacher reading results.'
    explanationZh: '两个动作同时发生。"Was waiting"（过去进行时）描述老师宣布成绩期间的持续状态。'
    grammarPoint: 'Simultaneous past actions'
    relatedQuest: Q05
    difficulty: 2

  - id: G0408
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'It _____ (rain) heavily and the wind _____ (howl) through the trees.'
    questionZh: '雨下得很大，风在树林中 _____（howl）。'
    answer: 'was raining / was howling'
    explanation: 'Two simultaneous background actions both use past continuous to set an atmospheric scene.'
    explanationZh: '两个同时进行的背景动作都用过去进行时来设定氛围。'
    grammarPoint: 'Past continuous for parallel scene-setting'
    relatedQuest: Q05
    difficulty: 2

  - id: G0409
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'When the clock _____ midnight, all the candles blew out at once.'
    questionZh: '当钟 _____ 午夜时，所有蜡烛同时熄灭了。'
    options:
      A: 'was striking'
      B: 'struck'
      C: 'has struck'
      D: 'strikes'
    answer: 'B'
    explanation: '"When" with a short, completed action uses past simple. The clock striking is a momentary event, not a long background action.'
    explanationZh: '"When"搭配短暂、完成的动作使用一般过去时。钟响是瞬间事件，不是长时间背景动作。'
    grammarPoint: 'When + past simple (momentary event)'
    relatedQuest: Q05
    difficulty: 2

  - id: G0410
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'The dragon _____ (sleep) peacefully when the knight _____ (enter) the cave.'
    questionZh: '骑士 _____（enter）洞穴时，龙正在 _____（sleep）。'
    answer: 'was sleeping / entered'
    explanation: 'Past continuous (was sleeping) for the ongoing state; past simple (entered) for the action that happened during it.'
    explanationZh: '过去进行时（was sleeping）表示持续状态；一般过去时（entered）表示在其间发生的动作。'
    grammarPoint: 'Past continuous + past simple'
    relatedQuest: Q05
    difficulty: 2

  - id: G0411
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'As the ship _____ (sink), the captain _____ (order) everyone into the lifeboats.'
    questionZh: '当船正在 _____（sink）时，船长 _____（order）所有人上救生艇。'
    answer: 'was sinking / ordered'
    explanation: '"As" + past continuous for the background situation; past simple for the decisive action taken during it.'
    explanationZh: '"As" + 过去进行时表示背景情况；一般过去时表示在期间采取的决定性动作。'
    grammarPoint: 'As + past continuous'
    relatedQuest: Q05
    difficulty: 2

  - id: G0412
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'The birds _____ and the sun _____ — it was a perfect morning for an adventure.'
    questionZh: '鸟在 _____，太阳在 _____ — 这是冒险的完美早晨。'
    options:
      A: 'sang / shone'
      B: 'were singing / was shining'
      C: 'sing / shines'
      D: 'had sung / had shone'
    answer: 'B'
    explanation: 'Both actions are scene-setting descriptions of an ongoing state, so both use past continuous.'
    explanationZh: '两个动作都是对持续状态的场景设定描述，所以都用过去进行时。'
    grammarPoint: 'Past continuous for scene-setting'
    relatedQuest: Q05
    difficulty: 2

  - id: G0413
    type: fill-blank
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'Nobody _____ (notice) the stranger who _____ (stand) in the shadows.'
    questionZh: '没有人 _____（notice）站在阴影中的那个陌生人。'
    answer: 'noticed / was standing'
    explanation: 'Past simple (noticed) for the main point; past continuous (was standing) for the ongoing background state.'
    explanationZh: '一般过去时（noticed）表示主要要点；过去进行时（was standing）表示持续的背景状态。'
    grammarPoint: 'Past simple + past continuous'
    relatedQuest: Q05
    difficulty: 2

  - id: G0414
    type: multiple-choice
    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
