    answer: '"What time does the train leave?" asked the traveller. "I need to know immediately."'
    explanation: 'Question mark inside speech marks. "asked" is lowercase. Full stop after "traveller." New statement in new speech marks.'
    explanationZh: '问号在引号内。"asked"用小写。"traveller"后用句号。新陈述用新引号。'
