    answer: 'creaked / was / had been / had stopped'
    explanation: 'Past simple for the action, past simple for the current state, past perfect for the earlier state and the stopped time.'
    explanationZh: '一般过去时表示动作，一般过去时表示当前状态，过去完成时表示更早的状态和停止的时间。'
