    answer: 'B'
    explanation: 'The thief escaped BEFORE the police arrived — past perfect shows the earlier event.'
    explanationZh: '小偷在警察到达之前就逃走了——过去完成时表示更早的事件。'
    grammarPoint: 'Past perfect for earlier completed action'
    relatedQuest: Q05
    difficulty: 2

