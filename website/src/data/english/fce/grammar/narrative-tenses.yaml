    context: storytelling
    question: 'The children were frightened because they _____ (hear) the legend about the haunted forest.'
    questionZh: '孩子们很害怕，因为他们 _____（hear）过关于闹鬼森林的传说。'
    answer: 'had heard'
    explanation: 'Past perfect (had heard) gives the backstory that explains their fear.'
    explanationZh: '过去完成时（had heard）提供了解释他们恐惧的背景故事。'
