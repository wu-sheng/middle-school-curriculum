    tags: [past-simple-continuous, Q05, difficulty-2]
    context: storytelling
    question: 'She _____ (try) to open the window when the glass _____ (shatter).'
    questionZh: '她正在 _____（try）打开窗户时，玻璃 _____（shatter）了。'
    answer: 'was trying / shattered'
    explanation: 'Past continuous for the attempted action; past simple for the sudden result.'
    explanationZh: '过去进行时表示正在尝试的动作；一般过去时表示突然的结果。'
    grammarPoint: 'Past continuous + past simple'
