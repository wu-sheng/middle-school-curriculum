questions:
  # ============================================================
  # G0101-G0120: Future Forms (difficulty 1-2)
  # will / going to / present continuous for future / future perfect
  # ============================================================
  - id: G0101
    type: fill-blank
    tags: [future-will, Q02, difficulty-1]
    context: fantasy
    question: 'I think the spaceship _____ (arrive) by midnight.'
    questionZh: '我觉得飞船会在午夜前 _____（到达）。'
    answer: 'will arrive'
    explanation: 'We use "will" for predictions based on personal belief or opinion.'
    explanationZh: '用 will 表示基于个人信念或看法的预测。'
    grammarPoint: 'Future - will (prediction)'
    relatedQuest: Q02
    difficulty: 1

  - id: G0102
    type: fill-blank
    tags: [future-going-to, Q02, difficulty-1]
    context: adventure
    question: 'Look at those dark clouds! It _____ (rain) on our treasure hunt.'
    questionZh: '看那些乌云！我们的寻宝之旅要 _____（下雨）了。'
    answer: 'is going to rain'
    explanation: 'We use "be going to" when there is present evidence for a future event. The dark clouds are evidence.'
    explanationZh: '当有现在的证据预示未来事件时，用 be going to。乌云就是证据。'
    grammarPoint: 'Future - going to (evidence-based prediction)'
    relatedQuest: Q02
    difficulty: 1

