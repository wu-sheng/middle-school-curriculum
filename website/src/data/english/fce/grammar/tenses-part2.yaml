    answer: 'will live'
    explanation: '"Will" is used for general predictions about the future, especially with verbs like "believe" and "think".'
    explanationZh: 'will 用于对未来的一般性预测，尤其搭配 believe、think 等动词。'
    grammarPoint: 'Future - will (prediction)'
    relatedQuest: Q02
    difficulty: 1

