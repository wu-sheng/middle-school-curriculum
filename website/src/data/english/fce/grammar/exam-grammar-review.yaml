    options:
      A: 'think'
      B: 'thought'
      C: 'will think'
      D: 'are thinking'
    answer: 'B'
    explanation: '"It is high time + past simple" — an expression meaning something should have happened already. Despite past simple form, it refers to now.'
    explanationZh: '"It is high time+一般过去时"——一个表达，意思是某事早该发生了。尽管用了过去时形式，但指的是现在。'
