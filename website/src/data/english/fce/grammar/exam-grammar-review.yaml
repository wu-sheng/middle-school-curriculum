    answer: 'were'
    acceptableAnswers: ['were', 'was']
    explanation: 'Second conditional: "If the weather were/was better." Formally, "were" is preferred for all persons in second conditionals.'
    explanationZh: '第二条件句："If the weather were/was better"。正式情况下，第二条件句所有人称都用"were"。'
    grammarPoint: 'Second conditional with were'
    relatedQuest: Q11
    difficulty: 3

