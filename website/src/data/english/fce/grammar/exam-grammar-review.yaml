    options:
      A: 'has never been'
      B: 'had never been'
      C: 'never was'
      D: 'would never be'
    answer: 'B'
    explanation: 'Reported speech: present perfect "have never been" → past perfect "had never been."'
    explanationZh: '转述语：现在完成时"have never been"→过去完成时"had never been"。'
    grammarPoint: 'Reported speech: present perfect → past perfect'
    relatedQuest: Q11
    difficulty: 3

  - id: G1053
    type: multiple-choice
    tags: [passive, Q11, difficulty-3]
