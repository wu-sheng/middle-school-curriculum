# FCE Grammar — Comprehensive Exam Review (Month 11)
# G1001-G1100: All tenses, conditionals, clause types, modals, passive, reported speech
# Mixed difficulty (2-4), Code Breaker theme

category: 'Comprehensive Exam Grammar Review'
categoryZh: '综合考试语法复习'
questions:
  # ============================================================
  # G1001–G1020: Tense Review (all tenses mixed)
  # ============================================================
  - id: G1001
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'By the time we arrived at the cinema, the film _____.'
    questionZh: '当我们到达电影院时，电影已经开始了。'
    options:
      A: 'already started'
      B: 'has already started'
      C: 'had already started'
      D: 'was already starting'
    answer: 'C'
    explanation: 'Past perfect "had already started" is needed because the film started BEFORE we arrived — two past events, earlier one uses past perfect.'
    explanationZh: '需要过去完成时"had already started"，因为电影在我们到达之前就开始了——两个过去事件，较早的用过去完成时。'
    grammarPoint: 'Past perfect for earlier of two past events'
    relatedQuest: Q11
    difficulty: 2

  - id: G1002
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'She _____ English for three years before she took the FCE exam.'
    questionZh: '她在参加FCE考试之前已经学了三年英语。'
    options:
      A: 'studied'
      B: 'has studied'
      C: 'had been studying'
      D: 'was studying'
    answer: 'C'
    explanation: 'Past perfect continuous "had been studying" emphasises the duration of an activity that continued up to a past event (taking the exam).'
    explanationZh: '过去完成进行时"had been studying"强调一个持续到过去某个事件（参加考试）的活动的持续时间。'
    grammarPoint: 'Past perfect continuous for duration before past event'
    relatedQuest: Q11
    difficulty: 2

  - id: G1003
    type: fill-blank
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'I _____ (not/see) this film before. Let''s watch it!'
    questionZh: '我以前没看过这部电影。我们看吧！'
    answer: "haven't seen"
    acceptableAnswers: ["haven't seen", "have not seen", "have never seen"]
    explanation: 'Present perfect "haven''t seen" for an experience up to the present. "Before" is a key signal word.'
    explanationZh: '现在完成时"haven''t seen"表示到目前为止的经历。"Before"是关键信号词。'
    grammarPoint: 'Present perfect for experience'
    relatedQuest: Q11
    difficulty: 2

  - id: G1004
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'This time next week, I _____ my final exam.'
    questionZh: '下周这个时候，我将正在参加期末考试。'
    options:
      A: 'will take'
      B: 'will be taking'
      C: 'will have taken'
      D: 'take'
    answer: 'B'
    explanation: 'Future continuous "will be taking" describes an action in progress at a specific future time.'
    explanationZh: '将来进行时"will be taking"描述在未来特定时间正在进行的动作。'
    grammarPoint: 'Future continuous for action in progress at future time'
    relatedQuest: Q11
    difficulty: 3

  - id: G1005
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'By December, she _____ all twelve months of the course.'
    questionZh: '到十二月，她将已经完成了课程的所有十二个月。'
    options:
      A: 'completes'
      B: 'will complete'
      C: 'will have completed'
      D: 'is completing'
    answer: 'C'
    explanation: 'Future perfect "will have completed" describes an action that will be finished before a specific future time ("by December").'
    explanationZh: '将来完成时"will have completed"描述在特定未来时间（"到十二月"）之前将完成的动作。'
    grammarPoint: 'Future perfect for completion before future time'
    relatedQuest: Q11
    difficulty: 3

  - id: G1006
    type: fill-blank
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'Look at those dark clouds! It _____ (rain) soon.'
    questionZh: '看那些乌云！很快就要下雨了。'
    answer: 'is going to rain'
    acceptableAnswers: ['is going to rain']
    explanation: '"Is going to rain" — we use "going to" for predictions based on current evidence (dark clouds).'
    explanationZh: '"Is going to rain"——我们用"going to"根据当前证据（乌云）进行预测。'
    grammarPoint: 'Going to for evidence-based predictions'
    relatedQuest: Q11
    difficulty: 2

  - id: G1007
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'The teacher _____ us the results as soon as they are ready.'
    questionZh: '一旦结果准备好，老师就会告诉我们。'
    options:
      A: 'tells'
      B: 'will tell'
      C: 'told'
      D: 'is telling'
    answer: 'B'
    explanation: '"Will tell" in the main clause + present simple in the time clause ("as soon as they are ready"). We do NOT use "will" in the time clause.'
    explanationZh: '主句用"will tell"+时间从句用一般现在时（"as soon as they are ready"）。时间从句中不用"will"。'
    grammarPoint: 'Future time clauses: will + present simple'
    relatedQuest: Q11
    difficulty: 3

  - id: G1008
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'While I _____ for the bus, it started to rain heavily.'
    questionZh: '当我在等公交车时，开始下大雨。'
    options:
      A: 'waited'
      B: 'was waiting'
      C: 'have waited'
      D: 'am waiting'
    answer: 'B'
    explanation: 'Past continuous "was waiting" for the longer background action; past simple "started" for the shorter interrupting action.'
    explanationZh: '过去进行时"was waiting"表示较长的背景动作；一般过去时"started"表示较短的打断动作。'
    grammarPoint: 'Past continuous + past simple for interrupted action'
    relatedQuest: Q11
    difficulty: 2

  - id: G1009
    type: fill-blank
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'She usually _____ (walk) to school, but today she _____ (take) the bus.'
    questionZh: '她通常步行去学校，但今天她坐公交车。'
    answer: 'walks / is taking'
    acceptableAnswers: ['walks / is taking', 'walks, is taking']
    explanation: 'Present simple "walks" for habits; present continuous "is taking" for a temporary action happening today.'
    explanationZh: '一般现在时"walks"表示习惯；现在进行时"is taking"表示今天正在发生的临时动作。'
    grammarPoint: 'Present simple vs. present continuous'
    relatedQuest: Q11
    difficulty: 3

  - id: G1010
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'I promise I _____ my best in the exam tomorrow.'
    questionZh: '我保证明天考试我会尽全力。'
    options:
      A: 'do'
      B: 'am doing'
      C: 'will do'
      D: 'am going to do'
    answer: 'C'
    explanation: '"Will" is used for promises and spontaneous decisions. "I promise I will do" — a promise made at the moment of speaking.'
    explanationZh: '"Will"用于承诺和即时决定。"I promise I will do"——在说话时做出的承诺。'
    grammarPoint: 'Will for promises'
    relatedQuest: Q11
    difficulty: 3

  - id: G1011
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'The number of electric cars on the road _____ dramatically since 2015.'
    questionZh: '自2015年以来，道路上的电动汽车数量急剧增加。'
    options:
      A: 'increased'
      B: 'has increased'
      C: 'is increasing'
      D: 'was increasing'
    answer: 'B'
    explanation: 'Present perfect "has increased" with "since 2015" — an action that started in the past and has relevance to the present.'
    explanationZh: '现在完成时"has increased"搭配"since 2015"——从过去开始且与现在有关的动作。'
    grammarPoint: 'Present perfect with since'
    relatedQuest: Q11
    difficulty: 3

  - id: G1012
    type: fill-blank
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'Water _____ (boil) at 100 degrees Celsius.'
    questionZh: '水在100摄氏度时沸腾。'
    answer: 'boils'
    acceptableAnswers: ['boils']
    explanation: 'Present simple for scientific facts and general truths.'
    explanationZh: '一般现在时用于科学事实和一般真理。'
    grammarPoint: 'Present simple for facts'
    relatedQuest: Q11
    difficulty: 2

  - id: G1013
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'I _____ this book for two hours and I still have not finished it.'
    questionZh: '我已经读了两个小时的书，还没读完。'
    options:
      A: 'read'
      B: 'am reading'
      C: 'have been reading'
      D: 'was reading'
    answer: 'C'
    explanation: 'Present perfect continuous "have been reading" for an action that started in the past and is still continuing now (for two hours).'
    explanationZh: '现在完成进行时"have been reading"表示从过去开始并一直持续到现在的动作（两个小时了）。'
    grammarPoint: 'Present perfect continuous for ongoing action'
    relatedQuest: Q11
    difficulty: 3

  - id: G1014
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'The ancient Romans _____ roads that are still used today.'
    questionZh: '古罗马人建造了至今仍在使用的道路。'
    options:
      A: 'build'
      B: 'built'
      C: 'have built'
      D: 'were building'
    answer: 'B'
    explanation: 'Past simple "built" for a completed action in the past (the Romans built them — finished historical action).'
    explanationZh: '一般过去时"built"表示过去完成的动作（罗马人建造了它们——已完成的历史动作）。'
    grammarPoint: 'Past simple for completed past actions'
    relatedQuest: Q11
    difficulty: 2

  - id: G1015
    type: fill-blank
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'By the time you read this, I _____ (already/leave) the country.'
    questionZh: '当你读到这个的时候，我已经离开这个国家了。'
    answer: 'will have already left'
    acceptableAnswers: ['will have already left', 'will already have left']
    explanation: 'Future perfect "will have already left" — the leaving will be complete before the reading happens.'
    explanationZh: '将来完成时"will have already left"——离开会在阅读之前完成。'
    grammarPoint: 'Future perfect'
    relatedQuest: Q11
    difficulty: 3

  - id: G1016
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'She said she _____ the book the previous week.'
    questionZh: '她说她前一周已经读完了那本书。'
    options:
      A: 'finished'
      B: 'had finished'
      C: 'has finished'
      D: 'finishes'
    answer: 'B'
    explanation: 'Reported speech with backshift: "I finished" → "she had finished." Past simple becomes past perfect.'
    explanationZh: '转述语中时态后移：原来的"I finished"变成"she had finished"。一般过去时变过去完成时。'
    grammarPoint: 'Reported speech: tense backshift'
    relatedQuest: Q11
    difficulty: 3

  - id: G1017
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-2]
    context: exam-skills
    question: 'I _____ to Paris twice, but I have never been to Rome.'
    questionZh: '我去过巴黎两次，但从未去过罗马。'
    options:
      A: 'went'
      B: 'have been'
      C: 'had been'
      D: 'go'
    answer: 'B'
    explanation: 'Present perfect "have been" for life experiences up to now. "Twice" and "never" are typical present perfect markers.'
    explanationZh: '现在完成时"have been"表示到目前为止的人生经历。"Twice"和"never"是典型的现在完成时标志。'
    grammarPoint: 'Present perfect for life experiences'
    relatedQuest: Q11
    difficulty: 2

  - id: G1018
    type: fill-blank
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'They _____ (live) in London for ten years when they decided to move.'
    questionZh: '他们在伦敦住了十年后决定搬家。'
    answer: 'had been living'
    acceptableAnswers: ['had been living', 'had lived']
    explanation: 'Past perfect continuous "had been living" emphasises the duration of living before the decision to move (both past events).'
    explanationZh: '过去完成进行时"had been living"强调在决定搬家之前居住的持续时间（两个过去事件）。'
    grammarPoint: 'Past perfect continuous for duration before past event'
    relatedQuest: Q11
    difficulty: 3

  - id: G1019
    type: multiple-choice
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'The flight _____ at 9:30 tomorrow morning.'
    questionZh: '航班明天早上9:30起飞。'
    options:
      A: 'leaves'
      B: 'will leave'
      C: 'is leaving'
      D: 'left'
    answer: 'A'
    explanation: 'Present simple "leaves" for fixed schedules and timetables. Flights, trains, and buses use present simple for scheduled departures.'
    explanationZh: '一般现在时"leaves"用于固定时刻表。航班、火车和公交车的计划出发时间用一般现在时。'
    grammarPoint: 'Present simple for timetables'
    relatedQuest: Q11
    difficulty: 3

  - id: G1020
    type: fill-blank
    tags: [tense-review, Q11, difficulty-3]
    context: exam-skills
    question: 'I wish I _____ (study) harder last term. Now I am struggling.'
    questionZh: '我希望上学期学习更努力。现在我很吃力。'
    answer: 'had studied'
    acceptableAnswers: ['had studied']
    explanation: '"I wish + past perfect" for regrets about the past. "Had studied" shows a past action you wish had been different.'
    explanationZh: '"I wish+过去完成时"用于对过去的遗憾。"Had studied"表示你希望曾经不同的过去动作。'
    grammarPoint: 'Wish + past perfect for past regrets'
    relatedQuest: Q11
    difficulty: 3

  # ============================================================
  # G1021–G1040: Conditionals (0, 1, 2, 3, mixed)
  # ============================================================
  - id: G1021
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-2]
    context: exam-skills
    question: 'If you heat water to 100 degrees, it _____.'
    questionZh: '如果你把水加热到100度，它会沸腾。'
    options:
      A: 'boils'
      B: 'will boil'
      C: 'would boil'
      D: 'boiled'
    answer: 'A'
    explanation: 'Zero conditional (if + present, present) for scientific facts that are always true.'
    explanationZh: '零条件句（if+一般现在时，一般现在时）用于始终为真的科学事实。'
    grammarPoint: 'Zero conditional'
    relatedQuest: Q11
    difficulty: 2

  - id: G1022
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-2]
    context: exam-skills
    question: 'If you study every day, you _____ the exam easily.'
    questionZh: '如果你每天学习，你会轻松通过考试。'
    options:
      A: 'pass'
      B: 'will pass'
      C: 'would pass'
      D: 'passed'
    answer: 'B'
    explanation: 'First conditional (if + present, will + base) for real, possible future situations.'
    explanationZh: '第一条件句（if+一般现在时，will+动词原形）用于真实、可能的未来情况。'
    grammarPoint: 'First conditional'
    relatedQuest: Q11
    difficulty: 2

  - id: G1023
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'If I _____ more time, I would read more books.'
    questionZh: '如果我有更多时间，我会读更多的书。'
    options:
      A: 'have'
      B: 'had'
      C: 'would have'
      D: 'will have'
    answer: 'B'
    explanation: 'Second conditional (if + past simple, would + base) for unreal/hypothetical present situations.'
    explanationZh: '第二条件句（if+一般过去时，would+动词原形）用于非真实/假设的现在情况。'
    grammarPoint: 'Second conditional'
    relatedQuest: Q11
    difficulty: 3

  - id: G1024
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'If she had practised more, she _____ a higher score.'
    questionZh: '如果她练习更多，她就会得到更高的分数。'
    options:
      A: 'will get'
      B: 'would get'
      C: 'would have got'
      D: 'got'
    answer: 'C'
    explanation: 'Third conditional (if + past perfect, would have + past participle) for unreal past situations — things that did NOT happen.'
    explanationZh: '第三条件句（if+过去完成时，would have+过去分词）用于非真实的过去情况——没有发生的事情。'
    grammarPoint: 'Third conditional'
    relatedQuest: Q11
    difficulty: 3

  - id: G1025
    type: fill-blank
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'If I _____ (be) you, I would start revising now.'
    questionZh: '如果我是你，我现在就会开始复习。'
    answer: 'were'
    acceptableAnswers: ['were']
    explanation: 'Second conditional uses "were" for all persons (formal). "If I were you" is a fixed expression for giving advice.'
    explanationZh: '第二条件句所有人称用"were"（正式）。"If I were you"是给建议的固定表达。'
    grammarPoint: 'Second conditional: if I were you'
    relatedQuest: Q11
    difficulty: 3

  - id: G1026
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'Unless you _____ harder, you will not pass the exam.'
    questionZh: '除非你更努力学习，否则你不会通过考试。'
    options:
      A: 'study'
      B: 'studied'
      C: 'will study'
      D: 'would study'
    answer: 'A'
    explanation: '"Unless" means "if not." Present simple after "unless" in a first conditional structure.'
    explanationZh: '"Unless"意思是"如果不"。在第一条件句中"unless"后用一般现在时。'
    grammarPoint: 'Unless + present simple'
    relatedQuest: Q11
    difficulty: 3

  - id: G1027
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'If he had set his alarm, he _____ late for the exam.'
    questionZh: '如果他设了闹钟，他就不会考试迟到了。'
    options:
      A: 'would not be'
      B: 'will not be'
      C: 'would not have been'
      D: 'is not'
    answer: 'C'
    explanation: 'Third conditional: "If he had set (past perfect), he would not have been (would have + past participle)" — unreal past.'
    explanationZh: '第三条件句："If he had set（过去完成时），he would not have been（would have+过去分词）"——非真实的过去。'
    grammarPoint: 'Third conditional negative'
    relatedQuest: Q11
    difficulty: 3

  - id: G1028
    type: fill-blank
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'Provided that you _____ (arrive) on time, you will be allowed to take the test.'
    questionZh: '只要你准时到达，你就可以参加考试。'
    answer: 'arrive'
    acceptableAnswers: ['arrive']
    explanation: '"Provided that" works like "if" — present simple in the condition clause, will in the result clause.'
    explanationZh: '"Provided that"的用法像"if"——条件从句用一般现在时，结果从句用will。'
    grammarPoint: 'Provided that + present simple'
    relatedQuest: Q11
    difficulty: 3

  - id: G1029
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-4]
    context: exam-skills
    question: 'If she had studied harder last year, she _____ in a higher class now.'
    questionZh: '如果她去年学习更努力，她现在就会在更高的班级里。'
    options:
      A: 'will be'
      B: 'would be'
      C: 'would have been'
      D: 'is'
    answer: 'B'
    explanation: 'Mixed conditional: past condition (if + past perfect) + present result (would + base). The studying was in the past, but the class is NOW.'
    explanationZh: '混合条件句：过去条件（if+过去完成时）+现在结果（would+动词原形）。学习在过去，但班级是现在。'
    grammarPoint: 'Mixed conditional: past → present'
    relatedQuest: Q11
    difficulty: 4

  - id: G1030
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-4]
    context: exam-skills
    question: 'If I were better at maths, I _____ that problem yesterday.'
    questionZh: '如果我数学更好，我昨天就解决那个问题了。'
    options:
      A: 'will solve'
      B: 'would solve'
      C: 'would have solved'
      D: 'solved'
    answer: 'C'
    explanation: 'Mixed conditional: present condition (if I were) + past result (would have solved). My maths ability is a permanent state, the problem was yesterday.'
    explanationZh: '混合条件句：现在条件（if I were）+过去结果（would have solved）。数学能力是永久状态，问题是在昨天。'
    grammarPoint: 'Mixed conditional: present → past'
    relatedQuest: Q11
    difficulty: 4

  - id: G1031
    type: fill-blank
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'I wish I _____ (can) speak five languages fluently.'
    questionZh: '我希望我能流利地说五种语言。'
    answer: 'could'
    acceptableAnswers: ['could']
    explanation: '"Wish + past simple" for unreal present wishes. "Can" becomes "could" after "wish."'
    explanationZh: '"Wish+一般过去时"用于非真实的现在愿望。"Can"在"wish"后变成"could"。'
    grammarPoint: 'Wish + could for present wishes'
    relatedQuest: Q11
    difficulty: 3

  - id: G1032
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'As long as you _____ the instructions carefully, you should do well.'
    questionZh: '只要你仔细阅读说明，你应该会做得很好。'
    options:
      A: 'read'
      B: 'will read'
      C: 'reading'
      D: 'would read'
    answer: 'A'
    explanation: '"As long as" functions like "if" — present simple in the condition clause.'
    explanationZh: '"As long as"的功能像"if"——条件从句中用一般现在时。'
    grammarPoint: 'As long as + present simple'
    relatedQuest: Q11
    difficulty: 3

  - id: G1033
    type: multiple-choice
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
    question: 'If only I _____ about the test earlier, I would have studied more.'
    questionZh: '要是我早点知道考试就好了，我就会学更多。'
    options:
      A: 'know'
      B: 'knew'
      C: 'had known'
      D: 'have known'
    answer: 'C'
    explanation: '"If only + past perfect" for past regrets, same pattern as third conditional with "if only" adding emotional emphasis.'
    explanationZh: '"If only+过去完成时"用于过去的遗憾，与第三条件句相同的模式，"if only"增加了情感强调。'
    grammarPoint: 'If only + past perfect for regrets'
    relatedQuest: Q11
    difficulty: 3

  - id: G1034
    type: fill-blank
    tags: [conditionals, Q11, difficulty-3]
    context: exam-skills
