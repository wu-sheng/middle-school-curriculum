    questionZh: '作业必须在周五之前完成。'
    answer: 'be completed'
    acceptableAnswers: ['be completed']
    explanation: 'Modal passive: "must be completed" = must + be + past participle.'
    explanationZh: '情态动词被动："must be completed"=must+be+过去分词。'
    grammarPoint: 'Modal passive: must be + past participle'
    relatedQuest: Q11
    difficulty: 3

  - id: G1046
    type: multiple-choice
    tags: [passive, Q11, difficulty-3]
    context: exam-skills
    question: 'The house _____ when we arrived — the builders were still working.'
    questionZh: '我们到达时房子正在建造——建筑工人还在工作。'
    options:
      A: 'was built'
      B: 'was being built'
      C: 'has been built'
      D: 'had been built'
    answer: 'B'
    explanation: 'Past continuous passive "was being built" — the action was in progress at the time we arrived.'
    explanationZh: '过去进行时被动"was being built"——动作在我们到达时正在进行。'
    grammarPoint: 'Past continuous passive'
    relatedQuest: Q11
    difficulty: 3

  - id: G1047
    type: multiple-choice
    tags: [reported-speech, Q11, difficulty-2]
    context: exam-skills
    question: '"I am studying for my exam," she said. → She said she _____ for her exam.'
    questionZh: '"我正在为考试学习，"她说。→ 她说她正在为考试学习。'
    options:
      A: 'is studying'
      B: 'was studying'
      C: 'studied'
      D: 'has studied'
    answer: 'B'
    explanation: 'Reported speech backshift: present continuous "am studying" → past continuous "was studying."'
    explanationZh: '转述语时态后移：现在进行时"am studying"→过去进行时"was studying"。'
    grammarPoint: 'Reported speech: present continuous → past continuous'
    relatedQuest: Q11
    difficulty: 2

  - id: G1048
    type: fill-blank
    tags: [reported-speech, Q11, difficulty-3]
    context: exam-skills
    question: '"Will you help me?" she asked. → She asked me _____ I would help her.'
    questionZh: '"你能帮我吗？"她问。→ 她问我是否愿意帮她。'
    answer: 'if'
    acceptableAnswers: ['if', 'whether']
    explanation: 'Reported yes/no questions use "if" or "whether" + subject + verb (no question word order).'
    explanationZh: '转述是非疑问句用"if"或"whether"+主语+动词（没有疑问语序）。'
    grammarPoint: 'Reported yes/no questions: if/whether'
    relatedQuest: Q11
    difficulty: 3

  - id: G1049
    type: multiple-choice
    tags: [reported-speech, Q11, difficulty-3]
    context: exam-skills
    question: '"Don''t forget your pencil case," Mum said. → Mum _____ me not to forget my pencil case.'
    questionZh: '"别忘了你的铅笔盒，"妈妈说。→ 妈妈提醒我不要忘记铅笔盒。'
    options:
      A: 'said'
      B: 'told'
      C: 'reminded'
      D: 'asked'
    answer: 'C'
    explanation: '"Reminded me not to forget" — an imperative (don''t forget) becomes "reminded + object + not to + base verb" in reported speech.'
    explanationZh: '"Reminded me not to forget"——祈使句（don''t forget）在转述语中变成"reminded+宾语+not to+动词原形"。'
    grammarPoint: 'Reported imperatives with remind'
    relatedQuest: Q11
    difficulty: 3

  - id: G1050
    type: multiple-choice
    tags: [reported-speech, Q11, difficulty-3]
    context: exam-skills
    question: '"Where did you buy that book?" he asked. → He asked me where I _____ that book.'
    questionZh: '"你在哪里买的那本书？"他问。→ 他问我在哪里买的那本书。'
    options:
      A: 'bought'
      B: 'had bought'
      C: 'have bought'
      D: 'buy'
    answer: 'B'
    explanation: 'Reported wh-question with backshift: "did you buy" (past simple) → "I had bought" (past perfect). Normal word order in reported questions.'
    explanationZh: '转述特殊疑问句时态后移："did you buy"（一般过去时）→"I had bought"（过去完成时）。转述疑问句用正常语序。'
    grammarPoint: 'Reported wh-questions with backshift'
    relatedQuest: Q11
    difficulty: 3

