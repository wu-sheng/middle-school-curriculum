  # ============================================================
  # G1061–G1080: Modals & Relative clauses
  # ============================================================
  - id: G1061
    type: multiple-choice
    tags: [modals, Q11, difficulty-2]
    context: exam-skills
    question: 'You _____ bring a dictionary into the exam — it is not allowed.'
    questionZh: '你不能把字典带进考场——这是不允许的。'
    options:
      A: 'must not'
      B: 'do not have to'
      C: 'should not'
      D: 'need not'
    answer: 'A'
    explanation: '"Must not" expresses prohibition — it is forbidden. "Do not have to" means there is no obligation (different meaning).'
    explanationZh: '"Must not"表示禁止——是被禁止的。"Do not have to"意味着没有义务（不同的含义）。'
    grammarPoint: 'Must not for prohibition'
    relatedQuest: Q11
    difficulty: 2

  - id: G1062
    type: multiple-choice
    tags: [modals, Q11, difficulty-3]
    context: exam-skills
    question: 'She _____ have left already — her coat is still here.'
    questionZh: '她不可能已经离开了——她的外套还在这里。'
    options:
      A: 'must'
      B: 'might'
      C: 'can not'
      D: 'cannot'
    answer: 'D'
    explanation: '"Cannot have left" — strong deduction that something is impossible based on evidence (the coat is here).'
    explanationZh: '"Cannot have left"——基于证据（外套在这里）的强推断，认为某事不可能。'
    grammarPoint: 'Cannot have + past participle for impossibility'
    relatedQuest: Q11
    difficulty: 3

  - id: G1063
    type: multiple-choice
    tags: [modals, Q11, difficulty-3]
    context: exam-skills
    question: 'He _____ have studied all night — he looks exhausted.'
    questionZh: '他一定学习了一整夜——他看起来筋疲力尽。'
    options:
      A: 'could'
      B: 'might'
      C: 'must'
      D: 'should'
    answer: 'C'
    explanation: '"Must have studied" — strong deduction based on evidence (he looks exhausted). We are almost certain this happened.'
    explanationZh: '"Must have studied"——基于证据（他看起来筋疲力尽）的强推断。我们几乎确定这发生了。'
    grammarPoint: 'Must have + past participle for deduction'
    relatedQuest: Q11
    difficulty: 3

  - id: G1064
    type: fill-blank
    tags: [modals, Q11, difficulty-3]
    context: exam-skills
    question: 'You _____ (not/need) to bring lunch — food will be provided.'
    questionZh: '你不需要带午餐——会提供食物。'
    answer: "don't need"
    acceptableAnswers: ["don't need", "do not need", "needn't"]
    explanation: '"Don''t need to" / "needn''t" means there is no necessity. Different from "must not" (prohibition).'
    explanationZh: '"Don''t need to"/"needn''t"意思是没有必要。不同于"must not"（禁止）。'
    grammarPoint: 'No necessity: don''t need to / needn''t'
    relatedQuest: Q11
    difficulty: 3

  - id: G1065
    type: multiple-choice
    tags: [modals, Q11, difficulty-3]
    context: exam-skills
    question: 'You _____ told me about the test — I had no idea!'
    questionZh: '你应该告诉我关于考试的事——我一点也不知道！'
    options:
      A: 'should'
      B: 'should have'
      C: 'must have'
      D: 'could'
    answer: 'B'
    explanation: '"Should have told" — criticism about something that did NOT happen in the past. You were supposed to tell me but you didn''t.'
    explanationZh: '"Should have told"——对过去没有发生的事情的批评。你本应该告诉我但你没有。'
    grammarPoint: 'Should have + past participle for criticism'
    relatedQuest: Q11
    difficulty: 3

  - id: G1066
    type: multiple-choice
    tags: [modals, Q11, difficulty-3]
    context: exam-skills
    question: 'She _____ be at the library — she said she was going there.'
    questionZh: '她可能在图书馆——她说她要去那里。'
    options:
      A: 'must'
      B: 'might'
      C: 'can'
