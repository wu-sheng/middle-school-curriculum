      D: 'have told'
    answer: 'B'
    explanation: '"Would rather + subject + past simple" for wishes about what other people do. It follows the same pattern as second conditional.'
    explanationZh: '"Would rather+主语+一般过去时"表示希望别人做什么。它遵循与第二条件句相同的模式。'
