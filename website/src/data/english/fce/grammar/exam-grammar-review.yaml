    explanation: 'Present perfect passive: "has been downloaded" — since + time reference requires present perfect.'
    explanationZh: '现在完成时被动："has been downloaded"——since+时间要求现在完成时。'
    grammarPoint: 'Present perfect passive'
    relatedQuest: Q11
    difficulty: 3

