      C: 'reading'
      D: 'reads'
    answer: 'B'
    explanation: '"Were made to read" — in passive, "make" requires "to + infinitive" (unlike active: "The teacher made them read" without "to").'
    explanationZh: '"Were made to read"——在被动中，"make"需要"to+不定式"（不同于主动："The teacher made them read"不需要"to"）。'
