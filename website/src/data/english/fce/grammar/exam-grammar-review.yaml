    relatedQuest: Q11
    difficulty: 4

  # ============================================================
  # G1041–G1060: Passive voice & Reported speech
  # ============================================================
  - id: G1041
    type: multiple-choice
    tags: [passive, Q11, difficulty-2]
    context: exam-skills
    question: 'The exam results _____ next Monday.'
    questionZh: '考试结果将在下周一公布。'
    options:
      A: 'will announce'
      B: 'will be announced'
      C: 'are announcing'
      D: 'have announced'
    answer: 'B'
    explanation: 'Passive voice: "will be announced" — the results are receiving the action, not doing it. Future passive = will be + past participle.'
    explanationZh: '被动语态："will be announced"——结果是接受动作的，不是执行动作的。将来被动=will be+过去分词。'
    grammarPoint: 'Future passive'
    relatedQuest: Q11
    difficulty: 2

  - id: G1042
    type: fill-blank
    tags: [passive, Q11, difficulty-2]
    context: exam-skills
    question: 'English _____ (speak) in over 50 countries around the world.'
    questionZh: '英语在世界上50多个国家被使用。'
    answer: 'is spoken'
    acceptableAnswers: ['is spoken']
    explanation: 'Present simple passive: "is spoken." English receives the action of being spoken.'
    explanationZh: '一般现在时被动："is spoken"。英语接受被说的动作。'
    grammarPoint: 'Present simple passive'
    relatedQuest: Q11
    difficulty: 2

  - id: G1043
    type: multiple-choice
    tags: [passive, Q11, difficulty-3]
    context: exam-skills
    question: 'The suspect is believed _____ the country last night.'
    questionZh: '嫌疑人被认为昨晚离开了这个国家。'
    options:
      A: 'to leave'
      B: 'to have left'
      C: 'leaving'
      D: 'left'
    answer: 'B'
    explanation: '"Is believed to have left" — passive report structure with perfect infinitive for a past action. The leaving happened before the believing.'
    explanationZh: '"Is believed to have left"——用完成不定式的被动报告结构，表示过去的动作。离开发生在相信之前。'
    grammarPoint: 'Passive report: believed to have + past participle'
    relatedQuest: Q11
    difficulty: 3

  - id: G1044
    type: multiple-choice
    tags: [passive, Q11, difficulty-3]
    context: exam-skills
    question: 'The new library _____ by a famous architect.'
    questionZh: '新图书馆是由一位著名建筑师设计的。'
    options:
      A: 'designed'
      B: 'was designed'
      C: 'has designed'
      D: 'is designing'
    answer: 'B'
    explanation: 'Past simple passive "was designed" — the library received the action of being designed. "By a famous architect" is the agent.'
    explanationZh: '一般过去时被动"was designed"——图书馆接受了被设计的动作。"By a famous architect"是施动者。'
    grammarPoint: 'Past simple passive with agent'
    relatedQuest: Q11
    difficulty: 3

  - id: G1045
    type: fill-blank
    tags: [passive, Q11, difficulty-3]
    context: exam-skills
