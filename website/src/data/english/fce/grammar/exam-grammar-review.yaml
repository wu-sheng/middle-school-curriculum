    acceptableAnswers: ['was stolen']
    explanation: '"It is said that" + past simple passive. The stealing happened in the past, so "was stolen."'
    explanationZh: '"It is said that"+一般过去时被动。偷盗发生在过去，所以用"was stolen"。'
