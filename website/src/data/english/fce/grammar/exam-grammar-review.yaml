    answer: "hadn't broken"
    acceptableAnswers: ["hadn't broken", "had not broken"]
    explanation: 'Third conditional negative: "If I hadn''t broken" (past perfect negative) + "would have played."'
    explanationZh: '第三条件句否定形式："If I hadn''t broken"（过去完成时否定）+"would have played"。'
