    options:
      A: 'get'
      B: 'will get'
      C: 'would get'
      D: 'got'
    answer: 'A'
    explanation: 'Zero conditional for a fact that is always true. If + present simple, present simple.'
    explanationZh: '零条件句用于始终为真的事实。If+一般现在时，一般现在时。'
    grammarPoint: 'Zero conditional for facts'
    relatedQuest: Q11
