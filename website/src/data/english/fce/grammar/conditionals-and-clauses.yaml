    explanation: "Third conditional: If + past perfect (hadn't cast), would have + past participle. But here the result is about a present state, making it a mixed conditional (type 3 → present result)."
    explanationZh: '第三条件句/混合条件句：If + 过去完成时（hadn''t cast），would + 动词原形（表示对现在的影响）。'
    grammarPoint: 'Mixed conditional (past condition → present result)'
    relatedQuest: Q04
    difficulty: 2

