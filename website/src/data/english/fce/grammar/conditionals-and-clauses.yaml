      D: 'whose'
    answer: 'B'
    explanation: "We use 'which' (or 'that') for things. 'The potion which the healer made' — 'which' refers to the potion (a thing)."
    explanationZh: '关系从句中指物用 which（或 that）。"治疗师制作的药水"——which 指代 potion（物）。'
