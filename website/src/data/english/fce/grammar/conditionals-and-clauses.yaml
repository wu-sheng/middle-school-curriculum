questions:
  # ============================================================
  # G0301–G0320: Conditional Type 0-1 (zero and first conditional)
  # If + present simple → present simple / will + infinitive
  # Dragon Academy theme
  # ============================================================
  - id: G0301
    type: multiple-choice
    tags: [conditional-0-1, Q04, difficulty-1]
    context: dragon-academy
    question: 'If you _____ a dragon egg in warm sand, it hatches faster.'
    questionZh: '如果你把龙蛋____在温暖的沙子里，它会孵化得更快。'
    options:
      A: 'bury'
      B: 'will bury'
      C: 'buried'
      D: 'would bury'
    answer: 'A'
    explanation: "This is a zero conditional (general truth about dragon eggs). We use present simple in both clauses: If + present simple, present simple."
    explanationZh: '这是零条件句（关于龙蛋的一般事实）。两个从句都用一般现在时：If + 一般现在时，一般现在时。'
    grammarPoint: 'Zero conditional'
    relatedQuest: Q04
    difficulty: 1

