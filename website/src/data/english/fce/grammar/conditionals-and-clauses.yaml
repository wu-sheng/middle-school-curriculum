    options:
      A: 'gets'
      B: 'will get'
      C: 'got'
      D: 'would get'
    answer: 'A'
    explanation: "First conditional with imperative in the main clause: If + present simple, imperative. The result clause uses an imperative (don't look) instead of 'will'."
    explanationZh: '第一条件句搭配祈使句：If + 一般现在时，祈使句。结果从句用祈使句（don''t look）而不是 will。'
    grammarPoint: 'First conditional + imperative'
    relatedQuest: Q04
    difficulty: 2

