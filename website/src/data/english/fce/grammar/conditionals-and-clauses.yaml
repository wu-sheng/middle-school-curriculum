    questionZh: '如果龙____（speak）英语，训练会容易得多。'
    answer: 'spoke'
    explanation: "Second conditional: If + past simple (spoke), would + infinitive. Dragons can't really speak English — this is hypothetical."
    explanationZh: '第二条件句：If + 一般过去时（spoke），would + 动词原形。龙不会说英语——这是假设。'
    grammarPoint: 'Second conditional'
    relatedQuest: Q04
    difficulty: 2

  - id: G0323
    type: multiple-choice
    tags: [conditional-2-3, Q04, difficulty-2]
    context: dragon-academy
    question: 'If I _____ the Dragon Queen, I would make dragon riding free for everyone.'
    questionZh: '如果我____龙后，我会让所有人免费骑龙。'
    options:
      A: 'am'
      B: 'was'
      C: 'were'
      D: 'be'
    answer: 'C'
    explanation: "In the second conditional, we traditionally use 'were' for all subjects (If I were, If she were). This is the subjunctive form."
    explanationZh: '在第二条件句中，所有人称传统上都用 were（If I were, If she were）。这是虚拟语气。'
    grammarPoint: 'Second conditional (subjunctive were)'
    relatedQuest: Q04
    difficulty: 2

