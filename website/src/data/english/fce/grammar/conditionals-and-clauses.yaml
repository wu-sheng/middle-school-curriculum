    difficulty: 1

  - id: G0304
    type: multiple-choice
    tags: [conditional-0-1, Q04, difficulty-1]
    context: dragon-academy
    question: 'If you _____ dragon riding class tomorrow, you will miss the flight exam.'
    questionZh: '如果你明天____龙骑术课，你会错过飞行考试。'
    options:
      A: 'will skip'
      B: 'skip'
      C: 'skipped'
      D: 'would skip'
    answer: 'B'
    explanation: "First conditional: If + present simple, will + infinitive. Even though we mean 'tomorrow', the if-clause uses present simple."
    explanationZh: '第一条件句：If + 一般现在时，will + 动词原形。即使说的是"明天"，if 从句也用一般现在时。'
    grammarPoint: 'First conditional'
    relatedQuest: Q04
    difficulty: 1

  - id: G0305
    type: multiple-choice
    tags: [conditional-0-1, Q04, difficulty-1]
    context: dragon-academy
    question: 'If you pass the Dragon Taming test, you _____ a silver badge.'
    questionZh: '如果你通过驯龙测试，你____一枚银色徽章。'
    options:
      A: 'get'
      B: 'got'
      C: 'will get'
      D: 'would get'
    answer: 'C'
    explanation: "First conditional for a real future possibility: If + present simple (pass), will + infinitive (will get)."
    explanationZh: '第一条件句表示真实的未来可能性：If + 一般现在时（pass），will + 动词原形（will get）。'
    grammarPoint: 'First conditional'
    relatedQuest: Q04
    difficulty: 1

