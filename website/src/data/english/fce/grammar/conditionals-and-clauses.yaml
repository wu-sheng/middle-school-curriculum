    explanation: "First conditional: If + present simple (doesn't work), imperative/must. Both conditions are real future possibilities."
    explanationZh: '第一条件句：If + 一般现在时（doesn''t），must + 动词原形。两个条件都是真实的未来可能性。'
    grammarPoint: 'First conditional (negative if-clause)'
    relatedQuest: Q04
    difficulty: 4

  - id: G0398
    type: fill-blank
    tags: [mixed-review, Q04, difficulty-4]
    context: dragon-academy
    question: 'The students, all of _____ passed the exam, were chosen for the Dragon Elite Team.'
    questionZh: '所有通过考试的学生都被选入了龙精英队。(用关系代词填空)'
    answer: 'whom'
    explanation: "After prepositions (of, to, with, etc.) in relative clauses, we use 'whom' for people (formal) — 'all of whom'."
    explanationZh: '关系从句中介词（of, to, with 等）后面指人用 whom（正式）——all of whom。'
    grammarPoint: 'Non-defining relative clause (preposition + whom)'
    relatedQuest: Q04
    difficulty: 4

  - id: G0399
    type: multiple-choice
    tags: [mixed-review, Q04, difficulty-4]
    context: dragon-academy
    question: 'If the dragon had been friendlier, the villagers _____ so afraid of it now.'
    questionZh: '如果那条龙之前更友善一些，村民现在就____它了。'
    options:
      A: "won't be"
      B: "wouldn't be"
      C: "wouldn't have been"
      D: "aren't"
    answer: 'B'
    explanation: "Mixed conditional: past condition (had been friendlier — in the past) → present result (wouldn't be afraid now). 'Now' confirms this is a present result."
    explanationZh: '混合条件句：过去条件（had been friendlier）→ 现在结果（wouldn''t be afraid now）。"现在"确认这是对现在的影响。'
    grammarPoint: 'Mixed conditional (past → present)'
    relatedQuest: Q04
    difficulty: 4

  - id: G0400
    type: fill-blank
    tags: [mixed-review, Q04, difficulty-4]
    context: dragon-academy
    question: 'I wish I _____ (can) speak Dragon Language. Then I could ask my dragon what it wants for dinner.'
    questionZh: '我希望我____（can）说龙语。那样我就能问我的龙晚餐想吃什么了。'
    answer: 'could'
    explanation: "'I wish + could' for an unreal present wish about ability. Combined with second conditional result (could ask)."
    explanationZh: 'I wish + could 表达对现在能力的不真实愿望。搭配第二条件句结果（could ask）。'
    grammarPoint: 'I wish + could (present ability wish)'
    relatedQuest: Q04
    difficulty: 4
