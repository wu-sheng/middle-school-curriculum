  - id: G0361
    type: multiple-choice
    tags: [relative-clauses, Q04, difficulty-2]
    context: dragon-academy
    question: 'The girl _____ tamed the golden dragon is only nine years old.'
    questionZh: '____驯服金龙的那个女孩只有九岁。'
    options:
      A: 'who'
      B: 'which'
      C: 'whose'
      D: 'where'
    answer: 'A'
    explanation: "We use 'who' for people in relative clauses. 'The girl who tamed the golden dragon' — 'who' refers to the girl (a person)."
    explanationZh: '关系从句中指人用 who。"驯服金龙的那个女孩"——who 指代 girl（人）。'
    grammarPoint: 'Defining relative clause (who)'
    relatedQuest: Q04
    difficulty: 2

