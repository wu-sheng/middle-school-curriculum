  # ============================================================
  # G0321–G0340: Conditional Type 2-3 (second and third conditional)
  # If + past simple → would + infinitive
  # If + past perfect → would have + past participle
  # Dragon Academy theme
  # ============================================================
  - id: G0321
    type: multiple-choice
    tags: [conditional-2-3, Q04, difficulty-2]
    context: dragon-academy
    question: 'If I _____ a dragon, I would fly to school every day.'
    questionZh: '如果我____一条龙，我会每天飞去上学。'
    options:
      A: 'have'
      B: 'had'
      C: 'will have'
      D: 'would have'
    answer: 'B'
    explanation: "Second conditional for an unreal present situation: If + past simple (had), would + infinitive."
    explanationZh: '第二条件句表示与现在事实相反的假设：If + 一般过去时（had），would + 动词原形。'
    grammarPoint: 'Second conditional'
    relatedQuest: Q04
    difficulty: 2

