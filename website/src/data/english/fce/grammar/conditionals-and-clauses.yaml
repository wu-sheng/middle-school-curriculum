    context: dragon-academy
    question: 'If water touches dragon fire, it _____ into steam immediately.'
    questionZh: '如果水碰到龙火，它会立刻____蒸汽。'
    options:
      A: 'will turn'
      B: 'turns'
      C: 'turned'
      D: 'would turn'
    answer: 'B'
    explanation: "Zero conditional for a scientific fact about dragon fire. Both clauses use present simple."
    explanationZh: '零条件句表示关于龙火的科学事实。两个从句都用一般现在时。'
    grammarPoint: 'Zero conditional'
    relatedQuest: Q04
    difficulty: 1

