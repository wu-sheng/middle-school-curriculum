  - id: G0861
    type: multiple-choice
    tags: [linking, Q09, difficulty-2]
    context: review
    question: 'On the one hand, the movie has stunning visuals. On the _____ hand, the plot is weak.'
    questionZh: '一方面，电影有令人惊叹的视觉效果。_____ 方面，情节很弱。'
    options:
      A: 'other'
      B: 'second'
      C: 'next'
      D: 'opposite'
    answer: 'A'
    explanation: '"On the one hand...on the other hand" is a fixed expression for presenting two contrasting viewpoints.'
    explanationZh: '"On the one hand...on the other hand"是固定表达，用于呈现两个对比的观点。'
    grammarPoint: 'Linking: On the one hand...on the other hand'
    relatedQuest: Q09
    difficulty: 2

  - id: G0862
    type: fill-blank
    tags: [linking, Q09, difficulty-2]
    context: review
    question: '_____ the acting was excellent, the dialogue felt unnatural and forced.'
    questionZh: '_____ 演技很出色，对话却感觉不自然且做作。'
    answer: 'While'
    acceptableAnswers: ['While', 'Although', 'Whereas']
    explanation: '"While" introduces a contrast between two ideas in the same sentence. It means "even though" or "at the same time as."'
    explanationZh: '"While"在同一个句子中引入两个想法之间的对比。它的意思是"尽管"或"与此同时"。'
    grammarPoint: 'Linking: While (contrast)'
    relatedQuest: Q09
    difficulty: 2

