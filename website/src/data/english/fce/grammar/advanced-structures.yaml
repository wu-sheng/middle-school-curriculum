    options:
      A: 'Despite'
      B: 'Although'
      C: 'However'
      D: 'Nevertheless'
    answer: 'A'
    explanation: '"Despite" is followed by a noun/noun phrase (its flaws), not a clause. "Although" would need a clause (although it has flaws).'
    explanationZh: '"Despite"后面跟名词/名词短语（its flaws），不跟从句。"Although"需要从句（although it has flaws）。'
    grammarPoint: 'Linking: Despite + noun'
    relatedQuest: Q09
    difficulty: 2

