category: 'Advanced Structures'
categoryZh: '高级句型结构'
questions:
  # ============================================================
  # G0801–G0820: Emphasis structures (cleft sentences)
  # It is/was...that/who, What...is/was
  # Arts & Entertainment theme
  # ============================================================
  - id: G0801
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It _____ J.K. Rowling who created the world of Harry Potter.'
    questionZh: '_____ J.K. Rowling 创造了哈利·波特的世界。'
    options:
      A: 'is'
      B: 'was'
      C: 'were'
      D: 'has'
    answer: 'B'
    explanation: 'We use "It was...who" to emphasise the person. Since the creation happened in the past, we use "was."'
    explanationZh: '我们用"It was...who"来强调人物。由于创作发生在过去，所以用"was"。'
    grammarPoint: 'Cleft sentence: It was...who'
    relatedQuest: Q09
    difficulty: 2

  - id: G0802
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It was the _____ that made the movie truly unforgettable.'
    questionZh: '是 _____ 让这部电影真正难忘。'
    options:
      A: 'soundtrack'
      B: 'soundtracks'
      C: 'soundtracking'
      D: 'soundtracked'
    answer: 'A'
    explanation: '"It was...that" emphasises a specific element. "The soundtrack" (singular noun) is the thing being emphasised.'
    explanationZh: '"It was...that"强调一个具体的元素。"The soundtrack"（单数名词）是被强调的事物。'
    grammarPoint: 'Cleft sentence: It was...that'
    relatedQuest: Q09
    difficulty: 2

  - id: G0803
    type: fill-blank
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It was in 2001 _____ the first Harry Potter film was released.'
    questionZh: '_____ 2001年第一部哈利·波特电影上映了。'
    answer: 'that'
    acceptableAnswers: ['that']
    explanation: '"It was in 2001 THAT..." emphasises the time. When we emphasise a time or place, we use "that" (not "when" or "where" in cleft sentences).'
    explanationZh: '"It was in 2001 THAT..."强调时间。在强调句中强调时间或地点时，我们用"that"（不是"when"或"where"）。'
    grammarPoint: 'Cleft sentence: It was...that (time emphasis)'
    relatedQuest: Q09
    difficulty: 2

  - id: G0804
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: '_____ I love most about this book is the way the author creates suspense.'
    questionZh: '我最喜欢这本书的是作者制造悬念的方式。'
    options:
      A: 'That'
      B: 'Which'
      C: 'What'
      D: 'How'
    answer: 'C'
    explanation: '"What I love most...is..." is a cleft sentence using "what" to mean "the thing that." It emphasises the specific element you love.'
    explanationZh: '"What I love most...is..."是使用"what"（意为"那件事"）的强调句。它强调了你喜欢的具体元素。'
    grammarPoint: 'Cleft sentence: What...is/was'
    relatedQuest: Q09
    difficulty: 2

  - id: G0805
    type: fill-blank
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'What _____ the film special was its incredible visual effects.'
    questionZh: '让这部电影特别的是它令人难以置信的视觉效果。'
    answer: 'made'
    acceptableAnswers: ['made', 'makes']
    explanation: '"What made the film special was..." — we need a past tense verb because we are describing an already-released film.'
    explanationZh: '"What made the film special was..."——我们需要过去时动词，因为我们在描述一部已经上映的电影。'
    grammarPoint: 'Cleft sentence: What + verb...was'
    relatedQuest: Q09
    difficulty: 2

  - id: G0806
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It is the plot twist at the end _____ everyone keeps talking about.'
    questionZh: '大家一直在讨论的是结尾的情节转折。'
    options:
      A: 'who'
      B: 'which'
      C: 'that'
      D: 'what'
    answer: 'C'
    explanation: 'In the structure "It is...that...", we use "that" to connect the emphasised element. "That" is used for things; "who" would be for people.'
    explanationZh: '在"It is...that..."结构中，我们用"that"来连接被强调的元素。"That"用于事物；"who"用于人。'
    grammarPoint: 'Cleft sentence: It is...that'
    relatedQuest: Q09
    difficulty: 2

  - id: G0807
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'What surprised me _____ was how young the lead actor was.'
    questionZh: '让我惊讶的是主演有多年轻。'
    options:
      A: 'more'
      B: 'most'
      C: 'much'
      D: 'very'
    answer: 'B'
    explanation: '"What surprised me most was..." uses the superlative "most" to emphasise the biggest surprise.'
    explanationZh: '"What surprised me most was..."使用最高级"most"来强调最大的惊讶。'
    grammarPoint: 'Cleft sentence: What...most...was'
    relatedQuest: Q09
    difficulty: 2

  - id: G0808
    type: fill-blank
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It was not the acting but the _____ that disappointed me. (DIRECT)'
    questionZh: '让我失望的不是演技而是 _____。(DIRECT)'
    answer: 'direction'
    acceptableAnswers: ['direction', 'directing']
    explanation: '"It was not X but Y that..." creates emphasis by contrasting two elements. We need a noun to match "acting," so "direction" (noun form of DIRECT).'
    explanationZh: '"It was not X but Y that..."通过对比两个元素来创造强调。我们需要一个名词来与"acting"匹配，所以用"direction"（DIRECT的名词形式）。'
    grammarPoint: 'Cleft sentence with contrast'
    relatedQuest: Q09
    difficulty: 2

  - id: G0809
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'What the audience _____ was a gripping story with unexpected twists.'
    questionZh: '观众想要的是一个有意外转折的扣人心弦的故事。'
    options:
      A: 'want'
      B: 'wants'
      C: 'wanted'
      D: 'wanting'
    answer: 'C'
    explanation: '"What the audience wanted was..." — past tense because we are describing what they expected before watching.'
    explanationZh: '"What the audience wanted was..."——过去时，因为我们在描述他们观看前的期望。'
    grammarPoint: 'Cleft sentence: What + subject + verb'
    relatedQuest: Q09
    difficulty: 2

  - id: G0810
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: 'It was the author''s vivid descriptions _____ brought the fantasy world to life.'
    questionZh: '是作者生动的描写让奇幻世界栩栩如生。'
    options:
      A: 'who'
      B: 'what'
      C: 'which'
      D: 'that'
    answer: 'D'
    explanation: '"It was...that..." — "that" connects the emphasised element (vivid descriptions) with what it did (brought the world to life).'
    explanationZh: '"It was...that..."——"that"连接被强调的元素（生动的描写）和它的作用（让世界栩栩如生）。'
    grammarPoint: 'Cleft sentence: It was...that'
    relatedQuest: Q09
    difficulty: 2

  - id: G0811
    type: fill-blank
    tags: [emphasis, Q09, difficulty-2]
    context: entertainment
    question: '_____ I enjoyed most about the concert was the energy of the live performance.'
    questionZh: '我最喜欢这场音乐会的是现场表演的能量。'
    answer: 'What'
    acceptableAnswers: ['What']
    explanation: '"What I enjoyed most...was..." uses "What" to mean "the thing that." It creates a cleft sentence emphasising the specific element.'
    explanationZh: '"What I enjoyed most...was..."使用"What"来表示"那件事"。它创造了一个强调具体元素的强调句。'
    grammarPoint: 'Cleft sentence: What...was'
    relatedQuest: Q09
    difficulty: 2

  - id: G0812
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'It was only after reading the final chapter _____ I understood the true meaning of the story.'
    questionZh: '只有在读完最后一章之后，我才理解了故事的真正含义。'
    options:
      A: 'when'
      B: 'that'
      C: 'which'
      D: 'where'
    answer: 'B'
    explanation: '"It was only after...that..." is an emphasis structure. Even though it involves time, cleft sentences always use "that."'
    explanationZh: '"It was only after...that..."是强调结构。即使涉及时间，强调句总是用"that"。'
    grammarPoint: 'Cleft sentence: It was only after...that'
    relatedQuest: Q09
    difficulty: 3

  - id: G0813
    type: fill-blank
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'It _____ not until the second half that the story became truly exciting.'
    questionZh: '直到下半部分，故事才真正变得令人兴奋。'
    answer: 'was'
    acceptableAnswers: ['was']
    explanation: '"It was not until...that..." is a fixed emphasis pattern meaning "only when X happened did Y happen."'
    explanationZh: '"It was not until...that..."是固定的强调句式，意思是"只有当X发生时Y才发生"。'
    grammarPoint: 'Cleft sentence: It was not until...that'
    relatedQuest: Q09
    difficulty: 3

  - id: G0814
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'What _____ the book apart from others in the genre is its unique narrative voice.'
    questionZh: '让这本书在同类作品中脱颖而出的是它独特的叙事声音。'
    options:
      A: 'puts'
      B: 'sets'
      C: 'takes'
      D: 'makes'
    answer: 'B'
    explanation: '"Set apart" is a phrasal verb meaning "make different from others." "What sets X apart is..." is a common review phrase.'
    explanationZh: '"Set apart"是短语动词，意思是"使与其他不同"。"What sets X apart is..."是常见的评论短语。'
    grammarPoint: 'Cleft sentence with phrasal verb'
    relatedQuest: Q09
    difficulty: 3

  - id: G0815
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'It is the young readers _____ this book was written for.'
    questionZh: '这本书是为年轻读者写的。'
    options:
      A: 'that'
      B: 'who'
      C: 'whom'
      D: 'which'
    answer: 'A'
    explanation: 'In formal cleft sentences, "that" is standard for both people and things. While "who" is possible for people, "that" is the most common choice in cleft structures.'
    explanationZh: '在正式的强调句中，"that"对人和事物都适用。虽然"who"也可以用于人，但"that"在强调句中是最常见的选择。'
    grammarPoint: 'Cleft sentence: It is...that (people)'
    relatedQuest: Q09
    difficulty: 3

  - id: G0816
    type: fill-blank
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'What _____ me most was the way the director handled the emotional scenes. (IMPRESS)'
    questionZh: '最让我印象深刻的是导演处理情感戏的方式。(IMPRESS)'
    answer: 'impressed'
    acceptableAnswers: ['impressed']
    explanation: '"What impressed me most was..." needs past tense. The base word IMPRESS becomes "impressed" in the past tense.'
    explanationZh: '"What impressed me most was..."需要过去时。基础词IMPRESS变成过去时"impressed"。'
    grammarPoint: 'Cleft sentence with word formation'
    relatedQuest: Q09
    difficulty: 3

  - id: G0817
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'All _____ I wanted was a good ending, and the author delivered beautifully.'
    questionZh: '我想要的只是一个好结局，而作者做到了。'
    options:
      A: 'what'
      B: 'that'
      C: 'which'
      D: 'who'
    answer: 'B'
    explanation: '"All that I wanted..." uses "that" as a relative pronoun after "all." This is a common emphasis structure meaning "the only thing."'
    explanationZh: '"All that I wanted..."使用"that"作为"all"后面的关系代词。这是一个常见的强调结构，意思是"唯一的事情"。'
    grammarPoint: 'Emphasis: All that...'
    relatedQuest: Q09
    difficulty: 3

  - id: G0818
    type: fill-blank
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'It is the combination of humour and heart _____ makes this series so popular with families.'
    questionZh: '正是幽默和真情的结合使这个系列在家庭中如此受欢迎。'
    answer: 'that'
    acceptableAnswers: ['that', 'which']
    explanation: '"It is...that..." is a standard cleft sentence. "That" links the emphasised element to the rest of the sentence.'
    explanationZh: '"It is...that..."是标准的强调句。"That"将被强调的元素与句子的其余部分连接起来。'
    grammarPoint: 'Cleft sentence: It is...that'
    relatedQuest: Q09
    difficulty: 3

  - id: G0819
    type: multiple-choice
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'What the critics failed to _____ was that the film was made for children, not adults.'
    questionZh: '评论家们未能认识到的是这部电影是为儿童而非成人制作的。'
    options:
      A: 'recognise'
      B: 'recognised'
      C: 'recognising'
      D: 'recognition'
    answer: 'A'
    explanation: 'After "failed to," we need the base form of the verb (bare infinitive). "Failed to recognise" means "did not manage to understand."'
    explanationZh: '在"failed to"之后，我们需要动词原形。"Failed to recognise"意思是"未能理解"。'
    grammarPoint: 'Cleft sentence + infinitive'
    relatedQuest: Q09
    difficulty: 3

  - id: G0820
    type: fill-blank
    tags: [emphasis, Q09, difficulty-3]
    context: entertainment
    question: 'It was the unexpected plot _____ at the end that left the entire audience speechless.'
    questionZh: '是结尾意想不到的情节 _____ 让全场观众目瞪口呆。'
    answer: 'twist'
    acceptableAnswers: ['twist']
    explanation: '"Plot twist" is a compound noun meaning a surprising turn in the story. "It was the plot twist...that..." emphasises this element.'
    explanationZh: '"Plot twist"是复合名词，意思是故事中令人惊讶的转折。"It was the plot twist...that..."强调了这个元素。'
    grammarPoint: 'Cleft sentence with compound noun'
    relatedQuest: Q09
    difficulty: 3

  # ============================================================
  # G0821–G0840: Inversion structures
  # Not only...but also, Hardly...when, No sooner...than
  # Arts & Entertainment theme
  # ============================================================
  - id: G0821
    type: multiple-choice
    tags: [inversion, Q09, difficulty-2]
    context: entertainment
    question: 'Not only _____ the film entertaining, but it was also deeply moving.'
    questionZh: '这部电影不仅有趣，而且非常感人。'
    options:
      A: 'is'
      B: 'was'
      C: 'were'
      D: 'has'
    answer: 'B'
    explanation: '"Not only was...but also..." requires inversion (verb before subject). Past tense "was" matches the context.'
    explanationZh: '"Not only was...but also..."需要倒装（动词在主语前面）。过去时"was"与语境匹配。'
    grammarPoint: 'Inversion: Not only...but also'
    relatedQuest: Q09
    difficulty: 2

  - id: G0822
    type: fill-blank
    tags: [inversion, Q09, difficulty-2]
    context: entertainment
    question: 'Not only _____ the book win an award, but it also became a bestseller overnight.'
    questionZh: '这本书不仅赢得了奖项，而且一夜之间成为畅销书。'
    answer: 'did'
    acceptableAnswers: ['did']
    explanation: 'When "Not only" starts a sentence, we need inversion. For past simple, we use "did" + base verb: "Not only did the book win..."'
    explanationZh: '当"Not only"开始一个句子时，我们需要倒装。对于一般过去时，我们用"did"+动词原形："Not only did the book win..."'
    grammarPoint: 'Inversion: Not only + did'
    relatedQuest: Q09
    difficulty: 2

  - id: G0823
    type: multiple-choice
    tags: [inversion, Q09, difficulty-2]
    context: entertainment
    question: 'Not only is the animation stunning, _____ the storyline is original and creative.'
    questionZh: '动画不仅令人惊叹，_____ 故事情节也新颖有创意。'
    options:
      A: 'and'
      B: 'but'
      C: 'so'
      D: 'or'
    answer: 'B'
    explanation: '"Not only...but (also)" is a fixed correlative conjunction pair. "But" introduces the second element.'
    explanationZh: '"Not only...but (also)"是固定的关联连词对。"But"引入第二个元素。'
    grammarPoint: 'Correlative conjunction: Not only...but'
    relatedQuest: Q09
    difficulty: 2

  - id: G0824
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Hardly _____ the concert begun when the power went out.'
    questionZh: '音乐会刚刚开始，电力就中断了。'
    options:
      A: 'has'
      B: 'had'
      C: 'have'
      D: 'did'
    answer: 'B'
    explanation: '"Hardly had...when..." requires past perfect with inversion. "Hardly had the concert begun when..." means it began just before the power went out.'
    explanationZh: '"Hardly had...when..."需要过去完成时倒装。"Hardly had the concert begun when..."意思是音乐会在停电前刚刚开始。'
    grammarPoint: 'Inversion: Hardly...when'
    relatedQuest: Q09
    difficulty: 3

  - id: G0825
    type: fill-blank
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Hardly had I opened the book _____ I was completely absorbed in the story.'
    questionZh: '我一翻开书就完全沉浸在故事中了。'
    answer: 'when'
    acceptableAnswers: ['when']
    explanation: '"Hardly had...WHEN..." — "when" is the correct conjunction with "hardly." It means "almost immediately after."'
    explanationZh: '"Hardly had...WHEN..."——"when"是与"hardly"搭配的正确连词。它的意思是"几乎紧接着"。'
    grammarPoint: 'Inversion: Hardly...when'
    relatedQuest: Q09
    difficulty: 3

  - id: G0826
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'No sooner had the film started _____ the audience fell silent.'
    questionZh: '电影一开始，观众就安静了下来。'
    options:
      A: 'when'
      B: 'that'
      C: 'than'
      D: 'as'
    answer: 'C'
    explanation: '"No sooner...THAN..." — "than" is the correct conjunction with "No sooner." (Contrast with "Hardly...when")'
    explanationZh: '"No sooner...THAN..."——"than"是与"No sooner"搭配的正确连词。（对比"Hardly...when"）'
    grammarPoint: 'Inversion: No sooner...than'
    relatedQuest: Q09
    difficulty: 3

  - id: G0827
    type: fill-blank
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'No sooner _____ the singer appeared on stage than the crowd erupted in cheers.'
    questionZh: '歌手一出现在舞台上，人群就爆发出欢呼声。'
    answer: 'had'
    acceptableAnswers: ['had']
    explanation: '"No sooner had...than..." requires past perfect with inversion. The verb before the subject shows inversion.'
    explanationZh: '"No sooner had...than..."需要过去完成时倒装。动词在主语前面表示倒装。'
    grammarPoint: 'Inversion: No sooner + had'
    relatedQuest: Q09
    difficulty: 3

  - id: G0828
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Never _____ I seen such a breathtaking performance in a school play.'
    questionZh: '我从未在校园剧中见过如此令人叹为观止的表演。'
    options:
      A: 'has'
      B: 'have'
      C: 'had'
      D: 'did'
    answer: 'B'
    explanation: '"Never have I seen..." uses present perfect with inversion. "I" takes "have" (not "has"). Inversion happens because "Never" is at the start.'
    explanationZh: '"Never have I seen..."使用现在完成时倒装。"I"搭配"have"（不是"has"）。因为"Never"在句首所以需要倒装。'
    grammarPoint: 'Inversion: Never + have I'
    relatedQuest: Q09
    difficulty: 3

  - id: G0829
    type: fill-blank
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Rarely _____ a debut novel received such universal praise from critics.'
    questionZh: '很少有处女作获得评论家如此一致的好评。'
    answer: 'has'
    acceptableAnswers: ['has']
    explanation: '"Rarely has..." requires inversion. "A debut novel" is singular, so we use "has" (present perfect).'
    explanationZh: '"Rarely has..."需要倒装。"A debut novel"是单数，所以用"has"（现在完成时）。'
    grammarPoint: 'Inversion: Rarely + has'
    relatedQuest: Q09
    difficulty: 3

  - id: G0830
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Only after watching it three times _____ I fully understand the film''s hidden message.'
    questionZh: '只有在看了三遍之后，我才完全理解了电影的隐藏信息。'
    options:
      A: 'do'
      B: 'did'
      C: 'have'
      D: 'was'
    answer: 'B'
    explanation: '"Only after...did I..." requires inversion with "did" for past simple. The structure emphasises how many viewings it took.'
    explanationZh: '"Only after...did I..."需要用"did"进行一般过去时的倒装。这个结构强调了需要看多少遍。'
    grammarPoint: 'Inversion: Only after...did'
    relatedQuest: Q09
    difficulty: 3

  - id: G0831
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Not only did the book win a prize, but it _____ inspired a major Hollywood film.'
    questionZh: '这本书不仅赢得了奖项，而且还启发了一部好莱坞大片。'
    options:
      A: 'too'
      B: 'also'
      C: 'as well'
      D: 'either'
    answer: 'B'
    explanation: '"Not only...but (it) also..." — "also" comes after the subject in the second clause. "Also" is the standard partner for "not only...but."'
    explanationZh: '"Not only...but (it) also..."——"also"在第二个分句中的主语之后。"Also"是"not only...but"的标准搭配。'
    grammarPoint: 'Correlative: Not only...but also'
    relatedQuest: Q09
    difficulty: 3

  - id: G0832
    type: fill-blank
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Seldom _____ a children''s film dealt with such complex themes as friendship and loss.'
    questionZh: '很少有儿童电影处理过友谊和失去这样复杂的主题。'
    answer: 'has'
    acceptableAnswers: ['has']
    explanation: '"Seldom has..." requires inversion with present perfect. "A children''s film" is singular, so "has" is correct.'
    explanationZh: '"Seldom has..."需要现在完成时倒装。"A children''s film"是单数，所以用"has"。'
    grammarPoint: 'Inversion: Seldom + has'
    relatedQuest: Q09
    difficulty: 3

  - id: G0833
    type: multiple-choice
    tags: [inversion, Q09, difficulty-3]
    context: entertainment
    question: 'Little _____ the author know that her first novel would become a worldwide phenomenon.'
