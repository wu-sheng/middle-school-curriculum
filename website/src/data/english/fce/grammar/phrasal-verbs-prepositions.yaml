  - id: G0601
    type: multiple-choice
    tags: [phrasal-take, Q07, difficulty-1]
    context: daily-life
    question: 'My grandmother _____ painting when she retired, and now she is quite talented.'
    questionZh: '我奶奶退休后开始学画画，现在画得很好。'
    options:
      A: 'took up'
      B: 'took off'
      C: 'took over'
      D: 'took after'
    answer: 'A'
    explanation: '"Took up" means to start a new hobby or activity. She started painting when she retired.'
    explanationZh: '"Took up"意思是开始一个新爱好或活动。她退休后开始画画。'
    grammarPoint: 'Phrasal verb: take up (start a hobby)'
    relatedQuest: Q07
    difficulty: 1

