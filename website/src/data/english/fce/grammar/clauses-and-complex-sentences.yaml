  - id: G0800
    type: fill-blank
    tags: [sentence-combining, Q08, difficulty-3]
    context: world-building
    question: 'Combine: "Cities invest in public transport. People use fewer cars. Pollution decreases." → _____ cities invest in public transport, people use fewer cars, _____ leads to less pollution.'
    questionZh: '合并："城市投资公共交通。人们少用汽车。污染减少。" → _____ 城市投资公共交通，人们少用汽车，_____ 导致更少的污染。'
    answer: 'When'
    acceptableAnswers: ['When']
    explanation: '"When" introduces the condition, and "which" introduces a non-defining relative clause referring to the whole previous idea. Full answer: "When... which leads to..."'
    explanationZh: '"When"引导条件，"which"引导非限定性定语从句指代前面整个想法。完整答案："When... which leads to..."'
    grammarPoint: 'Complex sentence combining multiple clauses'
    relatedQuest: Q08
    difficulty: 3
