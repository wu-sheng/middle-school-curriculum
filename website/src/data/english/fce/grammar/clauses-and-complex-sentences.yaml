      D: 'whose'
    answer: 'D'
    explanation: '"Whose" shows possession — the planner''s ideas. "Whose ideas changed the neighbourhood" tells us about the planner.'
    explanationZh: '"Whose"表示所有关系——规划师的想法。"Whose ideas changed the neighbourhood"告诉我们关于这位规划师的信息。'
