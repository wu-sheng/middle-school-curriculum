  # ============================================================
  # G0721–G0740: Non-defining relative clauses (commas!)
  # ============================================================
  - id: G0721
    type: multiple-choice
    tags: [non-defining-relative, Q08, difficulty-2]
    context: world-building
    question: 'Choose the correct sentence with commas:'
    questionZh: '选择逗号使用正确的句子：'
    options:
      A: 'The Eiffel Tower which is in Paris was built in 1889.'
      B: 'The Eiffel Tower, which is in Paris, was built in 1889.'
      C: 'The Eiffel Tower, that is in Paris, was built in 1889.'
      D: 'The Eiffel Tower which is in Paris, was built in 1889.'
    answer: 'B'
    explanation: 'Non-defining clauses need COMMAS and use "which" (not "that"). "Which is in Paris" adds extra info — we already know which tower.'
    explanationZh: '非限定性从句需要逗号，用"which"（不用"that"）。"Which is in Paris"是补充信息——我们已经知道是哪座塔。'
    grammarPoint: 'Non-defining relative clause — commas + which (not that)'
    relatedQuest: Q08
    difficulty: 2

