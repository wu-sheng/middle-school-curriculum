    explanation: '"Who" is for people only. Paris is a city (a thing), so we must use "which," not "who."'
    explanationZh: '"Who"只用于人。巴黎是一个城市（物），所以必须用"which"而不是"who"。'
    grammarPoint: 'Non-defining relative clause — who vs. which'
