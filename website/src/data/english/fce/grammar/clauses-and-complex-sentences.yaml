questions:
  # ============================================================
  # G0701–G0720: Defining relative clauses (who/which/that/where/whose)
  # World-building theme
  # ============================================================
  - id: G0701
    type: multiple-choice
    tags: [defining-relative, Q08, difficulty-1]
    context: world-building
    question: 'The architect _____ designed the new library won an international prize.'
    questionZh: '设计新图书馆的建筑师获得了国际大奖。'
    options:
      A: 'who'
      B: 'which'
      C: 'where'
      D: 'whose'
    answer: 'A'
    explanation: '"Who" refers to a person — the architect. "Who designed the new library" is a defining relative clause telling us WHICH architect.'
    explanationZh: '"Who"指人——建筑师。"Who designed the new library"是一个限定性定语从句，告诉我们是哪位建筑师。'
    grammarPoint: 'Defining relative clause with who (subject)'
    relatedQuest: Q08
    difficulty: 1

