      B: 'which'
      C: 'where'
      D: 'whose'
    answer: 'B'
    explanation: '"Which" refers to a thing — the bridge. "Which connects the two islands" tells us WHICH bridge.'
    explanationZh: '"Which"指物——桥。"Which connects the two islands"告诉我们是哪座桥。'
    grammarPoint: 'Defining relative clause with which (subject)'
    relatedQuest: Q08
    difficulty: 1

