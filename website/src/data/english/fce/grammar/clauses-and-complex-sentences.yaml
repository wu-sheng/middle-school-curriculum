    explanation: '"Where" refers to a place — the park. "Where children can play" tells us about the place.'
    explanationZh: '"Where"指地点——公园。"Where children can play"告诉我们关于这个地方的信息。'
    grammarPoint: 'Defining relative clause with where (place)'
