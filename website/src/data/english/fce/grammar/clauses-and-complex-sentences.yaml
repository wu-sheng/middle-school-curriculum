      D: 'where'
    answer: 'C'
    explanation: '"Who" refers to a person (grandfather) in a non-defining clause. Note: "that" CANNOT be used in non-defining clauses.'
    explanationZh: '"Who"在非限定性从句中指人（祖父）。注意："that"不能用于非限定性从句。'
    grammarPoint: 'Non-defining relative clause with who (person)'
    relatedQuest: Q08
    difficulty: 2

