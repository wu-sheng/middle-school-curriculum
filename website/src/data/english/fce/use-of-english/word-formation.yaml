  - id: U0501
    type: word-formation
    tags: [noun-suffix, Q01, difficulty-1]
    context: fantasy
    sentence: 'The _____ of the dragon''s cave was truly breathtaking. (BEAUTIFUL)'
    sentenceZh: '龙穴的 _____ 真是令人叹为观止。(BEAUTIFUL)'
    baseWord: 'beautiful'
    answer: 'beauty'
    targetPartOfSpeech: noun
    explanation: 'We need a noun after "The". Remove the -ful suffix to get the noun "beauty".'
    explanationZh: 'The 后面需要名词。去掉 -ful 后缀得到名词 beauty。'
    grammarPoint: 'adjective → noun (-ful → base)'
    relatedQuest: Q01
    difficulty: 1

