category: 'Mixed Use of English (Debate & Argument)'
categoryZh: '综合语言运用（辩论与论证）'
fcepart: 'Use of English Parts 1-4 Mixed'
questions:
  # ============================================================
  # U1301-U1320: Multiple-choice cloze (debate-themed passages)
  # ============================================================

  # --- Passage 1: The Homework Debate (U1301-U1310) ---
  - id: U1301
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'The question of whether homework is beneficial (1)_____ been debated for decades.'
    question: 'Choose the best word for gap (1).'
    questionZh: '选择最适合空格(1)的词。'
    options:
      A: 'have'
      B: 'has'
      C: 'is'
      D: 'was'
    answer: 'B'
    explanation: '"The question" is a singular subject, so it takes "has" (not "have"). "Has been debated" is present perfect passive.'
    explanationZh: '"The question"是单数主语，所以用"has"（不是"have"）。"Has been debated"是现在完成时被动语态。'
    grammarPoint: 'Subject-verb agreement + present perfect passive'
    relatedQuest: Q10
    difficulty: 3

  - id: U1302
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Supporters argue that homework helps students _____ what they have learned in class.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'revise'
      B: 'revision'
      C: 'revised'
      D: 'revising'
    answer: 'A'
    explanation: '"Help someone + bare infinitive" is the correct pattern. "Helps students revise" — no "to" needed after "help."'
    explanationZh: '"Help someone + 动词原形"是正确的结构。"Helps students revise"——"help"后面不需要"to"。'
    grammarPoint: 'help + object + bare infinitive'
    relatedQuest: Q10
    difficulty: 3

  - id: U1303
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'On the other hand, too much homework can lead _____ stress and exhaustion.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'for'
      B: 'into'
      C: 'to'
      D: 'at'
    answer: 'C'
    explanation: '"Lead to" is the correct collocation meaning "cause" or "result in."'
    explanationZh: '"Lead to"是正确的搭配，意思是"导致"或"造成"。'
    grammarPoint: 'Collocation: lead to'
    relatedQuest: Q10
    difficulty: 3

  - id: U1304
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'The _____ of students surveyed said they would prefer more creative homework.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'most'
      B: 'majority'
      C: 'number'
      D: 'amount'
    answer: 'B'
    explanation: '"The majority of students" is more formal than "most students." "Majority" is used with countable nouns.'
    explanationZh: '"The majority of students"比"most students"更正式。"Majority"与可数名词连用。'
    grammarPoint: 'Formal: the majority of'
    relatedQuest: Q10
    difficulty: 3

  - id: U1305
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: '_____ the challenges, many schools have found practical solutions to the homework problem.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'Although'
      B: 'However'
      C: 'Despite'
      D: 'Nevertheless'
    answer: 'C'
    explanation: '"Despite + noun" is correct. "Although" needs a clause, "However" starts a new sentence, and "Nevertheless" does too.'
    explanationZh: '"Despite + 名词"是正确的。"Although"需要从句，"However"和"Nevertheless"开始新句子。'
    grammarPoint: 'Despite + noun (not clause)'
    relatedQuest: Q10
    difficulty: 3

  - id: U1306
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'It is widely _____ that a balanced approach to homework produces the best results.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'believe'
      B: 'believing'
      C: 'believed'
      D: 'believes'
    answer: 'C'
    explanation: '"It is widely believed that..." is an impersonal passive structure. The past participle "believed" follows "is...widely."'
    explanationZh: '"It is widely believed that..."是非人称被动结构。过去分词"believed"接在"is...widely"之后。'
    grammarPoint: 'Impersonal passive: It is widely believed'
    relatedQuest: Q10
    difficulty: 3

  - id: U1307
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Research from Finland _____ that students can succeed without heavy homework loads.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'demonstrate'
      B: 'demonstrates'
      C: 'demonstrating'
      D: 'demonstrated'
    answer: 'B'
    explanation: '"Research" is uncountable, so it takes the singular verb "demonstrates" (present tense for current findings).'
    explanationZh: '"Research"是不可数名词，所以用单数动词"demonstrates"（现在时用于当前发现）。'
    grammarPoint: 'Research + singular verb'
    relatedQuest: Q10
    difficulty: 3

  - id: U1308
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Homework should be meaningful _____ than simply time-consuming.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'more'
      B: 'other'
      C: 'rather'
      D: 'better'
    answer: 'C'
    explanation: '"Rather than" means "instead of." It contrasts "meaningful" with "time-consuming."'
    explanationZh: '"Rather than"意思是"而不是"。它将"有意义的"与"耗时的"进行对比。'
    grammarPoint: 'Contrast: rather than'
    relatedQuest: Q10
    difficulty: 3

  - id: U1309
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Were homework to be abolished, some students _____ fall behind in their studies.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'will'
      B: 'would'
      C: 'can'
      D: 'may'
    answer: 'B'
    explanation: '"Were homework to be abolished" is a formal second conditional. The result clause uses "would."'
    explanationZh: '"Were homework to be abolished"是正式的第二条件句。结果从句用"would"。'
    grammarPoint: 'Formal conditional: Were + to be'
    relatedQuest: Q10
    difficulty: 3

  - id: U1310
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Ultimately, the goal should be to develop a love of learning that _____ a lifetime.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'takes'
      B: 'keeps'
      C: 'lasts'
      D: 'holds'
    answer: 'C'
    explanation: '"Lasts a lifetime" means "continues for a whole life." "Lasts" is the correct verb collocation with "lifetime."'
    explanationZh: '"Lasts a lifetime"意思是"持续一生"。"Lasts"是与"lifetime"的正确动词搭配。'
    grammarPoint: 'Collocation: lasts a lifetime'
    relatedQuest: Q10
    difficulty: 3

  # --- Passage 2: Screen Time (U1311-U1320) ---
  - id: U1311
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'The debate _____ screen time for children shows no signs of ending soon.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'about'
      B: 'for'
      C: 'with'
      D: 'to'
    answer: 'A'
    explanation: '"The debate about" is the correct preposition. "About" introduces the topic of the debate.'
    explanationZh: '"The debate about"使用正确的介词。"About"引入辩论的话题。'
    grammarPoint: 'Preposition: debate about'
    relatedQuest: Q10
    difficulty: 3

  - id: U1312
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Not all screen time should be treated the same — educational apps _____ very different from social media.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'is'
      B: 'are'
      C: 'was'
      D: 'has'
    answer: 'B'
    explanation: '"Educational apps" is plural, so "are" is correct. "Apps are very different from" compares two things.'
    explanationZh: '"Educational apps"是复数，所以用"are"。"Apps are very different from"比较两件事。'
    grammarPoint: 'Subject-verb agreement (plural)'
    relatedQuest: Q10
    difficulty: 3

  - id: U1313
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Parents should set clear _____ on how much time children spend on entertainment screens.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'borders'
      B: 'limits'
      C: 'edges'
      D: 'lines'
    answer: 'B'
    explanation: '"Set limits on" is the correct collocation meaning "establish boundaries for." "Limits" goes with "on."'
    explanationZh: '"Set limits on"是正确的搭配，意思是"为……设定界限"。"Limits"与"on"连用。'
    grammarPoint: 'Collocation: set limits on'
    relatedQuest: Q10
    difficulty: 3

  - id: U1314
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Children who spend _____ time outdoors tend to be healthier and more focused.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'many'
      B: 'lots'
      C: 'more'
      D: 'much'
    answer: 'C'
    explanation: '"Spend more time" is the comparative form. "More" compares outdoor time with the implied alternative (screen time).'
    explanationZh: '"Spend more time"是比较形式。"More"将户外时间与隐含的替代选项（屏幕时间）进行比较。'
    grammarPoint: 'Comparative: more + uncountable noun'
    relatedQuest: Q10
    difficulty: 3

  - id: U1315
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Social media platforms are deliberately _____ to be addictive.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'designed'
      B: 'designing'
      C: 'design'
      D: 'designs'
    answer: 'A'
    explanation: '"Are designed to be" is the passive voice. The platforms were deliberately created (by companies) to be addictive.'
    explanationZh: '"Are designed to be"是被动语态。这些平台被（公司）故意设计成令人上瘾的。'
    grammarPoint: 'Passive: are designed to'
    relatedQuest: Q10
    difficulty: 3

  - id: U1316
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'The _____ of screen time on children''s sleep has been well documented.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'affect'
      B: 'effect'
      C: 'effective'
      D: 'affecting'
    answer: 'B'
    explanation: '"The effect of...on..." needs the noun "effect" (not the verb "affect"). "Effect" is what you see; "affect" is what you do.'
    explanationZh: '"The effect of...on..."需要名词"effect"（不是动词"affect"）。"Effect"是你看到的；"affect"是你做的。'
    grammarPoint: 'effect (noun) vs affect (verb)'
    relatedQuest: Q10
    difficulty: 3

  - id: U1317
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: '_____ banning screens entirely would be unrealistic, we should teach children to use them wisely.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'Because'
      B: 'Although'
      C: 'Since'
      D: 'Despite'
    answer: 'C'
    explanation: '"Since" introduces a reason (banning is unrealistic), leading to the conclusion (teach wise use). "Since" = "because."'
    explanationZh: '"Since"引入原因（禁止是不现实的），引向结论（教授明智使用）。"Since"="because"。'
    grammarPoint: 'Reason: Since + clause'
    relatedQuest: Q10
    difficulty: 3

  - id: U1318
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'In my opinion, the benefits of technology in education far _____ the drawbacks.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'outdo'
      B: 'overcome'
      C: 'outweigh'
      D: 'overtake'
    answer: 'C'
    explanation: '"Outweigh" means "be greater or more important than." "Benefits outweigh drawbacks" is a key essay collocation.'
    explanationZh: '"Outweigh"意思是"超过或比……更重要"。"Benefits outweigh drawbacks"是关键的议论文搭配。'
    grammarPoint: 'Collocation: outweigh (benefits/drawbacks)'
    relatedQuest: Q10
    difficulty: 3

  - id: U1319
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'Screens are tools. Like any tool, they can be _____ well or badly.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'use'
      B: 'used'
      C: 'using'
      D: 'uses'
    answer: 'B'
    explanation: '"Can be used" is a modal passive. "Used" is the past participle needed after "can be."'
    explanationZh: '"Can be used"是情态被动语态。"can be"后面需要过去分词"used"。'
    grammarPoint: 'Modal passive: can be + past participle'
    relatedQuest: Q10
    difficulty: 3

  - id: U1320
    type: multiple-choice-cloze
    tags: [cloze-mc, Q10, difficulty-3]
    context: debate
    passage: 'The responsibility _____ not with the technology itself, but with those who guide children.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'lays'
      B: 'lies'
      C: 'lays down'
      D: 'lying'
    answer: 'B'
    explanation: '"The responsibility lies with" means "belongs to." "Lies" (present tense of "lie" = to be located/exist) is correct, not "lays."'
    explanationZh: '"The responsibility lies with"意思是"属于"。"Lies"（"lie"的现在时=位于/存在）是正确的，不是"lays"。'
    grammarPoint: 'lie (exists) vs lay (put down)'
    relatedQuest: Q10
    difficulty: 3

  # ============================================================
  # U1321-U1340: Open cloze (debate-themed)
  # ============================================================
  - id: U1321
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'It is generally agreed _____ children benefit from a mix of outdoor and indoor activities.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'that'
    acceptableAnswers: ['that']
    explanation: '"It is generally agreed THAT..." introduces a widely held view. "That" is the conjunction linking the impersonal structure to the clause.'
    explanationZh: '"It is generally agreed THAT..."引入一个广泛持有的观点。"That"是连接非人称结构与从句的连词。'
    grammarPoint: 'Impersonal: It is...that'
    relatedQuest: Q10
    difficulty: 3

  - id: U1322
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'While some people support school uniforms, _____ argue that they limit self-expression.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'others'
    acceptableAnswers: ['others']
    explanation: '"While some...others..." is a balanced structure for presenting two opposing views.'
    explanationZh: '"While some...others..."是呈现两个对立观点的平衡结构。'
    grammarPoint: 'While some...others...'
    relatedQuest: Q10
    difficulty: 3

  - id: U1323
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: '_____ spite of the arguments against it, coding has been introduced in many schools.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'In'
    acceptableAnswers: ['In']
    explanation: '"In spite of" is a fixed phrase meaning "despite." The preposition "in" starts the phrase.'
    explanationZh: '"In spite of"是固定短语，意思是"尽管"。介词"in"开始这个短语。'
    grammarPoint: 'Fixed: in spite of'
    relatedQuest: Q10
    difficulty: 3

  - id: U1324
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'Not only does homework help revision, _____ it also builds discipline.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'but'
    acceptableAnswers: ['but']
    explanation: '"Not only...but (also)" is the correlative conjunction pair. "But" introduces the second, often more important, point.'
    explanationZh: '"Not only...but (also)"是关联连词对。"But"引入第二个，通常更重要的观点。'
    grammarPoint: 'Not only...but also'
    relatedQuest: Q10
    difficulty: 3

  - id: U1325
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'The extent _____ which technology helps learning depends on how it is used.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'to'
    acceptableAnswers: ['to']
    explanation: '"The extent to which" is a fixed formal phrase meaning "how much." "To" is the required preposition.'
    explanationZh: '"The extent to which"是固定正式短语，意思是"多大程度上"。"To"是必需的介词。'
    grammarPoint: 'Fixed: the extent to which'
    relatedQuest: Q10
    difficulty: 3

  - id: U1326
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'School pets teach children _____ to care for other living creatures.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'how'
    acceptableAnswers: ['how']
    explanation: '"Teach someone how to..." introduces a skill being learned. "How" links to the infinitive "to care."'
    explanationZh: '"Teach someone how to..."引入正在学习的技能。"How"连接不定式"to care"。'
    grammarPoint: 'teach + object + how to'
    relatedQuest: Q10
    difficulty: 3

  - id: U1327
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'There is no _____ that education is vital for every child''s future.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'doubt'
    acceptableAnswers: ['doubt', 'question']
    explanation: '"There is no doubt/question that..." states something is certainly true. These are impersonal academic phrases.'
    explanationZh: '"There is no doubt/question that..."陈述某事肯定是真的。这些是非人称学术短语。'
    grammarPoint: 'There is no doubt that'
    relatedQuest: Q10
    difficulty: 3

  - id: U1328
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'It _____ without saying that every child deserves equal access to learning.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'goes'
    acceptableAnswers: ['goes']
    explanation: '"It goes without saying that..." is a fixed expression meaning "it is obvious that..."'
    explanationZh: '"It goes without saying that..."是固定表达，意思是"不言而喻……"'
    grammarPoint: 'Fixed: it goes without saying'
    relatedQuest: Q10
    difficulty: 3

  - id: U1329
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'Students tend to perform better _____ they are given creative tasks rather than worksheets.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'when'
    acceptableAnswers: ['when', 'if']
    explanation: '"When/if" introduces the condition. "Tend to perform better when..." shows a conditional cause-effect pattern.'
    explanationZh: '"When/if"引入条件。"Tend to perform better when..."展示条件因果模式。'
    grammarPoint: 'Conditional: when/if'
    relatedQuest: Q10
    difficulty: 3

  - id: U1330
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'Having considered both sides of the argument, I _____ that a compromise is the best solution.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'believe'
    acceptableAnswers: ['believe', 'conclude', 'think', 'feel']
    explanation: '"Having considered..., I believe/conclude that..." uses a perfect participle clause before stating a conclusion.'
    explanationZh: '"Having considered..., I believe/conclude that..."在陈述结论前使用完成分词从句。'
    grammarPoint: 'Participle clause + conclusion'
    relatedQuest: Q10
    difficulty: 3

  - id: U1331
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'It is _____ noting that Finland''s education system gives very little homework.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'worth'
    acceptableAnswers: ['worth']
    explanation: '"It is worth noting that..." means "it is important to notice that..." Fixed pattern: worth + -ing.'
    explanationZh: '"It is worth noting that..."意思是"值得注意的是……"固定结构：worth + -ing。'
    grammarPoint: 'It is worth + -ing'
    relatedQuest: Q10
    difficulty: 3

  - id: U1332
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'Many children would _____ to choose their own homework projects.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'prefer'
    acceptableAnswers: ['prefer', 'like', 'love']
    explanation: '"Would prefer to" expresses a preference. "Would" makes it a hypothetical wish rather than a statement of fact.'
    explanationZh: '"Would prefer to"表达偏好。"Would"使其成为假设性愿望而非事实陈述。'
    grammarPoint: 'would prefer to + infinitive'
    relatedQuest: Q10
    difficulty: 3

  - id: U1333
    type: open-cloze
    tags: [cloze-open, Q10, difficulty-3]
    context: debate
    passage: 'By _____ large, students who participate in debates develop better communication skills.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'and'
    acceptableAnswers: ['and']
    explanation: '"By and large" is a fixed expression meaning "generally" or "on the whole."'
    explanationZh: '"By and large"是固定表达，意思是"总的来说"或"大体上"。'
    grammarPoint: 'Fixed: by and large'
