      B: 'regarded'
      C: 'considered'
      D: 'supposed'
    answer: 'A'
    explanation: '"Is believed to be" — passive report structure. "Believed" works with "to be" directly; "considered" and "regarded" need "as."'
    explanationZh: '"Is believed to be"——被动报告结构。"Believed"直接搭配"to be"；"considered"和"regarded"需要"as"。'
    grammarPoint: 'Passive report: believed to be'
    relatedQuest: Q11
    difficulty: 3

