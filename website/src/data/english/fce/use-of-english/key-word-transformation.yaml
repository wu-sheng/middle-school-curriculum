category: 'Key Word Transformation'
categoryZh: '关键词句型转换'
fcepart: 'Use of English Part 4'
questions:
  # ============================================================
  # U0701-U0720: Active ↔ Passive with various tenses
  # Dragon Academy theme
  # ============================================================
  - id: U0701
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      The dragon destroyed the old castle.
      WAS → The old castle _____ by the dragon.
    sentenceZh: |
      龙摧毁了古老的城堡。
      WAS → 古老的城堡 _____ 。
    answer: 'was destroyed'
    explanation: "Active past simple 'destroyed' becomes passive 'was destroyed'. The object (the old castle) becomes the subject."
    explanationZh: '主动语态一般过去时 destroyed 变为被动语态 was destroyed。宾语（古老的城堡）变为主语。'
    grammarPoint: 'active → passive (past simple)'
    grammarPointZh: '主动→被动（一般过去时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0702
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      A young wizard is training the new dragon.
      BEING → The new dragon _____ by a young wizard.
    sentenceZh: |
      一个年轻的巫师正在训练新龙。
      BEING → 新龙正在 _____ 。
    answer: 'is being trained'
    explanation: "Active present continuous 'is training' becomes passive 'is being trained'."
    explanationZh: '主动现在进行时 is training 变为被动 is being trained。'
    grammarPoint: 'active → passive (present continuous)'
    grammarPointZh: '主动→被动（现在进行时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0703
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      They will build a new dragon stable next month.
      BUILT → A new dragon stable _____ next month.
    sentenceZh: |
      他们下个月将建造一个新的龙舍。
      BUILT → 新的龙舍下个月将 _____ 。
    answer: 'will be built'
    explanation: "Active future 'will build' becomes passive 'will be built'."
    explanationZh: '主动将来时 will build 变为被动 will be built。'
    grammarPoint: 'active → passive (future simple)'
    grammarPointZh: '主动→被动（一般将来时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0704
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      The healers have treated the injured dragon.
      BEEN → The injured dragon _____ by the healers.
    sentenceZh: |
      治疗师们已经治疗了受伤的龙。
      BEEN → 受伤的龙已经 _____ 。
    answer: 'has been treated'
    explanation: "Active present perfect 'have treated' becomes passive 'has been treated' (singular subject 'dragon')."
    explanationZh: '主动现在完成时 have treated 变为被动 has been treated（单数主语 dragon 用 has）。'
    grammarPoint: 'active → passive (present perfect)'
    grammarPointZh: '主动→被动（现在完成时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0705
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      Everyone at the Academy admires the golden dragon.
      ADMIRED → The golden dragon _____ by everyone at the Academy.
    sentenceZh: |
      学院里每个人都钦佩金龙。
      ADMIRED → 金龙 _____ 。
    answer: 'is admired'
    explanation: "Active present simple 'admires' becomes passive 'is admired'."
    explanationZh: '主动一般现在时 admires 变为被动 is admired。'
    grammarPoint: 'active → passive (present simple)'
    grammarPointZh: '主动→被动（一般现在时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0706
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      The dragon guard was watching the entrance all night.
      BEING → The entrance _____ by the dragon guard all night.
    sentenceZh: |
      龙卫兵整夜都在看守入口。
      BEING → 入口整夜 _____ 。
    answer: 'was being watched'
    explanation: "Active past continuous 'was watching' becomes passive 'was being watched'."
    explanationZh: '主动过去进行时 was watching 变为被动 was being watched。'
    grammarPoint: 'active → passive (past continuous)'
    grammarPointZh: '主动→被动（过去进行时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0707
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      Someone had stolen the dragon egg before the guards arrived.
      BEEN → The dragon egg _____ before the guards arrived.
    sentenceZh: |
      在守卫到达之前，有人偷了龙蛋。
      BEEN → 龙蛋在守卫到达之前 _____ 。
    answer: 'had been stolen'
    explanation: "Active past perfect 'had stolen' becomes passive 'had been stolen'."
    explanationZh: '主动过去完成时 had stolen 变为被动 had been stolen。'
    grammarPoint: 'active → passive (past perfect)'
    grammarPointZh: '主动→被动（过去完成时）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0708
    type: key-word-transformation
    tags: [passive, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      They must feed the dragons three times a day.
      BE → The dragons _____ three times a day.
    sentenceZh: |
      他们必须每天喂龙三次。
      BE → 龙每天必须 _____ 三次。
    answer: 'must be fed'
    explanation: "Active modal 'must feed' becomes passive 'must be fed'. Modal + be + past participle."
    explanationZh: '主动情态动词 must feed 变为被动 must be fed。情态动词 + be + 过去分词。'
    grammarPoint: 'active → passive (modal verb)'
    grammarPointZh: '主动→被动（情态动词）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0709
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The Academy should have warned the students about the storm.
      BEEN → The students _____ about the storm.
    sentenceZh: |
      学院应该警告学生们暴风雨的事。
      BEEN → 学生们 _____ 暴风雨的事。
    answer: 'should have been warned'
    explanation: "Active 'should have warned' becomes passive 'should have been warned'. Modal + have + been + past participle."
    explanationZh: '主动 should have warned 变为被动 should have been warned。情态动词 + have + been + 过去分词。'
    grammarPoint: 'active → passive (modal perfect)'
    grammarPointZh: '主动→被动（情态动词完成时）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0710
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      People believe that the crystal dragon brings good luck.
      BELIEVED → The crystal dragon _____ good luck.
    sentenceZh: |
      人们相信水晶龙会带来好运。
      BELIEVED → 水晶龙 _____ 好运。
    answer: 'is believed to bring'
    explanation: "'People believe that X does Y' becomes 'X is believed to do Y'. Subject + be + believed + to-infinitive."
    explanationZh: '"人们相信 X 做 Y"变为"X 被认为做 Y"。主语 + be + believed + to 不定式。'
    grammarPoint: 'impersonal passive (is believed to)'
    grammarPointZh: '非人称被动（is believed to）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0711
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The blacksmith made this sword from dragon steel.
      MADE → This sword _____ dragon steel.
    sentenceZh: |
      铁匠用龙钢打造了这把剑。
      MADE → 这把剑 _____ 龙钢。
    answer: 'was made from'
    explanation: "Active 'made X from Y' becomes passive 'X was made from Y'. 'From' is kept because the material changed form."
    explanationZh: '主动 made X from Y 变为被动 X was made from Y。用 from 因为材料改变了形态。'
    grammarPoint: 'active → passive (made from)'
    grammarPointZh: '主动→被动（made from）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0712
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      They say that a shadow dragon lives in the deepest cave.
      SAID → A shadow dragon _____ in the deepest cave.
    sentenceZh: |
      据说一条暗影龙住在最深的洞穴里。
      SAID → 一条暗影龙 _____ 最深的洞穴里。
    answer: 'is said to live'
    explanation: "'They say that X does Y' → 'X is said to do Y'. Impersonal passive with to-infinitive."
    explanationZh: '"据说 X 做 Y"→"X is said to do Y"。非人称被动搭配 to 不定式。'
    grammarPoint: 'impersonal passive (is said to)'
    grammarPointZh: '非人称被动（is said to）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0713
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The knight gave the princess a dragon feather.
      GIVEN → The princess _____ by the knight.
    sentenceZh: |
      骑士给了公主一根龙羽毛。
      GIVEN → 公主 _____ 。
    answer: 'was given a dragon feather'
    explanation: "With verbs that take two objects (give someone something), the indirect object (princess) can become the passive subject."
    explanationZh: '有两个宾语的动词（give sb sth），间接宾语（公主）可以变成被动语态的主语。'
    grammarPoint: 'active → passive (double object verb)'
    grammarPointZh: '主动→被动（双宾动词）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0714
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      Nobody can tame the wild storm dragon.
      BE → The wild storm dragon _____ by nobody.
    sentenceZh: |
      没有人能驯服这条野生风暴龙。
      BE → 这条野生风暴龙 _____ 。
    answer: "can't be tamed"
    explanation: "Active 'nobody can tame' becomes passive 'can't be tamed'. With 'nobody' as subject, the passive typically uses 'can't' instead."
    explanationZh: '主动 nobody can tame 变为被动 can''t be tamed。nobody 做主语时，被动语态通常用 can''t。'
    grammarPoint: 'active → passive (nobody → can''t be)'
    grammarPointZh: '主动→被动（nobody → can''t be）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0715
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The professor is going to announce the exam results tomorrow.
      ANNOUNCED → The exam results _____ tomorrow.
    sentenceZh: |
      教授明天要公布考试结果。
      ANNOUNCED → 考试结果明天 _____ 。
    answer: 'are going to be announced'
    explanation: "Active 'is going to announce' becomes passive 'are going to be announced' (plural subject 'results')."
    explanationZh: '主动 is going to announce 变为被动 are going to be announced（复数主语 results）。'
    grammarPoint: 'active → passive (be going to)'
    grammarPointZh: '主动→被动（be going to）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0716
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      They have been repairing the dragon bridge for three weeks.
      BEEN → The dragon bridge _____ for three weeks.
    sentenceZh: |
      他们已经修龙桥修了三个星期了。
      BEEN → 龙桥已经 _____ 三个星期了。
    answer: 'has been being repaired'
    explanation: "Active present perfect continuous 'have been repairing' becomes passive 'has been being repaired'. This is rare but grammatically correct."
    explanationZh: '主动现在完成进行时 have been repairing 变为被动 has been being repaired。这种形式少见但语法正确。'
    grammarPoint: 'active → passive (present perfect continuous)'
    grammarPointZh: '主动→被动（现在完成进行时）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0717
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      People think that the old wizard created the first dragon.
      THOUGHT → The old wizard _____ the first dragon.
    sentenceZh: |
      人们认为老巫师创造了第一条龙。
      THOUGHT → 老巫师 _____ 第一条龙。
    answer: 'is thought to have created'
    explanation: "'People think X did Y' → 'X is thought to have done Y'. The past action uses 'to have + past participle'."
    explanationZh: '"人们认为 X 做了 Y"→"X is thought to have done Y"。过去的动作用 to have + 过去分词。'
    grammarPoint: 'impersonal passive (is thought to have)'
    grammarPointZh: '非人称被动（is thought to have）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0718
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      Someone needs to clean the dragon stables every morning.
      CLEANED → The dragon stables _____ every morning.
    sentenceZh: |
      每天早上都需要有人打扫龙舍。
      CLEANED → 龙舍每天早上 _____ 。
    answer: 'need to be cleaned'
    explanation: "'Someone needs to clean X' becomes 'X needs to be cleaned'. Need + to be + past participle."
    explanationZh: '"有人需要打扫 X"变为"X 需要被打扫"。need + to be + 过去分词。'
    grammarPoint: 'active → passive (need to be done)'
    grammarPointZh: '主动→被动（need to be done）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0719
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The teachers made the students wear helmets during dragon riding.
      MADE → The students _____ helmets during dragon riding.
    sentenceZh: |
      老师们让学生在骑龙时戴头盔。
      MADE → 学生们 _____ 骑龙时戴头盔。
    answer: 'were made to wear'
    explanation: "Active 'made someone do' becomes passive 'someone was made TO do'. Note: the bare infinitive becomes a to-infinitive in the passive."
    explanationZh: '主动 made sb do 变为被动 sb was made TO do。注意：被动语态中不定式要加 to。'
    grammarPoint: 'active → passive (make → be made to)'
    grammarPointZh: '主动→被动（make → be made to）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0720
    type: key-word-transformation
    tags: [passive, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      The storm damaged the dragon arena badly last night.
      BADLY → The dragon arena _____ last night.
    sentenceZh: |
      暴风雨昨晚严重损坏了龙竞技场。
      BADLY → 龙竞技场昨晚 _____ 。
    answer: 'was badly damaged'
    explanation: "Active 'damaged X badly' becomes passive 'X was badly damaged'. The adverb goes before the past participle."
    explanationZh: '主动 damaged X badly 变为被动 X was badly damaged。副词放在过去分词前面。'
    grammarPoint: 'active → passive (adverb placement)'
    grammarPointZh: '主动→被动（副词位置）'
    relatedQuest: Q04
    difficulty: 3

  # ============================================================
  # U0721-U0740: Direct ↔ Reported speech
  # tell/say/ask transformations
  # Dragon Academy theme
  # ============================================================
  - id: U0721
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "I can see a dragon in the sky," said the boy.
      TOLD → The boy _____ he could see a dragon in the sky.
    sentenceZh: |
      "我能看到天空中的龙，"男孩说。
      TOLD → 男孩 _____ 他能看到天空中的龙。
    answer: 'told us/them'
    explanation: "'Said' becomes 'told + object'. 'Can' backshifts to 'could'. 'I' changes to 'he'."
    explanationZh: 'said 变为 told + 宾语。can 退后时态变为 could。I 变为 he。'
    grammarPoint: 'direct → reported (said → told)'
    grammarPointZh: '直接→间接引语（said → told）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0722
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "The dragon is sleeping in the cave," said Elara.
      SAID → Elara _____ the dragon was sleeping in the cave.
    sentenceZh: |
      "龙在洞穴里睡觉，"Elara 说。
      SAID → Elara _____ 龙在洞穴里睡觉。
    answer: 'said that'
    explanation: "Reported speech with 'said': no object needed, add 'that'. 'Is sleeping' backshifts to 'was sleeping'."
    explanationZh: '间接引语用 said：不需要宾语，加 that。is sleeping 退后时态变为 was sleeping。'
    grammarPoint: 'direct → reported (present continuous → past continuous)'
    grammarPointZh: '直接→间接引语（现在进行→过去进行）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0723
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "I have finished my dragon training," said the knight.
      TOLD → The knight _____ he had finished his dragon training.
    sentenceZh: |
      "我已经完成了龙的训练，"骑士说。
      TOLD → 骑士 _____ 他已经完成了龙的训练。
    answer: 'told us/them that'
    explanation: "'Said' → 'told + object + that'. 'Have finished' backshifts to 'had finished'. 'My' → 'his'."
    explanationZh: 'said → told + 宾语 + that。have finished 退后变为 had finished。my → his。'
    grammarPoint: 'direct → reported (present perfect → past perfect)'
    grammarPointZh: '直接→间接引语（现在完成→过去完成）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0724
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "Don't touch the dragon egg!" the teacher shouted.
      TOLD → The teacher _____ touch the dragon egg.
    sentenceZh: |
      "不要碰龙蛋！"老师喊道。
      TOLD → 老师 _____ 碰龙蛋。
    answer: 'told us/them not to'
    explanation: "Reported imperative (negative): 'Don't do X' → 'told someone not to do X'."
    explanationZh: '间接引语祈使句（否定）：Don''t do X → told sb not to do X。'
    grammarPoint: 'direct → reported (imperative negative)'
    grammarPointZh: '直接→间接引语（否定祈使句）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0725
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "Open the dragon gate!" the captain ordered.
      TOLD → The captain _____ open the dragon gate.
    sentenceZh: |
      "打开龙门！"队长命令。
      TOLD → 队长 _____ 打开龙门。
    answer: 'told them/us to'
    explanation: "Reported imperative: 'Do X!' → 'told someone to do X'."
    explanationZh: '间接引语祈使句：Do X! → told sb to do X。'
    grammarPoint: 'direct → reported (imperative)'
    grammarPointZh: '直接→间接引语（祈使句）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0726
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-2]
    context: dragon-academy
    sentence: |
      "Will you help me feed the dragons?" Kai asked.
      ASKED → Kai _____ help him feed the dragons.
    sentenceZh: |
      "你能帮我喂龙吗？"Kai 问。
      ASKED → Kai _____ 帮他喂龙。
    answer: 'asked me/us to'
    explanation: "Reported request: 'Will you do X?' → 'asked someone to do X'. 'Me' changes to 'him'."
    explanationZh: '间接引语请求：Will you do X? → asked sb to do X。me 变为 him。'
    grammarPoint: 'direct → reported (request)'
    grammarPointZh: '直接→间接引语（请求）'
    relatedQuest: Q04
    difficulty: 2

  - id: U0727
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      "Where does the ice dragon live?" the explorer asked.
      ASKED → The explorer _____ the ice dragon lived.
    sentenceZh: |
      "冰龙住在哪里？"探险家问。
      ASKED → 探险家 _____ 冰龙住在哪里。
    answer: 'asked where'
    explanation: "Reported wh-question: 'Where does X live?' → 'asked where X lived'. No question mark, normal word order, backshift tense."
    explanationZh: '间接引语 wh-疑问句：Where does X live? → asked where X lived。没有问号，正常语序，时态退后。'
    grammarPoint: 'direct → reported (wh-question)'
    grammarPointZh: '直接→间接引语（wh-疑问句）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0728
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      "Have you ever ridden a dragon?" the girl asked me.
      ASKED → The girl _____ ever ridden a dragon.
    sentenceZh: |
      "你骑过龙吗？"女孩问我。
      ASKED → 女孩 _____ 骑过龙。
    answer: 'asked me if/whether I had'
    explanation: "Reported yes/no question: 'Have you ever..?' → 'asked if/whether I had ever..'. Add if/whether, normal word order, backshift."
    explanationZh: '间接引语是/否疑问句：Have you ever..? → asked if/whether I had ever..。加 if/whether，正常语序，时态退后。'
    grammarPoint: 'direct → reported (yes/no question)'
    grammarPointZh: '直接→间接引语（是/否疑问句）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0729
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      "I will bring my dragon to school tomorrow," said Luna.
      SAID → Luna _____ bring her dragon to school the next day.
    sentenceZh: |
      "我明天会带我的龙来学校，"Luna 说。
      SAID → Luna _____ 第二天带她的龙来学校。
    answer: 'said she would'
    explanation: "'Will' backshifts to 'would'. 'Tomorrow' changes to 'the next day'. 'I/my' → 'she/her'."
    explanationZh: 'will 退后变为 would。tomorrow 变为 the next day。I/my → she/her。'
    grammarPoint: 'direct → reported (will → would, time shift)'
    grammarPointZh: '直接→间接引语（will → would，时间转换）'
    relatedQuest: Q04
    difficulty: 3

  - id: U0730
    type: key-word-transformation
    tags: [reported-speech, Q04, difficulty-3]
    context: dragon-academy
    sentence: |
      "We saw the dragon yesterday," the children said.
      TOLD → The children _____ they had seen the dragon the day before.
