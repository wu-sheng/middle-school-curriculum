  # ============================================================
  # U1161-U1200: Key Word Transformation (world-building theme)
  # ============================================================
  - id: U1161
    type: key-word-transformation
    tags: [relative-clause, Q08, difficulty-2]
    context: world-building
    sentence: |
      The architect designed the new museum. She is from Japan.
      WHO → The architect _____ is from Japan.
    sentenceZh: |
      建筑师设计了新博物馆。她来自日本。
      WHO → 设计了新博物馆的建筑师 _____ 。
    answer: 'who designed the new museum'
    explanation: 'Combine the two sentences using a defining relative clause with "who." The clause identifies which architect.'
    explanationZh: '使用"who"引导的限定性定语从句合并两个句子。从句说明是哪位建筑师。'
    grammarPoint: 'Sentence combining with relative clause (who)'
    grammarPointZh: '用定语从句合并句子（who）'
    relatedQuest: Q08
    difficulty: 2

  - id: U1162
    type: key-word-transformation
    tags: [passive-participle, Q08, difficulty-3]
    context: world-building
    sentence: |
      The city was surrounded by mountains. It was easy to defend.
      SURROUNDED → _____, the city was easy to defend.
    sentenceZh: |
      城市被山环绕。它易于防守。
      SURROUNDED → _____ ，城市易于防守。
    answer: 'Surrounded by mountains'
    explanation: 'Use a past participle phrase to replace the first clause. "Surrounded by mountains" = "Because it was surrounded by mountains."'
    explanationZh: '用过去分词短语替代第一个从句。"Surrounded by mountains" = "因为它被山环绕"。'
    grammarPoint: 'Participle phrase (passive)'
    grammarPointZh: '分词短语（被动）'
    relatedQuest: Q08
    difficulty: 3

  - id: U1163
    type: key-word-transformation
    tags: [noun-clause, Q08, difficulty-3]
    context: world-building
    sentence: |
      The thing that surprised me was the size of the ancient temple.
      WHAT → _____ was the size of the ancient temple.
    sentenceZh: |
      令我惊讶的东西是古寺的大小。
      WHAT → _____ 是古寺的大小。
    answer: 'What surprised me'
    explanation: '"What surprised me" = "The thing that surprised me." "What" replaces "the thing that."'
    explanationZh: '"What surprised me" = "令我惊讶的东西"。"What"替代了"the thing that"。'
    grammarPoint: 'Noun clause with what'
    grammarPointZh: '用what引导的名词从句'
    relatedQuest: Q08
    difficulty: 3

  - id: U1164
    type: key-word-transformation
    tags: [concession, Q08, difficulty-3]
    context: world-building
    sentence: |
      The building is very old. It is still structurally sound.
      ALTHOUGH → _____, it is still structurally sound.
    sentenceZh: |
      建筑很老了。它在结构上仍然牢固。
      ALTHOUGH → _____ ，它在结构上仍然牢固。
    answer: 'Although the building is very old'
    explanation: '"Although" introduces a concession clause — it is surprising that the old building is still sound.'
    explanationZh: '"Although"引导让步从句——老建筑仍然牢固令人惊讶。'
    grammarPoint: 'Adverbial clause of concession (although)'
    grammarPointZh: '让步状语从句（although）'
    relatedQuest: Q08
    difficulty: 3

  - id: U1165
    type: key-word-transformation
    tags: [non-defining, Q08, difficulty-3]
    context: world-building
    sentence: |
      The Taj Mahal was built as a monument to love. It is in India.
      WHICH → The Taj Mahal, _____, was built as a monument to love.
    sentenceZh: |
      泰姬陵是作为爱情纪念碑而建造的。它在印度。
      WHICH → 泰姬陵——_____ ——是作为爱情纪念碑而建造的。
    answer: 'which is in India'
    explanation: 'Non-defining relative clause with "which" adds extra information about the Taj Mahal. Commas are needed.'
    explanationZh: '用"which"引导的非限定性定语从句补充关于泰姬陵的额外信息。需要逗号。'
    grammarPoint: 'Non-defining relative clause (which)'
    grammarPointZh: '非限定性定语从句（which）'
    relatedQuest: Q08
    difficulty: 3

  # U1166-U1200: Continued KWT exercises (representative sample)
  - id: U1166
    type: key-word-transformation
    tags: [purpose, Q08, difficulty-3]
    context: world-building
    sentence: |
      The city banned cars from the centre. The aim was to reduce pollution.
      ORDER → The city banned cars from the centre _____ reduce pollution.
    sentenceZh: |
      城市禁止汽车进入市中心。目的是减少污染。
      ORDER → 城市禁止汽车进入市中心 _____ 减少污染。
    answer: 'in order to'
    explanation: '"In order to" expresses purpose — WHY the cars were banned.'
    explanationZh: '"In order to"表示目的——为什么禁止汽车。'
    grammarPoint: 'Purpose clause (in order to)'
    grammarPointZh: '目的从句（in order to）'
    relatedQuest: Q08
    difficulty: 3

  - id: U1167
    type: key-word-transformation
    tags: [result, Q08, difficulty-3]
    context: world-building
    sentence: |
      The earthquake was very powerful. Many buildings collapsed.
      SUCH → It was _____ that many buildings collapsed.
    sentenceZh: |
      地震非常强烈。许多建筑倒塌了。
      SUCH → 这是 _____ 以至于许多建筑倒塌了。
    answer: 'such a powerful earthquake'
    explanation: '"Such a + adjective + noun + that..." is a result structure. The powerful earthquake CAUSED the collapse.'
    explanationZh: '"Such a + 形容词 + 名词 + that..."是结果结构。强烈的地震导致了倒塌。'
    grammarPoint: 'Result clause (such...that)'
    grammarPointZh: '结果从句（such...that）'
    relatedQuest: Q08
    difficulty: 3

  - id: U1168
    type: key-word-transformation
    tags: [participle, Q08, difficulty-3]
    context: world-building
    sentence: |
      Because the architect knew the area well, she chose the perfect location.
      KNOWING → _____ the area well, the architect chose the perfect location.
    sentenceZh: |
      因为建筑师熟悉这个地区，她选择了完美的位置。
      KNOWING → _____ 这个地区，建筑师选择了完美的位置。
    answer: 'Knowing'
    explanation: '"Knowing" (present participle) replaces "Because she knew." Active meaning — she knew.'
    explanationZh: '"Knowing"（现在分词）替代"Because she knew"。主动含义——她知道。'
    grammarPoint: 'Participle phrase replacing adverbial clause'
    grammarPointZh: '分词短语替代状语从句'
    relatedQuest: Q08
    difficulty: 3

  - id: U1169
    type: key-word-transformation
    tags: [indirect-question, Q08, difficulty-3]
    context: world-building
    sentence: |
      How old is this building?
