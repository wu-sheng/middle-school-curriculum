questions:
  # ============================================================
  # U1101-U1130: Word Formation (world-building theme, difficulty 2-3)
  # ============================================================
  - id: U1101
    type: word-formation
    tags: [noun-suffix, Q08, difficulty-2]
    context: world-building
    sentence: 'The _____ of the new bridge took over three years to complete. (CONSTRUCT)'
    sentenceZh: '新桥的 _____ 花了三年多才完成。(CONSTRUCT)'
    baseWord: 'construct'
    answer: 'construction'
    targetPartOfSpeech: noun
    explanation: 'We need a noun after "The." Add -ion to "construct" to form "construction."'
    explanationZh: '"The"后面需要名词。在 construct 后加 -ion 构成名词 construction。'
    grammarPoint: 'verb → noun (+ion)'
    relatedQuest: Q08
    difficulty: 2

