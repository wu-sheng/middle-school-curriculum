  # ============================================================
  # U1116-U1160: Multiple-choice cloze (world-building passages)
  # ============================================================
  - id: U1116
    type: multiple-choice-cloze
    tags: [cloze-mc, Q08, difficulty-2]
    context: world-building
    passage: 'The ancient city of Petra was (1)_____ entirely from rock by the Nabataean people over 2,000 years ago.'
    question: 'Choose the best word for gap (1).'
    questionZh: '选择最适合空格(1)的词。'
    options:
      A: 'carved'
      B: 'painted'
      C: 'written'
      D: 'planted'
    answer: 'A'
    explanation: 'Petra is famous for being "carved" from rock — its buildings are cut directly into the cliff face.'
    explanationZh: '佩特拉以从岩石中"雕刻"而闻名——它的建筑直接在悬崖面上开凿。'
    grammarPoint: 'Vocabulary: carved from rock'
    relatedQuest: Q08
    difficulty: 2

  - id: U1117
    type: multiple-choice-cloze
    tags: [cloze-mc, Q08, difficulty-2]
    context: world-building
    passage: 'Modern architects try to _____ traditional styles with new technology when designing buildings.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'separate'
      B: 'combine'
      C: 'remove'
      D: 'avoid'
    answer: 'B'
    explanation: '"Combine" means to bring together. Architects combine old styles with new technology.'
    explanationZh: '"Combine"意为结合。建筑师将旧风格与新技术结合。'
    grammarPoint: 'Vocabulary: combine...with'
    relatedQuest: Q08
    difficulty: 2

  - id: U1118
    type: multiple-choice-cloze
    tags: [cloze-mc, Q08, difficulty-2]
    context: world-building
    passage: 'The new park was built on the _____ of an old factory that had been closed for years.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'place'
      B: 'area'
      C: 'site'
      D: 'spot'
    answer: 'C'
    explanation: '"Site" is the correct word for the location of a building or construction. "On the site of" is a fixed phrase.'
    explanationZh: '"Site"是建筑或施工地点的正确词。"On the site of"是固定短语。'
    grammarPoint: 'Vocabulary: on the site of'
    relatedQuest: Q08
    difficulty: 2

  - id: U1119
    type: multiple-choice-cloze
    tags: [cloze-mc, Q08, difficulty-2]
    context: world-building
    passage: 'Traffic congestion is a major problem _____ rush hour in most large cities.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'while'
      B: 'during'
      C: 'between'
      D: 'since'
    answer: 'B'
    explanation: '"During" is a preposition used before a noun (rush hour) to indicate time. "While" needs a clause.'
    explanationZh: '"During"是介词，用于名词（rush hour）前表示时间。"While"需要从句。'
    grammarPoint: 'Preposition: during + noun'
    relatedQuest: Q08
    difficulty: 2

  - id: U1120
    type: multiple-choice-cloze
    tags: [cloze-mc, Q08, difficulty-2]
    context: world-building
    passage: 'The government _____ a new law requiring all new buildings to have solar panels.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'introduced'
      B: 'produced'
      C: 'invented'
      D: 'discovered'
    answer: 'A'
    explanation: '"Introduced" a law means to officially bring it into effect. We "introduce" laws, policies, and rules.'
    explanationZh: '"Introduced"法律意为正式使其生效。我们"introduce"法律、政策和规则。'
    grammarPoint: 'Vocabulary: introduce a law'
    relatedQuest: Q08
    difficulty: 2

