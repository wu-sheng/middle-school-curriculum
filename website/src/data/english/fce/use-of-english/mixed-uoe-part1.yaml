    explanation: 'We need an adjective before the noun "engineers." Add -able to "remark" to form "remarkable."'
    explanationZh: '名词"engineers"前需要形容词。在 remark 后加 -able 构成形容词 remarkable。'
    grammarPoint: 'verb → adjective (+able)'
