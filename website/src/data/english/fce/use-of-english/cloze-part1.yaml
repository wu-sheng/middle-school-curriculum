  - id: U0801
    type: multiple-choice-cloze
    tags: [collocation, Q05, difficulty-2]
    context: storytelling
    sentence: 'The detective decided to _____ an investigation into the mysterious disappearance.'
    sentenceZh: '侦探决定 _____ 对神秘失踪事件的调查。'
    options:
      A: 'make'
      B: 'do'
      C: 'carry out'
      D: 'take'
    answer: 'C'
    explanation: '"Carry out an investigation" is the correct collocation. "Do/make/take an investigation" are not natural.'
    explanationZh: '"carry out an investigation"是正确的搭配。"do/make/take an investigation"不自然。'
    grammarPoint: 'Collocation: carry out + investigation'
    relatedQuest: Q05
    difficulty: 2

  - id: U0802
    type: multiple-choice-cloze
    tags: [preposition, Q05, difficulty-2]
    context: storytelling
    sentence: 'The old map was the key _____ finding the hidden treasure.'
    sentenceZh: '旧地图是找到隐藏宝藏的关键。'
    options:
      A: 'for'
      B: 'to'
      C: 'of'
      D: 'in'
    answer: 'B'
    explanation: '"The key to" is the correct preposition combination. "Key to + -ing" for purpose.'
    explanationZh: '"the key to"是正确的介词搭配。"key to + -ing"表示目的。'
    grammarPoint: 'Preposition: key to'
    relatedQuest: Q05
    difficulty: 2

  - id: U0803
    type: multiple-choice-cloze
    tags: [linking-word, Q05, difficulty-2]
    context: storytelling
    sentence: 'The hero was exhausted. _____, he refused to stop until he had found the missing child.'
    sentenceZh: '英雄精疲力竭了。_____，他拒绝停下来直到找到那个失踪的孩子。'
    options:
      A: 'Therefore'
      B: 'Furthermore'
      C: 'Nevertheless'
      D: 'Consequently'
    answer: 'C'
    explanation: '"Nevertheless" shows contrast — despite exhaustion, he continued. "Therefore/Consequently" show result, not contrast.'
    explanationZh: '"Nevertheless"表示对比——尽管精疲力竭，他仍然继续。"Therefore/Consequently"表示结果，不是对比。'
    grammarPoint: 'Linking word: nevertheless (contrast)'
    relatedQuest: Q05
    difficulty: 2

