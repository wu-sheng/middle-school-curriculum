  - id: U0601
    type: word-formation
    tags: [noun-suffix, Q01, difficulty-2]
    context: detective
    sentence: 'The detective felt a sense of _____ after solving the mystery. (ACHIEVE)'
    sentenceZh: '侦探在破案后感到一种 _____ 感。(ACHIEVE)'
    baseWord: 'achieve'
    answer: 'achievement'
    targetPartOfSpeech: noun
    explanation: 'We need a noun after "a sense of". Add -ment to "achieve" to form "achievement".'
    explanationZh: 'a sense of 后面需要名词。在 achieve 后加 -ment 构成名词 achievement。'
    grammarPoint: 'verb → noun (+ment)'
    relatedQuest: Q01
    difficulty: 2

