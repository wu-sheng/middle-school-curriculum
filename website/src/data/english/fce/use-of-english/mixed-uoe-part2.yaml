  - id: U1220
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'I cannot recommend this film _____ enough — it truly is a must-see.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'high'
      B: 'highly'
      C: 'higher'
      D: 'highest'
    answer: 'B'
    explanation: '"Cannot recommend highly enough" is a fixed superlative expression. "Highly" (adverb) modifies "recommend."'
    explanationZh: '"Cannot recommend highly enough"是固定的最高级表达。"Highly"（副词）修饰"recommend"。'
    grammarPoint: 'Expression: cannot recommend highly enough'
    relatedQuest: Q09
    difficulty: 3

