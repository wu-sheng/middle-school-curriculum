      C: 'get'
      D: 'pull'
    answer: 'A'
    explanation: '"Bring out the best" is a fixed expression meaning to help someone perform at their highest level.'
    explanationZh: '"Bring out the best"是固定表达，意思是帮助某人发挥最高水平。'
    grammarPoint: 'Expression: bring out the best'
    relatedQuest: Q09
    difficulty: 3

  - id: U1212
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The animation is so realistic that it is hard to tell it _____ from live action.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'away'
      B: 'apart'
      C: 'off'
      D: 'out'
    answer: 'B'
    explanation: '"Tell apart" means to distinguish or see the difference between two things. "Tell it apart from" = distinguish from.'
    explanationZh: '"Tell apart"意思是区分或看出两个事物之间的区别。"Tell it apart from"=区分。'
    grammarPoint: 'Phrasal verb: tell apart'
