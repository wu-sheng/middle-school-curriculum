  - id: U1213
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The film has been praised by critics and audiences _____.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'same'
      B: 'together'
      C: 'alike'
      D: 'both'
    answer: 'C'
    explanation: '"Critics and audiences alike" means "both critics and audiences equally." "Alike" after two nouns means "both."'
    explanationZh: '"Critics and audiences alike"意思是"评论家和观众同样"。两个名词后面的"alike"意思是"两者都"。'
    grammarPoint: 'Expression: X and Y alike'
    relatedQuest: Q09
    difficulty: 3

  - id: U1214
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The story had me _____ tears by the final scene — it was incredibly moving.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'at'
      B: 'in'
      C: 'on'
      D: 'with'
    answer: 'B'
    explanation: '"In tears" means "crying." "Had me in tears" means "made me cry." It is a common review expression.'
    explanationZh: '"In tears"意思是"哭泣"。"Had me in tears"意思是"让我哭了"。这是常见的评论表达。'
    grammarPoint: 'Expression: in tears'
    relatedQuest: Q09
    difficulty: 3

