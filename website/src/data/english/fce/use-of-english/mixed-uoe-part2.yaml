    baseWord: 'breath'
    answer: 'breathtaking'
    targetPartOfSpeech: adjective
    explanation: '"Breathtaking" means "amazing, leaving you gasping." Breath + taking = breathtaking (adjective).'
    explanationZh: '"Breathtaking"意思是"令人惊叹的，让你喘不上气"。Breath+taking=breathtaking（形容词）。'
    grammarPoint: 'Compound adjective: breathtaking'
    relatedQuest: Q09
    difficulty: 3

