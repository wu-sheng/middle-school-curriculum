  # --- Passage 1: Book Reviews (U1201-U1210) ---
  - id: U1201
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'A good book review should give the reader enough information to decide (1)_____ to read the book or not.'
    question: 'Choose the best word for gap (1).'
    questionZh: '选择最适合空格(1)的词。'
    options:
      A: 'if'
      B: 'whether'
      C: 'that'
      D: 'which'
    answer: 'B'
    explanation: '"Whether...or not" is the correct structure for presenting two alternatives. "If" cannot be followed by "or not" in this position.'
    explanationZh: '"Whether...or not"是呈现两个选择的正确结构。"If"在此位置不能接"or not"。'
    grammarPoint: 'whether vs. if'
    relatedQuest: Q09
    difficulty: 3

  - id: U1202
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The reviewer should avoid giving _____ spoilers, as these would ruin the reading experience.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'out'
      B: 'away'
      C: 'up'
      D: 'off'
    answer: 'B'
    explanation: '"Giving away spoilers" means revealing plot details. "Give away" is the correct phrasal verb.'
    explanationZh: '"Giving away spoilers"意思是透露情节细节。"Give away"是正确的短语动词。'
    grammarPoint: 'Phrasal verb: give away'
    relatedQuest: Q09
    difficulty: 3

  - id: U1203
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'It is important to _____ a balance between describing the plot and sharing your opinion.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'strike'
      B: 'hit'
      C: 'beat'
      D: 'catch'
    answer: 'A'
    explanation: '"Strike a balance" is a fixed collocation meaning "find the right balance between two things."'
    explanationZh: '"Strike a balance"是固定搭配，意思是"在两件事之间找到正确的平衡"。'
    grammarPoint: 'Collocation: strike a balance'
    relatedQuest: Q09
    difficulty: 3

  - id: U1204
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The characters were so well-developed that I felt as _____ I knew them personally.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'if'
      B: 'though'
      C: 'like'
      D: 'when'
    answer: 'B'
    explanation: '"As though" means "as if" — it introduces an imagined comparison. Both "as if" and "as though" are correct, but only "though" is in the options.'
    explanationZh: '"As though"意思是"好像"——它引入一个想象的比较。"As if"和"as though"都正确，但选项中只有"though"。'
    grammarPoint: 'as though / as if'
    relatedQuest: Q09
    difficulty: 3

  - id: U1205
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The plot is full of twists that will keep you on the _____ of your seat.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'side'
      B: 'back'
      C: 'edge'
      D: 'tip'
    answer: 'C'
    explanation: '"On the edge of your seat" is an idiom meaning "very excited and nervous about what will happen next."'
    explanationZh: '"On the edge of your seat"是习语，意思是"对接下来会发生什么非常兴奋和紧张"。'
    grammarPoint: 'Idiom: on the edge of your seat'
    relatedQuest: Q09
    difficulty: 3

  - id: U1206
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'I could not _____ the book down — I read it from cover to cover in a single day.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'put'
      B: 'set'
      C: 'lay'
      D: 'take'
    answer: 'A'
    explanation: '"Could not put the book down" is a fixed expression meaning the book was so engaging you kept reading.'
    explanationZh: '"Could not put the book down"是固定表达，意思是书太吸引人了，你一直在读。'
    grammarPoint: 'Expression: could not put it down'
    relatedQuest: Q09
    difficulty: 3

  - id: U1207
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The author has a remarkable ability to bring her characters to _____.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'live'
      B: 'life'
      C: 'alive'
      D: 'living'
    answer: 'B'
    explanation: '"Bring to life" is a fixed phrase meaning "make something seem real and vivid." We need the noun "life."'
    explanationZh: '"Bring to life"是固定短语，意思是"使某物看起来真实而生动"。我们需要名词"life"。'
    grammarPoint: 'Expression: bring to life'
    relatedQuest: Q09
    difficulty: 3

  - id: U1208
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The sequel does not quite live _____ to the high expectations set by the original.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'on'
      B: 'up'
      C: 'in'
      D: 'out'
    answer: 'B'
    explanation: '"Live up to" means "meet expectations." "Does not live up to" means it was not as good as expected.'
    explanationZh: '"Live up to"意思是"达到期望"。"Does not live up to"意思是没有预期的那么好。'
    grammarPoint: 'Phrasal verb: live up to'
    relatedQuest: Q09
    difficulty: 3

  - id: U1209
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The film is loosely _____ on a true story, although many details have been changed.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'made'
      B: 'built'
      C: 'based'
      D: 'set'
    answer: 'C'
    explanation: '"Based on" is a fixed expression meaning "using as a source." "Loosely based on" means not very closely following the original.'
    explanationZh: '"Based on"是固定表达，意思是"以……为根据"。"Loosely based on"意思是不太紧密地跟随原作。'
    grammarPoint: 'Expression: based on'
    relatedQuest: Q09
    difficulty: 3

  - id: U1210
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'All in all, this novel is well _____ reading, especially if you enjoy historical fiction.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'deserving'
      B: 'merit'
      C: 'value'
      D: 'worth'
    answer: 'D'
    explanation: '"Well worth reading" is a fixed phrase meaning "definitely deserves to be read." "Worth" is followed by the -ing form.'
    explanationZh: '"Well worth reading"是固定短语，意思是"绝对值得读"。"Worth"后面跟-ing形式。'
    grammarPoint: 'Expression: well worth + -ing'
    relatedQuest: Q09
    difficulty: 3

  # --- Passage 2: Film Reviews (U1211-U1220) ---
  - id: U1211
    type: multiple-choice-cloze
    tags: [cloze-mc, Q09, difficulty-3]
    context: review
    passage: 'The director managed to _____ the best performance out of every actor in the cast.'
    question: 'Choose the best word for the gap.'
