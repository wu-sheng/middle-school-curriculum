fcepart: 'Use of English Part 1 & Part 2'
questions:
  # ============================================================
  # U0901-U0950: Multiple-choice cloze (science-themed passages)
  # ============================================================

  # --- Passage 1: Coral Reefs (U0901-U0910) ---
  - id: U0901
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Coral reefs are often (1)_____ the "rainforests of the sea" because they support an incredible variety of life.'
    question: 'Choose the best word for gap (1).'
    questionZh: '选择最适合空格(1)的词。'
    options:
      A: 'told'
      B: 'called'
      C: 'named'
      D: 'said'
    answer: 'B'
    explanation: '"Called" is the correct word in the passive construction "are called." We say "X is called Y" meaning "people refer to X as Y."'
    explanationZh: '"Called"是被动结构"are called"中的正确词。我们说"X is called Y"意思是"人们称X为Y"。'
    grammarPoint: 'Passive voice with "called"'
    relatedQuest: Q06
    difficulty: 2

  - id: U0902
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Coral reefs cover less than 1% of the ocean floor. _____, they are home to approximately 25% of all marine species.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'Furthermore'
      B: 'However'
      C: 'Therefore'
      D: 'Meanwhile'
    answer: 'B'
    explanation: 'Small area (1%) vs. huge biodiversity (25%) is a contrast. "However" signals this unexpected relationship.'
    explanationZh: '小面积（1%）vs. 巨大生物多样性（25%）是一种对比。"However"表示这种意外的关系。'
    grammarPoint: 'Contrast connector'
    relatedQuest: Q06
    difficulty: 2

  - id: U0903
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'When ocean temperatures rise, corals become stressed and expel the algae that live _____ them.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'inside'
      B: 'above'
      C: 'behind'
      D: 'beside'
    answer: 'A'
    explanation: 'The algae (zooxanthellae) live INSIDE the coral tissue. "Inside" is the correct preposition.'
    explanationZh: '藻类（虫黄藻）生活在珊瑚组织内部。"Inside"是正确的介词。'
    grammarPoint: 'Preposition of location'
    relatedQuest: Q06
    difficulty: 2

  - id: U0904
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Without the colourful algae, the coral turns white. This process is _____ as bleaching.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'called'
      B: 'known'
      C: 'referred'
      D: 'named'
    answer: 'B'
    explanation: '"Is known as" is a fixed expression meaning "is called" or "is referred to as." Note: "referred" needs "to" (referred to as).'
    explanationZh: '"Is known as"是固定表达，意思是"被称为"。注意："referred"需要"to"（referred to as）。'
    grammarPoint: 'Fixed expression: known as'
    relatedQuest: Q06
    difficulty: 2

  - id: U0905
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'If temperatures return to normal quickly, the algae can come back and the coral can _____.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'recover'
      B: 'discover'
      C: 'cover'
      D: 'uncover'
    answer: 'A'
    explanation: '"Recover" means to get better after damage. The coral returns to health if conditions improve.'
    explanationZh: '"Recover"意思是受损后恢复。如果条件改善，珊瑚恢复健康。'
    grammarPoint: 'Word choice: recover vs. discover'
    relatedQuest: Q06
    difficulty: 2

  - id: U0906
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: '_____, if the heat lasts too long, the coral will starve and die.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'Moreover'
      B: 'Furthermore'
      C: 'However'
      D: 'In addition'
    answer: 'C'
    explanation: 'The previous sentence says coral CAN recover. This sentence says it WILL die if heat continues. "However" marks this contrast.'
    explanationZh: '前一句说珊瑚可以恢复。这句说如果高温持续就会死亡。"However"标记这种对比。'
    grammarPoint: 'Contrast connector'
    relatedQuest: Q06
    difficulty: 2

  - id: U0907
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Ocean acidification, _____ by the absorption of carbon dioxide, makes it harder for coral to build their skeletons.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'causing'
      B: 'caused'
      C: 'causes'
      D: 'cause'
    answer: 'B'
    explanation: '"Caused by" is a past participle phrase modifying "ocean acidification." It explains what causes acidification (CO2 absorption).'
    explanationZh: '"Caused by"是过去分词短语修饰"ocean acidification"。它解释了什么导致酸化（吸收二氧化碳）。'
    grammarPoint: 'Past participle phrase'
    relatedQuest: Q06
    difficulty: 2

  - id: U0908
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Scientists are _____ heat-resistant coral varieties in laboratories and transplanting them onto damaged reefs.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'breeding'
      B: 'building'
      C: 'breaking'
      D: 'bringing'
    answer: 'A'
    explanation: '"Breeding" means growing new organisms with specific characteristics. Scientists are breeding heat-resistant coral.'
    explanationZh: '"Breeding"意思是培育具有特定特征的新生物。科学家正在培育耐热珊瑚。'
    grammarPoint: 'Word choice: breed'
    relatedQuest: Q06
    difficulty: 2

  - id: U0909
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: '_____, some reefs have shown remarkable resilience, recovering naturally when given enough time.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'However'
      B: 'Moreover'
      C: 'Consequently'
      D: 'Nevertheless'
    answer: 'B'
    explanation: 'This adds another positive point (natural resilience) to the conservation efforts. "Moreover" adds information.'
    explanationZh: '这在保护努力之外补充了另一个积极点（自然恢复力）。"Moreover"补充信息。'
    grammarPoint: 'Addition connector'
    relatedQuest: Q06
    difficulty: 2

  - id: U0910
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'If global temperatures continue to rise, scientists _____ that up to 90% of the world''s reefs could be lost by 2050.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options:
      A: 'estimate'
      B: 'examine'
      C: 'expect'
      D: 'explain'
    answer: 'A'
    explanation: '"Estimate" means to calculate approximately. Scientists make predictions based on data — they estimate outcomes.'
    explanationZh: '"Estimate"意思是大约计算。科学家根据数据做出预测——他们估计结果。'
    grammarPoint: 'Word choice: estimate'
    relatedQuest: Q06
    difficulty: 2

  # --- Passage 2: Octopus Intelligence (U0911-U0920) ---
  - id: U0911
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'For a long time, scientists believed that only mammals could be truly intelligent. _____, research has shown that octopuses are remarkably smart.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'Furthermore', B: 'However', C: 'Therefore', D: 'Meanwhile'}
    answer: 'B'
    explanation: 'Old belief (only mammals) vs. new finding (octopuses are smart) is a contrast.'
    explanationZh: '旧观念（只有哺乳动物）vs. 新发现（章鱼很聪明）是一种对比。'
    grammarPoint: 'Contrast connector'
    relatedQuest: Q06
    difficulty: 2

  - id: U0912
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Octopuses have about 500 million neurons, which is more than _____ other invertebrates.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'many', B: 'much', C: 'most', D: 'more'}
    answer: 'C'
    explanation: '"More than most other invertebrates" — comparing octopuses to the majority of invertebrates.'
    explanationZh: '"More than most other invertebrates"——将章鱼与大多数其他无脊椎动物进行比较。'
    grammarPoint: 'Quantifier: most'
    relatedQuest: Q06
    difficulty: 2

  - id: U0913
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Two-thirds of these neurons are _____ in their eight arms, not in their brain.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'placed', B: 'located', C: 'positioned', D: 'set'}
    answer: 'B'
    explanation: '"Located" is the most natural word for describing where something is found. "Are located in" = "are found in."'
    explanationZh: '"Located"是描述某物在哪里的最自然的词。"Are located in" = "are found in"。'
    grammarPoint: 'Word choice: located'
    relatedQuest: Q06
    difficulty: 2

  - id: U0914
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'This _____ each arm can taste, touch, and even make decisions independently.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'means', B: 'makes', C: 'shows', D: 'proves'}
    answer: 'A'
    explanation: '"This means" introduces a consequence or implication of the previous fact.'
    explanationZh: '"This means"引入前一个事实的结果或含义。'
    grammarPoint: 'Result expression: this means'
    relatedQuest: Q06
    difficulty: 2

  - id: U0915
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'An octopus named Inky _____ from his tank by squeezing through a narrow drain pipe.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'ran', B: 'escaped', C: 'left', D: 'moved'}
    answer: 'B'
    explanation: '"Escaped" means to get free from a place of confinement. Inky got out of his tank — he escaped.'
    explanationZh: '"Escaped"意思是从禁锢的地方逃脱。Inky从水箱里出来了——他逃跑了。'
    grammarPoint: 'Word choice: escape'
    relatedQuest: Q06
    difficulty: 2

  - id: U0916
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Some species collect coconut shells and use them _____ portable shelters.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'like', B: 'for', C: 'as', D: 'to'}
    answer: 'C'
    explanation: '"Use X as Y" means to employ X in the role of Y. "Use them as shelters" = "use them to serve as shelters."'
    explanationZh: '"Use X as Y"意思是将X用作Y。"Use them as shelters" = "将它们用作庇护所"。'
    grammarPoint: 'Preposition: use as'
    relatedQuest: Q06
    difficulty: 3

  - id: U0917
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Scientists consider this a form of tool use — a behaviour once thought to be _____ to primates.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'special', B: 'unique', C: 'exclusive', D: 'specific'}
    answer: 'B'
    explanation: '"Unique to" means belonging to only one group. The behaviour was thought to belong only to primates.'
    explanationZh: '"Unique to"意思是仅属于一个群体。这种行为曾被认为只属于灵长类。'
    grammarPoint: 'Collocation: unique to'
    relatedQuest: Q06
    difficulty: 3

  - id: U0918
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Octopuses can change their colour, pattern, and even skin texture in less _____ a second.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'then', B: 'that', C: 'than', D: 'this'}
    answer: 'C'
    explanation: '"Less than" is a fixed comparative phrase. "In less than a second" = "in under one second."'
    explanationZh: '"Less than"是固定的比较短语。"In less than a second" = "在不到一秒钟内"。'
    grammarPoint: 'Comparative: less than'
    relatedQuest: Q06
    difficulty: 3

  - id: U0919
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: '_____ these extraordinary abilities, octopuses live surprisingly short lives.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'Although', B: 'Despite', C: 'However', D: 'Because of'}
    answer: 'B'
    explanation: '"Despite" + noun/gerund shows contrast. "Despite these abilities" contrasts with "short lives." Note: "Although" needs a clause.'
    explanationZh: '"Despite" + 名词/动名词表示对比。"Despite these abilities"与"short lives"形成对比。注意："Although"需要一个从句。'
    grammarPoint: 'Despite + noun'
    relatedQuest: Q06
    difficulty: 3

  - id: U0920
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: '_____, in that brief time, they demonstrate intelligence that continues to amaze researchers.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'Furthermore', B: 'Moreover', C: 'Nevertheless', D: 'Consequently'}
    answer: 'C'
    explanation: 'Despite short lives (negative), they still amaze (positive). "Nevertheless" = "despite that."'
    explanationZh: '尽管寿命短（负面），它们仍然令人惊叹（正面）。"Nevertheless" = "尽管如此"。'
    grammarPoint: 'Contrast connector: nevertheless'
    relatedQuest: Q06
    difficulty: 3

  # --- Passage 3: Migration (U0921-U0930) ---
  - id: U0921
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Every year, billions of animals _____ incredible journeys across the planet.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'undertake', B: 'undergo', C: 'understand', D: 'underline'}
    answer: 'A'
    explanation: '"Undertake a journey" means to begin or carry out a journey. The other "under-" words do not fit.'
    explanationZh: '"Undertake a journey"意思是开始或进行一次旅程。其他"under-"词不适合。'
    grammarPoint: 'Collocation: undertake a journey'
    relatedQuest: Q06
    difficulty: 2

  - id: U0922
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Arctic terns make the longest _____ of any animal — about 70,000 kilometres.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'trip', B: 'migration', C: 'walk', D: 'visit'}
    answer: 'B'
    explanation: '"Migration" is the correct scientific term for animals moving seasonally between habitats.'
    explanationZh: '"Migration"是动物在栖息地之间季节性移动的正确科学术语。'
    grammarPoint: 'Word choice: migration'
    relatedQuest: Q06
    difficulty: 2

  - id: U0923
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Scientists believe migration is triggered by a _____ of factors including day length and temperature.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'group', B: 'set', C: 'combination', D: 'collection'}
    answer: 'C'
    explanation: '"A combination of factors" is a common collocation meaning several things working together.'
    explanationZh: '"A combination of factors"是常见搭配，意思是几种事物共同作用。'
    grammarPoint: 'Collocation: combination of'
    relatedQuest: Q06
    difficulty: 2

  - id: U0924
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Salmon use the Earth''s magnetic field to _____ thousands of kilometres back to their birthplace.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'travel', B: 'navigate', C: 'swim', D: 'move'}
    answer: 'B'
    explanation: '"Navigate" means to find your way. Salmon use magnetic fields to NAVIGATE — to determine direction.'
    explanationZh: '"Navigate"意思是找到路。鲑鱼使用磁场来导航——确定方向。'
    grammarPoint: 'Word choice: navigate'
    relatedQuest: Q06
    difficulty: 2

  - id: U0925
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Climate change is _____ these ancient migration patterns.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'disrupting', B: 'destroying', C: 'dissolving', D: 'dismissing'}
    answer: 'A'
    explanation: '"Disrupting" means disturbing or interrupting the normal pattern. Climate change DISRUPTS (not completely destroys) migration.'
    explanationZh: '"Disrupting"意思是扰乱或中断正常模式。气候变化扰乱（不是完全摧毁）迁徙。'
    grammarPoint: 'Word choice: disrupt'
    relatedQuest: Q06
    difficulty: 3

  - id: U0926
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: '_____ a result, some birds arrive at their breeding grounds only to find that insects have already peaked.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'For', B: 'As', C: 'In', D: 'By'}
    answer: 'B'
    explanation: '"As a result" is a fixed phrase meaning "consequently." The preposition must be "as."'
    explanationZh: '"As a result"是固定短语，意思是"因此"。介词必须是"as"。'
    grammarPoint: 'Fixed phrase: as a result'
    relatedQuest: Q06
    difficulty: 3

  - id: U0927
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Scientists call this phenomenon a "mismatch" _____ it threatens species that have migrated successfully for millions of years.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'so', B: 'and', C: 'but', D: 'or'}
    answer: 'B'
    explanation: '"And" connects two facts about the mismatch: (1) what scientists call it, (2) that it threatens species.'
    explanationZh: '"And"连接关于不匹配的两个事实：（1）科学家怎么称呼它，（2）它威胁物种。'
    grammarPoint: 'Conjunction: and'
    relatedQuest: Q06
    difficulty: 3

  - id: U0928
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'The wildebeest migration _____ approximately 3,000 kilometres and takes a full year.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'travels', B: 'covers', C: 'reaches', D: 'crosses'}
    answer: 'B'
    explanation: '"Covers" a distance = travels over that distance. "The journey covers 3,000 km" is natural English.'
    explanationZh: '"Covers"一段距离 = 行经那段距离。"The journey covers 3,000 km"是自然的英语表达。'
    grammarPoint: 'Collocation: cover a distance'
    relatedQuest: Q06
    difficulty: 3

  - id: U0929
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Sea turtles can return to the _____ beach where they hatched, even after 30 years.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'exact', B: 'right', C: 'true', D: 'real'}
    answer: 'A'
    explanation: '"The exact beach" emphasizes precision — the very same beach, not just a similar one.'
    explanationZh: '"The exact beach"强调精确性——完全相同的海滩，不仅仅是类似的。'
    grammarPoint: 'Word choice: exact'
    relatedQuest: Q06
    difficulty: 3

  - id: U0930
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-3]
    context: science
    passage: 'Many animals appear to have a built-_____ compass that helps them find their way.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'up', B: 'in', C: 'on', D: 'out'}
    answer: 'B'
    explanation: '"Built-in" means already included or part of the body naturally. A "built-in compass" = an internal navigation ability.'
    explanationZh: '"Built-in"意思是已经包含在内或身体天生的一部分。"Built-in compass" = 内在导航能力。'
    grammarPoint: 'Compound adjective: built-in'
    relatedQuest: Q06
    difficulty: 3

  # --- Passage 4: Deep Sea (U0931-U0940) ---
  - id: U0931
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'More than 80% of the ocean _____ unexplored.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'remains', B: 'stays', C: 'keeps', D: 'continues'}
    answer: 'A'
    explanation: '"Remains" means "is still." "Remains unexplored" = "is still not explored."'
    explanationZh: '"Remains"意思是"仍然是"。"Remains unexplored" = "仍未被探索"。'
    grammarPoint: 'Word choice: remains'
    relatedQuest: Q06
    difficulty: 2

  - id: U0932
    type: multiple-choice-cloze
    tags: [cloze-mc, Q06, difficulty-2]
    context: science
    passage: 'Many deep-sea animals have _____ an amazing ability called bioluminescence.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: {A: 'developed', B: 'evolved', C: 'grown', D: 'produced'}
    answer: 'B'
    explanation: '"Evolved" means developed through natural selection over millions of years. Animals evolve abilities.'
