    baseWord: 'PERSEVERE'
    answer: 'perseverance'
    acceptableAnswers: ['perseverance']
    explanation: 'PERSEVERE → perseverance (noun). "The key to success is perseverance" = never giving up.'
    explanationZh: 'PERSEVERE → perseverance（名词）。"成功的关键是坚持"=永不放弃。'
    grammarPoint: 'Word formation: -ance suffix'
    relatedQuest: Q12
    difficulty: 4

