category: 'Exam Practice Part 2'
categoryZh: '考试练习（第二套）'
fcepart: 'Use of English Parts 1-4 Mixed'
questions:
  # ============================================================
  # U1501-U1520: Multiple-choice cloze — Exam strategy theme
  # ============================================================

  - id: U1501
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Good exam preparation (1)_____ a combination of knowledge, practice, and strategy.'
    question: 'Choose the best word for gap (1).'
    questionZh: '选择最适合空格(1)的词。'
    options: { A: 'requires', B: 'demands', C: 'insists', D: 'needs' }
    answer: 'A'
    explanation: '"Requires a combination" is the best collocation. "Demands" is too strong. "Insists" needs "on." "Needs" is possible but less formal.'
    explanationZh: '"Requires a combination"是最佳搭配。"Demands"太强烈。"Insists"需要"on"。"Needs"可以但不够正式。'
    grammarPoint: 'Collocation: require'
    relatedQuest: Q12
    difficulty: 4

  - id: U1502
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-3]
    context: exam-strategy
    passage: 'It is essential to _____ your time wisely during the exam.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'manage', B: 'control', C: 'handle', D: 'direct' }
    answer: 'A'
    explanation: '"Manage your time" is the standard collocation. "Control" and "handle" do not collocate naturally with "time" in this context.'
    explanationZh: '"Manage your time"是标准搭配。"Control"和"handle"在此语境中不能自然地与"time"搭配。'
    grammarPoint: 'Collocation: manage time'
    relatedQuest: Q12
    difficulty: 3

  - id: U1503
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-3]
    context: exam-strategy
    passage: 'If you get stuck on a question, it is best to move _____ and come back to it later.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'along', B: 'on', C: 'forward', D: 'away' }
    answer: 'B'
    explanation: '"Move on" = proceed to the next thing. "Move along" and "move forward" are possible but less natural in this context.'
    explanationZh: '"Move on"=继续做下一件事。"Move along"和"move forward"在此语境中可以但不太自然。'
    grammarPoint: 'Phrasal verb: move on'
    relatedQuest: Q12
    difficulty: 3

  - id: U1504
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Students who _____ regularly throughout the year tend to perform better than those who cram at the last minute.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'revise', B: 'repeat', C: 'review', D: 'remind' }
    answer: 'A'
    explanation: '"Revise" is the British English term for studying/reviewing for an exam. "Review" is also acceptable but "revise" is more specifically about exam preparation.'
    explanationZh: '"Revise"是英式英语中为考试学习/复习的术语。"Review"也可以接受，但"revise"更具体地指考试准备。'
    grammarPoint: 'Vocabulary: revise (BrE for exam study)'
    relatedQuest: Q12
    difficulty: 4

  - id: U1505
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Do not leave any questions _____ — an educated guess is better than a blank space.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'empty', B: 'blank', C: 'bare', D: 'void' }
    answer: 'B'
    explanation: '"Leave blank" is the standard expression for not answering a question. "Empty" and "bare" do not collocate with "leave...questions."'
    explanationZh: '"Leave blank"是不回答问题的标准表达。"Empty"和"bare"不能与"leave...questions"搭配。'
    grammarPoint: 'Collocation: leave blank'
    relatedQuest: Q12
    difficulty: 3

  - id: U1506
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-4]
    context: exam-strategy
    passage: 'The ability to _____ between similar-sounding words is a key exam skill.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'differ', B: 'distinguish', C: 'separate', D: 'divide' }
    answer: 'B'
    explanation: '"Distinguish between" is the correct collocation for recognising differences. "Differ" is intransitive. "Separate" and "divide" mean physically splitting.'
    explanationZh: '"Distinguish between"是识别差异的正确搭配。"Differ"是不及物的。"Separate"和"divide"意味着物理分开。'
    grammarPoint: 'Collocation: distinguish between'
    relatedQuest: Q12
    difficulty: 4

  - id: U1507
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Reading the questions before the passage helps you _____ for specific information.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'look', B: 'search', C: 'scan', D: 'watch' }
    answer: 'C'
    explanation: '"Scan for information" = read quickly to find specific details. "Search for" is possible but "scan" is the technical reading term used in exam contexts.'
    explanationZh: '"Scan for information"=快速阅读以找到特定细节。"Search for"可以，但"scan"是考试语境中的专业阅读术语。'
    grammarPoint: 'Reading skill: scan'
    relatedQuest: Q12
    difficulty: 3

  - id: U1508
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-4]
    context: exam-strategy
    passage: 'The correct answer in a reading question is often a _____ of the words used in the passage.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'paraphrase', B: 'summary', C: 'translation', D: 'copy' }
    answer: 'A'
    explanation: '"A paraphrase" = the same meaning expressed in different words. FCE answers often paraphrase the original text rather than copying exact words.'
    explanationZh: '"A paraphrase"=用不同的词表达相同的意思。FCE答案经常改述原文而不是复制确切的词。'
    grammarPoint: 'Exam skill: paraphrase recognition'
    relatedQuest: Q12
    difficulty: 4

  - id: U1509
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-3]
    context: exam-strategy
    passage: 'When you _____ across an unfamiliar word, try to guess its meaning from context.'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'go', B: 'come', C: 'run', D: 'get' }
    answer: 'B'
    explanation: '"Come across" = encounter, find by chance. "Run across" is also possible but less common. "Go across" means physically crossing.'
    explanationZh: '"Come across"=遇到，偶然发现。"Run across"也可以但不常见。"Go across"意思是物理上穿越。'
    grammarPoint: 'Phrasal verb: come across'
    relatedQuest: Q12
    difficulty: 3

  - id: U1510
    type: multiple-choice-cloze
    tags: [cloze-mc, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Confidence plays a _____ role in exam performance — believe in yourself!'
    question: 'Choose the best word for the gap.'
    questionZh: '选择最适合空格的词。'
    options: { A: 'vital', B: 'alive', C: 'living', D: 'lively' }
    answer: 'A'
    explanation: '"Plays a vital role" is a fixed collocation meaning "is extremely important." The other options do not collocate with "role."'
    explanationZh: '"Plays a vital role"是固定搭配，意思是"极其重要"。其他选项不能与"role"搭配。'
    grammarPoint: 'Collocation: play a vital role'
    relatedQuest: Q12
    difficulty: 4

  # ============================================================
  # U1511-U1530: Open cloze (Part 2)
  # ============================================================

  - id: U1511
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'If you _____ not sure about an answer, use the process of elimination.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'are'
    acceptableAnswers: ['are']
    explanation: '"If you are not sure" — the verb "be" is needed. Present simple for conditional.'
    explanationZh: '"If you are not sure"——需要动词"be"。条件句中的一般现在时。'
    grammarPoint: 'First conditional with "be"'
    relatedQuest: Q12
    difficulty: 3

  - id: U1512
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'The more you practise, the _____ confident you will feel.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'more'
    acceptableAnswers: ['more']
    explanation: '"The more...the more" is a comparative structure showing parallel increase.'
    explanationZh: '"The more...the more"是表示平行增长的比较结构。'
    grammarPoint: 'The more...the more'
    relatedQuest: Q12
    difficulty: 3

  - id: U1513
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'She succeeded _____ passing the exam on her very first attempt.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'in'
    acceptableAnswers: ['in']
    explanation: '"Succeed in + gerund" is the correct preposition. NOT "succeed to."'
    explanationZh: '"Succeed in + 动名词"是正确的介词搭配。不是"succeed to"。'
    grammarPoint: 'Preposition: succeed in'
    relatedQuest: Q12
    difficulty: 3

  - id: U1514
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'It is not _____ how much you study but how well you study that matters.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'only'
    acceptableAnswers: ['only', 'just']
    explanation: '"It is not only/just...but (also)..." is a correlative structure.'
    explanationZh: '"It is not only/just...but (also)..."是关联结构。'
    grammarPoint: 'Not only...but (also)'
    relatedQuest: Q12
    difficulty: 3

  - id: U1515
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Had I known about this strategy earlier, I _____ have used it from the beginning.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'would'
    acceptableAnswers: ['would']
    explanation: 'Inverted third conditional: "Had I known...I would have used." "Had" replaces "If" at the start.'
    explanationZh: '倒装第三条件句："Had I known...I would have used." "Had"在句首替代"If"。'
    grammarPoint: 'Inverted conditional'
    relatedQuest: Q12
    difficulty: 4

  - id: U1516
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Despite _____ tired, she managed to finish all the questions.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'being'
    acceptableAnswers: ['being', 'feeling']
    explanation: '"Despite + gerund" — "despite being tired." "Despite" is a preposition, so it takes a gerund, not a clause.'
    explanationZh: '"Despite + 动名词"——"despite being tired." "Despite"是介词，所以接动名词，不接从句。'
    grammarPoint: 'Despite + gerund'
    relatedQuest: Q12
    difficulty: 3

  - id: U1517
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'There is no point _____ worrying about the exam now — you have done your best.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'in'
    acceptableAnswers: ['in']
    explanation: '"There is no point in + gerund" = it is useless to do something. The preposition "in" is often omitted in informal English but required in formal/exam contexts.'
    explanationZh: '"There is no point in + 动名词"=做某事没有意义。介词"in"在非正式英语中常被省略，但在正式/考试语境中需要。'
    grammarPoint: 'There is no point in + gerund'
    relatedQuest: Q12
    difficulty: 3

  - id: U1518
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'The exam, _____ takes about four hours in total, consists of four papers.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'which'
    acceptableAnswers: ['which']
    explanation: 'Non-defining relative clause: commas + "which." "Which" refers to "the exam." "That" cannot be used in non-defining clauses.'
    explanationZh: '非限定性定语从句：逗号+"which"。"Which"指代"the exam"。"That"不能在非限定性从句中使用。'
    grammarPoint: 'Non-defining relative clause with which'
    relatedQuest: Q12
    difficulty: 3

  - id: U1519
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-3]
    context: exam-strategy
    passage: 'She was so nervous that she could _____ concentrate on the questions.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'hardly'
    acceptableAnswers: ['hardly', 'barely', 'scarcely']
    explanation: '"Could hardly concentrate" = almost could not concentrate. "Hardly" is a negative adverb meaning "almost not."'
    explanationZh: '"Could hardly concentrate"=几乎无法集中注意力。"Hardly"是否定副词，意思是"几乎不"。'
    grammarPoint: 'Hardly = almost not'
    relatedQuest: Q12
    difficulty: 3

  - id: U1520
    type: open-cloze
    tags: [open-cloze, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Not _____ did she pass the exam, but she also achieved the highest score.'
    question: 'Write the missing word.'
    questionZh: '写出缺失的词。'
    answer: 'only'
    acceptableAnswers: ['only']
    explanation: '"Not only...but also" with inversion. When "not only" starts a sentence, the subject and auxiliary are inverted: "Not only did she pass..."'
    explanationZh: '"Not only...but also"与倒装。当"not only"开头时，主语和助动词倒装："Not only did she pass..."'
    grammarPoint: 'Not only...but also (inverted)'
    relatedQuest: Q12
    difficulty: 4

