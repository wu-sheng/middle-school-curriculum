  - id: U1531
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Regular practice leads to a _____ improvement in exam scores.'
    question: 'Use the word SIGNIFY to form a word that fits the gap.'
    questionZh: '使用单词SIGNIFY构成适合空格的词。'
    baseWord: 'SIGNIFY'
    answer: 'significant'
    acceptableAnswers: ['significant']
    explanation: 'SIGNIFY → significant (adjective). "A significant improvement" = a noticeable, important improvement.'
    explanationZh: 'SIGNIFY → significant（形容词）。"A significant improvement"=显著的、重要的进步。'
    grammarPoint: 'Word formation: -ant suffix'
    relatedQuest: Q12
    difficulty: 3

  - id: U1532
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Her _____ of English grammar was truly impressive for her age.'
    question: 'Use the word KNOW to form a word that fits the gap.'
    questionZh: '使用单词KNOW构成适合空格的词。'
    baseWord: 'KNOW'
    answer: 'knowledge'
    acceptableAnswers: ['knowledge']
    explanation: 'KNOW → knowledge (noun). "Her knowledge" = what she knows.'
    explanationZh: 'KNOW → knowledge（名词）。"Her knowledge"=她所知道的。'
    grammarPoint: 'Word formation: know → knowledge'
    relatedQuest: Q12
    difficulty: 3

  - id: U1533
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'It is _____ to arrive at the exam centre at least 15 minutes early.'
    question: 'Use the word ADVISE to form a word that fits the gap.'
    questionZh: '使用单词ADVISE构成适合空格的词。'
    baseWord: 'ADVISE'
    answer: 'advisable'
    acceptableAnswers: ['advisable']
    explanation: 'ADVISE → advisable (adjective). "It is advisable to" = it is recommended to.'
    explanationZh: 'ADVISE → advisable（形容词）。"It is advisable to"=建议做。'
    grammarPoint: 'Word formation: -able suffix'
    relatedQuest: Q12
    difficulty: 3

  - id: U1534
    type: word-formation
    tags: [word-formation, Q12, difficulty-4]
    context: exam-strategy
    passage: 'His _____ to give up, even when things were difficult, was truly admirable.'
    question: 'Use the word REFUSE to form a word that fits the gap.'
    questionZh: '使用单词REFUSE构成适合空格的词。'
    baseWord: 'REFUSE'
    answer: 'refusal'
    acceptableAnswers: ['refusal']
    explanation: 'REFUSE → refusal (noun). "His refusal to give up" = his determination not to quit.'
    explanationZh: 'REFUSE → refusal（名词）。"His refusal to give up"=他不放弃的决心。'
    grammarPoint: 'Word formation: -al suffix (noun)'
    relatedQuest: Q12
    difficulty: 4

  - id: U1535
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'The exam requires students to _____ demonstrate a range of vocabulary.'
    question: 'Use the word EFFECT to form a word that fits the gap.'
    questionZh: '使用单词EFFECT构成适合空格的词。'
    baseWord: 'EFFECT'
    answer: 'effectively'
    acceptableAnswers: ['effectively']
    explanation: 'EFFECT → effectively (adverb). Adverbs modify verbs: "effectively demonstrate."'
    explanationZh: 'EFFECT → effectively（副词）。副词修饰动词："effectively demonstrate."'
    grammarPoint: 'Word formation: -ively suffix'
    relatedQuest: Q12
    difficulty: 3

  - id: U1536
    type: word-formation
    tags: [word-formation, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Her _____ approach to studying ensured she covered every topic thoroughly.'
    question: 'Use the word SYSTEM to form a word that fits the gap.'
    questionZh: '使用单词SYSTEM构成适合空格的词。'
    baseWord: 'SYSTEM'
    answer: 'systematic'
    acceptableAnswers: ['systematic']
    explanation: 'SYSTEM → systematic (adjective). "A systematic approach" = an organised, methodical approach.'
    explanationZh: 'SYSTEM → systematic（形容词）。"A systematic approach"=有组织的、系统的方法。'
    grammarPoint: 'Word formation: -atic suffix'
    relatedQuest: Q12
    difficulty: 4

  - id: U1537
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'The most _____ students are those who learn from their mistakes.'
    question: 'Use the word SUCCESS to form a word that fits the gap.'
    questionZh: '使用单词SUCCESS构成适合空格的词。'
    baseWord: 'SUCCESS'
    answer: 'successful'
    acceptableAnswers: ['successful']
    explanation: 'SUCCESS → successful (adjective). "The most successful students" = those who achieve the best results.'
    explanationZh: 'SUCCESS → successful（形容词）。"The most successful students"=取得最好成绩的学生。'
    grammarPoint: 'Word formation: -ful suffix'
    relatedQuest: Q12
    difficulty: 3

  - id: U1538
    type: word-formation
    tags: [word-formation, Q12, difficulty-4]
    context: exam-strategy
    passage: 'Do not be _____ if the first practice test does not go well.'
    question: 'Use the word COURAGE to form a word that fits the gap.'
    questionZh: '使用单词COURAGE构成适合空格的词。'
    baseWord: 'COURAGE'
    answer: 'discouraged'
    acceptableAnswers: ['discouraged']
    explanation: 'COURAGE → discouraged (adjective). Negative prefix dis- + root + -ed. "Do not be discouraged" = do not lose hope.'
    explanationZh: 'COURAGE → discouraged（形容词）。否定前缀dis- + 词根 + -ed。"Do not be discouraged"=不要失去希望。'
    grammarPoint: 'Word formation: dis- prefix + -ed'
    relatedQuest: Q12
    difficulty: 4

  - id: U1539
    type: word-formation
    tags: [word-formation, Q12, difficulty-3]
    context: exam-strategy
    passage: 'Making _____ errors in spelling can cost you marks in the writing paper.'
    question: 'Use the word CARE to form a word that fits the gap.'
    questionZh: '使用单词CARE构成适合空格的词。'
    baseWord: 'CARE'
    answer: 'careless'
    acceptableAnswers: ['careless']
    explanation: 'CARE → careless (adjective). "Careless errors" = mistakes caused by not paying attention. -less suffix = without.'
    explanationZh: 'CARE → careless（形容词）。"Careless errors"=不注意引起的错误。-less后缀=没有。'
    grammarPoint: 'Word formation: -less suffix'
    relatedQuest: Q12
    difficulty: 3

