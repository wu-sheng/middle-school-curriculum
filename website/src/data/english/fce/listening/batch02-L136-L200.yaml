  - id: L176
    type: sentence-completion
    title: 'The Maze Builder'
    titleZh: '迷宫建造师'
    scene: 'You will hear a farmer talking about the corn maze he builds every year.'
    sceneZh: '你将听到一位农民讲述他每年建造的玉米迷宫。'
    difficulty: 2
    audioFile: 'L176.mp3'
    script:
      - speaker: farmer
        voice: echo
        text: 'Every August, I turn one of my cornfields into a giant maze. I have been doing it for nine years now, and it has become the most popular attraction in our area. Last year, over twelve thousand people came to try it.'
      - speaker: farmer
        voice: echo
        text: 'I design the maze on my computer first, using special software that turns a picture into a maze pattern. This year, the design is a giant magnifying glass, because the theme is "detective adventure." The maze covers about three hectares — that is roughly the same as five football pitches.'
      - speaker: farmer
        voice: echo
        text: 'We plant the corn in May and it takes about ten weeks to grow tall enough. By late July, the plants are over two metres high, which means even adults cannot see over the top. That is what makes it so tricky — you cannot see where you are going.'
      - speaker: farmer
        voice: echo
        text: 'I hide fifteen numbered checkpoints inside the maze. Visitors carry a card and stamp it at each checkpoint. If you find all fifteen, you get a free ice cream at the end. Most people find about ten or eleven.'
      - speaker: farmer
        voice: echo
        text: 'The average time to complete the maze is about fifty minutes, but we once had a family who took three hours because they kept going in circles. We have a viewing tower near the entrance where staff can guide lost visitors by megaphone if they shout for help.'
      - speaker: farmer
        voice: echo
        text: 'After Halloween, we harvest the corn and turn it into animal feed. Nothing is wasted. Then in January, I start designing next year''s maze. I am already thinking about a space rocket for next summer.'
    sentences:
      - id: L176-S1
        text: 'Last year, over _____ people visited the corn maze.'
        textZh: '去年，超过 _____ 人参观了玉米迷宫。'
        answer: 'twelve thousand'
      - id: L176-S2
        text: 'This year''s maze design is a giant _____.'
        textZh: '今年的迷宫设计是一个巨大的 _____。'
        answer: 'magnifying glass'
      - id: L176-S3
        text: 'The corn plants grow over _____ metres high by late July.'
        textZh: '到七月底，玉米长到了超过 _____ 米高。'
        answer: 'two'
      - id: L176-S4
        text: 'Visitors who find all fifteen checkpoints get a free _____.'
        textZh: '找到全部十五个检查点的游客可以免费获得一份 _____。'
        answer: 'ice cream'
      - id: L176-S5
        text: 'The average time to complete the maze is about _____ minutes.'
        textZh: '完成迷宫的平均时间大约是 _____ 分钟。'
        answer: 'fifty'
      - id: L176-S6
        text: 'After Halloween, the corn is harvested and turned into _____.'
        textZh: '万圣节后，玉米被收割并制成 _____。'
        answer: 'animal feed'

  # ============================================================
  # L177: The Stolen Crown Jewels
  # ============================================================

  - id: L177
    type: sentence-completion
    title: 'The Stolen Crown Jewels'
    titleZh: '被盗的王冠珠宝'
    scene: 'You will hear a guide at the Tower of London telling the story of a famous theft attempt.'
    sceneZh: '你将听到伦敦塔的导游讲述一次著名的盗窃未遂事件。'
    difficulty: 2
    audioFile: 'L177.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Welcome to the Tower of London. I want to tell you about the most daring attempt to steal the Crown Jewels, which took place right here in sixteen seventy-one.'
      - speaker: guide
        voice: nova
        text: 'The thief was an Irish adventurer called Colonel Thomas Blood. He spent weeks befriending the elderly Keeper of the Jewels, a man named Talbot Edwards. Blood visited Edwards many times, bringing gifts and pretending to be a wealthy clergyman.'
      - speaker: guide
        voice: nova
        text: 'On the day of the theft, Blood arrived with three accomplices and asked Edwards to show them the jewels in the basement. As soon as they were inside, Blood hit Edwards over the head with a wooden mallet and stuffed the crown under his cloak. One accomplice hid the golden orb down his trousers, and another began filing the sceptre in half so it would fit in a bag.'
      - speaker: guide
        voice: nova
        text: 'But they were interrupted! Edwards'' son returned unexpectedly from the army. He raised the alarm and guards chased Blood through the gates. Blood was caught near the outer wall, still clutching the crown.'
      - speaker: guide
        voice: nova
        text: 'Here is the truly surprising ending — King Charles the Second was so impressed by Blood''s courage that instead of punishing him, the King pardoned him and gave him land in Ireland. Nobody knows exactly why the King was so generous. Some historians believe Blood had been secretly working for the King all along.'
    sentences:
      - id: L177-S1
        text: 'The theft attempt took place in the year _____.'
        textZh: '盗窃未遂发生在 _____ 年。'
        answer: 'sixteen seventy-one'
      - id: L177-S2
        text: 'Colonel Blood pretended to be a wealthy _____.'
        textZh: 'Blood上校假扮成一位富有的 _____。'
        answer: 'clergyman'
      - id: L177-S3
        text: 'Blood hit the Keeper over the head with a wooden _____.'
        textZh: 'Blood用一个木 _____ 打了珠宝保管人的头。'
        answer: 'mallet'
      - id: L177-S4
        text: 'The alarm was raised by Edwards'' _____ who returned from the army.'
        textZh: '警报是由Edwards的 _____ 拉响的，他从军队回来了。'
        answer: 'son'
      - id: L177-S5
        text: 'Instead of punishment, the King _____ Blood and gave him land.'
        textZh: '国王没有惩罚Blood，而是 _____ 了他并给了他土地。'
        answer: 'pardoned'

  # ============================================================
  # L178: The Weather Detective
  # ============================================================

  - id: L178
    type: sentence-completion
    title: 'The Weather Detective'
    titleZh: '天气侦探'
    scene: 'You will hear a meteorologist explaining how weather clues helped solve a crime.'
    sceneZh: '你将听到一位气象学家解释天气线索如何帮助破案。'
    difficulty: 2
    audioFile: 'L178.mp3'
    script:
      - speaker: meteorologist
        voice: nova
        text: 'My name is Dr James Perry and I am a forensic meteorologist. That means I use weather data to help solve crimes and settle legal cases. It is a rather unusual job, but a fascinating one.'
      - speaker: meteorologist
        voice: nova
        text: 'Let me give you an example. A few years ago, a shop owner claimed that a storm had damaged his roof on a Tuesday night and he wanted his insurance company to pay for repairs. The insurance company asked me to investigate.'
      - speaker: meteorologist
        voice: nova
        text: 'I checked the weather records for that exact location on that date. The data showed that it had been a calm, dry evening with wind speeds of only eight kilometres per hour — certainly not strong enough to damage a roof. Storm-force winds start at around ninety kilometres per hour.'
      - speaker: meteorologist
        voice: nova
        text: 'I also looked at satellite photographs taken that week. The images clearly showed that the roof was already damaged on the Monday — one day before the supposed storm. So the damage must have happened earlier, and the shop owner was not telling the truth about the cause.'
      - speaker: meteorologist
        voice: nova
        text: 'Weather records are incredibly detailed these days. Weather stations record temperature, wind speed, rainfall, and air pressure every fifteen minutes. This data is stored for years and can be a powerful tool in investigations. In fact, I have worked on over two hundred cases using weather evidence.'
    sentences:
      - id: L178-S1
        text: 'Dr Perry works as a forensic _____.'
        textZh: 'Perry博士的职业是法医 _____。'
        answer: 'meteorologist'
      - id: L178-S2
        text: 'On the night in question, wind speeds were only _____ kilometres per hour.'
        textZh: '事发当晚，风速只有每小时 _____ 公里。'
        answer: 'eight'
      - id: L178-S3
        text: 'Storm-force winds start at around _____ kilometres per hour.'
        textZh: '暴风级别的风速约为每小时 _____ 公里。'
        answer: 'ninety'
      - id: L178-S4
        text: 'Satellite photographs showed the roof was damaged on the _____.'
        textZh: '卫星照片显示屋顶在 _____ 就已经损坏了。'
        answer: 'Monday'
      - id: L178-S5
        text: 'Weather stations record data every _____ minutes.'
        textZh: '气象站每 _____ 分钟记录一次数据。'
        answer: 'fifteen'
      - id: L178-S6
        text: 'Dr Perry has worked on over _____ cases using weather evidence.'
        textZh: 'Perry博士已经利用天气证据处理了超过 _____ 个案件。'
        answer: 'two hundred'

  # ============================================================
  # L179: The Ancient Map Mystery
  # ============================================================

  - id: L179
    type: sentence-completion
    title: 'The Ancient Map Mystery'
    titleZh: '古地图之谜'
    scene: 'You will hear a historian talking about a mysterious ancient map.'
    sceneZh: '你将听到一位历史学家讲述一幅神秘的古地图。'
    difficulty: 2
    audioFile: 'L179.mp3'
    script:
      - speaker: historian
        voice: nova
        text: 'One of the greatest mysteries in the history of maps is the Piri Reis map, drawn by a Turkish admiral in fifteen thirteen. What makes this map so extraordinary is that it appears to show the coastline of South America and even parts of Antarctica — but Antarctica was not officially discovered until eighteen twenty.'
      - speaker: historian
        voice: nova
        text: 'The map was found in nineteen twenty-nine by a group of scholars working in the old imperial palace in Istanbul. It was painted on gazelle skin and was only a fragment — about one third of the original map had survived.'
      - speaker: historian
        voice: nova
        text: 'Piri Reis himself wrote notes on the map explaining that he based it on about twenty older maps, including some used by Christopher Columbus. He also mentioned maps from the time of Alexander the Great, which would have been over a thousand years old even then.'
      - speaker: historian
        voice: nova
        text: 'Some people claim the map proves that ancient civilisations had advanced knowledge of geography. Others say the bottom part of the map simply shows the coast of South America drawn at an unusual angle, and is not Antarctica at all.'
      - speaker: historian
        voice: nova
        text: 'Whatever the truth, the Piri Reis map reminds us that our ancestors were far more skilled at exploring and mapping the world than we sometimes give them credit for. The original map is now kept in a climate-controlled room at the Topkapi Palace Museum in Istanbul.'
    sentences:
      - id: L179-S1
        text: 'The Piri Reis map was drawn in the year _____.'
        textZh: 'Piri Reis地图绘制于 _____ 年。'
        answer: 'fifteen thirteen'
      - id: L179-S2
        text: 'Antarctica was not officially discovered until _____.'
        textZh: '南极洲直到 _____ 年才被正式发现。'
        answer: 'eighteen twenty'
      - id: L179-S3
        text: 'The map was painted on _____ skin.'
        textZh: '地图画在 _____ 皮上。'
        answer: 'gazelle'
      - id: L179-S4
        text: 'Piri Reis said he used about _____ older maps as sources.'
        textZh: 'Piri Reis说他参考了大约 _____ 幅更古老的地图。'
        answer: 'twenty'
      - id: L179-S5
        text: 'The original map is now kept at the _____ Palace Museum.'
        textZh: '原始地图现在保存在 _____ 宫殿博物馆。'
        answer: 'Topkapi'

  # ============================================================
  # L180: The Detective Dog Training Centre
  # ============================================================

  - id: L180
    type: sentence-completion
    title: 'The Detective Dog Training Centre'
    titleZh: '侦探犬训练中心'
    scene: 'You will hear a dog trainer explaining how detective dogs are trained.'
    sceneZh: '你将听到一位训犬师解释侦探犬是如何训练的。'
    difficulty: 2
    audioFile: 'L180.mp3'
    script:
      - speaker: trainer
        voice: echo
        text: 'Welcome to the National Detection Dog Training Centre. My name is Mike and I have been training sniffer dogs for eighteen years. Today I am going to explain how we turn an ordinary puppy into a world-class detection dog.'
      - speaker: trainer
        voice: echo
        text: 'We start selecting puppies at around eight weeks old. The breed we use most is the Springer Spaniel because they have an excellent sense of smell and they love to play — which is actually the most important quality. You see, for a detection dog, finding the target scent is a game, and the reward is always a toy, never food.'
      - speaker: trainer
        voice: echo
        text: 'Training takes approximately fourteen months. In the first phase, we teach the dog to associate a specific smell with its favourite toy. We might hide the toy inside a box that also contains, say, a particular type of plant. The dog learns that finding that plant smell means finding the toy.'
      - speaker: trainer
        voice: echo
        text: 'In the second phase, we gradually increase the difficulty. The dog must search larger areas, ignore distracting smells like food or other animals, and work in noisy environments like airports. A fully trained dog can detect a target scent even when it is sealed inside three layers of plastic.'
      - speaker: trainer
        voice: echo
        text: 'Each dog works for about eight years before retiring. After retirement, the handler usually adopts the dog as a family pet. Our oldest retired dog, a spaniel called Pepper, is now thirteen and spends her days sleeping on the sofa — a well-earned rest after a brilliant career!'
    sentences:
      - id: L180-S1
        text: 'Mike has been training sniffer dogs for _____ years.'
        textZh: 'Mike已经训练嗅探犬 _____ 年了。'
        answer: 'eighteen'
      - id: L180-S2
        text: 'The breed used most often is the _____ Spaniel.'
        textZh: '最常使用的品种是 _____ 猎犬。'
        answer: 'Springer'
      - id: L180-S3
        text: 'The reward for a detection dog is always a _____, never food.'
        textZh: '侦探犬的奖励永远是 _____，而不是食物。'
        answer: 'toy'
      - id: L180-S4
        text: 'Full training takes approximately _____ months.'
        textZh: '完整训练大约需要 _____ 个月。'
        answer: 'fourteen'
      - id: L180-S5
        text: 'A trained dog can detect scent sealed inside _____ layers of plastic.'
        textZh: '训练有素的狗能侦测到密封在 _____ 层塑料里的气味。'
        answer: 'three'
      - id: L180-S6
        text: 'Each dog works for about _____ years before retiring.'
        textZh: '每只狗工作大约 _____ 年后退役。'
        answer: 'eight'

  # ============================================================
  # L181–L200: Part 3 — Multiple Matching (Detective/Mystery Theme)
