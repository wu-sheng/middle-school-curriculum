        answer: 'sixty'
      - id: L168-S3
        text: 'Rachel aims for about _____ percent of teams to escape in time.'
        textZh: 'Rachel的目标是大约 _____ 的团队能在时间内逃脱。'
        answer: 'seventy'
      - id: L168-S4
        text: 'New rooms are tested with children aged _____ to twelve.'
