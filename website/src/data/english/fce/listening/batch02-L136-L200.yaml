        text: 'The Spartans wrote messages on leather wrapped around a stick called a _____.'
        textZh: '斯巴达人在缠绕在一根叫 _____ 的木棒上的皮条上写消息。'
        answer: 'scytale'
      - id: L167-S2
        text: 'The pigpen cipher was used by a group called the _____ in the 1700s.'
        textZh: '猪圈密码在18世纪被一个叫 _____ 的团体使用。'
        answer: 'Freemasons'
      - id: L167-S3
        text: 'The problem with codebooks was that if the enemy _____ one, all messages were exposed.'
        textZh: '密码本的问题是如果敌人 _____ 了一本，所有消息就暴露了。'
        answer: 'captured'
      - id: L167-S4
        text: 'The Enigma machine settings were changed every single _____.'
        textZh: 'Enigma密码机的设置每 _____ 都会更换。'
        answer: 'day'
      - id: L167-S5
        text: 'A padlock icon in your browser means information is protected by _____.'
        textZh: '浏览器中的锁图标表示信息受到 _____ 保护。'
        answer: 'digital encryption'
      - id: L167-S6
        text: 'Students need to bring a ruler and _____ for next week''s activity.'
        textZh: '学生们下周的活动需要带尺子和 _____。'
        answer: 'graph paper'

  # ============================================================
  # L168: The Escape Room Designer
  # ============================================================

  - id: L168
    type: sentence-completion
    title: 'The Escape Room Designer'
    titleZh: '密室逃脱设计师'
    scene: 'You will hear a woman talking about her job designing escape rooms.'
    sceneZh: '你将听到一位女士谈论她设计密室逃脱的工作。'
    difficulty: 2
    audioFile: 'L168.mp3'
    script:
      - speaker: designer
        voice: nova
        text: 'Hi, my name is Rachel and I design escape rooms for a living. I have been doing this job for six years now, and I have created over twenty different rooms.'
      - speaker: designer
        voice: nova
        text: 'The first thing I do when designing a new room is choose a theme. The most popular themes are haunted houses and detective mysteries, but my personal favourite is the space station theme because I love science fiction.'
      - speaker: designer
        voice: nova
        text: 'A good escape room should take a team of four people about sixty minutes to complete. I always include between eight and twelve puzzles. Some are physical — like finding a hidden key — and others are mental — like solving a maths problem or cracking a code.'
      - speaker: designer
        voice: nova
        text: 'The trickiest part of my job is getting the difficulty right. If the room is too easy, people feel disappointed. If it is too hard, they get frustrated and stop having fun. I aim for about seventy percent of teams to escape within the time limit.'
      - speaker: designer
        voice: nova
        text: 'Before we open a new room to the public, I always test it with a group of children aged eight to twelve. Children are actually better at escape rooms than adults because they look at things from unusual angles. Adults often overthink the puzzles.'
      - speaker: designer
        voice: nova
        text: 'My proudest creation is a pirate-themed room where the final puzzle involves using a real compass to find the direction of a hidden treasure chest. When teams open the chest, they find chocolate gold coins inside. Everyone loves that ending.'
      - speaker: designer
        voice: nova
        text: 'If you are interested in puzzle design, my advice is to start by making treasure hunts for your friends and family. Write clues, hide objects, and watch how people try to solve them. That is exactly how I got started.'
    sentences:
      - id: L168-S1
        text: 'Rachel''s favourite escape room theme is the _____ theme.'
        textZh: 'Rachel最喜欢的密室主题是 _____ 主题。'
