        answer: 'compass'
      - id: L168-S6
        text: 'Rachel advises beginners to start by making _____ for friends and family.'
        textZh: 'Rachel建议初学者从为朋友和家人制作 _____ 开始。'
        answer: 'treasure hunts'

  # ============================================================
  # L169: The Bird Watcher's Discovery
  # ============================================================

  - id: L169
    type: sentence-completion
    title: 'The Bird Watcher''s Discovery'
    titleZh: '观鸟者的发现'
    scene: 'You will hear a man describing how he solved a local wildlife mystery.'
