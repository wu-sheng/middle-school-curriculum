  # ============================================================
  # L181: Young Detectives Share Their Stories
  # ============================================================

  - id: L181
    type: multiple-matching
    title: 'Young Detectives Share Their Stories'
    titleZh: '小侦探们分享他们的故事'
    scene: 'You will hear five young people talking about solving a mystery.'
    sceneZh: '你将听到五位年轻人谈论他们解决谜题的经历。'
    difficulty: 2
    audioFile: 'L181.mp3'
    speakers:
      - name: Speaker 1
        text: 'I found the answer by looking at old photographs in my grandmother''s album. There was a picture from nineteen sixty-five showing our street before the houses were built. In the background, you could clearly see a well that nobody knew about. That was exactly where the water was coming from — an underground well that the builders had covered over. Without those old photos, we would never have known.'
      - name: Speaker 2
        text: 'For me, it was all about talking to the right people. I was trying to find out who had planted flowers in the school garden overnight. I asked everyone in my class, but nobody knew. Then the school caretaker — who I had never spoken to before — told me he had seen a group of parents working there at six in the morning. I never expected him to be the one with the answer.'
      - name: Speaker 3
        text: 'I solved our mystery by watching people very carefully. Things kept disappearing from the staff room fridge — yoghurts, sandwiches, fruit. I sat in the corridor at lunchtime and observed who went in and came out. After three days, I noticed that one person always stayed inside much longer than everyone else. That was the clue that led us to the answer.'
      - name: Speaker 4
        text: 'Technology saved the day for me. We could not work out why our garden pond kept losing water overnight. My dad lent me his wildlife camera — the kind that records when it detects movement. When we checked the footage the next morning, we saw a family of foxes drinking from the pond every night between two and four in the morning!'
      - name: Speaker 5
        text: 'I must have tried at least six different explanations before I finally got the right one. First, I thought the noise was coming from the pipes. Then I thought it was the wind. Then a bird, then a loose tile, then an electrical problem. In the end, it turned out to be a branch rubbing against the chimney — my seventh guess! Sometimes solving a mystery means being wrong many times first.'
    statements:
      A: 'This person solved the mystery by examining physical evidence.'
      B: 'This person got help from someone they did not expect.'
      C: 'This person used technology to find the answer.'
      D: 'This person found important information in old documents or records.'
      E: 'This person solved it by observing people carefully.'
      F: 'This person tried several wrong ideas before finding the right one.'
      G: 'This person discovered the truth by accident.'
      H: 'This person worked as part of a team.'
    answers:
      Speaker 1: 'D'
      Speaker 2: 'B'
      Speaker 3: 'E'
      Speaker 4: 'C'
      Speaker 5: 'F'
    explanations:
      Speaker 1: 'Speaker 1 mentions "old photographs in my grandmother''s album" — these are old records/documents that provided the key information.'
      Speaker 1Zh: '说话者1提到"祖母相册里的旧照片"——这些是提供关键信息的旧记录/文件。'
      Speaker 2: 'Speaker 2 says the school caretaker gave the answer and adds "I never expected him to be the one with the answer."'
      Speaker 2Zh: '说话者2说学校管理员给出了答案，并补充"我从没想到他会是知道答案的人"。'
      Speaker 3: 'Speaker 3 explicitly says "I solved our mystery by watching people very carefully" — this is careful observation.'
      Speaker 3Zh: '说话者3明确说"我通过仔细观察人们解决了谜题"——这是仔细的观察。'
      Speaker 4: 'Speaker 4 says "Technology saved the day" and describes using a wildlife camera to record footage.'
      Speaker 4Zh: '说话者4说"科技拯救了一切"，并描述了使用野生动物摄像机录像。'
      Speaker 5: 'Speaker 5 says "I must have tried at least six different explanations before I finally got the right one."'
      Speaker 5Zh: '说话者5说"我至少尝试了六种不同的解释才最终找到正确答案"。'

  # ============================================================
  # L182: How We Got Into Detective Stories
  # ============================================================

  - id: L182
    type: multiple-matching
    title: 'How We Got Into Detective Stories'
    titleZh: '我们是怎么迷上侦探故事的'
    scene: 'You will hear five young people talking about what made them love detective stories.'
    sceneZh: '你将听到五位年轻人谈论是什么让他们爱上了侦探故事。'
    difficulty: 2
    audioFile: 'L182.mp3'
    speakers:
      - name: Speaker 1
        text: 'It all started when my dad gave me a puzzle book for my seventh birthday. It had logic problems, word searches with hidden messages, and picture puzzles where you had to spot differences. I became completely addicted. I would spend hours working through the pages. After that, I moved on to proper detective novels because I wanted more complicated puzzles to solve.'
      - name: Speaker 2
        text: 'For me, it was a TV show. My mum watches this programme about a detective who solves cold cases — crimes from years ago that nobody could solve at the time. I sat down to watch one episode with her and I was hooked. The way the detective pieced together tiny scraps of evidence was so clever. I have watched every single episode now — all nine series.'
      - name: Speaker 3
        text: 'My teacher read us a Sherlock Holmes story in class when I was eight. I remember sitting there with my mouth open. Holmes noticed things that nobody else saw — the mud on someone''s shoes, the way a letter was folded. I went straight to the library after school and borrowed every Holmes book they had. I read all four novels in two weeks.'
      - name: Speaker 4
        text: 'I got into detective stories through board games, actually. My cousins brought a murder mystery board game to a family dinner. We spent the whole evening trying to work out who committed the crime using clues and evidence cards. I loved the feeling of putting the pieces together. After that, I wanted to read books that gave me the same feeling.'
      - name: Speaker 5
        text: 'It was a real-life experience for me. When I was nine, our cat went missing for three days. I made posters, asked neighbours, and searched every garden on our street. I found Whiskers locked in a neighbour''s empty shed — the wind had blown the door shut behind him. The thrill of finding him through my own investigation was amazing. That is when I realised I loved solving mysteries.'
    statements:
      A: 'This person was inspired by a real event in their own life.'
      B: 'This person became interested through playing a game.'
      C: 'This person was influenced by a family member''s viewing habits.'
      D: 'This person was introduced to detective stories by a teacher.'
      E: 'This person started with a puzzle book before moving to novels.'
      F: 'This person was inspired by a famous real detective.'
      G: 'This person discovered detective stories through a film at the cinema.'
      H: 'This person joined a detective club that sparked their interest.'
    answers:
      Speaker 1: 'E'
      Speaker 2: 'C'
      Speaker 3: 'D'
      Speaker 4: 'B'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 describes getting a puzzle book for their birthday and then moving on to detective novels — matching statement E.'
      Speaker 1Zh: '说话者1描述了生日收到一本谜题书，然后转向侦探小说——对应选项E。'
      Speaker 2: 'Speaker 2 started watching a detective show with their mum — influenced by a family member''s viewing habits (C).'
      Speaker 2Zh: '说话者2开始和妈妈一起看侦探节目——受到家人观看习惯的影响（C）。'
      Speaker 3: 'Speaker 3 says "My teacher read us a Sherlock Holmes story in class" — introduced by a teacher (D).'
      Speaker 3Zh: '说话者3说"老师在课堂上给我们读了一个福尔摩斯故事"——由老师引入（D）。'
      Speaker 4: 'Speaker 4 says they got into detective stories "through board games" — playing a game (B).'
      Speaker 4Zh: '说话者4说他们通过"桌游"喜欢上了侦探故事——通过游戏（B）。'
      Speaker 5: 'Speaker 5 describes a real experience of finding their missing cat — a real event in their own life (A).'
      Speaker 5Zh: '说话者5描述了寻找走失的猫的真实经历——自己生活中的真实事件（A）。'

  # ============================================================
  # L183: Our Best Escape Room Experiences
  # ============================================================

  - id: L183
    type: multiple-matching
    title: 'Our Best Escape Room Experiences'
    titleZh: '我们最棒的密室逃脱经历'
    scene: 'You will hear five young people talking about their favourite escape room experience.'
    sceneZh: '你将听到五位年轻人谈论他们最喜欢的密室逃脱经历。'
    difficulty: 2
    audioFile: 'L183.mp3'
    speakers:
      - name: Speaker 1
        text: 'The best room I ever did had a puzzle where you had to mix coloured liquids in test tubes to create a specific shade of purple. When you poured the purple liquid into a special container, it triggered an electronic lock and a secret drawer opened. I love it when escape rooms use science experiments as puzzles — it makes you feel like a real scientist.'
      - name: Speaker 2
        text: 'My favourite was a room where the entire story was told through audio recordings that played when you pressed buttons on the wall. You heard characters arguing, confessing, and giving directions. You had to listen really carefully to catch the important details. The last recording revealed the code by reading out numbers hidden in a conversation.'
      - name: Speaker 3
        text: 'I went to an escape room where you had to solve maths problems at every stage. The final puzzle was brilliant — you had to calculate the area of a triangle drawn on the floor using measurements you had collected throughout the room. The answer gave you the numbers to open the final safe. It was perfect for someone like me who loves numbers.'
      - name: Speaker 4
        text: 'The room that amazed me most was one designed for complete darkness. They gave us torches with very weak batteries, so we could only see a tiny bit at a time. We had to feel objects with our hands to identify shapes and textures. There was a box with different fabrics inside, and we had to arrange them in the right order by touch alone. It was the most exciting thing I have ever done.'
      - name: Speaker 5
        text: 'My top escape room experience was one where we had to work with another team in a different room. We could communicate through a small window but could not see each other''s puzzles. Our clues only made sense when combined with their clues. We had to describe things very precisely and trust that the other team was doing the same. Communication was the real skill being tested.'
    statements:
      A: 'This person enjoyed a room that tested their ability to work with strangers.'
      B: 'This person liked a room that used scientific experiments as puzzles.'
      C: 'This person enjoyed a room where listening skills were essential.'
      D: 'This person found a room that challenged their sense of touch.'
      E: 'This person preferred a room based on mathematical calculations.'
      F: 'This person liked a room with a historical setting.'
      G: 'This person enjoyed a room that used physical sports challenges.'
      H: 'This person liked a room where they had to draw or paint something.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'C'
      Speaker 3: 'E'
      Speaker 4: 'D'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 says "I love it when escape rooms use science experiments as puzzles" — matching statement B.'
      Speaker 1Zh: '说话者1说"我喜欢密室逃脱用科学实验作为谜题"——对应选项B。'
      Speaker 2: 'Speaker 2 describes audio recordings and says "You had to listen really carefully" — listening skills (C).'
      Speaker 2Zh: '说话者2描述了音频录音并说"你必须非常仔细地听"——听力技能（C）。'
      Speaker 3: 'Speaker 3 describes solving maths problems and calculating the area of a triangle — mathematical calculations (E).'
      Speaker 3Zh: '说话者3描述了解数学题和计算三角形面积——数学计算（E）。'
      Speaker 4: 'Speaker 4 describes working in darkness and identifying objects by touch — sense of touch (D).'
      Speaker 4Zh: '说话者4描述了在黑暗中工作并通过触觉识别物体——触觉（D）。'
      Speaker 5: 'Speaker 5 worked with "another team" they could not see — working with strangers (A).'
      Speaker 5Zh: '说话者5和一个看不见的"另一个团队"合作——与陌生人合作（A）。'

  # ============================================================
  # L184: What Makes a Good Detective
  # ============================================================

  - id: L184
    type: multiple-matching
    title: 'What Makes a Good Detective'
    titleZh: '什么造就了好侦探'
    scene: 'You will hear five young people talking about the most important quality for a detective.'
    sceneZh: '你将听到五位年轻人谈论侦探最重要的品质。'
    difficulty: 2
    audioFile: 'L184.mp3'
    speakers:
      - name: Speaker 1
        text: 'For me, the most important quality is patience. When I was trying to find out who was drawing on the playground wall, it took me two whole weeks of watching before I finally saw who it was. Most people would have given up after a day or two, but I kept going because I knew the truth would come out eventually if I just waited long enough.'
      - name: Speaker 2
        text: 'I think the best detectives are the ones who notice small details. Last term, I worked out who had been taking books from the classroom library because I noticed that one person always had ink on their fingers after break time — the same colour ink as the library stamps. Nobody else spotted that connection, but to me it stood out immediately.'
      - name: Speaker 3
        text: 'Being good at talking to people is the key skill, in my opinion. When our class hamster escaped, I found it by asking the right questions. Instead of asking "Have you seen the hamster?" I asked "Have you heard any scratching or rustling sounds today?" That got much better answers because people remembered sounds they had ignored.'
      - name: Speaker 4
        text: 'I believe creativity is the most important thing. Sometimes the solution to a mystery is something completely unexpected. When we could not work out how water was getting into the basement, everyone assumed it was a leaking pipe. But I suggested we check whether the garden sprinkler was pointing at the wall, and that turned out to be exactly the problem. You need to think differently.'
      - name: Speaker 5
        text: 'Keeping good records is what really matters. When things started going missing from our cloakroom, I made a chart — I wrote down the date, the time, what was missing, and who was nearby. After a week, the chart showed a clear pattern that pointed to exactly when it was happening. Without those written notes, I would never have seen it.'
    statements:
      A: 'This person believes detectives need to think in unusual ways.'
      B: 'This person values the ability to wait a long time for results.'
      C: 'This person thinks recording information carefully is the key.'
      D: 'This person believes in the power of asking the right questions.'
      E: 'This person thinks noticing tiny details is most important.'
      F: 'This person values physical fitness for chasing suspects.'
      G: 'This person thinks technology is the most useful tool.'
      H: 'This person believes working alone is better than working in a team.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'E'
      Speaker 3: 'D'
      Speaker 4: 'A'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 says "the most important quality is patience" and describes waiting two weeks — valuing patience/waiting (B).'
      Speaker 1Zh: '说话者1说"最重要的品质是耐心"，并描述了等待两周——重视耐心/等待（B）。'
      Speaker 2: 'Speaker 2 says "the best detectives notice small details" and describes spotting ink on fingers — tiny details (E).'
      Speaker 2Zh: '说话者2说"最好的侦探注意小细节"，并描述了发现手指上的墨水——细小的细节（E）。'
      Speaker 3: 'Speaker 3 says "asking the right questions" is key and gives an example of rephrasing a question — asking right questions (D).'
      Speaker 3Zh: '说话者3说"问对问题"是关键，并举例说明了重新措辞问题——问对问题（D）。'
      Speaker 4: 'Speaker 4 says "creativity is the most important" and thought of an unexpected solution — thinking unusually (A).'
      Speaker 4Zh: '说话者4说"创造力最重要"，并想到了意想不到的解决方案——非常规思维（A）。'
      Speaker 5: 'Speaker 5 says "keeping good records is what really matters" and made a chart — recording information (C).'
      Speaker 5Zh: '说话者5说"做好记录才是最重要的"，并制作了图表——记录信息（C）。'

  # ============================================================
  # L185: Mystery Books We Recommend
  # ============================================================

  - id: L185
    type: multiple-matching
    title: 'Mystery Books We Recommend'
    titleZh: '我们推荐的推理书'
    scene: 'You will hear five young people recommending their favourite mystery book.'
    sceneZh: '你将听到五位年轻人推荐他们最喜欢的推理书。'
    difficulty: 2
    audioFile: 'L185.mp3'
    speakers:
      - name: Speaker 1
        text: 'The book I love most is about a girl detective who lives in a small seaside town. What I really like about it is the setting — the author describes the foggy harbour, the cliff paths, and the old lighthouse so vividly that you feel like you are actually there. The mystery itself is good, but it is the atmosphere that makes it special. You can almost smell the sea air as you read.'
      - name: Speaker 2
        text: 'My favourite mystery book is one where the reader has to solve the puzzle. At the end of each chapter, the author gives you clues and asks you questions. I actually figured out who the villain was before the main character did, which made me feel brilliant. I love books that challenge the reader to think, not just follow the story passively.'
      - name: Speaker 3
        text: 'I recommend a series about twin brothers who solve crimes after school. The reason I like it so much is the relationship between the twins — one is very logical and the other is very creative, so they approach every problem differently. Their arguments are funny and realistic. The mysteries are interesting, but it is the characters that keep me reading book after book.'
      - name: Speaker 4
        text: 'There is a fantastic book where a boy discovers that his new school was built on top of an ancient Roman fort. The story weaves together a modern mystery and a historical one — you read chapters set in the present and chapters set two thousand years ago. I love history, so having real historical facts mixed into the detective story was perfect for me.'
      - name: Speaker 5
        text: 'The book I always recommend is a detective story told in a completely unusual way. Instead of normal chapters, the story is told through diary entries, text messages, newspaper articles, and even shopping lists. You have to piece together what happened from all these different documents. It is like being a real detective sorting through evidence files.'
    statements:
      A: 'This person recommends a book because of its unusual format.'
      B: 'This person enjoys a book that mixes history with a modern story.'
      C: 'This person loves the book mainly for its characters.'
      D: 'This person likes a book that lets the reader solve the mystery.'
      E: 'This person values the book for its vivid description of a place.'
      F: 'This person recommends a book because it was made into a film.'
      G: 'This person likes a book because it has a funny detective as the hero.'
      H: 'This person prefers books with very short chapters.'
    answers:
      Speaker 1: 'E'
      Speaker 2: 'D'
      Speaker 3: 'C'
      Speaker 4: 'B'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 says "it is the atmosphere that makes it special" and describes the vivid seaside setting — vivid description of place (E).'
      Speaker 1Zh: '说话者1说"是氛围让它特别"，并描述了生动的海边场景——对地方的生动描述（E）。'
      Speaker 2: 'Speaker 2 says the book challenges "the reader to think" and they solved the puzzle themselves — reader solves mystery (D).'
      Speaker 2Zh: '说话者2说这本书挑战"读者思考"，他们自己解开了谜题——读者解谜（D）。'
      Speaker 3: 'Speaker 3 says "it is the characters that keep me reading" — values characters (C).'
      Speaker 3Zh: '说话者3说"是角色让我一直读下去"——重视角色（C）。'
      Speaker 4: 'Speaker 4 describes a story mixing modern and Roman history — mixes history with modern story (B).'
      Speaker 4Zh: '说话者4描述了一个混合现代和罗马历史的故事——将历史与现代故事结合（B）。'
      Speaker 5: 'Speaker 5 describes a story told through diary entries, texts, and newspaper articles — unusual format (A).'
      Speaker 5Zh: '说话者5描述了一个通过日记、短信和报纸文章讲述的故事——不寻常的格式（A）。'

  # ============================================================
  # L186: Mysteries We Solved at School
  # ============================================================

  - id: L186
    type: multiple-matching
    title: 'Mysteries We Solved at School'
    titleZh: '我们在学校解决的谜团'
    scene: 'You will hear five students talking about a mystery they solved at school.'
    sceneZh: '你将听到五位学生谈论他们在学校解决的谜团。'
    difficulty: 2
    audioFile: 'L186.mp3'
    speakers:
      - name: Speaker 1
        text: 'Every morning, someone was leaving a small origami animal on the teacher''s desk. A paper crane, a paper frog, a paper butterfly — a different one every day. The teacher thought it was sweet but really wanted to know who was doing it. I happened to arrive early one day and saw a girl from the year below slipping into our classroom at seven thirty. She was so surprised when I appeared!'
      - name: Speaker 2
        text: 'Our mystery was about the school bell. For a whole week, it kept ringing five minutes early, so everyone left class before the lesson was finished. The teachers thought the clock system was broken, but the IT technician checked and said everything was fine. Then I noticed that the clock in the main hall was slightly fast. Someone had moved the hands forward. It turned out that a cleaner had accidentally bumped it while dusting.'
      - name: Speaker 3
        text: 'Someone was writing tiny positive messages on the bathroom mirrors — things like "You are amazing" and "Have a great day." The head teacher wanted to stop it because writing on mirrors is not allowed. I found out who it was by comparing the handwriting with the sign-up sheets on the school noticeboard. The "g" letters were very distinctive. It was a girl in Year Five who just wanted to make people smile.'
      - name: Speaker 4
        text: 'We had a mystery in our science classroom. Every Friday, the plant on the windowsill had been moved to a different spot. Nobody admitted to moving it. I decided to put a tiny piece of tape on the bottom of the pot with a mark on it. The next Friday, the tape was still there but the mark was smudged, which meant someone had picked it up from the bottom. It turned out the Friday cleaning lady moved all the plants to wipe the windowsills.'
      - name: Speaker 5
        text: 'There was a mystery about our school garden. Beautiful flowers kept appearing overnight — someone was planting them in the dark. Nobody in the gardening club knew anything about it. We asked the local garden centre if anyone had been buying flowers recently. The owner told us that a retired teacher called Mrs Blake had been buying bedding plants every week. We thanked her and she was invited to the school harvest festival.'
    statements:
      A: 'This person solved the mystery by arriving at school earlier than usual.'
      B: 'This person identified the person through their handwriting.'
      C: 'This person used a physical marker to track what was happening.'
      D: 'This person investigated by asking a local business for information.'
      E: 'This person found the answer by examining a clock.'
      F: 'This person set up a hidden camera to catch someone.'
      G: 'This person followed footprints to find the person responsible.'
      H: 'This person solved the mystery by reading someone''s diary.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'E'
      Speaker 3: 'B'
      Speaker 4: 'C'
      Speaker 5: 'D'
    explanations:
      Speaker 1: 'Speaker 1 says "I happened to arrive early one day and saw a girl" — arriving earlier than usual (A).'
      Speaker 1Zh: '说话者1说"我碰巧有一天早到，看到了一个女孩"——比平时更早到达（A）。'
      Speaker 2: 'Speaker 2 noticed the hall clock was fast and "someone had moved the hands forward" — examining a clock (E).'
      Speaker 2Zh: '说话者2注意到大厅的钟快了，"有人把指针拨快了"——检查钟表（E）。'
      Speaker 3: 'Speaker 3 compared "handwriting with the sign-up sheets" — identified through handwriting (B).'
      Speaker 3Zh: '说话者3将"笔迹与报名表"进行对比——通过笔迹识别（B）。'
      Speaker 4: 'Speaker 4 put "a tiny piece of tape on the bottom of the pot" — used a physical marker (C).'
      Speaker 4Zh: '说话者4在"花盆底部贴了一小块胶带"——使用了物理标记（C）。'
      Speaker 5: 'Speaker 5 "asked the local garden centre" and the owner identified Mrs Blake — asking a local business (D).'
      Speaker 5Zh: '说话者5"询问了当地的花卉中心"，店主指认了Blake女士——向当地商家询问（D）。'

  # ============================================================
  # L187: Our Favourite Puzzle Types
  # ============================================================

  - id: L187
    type: multiple-matching
    title: 'Our Favourite Puzzle Types'
    titleZh: '我们最喜欢的谜题类型'
    scene: 'You will hear five young people talking about their favourite type of puzzle.'
    sceneZh: '你将听到五位年轻人谈论他们最喜欢的谜题类型。'
    difficulty: 2
    audioFile: 'L187.mp3'
    speakers:
      - name: Speaker 1
        text: 'I am completely hooked on sudoku. I do at least two a day — one easy one at breakfast and a harder one before bed. What I love about sudoku is that it is purely logical. There is no guessing involved. Every number can be worked out step by step if you think carefully enough. My fastest time for a medium puzzle is four minutes and twenty seconds.'
      - name: Speaker 2
        text: 'Crossword puzzles are my favourite by far. I love the clever wordplay in the clues. Sometimes a clue has a double meaning that makes you think of completely the wrong word at first. My grandmother does crosswords every day and she taught me how to read the clues properly. We sometimes race to see who can finish the newspaper crossword first. She usually wins, though.'
      - name: Speaker 3
        text: 'I really enjoy jigsaw puzzles — the bigger the better. I am currently working on a two-thousand-piece puzzle of a coral reef. What I find relaxing about jigsaws is that you can let your mind wander while your hands sort through the pieces. I always start with the edge pieces and then work on areas with distinctive colours. It is like meditation for me.'
      - name: Speaker 4
        text: 'Riddles are what I enjoy most. I collect them in a notebook and try them out on my friends. The best riddles are the ones where the answer is really obvious once you hear it, but nearly impossible to guess beforehand. My current favourite is: "What has a head and a tail but no body?" A coin, of course! I must have about three hundred riddles in my collection now.'
      - name: Speaker 5
        text: 'I am a big fan of maze puzzles. I draw my own mazes for my friends to solve, and I design them on graph paper using a specific method. First, I draw the solution path, and then I add dead ends and false turns around it. The trick is to make the wrong paths look more inviting than the right one. My friend Jake says my mazes are harder than any he has seen in puzzle books.'
    statements:
      A: 'This person enjoys creating puzzles as well as solving them.'
      B: 'This person finds puzzles relaxing and calming.'
      C: 'This person likes puzzles that involve word knowledge.'
      D: 'This person prefers puzzles based on pure logic with no guessing.'
      E: 'This person collects puzzles in a notebook.'
      F: 'This person likes puzzles that can be solved outdoors.'
      G: 'This person prefers puzzles that involve drawing pictures.'
      H: 'This person enjoys competing against a family member.'
    answers:
      Speaker 1: 'D'
      Speaker 2: 'C'
      Speaker 3: 'B'
      Speaker 4: 'E'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 says sudoku is "purely logical" with "no guessing involved" — pure logic (D).'
      Speaker 1Zh: '说话者1说数独是"纯逻辑的"，"不需要猜测"——纯逻辑（D）。'
      Speaker 2: 'Speaker 2 loves "clever wordplay in the clues" of crosswords — word knowledge (C).'
      Speaker 2Zh: '说话者2喜欢填字游戏线索中"巧妙的文字游戏"——文字知识（C）。'
      Speaker 3: 'Speaker 3 says jigsaws let the mind wander and calls it "like meditation" — relaxing and calming (B).'
      Speaker 3Zh: '说话者3说拼图可以让思绪漫游，称之为"像冥想"——放松和平静（B）。'
      Speaker 4: 'Speaker 4 says "I collect them in a notebook" and has about three hundred riddles — collects in notebook (E).'
      Speaker 4Zh: '说话者4说"我把它们收集在笔记本里"，收集了大约三百个谜语——收集在笔记本中（E）。'
      Speaker 5: 'Speaker 5 says "I draw my own mazes for my friends to solve" — creating puzzles as well as solving them (A).'
      Speaker 5Zh: '说话者5说"我为朋友画自己的迷宫让他们解"——既创造谜题也解谜题（A）。'

  # ============================================================
  # L188: Things That Went Wrong on Our Treasure Hunt
  # ============================================================

  - id: L188
    type: multiple-matching
    title: 'Things That Went Wrong on Our Treasure Hunt'
    titleZh: '寻宝中出了什么岔子'
    scene: 'You will hear five children talking about problems during a treasure hunt.'
    sceneZh: '你将听到五个孩子谈论寻宝过程中遇到的问题。'
    difficulty: 2
    audioFile: 'L188.mp3'
    speakers:
      - name: Speaker 1
        text: 'Our biggest problem was the weather. We were halfway through the treasure hunt when it started raining really hard. The clue we were carrying was written in ink on normal paper, and the rain made the ink run until we could not read the words anymore. We had to go back to the start and ask for a new copy. By then, the other teams were miles ahead of us.'
      - name: Speaker 2
        text: 'We got into trouble because we did not read the clue carefully enough. It said "Go to the tree with the RED ribbon." We went to a tree with an orange ribbon instead, because we were in such a hurry. We wasted twenty minutes searching around the wrong tree before we realised our mistake. After that, we promised each other to read every clue twice.'
      - name: Speaker 3
        text: 'The problem for us was that our team kept arguing about which way to go. Every time we reached a decision point, three people wanted to go left and two wanted to go right. We spent more time debating than actually hunting! In the end, we agreed to take turns being the leader. That worked much better because there was only one person making decisions at each stage.'
      - name: Speaker 4
        text: 'My difficulty was a personal one — I twisted my ankle on a tree root about ten minutes into the hunt. It hurt quite a lot and I could not walk fast. My teammates were brilliant, though. They slowed down for me and one boy offered to carry my backpack. We finished last, but I felt really grateful for how kind they were. I would rather be on a nice team than win.'
      - name: Speaker 5
        text: 'We actually got lost. The map we were given had north at the top, but I was holding it upside down without realising. So every time the clue said "go north," we went south. After about thirty minutes, we ended up at the car park on the completely wrong side of the park. A park keeper pointed us in the right direction and we eventually finished — half an hour after everyone else!'
    statements:
      A: 'This person''s team had disagreements about the route.'
      B: 'This person could not continue at full speed due to an injury.'
      C: 'This person made a navigation mistake with the map.'
      D: 'This person''s clue was damaged by weather conditions.'
      E: 'This person confused two similar-looking items.'
      F: 'This person''s team lost time because they forgot a clue at home.'
      G: 'This person arrived late because the starting time was wrong.'
      H: 'This person could not find the treasure because it had been moved.'
    answers:
      Speaker 1: 'D'
      Speaker 2: 'E'
      Speaker 3: 'A'
      Speaker 4: 'B'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 says the rain made the ink run and they could not read the clue — damaged by weather (D).'
      Speaker 1Zh: '说话者1说雨水使墨水晕开，无法阅读线索——被天气损坏（D）。'
      Speaker 2: 'Speaker 2 went to a tree with an orange ribbon instead of a red one — confused similar items (E).'
      Speaker 2Zh: '说话者2去了系橙色丝带的树而不是红色的——混淆了相似的物品（E）。'
      Speaker 3: 'Speaker 3 says "our team kept arguing about which way to go" — disagreements about the route (A).'
      Speaker 3Zh: '说话者3说"我们队一直在争论走哪条路"——对路线有分歧（A）。'
      Speaker 4: 'Speaker 4 twisted their ankle and "could not walk fast" — injury slowed them down (B).'
      Speaker 4Zh: '说话者4扭伤了脚踝，"走不快"——受伤导致速度变慢（B）。'
      Speaker 5: 'Speaker 5 held the map "upside down" and went the wrong direction — navigation mistake with map (C).'
      Speaker 5Zh: '说话者5把地图"拿反了"，走错了方向——地图导航错误（C）。'

  # ============================================================
  # L189: How We Use Clues in Everyday Life
  # ============================================================

  - id: L189
    type: multiple-matching
    title: 'How We Use Clues in Everyday Life'
    titleZh: '我们在日常生活中如何使用线索'
    scene: 'You will hear five young people talking about how detective skills help them in daily life.'
    sceneZh: '你将听到五位年轻人谈论侦探技能如何帮助他们的日常生活。'
    difficulty: 2
    audioFile: 'L189.mp3'
    speakers:
      - name: Speaker 1
        text: 'I use detective thinking when I cook. If a recipe does not turn out right, I go through everything step by step to find what went wrong. Last week, my cake was flat as a pancake. I checked all the ingredients and realised I had used plain flour instead of self-raising flour. The clue was right there on the bag — I just had not read the label carefully. Now I always double-check every ingredient.'
      - name: Speaker 2
        text: 'My detective skill helps me most when I am shopping. I always compare products by reading the small print on the back. Most people just look at the big colourful words on the front, but the real information is in the tiny writing. I can tell which cereal is actually healthiest, which soap is best value, and which toys are made from recycled materials — all from reading the details others ignore.'
      - name: Speaker 3
        text: 'I think like a detective when I am playing football. During a match, I watch how the other team plays — which foot each player prefers, where they usually pass, which side they tend to run to. By half-time, I can often predict what they are going to do next. My coach says I have the best game awareness in the whole squad because I observe patterns.'
      - name: Speaker 4
        text: 'Detective skills help me understand my little brother. He is only three and cannot always explain what he wants. So I look for clues. If he is rubbing his eyes, he is tired. If he is touching his ear, he might have an earache. If he brings me his shoes, he wants to go outside. I have become really good at reading body language, which helps with other people too — not just my brother.'
      - name: Speaker 5
        text: 'I use observation skills when I am out in nature. When I go for walks, I look for signs that animals have been nearby. Nibbled pinecones mean squirrels, muddy paths with hoof prints mean deer, and neat round holes in tree trunks mean woodpeckers. My friends walk past all these signs without noticing. It is like reading a secret story written by the animals themselves.'
    statements:
      A: 'This person uses observation skills to understand animal behaviour in nature.'
      B: 'This person uses detective thinking to improve at sport.'
      C: 'This person reads product details that most people overlook.'
      D: 'This person interprets non-verbal signals from a family member.'
      E: 'This person uses a step-by-step method to fix cooking mistakes.'
      F: 'This person uses detective skills to do well in exams.'
      G: 'This person uses clues to find lost objects around the house.'
      H: 'This person reads people''s expressions to tell if they are lying.'
    answers:
      Speaker 1: 'E'
      Speaker 2: 'C'
      Speaker 3: 'B'
      Speaker 4: 'D'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 goes "through everything step by step" when cooking goes wrong — step-by-step method for cooking (E).'
      Speaker 1Zh: '说话者1在烹饪出错时"一步一步检查所有事情"——烹饪的逐步方法（E）。'
      Speaker 2: 'Speaker 2 reads "the small print on the back" of products — reading overlooked details (C).'
      Speaker 2Zh: '说话者2阅读产品"背面的小字"——阅读被忽略的细节（C）。'
      Speaker 3: 'Speaker 3 watches how the other football team plays and predicts moves — improving at sport (B).'
      Speaker 3Zh: '说话者3观察对方足球队的打法并预测动作——在运动中提高（B）。'
      Speaker 4: 'Speaker 4 reads body language of their three-year-old brother — non-verbal signals from family (D).'
      Speaker 4Zh: '说话者4解读三岁弟弟的身体语言——来自家人的非语言信号（D）。'
      Speaker 5: 'Speaker 5 looks for animal signs in nature like nibbled pinecones and hoof prints — animal behaviour in nature (A).'
      Speaker 5Zh: '说话者5在自然中寻找动物迹象，如被啃的松果和蹄印——自然中的动物行为（A）。'

  # ============================================================
  # L190: Famous Unsolved Mysteries
  # ============================================================

  - id: L190
    type: multiple-matching
    title: 'Famous Unsolved Mysteries'
    titleZh: '著名的未解之谜'
    scene: 'You will hear five students presenting a famous unsolved mystery to their class.'
    sceneZh: '你将听到五位学生向班级介绍一个著名的未解之谜。'
    difficulty: 2
    audioFile: 'L190.mp3'
    speakers:
      - name: Speaker 1
        text: 'I want to tell you about the Mary Celeste. It was an American ship found drifting in the Atlantic Ocean in eighteen seventy-two. The ship was in perfect condition — the cargo was untouched, food was still on the table, and the crew''s belongings were still in their cabins. But every single person on board had vanished. No bodies were ever found, and to this day, nobody knows what happened to the ten people on the ship.'
      - name: Speaker 2
        text: 'My mystery is the Voynich Manuscript. It is a book written in a language that nobody can read. It was found in Italy in nineteen twelve and is believed to be about six hundred years old. The pages are covered in strange writing and drawings of plants that do not exist in nature. Hundreds of codebreakers, linguists, and even computer scientists have tried to decode it, but the language remains a complete mystery.'
      - name: Speaker 3
        text: 'I am going to talk about the Bermuda Triangle. This is an area of the Atlantic Ocean between Florida, Bermuda, and Puerto Rico where many ships and aeroplanes have disappeared over the years. Some people blame supernatural forces, but most scientists think it is just a combination of bad weather, strong currents, and human error. What makes it mysterious is that in some cases, no wreckage was ever found.'
      - name: Speaker 4
        text: 'The mystery I chose is Stonehenge. These giant stones in southern England were placed there about five thousand years ago, but we still do not know exactly how or why. Each stone weighs around twenty-five tonnes and some were brought from over two hundred kilometres away — without wheels or engines. Was it a temple, a calendar, or a healing place? Archaeologists have different theories but no definite answer.'
      - name: Speaker 5
        text: 'I want to tell you about the Nazca Lines in Peru. These are enormous drawings on the ground — some are over two hundred metres long. They show animals, plants, and geometric shapes, but the amazing thing is that you can only see the complete pictures from high in the air. The lines were made about two thousand years ago, long before aeroplanes existed. Why would people create art that they could never fully see from the ground?'
    statements:
      A: 'This mystery involves a ship where people vanished without a trace.'
      B: 'This mystery involves writing that has never been decoded.'
      C: 'This mystery involves giant artworks visible only from the sky.'
      D: 'This mystery is about an area where vehicles have disappeared.'
      E: 'This mystery involves ancient stones whose purpose is unknown.'
      F: 'This mystery involves a building that appeared overnight.'
      G: 'This mystery is about a treasure map that nobody can follow.'
      H: 'This mystery involves a clock that runs backwards.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'D'
      Speaker 4: 'E'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 describes the Mary Celeste — a ship where "every single person on board had vanished" (A).'
      Speaker 1Zh: '说话者1描述了玛丽·塞莱斯特号——一艘"船上所有人都消失了"的船（A）。'
      Speaker 2: 'Speaker 2 describes the Voynich Manuscript — "a language that nobody can read" (B).'
      Speaker 2Zh: '说话者2描述了伏尼契手稿——"一种无人能读懂的语言"（B）。'
      Speaker 3: 'Speaker 3 describes the Bermuda Triangle where "ships and aeroplanes have disappeared" — vehicles disappeared (D).'
      Speaker 3Zh: '说话者3描述了百慕大三角，"船只和飞机消失了"——交通工具消失（D）。'
      Speaker 4: 'Speaker 4 describes Stonehenge — ancient stones whose purpose is debated (E).'
      Speaker 4Zh: '说话者4描述了巨石阵——用途有争议的古代石头（E）。'
      Speaker 5: 'Speaker 5 describes the Nazca Lines — "enormous drawings" visible "only from high in the air" (C).'
      Speaker 5Zh: '说话者5描述了纳斯卡线条——"只有从高空才能看到"的"巨大图画"（C）。'

  # ============================================================
  # L191: What Surprised Us About Forensic Science
  # ============================================================

  - id: L191
    type: multiple-matching
    title: 'What Surprised Us About Forensic Science'
    titleZh: '法医科学让我们惊讶的事'
    scene: 'You will hear five students talking about what surprised them at a forensic science workshop.'
    sceneZh: '你将听到五位学生谈论法医科学工作坊中让他们惊讶的事情。'
    difficulty: 2
    audioFile: 'L191.mp3'
    speakers:
      - name: Speaker 1
        text: 'What surprised me most was learning that every person''s ear shape is unique — just like fingerprints. The instructor showed us that the curves, bumps, and ridges of the outer ear are different in every single human being. Police in some countries now use ear prints found pressed against doors or windows as evidence. I had never thought about my ears being special before!'
      - name: Speaker 2
        text: 'I was amazed by how much information you can get from a single strand of hair. The instructor explained that hair can tell you what chemicals a person has been exposed to, where they have travelled, and even what they have been eating. This is because hair grows slowly and traps tiny amounts of minerals from food and water. It is like a tiny time capsule recording months of your life.'
      - name: Speaker 3
        text: 'The thing that surprised me was that insects can help solve crimes. Forensic entomologists study the types of insects found at a crime scene to determine how long something has been there. Different insects arrive at different stages, so by identifying which species are present, scientists can work out a precise timeline. I never imagined that studying bugs could be so important.'
      - name: Speaker 4
        text: 'I could not believe that scientists can now get a DNA profile from just touching a surface. If you pick up a cup or turn a door handle, you leave behind tiny flakes of skin containing your DNA. The instructor showed us that even a single skin cell can sometimes be enough. Twenty years ago, you needed a much larger sample. The technology has become incredibly sensitive.'
      - name: Speaker 5
        text: 'What amazed me was that every printer in the world leaves a unique pattern of tiny yellow dots on every page it prints. These dots are invisible to the naked eye, but under a special blue light, you can see them clearly. The pattern encodes the printer''s serial number and the date and time of printing. So if someone prints a threatening letter, police can trace it back to the exact printer.'
    statements:
      A: 'This person was surprised that a body part other than fingers can identify people.'
      B: 'This person learned that insects play a role in criminal investigations.'
      C: 'This person discovered that printers leave invisible identifying marks.'
      D: 'This person was amazed by how little material is needed for DNA testing today.'
      E: 'This person learned that hair stores information about a person''s lifestyle.'
      F: 'This person was surprised that soil samples can reveal a suspect''s location.'
      G: 'This person discovered that voice recordings can be analysed like fingerprints.'
      H: 'This person learned that teeth marks are used to identify people.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'E'
      Speaker 3: 'B'
      Speaker 4: 'D'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 learned that "every person''s ear shape is unique — just like fingerprints" — body part other than fingers (A).'
      Speaker 1Zh: '说话者1了解到"每个人的耳朵形状都是独一无二的——就像指纹一样"——手指以外的身体部位（A）。'
      Speaker 2: 'Speaker 2 was amazed by the information in "a single strand of hair" about diet and travel — hair stores lifestyle info (E).'
      Speaker 2Zh: '说话者2对"一根头发"中关于饮食和旅行的信息感到惊讶——头发储存生活方式信息（E）。'
      Speaker 3: 'Speaker 3 learned "insects can help solve crimes" through forensic entomology — insects in investigations (B).'
      Speaker 3Zh: '说话者3了解到"昆虫可以帮助破案"，通过法医昆虫学——调查中的昆虫（B）。'
      Speaker 4: 'Speaker 4 was amazed that "even a single skin cell can sometimes be enough" for DNA — minimal material for DNA (D).'
      Speaker 4Zh: '说话者4惊讶于"甚至一个皮肤细胞有时就足够"进行DNA检测——DNA所需的最少材料（D）。'
      Speaker 5: 'Speaker 5 learned about "tiny yellow dots" printers leave on pages — invisible printer marks (C).'
      Speaker 5Zh: '说话者5了解到打印机在页面上留下的"微小黄点"——看不见的打印机标记（C）。'

  # ============================================================
  # L192: The Strangest Thing I Found While Exploring
  # ============================================================

  - id: L192
    type: multiple-matching
    title: 'The Strangest Thing I Found While Exploring'
    titleZh: '探索中发现的最奇怪的东西'
    scene: 'You will hear five young people talking about unusual things they discovered while exploring.'
    sceneZh: '你将听到五位年轻人谈论他们在探索时发现的不寻常的东西。'
    difficulty: 2
    audioFile: 'L192.mp3'
    speakers:
      - name: Speaker 1
        text: 'I was exploring a beach after a big storm and I found a glass fishing float — a green glass ball about the size of a football. My grandfather told me that Japanese fishermen used these to keep their nets floating before plastic was invented. This one must have drifted across the entire Pacific Ocean! It might have been in the water for decades. I keep it on my bedroom shelf now.'
      - name: Speaker 2
        text: 'While walking in the woods near my house, I found a tree with a bicycle growing out of it. Someone must have left the bike leaning against the tree years ago, and the tree slowly grew around it. The wheels were sticking out on either side, and the handlebars were completely buried in the bark. It was the strangest sight — nature swallowing up a man-made object.'
      - name: Speaker 3
        text: 'I was helping my parents clear out the attic of our new house and I found a tin box hidden behind a loose brick in the chimney. Inside, there were old coins from the nineteen thirties, a gold pocket watch, and a handwritten note saying "For safekeeping until I return." Whoever hid it never came back. We reported it to the local history society and they are trying to find out who the owner was.'
      - name: Speaker 4
        text: 'I found something incredible while snorkelling on holiday in Greece. On the sea floor, about three metres down, I spotted what looked like a stone column lying on its side. My dad dived down and confirmed it was part of an ancient pillar, probably from a Greek temple. We told the local authorities and they said there are many undiscovered ruins along that coast, hidden under the shallow water.'
      - name: Speaker 5
        text: 'This happened in my own garden. I was digging a hole to plant a tree and my spade hit something hard. I carefully dug around it and pulled out a metal container with a faded label that said "Time Capsule — Class of 1989." Inside there were letters from students, a cassette tape, a newspaper, and a small toy car. Our house was built on the site of an old school. I posted about it online and three of the original students got in touch!'
    statements:
      A: 'This person found something from another country that had travelled across the sea.'
      B: 'This person discovered ancient ruins underwater.'
      C: 'This person found a time capsule buried in their garden.'
      D: 'This person found valuables hidden inside a building.'
      E: 'This person discovered nature growing around a man-made object.'
      F: 'This person found a rare animal in an unexpected place.'
      G: 'This person discovered a hidden tunnel under their school.'
      H: 'This person found a message carved into a rock.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'E'
      Speaker 3: 'D'
      Speaker 4: 'B'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 found a Japanese glass fishing float that "drifted across the entire Pacific Ocean" — from another country (A).'
      Speaker 1Zh: '说话者1发现了一个"漂过整个太平洋"的日本玻璃浮球——来自另一个国家（A）。'
      Speaker 2: 'Speaker 2 found "a tree with a bicycle growing out of it" — nature growing around a man-made object (E).'
      Speaker 2Zh: '说话者2发现了"一棵自行车长在里面的树"——大自然长在人造物体周围（E）。'
      Speaker 3: 'Speaker 3 found "old coins, a gold pocket watch" hidden behind a brick — valuables hidden inside a building (D).'
      Speaker 3Zh: '说话者3在砖块后面发现了"旧硬币、一块金怀表"——藏在建筑内的贵重物品（D）。'
      Speaker 4: 'Speaker 4 found "part of an ancient pillar, probably from a Greek temple" underwater — ancient ruins underwater (B).'
      Speaker 4Zh: '说话者4在水下发现了"一根古代柱子的一部分，可能来自希腊神庙"——水下古代遗迹（B）。'
      Speaker 5: 'Speaker 5 dug up a "Time Capsule — Class of 1989" in their garden — time capsule in garden (C).'
      Speaker 5Zh: '说话者5在花园里挖出了"时间胶囊——1989届"——花园里的时间胶囊（C）。'

  # ============================================================
  # L193: Why We Want to Be Detectives When We Grow Up
  # ============================================================

  - id: L193
    type: multiple-matching
    title: 'Why We Want to Be Detectives When We Grow Up'
    titleZh: '为什么我们长大后想当侦探'
    scene: 'You will hear five young people explaining why they want to become detectives.'
    sceneZh: '你将听到五位年轻人解释为什么想成为侦探。'
    difficulty: 2
    audioFile: 'L193.mp3'
    speakers:
      - name: Speaker 1
        text: 'I want to be a detective because I love the idea of helping people who cannot help themselves. When someone loses something precious or is treated unfairly, a detective can step in and find the truth. My aunt had her bicycle stolen last year and the police never found it. I felt so frustrated. If I were a detective, I could have investigated and maybe got it back for her.'
      - name: Speaker 2
        text: 'For me, it is the variety that appeals to me. A detective never does the same thing two days in a row. One day you might be interviewing witnesses, the next you might be examining evidence in a laboratory, and the day after that you might be searching for clues outdoors. I would get bored in a job where I sat at the same desk every day doing the same task.'
      - name: Speaker 3
        text: 'I want to become a forensic scientist — that is a detective who uses science. I am fascinated by the idea that you can solve a case using chemistry, biology, and physics. For example, by analysing a tiny paint chip, you can identify the exact car involved in an accident. Science and detective work seem like the perfect combination to me.'
      - name: Speaker 4
        text: 'Honestly, I want to be a detective because I think I have the right personality for it. I am naturally curious — I always want to know why things happen. I am also very patient. My mum says I am the only person she knows who can sit still for two hours watching a bird''s nest to see what happens. Those are exactly the qualities you need.'
      - name: Speaker 5
        text: 'I am interested in becoming a cyber detective — someone who investigates crimes that happen online. So many crimes happen on the internet now, and ordinary police often do not have the computer skills to solve them. I already know how to code in three programming languages, so I think my technology skills could make a real difference in catching online criminals.'
    statements:
      A: 'This person wants to help people who are victims of unfairness.'
      B: 'This person is attracted to having a different routine every day.'
      C: 'This person wants to combine scientific knowledge with detective work.'
      D: 'This person believes their natural character suits detective work.'
      E: 'This person wants to specialise in technology-based crime.'
      F: 'This person wants to follow in a family member''s footsteps.'
      G: 'This person is mainly motivated by the salary detectives earn.'
      H: 'This person wants to become famous through solving a big case.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "I love the idea of helping people who cannot help themselves" — helping victims (A).'
      Speaker 1Zh: '说话者1说"我喜欢帮助那些无法自助的人"——帮助受害者（A）。'
      Speaker 2: 'Speaker 2 says "it is the variety" and "never does the same thing two days in a row" — different routine (B).'
      Speaker 2Zh: '说话者2说"是多样性"和"从不连续两天做同样的事"——不同的日常（B）。'
      Speaker 3: 'Speaker 3 says "Science and detective work seem like the perfect combination" — combining science and detective work (C).'
      Speaker 3Zh: '说话者3说"科学和侦探工作似乎是完美的结合"——结合科学和侦探工作（C）。'
      Speaker 4: 'Speaker 4 says "I think I have the right personality for it" — natural character suits the work (D).'
      Speaker 4Zh: '说话者4说"我觉得我的性格适合做这个"——天生的性格适合这份工作（D）。'
      Speaker 5: 'Speaker 5 wants to be "a cyber detective" using "computer skills" — technology-based crime (E).'
      Speaker 5Zh: '说话者5想成为"网络侦探"，使用"电脑技能"——基于技术的犯罪（E）。'

  # ============================================================
  # L194: Secret Hiding Places We Have Found
  # ============================================================

  - id: L194
    type: multiple-matching
    title: 'Secret Hiding Places We Have Found'
    titleZh: '我们发现的秘密藏身处'
    scene: 'You will hear five children talking about secret hiding places they discovered.'
    sceneZh: '你将听到五个孩子谈论他们发现的秘密藏身处。'
    difficulty: 2
    audioFile: 'L194.mp3'
    speakers:
      - name: Speaker 1
        text: 'At my grandparents'' old house, I discovered a cupboard under the stairs that had a false back panel. If you pushed it in a certain way, the panel slid to one side and there was a tiny room behind it — just big enough for a child to sit in. My grandad said it was built during the war as a place to hide valuable documents. I used to read books in there with a torch.'
      - name: Speaker 2
        text: 'I found a brilliant hiding place at our local park. There is a very old oak tree with a hollow trunk. The opening is hidden behind a low branch, so most people walk right past without noticing. Inside, the hollow is dry and clean, and someone had even left a plastic box in there with a notebook. It turned out to be a geocache — a treasure hunting game using GPS coordinates.'
      - name: Speaker 3
        text: 'My discovery was at school. Behind the stage in the assembly hall, there is a narrow space between the back wall and the curtain. I found it while helping to set up for a play. Inside this gap, generations of students had written their names and the year on the wall. The oldest one I found was from nineteen sixty-two! It was like a secret time capsule that only the theatre kids knew about.'
      - name: Speaker 4
        text: 'I found a hidden tunnel at the beach. At low tide, there is a cave entrance hidden behind some large rocks. If you crawl through a narrow gap for about five metres, you come out into a beautiful open cave with a sandy floor. Light comes in through a crack in the ceiling, making it feel magical. My brother and I used it as our secret headquarters all summer.'
      - name: Speaker 5
        text: 'In my bedroom, there is a loose floorboard near the window. One day I stepped on it and it wobbled. I lifted it up and found a small space underneath — just enough to fit a shoebox. Inside, there was a dusty envelope with old football trading cards from the nineteen nineties. Someone who lived in my room years ago must have hidden them there. I still keep my own special things in that spot now.'
    statements:
      A: 'This person found a hiding place inside a tree.'
      B: 'This person discovered a space in their own bedroom floor.'
      C: 'This person found a hidden room behind a false wall.'
      D: 'This person discovered a cave accessible only at certain times.'
      E: 'This person found a hidden space behind a stage.'
      F: 'This person discovered a secret room in a library.'
      G: 'This person found a hiding place inside a garden shed.'
      H: 'This person discovered a tunnel under a bridge.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'A'
      Speaker 3: 'E'
      Speaker 4: 'D'
      Speaker 5: 'B'
    explanations:
      Speaker 1: 'Speaker 1 found "a false back panel" in a cupboard revealing a tiny room — hidden room behind false wall (C).'
      Speaker 1Zh: '说话者1发现了橱柜里的"一个假背板"，露出一个小房间——假墙后面的隐藏房间（C）。'
      Speaker 2: 'Speaker 2 found "a very old oak tree with a hollow trunk" — hiding place inside a tree (A).'
      Speaker 2Zh: '说话者2发现了"一棵非常古老的橡树，树干是空心的"——树内的藏身处（A）。'
      Speaker 3: 'Speaker 3 found a space "behind the stage in the assembly hall" — hidden space behind a stage (E).'
      Speaker 3Zh: '说话者3在"礼堂舞台后面"发现了一个空间——舞台后面的隐藏空间（E）。'
      Speaker 4: 'Speaker 4 found a "cave entrance hidden behind rocks" accessible at "low tide" — cave accessible at certain times (D).'
      Speaker 4Zh: '说话者4发现了"隐藏在岩石后面的洞穴入口"，只有"退潮时"才能进入——特定时间才能进入的洞穴（D）。'
      Speaker 5: 'Speaker 5 found "a loose floorboard" in their bedroom — space in bedroom floor (B).'
      Speaker 5Zh: '说话者5在卧室里发现了"一块松动的地板"——卧室地板中的空间（B）。'

  # ============================================================
  # L195: How Animals Solve Puzzles
  # ============================================================

  - id: L195
    type: multiple-matching
    title: 'How Animals Solve Puzzles'
    titleZh: '动物如何解谜'
    scene: 'You will hear five students presenting facts about animal intelligence and problem-solving.'
    sceneZh: '你将听到五位学生介绍动物智力和解决问题能力的事实。'
    difficulty: 2
    audioFile: 'L195.mp3'
    speakers:
      - name: Speaker 1
        text: 'I want to tell you about crows. Scientists in New Caledonia discovered that crows can make tools out of sticks and use them to reach food inside narrow tubes. But what is really amazing is that they can plan ahead — they will pick up a short stick to get a longer stick, and then use the longer stick to reach the food. That is three steps of planning, which most animals cannot do.'
      - name: Speaker 2
        text: 'Octopuses are incredible problem-solvers. In aquariums, they have been filmed unscrewing jar lids from the inside to escape, squeezing through tiny gaps, and even opening childproof bottles to get food. One octopus in New Zealand learned how to short-circuit a light above its tank by squirting water at it. The staff could not work out why the light kept breaking until they caught the octopus in the act!'
      - name: Speaker 3
        text: 'I researched elephants for my presentation. Elephants can cooperate to solve problems. In one experiment, two elephants had to pull the ends of the same rope at exactly the same time to get food. They quickly learned that pulling alone did not work — they had to wait for their partner. When one elephant arrived late, the other one waited patiently instead of pulling by itself.'
      - name: Speaker 4
        text: 'Dogs are smarter than we think when it comes to social puzzles. Studies show that dogs can follow a human''s gaze — if you look at a box, the dog will look at it too. Even more impressively, dogs can tell when a person is being helpful and when they are being unhelpful. In experiments, dogs preferred to take food from a person who had been kind to their owner rather than from a stranger who had been rude.'
      - name: Speaker 5
        text: 'Dolphins use a clever trick to protect their noses while searching for food on the sea floor. They tear off pieces of sea sponge and wear them on their snouts like gloves. This stops the sharp rocks and coral from hurting them. Scientists call this tool use, and it is very rare in the animal kingdom. Mother dolphins teach this trick to their daughters, so it is actually a form of culture passed down through generations.'
    statements:
      A: 'This animal uses objects to protect itself from physical harm.'
      B: 'This animal can plan several steps ahead to reach a goal.'
      C: 'This animal understands the importance of working together.'
      D: 'This animal can judge whether humans are friendly or unfriendly.'
      E: 'This animal has escaped from containers using physical manipulation.'
      F: 'This animal communicates using a complex language.'
      G: 'This animal can count up to twenty.'
      H: 'This animal builds permanent structures like dams.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'E'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 describes crows planning three steps ahead — planning several steps ahead (B).'
      Speaker 1Zh: '说话者1描述了乌鸦提前计划三个步骤——提前计划几个步骤（B）。'
      Speaker 2: 'Speaker 2 describes octopuses "unscrewing jar lids" and escaping — escaping from containers (E).'
      Speaker 2Zh: '说话者2描述了章鱼"拧开罐盖"并逃脱——从容器中逃脱（E）。'
      Speaker 3: 'Speaker 3 describes elephants needing to "pull at exactly the same time" — working together (C).'
      Speaker 3Zh: '说话者3描述了大象需要"同时拉"——一起合作（C）。'
      Speaker 4: 'Speaker 4 says dogs "can tell when a person is being helpful and when they are being unhelpful" — judging friendliness (D).'
      Speaker 4Zh: '说话者4说狗"能分辨一个人是否在帮忙"——判断友好程度（D）。'
      Speaker 5: 'Speaker 5 describes dolphins wearing sponge on their snouts for protection — using objects for protection (A).'
      Speaker 5Zh: '说话者5描述了海豚在鼻子上戴海绵来保护自己——使用物体进行保护（A）。'

  # ============================================================
  # L196: Our Spy Inventions
  # ============================================================

  - id: L196
    type: multiple-matching
    title: 'Our Spy Inventions'
    titleZh: '我们的间谍发明'
    scene: 'You will hear five children describing spy gadgets they invented for a school project.'
    sceneZh: '你将听到五个孩子描述他们为学校项目发明的间谍小工具。'
    difficulty: 2
    audioFile: 'L196.mp3'
    speakers:
      - name: Speaker 1
        text: 'I made a secret message device out of two toilet roll tubes. You write your message on a strip of paper wound around one tube. When you unwind it, the letters are all scrambled and meaningless. The other person needs a tube of exactly the same width to wind it back up and read the message. I got the idea from the ancient Spartans — they invented this method thousands of years ago.'
      - name: Speaker 2
        text: 'My invention is a trip wire alarm using a peg, some string, and a tin can filled with marbles. You tie the string across a doorway at ankle height, attached to a peg holding the tin can on a shelf. When someone walks through and catches the string, the peg releases and the can falls, making a huge noise. It is really simple but it works every single time. My sister was very surprised the first time she triggered it!'
      - name: Speaker 3
        text: 'I built a periscope so I can see over walls and around corners without being spotted. It is made from a long cardboard tube with mirrors at each end set at a forty-five degree angle. The light bounces from one mirror to the other. I decorated the outside to look like a tree branch so it would blend in. It took three attempts to get the mirror angles right, but now it works perfectly.'
      - name: Speaker 4
        text: 'I created invisible ink using baking soda mixed with water. You write your message with a paintbrush, and when it dries, the paper looks completely blank. To reveal the message, you paint over the paper with grape juice. The baking soda reacts with the acid in the grape juice and the letters appear in a different colour. I tested five different juices and grape juice gave the clearest result.'
      - name: Speaker 5
        text: 'My spy gadget is a listening device. I taped a paper cup to the end of a long cardboard tube and pointed it at a target. The cup collects sound waves and the tube focuses them towards your ear. It works a bit like a satellite dish for sound. I tested it in the garden and I could clearly hear my dad talking on the phone twenty metres away. The teacher said it was the most creative project in the class.'
    statements:
      A: 'This person made a device for reading coded messages using tubes.'
      B: 'This person built a device to hear distant conversations.'
      C: 'This person created an alarm system triggered by movement.'
      D: 'This person invented a way to write and reveal hidden text.'
      E: 'This person built a device for looking around obstacles.'
      F: 'This person designed a gadget that takes secret photographs.'
      G: 'This person created a device that sends messages using light.'
      H: 'This person built a walkie-talkie from household items.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'C'
      Speaker 3: 'E'
      Speaker 4: 'D'
      Speaker 5: 'B'
    explanations:
      Speaker 1: 'Speaker 1 made a device with "two toilet roll tubes" for secret messages wound around tubes — coded message tubes (A).'
      Speaker 1Zh: '说话者1用"两个卷纸筒"制作了密码消息设备——密码消息管（A）。'
      Speaker 2: 'Speaker 2 made "a trip wire alarm" triggered when "someone walks through" — alarm triggered by movement (C).'
      Speaker 2Zh: '说话者2制作了"一个绊线警报"，当"有人走过"时触发——由运动触发的警报（C）。'
      Speaker 3: 'Speaker 3 built a periscope "to see over walls and around corners" — looking around obstacles (E).'
      Speaker 3Zh: '说话者3制作了一个潜望镜"可以看过墙壁和绕过拐角"——绕过障碍物观察（E）。'
      Speaker 4: 'Speaker 4 created invisible ink that reveals text with grape juice — writing and revealing hidden text (D).'
      Speaker 4Zh: '说话者4创造了用葡萄汁显示文字的隐形墨水——书写和显示隐藏文字（D）。'
      Speaker 5: 'Speaker 5 made "a listening device" to hear dad "twenty metres away" — hearing distant conversations (B).'
      Speaker 5Zh: '说话者5制作了"一个监听设备"，能听到二十米外爸爸说话——听到远处的对话（B）。'

  # ============================================================
  # L197: Unusual Jobs in Crime-Solving
  # ============================================================

  - id: L197
    type: multiple-matching
    title: 'Unusual Jobs in Crime-Solving'
    titleZh: '破案中的不寻常工作'
    scene: 'You will hear five professionals talking about their unusual role in solving crimes.'
    sceneZh: '你将听到五位专业人士谈论他们在破案中不寻常的角色。'
    difficulty: 2
    audioFile: 'L197.mp3'
    speakers:
      - name: Speaker 1
        text: 'I am a forensic linguist. My job is to analyse the language in threatening letters, ransom notes, and online messages. Everyone has a unique writing style — the words they choose, how they build sentences, even their spelling mistakes. I once helped identify a blackmailer by noticing that he always used the word "whilst" instead of "while" and put double spaces after full stops, which is quite unusual nowadays.'
      - name: Speaker 2
        text: 'I work as a forensic artist. When witnesses describe a suspect, I create a detailed portrait based on their descriptions. I ask questions like "Were the eyes close together or far apart?" and "Was the chin pointed or rounded?" The most challenging part is that people''s memories are not always accurate, so I often have to draw several versions. My portraits have helped identify suspects in over thirty cases.'
      - name: Speaker 3
        text: 'My title is forensic accountant. I follow the money trail. When someone commits fraud or steals from a company, they try to hide the money by moving it through different bank accounts, sometimes in different countries. I trace every transaction, no matter how small, until I find where the stolen money ended up. It is like solving a puzzle made entirely of numbers.'
      - name: Speaker 4
        text: 'I am a forensic botanist. I study plants to help solve crimes. For example, pollen grains are microscopic and stick to clothing. By identifying the types of pollen on a suspect''s jacket, I can often determine exactly which location they visited. Pollen from different plants blooms at different times of year too, so I can sometimes even work out when the person was at that place.'
      - name: Speaker 5
        text: 'My job is forensic archaeology. I use the same techniques that archaeologists use to study ancient sites, but I apply them to crime scenes. I am trained to recover buried evidence without damaging it. I also study soil layers — different types of soil at different depths can tell us when the ground was disturbed. I work slowly and carefully, sometimes spending days on a single square metre.'
    statements:
      A: 'This person identifies suspects through the way they use written language.'
      B: 'This person traces financial transactions to find hidden money.'
      C: 'This person creates images of suspects from witness descriptions.'
      D: 'This person studies plant material to link suspects to locations.'
      E: 'This person carefully excavates and studies buried evidence.'
      F: 'This person analyses voice recordings to identify speakers.'
      G: 'This person studies blood patterns at crime scenes.'
      H: 'This person uses satellites to track suspect movements.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'C'
      Speaker 3: 'B'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 analyses "language in threatening letters" and identified someone by word choice — written language analysis (A).'
      Speaker 1Zh: '说话者1分析"威胁信中的语言"，通过用词识别了某人——书面语言分析（A）。'
      Speaker 2: 'Speaker 2 creates "a detailed portrait based on descriptions" from witnesses — creating suspect images (C).'
      Speaker 2Zh: '说话者2根据目击者描述"创作详细肖像"——创建嫌疑人图像（C）。'
      Speaker 3: 'Speaker 3 "follows the money trail" and "traces every transaction" — tracing financial transactions (B).'
      Speaker 3Zh: '说话者3"追踪资金流向"和"追踪每一笔交易"——追踪金融交易（B）。'
      Speaker 4: 'Speaker 4 identifies "pollen on a suspect''s jacket" to determine locations — plant material linking to locations (D).'
      Speaker 4Zh: '说话者4通过识别"嫌疑人夹克上的花粉"来确定地点——用植物材料关联地点（D）。'
      Speaker 5: 'Speaker 5 uses archaeology techniques to "recover buried evidence" — excavating buried evidence (E).'
      Speaker 5Zh: '说话者5使用考古技术"找回掩埋的证据"——挖掘掩埋的证据（E）。'

  # ============================================================
  # L198: Detective Gadgets Through History
  # ============================================================

  - id: L198
    type: multiple-matching
    title: 'Detective Gadgets Through History'
    titleZh: '历史上的侦探工具'
    scene: 'You will hear five museum guides each describing a detective tool from a different era.'
    sceneZh: '你将听到五位博物馆导游分别介绍不同时代的侦探工具。'
    difficulty: 2
    audioFile: 'L198.mp3'
    speakers:
      - name: Speaker 1
        text: 'This magnifying glass dates from the eighteen fifties. Before microscopes became widely available, detectives relied on hand-held magnifying glasses like this one to examine evidence up close. This particular glass has a brass frame and a lens that magnifies objects up to ten times their actual size. It was used by a London detective who investigated jewellery thefts. He used it to compare the marks left by different tools on broken locks.'
      - name: Speaker 2
        text: 'This fingerprint kit is from the nineteen twenties. It contains fine aluminium powder, a camel hair brush, lifting tape, and record cards. Before this, fingerprints were mainly recorded using ink pads. The powder method was revolutionary because it could reveal prints on surfaces that were impossible to carry to a police station, like windowsills and door frames. This kit was standard police equipment until the nineteen eighties.'
      - name: Speaker 3
        text: 'Here we have a lie detector machine from the nineteen thirties. It measures three things at once — your heart rate, your breathing, and how much your hands sweat. The theory is that when people lie, their body shows small physical changes. However, modern scientists are quite sceptical about how reliable these machines really are. Some innocent people show stress signals simply because they are nervous about being tested.'
      - name: Speaker 4
        text: 'This is one of the earliest police radios, from nineteen thirty-four. Before two-way radios, police officers on patrol had no way to communicate with their station except by finding a telephone box. This device changed everything — officers could now report crimes instantly and receive instructions while on the move. It weighed about five kilograms and the battery lasted only four hours, but it was considered miraculous at the time.'
      - name: Speaker 5
        text: 'This modern device is a portable DNA analyser, developed in two thousand and fifteen. Traditional DNA testing used to take weeks because samples had to be sent to a laboratory. This machine can analyse a DNA sample in just ninety minutes at the crime scene itself. It has already been used in over five hundred cases worldwide. The technology continues to get faster and smaller every year.'
    statements:
      A: 'This tool measured physical responses to detect dishonesty.'
      B: 'This tool allowed officers to communicate while moving.'
      C: 'This tool was used to examine evidence at very close range.'
      D: 'This tool could reveal marks left on surfaces at a crime scene.'
      E: 'This tool dramatically reduced the time needed for scientific analysis.'
      F: 'This tool was used to record and compare voice patterns.'
      G: 'This tool projected images onto a wall for witnesses to view.'
      H: 'This tool was used to measure distances at crime scenes.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'D'
      Speaker 3: 'A'
      Speaker 4: 'B'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 describes a magnifying glass used to "examine evidence up close" — examining at close range (C).'
      Speaker 1Zh: '说话者1描述了一个用来"近距离检查证据"的放大镜——近距离检查（C）。'
      Speaker 2: 'Speaker 2 describes a fingerprint kit that could "reveal prints on surfaces" — revealing marks on surfaces (D).'
      Speaker 2Zh: '说话者2描述了一个能"在表面上显示指纹"的指纹套件——显示表面上的痕迹（D）。'
      Speaker 3: 'Speaker 3 describes a lie detector measuring "heart rate, breathing, and sweating" — measuring physical responses (A).'
      Speaker 3Zh: '说话者3描述了测量"心率、呼吸和出汗"的测谎仪——测量身体反应（A）。'
      Speaker 4: 'Speaker 4 describes a police radio allowing officers to "communicate while on the move" — communicating while moving (B).'
      Speaker 4Zh: '说话者4描述了让警察"在移动中通信"的警用无线电——移动中通信（B）。'
      Speaker 5: 'Speaker 5 describes a DNA analyser that works "in just ninety minutes" instead of weeks — reducing analysis time (E).'
      Speaker 5Zh: '说话者5描述了一个"只需九十分钟"而非数周的DNA分析仪——减少分析时间（E）。'

  # ============================================================
  # L199: Lessons We Learned From Getting It Wrong
  # ============================================================

  - id: L199
    type: multiple-matching
    title: 'Lessons We Learned From Getting It Wrong'
    titleZh: '从错误中学到的教训'
    scene: 'You will hear five young detectives talking about a mistake they made while investigating.'
    sceneZh: '你将听到五位小侦探谈论他们在调查中犯的错误。'
    difficulty: 2
    audioFile: 'L199.mp3'
    speakers:
      - name: Speaker 1
        text: 'My biggest mistake was jumping to a conclusion too quickly. When biscuits went missing from the kitchen, I immediately blamed my little brother because he loves biscuits. I even told Mum it was him. But then we found crumbs leading to the dog''s bed. Our dog Rex had learned to open the cupboard door with his nose! I felt terrible for accusing my brother and I apologised. Now I always make sure I have proper evidence before accusing anyone.'
      - name: Speaker 2
        text: 'I learned the hard way that you should never destroy evidence. I was investigating who had trampled the flowers in our garden. I found a clear shoe print in the mud, but instead of taking a photo first, I tried to make a plaster cast of it. I mixed the plaster wrong and when I poured it in, it ruined the print completely. If I had taken a photo first, I would still have had a record of the evidence. Lesson learned — always photograph evidence before touching it.'
      - name: Speaker 3
        text: 'My mistake was not writing things down. I was trying to work out who was leaving anonymous notes in my friend''s locker. I interviewed six different people and each gave me useful information. But by the end of the day, I had mixed up who said what and could not remember the important details. After that experience, I always carry a small notebook. Real detectives write everything in a notebook for the same reason.'
      - name: Speaker 4
        text: 'I made the error of working alone when I should have asked for help. I was trying to solve a puzzle at a scout camp that required finding five objects hidden in a forest. I was determined to find them all by myself to prove I was clever. After two hours, I had only found three. Meanwhile, a team of four scouts found all five in twenty minutes by splitting up and searching different areas. Teamwork really is more effective than working alone.'
      - name: Speaker 5
        text: 'The lesson I learned was about keeping an open mind. During a class mystery game, I decided early on that a certain character was guilty and I only looked for evidence that supported my theory. I ignored clues that pointed to someone else. In the end, I got the answer completely wrong. The teacher explained that this is called "confirmation bias" — seeing only what you want to see. Good detectives consider all the evidence, even if it contradicts their theory.'
    statements:
      A: 'This person learned the importance of photographing evidence first.'
      B: 'This person learned not to accuse someone without proper proof.'
      C: 'This person learned that keeping written notes is essential.'
      D: 'This person learned the value of asking others for assistance.'
      E: 'This person learned to consider all evidence, not just evidence supporting one idea.'
      F: 'This person learned to always wear gloves when handling evidence.'
      G: 'This person learned the importance of arriving at a scene quickly.'
      H: 'This person learned to interview suspects separately.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'A'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 blamed their brother without evidence and says "always make sure I have proper evidence before accusing" — not accusing without proof (B).'
      Speaker 1Zh: '说话者1在没有证据的情况下指责了弟弟，说"在指控之前一定要有适当的证据"——没有证据不指控（B）。'
      Speaker 2: 'Speaker 2 ruined a shoe print and says "always photograph evidence before touching it" — photographing evidence first (A).'
      Speaker 2Zh: '说话者2毁了一个鞋印，说"在触摸之前一定要先拍照"——先拍照取证（A）。'
      Speaker 3: 'Speaker 3 mixed up who said what and now "always carries a small notebook" — keeping written notes (C).'
      Speaker 3Zh: '说话者3混淆了谁说了什么，现在"总是随身带一个小笔记本"——做书面记录（C）。'
      Speaker 4: 'Speaker 4 worked alone and failed, while a team succeeded quickly — value of asking for help (D).'
      Speaker 4Zh: '说话者4独自工作失败了，而团队很快就成功了——寻求帮助的价值（D）。'
      Speaker 5: 'Speaker 5 only looked for supporting evidence and learned about "confirmation bias" — considering all evidence (E).'
      Speaker 5Zh: '说话者5只寻找支持性证据，并了解了"确认偏差"——考虑所有证据（E）。'

  # ============================================================
  # L200: Our Dream Detective Adventures
  # ============================================================

  - id: L200
    type: multiple-matching
    title: 'Our Dream Detective Adventures'
    titleZh: '我们梦想中的侦探冒险'
    scene: 'You will hear five young people describing the detective adventure they would most like to have.'
    sceneZh: '你将听到五位年轻人描述他们最想经历的侦探冒险。'
    difficulty: 2
    audioFile: 'L200.mp3'
    speakers:
      - name: Speaker 1
        text: 'If I could have any detective adventure, I would love to explore a sunken pirate ship. Imagine diving down to a wreck on the ocean floor and finding a captain''s cabin still intact. There might be maps, logbooks, and maybe even treasure locked in a chest. I would photograph everything carefully and try to piece together the ship''s story — where it sailed from, what happened to the crew, and why it sank. The ocean hides so many mysteries.'
      - name: Speaker 2
        text: 'My dream adventure would be solving a mystery in an ancient Egyptian tomb. I have always been fascinated by hieroglyphics and the idea that messages were carved into walls thousands of years ago. I would love to be the person who deciphers a text that nobody else can read and discovers something new about how the ancient Egyptians lived. Maybe there are still tombs waiting to be found under the sand.'
      - name: Speaker 3
        text: 'I would choose a wildlife mystery. I would love to go to a remote rainforest and track an animal that scientists think might be extinct. Imagine following footprints, finding droppings, and setting up cameras, and then finally getting a photograph of a creature that everyone thought had disappeared forever. Discovering that a species still exists would be the most exciting moment of my life.'
      - name: Speaker 4
        text: 'My dream detective adventure involves space. I would love to be on the team that analyses samples from Mars and discovers evidence of past life. Even finding a microscopic fossil — a tiny ancient bacterium — would change everything we know about the universe. It would mean that life is not unique to Earth. That would be the biggest mystery ever solved, and I want to be part of it.'
      - name: Speaker 5
        text: 'I dream about investigating a haunted castle. Not because I believe in ghosts — I do not — but because I would love to find the scientific explanation for all the spooky things people report. The cold spots, the strange sounds, the flickering lights — I am sure there are perfectly logical reasons for all of them, like draughts, old pipes, and faulty wiring. Proving that would be just as satisfying as finding a real ghost!'
    statements:
      A: 'This person wants to explore an underwater shipwreck.'
      B: 'This person wants to decode ancient writing in a historical site.'
      C: 'This person wants to find scientific explanations for supposedly supernatural events.'
      D: 'This person wants to discover evidence of life beyond Earth.'
      E: 'This person wants to prove that a thought-to-be-extinct animal still exists.'
      F: 'This person wants to investigate a crime committed on a train.'
      G: 'This person wants to find a hidden city in the jungle.'
      H: 'This person wants to solve a mystery using only old newspaper archives.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'E'
      Speaker 4: 'D'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 wants to "explore a sunken pirate ship" on the ocean floor — underwater shipwreck (A).'
      Speaker 1Zh: '说话者1想"探索一艘沉没的海盗船"——水下沉船（A）。'
      Speaker 2: 'Speaker 2 wants to decipher texts "in an ancient Egyptian tomb" — decoding ancient writing (B).'
      Speaker 2Zh: '说话者2想在"古埃及墓穴中"破译文字——解码古代文字（B）。'
      Speaker 3: 'Speaker 3 wants to "track an animal that scientists think might be extinct" — proving an extinct animal exists (E).'
      Speaker 3Zh: '说话者3想"追踪科学家认为可能已经灭绝的动物"——证明灭绝动物仍然存在（E）。'
      Speaker 4: 'Speaker 4 wants to find "evidence of past life" on Mars — life beyond Earth (D).'
      Speaker 4Zh: '说话者4想在火星上找到"过去生命的证据"——地球以外的生命（D）。'
      Speaker 5: 'Speaker 5 wants to find "scientific explanation for all the spooky things" in a castle — scientific explanations for supernatural events (C).'
      Speaker 5Zh: '说话者5想为城堡中"所有诡异事情找到科学解释"——超自然事件的科学解释（C）。'
