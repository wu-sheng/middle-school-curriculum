# FCE Daily Listening Practice — Month 3, Batch 02
# 65 exercises (L136–L200)
# L136–L165: Part 1 short extracts (30 exercises, difficulty 2)
# L166–L180: Part 2 sentence completion (15 exercises, difficulty 2)
# L181–L200: Part 3 multiple matching (20 exercises, NEW type, difficulty 2)
# Theme: Detective / Mystery / Puzzle stories for 8-9 year old learners

extracts:
  # ============================================================
  # L136–L165: Part 1 — Short Extracts (Detective/Mystery Theme)
  # ============================================================

  # ============================================================
  # L136: The Missing Painting
  # ============================================================

  - id: L136
    type: short-extract
    title: 'The Missing Painting'
    titleZh: '消失的画作'
    scene: 'You will hear a museum guide talking about a stolen painting.'
    sceneZh: '你将听到一位博物馆导游在谈论一幅被偷的画作。'
    difficulty: 2
    audioFile: 'L136.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Good morning everyone. I want to tell you about something rather mysterious that happened here last month. One of our paintings — a small landscape by a local artist — disappeared overnight.'
      - speaker: guide
        voice: nova
        text: 'The strange thing is, we have security cameras covering every entrance and exit, and none of them recorded anything unusual. What amazed everyone was that the security guards heard absolutely nothing. The alarm was not triggered either.'
      - speaker: guide
        voice: nova
        text: 'The police investigated and eventually found the painting hidden behind a false wall in the basement. It turned out that a former employee who knew the building very well had taken it through an old service tunnel.'
    question:
      text: 'What does the guide find most surprising about the theft?'
      textZh: '导游觉得这次盗窃最令人惊讶的是什么？'
      options:
        A: 'Nobody heard anything during the night.'
        B: 'The painting was not very valuable.'
        C: 'The thief left a note behind.'
      answer: 'A'
      explanation: 'The guide says "What amazed everyone was that the security guards heard absolutely nothing."'
      explanationZh: '导游说"让所有人震惊的是，保安什么都没有听到"。'

  # ============================================================
  # L137: The Locked Room
  # ============================================================

  - id: L137
    type: short-extract
    title: 'The Locked Room'
    titleZh: '密室之谜'
    scene: 'You will hear a girl telling her friend about a puzzle she solved.'
    sceneZh: '你将听到一个女孩告诉朋友她解决的一个谜题。'
    difficulty: 2
    audioFile: 'L137.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'You know that escape room we went to on Saturday? It was so tricky! We were stuck in the first room for ages.'
      - speaker: boy
        voice: echo
        text: 'What was the puzzle like?'
      - speaker: girl
        voice: shimmer
        text: 'Well, there was a clock on the wall showing half past three, and a bookshelf with coloured books. We tried everything — moving the books, pressing the clock hands. But the real clue was the numbers on the spines of the books. When we read them in order, they gave us the code for the padlock.'
    question:
      text: 'How did the girl finally solve the puzzle?'
      textZh: '女孩最终是怎么解开谜题的？'
      options:
        A: 'She moved the hands of the clock.'
        B: 'She read numbers on the book spines.'
        C: 'She found a key behind the bookshelf.'
      answer: 'B'
      explanation: 'The girl says "the real clue was the numbers on the spines of the books" which gave them the padlock code.'
      explanationZh: '女孩说"真正的线索是书脊上的数字"，这些数字组成了密码锁的密码。'

  # ============================================================
  # L138: The Secret Message
  # ============================================================

  - id: L138
    type: short-extract
    title: 'The Secret Message'
    titleZh: '秘密消息'
    scene: 'You will hear a teacher telling students about a famous code.'
    sceneZh: '你将听到一位老师给学生讲述一个著名的密码。'
    difficulty: 2
    audioFile: 'L138.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today I want to tell you about the Caesar cipher, which is one of the oldest codes in the world. Julius Caesar used it to send secret messages to his generals over two thousand years ago.'
      - speaker: teacher
        voice: nova
        text: 'The way it works is actually quite simple. You take each letter in your message and shift it forward by a certain number. Caesar always shifted by three. So the letter A becomes D, B becomes E, and so on. The clever part is that only the person who knows the shift number can read the message.'
    question:
      text: 'What made the Caesar cipher effective?'
      textZh: '凯撒密码为什么有效？'
      options:
        A: 'It used very long messages.'
        B: 'Only someone who knew the shift number could read it.'
        C: 'It was written in a different language.'
      answer: 'B'
      explanation: 'The teacher says "only the person who knows the shift number can read the message."'
      explanationZh: '老师说"只有知道偏移数字的人才能读懂消息"。'

  # ============================================================
  # L139: The Footprints in the Garden
  # ============================================================

  - id: L139
    type: short-extract
    title: 'The Footprints in the Garden'
    titleZh: '花园里的脚印'
    scene: 'You will hear a boy describing something strange he found at home.'
    sceneZh: '你将听到一个男孩描述他在家里发现的奇怪事情。'
    difficulty: 2
    audioFile: 'L139.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Mum, come and look! There are huge footprints all through the vegetable garden. They go from the fence to the shed and then back again.'
      - speaker: mum
        voice: nova
        text: 'Goodness! They are quite big, aren''t they? Do you think it was a dog?'
      - speaker: boy
        voice: echo
        text: 'No way — these prints have five toes, like a person but much bigger. And look, whatever it was knocked over the wheelbarrow. I think it was a badger. My nature book says badgers have five toes on each paw and they come out at night looking for worms.'
    question:
      text: 'What does the boy think made the footprints?'
      textZh: '男孩认为是什么留下了脚印？'
      options:
        A: 'A large dog'
        B: 'A person with big feet'
        C: 'A badger'
      answer: 'C'
      explanation: 'The boy says "I think it was a badger" and explains that his nature book describes their five-toed paw prints.'
      explanationZh: '男孩说"我觉得是獾"，并解释他的自然书上描述了獾五趾的爪印特征。'

  # ============================================================
  # L140: The Disappearing Sandwiches
  # ============================================================

  - id: L140
    type: short-extract
    title: 'The Disappearing Sandwiches'
    titleZh: '消失的三明治'
    scene: 'You will hear two children trying to solve a mystery at school.'
    sceneZh: '你将听到两个孩子试图解开学校里的一个谜团。'
    difficulty: 2
    audioFile: 'L140.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'It has happened again! Someone has taken a sandwich from my lunchbox. That is the third time this week.'
      - speaker: boy
        voice: echo
        text: 'That is really annoying. Have you told the teacher?'
      - speaker: girl
        voice: shimmer
        text: 'Yes, but she said she did not see anything. So I came up with a plan. Tomorrow I am going to put a tiny dot of food colouring on the bread. If someone eats it, their lips will turn bright blue. Then we will know who the sandwich thief is!'
    question:
      text: 'What is the girl''s plan to catch the thief?'
      textZh: '女孩打算怎么抓住小偷？'
      options:
        A: 'She will ask the teacher to watch her lunchbox.'
        B: 'She will hide a camera near her bag.'
        C: 'She will put food colouring on the bread.'
      answer: 'C'
      explanation: 'The girl says she will put food colouring on the bread so the thief''s lips turn blue.'
      explanationZh: '女孩说她会在面包上涂食用色素，这样小偷的嘴唇就会变蓝。'

  # ============================================================
  # L141: The Strange Noise
  # ============================================================

  - id: L141
    type: short-extract
    title: 'The Strange Noise in the Attic'
    titleZh: '阁楼里的奇怪声响'
    scene: 'You will hear a girl telling her friend about a noise at her house.'
    sceneZh: '你将听到一个女孩告诉朋友她家里的声响。'
    difficulty: 2
    audioFile: 'L141.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Every night at about eleven o''clock, I hear this scratching sound coming from the attic. It really scared me at first.'
      - speaker: boy
        voice: echo
        text: 'Did you go up and check?'
      - speaker: girl
        voice: shimmer
        text: 'My dad went up with a torch. He did not find anything at first, but then he noticed a small hole in the corner of the roof. A family of squirrels had made a nest up there! They were scratching the wood every time they moved around.'
    question:
      text: 'What was causing the strange noise?'
      textZh: '奇怪的声响是什么引起的？'
      options:
        A: 'A branch hitting the roof in the wind'
        B: 'Squirrels moving around in their nest'
        C: 'Mice running behind the walls'
      answer: 'B'
      explanation: 'The girl explains that a family of squirrels had made a nest in the attic and scratched the wood when they moved.'
      explanationZh: '女孩解释说一家松鼠在阁楼筑了巢，它们移动时会刮擦木头。'

  # ============================================================
  # L142: The Invisible Ink Letter
  # ============================================================

  - id: L142
    type: short-extract
    title: 'The Invisible Ink Letter'
    titleZh: '隐形墨水信'
    scene: 'You will hear a boy explaining a science experiment to his class.'
    sceneZh: '你将听到一个男孩向同学们解释一个科学实验。'
    difficulty: 2
    audioFile: 'L142.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'For my science project, I made invisible ink using lemon juice. You write your message on white paper with a cotton bud dipped in the juice. When the juice dries, the writing disappears completely.'
      - speaker: boy
        voice: echo
        text: 'To read the secret message, you hold the paper near a warm light bulb. The heat makes the lemon juice turn brown, and the letters appear. I tried it with orange juice and vinegar too, but lemon juice worked the best because it turned the darkest brown.'
    question:
      text: 'Why did the boy choose lemon juice over other liquids?'
      textZh: '男孩为什么选择柠檬汁而不是其他液体？'
      options:
        A: 'It was the easiest to find at home.'
        B: 'It produced the darkest colour when heated.'
        C: 'It dried the fastest on paper.'
      answer: 'B'
      explanation: 'The boy says "lemon juice worked the best because it turned the darkest brown."'
      explanationZh: '男孩说"柠檬汁效果最好，因为它变成的棕色最深"。'

  # ============================================================
  # L143: The Map in the Library Book
  # ============================================================

  - id: L143
    type: short-extract
    title: 'The Map in the Library Book'
    titleZh: '图书馆书里的地图'
    scene: 'You will hear a librarian talking about an unusual discovery.'
    sceneZh: '你将听到一位图书管理员谈论一个不寻常的发现。'
    difficulty: 2
    audioFile: 'L143.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'Something wonderful happened last Tuesday. A young reader was borrowing an old adventure novel from the nineteen fifties when a folded piece of paper fell out from between the pages.'
      - speaker: librarian
        voice: nova
        text: 'It turned out to be a hand-drawn map of our town, but from seventy years ago. It showed buildings and streets that no longer exist. The most interesting thing was that someone had drawn a red X next to the old oak tree in the park — as if they had hidden something there. We contacted the local history museum, and they were absolutely thrilled to add it to their collection.'
    question:
      text: 'What happened to the map after it was found?'
      textZh: '地图被发现后怎样了？'
      options:
        A: 'The librarian threw it away.'
        B: 'It was given to the local history museum.'
        C: 'The children went to dig under the oak tree.'
      answer: 'B'
      explanation: 'The librarian says "We contacted the local history museum, and they were absolutely thrilled to add it to their collection."'
      explanationZh: '图书管理员说"我们联系了当地历史博物馆，他们非常高兴地将它收入了馆藏"。'

  # ============================================================
  # L144: The Mystery of the Broken Window
  # ============================================================

  - id: L144
    type: short-extract
    title: 'The Mystery of the Broken Window'
    titleZh: '破窗之谜'
    scene: 'You will hear a father and daughter discussing a broken window.'
    sceneZh: '你将听到父女俩讨论一扇破窗。'
    difficulty: 2
    audioFile: 'L144.mp3'
    script:
      - speaker: dad
        voice: echo
        text: 'The kitchen window is broken. There is glass all over the floor and a cricket ball in the middle of it.'
      - speaker: girl
        voice: shimmer
        text: 'It was not me, Dad! I was at Emma''s house all afternoon.'
      - speaker: dad
        voice: echo
        text: 'I know it was not you. But here is the strange thing — the glass is on the outside of the house, not the inside. That means the ball went from inside the kitchen outwards. So someone inside the house threw it out, not the other way around.'
    question:
      text: 'What does the father discover about the broken window?'
      textZh: '父亲发现了破窗的什么秘密？'
      options:
        A: 'The ball was thrown from inside the house.'
        B: 'A neighbour kicked a football at the window.'
        C: 'The wind blew the window open and it cracked.'
      answer: 'A'
      explanation: 'The father notices the glass is on the outside, meaning the ball went from inside outwards.'
      explanationZh: '父亲注意到玻璃碎片在外面，说明球是从里面往外扔出去的。'

  # ============================================================
  # L145: The Coded Diary
  # ============================================================

  - id: L145
    type: short-extract
    title: 'The Coded Diary'
    titleZh: '密码日记'
    scene: 'You will hear a girl telling her brother about an old diary.'
    sceneZh: '你将听到一个女孩告诉哥哥一本旧日记的事情。'
    difficulty: 2
    audioFile: 'L145.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Look what I found in Grandma''s box — it is a diary from when she was young. But all the entries are written in some kind of code. Every word is spelled backwards!'
      - speaker: boy
        voice: echo
        text: 'That is clever! Can you read any of it?'
      - speaker: girl
        voice: shimmer
        text: 'Yes, once I worked out the trick it was easy. She wrote about her best friend called Mary and their secret den behind the old church. But what really surprised me was that she wrote about wanting to be a pilot. I never knew Grandma wanted to fly planes!'
    question:
      text: 'What surprised the girl most about the diary?'
      textZh: '日记里最让女孩惊讶的是什么？'
      options:
        A: 'That her grandmother had a secret den'
        B: 'That her grandmother wanted to be a pilot'
        C: 'That her grandmother could write in code'
      answer: 'B'
      explanation: 'The girl says "what really surprised me was that she wrote about wanting to be a pilot."'
      explanationZh: '女孩说"最让我惊讶的是她写到自己想当飞行员"。'

  # ============================================================
  # L146: The Treasure Hunt Clue
  # ============================================================

  - id: L146
    type: short-extract
    title: 'The Treasure Hunt Clue'
    titleZh: '寻宝线索'
    scene: 'You will hear two children working on a treasure hunt at a birthday party.'
    sceneZh: '你将听到两个孩子在生日派对上参加寻宝游戏。'
    difficulty: 2
    audioFile: 'L146.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'The clue says "I have hands but cannot clap, a face but cannot smile. Find me and look behind me." What do you think that means?'
      - speaker: girl
        voice: shimmer
        text: 'Hands and a face... it must be a clock! There is a big clock in the hallway. Let me check behind it.'
      - speaker: boy
        voice: echo
        text: 'You were right! There is an envelope taped to the back. The next clue says we need to find something that is full of holes but still holds water.'
    question:
      text: 'Where did the children find the second clue?'
      textZh: '孩子们在哪里找到了第二条线索？'
      options:
        A: 'Inside a cupboard'
        B: 'Behind a clock'
        C: 'Under a table'
      answer: 'B'
      explanation: 'The girl worked out the riddle referred to a clock, and they found the envelope taped behind it.'
      explanationZh: '女孩猜出谜语指的是钟，他们在钟的背面找到了信封。'

  # ============================================================
  # L147: The Mysterious Package
  # ============================================================

  - id: L147
    type: short-extract
    title: 'The Mysterious Package'
    titleZh: '神秘的包裹'
    scene: 'You will hear a boy talking to his mother about a package.'
    sceneZh: '你将听到一个男孩和妈妈谈论一个包裹。'
    difficulty: 2
    audioFile: 'L147.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Mum, a package arrived for us today but there is no name on it — just our address. And it is wrapped in brown paper with a red ribbon.'
      - speaker: mum
        voice: nova
        text: 'That is strange. Open it carefully and see what is inside.'
      - speaker: boy
        voice: echo
        text: 'It is a box of homemade biscuits! And there is a small card that says "Thank you for feeding my cat while I was away." It must be from Mrs Henderson next door. She got back from holiday yesterday.'
    question:
      text: 'Who most likely sent the package?'
      textZh: '最可能是谁寄的包裹？'
      options:
        A: 'A relative who lives far away'
        B: 'A neighbour who went on holiday'
        C: 'A friend from school'
      answer: 'B'
      explanation: 'The card mentions feeding a cat, and the boy recalls that Mrs Henderson next door just returned from holiday.'
      explanationZh: '卡片提到帮忙喂猫，男孩想起隔壁的亨德森太太刚度假回来。'

  # ============================================================
  # L148: The Vanishing Coins
  # ============================================================

  - id: L148
    type: short-extract
    title: 'The Vanishing Coins'
    titleZh: '消失的硬币'
    scene: 'You will hear a street magician explaining a trick to a child.'
    sceneZh: '你将听到一位街头魔术师给孩子解释一个魔术。'
    difficulty: 2
    audioFile: 'L148.mp3'
    script:
      - speaker: magician
        voice: echo
        text: 'Watch closely! I place three coins on the table — one, two, three. Now I cover them with this handkerchief and... when I lift it... the coins are gone!'
      - speaker: girl
        voice: shimmer
        text: 'Wow! Where did they go?'
      - speaker: magician
        voice: echo
        text: 'Ah, a magician never reveals his secrets! But I will give you a hint. The secret is not in the handkerchief — it is in the table. This table has a special flap that opens when I press my knee against it underneath. The coins slide through and land in a hidden tray below.'
    question:
      text: 'How does the magic trick really work?'
      textZh: '这个魔术到底是怎么变的？'
      options:
        A: 'The coins are hidden inside the handkerchief.'
        B: 'The coins fall through a flap in the table.'
        C: 'The magician hides the coins in his hand.'
      answer: 'B'
      explanation: 'The magician reveals that a special flap in the table opens when he presses his knee, and the coins slide into a hidden tray.'
      explanationZh: '魔术师透露桌子上有一个特殊的翻板，他用膝盖一按就会打开，硬币滑进下面的隐藏托盘。'

  # ============================================================
  # L149: The Wrong Suitcase
  # ============================================================

  - id: L149
    type: short-extract
    title: 'The Wrong Suitcase'
    titleZh: '拿错的行李箱'
    scene: 'You will hear a woman talking to an airport officer about her luggage.'
    sceneZh: '你将听到一位女士在机场与工作人员谈论她的行李。'
    difficulty: 2
    audioFile: 'L149.mp3'
    script:
      - speaker: woman
        voice: nova
        text: 'Excuse me, I picked up this black suitcase from the carousel, but when I opened it at the hotel, it was full of someone else''s clothes. The suitcase looks exactly like mine — same brand, same colour, same size.'
      - speaker: officer
        voice: echo
        text: 'That happens more often than you might think. Do you have your luggage tag receipt?'
      - speaker: woman
        voice: nova
        text: 'Yes, here it is. The tag number is BL seven nine three four. I should have tied a coloured ribbon on the handle like my husband suggested. He always says that black suitcases all look the same.'
    question:
      text: 'What does the woman wish she had done?'
      textZh: '这位女士希望自己之前做了什么？'
      options:
        A: 'Bought a different colour suitcase'
        B: 'Tied a ribbon on her suitcase handle'
        C: 'Written her name on the outside'
      answer: 'B'
      explanation: 'The woman says "I should have tied a coloured ribbon on the handle like my husband suggested."'
      explanationZh: '女士说"我应该像丈夫建议的那样在把手上系一条彩色丝带"。'

  # ============================================================
  # L150: The Hidden Room
  # ============================================================

  - id: L150
    type: short-extract
    title: 'The Hidden Room'
    titleZh: '隐藏的房间'
    scene: 'You will hear a tour guide talking about an old castle.'
    sceneZh: '你将听到一位导游讲述一座古堡的故事。'
    difficulty: 2
    audioFile: 'L150.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'This castle is over four hundred years old, and it still has plenty of secrets. In two thousand and fifteen, builders were repairing a wall on the second floor when they found a hidden room behind the fireplace.'
      - speaker: guide
        voice: nova
        text: 'Inside the room, there was a small wooden chest containing old letters and a gold ring. Historians believe the room was a priest hole — a secret hiding place used during a time when it was dangerous to practise certain religions. The room was just big enough for one person to sit in.'
    question:
      text: 'What was the hidden room originally used for?'
      textZh: '这个隐藏的房间最初是用来做什么的？'
      options:
        A: 'Storing valuable treasure'
        B: 'Hiding a person during dangerous times'
        C: 'Keeping important documents safe'
      answer: 'B'
      explanation: 'The guide says historians believe it was a "priest hole" — a hiding place used during times of religious danger.'
      explanationZh: '导游说历史学家认为这是一个"牧师洞"——在宗教迫害时期用来藏人的密室。'

  # ============================================================
  # L151: The Dog That Found the Evidence
  # ============================================================

  - id: L151
    type: short-extract
    title: 'The Dog That Found the Evidence'
    titleZh: '找到证据的狗'
    scene: 'You will hear a police officer talking to school children about a working dog.'
    sceneZh: '你将听到一位警察给学生讲述一条工作犬的故事。'
    difficulty: 2
    audioFile: 'L151.mp3'
    script:
      - speaker: officer
        voice: echo
        text: 'This is Baxter, our search dog. He has been working with us for five years now. Last year, he helped solve a really important case.'
      - speaker: officer
        voice: echo
        text: 'Someone had stolen jewellery from a shop and hidden it somewhere in a large park. We searched for hours and found nothing. Then we brought in Baxter. Within twenty minutes, he started digging near a bench and uncovered a bag buried under the soil. All the missing jewellery was inside. His nose is a hundred times more sensitive than ours.'
    question:
      text: 'How long did it take Baxter to find the jewellery?'
      textZh: '巴克斯特花了多长时间找到珠宝？'
      options:
        A: 'About five hours'
        B: 'About twenty minutes'
        C: 'About two days'
      answer: 'B'
      explanation: 'The officer says "Within twenty minutes, he started digging near a bench and uncovered a bag."'
      explanationZh: '警察说"不到二十分钟，他就开始在长椅旁边挖掘，发现了一个袋子"。'

  # ============================================================
  # L152: The Fingerprint Workshop
  # ============================================================

  - id: L152
    type: short-extract
    title: 'The Fingerprint Workshop'
    titleZh: '指纹工作坊'
    scene: 'You will hear a science teacher explaining how to collect fingerprints.'
    sceneZh: '你将听到一位科学老师讲解如何采集指纹。'
    difficulty: 2
    audioFile: 'L152.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today we are going to learn how real detectives collect fingerprints. First, you need a smooth surface — glass works best. Press your thumb firmly onto the glass.'
      - speaker: teacher
        voice: nova
        text: 'Now, take this fine powder — it is actually just cocoa powder — and brush it gently over the glass with a soft paintbrush. You will see your fingerprint appear like magic. The powder sticks to the oils left by your skin. Then you press sticky tape over the print and lift it off. Every person''s fingerprints are unique, which is why police use them to identify people.'
    question:
      text: 'Why does the powder reveal the fingerprint?'
      textZh: '为什么粉末能显示指纹？'
      options:
        A: 'It reacts chemically with the glass.'
        B: 'It sticks to the oils left by the skin.'
        C: 'It changes colour when it touches water.'
      answer: 'B'
      explanation: 'The teacher explains that "the powder sticks to the oils left by your skin."'
      explanationZh: '老师解释说"粉末会附着在皮肤留下的油脂上"。'

  # ============================================================
  # L153: The Mysterious Footsteps
  # ============================================================

  - id: L153
    type: short-extract
    title: 'The Mysterious Footsteps'
    titleZh: '神秘的脚步声'
    scene: 'You will hear a radio presenter telling a ghost story.'
    sceneZh: '你将听到一位电台主持人讲鬼故事。'
    difficulty: 2
    audioFile: 'L153.mp3'
    script:
      - speaker: presenter
        voice: nova
        text: 'And now for our spooky story of the week. Mr Collins moved into an old cottage last autumn. Every evening at exactly nine o''clock, he heard footsteps walking across the floor above him, even though no one else lived there.'
      - speaker: presenter
        voice: nova
        text: 'He was quite frightened until a plumber came to fix the heating. The plumber discovered that the old metal pipes in the ceiling expand when the heating turns on at nine o''clock, and the expanding metal makes a sound exactly like someone walking. Mystery solved — no ghosts, just pipes!'
    question:
      text: 'What was actually causing the footstep sounds?'
      textZh: '脚步声的真正原因是什么？'
      options:
        A: 'A neighbour walking upstairs'
        B: 'Metal pipes expanding from the heat'
        C: 'Mice running inside the walls'
      answer: 'B'
      explanation: 'The plumber found that old metal pipes expand when the heating turns on, making a walking sound.'
      explanationZh: '水管工发现老旧的金属管道在暖气开启时会膨胀，发出像走路一样的声音。'

  # ============================================================
  # L154: The Puzzle Box
  # ============================================================

  - id: L154
    type: short-extract
    title: 'The Puzzle Box'
    titleZh: '机关盒'
    scene: 'You will hear a girl showing her friend a special box.'
    sceneZh: '你将听到一个女孩向朋友展示一个特别的盒子。'
    difficulty: 2
    audioFile: 'L154.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'My grandfather gave me this Japanese puzzle box. It looks like a normal wooden box, but you cannot just lift the lid to open it.'
      - speaker: boy
        voice: echo
        text: 'So how do you open it?'
      - speaker: girl
        voice: shimmer
        text: 'You have to slide the panels in the right order. This one first, then this one, then push this corner. It takes twelve moves to open it. Grandpa said Japanese craftsmen have been making these for over a hundred and fifty years. He keeps a small key inside his.'
    question:
      text: 'How many moves does it take to open the puzzle box?'
      textZh: '打开这个机关盒需要几步？'
      options:
        A: 'Six moves'
        B: 'Twelve moves'
        C: 'Twenty moves'
      answer: 'B'
      explanation: 'The girl says "It takes twelve moves to open it."'
      explanationZh: '女孩说"需要十二步才能打开它"。'

  # ============================================================
  # L155: The Compass Clue
  # ============================================================

  - id: L155
    type: short-extract
    title: 'The Compass Clue'
    titleZh: '指南针线索'
    scene: 'You will hear a scout leader giving directions during an orienteering activity.'
    sceneZh: '你将听到一位童子军领队在定向越野活动中给出指示。'
    difficulty: 2
    audioFile: 'L155.mp3'
    script:
      - speaker: leader
        voice: echo
        text: 'Right, teams, listen carefully. Your next clue is hidden at the point where you walk exactly two hundred metres due north from the old bridge, and then turn east for another fifty metres.'
      - speaker: leader
        voice: echo
        text: 'But be careful — the compass reading near the iron gate is not accurate because the metal affects the needle. A few teams last year went completely the wrong way because of that. So make sure you pass the gate before you take your compass reading. Good luck!'
    question:
      text: 'Why might the compass give a wrong reading near the gate?'
      textZh: '为什么指南针在铁门附近可能会读数不准？'
      options:
        A: 'The battery in the compass is low.'
        B: 'The metal gate affects the compass needle.'
        C: 'The gate blocks the view of the sun.'
      answer: 'B'
      explanation: 'The leader warns that "the metal affects the needle" near the iron gate.'
      explanationZh: '领队警告说铁门附近"金属会影响指针"。'

  # ============================================================
  # L156: The Missing Jigsaw Piece
  # ============================================================

  - id: L156
    type: short-extract
    title: 'The Missing Jigsaw Piece'
    titleZh: '丢失的拼图块'
    scene: 'You will hear a boy talking about finishing a jigsaw puzzle.'
    sceneZh: '你将听到一个男孩谈论完成拼图的事。'
    difficulty: 2
    audioFile: 'L156.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I spent the whole weekend working on a one-thousand-piece jigsaw puzzle of a pirate ship. When I got to the very last piece, it was missing! I looked everywhere — under the table, behind the sofa, even in the rubbish bin.'
      - speaker: boy
        voice: echo
        text: 'Then my little sister came in holding something behind her back. She had taken the last piece because she wanted to be the one to put it in. I was annoyed at first, but then she said she just wanted to help, so we put the final piece in together.'
    question:
      text: 'Who had the missing jigsaw piece?'
      textZh: '谁拿了那块丢失的拼图？'
      options:
        A: 'The boy found it under the sofa.'
        B: 'His mother had put it away by mistake.'
        C: 'His little sister had taken it.'
      answer: 'C'
      explanation: 'The boy says his little sister had taken the last piece because she wanted to be the one to put it in.'
      explanationZh: '男孩说他的小妹妹拿走了最后一块，因为她想自己放上去。'

  # ============================================================
  # L157: The Colour-Changing Potion
  # ============================================================

  - id: L157
    type: short-extract
    title: 'The Colour-Changing Potion'
    titleZh: '变色药水'
    scene: 'You will hear a science club leader showing an experiment.'
    sceneZh: '你将听到科学社团负责人展示一个实验。'
    difficulty: 2
    audioFile: 'L157.mp3'
    script:
      - speaker: leader
        voice: nova
        text: 'Watch this! I have a glass of what looks like water. Now I am going to add a few drops from this bottle. See how the liquid turns bright purple? And now if I add vinegar... it changes to red!'
      - speaker: leader
        voice: nova
        text: 'This is red cabbage juice. It works as a natural indicator — that means it changes colour depending on whether something is an acid or a base. Acids like vinegar turn it red, and bases like baking soda turn it green. Scientists use indicators like this to test unknown liquids safely.'
    question:
      text: 'What makes the red cabbage juice change colour?'
      textZh: '是什么让紫甘蓝汁变色？'
      options:
        A: 'The temperature of the liquid'
        B: 'Whether the liquid is an acid or a base'
        C: 'How much water is added'
      answer: 'B'
      explanation: 'The leader explains that red cabbage juice "changes colour depending on whether something is an acid or a base."'
      explanationZh: '负责人解释说紫甘蓝汁"会根据液体是酸性还是碱性来变色"。'

  # ============================================================
  # L158: The Time Capsule
  # ============================================================

  - id: L158
    type: short-extract
    title: 'The Time Capsule'
    titleZh: '时间胶囊'
    scene: 'You will hear a headteacher talking at a school assembly about a time capsule.'
    sceneZh: '你将听到校长在学校集会上谈论一个时间胶囊。'
    difficulty: 2
    audioFile: 'L158.mp3'
    script:
      - speaker: headteacher
        voice: nova
        text: 'I have exciting news. As you know, the builders have been digging up the old playground to lay new pipes. Yesterday, they found a metal box buried one metre underground.'
      - speaker: headteacher
        voice: nova
        text: 'It was a time capsule buried by pupils of this school in nineteen seventy-five — that is over fifty years ago! Inside, we found class photographs, drawings, a list of children''s favourite foods, and a letter addressed to "the future pupils of Hillside Primary." The most touching item was a cassette tape with the children singing their school song. We are going to try to play it at next week''s assembly.'
    question:
      text: 'What does the headteacher plan to do with the cassette tape?'
      textZh: '校长打算怎么处理那盘磁带？'
      options:
        A: 'Send it to a museum for display'
        B: 'Play it at next week''s assembly'
        C: 'Give it to the children who buried it'
      answer: 'B'
      explanation: 'The headteacher says "We are going to try to play it at next week''s assembly."'
      explanationZh: '校长说"我们打算在下周的集会上试着播放它"。'

  # ============================================================
  # L159: The Spy Gadget
  # ============================================================

  - id: L159
    type: short-extract
    title: 'The Spy Gadget'
    titleZh: '间谍小工具'
    scene: 'You will hear a boy describing a periscope he made.'
    sceneZh: '你将听到一个男孩描述他做的潜望镜。'
    difficulty: 2
    audioFile: 'L159.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I made a periscope from two cardboard tubes and two small mirrors. You tape the mirrors inside at forty-five degree angles, one at the top and one at the bottom.'
      - speaker: boy
        voice: echo
        text: 'When you look through the bottom hole, the light bounces off the first mirror, travels down the tube, hits the second mirror, and reaches your eye. It means you can see over walls and around corners without being seen. Submarines use the same idea but with much bigger mirrors and lenses. My sister did not believe it worked until she tried it herself.'
    question:
      text: 'What convinced the boy''s sister that the periscope worked?'
      textZh: '是什么让男孩的姐姐相信潜望镜有效？'
      options:
        A: 'She read about it in a book.'
        B: 'She saw a video online.'
        C: 'She tried it herself.'
      answer: 'C'
      explanation: 'The boy says "My sister did not believe it worked until she tried it herself."'
      explanationZh: '男孩说"我姐姐直到自己试了才相信它能用"。'

  # ============================================================
  # L160: The Whispering Gallery
  # ============================================================

  - id: L160
    type: short-extract
    title: 'The Whispering Gallery'
    titleZh: '回音廊'
    scene: 'You will hear a tour guide explaining a special feature of a famous building.'
    sceneZh: '你将听到一位导游解释一座著名建筑的特殊功能。'
    difficulty: 2
    audioFile: 'L160.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Welcome to the Whispering Gallery. This curved walkway runs around the inside of the dome, thirty metres above the floor. The amazing thing is that if you whisper very quietly while facing the wall on one side, a person standing on the opposite side — over thirty metres away — can hear you perfectly clearly.'
      - speaker: guide
        voice: nova
        text: 'This happens because the sound waves travel along the curved surface of the wall. The dome shape keeps the sound close to the wall instead of letting it spread out into the air. It was not designed to work this way — the architect discovered the effect by accident after the building was finished.'
    question:
      text: 'How was the whispering effect discovered?'
      textZh: '耳语效应是如何被发现的？'
      options:
        A: 'Scientists planned it carefully.'
        B: 'The architect discovered it by accident.'
        C: 'Visitors complained about strange echoes.'
      answer: 'B'
      explanation: 'The guide says "the architect discovered the effect by accident after the building was finished."'
      explanationZh: '导游说"建筑师在建筑完工后偶然发现了这个效应"。'

  # ============================================================
  # L161: The Mysterious Lights
  # ============================================================

  - id: L161
    type: short-extract
    title: 'The Mysterious Lights'
    titleZh: '神秘的光'
    scene: 'You will hear a park ranger explaining a natural phenomenon.'
    sceneZh: '你将听到一位公园护林员解释一种自然现象。'
    difficulty: 2
    audioFile: 'L161.mp3'
    script:
      - speaker: ranger
        voice: echo
        text: 'Visitors sometimes tell us they have seen strange glowing lights in the forest at night. Some people think they are ghosts, but actually the explanation is much more interesting.'
      - speaker: ranger
        voice: echo
        text: 'The lights come from a type of fungus that grows on rotting wood. It produces a chemical reaction that creates a soft green glow, just like a firefly does. This is called bioluminescence. The fungus glows to attract insects, which then help spread its tiny spores to new pieces of wood. It is completely harmless and really quite beautiful.'
    question:
      text: 'Why does the fungus glow?'
      textZh: '真菌为什么会发光？'
      options:
        A: 'To warn animals to stay away'
        B: 'To attract insects that spread its spores'
        C: 'To absorb more moonlight for energy'
      answer: 'B'
      explanation: 'The ranger says "The fungus glows to attract insects, which then help spread its tiny spores."'
      explanationZh: '护林员说"真菌发光是为了吸引昆虫，昆虫帮助传播它的孢子"。'

  # ============================================================
  # L162: The Riddle Contest
  # ============================================================

  - id: L162
    type: short-extract
    title: 'The Riddle Contest'
    titleZh: '猜谜比赛'
    scene: 'You will hear two students preparing for a class riddle competition.'
    sceneZh: '你将听到两个学生为班级猜谜比赛做准备。'
    difficulty: 2
    audioFile: 'L162.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I have got a really good riddle for the contest. Listen: I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. What am I?'
      - speaker: boy
        voice: echo
        text: 'Hmm... speaks without a mouth... comes alive with the wind... is it an echo?'
      - speaker: girl
        voice: shimmer
        text: 'Yes! That was too easy for you. The key clue is "hear without ears" — an echo repeats what you say, so it seems to hear you, but it is just sound bouncing off a surface. I need to find a harder one for the actual contest.'
    question:
      text: 'Why does the girl want to change her riddle?'
      textZh: '女孩为什么想换一个谜语？'
      options:
        A: 'The answer was wrong.'
        B: 'Her friend solved it too easily.'
        C: 'The teacher said it was not allowed.'
      answer: 'B'
      explanation: 'The girl says "That was too easy for you" and "I need to find a harder one for the actual contest."'
      explanationZh: '女孩说"对你来说太简单了"和"我需要找一个更难的用于正式比赛"。'

  # ============================================================
  # L163: The Shadow Experiment
  # ============================================================

  - id: L163
    type: short-extract
    title: 'The Shadow Experiment'
    titleZh: '影子实验'
    scene: 'You will hear a teacher describing a shadow experiment outdoors.'
    sceneZh: '你将听到一位老师描述一个户外影子实验。'
    difficulty: 2
    audioFile: 'L163.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'This afternoon we are going to track how shadows change throughout the day. Each group will place a stick in the ground and mark the tip of its shadow every thirty minutes from ten o''clock until three.'
      - speaker: teacher
        voice: nova
        text: 'You will notice two things. First, the shadow is longest in the morning and afternoon but shortest around midday. Second, the shadow moves from west in the morning to east in the afternoon. That is because the sun travels from east to west across the sky. In the old days, people used shadow sticks just like this as simple clocks called sundials.'
    question:
      text: 'When is the shadow at its shortest?'
      textZh: '影子什么时候最短？'
      options:
        A: 'In the early morning'
        B: 'Around midday'
        C: 'In the late afternoon'
      answer: 'B'
      explanation: 'The teacher says "the shadow is longest in the morning and afternoon but shortest around midday."'
      explanationZh: '老师说"影子在早上和下午最长，但在中午最短"。'

  # ============================================================
  # L164: The Broken Cipher
  # ============================================================

  - id: L164
    type: short-extract
    title: 'The Broken Cipher'
    titleZh: '被破解的密码'
    scene: 'You will hear a museum guide talking about codebreaking in history.'
    sceneZh: '你将听到一位博物馆导游讲述历史上的密码破译。'
    difficulty: 2
    audioFile: 'L164.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'During the Second World War, a team of brilliant mathematicians worked here at Bletchley Park to crack enemy codes. The most famous was a machine called Enigma, which the enemy used to send secret messages.'
      - speaker: guide
        voice: nova
        text: 'The team, led by Alan Turing, built a special machine called the Bombe to test thousands of possible settings every day. Breaking the Enigma code is believed to have shortened the war by about two years and saved countless lives. Turing is now considered one of the founders of modern computer science.'
    question:
      text: 'What is Alan Turing famous for in addition to codebreaking?'
      textZh: '除了破译密码，艾伦·图灵还因什么而出名？'
      options:
        A: 'Designing the Enigma machine'
        B: 'Being a founder of modern computer science'
        C: 'Inventing the first radio transmitter'
      answer: 'B'
      explanation: 'The guide says "Turing is now considered one of the founders of modern computer science."'
      explanationZh: '导游说"图灵现在被认为是现代计算机科学的奠基人之一"。'

  # ============================================================
  # L165: The Message in the Bottle
  # ============================================================

  - id: L165
    type: short-extract
    title: 'The Message in the Bottle'
    titleZh: '瓶中信'
    scene: 'You will hear a girl telling her class about something she found at the beach.'
    sceneZh: '你将听到一个女孩在班上讲述她在海滩上的发现。'
    difficulty: 2
    audioFile: 'L165.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Last summer, I was walking along the beach in Cornwall when I spotted a glass bottle half-buried in the sand. Inside, there was a rolled-up piece of paper with a message written in pencil.'
      - speaker: girl
        voice: shimmer
        text: 'The message said: "My name is Olaf. I am twelve years old. I threw this bottle into the sea from Norway on the fifth of January." It was dated three years earlier! The bottle had travelled all the way from Norway to England. I wrote back to the address on the note, and now Olaf and I are pen pals. We send each other letters every month.'
    question:
      text: 'What was the result of finding the bottle?'
      textZh: '找到瓶子的结果是什么？'
      options:
        A: 'The girl started a bottle collection.'
        B: 'The girl became pen pals with the sender.'
        C: 'The girl returned the bottle to Norway.'
      answer: 'B'
      explanation: 'The girl says "I wrote back to the address on the note, and now Olaf and I are pen pals."'
      explanationZh: '女孩说"我按纸条上的地址回信了，现在我和奥拉夫成了笔友"。'

  # ============================================================
  # L166–L180: Part 2 — Sentence Completion (Detective/Mystery Theme)
  # ============================================================

  # ============================================================
  # L166: The Junior Detective Club
  # ============================================================

  - id: L166
    type: sentence-completion
    title: 'The Junior Detective Club'
    titleZh: '少年侦探社'
    scene: 'You will hear a girl talking about starting a detective club at her school.'
    sceneZh: '你将听到一个女孩讲述她在学校成立侦探社的经历。'
    difficulty: 2
    audioFile: 'L166.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'My name is Emily and I started the Junior Detective Club at my school last September. I got the idea after reading a Sherlock Holmes story during the summer holidays.'
      - speaker: girl
        voice: shimmer
        text: 'At first, only three of us joined — me, my best friend Lily, and a boy called Marcus who loves puzzles. But by Christmas, the club had grown to fifteen members. We meet every Wednesday after school in the science room because it has big tables where we can spread out our materials.'
      - speaker: girl
        voice: shimmer
        text: 'Each week, I prepare a mystery for the club to solve. Sometimes it is a logic puzzle, like working out who stole a cake based on clues. Other times, it is a practical challenge, like finding a hidden object in the playground using a coded map.'
      - speaker: girl
        voice: shimmer
        text: 'The most popular activity so far has been fingerprint analysis. I taught everyone how to dust for prints using talcum powder and a soft brush. We practised on glass jars and even identified each other by our thumbprints.'
      - speaker: girl
        voice: shimmer
        text: 'Our biggest case happened in October. Someone kept moving things around in the library — books were ending up on the wrong shelves and chairs were stacked in funny patterns. The librarian was quite puzzled.'
      - speaker: girl
        voice: shimmer
        text: 'We set up an observation schedule and took turns watching the library during break times. After two days, Marcus noticed that a first-year student was rearranging the books so that the first letters of the titles on each shelf spelled out a message. It said "Happy Birthday Mrs Cooper" — that was the librarian''s name! The student had been planning a secret surprise all along.'
      - speaker: girl
        voice: shimmer
        text: 'Next term, I want to invite a real police officer to come and talk to us about how they investigate crimes. I have already written a letter to the local police station.'
      - speaker: girl
        voice: shimmer
        text: 'The best thing about the club is that it teaches us to pay attention to small details. My teachers say I am much better at spotting mistakes in my homework now, and I think detective skills are the reason!'
    sentences:
      - id: L166-S1
        text: 'Emily got the idea for the club after reading a _____ story.'
        textZh: 'Emily在暑假读了一个 _____ 故事后有了成立俱乐部的想法。'
        answer: 'Sherlock Holmes'
      - id: L166-S2
        text: 'By Christmas, the club had grown to _____ members.'
        textZh: '到圣诞节时，俱乐部已经增长到 _____ 名成员。'
        answer: 'fifteen'
      - id: L166-S3
        text: 'The club meets in the _____ room every Wednesday.'
        textZh: '俱乐部每周三在 _____ 室聚会。'
        answer: 'science'
      - id: L166-S4
        text: 'The most popular activity has been fingerprint _____.'
        textZh: '最受欢迎的活动是指纹 _____。'
        answer: 'analysis'
      - id: L166-S5
        text: 'The hidden message in the library books said "Happy Birthday Mrs _____."'
        textZh: '图书馆书里隐藏的信息写着"生日快乐，_____ 女士"。'
        answer: 'Cooper'
      - id: L166-S6
        text: 'Emily wants to invite a real _____ to talk to the club next term.'
        textZh: 'Emily想邀请一位真正的 _____ 下学期来俱乐部讲话。'
        answer: 'police officer'

  # ============================================================
  # L167: The History of Secret Codes
  # ============================================================

  - id: L167
    type: sentence-completion
    title: 'The History of Secret Codes'
    titleZh: '密码的历史'
    scene: 'You will hear a teacher giving a talk about the history of codes and ciphers.'
    sceneZh: '你将听到一位老师讲述密码和暗号的历史。'
    difficulty: 2
    audioFile: 'L167.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Good morning, everyone. Today I am going to take you on a journey through the fascinating history of secret codes. People have been hiding messages in clever ways for thousands of years.'
      - speaker: teacher
        voice: nova
        text: 'The very first known code was used by the ancient Spartans around two thousand five hundred years ago. They wrapped a strip of leather around a wooden stick called a scytale. The message was written on the leather while it was wrapped. When you unwound the strip, the letters looked like nonsense — but if you wound it around a stick of exactly the same width, you could read it again.'
      - speaker: teacher
        voice: nova
        text: 'Then there is the famous pigpen cipher, which was used by a secret society called the Freemasons in the seventeen hundreds. In this cipher, each letter of the alphabet is replaced by a small geometric shape — a square, a triangle, or a dot inside a shape. It looks a bit like alien writing, but it is actually very easy once you know the grid.'
      - speaker: teacher
        voice: nova
        text: 'During the First World War, both sides used codebooks. A codebook is like a dictionary where each common word or phrase has a matching code number. The problem with codebooks was that if the enemy captured one, all your messages were exposed.'
      - speaker: teacher
        voice: nova
        text: 'The biggest breakthrough in code history was the invention of the Enigma machine in the nineteen twenties. It could create millions of different settings, and the settings were changed every single day. It took years for the codebreakers at Bletchley Park to find a way to crack it.'
      - speaker: teacher
        voice: nova
        text: 'Today, we use digital encryption to protect our information. When you see a little padlock icon in your web browser, that means the information you send is scrambled using mathematics so complicated that even the fastest computers would need billions of years to break it.'
      - speaker: teacher
        voice: nova
        text: 'Next week, I will show you how to create your own pigpen cipher and write secret messages to your friends. Please bring a ruler and some graph paper.'
    sentences:
