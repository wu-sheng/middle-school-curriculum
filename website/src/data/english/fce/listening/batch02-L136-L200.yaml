        answer: 'seven'
      - id: L173-S2
        text: 'The first trick Tom learned was called the _____.'
        textZh: 'Tom学的第一个魔术叫 _____。'
        answer: 'Rising Card'
      - id: L173-S3
        text: 'The most important rule in magic is called _____.'
        textZh: '魔术中最重要的规则叫做 _____。'
        answer: 'misdirection'
      - id: L173-S4
        text: 'Tom practises for at least _____ minutes every day.'
        textZh: 'Tom每天至少练习 _____ 分钟。'
        answer: 'forty-five'
      - id: L173-S5
        text: 'Tom''s dream is to perform at the _____ Festival.'
        textZh: 'Tom的梦想是在 _____ 节上表演。'
        answer: 'Edinburgh'
      - id: L173-S6
        text: 'Tom recommends practising each trick at least _____ times before showing anyone.'
        textZh: 'Tom建议每个魔术至少练习 _____ 次再展示给别人看。'
        answer: 'a hundred'

  # ============================================================
  # L174: The Underwater Caves
  # ============================================================

  - id: L174
    type: sentence-completion
    title: 'The Underwater Caves'
    titleZh: '水下洞穴'
    scene: 'You will hear a diver talking about exploring underwater caves in Mexico.'
    sceneZh: '你将听到一位潜水员讲述在墨西哥探索水下洞穴的经历。'
    difficulty: 2
    audioFile: 'L174.mp3'
    script:
      - speaker: diver
        voice: echo
        text: 'I am an underwater cave diver, and I have explored some of the most amazing cave systems in the world. The ones I want to tell you about today are the cenotes of Mexico''s Yucatan Peninsula.'
      - speaker: diver
        voice: echo
        text: 'Cenotes are natural pools formed when limestone rock collapses and reveals underground rivers. The ancient Maya people believed cenotes were entrances to the underworld. There are more than six thousand cenotes in the Yucatan region.'
      - speaker: diver
        voice: echo
        text: 'The water in cenotes is incredibly clear — you can see up to a hundred metres in some places. This is because the limestone filters the water as it passes through. Diving in a cenote feels like floating in liquid glass.'
      - speaker: diver
        voice: echo
        text: 'One of my most memorable dives was in a cenote called Dos Ojos, which means "Two Eyes" in Spanish. It is named after two circular openings in the rock that look like a pair of eyes from above. The cave system stretches for over eighty kilometres underground.'
      - speaker: diver
        voice: echo
        text: 'Cave diving is very different from regular diving. You must always carry at least three torches because if your light fails underground, you are in complete darkness. We also use a thin guide line — a rope that we attach at the entrance and unroll as we swim deeper, so we can always find our way back.'
      - speaker: diver
        voice: echo
        text: 'The most exciting part of my job is discovering passages that no human has ever entered before. Last year, I found a chamber decorated with beautiful crystal formations that sparkled like diamonds in my torchlight. I named it the Crystal Room.'
    sentences:
      - id: L174-S1
        text: 'Cenotes are formed when _____ rock collapses.'
        textZh: '天然井是 _____ 岩石坍塌时形成的。'
        answer: 'limestone'
      - id: L174-S2
        text: 'There are more than _____ cenotes in the Yucatan region.'
        textZh: '尤卡坦地区有超过 _____ 个天然井。'
        answer: 'six thousand'
      - id: L174-S3
        text: '"Dos Ojos" means "_____ Eyes" in Spanish.'
        textZh: '"Dos Ojos"在西班牙语中意思是" _____ 只眼睛"。'
        answer: 'Two'
      - id: L174-S4
        text: 'Cave divers must always carry at least _____ torches.'
        textZh: '洞穴潜水员必须至少携带 _____ 支手电筒。'
        answer: 'three'
      - id: L174-S5
        text: 'Divers use a thin _____ to find their way back to the entrance.'
        textZh: '潜水员用一条细 _____ 来找回入口的路。'
        answer: 'guide line'

  # ============================================================
  # L175: The Code-Breaking Competition
  # ============================================================

  - id: L175
    type: sentence-completion
    title: 'The Code-Breaking Competition'
    titleZh: '密码破译比赛'
    scene: 'You will hear a boy describing a code-breaking competition he entered.'
    sceneZh: '你将听到一个男孩描述他参加的密码破译比赛。'
    difficulty: 2
    audioFile: 'L175.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Last month, our school entered a nationwide code-breaking competition called Cipher Challenge. Teams of four students had to solve eight coded messages over six weeks. Each message was harder than the last.'
      - speaker: boy
        voice: echo
        text: 'Our team was called the Secret Four — that is me, my friend Aisha, Charlie, and Priya. We met every lunchtime in the computer room to work on the codes.'
      - speaker: boy
        voice: echo
        text: 'The first three codes were substitution ciphers, where each letter is replaced by a different letter. We cracked those in about two hours each by looking for common letter patterns. In English, the most common letter is E, so we always started by looking for the most frequent symbol.'
      - speaker: boy
        voice: echo
        text: 'Code number five was the hardest. It used something called a Vigenere cipher, which uses a keyword to shift each letter by a different amount. It took us three days to figure out that the keyword was "Neptune." Aisha was the one who finally spotted it.'
      - speaker: boy
        voice: echo
        text: 'In the end, our team finished in third place out of two hundred and fifty schools. We each received a certificate and a book about the history of codebreaking. The winning team, from a school in Edinburgh, solved all eight codes in just four weeks.'
      - speaker: boy
        voice: echo
        text: 'The best part was not the prize, though. It was learning to work as a team. We each had different strengths — I was good at spotting patterns, Aisha was great at research, Charlie was fast at maths, and Priya had brilliant ideas when we were stuck.'
    sentences:
      - id: L175-S1
        text: 'The competition was called _____ Challenge.'
        textZh: '比赛名叫 _____ 挑战赛。'
        answer: 'Cipher'
      - id: L175-S2
        text: 'Teams had to solve _____ coded messages over six weeks.'
        textZh: '团队需要在六周内破解 _____ 条密码消息。'
        answer: 'eight'
      - id: L175-S3
        text: 'The keyword for the Vigenere cipher was "_____."'
        textZh: '维吉尼亚密码的关键词是" _____"。'
        answer: 'Neptune'
      - id: L175-S4
        text: 'The team finished in _____ place out of 250 schools.'
