    difficulty: 2
    audioFile: 'L169.mp3'
    script:
      - speaker: man
        voice: echo
        text: 'I am a keen bird watcher and I visit our local nature reserve every weekend. About three months ago, I noticed something puzzling — the number of small birds at the feeding station had dropped dramatically. Normally, I would count thirty or forty sparrows and finches, but suddenly there were fewer than ten.'
      - speaker: man
        voice: echo
        text: 'At first, I thought perhaps the food we put out had gone stale. I tried fresh seeds, nuts, and even mealworms, but the birds still stayed away.'
      - speaker: man
        voice: echo
        text: 'Then one early morning, I arrived at the reserve before dawn and set up my camera with a motion sensor. When I checked the photos the next day, I found the answer. A sparrowhawk — that is a small bird of prey — had been hunting at the feeding station every morning at half past seven.'
      - speaker: man
        voice: echo
        text: 'The small birds had learned that the feeding station was dangerous at that time, so they avoided it completely. Once I moved the station to a spot surrounded by thick bushes — where the sparrowhawk could not dive easily — the little birds gradually came back. Within two weeks, we counted thirty-five sparrows, which was even more than before.'
      - speaker: man
        voice: echo
        text: 'The whole experience taught me that solving nature mysteries requires patience and careful observation. You have to be willing to get up very early and sit quietly for hours!'
    sentences:
      - id: L169-S1
        text: 'The man noticed the number of birds at the feeding station had dropped to fewer than _____.'
        textZh: '这位男士注意到喂食站的鸟类数量减少到了不到 _____ 只。'
        answer: 'ten'
      - id: L169-S2
        text: 'He set up a camera with a _____ sensor to find out what was happening.'
        textZh: '他安装了一个带 _____ 传感器的相机来查明原因。'
        answer: 'motion'
      - id: L169-S3
        text: 'A _____ had been hunting at the feeding station every morning.'
        textZh: '一只 _____ 每天早上都在喂食站捕猎。'
        answer: 'sparrowhawk'
      - id: L169-S4
        text: 'The man moved the station to a spot surrounded by thick _____.'
        textZh: '男士把喂食站移到了被茂密的 _____ 包围的地方。'
        answer: 'bushes'
      - id: L169-S5
        text: 'Within two weeks, they counted _____ sparrows at the new location.'
        textZh: '两周内，他们在新地点数到了 _____ 只麻雀。'
        answer: 'thirty-five'

  # ============================================================
  # L170: The Science Museum Night Tour
  # ============================================================

  - id: L170
    type: sentence-completion
    title: 'The Science Museum Night Tour'
    titleZh: '科学博物馆夜间导览'
    scene: 'You will hear a tour guide leading a special night tour at a science museum.'
    sceneZh: '你将听到一位导游带领科学博物馆的特别夜间导览。'
    difficulty: 2
    audioFile: 'L170.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Good evening, everyone, and welcome to our Mystery Night Tour! Tonight we are going to explore some of the strangest and most unexplained scientific puzzles in the museum. Please stay with the group and try not to touch anything unless I say you can.'
      - speaker: guide
        voice: nova
        text: 'Our first stop is the minerals gallery. This green crystal in the case is called fluorite. Watch what happens when I switch on this ultraviolet lamp. See how it glows bright purple? This effect is called fluorescence, and it was actually named after this very mineral. Scientists discovered it in eighteen fifty-two.'
      - speaker: guide
        voice: nova
        text: 'Next, we have the mystery of ball lightning. This display shows how, during thunderstorms, some people have reported seeing glowing balls of light floating through the air. They can pass through walls and windows. Even today, scientists cannot fully explain what causes them. There have been over ten thousand reported sightings around the world.'
      - speaker: guide
        voice: nova
        text: 'Now follow me to the space section. This piece of rock came from Mars. It was found in Antarctica in nineteen eighty-four, and scientists worked out that it was blasted off the surface of Mars by a meteorite impact millions of years ago. In nineteen ninety-six, researchers claimed they found signs of ancient bacteria inside it, but other scientists disagreed.'
      - speaker: guide
        voice: nova
        text: 'Our last stop is the optical illusions room. Who can tell me — are these two lines the same length? They look different, but they are exactly the same. Our brains are easily tricked by patterns around the lines. This is called the Mueller-Lyer illusion and it works on almost everybody.'
    sentences:
      - id: L170-S1
        text: 'The mineral called _____ glows purple under ultraviolet light.'
        textZh: '一种叫 _____ 的矿物在紫外线下会发出紫色光。'
        answer: 'fluorite'
      - id: L170-S2
        text: 'The effect of fluorescence was discovered in _____.'
        textZh: '荧光效应是在 _____ 年发现的。'
        answer: 'eighteen fifty-two'
      - id: L170-S3
        text: 'There have been over _____ reported sightings of ball lightning worldwide.'
        textZh: '全球有超过 _____ 次球形闪电的报告记录。'
        answer: 'ten thousand'
      - id: L170-S4
        text: 'The Mars rock was found in _____ in 1984.'
        textZh: '火星岩石于1984年在 _____ 被发现。'
        answer: 'Antarctica'
      - id: L170-S5
        text: 'The optical trick at the end is called the _____ illusion.'
        textZh: '最后的视觉把戏叫做 _____ 错觉。'
        answer: 'Mueller-Lyer'

  # ============================================================
  # L171: The Fossil Hunter
  # ============================================================

  - id: L171
    type: sentence-completion
    title: 'The Fossil Hunter'
    titleZh: '化石猎人'
    scene: 'You will hear a palaeontologist talking about how she found a rare fossil.'
    sceneZh: '你将听到一位古生物学家讲述她如何发现一块稀有化石。'
    difficulty: 2
    audioFile: 'L171.mp3'
    script:
      - speaker: scientist
        voice: nova
        text: 'Hello, I am Dr Sarah Bell and I hunt for fossils along the Jurassic Coast in southern England. I have been doing this for twelve years, but the best discovery of my career happened just last spring.'
      - speaker: scientist
        voice: nova
        text: 'I was walking along the beach at Lyme Regis after a big storm. Storms are actually the best time to look for fossils because the waves wash away layers of rock and reveal things that have been hidden for millions of years.'
      - speaker: scientist
        voice: nova
        text: 'I spotted something unusual sticking out of a cliff face about two metres above the beach. At first, I thought it was just a curly shell — an ammonite — but when I looked more closely, I realised it was much bigger than any ammonite I had ever seen. The spiral was nearly one metre across.'
      - speaker: scientist
        voice: nova
        text: 'It took our team three weeks to carefully remove it from the rock without damaging it. We used special tools — tiny hammers, dental picks, and even paintbrushes — to clean away the surrounding stone.'
      - speaker: scientist
        voice: nova
        text: 'Back in the laboratory, we identified it as a Parapuzosia, one of the largest ammonites ever known. It is around seventy-five million years old, from the late Cretaceous period. The fossil is now on display at the Natural History Museum in London.'
      - speaker: scientist
        voice: nova
        text: 'My advice for young fossil hunters: always search after storms, look at rocks carefully, and never pull a fossil out by force — you could break it into a hundred pieces.'
    sentences:
      - id: L171-S1
        text: 'Dr Bell hunts for fossils along the _____ Coast.'
        textZh: 'Bell博士在 _____ 海岸寻找化石。'
        answer: 'Jurassic'
      - id: L171-S2
        text: 'The best time to look for fossils is after a _____.'
        textZh: '寻找化石的最佳时间是在 _____ 之后。'
        answer: 'storm'
      - id: L171-S3
        text: 'The spiral of the fossil was nearly _____ across.'
        textZh: '化石的螺旋直径将近 _____。'
        answer: 'one metre'
      - id: L171-S4
        text: 'It took the team _____ weeks to remove the fossil from the rock.'
        textZh: '团队花了 _____ 周时间把化石从岩石中取出。'
        answer: 'three'
      - id: L171-S5
        text: 'The fossil is now on display at the _____ in London.'
        textZh: '这块化石现在在伦敦的 _____ 展出。'
        answer: 'Natural History Museum'

  # ============================================================
  # L172: The Disappearing Lake
  # ============================================================

  - id: L172
    type: sentence-completion
    title: 'The Disappearing Lake'
    titleZh: '消失的湖泊'
    scene: 'You will hear a geography teacher explaining a strange natural event.'
    sceneZh: '你将听到一位地理老师解释一个奇怪的自然现象。'
    difficulty: 2
    audioFile: 'L172.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today I want to tell you about one of the strangest things that can happen in nature — a lake that disappears overnight. This actually happened in a village in Bosnia in two thousand and thirteen.'
      - speaker: teacher
        voice: nova
        text: 'The lake, called Javorsko Lake, was about the size of a football pitch. Villagers went to bed one evening and everything was normal. When they woke up the next morning, the entire lake was gone — just a muddy hole with a few surprised fish flopping around.'
      - speaker: teacher
        voice: nova
        text: 'The explanation is something called a sinkhole. Underground, the rock was made of limestone, which dissolves slowly in water over thousands of years. Eventually, a cavity formed beneath the lake bed. When the thin layer of rock finally collapsed, all the water drained underground like water going down a giant plughole in a bathtub.'
      - speaker: teacher
        voice: nova
        text: 'Sinkholes are more common than you might think. In Florida, in the United States, there are thousands of them. In two thousand and ten, a giant sinkhole opened in the middle of a street in Guatemala City. It was sixty metres deep and swallowed a three-storey building.'
      - speaker: teacher
        voice: nova
        text: 'Geologists study underground rock formations to try to predict where sinkholes might form. They use special equipment that sends sound waves into the ground and measures how they bounce back. Areas with lots of limestone are considered the most at risk.'
    sentences:
      - id: L172-S1
        text: 'The disappearing lake was about the size of a _____ pitch.'
        textZh: '消失的湖泊大约有一个 _____ 场那么大。'
        answer: 'football'
      - id: L172-S2
        text: 'The underground rock beneath the lake was made of _____.'
        textZh: '湖底下面的岩石是 _____ 构成的。'
        answer: 'limestone'
      - id: L172-S3
        text: 'The sinkhole in Guatemala City was _____ metres deep.'
        textZh: '危地马拉城的天坑有 _____ 米深。'
        answer: 'sixty'
      - id: L172-S4
        text: 'Geologists use equipment that sends _____ into the ground to study rock formations.'
        textZh: '地质学家使用向地下发送 _____ 的设备来研究岩层。'
        answer: 'sound waves'
      - id: L172-S5
        text: 'Areas with lots of _____ are considered most at risk for sinkholes.'
        textZh: '_____ 较多的地区被认为最容易出现天坑。'
        answer: 'limestone'

  # ============================================================
  # L173: The Magician's Apprentice
  # ============================================================

  - id: L173
    type: sentence-completion
    title: 'The Magician''s Apprentice'
    titleZh: '魔术师的学徒'
    scene: 'You will hear a young magician talking about learning magic tricks.'
