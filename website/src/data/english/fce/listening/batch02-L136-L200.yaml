    difficulty: 2
    audioFile: 'L173.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'My name is Tom and I have been learning magic since I was seven years old. It all started when my uncle performed a card trick at my birthday party. I was so amazed that I asked him to teach me straight away.'
      - speaker: boy
        voice: echo
        text: 'The first trick he taught me was called the Rising Card. You push a playing card into the middle of the deck, and then it slowly rises to the top by itself. The secret is a thin piece of thread attached to your finger — when you pull gently, the card moves up.'
      - speaker: boy
        voice: echo
        text: 'After six months of practice, I performed my first show at my cousin''s birthday party. I was incredibly nervous — my hands were shaking so much that I dropped the coins during my vanishing coin trick! But the audience actually laughed and clapped because they thought it was part of the show.'
      - speaker: boy
        voice: echo
        text: 'The most important rule in magic is called misdirection. That means making the audience look somewhere else while you do the secret move. For example, if I point at something with my left hand, everyone looks at my left hand while my right hand hides the coin.'
      - speaker: boy
        voice: echo
        text: 'I now practise for at least forty-five minutes every day, standing in front of a mirror so I can see what the audience would see. My dream is to perform on a real stage at the Edinburgh Festival when I turn sixteen.'
      - speaker: boy
        voice: echo
        text: 'If you want to start learning magic, I recommend beginning with simple card tricks. Cards are cheap, you can carry them anywhere, and there are thousands of tricks to learn. The key is practice — do each trick at least a hundred times before you show anyone.'
    sentences:
