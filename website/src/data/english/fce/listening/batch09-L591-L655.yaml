        explanation: '"Reading a novel forces your brain to imagine scenes, understand complex characters."'
        explanationZh: '"阅读小说迫使你的大脑想象场景，理解复杂的人物角色。"'
      - id: L625-Q3
        text: 'The librarian says: "Screens inform, but books _____ ."'
