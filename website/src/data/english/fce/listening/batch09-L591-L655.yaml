  - id: L630
    type: multiple-matching
    title: 'Five Views on Coding Education'
    titleZh: '关于编程教育的五种观点'
    scene: 'You will hear five people sharing views on whether coding should be compulsory. Match each speaker to their main argument.'
    sceneZh: '你将听到五个人分享关于编程是否应该必修的观点。将每位说话者与他们的主要论点匹配。'
