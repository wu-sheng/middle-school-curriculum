      - speaker: girl
        voice: shimmer
        text: 'I acknowledge that this would require space and initial funding. However, I have identified an unused area behind the sports hall, and several parents have offered to donate tools and seeds. I believe the benefits far outweigh the costs. Yours sincerely, Anya Shah, Year 6.'
