      - id: L617-Q3
        text: 'Once a month, students can choose their own _____ instead of following the teacher''s task.'
        textZh: '每月一次，学生可以选择自己的 _____ ，而不是遵循老师布置的任务。'
        answer: 'learning project'
        acceptableAnswers: ['learning project', 'project']
        explanation: '"Once a month, students can choose their own learning project."'
        explanationZh: '"每月一次，学生可以选择自己的学习项目。"'

  - id: L618
    type: sentence-completion
    title: 'The Pet Allergy Solution'
    titleZh: '宠物过敏解决方案'
    scene: 'You will hear a school nurse discussing solutions to pet allergy concerns.'
    sceneZh: '你将听到一位校医讨论宠物过敏问题的解决方案。'
    difficulty: 2
    audioFile: 'L618.mp3'
    script:
      - speaker: nurse
        voice: shimmer
        text: 'The main objection to school pets is allergies. Approximately eight per cent of children are allergic to animal fur. But there are simple solutions. Fish, reptiles, and insects do not trigger allergies at all. If a school chooses a furry pet, it can be kept in a well-ventilated room separate from the main classroom. Air purifiers can also help reduce allergens. The key is to plan carefully and consult with parents before introducing any animal.'
    questions:
      - id: L618-Q1
        text: 'Approximately _____ per cent of children are allergic to animal fur.'
        textZh: '大约 _____ 百分比的儿童对动物毛发过敏。'
