        explanation: '"This is called a concession, and it is worth a lot of marks."'
        explanationZh: '"这被称为让步，它值很多分。"'
      - id: L624-Q3
        text: 'The examiner is testing your ability to write a _____ argument.'
        textZh: '考官测试的是你写 _____ 论证的能力。'
        answer: 'balanced'
        acceptableAnswers: ['balanced']
        explanation: '"The examiner is testing your ability to write a balanced argument."'
        explanationZh: '"考官测试的是你写平衡论证的能力。"'

  - id: L625
    type: sentence-completion
    title: 'Why Reading Still Matters'
    titleZh: '为什么阅读仍然重要'
    scene: 'You will hear a librarian talking about the importance of reading in the digital age.'
    sceneZh: '你将听到一位图书馆员谈论数字时代阅读的重要性。'
