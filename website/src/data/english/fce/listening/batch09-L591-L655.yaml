  - id: L627
    type: multiple-matching
    title: 'Five Teachers Discuss Homework'
    titleZh: '五位教师讨论作业'
    scene: 'You will hear five teachers sharing their views on homework. Match each speaker to their main opinion.'
    sceneZh: '你将听到五位教师分享他们对作业的看法。将每位说话者与他们的主要观点匹配。'
    difficulty: 3
    audioFile: 'L627.mp3'
    speakers:
      - id: L627-S1
        name: 'Speaker 1'
        script: 'I believe homework is essential for maths and languages because these subjects require daily practice. You cannot become fluent in French by only practising in the classroom. However, I do not set homework for my art classes — creativity should not feel like an obligation.'
      - id: L627-S2
        name: 'Speaker 2'
        script: 'I stopped setting homework three years ago and replaced it with a "reading for pleasure" policy. Students just have to read anything they enjoy for twenty minutes each evening. Their vocabulary and writing have improved more than with any worksheet I ever set.'
      - id: L627-S3
        name: 'Speaker 3'
        script: 'My concern is fairness. Students with supportive parents and quiet rooms at home have a huge advantage. I now do all practice in class during supervised time so that every student gets the same support, regardless of their home situation.'
      - id: L627-S4
        name: 'Speaker 4'
        script: 'I set very little homework, but what I set is always a choice. Students can pick from three different tasks at different difficulty levels. This means everyone is challenged but nobody is overwhelmed. Giving students autonomy over their learning is the key.'
      - id: L627-S5
        name: 'Speaker 5'
        script: 'I have kept traditional homework because parents expect it. They want to see what their children are learning, and homework is the main way they stay informed. Until we find a better way to involve parents, I think homework serves an important communication purpose.'
    options:
      A: 'Homework is only necessary for skills-based subjects'
      B: 'Replaced homework with reading for pleasure'
      C: 'Moved all practice to supervised class time for fairness'
      D: 'Gives students a choice of homework tasks'
      E: 'Keeps homework to communicate with parents'
      F: 'Sets homework every day including weekends'
      G: 'Believes homework should be graded strictly'
      H: 'Uses homework as punishment for bad behaviour'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'

  - id: L628
    type: multiple-matching
    title: 'Five Parents on Screen Time'
    titleZh: '五位家长谈屏幕时间'
    scene: 'You will hear five parents talking about how they manage screen time. Match each speaker to their approach.'
    sceneZh: '你将听到五位家长谈论他们如何管理屏幕时间。将每位说话者与他们的方法匹配。'
    difficulty: 2
    audioFile: 'L628.mp3'
    speakers:
      - id: L628-S1
        name: 'Speaker 1'
        script: 'We have a simple rule: one hour on weekdays, two hours on weekends. It does not matter whether it is games, videos, or educational apps — the time limit is the same. This keeps things simple and avoids arguments.'
      - id: L628-S2
        name: 'Speaker 2'
        script: 'I do not set a specific time limit. Instead, I focus on what my children watch and play. If it is educational or creative, I am happy for them to use screens longer. If it is mindless scrolling, I step in. Quality matters more than quantity.'
      - id: L628-S3
        name: 'Speaker 3'
        script: 'My approach is "earn your screen time." My children must complete their homework, do one chore, and spend thirty minutes outside before they can use any screens. This teaches them that responsibilities come first.'
      - id: L628-S4
        name: 'Speaker 4'
        script: 'We have no screen rules at all because I believe children should learn to self-regulate. If my daughter plays games for too long and feels tired the next day, she learns the consequence naturally. I trust her to find her own balance.'
      - id: L628-S5
        name: 'Speaker 5'
        script: 'We made the rules together as a family. The children suggested their own limits, and we agreed on a plan that everyone was happy with. Because they were involved in the decision, they actually stick to the rules without us having to remind them.'
    options:
      A: 'Strict fixed time limits regardless of content'
      B: 'Focuses on content quality rather than time'
      C: 'Screen time must be earned through responsibilities'
      D: 'No rules — trusts children to self-regulate'
      E: 'Family-created rules that children helped design'
      F: 'Bans all screens on school nights'
      G: 'Only allows educational content'
      H: 'Uses screen time as a reward for good grades'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'

