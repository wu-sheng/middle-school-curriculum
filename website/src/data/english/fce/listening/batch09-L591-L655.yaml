        acceptableAnswers: ['medicine', 'medication']
        explanation: '"I created an app that helps my grandmother remember to take her medicine."'
        explanationZh: '"我创建了一个帮助奶奶记得吃药的应用。"'
      - id: L615-Q3
        text: 'The experience taught her that coding is about using technology to help _____ .'
