        explanation: '"The key is to plan carefully and consult with parents."'
        explanationZh: '"关键是仔细计划并咨询家长。"'

  - id: L619
    type: sentence-completion
    title: 'The Robot Teacher Experiment'
    titleZh: '机器人教师实验'
    scene: 'You will hear about a school that tested a robot teacher.'
    sceneZh: '你将听到一所学校测试机器人教师的情况。'
    difficulty: 3
    audioFile: 'L619.mp3'
    script:
      - speaker: reporter
        voice: nova
        text: 'A school in South Korea introduced a robot English teacher as an experiment. The robot, named Engkey, could correct pronunciation, play language games, and never got impatient. Students initially loved the novelty. However, after three months, researchers found that students preferred learning grammar from the robot but conversation skills from their human teacher. The conclusion was that robots work best as assistants, not replacements. The school now uses both: the robot for drilling exercises and the teacher for creative discussion.'
    questions:
      - id: L619-Q1
        text: 'The robot teacher was introduced in a school in South _____ .'
        textZh: '机器人教师被引入到韩 _____ 的一所学校。'
        answer: 'Korea'
        acceptableAnswers: ['Korea']
        explanation: '"A school in South Korea introduced a robot English teacher."'
        explanationZh: '"韩国的一所学校引入了一位机器人英语教师。"'
      - id: L619-Q2
        text: 'Students preferred learning grammar from the robot but _____ skills from their human teacher.'
        textZh: '学生更喜欢跟机器人学语法，但跟人类教师学 _____ 技能。'
        answer: 'conversation'
        acceptableAnswers: ['conversation']
        explanation: '"Students preferred learning grammar from the robot but conversation skills from their human teacher."'
        explanationZh: '"学生更喜欢跟机器人学语法，但跟人类教师学会话技能。"'
      - id: L619-Q3
        text: 'The conclusion was that robots work best as _____ , not replacements.'
        textZh: '结论是机器人最适合做 _____ ，而不是替代品。'
        answer: 'assistants'
        acceptableAnswers: ['assistants']
        explanation: '"The conclusion was that robots work best as assistants, not replacements."'
        explanationZh: '"结论是机器人最适合做助手，而不是替代品。"'

  - id: L620
    type: sentence-completion
    title: 'Connectors for Essay Writing'
    titleZh: '议论文连接词'
    scene: 'You will hear a teacher explaining key connectors for essays.'
    sceneZh: '你将听到一位老师解释议论文的关键连接词。'
    difficulty: 2
    audioFile: 'L620.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'There are three types of connector you must know for essay writing. Addition connectors like furthermore and moreover add supporting points. Contrast connectors like however and nevertheless introduce opposing ideas. And conclusion connectors like in conclusion and to sum up signal the end of your essay. The most common mistake students make is using too many connectors. Two or three per paragraph is plenty — do not start every sentence with one.'
    questions:
      - id: L620-Q1
        text: 'Furthermore and moreover are examples of _____ connectors.'
        textZh: 'Furthermore和moreover是 _____ 连接词的例子。'
        answer: 'addition'
        acceptableAnswers: ['addition']
        explanation: '"Addition connectors like furthermore and moreover."'
        explanationZh: '"递进连接词如furthermore和moreover。"'
      - id: L620-Q2
        text: 'However and nevertheless are examples of _____ connectors.'
        textZh: 'However和nevertheless是 _____ 连接词的例子。'
        answer: 'contrast'
        acceptableAnswers: ['contrast']
        explanation: '"Contrast connectors like however and nevertheless."'
        explanationZh: '"转折连接词如however和nevertheless。"'
      - id: L620-Q3
        text: 'The teacher says students should use _____ connectors per paragraph at most.'
