# FCE Daily Listening Practice — Month 10, Batch 09
# 65 exercises (L591–L655)
# L591–L610: Part 1 short extracts (20 exercises, difficulty 2-3)
# L611–L625: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L626–L640: Part 3 multiple matching (15 exercises, difficulty 2-3)
# L641–L655: Part 4 long conversation (15 exercises, difficulty 3)
# Theme: Debate, Argument & Opinion for 8-9 year old learners

extracts:
  # ============================================================
  # L591–L610: Part 1 — Short Extracts (Debate/Opinion Theme)
  # ============================================================

  - id: L591
    type: short-extract
    title: 'The School Debate Captain'
    titleZh: '学校辩论队长'
    scene: 'You will hear a girl talking about being captain of the school debating team.'
    sceneZh: '你将听到一个女孩谈论担任学校辩论队队长。'
    difficulty: 2
    audioFile: 'L591.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'When I first joined the debating team, I was so nervous I could barely speak. My hands shook and my voice went squeaky. But our coach said something that changed everything: "The best debaters are not the loudest — they are the best listeners." That completely changed how I thought about debate.'
      - speaker: girl
        voice: shimmer
        text: 'Now I am the team captain, and I tell all the new members the same thing. Before you can argue against someone, you need to really understand what they believe. It has made me a much better listener in everyday life too.'
    question:
      text: 'What does the girl say changed her approach to debating?'
      textZh: '女孩说什么改变了她对辩论的方式？'
      options:
        A: 'Learning to speak louder and more clearly.'
        B: 'Realising that listening is more important than being loud.'
        C: 'Winning her first debate competition.'
      answer: 'B'
      explanation: 'The coach told her "the best debaters are the best listeners" and this "completely changed" her approach.'
      explanationZh: '教练告诉她"最好的辩手是最好的倾听者"，这"完全改变了"她的方式。'

  - id: L592
    type: short-extract
    title: 'The Homework Survey'
    titleZh: '作业调查'
    scene: 'You will hear a teacher discussing a homework survey she conducted.'
    sceneZh: '你将听到一位老师讨论她进行的作业调查。'
    difficulty: 2
    audioFile: 'L592.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'I asked all 200 students in Year 7 to fill in a questionnaire about homework. The results were fascinating. Eighty per cent said they would prefer creative homework like projects and presentations over traditional worksheets. However, sixty per cent also admitted they find it harder to start creative homework because they do not know where to begin.'
      - speaker: teacher
        voice: nova
        text: 'So the message is clear: students want creative homework, but they need more guidance on how to do it. We cannot just give them a topic and say "be creative" — we need to teach them the skills first.'
    question:
      text: 'What was the main finding of the homework survey?'
      textZh: '作业调查的主要发现是什么？'
      options:
        A: 'Most students want to have no homework at all.'
        B: 'Students prefer creative homework but need more guidance.'
        C: 'Teachers do not like setting creative homework.'
      answer: 'B'
      explanation: '80% prefer creative homework, but 60% find it hard to start — so they need guidance.'
      explanationZh: '80%偏爱创造性作业，但60%发现很难开始——所以他们需要指导。'

  - id: L593
    type: short-extract
    title: 'The School Pet Vote'
    titleZh: '学校宠物投票'
    scene: 'You will hear a boy describing a vote about getting a school pet.'
    sceneZh: '你将听到一个男孩描述关于养学校宠物的投票。'
    difficulty: 2
    audioFile: 'L593.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Our school held a vote on whether to get a classroom pet. At first, I was against it because I thought it would be messy and distracting. But then the students who supported it gave a really impressive presentation. They showed research about how pets reduce anxiety and improve attendance.'
      - speaker: boy
        voice: echo
        text: 'In the end, I changed my mind and voted yes. We got two goldfish, and honestly, the classroom feels calmer now. I learned that it is okay to change your opinion when you hear a good argument.'
    question:
      text: 'Why did the boy change his mind about the school pet?'
      textZh: '男孩为什么改变了对学校宠物的看法？'
      options:
        A: 'His friends pressured him to vote yes.'
        B: 'He saw convincing research in the supporters'' presentation.'
        C: 'The teacher told him he had to vote yes.'
      answer: 'B'
      explanation: 'He changed his mind after seeing "a really impressive presentation" with "research about how pets reduce anxiety."'
      explanationZh: '他在看到"非常令人印象深刻的展示"和"关于宠物如何减少焦虑的研究"后改变了想法。'

  - id: L594
    type: short-extract
    title: 'The Coding Class Debate'
    titleZh: '编程课辩论'
    scene: 'You will hear a headteacher explaining why coding was added to the curriculum.'
    sceneZh: '你将听到一位校长解释为什么将编程纳入课程。'
    difficulty: 2
    audioFile: 'L594.mp3'
    script:
      - speaker: headteacher
        voice: nova
        text: 'Three years ago, we decided to make coding a compulsory subject for all students from Year 5 onwards. Many parents were worried at first — they thought it would be too difficult or that it would take time away from core subjects like maths and English.'
      - speaker: headteacher
        voice: nova
        text: 'But the results have been remarkable. Not only have students enjoyed the coding lessons, but their maths scores have actually improved. Coding teaches logical thinking, and that logical thinking helps in every other subject. The parents who were most worried are now the biggest supporters.'
    question:
      text: 'What happened after the school introduced coding?'
      textZh: '学校引入编程后发生了什么？'
      options:
        A: 'Maths scores went down because students spent less time on maths.'
        B: 'Students enjoyed coding and their maths scores improved.'
        C: 'Parents complained and the school removed coding from the curriculum.'
      answer: 'B'
      explanation: 'Students enjoyed it AND "their maths scores have actually improved" due to logical thinking skills.'
      explanationZh: '学生们喜欢编程，而且由于逻辑思维能力，"他们的数学成绩实际上提高了"。'

  - id: L595
    type: short-extract
    title: 'The Uniform Experiment'
    titleZh: '校服实验'
    scene: 'You will hear a student describing a week without school uniforms.'
    sceneZh: '你将听到一个学生描述没有校服的一周。'
    difficulty: 2
    audioFile: 'L595.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Our school tried a "no uniform week" as an experiment. At first, everyone was excited — we could finally wear our own clothes! But by Wednesday, I noticed something surprising. Some students were being teased about their clothes, and a few kids seemed embarrassed because they did not have fashionable outfits.'
      - speaker: girl
        voice: shimmer
        text: 'By Friday, most people in my class agreed that they actually preferred wearing uniforms. It was just simpler and fairer. I used to hate my uniform, but now I understand why it exists.'
    question:
      text: 'What did the girl learn from the no-uniform week?'
      textZh: '女孩从无校服周中学到了什么？'
      options:
        A: 'Uniforms are more comfortable than regular clothes.'
        B: 'Without uniforms, some students faced teasing and embarrassment.'
        C: 'Students perform better academically without uniforms.'
      answer: 'B'
      explanation: 'She noticed "students were being teased" and "a few kids seemed embarrassed" without uniforms.'
      explanationZh: '她注意到没有校服时"学生被嘲笑"而且"一些孩子似乎很尴尬"。'

  - id: L596
    type: short-extract
    title: 'Screen Time Rules'
    titleZh: '屏幕时间规则'
    scene: 'You will hear a father talking about his family''s screen time rules.'
    sceneZh: '你将听到一位父亲谈论他家的屏幕时间规则。'
    difficulty: 2
    audioFile: 'L596.mp3'
    script:
      - speaker: father
        voice: echo
        text: 'We used to have constant arguments about screen time in our house. My daughter wanted to spend hours watching videos, and my son played games until midnight. So we sat down as a family and created a set of rules together. The key was that the children helped write the rules — they were not just imposed by us parents.'
      - speaker: father
        voice: echo
        text: 'Now we have a simple system: one hour of screens for entertainment, but unlimited time for educational apps and reading e-books. Because the children were involved in making the rules, they actually follow them. No more arguments!'
    question:
      text: 'Why do the children follow the screen time rules?'
      textZh: '孩子们为什么遵守屏幕时间规则？'
      options:
        A: 'Their father punishes them if they break the rules.'
        B: 'The children helped create the rules themselves.'
        C: 'There are no screens in the house.'
      answer: 'B'
      explanation: '"The children helped write the rules" and "Because the children were involved in making the rules, they actually follow them."'
      explanationZh: '"孩子帮助制定规则"而且"因为孩子参与了规则的制定，他们实际上遵守了规则。"'

  - id: L597
    type: short-extract
    title: 'The Book vs E-reader'
    titleZh: '纸质书vs电子阅读器'
    scene: 'You will hear two friends discussing paper books and e-readers.'
    sceneZh: '你将听到两个朋友讨论纸质书和电子阅读器。'
    difficulty: 2
    audioFile: 'L597.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I just got an e-reader for my birthday, and I love it! I can carry hundreds of books with me, and I can look up words instantly. I used to struggle with big novels because they were so heavy, but now I read everywhere — on the bus, in the park, even waiting at the dentist.'
      - speaker: boy
        voice: echo
        text: 'That sounds great, but I still prefer paper books. There is something special about holding a real book and turning the pages. Plus, I remember things better when I read on paper. Maybe I am old-fashioned, but my bookshelf is my favourite thing in my room!'
    question:
      text: 'What is the main reason the girl likes her e-reader?'
      textZh: '女孩喜欢电子阅读器的主要原因是什么？'
      options:
        A: 'It is cheaper than buying paper books.'
        B: 'She can carry many books easily and read anywhere.'
        C: 'The screen is better for her eyesight.'
      answer: 'B'
      explanation: 'She says she can "carry hundreds of books" and "read everywhere — on the bus, in the park."'
      explanationZh: '她说可以"随身携带数百本书"并且"到处阅读——在公共汽车上、公园里。"'

  - id: L598
    type: short-extract
    title: 'The Social Media Discussion'
    titleZh: '社交媒体讨论'
    scene: 'You will hear a school counsellor talking about social media.'
    sceneZh: '你将听到一位学校心理辅导员谈论社交媒体。'
    difficulty: 3
    audioFile: 'L598.mp3'
    script:
      - speaker: counsellor
        voice: nova
        text: 'I see many students who feel anxious because of social media. They compare themselves to others online and feel like they are not good enough. But here is what I tell them: social media shows people''s highlight reels, not their real lives. Nobody posts photos of their messy rooms or bad days.'
      - speaker: counsellor
        voice: nova
        text: 'The most important thing is not to ban social media — it is to teach children to use it thoughtfully. We need to help them understand that what they see online is often edited, filtered, and carefully selected to look perfect.'
    question:
      text: 'What does the counsellor suggest about social media?'
      textZh: '辅导员对社交媒体有什么建议？'
      options:
        A: 'Children should not be allowed to use social media at all.'
        B: 'Children should be taught to understand that social media is not real life.'
        C: 'Social media is completely harmless and there is nothing to worry about.'
      answer: 'B'
      explanation: 'The counsellor says "teach children to use it thoughtfully" and "help them understand that what they see online is often edited."'
      explanationZh: '辅导员说"教孩子深思熟虑地使用"并且"帮助他们理解在网上看到的往往是经过编辑的。"'

  - id: L599
    type: short-extract
    title: 'The Online vs Classroom Debate'
    titleZh: '在线vs课堂辩论'
    scene: 'You will hear a student who experienced both online and classroom learning.'
    sceneZh: '你将听到一位经历了在线和课堂学习的学生。'
    difficulty: 2
    audioFile: 'L599.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'During the pandemic, I did all my lessons online for about six months. At first, I thought it was brilliant — I could stay in bed longer and work at my own pace. But after a few weeks, I started feeling really lonely. I missed chatting with my friends between lessons and asking my teacher questions face to face.'
      - speaker: boy
        voice: echo
        text: 'When we went back to school, I was so happy. I realised that school is not just about learning facts — it is about being part of a community. I would not want to go back to full-time online learning, but I think some online tools are useful for revision.'
    question:
      text: 'What did the boy miss most about school during online learning?'
      textZh: '男孩在网课期间最想念学校的什么？'
      options:
        A: 'The school lunches and playground.'
        B: 'The social contact with friends and teachers.'
        C: 'The strict rules and discipline.'
      answer: 'B'
      explanation: 'He missed "chatting with friends" and "asking the teacher questions face to face" — the social element.'
      explanationZh: '他想念"和朋友聊天"和"面对面问老师问题"——社交元素。'

  - id: L600
    type: short-extract
    title: 'The Persuasive Speech'
    titleZh: '说服性演讲'
    scene: 'You will hear a debate coach giving tips on persuasive speaking.'
    sceneZh: '你将听到一位辩论教练给出关于说服性演讲的技巧。'
    difficulty: 3
    audioFile: 'L600.mp3'
    script:
      - speaker: coach
        voice: nova
        text: 'A lot of young debaters make the same mistake: they think that speaking loudly and quickly makes them more convincing. Actually, the opposite is true. The most persuasive speakers slow down at important moments, pause for effect, and make eye contact with the audience.'
      - speaker: coach
        voice: nova
        text: 'And here is the biggest secret of all: the most powerful thing you can do in a debate is acknowledge the other side''s best point and then explain why your argument is still stronger. That shows confidence and fairness — and judges love it.'
    question:
      text: 'According to the coach, what is the most powerful debate technique?'
      textZh: '根据教练的说法，最强大的辩论技巧是什么？'
      options:
        A: 'Speaking as loudly and quickly as possible.'
        B: 'Acknowledging the opposing argument and then countering it.'
        C: 'Ignoring the other team''s points completely.'
      answer: 'B'
      explanation: '"The most powerful thing is to acknowledge the other side''s best point and then explain why your argument is still stronger."'
      explanationZh: '"最强大的事情是承认对方最好的观点，然后解释为什么你的论点仍然更强。"'

  - id: L601
    type: short-extract
    title: 'The Video Game Researcher'
    titleZh: '电子游戏研究者'
    scene: 'You will hear a researcher discussing the effects of video games on children.'
    sceneZh: '你将听到一位研究者讨论电子游戏对孩子的影响。'
    difficulty: 3
    audioFile: 'L601.mp3'
    script:
      - speaker: researcher
        voice: nova
        text: 'Our study looked at 5,000 children aged 8 to 12 over two years. We found that children who played educational strategy games for about one hour per day actually showed improved problem-solving skills compared to children who did not play any games at all. However — and this is the important part — children who played for more than three hours showed declining academic performance and social skills.'
      - speaker: researcher
        voice: nova
        text: 'The message is very clear: it is not gaming itself that is the problem, but the amount. In moderation, certain types of games can be genuinely beneficial.'
    question:
      text: 'What was the key finding of the study?'
      textZh: '研究的关键发现是什么？'
      options:
        A: 'All video games are harmful to children regardless of time spent.'
        B: 'Moderate gaming can improve skills, but excessive gaming is harmful.'
        C: 'Video games have no measurable effect on children.'
      answer: 'B'
      explanation: '1 hour = improved problem-solving; 3+ hours = declining performance. "In moderation...beneficial."'
      explanationZh: '1小时=提高问题解决能力；3小时以上=表现下降。"适度……有益。"'

  - id: L602
    type: short-extract
    title: 'The Fair Debate Judge'
    titleZh: '公正的辩论评委'
    scene: 'You will hear a debate judge explaining how she scores fairly.'
    sceneZh: '你将听到一位辩论评委解释她如何公平评分。'
    difficulty: 2
    audioFile: 'L602.mp3'
    script:
      - speaker: judge
        voice: shimmer
        text: 'Being a debate judge is harder than people think. The most important rule is impartiality — I must not let my personal opinions affect the scores. Even if a team argues for something I personally disagree with, I have to judge the quality of their argument, not whether I agree with it.'
      - speaker: judge
        voice: shimmer
        text: 'I look at three things: the strength of the evidence, the clarity of the argument, and how well they respond to the other team''s points. A team that acknowledges the opposition''s strongest point before countering it always impresses me.'
    question:
      text: 'What does the judge consider most important when scoring?'
      textZh: '评委在评分时认为什么最重要？'
      options:
        A: 'Whether she personally agrees with the team''s opinion.'
        B: 'The quality of evidence, clarity, and response to the opposition.'
        C: 'How loudly and confidently the team speaks.'
      answer: 'B'
      explanation: 'She looks at "strength of evidence, clarity of argument, and how well they respond to the other team."'
      explanationZh: '她关注"证据的力度、论点的清晰度，以及他们如何回应对方团队。"'

  - id: L603
    type: short-extract
    title: 'The Homework-Free School'
    titleZh: '无作业学校'
    scene: 'You will hear a parent talking about a school with no homework.'
    sceneZh: '你将听到一位家长谈论一所没有作业的学校。'
    difficulty: 2
    audioFile: 'L603.mp3'
    script:
      - speaker: mother
        voice: shimmer
        text: 'My daughter''s school made a bold decision last year: they abolished homework completely. Instead, they extended the school day by 30 minutes and added a supervised "study period" where students can ask teachers for help. Everything gets done at school.'
      - speaker: mother
        voice: shimmer
        text: 'At first I was sceptical, but the results have been amazing. My daughter is happier, less stressed, and actually reads more books in the evening because she has free time. Her grades have not dropped at all. I wish more schools would try this approach.'
    question:
      text: 'What happened after the school abolished homework?'
      textZh: '学校废除作业后发生了什么？'
      options:
        A: 'Students'' grades dropped significantly.'
        B: 'Students became happier and their grades stayed the same.'
        C: 'Parents complained and the school brought homework back.'
      answer: 'B'
      explanation: 'Her daughter is "happier, less stressed" and "her grades have not dropped at all."'
      explanationZh: '她的女儿"更快乐、压力更小"而且"她的成绩一点也没有下降。"'

  - id: L604
    type: short-extract
    title: 'The Essay Writing Tip'
    titleZh: '议论文写作技巧'
    scene: 'You will hear an English teacher sharing an essay writing tip.'
    sceneZh: '你将听到一位英语老师分享议论文写作技巧。'
    difficulty: 3
    audioFile: 'L604.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The biggest mistake I see in student essays is this: they only present one side of the argument. An essay that says "homework is bad, bad, bad" gets low marks because it is not balanced. A good essay says: "I understand WHY some people support homework — for example, it builds discipline. However, I believe the drawbacks outweigh the benefits because..."'
      - speaker: teacher
        voice: nova
        text: 'In the FCE exam, the examiner is not looking for the right opinion. They are looking for a well-structured argument that considers both sides. Your conclusion should be clear, but your essay should show you have thought about the other point of view.'
    question:
      text: 'What does the teacher say the FCE examiner is looking for?'
      textZh: '老师说FCE考官在寻找什么？'
      options:
        A: 'A specific opinion that matches the examiner''s view.'
        B: 'A well-structured argument that considers both sides.'
        C: 'The longest possible essay with many paragraphs.'
      answer: 'B'
      explanation: '"The examiner is looking for a well-structured argument that considers both sides."'
      explanationZh: '"考官寻找的是一篇结构良好、考虑了双方的论点。"'

  - id: L605
    type: short-extract
    title: 'The Class Debate Result'
    titleZh: '班级辩论结果'
    scene: 'You will hear a student reflecting on a class debate about social media.'
    sceneZh: '你将听到一个学生反思关于社交媒体的班级辩论。'
    difficulty: 2
    audioFile: 'L605.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'We had a debate in class about whether social media does more harm than good for teenagers. I was on the team that argued social media is harmful. We talked about cyberbullying, addiction, and unrealistic body images. The other team talked about creativity, connection, and educational content.'
      - speaker: girl
        voice: shimmer
        text: 'After the debate, our teacher asked us to write about what we learned. The most surprising thing for me was how many good points the other team made. I still think social media has problems, but I now understand that banning it completely would not solve anything. The answer is better education, not prohibition.'
    question:
      text: 'What did the girl learn from the debate?'
      textZh: '女孩从辩论中学到了什么？'
      options:
        A: 'Social media should be completely banned for teenagers.'
        B: 'Both sides had valid points, and education is better than banning.'
        C: 'Social media is completely safe if used correctly.'
      answer: 'B'
      explanation: 'She recognised "how many good points the other team made" and concluded that "better education, not prohibition" is the answer.'
      explanationZh: '她认识到"对方团队提出了多少好的观点"并得出结论"更好的教育，而不是禁止"才是答案。'

  - id: L606
    type: short-extract
    title: 'The Digital Textbook'
    titleZh: '数字教科书'
    scene: 'You will hear a student comparing digital and paper textbooks.'
    sceneZh: '你将听到一个学生比较数字教科书和纸质教科书。'
    difficulty: 2
    audioFile: 'L606.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'This year, our school switched from paper textbooks to tablets. I was really excited at first — my school bag was suddenly so much lighter! And the digital textbooks have cool features like interactive diagrams and built-in quizzes.'
      - speaker: boy
        voice: echo
        text: 'But honestly, I find it harder to concentrate. I sometimes get distracted by other apps, and I miss being able to write notes in the margins of a real book. I think the ideal solution would be having both — digital for some subjects and paper for others.'
    question:
      text: 'What is the boy''s opinion about digital textbooks?'
      textZh: '男孩对数字教科书的看法是什么？'
      options:
        A: 'They are better than paper textbooks in every way.'
        B: 'They have some advantages but also cause distraction.'
        C: 'They are terrible and should be removed immediately.'
      answer: 'B'
      explanation: 'He likes the lighter bag and interactive features, but finds it "harder to concentrate" and gets "distracted by other apps."'
      explanationZh: '他喜欢更轻的书包和互动功能，但发现"更难集中注意力"并且"被其他应用分心。"'

  - id: L607
    type: short-extract
    title: 'The Debate About Pets'
    titleZh: '关于宠物的辩论'
    scene: 'You will hear a teacher summarising a class debate about school pets.'
    sceneZh: '你将听到一位老师总结关于学校宠物的班级辩论。'
    difficulty: 2
    audioFile: 'L607.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today''s debate was one of the best we have had all year. The "for" team argued that school pets teach empathy and responsibility. They even brought research showing that classrooms with pets have better attendance. The "against" team raised important concerns about allergies, costs, and who would care for the pet during holidays.'
      - speaker: teacher
        voice: nova
        text: 'What impressed me most was that both teams listened respectfully to each other. Nobody shouted, nobody made personal attacks, and everyone backed up their opinions with evidence. That is what real debate looks like.'
    question:
      text: 'What impressed the teacher most about the debate?'
      textZh: '辩论中最让老师印象深刻的是什么？'
      options:
        A: 'The "for" team won by a large margin.'
        B: 'Both teams were respectful and used evidence to support their views.'
        C: 'The students were very loud and passionate.'
      answer: 'B'
      explanation: 'The teacher was impressed that "both teams listened respectfully" and "everyone backed up their opinions with evidence."'
      explanationZh: '老师对"双方团队都尊重地倾听"和"每个人都用证据支持自己的观点"印象深刻。'

  - id: L608
    type: short-extract
    title: 'Learning to Argue Politely'
    titleZh: '学会礼貌地争论'
    scene: 'You will hear a girl talking about what she learned in debate class.'
    sceneZh: '你将听到一个女孩谈论她在辩论课上学到的东西。'
    difficulty: 3
    audioFile: 'L608.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The most useful thing I have learned in debate class is how to disagree politely. Before, when someone said something I thought was wrong, I would just say "No, you are wrong!" Now I use phrases like "I understand your point, but have you considered..." or "While that may be true, I would argue that..."'
      - speaker: girl
        voice: shimmer
        text: 'It has completely changed the way I communicate with my family too. Instead of arguing with my brother about who gets the TV remote, I actually discuss it calmly. My mum says debate class has been the best thing that ever happened to our family dinners!'
    question:
      text: 'How has debate class changed the girl''s communication?'
      textZh: '辩论课如何改变了女孩的交流方式？'
      options:
        A: 'She now avoids all disagreements and stays quiet.'
        B: 'She has learned to disagree politely using respectful phrases.'
        C: 'She has become louder and more aggressive in arguments.'
      answer: 'B'
      explanation: 'She learned to use phrases like "I understand your point, but..." and now communicates more calmly with family.'
      explanationZh: '她学会了使用"I understand your point, but..."等短语，现在与家人交流更加平静。'

  - id: L609
    type: short-extract
    title: 'The Pros and Cons of Homework'
    titleZh: '作业的利弊'
    scene: 'You will hear a student presenting pros and cons of homework.'
    sceneZh: '你将听到一个学生展示作业的利弊。'
    difficulty: 2
    audioFile: 'L609.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'For our English class, I had to write a balanced essay about homework. At first I thought it would be easy because I have a strong opinion — I dislike homework! But my teacher said the essay must present BOTH sides fairly.'
      - speaker: boy
        voice: echo
        text: 'So I interviewed my parents, my teachers, and my classmates. I was surprised to discover that even the students who dislike homework admitted it helps them prepare for tests. And even the teachers who love homework agreed it should not take longer than 30 minutes per subject. Writing that essay taught me more about the issue than any debate ever could.'
    question:
      text: 'What surprised the boy when researching his essay?'
      textZh: '男孩在研究他的议论文时感到惊讶的是什么？'
      options:
        A: 'That no one at all supports homework.'
        B: 'That even homework critics admit it has some value for test preparation.'
        C: 'That his teachers never do homework themselves.'
      answer: 'B'
      explanation: '"Even students who dislike homework admitted it helps them prepare for tests."'
      explanationZh: '"即使不喜欢作业的学生也承认它帮助他们准备考试。"'

  - id: L610
    type: short-extract
    title: 'The Future of Education'
    titleZh: '教育的未来'
    scene: 'You will hear a speaker at a school assembly talking about the future of education.'
    sceneZh: '你将听到一位在学校集会上的演讲者谈论教育的未来。'
    difficulty: 3
    audioFile: 'L610.mp3'
    script:
      - speaker: speaker
        voice: nova
        text: 'In twenty years, classrooms will look completely different. AI tutors will help each student learn at their own pace. Virtual reality will let students explore ancient Rome or walk on Mars. But here is what will NOT change: the need for human connection, the importance of working together, and the value of a great teacher who inspires you to be your best.'
      - speaker: speaker
        voice: nova
        text: 'Technology will enhance education, but it will never replace the spark that happens when a passionate teacher meets a curious student. That spark is the heart of all learning, and no algorithm can create it.'
    question:
      text: 'What does the speaker believe will NOT change in education?'
      textZh: '演讲者认为教育中什么不会改变？'
      options:
        A: 'The type of technology used in classrooms.'
        B: 'The importance of human connection and inspiring teachers.'
        C: 'The subjects taught in schools.'
      answer: 'B'
      explanation: '"What will NOT change: human connection, working together, and a great teacher who inspires you."'
      explanationZh: '"不会改变的是：人际联系、合作，以及一位激励你的伟大教师。"'

