  - id: L611
    type: sentence-completion
    title: 'Tips for Writing a Great Essay'
    titleZh: '写出好议论文的技巧'
    scene: 'You will hear a teacher giving advice on essay writing. For each gap, write one or two words.'
    sceneZh: '你将听到一位老师给出关于议论文写作的建议。每个空格写一两个词。'
    difficulty: 2
    audioFile: 'L611.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The first tip for writing a great essay is to plan before you write. Spend at least five minutes making a brief outline of your main arguments. The second tip is to always consider the opposing viewpoint — this shows the examiner that you have thought deeply about the topic. Third, use linking words like "furthermore" and "however" to connect your ideas smoothly. And finally, your conclusion should clearly state your opinion and summarise your strongest point.'
    questions:
      - id: L611-Q1
        text: 'Before writing, you should spend at least _____ minutes making an outline.'
        textZh: '写作前，你应该花至少 _____ 分钟做一个提纲。'
        answer: 'five'
        acceptableAnswers: ['five', '5']
        explanation: 'The teacher says "Spend at least five minutes making a brief outline."'
        explanationZh: '老师说"花至少五分钟做一个简要提纲。"'
      - id: L611-Q2
        text: 'Considering the opposing viewpoint shows the examiner that you have _____ about the topic.'
        textZh: '考虑对立观点表明考官你对这个话题有过 _____ 。'
        answer: 'thought deeply'
        acceptableAnswers: ['thought deeply']
        explanation: '"This shows the examiner that you have thought deeply about the topic."'
        explanationZh: '"这表明考官你对这个话题有过深入思考。"'
      - id: L611-Q3
        text: 'Your conclusion should clearly state your opinion and summarise your _____ point.'
        textZh: '你的结论应该清楚地陈述你的观点并总结你最 _____ 的论点。'
        answer: 'strongest'
        acceptableAnswers: ['strongest']
        explanation: '"Your conclusion should clearly state your opinion and summarise your strongest point."'
        explanationZh: '"你的结论应该清楚地陈述你的观点并总结你最强的论点。"'

  - id: L612
    type: sentence-completion
    title: 'The School Uniform Study'
    titleZh: '校服研究'
    scene: 'You will hear a researcher presenting findings about school uniforms. For each gap, write one or two words.'
    sceneZh: '你将听到一位研究者展示关于校服的发现。每个空格写一两个词。'
    difficulty: 3
    audioFile: 'L612.mp3'
    script:
      - speaker: researcher
        voice: nova
        text: 'Our study compared twenty schools with uniforms and twenty without. We found three key differences. First, schools with uniforms reported fewer incidents of clothing-related bullying. Second, families with uniforms spent approximately thirty per cent less on children''s clothing each year. Third, and perhaps most surprisingly, students at uniform schools showed slightly higher levels of school pride and belonging. However, we found no significant difference in academic performance between the two groups.'
    questions:
      - id: L612-Q1
        text: 'Schools with uniforms reported fewer incidents of clothing-related _____ .'
        textZh: '有校服的学校报告了更少的与穿着相关的 _____ 事件。'
        answer: 'bullying'
        acceptableAnswers: ['bullying']
        explanation: '"Schools with uniforms reported fewer incidents of clothing-related bullying."'
        explanationZh: '"有校服的学校报告了更少的与穿着相关的欺凌事件。"'
      - id: L612-Q2
        text: 'Families with uniforms spent approximately _____ per cent less on children''s clothing.'
        textZh: '有校服的家庭在孩子衣服上的花费大约少了 _____ 个百分点。'
        answer: 'thirty'
        acceptableAnswers: ['thirty', '30']
        explanation: '"Families with uniforms spent approximately thirty per cent less."'
        explanationZh: '"有校服的家庭花费大约少了百分之三十。"'
      - id: L612-Q3
        text: 'There was no significant difference in _____ between schools with and without uniforms.'
        textZh: '有校服和没有校服的学校在 _____ 方面没有显著差异。'
        answer: 'academic performance'
        acceptableAnswers: ['academic performance', 'performance']
        explanation: '"We found no significant difference in academic performance between the two groups."'
        explanationZh: '"我们发现两组在学业表现方面没有显著差异。"'

  - id: L613
    type: sentence-completion
    title: 'Benefits of Learning to Debate'
    titleZh: '学习辩论的好处'
    scene: 'You will hear a debate coach explaining the benefits of debating. For each gap, write one or two words.'
    sceneZh: '你将听到一位辩论教练解释辩论的好处。每个空格写一两个词。'
    difficulty: 2
    audioFile: 'L613.mp3'
    script:
      - speaker: coach
        voice: echo
        text: 'Learning to debate has three main benefits. First, it improves your critical thinking because you must evaluate evidence and spot weaknesses in arguments. Second, it builds confidence — many of my students started out terrified of public speaking, and now they can stand up in front of hundreds of people without fear. Third, it teaches respectful disagreement. In a world where people argue on social media without listening, the ability to disagree politely is incredibly valuable.'
    questions:
      - id: L613-Q1
        text: 'Debating improves critical thinking because you must evaluate evidence and spot _____ in arguments.'
        textZh: '辩论提高批判性思维，因为你必须评估证据并发现论点中的 _____ 。'
        answer: 'weaknesses'
        acceptableAnswers: ['weaknesses']
        explanation: '"You must evaluate evidence and spot weaknesses in arguments."'
        explanationZh: '"你必须评估证据并发现论点中的弱点。"'
      - id: L613-Q2
        text: 'Many students who were terrified of _____ can now speak in front of hundreds of people.'
        textZh: '许多曾经害怕 _____ 的学生现在能在数百人面前演讲。'
        answer: 'public speaking'
        acceptableAnswers: ['public speaking', 'speaking']
        explanation: '"Many of my students started out terrified of public speaking."'
        explanationZh: '"我的许多学生一开始害怕公开演讲。"'
      - id: L613-Q3
        text: 'The ability to disagree _____ is described as incredibly valuable in today''s world.'
        textZh: '_____ 地表示不同意的能力在当今世界被描述为极其宝贵。'
        answer: 'politely'
        acceptableAnswers: ['politely', 'respectfully']
        explanation: '"The ability to disagree politely is incredibly valuable."'
        explanationZh: '"礼貌地表示不同意的能力是极其宝贵的。"'

  - id: L614
    type: sentence-completion
    title: 'Screen Time Guidelines'
    titleZh: '屏幕时间指南'
    scene: 'You will hear a doctor discussing screen time guidelines for children. For each gap, write one or two words.'
    sceneZh: '你将听到一位医生讨论儿童屏幕时间指南。每个空格写一两个词。'
    difficulty: 3
    audioFile: 'L614.mp3'
    script:
      - speaker: doctor
        voice: nova
        text: 'The World Health Organisation recommends that children aged five to twelve should have no more than two hours of recreational screen time per day. However, many doctors, including myself, believe this guideline is too simple. What matters more than the total time is the quality of the content and the context in which it is consumed. A child using a tablet to code a game is having a completely different experience from a child passively scrolling through videos. We need to move beyond simply counting hours and start thinking about what children actually DO with their screens.'
    questions:
      - id: L614-Q1
        text: 'The WHO recommends no more than _____ hours of recreational screen time per day for children aged 5-12.'
        textZh: '世卫组织建议5-12岁儿童每天的娱乐性屏幕时间不超过 _____ 小时。'
        answer: 'two'
        acceptableAnswers: ['two', '2']
        explanation: '"No more than two hours of recreational screen time per day."'
        explanationZh: '"每天不超过两小时的娱乐性屏幕时间。"'
      - id: L614-Q2
        text: 'The doctor believes what matters more than total time is the _____ of content.'
        textZh: '医生认为比总时间更重要的是内容的 _____ 。'
        answer: 'quality'
        acceptableAnswers: ['quality']
        explanation: '"What matters more than the total time is the quality of the content."'
        explanationZh: '"比总时间更重要的是内容的质量。"'
      - id: L614-Q3
        text: 'The doctor says we should stop counting hours and start thinking about what children actually _____ with their screens.'
        textZh: '医生说我们应该停止计算小时数，开始思考孩子实际上用屏幕 _____ 。'
        answer: 'do'
        acceptableAnswers: ['do']
        explanation: '"Start thinking about what children actually DO with their screens."'
        explanationZh: '"开始思考孩子们实际上用屏幕做什么。"'

  - id: L615
    type: sentence-completion
    title: 'The Coding Success Story'
    titleZh: '编程成功故事'
    scene: 'You will hear a student talking about how coding changed her life. For each gap, write one or two words.'
