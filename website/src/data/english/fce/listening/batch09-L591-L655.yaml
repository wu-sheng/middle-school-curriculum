        name: 'Speaker 1'
        script: 'Coding develops logical thinking that transfers to every subject. When you learn to debug a program, you learn to find and fix errors in your thinking. That skill helps with maths, science, even essay writing. It should absolutely be compulsory.'
      - id: L630-S2
        name: 'Speaker 2'
        script: 'Not every child needs to code. We do not make every child learn to play the piano just because some will become musicians. Coding should be an option for those who are interested, not forced on everyone. Some children are better suited to art, sport, or languages.'
