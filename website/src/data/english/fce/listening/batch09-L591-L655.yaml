  - id: L624
    type: sentence-completion
    title: 'The Balanced Essay Approach'
    titleZh: '平衡的议论文方法'
    scene: 'You will hear exam advice about writing balanced essays.'
    sceneZh: '你将听到关于写平衡议论文的考试建议。'
    difficulty: 3
    audioFile: 'L624.mp3'
    script:
      - speaker: examiner
        voice: nova
        text: 'In the FCE Writing Part 1, you must write an essay. The most common mistake is writing a one-sided argument. Even if you have a strong opinion, you MUST show the examiner that you have considered the other side. Use phrases like "Admittedly" or "While it is true that" to introduce the opposing view, then explain why you still hold your position. This is called a concession, and it is worth a lot of marks. Remember: the examiner is testing your ability to write a balanced argument, not whether they agree with your opinion.'
    questions:
      - id: L624-Q1
        text: 'The most common essay mistake is writing a _____ argument.'
