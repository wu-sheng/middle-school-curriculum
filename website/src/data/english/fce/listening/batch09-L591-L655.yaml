        A: 'She uses angry language to demand change.'
        B: 'She presents benefits, acknowledges challenges, and offers solutions.'
        C: 'She threatens to leave the school if they say no.'
      answer: 'B'
      explanation: 'She presents benefits (science, nutrition, stress reduction), acknowledges challenges (space, funding), and offers solutions (unused area, parent donations).'
      explanationZh: '她展示好处（科学、营养、减压），承认挑战（空间、资金），并提供解决方案（未使用的区域、家长捐赠）。'

  - id: L633
    type: short-extract
    title: 'The Balanced View'
    titleZh: '平衡的观点'
    scene: 'You will hear a debate coach explaining what a balanced argument means.'
    sceneZh: '你将听到一位辩论教练解释什么是平衡的论证。'
    difficulty: 2
    audioFile: 'L633.mp3'
    script:
      - speaker: coach
        voice: echo
        text: 'A balanced argument does NOT mean you do not have an opinion. It means you show that you have CONSIDERED the other side before explaining why you still disagree. Think of it like a set of scales. You put the opposing arguments on one side, your arguments on the other, and then show the reader why your side weighs more.'
      - speaker: coach
        voice: echo
        text: 'The magic words are: "While I acknowledge that..." and "Admittedly..." These show maturity and fairness. Examiners love them because they prove you have thought critically about the topic.'
    question:
      text: 'According to the coach, what does a balanced argument require?'
      textZh: '根据教练的说法，一个平衡的论证需要什么？'
      options:
        A: 'Having no personal opinion on the topic.'
        B: 'Considering the other side before explaining your own position.'
        C: 'Giving both sides exactly equal space in the essay.'
      answer: 'B'
      explanation: '"It means you show that you have CONSIDERED the other side before explaining why you still disagree."'
      explanationZh: '"这意味着你表明你在解释为什么仍然不同意之前考虑了另一方面。"'

  - id: L634
    type: short-extract
    title: 'The Evidence-Based Argument'
    titleZh: '基于证据的论证'
    scene: 'You will hear a teacher explaining the importance of evidence in essays.'
    sceneZh: '你将听到一位老师解释证据在议论文中的重要性。'
    difficulty: 3
    audioFile: 'L634.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'An opinion without evidence is just a feeling. If you write "I think homework is bad," that is weak. But if you write "Research from Stanford University suggests that excessive homework can lead to stress and reduced sleep quality," that is a powerful argument. Always try to include at least one piece of evidence — a statistic, a study, or a real-world example — in each body paragraph.'
      - speaker: teacher
        voice: nova
        text: 'Even if you do not remember exact numbers, you can use phrases like "Studies suggest that..." or "According to recent research..." This makes your essay sound academic and well-informed.'
    question:
      text: 'What does the teacher say makes an argument stronger?'
      textZh: '老师说什么使论证更有力？'
      options:
        A: 'Using emotional language and exclamation marks.'
        B: 'Supporting opinions with evidence like statistics, studies, or examples.'
        C: 'Writing longer paragraphs with more words.'
      answer: 'B'
      explanation: '"Always try to include at least one piece of evidence — a statistic, a study, or a real-world example."'
      explanationZh: '"始终尝试包含至少一条证据——一个统计数据、一项研究或一个现实世界的例子。"'

  - id: L635
    type: short-extract
    title: 'The Concession Technique'
    titleZh: '让步技巧'
    scene: 'You will hear writing advice about using concessions in essays.'
    sceneZh: '你将听到关于在议论文中使用让步的写作建议。'
    difficulty: 3
    audioFile: 'L635.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'One of the most sophisticated techniques in essay writing is the concession. A concession is when you admit that the opposing side has a valid point, but then explain why your position is still stronger. For example: "Admittedly, homework can sometimes feel boring and repetitive. However, this does not mean it is without value — regular practice is essential for mastering skills like maths and spelling."'
      - speaker: teacher
        voice: shimmer
        text: 'A concession makes your essay much more convincing because it shows you are fair, thoughtful, and willing to engage with ideas you disagree with.'
    question:
      text: 'Why does a concession make an essay more convincing?'
      textZh: '为什么让步使议论文更有说服力？'
      options:
        A: 'It makes the essay longer and more detailed.'
        B: 'It shows the writer is fair and has considered opposing views.'
        C: 'It confuses the reader into agreeing with the writer.'
      answer: 'B'
      explanation: '"It shows you are fair, thoughtful, and willing to engage with ideas you disagree with."'
      explanationZh: '"它表明你是公平的、深思熟虑的，并且愿意与你不同意的观点互动。"'

  # L636-L640: Final Part 3/4 exercises
  - id: L636
    type: short-extract
    title: 'The Digital Citizenship Lesson'
    titleZh: '数字公民课程'
    scene: 'You will hear a teacher describing a digital citizenship class.'
    sceneZh: '你将听到一位老师描述数字公民课程。'
    difficulty: 2
    audioFile: 'L636.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'Instead of banning phones, we now teach digital citizenship. Students learn to identify fake news by checking sources, recognise cyberbullying and know how to report it, and manage their screen time using built-in tools. The goal is not to keep children away from technology, but to teach them to use it wisely and responsibly.'
      - speaker: teacher
        voice: echo
        text: 'The response has been fantastic. Students say they feel more confident online, and parents report fewer arguments about screen time at home. Prevention through education works much better than prohibition.'
    question:
      text: 'What is the main goal of digital citizenship classes?'
      textZh: '数字公民课程的主要目标是什么？'
      options:
        A: 'To stop children from using technology completely.'
        B: 'To teach children to use technology wisely and responsibly.'
        C: 'To teach children advanced computer programming.'
      answer: 'B'
      explanation: '"The goal is not to keep children away from technology, but to teach them to use it wisely and responsibly."'
      explanationZh: '"目标不是让孩子远离技术，而是教他们明智地、负责任地使用它。"'

  # ============================================================
  # L641–L655: Part 4 — Long Conversation (Debate Theme)
  # ============================================================

  - id: L641
    type: long-conversation
    title: 'The Debate Club Interview'
    titleZh: '辩论社访谈'
    scene: 'You will hear an interview with two students about their debate club experience.'
    sceneZh: '你将听到对两名学生关于辩论社经历的访谈。'
    difficulty: 3
    audioFile: 'L641.mp3'
    script:
      - speaker: interviewer
        voice: nova
        text: 'Tell me, what is the most important thing you have learned from debating?'
      - speaker: student1
        voice: shimmer
        text: 'For me, it is the ability to argue for something I do not believe in. In our last debate, I had to defend the idea that all homework should be abolished. I disagree with that completely, but by the end, I understood WHY some people feel that way.'
      - speaker: student2
        voice: echo
        text: 'I agree with Priya. But for me personally, the biggest lesson was learning to lose gracefully. When you lose a debate, it does not mean your opinion is wrong — it means the other team presented their case better. That has taught me to handle criticism and feedback in every area of my life.'
      - speaker: interviewer
        voice: nova
        text: 'Would you recommend debate club to other students?'
      - speaker: student1
        voice: shimmer
        text: 'Absolutely. Even if you never compete, the skills you learn — critical thinking, public speaking, and respectful disagreement — will help you for the rest of your life.'
    questions:
      - id: L641-Q1
        text: 'What did Priya find most valuable about debating?'
        textZh: 'Priya认为辩论中最有价值的是什么？'
        options:
          A: 'Winning debate competitions and earning trophies.'
          B: 'Learning to argue for ideas she does not personally believe in.'
          C: 'Making lots of new friends in the debate club.'
        answer: 'B'
        explanation: 'Priya says "the ability to argue for something I do not believe in" is the most important lesson.'
        explanationZh: 'Priya说"为自己不相信的东西辩护的能力"是最重要的教训。'
      - id: L641-Q2
        text: 'What lesson did the second student learn from losing debates?'
        textZh: '第二个学生从输掉辩论中学到了什么？'
        options:
          A: 'That they should always agree with the winning team.'
          B: 'That losing means their opinion was wrong.'
          C: 'How to handle criticism and feedback gracefully.'
        answer: 'C'
        explanation: '"Learning to lose gracefully...has taught me to handle criticism and feedback in every area of my life."'
        explanationZh: '"学会优雅地失败……教会了我在生活的每个领域处理批评和反馈。"'
      - id: L641-Q3
        text: 'What three skills does Priya say debating teaches?'
        textZh: 'Priya说辩论教授哪三项技能？'
        options:
          A: 'Reading, writing, and arithmetic.'
          B: 'Critical thinking, public speaking, and respectful disagreement.'
          C: 'Speed reading, memory tricks, and note-taking.'
        answer: 'B'
        explanation: '"Critical thinking, public speaking, and respectful disagreement — will help you for the rest of your life."'
        explanationZh: '"批判性思维、公开演讲和尊重的分歧——将在你的余生中帮助你。"'

  - id: L642
    type: long-conversation
    title: 'Should We Ban Homework? — Panel Discussion'
    titleZh: '我们应该禁止作业吗？——小组讨论'
    scene: 'You will hear a panel discussion between a parent, a teacher, and a student about homework.'
    sceneZh: '你将听到一位家长、一位教师和一位学生之间关于作业的小组讨论。'
    difficulty: 3
    audioFile: 'L642.mp3'
    script:
      - speaker: host
        voice: nova
        text: 'Let us hear from each of you. Should homework be banned?'
      - speaker: parent
        voice: shimmer
        text: 'I do not think it should be banned completely, but the amount needs to be reduced significantly. My ten-year-old spends two hours on homework every evening. That is too much. By the time she finishes, she is too tired to do anything else.'
      - speaker: teacher
        voice: echo
        text: 'I understand that concern. But as a maths teacher, I know that daily practice is essential. You cannot learn times tables by doing them only in the classroom. The key is not LESS homework, but BETTER homework — short, focused tasks that take no more than twenty minutes.'
      - speaker: student
        voice: shimmer
        text: 'Can I make a suggestion? Why not let students CHOOSE their homework? Some of us learn better by doing worksheets, some by watching videos, and some by making things. If we could pick how we revise, we would actually enjoy it more and learn better.'
    questions:
      - id: L642-Q1
        text: 'What does the parent think about homework?'
        textZh: '家长对作业的看法是什么？'
        options:
          A: 'It should be completely banned.'
          B: 'The amount should be significantly reduced.'
          C: 'It should be increased for older students.'
        answer: 'B'
        explanation: '"I do not think it should be banned completely, but the amount needs to be reduced significantly."'
        explanationZh: '"我不认为应该完全禁止，但数量需要大幅减少。"'
      - id: L642-Q2
        text: 'What is the teacher''s view on homework?'
        textZh: '教师对作业的看法是什么？'
        options:
          A: 'It should be longer and more challenging.'
          B: 'The focus should be on better quality, not less quantity.'
          C: 'Only maths homework should be given.'
        answer: 'B'
        explanation: '"The key is not LESS homework, but BETTER homework — short, focused tasks."'
        explanationZh: '"关键不是更少的作业，而是更好的作业——简短、有针对性的任务。"'
      - id: L642-Q3
        text: 'What does the student suggest?'
        textZh: '学生建议什么？'
        options:
          A: 'Doing homework only on weekends.'
          B: 'Letting students choose how they revise and learn.'
          C: 'Having parents do the homework instead.'
        answer: 'B'
        explanation: '"Why not let students CHOOSE their homework?...If we could pick how we revise, we would actually enjoy it more."'
        explanationZh: '"为什么不让学生选择自己的作业？……如果我们可以选择如何复习，我们会更享受。"'

  # L643-L655: Additional Part 4 conversations
  - id: L643
    type: long-conversation
    title: 'The School Pet Decision'
    titleZh: '学校宠物决定'
    scene: 'You will hear two students discussing their school''s decision to get a pet.'
    sceneZh: '你将听到两个学生讨论学校养宠物的决定。'
    difficulty: 3
    audioFile: 'L643.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I heard we are finally getting a school pet! Are you excited?'
      - speaker: boy
        voice: echo
        text: 'I am a bit worried, actually. My sister is allergic to cats and dogs. If they get a furry animal, she would not be able to go into that classroom.'
      - speaker: girl
        voice: shimmer
        text: 'Oh, I did not think about that. But I heard they are getting fish, specifically because of allergies. Nobody is allergic to fish! And apparently watching fish swim is proven to reduce stress. I think it is a great compromise.'
      - speaker: boy
        voice: echo
        text: 'Fish are a good choice, I suppose. And the biology teacher said we could study them as part of our science lessons. So it would be educational too. I just hope someone remembers to feed them during the holidays!'
    questions:
      - id: L643-Q1
        text: 'Why is the boy worried about the school pet?'
        textZh: '男孩为什么担心学校宠物？'
        options:
          A: 'He is afraid of all animals.'
          B: 'His sister is allergic to furry animals.'
          C: 'He thinks pets are too expensive.'
        answer: 'B'
        explanation: '"My sister is allergic to cats and dogs."'
        explanationZh: '"我妹妹对猫和狗过敏。"'
      - id: L643-Q2
        text: 'Why were fish chosen as the school pet?'
        textZh: '为什么选鱼作为学校宠物？'
        options:
          A: 'They are the cheapest pet available.'
          B: 'The headteacher''s favourite pet is a fish.'
          C: 'Nobody is allergic to fish and they reduce stress.'
        answer: 'C'
        explanation: '"They are getting fish, specifically because of allergies. Nobody is allergic to fish! And...watching fish swim is proven to reduce stress."'
        explanationZh: '"他们选鱼，正是因为过敏问题。没有人对鱼过敏！而且……看鱼游泳被证明能减少压力。"'
      - id: L643-Q3
        text: 'What additional benefit does the boy mention?'
        textZh: '男孩提到了什么额外的好处？'
        options:
          A: 'The fish could be used in science lessons.'
          B: 'The fish could be sold for money.'
          C: 'The fish would attract visitors to the school.'
        answer: 'A'
        explanation: '"The biology teacher said we could study them as part of our science lessons."'
        explanationZh: '"生物老师说我们可以在科学课上研究它们。"'

  - id: L644
    type: long-conversation
    title: 'Writing an Essay Together'
    titleZh: '一起写议论文'
    scene: 'You will hear two students planning an essay about social media.'
    sceneZh: '你将听到两个学生计划一篇关于社交媒体的议论文。'
    difficulty: 3
    audioFile: 'L644.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'OK, so our essay question is "Does social media do more harm than good?" What should we put in the introduction?'
      - speaker: boy
        voice: echo
        text: 'We should state the topic clearly and give our overall opinion. Something like: "Social media has become a central part of young people''s lives. While it has clear benefits, I believe the risks currently outweigh the advantages."'
      - speaker: girl
        voice: shimmer
        text: 'Good. Then for the first body paragraph, we present our arguments — cyberbullying, addiction, unrealistic images. For the second body paragraph, we acknowledge the other side — creativity, connection, education.'
      - speaker: boy
        voice: echo
        text: 'And the conclusion brings it all together. We could say something like: "On balance, while social media offers valuable opportunities for connection and creativity, the current risks to young people''s mental health mean that stricter safeguards are needed."'
    questions:
      - id: L644-Q1
        text: 'What is the essay question?'
        textZh: '议论文的题目是什么？'
        options:
          A: 'Should social media be banned for everyone?'
          B: 'Does social media do more harm than good?'
          C: 'How can we make social media safer?'
        answer: 'B'
        explanation: '"Our essay question is: Does social media do more harm than good?"'
        explanationZh: '"我们的议论文题目是：社交媒体利大于弊还是弊大于利？"'
      - id: L644-Q2
        text: 'What do the students plan to put in the second body paragraph?'
        textZh: '学生们计划在第二个正文段中放什么？'
        options:
          A: 'More arguments supporting their own view.'
          B: 'An acknowledgement of the opposing side''s points.'
          C: 'Statistics about social media usage.'
        answer: 'B'
        explanation: '"For the second body paragraph, we acknowledge the other side — creativity, connection, education."'
        explanationZh: '"第二个正文段，我们承认另一方——创造力、连接、教育。"'
      - id: L644-Q3
        text: 'What phrase do they use to start the conclusion?'
        textZh: '他们用什么短语开始结论？'
        options:
          A: 'First and foremost'
          B: 'On balance'
          C: 'Furthermore'
        answer: 'B'
        explanation: 'The conclusion starts with "On balance, while social media offers..."'
        explanationZh: '结论以"On balance, while social media offers..."开始。'

  - id: L645
    type: long-conversation
    title: 'The Future of Schools'
    titleZh: '学校的未来'
    scene: 'You will hear two students imagining the school of the future.'
    sceneZh: '你将听到两个学生想象未来的学校。'
    difficulty: 3
    audioFile: 'L645.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Imagine if schools in 2050 had AI teachers, virtual reality field trips, and no textbooks — everything digital. Would you want to go there?'
      - speaker: girl
        voice: shimmer
        text: 'Parts of it sound amazing — I would love VR field trips to ancient Egypt! But I would miss having a real teacher who knows my name, notices when I am sad, and tells me jokes. AI cannot do that.'
      - speaker: boy
        voice: echo
        text: 'True. Maybe the best future school would combine both — AI for personalised practice and revision, and human teachers for inspiration, guidance, and the social side. Technology and humans working together.'
      - speaker: girl
        voice: shimmer
        text: 'I like that idea. Technology should enhance teaching, not replace it. The human connection is what makes school special. Without it, learning would feel cold and lonely.'
    questions:
      - id: L645-Q1
        text: 'What aspect of future schools excites the girl?'
        textZh: '未来学校的哪个方面让女孩兴奋？'
        options:
          A: 'Having no teachers at all.'
          B: 'Virtual reality field trips.'
          C: 'Longer school holidays.'
        answer: 'B'
        explanation: '"I would love VR field trips to ancient Egypt!"'
        explanationZh: '"我会喜欢去古埃及的VR实地考察！"'
      - id: L645-Q2
        text: 'What does the boy suggest for the ideal future school?'
        textZh: '男孩为理想的未来学校提出了什么建议？'
        options:
          A: 'Replace all teachers with AI immediately.'
          B: 'Combine AI for practice with human teachers for inspiration.'
          C: 'Go back to using only paper books and chalkboards.'
        answer: 'B'
        explanation: '"AI for personalised practice and revision, and human teachers for inspiration, guidance, and the social side."'
        explanationZh: '"AI用于个性化练习和复习，人类教师用于灵感、指导和社交方面。"'
      - id: L645-Q3
        text: 'What does the girl say makes school special?'
        textZh: '女孩说什么使学校变得特别？'
        options:
          A: 'The subjects and exams.'
          B: 'The technology and equipment.'
          C: 'The human connection.'
        answer: 'C'
        explanation: '"The human connection is what makes school special."'
        explanationZh: '"人际联系是学校变得特别的原因。"'

  # L646-L655: Remaining conversations (abbreviated)
  - id: L646
    type: short-extract
    title: 'The Counterargument Strategy'
    titleZh: '反论点策略'
    scene: 'You will hear essay advice about counterarguments.'
    sceneZh: '你将听到关于反论点的议论文建议。'
    difficulty: 3
    audioFile: 'L646.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Here is a powerful essay strategy: present the strongest counterargument against your position, and then systematically dismantle it. For example, if you support school pets, address the allergy concern directly: "Critics rightly point out that some children are allergic to animal fur. However, this problem can be easily solved by choosing hypoallergenic pets such as fish or reptiles."'
      - speaker: teacher
        voice: nova
        text: 'By addressing the counterargument head-on, you show confidence in your position and prevent the reader from thinking: "But what about allergies?" You have already answered their objection before they even raised it.'
    question:
      text: 'What essay strategy does the teacher recommend?'
      textZh: '老师推荐什么议论文策略？'
      options:
        A: 'Ignoring counterarguments completely.'
        B: 'Addressing the strongest counterargument and then countering it.'
        C: 'Agreeing with the counterargument and changing your opinion.'
      answer: 'B'
      explanation: '"Present the strongest counterargument against your position, and then systematically dismantle it."'
      explanationZh: '"提出反对你立场的最强反论点，然后系统地拆解它。"'

  - id: L647
    type: short-extract
    title: 'The Compromise Solution'
    titleZh: '妥协方案'
    scene: 'You will hear a student explaining why compromise is important in debates.'
    sceneZh: '你将听到一个学生解释为什么妥协在辩论中很重要。'
    difficulty: 2
    audioFile: 'L647.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'In real life, the best solutions are almost always compromises. Neither side gets everything they want, but both sides get something. Our school''s homework policy is a perfect example — students wanted no homework, teachers wanted daily homework, and the compromise was homework three days a week with student choice.'
      - speaker: girl
        voice: shimmer
        text: 'In your essay conclusion, suggesting a compromise shows maturity. Instead of just saying "I am right and they are wrong," you can say "Perhaps the best solution lies somewhere in the middle." The examiner will be impressed.'
    question:
      text: 'Why does the student recommend suggesting a compromise in essays?'
      textZh: '学生为什么建议在议论文中提出妥协？'
      options:
        A: 'Because it shows you cannot make up your mind.'
        B: 'Because it shows maturity and impresses examiners.'
        C: 'Because examiners only accept compromise answers.'
      answer: 'B'
      explanation: '"Suggesting a compromise shows maturity...The examiner will be impressed."'
      explanationZh: '"提出妥协展示了成熟度……考官会印象深刻。"'

  - id: L648
    type: short-extract
    title: 'The Power of Listening'
    titleZh: '倾听的力量'
    scene: 'You will hear a debate champion talking about the importance of listening.'
    sceneZh: '你将听到一位辩论冠军谈论倾听的重要性。'
    difficulty: 2
    audioFile: 'L648.mp3'
    script:
      - speaker: champion
        voice: echo
        text: 'Everyone talks about the power of speaking well. But I have won more debates by listening carefully than by speaking brilliantly. When I really listen to what the other team says, I can find the weak spot in their argument and target it precisely. Most debaters are so busy planning their next speech that they miss what the other side is actually saying.'
      - speaker: champion
        voice: echo
        text: 'My advice? Write down one key word from each of the other team''s points. Then, when it is your turn, address those exact points. The judges love it when you directly respond to what was just said.'
    question:
      text: 'What does the debate champion say wins more debates?'
      textZh: '辩论冠军说什么赢得更多辩论？'
      options:
        A: 'Speaking louder than the other team.'
        B: 'Listening carefully and targeting weak points.'
        C: 'Having the most facts and statistics.'
      answer: 'B'
      explanation: '"I have won more debates by listening carefully than by speaking brilliantly."'
      explanationZh: '"我通过认真倾听赢得的辩论比出色演讲赢得的更多。"'

  - id: L649
    type: short-extract
    title: 'The Opinion Scale'
    titleZh: '观点量表'
    scene: 'You will hear a teacher explaining how to express opinions with different levels of strength.'
    sceneZh: '你将听到一位老师解释如何用不同的强度表达观点。'
    difficulty: 3
    audioFile: 'L649.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Not all opinions are expressed with the same strength. "I am absolutely certain" is very strong. "I believe" is strong. "I tend to think" is moderate. And "It could be argued" is very cautious. In an FCE essay, you should mostly use moderate language. Save the strong language for your conclusion.'
      - speaker: teacher
        voice: nova
        text: 'Also, avoid words like "always," "never," and "everyone" in your essay. These are overgeneralisations. Instead, use "tend to," "in many cases," and "the majority of." This makes your writing sound more academic and thoughtful.'
    question:
      text: 'What does the teacher advise about expressing opinions in essays?'
      textZh: '老师关于在议论文中表达观点有什么建议？'
      options:
        A: 'Always use the strongest possible language.'
        B: 'Use mostly moderate language and save strong language for the conclusion.'
        C: 'Never state your opinion directly in the essay.'
      answer: 'B'
      explanation: '"You should mostly use moderate language. Save the strong language for your conclusion."'
      explanationZh: '"你应该主要使用适度的语言。把强烈的语言留给结论。"'

  - id: L650
    type: short-extract
    title: 'The Introduction Hook'
    titleZh: '引言钩子'
    scene: 'You will hear a writing teacher explaining how to start an essay.'
    sceneZh: '你将听到一位写作老师解释如何开始议论文。'
    difficulty: 2
    audioFile: 'L650.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'The first sentence of your essay is the most important. It is your hook — the sentence that grabs the reader and makes them want to continue. A boring opening like "In this essay I will discuss homework" gets low marks. Instead, try a thought-provoking question, a surprising statistic, or a bold statement.'
      - speaker: teacher
        voice: shimmer
        text: 'For example: "Every evening, millions of children around the world sit at their desks doing homework. But what if this daily ritual is actually doing more harm than good?" That opening makes the reader curious. It makes them think: "Interesting — tell me more!"'
    question:
      text: 'What does the teacher say is the best way to start an essay?'
      textZh: '老师说开始议论文的最佳方式是什么？'
      options:
        A: 'Write "In this essay I will discuss..."'
        B: 'Start with a question, surprising statistic, or bold statement.'
        C: 'Begin with a long description of the topic background.'
      answer: 'B'
      explanation: '"Try a thought-provoking question, a surprising statistic, or a bold statement."'
      explanationZh: '"试试一个发人深省的问题、一个令人惊讶的统计数据或一个大胆的陈述。"'

  - id: L651
    type: short-extract
    title: 'The Strong Conclusion'
    titleZh: '有力的结论'
    scene: 'You will hear advice on writing effective essay conclusions.'
    sceneZh: '你将听到关于写有效议论文结论的建议。'
    difficulty: 3
    audioFile: 'L651.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'A weak conclusion just repeats what you already said. "In conclusion, homework is bad." Boring! A strong conclusion does three things: it summarises your position briefly, it leaves the reader with something to think about, and it ends with a memorable sentence. For example: "In conclusion, while homework has its place, we must ask ourselves: is the current system serving our children, or are our children serving the system?"'
      - speaker: teacher
        voice: nova
        text: 'Notice the rhetorical question at the end. It makes the reader pause and think. That is the sign of a truly effective conclusion.'
    question:
      text: 'What three things should a strong conclusion do?'
      textZh: '一个有力的结论应该做哪三件事？'
      options:
        A: 'Introduce new arguments, add more evidence, and ask the reader to do research.'
        B: 'Summarise your position, leave the reader thinking, and end memorably.'
        C: 'Repeat every point from the essay, add a quote, and say goodbye.'
      answer: 'B'
      explanation: 'It should "summarise your position briefly, leave the reader with something to think about, and end with a memorable sentence."'
      explanationZh: '应该"简要总结你的立场，留给读者一些思考，并以一个令人难忘的句子结尾。"'

  - id: L652
    type: short-extract
    title: 'The Debate About Online Friends'
    titleZh: '关于网友的辩论'
    scene: 'You will hear two students debating whether online friendships are real friendships.'
    sceneZh: '你将听到两个学生辩论网上友谊是否是真正的友谊。'
    difficulty: 2
    audioFile: 'L652.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I have online friends from my coding community who I have never met in person. But they understand me better than some people at school. We share ideas, help each other with problems, and celebrate each other''s successes. That is a real friendship in my book.'
      - speaker: boy
        voice: echo
        text: 'I see your point, but I think something is missing. You cannot hug an online friend, or share a pizza with them, or see the look on their face when they laugh. Real friendship needs those physical moments. Online connections are valuable, but I would not call them the same thing.'
    question:
      text: 'What do the two students disagree about?'
      textZh: '两个学生在什么问题上意见不同？'
      options:
        A: 'Whether online coding is useful for learning.'
        B: 'Whether online friendships can be considered real friendships.'
        C: 'Whether children should be allowed to use the internet.'
      answer: 'B'
      explanation: 'The girl considers her online friends real; the boy thinks physical presence is needed for true friendship.'
      explanationZh: '女孩认为她的网友是真正的朋友；男孩认为真正的友谊需要实际在场。'

  - id: L653
    type: short-extract
    title: 'The Formal vs Informal Register'
    titleZh: '正式vs非正式语域'
    scene: 'You will hear a teacher explaining formal and informal register in essay writing.'
    sceneZh: '你将听到一位老师解释议论文写作中的正式和非正式语域。'
    difficulty: 3
    audioFile: 'L653.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'In an FCE essay, you must use formal register. That means no contractions — write "do not" instead of "don''t." No slang — write "children" instead of "kids." And no personal chat — write "It is widely believed that" instead of "Everyone thinks that." Using formal language shows the examiner you can write at an academic level.'
      - speaker: teacher
        voice: nova
        text: 'However, do not go overboard. Your essay should sound natural, not like a robot. A good essay is formal but still has a human voice. Imagine you are writing a letter to a respected teacher — polite, clear, and professional.'
    question:
      text: 'What is the main rule about register in FCE essays?'
      textZh: 'FCE议论文中关于语域的主要规则是什么？'
      options:
        A: 'Use informal, friendly language like you are texting a friend.'
        B: 'Use formal language without contractions or slang.'
        C: 'Use the most complicated words you can find.'
      answer: 'B'
      explanation: '"Use formal register. No contractions, no slang, no personal chat."'
      explanationZh: '"使用正式语域。不用缩写，不用俚语，不用个人聊天。"'

  - id: L654
    type: short-extract
    title: 'The Debate That Changed My Mind'
    titleZh: '改变我想法的辩论'
    scene: 'You will hear a student talking about a debate that changed their opinion.'
    sceneZh: '你将听到一个学生谈论一场改变了他们观点的辩论。'
    difficulty: 2
    audioFile: 'L654.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I used to think school uniforms were pointless. I hated wearing one and thought it was just about control. But during a debate, a classmate shared something personal. She said that before uniforms were introduced, she was bullied every day because her family could not afford nice clothes. The uniform gave her confidence and a sense of belonging.'
      - speaker: boy
        voice: echo
        text: 'That story changed everything for me. I realised I was only seeing the issue from my own perspective. Now I understand that my privilege — being able to afford nice clothes — blinded me to the struggles of others. That is what debate taught me: always try to see beyond your own experience.'
    question:
      text: 'What made the boy change his mind about uniforms?'
      textZh: '什么让男孩改变了对校服的看法？'
      options:
        A: 'A teacher forced him to support uniforms.'
        B: 'He heard a classmate''s personal story about being bullied for her clothes.'
        C: 'He read a research article about uniform benefits.'
      answer: 'B'
      explanation: '"A classmate shared something personal...she was bullied every day because her family could not afford nice clothes."'
      explanationZh: '"一位同学分享了个人经历……她每天因为家里买不起好衣服而被欺负。"'

  - id: L655
    type: short-extract
    title: 'The Final Essay Checklist'
    titleZh: '最终议论文检查清单'
    scene: 'You will hear a teacher sharing a final checklist for essay writing.'
    sceneZh: '你将听到一位老师分享议论文写作的最终检查清单。'
    difficulty: 2
    audioFile: 'L655.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'Before you hand in your essay, check these five things. One: does your introduction clearly state the topic and your opinion? Two: does each body paragraph have one main idea with evidence to support it? Three: have you acknowledged the opposing view at least once? Four: have you used formal language with no contractions? And five: does your conclusion end with a strong, memorable sentence?'
      - speaker: teacher
        voice: shimmer
        text: 'If you can answer yes to all five questions, you are ready to submit. This simple checklist has helped my students improve their essay scores by an average of fifteen per cent. It really works!'
    question:
      text: 'How many things are on the teacher''s essay checklist?'
      textZh: '老师的议论文检查清单上有多少项？'
      options:
        A: 'Three'
        B: 'Five'
        C: 'Seven'
      answer: 'B'
      explanation: '"Check these five things" — introduction, evidence, opposing view, formal language, strong conclusion.'
      explanationZh: '"检查这五件事"——引言、证据、对立观点、正式语言、有力结论。'
