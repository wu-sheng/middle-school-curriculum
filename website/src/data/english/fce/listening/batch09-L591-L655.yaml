        explanation: '"Coding is not just about computers — it is about using technology to help people."'
        explanationZh: '"编程不仅仅是关于电脑——它是关于使用技术来帮助人们。"'

  - id: L616
    type: sentence-completion
    title: 'Essay Structure Guide'
    titleZh: '议论文结构指南'
    scene: 'You will hear a writing teacher explaining essay structure.'
    sceneZh: '你将听到一位写作老师解释议论文结构。'
    difficulty: 2
    audioFile: 'L616.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'An FCE essay has four paragraphs. The introduction states the topic and your overall opinion. The first body paragraph presents arguments that support your view. The second body paragraph acknowledges the opposing view and explains why you still disagree. And the conclusion summarises your main points and restates your position. Remember: always end with a strong final sentence that the reader will remember.'
    questions:
      - id: L616-Q1
        text: 'An FCE essay should have _____ paragraphs.'
        textZh: 'FCE议论文应该有 _____ 段。'
        answer: 'four'
        acceptableAnswers: ['four', '4']
        explanation: '"An FCE essay has four paragraphs."'
        explanationZh: '"FCE议论文有四段。"'
      - id: L616-Q2
        text: 'The second body paragraph acknowledges the _____ view.'
        textZh: '第二个正文段承认 _____ 观点。'
        answer: 'opposing'
        acceptableAnswers: ['opposing', 'opposite']
        explanation: '"The second body paragraph acknowledges the opposing view."'
        explanationZh: '"第二个正文段承认对立观点。"'
      - id: L616-Q3
        text: 'The conclusion should end with a strong final _____ the reader will remember.'
        textZh: '结论应该以读者会记住的有力的最后 _____ 结束。'
        answer: 'sentence'
        acceptableAnswers: ['sentence']
        explanation: '"Always end with a strong final sentence that the reader will remember."'
        explanationZh: '"始终以读者会记住的有力的最终句子结尾。"'

  - id: L617
    type: sentence-completion
    title: 'The Homework Compromise'
    titleZh: '作业妥协'
