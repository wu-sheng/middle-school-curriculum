        acceptableAnswers: ['eight', '8']
        explanation: '"Approximately eight per cent of children are allergic to animal fur."'
        explanationZh: '"大约百分之八的儿童对动物毛发过敏。"'
      - id: L618-Q2
        text: 'Fish, reptiles, and _____ do not trigger allergies.'
        textZh: '鱼类、爬行动物和 _____ 不会引发过敏。'
        answer: 'insects'
        acceptableAnswers: ['insects']
        explanation: '"Fish, reptiles, and insects do not trigger allergies at all."'
        explanationZh: '"鱼类、爬行动物和昆虫完全不会引发过敏。"'
      - id: L618-Q3
        text: 'Before introducing any animal, the school should consult with _____ .'
