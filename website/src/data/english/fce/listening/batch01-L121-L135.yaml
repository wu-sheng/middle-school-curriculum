# FCE Daily Practice – Listening Extracts Batch 1, Sentence Completion (L121–L135)
# Type: sentence-completion (FCE Listening Part 2)
# 15 longer monologues, 1 every 2 days across months 1–2
# Each monologue ~2 minutes spoken, 10–15 script lines, 5–8 sentence completions

extracts:
  # ============================================================
  # L121: Zoo Guide – Penguin House Tour
  # ============================================================

  - id: L121
    type: sentence-completion
    title: 'Tour of the Penguin House'
    titleZh: '企鹅馆导览'
    scene: 'You will hear a zoo guide talking about the penguin house.'
    sceneZh: '你将听到一位动物园导游介绍企鹅馆。'
    difficulty: 1
    audioFile: 'L121.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Welcome, everyone, to the Penguin House! My name is Sarah and I will be your guide today. We have over forty penguins here, from three different species.'
      - speaker: guide
        voice: nova
        text: 'The biggest group is the Gentoo penguins — you can spot them easily because they have a white stripe across the top of their head. We also have a small family of Emperor penguins and some adorable Little Blue penguins from New Zealand.'
      - speaker: guide
        voice: nova
        text: 'The penguins are fed three times a day — in the morning at eight o''clock, at lunchtime around twelve thirty, and just before we close at half past four.'
      - speaker: guide
        voice: nova
        text: 'Each penguin eats roughly two kilograms of fish per day. Their favourite food is herring, but they also enjoy squid and sardines.'
      - speaker: guide
        voice: nova
        text: 'Now, if you look to your left, you will see the swimming pool. It holds over six hundred thousand litres of salt water, which is kept at a chilly four degrees Celsius. That is the same temperature as the ocean around Antarctica.'
      - speaker: guide
        voice: nova
        text: 'The pool is cleaned every Tuesday and Friday by our team of five keepers. During cleaning, the penguins move to a smaller holding area behind the rocks.'
      - speaker: guide
        voice: nova
        text: 'One of our most popular penguins is called Biscuit. He arrived here as a tiny chick in two thousand and nineteen and is now the tallest penguin in the house. Biscuit loves to show off — he often slides on his belly right up to the glass to say hello to visitors.'
      - speaker: guide
        voice: nova
        text: 'If you would like to watch the lunchtime feeding, it starts in about twenty minutes. The keepers will throw fish into the pool and you can see how fast the penguins swim — they can reach speeds of up to thirty-six kilometres per hour underwater!'
      - speaker: guide
        voice: nova
        text: 'Before we move on, I should mention that the gift shop near the exit sells cuddly penguin toys. All the money raised goes towards our penguin conservation programme in South America.'
      - speaker: guide
        voice: nova
        text: 'Right, let''s head over to the viewing platform on the second floor, where you can watch the penguins from above. Please follow me and watch your step on the stairs.'
    sentences:
      - id: L121-S1
        text: 'The zoo has over _____ penguins from three species.'
        textZh: '动物园有超过 _____ 只来自三个种类的企鹅。'
        answer: 'forty'
      - id: L121-S2
        text: 'You can recognise Gentoo penguins by the white _____ on their head.'
        textZh: '你可以通过头上的白色 _____ 来辨认巴布亚企鹅。'
        answer: 'stripe'
      - id: L121-S3
        text: 'The penguins are fed _____ times a day.'
        textZh: '企鹅每天喂食 _____ 次。'
        answer: 'three'
      - id: L121-S4
        text: 'Each penguin eats about _____ kilograms of fish per day.'
        textZh: '每只企鹅每天吃大约 _____ 公斤的鱼。'
        answer: 'two'
      - id: L121-S5
        text: 'The swimming pool water is kept at _____ degrees Celsius.'
        textZh: '游泳池的水温保持在 _____ 摄氏度。'
        answer: 'four'
      - id: L121-S6
        text: 'The most popular penguin is called _____.'
        textZh: '最受欢迎的企鹅名叫 _____。'
        answer: 'Biscuit'
      - id: L121-S7
        text: 'Penguins can swim at speeds of up to _____ kilometres per hour.'
        textZh: '企鹅的游泳速度可达每小时 _____ 公里。'
        answer: 'thirty-six'
      - id: L121-S8
        text: 'Money from the gift shop supports a conservation programme in _____.'
        textZh: '礼品店的收入用于支持 _____ 的企鹅保护项目。'
        answer: 'South America'

  # ============================================================
  # L122: Teacher – Science Project about Volcanoes
  # ============================================================

  - id: L122
    type: sentence-completion
    title: 'The Volcano Science Project'
    titleZh: '火山科学项目'
    scene: 'You will hear a teacher explaining a science project about volcanoes.'
    sceneZh: '你将听到一位老师讲解关于火山的科学项目。'
    difficulty: 1
    audioFile: 'L122.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Good morning, class! Today I am going to explain your next science project. You are going to build a model volcano and make it erupt. Sounds exciting, right?'
      - speaker: teacher
        voice: nova
        text: 'You will work in pairs for this project. I have already put your names on the board, so please check who your partner is before you leave today.'
      - speaker: teacher
        voice: nova
        text: 'First, let me tell you what materials you will need. You will need a large piece of cardboard for the base, some newspaper, a plastic bottle, and brown and red paint.'
      - speaker: teacher
        voice: nova
        text: 'To create the eruption, we will use a mixture of baking soda and vinegar. When these two ingredients are combined, they produce carbon dioxide gas, which creates the bubbling effect.'
      - speaker: teacher
        voice: nova
        text: 'You can also add a few drops of washing-up liquid to make the eruption last longer, and red food colouring to make it look like real lava.'
      - speaker: teacher
        voice: nova
        text: 'The project is due on the fifteenth of March, which gives you exactly three weeks to complete it. I suggest you start building the model this weekend.'
      - speaker: teacher
        voice: nova
        text: 'On the presentation day, each pair will have five minutes to demonstrate their volcano to the class. You should also prepare a short poster explaining how real volcanoes work.'
      - speaker: teacher
        voice: nova
        text: 'I want you to include at least three facts on your poster — for example, the name of the world''s largest active volcano, which is Mauna Loa in Hawaii.'
      - speaker: teacher
        voice: nova
        text: 'Your project will be marked out of twenty points. Ten points are for the model itself, five for the eruption demonstration, and five for your poster and presentation.'
      - speaker: teacher
        voice: nova
        text: 'If you have any questions, you can come to see me during Thursday lunchtime in Room fourteen. I will be there from twelve fifteen until one o''clock.'
      - speaker: teacher
        voice: nova
        text: 'One last thing — please wear old clothes when you do the eruption test at home. The vinegar mixture can be quite messy! Right, have a look at the board and find your partner.'
    sentences:
      - id: L122-S1
        text: 'Students will work in _____ for this project.'
        textZh: '学生将以 _____ 形式完成这个项目。'
        answer: 'pairs'
      - id: L122-S2
        text: 'The eruption is created using baking soda and _____.'
        textZh: '火山喷发效果是用小苏打和 _____ 制造的。'
        answer: 'vinegar'
      - id: L122-S3
        text: 'Red food colouring is added to make the mixture look like _____.'
        textZh: '加入红色食用色素是为了让混合物看起来像 _____。'
        answer: 'lava'
      - id: L122-S4
        text: 'The project must be finished by the fifteenth of _____.'
        textZh: '项目必须在 _____ 十五日之前完成。'
        answer: 'March'
      - id: L122-S5
        text: 'Each pair will have _____ minutes for their demonstration.'
        textZh: '每组有 _____ 分钟进行展示。'
        answer: 'five'
      - id: L122-S6
        text: 'The world''s largest active volcano is _____ in Hawaii.'
        textZh: '世界上最大的活火山是夏威夷的 _____。'
        answer: 'Mauna Loa'
      - id: L122-S7
        text: 'The project will be marked out of _____ points.'
        textZh: '项目总分为 _____ 分。'
        answer: 'twenty'

  # ============================================================
  # L123: Museum Audio Guide – Dinosaur Exhibition
  # ============================================================

  - id: L123
    type: sentence-completion
    title: 'The Dinosaur Exhibition'
    titleZh: '恐龙展览'
    scene: 'You will hear a museum audio guide describing a dinosaur exhibition.'
    sceneZh: '你将听到博物馆语音导览介绍恐龙展览。'
    difficulty: 1
    audioFile: 'L123.mp3'
    script:
      - speaker: narrator
        voice: fable
        text: 'Welcome to the Natural History Museum''s Dinosaur Gallery. This audio guide will take you through our collection of over two hundred dinosaur fossils. Press the green button on your handset to pause at any time.'
      - speaker: narrator
        voice: fable
        text: 'As you enter the gallery, the first thing you will notice is the enormous skeleton in the centre of the room. This is a Diplodocus, one of the longest dinosaurs that ever lived. Our model measures twenty-six metres from head to tail.'
      - speaker: narrator
        voice: fable
        text: 'The Diplodocus was a herbivore, which means it only ate plants. Despite its huge size, its brain was no bigger than a tennis ball. Scientists believe it used its incredibly long neck to reach leaves at the top of tall trees.'
      - speaker: narrator
        voice: fable
        text: 'Now turn to your right. You will see a display case containing real dinosaur eggs. These eggs were discovered in the Gobi Desert in Mongolia in nineteen twenty-three by a team of American explorers.'
      - speaker: narrator
        voice: fable
        text: 'The eggs belong to a species called Oviraptor. Each egg is about eighteen centimetres long — roughly the same size as a large mango.'
      - speaker: narrator
        voice: fable
        text: 'Moving along, the next section is dedicated to the Tyrannosaurus Rex, often called T-Rex. The T-Rex lived around sixty-eight million years ago and could run at speeds of up to twenty-eight kilometres per hour.'
      - speaker: narrator
        voice: fable
        text: 'Our T-Rex skull is one of the best-preserved in the world. Notice the teeth — some of them are over fifteen centimetres long, about the length of a banana. The T-Rex could bite with a force strong enough to crush a car.'
      - speaker: narrator
        voice: fable
        text: 'If you continue straight ahead, you will reach the interactive zone. Here, children can dig for fossils in a sandpit, touch real dinosaur bones, and watch a short film about how dinosaurs became extinct.'
      - speaker: narrator
        voice: fable
        text: 'The film lasts twelve minutes and starts every half hour. Scientists now believe that a giant asteroid hit the Earth about sixty-six million years ago, causing the extinction of the dinosaurs.'
      - speaker: narrator
        voice: fable
        text: 'Before you leave, do not miss the gift shop on the ground floor. It has an excellent range of dinosaur books, models, and posters. Thank you for visiting the Dinosaur Gallery and enjoy the rest of your day at the museum.'
    sentences:
      - id: L123-S1
        text: 'The museum has a collection of over _____ dinosaur fossils.'
        textZh: '博物馆收藏了超过 _____ 件恐龙化石。'
        answer: 'two hundred'
      - id: L123-S2
        text: 'The Diplodocus skeleton is _____ metres long.'
        textZh: '梁龙骨架长 _____ 米。'
        answer: 'twenty-six'
      - id: L123-S3
        text: 'The Diplodocus had a brain no bigger than a _____.'
        textZh: '梁龙的大脑不比一个 _____ 大。'
        answer: 'tennis ball'
      - id: L123-S4
        text: 'The dinosaur eggs were found in the _____ Desert.'
        textZh: '恐龙蛋是在 _____ 沙漠发现的。'
        answer: 'Gobi'
      - id: L123-S5
        text: 'The T-Rex lived around _____ million years ago.'
        textZh: '霸王龙大约生活在 _____ 百万年前。'
        answer: 'sixty-eight'
      - id: L123-S6
        text: 'Some T-Rex teeth are over _____ centimetres long.'
        textZh: '一些霸王龙的牙齿超过 _____ 厘米长。'
        answer: 'fifteen'
      - id: L123-S7
        text: 'The film about dinosaur extinction lasts _____ minutes.'
        textZh: '关于恐龙灭绝的影片时长 _____ 分钟。'
        answer: 'twelve'
      - id: L123-S8
        text: 'Scientists believe a giant _____ caused the extinction of the dinosaurs.'
        textZh: '科学家认为一颗巨大的 _____ 导致了恐龙灭绝。'
        answer: 'asteroid'

  # ============================================================
  # L124: School Librarian – Reading Challenge
  # ============================================================

  - id: L124
    type: sentence-completion
    title: 'The Summer Reading Challenge'
    titleZh: '暑期阅读挑战'
    scene: 'You will hear a school librarian introducing a reading challenge.'
    sceneZh: '你将听到一位学校图书管理员介绍阅读挑战活动。'
    difficulty: 1
    audioFile: 'L124.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'Hello, everyone! I am Mrs Chen, the school librarian, and I am very excited to tell you about this year''s Summer Reading Challenge. It runs from the first of July to the thirty-first of August — that is nine whole weeks of reading fun!'
      - speaker: librarian
        voice: nova
        text: 'The challenge is simple. We would like every student to read at least eight books over the summer. You can choose any books you like — fiction, non-fiction, graphic novels, or even poetry collections.'
      - speaker: librarian
        voice: nova
        text: 'When you finish a book, write a short review on the yellow card I will give you today. Just three or four sentences about what you thought of the book. Then bring the card to the library when school starts again in September.'
      - speaker: librarian
        voice: nova
        text: 'Every student who completes the challenge will receive a certificate and a special bookmark designed by our art department. The top three readers — the students who read the most books — will each win a gift voucher worth fifteen pounds for the local bookshop.'
      - speaker: librarian
        voice: nova
        text: 'Last year, four hundred and twelve students took part, and the winner read an amazing twenty-three books! Her name was Olivia Park from Year Eight, and she said her favourite book was a mystery novel called The Secret Garden Club.'
      - speaker: librarian
        voice: nova
        text: 'This year, we have also set up a buddy system. If you have a younger brother or sister in primary school, you can read to them and it still counts towards your total. We want to encourage reading as a family activity.'
      - speaker: librarian
        voice: nova
        text: 'I have prepared a recommended reading list with fifty titles, sorted by age and interest. You can pick one up from the front desk on your way out. There are adventure stories, science books, funny stories, and much more.'
      - speaker: librarian
        voice: nova
        text: 'The library will also be open every Wednesday afternoon during the summer holidays, from two o''clock to five o''clock, so you can come in to borrow and return books.'
      - speaker: librarian
        voice: nova
        text: 'If you have any questions, please come and find me in the library at break time. I really hope all of you will take part this year. Happy reading!'
    sentences:
      - id: L124-S1
        text: 'The reading challenge lasts for _____ weeks.'
        textZh: '阅读挑战持续 _____ 周。'
        answer: 'nine'
      - id: L124-S2
        text: 'Students should try to read at least _____ books.'
        textZh: '学生应尽量阅读至少 _____ 本书。'
        answer: 'eight'
      - id: L124-S3
        text: 'Book reviews should be written on a _____ card.'
        textZh: '读书感想应写在一张 _____ 卡片上。'
        answer: 'yellow'
      - id: L124-S4
        text: 'The top three readers will each win a gift voucher worth _____ pounds.'
        textZh: '前三名读者将各获得价值 _____ 英镑的礼品券。'
        answer: 'fifteen'
      - id: L124-S5
        text: 'Last year''s winner was _____ from Year Eight.'
        textZh: '去年的冠军是八年级的 _____。'
        answer: 'Olivia Park'
      - id: L124-S6
        text: 'The recommended reading list contains _____ titles.'
        textZh: '推荐书单包含 _____ 本书。'
        answer: 'fifty'
      - id: L124-S7
        text: 'During summer, the library is open every _____ afternoon.'
        textZh: '暑假期间，图书馆每周 _____ 下午开放。'
        answer: 'Wednesday'

  # ============================================================
  # L125: Nature Documentary – How Bees Make Honey
  # ============================================================

  - id: L125
    type: sentence-completion
    title: 'How Bees Make Honey'
    titleZh: '蜜蜂如何酿蜜'
    scene: 'You will hear a narrator from a nature documentary explaining how bees make honey.'
    sceneZh: '你将听到一位自然纪录片旁白讲解蜜蜂如何酿蜜。'
    difficulty: 2
    audioFile: 'L125.mp3'
    script:
      - speaker: narrator
        voice: fable
        text: 'A single honeybee colony can contain up to sixty thousand bees, all working together with one shared goal — to produce honey. But how exactly do they do it? Let us follow the journey of nectar from flower to honeycomb.'
      - speaker: narrator
        voice: fable
        text: 'It all begins with the worker bees. These are always female, and each one can visit up to two thousand flowers in a single day. Using a long, tube-shaped tongue called a proboscis, the bee sucks nectar from deep inside the flower.'
      - speaker: narrator
        voice: fable
        text: 'The nectar is stored in a special second stomach called the honey stomach. This is separate from the bee''s normal digestive stomach. A full honey stomach weighs almost as much as the bee itself.'
      - speaker: narrator
        voice: fable
        text: 'When the worker bee returns to the hive, she passes the nectar to a house bee by mouth. The house bee chews the nectar for about thirty minutes, mixing it with special enzymes that break down the sugars.'
      - speaker: narrator
        voice: fable
        text: 'Next, the house bee places the processed nectar into a hexagonal wax cell in the honeycomb. At this stage, the nectar still contains too much water — around seventy per cent.'
      - speaker: narrator
        voice: fable
        text: 'To reduce the water content, hundreds of bees fan their wings over the honeycomb. They beat their wings about two hundred times per second, creating a warm breeze that evaporates the moisture.'
      - speaker: narrator
        voice: fable
        text: 'After one to three days of fanning, the water content drops to around eighteen per cent. The nectar has now become thick, golden honey.'
      - speaker: narrator
        voice: fable
        text: 'Finally, the bees seal the cell with a thin cap of fresh beeswax. This airtight seal keeps the honey fresh almost indefinitely. Archaeologists have even found pots of honey in ancient Egyptian tombs that were over three thousand years old and still perfectly edible.'
      - speaker: narrator
        voice: fable
        text: 'To produce just one kilogram of honey, bees must visit approximately four million flowers and fly a combined distance of around ninety thousand kilometres — more than twice around the Earth.'
      - speaker: narrator
        voice: fable
        text: 'It is a remarkable achievement for creatures that weigh less than a gram. Truly, the honeybee is one of nature''s most extraordinary engineers.'
    sentences:
      - id: L125-S1
        text: 'A honeybee colony can have up to _____ bees.'
        textZh: '一个蜜蜂群落最多可有 _____ 只蜜蜂。'
        answer: 'sixty thousand'
      - id: L125-S2
        text: 'A worker bee can visit up to _____ flowers in one day.'
        textZh: '一只工蜂一天最多可以访问 _____ 朵花。'
        answer: 'two thousand'
      - id: L125-S3
        text: 'The bee sucks nectar using a tube-shaped tongue called a _____.'
        textZh: '蜜蜂用一种叫做 _____ 的管状舌头吸取花蜜。'
        answer: 'proboscis'
      - id: L125-S4
        text: 'The house bee chews the nectar for about _____ minutes.'
        textZh: '内勤蜂咀嚼花蜜大约 _____ 分钟。'
        answer: 'thirty'
      - id: L125-S5
        text: 'Bees fan their wings about _____ times per second.'
        textZh: '蜜蜂每秒扇动翅膀约 _____ 次。'
        answer: 'two hundred'
      - id: L125-S6
        text: 'Honey has a water content of around _____ per cent.'
        textZh: '蜂蜜的含水量约为百分之 _____。'
        answer: 'eighteen'
      - id: L125-S7
        text: 'Ancient honey found in Egyptian tombs was over _____ years old.'
        textZh: '在埃及古墓中发现的蜂蜜已有超过 _____ 年的历史。'
        answer: 'three thousand'
      - id: L125-S8
        text: 'To make one kilogram of honey, bees must visit about _____ flowers.'
        textZh: '为了酿造一公斤蜂蜜，蜜蜂必须访问大约 _____ 朵花。'
        answer: 'four million'

  # ============================================================
  # L126: Camp Counselor – Treasure Hunt
  # ============================================================

  - id: L126
    type: sentence-completion
    title: 'Tomorrow''s Treasure Hunt'
    titleZh: '明天的寻宝活动'
    scene: 'You will hear a camp counselor explaining the rules for a treasure hunt.'
    sceneZh: '你将听到一位夏令营辅导员讲解寻宝活动的规则。'
    difficulty: 1
    audioFile: 'L126.mp3'
    script:
      - speaker: counselor
        voice: nova
        text: 'All right, campers, gather round! I have got some really exciting news. Tomorrow morning, we are going to have the biggest treasure hunt Pinewood Camp has ever organised!'
      - speaker: counselor
        voice: nova
        text: 'You will be divided into six teams of four. Each team will be given a different colour — red, blue, green, yellow, orange, or purple. You must wear a bandana in your team colour so we can tell the teams apart.'
      - speaker: counselor
        voice: nova
        text: 'The treasure hunt will start at nine thirty sharp, right after breakfast. Please make sure you are at the main field by nine fifteen at the latest.'
      - speaker: counselor
        voice: nova
        text: 'Each team will receive a map and a set of twelve clues. The clues will lead you to different locations around the camp — the lake, the climbing wall, the vegetable garden, the arts and crafts cabin, and so on.'
      - speaker: counselor
        voice: nova
        text: 'At each location, you will find a small wooden box hidden somewhere nearby. Inside the box, there is a letter stamped on a card. You need to collect all twelve letters and rearrange them to spell a secret word.'
      - speaker: counselor
        voice: nova
        text: 'The first team to bring the correct secret word back to me at the main field wins the treasure — which is a giant basket of chocolate and sweets for the whole team to share.'
      - speaker: counselor
        voice: nova
        text: 'Now, there are a few important rules. Number one — stay within the camp boundaries at all times. The fence with the blue markers is the limit. Number two — no running near the lake. Number three — every team member must stay together. No splitting up!'
      - speaker: counselor
        voice: nova
        text: 'If you get stuck on a clue, you can come to the help station next to the dining hall. Counselor Mike will be there, and he can give you one extra hint per team. But use it wisely — you only get one!'
      - speaker: counselor
        voice: nova
        text: 'The whole hunt should take about two hours. We expect everyone back by half past eleven. After that, we will announce the winning team and hand out the prizes during lunch.'
      - speaker: counselor
        voice: nova
        text: 'Oh, and one more thing — do not forget to bring a pencil and wear comfortable shoes. You will be doing a lot of walking! Any questions? No? Great — get a good night''s sleep and I will see you in the morning!'
    sentences:
      - id: L126-S1
        text: 'Campers will be divided into _____ teams.'
        textZh: '营员将被分成 _____ 个队伍。'
        answer: 'six'
      - id: L126-S2
        text: 'The treasure hunt starts at _____ in the morning.'
        textZh: '寻宝活动在早上 _____ 开始。'
        answer: 'nine thirty'
      - id: L126-S3
        text: 'Each team will receive a map and _____ clues.'
        textZh: '每个队伍将收到一张地图和 _____ 条线索。'
        answer: 'twelve'
      - id: L126-S4
        text: 'Inside each wooden box, there is a _____ stamped on a card.'
        textZh: '每个木盒里有一张盖有 _____ 印章的卡片。'
        answer: 'letter'
      - id: L126-S5
        text: 'The winning team gets a giant basket of _____ and sweets.'
        textZh: '获胜队伍将得到一大篮 _____ 和糖果。'
        answer: 'chocolate'
      - id: L126-S6
        text: 'The help station is next to the _____.'
        textZh: '求助站在 _____ 旁边。'
        answer: 'dining hall'
      - id: L126-S7
        text: 'The treasure hunt should take about _____ hours.'
        textZh: '寻宝活动大约需要 _____ 小时。'
        answer: 'two'

  # ============================================================
  # L127: Radio Presenter – Kids' Book Review Show
  # ============================================================

  - id: L127
    type: sentence-completion
    title: 'The Book Corner Show'
    titleZh: '图书角节目'
    scene: 'You will hear a radio presenter reviewing children''s books.'
    sceneZh: '你将听到一位电台主持人评论儿童图书。'
    difficulty: 2
    audioFile: 'L127.mp3'
    script:
      - speaker: presenter
        voice: nova
        text: 'Good afternoon and welcome to The Book Corner on Sunshine Radio! I am your host, Emma Taylor, and every Saturday at three o''clock, I bring you the best new books for young readers.'
      - speaker: presenter
        voice: nova
