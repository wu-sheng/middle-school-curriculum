      - speaker: teacher
        voice: nova
        text: 'Ashford Castle was built in twelve eighty-five, which makes it over seven hundred years old. It was originally built as a fortress to defend the local town against invaders from the north.'
      - speaker: teacher
        voice: nova
        text: 'The castle is about seventy-five kilometres from school, so the coach journey will take roughly one hour and fifteen minutes. We will leave from the school car park at eight o''clock sharp, so please do not be late.'
      - speaker: teacher
        voice: nova
        text: 'When we arrive, we will be met by a professional guide called Mr Whitfield. He is a medieval history expert and has been giving tours at the castle for over twenty years. I am sure you will find his stories very entertaining.'
      - speaker: teacher
        voice: nova
        text: 'The tour will last about two hours. We will visit the Great Hall, the dungeons, the castle kitchen, and the tower. The tower has one hundred and thirty-seven steps and offers a fantastic view of the surrounding countryside.'
      - speaker: teacher
        voice: nova
        text: 'After the tour, we will have lunch in the castle gardens — weather permitting. You need to bring a packed lunch and a drink. There is also a small café that sells hot chocolate and cake if you want to buy a treat.'
      - speaker: teacher
        voice: nova
        text: 'In the afternoon, there will be a special workshop on medieval life. You will get to try on real pieces of armour, practise writing with a quill pen, and learn how to make a simple coat of arms.'
      - speaker: teacher
        voice: nova
        text: 'The cost of the trip is nine pounds fifty per student, which covers the coach, the guided tour, and the workshop. Please bring your permission slip signed by a parent and the money to the school office by next Wednesday.'
      - speaker: teacher
        voice: nova
        text: 'We expect to be back at school by four thirty. If your parents are picking you up, please ask them to be at the main gate by that time.'
      - speaker: teacher
        voice: nova
        text: 'One important thing — please wear warm clothes and sensible shoes. The castle can be quite cold inside and the ground is uneven in places. Also, cameras and phones are allowed for photographs, but please keep your phones on silent during the tour.'
    sentences:
      - id: L133-S1
        text: 'Ashford Castle was built in the year _____.'
        textZh: '阿什福德城堡建于 _____ 年。'
        answer: 'twelve eighty-five'
      - id: L133-S2
        text: 'The coach journey will take about one hour and _____ minutes.'
        textZh: '大巴车程大约需要一小时 _____ 分钟。'
        answer: 'fifteen'
      - id: L133-S3
        text: 'The tour guide is called Mr _____.'
        textZh: '导游叫 _____ 先生。'
        answer: 'Whitfield'
      - id: L133-S4
        text: 'The castle tower has _____ steps.'
        textZh: '城堡塔楼有 _____ 级台阶。'
        answer: 'one hundred and thirty-seven'
      - id: L133-S5
        text: 'In the workshop, students will practise writing with a _____ pen.'
        textZh: '在工作坊中，学生将练习用 _____ 笔写字。'
        answer: 'quill'
      - id: L133-S6
        text: 'The trip costs _____ per student.'
        textZh: '旅行费用为每位学生 _____。'
        answer: 'nine pounds fifty'
      - id: L133-S7
        text: 'Students are expected back at school by _____.'
        textZh: '学生预计在 _____ 前返回学校。'
        answer: 'four thirty'

  # ============================================================
  # L134: Weather Presenter – Weekend Forecast
  # ============================================================

  - id: L134
    type: sentence-completion
    title: 'The Weekend Weather Forecast'
    titleZh: '周末天气预报'
    scene: 'You will hear a weather presenter giving a forecast for the coming weekend.'
    sceneZh: '你将听到一位天气主持人播报即将到来的周末天气预报。'
    difficulty: 1
    audioFile: 'L134.mp3'
    script:
      - speaker: presenter
        voice: onyx
        text: 'Good evening! I am Ben Harris with your weekend weather forecast. Let us take a look at what is in store for Saturday and Sunday.'
      - speaker: presenter
        voice: onyx
        text: 'Saturday is looking like a beautiful day across most of the country. We will see plenty of sunshine with just a few light clouds drifting in from the west during the afternoon.'
      - speaker: presenter
        voice: onyx
        text: 'Temperatures on Saturday will reach a high of twenty-two degrees Celsius in the south — that is unusually warm for this time of year. In the north, it will be a little cooler, around seventeen degrees.'
      - speaker: presenter
        voice: onyx
        text: 'If you are planning any outdoor activities on Saturday, the best time will be between ten in the morning and four in the afternoon. After that, expect temperatures to drop quite quickly as the sun goes down.'
      - speaker: presenter
        voice: onyx
        text: 'Saturday evening will be dry and calm — perfect for a barbecue or a walk in the park. Sunset is at eight forty-five, and the sky should be clear enough to see some stars later on.'
      - speaker: presenter
        voice: onyx
        text: 'Now, Sunday is a different story altogether. A weather front is moving in from the Atlantic and will bring rain to western areas by mid-morning. The rain will gradually spread east during the afternoon.'
      - speaker: presenter
        voice: onyx
        text: 'We are expecting quite heavy rainfall — around fifteen millimetres in some areas. There is also a risk of thunderstorms in the south-west between two and five o''clock in the afternoon.'
      - speaker: presenter
        voice: onyx
        text: 'Temperatures on Sunday will be noticeably lower — around fourteen degrees in the south and just eleven in the north. You will definitely want to take a jacket if you are going out.'
      - speaker: presenter
        voice: onyx
        text: 'The wind will pick up on Sunday too, especially along the coast. We are expecting gusts of up to sixty kilometres per hour, so please be careful if you are near the sea.'
      - speaker: presenter
        voice: onyx
        text: 'Looking ahead to Monday, the rain should clear by the morning, and we will be back to dry, sunny weather for the start of the working week. That is your weekend forecast. Have a lovely evening!'
    sentences:
      - id: L134-S1
        text: 'On Saturday, temperatures in the south will reach _____ degrees.'
        textZh: '周六南方气温将达到 _____ 度。'
        answer: 'twenty-two'
      - id: L134-S2
        text: 'Saturday sunset is at _____ in the evening.'
        textZh: '周六日落时间是晚上 _____。'
        answer: 'eight forty-five'
      - id: L134-S3
        text: 'On Sunday, rain is coming from the _____.'
        textZh: '周日的雨来自 _____ 方向。'
        answer: 'Atlantic'
      - id: L134-S4
        text: 'Sunday''s expected rainfall is around _____ millimetres.'
        textZh: '周日预计降雨量约为 _____ 毫米。'
        answer: 'fifteen'
      - id: L134-S5
        text: 'Thunderstorms may occur in the _____ on Sunday afternoon.'
        textZh: '周日下午 _____ 地区可能出现雷暴。'
        answer: 'south-west'
      - id: L134-S6
        text: 'Sunday temperatures in the north will be just _____ degrees.'
        textZh: '周日北方气温仅为 _____ 度。'
        answer: 'eleven'
      - id: L134-S7
        text: 'Coastal wind gusts could reach up to _____ kilometres per hour.'
        textZh: '沿海阵风可达每小时 _____ 公里。'
