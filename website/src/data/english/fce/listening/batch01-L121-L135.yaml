      - speaker: presenter
        voice: nova
        text: 'Finally, for those of you who prefer non-fiction, there is The Bug Handbook by Professor Diana Lee. It is packed with incredible photos and amazing facts about over three hundred species of insects from around the world.'
      - speaker: presenter
        voice: nova
        text: 'Did you know, for example, that a flea can jump one hundred and fifty times its own body length? That is like a human jumping over a thirty-storey building! The Bug Handbook is a perfect gift for any young nature lover.'
      - speaker: presenter
        voice: nova
        text: 'That is all for today. Remember, you can find the full list of recommended books on our website. See you next Saturday at three. Happy reading!'
