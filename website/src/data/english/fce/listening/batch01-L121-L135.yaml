      - speaker: presenter
        voice: nova
        text: 'Next up is Planet Puzzle, a science fiction story by Maya Hernandez. This one is set on a space station orbiting Mars in the year twenty-one fifty.'
      - speaker: presenter
        voice: nova
        text: 'The main character, Leo, discovers a strange signal coming from the surface of Mars and has to solve a series of mathematical puzzles to decode the message. It is really clever and keeps you guessing right until the last chapter.'
      - speaker: presenter
        voice: nova
