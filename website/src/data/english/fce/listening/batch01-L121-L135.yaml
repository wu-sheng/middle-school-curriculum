      - speaker: guide
        voice: nova
        text: 'One of the most popular animals in the tunnel is Shelly, our green sea turtle. She was rescued from a fishing net off the coast of Cornwall five years ago. Her front left flipper was badly injured, which means she cannot be released back into the ocean.'
      - speaker: guide
        voice: nova
        text: 'Shelly is about forty-five years old and weighs approximately one hundred and thirty kilograms. Green sea turtles can live to be over eighty, so she still has a long life ahead of her here at the aquarium.'
      - speaker: guide
        voice: nova
