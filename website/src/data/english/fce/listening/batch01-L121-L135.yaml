    difficulty: 2
    audioFile: 'L131.mp3'
    script:
      - speaker: coach
        voice: onyx
        text: 'Right, swimmers, listen carefully. The inter-school swimming competition is this Saturday at the Riverside Aquatic Centre. I need everyone to arrive by eight fifteen because the first race begins at nine o''clock.'
      - speaker: coach
        voice: onyx
        text: 'There will be eight schools taking part this year, which means the competition will be bigger than last year when we had only six. Each school can enter up to three swimmers per event.'
      - speaker: coach
        voice: onyx
        text: 'The events are divided into four categories: freestyle, backstroke, breaststroke, and butterfly. Each category has races for two distances — fifty metres and one hundred metres. That makes eight individual races in total.'
      - speaker: coach
        voice: onyx
        text: 'At the end, there will also be a relay race. Each team will have four swimmers, and each swimmer will swim one hundred metres. So the total relay distance is four hundred metres.'
      - speaker: coach
        voice: onyx
        text: 'Now, let me go over the rules. Every swimmer must wear a proper swimming cap with their school name on it. I have ordered new caps in dark blue for our team — they will be ready to collect on Thursday.'
      - speaker: coach
        voice: onyx
        text: 'Goggles are allowed but not required. No jewellery of any kind is permitted in the pool — that includes watches, bracelets, and earrings. If you are wearing any, please remove them before you get changed.'
      - speaker: coach
        voice: onyx
        text: 'For the start of each race, you will hear two signals. The first whistle means ''get on the starting block''. The second whistle means ''take your mark''. Then you will hear a buzzer, and that is when you dive in.'
      - speaker: coach
        voice: onyx
        text: 'If anyone dives in before the buzzer, that is called a false start. One false start is a warning. A second false start means you are disqualified from that race.'
      - speaker: coach
        voice: onyx
        text: 'Points are awarded as follows: first place gets ten points, second place gets seven, third place gets five, and fourth place gets three. At the end, the school with the highest total wins the silver trophy.'
      - speaker: coach
        voice: onyx
        text: 'Last year, we came second — just four points behind Lakewood Academy. This year, I believe we can win it. Train hard this week, get plenty of sleep, and eat well. I am counting on all of you. See you on Saturday!'
