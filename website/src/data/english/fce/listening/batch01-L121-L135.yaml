  # ============================================================
  # L128: Astronaut – Life on the Space Station
  # ============================================================

  - id: L128
    type: sentence-completion
    title: 'Life on the Space Station'
    titleZh: '空间站上的生活'
    scene: 'You will hear an astronaut describing daily life on the International Space Station.'
    sceneZh: '你将听到一位宇航员描述在国际空间站上的日常生活。'
    difficulty: 2
    audioFile: 'L128.mp3'
    script:
      - speaker: astronaut
        voice: onyx
        text: 'Hello, everyone! My name is Commander David Brooks, and I am speaking to you from the International Space Station, which is orbiting the Earth at a height of about four hundred kilometres.'
      - speaker: astronaut
        voice: onyx
        text: 'I have been up here for five months now, along with five other crew members from four different countries — the United States, Russia, Japan, and Canada.'
      - speaker: astronaut
        voice: onyx
        text: 'People always ask me what a typical day is like. Well, we wake up at six o''clock, Greenwich Mean Time. The first thing I do is look out of the window — and the view never gets boring. We orbit the Earth once every ninety minutes, so we see sixteen sunrises every day!'
      - speaker: astronaut
        voice: onyx
        text: 'Breakfast is usually something simple — a pouch of scrambled eggs and a drink of orange juice. All our food comes in special sealed packages because crumbs would float everywhere in zero gravity and could damage the equipment.'
      - speaker: astronaut
        voice: onyx
        text: 'After breakfast, we spend most of the morning doing science experiments. Right now, I am working on a project about how plants grow without gravity. We are growing tomatoes in a small greenhouse, and they are doing surprisingly well.'
      - speaker: astronaut
        voice: onyx
        text: 'Exercise is extremely important in space because our muscles and bones get weaker without gravity. We must exercise for at least two hours every day. I usually spend one hour on the running machine and one hour on the exercise bike.'
      - speaker: astronaut
        voice: onyx
        text: 'Lunch is at twelve thirty, and then in the afternoon we often do maintenance work — fixing things, checking systems, or doing spacewalks to repair the outside of the station. A spacewalk lasts about six and a half hours, and it is one of the most exciting things I have ever done.'
      - speaker: astronaut
        voice: onyx
        text: 'In the evening, we have a little free time. I like to read, take photographs of the Earth, or video-call my family. My daughter is seven, and she loves seeing her dad floating upside down on the screen!'
      - speaker: astronaut
        voice: onyx
        text: 'Sleeping is interesting too. We sleep in small sleeping bags attached to the wall of our cabin. There is no up or down in space, so it does not matter which way you are facing. Lights out is at ten o''clock.'
      - speaker: astronaut
        voice: onyx
        text: 'It is an amazing experience being here, but I do miss some things from home — especially walking in the park and eating fresh pizza. I will be back on Earth in about seven weeks, and I cannot wait to feel rain on my face again.'
    sentences:
      - id: L128-S1
        text: 'The space station orbits at a height of about _____ kilometres.'
        textZh: '空间站在大约 _____ 公里的高度运行。'
        answer: 'four hundred'
      - id: L128-S2
        text: 'There are _____ crew members on the station.'
        textZh: '空间站上共有 _____ 名成员。'
        answer: 'six'
      - id: L128-S3
        text: 'The astronauts see _____ sunrises every day.'
        textZh: '宇航员每天能看到 _____ 次日出。'
        answer: 'sixteen'
      - id: L128-S4
        text: 'The astronaut is growing _____ in a small greenhouse.'
        textZh: '宇航员正在一个小温室里种植 _____。'
        answer: 'tomatoes'
      - id: L128-S5
        text: 'Astronauts must exercise for at least _____ hours daily.'
        textZh: '宇航员每天必须锻炼至少 _____ 小时。'
        answer: 'two'
      - id: L128-S6
        text: 'A spacewalk lasts about _____ hours.'
        textZh: '一次太空行走大约持续 _____ 小时。'
        answer: 'six and a half'
      - id: L128-S7
        text: 'The astronaut''s daughter is _____ years old.'
        textZh: '宇航员的女儿 _____ 岁。'
        answer: 'seven'

  # ============================================================
  # L129: Chef – Chocolate Brownies Recipe
  # ============================================================

  - id: L129
    type: sentence-completion
    title: 'How to Make Chocolate Brownies'
    titleZh: '如何制作巧克力布朗尼'
    scene: 'You will hear a chef teaching how to make chocolate brownies.'
    sceneZh: '你将听到一位厨师教你如何制作巧克力布朗尼。'
    difficulty: 1
    audioFile: 'L129.mp3'
    script:
      - speaker: chef
        voice: nova
        text: 'Hello and welcome to Junior Chef! I am Chef Rosa, and today I am going to show you how to make the most delicious chocolate brownies you have ever tasted. This is a super easy recipe — perfect for beginners.'
      - speaker: chef
        voice: nova
        text: 'Before we start, let me tell you what ingredients you will need. First, two hundred grams of dark chocolate — make sure it is at least seventy per cent cocoa for the best flavour.'
      - speaker: chef
        voice: nova
        text: 'You will also need one hundred and fifty grams of butter, three large eggs, two hundred grams of sugar, and seventy-five grams of plain flour. If you like nuts, you can add a handful of walnuts, but that is optional.'
      - speaker: chef
        voice: nova
        text: 'Right, let us begin! First, preheat your oven to one hundred and eighty degrees Celsius. While the oven is warming up, line a square baking tin with baking paper. The tin should be about twenty centimetres across.'
      - speaker: chef
        voice: nova
        text: 'Now, break the chocolate into small pieces and put them in a heatproof bowl with the butter. Place the bowl over a pan of gently simmering water — this is called a bain-marie. Stir slowly until everything has melted and you have a smooth, glossy mixture.'
      - speaker: chef
        voice: nova
        text: 'While the chocolate is melting, crack the three eggs into a separate bowl and add the sugar. Whisk them together for about two minutes until the mixture becomes pale and slightly thick.'
      - speaker: chef
        voice: nova
        text: 'Next, pour the melted chocolate into the egg mixture and fold it in gently with a spatula. Do not stir too hard or you will knock out the air. Then sift in the flour and fold again until everything is just combined.'
      - speaker: chef
        voice: nova
        text: 'Pour the batter into your prepared tin and spread it evenly. If you are using walnuts, scatter them on top now. Then pop the tin into the oven for exactly twenty-five minutes.'
      - speaker: chef
        voice: nova
        text: 'Here is the secret — do not overbake them! The brownies should still be a little wobbly in the centre when you take them out. They will firm up as they cool. Let them cool in the tin for at least fifteen minutes before cutting.'
      - speaker: chef
        voice: nova
        text: 'Cut them into twelve squares and enjoy! These brownies will keep in an airtight container for up to five days, but trust me, they never last that long in my house. Happy baking, everyone!'
    sentences:
      - id: L129-S1
        text: 'The chocolate should be at least _____ per cent cocoa.'
        textZh: '巧克力的可可含量应至少为百分之 _____。'
        answer: 'seventy'
      - id: L129-S2
        text: 'The recipe uses _____ grams of butter.'
        textZh: '这个食谱使用 _____ 克黄油。'
        answer: 'one hundred and fifty'
      - id: L129-S3
        text: 'The oven should be set to _____ degrees Celsius.'
        textZh: '烤箱应设置为 _____ 摄氏度。'
        answer: 'one hundred and eighty'
      - id: L129-S4
        text: 'Melting chocolate over simmering water is called a _____.'
        textZh: '用文火上的热水隔水融化巧克力叫做 _____。'
        answer: 'bain-marie'
      - id: L129-S5
        text: 'The eggs and sugar should be whisked for about _____ minutes.'
        textZh: '鸡蛋和糖应搅拌约 _____ 分钟。'
        answer: 'two'
      - id: L129-S6
        text: 'The brownies should bake for exactly _____ minutes.'
        textZh: '布朗尼应烤恰好 _____ 分钟。'
        answer: 'twenty-five'
      - id: L129-S7
        text: 'The brownies should cool for at least _____ minutes before cutting.'
        textZh: '布朗尼切之前应冷却至少 _____ 分钟。'
        answer: 'fifteen'
      - id: L129-S8
        text: 'The recipe makes _____ squares of brownie.'
        textZh: '这个食谱可以做 _____ 块布朗尼。'
        answer: 'twelve'

  # ============================================================
  # L130: Park Ranger – Forest Animals in Winter
  # ============================================================

  - id: L130
    type: sentence-completion
    title: 'Forest Animals in Winter'
    titleZh: '冬天的森林动物'
    scene: 'You will hear a park ranger talking about how forest animals survive in winter.'
    sceneZh: '你将听到一位公园护林员讲述森林动物如何过冬。'
    difficulty: 2
    audioFile: 'L130.mp3'
    script:
      - speaker: ranger
        voice: onyx
        text: 'Good morning, nature fans! I am Ranger Tom and welcome to Greenwood Forest Park. Today, I want to talk to you about how our forest animals cope with the cold winter months. It is absolutely fascinating.'
      - speaker: ranger
        voice: onyx
        text: 'Let us start with the red squirrel. In autumn, squirrels spend weeks collecting and burying nuts and seeds. A single squirrel can hide up to three thousand acorns before winter arrives! They bury them in different spots all around the forest.'
      - speaker: ranger
        voice: onyx
        text: 'The amazing thing is that squirrels can remember where about seventy per cent of their hidden food is. The rest gets forgotten and eventually grows into new trees — so squirrels are actually brilliant tree planters without even knowing it.'
      - speaker: ranger
        voice: onyx
        text: 'Now, hedgehogs take a completely different approach. They hibernate. Starting in late November, a hedgehog curls up into a tight ball in a nest of dry leaves and goes to sleep for about five months.'
      - speaker: ranger
        voice: onyx
        text: 'During hibernation, a hedgehog''s heartbeat drops from around one hundred and ninety beats per minute to just twenty. Its body temperature falls to match the air around it. This saves an enormous amount of energy.'
      - speaker: ranger
        voice: onyx
        text: 'Deer, on the other hand, stay active all winter. They grow a thicker coat in autumn — the winter coat has hollow hairs that trap warm air close to the body, like a natural duvet. Our red deer here in Greenwood grow coats that are almost five centimetres thick.'
      - speaker: ranger
        voice: onyx
        text: 'Food is scarce in winter, so deer change their diet. In summer, they eat fresh grass and wild flowers. In winter, they switch to bark, twigs, and evergreen leaves like holly and ivy.'
      - speaker: ranger
        voice: onyx
        text: 'Birds have their own clever strategies. Many of our summer birds — like swallows and cuckoos — migrate south to Africa in September. But robins and blackbirds stay here all winter, fluffing up their feathers to keep warm.'
      - speaker: ranger
        voice: onyx
        text: 'You can help winter birds by putting out food in your garden. Sunflower seeds, peanuts, and fat balls are all excellent choices. Avoid giving them bread, though, as it fills them up without giving them the energy they need.'
      - speaker: ranger
        voice: onyx
        text: 'If you come back to the park in January, join our Winter Wildlife Walk every Sunday morning at ten o''clock. We will look for animal footprints in the snow and try to spot some of these amazing creatures. I hope to see you there!'
    sentences:
      - id: L130-S1
        text: 'A squirrel can hide up to _____ acorns before winter.'
        textZh: '一只松鼠在冬天来临前最多可以藏 _____ 颗橡子。'
        answer: 'three thousand'
      - id: L130-S2
        text: 'Squirrels remember about _____ per cent of their hidden food.'
        textZh: '松鼠能记住大约百分之 _____ 的藏粮位置。'
        answer: 'seventy'
      - id: L130-S3
        text: 'Hedgehogs hibernate for about _____ months.'
        textZh: '刺猬冬眠大约 _____ 个月。'
        answer: 'five'
      - id: L130-S4
        text: 'During hibernation, a hedgehog''s heartbeat drops to just _____ beats per minute.'
        textZh: '冬眠期间，刺猬的心跳降至每分钟仅 _____ 次。'
        answer: 'twenty'
      - id: L130-S5
        text: 'The red deer''s winter coat is almost _____ centimetres thick.'
        textZh: '赤鹿的冬季毛发厚度接近 _____ 厘米。'
        answer: 'five'
      - id: L130-S6
        text: 'In winter, deer eat bark, twigs, and _____ leaves.'
        textZh: '冬天，鹿吃树皮、树枝和 _____ 树叶。'
        answer: 'evergreen'
      - id: L130-S7
        text: 'The Winter Wildlife Walk takes place every _____ morning.'
        textZh: '冬季野生动物步行活动每周 _____ 早上举行。'
        answer: 'Sunday'

