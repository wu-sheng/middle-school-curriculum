      - speaker: guide
        voice: nova
        text: 'The tunnel passes through a tank that holds over three million litres of seawater. In this tank, we keep more than thirty different species of marine life, including sharks, rays, sea turtles, and hundreds of colourful tropical fish.'
      - speaker: guide
        voice: nova
        text: 'Look up! Can you see that large grey shape gliding above us? That is a sand tiger shark. Despite its fierce name, it is actually quite gentle and has never attacked a human in the wild. We have seven of them here.'
      - speaker: guide
