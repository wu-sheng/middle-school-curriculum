  # ============================================================
  # L135: Art Teacher – How to Draw a Comic Strip
  # ============================================================

  - id: L135
    type: sentence-completion
    title: 'Drawing a Comic Strip'
    titleZh: '画漫画条'
    scene: 'You will hear an art teacher explaining how to draw a comic strip.'
    sceneZh: '你将听到一位美术老师讲解如何画漫画条。'
    difficulty: 1
    audioFile: 'L135.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Hello, artists! Welcome to today''s lesson. I am Miss Patel and today we are going to learn how to create your very own comic strip. By the end of this lesson, you will have a four-panel comic ready to share with your friends.'
      - speaker: teacher
        voice: nova
        text: 'First, let me explain what you will need. You need a sheet of A4 paper, a pencil, an eraser, a black felt-tip pen for outlining, and some coloured pencils or markers for adding colour later.'
      - speaker: teacher
        voice: nova
        text: 'Step one — fold your A4 paper in half, then in half again. When you open it, you will have four equal rectangles. These are your four panels. Draw over the fold lines with your black pen to make them clear.'
      - speaker: teacher
        voice: nova
        text: 'Step two — plan your story. Every comic needs a beginning, a middle, and an ending. A good comic strip also has a surprise or a joke in the last panel — this is called the punchline. Take five minutes now to think of a simple story.'
      - speaker: teacher
        voice: nova
        text: 'Step three — sketch your characters. Keep your characters simple. Start with basic shapes — an oval for the head, a rectangle for the body, and stick lines for the arms and legs. You can add details like hair, eyes, and clothing later.'
      - speaker: teacher
        voice: nova
        text: 'Here is a useful tip: draw your characters the same size in every panel. This is called keeping consistency, and it helps your reader follow the story easily.'
      - speaker: teacher
        voice: nova
        text: 'Step four — add speech bubbles. A speech bubble is a round shape with a small tail pointing towards the character who is talking. Write the words inside in clear, capital letters. Keep each bubble to no more than two short sentences.'
      - speaker: teacher
        voice: nova
        text: 'If a character is thinking instead of speaking, use a thought bubble — that is the one with little circles instead of a tail. And if a character is shouting, use a jagged, spiky bubble.'
      - speaker: teacher
        voice: nova
        text: 'Step five — once you are happy with your pencil sketch, go over all the lines with your black felt-tip pen. Wait about thirty seconds for the ink to dry, then carefully rub out any pencil marks with your eraser.'
      - speaker: teacher
        voice: nova
        text: 'Step six — the fun part — add colour! Use bright colours for your characters to make them stand out from the background. Professional comic artists usually limit themselves to about five or six colours per page so it does not look too busy.'
      - speaker: teacher
        voice: nova
        text: 'When you have finished, bring your comic to me and I will display the best ones on the Art Wall outside the hall. We will vote for the funniest comic next Monday. Off you go — you have forty minutes. Have fun!'
    sentences:
      - id: L135-S1
        text: 'The comic strip will have _____ panels.'
        textZh: '漫画条将有 _____ 个格子。'
        answer: 'four'
      - id: L135-S2
        text: 'The surprise or joke in the last panel is called the _____.'
        textZh: '最后一格中的惊喜或笑点叫做 _____。'
        answer: 'punchline'
      - id: L135-S3
        text: 'Start drawing a character''s head with an _____ shape.'
        textZh: '画角色的头部应从 _____ 形状开始。'
        answer: 'oval'
      - id: L135-S4
        text: 'Drawing characters the same size in every panel is called keeping _____.'
        textZh: '在每个格子中把角色画成相同大小叫做保持 _____。'
        answer: 'consistency'
      - id: L135-S5
        text: 'Words in speech bubbles should be written in _____ letters.'
        textZh: '对话气泡中的文字应用 _____ 字母书写。'
        answer: 'capital'
      - id: L135-S6
        text: 'A _____ bubble is used when a character is shouting.'
        textZh: '角色大喊时使用 _____ 气泡。'
        answer: 'spiky'
      - id: L135-S7
        text: 'Professional artists usually use about _____ colours per page.'
        textZh: '专业漫画家通常每页使用大约 _____ 种颜色。'
        answer: 'five or six'
      - id: L135-S8
        text: 'Students have _____ minutes to complete their comic.'
        textZh: '学生有 _____ 分钟完成漫画。'
        answer: 'forty'
