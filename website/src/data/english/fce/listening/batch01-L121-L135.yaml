      - speaker: presenter
        voice: nova
        text: 'What I love about this book is how beautifully it describes the Scottish landscape — the misty mountains, the purple heather, and the icy lochs. Freya is also a wonderfully brave character who is not afraid to stand up for what she believes in.'
      - speaker: presenter
        voice: nova
