        voice: echo
        text: "We could use that old purple curtain your mum said we could have. It's perfect for a robe!"
      - speaker: girl2
        voice: fable
        text: "And I can make a hat out of cardboard and cover it with silver foil. It'll look magical."
      - speaker: girl1
        voice: shimmer
        text: 'What about the wand? I was thinking of wrapping a stick in gold tape.'
