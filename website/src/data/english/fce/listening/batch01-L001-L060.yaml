  - id: L041
    type: short-dialogue
    title: 'The Reading Challenge'
    titleZh: '阅读挑战'
    scene: 'You hear two friends at the school library.'
    sceneZh: '你听到两个朋友在学校图书馆。'
    difficulty: 1
    audioFile: 'L041.mp3'
