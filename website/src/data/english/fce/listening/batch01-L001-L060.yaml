      - speaker: girl
        voice: shimmer
        text: "Hi, I'd like to sign up for the pottery class for kids. Is there still space?"
      - speaker: receptionist
        voice: onyx
        text: "Let me check... Yes, we have three spots left in the Wednesday group. It runs from four to five thirty."
      - speaker: girl
        voice: shimmer
        text: 'Perfect. How much does it cost?'
      - speaker: receptionist
        voice: onyx
        text: "It's twelve pounds for six sessions, and all materials are included."
      - speaker: girl
        voice: shimmer
        text: "That's great value. I'll come in with my mum to register."
    question:
      text: 'What is included in the class fee?'
      textZh: '课程费用中包含什么？'
      options:
        A: 'A pottery wheel to take home'
        B: 'All materials needed for the class'
        C: 'A free finished piece'
      answer: 'B'
      explanation: 'The receptionist says all materials are included in the price.'
      explanationZh: '接待员说价格中包含所有材料。'

  - id: L050
    type: three-person
    title: 'Sports Day Relay'
    titleZh: '运动会接力赛'
    scene: 'You hear three teammates planning for sports day.'
    sceneZh: '你听到三个队友在为运动会做计划。'
    difficulty: 2
    audioFile: 'L050.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "OK, we need to decide the order for the relay race. I think I should run last because I'm the fastest."
      - speaker: girl1
        voice: shimmer
        text: "Actually, the first runner is really important too — they set the pace. I'm good at fast starts, so I'll go first."
      - speaker: girl2
        voice: fable
        text: "That leaves me in the middle. I'm not the fastest, but I'm good at passing the baton smoothly."
      - speaker: boy
        voice: echo
        text: "Perfect! The baton pass is where most teams lose time. Let's practise handovers at lunch."
    question:
      text: 'Why is the second girl confident about running in the middle?'
      textZh: '第二个女孩为什么有信心跑中间一棒？'
      options:
        A: 'She is the fastest runner'
        B: 'She is good at baton passes'
        C: 'She does not want to run first'
      answer: 'B'
      explanation: 'The second girl says she is good at passing the baton smoothly.'
      explanationZh: '第二个女孩说她擅长顺畅地传接力棒。'

  # ============================================================
  # L051–L060: Fantasy and Imagination
  # ============================================================

  - id: L051
    type: short-dialogue
    title: 'The Magic Show'
    titleZh: '魔术表演'
    scene: 'You hear two children after watching a magic show.'
    sceneZh: '你听到两个孩子看完魔术表演后聊天。'
    difficulty: 2
    audioFile: 'L051.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'How did he make that rabbit appear from the empty hat? I watched so carefully but I still missed it!'
      - speaker: girl
        voice: shimmer
        text: "I think the hat has a secret compartment at the bottom. When he tapped the hat, he probably opened it."
      - speaker: boy
        voice: echo
        text: 'But it looked completely empty when he showed us the inside!'
      - speaker: girl
        voice: shimmer
        text: "That's the clever part — magicians are experts at making you look in the wrong place. It's called misdirection."
    question:
      text: 'What does the girl think the magician used?'
      textZh: '女孩认为魔术师用了什么？'
      options:
        A: 'A real magic spell'
        B: 'A hidden compartment in the hat'
        C: 'A second rabbit'
      answer: 'B'
      explanation: 'The girl suggests the hat has a secret compartment at the bottom.'
      explanationZh: '女孩认为帽子底部有一个暗格。'

  - id: L052
    type: short-dialogue
    title: 'Writing a Fairy Tale'
    titleZh: '写童话故事'
    scene: 'You hear a teacher helping a student with creative writing.'
    sceneZh: '你听到老师在帮助学生写创意作文。'
    difficulty: 2
    audioFile: 'L052.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'I really like your story so far, Amy. The flying castle is a wonderful idea. But I think your character needs a bigger challenge.'
      - speaker: girl
        voice: shimmer
        text: 'What do you mean?'
      - speaker: teacher
        voice: nova
        text: "Well, right now she finds the treasure quite easily. What if something blocks her path? Maybe a riddle she has to solve, or a bridge that's missing a piece."
      - speaker: girl
        voice: shimmer
        text: 'Oh! What if there is a talking door that only opens when you answer three questions correctly?'
      - speaker: teacher
        voice: nova
        text: "Now that's creative! Write that in and see how it changes the story."
    question:
      text: 'What does the teacher suggest improving?'
      textZh: '老师建议改进什么？'
      options:
        A: 'The setting of the story'
        B: 'The challenge the character faces'
        C: 'The ending of the story'
      answer: 'B'
      explanation: 'The teacher says the character needs a bigger challenge because finding the treasure is too easy.'
      explanationZh: '老师说角色需要一个更大的挑战，因为找到宝藏太容易了。'

  - id: L053
    type: short-dialogue
    title: 'The Dream Adventure'
    titleZh: '梦境冒险'
    scene: 'You hear two friends talking at breakfast camp.'
    sceneZh: '你听到两个朋友在早餐营地聊天。'
    difficulty: 2
    audioFile: 'L053.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I had the craziest dream last night. I was flying over a city made entirely of chocolate!'
      - speaker: girl
        voice: shimmer
        text: 'Ha! Was everything chocolate — the buildings, the roads?'
      - speaker: boy
        voice: echo
        text: 'Everything! The river was melted chocolate, and the cars were made of chocolate bars. But the weirdest part was that I could smell it.'
      - speaker: girl
        voice: shimmer
        text: "That's funny — they say if you eat cheese before bed, you get strange dreams. Did you have cheese last night?"
      - speaker: boy
        voice: echo
        text: 'Actually... I had a cheese toastie for supper!'
    question:
      text: 'What was unusual about the dream, according to the boy?'
      textZh: '男孩说这个梦有什么不寻常的地方？'
      options:
        A: 'He could fly without wings'
        B: 'He could smell the chocolate'
        C: 'He could talk to animals'
      answer: 'B'
      explanation: 'The boy says the weirdest part was that he could smell the chocolate.'
      explanationZh: '男孩说最奇怪的是他能闻到巧克力的味道。'

  - id: L054
    type: announcement
    title: 'Story Time at the Library'
