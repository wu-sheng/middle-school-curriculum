      - speaker: girl
        voice: shimmer
        text: "They can be any books you like — even graphic novels count! And if you finish, you get a medal and a certificate."
      - speaker: boy
        voice: echo
        text: 'OK, that does sound fun. I love graphic novels. I will sign up today!'
    question:
      text: 'What convinced the boy to join the reading challenge?'
      textZh: '什么说服了男孩参加阅读挑战？'
