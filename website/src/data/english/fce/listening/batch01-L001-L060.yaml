        C: 'The teacher recommended it'
      answer: 'B'
      explanation: 'The girl says she has never worked with clay before, meaning she wants to try something new.'
      explanationZh: '女孩说她以前从没用过黏土，说明她想尝试新事物。'

  - id: L044
    type: short-dialogue
    title: 'Learning Guitar'
    titleZh: '学吉他'
    scene: 'You hear a boy talking to his music teacher after a lesson.'
    sceneZh: '你听到一个男孩课后在和音乐老师说话。'
    difficulty: 2
    audioFile: 'L044.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Miss Taylor, my fingers really hurt after playing those chords."
      - speaker: teacher
        voice: nova
        text: "That's completely normal when you're starting out. Your fingertips will toughen up after a few weeks of practice."
      - speaker: boy
        voice: echo
        text: 'I keep getting a buzzing sound on the G chord too.'
      - speaker: teacher
        voice: nova
        text: "You need to press harder with your fingertips, right behind the fret — not on top of it. Try again... That's better!"
    question:
      text: 'What causes the buzzing sound on the G chord?'
      textZh: '是什么导致G和弦发出嗡嗡声？'
      options:
        A: 'The guitar strings are too old'
        B: 'The boy is pressing in the wrong place'
        C: 'The guitar is not tuned correctly'
      answer: 'B'
      explanation: 'The teacher says he needs to press behind the fret, not on top of it.'
      explanationZh: '老师说他需要按在品丝后面，而不是品丝上面。'

  - id: L045
    type: short-dialogue
    title: 'The Bake-Off'
    titleZh: '烘焙大赛'
    scene: 'You hear two friends baking in a kitchen.'
    sceneZh: '你听到两个朋友在厨房里烘焙。'
    difficulty: 1
    audioFile: 'L045.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'We need two hundred grams of flour, one egg, and a hundred grams of butter. Have you got everything?'
      - speaker: boy
        voice: echo
        text: "I've got the flour and the egg, but I can only find margarine. Will that work?"
      - speaker: girl
        voice: shimmer
        text: 'My mum says margarine is fine for cookies. It just makes them a tiny bit softer.'
      - speaker: boy
        voice: echo
        text: 'Sounds good to me. Soft cookies are the best anyway!'
    question:
      text: 'What ingredient are they replacing?'
      textZh: '他们要替换什么食材？'
      options:
        A: 'Flour with cornflour'
        B: 'Butter with margarine'
        C: 'Sugar with honey'
      answer: 'B'
      explanation: 'They cannot find butter, so they use margarine instead.'
      explanationZh: '他们找不到黄油，所以用人造黄油代替。'

  - id: L046
    type: announcement
    title: 'Football Tournament'
    titleZh: '足球锦标赛'
    scene: 'You hear a school announcement about a sports event.'
    sceneZh: '你听到学校关于体育活动的广播。'
    difficulty: 2
    audioFile: 'L046.mp3'
    script:
      - speaker: announcer
        voice: onyx
        text: 'Attention, all Year 5 and Year 6 students. The inter-school football tournament has been moved from Saturday to Sunday because of the weather forecast. Heavy rain is expected on Saturday, but Sunday should be dry and sunny. The meeting time stays the same — nine a.m. at the school gates. Please remember to bring a packed lunch and plenty of water. Good luck to all our players!'
    question:
      text: 'Why has the tournament date changed?'
      textZh: '锦标赛的日期为什么改了？'
      options:
        A: 'The pitch is being repaired'
        B: 'Heavy rain is forecast for Saturday'
        C: 'Some players are not available on Saturday'
      answer: 'B'
      explanation: 'The announcement says the change is because heavy rain is expected on Saturday.'
      explanationZh: '广播说改期是因为周六预计会有大雨。'

  - id: L047
    type: short-dialogue
    title: 'Dance Class Nerves'
    titleZh: '舞蹈课的紧张'
    scene: 'You hear a girl talking to her older sister before a dance class.'
    sceneZh: '你听到一个女孩在舞蹈课前和姐姐说话。'
    difficulty: 2
    audioFile: 'L047.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "I don't want to go in. Everyone else already knows the routine."
      - speaker: sister
        voice: fable
        text: "You can't know that — it's only the second week. I bet lots of people are still learning."
      - speaker: girl
        voice: shimmer
        text: 'But what if I mess up in front of everyone?'
      - speaker: sister
        voice: fable
        text: "Then you laugh about it and try again. That's what I do in my dance class. Nobody cares about mistakes — they're too busy thinking about their own steps!"
      - speaker: girl
        voice: shimmer
        text: 'I suppose you are right. OK, wish me luck!'
    question:
      text: 'What is the girl worried about?'
      textZh: '女孩在担心什么？'
      options:
        A: 'The music will be too fast'
        B: 'She will make mistakes in front of others'
        C: 'The teacher is very strict'
      answer: 'B'
      explanation: 'The girl says she is worried about messing up in front of everyone.'
      explanationZh: '女孩说她担心在大家面前出错。'

  - id: L048
    type: short-dialogue
    title: 'Chess Club'
    titleZh: '国际象棋社'
    scene: 'You hear two students at a chess club meeting.'
    sceneZh: '你听到两个学生在国际象棋社活动时聊天。'
    difficulty: 2
    audioFile: 'L048.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Have you noticed you always move your knight early in the game? It is a really good strategy.'
      - speaker: girl
        voice: shimmer
        text: "Thanks! I read a book about chess openings. It said knights should come out before bishops because they're better at controlling the centre."
      - speaker: boy
        voice: echo
        text: 'Interesting. Can I borrow that book?'
      - speaker: girl
        voice: shimmer
        text: "Sure, I'll bring it next week. But right now — check!"
    question:
      text: 'Where did the girl learn her strategy?'
      textZh: '女孩是在哪里学到她的策略的？'
      options:
        A: 'From her chess teacher'
        B: 'From watching online videos'
        C: 'From a book about chess openings'
      answer: 'C'
      explanation: 'The girl says she read a book about chess openings.'
      explanationZh: '女孩说她读了一本关于国际象棋开局的书。'

  - id: L049
    type: phone-call
    title: 'Signing Up for Pottery'
    titleZh: '报名陶艺课'
    scene: 'You hear a girl calling a community centre.'
    sceneZh: '你听到一个女孩在给社区中心打电话。'
