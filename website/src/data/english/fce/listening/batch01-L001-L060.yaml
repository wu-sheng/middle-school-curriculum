        C: 'His teacher told him to join'
      answer: 'B'
      explanation: 'The boy gets excited when he learns graphic novels count and says he loves them.'
      explanationZh: '当男孩得知漫画小说也算在内时很兴奋，他说他喜欢漫画小说。'

  - id: L042
    type: short-dialogue
    title: 'Swimming Practice'
    titleZh: '游泳训练'
    scene: 'You hear a coach talking to a young swimmer.'
    sceneZh: '你听到教练在和一个年轻的游泳运动员说话。'
    difficulty: 2
    audioFile: 'L042.mp3'
    script:
      - speaker: coach
        voice: onyx
