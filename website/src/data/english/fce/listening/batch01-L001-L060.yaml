    question:
      text: 'What will happen after the reading?'
      textZh: '朗读之后会发生什么？'
      options:
        A: 'A drawing competition'
        B: 'The author will sign books'
        C: 'A quiz about the story'
      answer: 'B'
      explanation: 'The announcement says Rowan will sign copies of the book after the reading.'
      explanationZh: '广播说朗读结束后罗文会签名售书。'

  - id: L055
    type: short-dialogue
    title: 'Invisible Ink'
    titleZh: '隐形墨水'
    scene: 'You hear two children in a garden.'
    sceneZh: '你听到两个孩子在花园里。'
    difficulty: 2
    audioFile: 'L055.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I made a secret message with invisible ink! Want to see how it works?'
      - speaker: boy
        voice: echo
        text: 'Yes! How did you do it?'
      - speaker: girl
        voice: shimmer
        text: 'I used lemon juice to write on white paper. It dries completely invisible.'
      - speaker: boy
        voice: echo
        text: 'So how do you read it?'
      - speaker: girl
        voice: shimmer
        text: 'You hold the paper near a warm lamp. The heat makes the lemon juice turn brown, and the message appears! Look — it says "meet me at the treehouse."'
    question:
      text: 'How do you reveal the invisible message?'
      textZh: '怎样才能显示出隐形消息？'
      options:
        A: 'Pour water on the paper'
        B: 'Hold the paper near heat'
        C: 'Shine a torch on it'
      answer: 'B'
      explanation: 'The girl explains that holding the paper near a warm lamp reveals the message.'
      explanationZh: '女孩解释说把纸放在温暖的灯旁就能显示消息。'

  - id: L056
    type: three-person
    title: 'Costume Design'
    titleZh: '服装设计'
    scene: 'You hear three children planning costumes for a school play.'
    sceneZh: '你听到三个孩子在为学校话剧设计服装。'
    difficulty: 2
    audioFile: 'L056.mp3'
    script:
      - speaker: girl1
