        A: 'A bedsheet'
        B: 'An old purple curtain'
        C: 'A piece of fabric from a shop'
      answer: 'B'
      explanation: 'The boy suggests using an old purple curtain for the robe.'
      explanationZh: '男孩建议用一块旧紫色窗帘来做长袍。'

  - id: L057
    type: short-dialogue
    title: 'The Enchanted Map'
    titleZh: '魔法地图'
    scene: 'You hear two friends playing an imagination game.'
