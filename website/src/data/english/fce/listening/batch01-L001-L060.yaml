      - speaker: girl
        voice: shimmer
        text: 'Thanks, Coach! But I still feel slow on the turns.'
      - speaker: coach
        voice: onyx
        text: "That's exactly what we will work on next week. The key is to tuck your knees in tight when you flip. I'll show you a drill for that."
      - speaker: girl
        voice: shimmer
        text: "Great. I really want to beat my personal best at the competition next month."
    question:
      text: 'What will they focus on next week?'
      textZh: '他们下周将重点练习什么？'
      options:
        A: 'Arm strength'
        B: 'Turns at the wall'
        C: 'Breathing technique'
      answer: 'B'
      explanation: 'The coach says they will work on turns next week, focusing on tucking the knees in tight.'
      explanationZh: '教练说下周他们将练习转身，重点是紧收膝盖。'

  - id: L043
    type: three-person
    title: 'Art Class Choices'
    titleZh: '美术课的选择'
    scene: 'You hear students choosing their art project.'
    sceneZh: '你听到学生们在选择他们的美术项目。'
    difficulty: 2
    audioFile: 'L043.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'This term, you can choose between three projects: painting a landscape, making a clay sculpture, or designing a poster for the school fair.'
      - speaker: girl
        voice: shimmer
        text: "I want to try the clay sculpture. I've never worked with clay before."
      - speaker: boy
        voice: echo
        text: "I'm going for the poster. I love graphic design and bright colours."
      - speaker: teacher
        voice: nova
        text: "Great choices! Remember, whichever you pick, you'll have four weeks to complete it."
    question:
      text: 'Why does the girl choose the clay sculpture?'
      textZh: '女孩为什么选择陶塑？'
      options:
        A: 'She is already good at sculpting'
