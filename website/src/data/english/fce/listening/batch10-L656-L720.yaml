  - id: L677
    type: sentence-completion
    title: 'The Forgetting Curve'
    titleZh: '遗忘曲线'
    scene: 'You will hear a psychologist explaining the forgetting curve.'
    sceneZh: '你将听到一位心理学家解释遗忘曲线。'
    difficulty: 3
    audioFile: 'L677.mp3'
    script:
      - speaker: psychologist
        voice: echo
        text: 'The forgetting curve was first described by German psychologist Hermann Ebbinghaus in 1885. He discovered that within one hour of learning something new, we forget approximately fifty per cent of it. Within twenty-four hours, we forget about seventy per cent. The curve shows that memory decays rapidly at first, then levels off.'
    question:
      text: 'Within one hour of learning something new, we forget approximately _____ per cent.'
