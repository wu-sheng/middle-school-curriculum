    titleZh: '五位老师描述他们最喜欢的教学方法'
    scene: 'You will hear five teachers each describing their favourite way to teach English.'
    sceneZh: '你将听到五位老师各自描述他们最喜欢的教授英语的方式。'
    difficulty: 3
    audioFile: 'L701.mp3'
    speakers:
      - id: Speaker1
        text: 'I use stories to teach grammar. Instead of explaining rules in isolation, I give students a short story with target structures highlighted. They read the story, notice the patterns, and then try to work out the rules themselves. They remember grammar much better when they discover it rather than being told it.'
      - id: Speaker2
        text: 'I play games in every lesson. My students love vocabulary bingo, grammar relay races, and spelling competitions. Some people say games waste time, but my students'' results have improved significantly since I started using them. Engagement is the key to learning.'
      - id: Speaker3
        text: 'I get my students to teach each other. Every week, one student prepares a mini-lesson on a topic they have mastered. Teaching something to someone else is the deepest form of learning because you have to understand it completely before you can explain it clearly.'
      - id: Speaker4
        text: 'I use real-world materials — newspaper articles, restaurant menus, train timetables, social media posts. My students are much more motivated when they can see how English is used in real life rather than in artificial textbook dialogues.'
      - id: Speaker5
        text: 'I focus heavily on error correction. After every piece of writing, I highlight errors with colour codes — red for grammar, blue for vocabulary, green for spelling. Students then correct their own mistakes. This self-correction process teaches them to spot their own errors during the exam.'
    questions:
      - text: 'Which teacher uses game-based learning?'
        textZh: '哪位老师使用基于游戏的学习？'
        answer: 'Speaker 2'
        explanation: 'Speaker 2 uses "vocabulary bingo, grammar relay races, and spelling competitions."'
        explanationZh: '说话者2使用"词汇宾果、语法接力赛和拼写比赛"。'
      - text: 'Which teacher gets students to discover grammar rules from stories?'
        textZh: '哪位老师让学生从故事中发现语法规则？'
        answer: 'Speaker 1'
        explanation: 'Speaker 1 uses "stories to teach grammar" where students "notice the patterns and work out the rules themselves."'
        explanationZh: '说话者1使用"故事来教语法"，学生"注意模式并自己找出规则"。'
      - text: 'Which teacher uses a colour-coded error correction system?'
        textZh: '哪位老师使用颜色编码的错误纠正系统？'
        answer: 'Speaker 5'
        explanation: 'Speaker 5 uses "colour codes — red for grammar, blue for vocabulary, green for spelling."'
        explanationZh: '说话者5使用"颜色代码——红色代表语法，蓝色代表词汇，绿色代表拼写。"'
      - text: 'Which teacher has students teach each other?'
        textZh: '哪位老师让学生互相教？'
        answer: 'Speaker 3'
        explanation: 'Speaker 3 says "I get my students to teach each other" through weekly mini-lessons.'
        explanationZh: '说话者3说"我让学生互相教"，通过每周的迷你课程。'
      - text: 'Which teacher uses authentic real-world materials?'
        textZh: '哪位老师使用真实世界的材料？'
        answer: 'Speaker 4'
        explanation: 'Speaker 4 uses "real-world materials — newspaper articles, restaurant menus, train timetables."'
        explanationZh: '说话者4使用"真实世界的材料——报纸文章、餐厅菜单、火车时刻表。"'

