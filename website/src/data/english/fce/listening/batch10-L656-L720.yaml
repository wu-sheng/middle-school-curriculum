  - id: L691
    type: multiple-matching
    title: 'Five Students Share Their Exam Tips'
    titleZh: '五个学生分享他们的考试技巧'
    scene: 'You will hear five students each sharing their most useful exam tip.'
    sceneZh: '你将听到五个学生各自分享他们最有用的考试技巧。'
    difficulty: 3
    audioFile: 'L691.mp3'
    speakers:
      - id: Speaker1
        text: 'My best tip is to read the question twice before looking at the options. So many of my mistakes came from misunderstanding what the question was actually asking. Now I underline the key words in the question first, and my accuracy has improved enormously.'
      - id: Speaker2
        text: 'I used to panic when I came across a word I did not know. Now I skip it and come back to it later. Usually, the answer becomes clearer once I have read the rest of the passage. Context is your best friend.'
      - id: Speaker3
        text: 'I keep an error journal. After every practice test, I write down every mistake and categorise it. After two months, I could see that most of my errors were preposition mistakes. Once I focused on prepositions specifically, my score jumped by twenty per cent.'
      - id: Speaker4
        text: 'Time management changed everything for me. I used to spend too long on the first questions and then rush the last ones. Now I set a timer for each section and move on even if I have not finished. I can always come back at the end.'
      - id: Speaker5
        text: 'The night before the exam, I stop studying completely. I watch a funny film, eat a good dinner, and go to bed early. I used to cram until midnight, but I always performed worse the next day. A rested brain is a better brain.'
    questions:
      - text: 'Which speaker improved by identifying a specific weakness through error tracking?'
        textZh: '哪位说话者通过错误追踪识别特定弱点来提高的？'
        answer: 'Speaker 3'
        explanation: 'Speaker 3 keeps an "error journal" and discovered most mistakes were preposition errors.'
        explanationZh: '说话者3保持"错误日志"并发现大多数错误是介词错误。'
      - text: 'Which speaker emphasises the importance of reading questions carefully?'
        textZh: '哪位说话者强调仔细阅读问题的重要性？'
        answer: 'Speaker 1'
        explanation: 'Speaker 1 reads the question twice and underlines key words before looking at options.'
        explanationZh: '说话者1在看选项之前读两遍问题并划出关键词。'
      - text: 'Which speaker uses time limits for each section?'
        textZh: '哪位说话者为每个部分设置时间限制？'
        answer: 'Speaker 4'
        explanation: 'Speaker 4 sets "a timer for each section" to manage time effectively.'
        explanationZh: '说话者4为"每个部分设置计时器"来有效管理时间。'
      - text: 'Which speaker recommends resting the night before the exam?'
        textZh: '哪位说话者建议考试前一晚休息？'
        answer: 'Speaker 5'
