# FCE Daily Listening Practice — Month 11, Batch 10
# 65 exercises (L656–L720)
# L656–L675: Part 1 short extracts (20 exercises, difficulty 3)
# L676–L690: Part 2 sentence completion (15 exercises, difficulty 3)
# L691–L705: Part 3 multiple matching (15 exercises, difficulty 3-4)
# L706–L720: Part 4 long conversation (15 exercises, difficulty 3-4)
# Theme: Mixed exam topics for 8-9 year old learners

extracts:
  # ============================================================
  # L656–L675: Part 1 — Short Extracts (Mixed Exam Topics)
  # ============================================================

  - id: L656
    type: short-extract
    title: 'The Exam Preparation Expert'
    titleZh: '考试准备专家'
    scene: 'You will hear an education expert giving advice about exam preparation.'
    sceneZh: '你将听到一位教育专家给出关于考试准备的建议。'
    difficulty: 3
    audioFile: 'L656.mp3'
    script:
      - speaker: expert
        voice: nova
        text: 'The biggest mistake students make is leaving everything to the last minute. Research clearly shows that spaced practice — studying a little bit every day — is far more effective than cramming the night before. Your brain needs time to process and store information, and that happens during sleep.'
      - speaker: expert
        voice: nova
        text: 'My advice? Start revising at least four weeks before the exam. Break the material into small chunks and review each chunk three or four times before exam day.'
    question:
      text: 'What does the expert say is the biggest mistake students make?'
      textZh: '专家说学生犯的最大错误是什么？'
      options:
        A: 'Studying too many subjects at once.'
        B: 'Leaving revision until the last minute.'
        C: 'Not getting enough help from teachers.'
      answer: 'B'
      explanation: '"The biggest mistake students make is leaving everything to the last minute."'
      explanationZh: '"学生犯的最大错误是把一切都留到最后一分钟。"'

  - id: L657
    type: short-extract
    title: 'The Science of Memory'
    titleZh: '记忆的科学'
    scene: 'You will hear a scientist explaining how memory works.'
    sceneZh: '你将听到一位科学家解释记忆是如何运作的。'
    difficulty: 3
    audioFile: 'L657.mp3'
    script:
      - speaker: scientist
        voice: echo
        text: 'Your brain does not store memories like a filing cabinet. Instead, it creates connections between neurons — brain cells that communicate through tiny electrical signals. When you learn something new, these connections are weak and fragile. But every time you review the information, the connections get stronger.'
      - speaker: scientist
        voice: echo
        text: 'This is why repetition works. It is not about memorising something perfectly the first time — it is about strengthening the neural pathways through repeated exposure.'
    question:
      text: 'According to the scientist, what happens when you review information?'
      textZh: '根据科学家的说法，当你复习信息时会发生什么？'
      options:
        A: 'New brain cells are created.'
        B: 'The neural connections become stronger.'
        C: 'Old memories are deleted to make room.'
      answer: 'B'
      explanation: '"Every time you review the information, the connections get stronger."'
      explanationZh: '"每次你复习信息，连接就会变得更强。"'

  - id: L658
    type: short-extract
    title: 'The Endangered Language'
    titleZh: '濒危语言'
    scene: 'You will hear a linguist talking about a dying language.'
    sceneZh: '你将听到一位语言学家谈论一种正在消亡的语言。'
    difficulty: 3
    audioFile: 'L658.mp3'
    script:
      - speaker: linguist
        voice: shimmer
        text: 'When I arrived in the village, only three elderly women still spoke the language fluently. Their children understood some words but could not hold a conversation. Their grandchildren spoke only the national language and had no interest in learning their grandmothers'' tongue.'
      - speaker: linguist
        voice: shimmer
        text: 'I spent two years recording everything — stories, songs, even recipes. When the last speaker dies, the language will die with her. But at least we will have a record of what was lost.'
    question:
      text: 'What did the linguist do to help preserve the language?'
      textZh: '语言学家做了什么来帮助保存这种语言？'
      options:
        A: 'She taught the language to children in the village school.'
        B: 'She recorded stories, songs, and other material from the last speakers.'
        C: 'She wrote a textbook for tourists visiting the village.'
      answer: 'B'
      explanation: '"I spent two years recording everything — stories, songs, even recipes."'
      explanationZh: '"我花了两年时间录制一切——故事、歌曲，甚至食谱。"'

  - id: L659
    type: short-extract
    title: 'The Coral Reef Researcher'
    titleZh: '珊瑚礁研究员'
    scene: 'You will hear a marine biologist describing her work.'
    sceneZh: '你将听到一位海洋生物学家描述她的工作。'
    difficulty: 3
    audioFile: 'L659.mp3'
    script:
      - speaker: biologist
        voice: shimmer
        text: 'Every morning, I dive down to the reef at 6 am, before the water gets too warm. I photograph the same sections of coral week after week, tracking how they change. Over the last three years, I have watched healthy, colourful coral gradually turn white and lifeless. It is heartbreaking to see with your own eyes.'
      - speaker: biologist
        voice: shimmer
        text: 'But there are also moments of hope. We recently discovered a coral species that seems to be resistant to higher temperatures. If we can understand why, we might be able to help other corals survive.'
    question:
      text: 'What gives the biologist hope?'
      textZh: '什么给了生物学家希望？'
      options:
        A: 'The water temperature has started to decrease.'
        B: 'They found a coral species that can resist higher temperatures.'
        C: 'A new law has been passed to protect the reef.'
      answer: 'B'
      explanation: '"We recently discovered a coral species that seems to be resistant to higher temperatures."'
      explanationZh: '"我们最近发现了一种似乎能抵抗更高温度的珊瑚物种。"'

  - id: L660
    type: short-extract
    title: 'The Electric Car Engineer'
    titleZh: '电动汽车工程师'
    scene: 'You will hear an engineer discussing electric car batteries.'
    sceneZh: '你将听到一位工程师讨论电动汽车电池。'
    difficulty: 3
    audioFile: 'L660.mp3'
    script:
      - speaker: engineer
        voice: echo
        text: 'The biggest challenge for electric cars right now is not the motor or the software — it is the battery. Current lithium-ion batteries take too long to charge, they lose capacity in cold weather, and the minerals needed to make them are difficult to mine sustainably.'
      - speaker: engineer
        voice: echo
        text: 'Our team is working on a solid-state battery that could charge in just fifteen minutes and last twice as long. If we succeed, it could make petrol cars obsolete within a decade.'
    question:
      text: 'What is the main problem with current electric car batteries?'
      textZh: '当前电动汽车电池的主要问题是什么？'
      options:
        A: 'They are too heavy for most cars.'
        B: 'They charge slowly, lose capacity in cold weather, and use unsustainable minerals.'
        C: 'They are more dangerous than petrol engines.'
      answer: 'B'
      explanation: 'The engineer lists three problems: slow charging, capacity loss in cold weather, and unsustainable mining of minerals.'
      explanationZh: '工程师列出了三个问题：充电慢、寒冷天气下容量损失，以及不可持续的矿物开采。'

  - id: L661
    type: short-extract
    title: 'The Sleep Scientist'
    titleZh: '睡眠科学家'
    scene: 'You will hear a researcher explaining why teenagers need more sleep.'
    sceneZh: '你将听到一位研究员解释为什么青少年需要更多睡眠。'
    difficulty: 3
    audioFile: 'L661.mp3'
    script:
      - speaker: researcher
        voice: nova
        text: 'During adolescence, the body''s internal clock shifts by about two hours. This means that a teenager naturally falls asleep later and wakes up later than an adult or a younger child. It is not laziness — it is biology. When we force teenagers to start school at eight o''clock, we are essentially asking them to learn while their brains are still asleep.'
    question:
      text: 'Why do teenagers naturally go to sleep later?'
      textZh: '为什么青少年自然而然地晚睡？'
      options:
        A: 'Because they spend too much time on their phones.'
        B: 'Because their body clock shifts during adolescence.'
        C: 'Because they drink too much caffeine.'
      answer: 'B'
      explanation: '"The body''s internal clock shifts by about two hours" during adolescence — a biological change.'
      explanationZh: '青春期"身体的内部时钟移动了大约两小时"——一个生物变化。'

  - id: L662
    type: short-extract
    title: 'The Board Game Designer'
    titleZh: '桌游设计师'
    scene: 'You will hear a game designer explaining what makes a great board game.'
    sceneZh: '你将听到一位游戏设计师解释什么构成一个好的桌游。'
    difficulty: 3
    audioFile: 'L662.mp3'
    script:
      - speaker: designer
        voice: fable
        text: 'A great board game needs three things. First, it must be easy to learn but difficult to master — if people cannot understand the rules in five minutes, they will give up. Second, every decision must matter. Players need to feel that their choices affect the outcome. Third, there must be enough randomness to keep things exciting, but not so much that skill becomes irrelevant.'
    question:
      text: 'According to the designer, what makes a great board game?'
      textZh: '根据设计师的说法，什么构成一个好的桌游？'
      options:
        A: 'It should have complicated rules that take a long time to learn.'
        B: 'It needs to be easy to learn, have meaningful choices, and balance skill with luck.'
        C: 'It must be based on a popular film or television show.'
      answer: 'B'
      explanation: 'Three elements: easy to learn, decisions that matter, and a balance of randomness and skill.'
      explanationZh: '三个要素：容易学习、有意义的决定，以及随机性和技巧的平衡。'

  - id: L663
    type: short-extract
    title: 'The Food Scientist'
    titleZh: '食品科学家'
    scene: 'You will hear a scientist discussing vertical farming.'
    sceneZh: '你将听到一位科学家讨论垂直农业。'
    difficulty: 3
    audioFile: 'L663.mp3'
    script:
      - speaker: scientist
        voice: shimmer
        text: 'Vertical farms grow food in stacked layers inside buildings, using LED lights instead of sunlight. They use 95 per cent less water than traditional farming because the water is recycled. And because they can be built anywhere — even in city centres — the food travels a shorter distance to reach your plate, which reduces carbon emissions from transport.'
    question:
      text: 'How much less water do vertical farms use compared to traditional farming?'
      textZh: '与传统农业相比，垂直农场少用多少水？'
      options:
        A: '50 per cent less'
        B: '75 per cent less'
        C: '95 per cent less'
      answer: 'C'
      explanation: '"They use 95 per cent less water than traditional farming."'
      explanationZh: '"它们比传统农业少用95%的水。"'

  - id: L664
    type: short-extract
    title: 'The Public Speaking Coach'
    titleZh: '公共演讲教练'
    scene: 'You will hear a speaking coach giving tips for managing stage fright.'
    sceneZh: '你将听到一位演讲教练给出克服怯场的技巧。'
    difficulty: 3
    audioFile: 'L664.mp3'
    script:
      - speaker: coach
        voice: nova
        text: 'The number one trick for managing stage fright is to reframe your nervousness. When you feel your heart racing and your palms sweating, do not think "I am scared." Instead, tell yourself "I am excited." Research shows that labelling your feelings as excitement rather than fear actually improves your performance. The physical symptoms are identical — the only difference is how you interpret them.'
    question:
      text: 'What technique does the coach suggest for managing nervousness?'
      textZh: '教练建议用什么技巧来管理紧张？'
      options:
        A: 'Take deep breaths and count to ten slowly.'
        B: 'Tell yourself you are excited rather than scared.'
        C: 'Imagine the audience in funny costumes.'
      answer: 'B'
      explanation: '"Tell yourself I am excited" — reframing nervousness as excitement improves performance.'
      explanationZh: '"告诉自己我很兴奋"——将紧张重新定义为兴奋可以提高表现。'

  - id: L665
    type: short-extract
    title: 'The Cave Explorer'
    titleZh: '洞穴探险家'
    scene: 'You will hear a cave explorer describing an underground discovery.'
    sceneZh: '你将听到一位洞穴探险家描述一个地下发现。'
    difficulty: 3
    audioFile: 'L665.mp3'
    script:
      - speaker: explorer
        voice: echo
        text: 'We had been crawling through a narrow tunnel for about two hours when suddenly it opened into the most incredible chamber I have ever seen. The ceiling was covered in crystals that sparkled like stars when our headlamps hit them. Stalactites hung down like chandeliers, some of them three metres long. It felt like stepping into a cathedral made entirely of stone and ice.'
    question:
      text: 'What was the explorer most impressed by?'
      textZh: '探险家对什么印象最深？'
      options:
        A: 'The length of the tunnel they crawled through.'
        B: 'The incredible crystal-covered chamber they discovered.'
        C: 'The temperature inside the cave.'
      answer: 'B'
      explanation: 'The explorer describes "the most incredible chamber" with crystals, stalactites, and a cathedral-like feeling.'
      explanationZh: '探险家描述了有水晶、钟乳石和像大教堂一样感觉的"最令人难以置信的洞室"。'

  - id: L666
    type: short-extract
    title: 'The Colour Psychologist'
    titleZh: '色彩心理学家'
    scene: 'You will hear a psychologist explaining how colour affects learning.'
    sceneZh: '你将听到一位心理学家解释颜色如何影响学习。'
    difficulty: 3
    audioFile: 'L666.mp3'
    script:
      - speaker: psychologist
        voice: shimmer
        text: 'Blue rooms have been shown to boost creative thinking, while red rooms improve attention to detail. If you are brainstorming ideas for an essay, a blue environment may help. If you are checking your work for grammar mistakes, red is better. Interestingly, green has been linked to improved reading speed and comprehension, which is why many reading apps now offer a green-tinted background option.'
    question:
      text: 'Which colour is linked to improved reading comprehension?'
      textZh: '哪种颜色与提高阅读理解有关？'
      options:
        A: 'Blue'
        B: 'Red'
        C: 'Green'
      answer: 'C'
      explanation: '"Green has been linked to improved reading speed and comprehension."'
      explanationZh: '"绿色与提高阅读速度和理解力有关。"'

  - id: L667
    type: short-extract
    title: 'The Writing Teacher'
    titleZh: '写作老师'
    scene: 'You will hear a teacher explaining how to write a good essay introduction.'
    sceneZh: '你将听到一位老师解释如何写好论文引言。'
    difficulty: 3
    audioFile: 'L667.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The introduction is the most important paragraph of your essay because it is the first thing the examiner reads. You need to hook the reader immediately. Start with a surprising fact, a thought-provoking question, or a bold statement. Then clearly state your thesis — what your essay will argue. Never start with "In this essay I will talk about..." — that is the most boring opening imaginable.'
    question:
      text: 'What opening does the teacher tell students to avoid?'
      textZh: '老师告诉学生避免什么样的开头？'
      options:
        A: 'Starting with a surprising fact.'
        B: 'Starting with "In this essay I will talk about..."'
        C: 'Starting with a question.'
      answer: 'B'
      explanation: '"Never start with ''In this essay I will talk about...'' — that is the most boring opening imaginable."'
      explanationZh: '永远不要以 In this essay I will talk about 开头——那是想象得到的最无聊的开头。'

  - id: L668
    type: short-extract
    title: 'The Ancient Tree Scientist'
    titleZh: '古树科学家'
    scene: 'You will hear a scientist talking about bristlecone pine trees.'
    sceneZh: '你将听到一位科学家谈论刺果松。'
    difficulty: 3
    audioFile: 'L668.mp3'
    script:
      - speaker: scientist
        voice: echo
        text: 'Bristlecone pines are the oldest known living organisms on Earth. The oldest, named Methuselah, is over 4,850 years old. What is remarkable is that these trees survive in terrible conditions — thin soil, freezing temperatures, almost no water. Paradoxically, it is these harsh conditions that help them live so long. They grow so slowly that their wood becomes incredibly dense, making them resistant to insects and disease.'
    question:
      text: 'Why do bristlecone pines live so long?'
      textZh: '为什么刺果松活得这么久？'
      options:
        A: 'They grow in perfect conditions with plenty of water.'
        B: 'Harsh conditions cause slow growth, creating dense, resistant wood.'
        C: 'Scientists have been protecting them for centuries.'
      answer: 'B'
      explanation: '"These harsh conditions help them live so long. They grow so slowly that their wood becomes incredibly dense."'
      explanationZh: '"这些严酷的条件帮助它们活得这么长。它们生长如此缓慢，木材变得极其致密。"'

  - id: L669
    type: short-extract
    title: 'The Exam Strategy Expert'
    titleZh: '考试策略专家'
    scene: 'You will hear an expert explaining the process of elimination in multiple-choice questions.'
    sceneZh: '你将听到一位专家解释选择题中的排除法。'
    difficulty: 3
    audioFile: 'L669.mp3'
    script:
      - speaker: expert
        voice: nova
        text: 'When you face a multiple-choice question and you are not sure of the answer, use the process of elimination. Read all four options and cross out the ones you are certain are wrong. Often, you can eliminate two options immediately. Then you have a fifty-fifty chance between the remaining two, which is much better than a one-in-four guess. Never leave a question blank — there is no penalty for wrong answers in FCE.'
    question:
      text: 'Why should you never leave a multiple-choice question blank?'
      textZh: '为什么不应该留空选择题？'
      options:
        A: 'Because the examiner will give you partial credit.'
        B: 'Because there is no penalty for wrong answers, so you should always guess.'
        C: 'Because blank answers are counted as two wrong answers.'
      answer: 'B'
      explanation: '"Never leave a question blank — there is no penalty for wrong answers in FCE."'
      explanationZh: '"永远不要留空——FCE中错误答案没有扣分。"'

  - id: L670
    type: short-extract
    title: 'The Underwater Museum Visitor'
    titleZh: '水下博物馆访客'
    scene: 'You will hear a tourist describing her visit to an underwater museum.'
    sceneZh: '你将听到一位游客描述她参观水下博物馆的经历。'
    difficulty: 3
    audioFile: 'L670.mp3'
    script:
      - speaker: tourist
        voice: shimmer
        text: 'Swimming among the sculptures was the most surreal experience of my life. They were covered in coral and sea plants, so they looked like they had been there for centuries rather than just a few years. Fish swam through the hollow figures as if they were playing hide and seek. The most moving sculpture was a circle of children holding hands — underwater, it looked like they were dancing in slow motion.'
    question:
      text: 'What did the tourist find most moving about the underwater museum?'
      textZh: '游客觉得水下博物馆中最感人的是什么？'
      options:
        A: 'The variety of fish swimming around the sculptures.'
        B: 'A sculpture of children holding hands that looked like they were dancing.'
        C: 'The way the coral had changed the colour of the statues.'
      answer: 'B'
      explanation: '"The most moving sculpture was a circle of children holding hands — underwater, it looked like they were dancing in slow motion."'
      explanationZh: '"最感人的雕塑是一圈手牵手的孩子——在水下，看起来像他们在慢动作跳舞。"'

  - id: L671
    type: short-extract
    title: 'The Word Formation Expert'
    titleZh: '构词法专家'
    scene: 'You will hear a teacher explaining word formation patterns.'
    sceneZh: '你将听到一位老师解释构词法模式。'
    difficulty: 3
    audioFile: 'L671.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The secret to Part 3 of the Use of English paper is knowing your prefixes and suffixes. If you know that adding un- or dis- makes a word negative, that -tion or -ment turns a verb into a noun, and that -able or -ible makes an adjective, you can transform almost any word. But watch out for tricky changes — like "succeed" becoming "success" as a noun and "successful" as an adjective, not "succeedment" or "succeedable."'
    question:
      text: 'What does the teacher warn students about?'
      textZh: '老师警告学生注意什么？'
      options:
        A: 'Some words have irregular formation patterns that do not follow standard rules.'
        B: 'Prefixes are more important than suffixes in the exam.'
        C: 'Part 3 is the easiest part of the Use of English paper.'
      answer: 'A'
      explanation: 'The teacher warns about "tricky changes" where words do not follow standard suffix patterns (e.g., succeed → success, not "succeedment").'
      explanationZh: '老师警告"棘手的变化"，即词不遵循标准后缀模式（如succeed→success，不是"succeedment"）。'

  - id: L672
    type: short-extract
    title: 'The History of Writing'
    titleZh: '文字的历史'
    scene: 'You will hear a historian talking about the invention of the alphabet.'
    sceneZh: '你将听到一位历史学家谈论字母表的发明。'
    difficulty: 3
    audioFile: 'L672.mp3'
    script:
      - speaker: historian
        voice: echo
        text: 'Before alphabets, writing systems like Egyptian hieroglyphics used hundreds or even thousands of symbols. Learning to write took years, and only a tiny elite could do it. The Phoenician alphabet changed everything by reducing writing to just 22 letters. Suddenly, writing was something ordinary people could learn. This simple innovation may have had a bigger impact on human civilisation than any other invention in history.'
    question:
      text: 'Why was the Phoenician alphabet so revolutionary?'
      textZh: '为什么腓尼基字母表如此具有革命性？'
      options:
        A: 'It was the most beautiful writing system ever created.'
        B: 'It reduced writing to 22 letters, making it accessible to ordinary people.'
        C: 'It was the first writing system to use pictures.'
      answer: 'B'
      explanation: '"Reducing writing to just 22 letters. Suddenly, writing was something ordinary people could learn."'
      explanationZh: '"将书写减少到仅22个字母。突然，书写成了普通人都能学的东西。"'

  - id: L673
    type: short-extract
    title: 'The Key Word Transformation Coach'
    titleZh: '关键词转换教练'
    scene: 'You will hear a tutor explaining how to approach Part 4 of the Use of English paper.'
    sceneZh: '你将听到一位导师解释如何应对语言运用第4部分。'
    difficulty: 3
    audioFile: 'L673.mp3'
    script:
      - speaker: tutor
        voice: shimmer
        text: 'Part 4 is all about knowing alternative ways to say the same thing. The key word must stay EXACTLY as it is — you cannot change its form. So if the key word is BEEN, you cannot write "being" or "be." Always check three things: does your sentence mean the same as the original? Have you used the key word unchanged? Is your grammar correct? Many students lose marks because they change the meaning slightly without realising it.'
    question:
      text: 'What three things should you check in Part 4?'
      textZh: '在第4部分你应该检查哪三件事？'
      options:
        A: 'Spelling, punctuation, and handwriting.'
        B: 'Same meaning, unchanged key word, and correct grammar.'
        C: 'Word count, paragraph structure, and vocabulary range.'
      answer: 'B'
      explanation: 'Three checks: "does your sentence mean the same?" + "key word unchanged?" + "grammar correct?"'
      explanationZh: '三项检查："你的句子意思一样吗？"+"关键词不变？"+"语法正确？"'

  - id: L674
    type: short-extract
    title: 'The Mistake Analyst'
    titleZh: '错误分析师'
    scene: 'You will hear a learning coach explaining how to learn from mistakes.'
    sceneZh: '你将听到一位学习教练解释如何从错误中学习。'
    difficulty: 3
    audioFile: 'L674.mp3'
    script:
      - speaker: coach
        voice: echo
        text: 'After every practice test, I want you to create an error log. Write down every question you got wrong, then classify the error. Was it a vocabulary mistake? A grammar mistake? Did you misunderstand the question? Or did you simply run out of time? Once you see patterns in your errors, you know exactly what to focus on in your revision. Most students find that 80 per cent of their mistakes come from just two or three areas.'
    question:
      text: 'What does the coach suggest students create after each practice test?'
      textZh: '教练建议学生在每次练习测试后创建什么？'
      options:
        A: 'A study timetable for the week ahead.'
        B: 'An error log that classifies each mistake by type.'
        C: 'A list of vocabulary words to memorise.'
      answer: 'B'
      explanation: '"Create an error log. Write down every question you got wrong, then classify the error."'
      explanationZh: '"创建一个错误日志。写下你答错的每道题，然后分类错误。"'

  - id: L675
    type: short-extract
    title: 'The Time Management Expert'
    titleZh: '时间管理专家'
    scene: 'You will hear an exam tutor discussing time management during the FCE exam.'
