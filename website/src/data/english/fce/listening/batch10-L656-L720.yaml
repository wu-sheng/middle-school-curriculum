    difficulty: 3
    audioFile: 'L678.mp3'
    script:
      - speaker: scientist
        voice: shimmer
        text: 'The principle behind spaced repetition is simple: review information just before you are about to forget it. If you learn a new word today, review it tomorrow, then three days later, then a week later, then two weeks later. Each successful review doubles the time until the next review is needed. Eventually, the word moves into your permanent long-term memory.'
    question:
      text: 'Each successful review _____ the time until the next review is needed.'
      textZh: '每次成功的复习 _____ 下次复习所需的时间。'
