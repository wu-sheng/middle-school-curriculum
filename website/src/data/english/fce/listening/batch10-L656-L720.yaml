        text: 'I learned most of my English from watching films with English subtitles. At first I needed both English audio and subtitles, but gradually I started understanding without reading the text. Now I watch everything in English and only turn on subtitles for very difficult shows.'
      - id: Speaker2
        text: 'Reading was the key for me. I started with simple graded readers and worked my way up to full novels. The vocabulary I learned from books was much more varied and sophisticated than what I learned in textbooks. I also noticed that my writing improved because I was absorbing sentence structures naturally.'
      - id: Speaker3
        text: 'I had an online language exchange partner in Australia. We would video call twice a week — half the time speaking English, half speaking Mandarin. Having a real person to talk to made me much more confident than just practising in class.'
      - id: Speaker4
        text: 'Music was my secret weapon. I would listen to English songs, look up the lyrics, and learn them by heart. The rhythm and melody helped me remember the words, and singing along improved my pronunciation. I still remember vocabulary from songs I learned years ago.'
      - id: Speaker5
