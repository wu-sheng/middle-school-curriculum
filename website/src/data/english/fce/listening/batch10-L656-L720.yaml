  - id: L706
    type: long-conversation
    title: 'Two Students Discuss Their Exam Preparation'
    titleZh: '两个学生讨论他们的考试准备'
    scene: 'You will hear two friends, Mia and Jake, discussing how they are preparing for their FCE exam.'
    sceneZh: '你将听到两个朋友Mia和Jake讨论他们如何准备FCE考试。'
    difficulty: 3
    audioFile: 'L706.mp3'
    script:
      - speaker: Mia
        voice: shimmer
        text: 'I have been using flashcards for vocabulary, but I feel like I am forgetting words almost as fast as I learn them. Do you have the same problem?'
      - speaker: Jake
        voice: fable
        text: 'I did at first, but then I started using spaced repetition. Instead of reviewing all my cards every day, I only review the ones I am about to forget. The app tracks which words I find difficult and shows them more often. It has made a huge difference.'
      - speaker: Mia
        voice: shimmer
        text: 'That sounds clever. What about grammar? I keep making the same mistakes with conditionals.'
      - speaker: Jake
        voice: fable
        text: 'Me too! My trick is to create example sentences about my own life. Instead of memorising "If I had studied, I would have passed," I write "If I had woken up earlier, I would have caught the bus." Personal examples stick in my memory much better.'
      - speaker: Mia
        voice: shimmer
        text: 'That is a great idea. The part I find hardest is the Use of English — especially word formation. I never know which suffix to add.'
      - speaker: Jake
        voice: fable
        text: 'I made a chart of the most common suffixes — like -tion for nouns, -able for adjectives, -ly for adverbs — and I practise by transforming ten random words every morning before breakfast. It only takes five minutes, but it has really helped.'
      - speaker: Mia
        voice: shimmer
        text: 'Do you think we are doing enough practice tests? I have only done three so far.'
      - speaker: Jake
        voice: fable
        text: 'I have done about eight. But it is not just about doing the tests — it is about analysing your mistakes afterwards. I spend as long reviewing a test as I do taking it. That is where the real learning happens.'
    questions:
      - id: L706-Q1
        text: 'What technique has helped Jake remember vocabulary more effectively?'
        textZh: '什么技巧帮助Jake更有效地记忆词汇？'
        options:
          A: 'Writing words out ten times each.'
          B: 'Using spaced repetition with an app.'
          C: 'Reading a vocabulary book every night.'
          D: 'Making vocabulary posters for his bedroom wall.'
        answer: 'B'
        explanation: 'Jake uses "spaced repetition" where an app "tracks which words I find difficult and shows them more often."'
        explanationZh: 'Jake使用"间隔重复"，应用程序"追踪我觉得困难的词并更频繁地显示它们"。'
      - id: L706-Q2
        text: 'How does Jake practise conditionals?'
        textZh: 'Jake如何练习条件句？'
        options:
          A: 'By reading grammar textbooks.'
          B: 'By creating personal example sentences about his own life.'
          C: 'By doing online grammar quizzes.'
          D: 'By asking his teacher for extra worksheets.'
        answer: 'B'
        explanation: '"I write sentences about my own life. Personal examples stick in my memory much better."'
        explanationZh: '"我写关于自己生活的句子。个人例子在我的记忆中更容易留下。"'
      - id: L706-Q3
        text: 'Which part of the exam does Mia find hardest?'
        textZh: 'Mia觉得考试的哪个部分最难？'
        options:
          A: 'Reading'
          B: 'Writing'
          C: 'Use of English, especially word formation'
          D: 'Listening'
        answer: 'C'
        explanation: '"The part I find hardest is the Use of English — especially word formation."'
        explanationZh: '"我觉得最难的部分是语言运用——尤其是构词法。"'
      - id: L706-Q4
        text: 'How many practice tests has Jake completed?'
        textZh: 'Jake完成了多少套模拟测试？'
        options:
          A: 'Three'
          B: 'Five'
          C: 'Eight'
          D: 'Twelve'
        answer: 'C'
        explanation: '"I have done about eight."'
        explanationZh: '"我做了大约八套。"'
      - id: L706-Q5
        text: 'What does Jake say is more important than just doing practice tests?'
        textZh: 'Jake说比仅仅做模拟测试更重要的是什么？'
        options:
          A: 'Getting a high score.'
          B: 'Finishing within the time limit.'
          C: 'Analysing your mistakes afterwards.'
          D: 'Doing the tests under exam conditions.'
        answer: 'C'
        explanation: '"It is not just about doing the tests — it is about analysing your mistakes afterwards."'
        explanationZh: '"不仅仅是做测试——而是之后分析你的错误。"'

  - id: L711
    type: long-conversation
    title: 'A Teacher and Student Discuss Exam Strategy'
    titleZh: '老师和学生讨论考试策略'
    scene: 'You will hear a teacher, Mrs Chen, giving exam advice to a student, Leo.'
    sceneZh: '你将听到陈老师给学生Leo考试建议。'
    difficulty: 4
    audioFile: 'L711.mp3'
    script:
      - speaker: Mrs Chen
        voice: nova
        text: 'Leo, your practice test scores are improving, but I have noticed you lose marks in the same areas every time. Let us look at your error analysis. Your biggest weakness is preposition errors in the open cloze.'
      - speaker: Leo
        voice: fable
        text: 'I know — I always mix up "in," "on," and "at." Is there a trick to remembering which one to use?'
      - speaker: Mrs Chen
        voice: nova
        text: 'Unfortunately, prepositions in English are mostly about learning fixed phrases rather than rules. My advice is to learn the whole phrase as a unit: "interested IN," "depend ON," "good AT." Keep a preposition diary and add two new phrases every day.'
      - speaker: Leo
        voice: fable
        text: 'What about the key word transformations? I understand the original sentence, but I cannot always find the right structure.'
      - speaker: Mrs Chen
        voice: nova
        text: 'Part 4 tests your knowledge of alternative structures. The key is to recognise patterns. About seventy per cent of the transformations test just ten common patterns: active to passive, direct to reported speech, conditionals, so/such...that, too/enough, and comparative structures. If you master these ten patterns, you will score well.'
      - speaker: Leo
        voice: fable
        text: 'That makes it feel more manageable. One more question — I always run out of time on the writing paper. Any advice?'
      - speaker: Mrs Chen
        voice: nova
        text: 'Spend the first five minutes planning. Students who plan actually write faster because they know what each paragraph will contain before they start. Use a simple structure: introduction, two body paragraphs, conclusion. And always leave five minutes at the end to check your work for grammar and spelling errors.'
    questions:
      - id: L711-Q1
        text: 'What is Leo''s biggest weakness according to Mrs Chen?'
        textZh: '根据陈老师的说法，Leo最大的弱点是什么？'
        options:
          A: 'Vocabulary in the reading section.'
          B: 'Preposition errors in the open cloze.'
          C: 'Grammar errors in the writing section.'
          D: 'Poor time management in listening.'
        answer: 'B'
        explanation: '"Your biggest weakness is preposition errors in the open cloze."'
        explanationZh: '"你最大的弱点是完形填空中的介词错误。"'
      - id: L711-Q2
        text: 'What does Mrs Chen suggest for learning prepositions?'
        textZh: '陈老师建议怎样学习介词？'
        options:
          A: 'Memorise a list of grammar rules.'
          B: 'Learn whole phrases as units and keep a preposition diary.'
          C: 'Do as many practice tests as possible.'
          D: 'Read English newspapers every day.'
        answer: 'B'
        explanation: '"Learn the whole phrase as a unit" and "keep a preposition diary."'
        explanationZh: '"把整个短语作为一个单位来学"并"保持一个介词日记"。'
      - id: L711-Q3
        text: 'What percentage of key word transformations test common patterns?'
        textZh: '关键词转换中有多大比例测试常见模式？'
        options:
          A: 'About 50 per cent'
          B: 'About 60 per cent'
          C: 'About 70 per cent'
          D: 'About 80 per cent'
        answer: 'C'
        explanation: '"About seventy per cent of the transformations test just ten common patterns."'
        explanationZh: '"大约70%的转换只测试十种常见模式。"'
      - id: L711-Q4
        text: 'How long does Mrs Chen suggest spending on planning in the writing paper?'
        textZh: '陈老师建议在写作试卷中花多长时间规划？'
        options:
          A: 'Two minutes'
          B: 'Five minutes'
          C: 'Ten minutes'
          D: 'Fifteen minutes'
        answer: 'B'
        explanation: '"Spend the first five minutes planning."'
        explanationZh: '"前五分钟用于规划。"'
      - id: L711-Q5
        text: 'What is Leo''s problem with the writing paper?'
        textZh: 'Leo在写作试卷上有什么问题？'
        options:
          A: 'He does not know what to write about.'
          B: 'His handwriting is too messy.'
          C: 'He always runs out of time.'
          D: 'He forgets to write a conclusion.'
        answer: 'C'
        explanation: '"I always run out of time on the writing paper."'
        explanationZh: '"我在写作试卷上总是时间不够。"'

  - id: L716
    type: long-conversation
    title: 'Two Friends Compare Their Study Methods'
    titleZh: '两个朋友比较他们的学习方法'
    scene: 'You will hear two friends, Emma and Ryan, comparing their approaches to exam preparation.'
    sceneZh: '你将听到两个朋友Emma和Ryan比较他们的备考方法。'
    difficulty: 4
    audioFile: 'L716.mp3'
    script:
      - speaker: Emma
        voice: shimmer
        text: 'I read somewhere that the best time to review new vocabulary is just before you go to sleep. Apparently, your brain consolidates memories during sleep, so the last thing you study gets the strongest reinforcement.'
      - speaker: Ryan
        voice: fable
        text: 'That is interesting. I prefer studying in the morning when my brain is fresh. I find it much harder to concentrate in the evening. But I do keep a notebook beside my bed to write down any words that come to me during the night.'
      - speaker: Emma
        voice: shimmer
        text: 'Have you tried colour-coding your notes? I use blue for grammar rules, pink for vocabulary, and green for exam tips. It makes it much easier to find information quickly, and the colours seem to help me remember.'
      - speaker: Ryan
        voice: fable
        text: 'I use mind maps instead. I put the topic in the centre and draw branches for related ideas. It helps me see connections between concepts that I might miss with linear notes. For example, I can see how conditionals, wish sentences, and reported speech all involve tense shifts.'
      - speaker: Emma
        voice: shimmer
        text: 'That is clever. What do you find most stressful about the exam?'
      - speaker: Ryan
        voice: fable
        text: 'Honestly? The listening paper. You only hear each recording twice, and if you miss something, it is gone. I have been practising by listening to podcasts at 1.5 times normal speed. When I go back to normal speed, it sounds slow and clear.'
      - speaker: Emma
        voice: shimmer
        text: 'I struggle most with the writing paper. I know what I want to say but I cannot always find the right words. My teacher says I need to build a bank of useful phrases for each type of writing — essays, reviews, stories, letters.'
    questions:
      - id: L716-Q1
        text: 'When does Emma prefer to study vocabulary?'
        textZh: 'Emma更喜欢什么时候学词汇？'
        options:
          A: 'Early in the morning'
          B: 'During lunch break'
          C: 'Just before going to sleep'
          D: 'On the bus to school'
        answer: 'C'
        explanation: '"The best time to review new vocabulary is just before you go to sleep."'
        explanationZh: '"复习新词汇的最佳时间是在睡前。"'
      - id: L716-Q2
        text: 'What study technique does Ryan use instead of colour-coding?'
        textZh: 'Ryan使用什么学习技巧代替颜色编码？'
        options:
          A: 'Flashcards'
          B: 'Mind maps'
          C: 'Audio recordings'
          D: 'Practice tests'
        answer: 'B'
        explanation: '"I use mind maps instead. I put the topic in the centre and draw branches."'
        explanationZh: '"我改用思维导图。我把主题放在中心画分支。"'
      - id: L716-Q3
        text: 'Which paper does Ryan find most stressful?'
        textZh: 'Ryan觉得哪张试卷最有压力？'
        options:
          A: 'Reading'
          B: 'Writing'
          C: 'Listening'
          D: 'Use of English'
        answer: 'C'
        explanation: '"Honestly? The listening paper. You only hear each recording twice."'
        explanationZh: '"说实话？听力试卷。每段录音你只能听两遍。"'
      - id: L716-Q4
        text: 'How has Ryan been practising for the listening paper?'
        textZh: 'Ryan一直在如何练习听力？'
        options:
          A: 'Watching English films without subtitles.'
          B: 'Listening to podcasts at 1.5 times normal speed.'
          C: 'Practising with past exam recordings only.'
          D: 'Having conversations with native speakers.'
        answer: 'B'
        explanation: '"I have been practising by listening to podcasts at 1.5 times normal speed."'
        explanationZh: '"我一直在通过以1.5倍正常速度听播客来练习。"'
      - id: L716-Q5
        text: 'What advice did Emma''s teacher give her about writing?'
        textZh: 'Emma的老师给了她什么关于写作的建议？'
        options:
          A: 'Write longer paragraphs to impress the examiner.'
          B: 'Build a bank of useful phrases for each type of writing.'
          C: 'Focus on spelling rather than vocabulary range.'
          D: 'Always write a story because it is the easiest option.'
        answer: 'B'
        explanation: '"My teacher says I need to build a bank of useful phrases for each type of writing."'
        explanationZh: '"我的老师说我需要为每种写作类型建立一个有用短语库。"'
