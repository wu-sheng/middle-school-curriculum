        voice: nova
        text: 'I have read your essay about school uniforms, and your arguments are good. However, I notice you jump from one point to the next without using connecting words. Let me show you how linking words can improve your writing.'
      - speaker: student
        voice: shimmer
        text: 'I know I should use them, but I always forget which ones to use. How do I choose between "however" and "nevertheless"?'
      - speaker: teacher
        voice: nova
        text: 'They are actually very similar — both show contrast. "However" is more common and works in almost any situation. "Nevertheless" is slightly more formal and works best when you want to say "despite that." The key is to use a variety. Try using "furthermore" for adding points, "however" for contrasts, and "consequently" for results.'
      - speaker: student
        voice: shimmer
        text: 'That makes sense. And what about the conclusion? I never know how to end an essay.'
      - speaker: teacher
        voice: nova
        text: 'A good conclusion summarises your main points and restates your opinion. Start with "To sum up" or "In conclusion," then briefly recap your two strongest arguments. End with a memorable final sentence — perhaps a thought-provoking question or a strong statement.'
    questions:
      - id: L447-Q1
        text: 'What was the main weakness in the student''s essay?'
        textZh: '学生作文的主要弱点是什么？'
        options:
          A: 'The arguments were unclear'
          B: 'There were too many spelling mistakes'
          C: 'The essay lacked connecting words between ideas'
        answer: 'C'
        explanation: 'The teacher says the student "jumps from one point to the next without using connecting words."'
        explanationZh: '老师说学生"从一个观点跳到另一个观点，没有使用连接词"。'
      - id: L447-Q2
        text: 'What should a good conclusion do according to the teacher?'
        textZh: '根据老师的说法，好的结论应该做什么？'
        options:
          A: 'Introduce a completely new argument'
          B: 'Summarise main points and restate the opinion'
          C: 'List all the linking words used in the essay'
        answer: 'B'
        explanation: '"A good conclusion summarises your main points and restates your opinion."'
        explanationZh: '"好的结论总结主要观点并重申你的观点"。'

  - id: L448
    type: long-conversation
    title: 'The Idiom Quiz Show'
    titleZh: '习语问答节目'
    scene: 'You will hear two students playing an idiom quiz game.'
    sceneZh: '你将听到两个学生玩习语问答游戏。'
    difficulty: 2
    audioFile: 'L448.mp3'
    script:
      - speaker: quizmaster
        voice: echo
        text: 'Okay, round one! I will give you a situation, and you have to tell me the correct English idiom. Ready? You studied really hard, and the test was super easy.'
      - speaker: player
        voice: shimmer
        text: 'It was a piece of cake!'
      - speaker: quizmaster
        voice: echo
        text: 'Correct! One point. Next: your friend called you completely without warning last night.'
      - speaker: player
        voice: shimmer
        text: 'She called me out of the blue!'
      - speaker: quizmaster
        voice: echo
        text: 'Two points! Last one for this round: you accidentally told your brother about his surprise birthday present.'
      - speaker: player
        voice: shimmer
        text: 'I let the cat out of the bag!'
      - speaker: quizmaster
        voice: echo
        text: 'Three out of three! You are really good at this. I think you have been studying your idioms!'
    questions:
      - id: L448-Q1
        text: 'Which idiom means something happened without warning?'
        textZh: '哪个习语表示某事毫无预兆地发生？'
        options:
          A: 'A piece of cake'
          B: 'Out of the blue'
          C: 'Let the cat out of the bag'
        answer: 'B'
        explanation: '"Out of the blue" was the answer for "called completely without warning."'
        explanationZh: '"Out of the blue"是"完全没有预兆就打电话来"的答案。'

  - id: L449
    type: long-conversation
    title: 'Planning the Language Exchange Trip'
    titleZh: '规划语言交换旅行'
    scene: 'You will hear two teachers planning a language exchange trip for students.'
    sceneZh: '你将听到两位老师为学生规划语言交换旅行。'
    difficulty: 3
    audioFile: 'L449.mp3'
    script:
      - speaker: teacher1
        voice: nova
        text: 'The language exchange trip is coming up next month. We need to prepare our students. Many of them have never travelled abroad before, and they are quite nervous about communicating in English all day.'
      - speaker: teacher2
        voice: shimmer
        text: 'I think we should do a series of preparation sessions. In the first one, we could teach them useful phrases for everyday situations — ordering food, asking for directions, making polite requests.'
      - speaker: teacher1
        voice: nova
        text: 'Good idea. We should also cover cultural differences so they do not make embarrassing mistakes. Remember last year when a student bowed in France instead of doing the cheek kiss?'
      - speaker: teacher2
        voice: shimmer
        text: 'Oh yes! And we should teach them some common idioms they might hear. Their host families will probably use phrases like "make yourself at home" and "help yourself" which might confuse them if they take them literally.'
    questions:
      - id: L449-Q1
        text: 'Why are the students nervous about the trip?'
        textZh: '学生们为什么对旅行感到紧张？'
        options:
          A: 'The flight is very long'
          B: 'Many have never travelled abroad and are worried about communicating in English'
          C: 'They do not like the food in other countries'
        answer: 'B'
        explanation: '"Many of them have never travelled abroad before" and are "nervous about communicating in English all day."'
        explanationZh: '"他们中很多人从未出过国"，对"整天用英语交流"感到紧张。'
      - id: L449-Q2
        text: 'What idioms might host families use?'
        textZh: '寄宿家庭可能使用什么习语？'
        options:
          A: '"Break the ice" and "a piece of cake"'
          B: '"Make yourself at home" and "help yourself"'
          C: '"Hit the nail on the head" and "out of the blue"'
        answer: 'B'
        explanation: 'The teacher mentions "make yourself at home" and "help yourself" as phrases host families use.'
        explanationZh: '老师提到"make yourself at home"和"help yourself"是寄宿家庭常用的短语。'

  - id: L450
    type: long-conversation
    title: 'The Collocation Workshop Review'
    titleZh: '搭配工作坊回顾'
    scene: 'You will hear two students reviewing what they learned in a collocation workshop.'
    sceneZh: '你将听到两个学生回顾搭配工作坊中学到的内容。'
    difficulty: 3
    audioFile: 'L450.mp3'
    script:
      - speaker: student1
        voice: echo
        text: 'That workshop was really useful. I finally understand the difference between "make" and "do." We make things that are creative or new — like make a plan, make friends, make progress. We do things that are tasks or routines — like do homework, do the washing up, do your best.'
      - speaker: student2
        voice: shimmer
        text: 'Yes, and the "take" versus "have" part was interesting too. We take a break, take a photo, take turns. But we have a shower, have a rest, have a go. There is no real logic — you just have to learn them as fixed pairs.'
      - speaker: student1
        voice: echo
        text: 'The teacher said the best trick is to learn them in context, not as individual words. So instead of memorising "decision = make," I should learn the whole phrase: "make a difficult decision."'
      - speaker: student2
        voice: shimmer
        text: 'That makes sense! I am going to start a collocation notebook where I write every new combination I find while reading.'
    questions:
      - id: L450-Q1
        text: 'According to the students, what is the best way to learn collocations?'
        textZh: '根据学生的说法，学习搭配最好的方法是什么？'
        options:
          A: 'Memorise grammar rules for each verb'
          B: 'Learn them in context as whole phrases'
          C: 'Translate them directly from Chinese'
        answer: 'B'
        explanation: '"The best trick is to learn them in context, not as individual words" — learn the whole phrase.'
        explanationZh: '"最好的窍门是在语境中学习，而不是单独记词"——学习整个短语。'

  - id: L451
    type: long-conversation
    title: 'The FCE Cloze Strategy'
    titleZh: 'FCE完形填空策略'
    scene: 'You will hear a tutor teaching a student strategies for FCE Use of English Part 1.'
    sceneZh: '你将听到一位辅导员教学生FCE Use of English Part 1的策略。'
    difficulty: 3
    audioFile: 'L451.mp3'
    script:
      - speaker: tutor
        voice: nova
        text: 'For Part 1 of Use of English, you have a text with eight gaps and four options for each. The key is to read the whole text first before looking at any gaps. This gives you the big picture — the topic, tone, and flow of ideas.'
      - speaker: student
        voice: shimmer
        text: 'I usually try to fill each gap as I read. Should I not do that?'
      - speaker: tutor
        voice: nova
        text: 'It is better to read through once, then go back to each gap. Many questions test collocations and fixed expressions. For example, if you see "make a _____," you know it could be "decision," "mistake," or "difference." The context helps you choose.'
      - speaker: student
        voice: shimmer
        text: 'What about questions that test linking words?'
      - speaker: tutor
        voice: nova
        text: 'Great question! For linking words, look at the sentences before and after the gap. If the ideas contrast, choose "however" or "nevertheless." If the second idea adds to the first, choose "furthermore" or "moreover." If it shows a result, choose "consequently" or "therefore."'
    questions:
      - id: L451-Q1
        text: 'What does the tutor recommend doing first?'
        textZh: '辅导员建议先做什么？'
        options:
          A: 'Fill in each gap immediately while reading'
          B: 'Read the whole text once before looking at any gaps'
          C: 'Look at all four options for every gap first'
        answer: 'B'
        explanation: '"Read the whole text first before looking at any gaps. This gives you the big picture."'
        explanationZh: '"在看任何空格之前先通读全文。这给你一个整体画面。"'
      - id: L451-Q2
        text: 'How should you choose between linking words?'
        textZh: '你应该怎样在连接词之间选择？'
        options:
          A: 'Choose the longest word'
          B: 'Choose based on alphabetical order'
          C: 'Look at the relationship between the sentences before and after the gap'
        answer: 'C'
        explanation: '"Look at the sentences before and after the gap" to determine contrast, addition, or result.'
        explanationZh: '"看空格前后的句子"来判断是对比、补充还是结果关系。'

  - id: L452
    type: long-conversation
    title: 'The Communication Skills Fair'
    titleZh: '交流技能展'
    scene: 'You will hear two students discussing a school communication skills fair.'
    sceneZh: '你将听到两个学生讨论学校交流技能展。'
    difficulty: 3
    audioFile: 'L452.mp3'
    script:
      - speaker: student1
        voice: echo
        text: 'Did you go to the communication skills fair on Saturday? It was amazing! There were workshops on public speaking, active listening, and even one on reading body language.'
      - speaker: student2
        voice: shimmer
        text: 'I went to the body language one! The presenter showed us how crossing your arms can mean different things in different cultures. She also taught us that mirroring — copying someone else''s body language — makes them feel more comfortable talking to you.'
      - speaker: student1
        voice: echo
        text: 'I did the public speaking workshop. We learned about the three tools of persuasion — ethos, pathos, and logos. Then we had to give a one-minute speech using all three. It was nerve-wracking but really fun!'
    questions:
      - id: L452-Q1
        text: 'What did Student 2 learn about at the fair?'
        textZh: '学生2在展会上学到了什么？'
        options:
          A: 'How to give a public speech'
          B: 'How body language varies across cultures and how mirroring works'
          C: 'How to use linking words in essays'
        answer: 'B'
        explanation: 'Student 2 went to "the body language one" and learned about cultural differences and "mirroring."'
        explanationZh: '学生2参加了"身体语言那个"，学到了文化差异和"镜像"。'

  - id: L453
    type: long-conversation
    title: 'Discussing an Article About Language Learning'
    titleZh: '讨论语言学习文章'
    scene: 'You will hear two friends discussing an article they both read about how children learn languages.'
    sceneZh: '你将听到两个朋友讨论他们都读过的一篇关于孩子如何学习语言的文章。'
    difficulty: 3
    audioFile: 'L453.mp3'
    script:
      - speaker: friend1
        voice: echo
        text: 'Did you read that article about how babies learn language? It said babies can distinguish all the sounds of every language until they are about eight months old. After that, their brains start focusing only on the sounds they hear most often.'
      - speaker: friend2
        voice: shimmer
        text: 'That is fascinating. So basically, we are born with the ability to learn any language, but we gradually lose the sounds we do not use. No wonder it is harder to learn a new language as an adult.'
      - speaker: friend1
        voice: echo
        text: 'Exactly. The article also said that children who grow up hearing two languages from birth — like you — have brains that are more flexible. They are better at switching between tasks and paying attention.'
      - speaker: friend2
        voice: shimmer
        text: 'I did not know being bilingual had benefits beyond just knowing two languages! Maybe that is why I am good at multitasking.'
    questions:
      - id: L453-Q1
        text: 'Until what age can babies distinguish all language sounds?'
        textZh: '婴儿到几个月大时能区分所有语言的声音？'
        options:
          A: 'About three months'
          B: 'About eight months'
          C: 'About twelve months'
        answer: 'B'
        explanation: '"Babies can distinguish all the sounds of every language until they are about eight months old."'
        explanationZh: '"婴儿到大约八个月大时能区分每种语言的所有声音"。'

  - id: L454
    type: long-conversation
    title: 'Phrasal Verb Review Game'
    titleZh: '短语动词复习游戏'
    scene: 'You will hear a teacher conducting a phrasal verb review with the class.'
    sceneZh: '你将听到一位老师和全班进行短语动词复习。'
    difficulty: 2
    audioFile: 'L454.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'All right, class. Let us do a quick review. I will say a sentence with a gap, and you tell me the correct phrasal verb. Number one: I cannot blank blank this noise any longer!'
      - speaker: class
        voice: shimmer
        text: 'Put up with!'
      - speaker: teacher
        voice: nova
        text: 'Correct! Number two: She blank blank painting when she retired.'
      - speaker: class
        voice: echo
        text: 'Took up!'
      - speaker: teacher
        voice: nova
        text: 'Well done! Number three: We need to blank blank a solution to this problem.'
      - speaker: class
        voice: shimmer
        text: 'Come up with!'
      - speaker: teacher
        voice: nova
        text: 'Excellent! You have all been studying hard. I am really proud of the progress you have made this month.'
    questions:
      - id: L454-Q1
        text: 'Which phrasal verb means "to tolerate"?'
        textZh: '哪个短语动词表示"忍受"？'
        options:
          A: 'Took up'
          B: 'Come up with'
          C: 'Put up with'
        answer: 'C'
        explanation: '"Put up with" was the answer for "I cannot blank blank this noise" — meaning to tolerate.'
        explanationZh: '"Put up with"是"我再也忍受不了这个噪音"的答案——意思是忍受。'

  - id: L455
    type: long-conversation
    title: 'The Book Club Discussion'
    titleZh: '读书会讨论'
    scene: 'You will hear two students discussing a book about the power of words.'
    sceneZh: '你将听到两个学生讨论一本关于词语力量的书。'
    difficulty: 3
    audioFile: 'L455.mp3'
    script:
      - speaker: student1
        voice: echo
        text: 'I just finished "The Word Collector" by Peter H. Reynolds. It is a picture book, but the message is really deep. It is about a boy called Jerome who collects words instead of stamps or coins.'
      - speaker: student2
        voice: shimmer
        text: 'What kind of words does he collect?'
      - speaker: student1
        voice: echo
        text: 'All kinds — short words, long words, beautiful-sounding words, words from other languages. He keeps them in a scrapbook. Then one day, he accidentally drops all his words and they mix together into poems and songs. He realises that words are more powerful when they are shared with others.'
      - speaker: student2
        voice: shimmer
        text: 'That is beautiful! It reminds me of what our English teacher always says — words are like keys that open doors to understanding.'
    questions:
      - id: L455-Q1
        text: 'What lesson does Jerome learn in the book?'
        textZh: 'Jerome在书中学到了什么道理？'
        options:
          A: 'Words should be kept private and secret'
          B: 'Words are more powerful when shared with others'
          C: 'Only long words are worth collecting'
        answer: 'B'
        explanation: 'Jerome "realises that words are more powerful when they are shared with others."'
        explanationZh: 'Jerome"意识到词语在与他人分享时更有力量"。'

  - id: L456
    type: long-conversation
    title: 'Preparing for FCE Part 2'
    titleZh: '准备FCE Part 2'
    scene: 'You will hear a tutor helping a student prepare for FCE Use of English Part 2.'
    sceneZh: '你将听到一位辅导员帮助学生准备FCE Use of English Part 2。'
    difficulty: 3
    audioFile: 'L456.mp3'
    script:
      - speaker: tutor
        voice: nova
        text: 'Part 2 is the open cloze — you have to write one word in each gap without any options to choose from. This is where collocations and dependent prepositions are really tested.'
      - speaker: student
        voice: shimmer
        text: 'That is the part I find hardest. How do I know which preposition to use?'
      - speaker: tutor
        voice: nova
        text: 'Look at the verb before the gap. If it says "depend," the preposition is always "on." If it says "consist," it is always "of." These are fixed combinations. The more you read, the more naturally you will recognise them. Try reading for fifteen minutes a day and highlighting any verb-preposition combinations you find.'
    questions:
      - id: L456-Q1
        text: 'What does the tutor suggest to improve with dependent prepositions?'
        textZh: '辅导员建议怎样提高介词搭配？'
        options:
          A: 'Memorise a list of 100 prepositions'
          B: 'Read daily and highlight verb-preposition combinations'
          C: 'Only practise with past exam papers'
        answer: 'B'
        explanation: 'The tutor suggests "reading for fifteen minutes a day and highlighting any verb-preposition combinations."'
        explanationZh: '辅导员建议"每天阅读十五分钟，并标出任何动词-介词搭配"。'

  - id: L457
    type: long-conversation
    title: 'The International Food Festival'
    titleZh: '国际美食节'
    scene: 'You will hear students discussing language and food at a school international food festival.'
    sceneZh: '你将听到学生们在学校国际美食节上讨论语言和食物。'
    difficulty: 2
    audioFile: 'L457.mp3'
    script:
      - speaker: student1
        voice: echo
        text: 'Have you noticed how many English food words come from other languages? "Pizza" is Italian, "sushi" is Japanese, "croissant" is French, and "kebab" is Turkish.'
      - speaker: student2
        voice: shimmer
        text: 'And from Chinese, we have "tofu," "dim sum," and "wonton"! My dad says that when food travels to a new country, the word travels with it.'
      - speaker: student1
        voice: echo
        text: 'That makes sense. It is like the food IS the word. You cannot separate them. I wonder how many words English has borrowed from other languages in total.'
      - speaker: student2
        voice: shimmer
        text: 'Apparently, over sixty percent of English words have roots in other languages — mainly French, Latin, and Greek. English is basically a language that borrows from everyone!'
    questions:
      - id: L457-Q1
        text: 'What percentage of English words have roots in other languages?'
        textZh: '英语词汇中有多大比例来源于其他语言？'
        options:
          A: 'About 30%'
          B: 'Over 60%'
          C: 'Nearly 90%'
        answer: 'B'
        explanation: '"Over sixty percent of English words have roots in other languages."'
        explanationZh: '"超过60%的英语词汇来源于其他语言"。'

  - id: L458
    type: long-conversation
    title: 'The Spelling Bee Strategy'
    titleZh: '拼写大赛策略'
    scene: 'You will hear two students preparing for a school spelling bee.'
    sceneZh: '你将听到两个学生为学校拼写大赛做准备。'
    difficulty: 2
    audioFile: 'L458.mp3'
    script:
      - speaker: student1
        voice: shimmer
        text: 'The spelling bee is next week, and I am so nervous. How do you remember the spelling of difficult words like "necessary" and "separate"?'
      - speaker: student2
        voice: echo
        text: 'I use memory tricks. For "necessary," I remember "one collar, two sleeves" — one C, two S''s. For "separate," I remember there is "a rat" in the middle — sep-A-RAT-e.'
      - speaker: student1
        voice: shimmer
        text: 'That is so clever! Any tricks for "because"?'
      - speaker: student2
        voice: echo
        text: 'Yes! "Big Elephants Can Always Understand Small Elephants." The first letter of each word spells B-E-C-A-U-S-E. These silly sentences help because your brain remembers funny things better than boring rules.'
    questions:
      - id: L458-Q1
        text: 'What memory trick does Student 2 use for "necessary"?'
        textZh: '学生2用什么记忆技巧来记"necessary"？'
        options:
          A: '"Never Eat Crisps, Eat Salad Sandwiches And Remain Young"'
          B: '"One collar, two sleeves" — one C, two S''s'
          C: '"Not Every Cat Eats Sausages Safely"'
        answer: 'B'
        explanation: 'The trick is "one collar, two sleeves — one C, two S''s."'
        explanationZh: '技巧是"一个衣领，两个袖子——一个C，两个S"。'

  - id: L459
    type: long-conversation
    title: 'The Story Behind "OK"'
    titleZh: '"OK"背后的故事'
    scene: 'You will hear a teacher telling students the surprising origin of the word "OK".'
    sceneZh: '你将听到一位老师讲述"OK"这个词令人惊讶的起源。'
    difficulty: 3
    audioFile: 'L459.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Here is a fun fact for you. "OK" is probably the most widely understood word in the entire world. But where did it come from? There are many theories, but the most accepted one is that it started as a joke in a Boston newspaper in eighteen thirty-nine.'
      - speaker: student
        voice: shimmer
        text: 'A joke?'
      - speaker: teacher
        voice: nova
        text: 'Yes! In the eighteen thirties, it was fashionable to abbreviate phrases and intentionally misspell them. "OK" stood for "Oll Korrect," a humorous way of writing "All Correct." The abbreviation caught on and spread around the world. It is now used in virtually every language.'
    questions:
      - id: L459-Q1
        text: 'What did "OK" originally stand for?'
        textZh: '"OK"最初代表什么？'
        options:
          A: 'Outstanding Knowledge'
          B: 'Oll Korrect — a humorous misspelling of "All Correct"'
          C: 'Old Kingdom — a reference to ancient Egypt'
        answer: 'B'
        explanation: '"OK stood for Oll Korrect, a humorous way of writing All Correct."'
        explanationZh: '"OK代表Oll Korrect，是All Correct的幽默拼写方式"。'

  - id: L460
    type: long-conversation
    title: 'End of Month Reflection'
    titleZh: '月末反思'
    scene: 'You will hear two students reflecting on what they learned about phrasal verbs and collocations this month.'
    sceneZh: '你将听到两个学生反思这个月学到的短语动词和搭配知识。'
    difficulty: 3
    audioFile: 'L460.mp3'
    script:
      - speaker: student1
        voice: echo
        text: 'I cannot believe how much we have learned this month. At the beginning, I could barely tell the difference between "take up" and "take on." Now I use phrasal verbs in everyday conversation without even thinking about it.'
      - speaker: student2
        voice: shimmer
        text: 'Same here. The collocations were the hardest part for me. I kept saying "do a mistake" and "make homework." But after all the practice, the correct combinations feel natural now.'
      - speaker: student1
        voice: echo
        text: 'And the idioms — I love knowing that "break the ice" comes from ships breaking through frozen waterways. Understanding the story behind the idiom makes it so much easier to remember.'
      - speaker: student2
        voice: shimmer
        text: 'Definitely. I think the biggest lesson this month was that English is not just a set of grammar rules — it is a living language full of colourful expressions, each with its own history and story. That is what makes it so interesting to learn.'
    questions:
      - id: L460-Q1
        text: 'What was Student 2''s biggest challenge this month?'
        textZh: '学生2这个月最大的挑战是什么？'
        options:
          A: 'Learning grammar rules'
          B: 'Getting make/do collocations right'
          C: 'Understanding idiom origins'
