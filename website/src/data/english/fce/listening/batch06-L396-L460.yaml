# FCE Daily Listening Practice — Month 7, Batch 06
# 65 exercises (L396–L460)
# L396–L420: Part 1 short extracts (25 exercises, difficulty 2-3)
# L421–L435: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L436–L450: Part 3 multiple matching (15 exercises, difficulty 2-3) - grouped as 10
# L451–L460: Part 4 long conversation (10 exercises, difficulty 3)
# Theme: Language, Communication, Idioms for 8-9 year old learners

extracts:
  # ============================================================
  # L396–L420: Part 1 — Short Extracts (Language/Communication Theme)
  # ============================================================

  - id: L396
    type: short-extract
    title: 'The Idiom Collector'
    titleZh: '成语收集者'
    scene: 'You will hear a girl talking about her hobby of collecting English idioms.'
    sceneZh: '你将听到一个女孩谈论她收集英语习语的爱好。'
    difficulty: 2
    audioFile: 'L396.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I started collecting idioms last year when my English teacher told us about the phrase "break the ice." I thought it was so cool that words could mean something completely different from what they say! Now I keep a special notebook where I write down every new idiom I find. I have over two hundred so far.'
      - speaker: girl
        voice: shimmer
        text: 'My favourite one is "it is raining cats and dogs" because I love imagining actual cats and dogs falling from the sky. My mum says I should write a book about idioms one day.'
    question:
      text: 'What inspired the girl to start collecting idioms?'
      textZh: '是什么激发了女孩开始收集习语？'
      options:
        A: 'Reading an idiom dictionary she found at home.'
        B: 'Her English teacher explaining the idiom "break the ice."'
        C: 'A book about cats and dogs that she read.'
      answer: 'B'
      explanation: 'She says she started "when my English teacher told us about the phrase break the ice."'
      explanationZh: '她说她开始是因为"英语老师告诉我们break the ice这个短语"。'

  - id: L397
    type: short-extract
    title: 'The Translation App'
    titleZh: '翻译应用'
    scene: 'You will hear a boy describing a funny experience with a translation app.'
    sceneZh: '你将听到一个男孩描述使用翻译应用的有趣经历。'
    difficulty: 2
    audioFile: 'L397.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Last holiday in France, I tried using a translation app on my phone. I wanted to say "I am full" after a big meal, but the app translated it into something about being complete or finished, and the waiter looked very confused. He thought I was saying the restaurant was closing!'
      - speaker: boy
        voice: echo
        text: 'That is when I realised that machines cannot always get idioms and everyday expressions right. My dad says the best translation tool is still a real person who speaks both languages.'
    question:
      text: 'What problem did the boy have with the translation app?'
      textZh: '男孩使用翻译应用时遇到了什么问题？'
      options:
        A: 'The app could not connect to the internet.'
        B: 'The app mistranslated his everyday expression, causing confusion.'
        C: 'The app translated French into the wrong language.'
      answer: 'B'
      explanation: 'The app translated "I am full" incorrectly, confusing the waiter. This shows machine translation struggles with everyday expressions.'
      explanationZh: '应用错误翻译了"I am full"，让服务员困惑。这说明机器翻译在处理日常表达时有困难。'

  - id: L398
    type: short-extract
    title: 'Sign Language at School'
    titleZh: '学校里的手语'
    scene: 'You will hear a teacher explaining why her school teaches sign language.'
    sceneZh: '你将听到一位老师解释为什么她的学校教手语。'
    difficulty: 2
    audioFile: 'L398.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'Three years ago, a deaf student joined our school. At first, the other children did not know how to communicate with her. So we set up a sign language club that meets every Tuesday after school. Now over sixty students have learned the basics, and many of them can have full conversations in sign language.'
      - speaker: teacher
        voice: shimmer
        text: 'The best part is that it has not only helped our deaf student feel included but has also taught all the children that communication does not always require words.'
    question:
      text: 'Why did the school set up a sign language club?'
      textZh: '学校为什么成立了手语俱乐部？'
      options:
        A: 'To prepare students for a sign language exam.'
        B: 'To help children communicate with a deaf student who joined the school.'
        C: 'Because the government required all schools to teach sign language.'
      answer: 'B'
      explanation: 'The club was set up after "a deaf student joined our school" and others "did not know how to communicate with her."'
      explanationZh: '俱乐部是在"一位聋哑学生加入学校"后成立的，因为其他人"不知道如何与她交流"。'

  - id: L399
    type: short-extract
    title: 'The Pen Pal Project'
    titleZh: '笔友计划'
    scene: 'You will hear a student talking about writing to a pen pal in another country.'
    sceneZh: '你将听到一个学生谈论与另一个国家笔友写信的事。'
    difficulty: 2
    audioFile: 'L399.mp3'
    script:
      - speaker: student
        voice: echo
        text: 'My pen pal is from Japan. Her name is Yuki, and we have been writing to each other for two years. At first, I was worried because my English was not very good, and her English was not perfect either. But that is actually what makes it fun — we help each other learn.'
      - speaker: student
        voice: echo
        text: 'Last month she taught me the Japanese word "komorebi," which means the sunlight that filters through tree leaves. I love it! There is no English word for that. I taught her the English expression "once in a blue moon," and she thought it was hilarious.'
    question:
      text: 'What do the pen pals enjoy about their friendship?'
      textZh: '笔友们享受他们友谊的什么？'
      options:
        A: 'They both speak perfect English.'
        B: 'They help each other learn new words and expressions from their languages.'
        C: 'They meet in person every month.'
      answer: 'B'
      explanation: 'The student says "we help each other learn" and they exchange interesting words from their languages.'
      explanationZh: '学生说"我们互相帮助学习"，他们交换彼此语言中有趣的词汇。'

  - id: L400
    type: short-extract
    title: 'The Debate Champion'
    titleZh: '辩论冠军'
    scene: 'You will hear a student talking about winning a school debate competition.'
    sceneZh: '你将听到一个学生谈论赢得学校辩论比赛的事。'
    difficulty: 2
    audioFile: 'L400.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'Before the debate, I was incredibly nervous. My hands were shaking and my mind went completely blank. But then I remembered what my coach always says: take a deep breath, speak your mind, and use facts to support your arguments.'
      - speaker: student
        voice: shimmer
        text: 'I used three linking words in my speech — "furthermore," "nevertheless," and "consequently" — and the judges loved it. They said my argument was well-structured and persuasive. I could not believe it when they announced I had won first place!'
    question:
      text: 'What helped the student win the debate?'
      textZh: '是什么帮助学生赢得了辩论？'
      options:
        A: 'Memorising the entire speech word by word.'
        B: 'Using linking words and supporting arguments with facts.'
        C: 'Speaking louder than the other competitors.'
      answer: 'B'
      explanation: 'The judges said her argument was "well-structured and persuasive" — she used linking words and facts.'
      explanationZh: '评委说她的论点"结构清晰、有说服力"——她使用了连接词和事实。'

  - id: L401
    type: short-extract
    title: 'The Emoji Debate'
    titleZh: '表情符号之争'
    scene: 'You will hear two friends discussing whether emojis are good for communication.'
    sceneZh: '你将听到两个朋友讨论表情符号对交流是否有益。'
    difficulty: 2
    audioFile: 'L401.mp3'
    script:
      - speaker: friend1
        voice: echo
        text: 'I think emojis are great because they add emotion to messages. Without them, texts can seem cold or unfriendly. A simple smiley face can completely change the tone.'
      - speaker: friend2
        voice: shimmer
        text: 'On the other hand, I think emojis are making people lazy with language. Instead of finding the right words to express how they feel, people just send a heart or a thumbs up. We are losing the ability to communicate with actual words.'
    question:
      text: 'What is Friend 2''s main concern about emojis?'
      textZh: '朋友2对表情符号的主要担忧是什么？'
      options:
        A: 'Emojis are too difficult to understand.'
        B: 'Emojis may be replacing real language and making people less expressive with words.'
        C: 'Emojis cost too much money to use.'
      answer: 'B'
      explanation: 'Friend 2 says "emojis are making people lazy with language" and "we are losing the ability to communicate with actual words."'
      explanationZh: '朋友2说"表情符号让人们在语言上变得懒惰"，"我们正在失去用实际词汇交流的能力"。'

  - id: L402
    type: short-extract
    title: 'The Multilingual Family'
    titleZh: '多语言家庭'
    scene: 'You will hear a child describing the languages spoken in her family.'
    sceneZh: '你将听到一个孩子描述她家人说的语言。'
    difficulty: 2
    audioFile: 'L402.mp3'
    script:
      - speaker: child
        voice: shimmer
        text: 'In my family, we speak three languages every day. My mum speaks to me in Mandarin, my dad speaks French, and at school everything is in English. When we have dinner together, we sometimes mix all three languages in one conversation!'
      - speaker: child
        voice: shimmer
        text: 'My grandmother, who only speaks Mandarin, gets confused when I accidentally switch to English or French mid-sentence. But my parents say being multilingual is like having three keys that open different doors around the world.'
    question:
      text: 'How does the child describe the experience of being multilingual?'
      textZh: '孩子如何描述多语言的体验？'
      options:
        A: 'It is confusing and difficult.'
        B: 'It is like having three keys that open different doors around the world.'
        C: 'It only helps with school exams.'
      answer: 'B'
      explanation: 'The parents say "being multilingual is like having three keys that open different doors around the world."'
      explanationZh: '父母说"会多种语言就像拥有三把钥匙，能打开世界各地不同的门"。'

  - id: L403
    type: short-extract
    title: 'The Tongue Twister Contest'
    titleZh: '绕口令比赛'
    scene: 'You will hear a radio presenter describing a tongue twister competition.'
    sceneZh: '你将听到一位广播主持人描述一场绕口令比赛。'
    difficulty: 2
    audioFile: 'L403.mp3'
    script:
      - speaker: presenter
        voice: nova
        text: 'Welcome back, listeners! Yesterday we held our annual tongue twister challenge at the community centre. Over forty children took part, and the competition was fierce. Each contestant had to say three tongue twisters as fast as they could without making a mistake.'
      - speaker: presenter
        voice: nova
        text: 'The winner was nine-year-old Mia, who managed to say "She sells seashells by the seashore" five times in just twelve seconds. When I asked for her secret, she said she practises tongue twisters every morning in the shower!'
    question:
      text: 'How did Mia prepare for the tongue twister contest?'
      textZh: 'Mia是如何为绕口令比赛做准备的？'
      options:
        A: 'She read tongue twisters from a book every night.'
        B: 'She practised tongue twisters every morning in the shower.'
        C: 'Her teacher gave her special lessons after school.'
      answer: 'B'
      explanation: 'Mia said "she practises tongue twisters every morning in the shower."'
      explanationZh: 'Mia说"她每天早上在淋浴时练习绕口令"。'

  - id: L404
    type: short-extract
    title: 'The Word Detective'
    titleZh: '文字侦探'
    scene: 'You will hear a librarian talking about a word origins workshop for children.'
    sceneZh: '你将听到一位图书管理员谈论为儿童举办的词源研讨会。'
    difficulty: 2
    audioFile: 'L404.mp3'
    script:
      - speaker: librarian
        voice: shimmer
        text: 'Every Saturday morning, we run a "Word Detective" workshop at the library. Children come in and we investigate where English words originally came from. Last week, we discovered that "robot" comes from a Czech word meaning forced labour, and "ketchup" probably comes from a Chinese word for fermented fish sauce.'
      - speaker: librarian
        voice: shimmer
        text: 'The children are always amazed when they find out how many English words have been borrowed from other languages. It makes them realise that English is not just one language — it is a mixture of hundreds.'
    question:
      text: 'What do children learn at the Word Detective workshop?'
      textZh: '孩子们在文字侦探研讨会上学到了什么？'
      options:
        A: 'How to write stories using new words.'
        B: 'Where English words originally came from and how they were borrowed from other languages.'
        C: 'How to use a dictionary correctly.'
      answer: 'B'
      explanation: 'The librarian says they "investigate where English words originally came from" and discover words "borrowed from other languages."'
      explanationZh: '图书管理员说他们"调查英语单词最初来自哪里"，并发现"从其他语言借来的"词。'

  - id: L405
    type: short-extract
    title: 'The Lost Meaning'
    titleZh: '丢失的意思'
    scene: 'You will hear a language teacher explaining how word meanings change over time.'
    sceneZh: '你将听到一位语言老师解释词义如何随时间变化。'
    difficulty: 3
    audioFile: 'L405.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Did you know that the word "nice" used to mean "foolish" or "silly"? In the fourteenth century, calling someone nice was actually an insult! Over hundreds of years, the meaning gradually shifted to "pleasant" and then to its modern meaning of "kind" or "good."'
      - speaker: teacher
        voice: nova
        text: 'Similarly, the word "awful" used to mean "full of awe" — something wonderful and impressive. Now it means terrible! These changes remind us that language is always evolving, and the words we use today might mean something completely different a few hundred years from now.'
    question:
      text: 'What is the main point the teacher is making?'
      textZh: '老师的主要观点是什么？'
      options:
        A: 'English has too many confusing words.'
        B: 'Word meanings change over time, and language is always evolving.'
        C: 'Old English is easier to understand than Modern English.'
      answer: 'B'
      explanation: 'The teacher shows how "nice" and "awful" changed meaning, concluding "language is always evolving."'
      explanationZh: '老师展示了"nice"和"awful"如何改变含义，总结说"语言一直在演变"。'

  - id: L406
    type: short-extract
    title: 'The Collocation Game'
    titleZh: '搭配游戏'
    scene: 'You will hear a student describing a vocabulary game her class plays.'
    sceneZh: '你将听到一个学生描述她班上玩的词汇游戏。'
    difficulty: 2
    audioFile: 'L406.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'Our English teacher invented this amazing game called "Collocation Match." She gives us a verb like "make" or "do," and we have thirty seconds to write down as many correct collocations as possible. Like, for "make," you can write make a decision, make friends, make progress, and make a mistake.'
      - speaker: student
        voice: shimmer
        text: 'The tricky part is avoiding wrong combinations. Last week, three students wrote "do a decision" instead of "make a decision," and they lost points! Now I never confuse make and do — the game really works.'
    question:
      text: 'What is the purpose of the Collocation Match game?'
      textZh: '搭配匹配游戏的目的是什么？'
      options:
        A: 'To help students learn correct word combinations in a fun way.'
        B: 'To test students on grammar rules.'
        C: 'To improve students'' handwriting speed.'
      answer: 'A'
      explanation: 'The game helps students learn which words go together (collocations) — the student says "the game really works" for avoiding wrong combinations.'
      explanationZh: '游戏帮助学生学习哪些词搭配在一起——学生说"游戏真的有用"来避免错误搭配。'

  - id: L407
    type: short-extract
    title: 'The Phrasal Verb Song'
    titleZh: '短语动词之歌'
    scene: 'You will hear a music teacher who writes songs to help students learn phrasal verbs.'
    sceneZh: '你将听到一位音乐老师，她写歌来帮助学生学习短语动词。'
    difficulty: 2
    audioFile: 'L407.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'I noticed that my students struggled with phrasal verbs — they could never remember whether to say "give up" or "give in" or "give away." So I started writing little songs about them. The chorus of one song goes: "Take off your coat, take up a hobby, take on a challenge, take over the lobby!"'
      - speaker: teacher
        voice: shimmer
        text: 'The students love it because the melody helps them remember which particles go with which verbs. Music activates different parts of the brain than reading does, so the phrasal verbs really stick.'
    question:
      text: 'Why does the teacher use songs to teach phrasal verbs?'
      textZh: '老师为什么用歌曲来教短语动词？'
      options:
        A: 'Because the school requires all lessons to include music.'
        B: 'Because melodies help students remember which particles go with which verbs.'
        C: 'Because students do not like reading textbooks.'
      answer: 'B'
      explanation: 'The teacher says "the melody helps them remember which particles go with which verbs" and "music activates different parts of the brain."'
      explanationZh: '老师说"旋律帮助他们记住哪个小品词和哪个动词搭配"，"音乐激活大脑的不同部分"。'

  - id: L408
    type: short-extract
    title: 'The Body Language Expert'
    titleZh: '身体语言专家'
    scene: 'You will hear a psychologist talking about reading body language.'
    sceneZh: '你将听到一位心理学家谈论解读身体语言。'
    difficulty: 2
    audioFile: 'L408.mp3'
    script:
      - speaker: psychologist
        voice: nova
        text: 'Many people think they can tell when someone is lying by watching their body language. They look for signs like avoiding eye contact or touching the nose. However, research shows that most people are actually terrible at detecting lies — we are correct only about fifty-four percent of the time, which is barely better than flipping a coin.'
      - speaker: psychologist
        voice: nova
        text: 'The truth is that body language is complicated. Crossing your arms might mean you are defensive, or it might simply mean you are cold. Context matters more than any single gesture.'
    question:
      text: 'What does the psychologist say about detecting lies through body language?'
      textZh: '心理学家对通过身体语言识别谎言怎么说？'
      options:
        A: 'Most people are very good at it.'
        B: 'Most people are barely better than guessing randomly.'
        C: 'It is impossible to detect any lies through body language.'
      answer: 'B'
      explanation: 'The psychologist says we are "correct only about fifty-four percent of the time, which is barely better than flipping a coin."'
      explanationZh: '心理学家说我们"只有大约54%的准确率，比抛硬币好不了多少"。'

  - id: L409
    type: short-extract
    title: 'The Dictionary Race'
    titleZh: '字典竞赛'
    scene: 'You will hear a student describing a dictionary speed-lookup competition.'
    sceneZh: '你将听到一个学生描述字典快速查找比赛。'
    difficulty: 2
    audioFile: 'L409.mp3'
    script:
      - speaker: student
        voice: echo
        text: 'We had a dictionary race in class yesterday. The teacher called out a word, and we had to look it up in a paper dictionary as fast as possible. No phones allowed! The first person to find the correct definition and read it aloud won a point.'
      - speaker: student
        voice: echo
        text: 'I came in third place. The winner was this girl who somehow knows the alphabet backwards — she can find any word in less than ten seconds. The teacher said that even though we have digital dictionaries now, knowing how to use a paper dictionary is a valuable skill.'
    question:
      text: 'What was special about the winner of the dictionary race?'
      textZh: '字典竞赛的冠军有什么特别之处？'
      options:
        A: 'She had the newest dictionary.'
        B: 'She knew the alphabet so well she could find words in less than ten seconds.'
        C: 'She used a digital dictionary secretly.'
      answer: 'B'
      explanation: 'The winner "knows the alphabet backwards" and "can find any word in less than ten seconds."'
      explanationZh: '冠军"对字母表倒背如流"，"能在不到十秒内找到任何词"。'

  - id: L410
    type: short-extract
    title: 'The Polite Request'
    titleZh: '礼貌的请求'
    scene: 'You will hear a conversation about different ways to ask for things in English.'
    sceneZh: '你将听到一段关于英语中不同请求方式的对话。'
    difficulty: 2
    audioFile: 'L410.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today we are going to talk about how to make polite requests in English. There are many ways to ask someone to do something, and the words you choose can make a big difference. Let me show you. Saying "Give me the pen" sounds like a command. But saying "Could you pass me the pen, please?" sounds friendly and respectful.'
      - speaker: teacher
        voice: nova
        text: 'For the FCE Speaking exam, using polite language is very important. Phrases like "Would you mind..." and "I was wondering if..." show the examiner that you can communicate naturally in social situations.'
    question:
      text: 'Why is polite language important in the FCE exam?'
      textZh: '为什么礼貌用语在FCE考试中很重要？'
      options:
        A: 'It is the only thing the examiner marks.'
        B: 'It shows the examiner you can communicate naturally in social situations.'
        C: 'The examiner deducts points for every impolite word.'
      answer: 'B'
      explanation: 'Polite phrases "show the examiner that you can communicate naturally in social situations."'
      explanationZh: '礼貌用语"向考官展示你能在社交场合自然交流"。'

  - id: L411
    type: short-extract
    title: 'The Language Exchange'
    titleZh: '语言交换'
    scene: 'You will hear a student describing a language exchange event at her school.'
    sceneZh: '你将听到一个学生描述学校的语言交换活动。'
    difficulty: 2
    audioFile: 'L411.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'Last Friday, our school held a language exchange event. Students who speak languages other than English taught their classmates useful phrases. I taught everyone how to count to ten in Korean, and my friend from Brazil taught us how to order food in Portuguese.'
      - speaker: student
        voice: shimmer
        text: 'What surprised me most was how many different languages are spoken at our school — fourteen in total! The event really brought everyone together and made us appreciate how diverse our school community is.'
    question:
      text: 'What was the main outcome of the language exchange event?'
      textZh: '语言交换活动的主要成果是什么？'
      options:
        A: 'Students learned to speak fourteen languages fluently.'
        B: 'It brought students together and helped them appreciate their school''s diversity.'
        C: 'The school decided to cancel English lessons.'
      answer: 'B'
      explanation: 'The event "brought everyone together and made us appreciate how diverse our school community is."'
      explanationZh: '活动"把大家聚在一起，让我们意识到学校社区是多么多元化"。'

  - id: L412
    type: short-extract
    title: 'The Phrase Book Disaster'
    titleZh: '会话手册的灾难'
    scene: 'You will hear a woman telling a funny story about using a phrasebook on holiday.'
    sceneZh: '你将听到一位女士讲述度假时使用会话手册的趣事。'
    difficulty: 2
    audioFile: 'L412.mp3'
    script:
      - speaker: woman
        voice: shimmer
        text: 'When I visited Spain, I bought a phrasebook at the airport. I wanted to order chicken for dinner, so I looked up the word and confidently said it to the waiter. The waiter stared at me and then burst out laughing. It turned out that I had accidentally used the wrong word — I had asked for a live chicken instead of a cooked one!'
      - speaker: woman
        voice: shimmer
        text: 'That experience taught me that pronunciation matters just as much as vocabulary. One small mistake can completely change the meaning.'
    question:
      text: 'What lesson did the woman learn from her experience?'
      textZh: '这位女士从经历中学到了什么教训？'
      options:
        A: 'Never eat chicken in Spain.'
        B: 'Pronunciation is as important as vocabulary — small mistakes can change meaning.'
        C: 'Phrasebooks are always wrong.'
      answer: 'B'
      explanation: 'She learned that "pronunciation matters just as much as vocabulary" and "one small mistake can completely change the meaning."'
      explanationZh: '她学到"发音和词汇一样重要"，"一个小错误就能完全改变意思"。'

  - id: L413
    type: short-extract
    title: 'The Storytelling Competition'
    titleZh: '讲故事比赛'
    scene: 'You will hear a boy talking about participating in a storytelling competition.'
    sceneZh: '你将听到一个男孩谈论参加讲故事比赛。'
    difficulty: 2
    audioFile: 'L413.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I entered the school storytelling competition last month. I was really nervous because I had to tell a story in front of three hundred people. My story was about a jungle explorer who discovered that animals could communicate using sounds and gestures — like a secret language.'
      - speaker: boy
        voice: echo
        text: 'What helped me the most was using linking words to connect my ideas. I said things like "all of a sudden," "as a result," and "in the end." The judges said my story flowed really well. I did not win first place, but I came second, and I was over the moon!'
    question:
      text: 'What technique helped the boy''s storytelling?'
      textZh: '什么技巧帮助了男孩讲故事？'
      options:
        A: 'Speaking very quickly to save time.'
        B: 'Using linking words to connect his ideas smoothly.'
        C: 'Memorising the story word for word from a book.'
      answer: 'B'
      explanation: 'He says "using linking words to connect my ideas" helped — the judges said "my story flowed really well."'
      explanationZh: '他说"使用连接词来衔接想法"有帮助——评委说"我的故事流畅性很好"。'

  - id: L414
    type: short-extract
    title: 'The Code Talkers'
    titleZh: '密码通信员'
    scene: 'You will hear a history teacher telling students about the Navajo Code Talkers.'
    sceneZh: '你将听到一位历史老师向学生讲述纳瓦霍密码通信员的故事。'
    difficulty: 3
    audioFile: 'L414.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'During World War Two, the American military had a brilliant idea for sending secret messages. They recruited members of the Navajo Nation to use their native language as a military code. The Navajo language was so complex and rare that the enemy could never figure it out.'
      - speaker: teacher
        voice: nova
        text: 'These brave men, known as the Navajo Code Talkers, transmitted messages on the battlefield that were never broken by the enemy. Their language became one of the most effective secret codes in military history. It is a powerful reminder that every language has unique value.'
    question:
      text: 'Why was the Navajo language effective as a military code?'
      textZh: '为什么纳瓦霍语言作为军事密码很有效？'
      options:
        A: 'Because it was similar to the enemy''s language.'
        B: 'Because it was so complex and rare that the enemy could never figure it out.'
        C: 'Because it used special symbols instead of words.'
      answer: 'B'
      explanation: 'The language was "so complex and rare that the enemy could never figure it out."'
      explanationZh: '这种语言"非常复杂和罕见，敌人永远无法破解"。'

  - id: L415
    type: short-extract
    title: 'The Accidental Idiom'
    titleZh: '意外的习语'
    scene: 'You will hear a girl describing how she accidentally used an idiom correctly.'
    sceneZh: '你将听到一个女孩描述她如何意外地正确使用了一个习语。'
    difficulty: 2
    audioFile: 'L415.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Something funny happened in English class last week. The teacher asked us if we knew any English idioms. I said "it is a piece of cake" because I had heard it in a cartoon. I did not really know what it meant — I just thought it was about actual cake!'
      - speaker: girl
        voice: shimmer
        text: 'The teacher explained that it means something very easy. Then she asked me a maths question, and I got it right straight away. She said "See? For you, maths is a piece of cake!" Everyone laughed, and I finally understood how the idiom works in context.'
    question:
      text: 'How did the girl learn the meaning of "a piece of cake"?'
      textZh: '女孩是怎么学会"a piece of cake"的含义的？'
      options:
        A: 'She looked it up in a dictionary at home.'
        B: 'The teacher explained it and then used it in a real situation that the girl experienced.'
        C: 'Her parents taught her at breakfast.'
      answer: 'B'
      explanation: 'The teacher first explained the meaning, then demonstrated it when the girl answered a question easily — learning through context.'
      explanationZh: '老师先解释了含义，然后在女孩轻松回答问题时示范了用法——在语境中学习。'

  - id: L416
    type: short-extract
    title: 'The Communication Styles Quiz'
    titleZh: '交流方式测试'
    scene: 'You will hear a counsellor describing a quiz about communication styles.'
    sceneZh: '你将听到一位辅导员描述一个关于交流方式的测试。'
    difficulty: 2
    audioFile: 'L416.mp3'
    script:
      - speaker: counsellor
        voice: shimmer
        text: 'Today we did a fun quiz in class to find out our communication styles. There are four main types: assertive, passive, aggressive, and passive-aggressive. I found out that I am mostly assertive, which means I speak my mind but also listen to others.'
      - speaker: counsellor
        voice: shimmer
        text: 'The counsellor explained that the healthiest communication style is assertive — you express your feelings clearly without being rude. She said that understanding your style helps you get along better with friends, family, and classmates.'
    question:
      text: 'According to the counsellor, what is the healthiest communication style?'
      textZh: '根据辅导员的说法，最健康的交流方式是什么？'
      options:
        A: 'Passive — staying quiet and avoiding conflict.'
        B: 'Assertive — expressing feelings clearly without being rude.'
        C: 'Aggressive — always making sure your opinion is heard first.'
      answer: 'B'
      explanation: 'The counsellor said "the healthiest communication style is assertive — you express your feelings clearly without being rude."'
      explanationZh: '辅导员说"最健康的交流方式是自信型——你清楚地表达感受但不粗鲁"。'

  - id: L417
    type: short-extract
    title: 'The Word a Day Challenge'
    titleZh: '每日一词挑战'
    scene: 'You will hear a boy describing his vocabulary learning routine.'
    sceneZh: '你将听到一个男孩描述他的词汇学习日常。'
    difficulty: 2
    audioFile: 'L417.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I have been doing a "word a day" challenge for six months now. Every morning, I look up a new English word, write it on a sticky note, and put it on my bedroom wall. My wall is covered with one hundred and eighty sticky notes! Each note has the word, its definition, and an example sentence.'
      - speaker: boy
        voice: echo
        text: 'The best part is that I keep coming across these words in real life. Last week, I read the word "consequently" in a newspaper article, and I already knew what it meant because it was on my wall! My vocabulary has improved significantly since I started.'
    question:
      text: 'How does the boy know his challenge is working?'
      textZh: '男孩怎么知道他的挑战有效？'
      options:
        A: 'His teacher told him his marks had improved.'
        B: 'He keeps encountering his learned words in real reading and already understands them.'
        C: 'He passed a vocabulary test with a perfect score.'
      answer: 'B'
      explanation: 'He says he keeps "coming across these words in real life" and "already knew what it meant."'
      explanationZh: '他说他不断"在现实生活中遇到这些词"并且"已经知道它们的意思"。'

  - id: L418
    type: short-extract
    title: 'The Cross-Cultural Greeting'
    titleZh: '跨文化问候'
    scene: 'You will hear a travel guide explaining different greeting customs around the world.'
    sceneZh: '你将听到一位导游解释世界各地不同的问候习俗。'
    difficulty: 2
    audioFile: 'L418.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'When you travel abroad, one of the first things you need to learn is how people greet each other. In Japan, people bow. In France, friends kiss each other on the cheek — usually twice. In New Zealand, the Maori people press their noses and foreheads together in a greeting called the hongi.'
      - speaker: guide
        voice: nova
        text: 'Getting greetings wrong can lead to embarrassing moments. A handshake that is too firm might seem aggressive in some cultures, while one that is too soft might seem insincere. My advice? Watch what the locals do, and follow their lead.'
    question:
      text: 'What advice does the guide give for greeting people in foreign countries?'
      textZh: '导游给了什么关于在外国问候人的建议？'
      options:
        A: 'Always use a firm handshake no matter where you are.'
        B: 'Watch what the locals do and follow their lead.'
        C: 'Avoid greeting people to prevent mistakes.'
      answer: 'B'
      explanation: 'The guide advises to "watch what the locals do, and follow their lead."'
      explanationZh: '导游建议"观察当地人怎么做，然后跟着做"。'

  - id: L419
    type: short-extract
    title: 'The Writing Workshop'
    titleZh: '写作工作坊'
    scene: 'You will hear a writer giving tips at a children''s writing workshop.'
    sceneZh: '你将听到一位作家在儿童写作工作坊上给出写作建议。'
    difficulty: 3
    audioFile: 'L419.mp3'
    script:
      - speaker: writer
        voice: shimmer
        text: 'The secret to good writing is not using long, complicated words. It is about choosing the right word for each situation. Mark Twain once said, "The difference between the right word and the almost right word is the difference between lightning and a lightning bug." That is such a clever way of putting it.'
      - speaker: writer
        voice: shimmer
        text: 'My tip for you today is: when you write your first draft, do not worry about perfect words. Just get your ideas down. Then, when you revise, look at each sentence and ask: "Is this the best word, or just an okay word?" Replace the okay words with the perfect ones.'
    question:
      text: 'What is the writer''s main tip for young authors?'
      textZh: '作家给年轻作者的主要建议是什么？'
      options:
        A: 'Use the longest words you can find to impress readers.'
        B: 'Write a rough draft first, then revise by choosing the most precise words.'
        C: 'Copy sentences from your favourite books.'
      answer: 'B'
      explanation: 'The writer says "get your ideas down" first, then "replace the okay words with the perfect ones."'
      explanationZh: '作家说先"把想法写下来"，然后"用完美的词替换还行的词"。'

  - id: L420
    type: short-extract
    title: 'The Slang Report'
    titleZh: '俚语报告'
    scene: 'You will hear a student presenting a class project about English slang.'
    sceneZh: '你将听到一个学生展示关于英语俚语的课堂项目。'
    difficulty: 3
    audioFile: 'L420.mp3'
    script:
      - speaker: student
        voice: echo
        text: 'For my English project, I researched how slang words enter the language. I found out that many words we use every day started as slang. The word "cool" meaning "good" or "impressive" was originally just young people''s slang in the 1950s. Now it is in every dictionary.'
      - speaker: student
        voice: echo
        text: 'Not all slang survives, though. Words like "groovy" from the 1960s and "radical" from the 1980s have mostly disappeared from everyday speech. Whether a slang word becomes permanent depends on how widely it is used and for how long. As a result, only the strongest slang words make it into the dictionary.'
    question:
      text: 'What determines whether a slang word becomes permanent?'
      textZh: '什么决定了一个俚语词是否会永久保留？'
      options:
        A: 'Whether famous people use it.'
        B: 'How widely and for how long it is used.'
        C: 'Whether it sounds nice when spoken.'
      answer: 'B'
      explanation: '"Whether a slang word becomes permanent depends on how widely it is used and for how long."'
      explanationZh: '"一个俚语词是否会永久保留取决于它被使用的范围有多广以及持续多长时间"。'

  # ============================================================
  # L421–L435: Part 2 — Sentence Completion (Language Theme)
  # ============================================================

  - id: L421
    type: sentence-completion
    title: 'The History of Emojis'
    titleZh: '表情符号的历史'
    scene: 'You will hear a lecture about the history of emojis. Complete the sentences.'
    sceneZh: '你将听到一段关于表情符号历史的讲座。完成句子。'
    difficulty: 2
    audioFile: 'L421.mp3'
    script:
      - speaker: lecturer
        voice: nova
        text: 'Emojis were first created in Japan in nineteen ninety-nine by an artist named Shigetaka Kurita. He designed one hundred and seventy-six simple pictures for a mobile phone company. The original emojis were only twelve by twelve pixels — incredibly small compared to what we have today. Kurita wanted to create a way for people to express emotions in short text messages, because plain text often caused misunderstandings.'
    question:
      text: 'The original emojis were only _____ pixels in size.'
      textZh: '最初的表情符号只有 _____ 像素大小。'
      answer: 'twelve by twelve'
      explanation: 'The lecture states the original emojis were "twelve by twelve pixels."'
      explanationZh: '讲座说原始表情符号是"十二乘十二像素"。'

  - id: L422
    type: sentence-completion
    title: 'The History of Emojis (cont.)'
    titleZh: '表情符号的历史（续）'
    scene: 'Continue listening to the lecture about emojis.'
    sceneZh: '继续听关于表情符号的讲座。'
    difficulty: 2
    audioFile: 'L422.mp3'
    script:
      - speaker: lecturer
        voice: nova
        text: 'It was not until two thousand and ten that emojis became available on iPhones worldwide. Apple included an emoji keyboard in their software update, and suddenly millions of people could use them. By two thousand and fifteen, the Oxford Dictionary chose the "Face with Tears of Joy" as their Word of the Year — the first time a picture had ever received this award.'
    question:
      text: 'Emojis became available on iPhones worldwide in _____.'
      textZh: '表情符号在 _____ 年在全球iPhone上可用。'
      answer: '2010'
      acceptableAnswers: ['2010', 'two thousand and ten']
      explanation: '"It was not until two thousand and ten that emojis became available on iPhones worldwide."'
      explanationZh: '"直到2010年，表情符号才在全球iPhone上可用"。'

  - id: L423
    type: sentence-completion
    title: 'How Idioms Are Born'
    titleZh: '习语的诞生'
    scene: 'You will hear a talk about how English idioms develop.'
    sceneZh: '你将听到一段关于英语习语如何发展的讲话。'
    difficulty: 2
    audioFile: 'L423.mp3'
    script:
      - speaker: speaker
        voice: shimmer
        text: 'Most English idioms started as literal descriptions of real events. For example, "burning the midnight oil" comes from the days before electric lights, when people who worked late at night literally burned oil lamps. Over time, the phrase stopped being about actual oil and became a way of saying someone is working very late.'
    question:
      text: '"Burning the midnight oil" originally referred to literally burning _____ lamps.'
      textZh: '"Burning the midnight oil"最初字面指的是燃烧_____灯。'
      answer: 'oil'
      explanation: 'The talk explains the phrase comes from "literally burned oil lamps."'
      explanationZh: '讲话解释这个短语来自"字面上燃烧油灯"。'

  - id: L424
    type: sentence-completion
    title: 'How Idioms Are Born (cont.)'
    titleZh: '习语的诞生（续）'
    scene: 'Continue listening to the talk about idiom origins.'
    sceneZh: '继续听关于习语起源的讲话。'
    difficulty: 2
    audioFile: 'L424.mp3'
    script:
      - speaker: speaker
        voice: shimmer
        text: 'Similarly, the idiom "let the cat out of the bag" has its roots in medieval market fraud. Dishonest sellers would put a cat in a bag and sell it as a piglet. If the buyer opened the bag and the cat escaped, the trick was discovered. This is why "letting the cat out of the bag" now means revealing a secret.'
    question:
      text: 'Dishonest sellers put a cat in a bag and pretended it was a _____.'
      textZh: '不诚实的商贩把猫放进袋子里假装它是_____。'
      answer: 'piglet'
      acceptableAnswers: ['piglet', 'pig']
      explanation: 'The talk says sellers "put a cat in a bag and sell it as a piglet."'
      explanationZh: '讲话说商贩"把猫装在袋子里假装是小猪仔来卖"。'

  - id: L425
    type: sentence-completion
    title: 'The World of Collocations'
    titleZh: '搭配的世界'
    scene: 'You will hear a teacher explaining collocations to students.'
    sceneZh: '你将听到一位老师向学生解释搭配。'
    difficulty: 2
    audioFile: 'L425.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Collocations are words that naturally go together. You can say "make a decision" but not "do a decision." You can say "heavy rain" but not "strong rain." These are not grammar rules — they are patterns that native speakers learn through years of hearing and reading English. The best way to learn them is to read widely and notice which words appear together.'
    question:
      text: 'The teacher says the best way to learn collocations is to _____ widely.'
      textZh: '老师说学习搭配最好的方法是广泛_____。'
      answer: 'read'
      explanation: 'The teacher says "the best way to learn them is to read widely."'
      explanationZh: '老师说"学习搭配最好的方法是广泛阅读"。'

  - id: L426
    type: sentence-completion
    title: 'Translation Challenges'
    titleZh: '翻译挑战'
    scene: 'You will hear a translator talking about challenges in her job.'
    sceneZh: '你将听到一位翻译谈论工作中的挑战。'
    difficulty: 3
    audioFile: 'L426.mp3'
    script:
      - speaker: translator
        voice: shimmer
        text: 'The hardest part of my job is translating idioms and cultural references. I once had to translate an English children''s book into Japanese, and the phrase "when pigs fly" appeared in it. In Japanese, there is no equivalent idiom about flying pigs, so I had to find a Japanese expression with the same meaning — "something that will never happen." I chose a Japanese phrase about the sun rising in the west.'
    question:
      text: 'The translator chose a Japanese phrase about the _____ rising in the west.'
      textZh: '翻译选择了一个关于_____从西边升起的日语短语。'
      answer: 'sun'
      explanation: 'She chose "a Japanese phrase about the sun rising in the west" as the equivalent of "when pigs fly."'
      explanationZh: '她选了"一个关于太阳从西边升起的日语短语"来对应"when pigs fly"。'

  - id: L427
    type: sentence-completion
    title: 'The Power of Storytelling'
    titleZh: '讲故事的力量'
    scene: 'You will hear an author talking about why stories matter.'
    sceneZh: '你将听到一位作家谈论为什么故事很重要。'
    difficulty: 2
    audioFile: 'L427.mp3'
    script:
      - speaker: author
        voice: nova
        text: 'Stories are the oldest form of communication. Before writing was invented, people passed knowledge from generation to generation through spoken stories. These stories helped communities remember important events, teach children right from wrong, and explain how the world worked. Even today, the most powerful way to persuade someone is to tell them a story, not just give them facts.'
    question:
      text: 'Before writing was invented, knowledge was passed through _____ stories.'
      textZh: '在文字发明之前，知识通过_____故事传递。'
      answer: 'spoken'
      acceptableAnswers: ['spoken', 'oral']
      explanation: 'People "passed knowledge from generation to generation through spoken stories."'
      explanationZh: '人们"通过口述故事代代传递知识"。'

  - id: L428
    type: sentence-completion
    title: 'Learning Languages Through Music'
    titleZh: '通过音乐学习语言'
    scene: 'You will hear a researcher explaining how music helps language learning.'
    sceneZh: '你将听到一位研究者解释音乐如何帮助语言学习。'
    difficulty: 2
    audioFile: 'L428.mp3'
    script:
      - speaker: researcher
        voice: shimmer
        text: 'Our research shows that listening to songs in a foreign language can significantly improve vocabulary and pronunciation. When you sing along to a song, you practise speaking at a natural speed with natural rhythm. Your brain remembers words better when they are connected to a melody. We found that students who learned vocabulary through songs remembered seventy percent more words after one month compared to students who only studied from textbooks.'
    question:
      text: 'Students who learned through songs remembered _____ percent more words.'
      textZh: '通过歌曲学习的学生多记住了_____%的单词。'
      answer: 'seventy'
      acceptableAnswers: ['seventy', '70']
      explanation: 'Students "remembered seventy percent more words after one month."'
      explanationZh: '学生们"一个月后多记住了70%的单词"。'

  - id: L429
    type: sentence-completion
    title: 'The Endangered Languages Project'
    titleZh: '濒危语言项目'
    scene: 'You will hear about a project to save endangered languages.'
    sceneZh: '你将听到一个拯救濒危语言的项目。'
    difficulty: 3
    audioFile: 'L429.mp3'
    script:
      - speaker: reporter
        voice: nova
        text: 'Linguists estimate that one language dies every two weeks. Of the world''s roughly seven thousand languages, nearly half are considered endangered. The Endangered Languages Project, run by a team at the University of Hawaii, is working to record and preserve as many of these languages as possible before they disappear forever. So far, they have created digital archives for over three thousand languages.'
    question:
      text: 'Linguists estimate that one language dies every _____ weeks.'
      textZh: '语言学家估计每_____周就有一种语言消亡。'
      answer: 'two'
      acceptableAnswers: ['two', '2']
      explanation: '"One language dies every two weeks."'
      explanationZh: '"每两周就有一种语言消亡"。'

  - id: L430
    type: sentence-completion
    title: 'Discourse Markers in Speaking'
    titleZh: '口语中的话语标记'
    scene: 'You will hear an FCE examiner giving advice about using discourse markers.'
    sceneZh: '你将听到一位FCE考官给出关于使用话语标记的建议。'
    difficulty: 2
    audioFile: 'L430.mp3'
    script:
      - speaker: examiner
        voice: nova
        text: 'In the FCE Speaking exam, using discourse markers shows the examiner that you can organise your thoughts effectively. Words like "firstly," "on the other hand," "for instance," and "to sum up" help your listener follow your argument. Many candidates lose marks because they jump from one idea to the next without any connecting language. Just adding two or three discourse markers to your answers can make a noticeable difference to your score.'
    question:
      text: 'The examiner says candidates lose marks because they jump between ideas without _____ language.'
      textZh: '考官说考生因为在想法之间跳转而没有_____语言而失分。'
      answer: 'connecting'
      acceptableAnswers: ['connecting', 'linking']
      explanation: 'Candidates "lose marks because they jump from one idea to the next without any connecting language."'
      explanationZh: '考生"因为在想法之间跳转而没有任何连接语言而失分"。'

  - id: L431
    type: sentence-completion
    title: 'The Language of Advertising'
    titleZh: '广告的语言'
    scene: 'You will hear about persuasive language techniques used in advertising.'
    sceneZh: '你将听到关于广告中使用的说服性语言技巧。'
    difficulty: 3
    audioFile: 'L431.mp3'
    script:
      - speaker: lecturer
        voice: shimmer
        text: 'Advertisers are experts at choosing words that influence our behaviour. They use techniques like "loaded language" — words that carry strong emotional associations. For example, describing food as "homemade" makes it sound warmer and more trustworthy than "factory-produced," even if the quality is the same. Another common technique is the "bandwagon effect" — phrases like "everyone is talking about it" or "the nation''s favourite" make you feel you are missing out if you do not buy the product.'
    question:
      text: 'The "bandwagon effect" makes consumers feel they are _____ out.'
      textZh: '"从众效应"让消费者觉得他们_____了。'
      answer: 'missing'
      explanation: 'The bandwagon effect makes "you feel you are missing out if you do not buy the product."'
      explanationZh: '从众效应让"你觉得如果不买这个产品就错过了"。'

  - id: L432
    type: sentence-completion
    title: 'British vs American English'
    titleZh: '英式英语 vs 美式英语'
    scene: 'You will hear about differences between British and American English.'
    sceneZh: '你将听到关于英式英语和美式英语之间差异的内容。'
    difficulty: 2
    audioFile: 'L432.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'British and American English are mostly the same language, but there are some interesting differences. Americans say "elevator" while the British say "lift." Americans say "cookie" while the British say "biscuit." Spelling is different too — Americans write "color" without a "u," while the British spell it "colour." These differences can sometimes cause confusion, but they are rarely a serious problem.'
    question:
      text: 'Americans spell "colour" without the letter _____.'
      textZh: '美国人拼写"colour"时去掉了字母_____。'
      answer: 'u'
      explanation: '"Americans write color without a u."'
      explanationZh: '"美国人拼写color时没有u"。'

  - id: L433
    type: sentence-completion
    title: 'The First Dictionary'
    titleZh: '第一本词典'
    scene: 'You will hear about the history of the first English dictionary.'
    sceneZh: '你将听到关于第一本英语词典历史的内容。'
    difficulty: 3
    audioFile: 'L433.mp3'
    script:
      - speaker: historian
        voice: shimmer
        text: 'The first major English dictionary was published by Samuel Johnson in seventeen fifty-five. It took him nine years to complete, working with only six assistants. Johnson personally wrote definitions for over forty-two thousand words. Some of his definitions were famously witty — he defined "lexicographer" as "a writer of dictionaries; a harmless drudge." His dictionary remained the standard reference for English for over a hundred and fifty years.'
    question:
      text: 'Samuel Johnson''s dictionary contained over _____ thousand word definitions.'
      textZh: 'Samuel Johnson的词典包含超过_____千个词的定义。'
      answer: 'forty-two'
      acceptableAnswers: ['forty-two', '42']
      explanation: 'Johnson "personally wrote definitions for over forty-two thousand words."'
      explanationZh: 'Johnson"亲自为超过四万两千个词写了定义"。'

  - id: L434
    type: sentence-completion
    title: 'Phrasal Verb Patterns'
    titleZh: '短语动词模式'
    scene: 'You will hear a grammar lesson about phrasal verb particle patterns.'
    sceneZh: '你将听到一堂关于短语动词小品词模式的语法课。'
    difficulty: 2
    audioFile: 'L434.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Understanding the particles in phrasal verbs can help you guess their meaning. The particle "up" often means completing or finishing something — like "eat up," "drink up," "tidy up," and "use up." The particle "out" often means thoroughly or completely — like "find out," "work out," and "figure out." And "off" often means leaving or departing — like "set off," "take off," and "head off."'
    question:
      text: 'The particle "up" in phrasal verbs often means _____ or finishing something.'
      textZh: '短语动词中的小品词"up"通常表示_____或完成某事。'
      answer: 'completing'
      acceptableAnswers: ['completing', 'complete']
      explanation: '"The particle up often means completing or finishing something."'
      explanationZh: '"小品词up通常表示完成某事"。'

  - id: L435
    type: sentence-completion
    title: 'The Evolution of English Spelling'
    titleZh: '英语拼写的演变'
    scene: 'You will hear about why English spelling is so irregular.'
    sceneZh: '你将听到关于为什么英语拼写如此不规则的内容。'
    difficulty: 3
    audioFile: 'L435.mp3'
    script:
      - speaker: linguist
        voice: shimmer
        text: 'English spelling seems random, but there is a historical reason for it. When the printing press arrived in England in fourteen seventy-six, printers fixed the spelling of many words. However, pronunciation continued to change for the next three hundred years. This means that many English spellings reflect how words were pronounced in the fifteenth century, not how they sound today. The word "knight," for example, was originally pronounced with the "k" and "gh" sounds.'
    question:
      text: 'The printing press arrived in England in _____.'
      textZh: '印刷术在_____年传入英国。'
      answer: '1476'
      acceptableAnswers: ['1476', 'fourteen seventy-six']
      explanation: '"The printing press arrived in England in fourteen seventy-six."'
      explanationZh: '"印刷术在1476年传入英国"。'

