  - id: L511
    type: long-conversation
    title: 'Planning an Ideal Neighbourhood'
    titleZh: '规划理想社区'
    scene: 'You will hear two students discussing their school project about designing an ideal neighbourhood.'
    sceneZh: '你将听到两位学生讨论他们关于设计理想社区的学校项目。'
    difficulty: 3
    audioFile: 'L511.mp3'
    script:
      - speaker: Maya
        voice: shimmer
        text: 'OK, so for our geography project we need to design an ideal neighbourhood. Where should we start?'
      - speaker: Leo
        voice: alloy
        text: 'I think we should start with the basics — where people live, where they shop, and where they relax. Every neighbourhood needs homes, shops, and a park.'
      - speaker: Maya
        voice: shimmer
        text: 'Agreed. But I think the most important thing is walkability. Everything should be within a fifteen-minute walk. That way, people do not need cars for everyday errands.'
      - speaker: Leo
        voice: alloy
        text: 'Good point. And what about schools? Our neighbourhood should have a school right in the centre so children can walk safely.'
      - speaker: Maya
        voice: shimmer
        text: 'Yes! And the streets should be designed for pedestrians first, not cars. Wide pavements, lots of trees, and maybe a few streets that are completely car-free.'
      - speaker: Leo
        voice: alloy
        text: 'I was thinking about green spaces too. Not just one big park, but small gardens scattered throughout the neighbourhood. Research shows that even tiny pockets of nature reduce stress.'
      - speaker: Maya
        voice: shimmer
        text: 'That is brilliant. And we should include a community centre where neighbours can meet, attend classes, and have events. Strong communities need gathering places.'
      - speaker: Leo
        voice: alloy
        text: 'Absolutely. Let us also add bicycle lanes and a bus stop connecting to the rest of the city. Our neighbourhood should be self-contained but still connected to the bigger picture.'
    question:
      text: 'What do Maya and Leo agree is the most important feature of their ideal neighbourhood?'
      textZh: 'Maya 和 Leo 一致认为理想社区最重要的特征是什么？'
      options:
        A: 'Having the tallest buildings in the city'
        B: 'Walkability — everything within a 15-minute walk'
        C: 'Having the cheapest housing available'
        D: 'Being located near the airport'
      answer: 'B'
      explanation: 'Maya says the most important thing is walkability, and Leo agrees ("Good point").'
      explanationZh: 'Maya说最重要的是步行性，Leo同意（"Good point"）。'

  - id: L512
    type: long-conversation
    title: 'Planning an Ideal Neighbourhood (continued)'
    titleZh: '规划理想社区（续）'
