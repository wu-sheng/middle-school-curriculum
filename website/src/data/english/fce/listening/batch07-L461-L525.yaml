    audioFile: 'L523.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'I use Minecraft Education Edition to teach my students about ancient civilizations. Last month, my class rebuilt a Roman forum complete with a temple, a marketplace, and a public bath. The students had to research what real Roman buildings looked like before they could start building.'
      - speaker: teacher
        voice: shimmer
        text: 'The results were amazing. Students who normally find history boring were completely engaged. One boy told me he had spent the entire weekend researching Roman architecture on his own, just because he wanted to make his virtual temple look authentic.'
    question:
      text: 'What did the teacher''s class build in Minecraft?'
      textZh: '老师的班级在我的世界中建造了什么？'
      options:
        A: 'A modern shopping centre'
        B: 'A Roman forum with temple, marketplace, and bath'
        C: 'A medieval castle'
        D: 'A space station'
      answer: 'B'
      explanation: 'The class rebuilt a Roman forum complete with a temple, marketplace, and public bath.'
      explanationZh: '班级重建了一个完整的罗马广场，包括神庙、市场和公共浴场。'

  - id: L524
    type: long-conversation
    title: 'Traffic Solutions'
    titleZh: '交通解决方案'
    scene: 'Two city planners debate the best way to reduce traffic in the city centre.'
    sceneZh: '两位城市规划师辩论减少市中心交通的最佳方式。'
    difficulty: 3
    audioFile: 'L524.mp3'
    script:
      - speaker: Planner 1
        voice: echo
        text: 'I think we should charge drivers a fee to enter the city centre during peak hours. London''s congestion charge reduced traffic by 30% in the first year.'
      - speaker: Planner 2
        voice: nova
        text: 'That is one approach, but I worry it is unfair to people who cannot afford public transport or who live far from bus routes. I think a better solution is to improve public transport first, then introduce driving restrictions.'
      - speaker: Planner 1
        voice: echo
        text: 'Fair point. We could use the money from the congestion charge to fund better buses and trains. That way, we are solving both problems at once.'
    question:
      text: 'What was the effect of London''s congestion charge?'
      textZh: '伦敦拥堵收费的效果是什么？'
      options:
        A: 'Traffic increased by 30%'
        B: 'Traffic was reduced by 30% in the first year'
        C: 'All cars were banned from the centre'
        D: 'Bus services were cancelled'
      answer: 'B'
      explanation: 'London''s congestion charge reduced traffic by 30% in the first year.'
      explanationZh: '伦敦的拥堵收费在第一年减少了30%的交通量。'

  - id: L525
    type: long-conversation
    title: 'What I Learned from Building'
    titleZh: '我从建造中学到了什么'
    scene: 'A student reflects on what she learned from a school building project.'
    sceneZh: '一位学生反思她从学校建造项目中学到了什么。'
    difficulty: 2
    audioFile: 'L525.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'At first, I thought our school project to design a neighbourhood was just about drawing nice pictures. But I quickly learned that building is about solving problems. Every decision has consequences — if you put the school too far from homes, children have to walk too far. If you put a factory next to a park, nobody wants to use the park.'
      - speaker: student
        voice: shimmer
        text: 'The most important thing I learned is that a good city is built for people, not for buildings. When the architect thinks about how people will actually live, work, and play, the design naturally becomes better. That is the secret of great architecture — it starts with understanding people.'
    question:
      text: 'What does the student say is the secret of great architecture?'
      textZh: '学生说伟大建筑的秘密是什么？'
      options:
        A: 'Using the most expensive materials'
        B: 'Making buildings as tall as possible'
        C: 'Starting with understanding people and how they live'
        D: 'Copying designs from other countries'
      answer: 'C'
      explanation: 'She says the secret of great architecture is that "it starts with understanding people."'
      explanationZh: '她说伟大建筑的秘密是"从理解人开始"。'
