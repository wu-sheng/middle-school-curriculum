    question:
      text: 'The Supertrees are structures up to _____ metres tall covered in real plants.'
      textZh: '超级树是高达 _____ 米的结构，覆盖着真正的植物。'
      answer: '50'
      explanation: 'The Supertrees are enormous structures up to 50 metres tall.'
      explanationZh: '超级树是高达50米的巨大结构。'

  - id: L492
    type: sentence-completion
    title: 'The Colosseum'
    titleZh: '罗马斗兽场'
    scene: 'You will hear a guide talking about the Colosseum in Rome.'
    sceneZh: '你将听到一位导游谈论罗马的斗兽场。'
    difficulty: 2
    audioFile: 'L492.mp3'
    script:
      - speaker: guide
        voice: echo
        text: 'The Colosseum could hold approximately 50,000 spectators — similar to a modern football stadium. What is truly impressive is the speed at which people could enter and exit. The Romans designed 80 numbered archways, and using a system similar to modern stadium seating, all 50,000 people could be seated within fifteen minutes.'
    question:
      text: 'The Colosseum had 80 numbered archways that allowed all _____ spectators to be seated within 15 minutes.'
      textZh: '斗兽场有80个编号拱门，让所有 _____ 名观众在15分钟内就座。'
      answer: '50,000'
      explanation: 'The Colosseum could hold approximately 50,000 spectators who could be seated within 15 minutes.'
      explanationZh: '斗兽场可容纳约50,000名观众，他们可以在15分钟内就座。'

  - id: L493
    type: sentence-completion
    title: 'Building Communities'
    titleZh: '建设社区'
    scene: 'You will hear a social worker talking about what makes a strong community.'
    sceneZh: '你将听到一位社会工作者谈论什么构成强大的社区。'
    difficulty: 2
    audioFile: 'L493.mp3'
    script:
      - speaker: worker
        voice: nova
        text: 'Donald Appleyard, a famous urban researcher, discovered something fascinating in the 1960s. He studied three streets that were identical except for the amount of traffic. On the quiet street, residents had an average of three close friends among their neighbours. On the busy street, that number dropped to just 0.9. More traffic literally means fewer friendships.'
    question:
      text: 'On quiet streets, residents had an average of _____ close friends among their neighbours.'
      textZh: '在安静的街道上，居民在邻居中平均有 _____ 个亲密朋友。'
      answer: 'three'
      explanation: 'On the quiet street, residents had an average of three close friends among neighbours.'
      explanationZh: '在安静的街道上，居民在邻居中平均有三个亲密朋友。'

  - id: L494
    type: sentence-completion
    title: 'Petra: The Rose-Red City'
    titleZh: '佩特拉：玫瑰红城市'
    scene: 'You will hear a traveller describing the ancient city of Petra.'
    sceneZh: '你将听到一位旅行者描述古城佩特拉。'
    difficulty: 3
    audioFile: 'L494.mp3'
    script:
      - speaker: traveller
        voice: shimmer
        text: 'Walking through the narrow canyon called the Siq and seeing the Treasury of Petra for the first time was the most breathtaking moment of my life. The building is carved directly into the sandstone cliff face. It stands about 40 metres tall and is decorated with columns, statues, and intricate carvings — all cut from the living rock by the Nabataean people over 2,000 years ago.'
    question:
      text: 'The Treasury of Petra stands about _____ metres tall and is carved directly into sandstone.'
      textZh: '佩特拉宝库约 _____ 米高，直接在砂岩中雕刻而成。'
      answer: '40'
      explanation: 'The Treasury stands about 40 metres tall and is carved into the sandstone cliff face.'
      explanationZh: '宝库约40米高，雕刻在砂岩悬崖面上。'

  - id: L495
    type: sentence-completion
    title: 'The Power of Trees'
    titleZh: '树木的力量'
    scene: 'You will hear a scientist explaining how trees help cities.'
    sceneZh: '你将听到一位科学家解释树木如何帮助城市。'
    difficulty: 2
    audioFile: 'L495.mp3'
    script:
      - speaker: scientist
        voice: echo
        text: 'A single mature tree can absorb up to 22 kilograms of carbon dioxide per year and release enough oxygen for two people to breathe. It can also lower the surrounding temperature by 2 to 8 degrees Celsius through a process called evapotranspiration. That is why tree-lined streets are noticeably cooler than concrete roads on hot summer days.'
    question:
      text: 'A single mature tree can absorb up to _____ kilograms of carbon dioxide per year.'
      textZh: '一棵成熟的树每年可以吸收高达 _____ 公斤的二氧化碳。'
      answer: '22'
      explanation: 'A single mature tree can absorb up to 22 kilograms of carbon dioxide per year.'
      explanationZh: '一棵成熟的树每年可以吸收高达22公斤的二氧化碳。'

  # ============================================================
  # L496–L510: Part 3 — Multiple Matching (World Building Theme)
  # ============================================================

  - id: L496
    type: multiple-matching
    title: 'Five Speakers Talk About Their Favourite Building'
    titleZh: '五位讲述者谈论他们最喜欢的建筑'
    scene: 'You will hear five people talking about a building they admire. Match each speaker to the reason they admire the building.'
    sceneZh: '你将听到五个人谈论他们欣赏的建筑。将每位讲述者与他们欣赏建筑的原因配对。'
    difficulty: 2
    audioFile: 'L496.mp3'
    script:
      - speaker: Speaker 1
        voice: shimmer
        text: 'I love the Sydney Opera House because of its shape. It looks like white sails on the harbour. The architect, Jorn Utzon, was inspired by orange segments. It took 16 years to build, but the result is absolutely stunning.'
      - speaker: Speaker 2
        voice: echo
        text: 'For me, it is the Colosseum in Rome. I am amazed that something built 2,000 years ago can still stand. The engineering is incredible — 80 archways, a clever drainage system, and it held 50,000 people!'
      - speaker: Speaker 3
        voice: nova
        text: 'I admire the Bosco Verticale in Milan — two towers covered in 900 trees and thousands of plants. It is a building that actually cleans the air around it. I think all buildings in the future should have trees growing on them.'
      - speaker: Speaker 4
        voice: alloy
        text: 'The Forbidden City is my favourite because of its symbolism. Every colour, every number, every direction has meaning. Red for luck, yellow for the emperor, nine for fortune. It is not just a building — it is a story told in architecture.'
      - speaker: Speaker 5
        voice: shimmer
        text: 'I love the library in my town. It is small and simple, but it is where I learned to read, where I did my homework after school, and where I met my best friend. Sometimes the most important buildings are the everyday ones.'
    question:
      text: 'Match each speaker to the reason they admire their building:'
      textZh: '将每位讲述者与欣赏原因配对：'
      options:
        A: 'Its unique and beautiful shape'
        B: 'The incredible ancient engineering'
        C: 'Its environmental design with trees'
        D: 'Its symbolic meaning in every detail'
        E: 'Its personal significance and memories'
        F: 'Its enormous size'
        G: 'Its modern technology'
        H: 'Its low cost to build'
      answer: 'Speaker 1-A, Speaker 2-B, Speaker 3-C, Speaker 4-D, Speaker 5-E'
      explanation: 'Speaker 1 loves the shape (sails). Speaker 2 admires the ancient engineering. Speaker 3 loves the trees/environment. Speaker 4 values the symbolism. Speaker 5 values personal memories.'
      explanationZh: '讲述者1喜欢形状（帆）。讲述者2欣赏古代工程。讲述者3喜欢树木/环保。讲述者4重视象征意义。讲述者5重视个人记忆。'

  - id: L497
    type: multiple-matching
    title: 'Five Speakers Discuss City Improvements'
    titleZh: '五位讲述者讨论城市改善'
    scene: 'You will hear five people suggesting improvements for their city. Match each speaker to the improvement they suggest.'
    sceneZh: '你将听到五个人为城市提出改善建议。将每位讲述者与建议配对。'
    difficulty: 2
    audioFile: 'L497.mp3'
    script:
      - speaker: Speaker 1
        voice: echo
        text: 'We desperately need more bicycle lanes. I would love to cycle to work, but the roads are too dangerous. Copenhagen has shown that when you build safe cycling paths, people use them.'
      - speaker: Speaker 2
        voice: shimmer
        text: 'My neighbourhood has no park within walking distance. Children play in the car park, which is dangerous. We need a green space where kids can run and play safely.'
      - speaker: Speaker 3
        voice: alloy
        text: 'The buses only come once an hour in the evening. If the service were more frequent, fewer people would need to drive, and traffic would improve.'
      - speaker: Speaker 4
        voice: nova
        text: 'The old market building is beautiful but falling apart. Instead of demolishing it, the council should renovate it and turn it into a community centre with a library and cafe.'
      - speaker: Speaker 5
        voice: shimmer
        text: 'I think every new building should be required to have solar panels on the roof. It would help the environment and reduce energy costs for everyone.'
    question:
      text: 'Match each speaker to their suggested improvement:'
      textZh: '将每位讲述者与建议配对：'
      options:
        A: 'Build more bicycle lanes'
        B: 'Create a park for children'
        C: 'Improve bus frequency'
        D: 'Renovate old buildings instead of demolishing them'
        E: 'Require solar panels on new buildings'
        F: 'Build more car parks'
