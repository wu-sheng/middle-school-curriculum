# FCE Daily Listening Practice — Month 8, Batch 07
# 65 exercises (L461–L525)
# L461–L480: Part 1 short extracts (20 exercises, difficulty 2-3)
# L481–L495: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L496–L510: Part 3 multiple matching (15 exercises, difficulty 2-3)
# L511–L525: Part 4 long conversation (15 exercises, difficulty 3)
# Theme: World Building / Architecture / City Planning for 8-9 year old learners

extracts:
  # ============================================================
  # L461–L480: Part 1 — Short Extracts (World Building Theme)
  # ============================================================

  - id: L461
    type: short-extract
    title: 'The Young Architect'
    titleZh: '年轻的建筑师'
    scene: 'You will hear a girl talking about her dream of becoming an architect.'
    sceneZh: '你将听到一个女孩谈论她成为建筑师的梦想。'
    difficulty: 2
    audioFile: 'L461.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Ever since I was five years old, I have loved building things. I started with LEGO blocks, then moved on to cardboard models, and now I design buildings in Minecraft. My favourite thing to build is bridges — I love figuring out how to make them strong enough to hold heavy loads.'
      - speaker: girl
        voice: shimmer
        text: 'My parents bought me a book about famous architects, and I was amazed by Zaha Hadid, who designed buildings that look like they are from the future. One day, I want to design a building that helps people and makes them smile every time they walk past it.'
    question:
      text: 'What inspired the girl to become interested in architecture?'
      textZh: '是什么启发了女孩对建筑产生兴趣？'
      options:
        A: 'A visit to a famous building'
        B: 'Building with LEGO blocks from a young age'
        C: 'A school project about bridges'
      answer: 'B'
      explanation: 'She says "Ever since I was five years old, I have loved building things. I started with LEGO blocks."'
      explanationZh: '她说"从我五岁起，我就喜欢建造东西。我从乐高积木开始。"'

  - id: L462
    type: short-extract
    title: 'The City Tour Guide'
    titleZh: '城市导游'
    scene: 'You will hear a tour guide talking about an old part of a city.'
    sceneZh: '你将听到一位导游谈论城市的老城区。'
    difficulty: 2
    audioFile: 'L462.mp3'
    script:
      - speaker: guide
        voice: echo
        text: 'Welcome to the historic quarter! The buildings you see around you are over three hundred years old. Notice how the streets are narrow — they were designed for horses and carts, not cars. That is why this area is now a pedestrian zone. No vehicles are allowed.'
      - speaker: guide
        voice: echo
        text: 'The most interesting building on this street is the old library, which was originally a church. When the congregation moved to a newer building in 1920, the city council decided to convert it into a library rather than demolish it. Today it is one of the most popular libraries in the country.'
    question:
      text: 'What happened to the old church?'
      textZh: '旧教堂发生了什么？'
      options:
        A: 'It was demolished to make room for a new road.'
        B: 'It was converted into a library.'
        C: 'It was moved to a different location.'
      answer: 'B'
      explanation: 'The guide says the city council decided to convert the church into a library rather than demolish it.'
      explanationZh: '导游说市议会决定将教堂改造成图书馆而不是拆除它。'

  - id: L463
    type: short-extract
    title: 'The Minecraft Builder'
    titleZh: '我的世界建造者'
    scene: 'You will hear a boy talking about what he built in Minecraft.'
    sceneZh: '你将听到一个男孩谈论他在我的世界中建造的东西。'
    difficulty: 2
    audioFile: 'L463.mp3'
    script:
      - speaker: boy
        voice: alloy
        text: 'Last weekend, my friend and I spent twelve hours building a whole city in Minecraft. We started with a central square surrounded by shops and restaurants. Then we added a train station with rails going to different parts of the city. The hardest part was building the castle on the hill — we had to use thousands of stone blocks to make the walls look realistic.'
      - speaker: boy
        voice: alloy
        text: 'My favourite part of our city is the underwater aquarium. We built a glass tunnel under the ocean where you can walk and see fish swimming around you. It took ages, but it was totally worth it.'
    question:
      text: 'What was the boy''s favourite part of the city he built?'
      textZh: '男孩最喜欢他建造的城市的哪个部分？'
      options:
        A: 'The castle on the hill'
        B: 'The central square with shops'
        C: 'The underwater aquarium with a glass tunnel'
      answer: 'C'
      explanation: 'He says "My favourite part of our city is the underwater aquarium."'
      explanationZh: '他说"我最喜欢我们城市的部分是水下水族馆。"'

  - id: L464
    type: short-extract
    title: 'The City Planner'
    titleZh: '城市规划师'
    scene: 'You will hear a city planner explaining a new project.'
    sceneZh: '你将听到一位城市规划师解释一个新项目。'
    difficulty: 2
    audioFile: 'L464.mp3'
    script:
      - speaker: planner
        voice: nova
        text: 'We are very excited about the new Green Belt project. The idea is to create a ring of parks and gardens all around the city. Instead of concrete, people will see trees, flowers, and bicycle paths when they reach the edge of town.'
      - speaker: planner
        voice: nova
        text: 'The green belt will also serve as a natural boundary, preventing the city from spreading further into the countryside. We believe this will protect local wildlife, improve air quality, and give families more places to enjoy the outdoors.'
    question:
      text: 'What is the main purpose of the Green Belt project?'
      textZh: '绿化带项目的主要目的是什么？'
      options:
        A: 'To build new houses on the edge of the city'
        B: 'To create parks and prevent the city from spreading into the countryside'
        C: 'To attract more tourists to visit the city'
      answer: 'B'
      explanation: 'The planner says the green belt will create parks and prevent the city from spreading further into the countryside.'
      explanationZh: '规划师说绿化带将创建公园并防止城市进一步向乡村蔓延。'

  - id: L465
    type: short-extract
    title: 'The History Teacher'
    titleZh: '历史老师'
    scene: 'You will hear a teacher talking about ancient Egyptian architecture.'
    sceneZh: '你将听到一位老师谈论古埃及建筑。'
    difficulty: 2
    audioFile: 'L465.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'The Great Pyramid of Giza is truly astonishing. It was built around 2560 BC, making it over 4,500 years old. It contains about 2.3 million stone blocks, each weighing an average of 2.5 tonnes. For over 3,800 years, it was the tallest structure in the world.'
      - speaker: teacher
        voice: echo
        text: 'What is really amazing is that the ancient Egyptians had no modern tools — no cranes, no trucks, no computers. They moved these enormous blocks using ramps, levers, and the strength of thousands of workers. To this day, experts still debate exactly how they did it.'
    question:
      text: 'Why does the teacher find the Great Pyramid so astonishing?'
      textZh: '为什么老师觉得大金字塔如此惊人？'
      options:
        A: 'It was painted in bright colours.'
        B: 'It was built without any modern tools or machines.'
        C: 'It was built by just one person.'
      answer: 'B'
      explanation: 'The teacher says the ancient Egyptians had no modern tools yet built the enormous pyramid.'
      explanationZh: '老师说古埃及人没有现代工具却建造了巨大的金字塔。'

  - id: L466
    type: short-extract
    title: 'The Sustainable Building Expert'
    titleZh: '可持续建筑专家'
    scene: 'You will hear an expert talking about green buildings.'
    sceneZh: '你将听到一位专家谈论绿色建筑。'
    difficulty: 2
    audioFile: 'L466.mp3'
    script:
      - speaker: expert
        voice: shimmer
        text: 'A green building is designed to reduce its impact on the environment. The most important feature is energy efficiency. Solar panels on the roof generate electricity, while special glass windows keep the building warm in winter and cool in summer without using much energy.'
      - speaker: expert
        voice: shimmer
        text: 'But it goes beyond energy. Green buildings also collect rainwater for toilets and gardens, use recycled materials in construction, and include plants on walls and roofs to clean the air. The best green buildings produce more energy than they use — we call these "positive energy buildings."'
    question:
      text: 'What is a "positive energy building"?'
      textZh: '什么是"正能量建筑"？'
      options:
        A: 'A building that makes people feel happy'
        B: 'A building that produces more energy than it uses'
        C: 'A building made entirely of glass'
      answer: 'B'
      explanation: 'The expert says the best green buildings produce more energy than they use — "positive energy buildings."'
      explanationZh: '专家说最好的绿色建筑产生的能源比消耗的多——"正能量建筑"。'

  - id: L467
    type: short-extract
    title: 'The Bridge Engineer'
    titleZh: '桥梁工程师'
    scene: 'You will hear an engineer explaining how a suspension bridge works.'
    sceneZh: '你将听到一位工程师解释悬索桥的工作原理。'
    difficulty: 2
    audioFile: 'L467.mp3'
    script:
      - speaker: engineer
        voice: echo
        text: 'A suspension bridge hangs from thick steel cables attached to tall towers. The weight of the road deck is transferred through the cables to the towers, and from the towers down into the ground. This design allows bridges to span very long distances — the longest suspension bridge in the world crosses over 2,000 metres.'
      - speaker: engineer
        voice: echo
        text: 'The cables are incredibly strong. A single cable on the Golden Gate Bridge in San Francisco contains over 27,000 individual wires twisted together. This design is so effective that the bridge has survived earthquakes, storms, and over 80 years of heavy traffic.'
    question:
      text: 'How does a suspension bridge support its weight?'
      textZh: '悬索桥如何支撑其重量？'
      options:
        A: 'The road sits on stone pillars underneath.'
        B: 'Weight goes through cables to towers and into the ground.'
        C: 'The bridge floats on water using special technology.'
      answer: 'B'
      explanation: 'Weight is transferred through cables to towers and from towers into the ground.'
      explanationZh: '重量通过缆绳传递到塔楼，再从塔楼传到地面。'

  - id: L468
    type: short-extract
    title: 'The Ancient Roman Road Builder'
    titleZh: '古罗马筑路者'
    scene: 'You will hear a historian describing how Romans built their roads.'
    sceneZh: '你将听到一位历史学家描述罗马人如何修建道路。'
    difficulty: 2
    audioFile: 'L468.mp3'
    script:
      - speaker: historian
        voice: nova
        text: 'Roman roads were engineering marvels. Workers first dug a deep trench about one metre down. They filled the bottom with large stones for drainage, then added layers of crushed rock and sand. Finally, they laid flat paving stones on top with a slight curve so rainwater would drain to the sides.'
      - speaker: historian
        voice: nova
        text: 'This layered construction method was so effective that many Roman roads are still visible today, more than two thousand years later. In some places, modern roads follow the exact same routes the Romans planned.'
    question:
      text: 'Why did Roman roads have a slight curve on the surface?'
      textZh: '为什么罗马道路表面有轻微的弧度？'
      options:
        A: 'To make carriages travel faster'
        B: 'To allow rainwater to drain to the sides'
        C: 'To look more attractive to travellers'
      answer: 'B'
      explanation: 'The paving stones had a slight curve so rainwater would drain to the sides, preventing puddles.'
      explanationZh: '铺路石有轻微的弧度，使雨水流向两侧，防止积水。'

  - id: L469
    type: short-extract
    title: 'The Community Garden'
    titleZh: '社区花园'
    scene: 'You will hear a woman talking about a community garden project.'
    sceneZh: '你将听到一位女士谈论社区花园项目。'
    difficulty: 2
    audioFile: 'L469.mp3'
    script:
      - speaker: woman
        voice: shimmer
        text: 'Three years ago, this space was an empty car park that nobody used. A group of neighbours got together and asked the council if we could turn it into a community garden. They said yes, and we started planting that very weekend.'
      - speaker: woman
        voice: shimmer
        text: 'Now we have vegetable beds, fruit trees, a little pond, and benches where people sit and chat. The most wonderful change is that neighbours who never spoke to each other before are now friends. The garden did not just grow plants — it grew a community.'
    question:
      text: 'What was the most important benefit of the community garden?'
      textZh: '社区花园最重要的好处是什么？'
      options:
        A: 'It provided free vegetables for everyone.'
        B: 'It brought neighbours together and created friendships.'
        C: 'It increased house prices in the area.'
      answer: 'B'
      explanation: 'She says "The garden did not just grow plants — it grew a community." Neighbours who never spoke became friends.'
      explanationZh: '她说"花园不只是种植了植物——它培育了一个社区。"从不交谈的邻居成了朋友。'

  - id: L470
    type: short-extract
    title: 'The Smart City Demonstration'
    titleZh: '智慧城市演示'
    scene: 'You will hear a presenter at a technology fair talking about smart cities.'
    sceneZh: '你将听到科技展会上的一位演示者谈论智慧城市。'
    difficulty: 3
    audioFile: 'L470.mp3'
    script:
      - speaker: presenter
        voice: alloy
        text: 'Welcome to our smart city demonstration. In the city of the future, sensors in the road will detect traffic and automatically adjust traffic lights to keep vehicles moving. Streetlights will only turn on when someone walks underneath them, saving enormous amounts of energy.'
      - speaker: presenter
        voice: alloy
        text: 'Rubbish bins will send a signal to the collection truck when they are full, so trucks only visit streets that actually need collecting. This reduces fuel use by up to 40%. Everything in the smart city is connected, communicating, and working together to make life easier and more sustainable.'
    question:
      text: 'How will smart rubbish bins help the city?'
      textZh: '智能垃圾箱将如何帮助城市？'
      options:
        A: 'They will sort rubbish automatically.'
        B: 'They will signal trucks to collect only when full, reducing fuel use.'
        C: 'They will convert rubbish into electricity.'
      answer: 'B'
      explanation: 'Bins send a signal when full, so trucks only visit streets that need collecting, reducing fuel by 40%.'
      explanationZh: '垃圾箱满时发送信号，所以卡车只去需要收集的街道，减少40%的燃料使用。'

  - id: L471
    type: short-extract
    title: 'The Forbidden City'
    titleZh: '紫禁城'
    scene: 'You will hear a student giving a presentation about the Forbidden City.'
    sceneZh: '你将听到一个学生做关于紫禁城的报告。'
    difficulty: 2
    audioFile: 'L471.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'For my history project, I researched the Forbidden City in Beijing. It was built over 600 years ago and has 9,999 rooms. The number nine was considered the luckiest number, so the architects used it everywhere — in the door studs, the roof decorations, and even the layout of the buildings.'
      - speaker: student
        voice: shimmer
        text: 'What I found most surprising was the drainage system. Over one thousand carved stone dragon heads along the edges of terraces act as water spouts when it rains. The entire complex slopes gently from north to south so water flows away naturally. Even after centuries, this system still works perfectly.'
    question:
      text: 'What surprised the student most about the Forbidden City?'
      textZh: '紫禁城最让学生惊讶的是什么？'
      options:
        A: 'The number of rooms'
        B: 'The ancient drainage system that still works'
        C: 'The colourful roof tiles'
      answer: 'B'
      explanation: 'The student says "What I found most surprising was the drainage system... this system still works perfectly."'
      explanationZh: '学生说"最让我惊讶的是排水系统……这个系统至今仍然完美运作。"'

  - id: L472
    type: short-extract
    title: 'The Rooftop Garden'
    titleZh: '屋顶花园'
    scene: 'You will hear a teacher talking about a school rooftop garden project.'
    sceneZh: '你将听到一位老师谈论学校屋顶花园项目。'
    difficulty: 2
    audioFile: 'L472.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Last year, our school turned the empty rooftop into a garden. Students planted vegetables, herbs, and even sunflowers. The science classes use it to study how plants grow, while the cooking club harvests the vegetables for the school canteen.'
      - speaker: teacher
        voice: nova
        text: 'But the biggest benefit has been for our wellbeing. Students say they feel calmer and happier after spending time in the garden. Several students who used to struggle with concentration now go to the garden during breaks, and their teachers have noticed a real improvement in their focus during afternoon lessons.'
    question:
      text: 'What has been the biggest benefit of the rooftop garden?'
      textZh: '屋顶花园最大的好处是什么？'
      options:
        A: 'It provides free food for the school canteen.'
        B: 'It improves students'' wellbeing and concentration.'
        C: 'It saves the school money on science equipment.'
      answer: 'B'
      explanation: 'The teacher says the biggest benefit has been for wellbeing — students feel calmer and more focused.'
      explanationZh: '老师说最大的好处是改善了身心健康——学生感到更平静、更专注。'

  - id: L473
    type: short-extract
    title: 'The Utopian City'
    titleZh: '乌托邦城市'
    scene: 'You will hear a philosopher talking about the idea of a perfect city.'
    sceneZh: '你将听到一位哲学家谈论完美城市的想法。'
    difficulty: 3
    audioFile: 'L473.mp3'
    script:
      - speaker: philosopher
        voice: echo
        text: 'The word "utopia" was invented by Thomas More in 1516. It comes from Greek and means "no place" — because More knew that a truly perfect society is impossible. But that does not mean we should stop trying to make our cities better.'
      - speaker: philosopher
        voice: echo
        text: 'Every time we build a new park, improve a bus route, or plant a tree, we move a tiny step closer to the ideal. Perhaps the real value of utopian thinking is not reaching perfection, but having a direction to aim for. Without dreams, we would never improve anything.'
    question:
      text: 'Why did Thomas More call his imaginary place "Utopia"?'
      textZh: '为什么托马斯·莫尔把他想象中的地方叫做"乌托邦"？'
      options:
        A: 'It was named after a real Greek island.'
        B: 'The word means "no place" because a perfect society cannot exist.'
        C: 'He wanted it to sound impressive and mysterious.'
      answer: 'B'
      explanation: '"Utopia" means "no place" in Greek — More knew a perfect society is impossible.'
      explanationZh: '"Utopia"在希腊语中意为"不存在的地方"——莫尔知道完美社会是不可能的。'

  - id: L474
    type: short-extract
    title: 'The Silk Road Merchant'
    titleZh: '丝绸之路商人'
    scene: 'You will hear an actor playing the role of a Silk Road merchant.'
    sceneZh: '你将听到一位演员扮演丝绸之路商人的角色。'
    difficulty: 3
    audioFile: 'L474.mp3'
    script:
      - speaker: merchant
        voice: echo
        text: 'I am a merchant from Chang''an, the greatest city in the East. My camels carry silk, tea, and porcelain westward across the deserts and mountains. The journey to the markets of Persia takes over six months, but the profits make it worthwhile.'
      - speaker: merchant
        voice: echo
        text: 'On the way back, I bring glass from Rome, spices from India, and horses from the grasslands. But the most valuable things I carry are not goods — they are ideas. Along the route, I have learned about new medicines, different religions, and mathematical discoveries that will change the world.'
    question:
      text: 'According to the merchant, what is the most valuable thing carried on the Silk Road?'
      textZh: '根据商人的说法，丝绸之路上运载的最有价值的东西是什么？'
      options:
        A: 'Silk and porcelain'
        B: 'Gold and silver'
        C: 'Ideas, knowledge, and discoveries'
      answer: 'C'
      explanation: 'He says "the most valuable things I carry are not goods — they are ideas."'
      explanationZh: '他说"我携带的最有价值的东西不是商品——是思想。"'

  - id: L475
    type: short-extract
    title: 'The Urban Farm'
    titleZh: '城市农场'
    scene: 'You will hear a farmer talking about growing food in the city.'
    sceneZh: '你将听到一位农民谈论在城市种植食物。'
    difficulty: 2
    audioFile: 'L475.mp3'
    script:
      - speaker: farmer
        voice: nova
        text: 'People are always surprised when I tell them I am a farmer who works in the middle of the city. My farm is inside a tall building — we call it a vertical farm. We grow lettuce, tomatoes, and herbs using artificial light and recycled water, in stacked layers from floor to ceiling.'
      - speaker: farmer
        voice: nova
        text: 'The advantage is that we can grow food all year round, regardless of the weather outside. We also use 95% less water than a traditional farm because we recycle every drop. And because the food is grown right here in the city, it arrives at supermarkets within hours — much fresher than vegetables trucked in from hundreds of kilometres away.'
    question:
      text: 'What is the main advantage of the vertical farm?'
      textZh: '垂直农场的主要优势是什么？'
      options:
        A: 'It is cheaper to run than a normal farm.'
        B: 'It can grow food all year using much less water.'
        C: 'It produces better-tasting vegetables.'
      answer: 'B'
      explanation: 'The farmer says they grow food year-round and use 95% less water than traditional farms.'
      explanationZh: '农民说他们全年种植食物，用水量比传统农场少95%。'

  - id: L476
    type: short-extract
    title: 'The Skyscraper Window Cleaner'
    titleZh: '摩天大楼窗户清洁工'
    scene: 'You will hear a window cleaner talking about his unusual job.'
    sceneZh: '你将听到一位窗户清洁工谈论他不寻常的工作。'
    difficulty: 2
    audioFile: 'L476.mp3'
    script:
      - speaker: cleaner
        voice: alloy
        text: 'I clean windows on skyscrapers — yes, the really tall ones. My office is a small platform that hangs from the roof of the building. On a windy day, the platform swings back and forth, which can be a bit scary if you are not used to it.'
      - speaker: cleaner
        voice: alloy
        text: 'But I love my job because the views are incredible. I have watched sunrises over the city that most people will never see. The most challenging building I ever cleaned had 100 floors, and it took our team three months to clean every window. That is over 24,000 individual panes of glass!'
    question:
      text: 'What does the window cleaner enjoy most about his job?'
      textZh: '窗户清洁工最喜欢工作的什么？'
      options:
        A: 'The high salary he earns'
        B: 'The incredible views from the top of skyscrapers'
        C: 'Working with a large team of colleagues'
      answer: 'B'
      explanation: 'He says "I love my job because the views are incredible."'
      explanationZh: '他说"我喜欢我的工作因为景色太棒了。"'

  - id: L477
    type: short-extract
    title: 'The City of the Future'
    titleZh: '未来之城'
    scene: 'You will hear a student describing her science project about a future city.'
    sceneZh: '你将听到一位学生描述她关于未来城市的科学项目。'
    difficulty: 3
    audioFile: 'L477.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'For my science fair project, I designed a model of a city that runs entirely on renewable energy. Every building has solar panels and wind turbines. Electric buses run on tracks through the centre, and all the roads are covered with special tiles that generate electricity when people walk on them.'
      - speaker: student
        voice: shimmer
        text: 'My teacher said the most original feature was the "sponge park" system — parks designed to absorb rainwater during storms and slowly release it back into the water supply during dry periods. I got the idea from reading about sponge cities in China.'
    question:
      text: 'What was the most original feature of the student''s city design?'
      textZh: '学生城市设计中最有创意的特征是什么？'
      options:
        A: 'Solar panels on every building'
        B: 'Electric buses on tracks'
        C: 'Sponge parks that absorb and release rainwater'
      answer: 'C'
      explanation: 'Her teacher said the most original feature was the "sponge park" system.'
      explanationZh: '她的老师说最有创意的特征是"海绵公园"系统。'

  - id: L478
    type: short-extract
    title: 'The Great Wall Marathon Runner'
    titleZh: '长城马拉松跑者'
    scene: 'You will hear a runner describing his experience running a marathon on the Great Wall.'
    sceneZh: '你将听到一位跑者描述在长城上跑马拉松的经历。'
    difficulty: 3
    audioFile: 'L478.mp3'
    script:
      - speaker: runner
        voice: echo
        text: 'Running a marathon on the Great Wall of China was the hardest thing I have ever done. The steps are uneven — some are thirty centimetres tall, others are almost a metre. Your legs burn with every climb, and the wall goes up and down with the mountains.'
      - speaker: runner
        voice: echo
        text: 'But the views were unforgettable. Standing on top of a watchtower, looking at the wall stretching to the horizon in both directions, I truly understood why it is called one of the wonders of the world. The ancient builders must have been incredibly strong and determined.'
    question:
      text: 'Why was running on the Great Wall so difficult?'
      textZh: '为什么在长城上跑步如此困难？'
      options:
        A: 'The weather was extremely hot.'
        B: 'The steps are uneven and the wall goes up and down with the mountains.'
        C: 'There were too many tourists blocking the path.'
      answer: 'B'
      explanation: 'The steps are uneven and the wall goes up and down with the mountains, making it extremely challenging.'
      explanationZh: '台阶高低不平，城墙随山势起伏，使其极具挑战性。'

  - id: L479
    type: short-extract
    title: 'The Recycled Building'
    titleZh: '回收建筑'
    scene: 'You will hear an architect talking about a building made from recycled materials.'
    sceneZh: '你将听到一位建筑师谈论一栋用回收材料建造的建筑。'
    difficulty: 3
    audioFile: 'L479.mp3'
    script:
      - speaker: architect
        voice: shimmer
        text: 'The building you are looking at is made almost entirely from recycled materials. The walls contain crushed glass from old bottles, the roof tiles are made from recycled plastic, and the insulation is made from old newspapers. Even the foundation uses recycled concrete from a demolished car park.'
      - speaker: architect
        voice: shimmer
        text: 'The total cost was about 15% less than a traditional building, and it actually performs better in terms of energy efficiency. This proves that sustainable construction does not have to be more expensive — with the right design, it can save both money and the planet.'
    question:
      text: 'What does the architect say about the cost of the recycled building?'
      textZh: '建筑师对回收建筑的成本怎么说？'
      options:
        A: 'It was much more expensive than a normal building.'
        B: 'It cost about the same as a traditional building.'
        C: 'It was about 15% cheaper than a traditional building.'
      answer: 'C'
      explanation: 'The architect says the cost was about 15% less than a traditional building.'
      explanationZh: '建筑师说成本比传统建筑低约15%。'

  - id: L480
    type: short-extract
    title: 'The Ancient Aqueduct'
    titleZh: '古代水渠'
    scene: 'You will hear a guide explaining how the Romans brought water to their cities.'
    sceneZh: '你将听到一位导游解释罗马人如何将水引入城市。'
    difficulty: 3
    audioFile: 'L480.mp3'
    script:
      - speaker: guide
        voice: echo
        text: 'The aqueduct you see behind me carried water from mountain springs to the city, over 50 kilometres away. The Romans calculated the exact gradient needed — a gentle slope of about one centimetre every three metres — so that water would flow by gravity alone, without any pumps.'
      - speaker: guide
        voice: echo
        text: 'At its peak, Rome had eleven aqueducts supplying over one million cubic metres of water per day — enough to fill 400 Olympic swimming pools. This gave Roman citizens access to public baths, fountains, and flushing toilets nearly two thousand years before most other civilizations.'
    question:
      text: 'How did water flow through the Roman aqueduct?'
      textZh: '水是如何在罗马水渠中流动的？'
      options:
        A: 'Using steam-powered pumps'
        B: 'By gravity, thanks to a carefully calculated gentle slope'
        C: 'Workers carried buckets of water along the aqueduct'
      answer: 'B'
      explanation: 'Water flowed by gravity alone, thanks to a gentle slope of about one centimetre every three metres.'
      explanationZh: '水仅靠重力流动，得益于每三米约一厘米的缓坡。'

  # ============================================================
  # L481–L495: Part 2 — Sentence Completion (World Building Theme)
  # ============================================================

  - id: L481
    type: sentence-completion
    title: 'Building a Dream City'
    titleZh: '建造梦想城市'
    scene: 'You will hear a talk about designing cities. For each question, complete the sentence with a word or short phrase.'
    sceneZh: '你将听到一段关于设计城市的演讲。对于每个问题，用一个词或短语完成句子。'
    difficulty: 2
    audioFile: 'L481.mp3'
    script:
      - speaker: speaker
        voice: nova
        text: 'Good morning, everyone. Today I am going to talk about what makes a truly great city. In my experience as an urban planner, I have found that the best cities all share three key qualities: they are walkable, they have plenty of green space, and they put people before cars.'
      - speaker: speaker
        voice: nova
        text: 'The first quality — walkability — might sound simple, but it is surprisingly rare. A walkable city means you can reach shops, schools, and parks within a fifteen-minute walk from your home. Paris has recently adopted this "fifteen-minute city" model, and the results have been remarkable: cycling has increased by 60%, and local shops have seen a 25% rise in customers.'
    question:
      text: 'The speaker says the best cities share three key qualities: walkability, green space, and putting _____ before cars.'
      textZh: '演讲者说最好的城市都有三个关键品质：步行性、绿色空间和把 _____ 放在汽车之前。'
      answer: 'people'
      explanation: 'The speaker says great cities "put people before cars."'
      explanationZh: '演讲者说伟大的城市"把人放在汽车之前"。'

  - id: L482
    type: sentence-completion
    title: 'Building a Dream City (continued)'
    titleZh: '建造梦想城市（续）'
    scene: 'Continuation of the city design talk.'
    sceneZh: '关于城市设计演讲的续篇。'
    difficulty: 2
    audioFile: 'L482.mp3'
    script:
      - speaker: speaker
        voice: nova
        text: 'The second quality is green space. Research from Toronto shows that having ten or more trees on a city block improves health as much as being seven years younger. Trees clean the air, reduce stress, and make streets feel safer. I always tell my clients: if you can only do one thing to improve a neighbourhood, plant trees.'
    question:
      text: 'Research from Toronto found that ten or more trees on a block improves health as much as being _____ years younger.'
      textZh: '多伦多的研究发现一个街区有十棵以上的树对健康的改善相当于年轻 _____ 岁。'
      answer: 'seven'
      explanation: 'The speaker cites research saying ten or more trees improve health as much as being seven years younger.'
      explanationZh: '演讲者引用研究说十棵以上的树对健康的改善相当于年轻七岁。'

  - id: L483
    type: sentence-completion
    title: 'The History of Skyscrapers'
    titleZh: '摩天大楼的历史'
    scene: 'You will hear a lecture about the history of tall buildings.'
    sceneZh: '你将听到一个关于高层建筑历史的讲座。'
    difficulty: 2
    audioFile: 'L483.mp3'
    script:
      - speaker: lecturer
        voice: echo
        text: 'The world''s first skyscraper was the Home Insurance Building in Chicago, completed in 1885. It had only ten floors, but it was revolutionary because it was the first building to use a steel frame to support its weight. Before this invention, buildings relied on thick stone or brick walls — the taller you built, the thicker the walls had to be at the bottom.'
    question:
      text: 'The Home Insurance Building was revolutionary because it was the first to use a _____ to support its weight.'
      textZh: '家庭保险大楼之所以具有革命性，是因为它是第一个使用 _____ 来支撑重量的建筑。'
      answer: 'steel frame'
      explanation: 'It was the first building to use a steel frame to support its weight.'
      explanationZh: '它是第一个使用钢框架来支撑重量的建筑。'

  - id: L484
    type: sentence-completion
    title: 'Ancient Water Systems'
    titleZh: '古代供水系统'
    scene: 'You will hear a talk about how ancient cities managed their water supply.'
    sceneZh: '你将听到一段关于古代城市如何管理水源的演讲。'
    difficulty: 3
    audioFile: 'L484.mp3'
    script:
      - speaker: speaker
        voice: shimmer
        text: 'One of the most impressive achievements of ancient civilizations was their water management. The ancient Mesopotamians, who lived in modern-day Iraq, developed the first irrigation systems around 6,000 years ago. They dug canals to carry water from the Tigris and Euphrates rivers to their farmland, allowing them to grow crops in an otherwise dry desert.'
    question:
      text: 'The first irrigation systems were developed by the ancient _____ about 6,000 years ago.'
      textZh: '最早的灌溉系统是约6,000年前由古代 _____ 人开发的。'
      answer: 'Mesopotamians'
      explanation: 'The ancient Mesopotamians developed the first irrigation systems around 6,000 years ago.'
      explanationZh: '古代美索不达米亚人在约6,000年前开发了最早的灌溉系统。'

  - id: L485
    type: sentence-completion
    title: 'The 15-Minute City'
    titleZh: '15分钟城市'
    scene: 'You will hear an explanation of the 15-minute city concept.'
    sceneZh: '你将听到对15分钟城市概念的解释。'
    difficulty: 2
    audioFile: 'L485.mp3'
    script:
      - speaker: planner
        voice: nova
        text: 'The fifteen-minute city is a concept where everything a person needs — shops, schools, doctors, parks, and workplaces — should be reachable within a fifteen-minute walk or cycle ride from their home. The idea was popularised by Carlos Moreno, a professor at the Sorbonne University in Paris, and the mayor of Paris adopted it as the city''s official planning strategy.'
    question:
      text: 'The 15-minute city concept was popularised by Carlos Moreno from _____ University.'
      textZh: '15分钟城市概念由 _____ 大学的 Carlos Moreno 推广。'
      answer: 'Sorbonne'
      explanation: 'Carlos Moreno is a professor at the Sorbonne University in Paris.'
      explanationZh: 'Carlos Moreno 是巴黎索邦大学的教授。'

  - id: L486
    type: sentence-completion
    title: 'Building with Bamboo'
    titleZh: '竹子建筑'
    scene: 'You will hear an architect talking about bamboo as a building material.'
    sceneZh: '你将听到一位建筑师谈论竹子作为建筑材料。'
    difficulty: 2
    audioFile: 'L486.mp3'
    script:
      - speaker: architect
        voice: echo
        text: 'Bamboo is an amazing building material that most people overlook. It is stronger than steel when compared by weight, it grows back quickly after cutting, and it naturally absorbs more carbon dioxide than most trees. In tropical countries, bamboo has been used for building homes for thousands of years.'
    question:
      text: 'The architect says bamboo is stronger than _____ when compared by weight.'
      textZh: '建筑师说按重量比较，竹子比 _____ 更坚固。'
      answer: 'steel'
      explanation: 'Bamboo is stronger than steel when compared by weight.'
      explanationZh: '按重量比较，竹子比钢铁更坚固。'

  - id: L487
    type: sentence-completion
    title: 'Parks and Health'
    titleZh: '公园与健康'
    scene: 'You will hear a doctor talking about the health benefits of parks.'
    sceneZh: '你将听到一位医生谈论公园的健康益处。'
    difficulty: 2
    audioFile: 'L487.mp3'
    script:
      - speaker: doctor
        voice: shimmer
        text: 'Studies consistently show that people who live within walking distance of a park exercise 30% more than those who do not. They also report lower levels of stress and anxiety. In Japan, doctors actually prescribe "forest bathing" — spending time among trees — as a treatment for stress. It has been shown to lower blood pressure and boost the immune system.'
    question:
      text: 'In Japan, doctors prescribe "_____ bathing" as a treatment for stress.'
      textZh: '在日本，医生将"_____浴"作为治疗压力的方法。'
      answer: 'forest'
      explanation: 'Japanese doctors prescribe "forest bathing" — spending time among trees — as a stress treatment.'
      explanationZh: '日本医生将"森林浴"——在树木间度过时光——作为治疗压力的方法。'

  - id: L488
    type: sentence-completion
    title: 'The Future of Transport'
    titleZh: '交通的未来'
    scene: 'You will hear an engineer discussing future transport systems.'
    sceneZh: '你将听到一位工程师讨论未来的交通系统。'
    difficulty: 3
    audioFile: 'L488.mp3'
    script:
      - speaker: engineer
        voice: alloy
        text: 'By 2050, we predict that most city transport will be electric and autonomous — meaning vehicles will drive themselves without any human driver. Already in Singapore, autonomous buses are being tested on public roads. The technology uses cameras, radar, and artificial intelligence to navigate safely through traffic.'
    question:
      text: 'Autonomous vehicles drive themselves using cameras, radar, and _____.'
      textZh: '自动驾驶车辆使用摄像头、雷达和 _____ 自行驾驶。'
      answer: 'artificial intelligence'
      explanation: 'The technology uses cameras, radar, and artificial intelligence to navigate.'
      explanationZh: '该技术使用摄像头、雷达和人工智能来导航。'

  - id: L489
    type: sentence-completion
    title: 'Ancient Athens Democracy'
    titleZh: '古雅典民主'
    scene: 'You will hear a historian talking about democracy in ancient Athens.'
    sceneZh: '你将听到一位历史学家谈论古雅典的民主。'
    difficulty: 3
    audioFile: 'L489.mp3'
    script:
      - speaker: historian
        voice: echo
        text: 'Ancient Athens is considered the birthplace of democracy. Around 500 BC, a leader named Cleisthenes introduced a system where all male citizens over the age of 18 could vote on important decisions. They gathered in the agora — the central public square — to debate and vote. However, it is important to remember that women, slaves, and foreigners were excluded from voting.'
    question:
      text: 'In ancient Athens, citizens gathered in the _____ to debate and vote on decisions.'
      textZh: '在古雅典，公民聚集在 _____ 进行辩论和投票。'
      answer: 'agora'
      explanation: 'Citizens gathered in the agora — the central public square — to debate and vote.'
      explanationZh: '公民聚集在agora——中央公共广场——进行辩论和投票。'

  - id: L490
    type: sentence-completion
    title: 'Sponge Cities in China'
    titleZh: '中国的海绵城市'
    scene: 'You will hear a report about sponge cities in China.'
    sceneZh: '你将听到一个关于中国海绵城市的报道。'
    difficulty: 3
    audioFile: 'L490.mp3'
    script:
      - speaker: reporter
        voice: nova
        text: 'China has launched an ambitious programme to build sponge cities in over thirty locations. The concept works by replacing concrete surfaces with permeable materials that absorb rainwater, reducing the risk of flooding. Green roofs, rain gardens, and wetland parks all act like sponges, soaking up water during storms and releasing it slowly over time.'
    question:
      text: 'Sponge cities reduce flooding by replacing concrete with _____ materials that absorb rainwater.'
      textZh: '海绵城市通过用 _____ 材料替代混凝土来减少洪水，这些材料能吸收雨水。'
      answer: 'permeable'
      explanation: 'Concrete surfaces are replaced with permeable materials that absorb rainwater.'
      explanationZh: '混凝土表面被能吸收雨水的透水材料替代。'

  - id: L491
    type: sentence-completion
    title: 'Singapore Gardens by the Bay'
    titleZh: '新加坡滨海湾花园'
    scene: 'You will hear a visitor describing Gardens by the Bay in Singapore.'
    sceneZh: '你将听到一位游客描述新加坡的滨海湾花园。'
    difficulty: 2
    audioFile: 'L491.mp3'
    script:
