    sceneZh: '两位学生辩论旧建筑应该被保存还是替换。'
    difficulty: 3
    audioFile: 'L514.mp3'
    script:
      - speaker: Lily
        voice: shimmer
        text: 'I think old buildings should always be preserved. They are part of our heritage and tell the story of our city.'
      - speaker: Jack
        voice: echo
        text: 'I understand that, but some old buildings are genuinely dangerous. If a building is falling apart and could hurt someone, surely safety comes first?'
      - speaker: Lily
        voice: shimmer
        text: 'But there is a middle ground — renovation. You can make an old building safe and modern on the inside while keeping the historic exterior. Many cities do this successfully.'
      - speaker: Jack
        voice: echo
        text: 'That is a fair point. Renovation can be the best of both worlds. But it is usually more expensive than just building something new from scratch.'
      - speaker: Lily
        voice: shimmer
