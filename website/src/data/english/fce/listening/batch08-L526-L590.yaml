        B: 'It develops children''s imagination by making them create pictures in their minds.'
        C: 'It teaches children how to become writers.'
      answer: 'B'
      explanation: '"The children have to CREATE the pictures in their own minds. This develops their imagination in a way that watching a screen simply cannot."'
      explanationZh: '"孩子们必须在自己的脑海中创造画面。这以看屏幕无法做到的方式发展他们的想象力。"'

