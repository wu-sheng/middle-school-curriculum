  - id: L576
    type: long-conversation
    title: 'Two Friends Discuss a Film They Just Watched'
    titleZh: '两个朋友讨论他们刚看的电影'
    scene: 'You will hear two friends, Amy and Ben, discussing a film they just watched at the cinema.'
    sceneZh: '你将听到两个朋友Amy和Ben讨论他们刚在电影院看的电影。'
    difficulty: 3
    audioFile: 'L576.mp3'
    script:
      - speaker: Amy
        voice: shimmer
        text: 'So, what did you think of the film? I absolutely loved it. The animation was breathtaking — especially that underwater scene near the end.'
      - speaker: Ben
        voice: fable
        text: 'The animation was stunning, I agree. But I thought the story was a bit predictable. I guessed the plot twist about twenty minutes before it happened.'
      - speaker: Amy
        voice: shimmer
        text: 'Really? I did not see it coming at all! Maybe I was too distracted by the visuals. But I thought the characters were really well-developed, especially the villain. She was not just evil — she had real reasons for what she was doing.'
      - speaker: Ben
        voice: fable
        text: 'True, the villain was the best part. I also loved the soundtrack. That song during the chase scene had me gripping my seat. The composer did an amazing job.'
      - speaker: Amy
        voice: shimmer
        text: 'Definitely. Would you recommend it to others?'
      - speaker: Ben
        voice: fable
        text: 'I would say it is worth watching for the animation and music alone. The story has some weak spots, but overall it is a solid film. I would give it four out of five stars.'
      - speaker: Amy
        voice: shimmer
        text: 'I would go even higher — four and a half. That underwater scene is worth the ticket price on its own!'
    questions:
      - id: L576-Q1
        text: 'What did Amy like most about the film?'
        textZh: 'Amy最喜欢电影的什么？'
        options:
          A: 'The storyline and plot twists.'
          B: 'The animation, especially the underwater scene.'
          C: 'The soundtrack and chase scene music.'
        answer: 'B'
        explanation: 'Amy says "I absolutely loved it. The animation was breathtaking — especially that underwater scene."'
        explanationZh: 'Amy说"我非常喜欢。动画令人叹为观止——特别是那个水下场景。"'
      - id: L576-Q2
        text: 'What criticism did Ben have?'
        textZh: 'Ben有什么批评？'
        options:
          A: 'The animation quality was poor.'
          B: 'The soundtrack was disappointing.'
          C: 'The story was rather predictable.'
        answer: 'C'
        explanation: 'Ben says "I thought the story was a bit predictable. I guessed the plot twist."'
        explanationZh: 'Ben说"我觉得故事有点可预测。我猜到了情节转折。"'
      - id: L576-Q3
        text: 'What did both Amy and Ben agree was excellent?'
        textZh: 'Amy和Ben都认为什么很出色？'
        options:
          A: 'The villain character was well-developed.'
          B: 'The story was completely original.'
          C: 'The film was too long.'
        answer: 'A'
        explanation: 'Amy says the villain "was not just evil — she had real reasons" and Ben agrees "the villain was the best part."'
        explanationZh: 'Amy说反派"不仅仅是邪恶的——她有真正的原因"，Ben同意"反派是最好的部分"。'

  - id: L580
    type: long-conversation
    title: 'A Book Club Discussion'
    titleZh: '读书俱乐部讨论'
    scene: 'You will hear three members of a school book club discussing a novel they all read.'
    sceneZh: '你将听到三位学校读书俱乐部成员讨论他们都读过的一本小说。'
    difficulty: 3
    audioFile: 'L580.mp3'
    script:
      - speaker: Zara
        voice: shimmer
        text: 'I finished the book last night and I have to say, it was not what I expected. The beginning was quite slow — I almost gave up at chapter three. But once the mystery kicked in around chapter five, I could not put it down.'
      - speaker: Leo
        voice: fable
        text: 'Interesting — I actually enjoyed the slow beginning. I thought the author was building atmosphere and helping us understand the characters before throwing them into danger. Without those early chapters, I would not have cared about what happened to them later.'
      - speaker: Mia
        voice: nova
        text: 'I agree with Leo. The slow build made the dramatic scenes later even more powerful. But I did have one issue — the ending felt rushed. After spending 300 pages building this incredible mystery, the solution was explained in just two pages. I wanted more.'
      - speaker: Zara
        voice: shimmer
        text: 'That is a fair point. The ending did feel like the author ran out of space. But the writing itself was beautiful. Some of those descriptions — the scene in the abandoned lighthouse, for example — were so vivid that I could almost smell the sea air.'
      - speaker: Leo
        voice: fable
        text: 'Overall, I would recommend it. It is not perfect, but it is one of the most atmospheric books I have read this year. Who should we give it to next?'
    questions:
      - id: L580-Q1
        text: 'What did Zara initially find difficult about the book?'
        textZh: 'Zara最初觉得这本书什么地方困难？'
        options:
          A: 'The language was too complicated.'
          B: 'The beginning was slow and she almost stopped reading.'
          C: 'The mystery was too confusing to follow.'
        answer: 'B'
        explanation: 'Zara says "The beginning was quite slow — I almost gave up at chapter three."'
        explanationZh: 'Zara说"开头很慢——我在第三章差点放弃。"'
      - id: L580-Q2
        text: 'Why did Leo enjoy the slow beginning?'
        textZh: 'Leo为什么喜欢缓慢的开头？'
        options:
          A: 'It helped him understand the characters before the action started.'
          B: 'He enjoys books with lots of description.'
          C: 'He thought it was funny and entertaining.'
        answer: 'A'
        explanation: 'Leo says "the author was building atmosphere and helping us understand the characters before throwing them into danger."'
        explanationZh: 'Leo说"作者在将角色推入危险之前建立氛围并帮助我们理解角色。"'
      - id: L580-Q3
        text: 'What criticism did Mia have about the book?'
        textZh: 'Mia对这本书有什么批评？'
        options:
          A: 'The characters were not believable.'
          B: 'The ending was rushed and too short.'
          C: 'There was not enough mystery in the plot.'
        answer: 'B'
        explanation: 'Mia says "the ending felt rushed" — the solution was explained in just two pages after 300 pages of mystery.'
        explanationZh: 'Mia说"结尾感觉很仓促"——在300页的神秘之后，答案只用了两页就解释完了。'
      - id: L580-Q4
        text: 'What aspect of the book did all three agree was impressive?'
        textZh: '三个人都认为这本书的哪个方面令人印象深刻？'
        options:
          A: 'The fast-paced action scenes.'
          B: 'The beautiful and atmospheric writing style.'
          C: 'The surprising plot twist at the end.'
        answer: 'B'
        explanation: 'Leo mentions it being "atmospheric," Zara praises the vivid descriptions, and Mia acknowledges the "incredible mystery" building. They all appreciate the writing quality.'
        explanationZh: 'Leo提到它"有氛围"，Zara赞扬了生动的描述，Mia承认了"令人难以置信的神秘"构建。他们都欣赏写作质量。'

  - id: L585
    type: long-conversation
    title: 'Reviewing a New Mobile Game'
    titleZh: '评论一款新手机游戏'
    scene: 'You will hear two friends discussing a new mobile game they have both been playing.'
    sceneZh: '你将听到两个朋友讨论他们都在玩的一款新手机游戏。'
    difficulty: 3
    audioFile: 'L585.mp3'
    script:
      - speaker: Jake
        voice: fable
        text: 'Have you tried the new puzzle game everyone is talking about? I have been playing it for two weeks and I think it is really innovative. The puzzles get harder gradually, so you never feel overwhelmed.'
      - speaker: Lily
        voice: shimmer
        text: 'Yes! I downloaded it last week. I love the art style — it looks like a watercolour painting come to life. But I have to say, I find it a bit too easy. I completed fifty levels in one evening without really struggling.'
      - speaker: Jake
        voice: fable
        text: 'Wait until you reach level one hundred — that is where it gets really challenging. The developer clearly designed the first fifty levels as a tutorial. The real game starts after that.'
      - speaker: Lily
        voice: shimmer
        text: 'Good to know. My other criticism is the advertisements. Every five levels, you have to watch a thirty-second ad. It really breaks the flow of the game.'
      - speaker: Jake
        voice: fable
        text: 'You can remove them for three dollars. I think it is worth it — the game is so much better without interruptions. Overall, despite the ads, I would give it four stars.'
      - speaker: Lily
        voice: shimmer
        text: 'I will give it three and a half for now, but I might raise it once I reach the harder levels. The art style alone makes it worth downloading.'
    questions:
      - id: L585-Q1
        text: 'What does Jake find innovative about the game?'
        textZh: 'Jake觉得游戏什么地方很创新？'
        options:
          A: 'The multiplayer mode with online friends.'
          B: 'The gradual increase in puzzle difficulty.'
          C: 'The ability to create your own levels.'
        answer: 'B'
        explanation: 'Jake says "The puzzles get harder gradually, so you never feel overwhelmed."'
        explanationZh: 'Jake说"谜题逐渐变难，所以你从不觉得不知所措。"'
      - id: L585-Q2
        text: 'What does Lily criticise about the game?'
        textZh: 'Lily批评游戏什么地方？'
        options:
          A: 'The graphics are outdated and ugly.'
          B: 'Frequent advertisements interrupt the gameplay.'
          C: 'There are not enough levels to play.'
        answer: 'B'
        explanation: 'Lily says "Every five levels, you have to watch a thirty-second ad. It really breaks the flow."'
        explanationZh: 'Lily说"每五关就要看一个三十秒的广告。这真的打断了游戏的流畅性。"'
      - id: L585-Q3
        text: 'What do both friends agree on?'
        textZh: '两个朋友都同意什么？'
        options:
          A: 'The game is too expensive.'
          B: 'The art style is impressive.'
          C: 'The game is too difficult for beginners.'
        answer: 'B'
        explanation: 'Jake describes it as "innovative" and Lily says she loves "the art style — it looks like a watercolour painting." Both appreciate the visual design.'
        explanationZh: 'Jake描述它为"创新的"，Lily说她喜欢"艺术风格——它看起来像一幅水彩画"。两人都欣赏视觉设计。'

  - id: L590
    type: long-conversation
    title: 'Planning a Review for the School Magazine'
    titleZh: '为校刊计划一篇评论'
    scene: 'You will hear two students planning a review of a school musical for their school magazine.'
    sceneZh: '你将听到两个学生为校刊计划一篇关于校园音乐剧的评论。'
    difficulty: 3
    audioFile: 'L590.mp3'
    script:
      - speaker: Emma
        voice: shimmer
        text: 'We need to write a review of the school musical for the magazine. Where should we start?'
      - speaker: Tom
        voice: fable
        text: 'Let us begin with the introduction. We should name the show, say when it was performed, and give our overall impression. Something like — the school''s production of Matilda was the most ambitious show we have attempted in years.'
      - speaker: Emma
        voice: shimmer
        text: 'That is good. Then for the summary, we should briefly describe the story for anyone who missed it. But we should not retell the entire plot — just the setup.'
      - speaker: Tom
        voice: fable
        text: 'Agreed. For the opinion section, I want to mention the singing. The girl who played Matilda had an incredible voice. But I also think we should be honest about the sound problems in the first act — the microphones kept cutting out.'
      - speaker: Emma
        voice: shimmer
        text: 'Yes, but let us phrase it gently. We could say "there were some minor technical difficulties in the first act, which were quickly resolved." We do not want to upset anyone.'
      - speaker: Tom
        voice: fable
        text: 'Good idea. And for the recommendation, we should say who would enjoy it and encourage people to come to next year''s show.'
      - speaker: Emma
        voice: shimmer
        text: 'Perfect. Let us also mention the set design — it was genuinely impressive for a school production. The revolving bookshelf was such a creative idea.'
    questions:
      - id: L590-Q1
        text: 'What structure do Emma and Tom plan to use for their review?'
        textZh: 'Emma和Tom计划用什么结构写评论？'
        options:
          A: 'A list of pros and cons.'
          B: 'Introduction, Summary, Opinion, Recommendation.'
          C: 'A comparison with another school''s production.'
        answer: 'B'
        explanation: 'They discuss an introduction, summary, opinion section, and recommendation — the standard four-part review structure.'
        explanationZh: '他们讨论了引言、概要、评价部分和推荐——标准的四部分评论结构。'
      - id: L590-Q2
        text: 'How does Emma suggest phrasing the criticism about sound problems?'
        textZh: 'Emma建议如何措辞关于声音问题的批评？'
        options:
          A: 'Ignore it completely to avoid upsetting people.'
          B: 'Say it was the worst part of the whole show.'
          C: 'Describe it as "minor technical difficulties" that were resolved.'
        answer: 'C'
        explanation: 'Emma suggests saying "there were some minor technical difficulties in the first act, which were quickly resolved."'
        explanationZh: 'Emma建议说"第一幕有一些小的技术问题，很快就解决了。"'
      - id: L590-Q3
        text: 'What do both students agree was impressive?'
        textZh: '两个学生都认为什么令人印象深刻？'
        options:
          A: 'The lead actress''s singing and the set design.'
          B: 'The ticket prices and the programme design.'
          C: 'The length of the show and the interval snacks.'
        answer: 'A'
        explanation: 'Tom praises the singing and Emma mentions the set design, especially the "revolving bookshelf."'
        explanationZh: 'Tom赞扬了歌唱，Emma提到了舞台设计，特别是"旋转书架"。'
