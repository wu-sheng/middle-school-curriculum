        text: 'I have been using a drawing app called Procreate for about six months, and I think it is absolutely brilliant. The interface is incredibly user-friendly — I learned how to use all the basic tools in about twenty minutes. There are hundreds of different brushes, and you can create layers just like in professional design software.'
      - speaker: girl
        voice: shimmer
        text: 'My only criticism is the price. It costs about fifteen dollars, which is quite a lot for an app. However, compared to buying art supplies like paints and canvases, it is actually very good value. I would highly recommend it to anyone who loves drawing.'
    question:
