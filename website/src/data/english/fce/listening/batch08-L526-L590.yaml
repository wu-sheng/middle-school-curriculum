# FCE Daily Listening Practice — Month 9, Batch 08
# 65 exercises (L526–L590)
# L526–L545: Part 1 short extracts (20 exercises, difficulty 2-3)
# L546–L560: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L561–L575: Part 3 multiple matching (15 exercises, difficulty 2-3)
# L576–L590: Part 4 long conversation (15 exercises, difficulty 3)
# Theme: Arts & Entertainment for 8-9 year old learners

extracts:
  # ============================================================
  # L526–L545: Part 1 — Short Extracts (Arts/Entertainment Theme)
  # ============================================================

  - id: L526
    type: short-extract
    title: 'The Book Reviewer'
    titleZh: '书评人'
    scene: 'You will hear a girl talking about her hobby of writing book reviews.'
    sceneZh: '你将听到一个女孩谈论她写书评的爱好。'
    difficulty: 2
    audioFile: 'L526.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I started writing book reviews for our school magazine when I was eight. At first, I just wrote things like "I liked this book" or "It was good." But my teacher showed me how to explain WHY I liked it — what made the characters interesting, whether the plot had surprises, and who I would recommend it to.'
      - speaker: girl
        voice: shimmer
        text: 'Now I write reviews every week, and other students tell me they choose their books based on what I write. That makes me feel really proud. My dream is to become a book critic for a real newspaper one day.'
    question:
      text: 'What did the girl''s teacher help her learn to do?'
      textZh: '老师帮助这个女孩学会了做什么？'
      options:
        A: 'Read books faster than before.'
        B: 'Explain the reasons behind her opinions in reviews.'
        C: 'Write fiction stories for the school magazine.'
      answer: 'B'
      explanation: 'The teacher showed her "how to explain WHY I liked it" — moving from simple opinions to detailed analysis.'
      explanationZh: '老师教她"如何解释为什么我喜欢它"——从简单的观点转向详细的分析。'

  - id: L527
    type: short-extract
    title: 'The Film Score Composer'
    titleZh: '电影配乐作曲家'
    scene: 'You will hear a music teacher talking about film music.'
    sceneZh: '你将听到一位音乐老师谈论电影音乐。'
    difficulty: 2
    audioFile: 'L527.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Most people do not notice film music while watching a movie, but take it away and you would immediately feel something was missing. Music tells you how to feel. When the strings play softly, you know something sad is about to happen. When the brass section blasts a fanfare, you know the hero has arrived.'
      - speaker: teacher
        voice: nova
        text: 'The really clever thing is that film composers can make you feel emotions that the images alone cannot create. A peaceful landscape can feel threatening with the right music underneath it.'
    question:
      text: 'What point does the teacher make about film music?'
      textZh: '老师关于电影音乐提出了什么观点？'
      options:
        A: 'Most people think film music is too loud.'
        B: 'Film music can create emotions that images alone cannot.'
        C: 'Classical music is better than modern film music.'
      answer: 'B'
      explanation: 'The teacher says "film composers can make you feel emotions that the images alone cannot create."'
      explanationZh: '老师说"电影作曲家能让你感受到图像本身无法创造的情感。"'

  - id: L528
    type: short-extract
    title: 'The Art Gallery Visit'
    titleZh: '参观美术馆'
    scene: 'You will hear a father describing a visit to an art gallery with his daughter.'
    sceneZh: '你将听到一位父亲描述和女儿参观美术馆的经历。'
    difficulty: 2
    audioFile: 'L528.mp3'
    script:
      - speaker: father
        voice: echo
        text: 'I was worried that my nine-year-old daughter would find the art gallery boring. She usually prefers video games and cartoons. But when we walked into the room with the impressionist paintings, something magical happened. She stood in front of a Monet water lily painting and did not move for five minutes.'
      - speaker: father
        voice: echo
        text: 'When I asked what she was thinking, she said the painting looked different every time she blinked. She wanted to know how the artist made the water look like it was actually moving. That visit sparked an interest in art that I never expected.'
    question:
      text: 'What surprised the father about the gallery visit?'
      textZh: '什么让父亲对美术馆之旅感到惊讶？'
      options:
        A: 'The gallery was much smaller than he expected.'
        B: 'His daughter became genuinely fascinated by the paintings.'
        C: 'The paintings were all about water lilies.'
      answer: 'B'
      explanation: 'The father was "worried" she would be bored, but she "stood in front of a Monet" for five minutes and became interested in art.'
      explanationZh: '父亲"担心"她会觉得无聊，但她在莫奈的画前"站了五分钟"，并对艺术产生了兴趣。'

  - id: L529
    type: short-extract
    title: 'The School Play Director'
    titleZh: '校园剧导演'
    scene: 'You will hear a drama teacher discussing the school play.'
    sceneZh: '你将听到一位戏剧老师讨论校园剧。'
    difficulty: 2
    audioFile: 'L529.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'This year we are performing "Matilda" as our school musical, and the auditions were incredible. We had over sixty students try out for parts, which is double the number from last year. What impressed me most was how prepared they were — many had memorised entire scenes.'
      - speaker: teacher
        voice: shimmer
        text: 'The biggest challenge will be the set design. We need to create Miss Trunchbull''s office, the Wormwood living room, and the school library — all on one stage. But the students are so enthusiastic that I know we will find a way to make it work.'
    question:
      text: 'What is the biggest challenge for this year''s school play?'
      textZh: '今年校园剧最大的挑战是什么？'
      options:
        A: 'Not enough students auditioned for the parts.'
        B: 'Creating multiple sets for one stage.'
        C: 'The students have not memorised their lines.'
      answer: 'B'
      explanation: '"The biggest challenge will be the set design" — creating three different locations on one stage.'
      explanationZh: '"最大的挑战将是舞台设计"——在一个舞台上创建三个不同的场景。'

  - id: L530
    type: short-extract
    title: 'The Game Designer'
    titleZh: '游戏设计师'
    scene: 'You will hear a game designer talking about what makes a game fun.'
    sceneZh: '你将听到一位游戏设计师谈论什么让游戏有趣。'
    difficulty: 2
    audioFile: 'L530.mp3'
    script:
      - speaker: designer
        voice: echo
        text: 'People often ask me what the secret to a great game is. They expect me to say "amazing graphics" or "realistic sound effects." But the truth is much simpler. A great game makes you feel clever. Every puzzle you solve, every level you complete, every challenge you overcome should give you that wonderful feeling of "I did it!"'
      - speaker: designer
        voice: echo
        text: 'That is why some of the most successful games have very simple graphics. Tetris is just falling blocks. But the feeling of clearing four rows at once? That is pure joy.'
    question:
      text: 'According to the designer, what makes a great game?'
      textZh: '根据设计师的说法，什么让游戏变得伟大？'
      options:
        A: 'Amazing graphics and realistic sound.'
        B: 'The feeling of achievement when you overcome challenges.'
        C: 'Having hundreds of different levels.'
      answer: 'B'
      explanation: '"A great game makes you feel clever" — the feeling of accomplishment when solving puzzles and completing challenges.'
      explanationZh: '"伟大的游戏让你感觉聪明"——解决谜题和完成挑战时的成就感。'

  - id: L531
    type: short-extract
    title: 'The Young Movie Critic'
    titleZh: '年轻的影评人'
    scene: 'You will hear a boy talking about his YouTube channel where he reviews movies.'
    sceneZh: '你将听到一个男孩谈论他在YouTube上评论电影的频道。'
    difficulty: 2
    audioFile: 'L531.mp3'
    script:
      - speaker: boy
        voice: fable
        text: 'I started my movie review channel two years ago, and now I have over five thousand subscribers. The most important thing I have learned is that a good review is not just about saying whether you liked the film. You need to explain what works and what does not, and compare it to other films in the same genre.'
      - speaker: boy
        voice: fable
        text: 'I always try to mention at least one positive thing, even if I did not enjoy the film overall. Nobody wants to watch someone just complaining for ten minutes. A balanced review is much more helpful and interesting.'
    question:
      text: 'What has the boy learned about writing reviews?'
      textZh: '这个男孩学到了关于写评论的什么？'
      options:
        A: 'You should only review films you love.'
        B: 'A balanced review with positives and negatives is best.'
        C: 'Longer reviews get more views on YouTube.'
      answer: 'B'
      explanation: 'He says "I always try to mention at least one positive thing" and that "a balanced review is much more helpful and interesting."'
      explanationZh: '他说"我总是尝试提到至少一件积极的事"并且"平衡的评论更有帮助和有趣"。'

  - id: L532
    type: short-extract
    title: 'The Orchestra Conductor'
    titleZh: '管弦乐队指挥'
    scene: 'You will hear an orchestra conductor explaining her job to school children.'
    sceneZh: '你将听到一位管弦乐队指挥向学生解释她的工作。'
    difficulty: 2
    audioFile: 'L532.mp3'
    script:
      - speaker: conductor
        voice: shimmer
        text: 'People think a conductor just waves their arms around, but it is so much more than that. My job is to be the storyteller. I decide how fast or slow each section should be, how loud or soft each instrument should play, and where to pause for dramatic effect. I am like the director of a film, but instead of actors, I work with musicians.'
      - speaker: conductor
        voice: shimmer
        text: 'The most magical moment is when eighty musicians all breathe together before the first note. In that single breath, we become one instrument.'
    question:
      text: 'How does the conductor describe her role?'
      textZh: '指挥如何描述她的角色？'
      options:
        A: 'She plays the most important instrument in the orchestra.'
        B: 'She is like a film director who guides the musicians.'
        C: 'She writes all the music the orchestra performs.'
      answer: 'B'
      explanation: '"I am like the director of a film, but instead of actors, I work with musicians."'
      explanationZh: '"我就像电影导演，但我的合作对象不是演员而是音乐家。"'

  - id: L533
    type: short-extract
    title: 'The Bookshop Owner'
    titleZh: '书店老板'
    scene: 'You will hear a bookshop owner talking about children''s reading habits.'
    sceneZh: '你将听到一位书店老板谈论孩子的阅读习惯。'
    difficulty: 2
    audioFile: 'L533.mp3'
    script:
      - speaker: owner
        voice: nova
        text: 'The biggest change I have noticed over the past ten years is that graphic novels and manga have become incredibly popular with young readers. Some people worry that children are choosing pictures over words, but I see it differently. These children are reading — they are just reading in a different format.'
      - speaker: owner
        voice: nova
        text: 'What really matters is that a child finds a book they love and finishes it. Once they experience that magic of completing a story, they want more. And very often, children who start with graphic novels eventually move on to traditional novels too.'
    question:
      text: 'What is the bookshop owner''s view on graphic novels?'
      textZh: '书店老板对图形小说持什么看法？'
      options:
        A: 'They are replacing real books and this is a problem.'
        B: 'They are a valid form of reading that can lead to more reading.'
        C: 'They are only suitable for very young children.'
      answer: 'B'
      explanation: 'The owner says "These children are reading — just in a different format" and that graphic novel readers "eventually move on to traditional novels too."'
      explanationZh: '老板说"这些孩子在阅读——只是以不同的格式"并且图形小说读者"最终也会转向传统小说"。'

  - id: L534
    type: short-extract
    title: 'The Animated Film Fan'
    titleZh: '动画电影迷'
    scene: 'You will hear a girl explaining why she prefers animated films to live-action ones.'
    sceneZh: '你将听到一个女孩解释为什么她更喜欢动画电影而不是真人电影。'
    difficulty: 2
    audioFile: 'L534.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'My friends think animated films are just for little kids, but I completely disagree. Films like "Spider-Verse" and "Inside Out" deal with themes that are just as deep and meaningful as any live-action drama. The difference is that animation can show things that are impossible in real life — emotions as colourful characters, alternate dimensions that look like paintings.'
      - speaker: girl
        voice: shimmer
        text: 'Animation is not a genre — it is a medium. You can tell any story through animation, from comedy to horror to documentary. And honestly, some of the best storytelling I have ever seen has been in animated films.'
    question:
      text: 'What does the girl think about animated films?'
      textZh: '这个女孩对动画电影怎么看？'
      options:
        A: 'They are only suitable for young children.'
        B: 'They are a medium that can tell any kind of story as well as live-action.'
        C: 'They have better graphics than live-action films.'
      answer: 'B'
      explanation: 'She says "Animation is not a genre — it is a medium. You can tell any story through animation."'
      explanationZh: '她说"动画不是一种类型——它是一种媒介。你可以通过动画讲述任何故事。"'

  - id: L535
    type: short-extract
    title: 'The Theme Park Designer'
    titleZh: '主题公园设计师'
    scene: 'You will hear a theme park designer talking about creating rides.'
    sceneZh: '你将听到一位主题公园设计师谈论创造游乐设施。'
    difficulty: 3
    audioFile: 'L535.mp3'
    script:
      - speaker: designer
        voice: echo
        text: 'When I design a ride, I do not start with the technology. I start with the story. What are the guests going to experience? Are they explorers entering a ancient temple? Astronauts launching into space? The story comes first, and then we figure out what technology we need to tell that story.'
      - speaker: designer
        voice: echo
        text: 'The best rides make you forget you are on a ride at all. You genuinely believe, even if just for a moment, that you are flying over London with Peter Pan or escaping from dinosaurs with a team of scientists.'
    question:
      text: 'What does the designer say is most important when creating a ride?'
      textZh: '设计师说在创造游乐设施时什么最重要？'
      options:
        A: 'Using the most advanced technology available.'
        B: 'Starting with a compelling story experience.'
        C: 'Making the ride as fast and thrilling as possible.'
      answer: 'B'
      explanation: '"I start with the story" and "The story comes first, and then we figure out what technology we need."'
      explanationZh: '"我从故事开始"以及"故事先行，然后我们确定需要什么技术来讲述那个故事。"'

  - id: L536
    type: short-extract
    title: 'The Children''s Author'
    titleZh: '儿童作家'
    scene: 'You will hear a children''s book author discussing her writing process.'
    sceneZh: '你将听到一位儿童书作家讨论她的写作过程。'
    difficulty: 2
    audioFile: 'L536.mp3'
    script:
      - speaker: author
        voice: shimmer
        text: 'People always ask where I get my ideas from. The honest answer is: everywhere. I get ideas from overhearing conversations on the bus, from dreams, from random "what if" questions. My best book started with a single question: what if your shadow could come alive and have its own personality?'
      - speaker: author
        voice: shimmer
        text: 'The hardest part is not getting ideas — it is choosing which idea to develop. I have a notebook with over two hundred story ideas, but only a few of them have the potential to become a full book. The test is simple: if I am still thinking about an idea three weeks later, it is worth writing.'
    question:
      text: 'How does the author decide which ideas to develop into books?'
      textZh: '作者如何决定哪些想法值得发展成书？'
      options:
        A: 'She asks her publisher to choose the best idea.'
        B: 'She writes the first chapter of every idea and sees which one works.'
        C: 'If she is still thinking about an idea after three weeks, she writes it.'
      answer: 'C'
      explanation: '"If I am still thinking about an idea three weeks later, it is worth writing."'
      explanationZh: '"如果三周后我还在想一个想法，它就值得写。"'

  - id: L537
    type: short-extract
    title: 'The Music Festival'
    titleZh: '音乐节'
    scene: 'You will hear a teenager describing her first music festival.'
    sceneZh: '你将听到一个青少年描述她的第一次音乐节经历。'
    difficulty: 2
    audioFile: 'L537.mp3'
    script:
      - speaker: teenager
        voice: shimmer
        text: 'I went to a children''s music festival last summer and it was the best day of my life. There were five different stages with bands playing all day long. But the best part was not the famous bands — it was a small stage at the back where kids could perform their own songs. I watched a ten-year-old boy play guitar and sing a song he had written himself, and the entire crowd cheered for him.'
      - speaker: teenager
        voice: shimmer
        text: 'That moment showed me that music is not about being famous — it is about sharing something you have created with other people.'
    question:
      text: 'What was the highlight of the festival for the teenager?'
      textZh: '音乐节的亮点对这个青少年来说是什么？'
      options:
        A: 'Seeing a famous band perform on the main stage.'
        B: 'Watching a young boy perform his own song to a cheering crowd.'
        C: 'Buying merchandise from her favourite artists.'
      answer: 'B'
      explanation: 'She says "the best part" was seeing a "ten-year-old boy play guitar and sing a song he had written himself."'
      explanationZh: '她说"最好的部分"是看到一个"十岁男孩弹吉他并唱了一首自己写的歌"。'

  - id: L538
    type: short-extract
    title: 'The Museum Curator'
    titleZh: '博物馆策展人'
    scene: 'You will hear a museum curator talking about making art accessible to children.'
    sceneZh: '你将听到一位博物馆策展人谈论让孩子更容易接触艺术。'
    difficulty: 3
    audioFile: 'L538.mp3'
    script:
      - speaker: curator
        voice: nova
        text: 'For years, art museums were designed for adults — quiet rooms with white walls and signs saying "do not touch." It is no wonder children found them boring. So we have completely redesigned our children''s gallery. We have interactive screens where kids can create their own digital art inspired by the paintings on the walls.'
      - speaker: curator
        voice: nova
        text: 'We also have a "Mystery Painting" trail where children use clues to find specific artworks around the museum. Since we introduced these changes, the number of families visiting has tripled. Children are not just tolerating the museum — they are begging to come back.'
    question:
      text: 'What changes did the museum make to attract more children?'
      textZh: '博物馆做了什么改变来吸引更多孩子？'
      options:
        A: 'They removed all the old paintings and replaced them.'
        B: 'They added interactive screens and a mystery trail for children.'
        C: 'They reduced the price of tickets for families.'
      answer: 'B'
      explanation: 'The museum added "interactive screens where kids can create digital art" and "a Mystery Painting trail."'
      explanationZh: '博物馆增加了"孩子可以创作数字艺术的互动屏幕"和"神秘画作探索路线"。'

  - id: L539
    type: short-extract
    title: 'The Podcast Reviewer'
    titleZh: '播客评论人'
    scene: 'You will hear a boy explaining why he loves reviewing podcasts.'
    sceneZh: '你将听到一个男孩解释为什么他喜欢评论播客。'
    difficulty: 2
    audioFile: 'L539.mp3'
    script:
      - speaker: boy
        voice: fable
        text: 'Most of my friends review movies and games, but I review podcasts. I think they are an underrated form of entertainment. A really good podcast can be just as gripping as a TV show. My favourite is a mystery series where each episode reveals a new clue, and listeners can try to solve the case before the detective does.'
      - speaker: boy
        voice: fable
        text: 'What I love about reviewing podcasts is that very few other people do it. My reviews actually help people discover shows they would never have found otherwise. It feels like I am doing something useful.'
    question:
      text: 'Why does the boy enjoy reviewing podcasts specifically?'
      textZh: '男孩为什么特别喜欢评论播客？'
      options:
        A: 'Podcasts are easier to review than films.'
        B: 'Few people review podcasts, so his reviews help others discover new shows.'
        C: 'Podcasts pay him to write reviews.'
      answer: 'B'
      explanation: '"Very few other people do it. My reviews actually help people discover shows they would never have found otherwise."'
      explanationZh: '"很少有人做这件事。我的评论真的帮助人们发现他们否则永远找不到的节目。"'

  - id: L540
    type: short-extract
    title: 'The Ballet Dancer'
    titleZh: '芭蕾舞者'
    scene: 'You will hear a young ballet dancer talking about performing on stage.'
    sceneZh: '你将听到一位年轻芭蕾舞者谈论在舞台上表演。'
    difficulty: 2
    audioFile: 'L540.mp3'
    script:
      - speaker: dancer
        voice: shimmer
        text: 'The first time I performed on a real stage, I was so nervous that I almost could not move. But then the music started, and something incredible happened — my body just knew what to do. All those hours of practice in the studio took over, and suddenly I was not thinking about the steps any more. I was just feeling the music and telling the story.'
      - speaker: dancer
        voice: shimmer
        text: 'That is what my teacher means when she says "the stage is where practice becomes art." In the studio, you learn the technique. On stage, you find the emotion.'
    question:
      text: 'What does the dancer mean by "the stage is where practice becomes art"?'
      textZh: '舞者说"舞台是练习变成艺术的地方"是什么意思？'
      options:
        A: 'Performers need to practise on stage, not in studios.'
        B: 'Technical skills learned in practice combine with emotion in performance.'
        C: 'Stage performances are always better than rehearsals.'
      answer: 'B'
      explanation: '"In the studio, you learn the technique. On stage, you find the emotion." Practice provides skill; performance adds feeling.'
      explanationZh: '"在工作室里，你学习技巧。在舞台上，你找到情感。"练习提供技能；表演增加感情。'

  - id: L541
    type: short-extract
    title: 'The Board Game Enthusiast'
    titleZh: '桌游爱好者'
    scene: 'You will hear a father talking about why his family plays board games.'
    sceneZh: '你将听到一位父亲谈论为什么他的家人玩桌游。'
    difficulty: 2
    audioFile: 'L541.mp3'
    script:
      - speaker: father
        voice: echo
        text: 'Every Friday evening, our family plays a board game together. No phones, no tablets, no TV — just the four of us around the kitchen table. Some people think board games are old-fashioned, but I think they are more important than ever. My children learn to take turns, handle losing gracefully, and think strategically.'
      - speaker: father
        voice: echo
        text: 'But honestly, the real reason we play is not educational. It is because those Friday evenings are the best conversations we have all week. Something about sitting face-to-face and playing a game together makes everyone open up and talk.'
    question:
      text: 'What does the father say is the main benefit of family board game nights?'
      textZh: '父亲说家庭桌游之夜的主要好处是什么？'
      options:
        A: 'It teaches children to be more competitive.'
        B: 'It creates opportunities for meaningful family conversation.'
        C: 'It helps children improve their maths skills.'
      answer: 'B'
      explanation: '"The real reason we play" is that "those Friday evenings are the best conversations we have all week."'
      explanationZh: '"我们玩的真正原因"是"那些周五晚上是我们一整周最好的对话。"'

  - id: L542
    type: short-extract
    title: 'The Film Adaptation Debate'
    titleZh: '电影改编之争'
    scene: 'You will hear two friends discussing whether the book or film version of a story is better.'
    sceneZh: '你将听到两个朋友讨论书还是电影版本更好。'
    difficulty: 3
    audioFile: 'L542.mp3'
    script:
      - speaker: friend1
        voice: fable
        text: 'I always say the book is better than the film. When you read, you create your own pictures in your mind. The characters look exactly how YOU imagine them. But in a film, someone else decides everything for you.'
      - speaker: friend2
        voice: shimmer
        text: 'I understand that, but films can do things books cannot. Music, sound effects, facial expressions — these add a whole new layer to the story. When I watched the Harry Potter films after reading the books, Hogwarts came alive in a way my imagination could not quite match.'
    question:
      text: 'What does Friend 2 argue in favour of films?'
      textZh: '朋友2为电影提出了什么论点？'
      options:
        A: 'Films are always more accurate than books.'
