      explanation: '"My only criticism is the price. It costs about fifteen dollars, which is quite a lot for an app."'
      explanationZh: '"我唯一的批评是价格。大约十五美元，对于一个应用来说相当贵。"'

  - id: L545
    type: short-extract
    title: 'The Library Storyteller'
    titleZh: '图书馆讲故事的人'
    scene: 'You will hear a librarian talking about her weekly storytelling sessions.'
    sceneZh: '你将听到一位图书管理员谈论她的每周讲故事环节。'
    difficulty: 2
    audioFile: 'L545.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'Every Saturday morning, I read stories aloud to a group of children at the library. Some people ask why storytelling still matters when children can watch videos on their tablets. My answer is simple: when I read aloud, the children have to CREATE the pictures in their own minds. This develops their imagination in a way that watching a screen simply cannot.'
      - speaker: librarian
        voice: nova
        text: 'I also use different voices for each character and ask the children to predict what will happen next. By the end, they are not just listeners — they are active participants in the story.'
    question:
      text: 'Why does the librarian think read-aloud storytelling is important?'
      textZh: '图书管理员为什么认为大声朗读讲故事很重要？'
      options:
