      - id: Speaker1
        text: 'The key is specificity. Do not just say "the acting was good." Say "the way the actress conveyed her grief in the final scene through a single tear was extraordinary." Specific details make your review credible and interesting.'
      - id: Speaker2
        text: 'I always think about my reader. Who am I writing for? If I am writing for a school magazine, I use a friendly tone. If I am writing for a website, I need to explain more background because the readers might not know the book.'
      - id: Speaker3
        text: 'Balance is everything. I start with something positive, then mention something that could be improved, and end on a positive note again. This sandwich structure keeps the review fair and professional.'
      - id: Speaker4
        text: 'The opening sentence is the most important part. If your first line is boring, nobody will read the rest. I always start with a question, a surprising fact, or a vivid image — something that makes the reader curious.'
      - id: Speaker5
        text: 'I compare the thing I am reviewing to something the reader already knows. Instead of saying "this game is fun," I say "if you enjoyed Zelda, you will love this because it has the same sense of exploration." Comparisons give the reader a reference point.'
    questions:
      - text: 'Which speaker emphasises using detailed examples in reviews?'
        textZh: '哪位说话者强调在评论中使用详细的例子？'
        answer: 'Speaker 1'
        explanation: 'Speaker 1 says "Do not just say the acting was good" and gives a specific example about an actress''s tear.'
        explanationZh: '说话者1说"不要只说演技好"并给出了关于女演员一滴泪的具体例子。'
      - text: 'Which speaker focuses on understanding the target audience?'
        textZh: '哪位说话者关注理解目标读者？'
        answer: 'Speaker 2'
        explanation: 'Speaker 2 asks "Who am I writing for?" and adjusts tone based on the publication.'
        explanationZh: '说话者2问"我在为谁写？"并根据出版物调整语气。'
      - text: 'Which speaker recommends starting with a hook?'
        textZh: '哪位说话者建议以一个引子开头？'
        answer: 'Speaker 4'
        explanation: 'Speaker 4 says "The opening sentence is the most important part" and suggests starting with a question or surprise.'
        explanationZh: '说话者4说"开头句是最重要的部分"并建议以问题或惊喜开头。'
      - text: 'Which speaker uses a "sandwich" structure?'
        textZh: '哪位说话者使用"三明治"结构？'
        answer: 'Speaker 3'
        explanation: 'Speaker 3 describes the positive-negative-positive "sandwich structure."'
        explanationZh: '说话者3描述了正面-负面-正面的"三明治结构"。'
      - text: 'Which speaker uses comparisons to help readers understand?'
        textZh: '哪位说话者使用比较来帮助读者理解？'
        answer: 'Speaker 5'
        explanation: 'Speaker 5 says "I compare the thing I am reviewing to something the reader already knows" and gives a Zelda example.'
        explanationZh: '说话者5说"我将我评论的东西与读者已经知道的东西进行比较"并给出了塞尔达的例子。'

