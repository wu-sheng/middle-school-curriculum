  - id: L543
    type: short-extract
    title: 'The Street Musician'
    titleZh: '街头音乐家'
    scene: 'You will hear a street musician talking about performing in public.'
    sceneZh: '你将听到一位街头音乐家谈论在公共场合表演。'
    difficulty: 2
    audioFile: 'L543.mp3'
    script:
      - speaker: musician
        voice: echo
        text: 'Playing music on the street is completely different from playing in a concert hall. In a concert hall, the audience came to listen. On the street, you have to MAKE them stop and listen. You only have about ten seconds to catch someone''s attention before they walk past.'
      - speaker: musician
        voice: echo
        text: 'But the reward is incredible. When a child stops, tugs their parent''s sleeve, and starts dancing to my music — that is the best feeling in the world. Those are my favourite audience members.'
    question:
      text: 'What does the musician find most rewarding about street performing?'
      textZh: '音乐家认为街头表演最有成就感的是什么？'
      options:
        A: 'Earning money from passers-by.'
        B: 'When children stop and dance to his music.'
        C: 'Playing in front of very large crowds.'
      answer: 'B'
      explanation: '"When a child stops, tugs their parent''s sleeve, and starts dancing to my music — that is the best feeling in the world."'
      explanationZh: '"当一个孩子停下来，拉着父母的袖子，开始随着我的音乐跳舞——那是世界上最好的感觉。"'

  - id: L544
    type: short-extract
    title: 'The App Review'
    titleZh: '应用评论'
    scene: 'You will hear a girl reviewing a drawing app she has been using.'
