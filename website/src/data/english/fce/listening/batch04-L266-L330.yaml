        voice: echo
        text: 'Jeff Kinney, the author of Diary of a Wimpy Kid, originally wanted to be a newspaper cartoonist. He started writing the Wimpy Kid story in nineteen ninety-eight as an online comic on a website called Funbrain. He worked on it for eight years before it was published as a book in two thousand and seven.'
      - speaker: narrator
        voice: echo
        text: 'The book became an instant bestseller, eventually selling over two hundred and fifty million copies worldwide. It has been translated into sixty-five languages. Kinney says the secret of the series is that Greg Heffley, the main character, is not a hero. He is selfish, lazy, and makes terrible decisions. But readers love him because he is honest about his flaws — and because most people secretly recognise a little bit of Greg in themselves.'
      - speaker: narrator
