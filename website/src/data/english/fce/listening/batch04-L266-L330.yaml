    difficulty: 3
    audioFile: 'L298.mp3'
    script:
      - speaker: lecturer
        voice: fable
        text: 'Fairy tales are far older than most people realise. Researchers at Durham University have used techniques from evolutionary biology to trace the origins of common fairy tales. Their findings suggest that some stories — including Beauty and the Beast and Rumpelstiltskin — may be over four thousand years old.'
      - speaker: lecturer
        voice: fable
        text: 'For most of history, fairy tales were not written down. They were told aloud, passed from parent to child, from village to village. The first major collection of fairy tales was published in Italy by Giambattista Basile in sixteen thirty-four. His collection, called The Tale of Tales, included early versions of Cinderella, Sleeping Beauty, and Rapunzel.'
      - speaker: lecturer
        voice: fable
        text: 'The Brothers Grimm, Jacob and Wilhelm, published their famous collection in Germany in eighteen twelve. But they did not invent the stories — they collected them from ordinary people. Many of the original versions were surprisingly dark and violent. The brothers gradually softened them for younger audiences in later editions.'
      - speaker: lecturer
        voice: fable
        text: 'Disney transformed fairy tales again in the twentieth century, creating animated versions that emphasised romance and happy endings. But in recent years, there has been a movement to return to the darker, more complex original versions, which many believe carry deeper psychological truths.'
    sentences:
