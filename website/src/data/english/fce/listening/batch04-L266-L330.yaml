  - id: L303
    type: sentence-completion
    title: 'Writing Workshop: Tension Building'
    titleZh: '写作工作坊：制造紧张感'
    scene: 'You will hear a writing workshop instructor teaching about building tension.'
    sceneZh: '你将听到一位写作工作坊讲师教授如何制造紧张感。'
    difficulty: 2
    audioFile: 'L303.mp3'
    script:
      - speaker: instructor
        voice: nova
        text: 'Today we are going to learn five techniques for building tension in your stories. These are the tools that keep readers turning pages. Technique number one: the ticking clock. Give your character a deadline. They have ten minutes to escape, three days to find the cure, one hour before the ship sails. Deadlines create urgency.'
      - speaker: instructor
        voice: nova
        text: 'Technique two: short sentences. During tense moments, cut your sentences down to the bone. She ran. The door was locked. Footsteps behind her. Short sentences make the reader''s heart beat faster. Technique three: withhold information. Do not tell the reader what is behind the door — let them imagine. The imagination is always scarier than reality.'
      - speaker: instructor
        voice: nova
        text: 'Technique four: the near miss. Your character almost gets caught, almost falls, almost fails. The word almost is one of the most powerful words in storytelling. Technique five: sensory overload. In tense scenes, describe what the character hears, feels, and smells. Fear heightens the senses — use that in your writing.'
    sentences:
      - id: L303-S1
        text: 'Technique one is the ticking clock, which means giving the character a _____.'
        textZh: '技巧一是倒计时，意思是给角色一个 _____。'
        answer: 'deadline'
      - id: L303-S2
        text: 'Technique two uses _____ sentences to make the reader''s heart beat faster.'
        textZh: '技巧二使用 _____ 句子让读者心跳加速。'
        answer: 'short'
      - id: L303-S3
        text: 'Technique three says the _____ is always scarier than reality.'
        textZh: '技巧三说 _____ 总是比现实更可怕。'
        answer: 'imagination'
      - id: L303-S4
        text: 'Technique four uses the word _____ to create near-miss moments.'
        textZh: '技巧四使用 _____ 这个词来创造惊险时刻。'
        answer: 'almost'
      - id: L303-S5
        text: 'Technique five says that _____ heightens the senses.'
        textZh: '技巧五说 _____ 会增强感官。'
        answer: 'fear'

