        textZh: '随着系列的推进，哈利波特电影在 _____ 和基调上变得更暗。'
        answer: 'colour'

  - id: L298
    type: sentence-completion
    title: 'The History of Fairy Tales'
    titleZh: '童话的历史'
    scene: 'You will hear a lecture about the origins of fairy tales.'
