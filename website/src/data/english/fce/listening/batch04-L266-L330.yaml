  - id: L311
    type: multiple-matching
    title: 'My Favourite Writing Technique'
    titleZh: '我最喜欢的写作技巧'
    scene: 'You will hear five young writers talking about their favourite writing technique.'
    sceneZh: '你将听到五位年轻作家谈论他们最喜欢的写作技巧。'
    difficulty: 2
    audioFile: 'L311.mp3'
    speakers:
      - name: Speaker 1
        text: 'My favourite technique is starting in the middle of the action. Instead of spending ages on backstory, I drop the reader straight into an exciting moment. My latest story begins with the main character hanging off the edge of a cliff. The reader has no idea how she got there — they just want to know what happens next. I fill in the backstory later using flashbacks.'
      - name: Speaker 2
        text: 'I love using the five senses in my descriptions. When I describe a place, I do not just say what it looks like — I describe the sounds, the smells, the temperature, even the taste of the air. It transforms a flat description into a world the reader can step inside. My writing teacher says my settings feel like real places you could visit.'
      - name: Speaker 3
        text: 'For me, it is all about dialogue. I spend hours listening to how real people talk — the pauses, the interruptions, the things they do not say. Then I try to capture that in my writing. Good dialogue is the fastest way to show who a character really is. A nervous person speaks differently from a confident one.'
      - name: Speaker 4
        text: 'I am obsessed with plot twists. I plan my endings first and then work backwards, planting clues throughout the story. The satisfaction of seeing a reader''s face when they reach the twist is incredible. They always say, I should have seen that coming! That means the clues were there but well-hidden.'
      - name: Speaker 5
        text: 'My favourite technique is showing instead of telling. Rather than writing "she was sad," I describe her actions — she stares out the window, she pushes her food around the plate, she avoids eye contact. The reader figures out she is sad without me ever saying the word. It makes the writing so much more powerful.'
    statements:
      A: 'This person creates immersive settings using all five senses.'
      B: 'This person starts stories in the middle of the action.'
      C: 'This person reveals emotions through body language and actions.'
      D: 'This person plans endings first and plants hidden clues.'
      E: 'This person captures realistic speech patterns in conversations.'
      F: 'This person uses metaphors and similes extensively.'
      G: 'This person writes from multiple characters'' perspectives.'
      H: 'This person focuses on creating unusual opening sentences.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'A'
      Speaker 3: 'E'
      Speaker 4: 'D'
      Speaker 5: 'C'
    explanations:
      Speaker 1: 'Speaker 1 says "starting in the middle of the action" and "drop the reader straight into an exciting moment" — starting mid-action (B).'
      Speaker 1Zh: '说话者1说"从动作中间开始"和"把读者直接扔进一个激动人心的时刻"——从动作中开始（B）。'
      Speaker 2: 'Speaker 2 describes using "the sounds, the smells, the temperature" to create settings — five senses (A).'
      Speaker 2Zh: '说话者2描述使用"声音、气味、温度"来创建场景——五感（A）。'
      Speaker 3: 'Speaker 3 listens to "how real people talk — the pauses, the interruptions" — realistic speech (E).'
      Speaker 3Zh: '说话者3听"真人怎么说话——停顿、打断"——真实的说话方式（E）。'
      Speaker 4: 'Speaker 4 plans "endings first and then works backwards, planting clues" — plot twists with hidden clues (D).'
      Speaker 4Zh: '说话者4"先计划结局然后倒推，埋下线索"——带隐藏线索的情节反转（D）。'
      Speaker 5: 'Speaker 5 describes actions instead of naming emotions: "stares out the window, pushes food around" — showing not telling (C).'
      Speaker 5Zh: '说话者5描述动作而不是说出情感："盯着窗外看、拨弄食物"——展示而非叙述（C）。'

  - id: L312
    type: multiple-matching
    title: 'What Inspired My Story'
    titleZh: '什么启发了我的故事'
    scene: 'You will hear five students talking about what inspired their latest story.'
