        text: 'My story was inspired by a dream I had. I dreamed I was walking through a library where the books were alive — they whispered to each other when nobody was looking. When I woke up, I immediately wrote it down and turned it into a story about a girl who discovers that library books hold the memories of everyone who has ever read them.'
      - name: Speaker 2
        text: 'I got my idea from a news article about a woman who found a message in a bottle on a beach. The message had been floating for forty-seven years! I thought, what if the message contained a warning about something that was about to happen? That became the starting point of my mystery story.'
      - name: Speaker 3
        text: 'My story came from a family legend. My grandmother always said that our great-great-grandfather buried a box of gold coins somewhere in the garden of our old family house. Nobody has ever found them. I wrote a story about a girl who follows clues left in old family photographs to find a hidden treasure.'
      - name: Speaker 4
        text: 'I was inspired by a place. We went on holiday to the Scottish Highlands last summer and I saw a ruined castle on a tiny island in the middle of a lake. The mist was swirling around it and it looked like something from a fairy tale. I started writing as soon as we got back to the hotel.'
      - name: Speaker 5
        text: 'Honestly? My story came from being bored in a maths lesson. I was staring out of the window and I noticed a single red balloon drifting past. Where had it come from? Where was it going? Who had let it go? I built a whole story around that balloon — it travels across the country, and every person who sees it makes a wish.'
