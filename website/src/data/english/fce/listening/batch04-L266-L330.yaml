  - id: L297
    type: sentence-completion
    title: 'How Stories Are Made into Films'
    titleZh: '故事如何被改编成电影'
    scene: 'You will hear a talk about how books are adapted into films.'
    sceneZh: '你将听到一个关于书如何被改编成电影的讲座。'
    difficulty: 2
    audioFile: 'L297.mp3'
    script:
      - speaker: narrator
        voice: fable
        text: 'Turning a book into a film is one of the most difficult jobs in the entertainment industry. The process usually begins when a film studio buys the rights to a book. The rights for a popular novel can cost anywhere from fifty thousand to several million pounds.'
      - speaker: narrator
        voice: fable
        text: 'Next, a screenwriter is hired to write the script. This is where most of the changes happen. An average novel takes about ten hours to read, but a typical film is only two hours long. The screenwriter must decide what to keep and what to remove.'
      - speaker: narrator
        voice: fable
        text: 'Characters are often combined — two or three book characters might become a single film character. Subplots are removed to save time. Inner thoughts must be turned into visual actions because cameras cannot film what a character is thinking.'
      - speaker: narrator
        voice: fable
        text: 'The casting process comes next. Finding the right actors is crucial because they must bring the characters to life in a way that matches readers'' imaginations. When Daniel Radcliffe was chosen to play Harry Potter, the producers auditioned over sixteen thousand young actors.'
      - speaker: narrator
        voice: fable
        text: 'Finally, the director decides the visual style of the film — the colours, the camera angles, the music. A skilled director can make the same story feel completely different. The Harry Potter films, for example, became noticeably darker in both colour and tone as the series progressed, reflecting Harry''s growing awareness of danger.'
