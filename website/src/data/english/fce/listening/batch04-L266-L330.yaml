  - id: L301
    type: sentence-completion
    title: 'The Art of Foreshadowing'
    titleZh: '伏笔的艺术'
    scene: 'You will hear a teacher explaining foreshadowing with examples from famous books.'
    sceneZh: '你将听到一位老师用著名书籍的例子解释伏笔。'
    difficulty: 3
    audioFile: 'L301.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Foreshadowing is one of the cleverest techniques in storytelling. It means dropping hints early in a story about something that will happen later. When done well, the reader does not notice the hint on first reading — but after the surprise, they think back and realise the clue was there all along.'
      - speaker: teacher
        voice: nova
        text: 'In Harry Potter and the Philosopher''s Stone, the Sorting Hat considers putting Harry in Slytherin. This seems like a small detail at the time, but it foreshadows the deeper connection between Harry and Voldemort that is revealed in later books. In The Hunger Games, Katniss practises archery from a young age to feed her family. This skill later saves her life in the arena — it was not random; it was carefully foreshadowed.'
      - speaker: teacher
        voice: nova
        text: 'For your own stories, try this technique: write your ending first. Then go back to the beginning and plant two or three small clues that point towards that ending. The clues should look like ordinary details on first reading. Only after the ending should the reader go oh, now I understand! That moment of realisation is incredibly satisfying for readers.'
    sentences:
      - id: L301-S1
        text: 'Foreshadowing means dropping _____ early in a story about future events.'
        textZh: '伏笔意味着在故事早期为未来事件留下 _____。'
        answer: 'hints'
      - id: L301-S2
        text: 'The Sorting Hat considered putting Harry in _____.'
        textZh: '分院帽曾考虑把Harry分到 _____。'
        answer: 'Slytherin'
      - id: L301-S3
        text: 'Katniss practises _____ from a young age to feed her family.'
        textZh: 'Katniss从小就练习 _____ 来养活家人。'
        answer: 'archery'
      - id: L301-S4
        text: 'The teacher suggests writing your _____ first, then going back to plant clues.'
        textZh: '老师建议先写 _____，然后回头埋下线索。'
        answer: 'ending'
      - id: L301-S5
        text: 'You should plant two or _____ small clues that point towards the ending.'
        textZh: '你应该埋下两到 _____ 个指向结局的小线索。'
        answer: 'three'

  - id: L302
