  - id: L305
    type: sentence-completion
    title: 'Writing Dialogue'
    titleZh: '写对话'
    scene: 'You will hear a writing teacher giving a lesson on writing effective dialogue.'
    sceneZh: '你将听到一位写作老师讲授如何写有效的对话。'
    difficulty: 2
    audioFile: 'L305.mp3'
    script:
      - speaker: teacher
        voice: fable
        text: 'Good dialogue is one of the hardest things to write well. Here are four rules to remember. Rule one: real people do not speak in complete, perfect sentences. They interrupt, they trail off, they change the subject. Your dialogue should sound like real speech, not like a textbook.'
      - speaker: teacher
        voice: fable
        text: 'Rule two: every line of dialogue should do at least one of three things — reveal character, advance the plot, or create tension. If a line does none of these, cut it. Rule three: do not use dialogue to give information the characters already know. If two characters are brothers, do not write "As you know, we are brothers." That sounds ridiculous.'
      - speaker: teacher
        voice: fable
        text: 'Rule four: use "said" more than you think you should. Beginning writers fill their dialogue with "exclaimed," "declared," "proclaimed." The word "said" is invisible to readers — they skip right over it and focus on the words being spoken. Only use alternatives like "whispered" or "snapped" when the manner of speaking is important to the scene.'
    sentences:
      - id: L305-S1
        text: 'Real people do not speak in complete, _____ sentences.'
        textZh: '真人说话不会用完整的、_____ 的句子。'
        answer: 'perfect'
      - id: L305-S2
        text: 'Every line should reveal character, advance the plot, or create _____.'
        textZh: '每一行应该揭示角色、推进情节或创造 _____。'
        answer: 'tension'
      - id: L305-S3
        text: 'Rule three warns against using dialogue to give _____ the characters already know.'
        textZh: '规则三警告不要用对话给出角色已经知道的 _____。'
        answer: 'information'
      - id: L305-S4
