    script:
      - speaker: teacher
        voice: nova
        text: 'Some of you have asked me what the difference is between poetry and stories. Both use words to create emotions, but they do it in different ways. A story unfolds over time — it has a beginning, middle, and end. A poem captures a single moment or feeling, like a photograph.'
      - speaker: teacher
        voice: nova
        text: 'In a story, you have room to develop characters and build a plot. In a poem, every single word carries enormous weight — you might have only fourteen lines to say everything. A poem is like a diamond — small, but every surface reflects light. A story is like a river — it flows and carries you somewhere new.'
      - speaker: teacher
        voice: nova
        text: 'But here is the interesting thing: the best stories use poetic techniques — imagery, metaphor, rhythm. And the best poems tell a story. So the two forms are not as different as you might think. Learning to write poetry will make you a better storyteller, and learning to write stories will make you a better poet.'
