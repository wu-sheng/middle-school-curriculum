      - speaker: student
        voice: echo
        text: 'Maus by Art Spiegelman tells the true story of his father''s experience during the Holocaust, using mice and cats as characters. It won the Pulitzer Prize in nineteen ninety-two — the first graphic novel ever to receive this award. Persepolis by Marjane Satrapi tells her story of growing up during the Iranian Revolution. These are serious, important books.'
