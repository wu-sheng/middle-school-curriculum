        text: 'Basile''s collection was called The Tale of _____.'
        textZh: 'Basile的合集叫做 _____ 之故事。'
        answer: 'Tales'
      - id: L298-S4
        text: 'The Brothers Grimm published their collection in eighteen _____.'
        textZh: '格林兄弟在一八 _____ 年出版了他们的合集。'
        answer: 'twelve'
      - id: L298-S5
