# FCE Daily Listening Practice — Month 5, Batch 04
# 65 exercises (L266–L330)
# L266–L295: Part 1 short extracts (30 exercises, difficulty 2-3)
# L296–L310: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L311–L330: Part 3 multiple matching (20 exercises, difficulty 2-3)
# Theme: Storytelling / Creative Writing / Narrative Craft for 8-9 year old learners

extracts:
  # ============================================================
  # L266–L295: Part 1 — Short Extracts (Storytelling Theme)
  # ============================================================

  - id: L266
    type: short-extract
    title: 'The Writing Competition'
    titleZh: '写作比赛'
    scene: 'You will hear a girl telling her friend about a writing competition she entered.'
    sceneZh: '你将听到一个女孩告诉朋友她参加的一个写作比赛。'
    difficulty: 2
    audioFile: 'L266.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Guess what? I entered the Young Writers'' Competition last month and I actually won second prize! I wrote a story about a girl who finds a magic paintbrush that brings her drawings to life.'
      - speaker: boy
        voice: echo
        text: 'That sounds amazing! What was the prize?'
      - speaker: girl
        voice: shimmer
        text: 'Well, the first prize was a hundred pounds worth of books, but I was actually happier with my prize — a one-day workshop with a real children''s author. She taught us about creating believable characters and building suspense. I learned more in that one day than I had in months of writing on my own.'
    question:
      text: 'Why was the girl happy with her prize?'
      textZh: '女孩为什么对她的奖品感到高兴？'
      options:
        A: 'She received a large amount of money.'
        B: 'She got to learn from a professional author.'
        C: 'She won the first prize in the competition.'
      answer: 'B'
      explanation: 'The girl says she was "happier with my prize — a one-day workshop with a real children''s author" and "learned more in that one day than in months."'
      explanationZh: '女孩说她对自己的奖品"更高兴——和一位真正的儿童作家一起上一天的工作坊"，并且"在那一天学到的比几个月自学的还多"。'

  - id: L267
    type: short-extract
    title: 'The Story Idea'
    titleZh: '故事创意'
    scene: 'You will hear a boy explaining where he gets his story ideas.'
    sceneZh: '你将听到一个男孩解释他从哪里获得故事创意。'
    difficulty: 2
    audioFile: 'L267.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'People always ask me where I get my ideas, and I never know what to say because they come from everywhere. Sometimes I overhear a conversation on the bus and think, what if that person had a secret? Sometimes I see something strange — like a single shoe on the side of the road — and I wonder, how did it get there? What happened to the person wearing it?'
      - speaker: boy
        voice: echo
        text: 'But honestly, the best ideas come right before I fall asleep. My brain just starts connecting random things together. Last night I thought: what if libraries had a secret underground level where banned books come alive? I jumped out of bed and wrote it down before I forgot.'
    question:
      text: 'When does the boy say he gets his best ideas?'
      textZh: '男孩说他什么时候获得最好的创意？'
      options:
        A: 'While riding the bus and listening to conversations.'
        B: 'Right before falling asleep at night.'
        C: 'While walking and seeing unusual things on the road.'
      answer: 'B'
      explanation: 'The boy says "the best ideas come right before I fall asleep" when his "brain starts connecting random things together."'
      explanationZh: '男孩说"最好的创意在我快要睡着之前出现"，那时他的"大脑开始把随机的东西联系在一起"。'

  - id: L268
    type: short-extract
    title: 'Favourite Book Character'
    titleZh: '最喜欢的书中角色'
    scene: 'You will hear a girl talking about her favourite book character.'
    sceneZh: '你将听到一个女孩谈论她最喜欢的书中角色。'
    difficulty: 2
    audioFile: 'L268.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'My favourite character is Matilda from Roald Dahl''s book. I love her because she is just a normal girl living in an ordinary house, but she is extraordinarily clever and brave. What I like most is that she does not use violence or shouting to solve her problems — she uses her intelligence and her love of reading.'
      - speaker: girl
        voice: shimmer
        text: 'Some people say the best characters are the ones who can fight dragons or cast spells, but I think the best characters are the ones who remind you that ordinary people can do extraordinary things. Matilda makes me believe that I can change things too, just by being smart and kind.'
    question:
      text: 'What does the girl admire most about Matilda?'
      textZh: '女孩最欣赏玛蒂尔达什么？'
      options:
        A: 'Her ability to cast magical spells.'
        B: 'Her intelligence and non-violent problem-solving.'
        C: 'Her bravery in fighting dragons.'
      answer: 'B'
      explanation: 'The girl says Matilda "uses her intelligence and her love of reading" rather than "violence or shouting" to solve problems.'
      explanationZh: '女孩说玛蒂尔达"使用她的智慧和对阅读的热爱"而不是"暴力或大喊"来解决问题。'

  - id: L269
    type: short-extract
    title: 'The Writing Routine'
    titleZh: '写作习惯'
    scene: 'You will hear a young author describing her daily writing routine.'
    sceneZh: '你将听到一位年轻作者描述她的日常写作习惯。'
    difficulty: 2
    audioFile: 'L269.mp3'
    script:
      - speaker: author
        voice: nova
        text: 'I write every morning from seven until nine, before school starts. A lot of people think you need to feel inspired to write, but that is not true. Most mornings I sit down and the words come slowly at first — sometimes I stare at the screen for ten minutes before anything happens.'
      - speaker: author
        voice: nova
        text: 'The trick is to keep going even when the writing feels terrible. I read once that the famous author Ernest Hemingway said the first draft of anything is rubbish. That makes me feel better. I just get the words down, and then I fix them later. The fixing — the rewriting — is actually the part I enjoy most. That is when the story really starts to come alive.'
    question:
      text: 'What does the author enjoy most about writing?'
      textZh: '作者最享受写作的哪个部分？'
      options:
        A: 'The moment of first inspiration when ideas come easily.'
        B: 'The rewriting process where the story improves.'
        C: 'Reading her finished stories to friends and family.'
      answer: 'B'
      explanation: 'She says "The fixing — the rewriting — is actually the part I enjoy most. That is when the story really starts to come alive."'
      explanationZh: '她说"修改——重写——其实是我最享受的部分。那时故事才真正开始变得鲜活。"'

  - id: L270
    type: short-extract
    title: 'Why Stories Matter'
    titleZh: '为什么故事很重要'
    scene: 'You will hear a teacher explaining to students why stories are important.'
    sceneZh: '你将听到一位老师向学生解释为什么故事很重要。'
    difficulty: 2
    audioFile: 'L270.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Have you ever finished a book and felt like you had lost a friend? That feeling is proof that stories are powerful. When we read about characters who are different from us — who live in different countries, different time periods, or even different worlds — we learn to see life from their perspective.'
      - speaker: teacher
        voice: nova
        text: 'Scientists have actually studied this. They found that people who read fiction regularly are better at understanding other people''s emotions in real life. Reading stories literally makes you more empathetic. So the next time someone tells you that reading is a waste of time, you can tell them: reading stories makes me a better human being.'
    question:
      text: 'According to the teacher, what does reading fiction do for people?'
      textZh: '根据老师说的，阅读小说对人有什么作用？'
      options:
        A: 'It helps them write better essays in school.'
        B: 'It makes them better at understanding other people''s emotions.'
        C: 'It teaches them facts about history and science.'
      answer: 'B'
      explanation: 'The teacher says "people who read fiction regularly are better at understanding other people''s emotions" — reading makes you "more empathetic."'
      explanationZh: '老师说"经常阅读小说的人更善于理解他人的情感"——阅读让你"更有同理心"。'

  - id: L271
    type: short-extract
    title: 'The Scary Story Club'
    titleZh: '恐怖故事俱乐部'
    scene: 'You will hear a boy talking about a story club he started at school.'
    sceneZh: '你将听到一个男孩谈论他在学校创建的故事俱乐部。'
    difficulty: 2
    audioFile: 'L271.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I started a scary story club at school. Every Friday lunchtime, about fifteen of us sit in a circle and take turns telling scary stories. The rule is that you cannot read from a book — you have to tell the story from memory or make one up on the spot.'
      - speaker: boy
        voice: echo
        text: 'At first, everyone''s stories were just about ghosts jumping out and saying boo. But after a few weeks, they got much better. People started using sound effects, pausing at just the right moment, and building suspense before the scary part. The best storyteller is actually Maya — she never raises her voice. She whispers the whole story, and somehow that is ten times more frightening.'
    question:
      text: 'Why is Maya considered the best storyteller in the club?'
      textZh: '为什么Maya被认为是俱乐部里最好的讲故事者？'
      options:
        A: 'She tells the longest and most complicated stories.'
        B: 'She uses props and costumes to make stories more realistic.'
        C: 'She whispers the whole story, which creates more suspense.'
      answer: 'C'
      explanation: 'The boy says Maya "never raises her voice. She whispers the whole story, and somehow that is ten times more frightening."'
      explanationZh: '男孩说Maya"从不提高声音。她全程耳语，不知为什么那要恐怖十倍。"'

  - id: L272
    type: short-extract
    title: 'Choosing a Book'
    titleZh: '选书'
    scene: 'You will hear a librarian giving advice on how to choose a good book.'
    sceneZh: '你将听到一位图书管理员给出如何选好书的建议。'
    difficulty: 2
    audioFile: 'L272.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'The best way to find a book you will love is what I call the "first page test." Pick up a book, read the first page, and ask yourself three questions. First, does the opening grab your attention? Second, can you picture the scene in your mind? Third, do you want to know what happens next?'
      - speaker: librarian
        voice: nova
        text: 'If you answer yes to all three, take the book home. If you answer no to two or more, put it back and try another one. There is no rule that says you have to finish every book you start. Life is too short for boring books. But give every book at least three chapters before you decide — sometimes the best stories take a little time to get going.'
    question:
      text: 'What advice does the librarian give about books you find boring at first?'
      textZh: '图书管理员对一开始觉得无聊的书给出什么建议？'
      options:
        A: 'Stop reading immediately and choose a different book.'
        B: 'Read at least three chapters before deciding to stop.'
        C: 'Ask a friend to read it and give you a summary.'
      answer: 'B'
      explanation: 'The librarian says "give every book at least three chapters before you decide — sometimes the best stories take a little time to get going."'
      explanationZh: '图书管理员说"在你决定之前至少给每本书三章的机会——有时最好的故事需要一点时间才能发展起来。"'

  - id: L273
    type: short-extract
    title: 'The Plot Twist'
    titleZh: '情节反转'
    scene: 'You will hear two friends discussing a book they both read.'
    sceneZh: '你将听到两个朋友讨论他们都读过的一本书。'
    difficulty: 2
    audioFile: 'L273.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I just finished The Midnight Garden and I cannot stop thinking about the ending. I did not see that twist coming at all! The whole time I thought the gardener was the villain, but he was actually trying to protect the children.'
      - speaker: boy
        voice: echo
        text: 'I know! But if you go back and reread chapter three, all the clues are there. The gardener keeps locking the gate — we thought he was keeping the children out, but he was actually keeping something dangerous in. The author was so clever.'
      - speaker: girl
        voice: shimmer
        text: 'That is what makes a really good plot twist — it surprises you, but when you think about it, it makes perfect sense. It is fair. Nothing comes out of nowhere.'
    question:
      text: 'What makes a good plot twist, according to the girl?'
      textZh: '根据女孩的说法，什么构成好的情节反转？'
      options:
        A: 'It should be completely random so nobody can predict it.'
        B: 'It should be surprising but make sense when you look back at the clues.'
        C: 'It should happen at the very beginning of the story.'
      answer: 'B'
      explanation: 'The girl says a good twist "surprises you, but when you think about it, it makes perfect sense. It is fair. Nothing comes out of nowhere."'
      explanationZh: '女孩说好的反转"让你惊讶，但当你想想时，它完全合理。它是公平的。没有什么是凭空出现的。"'

  - id: L274
    type: short-extract
    title: 'The Five Senses Exercise'
    titleZh: '五感练习'
    scene: 'You will hear a writing teacher explaining a classroom exercise.'
    sceneZh: '你将听到一位写作老师解释一个课堂练习。'
    difficulty: 2
    audioFile: 'L274.mp3'
    script:
      - speaker: teacher
        voice: fable
        text: 'Today we are going to do something different. I want you to close your eyes and imagine you are standing on a beach. Now, I am going to ask you questions, and I want you to write down your answers without opening your eyes.'
      - speaker: teacher
        voice: fable
        text: 'What can you see? What colours, what shapes? What can you hear? Is it quiet or noisy? What can you feel? Is the sand hot or cool? What can you smell? Is there a salty breeze? Now open your eyes and look at what you have written. That is sensory writing — describing a place using all five senses. Your readers cannot visit the beach, but if you describe it well enough, they will feel like they are there. That is the magic of good descriptive writing.'
    question:
      text: 'What is the purpose of the exercise?'
      textZh: '这个练习的目的是什么？'
      options:
        A: 'To help students memorise vocabulary about the beach.'
        B: 'To teach students how to describe places using sensory details.'
        C: 'To test whether students can write with their eyes closed.'
      answer: 'B'
      explanation: 'The teacher says the exercise teaches "sensory writing — describing a place using all five senses" to make readers "feel like they are there."'
      explanationZh: '老师说这个练习教授"感官写作——使用五种感官描述一个地方"，让读者"感觉自己在那里"。'

  - id: L275
    type: short-extract
    title: 'The Dialogue Workshop'
    titleZh: '对话工作坊'
    scene: 'You will hear a student describing what she learned at a dialogue workshop.'
    sceneZh: '你将听到一个学生描述她在对话工作坊学到了什么。'
    difficulty: 2
    audioFile: 'L275.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The most useful thing I learned at the workshop was about dialogue. The teacher said that in real life, people almost never say exactly what they mean. They hint, they avoid, they change the subject. Good dialogue in stories should be the same way.'
      - speaker: girl
        voice: shimmer
        text: 'She gave us an example. Instead of writing "I am angry with you," a character might say "Fine. Do whatever you want." The reader understands the anger from the context, even though the word angry is never used. She called this technique subtext — what is said below the surface. It completely changed how I write conversations.'
    question:
      text: 'What is "subtext" in dialogue writing?'
      textZh: '对话写作中的"subtext"是什么？'
      options:
        A: 'Writing dialogue in a foreign language underneath the English.'
        B: 'The hidden meaning behind what a character says, which is different from the literal words.'
        C: 'Adding descriptions of body language between every line of dialogue.'
      answer: 'B'
      explanation: 'The girl explains subtext as "what is said below the surface" — the hidden meaning behind words, like saying "Fine" when actually angry.'
      explanationZh: '女孩解释subtext为"在表面之下说的话"——话语背后的隐藏含义，比如实际上生气时说"好吧"。'

  - id: L276
    type: short-extract
    title: 'Rewriting a Fairy Tale'
    titleZh: '重写童话'
    scene: 'You will hear a boy presenting his school project on rewriting a fairy tale.'
    sceneZh: '你将听到一个男孩展示他的学校项目——重写一个童话。'
    difficulty: 2
    audioFile: 'L276.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'For my English project, I rewrote Goldilocks and the Three Bears from the bears'' perspective. In my version, the bears are a normal family coming home from a walk to find their house has been broken into by a strange girl. Baby Bear is frightened. Mother Bear is furious. Father Bear calls the police.'
      - speaker: boy
        voice: echo
        text: 'What I discovered is that when you change the point of view, the whole story changes. Goldilocks goes from being a curious little girl to being a trespasser who damages property and steals food. My teacher said this exercise teaches us that there are always at least two sides to every story. I think every writer should try retelling a story from the villain''s perspective at least once.'
    question:
      text: 'What did the boy learn from rewriting the fairy tale?'
      textZh: '男孩从重写童话中学到了什么？'
      options:
        A: 'That fairy tales should not be changed because they are perfect.'
        B: 'That changing the point of view can completely change how a story feels.'
        C: 'That bears are more interesting characters than humans.'
      answer: 'B'
      explanation: 'The boy says "when you change the point of view, the whole story changes" — Goldilocks becomes a trespasser instead of a curious girl.'
      explanationZh: '男孩说"当你改变视角时，整个故事都变了"——金发姑娘从一个好奇的小女孩变成了一个非法入侵者。'

  - id: L277
    type: short-extract
    title: 'Creating Suspense'
    titleZh: '制造悬念'
    scene: 'You will hear an author explaining how she creates suspense in her stories.'
    sceneZh: '你将听到一位作者解释她如何在故事中制造悬念。'
    difficulty: 3
    audioFile: 'L277.mp3'
    script:
      - speaker: author
        voice: nova
        text: 'The secret to suspense is not what you show — it is what you hide. If a character opens a door and sees a monster, that is a shock. But if a character hears scratching behind a door and spends three pages wondering what is behind it — that is suspense.'
      - speaker: author
        voice: nova
        text: 'Alfred Hitchcock explained it perfectly. He said imagine two people sitting at a table talking. Nothing exciting. But now imagine the audience knows there is a bomb under the table. Suddenly the same boring conversation becomes incredibly tense. The audience wants to shout: get out! That is the power of giving the reader information that the characters do not have.'
    question:
      text: 'According to the author, what is the key to creating suspense?'
      textZh: '根据作者的说法，制造悬念的关键是什么？'
      options:
        A: 'Showing the reader frightening images as quickly as possible.'
        B: 'Hiding information and making the reader wonder what will happen.'
        C: 'Writing very long descriptions of dangerous situations.'
      answer: 'B'
      explanation: 'The author says "The secret to suspense is not what you show — it is what you hide" and explains that making readers wonder is more powerful than shocking them.'
      explanationZh: '作者说"悬念的秘诀不在于你展示什么——而在于你隐藏什么"，并解释说让读者猜测比震惊他们更有力。'

  - id: L278
    type: short-extract
    title: 'The Bedtime Story'
    titleZh: '睡前故事'
    scene: 'You will hear a father describing his experience making up bedtime stories.'
    sceneZh: '你将听到一位父亲描述他编睡前故事的经历。'
    difficulty: 2
    audioFile: 'L278.mp3'
    script:
      - speaker: father
        voice: echo
        text: 'Every night, my daughter asks me to make up a new bedtime story. She does not want me to read from a book — she wants a brand new story, just for her. At first I found it really difficult. But after months of practice, I have got much better at it.'
      - speaker: father
        voice: echo
        text: 'The trick I discovered is to let her choose three random things — like a penguin, a spaceship, and a birthday cake — and then I have to make a story that includes all three. It forces my brain to be creative. Some nights the stories are terrible and she falls asleep halfway through. But other nights, she sits up in bed and says, Daddy, that was the best one yet. Those moments make it all worthwhile.'
    question:
      text: 'What trick does the father use to create stories?'
      textZh: '父亲用什么技巧来创作故事？'
      options:
        A: 'He reads the first chapter of a book and then invents the rest.'
        B: 'His daughter chooses three random things and he must include all of them.'
        C: 'He retells stories he remembers from his own childhood.'
      answer: 'B'
      explanation: 'He says "let her choose three random things — like a penguin, a spaceship, and a birthday cake — and then I have to make a story that includes all three."'
      explanationZh: '他说"让她选三个随机的东西——比如企鹅、宇宙飞船和生日蛋糕——然后我必须编一个包含全部三样的故事。"'

  - id: L279
    type: short-extract
    title: 'The Ending Problem'
    titleZh: '结尾问题'
    scene: 'You will hear two students discussing a problem with a story one of them is writing.'
    sceneZh: '你将听到两个学生讨论其中一个人正在写的故事的问题。'
    difficulty: 2
    audioFile: 'L279.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I am stuck on my story. I have written a really good beginning and middle, but I cannot figure out the ending. I have tried three different versions and none of them feel right.'
      - speaker: girl
        voice: shimmer
        text: 'What is your story about?'
      - speaker: boy
        voice: echo
        text: 'A boy who finds a time machine. He goes back in time to change something, but everything he changes makes things worse.'
      - speaker: girl
        voice: shimmer
        text: 'Here is what I would do. Think about what your character needs to learn. Maybe the lesson is that you cannot change the past — you have to accept it. So the ending could be him choosing NOT to use the time machine, and being okay with that. The best endings are not about what happens — they are about how the character changes.'
    question:
      text: 'What advice does the girl give about writing endings?'
      textZh: '女孩关于写结尾给出了什么建议？'
      options:
        A: 'The ending should have the biggest and most exciting action scene.'
        B: 'The ending should show how the character has changed or learned something.'
        C: 'The ending should always be happy and positive.'
      answer: 'B'
      explanation: 'The girl says "The best endings are not about what happens — they are about how the character changes."'
      explanationZh: '女孩说"最好的结局不是关于发生了什么——而是关于角色如何改变。"'

  - id: L280
    type: short-extract
    title: 'The Audiobook Experience'
    titleZh: '有声书体验'
    scene: 'You will hear a girl comparing reading a book with listening to an audiobook.'
    sceneZh: '你将听到一个女孩比较读书和听有声书。'
    difficulty: 2
    audioFile: 'L280.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I used to think audiobooks were cheating — that real readers only read physical books. But then I listened to the audiobook of The Hobbit, read by an amazing actor who does different voices for every character. Gollum sounded truly creepy, Gandalf sounded wise and gentle, and the dwarves each had their own personality.'
      - speaker: girl
        voice: shimmer
        text: 'Now I think audiobooks and printed books are just different ways of experiencing the same story. With a printed book, you create the voices in your own head. With an audiobook, a skilled narrator creates them for you. Neither is better — they are just different. I actually enjoy the same book twice now — once reading it and once listening to it.'
    question:
      text: 'How does the girl feel about audiobooks now?'
      textZh: '女孩现在对有声书有什么看法？'
      options:
        A: 'She still prefers printed books and thinks audiobooks are not real reading.'
        B: 'She believes audiobooks and printed books are equally valid ways to enjoy stories.'
        C: 'She only listens to audiobooks now and has stopped reading printed books.'
      answer: 'B'
      explanation: 'The girl says "audiobooks and printed books are just different ways of experiencing the same story" and "Neither is better — they are just different."'
      explanationZh: '女孩说"有声书和印刷书只是体验同一个故事的不同方式"和"两者都不是更好——只是不同"。'

  - id: L281
    type: short-extract
    title: 'The Setting Description'
    titleZh: '场景描写'
    scene: 'You will hear a teacher reading a student''s descriptive paragraph and commenting on it.'
    sceneZh: '你将听到一位老师朗读学生的描写段落并评论。'
    difficulty: 3
    audioFile: 'L281.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Listen to this paragraph from Sam''s story: "The forest was dark. It was cold. There were lots of trees." Now, that tells us the basic facts, but it does not make us feel anything. Compare it with this version: "The forest swallowed the last of the daylight. An icy wind snaked between the trees, carrying the smell of damp earth and rotting leaves."'
      - speaker: teacher
        voice: nova
        text: 'See the difference? The second version uses personification — the forest swallows light, the wind snakes. It uses sensory details — cold wind, smell of earth. It creates an atmosphere of danger without ever using the word dangerous. This is what we mean by showing instead of telling. Your setting should make the reader feel the mood, not just know the facts.'
    question:
      text: 'What is the main difference between the two versions, according to the teacher?'
      textZh: '根据老师的说法，两个版本之间的主要区别是什么？'
      options:
        A: 'The second version is longer and contains more words.'
        B: 'The second version creates atmosphere through sensory details and personification.'
        C: 'The second version includes more factual information about the forest.'
      answer: 'B'
      explanation: 'The teacher explains the second version uses "personification" and "sensory details" to "create an atmosphere" rather than just stating facts.'
      explanationZh: '老师解释第二个版本使用了"拟人化"和"感官细节"来"营造氛围"，而不仅仅是陈述事实。'

  - id: L282
    type: short-extract
    title: 'The Character Flaw'
    titleZh: '角色缺陷'
    scene: 'You will hear an author explaining why characters need flaws.'
    sceneZh: '你将听到一位作者解释为什么角色需要缺陷。'
    difficulty: 3
    audioFile: 'L282.mp3'
    script:
      - speaker: author
        voice: fable
        text: 'A perfect character is a boring character. Think about it — if your hero is brave, strong, clever, and never makes mistakes, where is the story? We connect with characters because of their flaws, not despite them. Harry Potter is brave but also reckless. Hermione is brilliant but sometimes too rule-following. Ron is loyal but often jealous.'
      - speaker: author
        voice: fable
        text: 'The flaw is what creates the story''s tension. The character must overcome their flaw — or fail because of it — for the story to be meaningful. So when you create a character, give them a strength AND a weakness. The weakness is actually more important, because that is where the growth happens.'
    question:
      text: 'Why does the author say a character''s weakness is important?'
      textZh: '为什么作者说角色的弱点很重要？'
      options:
        A: 'Because it makes the character seem more realistic and relatable.'
        B: 'Because overcoming the weakness is where character growth happens.'
        C: 'Because readers prefer to read about imperfect characters.'
      answer: 'B'
      explanation: 'The author says "The weakness is actually more important, because that is where the growth happens" — characters must overcome flaws for meaningful stories.'
      explanationZh: '作者说"弱点实际上更重要，因为那是成长发生的地方"——角色必须克服缺陷才能有意义的故事。'

  - id: L283
    type: short-extract
    title: 'The Story Starter'
    titleZh: '故事开头器'
    scene: 'You will hear a girl describing an app that helps with story writing.'
    sceneZh: '你将听到一个女孩描述一个帮助写故事的应用程序。'
    difficulty: 2
    audioFile: 'L283.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I found this really cool app called Story Starter. You press a button and it gives you a random opening sentence like "The letter arrived at midnight" or "I woke up and the world was silent." Then you have to continue the story from there.'
      - speaker: girl
        voice: shimmer
        text: 'I was sceptical at first, but it actually works brilliantly. The random sentence forces you to think in unexpected directions. Yesterday it gave me "The tree in the garden began to sing" and I ended up writing a story about a girl who discovers that her grandmother planted a magical seed fifty years ago. I would never have thought of that idea on my own. Sometimes all you need is a spark to get started.'
    question:
      text: 'Why does the girl find the Story Starter app useful?'
      textZh: '为什么女孩觉得这个故事开头器应用有用？'
      options:
        A: 'It writes complete stories automatically.'
        B: 'The random opening sentences push her to think in unexpected ways.'
        C: 'It corrects grammar mistakes in her writing.'
      answer: 'B'
      explanation: 'She says "The random sentence forces you to think in unexpected directions" and she would "never have thought of that idea on my own."'
      explanationZh: '她说"随机的句子迫使你朝意想不到的方向思考"，她"自己永远不会想到那个创意。"'

  - id: L284
    type: short-extract
    title: 'Showing Emotions'
    titleZh: '展示情感'
    scene: 'You will hear a writing teacher demonstrating how to show emotions.'
    sceneZh: '你将听到一位写作老师演示如何展示情感。'
    difficulty: 2
    audioFile: 'L284.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'If I write "Tom was angry," you know Tom is angry but you do not feel it. Now listen to this: "Tom''s jaw clenched. He slammed his fist on the table, sending papers flying across the room." You can feel Tom''s anger without me ever using the word angry.'
      - speaker: teacher
        voice: nova
        text: 'This is showing instead of telling, and it works for every emotion. Fear: her hands trembled and she pressed her back against the wall. Happiness: a grin spread across her face and she punched the air. Sadness: he stared at the empty chair where she used to sit. The trick is to use body language and actions, just like in real life. When your friend is upset, you know it from their body language before they say a word.'
    question:
      text: 'What technique does the teacher recommend for showing emotions in writing?'
      textZh: '老师推荐什么技巧来在写作中展示情感？'
      options:
        A: 'Using many emotion adjectives like angry, sad, and happy.'
        B: 'Using body language and physical actions to convey feelings.'
        C: 'Having characters explain their feelings in dialogue.'
      answer: 'B'
      explanation: 'The teacher says "The trick is to use body language and actions, just like in real life" rather than naming the emotion directly.'
      explanationZh: '老师说"诀窍是使用肢体语言和动作，就像在现实生活中一样"而不是直接说出情感。'

  - id: L285
    type: short-extract
    title: 'The Book Club Debate'
    titleZh: '读书会辩论'
    scene: 'You will hear two friends debating whether the book or movie version of a story is better.'
    sceneZh: '你将听到两个朋友辩论书还是电影版本更好。'
    difficulty: 2
    audioFile: 'L285.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I think the movie of Narnia is better than the book. The battle scenes are incredible — you can actually see the ice cracking and the armies charging. In the book, the battle is described in about two pages.'
      - speaker: girl
        voice: shimmer
        text: 'But in the book, you get to know what Lucy is thinking and feeling. When she steps through the wardrobe, the book describes her wonder in such detail that you share that feeling. The movie just shows snow falling. That is pretty, but it is not the same as being inside her head. I think the book gives you a deeper emotional experience, even if the movie looks more impressive.'
    question:
      text: 'Why does the girl prefer the book version?'
      textZh: '为什么女孩更喜欢书的版本？'
      options:
        A: 'Because the book has better battle scenes than the movie.'
        B: 'Because the book lets you experience the characters'' inner thoughts and feelings.'
        C: 'Because the book has more characters than the movie.'
      answer: 'B'
      explanation: 'The girl says "in the book, you get to know what Lucy is thinking and feeling" and it gives "a deeper emotional experience."'
      explanationZh: '女孩说"在书中，你能了解Lucy在想什么和感受什么"，它给出了"更深层的情感体验"。'

  - id: L286
    type: short-extract
    title: 'The Narrative Voice'
    titleZh: '叙事视角'
    scene: 'You will hear a teacher explaining first-person vs third-person narration.'
    sceneZh: '你将听到一位老师解释第一人称和第三人称叙述。'
    difficulty: 3
    audioFile: 'L286.mp3'
    script:
      - speaker: teacher
        voice: fable
        text: 'When you write a story, one of the first decisions you make is: who is telling the story? In first-person narration, the character tells their own story using "I." This feels intimate and personal — you are inside their head. But you can only know what they know and see what they see.'
      - speaker: teacher
        voice: fable
        text: 'In third-person narration, an outside voice tells the story using "he" or "she." This gives you more flexibility — you can show what is happening in different places at the same time. For the FCE exam, first person is usually easier because it feels more natural. You just pretend the story happened to you and write "I did this, I felt that." It is the same as telling a friend what happened to you.'
    question:
      text: 'Why does the teacher suggest first-person narration for the FCE exam?'
      textZh: '为什么老师建议FCE考试使用第一人称叙述？'
      options:
        A: 'Because it allows the writer to describe multiple locations.'
        B: 'Because it scores higher marks than third-person narration.'
        C: 'Because it feels more natural, like telling a friend what happened.'
      answer: 'C'
      explanation: 'The teacher says first person is "usually easier because it feels more natural" and is "the same as telling a friend what happened to you."'
      explanationZh: '老师说第一人称"通常更容易因为感觉更自然"，就像"告诉朋友发生了什么事"。'

  - id: L287
    type: short-extract
    title: 'The Cliffhanger Ending'
    titleZh: '悬念式结尾'
    scene: 'You will hear a boy explaining why he loves cliffhanger endings.'
    sceneZh: '你将听到一个男孩解释他为什么喜欢悬念式结尾。'
    difficulty: 2
    audioFile: 'L287.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I love books that end on a cliffhanger. My favourite series ends every book with a massive unanswered question. The last book ended with the main character opening a door and seeing someone who was supposed to be dead standing there. That was the last line! I nearly threw the book across the room.'
      - speaker: boy
        voice: echo
        text: 'Some people hate cliffhangers because they want everything resolved. But I think a good cliffhanger is like a promise from the author — they are saying "trust me, the answer is worth waiting for." Of course, you should not use a cliffhanger in the FCE exam because your story needs a proper ending. But in a series of books, it is the best way to make sure people buy the next one.'
    question:
      text: 'Why does the boy say you should NOT use a cliffhanger in the FCE exam?'
      textZh: '为什么男孩说你不应该在FCE考试中使用悬念式结尾？'
      options:
        A: 'Because cliffhangers are too difficult to write well.'
        B: 'Because the FCE story needs a proper, complete ending.'
        C: 'Because examiners do not like exciting stories.'
      answer: 'B'
      explanation: 'The boy says "you should not use a cliffhanger in the FCE exam because your story needs a proper ending."'
      explanationZh: '男孩说"你不应该在FCE考试中使用悬念式结尾，因为你的故事需要一个完整的结局。"'

  - id: L288
    type: short-extract
    title: 'Writing with Music'
    titleZh: '伴着音乐写作'
    scene: 'You will hear a girl explaining how music helps her write stories.'
    sceneZh: '你将听到一个女孩解释音乐如何帮助她写故事。'
    difficulty: 2
    audioFile: 'L288.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I always listen to music when I write. But not pop music with lyrics — that is too distracting. I listen to film soundtracks. When I am writing a battle scene, I play something fast and dramatic. When I am writing a sad scene, I choose something slow and gentle with strings.'
      - speaker: girl
        voice: shimmer
        text: 'Music helps me feel the emotion I want to put into the scene. If I am listening to a tense, creepy soundtrack, my writing automatically becomes more suspenseful. The words just flow differently. My writing teacher tried it with the whole class once — she played mysterious music while we wrote opening paragraphs, and everyone agreed that their writing was better. It is like the music sets the mood for your brain.'
    question:
      text: 'How does music help the girl''s writing?'
      textZh: '音乐如何帮助女孩的写作？'
      options:
        A: 'It gives her ideas for character names and plot points.'
        B: 'It helps her feel the right emotions, making her writing more atmospheric.'
        C: 'It blocks out noise so she can concentrate better.'
      answer: 'B'
      explanation: 'She says "Music helps me feel the emotion I want to put into the scene" and her "writing automatically becomes more suspenseful" with tense music.'
      explanationZh: '她说"音乐帮助我感受我想放进场景中的情感"，配合紧张的音乐，她的"写作自动变得更加悬疑"。'

  - id: L289
    type: short-extract
    title: 'The Villain Problem'
    titleZh: '反派问题'
    scene: 'You will hear a student asking a visiting author about writing villains.'
    sceneZh: '你将听到一个学生问来访的作者关于写反派的问题。'
    difficulty: 3
    audioFile: 'L289.mp3'
    script:
      - speaker: student
        voice: echo
        text: 'How do you make a villain that readers actually find interesting?'
      - speaker: author
        voice: fable
        text: 'Great question. The most common mistake is making a villain who is evil just because they are evil. Real people are never like that. Even people who do terrible things have reasons — maybe twisted reasons, but reasons nonetheless. So give your villain a motivation. Maybe they lost someone they loved. Maybe they were treated unfairly and decided the world owed them something. The moment a reader thinks, I understand why this person is like this, even though I disagree with what they are doing — that is when you have created a truly memorable villain.'
    question:
      text: 'What mistake does the author say is most common when writing villains?'
      textZh: '作者说写反派时最常见的错误是什么？'
      options:
        A: 'Making the villain too powerful and impossible to defeat.'
        B: 'Making the villain evil without giving them any understandable motivation.'
        C: 'Making the villain appear too early in the story.'
      answer: 'B'
      explanation: 'The author says "The most common mistake is making a villain who is evil just because they are evil" without giving them reasons.'
      explanationZh: '作者说"最常见的错误是创造一个仅仅因为邪恶而邪恶的反派"，没有给他们理由。'

  - id: L290
    type: short-extract
    title: 'The Short Sentence Trick'
    titleZh: '短句技巧'
    scene: 'You will hear a writing teacher demonstrating how sentence length affects pace.'
    sceneZh: '你将听到一位写作老师演示句子长度如何影响节奏。'
    difficulty: 2
    audioFile: 'L290.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'I want you to listen to two versions of the same scene and notice how they feel different. Version one: The girl was running through the dark forest and the branches were scratching her arms and she was very scared because she could hear footsteps behind her.'
      - speaker: teacher
        voice: nova
        text: 'Version two: She ran. Branches clawed at her arms. Behind her, footsteps. Closer. Faster. She ran harder. See the difference? The short sentences in version two create urgency and fear. Your heart beats faster when you read them. Long sentences slow things down — they are perfect for peaceful, descriptive scenes. Short sentences speed things up — use them for action, danger, and tension. Mixing sentence length is one of the most powerful tools a writer has.'
    question:
      text: 'When should a writer use short sentences, according to the teacher?'
      textZh: '根据老师的说法，作者什么时候应该使用短句？'
      options:
        A: 'When describing peaceful scenery and calm moments.'
        B: 'When writing action, danger, and tense moments.'
        C: 'When introducing new characters to the story.'
      answer: 'B'
      explanation: 'The teacher says "Short sentences speed things up — use them for action, danger, and tension."'
      explanationZh: '老师说"短句加快节奏——在动作、危险和紧张时刻使用它们。"'

  - id: L291
    type: short-extract
    title: 'World Building'
    titleZh: '世界构建'
    scene: 'You will hear two friends discussing how to create a fictional world.'
    sceneZh: '你将听到两个朋友讨论如何创造一个虚构的世界。'
    difficulty: 3
    audioFile: 'L291.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I am writing a fantasy story but I am struggling with the world building. How do I make my fictional world feel real?'
      - speaker: boy
        voice: echo
        text: 'The best advice I ever read was from Tolkien. He said you should know a hundred things about your world but only mention ten of them in the story. The other ninety sit underneath the surface, making everything feel solid and real.'
      - speaker: girl
        voice: shimmer
        text: 'So I should plan more than I actually write?'
      - speaker: boy
        voice: echo
        text: 'Exactly. Know what your characters eat for breakfast, even if you never write a breakfast scene. Know what the weather is like, who rules the land, what games children play. Those background details will leak into your writing naturally and make the world feel lived in — not like a movie set.'
    question:
      text: 'What is the key advice for making a fictional world feel real?'
      textZh: '让虚构世界感觉真实的关键建议是什么？'
      options:
        A: 'Include as many details as possible in every scene.'
        B: 'Plan far more details than you actually include, so the world feels solid.'
        C: 'Copy settings from real places you have visited.'
      answer: 'B'
      explanation: 'The boy says "know a hundred things about your world but only mention ten" — extensive planning makes the world feel "solid and real."'
      explanationZh: '男孩说"了解你的世界的一百件事但只提到十件"——大量的规划使世界感觉"坚实而真实"。'

  - id: L292
    type: short-extract
    title: 'The Opening Hook'
    titleZh: '开头钩子'
    scene: 'You will hear a teacher explaining how to write a strong opening.'
    sceneZh: '你将听到一位老师解释如何写一个有力的开头。'
    difficulty: 2
    audioFile: 'L292.mp3'
    script:
      - speaker: teacher
        voice: fable
        text: 'Your opening line is like a fishing hook — it needs to catch the reader''s attention and not let go. The worst way to start a story is with background information: "My name is Tom and I am twelve years old and I live in London." That is a police report, not a story.'
      - speaker: teacher
        voice: fable
        text: 'Instead, start with action, mystery, or an unusual statement. Compare: "My name is Tom and I am twelve" with "The moment I stepped off the bus, I knew today was going to be different." The second version makes you want to read on. Why is today different? What is going to happen? In the FCE exam, you are given an opening sentence, but what you write NEXT is your hook. Make it count.'
    question:
      text: 'What does the teacher say is the worst way to start a story?'
      textZh: '老师说开始故事最糟糕的方式是什么？'
      options:
        A: 'With a question that makes the reader curious.'
        B: 'With background information like name, age, and location.'
        C: 'With a line of dialogue between two characters.'
      answer: 'B'
      explanation: 'The teacher says starting with "My name is Tom and I am twelve years old and I live in London" is like a "police report, not a story."'
      explanationZh: '老师说以"我叫Tom，十二岁，住在伦敦"开头就像"警方报告，不是故事"。'

  - id: L293
    type: short-extract
    title: 'The Journal Writer'
    titleZh: '日记写手'
    scene: 'You will hear a boy explaining how keeping a journal helps his story writing.'
    sceneZh: '你将听到一个男孩解释记日记如何帮助他的故事写作。'
    difficulty: 2
    audioFile: 'L293.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'My English teacher told me to keep a writer''s journal, and it has honestly made me a much better writer. Every day I write at least one paragraph — sometimes about what happened to me, sometimes about something I observed, sometimes just a description of a place or a person.'
      - speaker: boy
        voice: echo
        text: 'The point is not to write something brilliant every day. The point is to practise. It is like sport — you do not become a good footballer by only playing on match days. You train every day. Writing is the same. My journal entries from six months ago are terrible compared to what I write now. That proves it is working. I can actually see myself improving, and that feels amazing.'
    question:
      text: 'What does the boy compare writing practice to?'
      textZh: '男孩把写作练习比作什么？'
      options:
        A: 'Cooking a complicated recipe.'
        B: 'Training for a sport — you need daily practice to improve.'
        C: 'Learning to play a musical instrument.'
      answer: 'B'
      explanation: 'The boy says "It is like sport — you do not become a good footballer by only playing on match days. You train every day."'
      explanationZh: '男孩说"就像运动——你不会只在比赛日踢球就成为好球员。你每天都要训练。"'

  - id: L294
    type: short-extract
    title: 'The Twist Ending'
    titleZh: '反转结局'
    scene: 'You will hear an author sharing tips for writing twist endings.'
    sceneZh: '你将听到一位作者分享写反转结局的技巧。'
    difficulty: 3
    audioFile: 'L294.mp3'
    script:
      - speaker: author
        voice: nova
        text: 'A good twist ending follows one simple rule: it must be surprising AND inevitable. If the reader does not see it coming, that is the surprise. But if the reader goes back and realises all the clues were there from the beginning, that is the inevitability.'
      - speaker: author
        voice: nova
        text: 'The trick is foreshadowing — dropping small hints throughout the story that point to the twist, but disguising them so they look like ordinary details. For example, if your twist is that the narrator is actually blind, you might mention earlier that they always recognise people by their voice or their footsteps. At first reading, this seems normal. But after the twist, the reader goes "oh!" and everything clicks into place. That moment of realisation is what makes a twist truly satisfying.'
    question:
      text: 'According to the author, what makes a twist ending satisfying?'
      textZh: '根据作者的说法，什么使反转结局令人满意？'
      options:
        A: 'It must be completely random so nobody can ever guess it.'
        B: 'It must be both surprising and supported by clues planted throughout the story.'
        C: 'It must change the story from a happy ending to a sad one.'
      answer: 'B'
      explanation: 'The author says a good twist must be "surprising AND inevitable" — surprising because you did not see it coming, inevitable because all the clues were there.'
      explanationZh: '作者说好的反转必须是"令人惊讶且不可避免的"——惊讶是因为你没预见到，不可避免是因为所有线索都在那里。'

  - id: L295
    type: short-extract
    title: 'The Storytelling Tradition'
    titleZh: '讲故事的传统'
    scene: 'You will hear a grandmother talking about the oral storytelling tradition in her family.'
    sceneZh: '你将听到一位祖母谈论她家的口头讲故事传统。'
    difficulty: 2
    audioFile: 'L295.mp3'
    script:
      - speaker: grandmother
        voice: nova
        text: 'In my family, storytelling is a tradition that goes back generations. My grandmother told me stories, her grandmother told her stories, and now I tell stories to my grandchildren. We have stories that have been passed down for over a hundred years — about our village, our ancestors, and the land we come from.'
      - speaker: grandmother
        voice: nova
        text: 'What makes oral storytelling special is that the story changes a little each time it is told. Every teller adds their own details, their own emotions, their own lessons learned from life. The core of the story stays the same, but it evolves like a living thing. That is the difference between a story written in a book and a story carried in the heart — one is fixed, the other breathes.'
    question:
      text: 'What does the grandmother say makes oral storytelling special?'
      textZh: '祖母说口头讲故事有什么特别之处？'
      options:
        A: 'The story stays exactly the same every time it is told.'
        B: 'The story changes slightly with each storyteller, keeping it alive.'
        C: 'The story is always accompanied by music and dancing.'
      answer: 'B'
      explanation: 'She says "the story changes a little each time it is told" and "every teller adds their own details" — the story "evolves like a living thing."'
      explanationZh: '她说"故事每次讲述时都会有一点变化"，"每个讲述者都添加自己的细节"——故事"像活物一样进化"。'

  # ============================================================
  # L296–L310: Part 2 — Sentence Completion (Storytelling Theme)
  # ============================================================

  - id: L296
    type: sentence-completion
    title: 'A Famous Author''s Advice'
    titleZh: '著名作家的建议'
    scene: 'You will hear a talk by a children''s book author giving advice to young writers.'
    sceneZh: '你将听到一位儿童书作家对年轻写手的演讲。'
    difficulty: 2
    audioFile: 'L296.mp3'
    script:
      - speaker: author
        voice: fable
        text: 'Good afternoon, everyone. My name is Sophie Chen and I have been writing children''s books for fifteen years. Today I want to share five pieces of advice that I wish someone had told me when I started writing.'
      - speaker: author
        voice: fable
        text: 'First, read as much as you can. Reading teaches you how stories work — how sentences flow, how dialogue sounds, how descriptions create pictures. I read at least two books every week, and I have done that since I was eight years old.'
      - speaker: author
        voice: fable
        text: 'Second, write every single day, even if it is just for fifteen minutes. Writing is a muscle — the more you use it, the stronger it gets. I write in the mornings, usually from six until eight, before my children wake up.'
      - speaker: author
        voice: fable
        text: 'Third, do not be afraid of bad first drafts. My first drafts are always terrible. The magic happens in the rewriting. I typically rewrite each chapter four or five times before I am happy with it.'
      - speaker: author
        voice: fable
        text: 'Fourth, observe the world around you. Carry a notebook everywhere and write down interesting things you see, hear, or overhear. The best story details come from real life. I once heard a child on the bus say, "Mum, I think the moon is following us," and that became the opening line of my third novel.'
      - speaker: author
        voice: fable
        text: 'Fifth and finally, write the story you want to read. Do not try to copy what is popular. Write something that excites you, something that makes your heart beat faster. If you are passionate about your story, that passion will shine through on every page.'
