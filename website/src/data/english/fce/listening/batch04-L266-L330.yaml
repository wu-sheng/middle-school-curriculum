      - speaker: narrator
        voice: fable
        text: 'Pixar Animation Studios has created some of the most beloved stories in cinema history — Toy Story, Finding Nemo, Inside Out, and many more. But what makes Pixar''s storytelling so special? Former Pixar story artist Emma Coats once shared twenty-two rules of storytelling that the studio uses.'
      - speaker: narrator
        voice: fable
        text: 'Rule number four is particularly important: "Once upon a time there was ___. Every day, ___. One day ___. Because of that, ___. Until finally ___." This simple template captures the essential structure of any story — a normal situation, a disruption, consequences, and a resolution.'
      - speaker: narrator
        voice: fable
        text: 'Another key Pixar principle is that characters must earn their happy endings through struggle. In Up, the old man must let go of the past. In Finding Nemo, the father must learn to trust his son. In Inside Out, the girl must accept that sadness is a necessary part of life.'
      - speaker: narrator
        voice: fable
        text: 'Perhaps the most surprising Pixar rule is number five: "Simplify. Focus. Combine characters. Hop over detours." Even with teams of hundreds of people working on each film, Pixar believes that less is more when it comes to storytelling. Every scene must serve the story. If it does not, it gets cut — no matter how beautiful or funny it is.'
