  - id: L313
    type: multiple-matching
    title: 'Why I Love This Genre'
    titleZh: '我为什么喜欢这个体裁'
    scene: 'You will hear five students talking about why they love their favourite story genre.'
    sceneZh: '你将听到五位学生谈论他们为什么喜欢自己最爱的故事体裁。'
    difficulty: 2
    audioFile: 'L313.mp3'
    speakers:
      - name: Speaker 1
        text: 'I love mystery stories because I enjoy the puzzle. Every chapter gives you a new clue, and I am always trying to figure out the solution before the detective does. It is like a game between the reader and the author. The best mysteries are the ones where the answer is surprising but makes total sense once you know it.'
      - name: Speaker 2
        text: 'Fantasy is my favourite genre because there are no limits. You can create entire worlds with their own rules, languages, and creatures. I love the feeling of stepping into a world where anything is possible — where a girl can fly on a dragon or a boy can talk to animals. Real life has so many rules; fantasy has none.'
      - name: Speaker 3
        text: 'I am a huge fan of historical fiction. I love learning about real events through the eyes of fictional characters. It makes history come alive in a way that textbooks never do. After reading a novel set during World War Two, I felt like I understood what it was really like to live through that time — the fear, the hope, the sacrifice.'
      - name: Speaker 4
        text: 'I love science fiction because it makes me think about the future. What will technology look like in fifty years? Will humans live on other planets? Could robots become our friends? Science fiction asks big questions about where humanity is heading, and it does it through exciting stories with spaceships and aliens. It is philosophy disguised as adventure.'
      - name: Speaker 5
        text: 'Realistic fiction is my favourite. I know that sounds boring compared to dragons and spaceships, but I find stories about ordinary people dealing with everyday problems the most moving. A story about a girl who is new at school and has to make friends — that speaks to me more than any fantasy because I have felt exactly the same way.'
    statements:
      A: 'This person enjoys the mental challenge of solving puzzles in stories.'
      B: 'This person values the freedom to imagine worlds without limits.'
      C: 'This person loves learning about real historical events through stories.'
      D: 'This person enjoys thinking about future technology and big questions.'
      E: 'This person connects most with stories about everyday human experiences.'
      F: 'This person prefers stories that teach moral lessons to children.'
      G: 'This person likes stories with animals as the main characters.'
      H: 'This person enjoys stories that are made into films.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "I enjoy the puzzle" and tries "to figure out the solution before the detective" — mental challenge (A).'
      Speaker 1Zh: '说话者1说"我享受这个谜题"并试图"在侦探之前找出答案"——智力挑战（A）。'
      Speaker 2: 'Speaker 2 says "there are no limits" and loves "a world where anything is possible" — freedom without limits (B).'
      Speaker 2Zh: '说话者2说"没有限制"并喜欢"一切皆有可能的世界"——没有限制的自由（B）。'
      Speaker 3: 'Speaker 3 says "I love learning about real events through the eyes of fictional characters" — historical learning (C).'
      Speaker 3Zh: '说话者3说"我喜欢通过虚构角色的眼睛了解真实事件"——历史学习（C）。'
      Speaker 4: 'Speaker 4 says sci-fi "makes me think about the future" and "asks big questions" — future thinking (D).'
      Speaker 4Zh: '说话者4说科幻"让我思考未来"和"提出大问题"——未来思考（D）。'
      Speaker 5: 'Speaker 5 says "stories about ordinary people dealing with everyday problems" speak to them most — everyday experiences (E).'
      Speaker 5Zh: '说话者5说"关于普通人应对日常问题的故事"最能打动他们——日常经历（E）。'

  - id: L314
    type: multiple-matching
    title: 'My Biggest Writing Challenge'
    titleZh: '我最大的写作挑战'
    scene: 'You will hear five students describing their biggest challenge when writing stories.'
    sceneZh: '你将听到五位学生描述他们写故事时最大的挑战。'
    difficulty: 2
    audioFile: 'L314.mp3'
    speakers:
      - name: Speaker 1
        text: 'My biggest challenge is starting. I can sit and stare at a blank page for ages without writing a single word. The pressure to make the first sentence perfect paralyses me. My teacher told me to just start writing anything — even rubbish — and fix it later. It helps, but I still find beginnings incredibly hard.'
      - name: Speaker 2
        text: 'I struggle with endings. I can write brilliant beginnings and exciting middles, but when it comes to wrapping everything up, I always rush. My stories tend to end too quickly — everything gets resolved in two sentences. I need to learn to slow down and give my endings the same attention I give my beginnings.'
      - name: Speaker 3
        text: 'Dialogue is my weakness. When my characters speak, they all sound exactly the same — like me talking to myself. I cannot seem to give each character their own voice. A brave warrior should not sound the same as a shy librarian, but in my stories, they do.'
      - name: Speaker 4
        text: 'I find it hard to keep the story focused. I start with one main idea, but then I keep adding new characters and subplots until the whole thing becomes a tangled mess. My teacher says I need to learn to cut things out — that sometimes less is more. But I love all my ideas and do not want to remove any of them!'
      - name: Speaker 5
        text: 'Description is my Achilles heel. I can write action and dialogue easily, but when I need to describe a place or a character''s appearance, I freeze. Everything I write sounds like a list: "The room was big. There was a table. The walls were blue." I know I need to use more vivid, sensory language, but it does not come naturally to me.'
    statements:
      A: 'This person struggles to give characters distinct speaking styles.'
      B: 'This person finds it difficult to write the first sentence.'
      C: 'This person tends to rush the ending of stories.'
      D: 'This person adds too many characters and subplots.'
      E: 'This person finds descriptive writing difficult and list-like.'
      F: 'This person cannot think of original story ideas.'
      G: 'This person finds grammar and spelling difficult.'
      H: 'This person writes stories that are too short.'
    answers:
      Speaker 1: 'B'
      Speaker 2: 'C'
      Speaker 3: 'A'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "My biggest challenge is starting" and stares at "a blank page" — difficulty starting (B).'
      Speaker 1Zh: '说话者1说"我最大的挑战是开始"并盯着"空白页面"——开始困难（B）。'
      Speaker 2: 'Speaker 2 says endings are the struggle: "everything gets resolved in two sentences" — rushing endings (C).'
      Speaker 2Zh: '说话者2说结尾是困难："一切在两句话内就解决了"——结尾匆忙（C）。'
      Speaker 3: 'Speaker 3 says "Dialogue is my weakness" and characters "all sound exactly the same" — distinct speaking styles (A).'
      Speaker 3Zh: '说话者3说"对话是我的弱点"，角色"听起来都一模一样"——独特的说话风格（A）。'
      Speaker 4: 'Speaker 4 "keep adding new characters and subplots until the whole thing becomes a tangled mess" — too many subplots (D).'
      Speaker 4Zh: '说话者4"不断添加新角色和副线直到整个东西变成一团糟"——太多副线（D）。'
      Speaker 5: 'Speaker 5 says description sounds "like a list" and needs "more vivid, sensory language" — list-like description (E).'
      Speaker 5Zh: '说话者5说描写听起来"像一个列表"，需要"更生动的感官语言"——清单式描写（E）。'

  - id: L315
    type: multiple-matching
    title: 'The Book That Changed My Life'
    titleZh: '改变我人生的书'
    scene: 'You will hear five young people talking about a book that changed their life.'
    sceneZh: '你将听到五位年轻人谈论改变他们人生的一本书。'
    difficulty: 3
    audioFile: 'L315.mp3'
    speakers:
      - name: Speaker 1
        text: 'The Diary of a Young Girl by Anne Frank changed everything for me. Reading about a real girl my own age hiding from danger during the war made me realise how lucky I am. But more than that, it showed me the power of writing. Anne used her diary to process fear, to maintain hope, and to keep her identity alive. It made me start my own journal.'
      - name: Speaker 2
        text: 'Wonder by R.J. Palacio completely changed how I treat other people. After reading about Auggie — a boy with a facial difference who just wants to be treated normally — I became much more aware of how words can hurt. I started being kinder at school, standing up for people who were being left out. A story taught me empathy in a way no lesson ever could.'
      - name: Speaker 3
        text: 'Matilda by Roald Dahl changed my life because it showed me that a small, ordinary child could be extraordinary. Before I read it, I felt invisible at school. After reading it, I found the courage to raise my hand in class, to share my opinions, and to believe that being clever was something to be proud of, not embarrassed about.'
      - name: Speaker 4
        text: 'A Wrinkle in Time by Madeleine L''Engle opened my eyes to science. The book mixes physics, philosophy, and adventure in the most amazing way. After reading it, I started asking questions about the universe — how big is it, could time travel exist, what happens in a black hole? It led me to studying science, which is now my favourite subject.'
      - name: Speaker 5
        text: 'The Little Prince by Antoine de Saint-Exupery taught me to look at the world differently. It is a simple story on the surface — a prince travels between planets — but underneath, it is about love, friendship, and what really matters in life. The line "What is essential is invisible to the eye" still guides how I think about relationships and happiness.'
    statements:
      A: 'This book inspired this person to be kinder and more empathetic.'
      B: 'This book gave this person the confidence to believe in themselves.'
      C: 'This book inspired this person to keep a journal.'
      D: 'This book sparked this person''s interest in science.'
      E: 'This book taught this person what truly matters in life.'
      F: 'This book inspired this person to become a professional writer.'
      G: 'This book motivated this person to travel to other countries.'
      H: 'This book encouraged this person to learn a new language.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'A'
      Speaker 3: 'B'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says Anne Frank''s diary "made me start my own journal" — inspired journal writing (C).'
      Speaker 1Zh: '说话者1说安妮·弗兰克的日记"让我开始了自己的日记"——启发了写日记（C）。'
      Speaker 2: 'Speaker 2 says Wonder "completely changed how I treat other people" and taught empathy — being kinder (A).'
      Speaker 2Zh: '说话者2说《奇迹男孩》"完全改变了我对待他人的方式"并教会了同理心——更善良（A）。'
      Speaker 3: 'Speaker 3 says Matilda "showed me that a small, ordinary child could be extraordinary" and gave courage — self-belief (B).'
      Speaker 3Zh: '说话者3说《玛蒂尔达》"让我看到一个小小的普通孩子可以非凡"并给了勇气——自信（B）。'
      Speaker 4: 'Speaker 4 says the book "opened my eyes to science" and led to studying science — science interest (D).'
      Speaker 4Zh: '说话者4说这本书"开启了我对科学的眼界"并导致学习科学——对科学的兴趣（D）。'
      Speaker 5: 'Speaker 5 says the book taught about "what really matters in life" and guides how they think — what matters (E).'
      Speaker 5Zh: '说话者5说这本书教导了"生活中真正重要的是什么"并指导他们的思考——什么重要（E）。'

  - id: L316
    type: multiple-matching
    title: 'What Makes a Good Story Opening'
    titleZh: '什么是好的故事开头'
    scene: 'You will hear five writers discussing what makes an effective story opening.'
    sceneZh: '你将听到五位作家讨论什么使故事开头有效。'
    difficulty: 3
    audioFile: 'L316.mp3'
    speakers:
      - name: Speaker 1
        text: 'A good opening should start with action. Drop the reader into the middle of something happening. My favourite opening of all time is from The Hunger Games: "When I wake up, the other side of the bed is cold." Immediately you know something is wrong, someone is missing, and you need to find out why.'
      - name: Speaker 2
        text: 'I think the best openings create a mystery. They raise a question that the reader simply must have answered. "It was the day my grandmother exploded" — that is the opening of a book by Iain Banks. You cannot possibly stop reading after a line like that. The curiosity is irresistible.'
      - name: Speaker 3
        text: 'For me, a great opening establishes voice. I want to hear the character''s personality from the very first sentence. "If you are interested in stories with happy endings, you would be better off reading some other book" — that opening from A Series of Unfortunate Events tells you exactly what kind of story you are in for.'
      - name: Speaker 4
        text: 'I believe the most effective openings create atmosphere. Instead of telling you what is happening, they make you feel the mood of the story. A description of rain beating against dark windows, of wind howling through empty streets — that sets the emotional tone before anything has even happened.'
      - name: Speaker 5
        text: 'The best openings establish the stakes immediately. They tell you what is at risk. "Tomorrow, when the war begins, everything I know will change." That opening tells you the situation is serious, the consequences are real, and there is no time to waste. It creates urgency from the very first word.'
    statements:
      A: 'This person values openings that drop the reader into immediate action.'
      B: 'This person prefers openings that create an irresistible question or mystery.'
      C: 'This person likes openings that reveal the narrator''s personality.'
      D: 'This person appreciates openings that set the mood through description.'
      E: 'This person believes openings should establish what is at risk immediately.'
      F: 'This person likes openings that introduce multiple characters at once.'
      G: 'This person prefers openings that start with dialogue.'
      H: 'This person enjoys openings that describe the setting in great detail.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "start with action" and "drop the reader into the middle of something happening" — immediate action (A).'
      Speaker 1Zh: '说话者1说"以动作开头"和"把读者扔进正在发生的事情中"——立即行动（A）。'
      Speaker 2: 'Speaker 2 says "the best openings create a mystery" with "a question that the reader simply must have answered" — mystery/question (B).'
      Speaker 2Zh: '说话者2说"最好的开头创造一个谜题"和"读者必须回答的问题"——谜题/问题（B）。'
      Speaker 3: 'Speaker 3 says "a great opening establishes voice" and wants to "hear the character''s personality" — narrator personality (C).'
      Speaker 3Zh: '说话者3说"好的开头确立声音"并想"听到角色的个性"——叙述者个性（C）。'
      Speaker 4: 'Speaker 4 says effective openings "create atmosphere" through description of weather and mood — mood setting (D).'
      Speaker 4Zh: '说话者4说有效的开头通过天气和氛围描写"创造氛围"——氛围设定（D）。'
      Speaker 5: 'Speaker 5 says openings should "establish the stakes immediately" and tell you "what is at risk" — stakes/urgency (E).'
      Speaker 5Zh: '说话者5说开头应该"立即确立利害关系"并告诉你"什么在危险中"——利害关系/紧迫感（E）。'

  # Remaining L317-L330 follow same patterns with storytelling themes
  - id: L317
    type: multiple-matching
    title: 'How I Overcome Writer''s Block'
    titleZh: '我如何克服写作障碍'
    scene: 'You will hear five students talking about how they overcome writer''s block.'
    sceneZh: '你将听到五位学生谈论他们如何克服写作障碍。'
    difficulty: 2
    audioFile: 'L317.mp3'
    speakers:
      - name: Speaker 1
        text: 'When I get stuck, I go for a walk. Something about moving my body helps my brain start working again. I usually come back with a new idea within twenty minutes. I think it is because walking removes the pressure of sitting at a desk staring at a screen.'
      - name: Speaker 2
        text: 'I read. If I cannot write, I read a chapter of a book I love. Good writing is contagious — after reading something beautiful, I feel inspired to create something of my own. It is like listening to music before playing an instrument.'
      - name: Speaker 3
        text: 'I skip the part I am stuck on and write a different scene. Usually I am stuck because I am trying to write things in order. But stories do not have to be written from beginning to end. I write whatever scene excites me most, then connect the pieces later.'
      - name: Speaker 4
        text: 'I talk to someone. I explain my story out loud to a friend or family member, and something magical happens — as I am talking, new ideas pop into my head. Sometimes the other person asks a question I had never considered, and that unlocks the whole story.'
      - name: Speaker 5
        text: 'I freewrite for ten minutes. I set a timer and write anything that comes into my head, without stopping, without editing, without thinking. Most of it is nonsense, but somewhere in those ten minutes, a useful idea usually appears. The trick is to silence the critical voice in your head and just let the words flow.'
    statements:
      A: 'This person goes for a walk to refresh their mind.'
      B: 'This person reads good writing to feel inspired.'
      C: 'This person skips ahead and writes a different scene.'
      D: 'This person discusses their story with someone else.'
      E: 'This person writes freely without stopping or editing.'
      F: 'This person draws pictures to visualise the story.'
      G: 'This person listens to music for inspiration.'
      H: 'This person takes a nap and hopes for a dream.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "I go for a walk" and comes back "with a new idea within twenty minutes" — walking (A).'
      Speaker 1Zh: '说话者1说"我去散步"并在"二十分钟内带着新创意回来"——散步（A）。'
      Speaker 2: 'Speaker 2 says "I read" because "Good writing is contagious" and inspires them — reading for inspiration (B).'
      Speaker 2Zh: '说话者2说"我读书"因为"好的写作是有感染力的"并激励他们——阅读获取灵感（B）。'
      Speaker 3: 'Speaker 3 says "I skip the part I am stuck on and write a different scene" — skipping ahead (C).'
      Speaker 3Zh: '说话者3说"我跳过卡住的部分，写另一个场景"——跳到前面（C）。'
      Speaker 4: 'Speaker 4 says "I talk to someone" and "new ideas pop into my head" while explaining — discussing with others (D).'
      Speaker 4Zh: '说话者4说"我和别人聊"，在解释时"新创意突然冒出来"——与他人讨论（D）。'
      Speaker 5: 'Speaker 5 says "I freewrite for ten minutes" without stopping or editing — free writing (E).'
      Speaker 5Zh: '说话者5说"我自由写作十分钟"不停不改——自由写作（E）。'

  - id: L318
    type: multiple-matching
    title: 'What I Learned from Writing My First Novel'
    titleZh: '写第一部小说教会了我什么'
    scene: 'You will hear five young authors talking about lessons learned from writing their first novel.'
    sceneZh: '你将听到五位年轻作者谈论写第一部小说学到的教训。'
    difficulty: 3
    audioFile: 'L318.mp3'
    speakers:
      - name: Speaker 1
        text: 'I learned that planning matters. I tried to write my first novel without any plan — I just started writing and hoped for the best. By chapter five, I was completely lost. The second time, I planned everything out first: chapter summaries, character profiles, a timeline. It made the whole process so much smoother.'
      - name: Speaker 2
        text: 'The biggest lesson was about cutting. My first draft was sixty thousand words. The final version was thirty-five thousand. I had to remove entire characters, subplots, and scenes I loved. It was painful, but every cut made the story tighter and better. Now I understand what writers mean when they say "kill your darlings."'
      - name: Speaker 3
        text: 'I learned the importance of feedback. I was terrified of showing my work to anyone. But when I finally let my teacher and two friends read it, their comments were incredibly helpful. They spotted plot holes I had missed, pointed out confusing passages, and suggested improvements I would never have thought of alone.'
      - name: Speaker 4
        text: 'I discovered that writing a novel is a marathon, not a sprint. At first I wrote in huge bursts of enthusiasm — three thousand words in a day! But then I would not write for two weeks. I learned that consistency is more important than intensity. Writing five hundred words every single day gets you to the finish line faster.'
      - name: Speaker 5
        text: 'The most important thing I learned was about rewriting. My first draft was terrible — really, truly awful. But instead of giving up, I rewrote it. And rewrote it again. By the fourth draft, it was actually pretty good. I learned that the quality of a book is not determined by the first draft — it is determined by how many times you are willing to improve it.'
    statements:
      A: 'This person learned that detailed planning prevents getting lost.'
      B: 'This person learned that cutting content makes a story better.'
      C: 'This person learned the value of getting feedback from others.'
      D: 'This person learned that consistent daily writing is more effective than occasional bursts.'
      E: 'This person learned that multiple rewrites transform a poor draft into a good book.'
      F: 'This person learned to use technology to organise their writing.'
      G: 'This person learned that dialogue is the most important part of a novel.'
      H: 'This person learned to write in different genres.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "planning matters" and without a plan was "completely lost" by chapter five — planning (A).'
      Speaker 1Zh: '说话者1说"计划很重要"，没有计划到第五章就"完全迷失了"——计划（A）。'
      Speaker 2: 'Speaker 2 says "the biggest lesson was about cutting" and removed 25,000 words — cutting content (B).'
      Speaker 2Zh: '说话者2说"最大的教训是关于删减"，删除了25,000字——删减内容（B）。'
      Speaker 3: 'Speaker 3 says "I learned the importance of feedback" from teacher and friends — getting feedback (C).'
      Speaker 3Zh: '说话者3说"我学到了反馈的重要性"——来自老师和朋友——获得反馈（C）。'
      Speaker 4: 'Speaker 4 learned "consistency is more important than intensity" with 500 words daily — consistent writing (D).'
      Speaker 4Zh: '说话者4学到"坚持比强度更重要"，每天500字——持续写作（D）。'
      Speaker 5: 'Speaker 5 learned "the most important thing... was about rewriting" through four drafts — multiple rewrites (E).'
      Speaker 5Zh: '说话者5学到"最重要的是关于重写"，通过四次草稿——多次重写（E）。'

  # L319-L330 placeholder entries to complete the 65-exercise count
  - id: L319
    type: multiple-matching
    title: 'My Favourite Story Setting'
    titleZh: '我最喜欢的故事场景'
    scene: 'You will hear five students describing their favourite story settings.'
    sceneZh: '你将听到五位学生描述他们最喜欢的故事场景。'
    difficulty: 2
    audioFile: 'L319.mp3'
    speakers:
      - name: Speaker 1
        text: 'I love stories set in enchanted forests. There is something magical about ancient trees, hidden pathways, and creatures lurking in the shadows. An enchanted forest can be both beautiful and dangerous — that contrast is what makes it so interesting as a setting.'
      - name: Speaker 2
        text: 'My favourite setting is a boarding school with secrets. There is something exciting about corridors with hidden rooms, teachers who are not what they seem, and mysteries behind locked doors. Every boarding school story feels like there could be an adventure waiting around every corner.'
      - name: Speaker 3
        text: 'I love stories set on ships at sea. The isolation of being on a ship in the middle of the ocean creates incredible tension. There is nowhere to run, nowhere to hide. And the sea itself is a character — sometimes calm and beautiful, sometimes wild and terrifying.'
      - name: Speaker 4
        text: 'I am fascinated by stories set in underground worlds — caves, tunnels, hidden cities beneath the surface. There is an element of claustrophobia that adds tension, and the discovery of a whole world existing below our feet is always thrilling. Plus, underground settings are always full of interesting lighting — torches, glowing crystals, bioluminescent plants.'
      - name: Speaker 5
        text: 'Ordinary places made extraordinary are my favourite. A normal house where the walls whisper, a familiar park where time moves differently, an everyday school bus that travels to another dimension. I think the contrast between the ordinary and the magical makes the magic feel more real and more exciting.'
    statements:
      A: 'This person likes the contrast between beauty and danger in forest settings.'
      B: 'This person enjoys the mystery of a school with hidden secrets.'
      C: 'This person appreciates the isolation and tension of ocean settings.'
      D: 'This person is drawn to the discovery of hidden underground worlds.'
      E: 'This person prefers ordinary places that become magical.'
      F: 'This person likes stories set in ancient castles.'
      G: 'This person enjoys settings in outer space.'
      H: 'This person prefers modern city settings.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says the forest "can be both beautiful and dangerous — that contrast is what makes it so interesting" — beauty/danger contrast (A).'
      Speaker 1Zh: '说话者1说森林"既可以美丽又可以危险——这种对比是它如此有趣的原因"——美与危险的对比（A）。'
      Speaker 2: 'Speaker 2 describes "corridors with hidden rooms, teachers who are not what they seem, and mysteries" — school secrets (B).'
      Speaker 2Zh: '说话者2描述了"有隐藏房间的走廊、不像表面那样的老师和谜题"——学校秘密（B）。'
      Speaker 3: 'Speaker 3 says "The isolation of being on a ship in the middle of the ocean creates incredible tension" — ocean isolation (C).'
      Speaker 3Zh: '说话者3说"在大洋中间的船上的孤立创造了难以置信的紧张感"——海洋孤立（C）。'
      Speaker 4: 'Speaker 4 says "fascinated by stories set in underground worlds" and "the discovery of a whole world existing below our feet" — underground worlds (D).'
      Speaker 4Zh: '说话者4说"着迷于设定在地下世界的故事"和"发现脚下存在一个完整的世界"——地下世界（D）。'
      Speaker 5: 'Speaker 5 describes "Ordinary places made extraordinary" like "a normal house where the walls whisper" — ordinary made magical (E).'
      Speaker 5Zh: '说话者5描述"普通变非凡的地方"如"墙壁会耳语的普通房子"——普通变魔幻（E）。'

  - id: L320
    type: multiple-matching
    title: 'The Best Writing Advice I Received'
    titleZh: '我收到的最好的写作建议'
    scene: 'You will hear five young writers sharing the best writing advice they ever received.'
    sceneZh: '你将听到五位年轻作家分享他们收到的最好的写作建议。'
    difficulty: 2
    audioFile: 'L320.mp3'
    speakers:
      - name: Speaker 1
        text: 'The best advice I received was "write the first draft with the door closed, and rewrite with the door open." It means your first draft is just for you — no one needs to see it, so write freely without worrying. Then open the door and let others in during the rewriting process. It completely freed me from the fear of being judged.'
      - name: Speaker 2
        text: 'My grandmother told me: "Write what you know, but imagine what you don''t." She meant I should draw on my own experiences for emotions and feelings, but use my imagination to create the settings, characters, and events. You do not need to have fought a dragon to write about bravery — you just need to have felt brave.'
      - name: Speaker 3
        text: 'A visiting author told our class: "Every story is about a character who wants something and cannot easily get it." That one sentence changed everything for me. Now, before I start any story, I ask: what does my character want, and what is stopping them? If I can answer those two questions, I have a story.'
      - name: Speaker 4
        text: 'The best advice was from my dad, who is not even a writer. He said: "Read your story out loud." When I started doing this, I immediately noticed clunky sentences, awkward dialogue, and places where the rhythm was wrong. Your ear catches things your eyes miss. Now I read every draft aloud before I consider it finished.'
      - name: Speaker 5
        text: 'My English teacher told me: "Be specific." Instead of writing "a bird," write "a robin." Instead of "she ate food," write "she bit into a warm cinnamon roll." Specific details make writing come alive. It is the simplest advice I have ever received, but it has made the biggest difference to my writing.'
    statements:
      A: 'This person was told to write freely first and share later.'
      B: 'This person learned to use real emotions with imagined settings.'
      C: 'This person learned that every story needs a character with a goal and an obstacle.'
      D: 'This person discovered that reading aloud reveals writing problems.'
      E: 'This person learned that specific details improve writing.'
      F: 'This person was told to write for at least one hour every day.'
      G: 'This person was advised to copy the style of famous authors.'
      H: 'This person learned to use a thesaurus for every adjective.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "write the first draft with the door closed" — write freely first, share later (A).'
      Speaker 1Zh: '说话者1说"关着门写第一稿"——先自由写作，以后再分享（A）。'
      Speaker 2: 'Speaker 2 says "write what you know" for emotions but "imagine what you don''t" for settings — real emotions + imagined settings (B).'
      Speaker 2Zh: '说话者2说对于情感"写你知道的"但对于场景"想象你不知道的"——真实情感+想象的场景（B）。'
      Speaker 3: 'Speaker 3 says "every story is about a character who wants something and cannot easily get it" — goal + obstacle (C).'
      Speaker 3Zh: '说话者3说"每个故事都是关于一个想要某物但不容易得到的角色"——目标+障碍（C）。'
      Speaker 4: 'Speaker 4 says "Read your story out loud" and "your ear catches things your eyes miss" — reading aloud (D).'
      Speaker 4Zh: '说话者4说"大声朗读你的故事"和"你的耳朵能捕捉到眼睛遗漏的东西"——大声朗读（D）。'
      Speaker 5: 'Speaker 5 says "Be specific" — use "a robin" not "a bird" — specific details (E).'
      Speaker 5Zh: '说话者5说"要具体"——用"一只知更鸟"而不是"一只鸟"——具体细节（E）。'

  # L321-L330 continue with same pattern
  - id: L321
    type: multiple-matching
    title: 'How Stories Connect Us'
    titleZh: '故事如何连接我们'
    scene: 'You will hear five people talking about how a story connected them with someone else.'
    sceneZh: '你将听到五个人谈论一个故事如何把他们与其他人连接在一起。'
    difficulty: 2
    audioFile: 'L321.mp3'
    speakers:
      - name: Speaker 1
        text: 'I moved to a new school and did not know anyone. On my first day, I saw a girl reading the same book I was reading — The Girl Who Drank the Moon. I sat next to her and said, "Have you reached the part with the volcano yet?" She grinned and said, "No, do not spoil it!" We have been best friends ever since. A shared book created an instant friendship.'
      - name: Speaker 2
        text: 'My grandfather lives in China and I live in England. We do not speak the same language very well, but we both love Journey to the West. He tells me the stories in Mandarin and I tell him the same stories in English. The story gives us something to share even though we cannot have a normal conversation. It is our bridge.'
      - name: Speaker 3
        text: 'I read a book about a boy with anxiety, and for the first time I felt understood. I showed it to my mum and said, "This is what it feels like inside my head." She read it that night and the next morning she hugged me and said she understood now. The story said what I could not say myself.'
      - name: Speaker 4
        text: 'Our whole class read The Boy at the Back of the Class together and it changed our community. It is about a refugee boy, and after reading it, our class organised a welcome event for new refugee families in our town. The story inspired us to take real action. That is the power of a good book — it does not just change your mind, it changes what you do.'
      - name: Speaker 5
        text: 'I joined an online book club during lockdown. Every week, people from six different countries discussed the same book. I met someone from Brazil who had completely different opinions about the ending. We argued, laughed, and learned from each other. Now she is one of my closest friends, and we have never even met in person. A story turned a stranger into a friend.'
    statements:
      A: 'A shared book helped this person make a friend at a new school.'
      B: 'Stories help this person communicate across a language barrier with a relative.'
      C: 'A book helped this person explain their feelings to a family member.'
      D: 'A class reading project inspired this person''s community to take action.'
      E: 'An online book discussion turned a distant stranger into a close friend.'
      F: 'A bedtime story tradition strengthened this person''s bond with a sibling.'
      G: 'This person wrote a story that helped someone deal with loss.'
      H: 'This person started a storytelling festival in their neighbourhood.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says seeing someone read the same book led to "instant friendship" at a new school — shared book (A).'
      Speaker 1Zh: '说话者1说看到别人读同一本书在新学校建立了"即时友谊"——共同的书（A）。'
      Speaker 2: 'Speaker 2 says the story is their "bridge" with a grandfather despite language differences — language barrier (B).'
      Speaker 2Zh: '说话者2说这个故事是他们与祖父之间的"桥梁"，尽管语言不同——语言障碍（B）。'
      Speaker 3: 'Speaker 3 showed the book to mum saying "This is what it feels like inside my head" — explaining feelings (C).'
      Speaker 3Zh: '说话者3给妈妈看了书说"这就是我脑子里的感觉"——解释感受（C）。'
      Speaker 4: 'Speaker 4 says the class "organised a welcome event for refugee families" after reading — community action (D).'
      Speaker 4Zh: '说话者4说班级读完后"为难民家庭组织了欢迎活动"——社区行动（D）。'
      Speaker 5: 'Speaker 5 met someone from Brazil in an online book club who became a close friend — distant stranger (E).'
      Speaker 5Zh: '说话者5在网上读书会遇到了一个来自巴西的人，成为了亲密的朋友——远方的陌生人（E）。'

  - id: L322
    type: multiple-matching
    title: 'What Makes a Story Memorable'
    titleZh: '什么让一个故事令人难忘'
    scene: 'You will hear five readers talking about what makes a story stay with them long after reading.'
    sceneZh: '你将听到五位读者谈论什么让一个故事在读完后长久留在心中。'
    difficulty: 3
    audioFile: 'L322.mp3'
    speakers:
      - name: Speaker 1
        text: 'A story stays with me when the ending makes me see the whole story differently. I love books where the last page forces you to rethink everything you have just read. It is like the author pulls a rug out from under you, and suddenly the whole world shifts. Those surprise recontextualisation endings are the ones I never forget.'
      - name: Speaker 2
        text: 'For me, it is the characters. I remember characters who feel like real people — who have strengths and weaknesses, who make mistakes and learn from them. Years later, I do not remember the plots of many books, but I remember the characters. Jo March from Little Women still feels like an old friend I have not seen in a while.'
      - name: Speaker 3
        text: 'I never forget a story that makes me cry. Not because it is sad for the sake of being sad, but because it captures a universal truth about love, loss, or growing up. When a story touches a genuine human emotion, it carves itself into your memory. I still get emotional thinking about the ending of Charlotte''s Web.'
      - name: Speaker 4
        text: 'Beautiful language is what makes a story unforgettable for me. I can forgive a weak plot if the sentences are gorgeous. Some writers put words together in a way that feels like music — you want to read the same paragraph again and again just to savour the sound. I actually copy out my favourite sentences into a notebook.'
      - name: Speaker 5
        text: 'A strong sense of place makes a story stick. When an author creates a world so vivid that you can smell the sea or feel the cold wind, you never forget it. I can still close my eyes and walk through the Shire from The Lord of the Rings. The best settings become a place you can visit inside your mind whenever you want.'
    statements:
      A: 'This person remembers stories with surprise endings that change everything.'
      B: 'This person remembers characters who feel like real people.'
      C: 'This person remembers stories that capture genuine human emotions.'
      D: 'This person remembers beautiful, musical prose writing.'
      E: 'This person remembers vivid settings they can visualise clearly.'
      F: 'This person remembers stories with the most exciting action scenes.'
      G: 'This person remembers stories recommended by friends.'
      H: 'This person remembers stories they read during childhood holidays.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 remembers "the ending makes me see the whole story differently" — surprise recontextualisation endings (A).'
      Speaker 1Zh: '说话者1记住的是"结局让我对整个故事有不同的看法"——令人惊讶的重新定义结局（A）。'
      Speaker 2: 'Speaker 2 says "I remember characters who feel like real people" like "Jo March" — real characters (B).'
      Speaker 2Zh: '说话者2说"我记得感觉像真人的角色"如"Jo March"——真实的角色（B）。'
      Speaker 3: 'Speaker 3 never forgets "a story that makes me cry" because it "captures a universal truth" — genuine emotion (C).'
      Speaker 3Zh: '说话者3永远不会忘记"让我哭的故事"因为它"捕捉了普遍的真理"——真实情感（C）。'
      Speaker 4: 'Speaker 4 says "Beautiful language" where sentences feel "like music" — beautiful prose (D).'
      Speaker 4Zh: '说话者4说"美丽的语言"，句子感觉"像音乐"——美丽的散文（D）。'
      Speaker 5: 'Speaker 5 says "a strong sense of place" where you can "smell the sea or feel the cold wind" — vivid settings (E).'
      Speaker 5Zh: '说话者5说"强烈的地方感"，你能"闻到海的味道或感受到冷风"——生动的场景（E）。'

  # Remaining L323-L330 are additional short extracts to complete the 65 count
  - id: L323
    type: short-extract
    title: 'The Writer''s Notebook'
    titleZh: '作家的笔记本'
    scene: 'You will hear a girl explaining what she keeps in her writer''s notebook.'
    sceneZh: '你将听到一个女孩解释她在作家笔记本里记什么。'
    difficulty: 2
    audioFile: 'L323.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I carry my writer''s notebook everywhere. It is not a diary — I do not write about what happened each day. Instead, I collect things that might be useful for stories. Interesting words I overhear, descriptions of places, sketches of faces, bits of dialogue from conversations on the bus.'
      - speaker: girl
        voice: shimmer
        text: 'My favourite section is what I call "what if" questions. Whenever something ordinary happens, I ask "what if?" What if this bus could fly? What if my cat could talk? What if the old house on the corner was actually a portal? Most of my stories have started from a single "what if" question in this notebook.'
    question:
      text: 'Where do most of the girl''s stories begin?'
      textZh: '女孩的大多数故事从哪里开始？'
      options:
        A: 'From detailed character descriptions in her notebook.'
        B: 'From "what if" questions she writes in her notebook.'
        C: 'From interesting words she collects from conversations.'
      answer: 'B'
      explanation: 'She says "Most of my stories have started from a single ''what if'' question in this notebook."'
      explanationZh: '她说"我的大多数故事都是从这个笔记本里的一个假如问题开始的。"'

  - id: L324
    type: short-extract
    title: 'The Rewrite'
    titleZh: '重写'
    scene: 'You will hear a boy talking about the experience of rewriting his story.'
    sceneZh: '你将听到一个男孩谈论重写故事的经历。'
    difficulty: 2
    audioFile: 'L324.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'My teacher made me rewrite my story three times and at first I was frustrated. I thought the first version was good. But by the third version, even I could see the difference. The characters were more believable, the descriptions were more vivid, and the ending was much more satisfying.'
      - speaker: boy
        voice: echo
        text: 'The biggest change was the dialogue. In the first version, my characters just said what they meant. In the final version, they hinted, they avoided, they said one thing but meant another. That is how real people talk. Rewriting taught me that the first version of anything is never the best version — it is just the beginning.'
    question:
      text: 'What was the biggest improvement in the boy''s third version?'
      textZh: '男孩第三个版本最大的改进是什么？'
      options:
        A: 'The descriptions of places became more detailed.'
        B: 'The dialogue became more realistic and layered.'
        C: 'The story became much longer and more complex.'
      answer: 'B'
      explanation: 'He says the biggest change was the dialogue: characters "hinted, they avoided, they said one thing but meant another" — more realistic and layered.'
      explanationZh: '他说最大的变化是对话：角色"暗示、回避、说一件事但意思是另一件"——更真实、更有层次。'

  - id: L325
    type: short-extract
    title: 'The Power of Silence in Stories'
    titleZh: '故事中沉默的力量'
    scene: 'You will hear a teacher discussing how silence and pauses can be used in storytelling.'
    sceneZh: '你将听到一位老师讨论沉默和停顿如何在讲故事中使用。'
    difficulty: 3
    audioFile: 'L325.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Not everything in a story needs to be said. Sometimes the most powerful moments are the ones where characters say nothing. Think about it — in real life, when someone receives terrible news, they do not usually make a speech about how they feel. They go quiet. They stare. They sit down slowly.'
      - speaker: teacher
        voice: nova
        text: 'In your writing, try leaving space for silence. Instead of writing "He was devastated by the news," try "He stood perfectly still. The letter slipped from his fingers and drifted to the floor. Neither of them spoke." The silence speaks louder than any words could. Remember — in storytelling, what you leave out can be just as important as what you put in.'
    question:
      text: 'Why does the teacher suggest using silence in stories?'
      textZh: '为什么老师建议在故事中使用沉默？'
      options:
        A: 'Because readers prefer shorter stories with less dialogue.'
        B: 'Because silence can be more powerful than describing emotions with words.'
        C: 'Because writing dialogue is too difficult for most students.'
      answer: 'B'
      explanation: 'The teacher says "The silence speaks louder than any words could" and "what you leave out can be just as important as what you put in."'
      explanationZh: '老师说"沉默比任何语言都响亮"和"你省略的可以和你写入的一样重要。"'

  - id: L326
    type: short-extract
    title: 'The Storytelling Competition'
    titleZh: '讲故事比赛'
    scene: 'You will hear a student talking about performing a story at a competition.'
    sceneZh: '你将听到一个学生谈论在比赛中表演一个故事。'
    difficulty: 2
    audioFile: 'L326.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I entered the school storytelling competition last month. It was terrifying — I had to stand on stage and tell a story from memory to two hundred people. No notes, no props, just me and my voice.'
      - speaker: girl
        voice: shimmer
        text: 'What I discovered is that telling a story out loud is completely different from writing one. The pauses matter — I learned to wait two or three seconds before revealing something important. The volume matters — I whispered the scary parts and it made the audience lean forward. And eye contact matters — when I looked directly at someone while telling the story, they felt like I was telling it just for them. I did not win, but it taught me more about storytelling than any lesson ever has.'
    question:
      text: 'What surprised the girl most about oral storytelling?'
      textZh: '关于口头讲故事，什么最让女孩惊讶？'
      options:
        A: 'That memorising the story was the hardest part.'
        B: 'That techniques like pauses, volume changes, and eye contact made a huge difference.'
        C: 'That the audience was much smaller than she expected.'
      answer: 'B'
      explanation: 'She describes how pauses, whispering scary parts, and eye contact were all techniques that transformed the storytelling experience.'
      explanationZh: '她描述了停顿、低声讲述恐怖部分和眼神交流如何都是改变讲故事体验的技巧。'

  - id: L327
    type: short-extract
    title: 'Writing Buddies'
    titleZh: '写作伙伴'
    scene: 'You will hear two friends discussing their writing partnership.'
    sceneZh: '你将听到两个朋友讨论他们的写作搭档关系。'
    difficulty: 2
    audioFile: 'L327.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Having a writing buddy has made such a difference. Every Sunday, Lily and I meet at the library, sit at the same table, and write for two hours. We do not talk — we just write. Knowing someone else is working alongside you keeps you motivated.'
      - speaker: girl
        voice: shimmer
        text: 'And after the writing session, we swap our work and give each other honest feedback. That is the most valuable part. James always notices when my dialogue sounds unnatural, and I always catch the places where his descriptions are too long. We make each other better writers. I cannot imagine writing without a buddy now.'
    question:
      text: 'What do the friends find most valuable about their writing partnership?'
      textZh: '朋友们觉得写作搭档关系中最有价值的是什么？'
      options:
        A: 'Writing together in the same place keeps them motivated.'
        B: 'Giving each other honest feedback improves their writing.'
        C: 'They can borrow each other''s story ideas.'
      answer: 'B'
      explanation: 'The girl says "That is the most valuable part" referring to swapping work and giving "each other honest feedback" — they "make each other better writers."'
      explanationZh: '女孩说"那是最有价值的部分"，指的是交换作品并给出"彼此坦诚的反馈"——他们"让彼此成为更好的作家"。'

  - id: L328
    type: short-extract
    title: 'The Reluctant Reader'
    titleZh: '不情愿的读者'
    scene: 'You will hear a boy describing how he went from hating reading to loving it.'
    sceneZh: '你将听到一个男孩描述他如何从讨厌阅读变成热爱阅读。'
    difficulty: 2
    audioFile: 'L328.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Until I was ten, I hated reading. I thought books were boring. But then my teacher gave me Diary of a Wimpy Kid, and everything changed. It was funny, the chapters were short, and it had illustrations on every page. I read the whole thing in two days.'
      - speaker: boy
        voice: echo
        text: 'From there, I moved to Percy Jackson, then Harry Potter, then The Hunger Games. Each book was a little longer and a little more challenging. My teacher said she had given me exactly the right book at exactly the right time — that is the secret to creating a reader. Now I read every night before bed and I cannot imagine life without books. All it took was one right book to open the door.'
    question:
      text: 'What changed the boy''s attitude towards reading?'
      textZh: '什么改变了男孩对阅读的态度？'
      options:
        A: 'His parents forced him to read for one hour every night.'
        B: 'His teacher gave him a book that was exactly right for him.'
        C: 'He started watching film adaptations of books.'
      answer: 'B'
      explanation: 'He says "my teacher gave me Diary of a Wimpy Kid, and everything changed" — she gave him "exactly the right book at exactly the right time."'
      explanationZh: '他说"老师给了我《小屁孩日记》，一切都变了"——她给了他"在恰好的时间恰好对的书"。'

  - id: L329
    type: short-extract
    title: 'The Story Map'
    titleZh: '故事地图'
    scene: 'You will hear a teacher introducing the concept of a story map for planning.'
    sceneZh: '你将听到一位老师介绍故事地图这个规划概念。'
    difficulty: 2
    audioFile: 'L329.mp3'
    script:
      - speaker: teacher
        voice: fable
        text: 'Before you start writing your FCE story, I want you to create a story map. It takes only two minutes but it saves you from getting lost halfway through. Draw a simple diagram with four boxes: Hook, Rising Action, Climax, and Resolution.'
      - speaker: teacher
        voice: fable
        text: 'In each box, write one or two sentences about what happens in that section. You do not need full sentences — bullet points are fine. The story map is like a sat nav for your writing — it tells you where you are going so you do not take wrong turns. I promise you, students who plan their stories always write better ones than students who start writing without thinking first.'
    question:
      text: 'Why does the teacher compare the story map to a sat nav?'
      textZh: '为什么老师将故事地图比作导航系统？'
      options:
        A: 'Because both are electronic devices used in classrooms.'
        B: 'Because both guide you to your destination and prevent you from getting lost.'
        C: 'Because both require expensive technology to use.'
      answer: 'B'
      explanation: 'The teacher says the story map "tells you where you are going so you do not take wrong turns" — just like a sat nav guides driving.'
      explanationZh: '老师说故事地图"告诉你要去哪里这样你不会走错路"——就像导航引导驾驶一样。'

  - id: L330
    type: short-extract
    title: 'The Storytelling Circle'
    titleZh: '讲故事圈'
    scene: 'You will hear a grandmother talking about a storytelling tradition in her community.'
    sceneZh: '你将听到一位祖母谈论她社区中的讲故事传统。'
    difficulty: 2
    audioFile: 'L330.mp3'
    script:
      - speaker: grandmother
        voice: nova
        text: 'Every month, our community gathers for what we call the Storytelling Circle. People of all ages sit together and share stories. Sometimes a grandfather tells a tale from his childhood. Sometimes a teenager shares a story they wrote at school. Sometimes a little child makes up a story on the spot, full of dragons and talking cats.'
      - speaker: grandmother
        voice: nova
        text: 'What I love about the Circle is that it reminds us we all have a story worth telling. You do not need to be a famous author to tell a good story. You just need to be honest, to use your imagination, and to care about the people listening. Stories are the oldest form of human connection, and as long as there are storytelling circles in the world, that connection will never be broken.'
    question:
      text: 'What does the grandmother say you need to tell a good story?'
      textZh: '祖母说讲一个好故事需要什么？'
      options:
        A: 'Training from a professional storytelling school.'
        B: 'Honesty, imagination, and caring about the listeners.'
        C: 'A written script prepared in advance.'
      answer: 'B'
      explanation: 'She says "You just need to be honest, to use your imagination, and to care about the people listening."'
      explanationZh: '她说"你只需要诚实、使用你的想象力、并关心在听的人。"'
