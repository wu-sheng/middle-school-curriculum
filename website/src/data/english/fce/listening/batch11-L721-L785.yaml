  # L757-L770: Additional Part 3 and Part 4 exercises (condensed)

  - id: L757
    type: multiple-matching
    title: 'Teachers Share Exam Advice'
    titleZh: '老师们分享考试建议'
    scene: 'You will hear five teachers sharing their best exam advice.'
    sceneZh: '你将听到五位老师分享他们最好的考试建议。'
    difficulty: 4
    audioFile: 'L757.mp3'
