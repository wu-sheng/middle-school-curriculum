# FCE Daily Listening Practice — Month 12, Batch 11
# 65 exercises (L721–L785)
# L721–L740: Part 1 short extracts (20 exercises, difficulty 3-4)
# L741–L755: Part 2 sentence completion (15 exercises, difficulty 3-4)
# L756–L770: Part 3 multiple matching (15 exercises, difficulty 4)
# L771–L785: Part 4 long conversation (15 exercises, difficulty 4)
# Theme: Exam preparation & Final review for 8-9 year old learners

extracts:
  # ============================================================
  # L721–L740: Part 1 — Short Extracts (Exam Strategy Theme)
  # ============================================================

  - id: L721
    type: short-extract
    title: 'The Exam Coach'
    titleZh: '考试教练'
    scene: 'You will hear a teacher giving advice about exam preparation.'
    sceneZh: '你将听到一位老师给出关于考试准备的建议。'
    difficulty: 3
    audioFile: 'L721.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The number one mistake students make before an exam is trying to learn new material the night before. At that point, you should be reviewing what you already know, not panicking about what you do not know. Think of it like packing for a holiday — you check you have everything, you do not go shopping for new clothes.'
      - speaker: teacher
        voice: nova
        text: 'My advice is simple: spend the evening before the exam doing a light review of your notes, pack your bag with everything you need, and go to bed early. A rested brain is your most powerful tool.'
    question:
      text: 'What does the teacher compare exam preparation to?'
      textZh: '老师把考试准备比作什么？'
      options:
        A: 'Cooking a complicated meal'
        B: 'Packing for a holiday'
        C: 'Training for a sports competition'
      answer: 'B'
      explanation: 'The teacher says "Think of it like packing for a holiday — you check you have everything."'
      explanationZh: '老师说"把它想象成为假期打包——你检查你是否有一切。"'

  - id: L722
    type: short-extract
    title: 'The Nervous Student'
    titleZh: '紧张的学生'
    scene: 'You will hear a student talking about how she dealt with exam nerves.'
    sceneZh: '你将听到一个学生谈论她如何应对考试紧张。'
    difficulty: 3
    audioFile: 'L722.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I used to get so nervous before exams that I could barely eat breakfast. My hands would shake and my mind would go completely blank. Then my mum taught me a breathing technique — you breathe in for four seconds, hold for four seconds, and breathe out for four seconds.'
      - speaker: girl
        voice: shimmer
        text: 'The first time I tried it in an exam, I was amazed. After just three rounds of breathing, my heart stopped racing and I could actually think clearly again. Now I do it before every exam, and it works every time.'
    question:
      text: 'What helped the girl overcome her exam nerves?'
      textZh: '什么帮助这个女孩克服了考试紧张？'
      options:
        A: 'Eating a large breakfast before the exam'
        B: 'A breathing technique her mother taught her'
        C: 'Studying until the very last minute'
      answer: 'B'
      explanation: 'Her mum taught her a breathing technique (4-4-4) that helped her calm down and think clearly.'
      explanationZh: '她妈妈教了她一个呼吸技巧（4-4-4），帮助她冷静下来清楚思考。'

  - id: L723
    type: short-extract
    title: 'The Reading Strategy'
    titleZh: '阅读策略'
    scene: 'You will hear a boy explaining his approach to the reading paper.'
    sceneZh: '你将听到一个男孩解释他对阅读试卷的方法。'
    difficulty: 3
    audioFile: 'L723.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Everyone in my class reads the passage first and then looks at the questions. But I do it the other way round. I read all the questions first and underline the key words. That way, when I read the passage, I already know what information I am looking for.'
      - speaker: boy
        voice: echo
        text: 'My teacher was sceptical at first, but when I started getting higher marks than everyone else, she actually recommended my method to the whole class. It saves so much time because you do not have to read the passage twice.'
    question:
      text: 'What is unusual about the boy''s reading strategy?'
      textZh: '这个男孩的阅读策略有什么不寻常的？'
      options:
        A: 'He reads the passage three times.'
        B: 'He reads the questions before the passage.'
        C: 'He only reads the first and last paragraphs.'
      answer: 'B'
      explanation: '"I read all the questions first and underline the key words" — he reads questions before the passage.'
      explanationZh: '"我先读所有的题目并划出关键词"——他在阅读文章之前先读题目。'

  - id: L724
    type: short-extract
    title: 'The Vocabulary Notebook'
    titleZh: '词汇笔记本'
    scene: 'You will hear a girl describing her vocabulary learning method.'
    sceneZh: '你将听到一个女孩描述她的词汇学习方法。'
    difficulty: 3
    audioFile: 'L724.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I keep a special notebook where I write down every new word I learn. But I do not just write the word and its meaning. I write an example sentence using the word, any common collocations, and a note about words that are easily confused with it.'
      - speaker: girl
        voice: shimmer
        text: 'For example, when I learned "affect" and "effect," I drew a picture of a big A for Action next to "affect" to remind me it is the verb. It might seem like extra work, but it means I actually remember the words long after I first learn them.'
    question:
      text: 'What extra information does the girl include in her vocabulary notebook?'
      textZh: '这个女孩在她的词汇笔记本中额外包含了什么信息？'
      options:
        A: 'Only the word and its translation'
        B: 'Example sentences, collocations, and notes about confusing words'
        C: 'Phonetic transcriptions and grammar rules'
      answer: 'B'
      explanation: 'She writes "an example sentence, common collocations, and notes about easily confused words."'
      explanationZh: '她写"一个例句、常见搭配和关于容易混淆的词的笔记。"'

  - id: L725
    type: short-extract
    title: 'The Writing Planner'
    titleZh: '写作规划师'
    scene: 'You will hear a teacher explaining how to plan an essay.'
    sceneZh: '你将听到一位老师解释如何规划一篇作文。'
    difficulty: 3
    audioFile: 'L725.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'I always tell my students to spend five minutes planning before they write a single word. Some students think this is a waste of time, but I can promise you it is the opposite. A planned essay is always better organised, more coherent, and easier to write than one where the student just starts writing and hopes for the best.'
      - speaker: teacher
        voice: nova
        text: 'The plan does not need to be elaborate. Just write four headings — Introduction, Point 1, Point 2, Conclusion — and under each heading, jot down two or three key words. That is all you need.'
    question:
      text: 'How long does the teacher say students should spend planning?'
      textZh: '老师说学生应该花多长时间规划？'
      options:
        A: 'Two minutes'
        B: 'Five minutes'
        C: 'Ten minutes'
      answer: 'B'
      explanation: '"I always tell my students to spend five minutes planning."'
      explanationZh: '"我总是告诉我的学生花五分钟规划。"'

  - id: L726
    type: short-extract
    title: 'The Listening Expert'
    titleZh: '听力专家'
    scene: 'You will hear a student sharing tips for the listening test.'
    sceneZh: '你将听到一个学生分享听力测试技巧。'
    difficulty: 3
    audioFile: 'L726.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'The biggest trap in the listening test is distractors. The recording mentions all the possible answers, but only one is correct. You have to listen for signal words like "actually," "in fact," "but," and "however" — these usually come just before the real answer.'
      - speaker: boy
        voice: echo
        text: 'I learned this the hard way. In my first practice test, I chose the first thing I heard for every question and got half of them wrong. Once I started listening for signal words, my score went up by twenty percent.'
    question:
      text: 'What does the student say you should listen for?'
      textZh: '这个学生说你应该注意听什么？'
      options:
        A: 'The first answer mentioned in the recording'
        B: 'Signal words like "actually" and "however" that indicate the real answer'
        C: 'The speed at which the speakers talk'
      answer: 'B'
      explanation: '"Listen for signal words like actually, in fact, but, and however — these usually come just before the real answer."'
      explanationZh: '"注意信号词如actually, in fact, but, 和however——这些通常在真正答案之前出现。"'

  - id: L727
    type: short-extract
    title: 'The Spelling Champion'
    titleZh: '拼写冠军'
    scene: 'You will hear a girl talking about common spelling mistakes.'
    sceneZh: '你将听到一个女孩谈论常见的拼写错误。'
    difficulty: 3
    audioFile: 'L727.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I made a list of words I always used to misspell, and I created a memory trick for each one. For example, "necessary" has one collar and two socks — one C and two S''s. And for "separate," I remember there is "a rat" in the middle. These little tricks really work!'
      - speaker: girl
        voice: shimmer
        text: 'The most common spelling mistakes in our class are "definitely" — people always write "definately" — and "accommodation," which has double C and double M. If you can spell those two correctly, you are already ahead of most students.'
    question:
      text: 'How does the girl remember the spelling of "necessary"?'
      textZh: '这个女孩如何记住"necessary"的拼写？'
      options:
        A: 'She writes it one hundred times.'
        B: 'She thinks of one collar (C) and two socks (SS).'
        C: 'She breaks it into smaller words.'
      answer: 'B'
      explanation: '"Necessary has one collar and two socks — one C and two S''s."'
      explanationZh: '"Necessary有一个领子和两只袜子——一个C和两个S。"'

  - id: L728
    type: short-extract
    title: 'The Error Log'
    titleZh: '错误日志'
    scene: 'You will hear a teacher describing a study technique.'
    sceneZh: '你将听到一位老师描述一种学习技巧。'
    difficulty: 3
    audioFile: 'L728.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'One of the most effective study techniques I have ever seen is the error log. After each practice test, write down every mistake you made, the correct answer, and a brief explanation of why you went wrong. Then, before the next practice test, review your error log.'
      - speaker: teacher
        voice: nova
        text: 'What happens is remarkable. Students who keep an error log almost never make the same mistake twice. The act of writing down the error and understanding why it happened creates a much stronger memory than simply seeing the correct answer.'
    question:
      text: 'According to the teacher, what is the main benefit of keeping an error log?'
      textZh: '根据老师的说法，保留错误日志的主要好处是什么？'
      options:
        A: 'It helps students finish tests faster.'
        B: 'It prevents students from repeating the same mistakes.'
        C: 'It makes the teacher''s job easier.'
      answer: 'B'
      explanation: '"Students who keep an error log almost never make the same mistake twice."'
      explanationZh: '"保留错误日志的学生几乎不会犯同样的错误两次。"'

  - id: L729
    type: short-extract
    title: 'The Time Manager'
    titleZh: '时间管理者'
    scene: 'You will hear a boy explaining how he manages time in exams.'
    sceneZh: '你将听到一个男孩解释他如何在考试中管理时间。'
    difficulty: 3
    audioFile: 'L729.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Before the exam starts, I write my time targets at the top of the paper. For the reading and use of English paper, I write "Parts 1-4: finish by 10:30" and "Parts 5-7: finish by 11:15." Having those targets written down stops me from spending too long on any one section.'
      - speaker: boy
        voice: echo
        text: 'If I notice I am falling behind, I use the skip-and-return method. I put a star next to any difficult question, write my best guess, and come back to it at the end. This way, I never run out of time.'
    question:
      text: 'What does the boy do at the start of an exam?'
      textZh: '这个男孩在考试开始时做什么？'
      options:
        A: 'He reads through all the questions first.'
        B: 'He writes time targets at the top of his paper.'
        C: 'He begins with the easiest section.'
      answer: 'B'
      explanation: '"Before the exam starts, I write my time targets at the top of the paper."'
      explanationZh: '"在考试开始之前，我在试卷顶部写下时间目标。"'

  - id: L730
    type: short-extract
    title: 'The Confidence Builder'
    titleZh: '建立信心'
    scene: 'You will hear a teacher talking about confidence on exam day.'
    sceneZh: '你将听到一位老师谈论考试当天的信心。'
    difficulty: 3
    audioFile: 'L730.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'I tell all my students the same thing on exam day: you have already done the hardest part. The months of preparation, the practice tests, the vocabulary learning — that was the real challenge. The exam itself is simply your opportunity to show what you know.'
      - speaker: teacher
        voice: shimmer
        text: 'Feeling nervous is completely normal. In fact, a little nervousness actually helps you concentrate. The important thing is to trust your preparation and not let fear take control. You are more ready than you think.'
    question:
      text: 'What does the teacher say about feeling nervous?'
      textZh: '老师对感到紧张说了什么？'
      options:
        A: 'It means you have not studied enough.'
        B: 'It is completely normal and can actually help concentration.'
        C: 'You should take medicine to stop it.'
      answer: 'B'
      explanation: '"Feeling nervous is completely normal. In fact, a little nervousness actually helps you concentrate."'
      explanationZh: '"感到紧张是完全正常的。事实上，一点紧张实际上有助于集中注意力。"'

  - id: L731
    type: short-extract
    title: 'The Grammar Checker'
    titleZh: '语法检查者'
    scene: 'You will hear a girl describing her method for checking writing.'
    sceneZh: '你将听到一个女孩描述她检查写作的方法。'
    difficulty: 3
    audioFile: 'L731.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I have a three-step checking routine that I always follow. First, I read each sentence and check that the verb matches the subject. Second, I look for missing articles — I always forget to use "the" before specific nouns. Third, I check my spelling by reading the essay backwards, from the last word to the first.'
      - speaker: girl
        voice: shimmer
        text: 'Reading backwards sounds strange, but it is brilliant for finding spelling errors. When you read forwards, your brain fills in the correct spelling automatically. But when you read backwards, you see each word individually.'
    question:
      text: 'Why does the girl read her essay backwards?'
      textZh: '为什么这个女孩倒着读她的作文？'
      options:
        A: 'To check that the paragraphs are in the right order'
        B: 'To find spelling errors by seeing each word individually'
        C: 'To make sure the conclusion comes first'
      answer: 'B'
      explanation: '"When you read backwards, you see each word individually" — this helps spot spelling errors.'
      explanationZh: '"当你倒着读时，你会单独看到每个词"——这有助于发现拼写错误。'

  - id: L732
    type: short-extract
    title: 'The Practice Test Marathon'
    titleZh: '模拟考试马拉松'
    scene: 'You will hear a boy talking about how he prepared for the exam.'
    sceneZh: '你将听到一个男孩谈论他如何准备考试。'
    difficulty: 3
    audioFile: 'L732.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'In the last three months before the exam, I did one full practice test every single weekend. At first, I thought it was going to be boring, but actually, each test taught me something new. I discovered which types of questions I was good at and which ones I needed to work on.'
      - speaker: boy
        voice: echo
        text: 'By the tenth practice test, the real exam felt like just another Saturday morning. I knew the format so well that nothing could surprise me. If I could give one piece of advice, it would be this: do as many practice tests as you can.'
    question:
      text: 'What was the main benefit of doing many practice tests?'
      textZh: '做许多模拟测试的主要好处是什么？'
      options:
        A: 'He memorised all the answers.'
        B: 'The real exam felt familiar and unsurprising.'
        C: 'He did not need to study any grammar.'
      answer: 'B'
      explanation: '"The real exam felt like just another Saturday morning. I knew the format so well that nothing could surprise me."'
      explanationZh: '"真正的考试感觉就像又一个周六早上。我对格式如此熟悉，以至于没有什么能让我惊讶。"'

  - id: L733
    type: short-extract
    title: 'The Word Formation Expert'
    titleZh: '词形变换专家'
    scene: 'You will hear a teacher talking about word formation in exams.'
    sceneZh: '你将听到一位老师谈论考试中的词形变换。'
    difficulty: 4
    audioFile: 'L733.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The word formation part of the exam catches many students out. The most common mistake is forgetting to check for negative prefixes. If the sentence says "It is blank to park here without permission," and the base word is LEGAL, many students write "legal." But the context clearly requires "illegal" — the negative form.'
      - speaker: teacher
        voice: nova
        text: 'Always read the WHOLE sentence before deciding on your answer. The meaning of the sentence will tell you whether you need a positive or negative form. This one simple check can easily gain you two or three extra marks.'
    question:
      text: 'What is the most common word formation mistake according to the teacher?'
      textZh: '根据老师的说法，最常见的词形变换错误是什么？'
      options:
        A: 'Using the wrong suffix'
        B: 'Forgetting to check for negative prefixes'
        C: 'Spelling the root word incorrectly'
      answer: 'B'
      explanation: '"The most common mistake is forgetting to check for negative prefixes."'
      explanationZh: '"最常见的错误是忘记检查否定前缀。"'

  - id: L734
    type: short-extract
    title: 'The Paraphrase Spotter'
    titleZh: '改述侦探'
    scene: 'You will hear a student explaining how to spot paraphrases in reading tests.'
    sceneZh: '你将听到一个学生解释如何在阅读测试中识别改述。'
    difficulty: 4
    audioFile: 'L734.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The hardest thing about the reading test is that the answers almost never use the exact same words as the passage. If the passage says "she felt disappointed by the result," the correct option might say "she was let down by the outcome." Same meaning, completely different words.'
      - speaker: girl
        voice: shimmer
        text: 'This is why building your vocabulary is so important. If you only know one way to say something, you will not recognise the paraphrase. But if you know synonyms, you can spot the connection immediately.'
    question:
      text: 'Why does the student say vocabulary is important for reading tests?'
      textZh: '为什么这个学生说词汇对阅读测试很重要？'
      options:
        A: 'You need to know long words to impress the examiner.'
        B: 'Knowing synonyms helps you recognise paraphrases in the answers.'
        C: 'You get extra marks for using advanced vocabulary.'
      answer: 'B'
      explanation: '"If you know synonyms, you can spot the connection immediately" between the passage and the correct answer.'
      explanationZh: '"如果你知道同义词，你就能立即发现"文章和正确答案之间的联系。'

  - id: L735
    type: short-extract
    title: 'The Night Before'
    titleZh: '考试前一晚'
    scene: 'You will hear a mother describing her daughter''s routine before an exam.'
    sceneZh: '你将听到一位母亲描述女儿考试前的日常安排。'
    difficulty: 3
    audioFile: 'L735.mp3'
    script:
      - speaker: mother
        voice: nova
        text: 'The night before her FCE exam, my daughter did something that surprised me. Instead of studying until midnight like many of her friends, she reviewed her notes for just fifteen minutes, packed her bag carefully, and went to bed at nine o''clock. She said her teacher had told her that a rested brain performs thirty percent better than a tired one.'
      - speaker: mother
        voice: nova
        text: 'I was worried she was not taking it seriously, but in the end, she got the highest score in her class. Now I tell all the other parents: sleep is the best preparation.'
    question:
      text: 'What did the girl do the night before the exam?'
      textZh: '女孩在考试前一晚做了什么？'
      options:
        A: 'She studied until midnight.'
        B: 'She reviewed briefly and went to bed early.'
        C: 'She watched television to relax.'
      answer: 'B'
      explanation: 'She "reviewed her notes for just fifteen minutes, packed her bag, and went to bed at nine o''clock."'
      explanationZh: '她"只复习了十五分钟笔记，仔细收拾好书包，九点就上床了。"'

  - id: L736
    type: short-extract
    title: 'The Collocations Game'
    titleZh: '搭配游戏'
    scene: 'You will hear a teacher describing a vocabulary game.'
    sceneZh: '你将听到一位老师描述一个词汇游戏。'
    difficulty: 3
    audioFile: 'L736.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'One of my favourite classroom games for exam preparation is the collocations quiz. I say a verb, and students have to shout out the correct collocating noun. For example, I say "make" and they should say "a decision" or "progress" or "a mistake." But if I say "do," they should say "homework" or "research" or "an exam."'
      - speaker: teacher
        voice: echo
        text: 'It sounds simple, but make versus do collocations are one of the most frequently tested areas in the FCE. Getting these right can be the difference between passing and failing.'
    question:
      text: 'What does the collocations game help students practise?'
      textZh: '搭配游戏帮助学生练习什么？'
      options:
        A: 'Speaking fluently under pressure'
        B: 'The correct verb-noun combinations'
        C: 'Writing essays quickly'
      answer: 'B'
      explanation: 'The game practises verb + noun collocations (e.g., "make a decision" vs "do homework").'
      explanationZh: '这个游戏练习动词+名词搭配（如"make a decision"vs"do homework"）。'

  - id: L737
    type: short-extract
    title: 'The Key Word Transformer'
    titleZh: '关键词转换师'
    scene: 'You will hear a student talking about Part 4 of the Use of English paper.'
    sceneZh: '你将听到一个学生谈论语言运用试卷的第四部分。'
    difficulty: 4
    audioFile: 'L737.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Key word transformations used to be my worst section. I thought I had to change everything about the sentence. But then my teacher explained that the trick is to focus on the key word and think about what grammar structures it appears in.'
      - speaker: boy
        voice: echo
        text: 'For example, if the key word is "wish," I immediately think: wish plus past simple for present wishes, wish plus past perfect for past regrets. If the key word is "despite," I think: despite plus noun or gerund, not a clause. Once I started thinking about structures instead of trying to guess, my scores doubled.'
    question:
      text: 'What approach helped the boy improve at key word transformations?'
      textZh: '什么方法帮助这个男孩在关键词转换方面进步？'
      options:
        A: 'Memorising example sentences from a textbook'
        B: 'Focusing on the grammar structures associated with each key word'
        C: 'Reading more books in English'
      answer: 'B'
      explanation: '"Focus on the key word and think about what grammar structures it appears in" — this systematic approach doubled his scores.'
      explanationZh: '"专注于关键词并思考它出现在什么语法结构中"——这种系统化方法使他的分数翻倍。'

  - id: L738
    type: short-extract
    title: 'The Growth Mindset'
    titleZh: '成长心态'
    scene: 'You will hear a psychologist talking about how to deal with exam mistakes.'
    sceneZh: '你将听到一位心理学家谈论如何处理考试错误。'
    difficulty: 3
    audioFile: 'L738.mp3'
    script:
      - speaker: psychologist
        voice: nova
        text: 'When students get a question wrong in a practice test, they often say things like "I am terrible at grammar" or "I will never learn this." This kind of thinking is what we call a fixed mindset, and it actually prevents learning.'
      - speaker: psychologist
        voice: nova
        text: 'A much better response is: "I got this wrong — now I know what I need to practise." This is a growth mindset. Research shows that students with a growth mindset improve significantly faster than those with a fixed mindset, because they see mistakes as information, not as failure.'
    question:
      text: 'According to the psychologist, how should students respond to mistakes?'
      textZh: '根据心理学家的说法，学生应该如何回应错误？'
      options:
        A: 'Ignore them and move on quickly'
        B: 'See them as information about what to practise next'
        C: 'Feel bad about them to motivate harder studying'
      answer: 'B'
      explanation: '"A much better response is: I got this wrong — now I know what I need to practise." Mistakes are information, not failure.'
      explanationZh: '"更好的回应是：我答错了——现在我知道需要练习什么。"错误是信息，不是失败。'

  - id: L739
    type: short-extract
    title: 'The Essay Connector'
    titleZh: '作文连接词'
    scene: 'You will hear a teacher talking about linking words in essays.'
    sceneZh: '你将听到一位老师谈论作文中的连接词。'
    difficulty: 4
    audioFile: 'L739.mp3'
    script:
      - speaker: teacher
        voice: shimmer
        text: 'A common mistake in FCE essays is confusing "although" with "despite." Remember: "although" is a conjunction — it needs a full clause with a subject and verb. "Although it was raining, we went out." "Despite" is a preposition — it needs a noun or gerund. "Despite the rain, we went out."'
      - speaker: teacher
        voice: shimmer
        text: 'Another trap is "however." Many students write "The exam was hard however I tried my best." This is wrong. "However" is an adverb — it starts a new sentence with a comma: "The exam was hard. However, I tried my best."'
    question:
      text: 'What mistake do many students make with "however"?'
      textZh: '许多学生在使用"however"时犯什么错误？'
      options:
        A: 'They use it at the beginning of an essay.'
        B: 'They use it to join two clauses without starting a new sentence.'
        C: 'They spell it incorrectly.'
      answer: 'B'
      explanation: 'Students wrongly join two clauses: "hard however I tried." It should start a new sentence: "hard. However, I tried."'
      explanationZh: '学生错误地连接两个从句："hard however I tried." 它应该开始一个新句子："hard. However, I tried."'

  - id: L740
    type: short-extract
    title: 'The Final Pep Talk'
    titleZh: '最后的鼓励'
    scene: 'You will hear a teacher giving a final encouraging message before the exam.'
    sceneZh: '你将听到一位老师在考试前给出最后的鼓励信息。'
    difficulty: 3
    audioFile: 'L740.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Tomorrow is the big day, and I want you all to know something. I have been teaching for twenty years, and I have never had a class that worked as hard as you. You have learned over two thousand words, completed hundreds of grammar exercises, and read dozens of passages.'
      - speaker: teacher
        voice: nova
        text: 'Whatever happens tomorrow, be proud of what you have achieved. The skills you have built will stay with you for life. Now go home, review briefly, sleep well, and come back tomorrow ready to show the world what you can do. I believe in you.'
    question:
      text: 'What is the main message of the teacher''s speech?'
      textZh: '老师讲话的主要信息是什么？'
      options:
        A: 'Students should study all night to prepare.'
        B: 'Students should be proud of their hard work and believe in themselves.'
        C: 'The exam will be very easy so there is nothing to worry about.'
      answer: 'B'
      explanation: '"Be proud of what you have achieved" and "I believe in you" — the message is about confidence and pride in their preparation.'
      explanationZh: '"为你所取得的成就感到骄傲"和"我相信你"——信息是关于对准备工作的信心和骄傲。'

