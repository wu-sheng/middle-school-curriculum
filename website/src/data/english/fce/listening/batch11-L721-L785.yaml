    difficulty: 3
    audioFile: 'L741.mp3'
    script:
      - speaker: presenter
        voice: echo
        text: 'Today I am going to share my top tips for exam day. The first thing is to arrive at least fifteen minutes early. This gives you time to find your seat, set out your pencils, and take a few deep breaths before the exam starts. The second tip is to bring a water bottle. Studies show that even mild dehydration can reduce your concentration by up to twenty-five percent.'
      - speaker: presenter
        voice: echo
        text: 'My third tip is about the first five minutes of the exam. Before you start answering questions, read through the entire paper quickly. This gives your brain an overview of what is coming, so you can manage your time more effectively. And finally, when you finish, do not just sit there — use every remaining minute to check your answers. The last five minutes can be the most valuable of the entire exam.'
    questions:
