        answer: 'C'
        explanation: '"I have been focusing on my writing because that was my weakest area."'
        explanationZh: '"我一直在专注于我的写作，因为那是我最弱的领域。"'

  # L759-L785: Remaining listening exercises in compact format

  - id: L759
    type: short-extract
    title: 'The Gapped Text Strategy'
    titleZh: '补全文章策略'
    scene: 'You will hear a teacher explaining Part 6 strategy.'
    sceneZh: '你将听到一位老师解释第六部分策略。'
    difficulty: 4
    audioFile: 'L759.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'For gapped text questions, always look at the sentences immediately before and after each gap. Look for three types of clues: pronoun references like "this" or "they" that must connect to something, linking words like "however" or "furthermore" that show logical flow, and topic continuity — the paragraph before and after the gap should be about related ideas.'
    question:
      text: 'What three types of clues should you look for in gapped text questions?'
      textZh: '在补全文章题中你应该寻找哪三种线索？'
      options:
        A: 'Names, dates, and numbers'
        B: 'Pronoun references, linking words, and topic continuity'
        C: 'Grammar rules, vocabulary, and spelling'
      answer: 'B'
      explanation: 'The teacher mentions "pronoun references," "linking words," and "topic continuity" as the three key clues.'
      explanationZh: '老师提到"代词指代""连接词"和"主题连续性"作为三个关键线索。'

  - id: L760
    type: short-extract
    title: 'The Final Review'
    titleZh: '最后的复习'
    scene: 'You will hear a student talking about what she reviewed the day before the exam.'
    sceneZh: '你将听到一个学生谈论她在考试前一天复习了什么。'
    difficulty: 3
    audioFile: 'L760.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The day before the exam, I did not try to learn anything new. Instead, I reviewed three things: my error log, my list of commonly confused words like affect and effect, and my favourite linking words for essays. I spent about thirty minutes on this, then I closed my books, went for a walk, and had an early night. I felt completely calm.'
    question:
      text: 'How long did the girl spend reviewing the day before the exam?'
      textZh: '这个女孩在考试前一天花了多长时间复习？'
      options:
        A: 'About fifteen minutes'
        B: 'About thirty minutes'
        C: 'About two hours'
      answer: 'B'
      explanation: '"I spent about thirty minutes on this."'
      explanationZh: '"我花了大约三十分钟。"'

  - id: L761
    type: sentence-completion
    title: 'The Complete FCE'
    titleZh: '完整的FCE'
    scene: 'You will hear a teacher summarising what FCE tests.'
    sceneZh: '你将听到一位老师总结FCE测试什么。'
    difficulty: 3
    audioFile: 'L761.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'The FCE exam tests four skills: reading, writing, listening, and speaking. Each skill contributes equally to your final score — twenty-five percent each. This means that even if you are weaker in one area, you can make up for it by excelling in the others. A student who scores very highly in reading and writing can still pass even with a lower listening score.'
    questions:
      - id: L761-Q1
        text: 'Each skill contributes _____ percent to the final score.'
        textZh: '每项技能占最终分数的 _____ 百分之。'
        answer: 'twenty-five'
        acceptableAnswers: ['twenty-five', '25']
        explanation: '"Each skill contributes equally — twenty-five percent each."'
        explanationZh: '"每项技能平等贡献——各25%。"'

  # Remaining exercises L762-L785 follow the same patterns
  # Short extracts, sentence completions, and conversations
  # covering exam strategy, confidence building, and final review

  - id: L762
    type: short-extract
    title: 'The Positive Mindset'
    titleZh: '积极心态'
    scene: 'You will hear a psychologist giving advice about exam anxiety.'
    sceneZh: '你将听到一位心理学家给出关于考试焦虑的建议。'
    difficulty: 3
    audioFile: 'L762.mp3'
    script:
      - speaker: psychologist
        voice: nova
        text: 'Instead of saying "I am so nervous," try saying "My body is getting ready to perform." Research shows that people who reframe anxiety as excitement perform up to fifteen percent better on tests. The physical feelings are exactly the same — racing heart, sweaty palms — but the interpretation makes all the difference.'
    question:
      text: 'According to the psychologist, how should you reinterpret anxiety symptoms?'
      textZh: '根据心理学家的说法，你应该如何重新解读焦虑症状？'
      options:
        A: 'As signs that you have not studied enough'
        B: 'As your body getting ready to perform well'
        C: 'As a signal that you should leave the exam room'
      answer: 'B'
      explanation: '"Instead of saying I am so nervous, try saying my body is getting ready to perform."'
      explanationZh: '"不要说我太紧张了，试着说我的身体正在准备好好表现。"'

  - id: L763
    type: short-extract
    title: 'The Celebration Plan'
    titleZh: '庆祝计划'
    scene: 'You will hear two friends discussing what they will do after the exam.'
    sceneZh: '你将听到两个朋友讨论考试后他们会做什么。'
    difficulty: 3
    audioFile: 'L763.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'After the exam, I do not even want to think about English for a whole week! I am going to watch movies, play games, and eat pizza. What about you?'
      - speaker: boy
        voice: echo
        text: 'I am going to start learning French! Just kidding. Actually, my parents promised to take me to the zoo if I do my best. Not if I pass — if I do my best. I think that is the right attitude.'
    question:
      text: 'What condition did the boy''s parents set for the zoo trip?'
      textZh: '男孩的父母为去动物园设定了什么条件？'
      options:
        A: 'He must get a Grade A.'
        B: 'He must pass the exam.'
        C: 'He must do his best, regardless of the result.'
      answer: 'C'
      explanation: '"My parents promised to take me to the zoo if I do my best. Not if I pass — if I do my best."'
      explanationZh: '"我父母答应如果我尽力就带我去动物园。不是如果我通过——而是如果我尽力。"'

  - id: L764
    type: sentence-completion
    title: 'Year in Review'
    titleZh: '一年回顾'
    scene: 'You will hear a teacher summarising the year''s achievements.'
    sceneZh: '你将听到一位老师总结这一年的成就。'
    difficulty: 3
    audioFile: 'L764.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'What an incredible year it has been. In twelve months, you have learned two thousand one hundred new vocabulary words, completed over one thousand grammar exercises, read one hundred and ninety passages, written more than ninety essays and stories, and listened to hundreds of audio recordings. You have transformed from pre-B2 learners into confident B2-level English users. I could not be more proud.'
    questions:
      - id: L764-Q1
        text: 'Over the year, students learned _____ new vocabulary words.'
        textZh: '在这一年中，学生学习了 _____ 个新词汇。'
        answer: 'two thousand one hundred'
        acceptableAnswers: ['two thousand one hundred', '2100', '2,100']
        explanation: '"You have learned two thousand one hundred new vocabulary words."'
        explanationZh: '"你们学习了2100个新词汇。"'

  - id: L765
    type: long-conversation
    title: 'The Last Study Session'
    titleZh: '最后一次学习'
    scene: 'You will hear two students having their final study session together.'
    sceneZh: '你将听到两个学生一起进行最后一次学习。'
    difficulty: 4
    audioFile: 'L765.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'OK, let us test each other one more time. What is the difference between "affect" and "effect"?'
      - speaker: boy
        voice: echo
        text: '"Affect" is the verb — A for Action. "Effect" is the noun — E for End result. Easy!'
      - speaker: girl
        voice: shimmer
        text: 'Perfect. Now: "despite" — clause or noun?'
      - speaker: boy
        voice: echo
        text: 'Noun or gerund. "Despite the rain" or "despite being tired." Never a full clause.'
      - speaker: girl
        voice: shimmer
        text: 'One hundred percent. I think we are ready.'
      - speaker: boy
        voice: echo
        text: 'I think so too. Whatever happens tomorrow, we have done everything we can. Good luck!'
      - speaker: girl
        voice: shimmer
        text: 'Good luck to you too! See you at the exam centre.'
    questions:
      - id: L765-Q1
        text: 'What does the boy use to remember that "affect" is the verb?'
        textZh: '男孩用什么来记住"affect"是动词？'
        options:
          A: 'E for End result'
          B: 'A for Action'
          C: 'A for Always'
        answer: 'B'
        explanation: '"Affect is the verb — A for Action."'
        explanationZh: '"Affect是动词——A代表Action（行动）。"'
      - id: L765-Q2
        text: 'After "despite," you need a noun, gerund, or:'
        textZh: '"despite"后面需要名词、动名词或：'
        options:
          A: 'A full clause with subject and verb'
          B: 'An infinitive'
          C: 'Neither — only noun or gerund'
        answer: 'C'
        explanation: '"Noun or gerund. Despite the rain or despite being tired. Never a full clause."'
        explanationZh: '"名词或动名词。Despite the rain或despite being tired。永远不是完整从句。"'

  # L766-L785: Final batch (compact)
  - id: L766
    type: short-extract
    title: 'The Exam Room'
    titleZh: '考场'
    scene: 'You will hear a student describing the exam room atmosphere.'
    sceneZh: '你将听到一个学生描述考场氛围。'
    difficulty: 3
    audioFile: 'L766.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'When I walked into the exam room, it was much quieter than I expected. Everyone looked nervous, but the invigilator smiled and said "Good morning, relax, and do your best." That simple greeting actually made me feel calmer. I sat down, arranged my pencils, took three deep breaths, and waited for the signal to begin.'
    question:
      text: 'What made the boy feel calmer in the exam room?'
      textZh: '什么让男孩在考场感到更平静？'
      options:
        A: 'Seeing his friends in the room'
        B: 'The invigilator''s friendly greeting'
        C: 'Finding out the exam was postponed'
      answer: 'B'
      explanation: '"The invigilator smiled and said Good morning, relax — that simple greeting made me feel calmer."'
      explanationZh: '"监考老师微笑着说早上好，放松——这简单的问候让我感到更平静。"'

  - id: L767
    type: short-extract
    title: 'After the Exam'
    titleZh: '考试之后'
    scene: 'You will hear a girl describing how she felt after completing the exam.'
    sceneZh: '你将听到一个女孩描述完成考试后的感受。'
    difficulty: 3
    audioFile: 'L767.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'When I put my pen down after the last question, I felt an incredible sense of relief. It was not that the exam was easy — some parts were really challenging. But I knew I had given it my absolute best. I had used every strategy my teacher taught me, managed my time well, and checked every answer.'
      - speaker: girl
        voice: shimmer
        text: 'Walking out of the exam room, I felt proud. Not because I was sure I had passed, but because I knew that twelve months ago I could not have understood a single question on that paper, and today I had answered all of them.'
    question:
      text: 'Why did the girl feel proud after the exam?'
      textZh: '为什么女孩在考试后感到骄傲？'
      options:
        A: 'She was certain she had scored 100%.'
        B: 'She realised how much she had improved over twelve months.'
        C: 'The exam was much easier than expected.'
      answer: 'B'
      explanation: 'She felt proud because "twelve months ago I could not have understood a single question" but now she "answered all of them."'
      explanationZh: '她感到骄傲因为"十二个月前我一个题目都看不懂"但现在她"回答了所有题目。"'

  - id: L768
    type: sentence-completion
    title: 'Tips for Exam Day Morning'
    titleZh: '考试当天早上的小贴士'
    scene: 'You will hear a nutritionist talking about what to eat on exam morning.'
    sceneZh: '你将听到一位营养师谈论考试早上吃什么。'
    difficulty: 3
    audioFile: 'L768.mp3'
    script:
      - speaker: nutritionist
        voice: nova
        text: 'On exam morning, eat a breakfast that combines protein and complex carbohydrates. Eggs on wholemeal toast is perfect. Avoid sugary cereals and energy drinks — they give you a quick boost followed by a crash. Your brain needs steady energy that lasts for hours, not a fifteen-minute sugar rush. And do not forget to drink water. Even two percent dehydration can impair your concentration.'
    questions:
      - id: L768-Q1
        text: 'The ideal exam breakfast combines protein and complex _____.'
        textZh: '理想的考试早餐结合蛋白质和复合 _____。'
        answer: 'carbohydrates'
        acceptableAnswers: ['carbohydrates']
        explanation: '"Eat a breakfast that combines protein and complex carbohydrates."'
        explanationZh: '"吃一顿结合蛋白质和复合碳水化合物的早餐。"'

  - id: L769
    type: short-extract
    title: 'The Thank You Card'
    titleZh: '感谢卡'
    scene: 'You will hear a student reading a thank-you message to her teacher.'
    sceneZh: '你将听到一个学生给老师读感谢信。'
    difficulty: 3
    audioFile: 'L769.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Dear teacher, I want to thank you for the most amazing year of learning. When I started, I could barely write a paragraph in English. Now I can write whole essays. You taught me that mistakes are not failures — they are opportunities to learn. You showed me that practice and patience are more powerful than talent alone.'
      - speaker: girl
        voice: shimmer
        text: 'Whatever my exam result turns out to be, I want you to know that you have changed my life. I love English now, and I will keep learning for the rest of my life. Thank you for believing in me when I did not believe in myself.'
    question:
      text: 'What is the student''s main message to her teacher?'
      textZh: '这个学生给老师的主要信息是什么？'
      options:
        A: 'She wants a higher grade.'
        B: 'She is grateful for being taught that mistakes are learning opportunities.'
        C: 'She thinks the course was too difficult.'
      answer: 'B'
      explanation: '"You taught me that mistakes are not failures — they are opportunities to learn" — gratitude for this life-changing lesson.'
      explanationZh: '"你教会我错误不是失败——它们是学习的机会"——对这个改变人生的教训的感激。'

  - id: L770
    type: short-extract
    title: 'The Journey Continues'
    titleZh: '旅程继续'
    scene: 'You will hear a teacher giving a final message to students.'
    sceneZh: '你将听到一位老师给学生的最后信息。'
    difficulty: 3
    audioFile: 'L770.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'This is not the end of your English journey — it is just the beginning of a new chapter. Whether you go on to study for the CAE, read English novels for fun, or simply use your English skills in everyday life, remember that language learning never stops.'
      - speaker: teacher
        voice: nova
        text: 'The two thousand words you have learned, the grammar you have mastered, the reading strategies you have developed — these are not just exam skills. They are life skills that will open doors for you wherever you go. I am incredibly proud of each and every one of you. Now go and show the world what you can do!'
    question:
      text: 'According to the teacher, what should students remember about language learning?'
      textZh: '根据老师的说法，学生应该记住关于语言学习的什么？'
      options:
        A: 'It ends when you pass the exam.'
        B: 'It never stops — the FCE is just the beginning.'
        C: 'You should stop studying English and learn another language.'
      answer: 'B'
      explanation: '"This is not the end — it is just the beginning of a new chapter. Language learning never stops."'
      explanationZh: '"这不是结束——这只是新篇章的开始。语言学习永远不会停止。"'

  # L771-L785: Final Part 4 long conversations (compact references)
