        textZh: '你应该至少提前 _____ 分钟到达考试中心。'
        answer: 'fifteen'
        acceptableAnswers: ['fifteen', '15']
        explanation: '"Arrive at least fifteen minutes early."'
        explanationZh: '"至少提前十五分钟到达。"'
      - id: L741-Q2
        text: 'Mild dehydration can reduce concentration by up to _____ percent.'
        textZh: '轻度脱水可以将注意力降低高达 _____ 百分之。'
        answer: 'twenty-five'
        acceptableAnswers: ['twenty-five', '25']
        explanation: '"Even mild dehydration can reduce your concentration by up to twenty-five percent."'
        explanationZh: '"即使轻度脱水也可以将你的注意力降低高达25%。"'

  - id: L742
    type: sentence-completion
    title: 'The FCE Reading Paper'
    titleZh: 'FCE阅读试卷'
    scene: 'You will hear a teacher explaining the structure of the FCE reading paper.'
    sceneZh: '你将听到一位老师解释FCE阅读试卷的结构。'
    difficulty: 4
    audioFile: 'L742.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'The reading and use of English paper has seven parts and fifty-two questions in total. Parts one to four test your use of English — grammar, vocabulary, and word formation. These should take you about thirty minutes. Parts five to seven are the reading sections, and you should spend about forty-five minutes on these.'
      - speaker: teacher
        voice: nova
        text: 'Part five has multiple choice questions about a long text. Part six is the gapped text, where you have to put removed paragraphs back in the right place. And part seven is multiple matching, where you scan several short texts to find specific information. Each part tests a different reading skill, so you need a different strategy for each one.'
    questions:
      - id: L742-Q1
        text: 'The reading and use of English paper has _____ parts in total.'
        textZh: '阅读与语言运用试卷共有 _____ 个部分。'
        answer: 'seven'
        acceptableAnswers: ['seven', '7']
        explanation: '"The reading and use of English paper has seven parts."'
        explanationZh: '"阅读与语言运用试卷有七个部分。"'
      - id: L742-Q2
        text: 'In Part 6, you have to put removed _____ back in the right place.'
        textZh: '在第六部分，你必须把移除的 _____ 放回正确的位置。'
        answer: 'paragraphs'
        acceptableAnswers: ['paragraphs']
        explanation: '"Part six is the gapped text, where you have to put removed paragraphs back in the right place."'
        explanationZh: '"第六部分是补全文章，你必须把移除的段落放回正确的位置。"'

