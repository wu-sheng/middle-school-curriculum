  - id: L772
    type: long-conversation
    title: 'Parents Talk About FCE'
    titleZh: '家长谈FCE'
    scene: 'You will hear two parents discussing their children''s FCE preparation.'
    sceneZh: '你将听到两位家长讨论孩子们的FCE准备。'
    difficulty: 4
    audioFile: 'L772.mp3'
    script:
      - speaker: mother
        voice: shimmer
        text: 'My daughter has been studying for the FCE for a whole year. At first I was worried it was too much pressure for a nine-year-old, but honestly, she has loved every minute of it.'
      - speaker: father
        voice: echo
        text: 'My son is the same. He used to hate English, but the quest-based approach made it feel like a game. He actually asks to do his English homework now — I never thought I would see that!'
      - speaker: mother
        voice: shimmer
        text: 'The best part is the confidence it has given her. She can read English books now, and she had a conversation with a tourist last week entirely in English. The exam result almost does not matter — the real achievement is the skills she has built.'
    questions:
      - id: L772-Q1
        text: 'How long has the mother''s daughter been studying for FCE?'
        textZh: '这位母亲的女儿学FCE多长时间了？'
        options:
          A: 'Six months'
          B: 'One year'
          C: 'Two years'
        answer: 'B'
        explanation: '"My daughter has been studying for the FCE for a whole year."'
        explanationZh: '"我女儿学FCE整整一年了。"'
      - id: L772-Q2
        text: 'What does the mother say is the real achievement?'
        textZh: '这位母亲说真正的成就是什么？'
        options:
          A: 'Getting a high exam score'
          B: 'The skills and confidence her daughter has built'
          C: 'Being able to travel abroad'
        answer: 'B'
        explanation: '"The real achievement is the skills she has built" — not just the exam result.'
        explanationZh: '"真正的成就是她建立的技能"——不仅仅是考试结果。'

  # Remaining L773-L785 follow identical patterns
  # (short extracts, sentence completions, conversations)
  # covering final review, exam strategy, and confidence building

  - id: L773
    type: short-extract
    title: 'The Vocabulary Marathon'
    titleZh: '词汇马拉松'
    scene: 'You will hear a student reflecting on learning 2100 words.'
    sceneZh: '你将听到一个学生回顾学习2100个词汇的经历。'
    difficulty: 3
    audioFile: 'L773.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'When my teacher told me I would learn two thousand one hundred words in one year, I thought it was impossible. That is about six new words every single day! But because each word came with example sentences, collocations, and review sessions, they actually stuck. I estimate I can confidently use about eighteen hundred of them in writing and recognise all two thousand one hundred in reading.'
    question:
      text: 'How many of the 2100 words can the boy confidently use in writing?'
      textZh: '在2100个词中，这个男孩能自信地在写作中使用多少个？'
      options:
        A: 'About 800'
        B: 'About 1800'
        C: 'All 2100'
      answer: 'B'
      explanation: '"I can confidently use about eighteen hundred of them in writing."'
      explanationZh: '"我能自信地在写作中使用大约1800个。"'

  - id: L774
    type: short-extract
    title: 'Dream Big'
    titleZh: '梦想远大'
    scene: 'You will hear a young FCE candidate talking about her future goals.'
    sceneZh: '你将听到一位年轻的FCE考生谈论她的未来目标。'
    difficulty: 3
    audioFile: 'L774.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'After I pass the FCE, I want to start preparing for the CAE — that is the next level up, at C1. My teacher says I could be ready in about two years if I keep studying at this pace. My ultimate dream is to study at a university in England one day. My parents say it is a big dream for a nine-year-old, but I think that is exactly when you should start dreaming big!'
    question:
      text: 'What is the girl''s ultimate dream?'
      textZh: '这个女孩的终极梦想是什么？'
      options:
        A: 'To become a teacher'
        B: 'To study at a university in England'
        C: 'To write a book in English'
      answer: 'B'
      explanation: '"My ultimate dream is to study at a university in England one day."'
      explanationZh: '"我的终极梦想是有一天在英国的大学学习。"'

  - id: L775
    type: short-extract
    title: 'You Are Ready'
    titleZh: '你准备好了'
    scene: 'You will hear a final motivational message for exam candidates.'
    sceneZh: '你将听到给考生的最后一段励志信息。'
    difficulty: 3
    audioFile: 'L775.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: 'To every young person about to take their FCE exam: remember this. You have worked for twelve months. You have learned over two thousand words. You have read nearly two hundred passages. You have written almost a hundred essays and stories. You have completed over a thousand grammar exercises. You are not just prepared — you are exceptional. Go into that exam room with your head held high. You are ready. You are brilliant. And whatever happens, you should be incredibly proud of everything you have accomplished. Good luck!'
    question:
      text: 'What is the overall message of this final extract?'
      textZh: '这个最后片段的总体信息是什么？'
      options:
        A: 'Students need to study more before the exam.'
        B: 'Students should be proud of their preparation and feel confident.'
        C: 'The exam will be very easy.'
      answer: 'B'
      explanation: '"You are not just prepared — you are exceptional." The message is about pride, confidence, and recognising achievement.'
      explanationZh: '"你不仅仅是准备好了——你是杰出的。"信息是关于骄傲、信心和认识到成就。'

  # L776-L785: Final 10 exercises (minimal format to reach 65 total)

  - id: L776
    type: short-extract
    title: 'Exam Vocabulary Tip'
    titleZh: '考试词汇提示'
    scene: 'You will hear a teacher sharing a quick vocabulary tip.'
    sceneZh: '你将听到一位老师分享一个快速词汇提示。'
    difficulty: 3
    audioFile: 'L776.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'Here is a quick tip for the Use of English paper. If a question asks you to choose between "make" and "do," remember: we MAKE decisions, progress, mistakes, and friends. We DO homework, research, exercises, and exams. Make is for creating or producing. Do is for completing or performing.'
    question:
      text: 'According to the teacher, which verb do we use with "a decision"?'
      textZh: '根据老师的说法，我们和"a decision"一起用哪个动词？'
      options: { A: 'do', B: 'make', C: 'take' }
      answer: 'B'
      explanation: '"We MAKE decisions."'
      explanationZh: '"我们MAKE decisions。"'

  - id: L777
    type: short-extract
    title: 'The Writing Word Count'
    titleZh: '写作字数'
    scene: 'You will hear advice about word count in FCE writing.'
    sceneZh: '你将听到关于FCE写作字数的建议。'
    difficulty: 3
    audioFile: 'L777.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Remember, the target for FCE writing is one hundred and forty to one hundred and ninety words. If you write fewer than one hundred and twenty words, you will lose marks. If you write more than about two hundred and twenty, you are probably repeating yourself and wasting time. My advice: aim for about one hundred and seventy words. That is safely in the middle.'
    question:
      text: 'What word count does the teacher recommend aiming for?'
      textZh: '老师建议目标字数是多少？'
      options: { A: '120', B: '170', C: '220' }
      answer: 'B'
      explanation: '"Aim for about one hundred and seventy words."'
      explanationZh: '"目标大约170个词。"'

  - id: L778
    type: short-extract
    title: 'Conditional Review'
    titleZh: '条件句复习'
    scene: 'You will hear a student explaining conditionals.'
    sceneZh: '你将听到一个学生解释条件句。'
    difficulty: 4
    audioFile: 'L778.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The easiest way to remember conditionals is: first conditional uses present simple in the if-clause for real future possibilities. Second conditional uses past simple for unreal present situations. Third conditional uses past perfect for unreal past situations. And the mixed conditional combines a past condition with a present result — or the other way around.'
    question:
      text: 'Which conditional uses past perfect?'
      textZh: '哪种条件句使用过去完成时？'
      options: { A: 'First', B: 'Second', C: 'Third' }
      answer: 'C'
      explanation: '"Third conditional uses past perfect for unreal past situations."'
      explanationZh: '"第三条件句使用过去完成时表示不真实的过去情况。"'

  - id: L779
    type: short-extract
    title: 'The Importance of Sleep'
    titleZh: '睡眠的重要性'
    scene: 'You will hear a doctor talking about sleep and exam performance.'
    sceneZh: '你将听到一位医生谈论睡眠和考试表现。'
    difficulty: 3
    audioFile: 'L779.mp3'
    script:
      - speaker: doctor
        voice: echo
        text: 'Students who sleep eight hours the night before an exam score an average of twelve percent higher than those who sleep only five hours. During sleep, your brain consolidates everything you learned that day, moving it from short-term to long-term memory. Cutting sleep to gain study time is like cutting the foundation to make a building taller — it does not work.'
    question:
      text: 'How much higher do well-rested students score on average?'
      textZh: '休息好的学生平均高出多少分？'
      options: { A: '5%', B: '12%', C: '25%' }
      answer: 'B'
      explanation: '"Students who sleep eight hours score an average of twelve percent higher."'
      explanationZh: '"睡八个小时的学生平均高出12%。"'

  - id: L780
    type: short-extract
    title: 'Phrasal Verb Reminder'
    titleZh: '短语动词提醒'
    scene: 'You will hear a teacher reviewing important phrasal verbs.'
    sceneZh: '你将听到一位老师复习重要的短语动词。'
    difficulty: 3
    audioFile: 'L780.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Before the exam, let me remind you of five essential phrasal verbs. "Give up" means to stop trying. "Look forward to" means to anticipate with pleasure — and remember, the "to" is a preposition, so it takes a gerund. "Come across" means to find unexpectedly. "Work out" means to figure out. And "go through" means to review carefully.'
    question:
      text: 'What does "work out" mean?'
      textZh: '"Work out"是什么意思？'
      options: { A: 'To exercise', B: 'To figure out', C: 'To leave' }
      answer: 'B'
      explanation: '"Work out means to figure out."'
      explanationZh: '"Work out意思是弄清楚。"'

  - id: L781
    type: sentence-completion
    title: 'Exam Format Recap'
    titleZh: '考试格式回顾'
    scene: 'You will hear a quick recap of the FCE exam format.'
    sceneZh: '你将听到FCE考试格式的快速回顾。'
    difficulty: 3
    audioFile: 'L781.mp3'
    script:
      - speaker: teacher
        voice: echo
        text: 'The FCE has four papers. Paper one, Reading and Use of English, takes one hour and fifteen minutes and has fifty-two questions. Paper two, Writing, takes one hour and twenty minutes and has two tasks. Paper three, Listening, takes about forty minutes and has thirty questions. Paper four, Speaking, takes fourteen minutes and is done in pairs.'
    questions:
      - id: L781-Q1
        text: 'The Writing paper has _____ tasks.'
        textZh: '写作试卷有 _____ 项任务。'
        answer: 'two'
        acceptableAnswers: ['two', '2']
        explanation: '"Paper two, Writing, has two tasks."'
        explanationZh: '"第二试卷，写作，有两项任务。"'

  - id: L782
    type: short-extract
    title: 'Final Vocabulary Challenge'
    titleZh: '最后的词汇挑战'
    scene: 'You will hear a student testing herself on commonly confused words.'
    sceneZh: '你将听到一个学生测试自己常混淆的词。'
    difficulty: 4
    audioFile: 'L782.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'OK, last review. "Borrow" or "lend"? I borrow FROM someone, I lend TO someone. "Rise" or "raise"? Rise is intransitive — the sun rises. Raise is transitive — I raise my hand. "Sensible" or "sensitive"? Sensible means wise. Sensitive means easily upset. Got it. I am ready!'
    question:
      text: 'What does "sensible" mean according to the student?'
      textZh: '根据这个学生的说法，"sensible"是什么意思？'
      options: { A: 'Easily upset', B: 'Wise and practical', C: 'Very kind' }
      answer: 'B'
      explanation: '"Sensible means wise."'
      explanationZh: '"Sensible意思是明智的。"'

  - id: L783
    type: short-extract
    title: 'One Last Tip'
    titleZh: '最后一个提示'
    scene: 'You will hear a teacher sharing one final piece of advice.'
    sceneZh: '你将听到一位老师分享最后一条建议。'
    difficulty: 3
    audioFile: 'L783.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'If I could give you just one tip for the exam, it would be this: never change an answer unless you are absolutely certain the new answer is correct. Studies show that your first instinct is right about seventy percent of the time. Students who change answers out of panic usually change right answers to wrong ones.'
    question:
      text: 'According to the teacher, how often is your first instinct correct?'
      textZh: '根据老师的说法，你的第一直觉正确的频率是多少？'
      options: { A: 'About 50%', B: 'About 70%', C: 'About 90%' }
      answer: 'B'
      explanation: '"Your first instinct is right about seventy percent of the time."'
      explanationZh: '"你的第一直觉大约70%的时间是正确的。"'

  - id: L784
    type: short-extract
    title: 'The Finish Line'
    titleZh: '终点线'
    scene: 'You will hear a student after completing their final practice test.'
    sceneZh: '你将听到一个学生完成最后一套模拟测试后的感受。'
    difficulty: 3
    audioFile: 'L784.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I just finished my twelfth and final practice test, and I scored eighty-four percent. My first practice test three months ago was only fifty-one percent. That is a thirty-three percent improvement! It proves that practice really does make a difference. I am going to sleep well tonight and wake up ready for the real thing tomorrow.'
    question:
      text: 'How much did the boy''s score improve over three months?'
      textZh: '男孩的分数在三个月内提高了多少？'
      options: { A: '15%', B: '33%', C: '51%' }
      answer: 'B'
      explanation: 'From 51% to 84% = 33% improvement.'
      explanationZh: '从51%到84%=33%的提高。'

  - id: L785
    type: short-extract
    title: 'Good Luck!'
    titleZh: '祝好运！'
    scene: 'You will hear a final good-luck message.'
    sceneZh: '你将听到最后的祝好运信息。'
    difficulty: 3
    audioFile: 'L785.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: 'Congratulations on completing twelve months of FCE preparation. You have grown from a beginner to a confident B2-level English user. Tomorrow, when you sit down in the exam room, remember: you are not just taking a test. You are celebrating twelve months of hard work, determination, and growth. Be proud. Be confident. And most importantly, enjoy showing the world what you can do. Good luck — you have earned this!'
    question:
      text: 'What does the narrator say students should feel in the exam room?'
      textZh: '叙述者说学生在考场应该感到什么？'
      options:
        A: 'Afraid and nervous'
        B: 'Proud, confident, and ready to show their skills'
        C: 'Bored and tired'
      answer: 'B'
      explanation: '"Be proud. Be confident. Enjoy showing the world what you can do."'
      explanationZh: '"感到骄傲。感到自信。享受向世界展示你能做的。"'
