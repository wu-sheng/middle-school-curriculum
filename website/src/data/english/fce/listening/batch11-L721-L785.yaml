        voice: echo
        text: 'Never leave a blank answer. Even a guess has a twenty-five percent chance of being right, but a blank has zero chance.'
      - speaker: teacher3
        voice: shimmer
        text: 'Plan your essays. Five minutes of planning saves ten minutes of struggling later.'
      - speaker: teacher4
        voice: nova
        text: 'Get enough sleep the night before. I have seen more students fail from tiredness than from lack of knowledge.'
      - speaker: teacher5
        voice: echo
