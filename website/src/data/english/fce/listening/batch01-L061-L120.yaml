  - id: L101
    type: short-dialogue
    title: 'The Recycling Project'
    titleZh: '回收利用项目'
    scene: 'You hear two students discussing a recycling project at school.'
    sceneZh: '你听到两个学生在讨论学校的回收利用项目。'
    difficulty: 2
    audioFile: 'L101.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Our class has collected over two hundred plastic bottles this week for the recycling challenge. How's your class doing?"
      - speaker: boy
        voice: echo
        text: "We've got about a hundred and fifty, but we've also been collecting cardboard and old newspapers. Mrs Davis said we should focus on variety, not just quantity."
      - speaker: girl
        voice: shimmer
        text: "That's a smart approach. Maybe we should start collecting paper too."
    question:
      text: "What did Mrs Davis advise?"
      textZh: '戴维斯老师建议了什么？'
      options:
        A: 'Collect as many bottles as possible'
        B: 'Focus on collecting a variety of materials'
        C: 'Stop collecting after one week'
      answer: 'B'
      explanation: "The boy says Mrs Davis told them to focus on variety, not just quantity."
      explanationZh: '男孩说戴维斯老师让他们注重种类多样性，而不只是数量。'

  - id: L102
    type: monologue
    title: 'The Weather Forecast'
    titleZh: '天气预报'
    scene: 'You hear a weather forecast on television.'
    sceneZh: '你听到电视上的天气预报。'
    difficulty: 2
    audioFile: 'L102.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "Looking ahead to the weekend, Saturday is expected to start off cloudy with some light rain in the morning, but the clouds should clear by early afternoon, giving way to sunshine. Sunday, however, looks like a very different story — strong winds and heavy rain are forecast throughout the day, so if you're planning any outdoor activities, Saturday afternoon would be your best bet."
    question:
      text: "When is the best time for outdoor activities this weekend?"
      textZh: '这个周末什么时候最适合户外活动？'
      options:
        A: 'Saturday morning'
        B: 'Saturday afternoon'
        C: 'Sunday morning'
      answer: 'B'
      explanation: "The forecast says Saturday afternoon will be sunny, and recommends it as the best bet for outdoor activities."
      explanationZh: '预报说周六下午会是晴天，推荐那时做户外活动。'

  - id: L103
    type: student-adult
    title: 'The School Garden'
    titleZh: '学校花园'
    scene: 'You hear a student talking to a teacher about the school garden.'
    sceneZh: '你听到一个学生在和老师讨论学校花园。'
    difficulty: 2
    audioFile: 'L103.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Mr Green, the tomato plants in the school garden aren't looking very healthy. The leaves are turning yellow."
      - speaker: man
        voice: onyx
        text: "Hmm, that can happen when they get too much water. How often have you been watering them?"
      - speaker: girl
        voice: shimmer
        text: "Every day, sometimes twice a day when it's hot."
      - speaker: man
        voice: onyx
        text: "That's probably the issue. Tomatoes actually prefer the soil to dry out a little between waterings."
    question:
      text: "What is wrong with the tomato plants?"
      textZh: '番茄苗出了什么问题？'
      options:
        A: 'They are not getting enough sunlight'
        B: 'They are being watered too often'
        C: 'The soil needs more nutrients'
      answer: 'B'
      explanation: "The teacher suggests the yellow leaves are caused by too much water, and the girl confirms she waters them very frequently."
      explanationZh: '老师认为叶子变黄是因为浇水太多，女孩确认她浇水非常频繁。'

  - id: L104
    type: short-dialogue
    title: 'The Storm'
    titleZh: '暴风雨'
    scene: 'You hear two friends talking about a storm the night before.'
    sceneZh: '你听到两个朋友在谈论前一晚的暴风雨。'
    difficulty: 2
    audioFile: 'L104.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Did the storm wake you up last night? The thunder was so loud that our dog hid under the kitchen table for hours."
      - speaker: girl
        voice: shimmer
        text: "I slept right through it, actually! I didn't know anything about it until I saw a huge branch had fallen off the oak tree in our front garden this morning."
      - speaker: boy
        voice: echo
        text: "You're lucky you slept through it. I was awake until nearly two o'clock."
    question:
      text: "How did the girl find out about the storm?"
      textZh: '女孩怎么知道暴风雨的？'
      options:
        A: 'The thunder woke her up'
        B: 'She saw a fallen branch in the morning'
        C: 'Her dog was frightened'
      answer: 'B'
      explanation: "The girl slept through the storm and only found out about it when she saw a huge branch had fallen from the tree in the morning."
      explanationZh: '女孩睡过了暴风雨，直到早上看到一根大树枝从树上掉下来才知道。'

  - id: L105
    type: three-person
    title: 'The Beach Clean-Up'
    titleZh: '海滩清理'
    scene: 'You hear three students organising a beach clean-up event.'
    sceneZh: '你听到三个学生在组织海滩清理活动。'
    difficulty: 3
    audioFile: 'L105.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "So for the beach clean-up, I've already arranged for the council to lend us gloves and bin bags. We just need to sort out transport."
      - speaker: boy
        voice: echo
        text: "My dad said he could drive a group of us in the minibus. That would take about eight people."
      - speaker: girl2
        voice: fable
        text: "And I've put up posters around school. So far, fifteen people have signed up, which means we'll need another car as well."
    question:
      text: "What problem still needs to be solved?"
      textZh: '什么问题还需要解决？'
      options:
        A: 'They need more gloves and bags'
        B: 'They do not have enough volunteers'
        C: 'They need more transport for all the volunteers'
      answer: 'C'
      explanation: "The minibus holds eight people but fifteen have signed up, so they need another car."
      explanationZh: '小巴能载八个人，但有十五个人报名了，所以他们还需要另一辆车。'

  - id: L106
    type: short-dialogue
    title: 'Saving Energy'
    titleZh: '节约能源'
    scene: 'You hear a brother and sister talking about saving energy at home.'
    sceneZh: '你听到兄妹俩在讨论在家节约能源。'
    difficulty: 2
    audioFile: 'L106.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Mum said if we manage to cut the electricity bill this month, she'll put the savings towards our holiday fund."
      - speaker: girl
        voice: shimmer
        text: "Okay, so what can we do? We already turn the lights off when we leave a room."
      - speaker: boy
        voice: echo
        text: "True, but we still leave our chargers plugged in all day even when we're not using them. Dad says those use more energy than people think."
    question:
      text: "What new energy-saving idea does the boy suggest?"
      textZh: '男孩提出了什么新的节能建议？'
      options:
        A: 'Turning off lights when leaving a room'
        B: 'Unplugging chargers when not in use'
        C: 'Using less hot water'
      answer: 'B'
      explanation: "The girl says they already turn off lights. The boy's new suggestion is to stop leaving chargers plugged in all day."
      explanationZh: '女孩说他们已经做到离开房间关灯了。男孩的新建议是不要一整天都把充电器插着。'

  - id: L107
    type: radio
    title: 'Nature Report'
    titleZh: '自然报道'
    scene: 'You hear a nature report on the radio.'
    sceneZh: '你听到广播里的一则自然报道。'
    difficulty: 3
    audioFile: 'L107.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "In encouraging news for local wildlife, the number of hedgehogs spotted in city parks has increased by thirty per cent compared to last year. Experts believe this is partly due to the wildlife corridors that were introduced eighteen months ago — small gaps in garden fences that allow hedgehogs to move freely between gardens, which had previously been cut off from one another."
    question:
      text: "What has helped the hedgehog population increase?"
      textZh: '什么帮助了刺猬数量的增长？'
      options:
        A: 'People feeding them in parks'
        B: 'Wildlife corridors — small gaps in fences'
        C: 'A ban on building in certain areas'
      answer: 'B'
      explanation: "The report says experts believe the increase is partly due to wildlife corridors — small gaps in garden fences."
      explanationZh: '报道说专家认为增长部分归因于野生动物通道——花园围栏中的小缝隙。'

  - id: L108
    type: short-dialogue
    title: 'The Seasons'
    titleZh: '四季'
    scene: 'You hear two students discussing their favourite seasons.'
    sceneZh: '你听到两个学生在讨论他们最喜欢的季节。'
    difficulty: 2
    audioFile: 'L108.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Everyone says summer is the best season, but I actually prefer autumn. I love it when the leaves change colour and the air feels crisp."
      - speaker: boy
        voice: echo
        text: "I can see why you'd say that. For me, though, it has to be spring. After months of cold and dark, seeing the flowers come out and the days get longer really cheers me up."
    question:
      text: "Why does the boy prefer spring?"
      textZh: '男孩为什么喜欢春天？'
      options:
        A: 'He enjoys the warm weather'
        B: 'He likes seeing flowers appear and the days get longer after winter'
        C: 'He has his birthday in spring'
      answer: 'B'
      explanation: "The boy says after months of cold and dark, seeing the flowers come out and the days get longer really cheers him up."
      explanationZh: '男孩说经过几个月的寒冷和黑暗后，看到花开和日子变长真的让他开心起来。'

  - id: L109
    type: student-adult
    title: 'The Bird Feeder'
    titleZh: '喂鸟器'
    scene: 'You hear a girl talking to her dad about birds in the garden.'
    sceneZh: '你听到一个女孩和爸爸在讨论花园里的鸟。'
    difficulty: 2
    audioFile: 'L109.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Dad, since we put up the bird feeder last month, I've spotted at least six different types of birds in the garden. This morning I saw a woodpecker!"
      - speaker: man
        voice: onyx
        text: "A woodpecker? That is unusual for this area. You should write it down in your nature journal with the date and time."
      - speaker: girl
        voice: shimmer
        text: "Good idea. I'll start keeping a proper record of everything I see."
    question:
      text: "What does the dad suggest the girl should do?"
      textZh: '爸爸建议女孩做什么？'
      options:
        A: 'Take a photograph of the woodpecker'
        B: 'Record the sighting in her nature journal'
        C: 'Put up more bird feeders'
      answer: 'B'
      explanation: "The dad suggests she should write it down in her nature journal with the date and time."
      explanationZh: '爸爸建议她在自然日记本上记录下来，包括日期和时间。'

  - id: L110
    type: short-dialogue
    title: 'The Rainy Day'
    titleZh: '雨天'
    scene: 'You hear two friends stuck indoors because of rain.'
    sceneZh: '你听到两个朋友因为下雨被困在室内。'
    difficulty: 2
    audioFile: 'L110.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "This rain is never going to stop. We were supposed to go to the park to practice for sports day."
      - speaker: girl
        voice: shimmer
        text: "I know, it's frustrating. But we could use the time to work on our poster for the science fair instead. It's due on Friday and we haven't even started."
      - speaker: boy
        voice: echo
        text: "You've got a point. At least that way we won't have to rush it later in the week."
    question:
      text: "What do they decide to do instead of going to the park?"
      textZh: '他们决定做什么来代替去公园？'
      options:
        A: 'Watch a film'
        B: 'Work on their science fair poster'
        C: 'Practice indoors'
      answer: 'B'
      explanation: "The girl suggests working on their poster for the science fair, and the boy agrees it makes sense."
      explanationZh: '女孩建议做科学展的海报，男孩同意这样做很合理。'

  # ============================================================
  # L111–L120: Celebrations and Events
  # ============================================================

  - id: L111
    type: three-person
    title: 'The Surprise Birthday Party'
    titleZh: '惊喜生日派对'
    scene: 'You hear three friends planning a surprise birthday party.'
    sceneZh: '你听到三个朋友在策划一个惊喜生日派对。'
    difficulty: 2
    audioFile: 'L111.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Okay, so Emma's birthday is next Saturday. I think we should throw her a surprise party at my house."
      - speaker: boy
        voice: echo
        text: "Great idea. I can be in charge of the decorations — balloons and a big banner."
      - speaker: girl2
        voice: fable
        text: "And I'll make sure Emma comes to your house without suspecting anything. I'll tell her we're going there to watch a film."
    question:
      text: "How will they get Emma to come to the party?"
      textZh: '他们怎么让Emma来参加派对？'
      options:
        A: 'They will send her an invitation'
        B: 'They will tell her they are going to watch a film'
        C: 'They will ask her parents to bring her'
      answer: 'B'
      explanation: "The second girl says she'll tell Emma they're going to the house to watch a film."
      explanationZh: '第二个女孩说她会告诉Emma她们去那个房子看电影。'

  - id: L112
    type: short-dialogue
    title: 'The School Play'
    titleZh: '学校话剧'
    scene: 'You hear two students talking about the school play.'
    sceneZh: '你听到两个学生在讨论学校话剧。'
    difficulty: 2
    audioFile: 'L112.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "I heard you got the lead role in the school play! That's amazing. I tried out for it too, but I got a smaller part."
      - speaker: girl
        voice: shimmer
        text: "Thanks! I was so nervous during the audition that I nearly forgot my lines. But actually, I think the smaller parts are just as important — every character matters."
      - speaker: boy
        voice: echo
        text: "That's a kind thing to say. I'm actually quite pleased with my role because I get to wear a brilliant costume."
    question:
      text: "How does the boy feel about his role?"
      textZh: '男孩对自己的角色感觉如何？'
      options:
        A: 'He is disappointed and wants a bigger part'
        B: 'He is quite pleased, partly because of the costume'
        C: 'He no longer wants to be in the play'
      answer: 'B'
      explanation: "The boy says he's actually quite pleased with his role because he gets to wear a brilliant costume."
      explanationZh: '男孩说他实际上很满意自己的角色，因为他能穿一套很棒的戏服。'

  - id: L113
    type: student-adult
    title: 'Sports Day Preparation'
    titleZh: '运动会准备'
    scene: 'You hear a teacher talking to a student about sports day.'
    sceneZh: '你听到老师在和一个学生谈论运动会。'
    difficulty: 2
    audioFile: 'L113.mp3'
    script:
      - speaker: woman
        voice: nova
        text: "Sophie, you've been doing really well in practice. Which events are you entering on sports day?"
      - speaker: girl
        voice: shimmer
        text: "I've signed up for the hundred metres and the long jump. I wanted to do the relay as well, but it clashes with the long jump."
      - speaker: woman
        voice: nova
        text: "That's a shame. But two events is already a lot. Make sure you warm up properly between them."
    question:
      text: "Why isn't Sophie doing the relay?"
      textZh: 'Sophie为什么不参加接力赛？'
      options:
        A: 'She does not enjoy relay races'
        B: 'The teacher told her not to'
        C: 'It is at the same time as the long jump'
      answer: 'C'
      explanation: "Sophie says the relay clashes with the long jump."
      explanationZh: 'Sophie说接力赛和跳远时间冲突了。'

  - id: L114
    type: short-dialogue
    title: 'The Holiday Traditions'
    titleZh: '节日传统'
    scene: 'You hear two students talking about family holiday traditions.'
    sceneZh: '你听到两个学生在谈论家庭节日传统。'
    difficulty: 2
    audioFile: 'L114.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Every Chinese New Year, my family makes dumplings together. Even my little brother helps fold them, though his always fall apart!"
      - speaker: boy
        voice: echo
        text: "That sounds like so much fun. In my family, we have a tradition of making gingerbread at Christmas. Last year, my sister and I built a gingerbread house that was taller than our cat."
      - speaker: girl
        voice: shimmer
        text: "A gingerbread house! I'd love to try making one of those."
    question:
      text: "What does the boy's family do at Christmas?"
      textZh: '男孩的家人在圣诞节做什么？'
      options:
        A: 'They make dumplings'
        B: 'They make gingerbread'
        C: 'They cook a big turkey dinner'
      answer: 'B'
      explanation: "The boy says his family has a tradition of making gingerbread at Christmas."
      explanationZh: '男孩说他的家人有在圣诞节做姜饼的传统。'

  - id: L115
    type: monologue
    title: 'The School Concert'
    titleZh: '学校音乐会'
    scene: 'You hear a student talking about a school concert she performed in.'
    sceneZh: '你听到一个学生在谈论她参加的学校音乐会。'
    difficulty: 2
    audioFile: 'L115.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Last Friday, I played the violin in our school concert. I'd been practising my solo piece every single day for two months, and I was absolutely terrified before I went on stage. But once I started playing, all the nerves just melted away and I actually enjoyed it. My mum said it was the best she'd ever heard me play."
    question:
      text: "How did the girl feel once she started playing?"
      textZh: '女孩开始演奏后感觉怎样？'
      options:
        A: 'She felt even more nervous'
        B: 'She forgot the music'
        C: 'Her nerves disappeared and she enjoyed it'
      answer: 'C'
      explanation: "The girl says once she started playing, all the nerves melted away and she actually enjoyed it."
      explanationZh: '女孩说一旦开始演奏，所有的紧张都消失了，她实际上很享受。'

  - id: L116
    type: short-dialogue
    title: 'The Science Fair Results'
    titleZh: '科学展结果'
    scene: 'You hear two students discussing the science fair results.'
    sceneZh: '你听到两个学生在讨论科学展的结果。'
    difficulty: 3
    audioFile: 'L116.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "I just found out that our volcano project came second in the science fair! I thought it would be third at best."
      - speaker: girl
        voice: shimmer
        text: "That's fantastic! Who won first place?"
      - speaker: boy
        voice: echo
        text: "That team who made a water filter from recycled materials. Honestly, I'm not even disappointed — their project was genuinely brilliant and it could actually help people."
    question:
      text: "How does the boy feel about not winning first place?"
      textZh: '男孩对没有得第一名怎么想？'
      options:
        A: 'He is very upset about it'
        B: 'He thinks the judges made a mistake'
        C: 'He is happy with second because the winning project was excellent'
      answer: 'C'
      explanation: "The boy says he's not even disappointed because the winning project was genuinely brilliant."
      explanationZh: '男孩说他甚至不失望，因为获胜的项目确实很出色。'

  - id: L117
    type: phone
    title: 'Booking the Hall'
    titleZh: '预订大厅'
    scene: 'You hear a girl calling to book a hall for a school event.'
    sceneZh: '你听到一个女孩打电话预订学校活动的场地。'
    difficulty: 2
    audioFile: 'L117.mp3'
    script:
      - speaker: man
        voice: onyx
        text: "Good afternoon, Riverside Community Centre."
      - speaker: girl
        voice: shimmer
        text: "Hello, I'm calling on behalf of Greenfield School. We'd like to book the main hall for our end-of-year celebration on July the fifteenth."
      - speaker: man
        voice: onyx
        text: "Let me check... I'm afraid the main hall is already booked that day. However, the smaller Willow Room is available, and it seats up to sixty people."
      - speaker: girl
        voice: shimmer
        text: "We've got about fifty students, so that should be enough. I'll check with my teacher and call you back."
    question:
      text: "Why can't they have the main hall?"
      textZh: '为什么他们用不了大厅？'
      options:
        A: 'It is too expensive'
        B: 'It is already booked'
        C: 'It is too big for their group'
      answer: 'B'
      explanation: "The man says the main hall is already booked that day."
      explanationZh: '工作人员说那天大厅已经被预订了。'

  - id: L118
    type: three-person
    title: 'The Talent Show'
    titleZh: '才艺表演'
    scene: 'You hear three friends discussing what to perform at the school talent show.'
    sceneZh: '你听到三个朋友在讨论才艺表演上表演什么。'
    difficulty: 3
    audioFile: 'L118.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "I think we should do a dance routine for the talent show. We've got three weeks to practise."
      - speaker: boy
        voice: echo
        text: "I'm not the best dancer, to be honest. What about a comedy sketch instead? We could write something funny about school life."
      - speaker: girl2
        voice: fable
        text: "Actually, why don't we combine both? We could do a funny dance routine — that way it doesn't matter if we're not perfect dancers because it's supposed to be entertaining."
    question:
      text: "What does the second girl suggest?"
      textZh: '第二个女孩建议什么？'
      options:
        A: 'They should sing a song instead'
        B: 'They should combine dancing and comedy'
        C: 'They should each do a solo performance'
      answer: 'B'
      explanation: "The second girl suggests combining both ideas — a funny dance routine."
      explanationZh: '第二个女孩建议把两个想法结合起来——做一个搞笑的舞蹈表演。'

  - id: L119
    type: student-adult
    title: 'The Award Ceremony'
    titleZh: '颁奖典礼'
    scene: 'You hear a teacher congratulating a student after an award ceremony.'
    sceneZh: '你听到老师在颁奖典礼后祝贺一个学生。'
    difficulty: 3
    audioFile: 'L119.mp3'
    script:
      - speaker: woman
        voice: nova
        text: "Well done, Mia! You thoroughly deserved that award for your community service work. You've given up so many weekends to help at the animal shelter."
      - speaker: girl
        voice: shimmer
        text: "Thank you, Miss Park. To be honest, I didn't expect to win at all. I don't do it for the recognition — I just really love spending time with the animals."
      - speaker: woman
        voice: nova
        text: "And that's exactly why you deserved it. The best volunteers are the ones who do it because they care, not because they want a prize."
    question:
      text: "Why does the teacher think Mia deserved the award?"
      textZh: '老师为什么认为Mia配得上这个奖？'
      options:
        A: 'Because she applied for the award'
        B: 'Because she volunteers out of genuine care, not for recognition'
        C: 'Because she got the highest marks in class'
      answer: 'B'
      explanation: "The teacher says the best volunteers are those who do it because they care, not for a prize — which is why Mia deserved it."
      explanationZh: '老师说最好的志愿者是因为真心关心才去做的，而不是为了奖品——这正是Mia配得上这个奖的原因。'

  - id: L120
    type: short-dialogue
    title: 'The Last Day of Term'
    titleZh: '学期最后一天'
    scene: 'You hear two friends talking on the last day of term.'
    sceneZh: '你听到两个朋友在学期最后一天聊天。'
    difficulty: 3
    audioFile: 'L120.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "I can't believe this term is over already. It's gone by so quickly!"
      - speaker: boy
        voice: echo
        text: "I know. It feels like we only just started. What are you most looking forward to in the holidays?"
      - speaker: girl
        voice: shimmer
        text: "Honestly, just having time to read for fun. During term, I barely get through a chapter a week because of all the homework. Over the holidays, I'm planning to work my way through at least five books."
      - speaker: boy
        voice: echo
        text: "That sounds like a brilliant plan. Maybe you could lend me one when you're done!"
    question:
      text: "What does the girl want to do during the holidays?"
      textZh: '女孩假期里想做什么？'
      options:
        A: 'Travel with her family'
        B: 'Catch up on homework'
        C: 'Read several books for enjoyment'
      answer: 'C'
      explanation: "The girl says she's looking forward to reading for fun and plans to get through at least five books."
      explanationZh: '女孩说她期待阅读休闲书籍，计划至少读五本书。'
