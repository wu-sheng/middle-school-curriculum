# FCE Daily Practice – Listening Extracts Month 2 (L061–L120)
# Theme: Q02 Time Traveler
# 60 short extracts, 2 per day for days 31–60
# Each extract simulates FCE Listening Part 1

extracts:
  # ============================================================
  # L061–L070: Time and History
  # ============================================================

  - id: L061
    type: short-dialogue
    title: 'The Time Capsule'
    titleZh: '时间胶囊'
    scene: 'You hear two friends discussing a school project.'
    sceneZh: '你听到两个朋友在讨论学校项目。'
    difficulty: 1
    audioFile: 'L061.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Have you decided what to put in the time capsule?"
      - speaker: girl
        voice: shimmer
        text: "I was thinking of putting in a photo of our class and a letter about what life is like now."
      - speaker: boy
        voice: echo
        text: "That's brilliant! I'll add my favourite comic book."
    question:
      text: "What has the girl already decided to include?"
      textZh: '女孩已经决定放什么？'
      options:
        A: 'A comic book and a photo'
        B: 'A class photo and a letter'
        C: 'A letter and a comic book'
      answer: 'B'
      explanation: "The girl says she'll put in a photo of their class and a letter."
      explanationZh: '女孩说她要放班级照片和一封信。'

  - id: L062
    type: monologue
    title: 'The Museum Guide'
    titleZh: '博物馆导览'
    scene: 'You hear a museum guide talking to a group of visitors.'
    sceneZh: '你听到博物馆导游在对一组游客讲话。'
    difficulty: 1
    audioFile: 'L062.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "Welcome to the History Museum. Today's tour will take about forty-five minutes. We'll start with the Ancient Egypt room on the second floor, then move on to the Roman gallery downstairs. Please remember that photography is allowed, but you mustn't use flash."
    question:
      text: "Where does the tour begin?"
      textZh: '参观从哪里开始？'
      options:
        A: 'The Roman gallery downstairs'
        B: 'The Ancient Egypt room on the second floor'
        C: 'The photography exhibition'
      answer: 'B'
      explanation: "The guide says they'll start with the Ancient Egypt room on the second floor."
      explanationZh: '导游说他们将从二楼的古埃及展厅开始。'

  - id: L063
    type: short-dialogue
    title: 'Ancient Civilizations Project'
    titleZh: '古文明项目'
    scene: 'You hear two students talking about a history assignment.'
    sceneZh: '你听到两个学生在讨论历史作业。'
    difficulty: 2
    audioFile: 'L063.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "I can't make up my mind which ancient civilization to research. I was going to pick Ancient Greece, but then I found this amazing book about the Maya."
      - speaker: boy
        voice: echo
        text: "The Maya would be really interesting. Not many people in our class will choose that."
      - speaker: girl
        voice: shimmer
        text: "That's exactly what I was thinking. I'll go with the Maya then."
    question:
      text: "Why does the girl decide on the Maya?"
      textZh: '女孩为什么决定选玛雅文明？'
      options:
        A: 'Because the teacher recommended it'
        B: 'Because she found a good book and it is an unusual choice'
        C: 'Because Ancient Greece was too difficult'
      answer: 'B'
      explanation: "The girl found an amazing book about the Maya, and the boy points out that not many classmates will choose it, which confirms her thinking."
      explanationZh: '女孩找到了一本关于玛雅的好书，男孩指出班上不会有很多人选，这正合她意。'

  - id: L064
    type: student-adult
    title: 'The Old Clock'
    titleZh: '古老的钟'
    scene: 'You hear a girl asking her grandfather about an old clock.'
    sceneZh: '你听到一个女孩在问她的祖父关于一座古老钟的事。'
    difficulty: 2
    audioFile: 'L064.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Grandpa, how old is that clock on the wall? It looks really ancient."
      - speaker: man
        voice: onyx
        text: "Well, it belonged to my grandmother, so it must be well over a hundred years old. She brought it all the way from Germany when she moved here."
      - speaker: girl
        voice: shimmer
        text: "Wow, so it's been in the family for generations!"
    question:
      text: "Where did the clock originally come from?"
      textZh: '这座钟最初来自哪里？'
      options:
        A: 'It was bought at a local shop'
        B: 'It was brought from Germany'
        C: 'It was a birthday gift'
      answer: 'B'
      explanation: "The grandfather says his grandmother brought it all the way from Germany."
      explanationZh: '祖父说他的祖母从德国一路带过来的。'

  - id: L065
    type: short-dialogue
    title: 'History Quiz'
    titleZh: '历史问答'
    scene: 'You hear two students preparing for a history quiz.'
    sceneZh: '你听到两个学生在准备历史测验。'
    difficulty: 2
    audioFile: 'L065.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "I've been going over the chapter on Ancient Rome all morning, but I still keep getting the dates mixed up."
      - speaker: girl
        voice: shimmer
        text: "Why don't you try making a timeline? That's what helped me remember everything for the Egypt section."
      - speaker: boy
        voice: echo
        text: "A timeline — that's actually a great idea. I'll draw one out tonight."
    question:
      text: "What does the girl suggest the boy should do?"
      textZh: '女孩建议男孩做什么？'
      options:
        A: 'Read the chapter again'
        B: 'Make a timeline'
        C: 'Study the Egypt section'
      answer: 'B'
      explanation: "The girl suggests making a timeline, which helped her remember the Egypt section."
      explanationZh: '女孩建议做时间线，这帮助她记住了埃及部分的内容。'

  - id: L066
    type: three-person
    title: 'Dinosaur Exhibition'
    titleZh: '恐龙展'
    scene: 'You hear three children discussing a visit to a dinosaur exhibition.'
    sceneZh: '你听到三个孩子在讨论参观恐龙展。'
    difficulty: 2
    audioFile: 'L066.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "The dinosaur exhibition is on until the end of March. Shall we go this Saturday?"
      - speaker: boy
        voice: echo
        text: "I can't do Saturday — I've got football practice. How about Sunday instead?"
      - speaker: girl2
        voice: fable
        text: "Sunday works for me too. Let's meet at the museum entrance at ten."
    question:
      text: "When do they agree to visit the exhibition?"
      textZh: '他们约定什么时候去看展？'
      options:
        A: 'Saturday morning'
        B: 'Sunday at ten'
        C: 'At the end of March'
      answer: 'B'
      explanation: "They agree on Sunday, meeting at the museum entrance at ten."
      explanationZh: '他们约定周日十点在博物馆入口见面。'

  - id: L067
    type: radio
    title: 'History Podcast'
    titleZh: '历史播客'
    scene: 'You hear part of a radio programme about historical discoveries.'
    sceneZh: '你听到一个关于历史发现的广播节目片段。'
    difficulty: 2
    audioFile: 'L067.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "And now for this week's fascinating find. Archaeologists working in southern France have uncovered a set of cave paintings that could be over thirty thousand years old. What makes these paintings particularly special is that they appear to show people dancing, which is extremely rare in prehistoric art."
    question:
      text: "What is unusual about the cave paintings?"
      textZh: '这些洞穴壁画有什么不同寻常之处？'
      options:
        A: 'They were found in southern France'
        B: 'They are over thirty thousand years old'
        C: 'They seem to show people dancing'
      answer: 'C'
      explanation: "The narrator says what makes them particularly special is that they appear to show people dancing, which is extremely rare."
      explanationZh: '叙述者说特别之处在于它们似乎展示了人们跳舞的场景，这在史前艺术中极为罕见。'

  - id: L068
    type: student-adult
    title: 'The History Teacher'
    titleZh: '历史老师'
    scene: 'You hear a student talking to her history teacher after class.'
    sceneZh: '你听到一个学生在课后和历史老师说话。'
    difficulty: 2
    audioFile: 'L068.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Miss Chen, I really enjoyed today's lesson about the Silk Road. I was wondering — could I do my project on how it connected different cultures?"
      - speaker: woman
        voice: nova
        text: "That's a wonderful angle, Lily. Most students focus on the trade goods, but looking at cultural exchange would make your project stand out."
      - speaker: girl
        voice: shimmer
        text: "Great! I'll start reading about it this weekend."
    question:
      text: "What does the teacher think about the girl's project idea?"
      textZh: '老师觉得女孩的项目想法怎么样？'
      options:
        A: 'It is too difficult for her level'
        B: 'It is the same as what most students do'
        C: 'It would make her project stand out'
      answer: 'C'
      explanation: "The teacher says looking at cultural exchange would make her project stand out, since most students focus on trade goods."
      explanationZh: '老师说研究文化交流会让她的项目脱颖而出，因为大多数学生都关注贸易商品。'

  - id: L069
    type: short-dialogue
    title: 'The Old Photograph'
    titleZh: '老照片'
    scene: 'You hear a boy and a girl looking at an old photograph.'
    sceneZh: '你听到一个男孩和一个女孩在看一张老照片。'
    difficulty: 2
    audioFile: 'L069.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Look at this photograph I found in my attic. It's from 1920! The people are all dressed up, standing in front of what looks like a factory."
      - speaker: girl
        voice: shimmer
        text: "That's amazing. Do you know who they are?"
      - speaker: boy
        voice: echo
        text: "My dad reckons the tall man in the middle is my great-great-grandfather. He used to run the factory."
    question:
      text: "What did the boy's great-great-grandfather do?"
      textZh: '男孩的高祖父做什么的？'
      options:
        A: 'He took the photograph'
        B: 'He ran the factory'
        C: 'He worked in the attic'
      answer: 'B'
      explanation: "The boy says his dad reckons the tall man is his great-great-grandfather, who used to run the factory."
      explanationZh: '男孩说他爸爸认为中间那个高个子男人是他的高祖父，他曾经经营那家工厂。'

  - id: L070
    type: phone
    title: 'Museum Booking'
    titleZh: '博物馆预约'
    scene: 'You hear a girl making a phone call to a museum.'
    sceneZh: '你听到一个女孩打电话给博物馆。'
    difficulty: 2
    audioFile: 'L070.mp3'
    script:
      - speaker: woman
        voice: nova
        text: "Good morning, City History Museum. How can I help you?"
      - speaker: girl
        voice: shimmer
        text: "Hello, I'd like to book places for a school group visit next Thursday. There'll be twenty-five of us, plus two teachers."
      - speaker: woman
        voice: nova
        text: "That's fine. School groups get a discounted rate of three pounds per student, and teachers go free."
    question:
      text: "How much will the teachers have to pay?"
      textZh: '老师需要付多少钱？'
      options:
        A: 'Three pounds each'
        B: 'Nothing — they go free'
        C: 'A discounted rate'
      answer: 'B'
      explanation: "The museum staff says teachers go free."
      explanationZh: '博物馆工作人员说老师免费。'

  # ============================================================
  # L071–L080: Travel and Transport
  # ============================================================

  - id: L071
    type: short-dialogue
    title: 'At the Airport'
    titleZh: '在机场'
    scene: 'You hear a girl and her dad at the airport.'
    sceneZh: '你听到一个女孩和她的爸爸在机场。'
    difficulty: 2
    audioFile: 'L071.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "Dad, our flight's been delayed by an hour. What shall we do?"
      - speaker: man
        voice: onyx
        text: "Well, we could grab something to eat, or have a look around the bookshop. Your mum asked me to pick up a travel guide for Italy anyway."
      - speaker: girl
        voice: shimmer
        text: "Let's eat first — I'm starving. Then we can get the book."
    question:
      text: "What do they decide to do first?"
      textZh: '他们决定先做什么？'
      options:
        A: 'Go to the bookshop'
        B: 'Get something to eat'
        C: 'Buy a travel guide for Italy'
      answer: 'B'
      explanation: "The girl says 'Let''s eat first' and suggests getting the book afterwards."
      explanationZh: '女孩说"我们先吃东西吧"，然后再去买书。'

  - id: L072
    type: short-dialogue
    title: 'The Train Journey'
    titleZh: '火车旅行'
    scene: 'You hear two friends discussing a train journey.'
    sceneZh: '你听到两个朋友在讨论火车旅行。'
    difficulty: 2
    audioFile: 'L072.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "I've been looking into trains to Edinburgh. There's a fast one that takes four hours, but it costs nearly eighty pounds."
      - speaker: girl
        voice: shimmer
        text: "What about the slower service? It might be cheaper and we'd get to see more of the countryside."
      - speaker: boy
        voice: echo
        text: "Good point. The slower one is only forty pounds and it stops at some really pretty towns along the way."
    question:
      text: "What is one advantage of the slower train?"
      textZh: '慢车有什么优点？'
      options:
        A: 'It arrives earlier'
        B: 'It costs less and passes through nice towns'
        C: 'It has better seats'
      answer: 'B'
      explanation: "The boy says the slower train is only forty pounds and stops at some really pretty towns."
      explanationZh: '男孩说慢车只要四十英镑，还会在一些很漂亮的小镇停靠。'

  - id: L073
    type: monologue
    title: 'Airport Announcement'
    titleZh: '机场广播'
    scene: 'You hear an announcement at an airport.'
    sceneZh: '你听到机场的一条广播。'
    difficulty: 2
    audioFile: 'L073.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "Attention, passengers on flight BA245 to Barcelona. We regret to inform you that your departure gate has changed from Gate 14 to Gate 22. Please make your way to Gate 22 on the upper level. Boarding will begin in approximately fifteen minutes."
    question:
      text: "What has changed about the flight?"
      textZh: '航班有什么变化？'
      options:
        A: 'The departure time'
        B: 'The departure gate'
        C: 'The destination'
      answer: 'B'
      explanation: "The announcement says the departure gate has changed from Gate 14 to Gate 22."
      explanationZh: '广播说登机口从14号改为22号。'

  - id: L074
    type: three-person
    title: 'The Road Trip Plan'
    titleZh: '公路旅行计划'
    scene: 'You hear three friends planning a road trip.'
    sceneZh: '你听到三个朋友在计划公路旅行。'
    difficulty: 2
    audioFile: 'L074.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "My parents said they could drive us to the coast on Saturday. We could leave early and be there by lunchtime."
      - speaker: boy
        voice: echo
        text: "That sounds perfect. Should we bring a picnic or eat at a café when we get there?"
      - speaker: girl2
        voice: fable
        text: "A picnic would be more fun, and cheaper too. I'll make sandwiches if you two bring drinks and snacks."
    question:
      text: "Who will provide the sandwiches?"
      textZh: '谁来准备三明治？'
      options:
        A: 'The boy'
        B: 'The first girl'
        C: 'The second girl'
      answer: 'C'
      explanation: "The second girl (the third speaker) volunteers to make sandwiches."
      explanationZh: '第二个女孩（第三个说话的人）主动提出做三明治。'

  - id: L075
    type: student-adult
    title: 'The Bus Pass'
    titleZh: '公交卡'
    scene: 'You hear a boy talking to a bus driver.'
    sceneZh: '你听到一个男孩在和公交车司机说话。'
    difficulty: 2
    audioFile: 'L075.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Excuse me, I've lost my bus pass. Can I still travel with just a ticket?"
      - speaker: man
        voice: onyx
        text: "Yes, a single ticket costs two pounds fifty. But if you're going to be travelling a lot today, you'd be better off buying a day pass for five pounds."
      - speaker: boy
        voice: echo
        text: "I've got three trips to make, so the day pass makes more sense. I'll take one of those, please."
    question:
      text: "Why does the boy choose the day pass?"
      textZh: '男孩为什么选择日票？'
      options:
        A: 'Because it is the only option available'
        B: 'Because he needs to make several trips'
        C: 'Because he found his bus pass'
      answer: 'B'
      explanation: "The boy says he has three trips to make, so the day pass makes more sense than buying individual tickets."
      explanationZh: '男孩说他要坐三趟车，所以日票更划算。'

  - id: L076
    type: short-dialogue
    title: 'Reading the Map'
    titleZh: '看地图'
    scene: 'You hear two students trying to find their way using a map.'
    sceneZh: '你听到两个学生在用地图找路。'
    difficulty: 2
    audioFile: 'L076.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "According to the map, we need to turn left at the church and then carry on straight until we reach the river."
      - speaker: boy
        voice: echo
        text: "Wait, are you sure? I think we've already passed the church. That old stone building back there — wasn't that it?"
      - speaker: girl
        voice: shimmer
        text: "Oh, you're right! We need to turn back then."
    question:
      text: "What is the problem?"
      textZh: '问题是什么？'
      options:
        A: 'The map is wrong'
        B: 'They have walked past the turning point'
        C: 'They cannot find the river'
      answer: 'B'
      explanation: "The boy realises they've already passed the church where they should have turned left."
      explanationZh: '男孩意识到他们已经走过了应该左转的教堂。'

  - id: L077
    type: short-dialogue
    title: 'Packing for the Trip'
    titleZh: '旅行打包'
    scene: 'You hear a brother and sister packing for a trip.'
    sceneZh: '你听到兄妹俩在为旅行打包。'
    difficulty: 2
    audioFile: 'L077.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Have you packed everything? Mum said we need to leave in half an hour."
      - speaker: girl
        voice: shimmer
        text: "Almost. I can't find my waterproof jacket anywhere. I've looked in the wardrobe and under my bed."
      - speaker: boy
        voice: echo
        text: "Check the coat rack downstairs. I think I saw it hanging there yesterday."
    question:
      text: "What is the girl looking for?"
      textZh: '女孩在找什么？'
      options:
        A: 'Her suitcase'
        B: 'Her waterproof jacket'
        C: 'Her bag'
      answer: 'B'
      explanation: "The girl says she can't find her waterproof jacket."
      explanationZh: '女孩说她找不到防水外套。'

  - id: L078
    type: radio
    title: 'Travel News'
    titleZh: '交通新闻'
    scene: 'You hear a travel news report on the radio.'
    sceneZh: '你听到广播里的交通新闻。'
    difficulty: 2
    audioFile: 'L078.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: "And now for the travel update. Drivers heading north on the M1 should be aware of long delays near junction twelve due to an accident earlier this morning. The southbound side is running normally. Trains between London and Birmingham are also experiencing delays of up to twenty minutes because of a signal failure."
    question:
      text: "What is causing the delays on the M1?"
      textZh: 'M1公路延误的原因是什么？'
      options:
        A: 'A signal failure'
        B: 'Road works'
        C: 'An accident'
      answer: 'C'
      explanation: "The report says there are long delays near junction twelve due to an accident earlier this morning."
      explanationZh: '报道说因为今早的一起事故，12号交叉口附近严重延误。'

  - id: L079
    type: student-adult
    title: 'The Souvenir Shop'
    titleZh: '纪念品商店'
    scene: 'You hear a girl buying something in a souvenir shop while on holiday.'
    sceneZh: '你听到一个女孩在度假时在纪念品店买东西。'
    difficulty: 2
    audioFile: 'L079.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: "I'd like to buy this snow globe for my little sister. How much is it?"
      - speaker: woman
        voice: nova
        text: "That one is eight pounds fifty. But if you buy two items, you get twenty per cent off the second one."
      - speaker: girl
        voice: shimmer
        text: "Oh, in that case, I'll get this postcard set as well. My mum would love that."
    question:
      text: "Who is the snow globe for?"
      textZh: '雪花球是买给谁的？'
      options:
        A: 'The girl herself'
        B: 'Her mother'
        C: 'Her little sister'
      answer: 'C'
      explanation: "The girl says she wants to buy the snow globe for her little sister."
      explanationZh: '女孩说她想给妹妹买雪花球。'

  - id: L080
    type: three-person
    title: 'Which Route?'
    titleZh: '走哪条路？'
    scene: 'You hear three friends deciding which route to take on a hike.'
    sceneZh: '你听到三个朋友在决定徒步走哪条路线。'
    difficulty: 3
    audioFile: 'L080.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "There are two trails. The short one goes through the woods and takes about an hour. The long one follows the river and takes two hours, but apparently the views are incredible."
      - speaker: girl
        voice: shimmer
        text: "I'd rather take the longer route. We're not in a hurry, and I'd love to see the river."
      - speaker: girl2
        voice: fable
        text: "Same here. Besides, we packed enough food and water for a whole day, so we might as well make the most of it."
    question:
      text: "What do the girls think about the longer route?"
      textZh: '女孩们怎么看较长的路线？'
      options:
        A: 'It is too tiring for them'
        B: 'They prefer it because they have plenty of time and supplies'
        C: 'They want to take it but are worried about the weather'
      answer: 'B'
      explanation: "Both girls prefer the longer route. One says they're not in a hurry, and the other says they have enough food and water."
      explanationZh: '两个女孩都偏好长路线。一个说不赶时间，另一个说带了足够的食物和水。'

  # ============================================================
  # L081–L090: Technology and Inventions
  # ============================================================

  - id: L081
    type: short-dialogue
    title: 'The New Robot'
    titleZh: '新机器人'
    scene: 'You hear two students talking about a robot they saw at a science fair.'
    sceneZh: '你听到两个学生在谈论他们在科学博览会上看到的一个机器人。'
    difficulty: 2
    audioFile: 'L081.mp3'
    script:
      - speaker: boy
        voice: echo
        text: "Did you see that robot that could sort recycling? It could tell the difference between plastic, glass and paper."
      - speaker: girl
        voice: shimmer
        text: "Yes! What really blew me away was that it learned from its mistakes. Every time it got something wrong, it improved."
      - speaker: boy
        voice: echo
        text: "I know — the student who built it said it uses something called machine learning."
    question:
      text: "What impressed the girl most about the robot?"
