  # ============================================================
  # L246–L265: Part 3 — Multiple Matching (Fantasy/Dragon Theme)
  # ============================================================

  # ============================================================
  # L246: Why I Love Dragons
  # ============================================================

  - id: L246
    type: multiple-matching
    title: 'Why I Love Dragons'
    titleZh: '我为什么喜欢龙'
    scene: 'You will hear five young people explaining what they love most about dragons.'
    sceneZh: '你将听到五位年轻人解释他们最喜欢龙的什么。'
    difficulty: 2
    audioFile: 'L246.mp3'
    speakers:
      - name: Speaker 1
        text: 'For me, it is the flying. When I sit on my dragon and we take off into the sky, all my worries disappear. There is nothing like seeing the world from above — the tiny houses, the winding rivers, the patchwork fields. My dragon, Storm, knows exactly when I need to fly. On stressful days, he nudges me towards the stable as if to say, "Come on, let us go." Flying is my therapy.'
      - name: Speaker 2
        text: 'What I love most is how intelligent they are. My earth dragon, Boulder, understands more words than my dog and can solve puzzles faster than most humans I know. Last week, I hid his favourite gemstone inside a locked box with three combination locks. He figured out all three codes in under ten minutes by watching me set them and memorising the movements. They are truly remarkable thinkers.'
      - name: Speaker 3
        text: 'I love the bond you form with a dragon. My water dragon, Ripple, knows how I am feeling before I even say a word. When I am sad, she wraps her tail around me like a warm blanket. When I am happy, she splashes water playfully. It is like having a best friend who understands you completely without needing words. No other animal creates such a deep emotional connection.'
      - name: Speaker 4
        text: 'For me, it is their beauty. Have you ever seen a crystal dragon at sunset? The light passes through their transparent body and paints rainbows across the landscape. Or a shadow dragon at midnight — they shimmer like liquid darkness, with tiny stars sparkling inside their wings. I could watch dragons for hours and never get bored. They are living works of art.'
      - name: Speaker 5
        text: 'What fascinates me most is their history. Dragons have been on this planet for over sixty million years — they were here before humans, before most animals we know today. Every species of dragon carries ancient knowledge in their memory, passed down through generations. My dragon, Sage, sometimes hums melodies that are thousands of years old. It makes me feel connected to the distant past.'
    statements:
      A: 'This person values the emotional connection with their dragon.'
      B: 'This person admires dragon intelligence and problem-solving ability.'
      C: 'This person finds peace and stress relief through flying.'
      D: 'This person is most impressed by the visual beauty of dragons.'
      E: 'This person is fascinated by the ancient history of dragons.'
      F: 'This person appreciates how dragons help them study.'
      G: 'This person enjoys the competitive side of dragon sports.'
      H: 'This person likes teaching tricks to their dragon.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'B'
      Speaker 3: 'A'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "all my worries disappear" when flying and calls it "my therapy" — stress relief through flying (C).'
      Speaker 1Zh: '说话者1说飞行时"所有烦恼都消失了"，并称之为"我的疗法"——通过飞行缓解压力（C）。'
      Speaker 2: 'Speaker 2 describes their dragon solving puzzles and figuring out combination locks — admiring intelligence (B).'
      Speaker 2Zh: '说话者2描述了他们的龙解谜和破解密码锁——欣赏智慧（B）。'
      Speaker 3: 'Speaker 3 says the dragon knows their feelings and describes it as having "a best friend" — emotional connection (A).'
      Speaker 3Zh: '说话者3说龙了解他们的感受，形容它像"一个最好的朋友"——情感连接（A）。'
      Speaker 4: 'Speaker 4 describes crystal dragons at sunset and shadow dragons at midnight — visual beauty (D).'
      Speaker 4Zh: '说话者4描述了日落时的水晶龙和午夜的影龙——视觉之美（D）。'
      Speaker 5: 'Speaker 5 talks about dragons being sixty million years old and carrying "ancient knowledge" — fascinated by history (E).'
      Speaker 5Zh: '说话者5谈到龙已有六千万年历史，承载着"远古知识"——对历史着迷（E）。'

  # ============================================================
  # L247: My Favourite Transformation
  # ============================================================

  - id: L247
    type: multiple-matching
    title: 'My Favourite Transformation'
    titleZh: '我最喜欢的变身'
    scene: 'You will hear five students talking about their favourite animal transformation.'
    sceneZh: '你将听到五位学生谈论他们最喜欢的动物变身。'
    difficulty: 2
    audioFile: 'L247.mp3'
    speakers:
      - name: Speaker 1
        text: 'I always transform into an owl. I know it sounds boring compared to a dragon or a tiger, but being an owl at night is incredible. You can see in complete darkness as if the moon were shining brightly. Your hearing becomes so sharp that you can hear a mouse breathing from fifty metres away. I love using my owl form to explore the forest at night and watch all the nocturnal creatures going about their lives.'
      - name: Speaker 2
        text: 'My favourite transformation is into a dolphin. I grew up near the coast and I have always loved the ocean. When I transform, I can dive to depths that would be impossible for a human — I have been down to almost two hundred metres! The underwater world is so peaceful. I once swam alongside a family of whales for an entire afternoon. That is something I will remember for the rest of my life.'
      - name: Speaker 3
        text: 'I prefer becoming a cheetah. The speed is addictive. When I run at full speed — which is about a hundred and ten kilometres per hour — everything else seems to slow down around me. The wind roars in my ears and the ground blurs beneath my paws. I use my cheetah form mostly for sports competitions. Our school has a transformation racing team and I have won the hundred-metre sprint three years in a row.'
      - name: Speaker 4
        text: 'I love transforming into a butterfly. People think it is a strange choice because butterflies are small and fragile. But that is exactly why I love it. When you are that small, everyday places become completely different worlds. A garden becomes a jungle, a puddle becomes a lake, a gentle breeze becomes a powerful wind. It has given me a totally new perspective on the world around me.'
      - name: Speaker 5
        text: 'My go-to transformation is a snow leopard. I live in the mountains and a snow leopard is perfectly adapted to this environment. I can climb rocks that no human could manage, walk through deep snow effortlessly, and survive temperatures that would freeze a person in minutes. I volunteer with the mountain rescue team, and my leopard form has helped me reach three stranded hikers who would otherwise have been impossible to reach.'
    statements:
      A: 'This person uses their transformation to help rescue people.'
      B: 'This person enjoys seeing the world from an unusually small perspective.'
      C: 'This person values the enhanced senses their transformation gives them.'
      D: 'This person uses their transformation in competitive sports.'
      E: 'This person loves exploring underwater environments.'
      F: 'This person uses transformation to study weather patterns.'
      G: 'This person transforms to spend time with other animals.'
      H: 'This person finds their transformation helpful for art and painting.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'E'
      Speaker 3: 'D'
      Speaker 4: 'B'
      Speaker 5: 'A'
    explanations:
      Speaker 1: 'Speaker 1 emphasises seeing in darkness and hearing a mouse from fifty metres away — enhanced senses (C).'
      Speaker 1Zh: '说话者1强调在黑暗中看清和从五十米外听到老鼠的呼吸——增强的感官（C）。'
      Speaker 2: 'Speaker 2 describes diving to two hundred metres and swimming with whales — exploring underwater (E).'
      Speaker 2Zh: '说话者2描述了潜入两百米深处和与鲸鱼一起游泳——探索水下环境（E）。'
      Speaker 3: 'Speaker 3 mentions the school transformation racing team and winning sprints three years in a row — competitive sports (D).'
      Speaker 3Zh: '说话者3提到了学校变身赛跑队和连续三年赢得短跑——竞技体育（D）。'
      Speaker 4: 'Speaker 4 says "a garden becomes a jungle, a puddle becomes a lake" — seeing the world from a tiny perspective (B).'
      Speaker 4Zh: '说话者4说"花园变成丛林，水坑变成湖泊"——从微小视角看世界（B）。'
      Speaker 5: 'Speaker 5 volunteers with mountain rescue and helped reach three stranded hikers — helping rescue people (A).'
      Speaker 5Zh: '说话者5在山地救援队做志愿者，帮助到达了三名被困的徒步旅行者——帮助救援（A）。'

  # ============================================================
  # L248: How I Got My Dragon
  # ============================================================

  - id: L248
    type: multiple-matching
    title: 'How I Got My Dragon'
    titleZh: '我是怎么得到我的龙的'
    scene: 'You will hear five young people describing how they got their dragon partner.'
    sceneZh: '你将听到五位年轻人描述他们是怎么得到龙伙伴的。'
    difficulty: 2
    audioFile: 'L248.mp3'
    speakers:
      - name: Speaker 1
        text: 'I found my dragon by complete accident. I was walking home from school through the woods when I tripped over what I thought was a big purple stone. It was actually an egg, and it started cracking the moment I touched it. A tiny dragon crawled out and looked straight at me with bright golden eyes. The dragon experts said she must have been waiting for exactly the right person to come along, and somehow that person was me.'
      - name: Speaker 2
        text: 'I rescued my dragon from a forest fire when he was just a baby. The fire had trapped him in a cave and he was too young to fly. I heard his cries while I was out hiking and managed to clear a path through the burning branches. He has been my loyal companion ever since — that was six years ago. My mum says he follows me everywhere because I was the first kind face he saw.'
      - name: Speaker 3
        text: 'I received my dragon as a birthday gift from my grandmother. She is a retired dragon breeder who has raised hundreds of dragons over her lifetime. On my tenth birthday, she took me to her farm and said I could choose any one I wanted. I chose the smallest, quietest one because everyone else seemed to overlook her. Grandmother said that was the best choice I could have made.'
      - name: Speaker 4
        text: 'My dragon chose me during the pairing ceremony at Dragon Academy. We walked through a tunnel of dragon eggs and I felt a strange pulling sensation in my chest. I stopped in front of a turquoise egg that was glowing brighter than all the others. When it hatched, a sky dragon with silver wings emerged. The teachers said it was the strongest bonding response they had seen in years.'
      - name: Speaker 5
        text: 'I won my dragon in a talent competition. The local dragon sanctuary held an annual contest where children performed a talent — singing, art, storytelling — and the winner received a dragon companion. I told a story about a lonely dragon searching for a friend, and the judges were so moved that they gave me first prize. My earth dragon, Pebble, has been my best friend since that day.'
    statements:
      A: 'This person found their dragon by accident during a walk.'
      B: 'This person saved their dragon from danger.'
      C: 'This person received their dragon as a gift from a family member.'
      D: 'This person was chosen by their dragon in a ceremony.'
      E: 'This person won their dragon in a competition.'
      F: 'This person bought their dragon from a market.'
      G: 'This person inherited their dragon from a neighbour.'
      H: 'This person was given a dragon by their school teacher.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "I found my dragon by complete accident" while walking through the woods — found by accident (A).'
      Speaker 1Zh: '说话者1说"我完全是偶然发现了我的龙"，在走过树林时——意外发现（A）。'
      Speaker 2: 'Speaker 2 says "I rescued my dragon from a forest fire" — saved from danger (B).'
      Speaker 2Zh: '说话者2说"我在森林大火中救了我的龙"——从危险中救出（B）。'
      Speaker 3: 'Speaker 3 received a dragon on their tenth birthday from their grandmother — gift from family (C).'
      Speaker 3Zh: '说话者3在十岁生日时从祖母那里收到了一只龙——来自家人的礼物（C）。'
      Speaker 4: 'Speaker 4 describes the pairing ceremony where the egg glowed and chose them — chosen in a ceremony (D).'
      Speaker 4Zh: '说话者4描述了配对仪式中蛋发光并选择了他们——在仪式中被选中（D）。'
      Speaker 5: 'Speaker 5 says "I won my dragon in a talent competition" — won in competition (E).'
      Speaker 5Zh: '说话者5说"我在才艺比赛中赢得了我的龙"——在比赛中赢得（E）。'

  # ============================================================
  # L249: What Surprised Me About Magic School
  # ============================================================

  - id: L249
    type: multiple-matching
    title: 'What Surprised Me About Magic School'
    titleZh: '魔法学校让我惊讶的事'
    scene: 'You will hear five students talking about what surprised them about magic school.'
    sceneZh: '你将听到五位学生谈论魔法学校让他们惊讶的事情。'
    difficulty: 2
    audioFile: 'L249.mp3'
    speakers:
      - name: Speaker 1
        text: 'I expected magic school to be all fun and no hard work. I was completely wrong! The amount of homework is enormous. We have to memorise hundreds of spells, learn the properties of thousands of ingredients, and practise wand movements until they are absolutely perfect. I spend more time studying here than I ever did at normal school. Magic is seriously hard work.'
      - name: Speaker 2
        text: 'The thing that surprised me most was how important teamwork is. I thought magic was about individual power — one wizard casting spells alone. But almost every lesson involves working in groups. Complex spells require multiple wizards casting simultaneously. Even flying formations require perfect coordination. I have learned that magic is much more powerful when people work together.'
      - name: Speaker 3
        text: 'I was amazed at how much science is involved. Before coming here, I thought magic and science were opposites. But our potion classes are basically chemistry — measuring liquids, controlling temperatures, understanding reactions. And flight physics is real physics with added magic. My maths skills have improved more in one term of magic school than in three years of normal school.'
      - name: Speaker 4
        text: 'Nobody told me about the food! The dining hall here is incredible. The tables produce whatever food you ask for — you just say what you want and it appears on your plate, steaming hot. I expected cold sandwiches and boring school dinners. Instead, I have tried dishes from every country in the world. Last week I had Japanese ramen followed by Italian tiramisu. It is like having a five-star restaurant for every meal.'
      - name: Speaker 5
        text: 'What surprised me most was the kindness of the teachers. I was nervous because I come from a non-magical family, and I thought the teachers might look down on me. But they have been incredibly supportive. Professor Willowmist spent an extra hour after class every Friday helping me catch up on basic spells that other students already knew. I have never felt like an outsider here.'
    statements:
      A: 'This person was surprised by how much academic work is required.'
      B: 'This person did not expect teamwork to be so important.'
      C: 'This person was surprised to find so much science in magic classes.'
      D: 'This person was impressed by the quality of school meals.'
      E: 'This person appreciated the support from teachers.'
      F: 'This person was surprised by the strict school uniform rules.'
      G: 'This person did not expect to make so many friends.'
      H: 'This person was amazed by the size of the school building.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "The amount of homework is enormous" and spends more time studying than at normal school — surprised by workload (A).'
      Speaker 1Zh: '说话者1说"作业量巨大"，比在普通学校花更多时间学习——对学习量感到惊讶（A）。'
      Speaker 2: 'Speaker 2 says "how important teamwork is" surprised them most — teamwork emphasis (B).'
      Speaker 2Zh: '说话者2说最让他们惊讶的是"团队合作有多重要"——团队合作的重要性（B）。'
      Speaker 3: 'Speaker 3 says "how much science is involved" and compares potions to chemistry — science in magic (C).'
      Speaker 3Zh: '说话者3说"涉及了多少科学内容"，并将魔药与化学相比较——魔法中的科学（C）。'
      Speaker 4: 'Speaker 4 says "Nobody told me about the food!" and describes incredible dining options — quality of meals (D).'
      Speaker 4Zh: '说话者4说"没有人告诉我关于食物的事！"并描述了令人难以置信的用餐选择——餐食质量（D）。'
      Speaker 5: 'Speaker 5 says the teachers were "incredibly supportive" and one spent extra time helping — teacher support (E).'
      Speaker 5Zh: '说话者5说老师们"非常支持"，有一位老师花额外时间帮助他们——老师的支持（E）。'

  # ============================================================
  # L250: Our Dragon Academy Projects
  # ============================================================

  - id: L250
    type: multiple-matching
    title: 'Our Dragon Academy Projects'
    titleZh: '我们的龙学院项目'
    scene: 'You will hear five students presenting their end-of-year Dragon Academy projects.'
    sceneZh: '你将听到五位学生展示他们的龙学院期末项目。'
    difficulty: 3
    audioFile: 'L250.mp3'
    speakers:
      - name: Speaker 1
        text: 'My project focused on dragon nutrition. I studied what happens when fire dragons eat different minerals. I discovered that dragons who eat iron ore produce hotter flames than those who eat copper. By changing a dragon''s diet, we can actually control the temperature of their fire breath. My findings could help blacksmiths who rely on dragon fire for metalwork.'
      - name: Speaker 2
        text: 'I investigated dragon sleep patterns. Most people think dragons sleep at night like humans, but my research shows that dragons actually sleep in short bursts throughout the day — about twelve periods of twenty minutes each. During these micro-naps, their scales change to match their surroundings as camouflage. This explains why it is so hard to spot a sleeping dragon.'
      - name: Speaker 3
        text: 'My project was about dragon communication with other species. I discovered that water dragons can communicate with whales and dolphins using a special frequency of underwater sound that humans cannot hear. I recorded these sounds and played them back to dolphins in the harbour. The dolphins responded, which proves the communication is genuine and two-way.'
      - name: Speaker 4
        text: 'I built a fireproof shelter using dragon scale technology. I studied the molecular structure of dragon scales and found that they contain layers of air trapped between layers of mineral, creating natural insulation. I recreated this structure using ceramic tiles and trapped air pockets. My prototype shelter can withstand temperatures up to a thousand degrees — hot enough to survive a volcanic eruption.'
      - name: Speaker 5
        text: 'My project explored the environmental benefits of earth dragons. I tracked three earth dragons for a month and discovered that wherever they tunnel, the soil becomes incredibly fertile. Plants growing near dragon tunnels are thirty percent larger and produce twice as much fruit. I believe earth dragons could solve the problem of poor farmland if we learned to work with them instead of fearing them.'
    statements:
      A: 'This person studied how diet affects a dragon''s abilities.'
      B: 'This person discovered something new about dragon sleeping habits.'
      C: 'This person proved that dragons can talk to sea creatures.'
      D: 'This person created a practical invention inspired by dragons.'
      E: 'This person showed how dragons can benefit farming.'
      F: 'This person studied dragon migration patterns.'
      G: 'This person researched ancient dragon cave paintings.'
      H: 'This person investigated why some dragons live longer than others.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 studied what happens when fire dragons eat different minerals, linking diet to flame temperature — diet affecting abilities (A).'
      Speaker 1Zh: '说话者1研究了火龙吃不同矿物时会发生什么，将饮食与火焰温度联系起来——饮食影响能力（A）。'
      Speaker 2: 'Speaker 2 studied sleep patterns and discovered dragons nap in short bursts — sleeping habits (B).'
      Speaker 2Zh: '说话者2研究了睡眠模式，发现龙是短时间多次小睡——睡眠习惯（B）。'
      Speaker 3: 'Speaker 3 discovered water dragons communicate with whales and dolphins — talking to sea creatures (C).'
      Speaker 3Zh: '说话者3发现水龙能与鲸鱼和海豚交流——与海洋生物交谈（C）。'
      Speaker 4: 'Speaker 4 built a fireproof shelter based on dragon scale structure — practical invention (D).'
      Speaker 4Zh: '说话者4根据龙鳞结构建造了防火庇护所——实用发明（D）。'
      Speaker 5: 'Speaker 5 tracked earth dragons and found their tunnels make soil fertile — benefit to farming (E).'
      Speaker 5Zh: '说话者5追踪了地龙，发现它们的隧道使土壤肥沃——对农业的好处（E）。'

  # ============================================================
  # L251: My Magical Mishap
  # ============================================================

  - id: L251
    type: multiple-matching
    title: 'My Magical Mishap'
    titleZh: '我的魔法事故'
    scene: 'You will hear five students describing a time their magic went wrong.'
    sceneZh: '你将听到五位学生描述他们的魔法出差错的经历。'
    difficulty: 2
    audioFile: 'L251.mp3'
    speakers:
      - name: Speaker 1
        text: 'I was practising a growth spell on a sunflower for homework. I was supposed to make it grow ten centimetres, but I accidentally used ten times too much power. The sunflower shot up through the ceiling, through my sister''s bedroom above, and out through the roof. It ended up fifteen metres tall! My dad was furious about the holes in the house. It took three teachers to shrink it back to normal size.'
      - name: Speaker 2
        text: 'I tried to cast a flying spell on my bicycle so I could fly to school. It worked perfectly — for about thirty seconds. Then the spell shifted and instead of the bicycle flying, it started floating upwards by itself without me on it. I had to watch my brand-new bicycle rise up into the clouds and disappear. We found it three days later in a tree twelve kilometres away.'
      - name: Speaker 3
        text: 'My disaster happened during a language spell. I wanted to learn French instantly, so I cast a translation spell on myself. But I mispronounced one word and the spell went wrong. Instead of understanding French, I could only speak in cat language for forty-eight hours. Everything that came out of my mouth was meowing. My family thought it was hilarious, but I could not explain what had happened!'
      - name: Speaker 4
        text: 'I made a mess with a duplication spell. I was trying to copy my homework so I would have a spare, but the spell kept going and would not stop. It made hundreds of copies of my homework, then started copying everything else on my desk — pencils, books, even my lunch. By the time my teacher stopped the spell, my bedroom was completely full of identical objects. We filled six recycling bins just with copies of my maths worksheet.'
      - name: Speaker 5
        text: 'I accidentally made it rain inside the school library. I was reading a book about weather spells and I absent-mindedly said one of the spell words out loud while yawning. Suddenly, dark clouds formed under the library ceiling and it started pouring rain on the books. The librarian was absolutely horrified. It took her two weeks to dry out all the damaged books, and I had to help with every single one.'
    statements:
      A: 'This person caused physical damage to a building.'
      B: 'This person lost an object that flew away.'
      C: 'This person temporarily lost the ability to speak normally.'
      D: 'This person created too many copies of things.'
      E: 'This person caused weather indoors by accident.'
      F: 'This person accidentally turned a person into an animal.'
      G: 'This person made food appear that nobody could eat.'
      H: 'This person created an explosion in a classroom.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 grew a sunflower through the ceiling and roof, creating holes — building damage (A).'
      Speaker 1Zh: '说话者1让一株向日葵穿过天花板和屋顶，造成了洞——建筑物损坏（A）。'
      Speaker 2: 'Speaker 2''s bicycle floated away into the clouds — lost object that flew away (B).'
      Speaker 2Zh: '说话者2的自行车飘到了云里——飞走丢失的物品（B）。'
      Speaker 3: 'Speaker 3 could only speak in cat language for 48 hours — lost normal speech (C).'
      Speaker 3Zh: '说话者3只能说猫语48小时——失去了正常说话的能力（C）。'
      Speaker 4: 'Speaker 4 made hundreds of copies of homework and other items — too many copies (D).'
      Speaker 4Zh: '说话者4复制了数百份作业和其他物品——太多的副本（D）。'
      Speaker 5: 'Speaker 5 accidentally made it rain inside the library — indoor weather (E).'
      Speaker 5Zh: '说话者5不小心让图书馆里下起了雨——室内天气（E）。'

  # ============================================================
  # L252: The Best Thing About My Dragon Type
  # ============================================================

  - id: L252
    type: multiple-matching
    title: 'The Best Thing About My Dragon Type'
    titleZh: '我的龙种类最棒的地方'
    scene: 'You will hear five dragon owners talking about what makes their dragon type special.'
    sceneZh: '你将听到五位龙主人谈论他们的龙种类有什么特别之处。'
    difficulty: 2
    audioFile: 'L252.mp3'
    speakers:
      - name: Speaker 1
        text: 'My fire dragon is the best type for cold winters. She heats our entire house just by sleeping in the living room. We have not used heating for three years, which saves a lot of money on energy bills. She also heats the bath water and dries our laundry. Last winter, when the whole village lost power in a snowstorm, everyone came to our house to stay warm. My fire dragon made sure nobody was cold.'
      - name: Speaker 2
        text: 'My water dragon is wonderful in summer. She can create a cool mist around the garden that lowers the temperature by about ten degrees. But her best ability is purifying water. She breathes on contaminated water and all the harmful bacteria are destroyed. We volunteer with a charity that provides clean water to villages with polluted wells — my dragon has helped hundreds of families get safe drinking water.'
      - name: Speaker 3
        text: 'My sky dragon is the ultimate travel companion. She can fly at three hundred kilometres per hour, so we can reach the coast in twenty minutes instead of four hours by car. We travel everywhere together — last year we visited five different countries in one week! She lands so gently that nobody ever gets travel sick, and she actually enjoys long journeys because she gets to see new landscapes.'
      - name: Speaker 4
        text: 'My earth dragon helps with gardening like nothing else. His tunnelling breaks up hard soil and creates natural drainage channels. He brings up minerals from deep underground that make plants grow incredibly well. Our vegetable patch produces three times as much food as our neighbours'' gardens. We have so many tomatoes that we give bags away to the whole street every summer.'
      - name: Speaker 5
        text: 'My shadow dragon is amazing for security. At night, she patrols around our property completely invisible. If she detects an intruder, she creates shadow shapes that move around the garden — dark figures that would frighten anyone away. Since we got her four years ago, there has not been a single break-in on our street. The whole neighbourhood feels safer thanks to her nightly patrols.'
    statements:
      A: 'This person''s dragon helps provide warmth and energy for the household.'
      B: 'This person''s dragon helps provide clean drinking water.'
      C: 'This person''s dragon makes travel fast and comfortable.'
      D: 'This person''s dragon improves food production.'
      E: 'This person''s dragon provides home security.'
      F: 'This person''s dragon helps with homework and studying.'
      G: 'This person''s dragon entertains guests at parties.'
      H: 'This person''s dragon helps predict the weather.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says their fire dragon heats the entire house and they have not used heating for three years — warmth and energy (A).'
      Speaker 1Zh: '说话者1说他们的火龙加热整栋房子，三年没用暖气了——温暖和能源（A）。'
      Speaker 2: 'Speaker 2 describes purifying contaminated water for villages — clean drinking water (B).'
      Speaker 2Zh: '说话者2描述为村庄净化受污染的水——清洁饮用水（B）。'
      Speaker 3: 'Speaker 3 describes reaching the coast in twenty minutes and visiting five countries in a week — fast, comfortable travel (C).'
      Speaker 3Zh: '说话者3描述了二十分钟到达海岸和一周访问五个国家——快速舒适的旅行（C）。'
      Speaker 4: 'Speaker 4 says their vegetable patch produces three times as much food — improved food production (D).'
      Speaker 4Zh: '说话者4说他们的菜地产量是邻居的三倍——提高食物产量（D）。'
      Speaker 5: 'Speaker 5 describes their dragon patrolling at night and preventing break-ins — home security (E).'
      Speaker 5Zh: '说话者5描述了他们的龙在夜间巡逻和防止入室盗窃——家庭安全（E）。'

  # ============================================================
  # L253: Lessons I Learned from My Dragon
  # ============================================================

  - id: L253
    type: multiple-matching
    title: 'Lessons I Learned from My Dragon'
    titleZh: '我从龙身上学到的道理'
    scene: 'You will hear five young people describing a life lesson their dragon taught them.'
    sceneZh: '你将听到五位年轻人描述他们的龙教给他们的人生道理。'
    difficulty: 3
    audioFile: 'L253.mp3'
    speakers:
      - name: Speaker 1
        text: 'My dragon taught me patience. When I first got her, I wanted her to fly immediately. But she was only a baby and her wings were too small. I had to wait eight months before she could carry me. During those months, I learned to enjoy the waiting — I got to know her personality, her favourite foods, the way she purrs when she is happy. Now I understand that the best things in life are worth waiting for.'
      - name: Speaker 2
        text: 'My dragon taught me that being different is a strength, not a weakness. He is a shadow dragon, and other children used to say he was ugly because he is dark and has no colourful scales. But at night, he is the most powerful and graceful of all dragons. I used to be embarrassed about being quiet and shy, but now I know that my quiet nature — like his darkness — is actually my hidden strength.'
      - name: Speaker 3
        text: 'My dragon taught me to face my fears. She is a sky dragon and takes me to incredible heights. I used to be terrified of heights — I could not even climb a ladder without feeling sick. But she started slowly, flying just a few metres off the ground, then gradually higher each day. After a month, I realised I was flying above the clouds without any fear. If I could overcome that, I can overcome anything.'
      - name: Speaker 4
        text: 'My dragon taught me responsibility. He depends on me for food, water, exercise, and companionship every single day. Before I had him, I was careless — I would forget homework, lose things, and break promises. But knowing that another living creature relies on me completely changed my attitude. My parents say I am a completely different person now — more organised, more reliable, more grown-up.'
      - name: Speaker 5
        text: 'My dragon taught me about forgiveness. Early on, I made a mistake during flight training and she was injured — she hurt her wing because I turned too sharply. I felt terrible and could barely look at her. But the next morning, she came to me, nuzzled my hand, and made her happy sound. She had completely forgiven me. I learned that holding onto guilt helps nobody, and that true friendship survives mistakes.'
    statements:
      A: 'This person learned to be patient from their dragon.'
      B: 'This person learned to accept what makes them unique.'
      C: 'This person overcame a fear with their dragon''s help.'
      D: 'This person became more responsible because of their dragon.'
      E: 'This person learned about forgiveness from their dragon.'
      F: 'This person learned how to be a better student.'
      G: 'This person learned to cook by feeding their dragon.'
      H: 'This person learned to appreciate nature through dragon rides.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "My dragon taught me patience" and describes waiting eight months for her dragon to fly — patience (A).'
      Speaker 1Zh: '说话者1说"我的龙教会了我耐心"，描述了等待八个月让龙能飞——耐心（A）。'
