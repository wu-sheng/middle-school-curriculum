      Speaker 2Zh: '说话者2说"与众不同是优势而非弱点"，将自己的害羞与龙的黑暗相比——接受独特之处（B）。'
      Speaker 3: 'Speaker 3 overcame a fear of heights through gradually flying higher — overcoming fear (C).'
      Speaker 3Zh: '说话者3通过逐渐飞得更高克服了恐高——克服恐惧（C）。'
      Speaker 4: 'Speaker 4 became "more organised, more reliable, more grown-up" because their dragon depends on them — responsibility (D).'
      Speaker 4Zh: '说话者4因为龙依赖他们而变得"更有条理、更可靠、更成熟"——责任感（D）。'
      Speaker 5: 'Speaker 5 made a mistake that injured their dragon but was forgiven — forgiveness (E).'
      Speaker 5Zh: '说话者5犯了一个伤害龙的错误但被原谅了——宽恕（E）。'

  # ============================================================
  # L254: Challenges at Dragon Academy
  # ============================================================

  - id: L254
    type: multiple-matching
    title: 'Challenges at Dragon Academy'
    titleZh: '龙学院的挑战'
    scene: 'You will hear five students describing the biggest challenge they faced at Dragon Academy.'
    sceneZh: '你将听到五位学生描述他们在龙学院面临的最大挑战。'
    difficulty: 3
    audioFile: 'L254.mp3'
    speakers:
      - name: Speaker 1
        text: 'The hardest thing for me was being away from home. It was my first time living somewhere without my family. For the first two weeks, I cried every night. I missed my mum''s cooking, my cat, and my own bed. But gradually I made friends, and by the end of the first month, the Academy started to feel like a second home. Now I actually miss my friends here when I go home for holidays.'
      - name: Speaker 2
        text: 'Flight training was my biggest struggle. Most students took to flying naturally, but I was absolutely terrified. My dragon could feel my fear, which made him nervous too, and nervous dragons fly unpredictably. It took me twice as long as anyone else to pass the basic flight exam. But my instructor never gave up on me. She said everyone learns at their own pace, and eventually I became one of the best fliers in my year.'
      - name: Speaker 3
        text: 'Learning Dragon Language was incredibly frustrating. The grammar is completely different from English. In Dragon Language, you say the emotion first, then the subject, then the action — so "I am happily flying" becomes something like "Joy — self — skyward." My brain just could not get used to thinking in this new order. I needed a private tutor for six months before I could hold even a basic conversation.'
      - name: Speaker 4
        text: 'My challenge was dealing with a competitive classmate. He constantly tried to prove he was better than everyone — better at flying, better at spells, better at everything. He would laugh when others made mistakes. It really affected my confidence. Eventually, our teacher paired us for a project, and I discovered he was actually insecure underneath. We talked honestly and became good friends.'
      - name: Speaker 5
        text: 'Potion class was a nightmare for me. I am clumsy by nature, and in potion class you need steady hands and precise measurements. In my first lesson, I knocked over a cauldron of sleeping potion and put the entire back row of the class to sleep for three hours. After that, my teacher made me practise measuring and pouring with plain water for two weeks before letting me near real ingredients again.'
    statements:
      A: 'This person struggled with homesickness.'
      B: 'This person found physical skills difficult due to fear.'
      C: 'This person had difficulty learning a new language.'
      D: 'This person had trouble with a difficult classmate.'
      E: 'This person struggled with practical skills in a class.'
      F: 'This person had difficulty keeping up with reading assignments.'
      G: 'This person found it hard to wake up early for lessons.'
      H: 'This person struggled to find a suitable dragon partner.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "I cried every night" and missed family — homesickness (A).'
      Speaker 1Zh: '说话者1说"我每晚都哭"并想念家人——思乡（A）。'
      Speaker 2: 'Speaker 2 was "absolutely terrified" of flying and took twice as long to pass — fear-based physical difficulty (B).'
      Speaker 2Zh: '说话者2对飞行"非常害怕"，花了别人两倍的时间才通过——基于恐惧的身体技能困难（B）。'
      Speaker 3: 'Speaker 3 found Dragon Language grammar "completely different" and needed a private tutor — language difficulty (C).'
      Speaker 3Zh: '说话者3觉得龙语语法"完全不同"，需要私人辅导——语言困难（C）。'
      Speaker 4: 'Speaker 4 dealt with a competitive classmate who affected their confidence — difficult classmate (D).'
      Speaker 4Zh: '说话者4遇到了一个影响其信心的好胜同学——难相处的同学（D）。'
      Speaker 5: 'Speaker 5 is "clumsy by nature" and knocked over a cauldron — practical skill struggles (E).'
      Speaker 5Zh: '说话者5"天生笨拙"，打翻了一个坩埚——实践技能困难（E）。'

  # ============================================================
  # L255: Fantasy Books That Changed My Life
  # ============================================================

  - id: L255
    type: multiple-matching
    title: 'Fantasy Books That Changed My Life'
    titleZh: '改变我人生的奇幻书'
    scene: 'You will hear five young readers talking about a fantasy book that changed their life.'
    sceneZh: '你将听到五位年轻读者谈论一本改变了他们人生的奇幻书。'
    difficulty: 3
    audioFile: 'L255.mp3'
    speakers:
      - name: Speaker 1
        text: 'For me, it was The Hobbit by Tolkien. Before reading it, I thought adventures were only for brave, strong people. But Bilbo is small, ordinary, and loves comfort — yet he goes on the greatest adventure anyway. That book showed me that you do not have to be a hero to do heroic things. You just have to say yes when adventure calls. I have been braver in real life ever since.'
      - name: Speaker 2
        text: 'A Wizard of Earthsea by Ursula Le Guin absolutely transformed how I think about mistakes. In the story, Ged releases a shadow by showing off, and he spends the whole book trying to face the consequences. It taught me that running away from your mistakes makes them bigger, but facing them directly takes away their power. When I make mistakes now, I deal with them immediately instead of hiding.'
      - name: Speaker 3
        text: 'The Neverending Story by Michael Ende changed my relationship with reading itself. The main character, Bastian, reads a book and discovers he is actually part of the story. It made me realise that when we read, we are not just observing — we are participating. Every reader brings the story alive in a different way. That idea made me fall completely in love with books and eventually inspired me to start writing my own stories.'
      - name: Speaker 4
        text: 'Harry Potter and the Philosopher''s Stone by J.K. Rowling showed me that feeling like an outsider is actually something special. Harry does not fit in with the Dursleys because he is meant for something different. When I read that at age eight, I was being bullied for being different. Harry''s story helped me understand that not fitting in sometimes means you simply have not found your people yet.'
      - name: Speaker 5
        text: 'His Dark Materials by Philip Pullman opened my eyes to thinking for myself. Lyra is always questioning rules and authority, not to be rude, but because she genuinely wants to understand why things are the way they are. That series taught me to ask questions, challenge assumptions, and not accept things just because an adult said so. My teachers say I ask more questions than any other student in the school — and I take that as a compliment!'
    statements:
      A: 'This person learned that ordinary people can do brave things.'
      B: 'This person learned to face mistakes instead of running from them.'
      C: 'This person developed a deep love of reading and writing.'
      D: 'This person found comfort in a character who was also an outsider.'
      E: 'This person learned to think critically and question things.'
      F: 'This person was inspired to study science by a fantasy book.'
      G: 'This person learned about the importance of friendship.'
      H: 'This person was inspired to travel the world.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says Bilbo is "small, ordinary" yet goes on an adventure — ordinary people doing brave things (A).'
      Speaker 1Zh: '说话者1说Bilbo"渺小、普通"却踏上了冒险——普通人做勇敢的事（A）。'
      Speaker 2: 'Speaker 2 says the book taught them about "facing the consequences" of mistakes — facing mistakes (B).'
      Speaker 2Zh: '说话者2说这本书教会了他们"面对"错误的后果——面对错误（B）。'
      Speaker 3: 'Speaker 3 says the book "made me fall completely in love with books" and inspired them to write — love of reading and writing (C).'
      Speaker 3Zh: '说话者3说这本书"让我完全爱上了书"并激励他们写作——对阅读和写作的热爱（C）。'
      Speaker 4: 'Speaker 4 was being bullied and found comfort in Harry''s outsider experience — comfort in an outsider character (D).'
      Speaker 4Zh: '说话者4曾被欺负，在Harry的局外人经历中找到了安慰——在局外人角色中找到慰藉（D）。'
      Speaker 5: 'Speaker 5 learned to "ask questions, challenge assumptions" — critical thinking (E).'
      Speaker 5Zh: '说话者5学会了"提出问题、挑战假设"——批判性思维（E）。'

  # ============================================================
  # L256: Our Dragon Academy Field Trips
  # ============================================================

  - id: L256
    type: multiple-matching
    title: 'Our Dragon Academy Field Trips'
    titleZh: '我们的龙学院实地考察'
    scene: 'You will hear five students describing their favourite Dragon Academy field trip.'
    sceneZh: '你将听到五位学生描述他们最喜欢的龙学院实地考察。'
    difficulty: 2
    audioFile: 'L256.mp3'
    speakers:
      - name: Speaker 1
        text: 'Our best trip was to the Dragon Fossil Museum in the Northern Mountains. We saw complete skeletons of ancient dragons from millions of years ago. The guide showed us how dragons evolved over time — their wings got bigger, their fire glands developed, and their brains tripled in size. The most amazing exhibit was a fossilised dragon egg that still glows faintly orange after forty million years.'
      - name: Speaker 2
        text: 'I loved our visit to the Underwater Dragon Caves. We wore special breathing helmets and swam through tunnels carved by water dragons over thousands of years. The walls were covered in bioluminescent algae that glowed blue and green, making the whole cave look like it was underwater starlight. We even saw a mother water dragon feeding her three babies. It was the most peaceful place I have ever been.'
      - name: Speaker 3
        text: 'The trip to the annual Dragon Games was incredible. It is like the Olympics but for dragons and their riders. We watched dragon racing, aerial acrobatics, and a breath competition where dragons compete to produce the most impressive fire, ice, or wind display. A sky dragon won the breath competition with a tornado so powerful it lifted the judges'' table three metres into the air!'
      - name: Speaker 4
        text: 'My favourite was the Dragon Rescue Centre. They care for injured and orphaned dragons until they can be released back into the wild. We helped feed baby dragons and learned how to bandage a wing. The most moving part was watching a dragon who had been rescued from a trap take its first flight in months. Everyone cheered and some people cried — including me.'
      - name: Speaker 5
        text: 'We visited a traditional dragon scale craftsman who makes jewellery and armour from naturally shed dragon scales. He showed us how to polish scales until they shine like gemstones, and how to weave them together into lightweight but incredibly strong material. Each of us got to make a small bracelet from water dragon scales. Mine shimmers blue-green and I wear it every day.'
    statements:
      A: 'This person enjoyed learning about dragon evolution and history.'
      B: 'This person loved the beauty of an underwater environment.'
      C: 'This person was excited by dragon sports and competitions.'
      D: 'This person was moved by seeing injured dragons recover.'
      E: 'This person enjoyed learning a traditional craft.'
      F: 'This person explored a dragon breeding farm.'
      G: 'This person visited a magical library.'
      H: 'This person learned about dragon medicine and healing.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 visited a fossil museum and learned how dragons evolved over millions of years — evolution and history (A).'
      Speaker 1Zh: '说话者1参观了化石博物馆，了解了龙在数百万年中如何进化——进化和历史（A）。'
      Speaker 2: 'Speaker 2 describes the bioluminescent caves looking like "underwater starlight" — beauty of underwater environment (B).'
      Speaker 2Zh: '说话者2描述了生物发光的洞穴看起来像"水下星光"——水下环境之美（B）。'
      Speaker 3: 'Speaker 3 watched dragon racing and aerial acrobatics at the Dragon Games — sports and competitions (C).'
      Speaker 3Zh: '说话者3在龙运动会上观看了龙赛跑和空中特技——体育和竞赛（C）。'
      Speaker 4: 'Speaker 4 describes watching an injured dragon take its first flight and people crying — moved by recovery (D).'
      Speaker 4Zh: '说话者4描述了观看一只受伤的龙第一次飞行，人们哭了——被康复感动（D）。'
      Speaker 5: 'Speaker 5 learned to polish scales and made a bracelet — learning a traditional craft (E).'
      Speaker 5Zh: '说话者5学会了打磨鳞片并制作了手链——学习传统工艺（E）。'

