# FCE Daily Listening Practice — Month 4, Batch 03
# 65 exercises (L201–L265)
# L201–L230: Part 1 short extracts (30 exercises, difficulty 2-3)
# L231–L245: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L246–L265: Part 3 multiple matching (20 exercises, difficulty 2-3)
# Theme: Fantasy / Dragon / Transformation stories for 8-9 year old learners

extracts:
  # ============================================================
  # L201–L230: Part 1 — Short Extracts (Fantasy/Dragon Theme)
  # ============================================================

  # ============================================================
  # L201: The Dragon Egg
  # ============================================================

  - id: L201
    type: short-extract
    title: 'The Dragon Egg'
    titleZh: '龙蛋'
    scene: 'You will hear a girl telling her friend about a discovery in the forest.'
    sceneZh: '你将听到一个女孩告诉朋友她在森林里的发现。'
    difficulty: 2
    audioFile: 'L201.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'You will never believe what I found on the way home from school yesterday. There was this enormous egg, about the size of a football, sitting between the roots of the old oak tree.'
      - speaker: boy
        voice: echo
        text: 'What colour was it?'
      - speaker: girl
        voice: shimmer
        text: 'That is the strangest part — it was deep purple with tiny golden specks all over it, and it felt warm even though it was freezing outside. My grandmother says it might be a dragon egg. She told me that in her village, people used to say dragons would leave their eggs near ancient trees because the roots keep them safe and warm underground.'
    question:
      text: 'Why does the girl think the egg is unusual?'
      textZh: '女孩为什么觉得这个蛋不寻常？'
      options:
        A: 'It was very small and hidden under leaves.'
        B: 'It was warm despite the cold weather.'
        C: 'It was making a cracking sound.'
      answer: 'B'
      explanation: 'The girl says "it felt warm even though it was freezing outside" — this contrast is what makes it unusual.'
      explanationZh: '女孩说"尽管外面很冷，它摸起来却是温暖的"——这个反差是它不寻常的原因。'

  # ============================================================
  # L202: The Shape-Shifting Cat
  # ============================================================

  - id: L202
    type: short-extract
    title: 'The Shape-Shifting Cat'
    titleZh: '变形猫'
    scene: 'You will hear a boy describing his unusual pet to a new friend.'
    sceneZh: '你将听到一个男孩向新朋友描述他不寻常的宠物。'
    difficulty: 2
    audioFile: 'L202.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'My cat Moonbeam is not like other cats. During the day she looks completely normal — grey fur, green eyes, loves sleeping on the sofa. But at night, something changes.'
      - speaker: girl
        voice: shimmer
        text: 'What do you mean, changes?'
      - speaker: boy
        voice: echo
        text: 'Well, when the moon comes out, her fur starts to glow silver and she grows twice her normal size. My mum says it is just a trick of the light, but I have measured her. She is definitely bigger at night. And she can open doors by herself — not with her paws, but just by staring at them until they swing open.'
    question:
      text: 'What happens to Moonbeam at night?'
      textZh: 'Moonbeam 晚上会发生什么？'
      options:
        A: 'She hides under the sofa and will not come out.'
        B: 'She grows bigger and her fur glows silver.'
        C: 'She runs away from the house until morning.'
      answer: 'B'
      explanation: 'The boy says "her fur starts to glow silver and she grows twice her normal size."'
      explanationZh: '男孩说"她的毛开始发出银色的光，她长到了正常大小的两倍"。'

  # ============================================================
  # L203: The Enchanted Library
  # ============================================================

  - id: L203
    type: short-extract
    title: 'The Enchanted Library'
    titleZh: '魔法图书馆'
    scene: 'You will hear a librarian welcoming children to a special event.'
    sceneZh: '你将听到一位图书管理员欢迎孩子们参加一个特别活动。'
    difficulty: 2
    audioFile: 'L203.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'Welcome to our Enchanted Library Night! Tonight, the books come alive. When you open a storybook, the characters will step out of the pages and walk around the room. You can talk to them, ask them questions, and even help them solve their problems.'
      - speaker: librarian
        voice: nova
        text: 'But there is one very important rule you must follow. You must return every character to their book before midnight. If a character stays outside their story for too long, the pages start to fade and the whole book could disappear forever. So please keep track of the time!'
    question:
      text: 'What is the important rule the librarian mentions?'
      textZh: '图书管理员提到的重要规则是什么？'
      options:
        A: 'Children must not touch the old books.'
        B: 'Characters must be returned to their books before midnight.'
        C: 'Everyone must leave the library by ten o''clock.'
      answer: 'B'
      explanation: 'The librarian says "You must return every character to their book before midnight" otherwise the book could disappear.'
      explanationZh: '图书管理员说"你们必须在午夜前把每个角色送回他们的书里"，否则书可能会消失。'

  # ============================================================
  # L204: The Dragon Riding Lesson
  # ============================================================

  - id: L204
    type: short-extract
    title: 'The Dragon Riding Lesson'
    titleZh: '骑龙课'
    scene: 'You will hear an instructor giving advice to a new dragon rider.'
    sceneZh: '你将听到一位教练给一位新龙骑士提建议。'
    difficulty: 2
    audioFile: 'L204.mp3'
    script:
      - speaker: instructor
        voice: nova
        text: 'Right then, this is your first time on a dragon, so listen carefully. The most common mistake beginners make is pulling on the reins too hard. Dragons do not like that at all — it hurts their neck and makes them grumpy.'
      - speaker: instructor
        voice: nova
        text: 'Instead, you should lean gently in the direction you want to go. Lean left to turn left, lean right to turn right. And when you want to go higher, just whisper the word "skyward" into the dragon''s ear. They respond much better to a calm voice than to shouting or pulling. Remember — a happy dragon is a safe dragon.'
    question:
      text: 'According to the instructor, what is the best way to control a dragon?'
      textZh: '根据教练的说法，控制龙的最佳方式是什么？'
      options:
        A: 'Pull hard on the reins to show who is in charge.'
        B: 'Lean gently and use a calm voice.'
        C: 'Shout loudly so the dragon can hear you.'
      answer: 'B'
      explanation: 'The instructor says to "lean gently" and that dragons "respond much better to a calm voice than to shouting or pulling."'
      explanationZh: '教练说要"轻轻倾斜"，而且龙"对平静的声音比对喊叫或拉扯的反应好得多"。'

  # ============================================================
  # L205: The Potion Class
  # ============================================================

  - id: L205
    type: short-extract
    title: 'The Potion Class'
    titleZh: '魔药课'
    scene: 'You will hear a teacher explaining a potion recipe to students.'
    sceneZh: '你将听到一位老师向学生们讲解一个魔药配方。'
    difficulty: 2
    audioFile: 'L205.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today we are making a Glow Potion. You will need three moonflower petals, a spoonful of crushed starstone, and exactly seven drops of morning dew. The order matters — if you add the dew before the starstone, the potion will explode in a shower of sparks.'
      - speaker: teacher
        voice: nova
        text: 'When mixed correctly, the potion turns a beautiful pale blue and gives off a soft light. It is useful for reading in dark places without attracting attention. Many travellers carry a small bottle of Glow Potion when they explore caves or walk through enchanted forests at night.'
    question:
      text: 'What happens if you add the ingredients in the wrong order?'
      textZh: '如果你按错误的顺序添加原料会怎样？'
      options:
        A: 'The potion turns the wrong colour.'
        B: 'The potion has no effect at all.'
        C: 'The potion explodes in sparks.'
      answer: 'C'
      explanation: 'The teacher warns that "if you add the dew before the starstone, the potion will explode in a shower of sparks."'
      explanationZh: '老师警告说"如果你在星石之前加入露水，魔药会爆炸出一片火花"。'

  # ============================================================
  # L206: The Invisible Bridge
  # ============================================================

  - id: L206
    type: short-extract
    title: 'The Invisible Bridge'
    titleZh: '隐形桥'
    scene: 'You will hear two children trying to cross a magical river.'
    sceneZh: '你将听到两个孩子试图穿越一条魔法河。'
    difficulty: 2
    audioFile: 'L206.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The map says there is a bridge here, but I cannot see anything — just water.'
      - speaker: boy
        voice: echo
        text: 'Wait, look at the sign! It says "Only those who believe can see the path." Maybe the bridge is invisible.'
      - speaker: girl
        voice: shimmer
        text: 'I threw a pebble and it landed on something solid right above the water. There really is an invisible bridge! But we have to be careful — the sign also says the bridge only appears for people who walk without hesitation. If you stop or look down, it disappears beneath your feet.'
    question:
      text: 'What must the children do to cross the bridge safely?'
      textZh: '孩子们必须怎样才能安全过桥？'
      options:
        A: 'They must swim across the river.'
        B: 'They must walk without stopping or looking down.'
        C: 'They must wait for the bridge to become visible.'
      answer: 'B'
      explanation: 'The sign says the bridge "only appears for people who walk without hesitation" and disappears if you stop or look down.'
      explanationZh: '标牌说桥"只为毫不犹豫地走的人出现"，如果你停下或往下看，桥就会消失。'

  # ============================================================
  # L207: The Talking Map
  # ============================================================

  - id: L207
    type: short-extract
    title: 'The Talking Map'
    titleZh: '会说话的地图'
    scene: 'You will hear a girl describing a magical object she received.'
    sceneZh: '你将听到一个女孩描述她收到的一件魔法物品。'
    difficulty: 2
    audioFile: 'L207.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'My grandfather gave me a very old map for my birthday. At first, I thought it was just an ordinary map of the local mountains. But that night, when I unfolded it on my desk, the mountains on the map started moving — like tiny real mountains breathing.'
      - speaker: girl
        voice: shimmer
        text: 'Then a small voice said, "Where would you like to go?" I nearly fell off my chair! The map can speak, and it knows every hidden path, secret cave, and enchanted waterfall in the region. The only problem is that it refuses to work on Mondays because, according to it, maps need a day of rest too.'
    question:
      text: 'What is special about the map the girl received?'
      textZh: '女孩收到的地图有什么特别之处？'
      options:
        A: 'It shows treasure hidden underground.'
        B: 'It can speak and knows hidden paths.'
        C: 'It changes to show different countries each day.'
      answer: 'B'
      explanation: 'The girl says the map can speak and "knows every hidden path, secret cave, and enchanted waterfall."'
      explanationZh: '女孩说地图会说话，而且"知道每条隐藏的小径、秘密洞穴和魔法瀑布"。'

  # ============================================================
  # L208: The Fire Dragon's Weakness
  # ============================================================

  - id: L208
    type: short-extract
    title: 'The Fire Dragon''s Weakness'
    titleZh: '火龙的弱点'
    scene: 'You will hear a teacher telling students about different types of dragons.'
    sceneZh: '你将听到一位老师给学生讲述不同类型的龙。'
    difficulty: 2
    audioFile: 'L208.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Now, many people think fire dragons are the most dangerous creatures in our world. They can breathe flames hot enough to melt stone, and their scales are nearly impossible to scratch.'
      - speaker: teacher
        voice: nova
        text: 'However, every fire dragon has one weakness that most people do not know about. They are terrified of music. A simple melody played on a flute or a violin can make a fire dragon fall asleep within minutes. This is because the vibrations from music relax the crystals inside their scales that produce fire. Clever dragon tamers have known this secret for centuries.'
    question:
      text: 'What is the fire dragon''s weakness?'
      textZh: '火龙的弱点是什么？'
      options:
        A: 'They are afraid of water.'
        B: 'Music makes them fall asleep.'
        C: 'They cannot fly in strong wind.'
      answer: 'B'
      explanation: 'The teacher says "A simple melody played on a flute or a violin can make a fire dragon fall asleep within minutes."'
      explanationZh: '老师说"用长笛或小提琴演奏的简单旋律就能让火龙在几分钟内入睡"。'

  # ============================================================
  # L209: The Transformation Spell
  # ============================================================

  - id: L209
    type: short-extract
    title: 'The Transformation Spell'
    titleZh: '变身咒语'
    scene: 'You will hear a boy telling his sister about a spell he learned.'
    sceneZh: '你将听到一个男孩告诉姐姐他学到的一个咒语。'
    difficulty: 2
    audioFile: 'L209.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I learned the most amazing spell in class today! It is called the Mirrorbend spell. When you cast it on yourself, you can transform into any animal you have touched in the last twenty-four hours.'
      - speaker: girl
        voice: shimmer
        text: 'That sounds incredible! Have you tried it?'
      - speaker: boy
        voice: echo
        text: 'Yes! I stroked Mrs Patterson''s cat this morning, so after class I turned myself into a cat for ten minutes. The tricky part is that you keep your own thoughts and memories, but you cannot speak — only the animal sounds come out. I kept trying to say "help, change me back" but all anyone heard was meowing.'
    question:
      text: 'What is the limitation of the Mirrorbend spell?'
      textZh: '镜弯咒有什么局限？'
      options:
        A: 'You can only use it once a week.'
        B: 'You cannot speak human language while transformed.'
        C: 'You forget who you are during the transformation.'
      answer: 'B'
      explanation: 'The boy says "you cannot speak — only the animal sounds come out" while keeping your thoughts and memories.'
      explanationZh: '男孩说"你不能说话——只有动物的声音能发出来"，但你保留自己的思想和记忆。'

  # ============================================================
  # L210: The Cloud Kingdom
  # ============================================================

  - id: L210
    type: short-extract
    title: 'The Cloud Kingdom'
    titleZh: '云上王国'
    scene: 'You will hear a tour guide describing a place above the clouds.'
    sceneZh: '你将听到一位导游描述云层之上的一个地方。'
    difficulty: 2
    audioFile: 'L210.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Welcome to the Cloud Kingdom! As you can see, everything here is made from clouds. The houses, the roads, even the furniture — all made from solidified cloud. It feels like walking on a very soft mattress.'
      - speaker: guide
        voice: nova
        text: 'The people here are called Cloudwalkers. They are born with the ability to make clouds solid just by touching them. But they have to concentrate — if a Cloudwalker gets distracted or falls asleep, everything they have built slowly turns back into mist. That is why they always build in teams, so someone is always awake and paying attention.'
    question:
      text: 'Why do Cloudwalkers always build in teams?'
      textZh: '云行者为什么总是团队建造？'
      options:
        A: 'Because the buildings are very large and heavy.'
        B: 'Because someone must always be awake to keep buildings solid.'
        C: 'Because they enjoy working together more than alone.'
      answer: 'B'
      explanation: 'The guide explains that if a Cloudwalker falls asleep, their buildings turn to mist, so "someone is always awake and paying attention."'
      explanationZh: '导游解释说如果云行者睡着了，他们的建筑会变回雾气，所以"总有人是醒着的并保持注意力"。'

  # ============================================================
  # L211: The Phoenix Feather
  # ============================================================

  - id: L211
    type: short-extract
    title: 'The Phoenix Feather'
    titleZh: '凤凰羽毛'
    scene: 'You will hear a shopkeeper explaining a rare item to a customer.'
    sceneZh: '你将听到一位店主向顾客解释一件稀有物品。'
    difficulty: 2
    audioFile: 'L211.mp3'
    script:
      - speaker: shopkeeper
        voice: nova
        text: 'Ah, you have a good eye! That is a genuine phoenix feather. You can tell it is real because it glows orange at the edges and never loses its warmth. If you hold it, you will feel a gentle heat, like holding a cup of tea.'
      - speaker: shopkeeper
        voice: nova
        text: 'Phoenix feathers are incredibly useful. If you place one inside a lantern, it provides light for an entire year without needing oil or a flame. The reason they are so expensive, though, is that a phoenix only drops one feather every hundred years, and you have to be in exactly the right place at exactly the right moment to catch it before it floats away.'
    question:
      text: 'Why are phoenix feathers so expensive?'
      textZh: '凤凰羽毛为什么这么贵？'
      options:
        A: 'They are difficult to make in a workshop.'
        B: 'A phoenix only drops one feather every hundred years.'
        C: 'They are only found in one country.'
      answer: 'B'
      explanation: 'The shopkeeper says "a phoenix only drops one feather every hundred years" which makes them extremely rare.'
      explanationZh: '店主说"凤凰每一百年才掉落一根羽毛"，这使得它们极其稀有。'

  # ============================================================
  # L212: The Shrinking Door
  # ============================================================

  - id: L212
    type: short-extract
    title: 'The Shrinking Door'
    titleZh: '缩小的门'
    scene: 'You will hear two children exploring an old castle.'
    sceneZh: '你将听到两个孩子在探索一座古老的城堡。'
    difficulty: 2
    audioFile: 'L212.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Look at that tiny door in the wall! It is only about thirty centimetres tall. Who could possibly use a door that small?'
      - speaker: girl
        voice: shimmer
        text: 'The guidebook says this castle once belonged to a wizard who could shrink himself. He made all the doors in his private rooms tiny so that no normal-sized person could follow him inside.'
      - speaker: boy
        voice: echo
        text: 'That is clever! But it also says here that the shrinking spell wore off after exactly one hour. So if the wizard stayed inside too long and returned to normal size, he would be stuck in a room with no way out. Apparently, that actually happened to him once and the servants had to knock down a wall to rescue him!'
    question:
      text: 'What problem could the shrinking spell cause?'
      textZh: '缩小咒可能导致什么问题？'
      options:
        A: 'The wizard could get stuck if the spell wore off too soon.'
        B: 'The wizard would forget where the tiny doors were.'
        C: 'The spell made the wizard invisible as well as small.'
      answer: 'A'
      explanation: 'The boy explains that if the wizard "returned to normal size, he would be stuck in a room with no way out."'
      explanationZh: '男孩解释说如果巫师"恢复了正常大小，他就会被困在一个没有出口的房间里"。'

  # ============================================================
  # L213: The Dragon Academy Entrance Exam
  # ============================================================

  - id: L213
    type: short-extract
    title: 'The Dragon Academy Entrance Exam'
    titleZh: '龙学院入学考试'
    scene: 'You will hear a student describing her entrance exam experience.'
    sceneZh: '你将听到一位学生描述她的入学考试经历。'
    difficulty: 3
    audioFile: 'L213.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'The entrance exam for Dragon Academy was nothing like I expected. I thought it would be a written test about dragon history and types. Instead, they put us in a room with three dragon hatchlings and said "Make friends with one of them."'
      - speaker: girl
        voice: shimmer
        text: 'Most students tried to approach the biggest, most impressive hatchling — the fire dragon. But I noticed the smallest one, a water dragon, sitting alone in the corner looking nervous. I sat down next to it and just waited quietly. After a while, it came and rested its head on my knee. The examiner smiled and said that was exactly what they were looking for — patience and kindness, not bravery or strength.'
    question:
      text: 'What quality was the Dragon Academy actually testing for?'
      textZh: '龙学院实际上在考察什么品质？'
      options:
        A: 'Knowledge about different dragon species'
        B: 'Speed and physical strength'
        C: 'Patience and kindness'
      answer: 'C'
      explanation: 'The examiner said they were looking for "patience and kindness, not bravery or strength."'
      explanationZh: '考官说他们寻找的是"耐心和善良，而不是勇敢或力量"。'

  # ============================================================
  # L214: The Wishing Well
  # ============================================================

  - id: L214
    type: short-extract
    title: 'The Wishing Well'
    titleZh: '许愿井'
    scene: 'You will hear an old woman warning children about a wishing well.'
    sceneZh: '你将听到一位老奶奶警告孩子们关于一口许愿井。'
    difficulty: 2
    audioFile: 'L214.mp3'
    script:
      - speaker: woman
        voice: nova
        text: 'Children, you may throw a coin into the Wishing Well, but listen carefully first. This well grants wishes, but it has a sense of humour. It takes your words very literally.'
      - speaker: woman
        voice: nova
        text: 'Last week, a boy wished to be "the tallest person in his class." The well made him three metres tall! He could not fit through doorways for a whole day. And a girl once wished for "a mountain of chocolate." She woke up to find her bedroom completely filled with chocolate — she could barely open the door. So think very carefully about your words before you make a wish!'
    question:
      text: 'What is the problem with the Wishing Well?'
      textZh: '许愿井有什么问题？'
      options:
        A: 'It only works on certain days of the week.'
        B: 'It takes wishes too literally.'
        C: 'It grants the opposite of what you wish for.'
      answer: 'B'
      explanation: 'The old woman says the well "takes your words very literally" and gives examples of wishes that came true in unexpected ways.'
      explanationZh: '老奶奶说许愿井"完全按照字面意思理解你的话"，并举了愿望以意想不到方式实现的例子。'

  # ============================================================
  # L215: The Time-Turning Hourglass
  # ============================================================

  - id: L215
    type: short-extract
    title: 'The Time-Turning Hourglass'
    titleZh: '时间沙漏'
    scene: 'You will hear a boy explaining a magical object to his cousin.'
    sceneZh: '你将听到一个男孩向表弟解释一件魔法物品。'
    difficulty: 3
    audioFile: 'L215.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'This hourglass is not just for telling time. If you flip it upside down and say "rewind," time goes backwards for everyone around you — but not for you. You can see everything happening in reverse while you stay in the present.'
      - speaker: girl
        voice: shimmer
        text: 'Can you change things that already happened?'
      - speaker: boy
        voice: echo
        text: 'No, and that is the important rule. You can watch the past like a film, but you cannot touch or change anything. My teacher says it was designed for learning from mistakes, not fixing them. If people could change the past, every small change would create a chain of new problems — like pulling one thread and unravelling an entire jumper.'
    question:
      text: 'Why can the hourglass not be used to change the past?'
      textZh: '为什么沙漏不能用来改变过去？'
      options:
        A: 'Because the magic runs out after one use.'
        B: 'Because changing the past would create new problems.'
        C: 'Because it only works for events in the last hour.'
      answer: 'B'
      explanation: 'The boy explains that "every small change would create a chain of new problems — like pulling one thread and unravelling an entire jumper."'
      explanationZh: '男孩解释说"每个小改变都会引发一连串新问题——就像拉一根线就会拆散整件毛衣"。'

  # ============================================================
  # L216: The Forest of Echoes
  # ============================================================

  - id: L216
    type: short-extract
    title: 'The Forest of Echoes'
    titleZh: '回音森林'
    scene: 'You will hear a guide warning travellers about a magical forest.'
    sceneZh: '你将听到一位向导警告旅行者关于一片魔法森林。'
    difficulty: 2
    audioFile: 'L216.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Before we enter the Forest of Echoes, there is something you need to understand. In this forest, everything you say out loud comes true — but only for five minutes.'
      - speaker: guide
        voice: nova
        text: 'So if you say "I wish it would rain," it will rain for exactly five minutes. If you say "I am lost," you will suddenly feel confused and unable to find your way for five minutes. The safest strategy is to stay completely silent while walking through. The forest cannot affect you if you do not speak. That is why experienced travellers always carry a notebook to communicate in writing instead.'
    question:
      text: 'How can travellers stay safe in the Forest of Echoes?'
      textZh: '旅行者怎样才能在回音森林中保持安全？'
      options:
        A: 'By walking very quickly through the trees.'
        B: 'By staying completely silent.'
        C: 'By wearing special ear protection.'
      answer: 'B'
      explanation: 'The guide says "The safest strategy is to stay completely silent while walking through" because the forest only reacts to spoken words.'
      explanationZh: '向导说"最安全的策略是在穿越时完全保持沉默"，因为森林只对说出口的话产生反应。'

  # ============================================================
  # L217: The Crystal Dragon
  # ============================================================

  - id: L217
    type: short-extract
    title: 'The Crystal Dragon'
    titleZh: '水晶龙'
    scene: 'You will hear a museum guide talking about a rare dragon species.'
    sceneZh: '你将听到一位博物馆导游介绍一种稀有的龙。'
    difficulty: 2
    audioFile: 'L217.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'The crystal dragon is perhaps the most beautiful of all dragon species. Its entire body is made of transparent crystal, so you can see its heart beating inside its chest. At sunrise and sunset, light passes through its body and creates rainbows on the ground all around it.'
      - speaker: guide
        voice: nova
        text: 'Crystal dragons do not breathe fire. Instead, they breathe light — a beam so bright it can illuminate an entire valley. They are completely peaceful creatures that eat only minerals and gemstones. The main threat to crystal dragons is not hunters, but earthquakes, because their crystal bodies are quite fragile.'
    question:
      text: 'What is the biggest danger to crystal dragons?'
      textZh: '水晶龙面临的最大危险是什么？'
      options:
        A: 'Hunters who want their crystal scales'
        B: 'Other, more aggressive dragon species'
        C: 'Earthquakes, because their bodies are fragile'
      answer: 'C'
      explanation: 'The guide says "The main threat to crystal dragons is not hunters, but earthquakes, because their crystal bodies are quite fragile."'
      explanationZh: '导游说"水晶龙的主要威胁不是猎人，而是地震，因为它们的水晶身体相当脆弱"。'

  # ============================================================
  # L218: The Spell That Went Wrong
  # ============================================================

  - id: L218
    type: short-extract
    title: 'The Spell That Went Wrong'
    titleZh: '出错的咒语'
    scene: 'You will hear a boy telling his friend about a spell that went wrong.'
    sceneZh: '你将听到一个男孩告诉朋友一个出了差错的咒语。'
    difficulty: 2
    audioFile: 'L218.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'I was practising the colour-change spell on my school bag. I wanted to turn it from green to blue. I said the words carefully, waved my hand, and suddenly — everything in the room turned blue. The walls, the carpet, even my dog!'
      - speaker: girl
        voice: shimmer
        text: 'Oh no! How did you fix it?'
      - speaker: boy
        voice: echo
        text: 'That is the thing — the spell book says you need to say the reverse words within ten minutes or the change becomes permanent. I panicked and could not find the right page. Luckily, my older sister heard me shouting and found the reverse spell just in time. My dog was blue for exactly nine minutes and forty-two seconds.'
    question:
      text: 'What went wrong with the boy''s spell?'
      textZh: '男孩的咒语出了什么差错？'
      options:
        A: 'The bag turned the wrong colour.'
        B: 'Everything in the room changed colour instead of just the bag.'
        C: 'The spell did not work at all.'
      answer: 'B'
      explanation: 'The boy says "everything in the room turned blue" instead of just the school bag — the spell affected too much.'
      explanationZh: '男孩说"房间里的一切都变成了蓝色"，而不只是书包——咒语影响了太多东西。'

  # ============================================================
  # L219: The Dragon Messenger
  # ============================================================

  - id: L219
    type: short-extract
    title: 'The Dragon Messenger'
    titleZh: '龙信使'
    scene: 'You will hear a postmaster explaining how messages are delivered in a magical world.'
    sceneZh: '你将听到一位邮政局长解释在魔法世界中信件是如何投递的。'
    difficulty: 2
    audioFile: 'L219.mp3'
    script:
      - speaker: postmaster
        voice: echo
        text: 'In our kingdom, we use small messenger dragons instead of postmen. Each dragon is about the size of a pigeon and can carry one letter at a time. They are much faster than horses — a messenger dragon can fly from the capital to the coast in under two hours.'
      - speaker: postmaster
        voice: echo
        text: 'The clever thing is how they find the right person. You write the name on the envelope and the dragon sniffs it. Somehow, they can smell who a letter is for, even if that person is hundreds of miles away. The only problem is that they get very hungry on long journeys and sometimes stop at farms to steal eggs, which makes the farmers quite cross.'
    question:
      text: 'How do messenger dragons find the right person?'
      textZh: '信使龙是怎么找到正确的人的？'
      options:
        A: 'They follow a map attached to the letter.'
        B: 'They can smell who the letter is for.'
        C: 'They are given directions by the postmaster.'
      answer: 'B'
      explanation: 'The postmaster says the dragon "sniffs it" and "can smell who a letter is for, even if that person is hundreds of miles away."'
      explanationZh: '邮政局长说龙会"闻一闻"，而且"能闻出信是给谁的，即使那个人在几百英里之外"。'

  # ============================================================
  # L220: The Frozen Waterfall
  # ============================================================

  - id: L220
    type: short-extract
    title: 'The Frozen Waterfall'
    titleZh: '冰冻瀑布'
    scene: 'You will hear a girl describing a magical place she visited.'
    sceneZh: '你将听到一个女孩描述她参观的一个魔法地点。'
    difficulty: 2
    audioFile: 'L220.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'We visited the Frozen Waterfall last weekend. It is not actually frozen — the water is moving, but so slowly that it looks like it is standing still. One drop takes an entire day to fall from the top to the bottom.'
      - speaker: girl
        voice: shimmer
        text: 'The guide explained that an ancient ice dragon cast a spell on the waterfall centuries ago to slow down time around it. The interesting thing is that if you stand very close to the waterfall, time slows down for you too. We stood near it for what felt like five minutes, but when we stepped away, two hours had passed. I still cannot believe it.'
    question:
      text: 'What effect does the waterfall have on people who stand near it?'
      textZh: '瀑布对站在旁边的人有什么影响？'
      options:
        A: 'They feel extremely cold and need warm clothes.'
        B: 'Time passes more quickly for them than for others.'
        C: 'Time slows down so they lose track of how long they have been there.'
      answer: 'C'
      explanation: 'The girl says they "stood near it for what felt like five minutes, but when we stepped away, two hours had passed" — time slowed down for them.'
      explanationZh: '女孩说她们"站在旁边感觉才五分钟，但走开后两小时已经过去了"——时间对她们慢了下来。'

  # ============================================================
  # L221: The Healing Garden
  # ============================================================

  - id: L221
    type: short-extract
    title: 'The Healing Garden'
    titleZh: '治愈花园'
    scene: 'You will hear a healer showing a visitor around a special garden.'
    sceneZh: '你将听到一位治愈师带访客参观一座特别的花园。'
    difficulty: 2
    audioFile: 'L221.mp3'
    script:
      - speaker: healer
        voice: nova
        text: 'This is our Healing Garden. Every plant here has a different magical property. The blue roses can cure headaches — you simply smell them and the pain disappears. The silver grass helps with broken bones — you wrap it around the injury and the bone heals in one day instead of six weeks.'
      - speaker: healer
        voice: nova
        text: 'But the most important plant is the golden sunflower in the centre. It does not cure any physical illness. Instead, it cures sadness. If you sit next to it and tell it why you are unhappy, it listens and then hums a melody that makes you feel better. Many people say it is the most valuable plant in the entire garden.'
    question:
      text: 'What makes the golden sunflower the most valued plant?'
      textZh: '是什么让金色向日葵成为最有价值的植物？'
      options:
        A: 'It can cure any disease known to exist.'
        B: 'It cures sadness by listening and humming a melody.'
        C: 'It produces gold that can be sold for money.'
      answer: 'B'
      explanation: 'The healer says the sunflower "cures sadness" — "it listens and then hums a melody that makes you feel better."'
      explanationZh: '治愈师说向日葵"治愈悲伤"——"它倾听然后哼一首让你感觉好些的旋律"。'

  # ============================================================
  # L222: The Storm Dragon
  # ============================================================

  - id: L222
    type: short-extract
    title: 'The Storm Dragon'
    titleZh: '风暴龙'
    scene: 'You will hear a weather forecaster giving an unusual report.'
    sceneZh: '你将听到一位天气预报员做一份不寻常的天气报告。'
    difficulty: 3
    audioFile: 'L222.mp3'
    script:
      - speaker: forecaster
        voice: echo
        text: 'Good evening. Tonight''s weather is brought to you by a storm dragon currently flying over the eastern mountains. As you know, storm dragons create weather as they fly. When they flap their wings slowly, we get gentle rain. When they flap quickly, we get thunderstorms.'
      - speaker: forecaster
        voice: echo
        text: 'The good news is that this particular dragon, whose name is Rumble, tends to fly in a predictable pattern. Based on his usual route, we expect heavy rain over the capital from eight until eleven tonight, followed by clear skies as Rumble heads north towards the coast. Tomorrow should be sunny once he has passed. So do not forget your umbrellas this evening!'
    question:
      text: 'What determines the type of weather the storm dragon creates?'
      textZh: '是什么决定了风暴龙创造的天气类型？'
      options:
        A: 'The direction the dragon is flying.'
        B: 'How fast the dragon flaps its wings.'
        C: 'How high above the ground the dragon flies.'
      answer: 'B'
      explanation: 'The forecaster explains "When they flap their wings slowly, we get gentle rain. When they flap quickly, we get thunderstorms."'
      explanationZh: '预报员解释说"当它们缓慢拍打翅膀时，我们会下小雨。当它们快速拍打时，我们会遇到雷暴"。'

  # ============================================================
  # L223: The Memory Bottle
  # ============================================================

  - id: L223
    type: short-extract
    title: 'The Memory Bottle'
    titleZh: '记忆瓶'
    scene: 'You will hear a grandmother giving her grandchild a special gift.'
    sceneZh: '你将听到一位祖母送给孙子一份特别的礼物。'
    difficulty: 2
    audioFile: 'L223.mp3'
    script:
      - speaker: grandma
        voice: nova
        text: 'This little glass bottle may not look special, but it is a Memory Bottle. If you hold it to your temple and think of a happy memory, the memory flows out of your mind and into the bottle as a tiny ball of coloured light.'
      - speaker: grandma
        voice: nova
        text: 'Later, when you are feeling sad, you can open the bottle and the memory floats back in, making you feel exactly as happy as you felt at that moment. But be careful — once you put a memory in the bottle, it fades from your own mind. So you must choose wisely which memories to keep inside your head and which to store safely in the bottle for rainy days.'
    question:
      text: 'What is the drawback of using the Memory Bottle?'
      textZh: '使用记忆瓶有什么缺点？'
      options:
        A: 'The memories change and become different from the original.'
        B: 'The bottle can only hold three memories at a time.'
        C: 'The memory fades from your mind once it goes into the bottle.'
      answer: 'C'
      explanation: 'The grandmother warns "once you put a memory in the bottle, it fades from your own mind."'
      explanationZh: '祖母警告说"一旦你把记忆放进瓶子里，它就会从你的脑海中消退"。'

  # ============================================================
  # L224: The Dragon''s Library
  # ============================================================

  - id: L224
    type: short-extract
    title: 'The Dragon''s Library'
    titleZh: '龙的图书馆'
    scene: 'You will hear a girl describing a library she discovered inside a cave.'
    sceneZh: '你将听到一个女孩描述她在洞穴里发现的图书馆。'
    difficulty: 3
    audioFile: 'L224.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'Deep inside the mountain cave, past the hot springs and the crystal tunnels, there is a library run by an ancient dragon called Storykeeper. She has been collecting books for over a thousand years.'
      - speaker: girl
        voice: shimmer
        text: 'The amazing thing is that Storykeeper does not just collect books — she remembers every single word in every single book. If you tell her a topic, she will recommend the perfect book for you. She told me that the most borrowed book in her collection is a recipe book for magical cooking, because everyone wants to learn how to make food that tastes like your favourite memory.'
    question:
      text: 'What is the most popular book in Storykeeper''s library?'
      textZh: 'Storykeeper的图书馆中最受欢迎的书是什么？'
      options:
        A: 'A history book about ancient dragons'
        B: 'A recipe book for magical cooking'
        C: 'A guide to finding hidden treasure'
      answer: 'B'
      explanation: 'The girl says "the most borrowed book in her collection is a recipe book for magical cooking."'
      explanationZh: '女孩说"她馆藏中借阅最多的书是一本魔法烹饪食谱"。'

  # ============================================================
  # L225: The Moonlit Transformation
  # ============================================================

  - id: L225
    type: short-extract
    title: 'The Moonlit Transformation'
    titleZh: '月光变身'
    scene: 'You will hear a boy describing what happens to his village during a full moon.'
    sceneZh: '你将听到一个男孩描述满月时他的村庄会发生什么。'
    difficulty: 3
    audioFile: 'L225.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Our village has a very unusual tradition. On the night of every full moon, the adults transform into the animals they most resemble in personality. My dad becomes a bear because he is big and protective. My mum becomes a swan because she is graceful and elegant.'
      - speaker: boy
        voice: echo
        text: 'Children do not transform until they turn thirteen, and nobody knows what animal they will become until it happens. My sister turned thirteen last month, and everyone thought she would become a cat because she is quiet and independent. But she actually became an eagle — she flew around the village all night! She said seeing the world from above completely changed how she thinks about everything.'
    question:
      text: 'What surprised everyone about the boy''s sister?'
      textZh: '男孩的姐姐让大家感到惊讶的是什么？'
      options:
        A: 'She transformed a year earlier than expected.'
        B: 'She became an eagle instead of a cat.'
        C: 'She refused to take part in the tradition.'
      answer: 'B'
      explanation: 'The boy says "everyone thought she would become a cat" but "she actually became an eagle."'
      explanationZh: '男孩说"大家都以为她会变成一只猫"，但"她实际上变成了一只鹰"。'

  # ============================================================
  # L226: The Singing Stones
  # ============================================================

  - id: L226
    type: short-extract
    title: 'The Singing Stones'
    titleZh: '唱歌的石头'
    scene: 'You will hear a geologist talking about a strange discovery.'
    sceneZh: '你将听到一位地质学家谈论一个奇怪的发现。'
    difficulty: 2
    audioFile: 'L226.mp3'
    script:
      - speaker: geologist
        voice: nova
        text: 'In the Valley of Harmony, there are stones that sing. Not in the way wind whistles through rocks — these stones actually produce musical notes when you touch them. Each stone plays a different note, and together they form a complete scale.'
      - speaker: geologist
        voice: nova
        text: 'What makes this truly remarkable is that the stones only sing when touched by someone who is feeling a strong emotion. A happy person makes the stones play a cheerful melody. A sad person hears a gentle, comforting tune. Scientists believe the stones contain tiny crystals that respond to the electrical signals our bodies produce when we feel emotions.'
    question:
      text: 'What determines what melody the stones play?'
      textZh: '是什么决定了石头演奏什么旋律？'
      options:
        A: 'The time of day when they are touched.'
        B: 'The emotion the person is feeling.'
        C: 'The size and shape of the stone.'
      answer: 'B'
      explanation: 'The geologist says the stones "only sing when touched by someone who is feeling a strong emotion" and the melody changes based on that emotion.'
      explanationZh: '地质学家说石头"只有在被情绪强烈的人触碰时才会唱歌"，旋律会根据情绪而变化。'

  # ============================================================
  # L227: The Dragon Dentist
  # ============================================================

  - id: L227
    type: short-extract
    title: 'The Dragon Dentist'
    titleZh: '龙的牙医'
    scene: 'You will hear a dentist describing her unusual job.'
    sceneZh: '你将听到一位牙医描述她不寻常的工作。'
    difficulty: 2
    audioFile: 'L227.mp3'
    script:
      - speaker: dentist
        voice: nova
        text: 'People always ask me what it is like being a dragon dentist. The first thing I tell them is that dragon teeth are nothing like human teeth. They are made of the same material as diamonds, so they almost never get cavities. The main problem is that food gets stuck between their teeth — especially knight armour, which they really should not be eating.'
      - speaker: dentist
        voice: nova
        text: 'The biggest challenge is working inside a mouth that can breathe fire. I have to wear a special fireproof suit and I always ask the dragon to hold its breath while I work. The trick is to be very quick — dragons can only hold their breath for about three minutes, so I have to finish each tooth in under three minutes.'
    question:
      text: 'What is the biggest challenge of being a dragon dentist?'
      textZh: '当龙牙医最大的挑战是什么？'
      options:
        A: 'Dragon teeth are too hard to clean properly.'
        B: 'Working inside a mouth that can breathe fire.'
        C: 'Dragons are afraid of dentists and run away.'
      answer: 'B'
      explanation: 'The dentist says "The biggest challenge is working inside a mouth that can breathe fire."'
      explanationZh: '牙医说"最大的挑战是在一个能喷火的嘴巴里工作"。'

  # ============================================================
  # L228: The Shadow Market
  # ============================================================

  - id: L228
    type: short-extract
    title: 'The Shadow Market'
    titleZh: '影子市场'
    scene: 'You will hear a boy describing a secret market that appears at night.'
    sceneZh: '你将听到一个男孩描述一个在夜晚出现的秘密市场。'
    difficulty: 3
    audioFile: 'L228.mp3'
    script:
      - speaker: boy
        voice: echo
        text: 'Every Friday at midnight, the Shadow Market appears in the town square. The stalls sell things you cannot buy anywhere else — bottled starlight, enchanted compasses that point towards whatever you need most, and seeds that grow into trees overnight.'
      - speaker: boy
        voice: echo
        text: 'The interesting rule is that you cannot pay with money. The only currency accepted is a story. To buy something, you have to tell the shopkeeper a story they have never heard before. If your story is boring or they have heard it already, they shake their head and you leave empty-handed. That is why the best customers at the Shadow Market are always the most creative storytellers.'
    question:
      text: 'How do customers pay for items at the Shadow Market?'
      textZh: '顾客在影子市场上是怎样付款的？'
      options:
        A: 'With rare coins from magical kingdoms.'
        B: 'By telling a story the shopkeeper has never heard.'
        C: 'By trading objects of equal magical value.'
      answer: 'B'
      explanation: 'The boy explains that "you have to tell the shopkeeper a story they have never heard before" to buy something.'
      explanationZh: '男孩解释说"你必须给店主讲一个他们从没听过的故事"才能买到东西。'

  # ============================================================
  # L229: The Enchanted Mirror
  # ============================================================

  - id: L229
    type: short-extract
    title: 'The Enchanted Mirror'
    titleZh: '魔法镜'
    scene: 'You will hear a girl describing a mirror she found in her attic.'
    sceneZh: '你将听到一个女孩描述她在阁楼里找到的一面镜子。'
    difficulty: 3
    audioFile: 'L229.mp3'
    script:
      - speaker: girl
        voice: shimmer
        text: 'I found an old mirror in our attic last week. When I looked into it, I did not see my own reflection. Instead, I saw myself ten years in the future! The future me was wearing a white coat and standing in a laboratory full of plants.'
      - speaker: girl
        voice: shimmer
        text: 'I showed it to my brother, and he saw himself playing guitar on a stage in front of hundreds of people. My dad tried it too, but he just saw his normal reflection — nothing special. My grandmother explained that the mirror only shows the future to people under fifteen. She said it was made by an old wizard who believed that children need encouragement to follow their dreams, while adults need to create their own future without help.'
    question:
      text: 'Why does the mirror only show the future to children?'
      textZh: '镜子为什么只给孩子们显示未来？'
      options:
        A: 'Because the magic is too weak for adults to see.'
        B: 'Because the wizard believed children need encouragement for their dreams.'
        C: 'Because adults are not allowed to know their future.'
      answer: 'B'
      explanation: 'The grandmother says the wizard believed "children need encouragement to follow their dreams, while adults need to create their own future without help."'
      explanationZh: '祖母说巫师相信"孩子们需要鼓励去追随梦想，而成年人需要自己创造未来，不需要帮助"。'

  # ============================================================
  # L230: The Last Dragon
  # ============================================================

  - id: L230
    type: short-extract
    title: 'The Last Dragon'
    titleZh: '最后的龙'
    scene: 'You will hear a storyteller narrating a tale by a campfire.'
    sceneZh: '你将听到一位讲故事的人在篝火旁讲述一个故事。'
    difficulty: 3
    audioFile: 'L230.mp3'
    script:
      - speaker: storyteller
        voice: nova
        text: 'Long ago, when dragons filled the sky, the greatest of them all was called Ember. She was so large that her shadow could cover an entire city. When she breathed fire, it was not destructive — it made flowers bloom and crops grow faster.'
      - speaker: storyteller
        voice: nova
        text: 'When the other dragons left this world one by one, Ember chose to stay. She said she would remain until the last human who believed in dragons had gone. That was two hundred years ago. People say that on certain nights, when the clouds are shaped like wings and the sunset glows orange and gold, it means Ember is still watching over us — waiting to see if anyone still believes.'
    question:
      text: 'Why did Ember choose to stay when other dragons left?'
      textZh: 'Ember为什么在其他龙离开时选择留下？'
      options:
        A: 'She was too old and tired to travel.'
        B: 'She promised to stay until no one believed in dragons anymore.'
        C: 'She wanted to protect a hidden treasure.'
      answer: 'B'
      explanation: 'The storyteller says Ember "would remain until the last human who believed in dragons had gone."'
      explanationZh: '讲故事的人说Ember"会一直留下，直到最后一个相信龙的人离去"。'

  # ============================================================
  # L231–L245: Part 2 — Sentence Completion (Fantasy/Dragon Theme)
  # ============================================================

  # ============================================================
  # L231: Welcome to Dragon Academy
  # ============================================================

  - id: L231
    type: sentence-completion
    title: 'Welcome to Dragon Academy'
    titleZh: '欢迎来到龙学院'
    scene: 'You will hear the headmaster of Dragon Academy giving a welcome speech to new students.'
    sceneZh: '你将听到龙学院的校长给新生做欢迎致辞。'
    difficulty: 2
    audioFile: 'L231.mp3'
    script:
      - speaker: headmaster
        voice: echo
        text: 'Good morning, new students, and welcome to Dragon Academy! My name is Professor Thornwing, and I have been headmaster here for twenty-three years. I remember my own first day as a student — I was so nervous that I accidentally set fire to the welcome banner!'
      - speaker: headmaster
        voice: echo
        text: 'Let me tell you about our school. Dragon Academy was founded over five hundred years ago by a group of dragon tamers who believed that humans and dragons could live together peacefully. The Academy sits on top of Crystal Peak, the highest mountain in the kingdom, because dragons prefer to nest at high altitudes where the air is thin and cold.'
      - speaker: headmaster
        voice: echo
        text: 'During your first year, you will study four core subjects: Dragon History, Flight Training, Dragon Language, and Magical Healing. Dragon Language is the most difficult subject because dragons communicate using a combination of sounds, colours, and smoke signals. Most students need at least two years to hold a basic conversation with a dragon.'
      - speaker: headmaster
        voice: echo
        text: 'Each student will be paired with a young dragon in their second week. This dragon will be your partner throughout your time here. The pairing ceremony takes place in the Great Cavern beneath the school. You will walk through a tunnel lined with dragon eggs, and the egg that glows when you pass it contains your partner dragon.'
      - speaker: headmaster
        voice: echo
