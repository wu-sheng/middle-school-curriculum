      - speaker: student
        voice: shimmer
        text: 'When I arrived, I was paired with a tiny water dragon called Mist. She was so small she could sit on my shoulder. Now she is eight metres long and can create rainstorms that water an entire farm. We have grown together, and she has taught me more about patience than any textbook ever could.'
      - speaker: student
        voice: shimmer
        text: 'My favourite memory from Dragon Academy is the Night Flight ceremony at the end of second year. All the students and their dragons flew together through the Northern Lights. The sky was green and purple and gold, and our dragons breathed fire in celebration. It was the most beautiful thing I have ever seen.'
      - speaker: student
        voice: shimmer
        text: 'To the new students starting next September — do not worry if things seem difficult at first. I failed my first Flight Training exam three times before I passed. The secret is not talent; it is persistence. Every expert was once a beginner.'
      - speaker: student
        voice: shimmer
        text: 'I want to end with the words of our founder, Elara Dragonheart: "The bond between human and dragon is the strongest magic of all." I believe that is true. Thank you, Dragon Academy, for the best four years of my life.'
