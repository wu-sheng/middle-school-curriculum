      Speaker 3Zh: '说话者3想要一个实时翻译所有语言的"语言泡泡"——消除语言障碍（C）。'
      Speaker 4: 'Speaker 4 wants a "memory replay device" to revisit happy moments — preserving memories (D).'
      Speaker 4Zh: '说话者4想要一个"记忆回放装置"来重温快乐时光——保存记忆（D）。'
      Speaker 5: 'Speaker 5 wants a greenhouse that grows food in one day to end hunger — speeding up food production (E).'
      Speaker 5Zh: '说话者5想要一个一天就能种出食物的温室来消除饥饿——加速食物生产（E）。'

  # ============================================================
  # L260: How My Dragon Helped Someone
  # ============================================================

  - id: L260
    type: multiple-matching
    title: 'How My Dragon Helped Someone'
    titleZh: '我的龙怎样帮助了别人'
    scene: 'You will hear five dragon owners describing a time their dragon helped another person.'
    sceneZh: '你将听到五位龙主人描述他们的龙帮助他人的经历。'
    difficulty: 2
    audioFile: 'L260.mp3'
    speakers:
      - name: Speaker 1
        text: 'Last February, a little girl fell through thin ice on the village pond. Everyone was panicking because nobody could reach her without breaking more ice. My water dragon, Coral, slid across the ice without cracking it — she weighs almost nothing when she flattens herself. She wrapped her tail around the girl and gently pulled her to safety. The girl was cold but unhurt. Her parents sent us a thank-you card with a drawing of Coral wearing a superhero cape.'
      - name: Speaker 2
        text: 'My earth dragon, Granite, helped rebuild our neighbour''s garden wall after a storm knocked it down. He can move stones that would take six men to lift. What would have taken my neighbour weeks to repair, Granite did in about two hours. He even arranged the stones more neatly than before. Now all the neighbours ask if Granite can help with their building projects too. He has become the most popular dragon on our street.'
      - name: Speaker 3
        text: 'My fire dragon, Blaze, saved our school from closing during a power cut last winter. The heating failed completely for three days in freezing temperatures. The headteacher was about to send everyone home when I suggested bringing Blaze to the assembly hall. He kept the whole school warm by sleeping in the middle of the hall, radiating heat like a giant furnace. Two hundred students stayed warm and lessons continued as normal.'
      - name: Speaker 4
        text: 'My sky dragon, Zephyr, delivered emergency medicine to a remote mountain village last spring. Heavy snow had blocked all the roads and a helicopter could not fly because of strong winds. But Zephyr can fly in any weather. We loaded the medicine into a special pouch on her back and she flew through the blizzard to deliver it. The village doctor said the medicine arrived just in time to save a child with a high fever.'
      - name: Speaker 5
        text: 'My shadow dragon, Dusk, helped find a missing elderly man who had wandered away from a care home. He was lost in woodland at night and the police search teams could not find him in the darkness. I asked Dusk to search because shadow dragons can see perfectly at night. Within thirty minutes, she found him sitting under a tree, cold and confused. She led the rescue team right to him.'
    statements:
      A: 'This person''s dragon rescued someone from water.'
      B: 'This person''s dragon helped with a construction project.'
      C: 'This person''s dragon provided warmth during a power failure.'
      D: 'This person''s dragon delivered something essential in bad weather.'
      E: 'This person''s dragon found a missing person at night.'
      F: 'This person''s dragon chased away a wild animal.'
      G: 'This person''s dragon guided a lost ship to shore.'
      H: 'This person''s dragon put out a fire in a building.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1''s water dragon rescued a girl who fell through thin ice on a pond — rescued from water (A).'
      Speaker 1Zh: '说话者1的水龙救了一个掉入池塘薄冰的女孩——从水中救出（A）。'
      Speaker 2: 'Speaker 2''s earth dragon rebuilt a garden wall — helped with construction (B).'
      Speaker 2Zh: '说话者2的地龙重建了花园围墙——帮助建设（B）。'
      Speaker 3: 'Speaker 3''s fire dragon kept the whole school warm during a three-day power cut — warmth during power failure (C).'
      Speaker 3Zh: '说话者3的火龙在三天停电期间为整个学校供暖——停电时提供温暖（C）。'
      Speaker 4: 'Speaker 4''s sky dragon delivered emergency medicine through a blizzard — essential delivery in bad weather (D).'
      Speaker 4Zh: '说话者4的天龙在暴风雪中运送紧急药物——恶劣天气中的关键递送（D）。'
      Speaker 5: 'Speaker 5''s shadow dragon found a missing elderly man in dark woodland — found missing person at night (E).'
      Speaker 5Zh: '说话者5的影龙在黑暗的林地中找到了一位失踪的老人——夜间找到失踪者（E）。'

  # ============================================================
  # L261: Types of Magical Transport
  # ============================================================

  - id: L261
    type: multiple-matching
    title: 'Types of Magical Transport'
    titleZh: '魔法交通工具的种类'
    scene: 'You will hear five people talking about their preferred form of magical transport.'
    sceneZh: '你将听到五个人谈论他们偏好的魔法交通方式。'
    difficulty: 2
    audioFile: 'L261.mp3'
    speakers:
      - name: Speaker 1
        text: 'I prefer flying carpets to any other form of magical transport. They are silent, comfortable, and you can bring luggage. Unlike dragons, you do not need to worry about feeding them or finding somewhere to land. You just roll up the carpet when you arrive, tuck it under your arm, and walk into the building. My carpet is Persian style with gold tassels — very stylish!'
      - name: Speaker 2
        text: 'Teleportation crystals are the best in my opinion. You hold the crystal, think of where you want to go, and you are there instantly. No waiting, no journey time, no travel sickness. The only downside is that you can only teleport to places you have already visited — you need to have seen the destination in person for the crystal to find it. But for daily travel, nothing beats being there in one second flat.'
      - name: Speaker 3
        text: 'I love enchanted boats. They sail themselves, following whatever route you trace on their magical compass. My family has a small enchanted sailboat and we use it for weekend trips along the coast. The best feature is the invisible weather shield — it creates a bubble of warm, dry air around the boat even when it is raining. You can sail through a storm without getting a single drop of water on you.'
      - name: Speaker 4
        text: 'Dragon riding will always be my favourite. Yes, it is slower than teleportation and less comfortable than a carpet. But the experience is unmatched. Feeling the wind, hearing the wingbeats, seeing the landscape rush past below you — no other transport gives you that thrill. Plus, your dragon is also your companion, your protector, and your friend. A carpet cannot do that.'
      - name: Speaker 5
        text: 'I use portal doors. These are special doorframes installed in fixed locations around the kingdom. You walk through one door and come out another, regardless of the distance between them. Our school has portal doors connecting it to the central library, the dragon training grounds, and the potion supply store. It is incredibly convenient — like having shortcuts built into the world.'
    statements:
      A: 'This person values convenience and portability.'
      B: 'This person values instant travel with zero journey time.'
      C: 'This person enjoys comfortable, weather-protected water travel.'
      D: 'This person values the emotional experience of travel.'
      E: 'This person appreciates fixed-location instant connections.'
      F: 'This person prefers underground magical trains.'
      G: 'This person likes enchanted bicycles for short trips.'
      H: 'This person prefers broomstick flying for speed.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 praises carpets for being portable ("roll up and tuck under your arm") and not needing feeding — convenience and portability (A).'
      Speaker 1Zh: '说话者1称赞飞毯便携（"卷起来夹在胳膊下"）且不需要喂食——便利性和便携性（A）。'
      Speaker 2: 'Speaker 2 says "you are there instantly" and "nothing beats being there in one second flat" — instant travel (B).'
      Speaker 2Zh: '说话者2说"你立刻就到了"和"没什么比一秒钟到达更好"——即时旅行（B）。'
      Speaker 3: 'Speaker 3 describes the "invisible weather shield" creating warm, dry air on the boat — weather-protected water travel (C).'
      Speaker 3Zh: '说话者3描述了在船上创造温暖干燥空气的"隐形天气护罩"——有天气保护的水上旅行（C）。'
      Speaker 4: 'Speaker 4 says "the experience is unmatched" with wind, wingbeats, and landscape — emotional experience (D).'
      Speaker 4Zh: '说话者4说"体验是无与伦比的"，有风、翅膀拍打声和风景——情感体验（D）。'
      Speaker 5: 'Speaker 5 describes portal doors at fixed locations around the kingdom — fixed-location connections (E).'
      Speaker 5Zh: '说话者5描述了王国各处固定位置的传送门——固定位置的连接（E）。'

  # ============================================================
  # L262: What Makes a Great Dragon Rider
  # ============================================================

  - id: L262
    type: multiple-matching
    title: 'What Makes a Great Dragon Rider'
    titleZh: '什么造就了一位伟大的龙骑士'
    scene: 'You will hear five experienced dragon riders sharing their views on the most important quality for riders.'
    sceneZh: '你将听到五位经验丰富的龙骑士分享他们认为骑士最重要品质的看法。'
    difficulty: 3
    audioFile: 'L262.mp3'
    speakers:
      - name: Speaker 1
        text: 'People think the most important quality is bravery, but I disagree completely. The best riders I know are the most empathetic ones — those who can feel what their dragon is feeling. When your dragon is nervous, you need to sense that before it becomes a problem. When your dragon is tired, you need to know when to stop. Empathy is what turns a rider from a passenger into a true partner.'
      - name: Speaker 2
        text: 'For me, the answer is trust. Your dragon needs to trust you completely, and you need to trust your dragon. When you are flying through clouds and cannot see anything, you have to trust that your dragon knows the way. When your dragon dives suddenly, you have to trust there is a good reason. The riders who panic and try to override their dragon''s instincts are the ones who have accidents.'
      - name: Speaker 3
        text: 'Physical fitness is absolutely essential, and I think people underestimate this. Riding a dragon for several hours requires incredible core strength, leg strength, and stamina. Your body absorbs every movement the dragon makes. Unfit riders get exhausted quickly, which is dangerous because tired riders make poor decisions. I train for an hour every morning — running, stretching, and strength exercises.'
      - name: Speaker 4
        text: 'Communication is the key. You can be brave, fit, and empathetic, but if you cannot communicate clearly with your dragon, none of it matters. I spend as much time practising Dragon Language as I do flying. A single misunderstood word during flight could send you in the wrong direction or cause your dragon to make a sudden unexpected turn. Clear communication prevents accidents.'
      - name: Speaker 5
        text: 'Patience is the quality that separates good riders from great ones. Everything with dragons takes time — building the relationship, learning to fly together, developing trust. The riders who rush things always run into problems. My teacher told me, "A dragon will give you everything, but only if you give it time." I spent a full year just building my relationship with my dragon before we ever flew together.'
    statements:
      A: 'This person believes empathy is the most important quality.'
      B: 'This person thinks mutual trust is essential for safety.'
      C: 'This person emphasises the importance of physical fitness.'
      D: 'This person values clear communication above other qualities.'
      E: 'This person believes patience is what makes riders great.'
      F: 'This person thinks a good sense of humour helps.'
      G: 'This person believes riders need formal academic qualifications.'
      H: 'This person thinks competitive experience is most important.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "the best riders are the most empathetic ones" — empathy (A).'
      Speaker 1Zh: '说话者1说"最好的骑手是最有同理心的"——同理心（A）。'
      Speaker 2: 'Speaker 2 says "the answer is trust" and gives examples of trusting the dragon in flight — trust (B).'
      Speaker 2Zh: '说话者2说"答案是信任"，并举了飞行中信任龙的例子——信任（B）。'
      Speaker 3: 'Speaker 3 says "physical fitness is absolutely essential" and trains for an hour daily — fitness (C).'
      Speaker 3Zh: '说话者3说"体能绝对必不可少"，每天训练一小时——体能（C）。'
      Speaker 4: 'Speaker 4 says "Communication is the key" and that a single misunderstood word could cause an accident — communication (D).'
      Speaker 4Zh: '说话者4说"沟通是关键"，一个被误解的词就可能导致事故——沟通（D）。'
      Speaker 5: 'Speaker 5 says "Patience is the quality that separates good riders from great ones" — patience (E).'
      Speaker 5Zh: '说话者5说"耐心是区分好骑手和伟大骑手的品质"——耐心（E）。'

  # ============================================================
  # L263: Magical Solutions to Real Problems
  # ============================================================

  - id: L263
    type: multiple-matching
    title: 'Magical Solutions to Real Problems'
    titleZh: '用魔法解决现实问题'
    scene: 'You will hear five students proposing magical solutions to real-world problems.'
    sceneZh: '你将听到五位学生提出用魔法解决现实世界问题的方案。'
    difficulty: 3
    audioFile: 'L263.mp3'
    speakers:
      - name: Speaker 1
        text: 'I believe dragons could solve our energy crisis. Fire dragons produce enormous amounts of heat, which we could use to generate electricity. A single fire dragon can produce enough thermal energy to power a small town. Unlike fossil fuels, dragon fire is renewable and produces no pollution. We just need to feed the dragons rocks and spicy peppers, and they happily produce heat all day long.'
      - name: Speaker 2
        text: 'Water purification spells could end the global water crisis. Currently, millions of people lack access to clean drinking water. But a trained water wizard can purify an entire lake in one hour. If we trained thousands of water wizards and sent them to areas of need, clean water would be available to everyone on the planet. The spell is not even difficult — it is a Level 2 spell that first-year students can learn.'
      - name: Speaker 3
        text: 'Transformation spells could revolutionise recycling. Instead of burying rubbish in the ground, we could transform it back into its original raw materials. A plastic bottle could be transformed back into oil. Broken glass could be transformed into sand. Old electronics could be transformed into usable metals. Nothing would ever need to go to landfill again, and we would never run out of resources.'
      - name: Speaker 4
        text: 'Communication spells could prevent wars. Most conflicts start because of misunderstanding between nations. If leaders could use a universal translation spell during negotiations, there would be no miscommunication. But more than that — empathy spells could let world leaders temporarily experience life in another country, seeing problems from the other side. Understanding each other is the first step towards peace.'
      - name: Speaker 5
        text: 'Healing potions could transform medicine. Currently, many diseases have no cure, and treatment takes months or years. But healing potions that already exist in our world could cure broken bones in a day and eliminate common infections in hours. If we could produce these potions on a large scale and distribute them through hospitals, we could save millions of lives and end so much suffering.'
    statements:
      A: 'This person proposes using dragons for clean energy production.'
      B: 'This person suggests using magic to provide clean water globally.'
      C: 'This person wants to use magic to eliminate waste and pollution.'
      D: 'This person believes magic could improve international relations.'
      E: 'This person wants to use magical medicine to cure diseases.'
      F: 'This person suggests using magic to predict natural disasters.'
      G: 'This person proposes magical solutions for education.'
      H: 'This person wants to use magic to grow food in deserts.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says dragons could "generate electricity" and their fire is "renewable and produces no pollution" — clean energy (A).'
      Speaker 1Zh: '说话者1说龙可以"发电"，它们的火是"可再生的且不产生污染"——清洁能源（A）。'
      Speaker 2: 'Speaker 2 says "water purification spells could end the global water crisis" — clean water (B).'
      Speaker 2Zh: '说话者2说"水净化咒语可以解决全球水危机"——清洁水（B）。'
      Speaker 3: 'Speaker 3 says transformation spells could turn rubbish back into raw materials — eliminating waste (C).'
      Speaker 3Zh: '说话者3说变身咒语可以把垃圾变回原材料——消除废物（C）。'
      Speaker 4: 'Speaker 4 says communication and empathy spells "could prevent wars" — international relations (D).'
      Speaker 4Zh: '说话者4说沟通和共情咒语"可以防止战争"——国际关系（D）。'
      Speaker 5: 'Speaker 5 says healing potions could "save millions of lives" — curing diseases (E).'
      Speaker 5Zh: '说话者5说治愈药水可以"拯救数百万生命"——治愈疾病（E）。'

  # ============================================================
  # L264: My Dragon Academy Room
  # ============================================================

  - id: L264
    type: multiple-matching
    title: 'My Dragon Academy Room'
    titleZh: '我的龙学院房间'
    scene: 'You will hear five students describing what they have done to personalise their Dragon Academy room.'
    sceneZh: '你将听到五位学生描述他们如何个性化布置龙学院的房间。'
    difficulty: 2
    audioFile: 'L264.mp3'
    speakers:
      - name: Speaker 1
        text: 'I cast a sky spell on my ceiling so it looks exactly like the real sky outside — blue and sunny during the day, stars at night, even clouds drifting past. It makes the room feel much bigger than it actually is. When it rains outside, my ceiling shows rain too, but no water actually falls. Waking up and seeing a sunrise on my ceiling is the best alarm clock ever.'
      - name: Speaker 2
        text: 'I brought every plant I could find. My room looks like a miniature jungle. I have enchanted ferns that glow at night, singing flowers that hum melodies, and a small tree that grows miniature apples the size of cherries. The plants keep the air fresh and make the room smell wonderful. My roommate says it is like living inside a garden, and she loves it too.'
      - name: Speaker 3
        text: 'I covered every wall with sketches and paintings of dragons I have met during my time here. I draw a new portrait every week and pin it up. So far I have over eighty dragon portraits covering three walls. My favourite is the portrait of the crystal dragon I met on our field trip — I used metallic paint that catches the light, so it sparkles just like the real thing.'
      - name: Speaker 4
        text: 'My room is all about books. I built extra shelves from spell-reinforced wood and I have over three hundred books stacked from floor to ceiling. I also cast a floating spell on my favourite twenty books, so they hover in mid-air like a mobile. When I want to read one, I just reach up and pluck it from the air. My friends call my room "the second library" and often come to borrow books.'
      - name: Speaker 5
        text: 'I turned my room into a music studio. I enchanted the walls to be soundproof so I can practise my violin at any hour without disturbing anyone. I also have a self-playing piano that accompanies me when I practise, matching my tempo and style perfectly. The best addition is a recording crystal that captures everything I play so I can listen back and improve. My dragon loves my music — she sleeps in the corner while I play.'
    statements:
      A: 'This person uses magic to make their ceiling look like the sky.'
      B: 'This person filled their room with magical plants.'
      C: 'This person decorated with their own artwork.'
      D: 'This person created a personal library.'
      E: 'This person created a space for music practice.'
      F: 'This person built a miniature dragon model collection.'
      G: 'This person set up a potion-making workspace.'
      H: 'This person installed a small swimming pool.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 cast "a sky spell on my ceiling" to show real sky — magical sky ceiling (A).'
      Speaker 1Zh: '说话者1在天花板上施了"天空咒语"来展示真实的天空——魔法天空天花板（A）。'
      Speaker 2: 'Speaker 2 says "I brought every plant I could find" and their room looks like "a miniature jungle" — magical plants (B).'
      Speaker 2Zh: '说话者2说"我带来了能找到的每一株植物"，房间看起来像"微型丛林"——魔法植物（B）。'
      Speaker 3: 'Speaker 3 has "over eighty dragon portraits covering three walls" that they drew themselves — own artwork (C).'
      Speaker 3Zh: '说话者3有"超过八十幅龙的肖像覆盖三面墙"，都是自己画的——自己的艺术作品（C）。'
      Speaker 4: 'Speaker 4 has "over three hundred books stacked from floor to ceiling" — personal library (D).'
      Speaker 4Zh: '说话者4有"超过三百本书从地板堆到天花板"——个人图书馆（D）。'
      Speaker 5: 'Speaker 5 has soundproof walls, a self-playing piano, and a recording crystal — music practice space (E).'
      Speaker 5Zh: '说话者5有隔音墙、自动演奏钢琴和录音水晶——音乐练习空间（E）。'

  # ============================================================
  # L265: The Future of Dragon-Human Relations
  # ============================================================

  - id: L265
    type: multiple-matching
    title: 'The Future of Dragon-Human Relations'
    titleZh: '龙与人类关系的未来'
    scene: 'You will hear five speakers at a conference sharing their vision for the future of dragon-human relations.'
    sceneZh: '你将听到五位会议发言者分享他们对龙与人类关系未来的愿景。'
    difficulty: 3
    audioFile: 'L265.mp3'
    speakers:
      - name: Speaker 1
        text: 'I believe the future lies in dragon conservation. As human cities grow, dragon habitats are shrinking. We need to create protected dragon reserves — large areas of wilderness where dragons can live freely without human interference. In my vision, every country would have at least one national dragon reserve, managed jointly by humans and dragons. Conservation is not just about protecting dragons — it is about protecting our shared world.'
      - name: Speaker 2
        text: 'I see a future where dragon-human education is completely integrated. Right now, only special academies teach dragon skills. But I believe every school should include Dragon Studies in their curriculum. Children should learn about dragon culture, language, and biology alongside traditional subjects. Understanding breeds respect, and respect prevents conflict. Within a generation, dragon-human misunderstandings could become a thing of the past.'
      - name: Speaker 3
        text: 'My vision focuses on collaborative technology. Dragons and humans have different strengths. Humans are brilliant at building small, precise tools. Dragons have incredible natural abilities — fire, flight, strength. If we combine these strengths, we could create technologies that neither species could build alone. Imagine fireproof buildings heated by dragon breath, or flying ambulances carried by sky dragons. The possibilities are endless when we work together.'
      - name: Speaker 4
        text: 'I dream of a world where dragon rights are legally recognised. Currently, dragons have no legal protection in most countries. They can be captured, traded, and exploited without consequence. I am campaigning for a Dragon Rights Charter that would give dragons the same legal protections as humans — the right to freedom, the right to safe habitat, and the right not to be harmed. Every living being deserves dignity.'
      - name: Speaker 5
        text: 'Communication is the key to our future together. Despite decades of research, most humans still cannot speak Dragon Language fluently. I am developing an artificial intelligence translation system that can convert Dragon Language to human language in real time, capturing not just words but emotions and nuances. When we can truly understand what dragons are saying, I believe the relationship will transform completely.'
    statements:
      A: 'This person advocates for protected natural areas for dragons.'
      B: 'This person wants dragon education in all schools.'
      C: 'This person envisions humans and dragons combining their strengths.'
      D: 'This person campaigns for legal protection of dragons.'
      E: 'This person is building technology to improve dragon-human communication.'
      F: 'This person wants to create dragon-themed entertainment parks.'
      G: 'This person advocates for competitive dragon sports leagues.'
      H: 'This person wants dragons to hold political office.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 says "We need to create protected dragon reserves" — protected natural areas (A).'
      Speaker 1Zh: '说话者1说"我们需要建立受保护的龙保护区"——受保护的自然区域（A）。'
      Speaker 2: 'Speaker 2 says "every school should include Dragon Studies in their curriculum" — dragon education in all schools (B).'
      Speaker 2Zh: '说话者2说"每所学校都应该在课程中包含龙学"——所有学校的龙教育（B）。'
      Speaker 3: 'Speaker 3 says "If we combine these strengths, we could create technologies" — combining strengths (C).'
      Speaker 3Zh: '说话者3说"如果我们结合这些优势，我们可以创造技术"——结合优势（C）。'
      Speaker 4: 'Speaker 4 is "campaigning for a Dragon Rights Charter" with legal protections — legal protection (D).'
      Speaker 4Zh: '说话者4在"为龙权利宪章"进行活动，提供法律保护——法律保护（D）。'
      Speaker 5: 'Speaker 5 is "developing an artificial intelligence translation system" for dragon communication — improving communication (E).'
      Speaker 5Zh: '说话者5正在"开发人工智能翻译系统"用于龙的交流——改善沟通（E）。'
