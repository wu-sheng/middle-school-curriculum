  # ============================================================
  # L232: Types of Dragons
  # ============================================================

  - id: L232
    type: sentence-completion
    title: 'Types of Dragons'
    titleZh: '龙的种类'
    scene: 'You will hear a teacher giving a lesson about the main types of dragons.'
    sceneZh: '你将听到一位老师讲授龙的主要种类。'
    difficulty: 2
    audioFile: 'L232.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Good morning, class. Today we are going to learn about the five main types of dragons. Open your textbooks to page forty-seven.'
      - speaker: teacher
        voice: nova
        text: 'First, there are fire dragons. These are the ones most people think of when they hear the word dragon. They are red or orange, breathe fire, and live near volcanoes. Fire dragons are the largest species — an adult can be up to thirty metres long.'
      - speaker: teacher
        voice: nova
        text: 'Second, we have water dragons. They are blue or green, breathe ice or steam, and live in deep lakes and oceans. Water dragons are the friendliest species and are often the first type that young dragon tamers learn to work with.'
      - speaker: teacher
        voice: nova
        text: 'Third, there are earth dragons. These are brown or grey and cannot fly because their wings are too small for their heavy bodies. Instead, they tunnel underground at surprising speed. Earth dragons eat rocks and minerals, and their scales are as tough as granite.'
      - speaker: teacher
        voice: nova
        text: 'Fourth, we have sky dragons. They are white or silver and spend almost their entire lives in the clouds. Sky dragons are the fastest fliers — they can reach speeds of over three hundred miles per hour. They breathe wind rather than fire, creating powerful gusts that can knock down trees.'
      - speaker: teacher
        voice: nova
        text: 'Finally, there are shadow dragons. They are dark purple or black and are only active at night. Shadow dragons can become invisible in darkness, which makes them very difficult to study. Scientists know less about shadow dragons than any other type.'
      - speaker: teacher
        voice: nova
        text: 'For homework, I want you to choose one type and write a one-page report about its habitat, diet, and special abilities. This is due next Wednesday.'
    sentences:
      - id: L232-S1
        text: 'Fire dragons live near _____ and can be up to thirty metres long.'
        textZh: '火龙生活在 _____ 附近，可以长到三十米长。'
        answer: 'volcanoes'
      - id: L232-S2
        text: '_____ dragons are the friendliest species and good for beginners.'
        textZh: '_____ 龙是最友好的种类，适合初学者。'
        answer: 'Water'
      - id: L232-S3
        text: 'Earth dragons cannot fly because their wings are too _____ for their bodies.'
        textZh: '地龙不能飞，因为它们的翅膀对于身体来说太 _____ 了。'
        answer: 'small'
      - id: L232-S4
        text: 'Sky dragons can reach speeds of over _____ miles per hour.'
        textZh: '天龙的速度可以超过每小时 _____ 英里。'
        answer: 'three hundred'
      - id: L232-S5
        text: 'Shadow dragons can become _____ in darkness.'
        textZh: '影龙可以在黑暗中变得 _____。'
        answer: 'invisible'
      - id: L232-S6
        text: 'The homework is to write a one-page _____ about a chosen dragon type.'
        textZh: '作业是写一篇关于选定龙种类的一页 _____。'
        answer: 'report'

  # ============================================================
  # L233: The Dragon Egg Hatching
  # ============================================================

  - id: L233
    type: sentence-completion
    title: 'The Dragon Egg Hatching'
    titleZh: '龙蛋孵化'
    scene: 'You will hear a zookeeper explaining how to hatch a dragon egg.'
    sceneZh: '你将听到一位动物园管理员讲解如何孵化龙蛋。'
    difficulty: 2
    audioFile: 'L233.mp3'
    script:
      - speaker: zookeeper
        voice: nova
        text: 'Thank you for coming to our Dragon Nursery tour. Today I am going to explain how we hatch dragon eggs here at the sanctuary. The whole process takes about ninety days from start to finish.'
      - speaker: zookeeper
        voice: nova
        text: 'First, we place each egg in a special heated chamber. The temperature must be kept at exactly forty-two degrees at all times. Even a small change of one or two degrees can delay hatching by weeks.'
      - speaker: zookeeper
        voice: nova
        text: 'During the first month, the egg needs complete silence. Dragon embryos are very sensitive to sound, and loud noises can frighten them. We use thick padded walls around the chamber to block out all sound.'
      - speaker: zookeeper
        voice: nova
        text: 'In the second month, we start playing soft music near the egg. Research has shown that eggs exposed to gentle melodies produce calmer, more trusting dragons. We play classical music for about four hours each day.'
      - speaker: zookeeper
        voice: nova
        text: 'In the final month, we introduce the scent of the person who will become the dragon''s partner. We put a piece of their clothing next to the egg so the baby dragon recognises their smell immediately when it hatches. This creates an instant bond between dragon and human.'
      - speaker: zookeeper
        voice: nova
        text: 'When the egg is ready to hatch, it starts to glow and makes a humming sound. The baby dragon then breaks through the shell using a special horn on its nose, which falls off within a week. The newborn dragon is about the size of a puppy and takes its first flight within three days.'
    sentences:
      - id: L233-S1
        text: 'The entire hatching process takes about _____ days.'
        textZh: '整个孵化过程大约需要 _____ 天。'
        answer: 'ninety'
      - id: L233-S2
        text: 'The chamber temperature must be exactly _____ degrees.'
        textZh: '孵化室温度必须恰好保持在 _____ 度。'
        answer: 'forty-two'
      - id: L233-S3
        text: 'During the first month, the egg needs complete _____.'
        textZh: '第一个月，蛋需要完全的 _____。'
        answer: 'silence'
      - id: L233-S4
        text: 'In the second month, they play _____ music for four hours daily.'
        textZh: '第二个月，他们每天播放 _____ 音乐四小时。'
        answer: 'classical'
      - id: L233-S5
        text: 'A piece of the partner''s _____ is placed next to the egg in the final month.'
        textZh: '最后一个月，伙伴的一件 _____ 被放在蛋旁边。'
        answer: 'clothing'
      - id: L233-S6
        text: 'The baby dragon breaks the shell using a special _____ on its nose.'
        textZh: '小龙用鼻子上的一个特殊的 _____ 破壳。'
        answer: 'horn'

