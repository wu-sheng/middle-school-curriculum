  # ============================================================
  # L237: Life as a Dragon Keeper
  # ============================================================

  - id: L237
    type: sentence-completion
    title: 'Life as a Dragon Keeper'
    titleZh: '龙看守的生活'
    scene: 'You will hear a dragon keeper describing her daily routine.'
    sceneZh: '你将听到一位龙看守描述她的日常生活。'
    difficulty: 2
    audioFile: 'L237.mp3'
    script:
      - speaker: keeper
        voice: shimmer
        text: 'My name is Rosa, and I have been a dragon keeper at the Royal Sanctuary for seven years now. People always ask what a typical day looks like, so let me walk you through it.'
      - speaker: keeper
        voice: shimmer
        text: 'I wake up at five in the morning because dragons are early risers. The first task is feeding. Each adult dragon eats approximately fifty kilograms of food per day. Fire dragons eat coal and spicy peppers. Water dragons prefer fish and seaweed. Earth dragons eat rocks — yes, actual rocks!'
      - speaker: keeper
        voice: shimmer
        text: 'After feeding, I check each dragon for health issues. I examine their scales, teeth, and wings. A healthy dragon''s scales are smooth and shiny. Dull or flaky scales usually indicate the dragon is not getting enough sunlight.'
      - speaker: keeper
        voice: shimmer
        text: 'From ten until noon, I supervise the dragons'' exercise time. They fly around a specially designed course with hoops and obstacles. Exercise is essential because a dragon that does not fly regularly can develop wing cramps, which are extremely painful.'
      - speaker: keeper
        voice: shimmer
        text: 'In the afternoon, I clean the nesting areas and prepare evening meals. The hardest part of my job is bath time — imagine trying to give a bath to a creature that weighs three tonnes and hates water! Fire dragons are the worst because they heat the water to boiling within seconds.'
      - speaker: keeper
        voice: shimmer
        text: 'I finish work at about six each evening, but I am always on call for emergencies. The best part of this job is the bond you develop with the dragons. My favourite, a water dragon called Pearl, greets me every morning by blowing a tiny snowflake onto my nose.'
    sentences:
      - id: L237-S1
        text: 'Rosa has worked at the Royal Sanctuary for _____ years.'
        textZh: 'Rosa已经在皇家保护区工作了 _____ 年。'
        answer: 'seven'
      - id: L237-S2
        text: 'Each adult dragon eats about _____ kilograms of food per day.'
        textZh: '每只成年龙每天吃大约 _____ 公斤食物。'
        answer: 'fifty'
      - id: L237-S3
        text: 'Dull or flaky scales usually mean the dragon needs more _____.'
        textZh: '暗淡或起皮的鳞片通常意味着龙需要更多的 _____。'
        answer: 'sunlight'
      - id: L237-S4
        text: 'A dragon that does not fly regularly can develop wing _____.'
        textZh: '不经常飞行的龙可能会出现翅膀 _____。'
        answer: 'cramps'
      - id: L237-S5
        text: 'Fire dragons are the hardest to bathe because they _____ the water quickly.'
        textZh: '火龙最难洗澡，因为它们会迅速把水 _____。'
        answer: 'heat'
      - id: L237-S6
        text: 'Pearl greets Rosa each morning by blowing a tiny _____ onto her nose.'
        textZh: 'Pearl每天早上朝Rosa鼻子上吹一朵小 _____ 来打招呼。'
        answer: 'snowflake'

  # ============================================================
  # L238: The Spell Library
  # ============================================================

  - id: L238
    type: sentence-completion
    title: 'The Spell Library'
    titleZh: '咒语图书馆'
    scene: 'You will hear a librarian explaining how the spell library works.'
    sceneZh: '你将听到一位图书管理员解释咒语图书馆是如何运作的。'
    difficulty: 3
    audioFile: 'L238.mp3'
    script:
      - speaker: librarian
        voice: nova
        text: 'Welcome to the Spell Library. This is not an ordinary library. Our books contain real spells, and every book is alive — in a way. Let me explain the rules before you explore.'
      - speaker: librarian
        voice: nova
        text: 'The books are organised by colour. The green section contains nature spells — growing plants, controlling weather, talking to animals. The blue section has water and ice spells. Red is for fire magic, and the purple section contains transformation spells, which are the most advanced.'
      - speaker: librarian
        voice: nova
        text: 'Each book has a difficulty rating from one to ten. As first-year students, you may only borrow books rated one to three. Attempting a spell above your level can be dangerous — a second-year student once tried a level-eight spell and accidentally turned himself into a teapot for three days.'
      - speaker: librarian
        voice: nova
        text: 'When you open a spell book, the words will float off the page and arrange themselves in the air around you. You read them by walking in a circle. This is how spells were originally meant to be read — not sitting down, but moving. The movement helps your body absorb the magical energy.'
      - speaker: librarian
        voice: nova
        text: 'Books must be returned within two weeks. If a book is overdue, it will fly back to the library by itself, and you will receive a Warning Spark — a tiny flash of light that follows you around all day reminding you to be more responsible. It is quite embarrassing, I assure you.'
      - speaker: librarian
        voice: nova
        text: 'One final tip: always read the last page of a spell book before trying the spell. The last page always contains the reversal spell, in case something goes wrong. Trust me, you will need it more than you think.'
    sentences:
      - id: L238-S1
        text: 'The _____ section of the library contains transformation spells.'
        textZh: '图书馆的 _____ 区域包含变身咒语。'
        answer: 'purple'
      - id: L238-S2
        text: 'First-year students may only borrow books rated one to _____.'
        textZh: '一年级学生只能借阅等级一到 _____ 的书。'
        answer: 'three'
      - id: L238-S3
        text: 'A student who tried a hard spell was turned into a _____ for three days.'
        textZh: '一个尝试高难度咒语的学生被变成了 _____ 三天。'
        answer: 'teapot'
      - id: L238-S4
        text: 'The words float off the page and you read them by walking in a _____.'
        textZh: '文字会从页面上飘起来，你要绕 _____ 走来阅读它们。'
        answer: 'circle'
      - id: L238-S5
        text: 'An overdue book will fly back by itself and you receive a Warning _____.'
        textZh: '逾期的书会自己飞回来，你会收到一个警告 _____。'
        answer: 'Spark'
      - id: L238-S6
        text: 'The last page of a spell book always contains the _____ spell.'
        textZh: '咒语书的最后一页总是包含 _____ 咒语。'
        answer: 'reversal'

  # ============================================================
  # L239: The Dragon Language
  # ============================================================

  - id: L239
    type: sentence-completion
    title: 'The Dragon Language'
    titleZh: '龙语'
    scene: 'You will hear a linguistics professor explaining how dragons communicate.'
    sceneZh: '你将听到一位语言学教授讲解龙是如何交流的。'
    difficulty: 3
    audioFile: 'L239.mp3'
    script:
      - speaker: professor
        voice: echo
        text: 'Dragon language is fascinating because it uses three channels simultaneously — sound, colour, and smoke. Humans only use one channel at a time, which is why learning Dragon Language takes so long.'
      - speaker: professor
        voice: echo
        text: 'The sound channel works like our language but with much deeper tones. Dragon vocal cords can produce sounds below the range of human hearing, called infrasound. These deep sounds can travel through mountains and be heard up to fifty kilometres away.'
      - speaker: professor
        voice: echo
        text: 'The colour channel is equally important. Dragons change the colour of a special patch of scales on their throat while speaking. A warm golden colour means happiness or agreement. A cold blue means sadness or disagreement. Red signals danger or anger.'
      - speaker: professor
        voice: echo
        text: 'The smoke channel is the subtlest. Different smoke patterns carry different meanings. A thin, straight line of smoke means a simple statement. Smoke rings indicate a question. And spiralling smoke shows excitement or surprise.'
      - speaker: professor
        voice: echo
        text: 'The biggest difficulty for human learners is that we cannot produce coloured smoke. Our translation devices help, but they can only capture about seventy percent of what a dragon is saying. The remaining thirty percent — the emotional nuance carried by the smoke — is often lost in translation.'
      - speaker: professor
        voice: echo
        text: 'I always tell my students that the best way to learn Dragon Language is to spend time with dragons. Just as children learn language through immersion, you will develop an intuition for dragon communication after about six months of daily interaction.'
    sentences:
