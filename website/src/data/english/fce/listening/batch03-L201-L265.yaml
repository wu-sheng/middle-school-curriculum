        text: 'The first enchanted map was created in the year eight hundred and twenty by a cartographer called Elena of the Silver Coast. She discovered that if you drew a map using ink made from octopus blood mixed with moonlight, the map would update itself. Mountains that moved, rivers that changed course — the map showed everything in real time.'
      - speaker: girl
        voice: shimmer
