        textZh: '喉部温暖的 _____ 色表示快乐或同意。'
        answer: 'golden'
      - id: L239-S4
        text: 'Smoke rings indicate that the dragon is asking a _____.'
        textZh: '烟圈表示龙正在问一个 _____。'
        answer: 'question'
      - id: L239-S5
        text: 'Translation devices can only capture about _____ percent of dragon speech.'
