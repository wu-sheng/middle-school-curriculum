  - id: L257
    type: multiple-matching
    title: 'My Dream Magical Career'
    titleZh: '我梦想的魔法职业'
    scene: 'You will hear five students talking about the magical career they want to pursue.'
    sceneZh: '你将听到五位学生谈论他们想从事的魔法职业。'
    difficulty: 2
    audioFile: 'L257.mp3'
    speakers:
      - name: Speaker 1
        text: 'I want to be a dragon veterinarian. When I saw a sick dragon at the sanctuary last year, I knew immediately that this was what I wanted to do with my life. Dragon medicine is complicated because each species has different biology, but that challenge excites me. I am already studying extra biology and chemistry to prepare. The most rewarding part would be seeing a dragon recover and fly again because of my care.'
      - name: Speaker 2
        text: 'My dream is to be an enchanted architect — someone who designs magical buildings. I want to create floating houses that hover above the ground, libraries where the rooms rearrange themselves depending on what you need, and bridges that grow from living trees. I spend hours drawing designs in my notebook. My favourite idea so far is a school building that expands automatically when more students arrive.'
      - name: Speaker 3
        text: 'I am going to be a spell inventor. There are thousands of existing spells, but there is always room for new ones. I have already created a small spell that translates bird songs into English — you can hear what birds are actually saying to each other. My teacher says I have a natural talent for combining different spell elements in new ways. I want to create spells that solve everyday problems for ordinary people.'
      - name: Speaker 4
        text: 'I dream of being a magical weather controller. Imagine being able to stop floods, prevent droughts, and make sure every farmer gets exactly the right amount of rain. Weather wizards protect thousands of lives every year. I have been studying weather patterns since I was seven, and I already understand cloud formations better than most adults. I want to specialise in disaster prevention.'
      - name: Speaker 5
        text: 'I want to be a dragon diplomat — someone who negotiates between dragon communities and human towns. As human cities grow, they sometimes expand into dragon territory, causing conflicts. A diplomat works with both sides to find fair solutions. I love languages and communication, and I am already fluent in three types of Dragon Language. I believe that most problems between dragons and humans come from misunderstanding, not genuine disagreement.'
    statements:
