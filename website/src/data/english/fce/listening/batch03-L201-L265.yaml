  # ============================================================
  # L242: The Weather Wizard
  # ============================================================

  - id: L242
    type: sentence-completion
    title: 'The Weather Wizard'
    titleZh: '天气巫师'
    scene: 'You will hear a weather wizard explaining her job to visiting students.'
    sceneZh: '你将听到一位天气巫师向来访学生讲解她的工作。'
    difficulty: 2
    audioFile: 'L242.mp3'
    script:
      - speaker: wizard
        voice: nova
        text: 'Hello, young visitors! I am Windara, the Chief Weather Wizard for the Northern Region. My job is to manage the weather for an area covering approximately eight hundred square kilometres.'
      - speaker: wizard
        voice: nova
        text: 'Every morning at dawn, I climb to the top of Weather Tower — that tall building you can see from the school — and decide what weather we need for the day. Farmers might request rain for their crops. Festival organisers might ask for sunshine. I try to balance everyone''s needs.'
      - speaker: wizard
        voice: nova
        text: 'Creating rain is the easiest type of weather to make. I simply heat a large cauldron of water until it evaporates, then guide the steam upwards with a directional spell. Within about twenty minutes, rain clouds form naturally. Sunshine is harder — I have to push existing clouds away using wind spells, which requires much more energy.'
      - speaker: wizard
        voice: nova
        text: 'The most difficult weather to create is snow. It requires a combination of cold spells and moisture spells working together perfectly. If the balance is even slightly wrong, you get freezing rain instead of snow, which nobody enjoys.'
      - speaker: wizard
        voice: nova
        text: 'I work with a team of three assistant wizards. We take turns on night duty because weather needs to be monitored around the clock. If a storm develops unexpectedly, the night wizard must act quickly to prevent damage. My assistant Breezy once stopped a tornado at two in the morning — she earned a medal for that.'
    sentences:
      - id: L242-S1
        text: 'Windara manages weather for an area of about _____ square kilometres.'
        textZh: 'Windara管理大约 _____ 平方公里区域的天气。'
        answer: 'eight hundred'
      - id: L242-S2
        text: 'Every morning, Windara climbs to the top of Weather _____.'
        textZh: '每天早上，Windara爬到天气 _____ 顶部。'
        answer: 'Tower'
      - id: L242-S3
        text: 'Creating _____ is the easiest type of weather to make.'
        textZh: '制造 _____ 是最容易创造的天气类型。'
        answer: 'rain'
      - id: L242-S4
        text: 'If snow spells go wrong, you get freezing _____ instead.'
        textZh: '如果造雪咒出了差错，你会得到冻 _____ 而不是雪。'
        answer: 'rain'
      - id: L242-S5
        text: 'Windara works with a team of _____ assistant wizards.'
        textZh: 'Windara有一个由 _____ 名助理巫师组成的团队。'
        answer: 'three'
      - id: L242-S6
        text: 'Breezy earned a medal for stopping a _____ at two in the morning.'
        textZh: 'Breezy因为在凌晨两点阻止了一场 _____ 而获得了奖章。'
        answer: 'tornado'

