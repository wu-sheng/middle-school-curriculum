        text: 'The migration journey covers over _____ kilometres.'
        textZh: '迁徙旅程超过 _____ 公里。'
        answer: 'two thousand'
      - id: L244-S2
        text: 'This year''s Pathfinder is a fire dragon called _____.'
        textZh: '今年的领路者是一只叫 _____ 的火龙。'
        answer: 'Aurora'
      - id: L244-S3
        text: 'Young dragons fly at the _____ of the formation for protection.'
        textZh: '幼龙飞在队列的 _____ 以获得保护。'
        answer: 'centre'
      - id: L244-S4
        text: 'The journey takes approximately _____ days.'
        textZh: '旅程大约需要 _____ 天。'
        answer: 'nine'
      - id: L244-S5
        text: 'The most important rest stop is at Lake _____.'
        textZh: '最重要的休息站在 _____ 湖。'
        answer: 'Sapphire'
      - id: L244-S6
        text: 'Dragons navigate using tiny crystals of _____ in their brains.'
        textZh: '龙利用大脑中微小的 _____ 晶体来导航。'
        answer: 'magnetite'

  # ============================================================
  # L245: The Dragon Academy Graduation
  # ============================================================

  - id: L245
    type: sentence-completion
    title: 'The Dragon Academy Graduation'
    titleZh: '龙学院毕业典礼'
    scene: 'You will hear a graduating student giving a speech at Dragon Academy.'
    sceneZh: '你将听到一位毕业生在龙学院发表演讲。'
