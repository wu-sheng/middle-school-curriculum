        textZh: '羊毛来自一种叫做 _____ 羊的特殊绵羊。'
        answer: 'cloud'
      - id: L234-S3
        text: 'The weaving must be done by _____ because sunlight destroys the magic.'
        textZh: '编织必须在 _____ 下进行，因为阳光会破坏魔力。'
        answer: 'moonlight'
      - id: L234-S4
        text: 'Each carpet contains exactly _____ knots.'
        textZh: '每块飞毯恰好包含 _____ 个结。'
        answer: 'ten thousand'
      - id: L234-S5
        text: 'The pattern on the carpet is actually a _____ showing its best route.'
        textZh: '地毯上的图案实际上是一张 _____，显示它最佳的飞行路线。'
        answer: 'map'
      - id: L234-S6
        text: 'A well-made carpet can last for _____ years.'
        textZh: '一块做工精良的飞毯可以使用 _____ 年。'
        answer: 'two hundred'

