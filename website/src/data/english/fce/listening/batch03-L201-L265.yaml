        voice: shimmer
        text: 'The most interesting map I learned about is the Friendship Map. It shows glowing lines connecting people who are true friends. The closer the friendship, the brighter the line. If a friendship is in trouble, the line flickers. This map helped me understand that friendship is something real that can actually be seen and measured.'
      - speaker: girl
        voice: shimmer
        text: 'For the practical part of my project, I tried to make my own simple enchanted map of the school. I used special drawing ink from the art room. My map cannot update itself, but it does show the location of all the hidden passages in our school building. There are fourteen of them — and two were completely unknown until I made this map!'
    sentences:
