  # ============================================================
  # L244: The Dragon Migration
  # ============================================================

  - id: L244
    type: sentence-completion
    title: 'The Dragon Migration'
    titleZh: '龙的迁徙'
    scene: 'You will hear a nature documentary narrator describing the dragon migration.'
    sceneZh: '你将听到一位自然纪录片旁白描述龙的迁徙。'
    difficulty: 3
    audioFile: 'L244.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: 'Every autumn, as the leaves begin to change colour, something extraordinary happens in the skies above the Northern Mountains. Thousands of dragons begin their annual migration south to the Warm Valleys, a journey of over two thousand kilometres.'
      - speaker: narrator
        voice: nova
        text: 'The migration is led by the eldest female dragon, known as the Pathfinder. This year''s Pathfinder is a fire dragon called Aurora, who is estimated to be over three hundred years old. She has made this journey more than two hundred and fifty times.'
      - speaker: narrator
        voice: nova
        text: 'The dragons fly in a V-formation, similar to geese. This reduces wind resistance and allows weaker dragons to rest by flying in the slipstream of stronger ones. Young dragons, making the journey for the first time, always fly at the centre of the formation where they are most protected.'
      - speaker: narrator
        voice: nova
        text: 'The journey takes approximately nine days, with three rest stops along the way. The most important stop is Lake Sapphire, where the dragons drink and replenish their fire reserves. Without this stop, fire dragons would arrive in the south unable to breathe flame for weeks.'
      - speaker: narrator
        voice: nova
        text: 'Scientists have recently discovered that dragons navigate using the earth''s magnetic field. Tiny crystals of magnetite in their brains act like a built-in compass, allowing them to find their way even through thick cloud cover. This explains how dragons have followed the same route perfectly for thousands of years.'
