        text: 'I wish someone would invent a homework quill that writes your essays while you dictate. Not one that writes them for you — that would be cheating — but one that converts your spoken thoughts into neat handwriting on the page. My ideas are good but my handwriting is terrible. I always lose marks because teachers cannot read what I have written. A dictation quill would solve that problem.'
      - name: Speaker 2
        text: 'I want a mood-changing room. You walk in feeling stressed or sad, and the room adjusts itself to make you feel better — the walls change colour, gentle music plays, and a pleasant scent fills the air. When you are feeling calm, the room slowly returns to normal. Every school should have one. Students today are under so much pressure that we need safe spaces to recover.'
      - name: Speaker 3
        text: 'I dream of a language bubble — a transparent sphere you put over your head that instantly translates every language in real time. You hear everything in your own language, and when you speak, others hear it in theirs. Imagine travelling anywhere in the world and being able to talk to everyone you meet without any language barrier. It would bring people so much closer together.'
      - name: Speaker 4
        text: 'I wish there was a memory replay device — like a screen you hold to your forehead that plays your memories like a video. You could revisit happy moments whenever you want, show your friends what you experienced, and never worry about forgetting something important. My grandmother has begun to forget things, and I wish she could replay her favourite memories to keep them fresh.'
      - name: Speaker 5
        text: 'My invention would be a grow-anything greenhouse. You put any seed inside, set the conditions — temperature, light, soil — and the plant grows to full size in one day instead of weeks or months. Think about what this could mean for hungry people around the world. You could grow a field of wheat in twenty-four hours. Food shortages would become a thing of the past.'
