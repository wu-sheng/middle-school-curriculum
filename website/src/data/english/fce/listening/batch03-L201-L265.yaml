      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 wants to be a "dragon veterinarian" and sees sick dragons recover — healing dragons (A).'
      Speaker 1Zh: '说话者1想成为"龙兽医"，看到生病的龙康复——治愈龙（A）。'
      Speaker 2: 'Speaker 2 wants to be an "enchanted architect" and designs floating houses — magical buildings (B).'
      Speaker 2Zh: '说话者2想成为"魔法建筑师"，设计漂浮的房屋——魔法建筑（B）。'
      Speaker 3: 'Speaker 3 wants to be a "spell inventor" and has already created a bird song translation spell — creating new spells (C).'
      Speaker 3Zh: '说话者3想成为"咒语发明家"，已经创造了鸟歌翻译咒语——创造新咒语（C）。'
      Speaker 4: 'Speaker 4 wants to "stop floods, prevent droughts" as a weather controller — weather disaster prevention (D).'
      Speaker 4Zh: '说话者4想作为天气控制者"阻止洪水、防止干旱"——天气灾害预防（D）。'
      Speaker 5: 'Speaker 5 wants to be a "dragon diplomat" who negotiates between dragons and humans — peaceful coexistence (E).'
      Speaker 5Zh: '说话者5想成为"龙外交官"，在龙和人类之间进行谈判——和平共处（E）。'

  # ============================================================
  # L258: The Scariest Moment at Dragon Academy
  # ============================================================

  - id: L258
    type: multiple-matching
    title: 'The Scariest Moment at Dragon Academy'
    titleZh: '龙学院最可怕的时刻'
    scene: 'You will hear five students describing their scariest experience at Dragon Academy.'
    sceneZh: '你将听到五位学生描述他们在龙学院最可怕的经历。'
    difficulty: 3
    audioFile: 'L258.mp3'
    speakers:
      - name: Speaker 1
        text: 'My scariest moment was during a thunderstorm. I was flying back to the Academy when lightning struck very close to us. My dragon panicked and started diving towards the ground at incredible speed. I held on as tightly as I could and kept talking calmly to her. Eventually she levelled out just fifty metres above the treetops. After we landed safely, my hands were shaking so badly I could not unbuckle my harness for ten minutes.'
      - name: Speaker 2
        text: 'It happened in Dragon Language class. We were practising greeting phrases when I accidentally pronounced a word that sounds like "I challenge you to a duel" in dragon. The practice dragon in the classroom roared, spread its wings, and breathed a jet of flame right over my head. Luckily the teacher jumped in and said the calming phrase immediately. I singed my eyebrows and learned to be much more careful with dragon pronunciation.'
      - name: Speaker 3
        text: 'My scariest experience was getting lost in the Crystal Caves beneath the school. I wandered away from my group during a field trip because I saw a beautiful glowing crystal and wanted a closer look. When I turned around, I could not find the path back. I was alone in complete darkness for almost two hours before the search team found me. I have never felt so relieved to hear another person''s voice.'
      - name: Speaker 4
        text: 'During the midterm practical exam, my healing potion exploded. It produced a cloud of purple smoke that filled the entire examination hall. The smoke made everyone who breathed it in tell the truth about everything — no lies were possible for three hours. The exam had to be cancelled because students started revealing the answers out loud. I was embarrassed but secretly relieved the exam was postponed.'
      - name: Speaker 5
        text: 'The night a wild dragon landed on the Academy roof was terrifying. Wild dragons rarely come near buildings, so when we heard the enormous thud above the dormitory at midnight, nobody knew what was happening. It turned out to be an injured fire dragon seeking shelter from a blizzard. The teachers calmed it down and treated its wounds, but for about thirty minutes, we all thought we were under attack.'
    statements:
      A: 'This person faced danger while flying in bad weather.'
      B: 'This person accidentally provoked a dragon with language.'
      C: 'This person got separated from their group underground.'
      D: 'This person caused a potion accident during an exam.'
      E: 'This person was frightened by an unexpected wild dragon.'
      F: 'This person fell off their dragon during training.'
      G: 'This person was chased by a magical creature in the forest.'
      H: 'This person accidentally released a dangerous spell in the corridor.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 was caught in a thunderstorm while flying and lightning struck nearby — danger in bad weather (A).'
      Speaker 1Zh: '说话者1在飞行中遇到雷暴，闪电击中附近——恶劣天气中的危险（A）。'
      Speaker 2: 'Speaker 2 mispronounced a dragon word meaning "I challenge you to a duel" — provoked with language (B).'
      Speaker 2Zh: '说话者2读错了一个意思是"我向你发起决斗"的龙语——用语言激怒了龙（B）。'
      Speaker 3: 'Speaker 3 "wandered away from my group" in the Crystal Caves and was lost for two hours — separated underground (C).'
      Speaker 3Zh: '说话者3在水晶洞穴中"离开了队伍"，迷路了两个小时——在地下与队伍分离（C）。'
      Speaker 4: 'Speaker 4''s healing potion "exploded" during the midterm exam — potion accident during exam (D).'
      Speaker 4Zh: '说话者4的治疗药剂在期中考试中"爆炸了"——考试中的药剂事故（D）。'
      Speaker 5: 'Speaker 5 describes a wild dragon landing on the roof at midnight — frightened by unexpected wild dragon (E).'
      Speaker 5Zh: '说话者5描述了一只野龙午夜降落在屋顶——被意外的野龙吓到（E）。'

