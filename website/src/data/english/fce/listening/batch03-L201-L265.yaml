        text: 'For those watching for the first time, let me explain the rules. Each competitor must transform into three different animals in sequence — first a land animal, then a water animal, then a bird. They are judged on speed, accuracy, and how completely they transform. A partial transformation — say, keeping human hands while in eagle form — loses points.'
