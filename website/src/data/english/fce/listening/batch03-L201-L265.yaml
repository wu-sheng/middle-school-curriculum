    difficulty: 2
    audioFile: 'L234.mp3'
    script:
      - speaker: craftsman
        voice: echo
        text: 'Welcome to my workshop! I am Omar, and I am one of the last flying carpet weavers in the world. My family has been making flying carpets for twelve generations, stretching back over four hundred years.'
      - speaker: craftsman
        voice: echo
        text: 'Making a flying carpet takes six months of work. First, we collect wool from cloud sheep — special sheep that live on mountaintops and whose wool is lighter than air. This wool is what gives the carpet its ability to fly.'
      - speaker: craftsman
        voice: echo
        text: 'The weaving itself must be done by moonlight. Sunlight destroys the flying magic in the wool, so I work only at night, from sunset to sunrise. Each carpet contains exactly ten thousand knots, and every knot must be tied perfectly.'
      - speaker: craftsman
        voice: echo
        text: 'The pattern on the carpet is not just decoration — it is actually a map. Every flying carpet has a different pattern that shows the route it flies best. A carpet with a mountain pattern flies highest over mountains. One with a wave pattern prefers coastal routes.'
      - speaker: craftsman
        voice: echo
        text: 'Once the weaving is complete, I soak the carpet in starwater for three nights. Starwater is collected by leaving silver bowls outside on clear nights — the starlight dissolves into the water. This final step activates the flying enchantment.'
      - speaker: craftsman
        voice: echo
        text: 'A well-made flying carpet can last for two hundred years if properly cared for. The most important rule is to fold it carefully after each flight and never leave it in direct sunlight. My oldest carpet is one hundred and sixty years old and still flies beautifully.'
    sentences:
