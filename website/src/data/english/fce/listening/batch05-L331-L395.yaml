  - id: L376
    type: multiple-matching
    title: 'Why I Chose a Science Career'
    titleZh: '我为什么选择科学职业'
    scene: 'You will hear five young scientists explaining what inspired them to study science.'
    sceneZh: '你将听到五位年轻科学家解释是什么激励他们学习科学。'
    difficulty: 2
    audioFile: 'L376.mp3'
    speakers:
      - name: Speaker 1
        text: 'I became a marine biologist because of a snorkelling trip when I was seven. My mum took me to a coral reef in Thailand, and I saw hundreds of colourful fish, a sea turtle, and even a small shark. That underwater world was so magical that I knew immediately — I wanted to study the ocean for the rest of my life. Every time I dive now, I feel the same wonder I felt at seven.'
      - name: Speaker 2
        text: 'For me, it was a book. When I was nine, my teacher gave me a copy of "A Short History of Nearly Everything" by Bill Bryson. It explained the universe, atoms, evolution, and earthquakes in a way that was funny and exciting. I read it three times. That book made me realise that science is not boring formulas — it is the most amazing story ever told.'
      - name: Speaker 3
        text: 'I grew up on a farm, and every day I watched my parents struggle with unpredictable weather — droughts, floods, frosts. I wanted to understand why the weather does what it does. Now I am a climate scientist, and I spend my days trying to predict weather patterns months in advance. I feel like I am solving a puzzle that could help millions of farmers.'
      - name: Speaker 4
        text: 'My grandmother was a doctor in a village with no electricity. She treated patients using only her hands, her knowledge, and traditional herbal medicine. Watching her save lives with so little inspired me to study medicine and medical research. I now develop affordable diagnostic tools for rural communities. Every innovation I create, I think of her.'
      - name: Speaker 5
        text: 'I was always the kid who asked "why?" about everything. Why is the sky blue? Why do leaves change colour? My parents bought me a microscope when I was eight, and I spent hours looking at pond water, discovering entire worlds of tiny organisms. The microscope showed me that incredible things are happening everywhere — you just need to look closely.'
    statements:
      A: 'This person was inspired by a family member who worked in healthcare.'
      B: 'This person was motivated by seeing the struggles of people working the land.'
      C: 'This person fell in love with science after reading a book.'
      D: 'This person was inspired by an experience exploring nature directly.'
      E: 'This person was driven by natural curiosity and the joy of observation.'
      F: 'This person wanted to become famous for a scientific discovery.'
      G: 'This person was inspired by winning a school science competition.'
      H: 'This person studied science because it was required at their school.'
    answers:
      Speaker 1: 'D'
      Speaker 2: 'C'
      Speaker 3: 'B'
      Speaker 4: 'A'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 describes a snorkelling trip that made them want to study the ocean — direct nature experience (D).'
      Speaker 1Zh: '说话者1描述了一次浮潜之旅让他们想要研究海洋——直接的自然体验（D）。'
      Speaker 2: 'Speaker 2 was inspired by reading "A Short History of Nearly Everything" — a book (C).'
      Speaker 2Zh: '说话者2受到了阅读《万物简史》的启发——一本书（C）。'
      Speaker 3: 'Speaker 3 grew up watching parents struggle with weather on a farm — land workers'' struggles (B).'
      Speaker 3Zh: '说话者3在农场看到父母与天气作斗争——土地工作者的困难（B）。'
      Speaker 4: 'Speaker 4 was inspired by their grandmother who was a village doctor — family healthcare worker (A).'
      Speaker 4Zh: '说话者4受到祖母（村医）的启发——家庭医疗工作者（A）。'
      Speaker 5: 'Speaker 5 was always curious and loved observing tiny organisms under a microscope — natural curiosity (E).'
      Speaker 5Zh: '说话者5总是好奇，喜欢在显微镜下观察微小生物——天然的好奇心（E）。'

  - id: L377
    type: multiple-matching
    title: 'My Favourite Animal Adaptation'
    titleZh: '我最喜欢的动物适应'
    scene: 'You will hear five children talking about animal adaptations they find most amazing.'
    sceneZh: '你将听到五个孩子谈论他们觉得最了不起的动物适应。'
    difficulty: 2
    audioFile: 'L377.mp3'
    speakers:
      - name: Speaker 1
        text: 'The Arctic fox is my favourite because it changes colour with the seasons. In winter, its fur turns completely white to blend with the snow. In summer, it turns brown to match the rocky ground. This camouflage is so effective that you can walk right past an Arctic fox in winter and never see it. Nature designed the perfect disguise.'
      - name: Speaker 2
        text: 'I am fascinated by the bombardier beetle. When threatened, it mixes two chemicals inside its body that create a boiling hot explosion — nearly one hundred degrees — which it sprays at predators. It is like having a built-in weapon. No predator wants to eat something that can literally explode in your mouth.'
      - name: Speaker 3
        text: 'For me, it is the electric eel. It can generate eight hundred and sixty volts of electricity from special cells in its body. That is enough to stun a horse. It uses electricity for hunting, self-defence, and even navigation in murky water. An animal that makes its own electricity is the coolest thing ever.'
      - name: Speaker 4
        text: 'The mimic octopus is unbelievable. It can change not just its colour but its entire shape to look like other animals. It can imitate a flatfish, a lionfish, a sea snake, and at least twelve other species. When a predator approaches, it transforms into whichever animal the predator is most afraid of. It is the ultimate shape-shifter.'
      - name: Speaker 5
        text: 'I love the bar-tailed godwit because it makes the longest non-stop flight of any bird. It flies from Alaska to New Zealand — over eleven thousand kilometres — without stopping once to eat, drink, or rest. The flight takes about nine days. Before departure, it eats so much that it nearly doubles its body weight. That is the most extreme endurance in the animal kingdom.'
    statements:
      A: 'This person admires an animal that can change its appearance to look like other species.'
      B: 'This person is amazed by an animal that generates electricity.'
      C: 'This person likes an animal whose fur changes colour for camouflage.'
      D: 'This person is fascinated by an animal that uses a chemical defence mechanism.'
      E: 'This person admires an animal that can fly extreme distances without stopping.'
      F: 'This person is impressed by an animal that can breathe underwater.'
      G: 'This person likes an animal that builds complex structures.'
      H: 'This person admires an animal that can communicate using sounds.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'D'
      Speaker 3: 'B'
      Speaker 4: 'A'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 describes the Arctic fox changing fur colour for camouflage (C).'
      Speaker 1Zh: '说话者1描述了北极狐改变毛色进行伪装（C）。'
      Speaker 2: 'Speaker 2 describes the bombardier beetle''s chemical explosion defence (D).'
      Speaker 2Zh: '说话者2描述了射炮步甲的化学爆炸防御（D）。'
      Speaker 3: 'Speaker 3 describes the electric eel generating electricity (B).'
      Speaker 3Zh: '说话者3描述了电鳗产生电力（B）。'
      Speaker 4: 'Speaker 4 describes the mimic octopus imitating other species (A).'
      Speaker 4Zh: '说话者4描述了拟态章鱼模仿其他物种（A）。'
      Speaker 5: 'Speaker 5 describes the bar-tailed godwit''s non-stop flight (E).'
      Speaker 5Zh: '说话者5描述了斑尾塍鹬的不间断飞行（E）。'

  # L378-L390: Additional multiple matching (brief entries for remaining)
  - id: L378
    type: multiple-matching
    title: 'What I Learned from Nature'
    titleZh: '我从自然中学到了什么'
    scene: 'You will hear five people describing what nature has taught them.'
    sceneZh: '你将听到五个人描述自然教会了他们什么。'
    difficulty: 3
    audioFile: 'L378.mp3'
    speakers:
      - name: Speaker 1
        text: 'Watching ants taught me about teamwork. A single ant can carry fifty times its own body weight, but it is the colony working together that achieves extraordinary things — building complex underground cities, farming fungus for food, and defending against enemies. No ant works alone. That taught me that the best achievements come from cooperation.'
      - name: Speaker 2
        text: 'Observing seasons taught me about patience. In winter, the garden looks dead. But underground, bulbs and seeds are slowly preparing. Then spring arrives and everything bursts into life. Nature taught me that important changes happen quietly, beneath the surface, and that good things take time.'
      - name: Speaker 3
        text: 'The ocean taught me about humility. Standing on a cliff watching waves that have crossed three thousand miles of open water reminds you how small you are. The ocean was here billions of years before humans and will be here long after us. It puts your problems into perspective.'
      - name: Speaker 4
        text: 'Gardening taught me about responsibility. When I planted my first tomato seeds, I quickly learned that living things depend on you completely. If you forget to water them for one hot weekend, they die. Taking care of plants taught me that responsibility is not something you can take a break from.'
      - name: Speaker 5
        text: 'Watching birds migrate taught me about resilience. A tiny swallow weighing less than twenty grams flies six thousand miles from Africa to England every spring. It faces storms, predators, and exhaustion. But it keeps going. When I feel like giving up on something difficult, I think of that little swallow and I keep going too.'
    statements:
      A: 'Nature taught this person about the value of working with others.'
      B: 'Nature taught this person that important things take time.'
      C: 'Nature taught this person to feel humble about humanity''s place in the world.'
      D: 'Nature taught this person about the importance of looking after things.'
      E: 'Nature taught this person about never giving up despite difficulties.'
      F: 'Nature taught this person about the importance of speed.'
      G: 'Nature taught this person to be competitive.'
      H: 'Nature taught this person that bigger is always better.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 learned about teamwork from watching ants cooperate (A).'
      Speaker 1Zh: '说话者1从观察蚂蚁合作中学到了团队合作（A）。'
      Speaker 2: 'Speaker 2 learned patience from watching seasons change slowly (B).'
      Speaker 2Zh: '说话者2从观察季节缓慢变化中学到了耐心（B）。'
      Speaker 3: 'Speaker 3 learned humility from the vastness of the ocean (C).'
      Speaker 3Zh: '说话者3从海洋的广阔中学到了谦逊（C）。'
      Speaker 4: 'Speaker 4 learned responsibility from caring for plants (D).'
      Speaker 4Zh: '说话者4从照顾植物中学到了责任（D）。'
      Speaker 5: 'Speaker 5 learned resilience from watching migrating swallows (E).'
      Speaker 5Zh: '说话者5从观察迁徙的燕子中学到了韧性（E）。'

  # L379-L390: Remaining multiple matching (using same format, IDs only for structure)
  - id: L379
    type: multiple-matching
    title: 'My Environmental Action'
    titleZh: '我的环保行动'
    scene: 'You will hear five teenagers describing environmental actions they have taken.'
    sceneZh: '你将听到五位青少年描述他们采取的环保行动。'
    difficulty: 2
    audioFile: 'L379.mp3'
    speakers:
      - name: Speaker 1
        text: 'I organised a beach cleanup last summer. Twenty-three friends and I collected over two hundred kilograms of plastic, glass, and fishing nets from our local beach in a single afternoon. The worst thing we found was a fishing net that had trapped a seagull. We freed the bird and took it to a wildlife rescue centre. Now we do a cleanup every month.'
      - name: Speaker 2
        text: 'I started a school garden where we grow vegetables without any chemicals. We use compost instead of fertilizers and ladybirds instead of pesticides. The canteen now uses some of our vegetables in school meals. The students love knowing that the tomatoes in their salad were grown by their classmates just twenty metres from the dining hall.'
      - name: Speaker 3
        text: 'I convinced my school to ban single-use plastic water bottles. It took six months of petitions and presentations to the head teacher. Now every student has a reusable metal bottle and there are water refill stations in every corridor. We calculated that the school has avoided using over thirty thousand plastic bottles in one year.'
      - name: Speaker 4
        text: 'I built bird boxes with my grandfather and installed them in trees around our neighbourhood. We put up fifteen boxes last autumn, and by spring, eleven were occupied — mostly by blue tits and sparrows. One box even had a family of swallows. My neighbours love watching the birds from their windows.'
      - name: Speaker 5
        text: 'I created a YouTube channel about living sustainably. I film myself trying different eco-friendly alternatives: making my own cleaning products, shopping at zero-waste stores, cycling instead of getting lifts. My videos have over fifty thousand views now, and lots of young people message me saying they have made changes because of what they saw.'
    statements:
      A: 'This person reduced waste by campaigning to change a school policy.'
      B: 'This person used social media to inspire others to live more sustainably.'
      C: 'This person removed litter from a natural environment.'
      D: 'This person grew food using organic methods at school.'
      E: 'This person created homes for wildlife in their neighbourhood.'
      F: 'This person raised money for an environmental charity.'
      G: 'This person invented a new recycling machine.'
      H: 'This person wrote a letter to the government about pollution.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'D'
      Speaker 3: 'A'
      Speaker 4: 'E'
      Speaker 5: 'B'
    explanations:
      Speaker 1: 'Speaker 1 organised a beach cleanup — removing litter from a natural environment (C).'
      Speaker 1Zh: '说话者1组织了海滩清理——从自然环境中清除垃圾（C）。'
      Speaker 2: 'Speaker 2 started an organic school garden — growing food without chemicals (D).'
      Speaker 2Zh: '说话者2开始了有机学校花园——不使用化学品种植食物（D）。'
      Speaker 3: 'Speaker 3 campaigned to ban plastic bottles at school — changing school policy (A).'
      Speaker 3Zh: '说话者3发起运动在学校禁止塑料瓶——改变学校政策（A）。'
      Speaker 4: 'Speaker 4 built and installed bird boxes — creating wildlife homes (E).'
