        voice: shimmer
        text: 'Every year, approximately eight million tonnes of plastic enter the world''s oceans. That is equivalent to dumping a rubbish truck full of plastic into the sea every single minute. By twenty fifty, there could be more plastic in the ocean than fish, by weight.'
      - speaker: scientist
        voice: shimmer
        text: 'Most ocean plastic does not biodegrade. Instead, it breaks into smaller and smaller pieces called microplastics — fragments less than five millimetres across. These microplastics have been found everywhere: in Arctic ice, in the deepest ocean trenches, and even in human blood samples. A recent study found that the average person ingests about five grams of microplastic per week — roughly the weight of a credit card.'
      - speaker: scientist
        voice: shimmer
        text: 'The five largest accumulations of ocean plastic are called gyres. The biggest is the Great Pacific Garbage Patch, which covers an area roughly three times the size of France. Cleanup efforts are underway, but the real solution is to stop plastic entering the ocean in the first place.'
    sentences:
      - id: L371-S1
