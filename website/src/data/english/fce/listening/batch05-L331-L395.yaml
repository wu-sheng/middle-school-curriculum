  # L386-L390: Final multiple matching entries
  - id: L386
    type: multiple-matching
    title: 'Endangered Animals We Care About'
    titleZh: '我们关心的濒危动物'
    scene: 'You will hear five children explaining which endangered animal they care about most.'
    sceneZh: '你将听到五个孩子解释他们最关心的濒危动物。'
    difficulty: 2
    audioFile: 'L386.mp3'
    speakers:
      - name: Speaker 1
        text: 'I care most about orangutans because their rainforest homes are being destroyed for palm oil plantations. Every time you eat a biscuit or use shampoo, it probably contains palm oil. I now check every label and only buy products with certified sustainable palm oil. It is a small thing, but if everyone did it, it would save thousands of orangutans.'
      - name: Speaker 2
        text: 'Sea turtles are my passion. Six out of seven species are endangered. The biggest threat is plastic pollution — turtles mistake floating plastic bags for jellyfish and choke on them. I do a beach cleanup every weekend and I have started a school campaign to reduce single-use plastic. Every bag we stop from reaching the ocean could save a turtle''s life.'
      - name: Speaker 3
        text: 'I worry most about bees. They are not big or cute like pandas, so people forget about them. But without bees, we would lose about seventy-five percent of our fruit and vegetables. Pesticides are killing them in huge numbers. I planted a wildflower garden to give local bees food and nesting places. If bees disappear, we are all in serious trouble.'
      - name: Speaker 4
        text: 'Polar bears keep me up at night. They depend on Arctic sea ice for hunting seals, but the ice is disappearing because of climate change. By twenty fifty, two-thirds of polar bears could be gone. I try to reduce my carbon footprint every day — cycling instead of asking for lifts, turning off lights, eating less meat.'
      - name: Speaker 5
        text: 'Rhinos are the animal I fight for. Poachers kill them just for their horns, which have no medical value at all. Three rhinos are killed every single day. I raised money for a rhino sanctuary by running a half-marathon, and my class adopted a baby rhino called Hope through a conservation charity.'
    statements:
      A: 'This child is concerned about an animal threatened by habitat destruction for food production.'
      B: 'This child is worried about a marine animal harmed by plastic pollution.'
      C: 'This child cares about an insect vital to food production.'
      D: 'This child is concerned about an Arctic animal losing its habitat to climate change.'
      E: 'This child fights for an animal killed for a body part with no real value.'
      F: 'This child is worried about sharks being hunted for their fins.'
      G: 'This child cares about an animal threatened by light pollution.'
      H: 'This child is concerned about birds affected by wind turbines.'
    answers:
