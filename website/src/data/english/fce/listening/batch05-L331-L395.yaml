# FCE Daily Listening Practice — Month 6, Batch 05
# 65 exercises (L331–L395)
# L331–L360: Part 1 short extracts (30 exercises, difficulty 2-3)
# L361–L375: Part 2 sentence completion (15 exercises, difficulty 2-3)
# L376–L390: Part 3 multiple matching (15 exercises, difficulty 2-3)
# L391–L395: Part 4 long conversation (5 exercises, difficulty 3)
# Theme: Nature / Science / Wildlife for 8-9 year old learners

extracts:
  # ============================================================
  # L331–L360: Part 1 — Short Extracts (Nature/Science Theme)
  # ============================================================

  - id: L331
    type: short-extract
    title: 'The Octopus Escape'
    titleZh: '章鱼逃跑'
    scene: 'You will hear a zookeeper telling visitors about an octopus.'
    sceneZh: '你将听到一位动物园管理员向游客讲述一只章鱼的故事。'
    difficulty: 2
    audioFile: 'L331.mp3'
    script:
      - speaker: zookeeper
        voice: nova
        text: 'Our octopus, named Otto, is the cleverest animal in the entire aquarium. Last month, he figured out how to unscrew the lid of his tank from the inside. We found him in the morning, sitting in a bucket of fish in the kitchen. He had crawled across the floor, climbed a set of stairs, and found the one room in the building that had food.'
      - speaker: zookeeper
        voice: nova
        text: 'Since then, we have added three extra locks to his tank. He has already worked out how to open two of them. We think it is only a matter of time before he escapes again.'
    question:
      text: 'Why is Otto considered clever?'
      textZh: '为什么Otto被认为很聪明？'
      options:
        A: 'He can change colour to match his surroundings.'
        B: 'He worked out how to escape his tank and find food.'
        C: 'He learned to perform tricks for visitors.'
      answer: 'B'
      explanation: 'The zookeeper describes Otto unscrewing his tank lid and finding the kitchen — problem-solving ability.'
      explanationZh: '管理员描述了Otto拧开水箱盖并找到厨房——解决问题的能力。'

  - id: L332
    type: short-extract
    title: 'The Coral Reef Scientist'
    titleZh: '珊瑚礁科学家'
    scene: 'You will hear a marine biologist talking about her job.'
    sceneZh: '你将听到一位海洋生物学家谈论她的工作。'
    difficulty: 2
    audioFile: 'L332.mp3'
    script:
      - speaker: scientist
        voice: shimmer
        text: 'People always ask me what the best part of my job is. They expect me to say swimming with dolphins or discovering new species. But honestly, the most rewarding thing is the small victories. Last week, I checked on a coral reef we had been nursing for three years. The baby corals we planted had grown into a beautiful garden, with fish already moving in.'
      - speaker: scientist
        voice: shimmer
        text: 'When you see life returning to a damaged reef, it gives you hope that we can still make a difference. That is what keeps me going on the difficult days.'
    question:
      text: 'What does the scientist find most rewarding about her job?'
      textZh: '这位科学家觉得工作中最有成就感的是什么？'
      options:
        A: 'Swimming with dolphins every day.'
        B: 'Seeing damaged coral reefs recover and come back to life.'
        C: 'Discovering new species of fish.'
      answer: 'B'
      explanation: 'She says "the most rewarding thing is the small victories" and describes seeing life return to a damaged reef.'
      explanationZh: '她说"最有成就感的是小小的胜利"，并描述了看到生命回到受损的珊瑚礁。'

  - id: L333
    type: short-extract
    title: 'The Bee Problem'
    titleZh: '蜜蜂问题'
    scene: 'You will hear a farmer explaining why bees are important.'
    sceneZh: '你将听到一位农民解释为什么蜜蜂很重要。'
    difficulty: 2
    audioFile: 'L333.mp3'
    script:
      - speaker: farmer
        voice: echo
        text: 'Five years ago, I noticed something worrying on my apple farm. The trees were blooming beautifully, but hardly any apples were growing. I could not understand why. Then a scientist from the local university visited and explained: there were not enough bees to pollinate the flowers.'
      - speaker: farmer
        voice: echo
        text: 'She said the pesticides I was using were killing the bees. I immediately switched to organic farming methods. It took two years, but the bees came back, and now my apple harvest is bigger than ever.'
    question:
      text: 'What caused the farmer''s apple problem?'
      textZh: '是什么导致了农民的苹果问题？'
      options:
        A: 'The weather was too cold for the trees to produce fruit.'
        B: 'Pesticides had killed the bees needed to pollinate the flowers.'
        C: 'A disease was spreading among the apple trees.'
      answer: 'B'
      explanation: 'The scientist explained that pesticides were killing the bees needed for pollination.'
      explanationZh: '科学家解释说杀虫剂正在杀死授粉所需的蜜蜂。'

  - id: L334
    type: short-extract
    title: 'The Deep Sea Diver'
    titleZh: '深海潜水员'
    scene: 'You will hear a deep-sea diver describing what she saw at the bottom of the ocean.'
    sceneZh: '你将听到一位深海潜水员描述她在海底看到的景象。'
    difficulty: 2
    audioFile: 'L334.mp3'
    script:
      - speaker: diver
        voice: shimmer
        text: 'At two thousand metres below the surface, there is absolutely no sunlight. Everything is pitch black. But when I turned off my torch, the most incredible thing happened — the darkness came alive with light. Everywhere I looked, creatures were glowing: blue jellyfish, green worms, red shrimp. It was like looking at a sky full of living stars.'
      - speaker: diver
        voice: shimmer
        text: 'Bioluminescence is the most beautiful thing I have ever witnessed underwater. These animals create their own light through chemical reactions in their bodies. It is nature''s own light show.'
    question:
      text: 'What amazed the diver most about the deep sea?'
      textZh: '深海中什么最让潜水员惊叹？'
      options:
        A: 'The enormous size of the creatures living there.'
        B: 'The bioluminescence — creatures creating their own light.'
        C: 'The warm temperature of the deep ocean water.'
      answer: 'B'
      explanation: 'The diver says "bioluminescence is the most beautiful thing I have ever witnessed underwater."'
      explanationZh: '潜水员说"生物发光是我在水下见过的最美丽的东西"。'

  - id: L335
    type: short-extract
    title: 'The Penguin Researcher'
    titleZh: '企鹅研究员'
    scene: 'You will hear a scientist talking about studying penguins in Antarctica.'
    sceneZh: '你将听到一位科学家谈论在南极洲研究企鹅。'
    difficulty: 2
    audioFile: 'L335.mp3'
    script:
      - speaker: scientist
        voice: echo
        text: 'Living in Antarctica for six months was the hardest thing I have ever done. The temperature dropped to minus forty degrees, and the wind was so strong it could knock you over. But being surrounded by ten thousand emperor penguins made it all worthwhile.'
      - speaker: scientist
        voice: echo
        text: 'What surprised me most was how the male penguins care for their eggs. The father balances the egg on top of his feet for two months without eating, keeping it warm in a special pouch. Meanwhile, the mother walks up to seventy kilometres across the ice to find food in the ocean.'
    question:
      text: 'What surprised the scientist most about emperor penguins?'
      textZh: '关于帝企鹅，什么最让科学家感到惊讶？'
      options:
        A: 'How fast they can swim in cold water.'
        B: 'How the father cares for the egg without eating for two months.'
        C: 'How many penguins live together in one colony.'
      answer: 'B'
      explanation: 'The scientist says "what surprised me most was how the male penguins care for their eggs" for two months without eating.'
      explanationZh: '科学家说"最让我惊讶的是雄性企鹅如何照顾蛋"——两个月不吃东西。'

  - id: L336
    type: short-extract
    title: 'The Rainforest Guide'
    titleZh: '雨林向导'
    scene: 'You will hear a rainforest guide explaining the forest layers.'
    sceneZh: '你将听到一位雨林向导解释森林层次。'
    difficulty: 2
    audioFile: 'L336.mp3'
    script:
      - speaker: guide
        voice: nova
        text: 'Most people think a rainforest is just a big mass of trees. But actually, it is divided into four distinct layers, each with its own ecosystem. At the very top is the emergent layer, where the tallest trees poke above the canopy to reach direct sunlight. Eagles and butterflies live up here.'
      - speaker: guide
        voice: nova
        text: 'Below that is the canopy — a thick ceiling of leaves that blocks ninety-eight percent of sunlight from reaching the ground. This is where most of the animals live: monkeys, tree frogs, toucans. The canopy is so thick that rain can take ten minutes to drip from the top leaves to the forest floor.'
    question:
      text: 'What is special about the canopy layer?'
      textZh: '树冠层有什么特别之处？'
      options:
        A: 'It is where the tallest trees grow above everything else.'
        B: 'It blocks most sunlight and is home to most rainforest animals.'
        C: 'It is the darkest layer where no animals can survive.'
      answer: 'B'
      explanation: 'The guide says the canopy "blocks ninety-eight percent of sunlight" and "this is where most of the animals live."'
      explanationZh: '向导说树冠层"挡住了98%的阳光"，而且"这是大部分动物生活的地方"。'

  - id: L337
    type: short-extract
    title: 'The Dinosaur Fossil'
    titleZh: '恐龙化石'
    scene: 'You will hear a museum curator talking about a recent discovery.'
    sceneZh: '你将听到一位博物馆馆长谈论最近的一个发现。'
    difficulty: 2
    audioFile: 'L337.mp3'
    script:
      - speaker: curator
        voice: nova
        text: 'Last summer, a nine-year-old girl named Sofia was walking her dog on a beach in southern England when she noticed something unusual sticking out of the cliff. She thought it was a funny-shaped rock, but she took a photograph and sent it to our museum.'
      - speaker: curator
        voice: nova
        text: 'We immediately sent a team to investigate. What Sofia had found was a nearly complete dinosaur skeleton — a species that had never been identified before. It is now displayed in our main hall, and we have named it Sofiasaurus in her honour. This discovery reminds us that amazing scientific finds can be made by anyone, at any age.'
    question:
      text: 'What was special about Sofia''s discovery?'
      textZh: 'Sofia的发现有什么特别之处？'
      options:
        A: 'It was a new dinosaur species never seen before.'
        B: 'It was the oldest fossil ever found in England.'
        C: 'It was a living dinosaur hidden in a cave.'
      answer: 'A'
      explanation: 'The curator says it was "a species that had never been identified before" and they named it Sofiasaurus.'
      explanationZh: '馆长说这是"一个从未被鉴定过的物种"，并以Sofia的名字命名。'

  - id: L338
    type: short-extract
    title: 'The Weather Satellite'
    titleZh: '气象卫星'
    scene: 'You will hear a weather forecaster explaining how satellites help predict weather.'
    sceneZh: '你将听到一位天气预报员解释卫星如何帮助预测天气。'
    difficulty: 2
    audioFile: 'L338.mp3'
    script:
      - speaker: forecaster
        voice: shimmer
        text: 'Fifty years ago, weather forecasters could only predict the weather about one day in advance. Today, thanks to satellites orbiting the Earth, we can forecast up to ten days ahead with reasonable accuracy.'
      - speaker: forecaster
        voice: shimmer
        text: 'Weather satellites take a complete picture of the Earth every thirty minutes. They can see cloud formations, measure sea surface temperatures, and track storms as they develop. This information saves thousands of lives every year because people can be warned to evacuate before a hurricane or flood arrives.'
    question:
      text: 'How have satellites improved weather forecasting?'
      textZh: '卫星如何改善了天气预报？'
      options:
        A: 'They can now create rain clouds to prevent droughts.'
        B: 'They allow forecasters to predict weather up to ten days in advance.'
        C: 'They can stop hurricanes before they reach land.'
      answer: 'B'
      explanation: 'The forecaster says satellites allow forecasting "up to ten days ahead with reasonable accuracy."'
      explanationZh: '预报员说卫星使"提前十天进行合理准确的预报"成为可能。'

  - id: L339
    type: short-extract
    title: 'The Elephant Sanctuary'
    titleZh: '大象保护区'
    scene: 'You will hear a volunteer describing her experience at an elephant sanctuary.'
    sceneZh: '你将听到一位志愿者描述她在大象保护区的经历。'
    difficulty: 2
    audioFile: 'L339.mp3'
    script:
      - speaker: volunteer
        voice: shimmer
        text: 'I spent three weeks volunteering at an elephant sanctuary in Thailand. The sanctuary rescues elephants that were used for logging or tourist rides. When they first arrive, many of them are scared of humans and have injuries on their legs and back.'
      - speaker: volunteer
        voice: shimmer
        text: 'The most amazing moment was when an elderly elephant named Mae Bua allowed me to touch her trunk for the first time. She had been at the sanctuary for six months and had never let anyone touch her. The caretaker said it meant she finally trusted me. I cried. It taught me that building trust takes patience, whether with animals or people.'
    question:
      text: 'Why was the volunteer''s experience with Mae Bua so meaningful?'
      textZh: '为什么志愿者与Mae Bua的经历如此有意义？'
      options:
        A: 'Mae Bua performed a trick she had learned at the sanctuary.'
        B: 'Mae Bua trusted the volunteer enough to allow her to touch her trunk.'
        C: 'Mae Bua escaped from the sanctuary and the volunteer found her.'
      answer: 'B'
      explanation: 'The volunteer says Mae Bua "had never let anyone touch her" but finally trusted her — a moment of trust.'
      explanationZh: '志愿者说Mae Bua"从未让任何人碰她"但最终信任了她——一个信任的时刻。'

  - id: L340
    type: short-extract
    title: 'The Solar-Powered School'
    titleZh: '太阳能学校'
    scene: 'You will hear a headteacher talking about her school''s solar panels.'
    sceneZh: '你将听到一位校长谈论她学校的太阳能板。'
    difficulty: 2
    audioFile: 'L340.mp3'
    script:
      - speaker: headteacher
        voice: nova
        text: 'Two years ago, we installed solar panels on the roof of our school. It was a big investment, but it has completely transformed our energy costs. Before the panels, our electricity bill was over eight thousand pounds per year. Now, we actually produce more electricity than we use. The excess power is sold back to the energy company.'
      - speaker: headteacher
        voice: nova
        text: 'But the biggest benefit has not been financial. The students are now genuinely excited about renewable energy. Our science classes use real-time data from the panels to teach about solar power, weather patterns, and environmental responsibility. The children feel proud that their school is helping to fight climate change.'
    question:
      text: 'According to the headteacher, what is the biggest benefit of the solar panels?'
      textZh: '据校长说，太阳能板最大的好处是什么？'
      options:
        A: 'The school saves money on its electricity bill.'
        B: 'The students are more engaged and excited about renewable energy.'
        C: 'The school can sell excess electricity for profit.'
      answer: 'B'
      explanation: 'She says "the biggest benefit has not been financial" — it is that students are "genuinely excited about renewable energy."'
      explanationZh: '她说"最大的好处不是经济上的"——而是学生们"真正对可再生能源感到兴奋"。'

  - id: L341
    type: short-extract
    title: 'The Whale Watcher'
    titleZh: '观鲸者'
    scene: 'You will hear a whale watching guide describing what they saw today.'
    sceneZh: '你将听到一位观鲸向导描述今天看到的景象。'
    difficulty: 2
    audioFile: 'L341.mp3'
    script:
      - speaker: guide
        voice: echo
        text: 'Today was one of the best whale-watching days I have experienced in fifteen years. We spotted a pod of humpback whales about three kilometres offshore. There were seven adults and two calves — the babies were probably born just a few weeks ago.'
      - speaker: guide
        voice: echo
        text: 'The highlight was when one of the adults breached — that means it jumped completely out of the water. A forty-tonne whale flying through the air is something you never forget. Scientists believe breaching might be a form of communication or a way to shake off parasites, but honestly, sometimes I think they just do it for fun.'
    question:
      text: 'What was the highlight of the whale-watching trip?'
      textZh: '观鲸之旅的亮点是什么？'
      options:
        A: 'They saw a whale feeding on a school of fish.'
        B: 'An adult humpback whale jumped completely out of the water.'
        C: 'A baby whale swam right next to their boat.'
      answer: 'B'
      explanation: 'The guide says the highlight was "when one of the adults breached — jumped completely out of the water."'
      explanationZh: '向导说亮点是"当一头成年鲸跃出水面——完全跳出水面"。'

  - id: L342
    type: short-extract
    title: 'The Recycling Robot'
    titleZh: '回收机器人'
    scene: 'You will hear a student presenting a science project.'
    sceneZh: '你将听到一位学生展示科学项目。'
    difficulty: 2
    audioFile: 'L342.mp3'
    script:
      - speaker: student
        voice: shimmer
        text: 'For my science fair project, I built a robot that can sort rubbish into recycling categories. I call it Sort-Bot. It uses a camera and a simple computer programme to identify whether an object is made of paper, plastic, glass, or metal. Then it drops the item into the correct bin.'
      - speaker: student
        voice: shimmer
        text: 'Sort-Bot is not perfect yet — it gets confused by things like pizza boxes that are partly paper and partly grease. But in testing, it correctly sorted eighty-seven percent of items, which is actually better than most humans. My next goal is to teach it to recognise more difficult objects like batteries and electronic waste.'
    question:
      text: 'What does Sort-Bot do?'
      textZh: 'Sort-Bot做什么？'
      options:
        A: 'It collects rubbish from the streets automatically.'
        B: 'It sorts rubbish into recycling categories using a camera.'
        C: 'It turns plastic waste into new objects.'
      answer: 'B'
      explanation: 'The student says Sort-Bot "uses a camera and a computer programme to identify" materials and "drops the item into the correct bin."'
      explanationZh: '学生说Sort-Bot"使用摄像头和电脑程序来识别"材料并"将物品放入正确的垃圾桶"。'

  - id: L343
    type: short-extract
    title: 'The Migration Mystery'
    titleZh: '迁徙之谜'
    scene: 'You will hear a bird expert talking about Arctic terns.'
    sceneZh: '你将听到一位鸟类专家谈论北极燕鸥。'
    difficulty: 2
    audioFile: 'L343.mp3'
    script:
      - speaker: expert
        voice: echo
        text: 'The Arctic tern makes the longest migration of any animal on Earth. Every year, it flies from the Arctic to the Antarctic and back — a round trip of about seventy thousand kilometres. That is roughly the same as flying to the moon and halfway back.'
      - speaker: expert
        voice: echo
        text: 'What puzzles scientists is how this tiny bird, which weighs less than a mobile phone, navigates with such precision. They have no GPS, no maps. Research suggests they use a combination of the sun''s position, the Earth''s magnetic field, and even the smell of the ocean to find their way. It remains one of nature''s greatest unsolved mysteries.'
    question:
      text: 'What puzzles scientists about Arctic terns?'
      textZh: '关于北极燕鸥，什么让科学家困惑？'
      options:
        A: 'Why they choose to migrate such a long distance.'
        B: 'How such a small bird navigates with such precision.'
        C: 'What they eat during the long journey.'
      answer: 'B'
      explanation: 'The expert says "what puzzles scientists is how this tiny bird... navigates with such precision."'
      explanationZh: '专家说"让科学家困惑的是这只小鸟如何以如此精确的方式导航"。'

  - id: L344
    type: short-extract
    title: 'The Tree Planter'
    titleZh: '植树者'
    scene: 'You will hear a young activist explaining why she plants trees.'
    sceneZh: '你将听到一位年轻的活动家解释她为什么植树。'
    difficulty: 2
    audioFile: 'L344.mp3'
    script:
      - speaker: activist
        voice: shimmer
        text: 'I started planting trees when I was eight years old. My grandmother told me that one large tree absorbs about twenty-two kilograms of carbon dioxide per year and produces enough oxygen for two people. I thought: if I plant one tree every week, by the time I am eighteen, I will have planted over five hundred trees.'
      - speaker: activist
        voice: shimmer
        text: 'Now I am twelve, and I have already planted two hundred and thirty trees. My friends and neighbours have joined in, and together we have planted over a thousand. The best feeling is visiting the trees I planted three years ago. They are taller than me now! Each one is a tiny soldier in the fight against climate change.'
    question:
      text: 'What motivated the activist to start planting trees?'
      textZh: '是什么激励这位活动家开始植树？'
      options:
        A: 'She wanted to win a prize at a science fair.'
        B: 'Her grandmother told her about the environmental benefits of trees.'
        C: 'She saw a documentary about deforestation.'
      answer: 'B'
      explanation: 'She says "my grandmother told me that one large tree absorbs about twenty-two kilograms of carbon dioxide per year."'
      explanationZh: '她说"我祖母告诉我一棵大树每年吸收约22公斤二氧化碳"。'

  - id: L345
    type: short-extract
    title: 'The Glacier Scientist'
    titleZh: '冰川科学家'
    scene: 'You will hear a glaciologist talking about her research.'
    sceneZh: '你将听到一位冰川学家谈论她的研究。'
    difficulty: 3
    audioFile: 'L345.mp3'
    script:
      - speaker: scientist
        voice: shimmer
        text: 'I drill ice cores — long cylinders of ice taken from glaciers that can be up to three kilometres deep. Each layer of ice represents one year of snowfall, and trapped inside the ice are tiny bubbles of ancient air. By analysing these bubbles, we can measure exactly how much carbon dioxide was in the atmosphere thousands of years ago.'
      - speaker: scientist
        voice: shimmer
        text: 'The oldest ice core ever drilled contains air from eight hundred thousand years ago. What it tells us is frightening: carbon dioxide levels today are higher than at any point in the last eight hundred thousand years. The data is crystal clear — human activity has changed the atmosphere in a way that has no precedent in nearly a million years.'
    question:
      text: 'What do ice cores reveal about today''s atmosphere?'
      textZh: '冰芯揭示了关于今天大气层的什么信息？'
      options:
        A: 'Carbon dioxide levels are lower than they were in the past.'
        B: 'Carbon dioxide levels are the highest they have been in 800,000 years.'
        C: 'The atmosphere has not changed significantly over time.'
      answer: 'B'
      explanation: 'The scientist says "carbon dioxide levels today are higher than at any point in the last eight hundred thousand years."'
      explanationZh: '科学家说"今天的二氧化碳水平高于过去80万年中的任何时候"。'

  - id: L346
    type: short-extract
    title: 'The Wolf Pack'
    titleZh: '狼群'
    scene: 'You will hear a wildlife photographer talking about wolves in Yellowstone.'
    sceneZh: '你将听到一位野生动物摄影师谈论黄石公园的狼。'
    difficulty: 3
    audioFile: 'L346.mp3'
    script:
      - speaker: photographer
        voice: echo
        text: 'When wolves were brought back to Yellowstone in 1995, nobody predicted how dramatic the effects would be. Before the wolves arrived, deer had been eating everything — young trees, bushes, wildflowers. The park was becoming bare.'
      - speaker: photographer
        voice: echo
        text: 'The wolves changed the deer''s behaviour. The deer stopped grazing near rivers because they were afraid of being ambushed. As a result, trees grew back along the riverbanks. The roots strengthened the soil, the rivers changed course, and birds and beavers returned. Scientists call this a "trophic cascade" — when one species at the top of the food chain changes the entire ecosystem below it. The wolves literally changed the rivers.'
    question:
      text: 'How did wolves change Yellowstone according to the photographer?'
      textZh: '根据摄影师的说法，狼是如何改变黄石公园的？'
      options:
        A: 'They hunted all the deer, leaving the park empty.'
        B: 'They scared deer away from rivers, allowing trees to grow back, which changed the entire ecosystem.'
        C: 'They attracted millions of tourists to the park.'
      answer: 'B'
      explanation: 'The photographer describes the cascade: wolves scared deer → trees grew back → rivers changed → ecosystem recovered.'
      explanationZh: '摄影师描述了连锁反应：狼吓走了鹿 → 树木重新生长 → 河流改变 → 生态系统恢复。'

  - id: L347
    type: short-extract
    title: 'The Plastic-Free Challenge'
    titleZh: '无塑料挑战'
    scene: 'You will hear a teenager talking about living without plastic for a month.'
    sceneZh: '你将听到一位青少年谈论一个月不用塑料的生活。'
    difficulty: 2
    audioFile: 'L347.mp3'
    script:
      - speaker: teenager
        voice: shimmer
        text: 'I tried to live without plastic for thirty days. I thought it would be easy. It was not. Plastic is absolutely everywhere — in food packaging, shampoo bottles, even in our clothes. On day one, I went to the supermarket with reusable bags and glass containers. But almost everything was wrapped in plastic. I ended up buying only loose fruit, vegetables, and bread.'
      - speaker: teenager
        voice: shimmer
        text: 'The hardest part was not the shopping — it was realising how much plastic I normally use without thinking about it. In one normal week, my family threw away forty-seven pieces of plastic. After the challenge, we reduced that number to twelve. We could not reach zero, but every piece we avoided felt like a small victory for the planet.'
    question:
      text: 'What was the hardest part of the plastic-free challenge?'
      textZh: '无塑料挑战中最难的部分是什么？'
      options:
        A: 'Finding food that was not wrapped in plastic.'
        B: 'Realising how much plastic she normally uses without thinking.'
        C: 'Convincing her family to join the challenge.'
      answer: 'B'
      explanation: 'She says "the hardest part was not the shopping — it was realising how much plastic I normally use without thinking."'
      explanationZh: '她说"最难的部分不是购物——而是意识到我通常不假思索地使用了多少塑料"。'

  - id: L348
    type: short-extract
    title: 'The Earthquake Detector'
    titleZh: '地震探测器'
    scene: 'You will hear a geologist explaining how animals can predict earthquakes.'
    sceneZh: '你将听到一位地质学家解释动物如何预测地震。'
    difficulty: 3
    audioFile: 'L348.mp3'
    script:
      - speaker: geologist
        voice: echo
        text: 'For centuries, people have noticed that animals behave strangely before earthquakes. Dogs bark for no reason, birds suddenly leave an area, and fish jump out of ponds. In two thousand and nine, scientists studying a colony of toads in Italy observed something remarkable: five days before a major earthquake, every single toad abandoned the breeding pond and did not return until the earthquake was over.'
      - speaker: geologist
        voice: echo
        text: 'We believe animals can detect tiny changes in the Earth''s magnetic field or ground vibrations that humans cannot feel. This natural early warning system could potentially save thousands of lives if we learn to read the signals correctly.'
    question:
      text: 'Why did the toads leave the pond before the earthquake?'
      textZh: '为什么蟾蜍在地震前离开了池塘？'
      options:
        A: 'The water temperature had become too hot.'
        B: 'They may have detected tiny changes in the Earth''s magnetic field or ground vibrations.'
        C: 'A predator was hunting near the pond.'
      answer: 'B'
      explanation: 'The geologist says "animals can detect tiny changes in the Earth''s magnetic field or ground vibrations that humans cannot feel."'
      explanationZh: '地质学家说"动物能探测到人类感觉不到的地球磁场或地面振动的微小变化"。'

  - id: L349
    type: short-extract
    title: 'The Butterfly Garden'
    titleZh: '蝴蝶花园'
    scene: 'You will hear a gardener explaining how to attract butterflies.'
    sceneZh: '你将听到一位园丁解释如何吸引蝴蝶。'
    difficulty: 2
    audioFile: 'L349.mp3'
    script:
      - speaker: gardener
        voice: nova
        text: 'Creating a butterfly garden is one of the easiest ways to help wildlife. Butterflies are attracted to brightly coloured flowers, especially purple, pink, and yellow ones. But the real secret is to plant flowers that bloom at different times of the year, so there is always food available from spring to autumn.'
      - speaker: gardener
        voice: nova
        text: 'Another tip that most people forget is to provide a sunny, sheltered spot. Butterflies are cold-blooded, which means they need warmth from the sun to fly. A flat stone in a sunny spot acts as a "landing pad" where they can warm their wings before taking off.'
    question:
      text: 'What is the "real secret" to a successful butterfly garden?'
      textZh: '成功的蝴蝶花园的"真正秘诀"是什么？'
      options:
        A: 'Planting flowers that bloom at different times so food is always available.'
        B: 'Using pesticides to keep harmful insects away.'
        C: 'Building a glass greenhouse to keep butterflies warm.'
      answer: 'A'
      explanation: 'The gardener says "the real secret is to plant flowers that bloom at different times of the year."'
      explanationZh: '园丁说"真正的秘诀是种植在不同时间开花的花"。'

  - id: L350
    type: short-extract
    title: 'The Space Telescope'
    titleZh: '太空望远镜'
    scene: 'You will hear an astronomer talking about the James Webb Space Telescope.'
    sceneZh: '你将听到一位天文学家谈论詹姆斯韦伯太空望远镜。'
    difficulty: 3
    audioFile: 'L350.mp3'
    script:
      - speaker: astronomer
        voice: echo
        text: 'The James Webb Space Telescope is the most powerful telescope ever built. It was launched on Christmas Day in two thousand and twenty-one after twenty-five years of development. Unlike the Hubble telescope which orbits Earth, Webb orbits the sun at a point one and a half million kilometres from our planet.'
      - speaker: astronomer
        voice: echo
        text: 'The images it has sent back are breathtaking. We can now see galaxies that formed just a few hundred million years after the Big Bang. We can analyse the atmospheres of planets orbiting other stars and search for signs of water and oxygen. For the first time in history, we have a real chance of discovering whether we are alone in the universe.'
    question:
      text: 'What makes the James Webb Space Telescope so special?'
      textZh: '什么让詹姆斯韦伯太空望远镜如此特别？'
      options:
        A: 'It was the cheapest telescope ever built.'
        B: 'It can see ancient galaxies and analyse atmospheres of distant planets.'
        C: 'It orbits the Moon instead of the Earth.'
      answer: 'B'
      explanation: 'The astronomer describes seeing ancient galaxies and analysing exoplanet atmospheres — unprecedented capabilities.'
      explanationZh: '天文学家描述了看到古老的星系和分析系外行星大气层——前所未有的能力。'

  # L351-L360: Remaining short extracts (abbreviated)
  - id: L351
    type: short-extract
    title: 'The Seed Bank'
    titleZh: '种子库'
    scene: 'You will hear a scientist talking about the Svalbard Global Seed Vault.'
    sceneZh: '你将听到一位科学家谈论斯瓦尔巴全球种子库。'
    difficulty: 3
    audioFile: 'L351.mp3'
    script:
      - speaker: scientist
        voice: nova
        text: 'Deep inside a mountain on a remote Arctic island, there is a vault containing over one million seed samples from every country in the world. The Svalbard Global Seed Vault was built in two thousand and eight as a backup for the world''s food supply. If a natural disaster or war destroys crop seeds in any country, they can request replacement seeds from the vault.'
      - speaker: scientist
        voice: nova
        text: 'The vault is built into solid rock and is naturally cooled to minus eighteen degrees by the permafrost. Even if all the refrigeration systems fail, the seeds will remain frozen for at least two hundred years. Some people call it the "Doomsday Vault" — but I prefer to think of it as the world''s most important insurance policy.'
    question:
      text: 'What is the main purpose of the Svalbard Seed Vault?'
      textZh: '斯瓦尔巴种子库的主要目的是什么？'
      options:
        A: 'To grow food for Arctic communities.'
        B: 'To keep backup seeds safe in case of global disaster.'
        C: 'To study how seeds survive in frozen conditions.'
      answer: 'B'
      explanation: 'The scientist says it was "built as a backup for the world''s food supply" — an insurance policy for seeds.'
      explanationZh: '科学家说它"作为世界粮食供应的备份而建造"——种子的保险单。'

  - id: L352
    type: short-extract
    title: 'The Electric Eel'
    titleZh: '电鳗'
    scene: 'You will hear a biologist explaining how electric eels work.'
    sceneZh: '你将听到一位生物学家解释电鳗如何工作。'
    difficulty: 2
    audioFile: 'L352.mp3'
    script:
      - speaker: biologist
        voice: echo
        text: 'Electric eels are not actually eels — they are more closely related to catfish. But their ability to generate electricity is genuinely remarkable. An adult electric eel can produce a shock of up to eight hundred and sixty volts. That is enough to stun a horse or light up a Christmas tree.'
      - speaker: biologist
        voice: echo
        text: 'They use this ability for three purposes: hunting, self-defence, and navigation. In the murky Amazon waters where they live, visibility is almost zero. So the eel sends out weak electrical pulses — like a radar — that bounce off objects and help it build a picture of its surroundings. It is basically the same idea as a submarine''s sonar, but invented by nature millions of years earlier.'
    question:
      text: 'How do electric eels navigate in murky water?'
      textZh: '电鳗在浑浊的水中如何导航？'
      options:
        A: 'They follow the sound of flowing water.'
        B: 'They send out weak electrical pulses that bounce off objects, like sonar.'
        C: 'They use their excellent eyesight to see in the dark.'
      answer: 'B'
      explanation: 'The biologist says the eel "sends out weak electrical pulses — like a radar — that bounce off objects."'
      explanationZh: '生物学家说电鳗"发出微弱的电脉冲——像雷达——在物体上反弹"。'

  - id: L353
    type: short-extract
    title: 'The Volcanic Island'
    titleZh: '火山岛'
    scene: 'You will hear a geologist talking about the birth of a new island.'
    sceneZh: '你将听到一位地质学家谈论一个新岛的诞生。'
    difficulty: 3
    audioFile: 'L353.mp3'
    script:
      - speaker: geologist
        voice: nova
        text: 'In nineteen sixty-three, something extraordinary happened off the coast of Iceland. Fishermen noticed the sea bubbling and steaming. Within a few days, an underwater volcano had pushed a brand new island above the surface of the ocean. They named it Surtsey.'
      - speaker: geologist
        voice: nova
        text: 'What makes Surtsey so valuable to science is that no human has ever been allowed to live there. It is a perfectly controlled natural experiment. Scientists can observe exactly how life colonises a new piece of land. First came bacteria, then moss, then insects carried by the wind, then seabirds, and finally plants whose seeds were brought in bird droppings. In sixty years, Surtsey has gone from bare rock to a living ecosystem.'
    question:
      text: 'Why is Surtsey valuable to scientists?'
      textZh: '为什么Surtsey对科学家很有价值？'
      options:
        A: 'Because it contains rare minerals not found anywhere else.'
        B: 'Because no humans have interfered, so scientists can study how life colonises new land.'
        C: 'Because its volcano is still active and produces energy.'
      answer: 'B'
      explanation: 'The geologist says no human has lived there, making it "a perfectly controlled natural experiment" for studying colonisation.'
      explanationZh: '地质学家说没有人住在那里，使其成为研究殖民化的"完美受控自然实验"。'

  - id: L354
    type: short-extract
    title: 'The Ocean Cleanup'
    titleZh: '海洋清理'
    scene: 'You will hear a young inventor talking about cleaning plastic from the ocean.'
    sceneZh: '你将听到一位年轻发明家谈论从海洋中清理塑料。'
    difficulty: 2
    audioFile: 'L354.mp3'
    script:
      - speaker: inventor
        voice: echo
        text: 'When I was sixteen, I went diving in Greece and saw more plastic bags than fish. That experience changed my life. I decided I would find a way to clean plastic from the ocean. Everyone told me it was impossible — the ocean is too big, the plastic is too spread out.'
      - speaker: inventor
        voice: echo
        text: 'But I realised you don''t need to chase the plastic. Ocean currents naturally concentrate floating plastic into certain areas called gyres. If you place a barrier in the right spot, the current will bring the plastic to you. My system now removes thousands of kilograms of plastic every day from the Great Pacific Garbage Patch.'
    question:
      text: 'What is the key idea behind the inventor''s ocean cleanup system?'
      textZh: '发明家的海洋清理系统的关键理念是什么？'
      options:
        A: 'Using boats to chase plastic across the entire ocean.'
        B: 'Letting ocean currents bring plastic to barriers placed in the right spot.'
        C: 'Training dolphins to collect plastic bags and bring them to shore.'
      answer: 'B'
      explanation: 'He says "if you place a barrier in the right spot, the current will bring the plastic to you" — using currents, not chasing.'
      explanationZh: '他说"如果你把屏障放在正确的位置，水流会把塑料带到你面前"——利用水流，而不是追逐。'

  - id: L355
    type: short-extract
    title: 'The Mushroom Network'
    titleZh: '蘑菇网络'
    scene: 'You will hear a forest ecologist explaining how trees communicate.'
    sceneZh: '你将听到一位森林生态学家解释树木如何交流。'
    difficulty: 3
    audioFile: 'L355.mp3'
    script:
      - speaker: ecologist
        voice: shimmer
        text: 'Beneath every forest, there is a hidden network of fungal threads connecting the roots of different trees. We call it the "wood wide web." Through this network, trees can share sugar, water, and even warning signals. When one tree is attacked by insects, it sends chemical signals through the fungal network to warn its neighbours.'
      - speaker: ecologist
        voice: shimmer
        text: 'The most surprising discovery is that old "mother trees" actively feed young seedlings that are struggling in the shade. A mother tree can recognise her own offspring and send them extra nutrients through the fungal network. When she is dying, she even transfers her stored carbon to nearby trees. Forests are not just collections of trees — they are communities.'
    question:
      text: 'What do "mother trees" do according to the ecologist?'
      textZh: '根据生态学家的说法，"母树"做什么？'
      options:
        A: 'They produce the most seeds in the forest.'
        B: 'They feed young seedlings and transfer nutrients when dying.'
        C: 'They are the tallest trees that block sunlight from others.'
      answer: 'B'
      explanation: 'The ecologist describes mother trees feeding seedlings and transferring carbon when dying.'
      explanationZh: '生态学家描述了母树喂养幼苗，以及在临终时转移碳。'

  - id: L356
    type: short-extract
    title: 'The Mars Rover'
    titleZh: '火星探测车'
    scene: 'You will hear a NASA engineer talking about the Perseverance rover.'
    sceneZh: '你将听到一位NASA工程师谈论毅力号探测车。'
    difficulty: 3
    audioFile: 'L356.mp3'
    script:
      - speaker: engineer
        voice: echo
        text: 'The Perseverance rover landed on Mars in February two thousand and twenty-one. It weighs about a thousand kilograms and is the size of a small car. Its main mission is to search for signs of ancient microbial life in a crater that scientists believe was once filled with water.'
      - speaker: engineer
        voice: echo
        text: 'What makes Perseverance special is that it carries a small helicopter called Ingenuity — the first aircraft ever to fly on another planet. Nobody knew if it would work because the Martian atmosphere is only one percent as thick as Earth''s. But Ingenuity succeeded, completing over fifty flights. It proved that powered flight is possible on Mars, opening the door to future aerial exploration.'
    question:
      text: 'Why was Ingenuity''s first flight so significant?'
      textZh: '为什么Ingenuity的首次飞行如此重要？'
      options:
        A: 'It was the fastest aircraft ever built by humans.'
        B: 'It proved that powered flight is possible on another planet.'
        C: 'It discovered water on the surface of Mars.'
      answer: 'B'
      explanation: 'The engineer says Ingenuity "proved that powered flight is possible on Mars, opening the door to future aerial exploration."'
      explanationZh: '工程师说Ingenuity"证明了在火星上动力飞行是可能的，为未来的空中探索打开了大门"。'

  - id: L357
    type: short-extract
    title: 'The Water Filter'
    titleZh: '净水器'
    scene: 'You will hear a scientist explaining a natural water filter.'
    sceneZh: '你将听到一位科学家解释一种天然净水器。'
    difficulty: 2
    audioFile: 'L357.mp3'
    script:
      - speaker: scientist
        voice: nova
        text: 'Mangrove forests are nature''s most effective water filters. Their root systems trap sediment, absorb pollutants, and filter out harmful bacteria. Scientists have measured that water passing through a mangrove forest comes out seventy to ninety percent cleaner than when it went in.'
      - speaker: scientist
        voice: nova
        text: 'Furthermore, mangrove roots slow down wave energy during storms, protecting coastal communities from flooding. One study found that a one-hundred-metre-wide mangrove forest can reduce wave height by sixty-six percent. That is why we call mangroves "coastal guardians" — they protect both the water quality and the people who live nearby.'
    question:
      text: 'Why are mangrove forests called "coastal guardians"?'
      textZh: '为什么红树林被称为"海岸卫士"？'
      options:
        A: 'They produce food for coastal communities.'
        B: 'They filter water and protect coastlines from storm waves.'
        C: 'They are home to rare species found nowhere else.'
      answer: 'B'
      explanation: 'The scientist describes two protective functions: filtering water (70-90% cleaner) and reducing wave height (66%).'
      explanationZh: '科学家描述了两个保护功能：过滤水（干净70-90%）和减少浪高（66%）。'

  - id: L358
    type: short-extract
    title: 'The Night Sky'
    titleZh: '夜空'
    scene: 'You will hear an astronomer talking about light pollution.'
    sceneZh: '你将听到一位天文学家谈论光污染。'
    difficulty: 2
    audioFile: 'L358.mp3'
    script:
      - speaker: astronomer
        voice: shimmer
        text: 'Two hundred years ago, every human on Earth could look up and see the Milky Way stretching across the night sky. Today, eighty percent of the world''s population lives under light-polluted skies. In most cities, you can only see about twenty stars instead of the two thousand five hundred visible to the naked eye.'
      - speaker: astronomer
        voice: shimmer
        text: 'Light pollution is not just an astronomy problem. It disrupts the navigation of migrating birds, confuses baby sea turtles trying to find the ocean, and even affects human sleep patterns. The good news is that it is one of the easiest environmental problems to fix — just turn off unnecessary lights.'
    question:
      text: 'What problem does light pollution cause for wildlife?'
      textZh: '光污染给野生动物造成什么问题？'
      options:
        A: 'It makes ocean water warmer at night.'
        B: 'It disrupts bird migration and confuses baby sea turtles.'
        C: 'It causes trees to grow faster than normal.'
      answer: 'B'
      explanation: 'The astronomer mentions disrupting "migrating birds" and confusing "baby sea turtles trying to find the ocean."'
      explanationZh: '天文学家提到扰乱"迁徙鸟类"和使"试图找到海洋的小海龟"感到困惑。'

  - id: L359
    type: short-extract
    title: 'The Wind Farm'
    titleZh: '风电场'
    scene: 'You will hear an engineer talking about offshore wind farms.'
    sceneZh: '你将听到一位工程师谈论海上风电场。'
    difficulty: 2
    audioFile: 'L359.mp3'
    script:
      - speaker: engineer
        voice: echo
        text: 'Offshore wind farms are built in the sea, usually between ten and thirty kilometres from the coast. The wind at sea is stronger and more consistent than on land, which means the turbines generate more electricity. A single offshore wind turbine can now power over five thousand homes.'
      - speaker: engineer
        voice: echo
        text: 'One unexpected benefit of offshore wind farms is that the underwater foundations create artificial reefs. Fish, crabs, lobsters, and mussels quickly colonise the structures. Several studies have shown that fish populations around wind farms are actually higher than in surrounding waters. So while producing clean energy, we are also accidentally creating new habitats for marine life.'
    question:
      text: 'What unexpected benefit do offshore wind farms provide?'
      textZh: '海上风电场提供了什么意想不到的好处？'
      options:
        A: 'They create calmer waters that are safe for swimming.'
        B: 'Their underwater foundations become artificial reefs that attract marine life.'
        C: 'They prevent dangerous storms from reaching the coast.'
      answer: 'B'
      explanation: 'The engineer says the foundations "create artificial reefs" and "fish populations around wind farms are actually higher."'
      explanationZh: '工程师说基础"创造了人工珊瑚礁"并且"风电场周围的鱼类数量实际上更高"。'

  - id: L360
    type: short-extract
    title: 'The Citizen Scientist'
    titleZh: '公民科学家'
    scene: 'You will hear a teacher encouraging students to participate in citizen science.'
    sceneZh: '你将听到一位老师鼓励学生参与公民科学。'
    difficulty: 2
    audioFile: 'L360.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'You do not need a laboratory or a university degree to be a scientist. Citizen science projects allow ordinary people — including children — to help real scientists collect important data. For example, every year thousands of people across the country count the birds in their garden for the Big Garden Birdwatch. This data helps scientists track whether bird populations are increasing or decreasing.'
      - speaker: teacher
        voice: nova
        text: 'There are citizen science apps for everything: recording frog calls, photographing wildflowers, even tracking cloud formations. Your smartphone becomes a scientific instrument. The data you collect goes directly to research teams at universities. So the next time you see an interesting insect or hear an unusual bird, remember — you could be making a genuine contribution to science.'
    question:
      text: 'What is citizen science?'
      textZh: '什么是公民科学？'
      options:
        A: 'A type of science taught only at universities.'
        B: 'When ordinary people help real scientists collect important data.'
        C: 'A competition where citizens vote for the best science project.'
      answer: 'B'
      explanation: 'The teacher defines it: "citizen science projects allow ordinary people to help real scientists collect important data."'
      explanationZh: '老师定义了它："公民科学项目让普通人帮助真正的科学家收集重要数据"。'

  # ============================================================
  # L361–L375: Part 2 — Sentence Completion (Nature/Science)
  # ============================================================

  - id: L361
    type: sentence-completion
    title: 'Ocean Explorers'
    titleZh: '海洋探险者'
    scene: 'You will hear a marine biologist giving a talk about ocean exploration.'
    sceneZh: '你将听到一位海洋生物学家发表关于海洋探索的演讲。'
    difficulty: 2
    audioFile: 'L361.mp3'
    script:
      - speaker: biologist
        voice: nova
        text: 'Good morning, everyone. Thank you for joining this lecture on ocean exploration. Today I want to share some surprising facts about how little we know about our own planet''s oceans.'
      - speaker: biologist
        voice: nova
        text: 'First, let me give you a number that always shocks people. We have explored more of the surface of Mars than we have of our own ocean floor. Only about five percent of the world''s oceans have been mapped in detail. That means ninety-five percent remains largely unknown.'
      - speaker: biologist
        voice: nova
        text: 'The reason is simple: the deep ocean is incredibly hostile. At the bottom of the Mariana Trench, the deepest point on Earth, the pressure is over one thousand times greater than at the surface. It is also completely dark below one thousand metres, and temperatures hover just above freezing.'
      - speaker: biologist
        voice: nova
        text: 'Despite these challenges, the deep ocean is teeming with life. Scientists estimate there could be between one and ten million undiscovered species down there. Every time we send a submersible to the deep ocean, we find creatures that science has never seen before.'
      - speaker: biologist
        voice: nova
        text: 'The newest deep-sea vehicle is called the Limiting Factor. It can dive to any depth in any ocean, reaching the bottom of the Mariana Trench in approximately four hours. Since its first dive in twenty nineteen, it has made over two hundred dives and discovered thirty-seven new species.'
      - speaker: biologist
        voice: nova
        text: 'My hope is that within the next twenty years, we will have mapped the entire ocean floor. This would help us understand climate change, discover new medicines from marine organisms, and protect endangered ecosystems that we do not even know exist yet.'
    sentences:
      - id: L361-S1
        text: 'Only about _____ percent of the world''s oceans have been mapped in detail.'
        textZh: '世界海洋中只有约 _____ 被详细绘制了地图。'
        answer: 'five'
      - id: L361-S2
        text: 'The pressure at the bottom of the Mariana Trench is over _____ times greater than at the surface.'
        textZh: '马里亚纳海沟底部的压力是水面的 _____ 倍以上。'
        answer: 'one thousand'
      - id: L361-S3
        text: 'Below one thousand metres, the ocean is completely _____.'
        textZh: '一千米以下，海洋完全 _____。'
        answer: 'dark'
      - id: L361-S4
        text: 'The newest deep-sea vehicle is called the _____.'
        textZh: '最新的深海潜水器叫做 _____。'
        answer: 'Limiting Factor'
      - id: L361-S5
        text: 'The vehicle can reach the bottom of the Mariana Trench in approximately _____ hours.'
        textZh: '该潜水器大约 _____ 小时能到达马里亚纳海沟底部。'
        answer: 'four'
      - id: L361-S6
        text: 'Since its first dive, it has discovered _____ new species.'
        textZh: '自首次下潜以来，它已发现了 _____ 个新物种。'
        answer: 'thirty-seven'

  - id: L362
    type: sentence-completion
    title: 'The Amazon Rainforest'
    titleZh: '亚马逊雨林'
    scene: 'You will hear a documentary narrator describing the Amazon rainforest.'
    sceneZh: '你将听到一位纪录片解说员描述亚马逊雨林。'
    difficulty: 2
    audioFile: 'L362.mp3'
    script:
      - speaker: narrator
        voice: echo
        text: 'The Amazon rainforest stretches across nine countries in South America and covers approximately five and a half million square kilometres. That is roughly the size of the entire European Union. It is often called "the lungs of the Earth" because it produces about six percent of the world''s oxygen.'
      - speaker: narrator
        voice: echo
        text: 'The Amazon is home to ten percent of all known species on Earth. This includes forty thousand plant species, over three hundred types of mammals, and more than one thousand three hundred bird species. New species are discovered there at a rate of roughly one every two days.'
      - speaker: narrator
        voice: echo
        text: 'The Amazon River itself is the largest river in the world by volume of water. It discharges more water into the Atlantic Ocean than the next seven largest rivers combined. During the rainy season, some parts of the river can be forty kilometres wide.'
      - speaker: narrator
        voice: echo
