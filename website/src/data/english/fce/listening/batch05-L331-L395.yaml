        text: 'The best lesson was when we launched model rockets in the school field. We learned about Newton''s third law — for every action there is an equal and opposite reaction. When the rocket fuel burns downward, the rocket goes upward. Mine flew about thirty metres high. Some went sideways, which was equally entertaining.'
      - name: Speaker 4
