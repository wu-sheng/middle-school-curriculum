  - id: L372
    type: sentence-completion
    title: 'Whale Migration'
    titleZh: '鲸鱼迁徙'
    scene: 'You will hear a marine researcher discussing humpback whale migration.'
    sceneZh: '你将听到一位海洋研究员讨论座头鲸的迁徙。'
    difficulty: 2
    audioFile: 'L372.mp3'
    script:
      - speaker: researcher
        voice: echo
        text: 'Humpback whales make one of the longest migrations of any mammal on Earth. Every year, they travel up to eight thousand kilometres from their cold feeding grounds near the poles to warm tropical waters where they give birth. The entire round trip can cover sixteen thousand kilometres.'
      - speaker: researcher
        voice: echo
        text: 'During the migration, humpback whales barely eat. They survive on the fat reserves they built up during summer. A humpback can lose up to a third of its body weight during the journey — that is about ten tonnes for a large adult.'
      - speaker: researcher
        voice: echo
        text: 'Male humpbacks are famous for their songs — complex sequences of sounds that can last up to thirty minutes. These songs can travel over a hundred kilometres through the water. Scientists believe they are used to attract females, but the exact meaning of each song remains a mystery.'
    sentences:
      - id: L372-S1
        text: 'Humpback whales travel up to _____ kilometres each way.'
        textZh: '座头鲸单程最远旅行 _____ 公里。'
        answer: 'eight thousand'
      - id: L372-S2
        text: 'They travel to warm tropical waters to give _____.'
        textZh: '它们前往温暖的热带水域来 _____。'
        answer: 'birth'
      - id: L372-S3
        text: 'A humpback can lose up to a _____ of its body weight during migration.'
        textZh: '座头鲸在迁徙中可以减少体重的 _____。'
        answer: 'third'
      - id: L372-S4
        text: 'Male humpback songs can last up to _____ minutes.'
        textZh: '雄性座头鲸的歌声可以持续 _____ 分钟。'
        answer: 'thirty'
      - id: L372-S5
        text: 'The songs can travel over a _____ kilometres through the water.'
        textZh: '歌声可以在水中传播超过 _____ 公里。'
        answer: 'hundred'
      - id: L372-S6
        text: 'Scientists believe the songs are used to attract _____.'
        textZh: '科学家认为歌声是用来吸引 _____。'
        answer: 'females'

  - id: L373
    type: sentence-completion
    title: 'The Rainforest Layers'
    titleZh: '雨林层次'
    scene: 'You will hear a nature documentary narrator describing the layers of a rainforest.'
    sceneZh: '你将听到一位自然纪录片解说员描述雨林的层次。'
    difficulty: 2
    audioFile: 'L373.mp3'
    script:
      - speaker: narrator
        voice: nova
        text: 'A tropical rainforest is divided into four distinct layers. The highest layer, called the emergent layer, reaches heights of up to sixty metres. Only the tallest trees poke above the main canopy to catch direct sunlight. Eagles, butterflies, and bats live at this level.'
      - speaker: narrator
        voice: nova
        text: 'Below the emergent layer is the canopy — a thick roof of leaves at about thirty metres high. This layer blocks approximately ninety-eight percent of sunlight from reaching the ground. Monkeys, tree frogs, and parrots spend their entire lives up here, rarely touching the forest floor.'
      - speaker: narrator
        voice: nova
        text: 'The understory sits below the canopy, from about five to thirty metres. It is dark and humid here, and plants have developed enormous leaves to capture whatever light filters through from above. Jaguars, snakes, and lizards are common in this layer.'
      - speaker: narrator
        voice: nova
        text: 'Finally, the forest floor receives less than two percent of sunlight. Decomposition happens rapidly in the warm, damp conditions. A leaf that falls from the canopy will be completely broken down within six weeks, its nutrients recycled into the soil to feed new growth.'
    sentences:
      - id: L373-S1
        text: 'The emergent layer reaches heights of up to _____ metres.'
        textZh: '突出层高度可达 _____ 米。'
        answer: 'sixty'
      - id: L373-S2
        text: 'The canopy is approximately _____ metres high.'
        textZh: '树冠层大约 _____ 米高。'
        answer: 'thirty'
      - id: L373-S3
        text: 'The canopy blocks approximately _____ percent of sunlight.'
        textZh: '树冠层阻挡了约 _____ 的阳光。'
        answer: 'ninety-eight'
      - id: L373-S4
        text: 'The understory sits from about _____ to thirty metres.'
        textZh: '林下层位于约 _____ 到三十米之间。'
        answer: 'five'
      - id: L373-S5
        text: 'The forest floor receives less than _____ percent of sunlight.'
        textZh: '森林地面接收到不到 _____ 的阳光。'
        answer: 'two'
      - id: L373-S6
        text: 'A fallen leaf is completely broken down within _____ weeks.'
        textZh: '一片落叶在 _____ 周内被完全分解。'
        answer: 'six'

  - id: L374
    type: sentence-completion
    title: 'The Snow Leopard'
    titleZh: '雪豹'
    scene: 'You will hear a wildlife conservationist talking about snow leopards.'
    sceneZh: '你将听到一位野生动物保护主义者谈论雪豹。'
    difficulty: 3
    audioFile: 'L374.mp3'
    script:
      - speaker: conservationist
        voice: shimmer
        text: 'The snow leopard is one of the most elusive big cats on Earth. Fewer than seven thousand remain in the wild, scattered across the mountains of twelve Central Asian countries. They live at altitudes between three thousand and five thousand five hundred metres, making them extremely difficult to study.'
      - speaker: conservationist
        voice: shimmer
        text: 'Camera traps have been our most valuable research tool. We place them along mountain ridges and narrow passes where leopards are likely to travel. In our latest survey, we placed two hundred cameras across three hundred square kilometres and captured images of twenty-three individual snow leopards over six months.'
      - speaker: conservationist
        voice: shimmer
        text: 'The biggest threat to snow leopards is human-wildlife conflict. When a snow leopard kills a farmer''s goat, the farmer loses income. In response, some farmers kill the leopard. Our insurance programme compensates farmers for lost livestock — since we started, retaliatory killings have dropped by over eighty percent in our project area.'
    sentences:
      - id: L374-S1
        text: 'Fewer than _____ snow leopards remain in the wild.'
        textZh: '野外仅剩不到 _____ 只雪豹。'
        answer: 'seven thousand'
      - id: L374-S2
        text: 'Snow leopards live in the mountains of _____ Central Asian countries.'
        textZh: '雪豹生活在 _____ 个中亚国家的山脉中。'
        answer: 'twelve'
      - id: L374-S3
        text: 'They live at altitudes between 3,000 and _____ metres.'
        textZh: '它们生活在3,000到 _____ 米的海拔高度。'
        answer: 'five thousand five hundred'
      - id: L374-S4
        text: 'The survey used _____ cameras across 300 square kilometres.'
        textZh: '调查在300平方公里范围内使用了 _____ 台相机。'
        answer: 'two hundred'
      - id: L374-S5
        text: 'Images of _____ individual snow leopards were captured.'
        textZh: '拍摄到了 _____ 只个体雪豹的图像。'
        answer: 'twenty-three'
      - id: L374-S6
        text: 'Retaliatory killings have dropped by over _____ percent.'
        textZh: '报复性杀戮下降了 _____ 以上。'
        answer: 'eighty'

  - id: L375
    type: sentence-completion
    title: 'Phytoplankton'
    titleZh: '浮游植物'
    scene: 'You will hear an oceanographer explaining the importance of phytoplankton.'
    sceneZh: '你将听到一位海洋学家解释浮游植物的重要性。'
    difficulty: 3
    audioFile: 'L375.mp3'
    script:
      - speaker: oceanographer
        voice: echo
        text: 'Phytoplankton are microscopic plant-like organisms that float near the ocean surface. Despite being invisible to the naked eye, they produce over fifty percent of the world''s oxygen — more than all the world''s forests combined. They also absorb roughly ten gigatonnes of carbon dioxide from the atmosphere each year.'
      - speaker: oceanographer
        voice: echo
        text: 'However, phytoplankton populations have declined by approximately forty percent since nineteen fifty. Warming ocean temperatures make the surface layer more stable, preventing nutrient-rich deep water from mixing upward. Without these nutrients, phytoplankton cannot grow.'
      - speaker: oceanographer
        voice: echo
        text: 'We monitor phytoplankton from space using satellites that detect the green colour of chlorophyll in the water. Our satellite network can scan the entire ocean surface every forty-eight hours, giving us real-time data on plankton health across the globe.'
    sentences:
      - id: L375-S1
        text: 'Phytoplankton produce over _____ percent of the world''s oxygen.'
        textZh: '浮游植物产生了世界上 _____ 以上的氧气。'
        answer: 'fifty'
      - id: L375-S2
        text: 'They absorb roughly _____ gigatonnes of CO2 per year.'
        textZh: '它们每年吸收约 _____ 吉吨二氧化碳。'
        answer: 'ten'
      - id: L375-S3
        text: 'Populations have declined by approximately _____ percent since 1950.'
        textZh: '自1950年以来种群数量下降了约 _____ 。'
        answer: 'forty'
      - id: L375-S4
        text: 'Satellites detect the green colour of _____ in the water.'
        textZh: '卫星探测水中 _____ 的绿色。'
        answer: 'chlorophyll'
      - id: L375-S5
        text: 'The satellite network scans the entire ocean every _____ hours.'
        textZh: '卫星网络每 _____ 小时扫描一次整个海洋。'
        answer: 'forty-eight'
      - id: L375-S6
        text: 'Warming temperatures prevent _____ deep water from mixing upward.'
        textZh: '温度升高阻止了富含 _____ 的深层水向上混合。'
        answer: 'nutrient-rich'

