    difficulty: 2
    audioFile: 'L381.mp3'
    speakers:
      - name: Speaker 1
        text: 'We grew crystals from sugar water. You dissolve lots of sugar in hot water, hang a string in the jar, and wait. Over two weeks, beautiful crystals form on the string. Mine turned out bright purple because I added food colouring. Patience is the key — the longer you wait, the bigger the crystals get.'
      - name: Speaker 2
        text: 'I made a working volcano using vinegar and baking soda. When you mix them inside a model mountain made of clay, it creates a fizzy eruption that looks like real lava. I painted the lava orange and red for realism. The whole class cheered when it erupted during our science fair presentation.'
      - name: Speaker 3
        text: 'My experiment was testing which conditions make bread go mouldy fastest. I put slices in different places — fridge, windowsill, dark cupboard, and inside a plastic bag. The bag one went mouldy in just three days because it was warm and damp inside. The fridge one lasted over two weeks.'
      - name: Speaker 4
        text: 'We built a simple water filter using sand, gravel, charcoal, and cotton in a plastic bottle. We poured dirty pond water through it and the water that came out was surprisingly clear. It was amazing to see how natural materials can clean water. Our teacher said this is basically how water treatment plants work.'
      - name: Speaker 5
        text: 'I tested whether plants grow better with music. I set up three identical plants: one with classical music, one with rock music, and one with silence. After four weeks, the classical music plant was tallest, the silent one was second, and the rock music plant was shortest. My hypothesis was correct!'
