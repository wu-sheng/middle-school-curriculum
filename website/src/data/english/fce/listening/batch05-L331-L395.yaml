        text: 'Microplastics are fragments less than _____ millimetres across.'
        textZh: '微塑料是直径小于 _____ 毫米的碎片。'
        answer: 'five'
      - id: L371-S3
        text: 'The average person ingests about _____ grams of microplastic per week.'
        textZh: '普通人每周摄入约 _____ 克微塑料。'
        answer: 'five'
      - id: L371-S4
        text: 'The largest accumulations are called _____.'
        textZh: '最大的积聚物被称为 _____。'
        answer: 'gyres'
      - id: L371-S5
        text: 'The Great Pacific Garbage Patch is roughly _____ times the size of France.'
        textZh: '大太平洋垃圾带大约是法国面积的 _____ 倍。'
        answer: 'three'
      - id: L371-S6
        text: 'The real solution is to stop plastic _____ the ocean in the first place.'
