  # L371-L375: Additional sentence completions
  - id: L371
    type: sentence-completion
    title: 'Plastic in the Ocean'
    titleZh: '海洋中的塑料'
    scene: 'You will hear an environmental scientist discussing ocean plastic pollution.'
