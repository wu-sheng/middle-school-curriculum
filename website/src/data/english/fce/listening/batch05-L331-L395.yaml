        text: 'I dream of seeing a blue whale in the wild. It is the largest animal that has ever lived — even bigger than the biggest dinosaurs. Its tongue alone weighs as much as an elephant. Imagine seeing a creature thirty metres long surface right next to your boat. That would be the most incredible moment of my life.'
      - name: Speaker 2
        text: 'I want to see a giant Pacific octopus. They can be four metres across and weigh over fifty kilograms. But what fascinates me is their intelligence — they can solve puzzles, unscrew jars, and even escape from aquarium tanks. I want to watch one in its natural habitat, hunting and changing colour.'
      - name: Speaker 3
        text: 'Manta rays are my dream sighting. They have wingspans of up to seven metres and glide through the water like underwater birds. They are completely harmless despite their enormous size. Divers say that when a manta ray swims over you, it feels like being underneath a gentle, living blanket.'
      - name: Speaker 4
        text: 'I am desperate to see a leafy sea dragon. They look like floating pieces of seaweed, with delicate leaf-shaped appendages all over their body. They are only found off the coast of southern Australia. Their camouflage is so perfect that you could swim right past one and never know it was there.'
      - name: Speaker 5
        text: 'The creature I most want to see is a narwhal. They live in the Arctic and have a single long spiral tusk that can be up to three metres long. Medieval people thought they were unicorns. Only about eighty thousand exist in the wild, and seeing one in the icy Arctic waters would be a once-in-a-lifetime experience.'
