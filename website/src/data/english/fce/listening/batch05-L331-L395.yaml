    difficulty: 3
    audioFile: 'L363.mp3'
    script:
      - speaker: expert
        voice: shimmer
        text: 'Good afternoon. I want to share some encouraging numbers about renewable energy. In two thousand and twenty-three, renewable sources generated over thirty percent of global electricity for the first time in history. Solar energy alone grew by forty-eight percent compared to the previous year.'
      - speaker: expert
        voice: shimmer
        text: 'The cost of solar panels has fallen by ninety percent since twenty ten. A solar panel that cost three hundred dollars in twenty ten now costs about thirty dollars. This dramatic price drop means that solar is now cheaper than coal in most countries around the world.'
      - speaker: expert
        voice: shimmer
        text: 'Wind energy is equally impressive. Denmark now generates over fifty percent of its electricity from wind. The largest offshore wind farm in the world, Hornsea Two in the UK, can power over one point three million homes.'
      - speaker: expert
        voice: shimmer
        text: 'The main challenge remains energy storage. Batteries are improving rapidly — the cost has fallen by ninety-seven percent since nineteen ninety-one. However, we need batteries that can store enough energy to power entire cities overnight or during weeks of cloudy weather.'
      - speaker: expert
        voice: shimmer
        text: 'If current trends continue, experts predict that renewable energy will generate fifty percent of global electricity by twenty thirty. The transition from fossil fuels to clean energy is not a question of if — it is a question of when.'
    sentences:
