  # Remaining IDs L382-L390 with minimal entries for valid YAML
  - id: L382
    type: multiple-matching
    title: 'Protecting Wildlife'
    titleZh: '保护野生动物'
    scene: 'You will hear five conservationists talking about wildlife protection methods.'
    sceneZh: '你将听到五位保护主义者谈论野生动物保护方法。'
    difficulty: 3
    audioFile: 'L382.mp3'
    speakers:
      - name: Speaker 1
        text: 'We use camera traps to monitor endangered species without disturbing them. The cameras are triggered by motion sensors and can operate for months on a single battery. Last year alone, our cameras captured over fifty thousand images of tigers, leopards, and bears in this nature reserve.'
      - name: Speaker 2
        text: 'Our approach is community-based conservation. We train local people as wildlife rangers and pay them a fair salary. These rangers patrol the forest, report poaching, and educate villages about the importance of wildlife. When communities benefit economically from conservation, they become the strongest protectors.'
      - name: Speaker 3
        text: 'We run a breeding programme for critically endangered species. Currently we are working with the California condor — when we started, there were only twenty-two left in the world. Through careful breeding, the population has now grown to over five hundred. Some have been released back into the wild.'
      - name: Speaker 4
        text: 'Satellite tracking has revolutionised our understanding of animal movements. We attach lightweight GPS tags to elephants, whales, and sea turtles. The data shows us exactly where they travel, which areas they use most, and where they face the greatest dangers. This helps governments create protected areas in the right places.'
      - name: Speaker 5
        text: 'We create wildlife corridors — strips of natural habitat that connect larger protected areas. Animals need to move between forests to find food and mates. Without corridors, populations become isolated and genetically weak. Our corridor project has reconnected twelve forest fragments and already we are seeing tigers moving between areas for the first time in decades.'
    statements:
      A: 'This person tracks animal movements using technology attached to their bodies.'
      B: 'This person creates physical connections between separated natural areas.'
      C: 'This person uses remote cameras to monitor endangered species.'
      D: 'This person involves local communities in protecting wildlife.'
      E: 'This person breeds endangered animals in captivity to increase numbers.'
      F: 'This person uses drones to patrol large forest areas.'
      G: 'This person creates artificial habitats for marine species.'
      H: 'This person lobbies governments to change environmental laws.'
    answers:
      Speaker 1: 'C'
      Speaker 2: 'D'
      Speaker 3: 'E'
      Speaker 4: 'A'
      Speaker 5: 'B'
    explanations:
      Speaker 1: 'Speaker 1 uses camera traps to monitor endangered species (C).'
      Speaker 1Zh: '说话者1使用相机陷阱监测濒危物种（C）。'
      Speaker 2: 'Speaker 2 trains local people as rangers — community-based conservation (D).'
