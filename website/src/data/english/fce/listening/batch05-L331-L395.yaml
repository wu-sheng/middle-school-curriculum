  - id: L364
    type: sentence-completion
    title: 'The Honey Bee Colony'
    titleZh: '蜜蜂群落'
    scene: 'You will hear a beekeeper explaining how a honey bee colony works.'
    sceneZh: '你将听到一位养蜂人解释蜜蜂群落如何运作。'
    difficulty: 2
    audioFile: 'L364.mp3'
    script:
      - speaker: beekeeper
        voice: echo
        text: 'A typical honey bee colony contains between forty thousand and sixty thousand bees. There is only one queen, a few hundred male drones, and tens of thousands of female worker bees who do all the actual work.'
      - speaker: beekeeper
        voice: echo
        text: 'The queen''s only job is to lay eggs — up to two thousand per day during summer. The drones exist solely to mate with new queens. After mating, they die. The workers, however, do everything else: cleaning, nursing, building, guarding, and foraging.'
      - speaker: beekeeper
        voice: echo
        text: 'A worker bee changes jobs as she ages. In her first three days, she cleans cells. From day three to twelve, she feeds baby bees. From day twelve to twenty, she builds wax comb. After day twenty, she becomes a forager and flies out to collect nectar and pollen. A forager visits up to fifteen hundred flowers per trip.'
      - speaker: beekeeper
        voice: echo
        text: 'The sad truth is that a worker bee lives only about six weeks during summer. She literally works herself to death. In that short life, she produces just one twelfth of a teaspoon of honey. So every jar of honey you buy represents the lifetime work of thousands of bees.'
    sentences:
      - id: L364-S1
        text: 'A typical colony contains between 40,000 and _____ bees.'
        textZh: '一个典型的蜂群包含40,000到 _____ 只蜜蜂。'
        answer: 'sixty thousand'
      - id: L364-S2
        text: 'The queen can lay up to _____ eggs per day during summer.'
        textZh: '蜂王在夏天每天最多产 _____ 个卵。'
        answer: 'two thousand'
      - id: L364-S3
        text: 'In her first three days, a worker bee _____ cells.'
        textZh: '工蜂在最初的三天里 _____ 蜂房。'
        answer: 'cleans'
      - id: L364-S4
        text: 'A worker becomes a forager after day _____.'
        textZh: '工蜂在第 _____ 天之后成为采集者。'
        answer: 'twenty'
      - id: L364-S5
        text: 'A forager visits up to _____ flowers per trip.'
        textZh: '一只采集蜂每次出行最多访问 _____ 朵花。'
        answer: 'fifteen hundred'
      - id: L364-S6
        text: 'A worker bee produces just one _____ of a teaspoon of honey in her lifetime.'
        textZh: '一只工蜂一生只产 _____ 茶匙的蜂蜜。'
        answer: 'twelfth'

  - id: L365
    type: sentence-completion
    title: 'Volcano Facts'
    titleZh: '火山知识'
    scene: 'You will hear a geology teacher giving a lesson about volcanoes.'
    sceneZh: '你将听到一位地质老师讲授关于火山的课程。'
    difficulty: 2
    audioFile: 'L365.mp3'
    script:
      - speaker: teacher
        voice: nova
        text: 'Today we are going to learn some fascinating facts about volcanoes. There are approximately fifteen hundred active volcanoes on Earth, and about fifty erupt every year. The largest volcano on Earth is Mauna Loa in Hawaii, which rises over nine thousand metres from the ocean floor.'
      - speaker: teacher
        voice: nova
        text: 'When a volcano erupts, it can shoot lava, ash, and rocks high into the sky. The eruption of Mount Tambora in Indonesia in eighteen fifteen was so powerful that it lowered global temperatures by about three degrees. The following year was known as the "Year Without a Summer" because crops failed across Europe and North America.'
      - speaker: teacher
        voice: nova
        text: 'Volcanic soil is actually extremely fertile. That is why so many people live near active volcanoes — the soil is perfect for farming. In Indonesia alone, over seventy million people live within the danger zone of active volcanoes.'
      - speaker: teacher
        voice: nova
        text: 'Today, scientists monitor volcanoes using satellites, seismometers, and gas sensors. They can often predict eruptions weeks or even months in advance, giving people time to evacuate. However, predicting the exact timing and size of an eruption remains one of the biggest challenges in earth science.'
    sentences:
      - id: L365-S1
        text: 'There are approximately _____ active volcanoes on Earth.'
        textZh: '地球上大约有 _____ 座活火山。'
        answer: 'fifteen hundred'
      - id: L365-S2
        text: 'Mauna Loa rises over _____ metres from the ocean floor.'
        textZh: '冒纳罗亚从海底升起超过 _____ 米。'
        answer: 'nine thousand'
      - id: L365-S3
        text: 'Mount Tambora''s eruption lowered temperatures by about _____ degrees.'
        textZh: '坦博拉火山喷发使温度降低了约 _____ 度。'
        answer: 'three'
      - id: L365-S4
        text: 'The year after the eruption was called the "Year Without a _____."'
        textZh: '喷发后的第二年被称为"没有 _____ 的一年"。'
        answer: 'Summer'
      - id: L365-S5
        text: 'In Indonesia, over _____ million people live near active volcanoes.'
        textZh: '在印度尼西亚，超过 _____ 百万人生活在活火山附近。'
        answer: 'seventy'
      - id: L365-S6
        text: 'Scientists can often predict eruptions weeks or even _____ in advance.'
        textZh: '科学家通常可以提前数周甚至 _____ 预测喷发。'
        answer: 'months'

  # L366-L375: Additional sentence completion exercises (abbreviated IDs)
  - id: L366
    type: sentence-completion
    title: 'Animal Communication'
    titleZh: '动物交流'
    scene: 'You will hear a zoologist talking about unusual ways animals communicate.'
    sceneZh: '你将听到一位动物学家谈论动物交流的不寻常方式。'
    difficulty: 3
    audioFile: 'L366.mp3'
    script:
      - speaker: zoologist
        voice: shimmer
        text: 'Animals communicate in far more ways than most people realise. Elephants, for example, can communicate over distances of up to ten kilometres using infrasound — sounds so low that humans cannot hear them. They produce these sounds by vibrating their vocal cords at a frequency below twenty hertz.'
      - speaker: zoologist
        voice: shimmer
        text: 'Bees use their famous waggle dance to tell hive mates the exact location of flowers. Dolphins have individual signature whistles that act like names. Fireflies use flashing patterns of light to attract mates — each species has its own unique flash pattern.'
      - speaker: zoologist
        voice: shimmer
        text: 'Perhaps the most surprising communicators are trees. Through underground fungal networks, trees can share nutrients with their neighbours and even warn each other about insect attacks. A tree being eaten by caterpillars releases chemical signals that cause neighbouring trees to produce bitter chemicals in their leaves before the caterpillars arrive.'
      - speaker: zoologist
        voice: shimmer
        text: 'These discoveries have changed our understanding of animal intelligence. Communication is not just a human ability — it is a fundamental feature of life on Earth.'
    sentences:
      - id: L366-S1
        text: 'Elephants communicate over distances of up to _____ kilometres using infrasound.'
        textZh: '大象利用次声波在 _____ 公里的距离上交流。'
        answer: 'ten'
      - id: L366-S2
        text: 'Infrasound has a frequency below _____ hertz.'
        textZh: '次声波的频率低于 _____ 赫兹。'
        answer: 'twenty'
      - id: L366-S3
        text: 'Dolphins have individual signature _____ that act like names.'
        textZh: '海豚有独特的签名 _____ 就像名字一样。'
        answer: 'whistles'
      - id: L366-S4
        text: 'Each firefly species has its own unique _____ pattern.'
        textZh: '每种萤火虫都有自己独特的 _____ 模式。'
        answer: 'flash'
      - id: L366-S5
        text: 'Trees share nutrients through underground _____ networks.'
        textZh: '树木通过地下 _____ 网络共享营养。'
        answer: 'fungal'
      - id: L366-S6
        text: 'Neighbouring trees produce _____ chemicals in response to warning signals.'
        textZh: '邻近的树木响应警告信号产生 _____ 化学物质。'
        answer: 'bitter'

