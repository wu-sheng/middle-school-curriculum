  - id: L368
    type: sentence-completion
    title: 'The Dolphin Research Centre'
    titleZh: '海豚研究中心'
    scene: 'You will hear a researcher describing work at a dolphin research centre.'
    sceneZh: '你将听到一位研究员描述海豚研究中心的工作。'
    difficulty: 2
    audioFile: 'L368.mp3'
    script:
      - speaker: researcher
        voice: shimmer
        text: 'Our research centre studies bottlenose dolphins in their natural habitat off the coast of Florida. We have been tracking the same population of about one hundred and twenty dolphins for over fifteen years. Each dolphin has unique markings on its dorsal fin, like a human fingerprint, which allows us to identify individuals.'
      - speaker: researcher
        voice: shimmer
        text: 'Our biggest discovery is that dolphins have individual names — signature whistles that they develop in the first few months of life. When two dolphins meet, they exchange these whistles, just like humans exchange names. Even more remarkably, dolphins can remember the signature whistles of friends they have not seen for twenty years.'
      - speaker: researcher
        voice: shimmer
        text: 'We use underwater microphones called hydrophones to record dolphin conversations. Our database now contains over fifty thousand recorded interactions. Using artificial intelligence, we are trying to decode the patterns and eventually understand what dolphins are actually saying to each other.'
    sentences:
