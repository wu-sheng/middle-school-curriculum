    audioFile: 'L388.mp3'
    speakers:
      - name: Speaker 1
        text: 'As a wildlife veterinarian, I treat injured and sick wild animals — everything from hedgehogs hit by cars to eagles with broken wings. The most rewarding moment is releasing a healed animal back into the wild. Last week I set free an otter that had been trapped in fishing nets. Watching it swim away was pure joy.'
      - name: Speaker 2
        text: 'I am an environmental lawyer. I take companies to court when they break environmental laws — dumping waste in rivers, destroying protected habitats, exceeding pollution limits. Most people do not think of law as an environmental career, but without legal enforcement, environmental protections are just words on paper.'
      - name: Speaker 3
        text: 'I design sustainable buildings as a green architect. Every material I choose, every window I position, is calculated to reduce energy use. My latest project is a school that produces more energy than it uses, using solar panels, ground-source heating, and natural ventilation. Buildings are responsible for forty percent of global emissions, so green architecture can make a huge difference.'
      - name: Speaker 4
        text: 'I am a forest ranger in a national park. I patrol the forest, monitor wildlife, maintain trails, and educate visitors about conservation. My favourite part is leading night walks where families can hear owls, see foxes, and watch bats catching insects. Connecting people with nature is the most important thing I do.'
      - name: Speaker 5
        text: 'I work as a marine archaeologist, studying human history through underwater sites. Shipwrecks, sunken cities, ancient harbours — the ocean preserves artefacts better than land because there is no wind or rain. Last year we explored a Roman trading ship that sank two thousand years ago. The cargo of wine jars was still perfectly intact.'
    statements:
      A: 'This person heals injured wild animals and releases them.'
      B: 'This person uses the legal system to enforce environmental protection.'
      C: 'This person designs buildings that are energy-efficient.'
      D: 'This person protects and educates people about nature in a park.'
      E: 'This person studies human history through underwater discoveries.'
      F: 'This person breeds endangered animals in zoos.'
      G: 'This person predicts natural disasters using computer models.'
      H: 'This person photographs animals for magazines.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 treats and releases wild animals — wildlife veterinarian (A).'
      Speaker 1Zh: '说话者1治疗和释放野生动物——野生动物兽医（A）。'
      Speaker 2: 'Speaker 2 takes polluting companies to court — environmental lawyer (B).'
      Speaker 2Zh: '说话者2将污染企业告上法庭——环境律师（B）。'
      Speaker 3: 'Speaker 3 designs energy-efficient buildings — green architect (C).'
      Speaker 3Zh: '说话者3设计节能建筑——绿色建筑师（C）。'
      Speaker 4: 'Speaker 4 patrols forest and educates visitors — park ranger (D).'
      Speaker 4Zh: '说话者4巡逻森林并教育游客——公园护林员（D）。'
      Speaker 5: 'Speaker 5 studies shipwrecks underwater — marine archaeologist (E).'
      Speaker 5Zh: '说话者5研究水下沉船——海洋考古学家（E）。'

  - id: L389
    type: multiple-matching
    title: 'Climate Solutions That Excite Me'
    titleZh: '让我兴奋的气候解决方案'
    scene: 'You will hear five people talking about climate solutions they find most promising.'
    sceneZh: '你将听到五个人谈论他们觉得最有前途的气候解决方案。'
    difficulty: 3
    audioFile: 'L389.mp3'
    speakers:
      - name: Speaker 1
        text: 'I am most excited about vertical farming. Growing food in indoor towers using LED lights and no soil means you can produce vegetables anywhere — even in deserts or cities. Vertical farms use ninety-five percent less water than traditional farming and zero pesticides. If we could scale this technology, we could feed the world without destroying any more forests.'
      - name: Speaker 2
        text: 'Carbon capture technology fascinates me. Machines that can suck carbon dioxide directly out of the air and store it underground sound like science fiction, but they exist. The biggest plant in Iceland captures four thousand tonnes of CO2 per year. We need thousands more, but the technology is proven and improving fast.'
      - name: Speaker 3
        text: 'I believe the most exciting solution is ocean-based wind energy. Floating wind turbines that can be placed in deep water far from shore have enormous potential. The wind at sea is much stronger and more consistent. One floating wind farm could power an entire city. Several countries are already building them.'
      - name: Speaker 4
        text: 'For me, it is hydrogen fuel. When you burn hydrogen, the only waste product is water — no carbon dioxide at all. Green hydrogen, made by splitting water using renewable electricity, could replace fossil fuels in ships, planes, and heavy industry. It is the missing piece of the clean energy puzzle.'
      - name: Speaker 5
        text: 'I think rewilding is the most exciting approach. Instead of inventing new technology, we simply let nature recover. When you stop farming or building on land and reintroduce native species, forests regrow, rivers clean themselves, and wildlife returns. Europe''s rewilding projects have already brought back wolves, bison, and even wild horses to areas where they had been extinct for centuries.'
    statements:
      A: 'This person is excited about growing food indoors in controlled environments.'
      B: 'This person believes in machines that remove carbon dioxide from the air.'
      C: 'This person is enthusiastic about wind energy generated at sea.'
      D: 'This person sees hydrogen as the key to replacing fossil fuels.'
      E: 'This person believes in allowing nature to recover on its own.'
      F: 'This person is excited about nuclear fusion power.'
      G: 'This person believes electric cars will solve climate change.'
      H: 'This person thinks space exploration will provide climate solutions.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 describes vertical farming — indoor food production (A).'
      Speaker 1Zh: '说话者1描述了垂直农业——室内食物生产（A）。'
      Speaker 2: 'Speaker 2 describes carbon capture machines (B).'
      Speaker 2Zh: '说话者2描述了碳捕获机器（B）。'
      Speaker 3: 'Speaker 3 describes floating offshore wind turbines (C).'
      Speaker 3Zh: '说话者3描述了漂浮式海上风力涡轮机（C）。'
      Speaker 4: 'Speaker 4 describes green hydrogen fuel (D).'
      Speaker 4Zh: '说话者4描述了绿色氢燃料（D）。'
      Speaker 5: 'Speaker 5 describes rewilding — letting nature recover (E).'
      Speaker 5Zh: '说话者5描述了再野化——让自然恢复（E）。'

  - id: L390
    type: multiple-matching
    title: 'What Scares Me About the Future'
    titleZh: '我对未来的担忧'
    scene: 'You will hear five teenagers sharing their biggest environmental concerns.'
    sceneZh: '你将听到五位青少年分享他们最大的环境担忧。'
    difficulty: 3
    audioFile: 'L390.mp3'
    speakers:
      - name: Speaker 1
        text: 'What worries me most is the speed of ice melt in the Arctic and Antarctic. Scientists say we have already lost forty percent of Arctic summer ice since nineteen seventy-nine. If all the ice in Greenland melted, sea levels would rise by over seven metres. That would flood London, New York, Shanghai, and most coastal cities.'
      - name: Speaker 2
        text: 'I am terrified about insect decline. Insects are not glamorous, but they pollinate our crops, decompose waste, and feed birds and fish. Studies show insect populations have declined by over forty percent in the last thirty years. Without insects, the entire food chain collapses. It is called the "insect apocalypse" and it keeps me awake at night.'
      - name: Speaker 3
        text: 'The thing that scares me most is ocean acidification. As the ocean absorbs more carbon dioxide, it becomes more acidic. This dissolves the shells of creatures like oysters, clams, and coral. If it continues, scientists predict that by twenty-one hundred, the ocean could be so acidic that many shell-building organisms cannot survive.'
      - name: Speaker 4
        text: 'I worry about water scarcity. By twenty-fifty, over half the world''s population could face water shortages. Climate change is making droughts longer and more severe. Rivers that millions depend on are drying up. Water conflicts between countries could become the defining crisis of the next century.'
      - name: Speaker 5
        text: 'Amazon deforestation keeps me worried. Every year, an area the size of a small country is cleared. The Amazon produces six percent of the world''s oxygen and absorbs billions of tonnes of carbon. If we lose the Amazon, climate change accelerates dramatically. Some scientists say we are approaching a tipping point where the forest can no longer sustain itself.'
    statements:
      A: 'This person is most worried about rising sea levels from melting ice.'
      B: 'This person fears the collapse of insect populations.'
      C: 'This person is concerned about oceans becoming too acidic for marine life.'
      D: 'This person worries about future water shortages.'
      E: 'This person is alarmed by the destruction of a major rainforest.'
      F: 'This person is scared about the spread of new diseases.'
      G: 'This person worries about overpopulation.'
      H: 'This person is concerned about volcanic eruptions.'
    answers:
      Speaker 1: 'A'
      Speaker 2: 'B'
      Speaker 3: 'C'
      Speaker 4: 'D'
      Speaker 5: 'E'
    explanations:
      Speaker 1: 'Speaker 1 worries about ice melt and sea level rise (A).'
      Speaker 1Zh: '说话者1担心冰层融化和海平面上升（A）。'
      Speaker 2: 'Speaker 2 fears the "insect apocalypse" — declining insect populations (B).'
      Speaker 2Zh: '说话者2害怕"昆虫末日"——昆虫数量下降（B）。'
      Speaker 3: 'Speaker 3 is concerned about ocean acidification harming shell-building organisms (C).'
      Speaker 3Zh: '说话者3担心海洋酸化伤害建壳生物（C）。'
      Speaker 4: 'Speaker 4 worries about water scarcity by 2050 (D).'
      Speaker 4Zh: '说话者4担心到2050年的水资源短缺（D）。'
      Speaker 5: 'Speaker 5 is alarmed by Amazon deforestation (E).'
      Speaker 5Zh: '说话者5对亚马逊森林砍伐感到震惊（E）。'

  # ============================================================
  # L391–L395: Part 4 — Long Conversation (Nature/Science)
  # ============================================================

  - id: L391
    type: long-conversation
    title: 'Interview with a Marine Biologist'
    titleZh: '采访海洋生物学家'
    scene: 'You will hear an interviewer talking to a marine biologist about coral reef conservation.'
    sceneZh: '你将听到采访者与一位海洋生物学家谈论珊瑚礁保护。'
    difficulty: 3
    audioFile: 'L391.mp3'
    script:
      - speaker: interviewer
        voice: echo
        text: 'Dr. Chen, you have spent fifteen years studying coral reefs. How would you describe the current state of the world''s reefs?'
      - speaker: scientist
        voice: shimmer
        text: 'Honestly, it is a mixed picture. About half of the world''s coral cover has been lost since nineteen fifty. The Great Barrier Reef alone has suffered five mass bleaching events in the last eight years. However, there are also signs of hope — some reefs are recovering, and new heat-resistant coral varieties are showing promise.'
      - speaker: interviewer
        voice: echo
        text: 'Can you explain coral bleaching in simple terms for our younger listeners?'
      - speaker: scientist
        voice: shimmer
        text: 'Of course. Imagine coral as a tiny animal that has colourful algae living inside it. The algae provide the coral with food through photosynthesis. When the water gets too warm, the coral gets stressed and pushes the algae out. Without the algae, the coral turns white — that is bleaching. If the water cools down quickly, the algae can come back. But if the heat continues for more than a few weeks, the coral starves to death.'
      - speaker: interviewer
        voice: echo
        text: 'What gives you hope for the future of coral reefs?'
      - speaker: scientist
        voice: shimmer
        text: 'Three things. First, we have discovered that some corals are naturally more heat-resistant than others. We are now selectively breeding these "super corals" and transplanting them onto damaged reefs. Second, marine protected areas are working — reefs inside protected zones recover up to four times faster than unprotected ones. Third, young people are more passionate about ocean conservation than any previous generation. That gives me real hope.'
    questions:
      - id: L391-Q1
        text: 'What has happened to coral cover since 1950?'
        options: {A: 'It has doubled in size.', B: 'About half has been lost.', C: 'It has remained stable.'}
        answer: 'B'
      - id: L391-Q2
        text: 'What causes coral bleaching?'
        options: {A: 'Cold water temperatures.', B: 'Too much sunlight.', C: 'Warm water causing coral to expel algae.'}
        answer: 'C'
      - id: L391-Q3
        text: 'What are "super corals"?'
        options: {A: 'Artificial coral made from plastic.', B: 'Naturally heat-resistant coral varieties bred for transplanting.', C: 'The largest coral formations in the world.'}
        answer: 'B'
      - id: L391-Q4
        text: 'How much faster do reefs recover inside protected areas?'
        options: {A: 'Two times faster.', B: 'Three times faster.', C: 'Four times faster.'}
        answer: 'C'

  - id: L392
    type: long-conversation
    title: 'Interview with a Wildlife Photographer'
    titleZh: '采访野生动物摄影师'
    scene: 'You will hear an interviewer talking to a wildlife photographer about her work.'
    sceneZh: '你将听到采访者与一位野生动物摄影师谈论她的工作。'
    difficulty: 3
    audioFile: 'L392.mp3'
    script:
      - speaker: interviewer
        voice: echo
        text: 'Mei, your photographs of snow leopards have won international awards. How did you get started in wildlife photography?'
      - speaker: photographer
        voice: shimmer
        text: 'I grew up in a small village in the mountains of Qinghai province. My grandmother would point out birds and animals during our walks, and I started drawing them in a notebook. When I was fourteen, my father gave me his old camera. I took my first wildlife photo of a golden eagle sitting on a rock, and I was hooked.'
      - speaker: interviewer
        voice: echo
        text: 'What makes photographing snow leopards so challenging?'
      - speaker: photographer
        voice: shimmer
        text: 'Everything. They live at extreme altitudes — between three thousand and five thousand metres — where the air is thin and the cold is brutal. They are incredibly well camouflaged against grey rock. And they are active mainly at dawn and dusk, when light conditions are difficult. I once waited in a hide for seventeen days before getting a single photograph. Patience is the most important skill in this job.'
      - speaker: interviewer
        voice: echo
        text: 'Has your photography helped conservation efforts?'
      - speaker: photographer
        voice: shimmer
        text: 'I believe so. When people see a beautiful photograph of a snow leopard, they connect emotionally with the animal. That emotional connection is what drives people to donate money, support conservation laws, and change their behaviour. A single powerful image can do more for conservation than a hundred scientific papers. My goal is to make people fall in love with animals they have never seen.'
    questions:
      - id: L392-Q1
        text: 'What inspired Mei to become a wildlife photographer?'
        options: {A: 'A school trip to a zoo.', B: 'Nature walks with her grandmother and receiving a camera from her father.', C: 'Winning a photography competition at school.'}
        answer: 'B'
      - id: L392-Q2
        text: 'How long did Mei once wait to photograph a snow leopard?'
        options: {A: 'Seven days.', B: 'Seventeen days.', C: 'Seventy days.'}
        answer: 'B'
      - id: L392-Q3
        text: 'According to Mei, what is the most important skill for wildlife photography?'
        options: {A: 'Having expensive equipment.', B: 'Patience.', C: 'Physical fitness.'}
        answer: 'B'
      - id: L392-Q4
        text: 'How does Mei believe photography helps conservation?'
        options: {A: 'By selling photos to raise money for wildlife charities.', B: 'By creating an emotional connection between people and animals.', C: 'By documenting illegal poaching activities.'}
        answer: 'B'

  - id: L393
    type: long-conversation
    title: 'Interview with a Climate Scientist'
    titleZh: '采访气候科学家'
    scene: 'You will hear a journalist interviewing a climate scientist about solutions.'
    sceneZh: '你将听到一位记者采访气候科学家关于解决方案。'
    difficulty: 3
    audioFile: 'L393.mp3'
    script:
      - speaker: interviewer
        voice: echo
        text: 'Professor Li, many young people feel anxious about climate change. Is there reason to be hopeful?'
      - speaker: scientist
        voice: nova
        text: 'Absolutely. When I started my career thirty years ago, almost nobody talked about climate change. Today, it is the number one issue for an entire generation. That shift in awareness is extraordinary. Furthermore, the solutions are developing faster than anyone predicted. Solar energy is now the cheapest form of electricity in history. Electric cars are outselling petrol cars in several countries.'
      - speaker: interviewer
        voice: echo
        text: 'But are we moving fast enough?'
      - speaker: scientist
        voice: nova
        text: 'Not yet. We need to cut emissions by forty-five percent by twenty-thirty to keep warming below one-point-five degrees. That requires massive investment in renewable energy, changes to farming practices, and an end to deforestation. The technology exists — what we need is political courage and public pressure.'
      - speaker: interviewer
        voice: echo
        text: 'What can young people do?'
      - speaker: scientist
        voice: nova
        text: 'Three things. First, educate yourselves — understand the science so you can have informed conversations. Second, make changes in your own life — every action matters, from what you eat to how you travel. Third, and most importantly, use your voice. Write to politicians. Join movements. Vote when you are old enough. Young people have the power to demand the future they deserve.'
    questions:
      - id: L393-Q1
        text: 'What does Professor Li find hopeful about climate change?'
        options: {A: 'The problem is smaller than scientists thought.', B: 'Awareness has grown enormously and solutions are developing fast.', C: 'Governments have already solved most of the problems.'}
        answer: 'B'
      - id: L393-Q2
        text: 'How much do emissions need to be cut by 2030?'
        options: {A: 'By twenty-five percent.', B: 'By forty-five percent.', C: 'By seventy-five percent.'}
        answer: 'B'
      - id: L393-Q3
        text: 'What does Professor Li say we need most?'
        options: {A: 'Better technology.', B: 'More money for research.', C: 'Political courage and public pressure.'}
        answer: 'C'
      - id: L393-Q4
        text: 'What is the MOST important thing young people can do according to Professor Li?'
        options: {A: 'Plant trees.', B: 'Use their voice to demand change from leaders.', C: 'Study science at university.'}
        answer: 'B'

  - id: L394
    type: long-conversation
    title: 'Interview with a Beekeeper'
    titleZh: '采访养蜂人'
    scene: 'You will hear a reporter talking to a beekeeper about the importance of bees.'
    sceneZh: '你将听到一位记者与养蜂人谈论蜜蜂的重要性。'
    difficulty: 3
    audioFile: 'L394.mp3'
    script:
      - speaker: interviewer
        voice: shimmer
        text: 'Tom, you have been keeping bees for over twenty years. Why should people care about bees?'
      - speaker: beekeeper
        voice: echo
        text: 'Bees pollinate about seventy-five percent of the fruits, vegetables, and nuts we eat. Without bees, your breakfast would look very different — no apples, no strawberries, no almonds, no coffee. Scientists estimate the economic value of bee pollination at over two hundred billion dollars per year globally.'
      - speaker: interviewer
        voice: shimmer
        text: 'We keep hearing that bee populations are declining. Why is that?'
      - speaker: beekeeper
        voice: echo
        text: 'Several factors are working together. Pesticides — especially a type called neonicotinoids — damage bees'' nervous systems and navigation abilities. Habitat loss means fewer wildflowers for food. Parasites like the Varroa mite weaken hives. And climate change is disrupting the timing of flower blooms, so sometimes bees wake from winter and there are no flowers yet.'
      - speaker: interviewer
        voice: shimmer
        text: 'What can ordinary people do to help bees?'
      - speaker: beekeeper
        voice: echo
        text: 'Plant bee-friendly flowers — lavender, sunflowers, and wildflower mixes are perfect. Avoid using pesticides in your garden. Leave a shallow dish of water with pebbles for thirsty bees to drink from. And if you see a tired bee on the ground, put a drop of sugar water near it — you might just save its life.'
    questions:
      - id: L394-Q1
        text: 'What percentage of our food is pollinated by bees?'
        options: {A: 'About 25%.', B: 'About 50%.', C: 'About 75%.'}
        answer: 'C'
      - id: L394-Q2
        text: 'What type of pesticide is most harmful to bees?'
        options: {A: 'Neonicotinoids.', B: 'Herbicides.', C: 'Fungicides.'}
        answer: 'A'
      - id: L394-Q3
        text: 'How does climate change affect bees?'
        options: {A: 'It makes winters too warm for bees to hibernate.', B: 'It disrupts the timing of flower blooms so food is not available when bees need it.', C: 'It causes bees to fly to different countries.'}
        answer: 'B'
      - id: L394-Q4
        text: 'What does Tom suggest you do if you find a tired bee on the ground?'
        options: {A: 'Cover it with leaves to keep it warm.', B: 'Put a drop of sugar water near it.', C: 'Take it to a vet immediately.'}
        answer: 'B'

  - id: L395
    type: long-conversation
    title: 'Interview with a Young Inventor'
    titleZh: '采访年轻发明家'
    scene: 'You will hear an interviewer talking to a teenager who invented an ocean cleanup device.'
    sceneZh: '你将听到采访者与一位发明了海洋清理装置的青少年交谈。'
    difficulty: 3
    audioFile: 'L395.mp3'
    script:
      - speaker: interviewer
        voice: shimmer
        text: 'Anna, you are only sixteen and you have already invented a device to remove microplastics from water. How did you come up with the idea?'
      - speaker: inventor
        voice: nova
        text: 'It started in science class when we learned that microplastics are in our drinking water, our food, and even in our blood. I was shocked. I could not believe there was no simple way to remove them. So I spent six months in my school''s science lab testing different filtration methods.'
      - speaker: interviewer
        voice: shimmer
        text: 'Tell us about your device.'
      - speaker: inventor
        voice: nova
        text: 'It is actually quite simple. It uses a combination of magnetic particles and a special filter made from recycled materials. The magnetic particles attach to the microplastics, making them clump together into larger pieces that are easy to filter out. In testing, it removed ninety-three percent of microplastics from water samples.'
      - speaker: interviewer
        voice: shimmer
        text: 'What has the response been?'
      - speaker: inventor
        voice: nova
        text: 'Amazing. I won first prize at the national science fair, and two water treatment companies have contacted me about developing it for larger scale use. A university professor offered to help me patent the design. But the best response was from a girl in India who emailed saying my invention gave her hope for the future of our oceans. That meant more than any prize.'
      - speaker: interviewer
        voice: shimmer
        text: 'What advice do you have for other young people who want to make a difference?'
      - speaker: inventor
        voice: nova
        text: 'Do not wait for someone else to solve the problem. If something bothers you, research it, experiment, and try to find a solution. You do not need to be an adult or have a degree. Some of the best ideas in history came from young people who simply refused to accept that things could not be improved.'
    questions:
      - id: L395-Q1
        text: 'What inspired Anna to invent her device?'
        options: {A: 'She saw a documentary about ocean pollution.', B: 'She learned in science class that microplastics are in our water and food.', C: 'Her teacher assigned it as homework.'}
        answer: 'B'
      - id: L395-Q2
        text: 'How does Anna''s device work?'
        options: {A: 'It uses heat to melt plastics into liquid form.', B: 'It uses magnetic particles to make microplastics clump together for filtering.', C: 'It uses chemicals to dissolve the plastic.'}
        answer: 'B'
      - id: L395-Q3
        text: 'What percentage of microplastics does the device remove?'
        options: {A: '73%', B: '83%', C: '93%'}
        answer: 'C'
      - id: L395-Q4
        text: 'What response meant the most to Anna?'
        options: {A: 'Winning first prize at the science fair.', B: 'Being contacted by water treatment companies.', C: 'An email from a girl in India saying the invention gave her hope.'}
        answer: 'C'
