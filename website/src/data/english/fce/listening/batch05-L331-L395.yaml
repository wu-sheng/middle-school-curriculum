        text: 'We installed solar panels on our roof three years ago. They generate enough electricity to power our house and charge our electric car. In summer, we produce more than we use and sell the excess back to the grid. Our electricity bill went from two hundred pounds per month to almost zero.'
      - name: Speaker 2
        text: 'We switched to a ground-source heat pump. It uses pipes buried in the garden to extract heat from underground. Even in winter when it is freezing outside, the ground two metres down stays at about ten degrees. The pump uses this warmth to heat our entire house. It costs less than half what gas heating used to cost.'
      - name: Speaker 3
        text: 'We live on a farm and installed a small wind turbine. Our area is very windy, so the turbine generates electricity almost every day. It produces enough for the farmhouse and the barn. The only downside is the noise — it makes a constant humming sound, but we have got used to it.'
      - name: Speaker 4
        text: 'We bought a home battery system that stores solar energy during the day for use at night. Before the battery, our solar panels were useless after sunset. Now we use stored solar energy from six in the evening until sunrise. It has made us almost completely independent from the electricity grid.'
      - name: Speaker 5
        text: 'We joined a community energy cooperative. Twenty families in our village invested together in a shared solar farm. Each family owns a share and receives credits on their energy bill based on how much the farm produces. It was too expensive for one family alone, but together we made it affordable.'
