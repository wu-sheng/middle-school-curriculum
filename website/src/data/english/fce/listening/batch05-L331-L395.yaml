      - name: Speaker 5
        text: 'Our class built a weather station with a thermometer, rain gauge, barometer, and wind vane. We recorded data every morning for three months and compared our measurements with the official Met Office forecasts. We found that our predictions were actually eighty percent accurate, which was better than I expected.'
