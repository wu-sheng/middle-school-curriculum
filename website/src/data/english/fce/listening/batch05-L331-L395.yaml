  - id: L370
    type: sentence-completion
    title: 'The Tardigrade'
    titleZh: '水熊虫'
    scene: 'You will hear a biologist explaining tardigrades to school children.'
    sceneZh: '你将听到一位生物学家向学生们解释水熊虫。'
    difficulty: 3
    audioFile: 'L370.mp3'
    script:
      - speaker: biologist
        voice: nova
        text: 'The toughest animal on Earth is not a lion, or a bear, or a shark. It is a creature so tiny you need a microscope to see it. It is called a tardigrade, or "water bear," and it is only about half a millimetre long — smaller than a grain of sand.'
      - speaker: biologist
        voice: nova
        text: 'Tardigrades can survive temperatures from minus two hundred and seventy-two degrees to one hundred and fifty degrees Celsius. They can withstand pressure six times greater than the deepest ocean. They can survive radiation hundreds of times stronger than what would kill a human. In two thousand and seven, tardigrades were sent into space and survived the vacuum.'
      - speaker: biologist
        voice: nova
        text: 'Their secret is a process called cryptobiosis. When conditions become extreme, they curl into a tiny ball, lose ninety-seven percent of their water, and their metabolism drops to nearly zero. They can stay in this state for decades. When conditions improve, they simply add water and come back to life. Scientists have revived tardigrades that were frozen for over thirty years.'
    sentences:
      - id: L370-S1
        text: 'Tardigrades are only about _____ a millimetre long.'
        textZh: '水熊虫只有约 _____ 毫米长。'
        answer: 'half'
      - id: L370-S2
        text: 'They can survive temperatures up to _____ degrees Celsius.'
        textZh: '它们可以承受高达 _____ 摄氏度的温度。'
        answer: 'one hundred and fifty'
      - id: L370-S3
        text: 'In cryptobiosis, they lose _____ percent of their water.'
        textZh: '在隐生状态下，它们失去 _____ 的水分。'
        answer: 'ninety-seven'
      - id: L370-S4
        text: 'Their metabolism drops to nearly _____.'
        textZh: '它们的新陈代谢几乎降到 _____。'
        answer: 'zero'
      - id: L370-S5
        text: 'Scientists have revived tardigrades frozen for over _____ years.'
        textZh: '科学家复活了冷冻超过 _____ 年的水熊虫。'
        answer: 'thirty'
      - id: L370-S6
        text: 'Tardigrades were sent into _____ in 2007 and survived.'
        textZh: '水熊虫在2007年被送入 _____ 并存活下来。'
