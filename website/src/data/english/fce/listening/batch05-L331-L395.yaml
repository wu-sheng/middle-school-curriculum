      Speaker 5: 'Speaker 5 created a YouTube channel about sustainable living — using social media (B).'
      Speaker 5Zh: '说话者5创建了关于可持续生活的YouTube频道——使用社交媒体（B）。'

  # L380-L390 placeholder entries
  - id: L380
    type: multiple-matching
    title: 'Amazing Animal Facts'
    titleZh: '动物趣闻'
    scene: 'You will hear five children sharing the most amazing animal fact they know.'
    sceneZh: '你将听到五个孩子分享他们知道的最惊人的动物知识。'
    difficulty: 2
    audioFile: 'L380.mp3'
    speakers:
      - name: Speaker 1
        text: 'Did you know that a blue whale''s heart is so big that a small child could crawl through its arteries? The heart weighs about four hundred and fifty kilograms and beats only about eight times per minute when diving. You can hear it from over three kilometres away.'
      - name: Speaker 2
        text: 'Here is my favourite fact: crows can recognise individual human faces and remember them for years. If you are mean to a crow, it will warn other crows about you, and they will all avoid you. But if you feed one, it might bring you gifts — shiny objects, buttons, even coins.'
      - name: Speaker 3
        text: 'The mantis shrimp has the most powerful punch in the animal kingdom. Its strike is so fast — faster than a bullet — that it creates tiny bubbles that collapse with a flash of light and a temperature of four thousand seven hundred degrees. That is nearly as hot as the surface of the sun.'
      - name: Speaker 4
        text: 'Axolotls can regrow almost any part of their body. If they lose a leg, they grow a new one. If part of their brain is damaged, it regenerates. Scientists are studying axolotl genes to understand how they do this, hoping to one day help humans heal from serious injuries.'
      - name: Speaker 5
        text: 'The honey badger is officially the world''s most fearless animal, according to the Guinness Book of Records. It will fight lions, cobras, and even crocodiles without hesitation. Its skin is so thick and loose that if a predator grabs it, the honey badger can twist around inside its own skin and bite back.'
