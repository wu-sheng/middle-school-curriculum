tasks:
  - id: W022
    type: story
    title: 'The Dragon Egg in the Garden'
    titleZh: '花园里的龙蛋'
    prompt: 'Your story must begin with this sentence: ''When I dug up the flower bed that Saturday morning, my spade hit something hard and warm beneath the soil.'''
    promptZh: '你的故事必须以这句话开头：''周六早上我在花坛里挖土时，铲子碰到了土壤下面又硬又温暖的东西。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q04
    scaffold:
      storyMap:
        opening: 'Describe what you find — an unusual egg. What does it look like? How does it feel?'
        openingZh: '描述你发现了什么——一个不寻常的蛋。它长什么样？摸起来怎么样？'
        development: 'You take it home and try to figure out what it is. What happens when you research it or show it to someone?'
        developmentZh: '你把它带回家试图弄清楚它是什么。你查资料或给别人看时发生了什么？'
        climax: 'The egg starts to hatch! What comes out? How do you react?'
        climaxZh: '蛋开始孵化了！出来了什么？你作何反应？'
        resolution: 'What do you decide to do with the creature? How does this change your life?'
        resolutionZh: '你决定怎么处理这个生物？这如何改变了你的生活？'
      mustUseWords:
        - 'transform'
        - 'shimmer'
        - 'enchanted'
        - 'creature'
      mustUseStructure:
        - 'At least one past continuous sentence (was/were + -ing)'
        - 'At least one sentence using a simile (as...as or like...)'
      mustUseStructureZh:
        - '至少一个过去进行时句子（was/were + -ing）'
        - '至少一个使用比喻的句子（as...as 或 like...）'
      rubric:
        content: 'The story has a clear discovery, a sense of wonder, and a satisfying ending that shows how the character changes.'
        contentZh: '故事有清晰的发现过程、惊奇感和令人满意的结局，展示了角色如何发生变化。'
        language: 'Uses descriptive language to create atmosphere and correctly handles past tenses throughout the narrative.'
        languageZh: '使用描写性语言营造氛围，在整个叙事中正确使用过去时态。'
    selfCheckList:
      - 'Did I describe the egg with vivid sensory details?'
      - 'Did I build suspense before the egg hatches?'
      - 'Did I show my character''s emotions throughout the story?'
      - 'Did I use at least one simile?'
    selfCheckListZh:
      - '我是否用生动的感官细节描述了蛋？'
      - '我是否在蛋孵化前营造了悬念？'
      - '我是否在整个故事中展示了角色的情感？'
      - '我是否至少使用了一个比喻？'
    modelAnswer: |
      When I dug up the flower bed that Saturday morning, my spade hit something hard and warm beneath the soil. I brushed away the dirt and found an egg the size of a melon. It was shimmering purple with golden veins running across its surface, like a precious stone.

      I was carrying it carefully into the kitchen when it started to vibrate in my hands. Mum gasped. "That looks enchanted," she whispered. We searched online for unusual eggs, but nothing matched. By evening, the egg was glowing so brightly it lit up the whole room.

      At midnight, a crack appeared. Then another. A tiny creature pushed its way out — it had emerald scales, silver wings, and eyes as bright as stars. It looked at me, yawned, and blew a small puff of warm air that smelled of cinnamon.

      "It is a dragon," Mum said quietly. The little dragon climbed onto my shoulder and made a soft purring sound. In that moment, my ordinary Saturday had begun to transform into the most extraordinary day of my life. I named her Ember, and I knew nothing would ever be the same.
    modelAnswerZh: |
      周六早上我在花坛里挖土时，铲子碰到了土壤下面又硬又温暖的东西。我刷掉泥土，发现了一个甜瓜大小的蛋。它闪着紫色的光，表面布满金色的纹路，像一块珍贵的宝石。

      我小心翼翼地把它抱进厨房时，它在我手中开始震动。妈妈倒吸一口气。"它看起来被施了魔法，"她轻声说。我们在网上搜索不寻常的蛋，但什么都没找到。到了晚上，蛋发出的光芒照亮了整个房间。

      午夜时分，出现了一条裂缝，然后又一条。一个小生物从里面挤了出来——它有翡翠色的鳞片、银色的翅膀，眼睛像星星一样明亮。它看着我，打了个哈欠，吹出一小团温暖的气息，闻起来有肉桂的味道。

      "它是一条龙，"妈妈轻声说。小龙爬上了我的肩膀，发出轻柔的呼噜声。那一刻，我普通的周六开始转变为我生命中最非凡的一天。我给她取名叫Ember，我知道一切都不会再和从前一样了。

  - id: W023
    type: story
    title: 'The Transformation Contest'
    titleZh: '变身大赛'
    prompt: 'Your story must begin with this sentence: ''The rules of the contest were simple: transform into any animal and hold the shape for five minutes without changing back.'''
    promptZh: '你的故事必须以这句话开头：''比赛规则很简单：变身为任何动物，并在五分钟内保持形态不变回来。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q04
    scaffold:
      storyMap:
        opening: 'Set the scene. Who is competing? What animal do you choose?'
        openingZh: '设定场景。谁在参加比赛？你选择了什么动物？'
        development: 'Describe the transformation and how it feels. What do you experience as this animal?'
        developmentZh: '描述变身的过程和感受。作为这种动物你经历了什么？'
        climax: 'Something unexpected happens during the five minutes. A problem or a surprising event.'
        climaxZh: '五分钟内发生了意想不到的事情。一个问题或一个惊人的事件。'
        resolution: 'How is the contest resolved? Who wins, and what have you learned?'
        resolutionZh: '比赛如何结束？谁赢了？你学到了什么？'
      mustUseWords:
        - 'concentrate'
        - 'extraordinary'
        - 'gradually'
        - 'reveal'
      mustUseStructure:
        - 'At least one sentence with an -ing clause (e.g., "Closing my eyes, I...")'
        - 'At least one exclamatory sentence to show surprise or excitement'
      mustUseStructureZh:
        - '至少一个含有 -ing 从句的句子（如 "Closing my eyes, I..."）'
        - '至少一个感叹句来表达惊讶或兴奋'
      rubric:
        content: 'The story has an imaginative transformation scene, a genuine challenge, and a meaningful ending.'
        contentZh: '故事有一个富有想象力的变身场景、一个真正的挑战和一个有意义的结局。'
        language: 'Uses descriptive verbs and adverbs to convey the physical experience of transformation.'
        languageZh: '使用描写性的动词和副词来传达变身的身体体验。'
    selfCheckList:
      - 'Did I describe the physical feeling of transforming?'
      - 'Did I create tension during the five-minute challenge?'
      - 'Did I show what the world is like from the animal''s perspective?'
      - 'Does the ending reveal something meaningful?'
    selfCheckListZh:
      - '我是否描述了变身的身体感觉？'
      - '我是否在五分钟挑战中制造了紧张感？'
      - '我是否展示了从动物的视角看世界是什么样的？'
      - '结局是否揭示了一些有意义的东西？'
    modelAnswer: |
      The rules of the contest were simple: transform into any animal and hold the shape for five minutes without changing back. Closing my eyes, I chose an eagle. I needed to concentrate with all my strength.

      The change was extraordinary. My arms gradually stretched into wings, my fingers became feathers, and the ground dropped away as my body shrank. Suddenly I could see for miles! The colours were sharper, the air tasted cleaner, and I could hear every whisper in the crowd below.

      Then disaster struck. A real eagle appeared in the sky and flew straight towards me. It thought I was invading its territory! I had to dodge and dive while desperately trying not to lose my shape. My heart was pounding. Every time I felt frightened, my feathers flickered and I nearly changed back.

      With ten seconds left, the real eagle landed beside me, tilted its head, and made a soft cry. It had accepted me. What a relief! The timer rang and I transformed back to human form.

      I did not win the contest — a girl who became a stone statue held perfectly still. But the judges revealed a special prize for me: "Most Authentic Transformation." I learned that being brave does not mean being unafraid — it means carrying on despite your fear.
    modelAnswerZh: |
      比赛规则很简单：变身为任何动物，并在五分钟内保持形态不变回来。闭上眼睛，我选择了一只鹰。我需要全力以赴地集中注意力。

      变化是非凡的。我的手臂逐渐伸展成翅膀，手指变成了羽毛，随着身体缩小，地面远去了。突然间我能看到几英里以外的地方！颜色更鲜明，空气更清新，我能听到下面人群中的每一声低语。

      然后灾难降临了。一只真正的鹰出现在天空中，径直朝我飞来。它以为我侵入了它的领地！我不得不闪躲和俯冲，同时拼命地不让自己失去形态。我的心怦怦直跳。每当我感到害怕时，我的羽毛就闪烁不定，几乎要变回去。

      还剩最后十秒时，那只真鹰降落在我身边，歪了歪头，发出一声柔和的叫声。它接受了我。太让人松了一口气了！计时器响了，我变回了人形。

      我没有赢得比赛——一个变成石雕的女孩完美地保持了不动。但评委们为我揭晓了一个特别奖："最真实变身奖"。我学到了勇敢不意味着不害怕——而是尽管害怕还能继续前行。

