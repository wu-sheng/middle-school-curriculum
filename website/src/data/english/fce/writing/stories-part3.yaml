      前三种原料很简单：月花花瓣、碎星石和晨露。但第四种原料——一根睡着的猫头鹰的羽毛——花了我一个小时才找到。等我回来时，已经十一点四十五分了。

      我手忙脚乱。我把原料混在一起，看着液体从绿色旋转变为紫色。如果只迟了几分钟能有什么问题呢？但在我加入最后一滴露水之前，时钟已经敲响了午夜。

      魔药在一阵金色火花中爆炸了。烟雾散去后，我花园里的一切都变了。玫瑰长到了树那么大。草高到我的肩膀。连花园里的小矮人雕像都长到了两米高，正用非常生气的表情看着我。

      "糟了，"我低声说。"这是一场灾难。"

      用了三天时间和村里女巫的一剂解药才把一切缩回正常大小。小矮人始终没有完全原谅我。从那天晚上起，我总是早早开始做魔药。有些规则的存在是有很好的理由的。

