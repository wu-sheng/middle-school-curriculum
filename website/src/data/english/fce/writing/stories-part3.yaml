      The old recipe book clearly warned: "This potion must be made before midnight, or the results will be unpredictable." I had started at nine o'clock — plenty of time for a simple growing potion to help my wilting roses.

      The first three ingredients were easy: moonflower petals, crushed starstone, and morning dew. But the fourth ingredient — a feather from a sleeping owl — took me an hour to find. By the time I returned, it was quarter to twelve.

      I rushed. I threw the ingredients together and watched the liquid swirl from green to purple. What could go wrong if I was just a few minutes late? But the clock struck midnight before I added the final drop of dew.

      The potion exploded in a shower of golden sparks. When the smoke cleared, everything in my garden had transformed. The roses were the size of trees. The grass reached my shoulders. Even the garden gnome had grown to two metres tall and was giving me a very cross look.

      "Oh no," I whispered. "This is a disaster."

      It took three days and a remedy from the village witch to shrink everything back to normal. The gnome never quite forgave me. From that night on, I always start my potions early. Some rules exist for a very good reason.
