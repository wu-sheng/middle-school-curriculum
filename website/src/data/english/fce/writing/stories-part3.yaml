    modelAnswer: |
      Behind the old wardrobe in my grandmother's attic, I found a door that should not have been there — and when I opened it, I stepped into a world made entirely of stories. The sky was filled with floating sentences, and the ground was paved with book pages.

      A magnificent fox wearing spectacles approached me. "Welcome, Reader," he said. "I am the Librarian. Our world is in danger because someone has been erasing stories. Since you found the door, only your imagination can save us."

      He pointed to the horizon, where entire landscapes were beginning to fade to white. "If those stories had not been written," he explained, "the ideas inside them would have been lost forever."

      I asked what I could do. The Librarian handed me a golden pen. "Write," he said. "Fill the blank spaces with new stories before the boundary between our worlds collapses."

      I wrote as fast as I could — stories about dragons, enchanted gardens, and brave children. As each sentence appeared, colour flooded back into the fading world.

      When I finally returned through the door, the pen was still in my hand. The wardrobe looked ordinary again, but I was not. I had learned that stories are not just words on a page — they are living things that keep the world colourful and meaningful.
    modelAnswerZh: |
      在祖母阁楼旧衣柜的后面，我发现了一扇不该存在的门——当我打开它时，我踏入了一个完全由故事构成的世界。天空中漂浮着句子，地面铺满了书页。

      一只戴着眼镜的壮观狐狸走近我。"欢迎，读者，"他说。"我是图书管理员。我们的世界正处于危险之中，因为有人在擦除故事。既然你找到了这扇门，只有你的想象力才能拯救我们。"

      他指向地平线，那里整片景观正在褪成白色。"如果那些故事没有被写出来，"他解释说，"里面的想法就会永远消失。"

      我问我能做什么。图书管理员递给我一支金笔。"写，"他说。"在两个世界之间的边界崩塌之前，用新故事填满空白。"

      我尽可能快地写——关于龙、魔法花园和勇敢的孩子们的故事。每一句话出现，色彩就重新涌入正在褪色的世界。

      当我终于穿过门回来时，笔还在我手中。衣柜看起来又恢复了普通的样子，但我不再是从前的我了。我明白了故事不仅仅是纸上的文字——它们是活生生的东西，让世界保持多彩和有意义。
