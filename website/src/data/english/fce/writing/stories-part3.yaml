    modelAnswer: |
      Every dragon at the Academy could fly except one — a small blue dragon called Ripple, whose wings had never grown big enough to lift her off the ground. Although the other dragons were kind, Ripple often sat alone, watching them soar above the clouds.

      One day, Ripple discovered something unique about herself. Beneath the training lake, she could swim faster than any creature alive. She could also breathe underwater and communicate with fish. Her teacher said that Ripple might be the first water dragon born in a hundred years.

      Even though Ripple felt better about her talent, she still wished she could fly. Then the impossible happened. An earthquake cracked open the ground beneath the Academy, and water from an underground river started flooding the lower classrooms. The flying dragons could not help because the corridors were already full of water.

      Ripple dived in without hesitation. She swam through flooded hallways, found twelve students trapped in the library, and guided them to safety through an underwater tunnel. It took courage to swim in the dark with frightened students on her back.

      That evening, the headmaster told the whole school that Ripple had saved twelve lives. "Being different," he said, "is not a weakness. It is a strength that is waiting for the right moment."
