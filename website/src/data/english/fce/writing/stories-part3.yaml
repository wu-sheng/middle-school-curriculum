      有一天，Ripple发现了自己独特的地方。在训练湖底下，她能比任何活的生物都游得快。她还能在水下呼吸并与鱼交流。她的老师说Ripple可能是一百年来第一条出生的水龙。

      尽管Ripple对自己的天赋感觉好了一些，她仍然希望自己能飞。然后不可能的事发生了。一场地震裂开了学院下方的地面，地下河的水开始淹没低层教室。会飞的龙帮不上忙，因为走廊已经满是水。

      Ripple毫不犹豫地潜了进去。她穿过被淹没的走廊，找到了被困在图书馆的十二名学生，并引导他们通过一条水下隧道到达安全的地方。在黑暗中背着惊恐的学生游泳需要很大的勇气。

