        - '至少一个含方式副词的句子（carefully, gently, eagerly等）'
      rubric:
        content: 'The story creates a vivid magical setting and explores the theme of wishes with depth — showing that the best outcomes are often unexpected.'
        contentZh: '故事创造了一个生动的魔法场景，深入探索了关于愿望的主题——展示最好的结果往往是意想不到的。'
        language: 'Uses rich sensory description for the garden setting and handles past perfect tense accurately.'
        languageZh: '用丰富的感官描写呈现花园场景，准确使用过去完成时。'
    selfCheckList:
      - 'Did I describe the secret garden with sensory details (sight, smell, sound)?'
      - 'Did I show the dragon as a character with personality?'
      - 'Did the wish come true in a surprising way?'
      - 'Does the story explore a deeper theme about wishes or belief?'
    selfCheckListZh:
      - '我是否用感官细节描述了秘密花园（视觉、嗅觉、听觉）？'
      - '我是否把龙塑造为一个有个性的角色？'
      - '愿望是否以令人惊讶的方式实现了？'
      - '故事是否探索了关于愿望或信仰的深层主题？'
    modelAnswer: |
      Nobody believed me when I said there was a garden behind the waterfall where a dragon grew flowers that could grant wishes. My friend Leo laughed the loudest. "Prove it," he said. So one Saturday, I led him along the hidden path.

      We had walked for thirty minutes before we reached the waterfall. I gently pulled aside the curtain of water, revealing a magnificent garden filled with flowers I had never seen in any book. Every blossom glowed a different colour, and the air smelled of honey and rain.

      In the centre sat an enormous green dragon, carefully tending a row of silver roses. "Welcome back," she rumbled. Leo''s mouth dropped open.

      "You may each pick one flower," the dragon said. Leo eagerly picked the brightest one — a golden rose — and wished to be the smartest student in school.

      The transformation was not what he expected. Instead of instantly knowing everything, Leo found himself wanting to read, study, and ask questions. "The flower does not give you knowledge," the dragon explained. "It gives you the desire to learn. That is much more valuable."

      Walking home, Leo was quiet. Then he smiled. "I think I understand now. The best wish is one that changes you from the inside."
    modelAnswerZh: |
      没有人相信我说瀑布后面有一个花园，那里有一条龙种着能许愿的花。我的朋友Leo笑得最大声。"证明给我看，"他说。于是一个周六，我带他沿着隐秘小径走去。

      我们走了三十分钟才到达瀑布。我轻轻拉开水帘，露出一个壮观的花园，里面长满了我在任何书中都没见过的花。每朵花都发出不同颜色的光，空气闻起来有蜂蜜和雨水的味道。

      花园中央坐着一条巨大的绿龙，正仔细地照料一排银色玫瑰。"欢迎回来，"她低沉地说。Leo目瞪口呆。

      "你们每人可以摘一朵花，"龙说。Leo迫不及待地摘了最亮的那朵——一朵金色的玫瑰——许愿成为学校里最聪明的学生。

      变化并不是他预期的那样。Leo没有立刻变得无所不知，而是发现自己开始渴望阅读、学习和提问。"花不会给你知识，"龙解释说。"它给你学习的渴望。那要有价值得多。"

      回家路上，Leo很安静。然后他笑了。"我想我现在明白了。最好的愿望是那种从内心深处改变你的愿望。"

