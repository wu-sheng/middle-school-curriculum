      - '我是否包含了一个需要解决的问题？'
      - '我是否用对话让角色栩栩如生？'
      - '我的结局是否完整且令人满意？'
    modelAnswer: |
      I was reading alone in the library when the characters in my book started climbing out of the pages. First came a tiny knight, no bigger than my thumb, who leapt onto the desk and drew a shining sword. Then a dragon the size of a cat unfolded its wings and yawned.

      "Excuse me," the knight whispered, "but our story has a problem. The enchanted door on page forty-seven has disappeared, and we cannot get home."

      If I could find the missing page, they would be able to return. I searched frantically through the book while the dragon explored the bookshelves, accidentally setting fire to a dictionary. The knight chased it, shouting, "Stop that immediately!"

      I finally noticed that page forty-seven was stuck to page forty-eight. I carefully peeled them apart, and there was the enchanted door, shimmering gold.

      "Thank you," said the knight, bowing deeply. "You have saved our entire kingdom." One by one, the characters climbed back into the book and vanished. The library was silent again.

      I closed the book and smiled. From that day on, every time I read a story, I felt closer to the characters inside — as though they were real friends just waiting for the pages to open.
    modelAnswerZh: |
      我独自在图书馆看书时，书里的角色开始从书页中爬了出来。先出来的是一个小骑士，只有我拇指那么大，他跳上桌子拔出一把闪亮的剑。然后一条猫咪大小的龙展开翅膀打了个哈欠。

      "打扰一下，"骑士低声说，"我们的故事出了问题。第四十七页的魔法门消失了，我们回不了家了。"

      如果我能找到缺失的那一页，他们就能回去了。我疯狂地翻书查找，而龙在书架上探索，不小心烧着了一本词典。骑士追着它喊："马上停下来！"

      我终于发现第四十七页粘在了第四十八页上。我小心翼翼地把它们分开，魔法门就在那里，闪着金色的光芒。

      "谢谢你，"骑士深深鞠了一躬说。"你拯救了我们整个王国。"角色们一个接一个地爬回书里，消失了。图书馆又恢复了安静。

      我合上书，微笑了。从那天起，每次我读一个故事，都觉得和里面的角色更亲近了——仿佛他们是真正的朋友，只是在等着书页被翻开。

  - id: W025
    type: story
    title: 'The Dragon''s Secret Garden'
    titleZh: '龙的秘密花园'
    prompt: 'Your story must begin with this sentence: ''Nobody believed me when I said there was a garden behind the waterfall where a dragon grew flowers that could grant wishes.'''
    promptZh: '你的故事必须以这句话开头：''没有人相信我说瀑布后面有一个花园，那里有一条龙种着能许愿的花。'''
    targetWords: '140-190'
