    modelAnswer: |
      Cities around the world face a difficult question: should they preserve old buildings or replace them with new ones? In my view, preserving our architectural heritage is extremely important, although there are times when replacement may be necessary.

      On the one hand, old buildings are irreplaceable pieces of history. They tell the story of how people lived, worked, and celebrated in the past. The Forbidden City in Beijing, for example, teaches us about Chinese imperial culture, whereas a modern glass tower cannot convey the same sense of history. Furthermore, historic buildings attract tourists, which boosts the local economy and creates jobs.

      On the other hand, some old buildings are genuinely unsafe or too expensive to maintain. Even though we may wish to keep every historic structure, this is not always practical. Having said that, renovation often provides a better solution than demolition. Many cities have transformed old factories into art galleries, abandoned churches into community centres, and disused railway stations into beautiful public spaces.

      In conclusion, I believe that preserving old buildings should always be the first choice. Although some buildings cannot be saved, we should make every effort to protect our heritage, because once a historic building is demolished, its story is lost forever.
    modelAnswerZh: |
      世界各地的城市面临一个困难的问题：应该保存旧建筑还是用新建筑替换？在我看来，保存我们的建筑遗产非常重要，尽管有时替换可能是必要的。

      一方面，旧建筑是不可替代的历史片段。它们讲述了人们过去如何生活、工作和庆祝的故事。例如，北京的紫禁城教我们了解中国的皇家文化，而一座现代玻璃塔无法传达相同的历史感。此外，历史建筑吸引游客，促进当地经济并创造就业机会。

      另一方面，一些旧建筑确实不安全或维护成本太高。即使我们希望保留每座历史建筑，这并不总是切实可行的。话虽如此，翻新通常比拆除提供了更好的解决方案。许多城市已经将旧工厂改造成艺术画廊，废弃的教堂改造成社区中心，废弃的火车站改造成美丽的公共空间。

      总之，我认为保存旧建筑应该始终是首选。虽然有些建筑无法挽救，但我们应该尽一切努力保护我们的遗产，因为一旦历史建筑被拆除，它的故事就永远消失了。
