    modelAnswer: |
      I recently read "Iggy Peck, Architect" by Andrea Beaty, and I think it is one of the most inspiring picture books about building and creativity that I have ever come across.

      The book tells the story of Iggy Peck, a boy who has loved building things since he was very young. He builds towers from fruit, bridges from mud, and even a full-size church from chalk and apples. Despite his obvious talent, his teacher Miss Lila Greer hates buildings and bans Iggy from building anything in class.

      What I particularly enjoyed was the turning point of the story. When the class goes on a field trip and a bridge collapses, it is Iggy who saves the day by building a new bridge from the materials around him. The illustrations that show Iggy creating structures from everyday objects are absolutely wonderful and full of detail.

      I would recommend this book to anyone aged 5 to 10 who loves making things. It sends a powerful message: never give up on what you are passionate about, because the world needs people who can build, create, and imagine. It would also make an excellent gift for any child who enjoys LEGO, Minecraft, or drawing buildings.
    modelAnswerZh: |
      我最近读了 Andrea Beaty 的《建筑师伊吉·佩克》，我觉得它是我见过的关于建造和创造力的最鼓舞人心的绘本之一。

      这本书讲述了伊吉·佩克的故事，一个从小就热爱建造东西的男孩。他用水果建塔，用泥巴搭桥，甚至用粉笔和苹果建了一座教堂。尽管他天赋明显，他的老师 Lila Greer 女士讨厌建筑物，禁止伊吉在课堂上建造任何东西。

      我特别喜欢的是故事的转折点。当班级去实地考察时一座桥塌了，是伊吉用周围的材料建造了一座新桥拯救了大家。展示伊吉用日常物品创造建筑的插图绝对精彩，充满细节。

      我推荐这本书给任何5到10岁喜欢制作东西的人。它传达了一个强有力的信息：永远不要放弃你热衷的事情，因为世界需要能够建造、创造和想象的人。对于任何喜欢乐高、我的世界或画建筑的孩子来说，它也是一份很好的礼物。

