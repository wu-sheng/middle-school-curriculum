      Last Saturday, my family joined a sunrise bird-watching walk organised by the Beijing Birdwatching Society at the Olympic Forest Park. It was an unforgettable experience that I want everyone to know about.

      We met at 6:30 AM near the south entrance. Our guide, Dr. Li, provided binoculars and a bird identification booklet. Over two hours, we spotted 23 different species, including a beautiful kingfisher diving for fish. The most exciting moment was when Dr. Li pointed out a rare grey heron building its nest in a tall tree. He explained how herons choose locations near water and use branches woven together for strength.

      Dr. Li was incredibly knowledgeable and patient with all our questions. He made learning about birds feel like a treasure hunt rather than a lesson. I wish we could have stayed longer — two hours passed incredibly quickly. Consequently, I would suggest the organisers offer a longer, three-hour option for future walks.

      I would recommend this walk to any family, especially those with children aged 6 and above. Bring warm clothes (it is cold at sunrise!), comfortable shoes, and a water bottle. The walk is free but you need to register online. I am already looking forward to the next one!
    modelAnswerZh: |
      上周六，我的家人参加了北京观鸟协会在奥林匹克森林公园组织的日出观鸟漫步。这是一次难忘的经历，我想让每个人都知道。

      我们早上6:30在南门附近集合。我们的导游李博士提供了望远镜和一本鸟类识别手册。在两个小时内，我们发现了23种不同的鸟类，包括一只漂亮的翠鸟在潜水捕鱼。最激动人心的时刻是李博士指出了一只罕见的灰鹭正在一棵高树上筑巢。他解释了鹭如何选择水边的位置，并使用编织在一起的树枝来增强强度。

      李博士知识渊博，对我们所有的问题都很有耐心。他让学习鸟类知识感觉像寻宝而不是上课。我希望我们能待更久——两个小时过得太快了。因此，我建议组织者为未来的漫步提供更长的三小时选项。

      我会向任何家庭推荐这次漫步，尤其是有6岁及以上孩子的家庭。带上暖和的衣服（日出时很冷！）、舒适的鞋子和水壶。漫步是免费的，但需要在线注册。我已经期待下一次了！
