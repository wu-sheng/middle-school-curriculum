tasks:
  - id: W014
    type: story
    title: 'The Missing Library Book'
    titleZh: '消失的图书馆藏书'
    prompt: 'Your story must begin with this sentence: ''When I opened the library door on Monday morning, I noticed that the oldest book in the collection had disappeared.'''
    promptZh: '你的故事必须以这句话开头：''周一早上我推开图书馆的门时，发现馆藏中最古老的那本书不见了。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe the library and the missing book. Who discovers it is gone?'
        openingZh: '描述图书馆和失踪的书。谁发现书不见了？'
        development: 'What clues do you find? A bookmark on the floor? A window left open?'
        developmentZh: '你找到了什么线索？地上的书签？没关的窗户？'
        climax: 'You follow the clues and discover something unexpected about who took the book.'
        climaxZh: '你顺着线索追查，发现了关于拿走书的人的意外真相。'
        resolution: 'The mystery is solved. Was it a misunderstanding? How does everyone feel?'
        resolutionZh: '谜团解开了。是一场误会吗？大家有什么感受？'
      mustUseWords:
        - 'investigate'
        - 'suspicious'
        - 'clue'
        - 'evidence'
      mustUseStructure:
        - 'At least one past perfect sentence (had + past participle)'
        - 'At least one relative clause (who/which/where)'
      mustUseStructureZh:
        - '至少一个过去完成时句子（had + 过去分词）'
        - '至少一个定语从句（who/which/where）'
      rubric:
        content: 'The story has a clear mystery, logical clues, and a satisfying resolution.'
        contentZh: '故事有清晰的谜团、合理的线索和令人满意的结局。'
        language: 'Uses varied vocabulary, correct past tenses, and descriptive details to build suspense.'
        languageZh: '使用丰富的词汇、正确的过去时态和描写细节来营造悬念。'
    selfCheckList:
      - 'Did I describe the setting clearly?'
      - 'Did I include at least two clues in the story?'
      - 'Did I build suspense before revealing the answer?'
      - 'Are my verb tenses consistent?'
    selfCheckListZh:
      - '我是否清楚地描述了场景？'
      - '我是否在故事中包含了至少两条线索？'
      - '我是否在揭示答案前制造了悬念？'
      - '我的动词时态是否一致？'
    modelAnswer: |
      When I opened the library door on Monday morning, I noticed that the oldest book in the collection had disappeared. The glass case where it usually sat was empty, and there were muddy footprints on the carpet.

      I decided to investigate. The first clue was a small yellow bookmark on the floor near the window, which had been left slightly open. The bookmark had the initials "T.W." written on it. That was suspicious — only five people had keys to the library.

      I asked the librarian, Mrs Chen, who "T.W." might be. Her eyes widened. "That must be Tom Wheeler — he volunteers here on Sundays!" We found Tom in the art room. He looked embarrassed when he saw the evidence.

      "I'm so sorry," Tom said quietly. "I borrowed it to draw the illustrations for my project. I was going to return it today." He pulled the precious book from his bag, perfectly safe.

      Mrs Chen smiled. "Next time, just ask." The mystery was solved, and I learned that not every suspect is a villain — sometimes they are just forgetful artists.
    modelAnswerZh: |
      周一早上我推开图书馆的门时，发现馆藏中最古老的那本书不见了。它通常放着的玻璃柜是空的，地毯上还有泥脚印。

      我决定调查。第一条线索是窗户旁边地上的一枚黄色小书签，窗户微微开着。书签上写着"T.W."的缩写。这很可疑——只有五个人有图书馆的钥匙。

      我问图书管理员陈老师，"T.W."可能是谁。她睁大了眼睛。"那一定是汤姆·惠勒——他周日在这里做志愿者！"我们在美术教室找到了汤姆。他看到证据时一脸尴尬。

      "真的很抱歉，"汤姆轻声说。"我借去画我课题里的插图了。我本来打算今天还的。"他从书包里拿出那本珍贵的书，完好无损。

      陈老师笑了笑。"下次直接说一声就好。"谜团解开了，我也明白了不是每个嫌疑人都是坏人——有时候他们只是粗心的艺术家。

  - id: W015
    type: story
    title: 'The Secret Code in the Playground'
    titleZh: '操场上的神秘密码'
    prompt: 'Your story must begin with this sentence: ''During break time, my friend Mia found a folded piece of paper with a strange code written on it.'''
    promptZh: '你的故事必须以这句话开头：''课间休息时，我的朋友米娅发现了一张写着奇怪密码的折叠纸条。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe how Mia finds the note and what the code looks like.'
        openingZh: '描述米娅是怎么发现纸条的，密码长什么样。'
        development: 'How do you work together to crack the code? What does it say?'
        developmentZh: '你们如何合作破译密码？密码说了什么？'
        climax: 'The decoded message leads you somewhere surprising in the school.'
        climaxZh: '解码后的信息指引你们去了学校里一个意想不到的地方。'
        resolution: 'What do you discover at the end? Who left the code and why?'
        resolutionZh: '最后你们发现了什么？谁留下的密码，为什么？'
      mustUseWords:
        - 'decode'
        - 'mysterious'
        - 'footprint'
        - 'witness'
      mustUseStructure:
        - 'At least one piece of direct speech with correct punctuation'
        - 'At least one adverbial clause of time (when/while/after)'
      mustUseStructureZh:
        - '至少一句标点正确的直接引语'
        - '至少一个时间状语从句（when/while/after）'
      rubric:
        content: 'The story presents a believable code-cracking puzzle with a clear beginning, middle, and end.'
        contentZh: '故事呈现了一个可信的密码破解谜题，有清晰的开头、中间和结尾。'
        language: 'Uses past tenses accurately and includes vivid description of the characters working together.'
        languageZh: '准确使用过去时态，生动描写了人物合作的过程。'
    selfCheckList:
      - 'Did I explain what the code looked like?'
      - 'Did I show how the characters solved the puzzle step by step?'
      - 'Did I create a surprising ending?'
      - 'Did I use correct punctuation in dialogue?'
    selfCheckListZh:
      - '我是否描述了密码的样子？'
      - '我是否展示了人物一步步解谜的过程？'
      - '我是否创造了一个出人意料的结局？'
      - '我的对话标点是否正确？'
    modelAnswer: |
      During break time, my friend Mia found a folded piece of paper with a strange code written on it. The paper had numbers and arrows instead of words: "14-5-23 7-1-18-4-5-14 → 2-5-8-9-14-4 20-8-5 19-8-5-4."

      "This is mysterious," Mia whispered. After thinking carefully, I realised each number matched a letter of the alphabet — A was 1, B was 2, and so on. We began to decode it during lunch. The message read: "New garden → behind the shed."

      When we reached the old shed behind the sports field, we noticed a fresh footprint in the mud. Someone had been here recently. We peeked behind the shed and gasped. A small patch of sunflowers was growing in neat rows, with a hand-painted sign that said "Secret Garden Club."

      Our science teacher, Mr Park, appeared with a watering can. "You cracked my code! You are the first witness to our surprise project," he said, smiling. "I planted these with the gardening club. We wanted students to discover it like a treasure hunt."

      Mia and I joined the club that same week. Sometimes the best mysteries lead to something wonderful.
    modelAnswerZh: |
      课间休息时，我的朋友米娅发现了一张写着奇怪密码的折叠纸条。纸上没有文字，只有数字和箭头："14-5-23 7-1-18-4-5-14 → 2-5-8-9-14-4 20-8-5 19-8-5-4。"

      "好神秘啊，"米娅低声说。仔细想了想后，我意识到每个数字对应字母表中的一个字母——A是1，B是2，以此类推。午饭时我们开始解码。信息写的是："新花园→棚子后面。"

      当我们走到运动场后面的旧棚子时，注意到泥地上有一个新鲜的脚印。有人最近来过这里。我们从棚子后面探头一看，惊呆了。一小片向日葵整齐地生长着，旁边还有一块手绘的牌子写着"秘密花园俱乐部"。

      我们的科学老师朴老师拿着浇水壶出现了。"你们破解了我的密码！你们是我们惊喜项目的第一批见证者，"他笑着说。"这是我和园艺社一起种的。我们想让同学们像寻宝一样发现它。"

      米娅和我那周就加入了俱乐部。有时候最好的谜团会通向美好的事物。

  - id: W016
    type: story
    title: 'The Vanishing Painting'
    titleZh: '消失的画作'
    prompt: 'Your story must begin with this sentence: ''Nobody could explain how the painting had vanished from the school hall overnight.'''
    promptZh: '你的故事必须以这句话开头：''没有人能解释那幅画是怎么在一夜之间从学校大厅消失的。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe the painting and the scene when people discover it is missing.'
        openingZh: '描述那幅画，以及人们发现它消失时的场景。'
        development: 'You start looking for clues. What do you find near the empty wall?'
        developmentZh: '你开始寻找线索。在空墙附近你发现了什么？'
        climax: 'A surprising detail points to an unexpected person. What happens?'
        climaxZh: '一个令人意外的细节指向了一个意想不到的人。发生了什么？'
        resolution: 'The truth is revealed. Where was the painting and why was it moved?'
        resolutionZh: '真相揭晓。画在哪里？为什么被移走了？'
      mustUseWords:
        - 'detective'
        - 'clue'
        - 'vanish'
        - 'suspect'
      mustUseStructure:
        - 'At least one passive voice sentence (was/were + past participle)'
        - 'At least one sentence using reported speech'
      mustUseStructureZh:
        - '至少一个被动语态句子（was/were + 过去分词）'
        - '至少一个间接引语句子'
      rubric:
        content: 'The story includes a genuine mystery with at least two red herrings or false leads before the resolution.'
        contentZh: '故事包含一个真正的谜团，在揭示真相前至少有两个误导或虚假线索。'
        language: 'Demonstrates accurate use of passive voice and reported speech in a narrative context.'
        languageZh: '在叙事语境中准确运用了被动语态和间接引语。'
    selfCheckList:
      - 'Did I describe the missing painting clearly?'
      - 'Did I include at least one false lead before the real answer?'
      - 'Did I use passive voice at least once?'
      - 'Does my story have a clear beginning, middle, and end?'
    selfCheckListZh:
      - '我是否清楚地描述了失踪的画？'
      - '我是否在真正的答案之前设置了至少一个虚假线索？'
      - '我是否至少使用了一次被动语态？'
      - '我的故事是否有清晰的开头、中间和结尾？'
    modelAnswer: |
      Nobody could explain how the painting had vanished from the school hall overnight. The large watercolour of our school garden, which had been painted by a former student, was gone. Only an empty hook remained on the wall.

      I decided to play detective. My first clue was a tiny drop of blue paint on the floor. I followed the trail to the art room, where the door had been left unlocked. I suspected the art teacher, Miss Liu, but she told me she had been at home all evening. Then I noticed something else — a note on the art room desk said the painting was being cleaned.

      The headteacher, Mr Wang, announced at assembly that the painting had been taken down for repair. He said that the frame was broken and needed fixing before the school open day. The caretaker had moved it to his workshop on Sunday night.

      Everyone laughed when they heard the truth. The suspect was actually the caretaker, who was trying to do something kind. I learned that a good detective should check all the facts before jumping to conclusions. The painting was returned the next week, looking better than ever.
    modelAnswerZh: |
      没有人能解释那幅画是怎么在一夜之间从学校大厅消失的。那幅由一位毕业生画的大型水彩校园花园图不见了。墙上只剩下一个空空的挂钩。

      我决定当一回侦探。第一条线索是地板上一滴小小的蓝色颜料。我沿着痕迹走到美术教室，发现门没有锁。我怀疑美术老师刘老师，但她告诉我她整个晚上都在家里。然后我注意到另一件事——美术教室桌上有一张字条，写着画正在清洁中。

      校长王老师在集会上宣布，那幅画被取下来修理了。他说画框坏了，需要在学校开放日前修好。管理员周日晚上把它搬到了他的工作间。

      大家听到真相后都笑了。嫌疑人其实是管理员，他只是想做一件好事。我明白了一个好侦探应该在下结论之前核实所有事实。那幅画在第二周归还了，看起来比以前更好了。

  - id: W017
    type: story
    title: 'The Strange Footprints in the Snow'
    titleZh: '雪地里的奇怪脚印'
    prompt: 'Your story must begin with this sentence: ''After the first snowfall of winter, I spotted a trail of unusual footprints leading from the school gate to the old science building.'''
    promptZh: '你的故事必须以这句话开头：''冬天第一场雪后，我发现一串奇怪的脚印从校门口一直延伸到旧科学楼。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe the snowy morning and the unusual footprints you discover.'
        openingZh: '描述那个下雪的早晨和你发现的奇怪脚印。'
        development: 'You follow the footprints. What clues do they give you along the way?'
        developmentZh: '你沿着脚印走。一路上它们给了你什么线索？'
        climax: 'You reach the science building and find something unexpected inside.'
        climaxZh: '你到达科学楼，在里面发现了意想不到的东西。'
        resolution: 'The mystery of the footprints is explained. How do you feel?'
        resolutionZh: '脚印的谜团被解开了。你有什么感受？'
      mustUseWords:
        - 'trace'
        - 'peculiar'
        - 'examine'
        - 'suspect'
      mustUseStructure:
        - 'At least one past continuous sentence (was/were + -ing)'
        - 'At least one sentence with an adverb of manner (carefully, quietly, etc.)'
      mustUseStructureZh:
        - '至少一个过去进行时句子（was/were + -ing）'
        - '至少一个含有方式副词的句子（carefully, quietly 等）'
      rubric:
        content: 'The story uses the snowy setting effectively and the footprint trail creates genuine curiosity.'
        contentZh: '故事有效利用了雪景环境，脚印线索制造了真正的好奇心。'
        language: 'Uses sensory details (sight, sound, touch) to describe the winter setting and build atmosphere.'
        languageZh: '运用感官细节（视觉、听觉、触觉）描写冬日环境，营造氛围。'
    selfCheckList:
      - 'Did I describe the snowy scene using sensory details?'
      - 'Did I follow the footprints logically from start to finish?'
      - 'Did I include a surprising twist?'
      - 'Did I use past continuous correctly?'
    selfCheckListZh:
      - '我是否用感官细节描述了雪景？'
      - '我是否从头到尾合理地追踪了脚印？'
      - '我是否包含了一个出人意料的转折？'
      - '我是否正确使用了过去进行时？'
    modelAnswer: |
      After the first snowfall of winter, I spotted a trail of unusual footprints leading from the school gate to the old science building. They were peculiar — much larger than normal shoes and spaced far apart, as if someone had been taking giant steps.

      I decided to examine them carefully. Beside the footprints, I noticed a trace of orange powder in the snow. My classmate Leo was walking past, so I called him over. "These don't look like normal shoes," he said, frowning. We followed the trail quietly across the white playground.

      The footprints led to the back door of the science building, which was slightly open. Inside, we heard music playing softly. We peeked around the corner and gasped. Our PE teacher, Coach Zhang, was wearing enormous dinosaur slippers and painting scenery for the school play. Orange chalk dust covered his hands.

      "You caught me!" he laughed. "I suspect you two are the best detectives in school." He explained that he was preparing a surprise backdrop and had come in early before anyone arrived.

      We promised to keep his secret. As we walked back through the snow, I smiled — the strangest mysteries sometimes have the funniest answers.
    modelAnswerZh: |
      冬天第一场雪后，我发现一串奇怪的脚印从校门口一直延伸到旧科学楼。它们很奇特——比普通鞋子大得多，间距也很远，好像有人在迈大步走。

      我决定仔细检查。脚印旁边，我注意到雪地里有一道橙色粉末的痕迹。同学小李正好路过，我叫住了他。"这看起来不像普通的鞋子，"他皱着眉头说。我们安静地沿着脚印穿过白色的操场。

      脚印通向科学楼的后门，门微微开着。我们在里面听到轻柔的音乐声。探头一看，我们都惊呆了。我们的体育老师张教练穿着巨大的恐龙拖鞋，正在画校园话剧的布景。橙色的粉笔灰沾满了他的双手。

      "被你们抓到了！"他笑着说。"我怀疑你们俩是学校里最厉害的侦探。"他解释说他正在准备一个惊喜布景，趁大家还没来就提前过来了。

      我们答应替他保密。走回雪地里时，我笑了——最奇怪的谜团有时候有最搞笑的答案。

