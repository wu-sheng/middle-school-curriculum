    modelAnswer: |
      For three days in a row, someone had been stealing sandwiches from the Year 5 lunch boxes, and I was determined to catch the thief. My best friend's cheese sandwich vanished on Monday, then two more disappeared on Tuesday and Wednesday.

      I made a plan. In order to observe the cloakroom without being seen, I hid behind the coat rack during morning break on Thursday. At first, I suspected Tom, who always arrived early. But Tom walked straight past the lunch boxes — he had a perfect alibi, as he was in the music room.

      Then I saw a small figure creep in. It was Amy from Year 3, who looked nervous. She opened a blue lunch box, took out a sandwich, and put it in her pocket. She looked guilty but also sad.

      I stepped out gently so that I would not frighten her. "Amy, why are you taking the sandwiches?" I asked softly. Her eyes filled with tears. "My mum forgot to pack my lunch this week. I was too embarrassed to tell anyone."

      I took Amy to our class teacher, who arranged school meals for her. The other students were not angry — they were kind. Sometimes a detective discovers not a villain, but someone who needs help.
    modelAnswerZh: |
      连续三天，有人一直在偷五年级同学午餐盒里的三明治，而我决心要抓住这个小偷。我好朋友的芝士三明治周一不见了，周二和周三又有两个消失了。

      我制定了一个计划。为了在不被发现的情况下观察衣帽间，周四课间休息时我躲在了衣架后面。起初，我怀疑总是早到的汤姆。但汤姆径直走过了午餐盒——他有完美的不在场证明，因为他当时在音乐教室。

      然后我看到一个小小的身影溜了进来。是三年级的小艾米，她看起来很紧张。她打开一个蓝色午餐盒，拿出一个三明治放进口袋。她看起来既内疚又难过。

      我轻轻地走出来，以免吓到她。"艾米，你为什么拿三明治呢？"我轻声问。她的眼眶红了。"这周我妈妈忘了给我装午餐。我太不好意思告诉别人了。"

      我带艾米去找了班主任，老师安排了学校食堂的饭菜给她。其他同学没有生气——他们很友善。有时候侦探发现的不是坏人，而是一个需要帮助的人。

