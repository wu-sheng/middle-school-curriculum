      - '我是否一步步展示了调查过程？'
      - '我是否为谜团给出了合理的解释？'
      - '我是否使用了条件句和过去完成时？'
    modelAnswer: |
      Everyone was talking about Room 12 — it had been locked for a week, and strange noises came from inside every night. One rumour said a ghost lived there. Another claimed the headteacher had hidden something valuable inside.

      My friend Sam and I decided to investigate. If we waited until after school, we thought, the building would be quiet enough to hear everything. At four o'clock, we crept down the corridor. I had borrowed a spare key from the caretaker's cupboard earlier that day.

      We unlocked the door slowly and stepped inside. The room was dark, but we could hear a soft scratching sound. Sam switched on the light — and we both burst out laughing. A large ginger cat was sitting on the teacher's desk, batting a pencil across the surface. Beside it lay three kittens in a cardboard box.

      The evidence was clear: the cat had climbed through a broken window and made a nest. The scratching noises were just the kittens playing at night. Unless someone fixed the window, the cats would keep coming back.

      We told the caretaker, who repaired the window and found the cat family a home. The solution to the mystery was far cuter than anyone had imagined.
    modelAnswerZh: |
      所有人都在谈论12号教室——它已经锁了一个星期，而且每天晚上里面都传出奇怪的声音。有传言说里面住着鬼。还有人说校长在里面藏了什么贵重物品。

      我和朋友小明决定去调查。我们想，如果等到放学后，教学楼会安静到能听清一切。四点钟，我们悄悄走过走廊。当天早些时候，我从管理员的柜子里借了一把备用钥匙。

      我们慢慢打开了门，走了进去。房间很暗，但我们能听到轻轻的抓挠声。小明开了灯——我们俩都笑了。一只大橘猫坐在老师的桌子上，用爪子拨弄着一支铅笔。旁边的纸箱里躺着三只小猫。

      证据很清楚：那只猫从破窗户爬进来，筑了一个窝。抓挠声只是小猫们在晚上玩耍。除非有人修好窗户，猫咪们还会继续来。

      我们告诉了管理员，他修好了窗户，还给猫咪一家找了个家。这个谜团的答案比任何人想象的都要可爱。

  - id: W019
    type: story
    title: 'The Disappearing Sandwiches'
    titleZh: '消失的三明治'
