    modelAnswer: |
      While tidying the old cupboard in our classroom, I found a hand-drawn map with a big red X marked in the school garden. The paper was yellow and wrinkled. Someone must have hidden it there years ago.

      I showed the map to my friend Zara, who loved puzzles. We examined every clue on the paper — there were tiny drawings of a fountain, a bench, and an old tree. The red X was between the bench and the tree.

      After school, we hurried to the garden. The bench that was drawn on the map still stood in the same spot. We used a stick to dig carefully at the X. After ten minutes, we hit something hard. It was a small metal tin, buried under the soil.

      Inside the tin, we found three glass marbles, a friendship bracelet, and a note. The note read: "Time capsule — Class 5B, 2015. Open in ten years!" A detective would say we had solved the case. The map must have been drawn by students who wanted future children to discover their treasure.

      We told our teacher, who contacted the old students. They were amazed their capsule had finally been found. Zara and I decided to bury our own time capsule — with a much harder map.
    modelAnswerZh: |
      整理教室旧橱柜时，我发现了一张手绘地图，学校花园里标着一个大大的红色X。纸张发黄起皱。一定是有人多年前藏在那里的。

      我把地图拿给爱好解谜的朋友扎拉看。我们仔细检查了纸上的每一个线索——上面画着一个小喷泉、一张长椅和一棵老树。红色X在长椅和老树之间。

      放学后，我们赶到花园。地图上画的那张长椅还在原来的位置。我们用棍子小心地在X处挖掘。十分钟后，碰到了一个硬东西。那是一个小铁盒，埋在土里。

      铁盒里有三颗玻璃弹珠、一条友谊手环和一张纸条。纸条上写着："时间胶囊——2015年5B班。十年后打开！"侦探会说我们已经破了案。这张地图一定是那些想让未来的孩子发现他们宝藏的学生画的。

      我们告诉了老师，老师联系了那些毕业生。他们很惊喜自己的时间胶囊终于被发现了。扎拉和我也决定埋一个自己的时间胶囊——当然配一张更难的地图。

