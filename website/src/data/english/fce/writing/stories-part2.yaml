    modelAnswer: |
      On Friday morning, every student in our class opened their homework folder and found someone else's work inside. The classroom erupted in chaos. "Who has my maths sheet?" shouted Ben. "This isn't my essay!" cried Sophie.

      Our teacher asked us to calm down and figure out what had happened. I noticed something suspicious — every folder had been swapped with the person sitting one desk to the left. I could deduce a pattern: whoever mixed them up had simply shifted every folder by one position.

      "Who was the last person in the classroom yesterday?" I asked. Several people remembered seeing Jake, who stayed behind to tidy the desks. Jake's face turned red. He did not have a good alibi.

      It turned out that Jake had accidentally knocked all the folders off the shelf while cleaning. He had been too embarrassed to tell anyone, so he quickly put them back — but in the wrong order. He had not realised each folder looked different.

      Everyone laughed, and Jake apologised. Our teacher made him a witness to his own mistake. We sorted out the folders in five minutes. The lesson was simple: if you make a mistake, just be honest — it saves everyone a lot of trouble.
    modelAnswerZh: |
      周五早上，我们班每个人打开作业夹，发现里面装的都是别人的作业。教室立刻炸开了锅。"谁拿了我的数学卷？"小本大叫。"这不是我的作文！"小苏喊道。

      老师让我们冷静下来，想想到底发生了什么。我注意到一件可疑的事——每个人的作业夹都和左边桌子那个人的交换了。我推断出一个规律：搞混作业夹的人只是把每个夹子往左移了一个位置。

      "昨天谁最后一个离开教室的？"我问道。好几个人记得看到杰克留下来整理桌子。杰克的脸红了。他没有很好的不在场证明。

      结果发现，杰克在打扫时不小心把所有作业夹从架子上碰掉了。他太不好意思告诉别人了，就赶紧放了回去——但顺序全错了。他没意识到每个作业夹长得不一样。

      大家都笑了，杰克道了歉。老师让他成为自己错误的见证者。我们五分钟就把作业夹整理好了。教训很简单：犯了错就老实说——这能省去大家很多麻烦。
