      - 'Did I suggest a solution (education, not banning)?'
      - 'Does my conclusion leave the reader thinking?'
    selfCheckListZh:
      - '我是否呈现了好处和风险？'
      - '我是否使用了正式的非人称结构？'
      - '我是否提出了解决方案（教育而非禁止）？'
      - '我的结论是否让读者思考？'
    modelAnswer: |
      Social media has become a normal part of life for millions of young people. But is it helping them or harming them? It is widely believed that social media is entirely negative, but the reality is more complex.

      On the positive side, social media gives young people a voice. A teenager who cares about the environment can create content that reaches thousands. Online communities connect children with shared interests, and platforms increasingly serve as educational tools. These benefits are real and significant.

      However, the risks cannot be ignored. Cyberbullying is a growing problem that follows children everywhere, even into their bedrooms. Platforms are deliberately designed to be addictive, and unrealistic body images can be detrimental to young people's self-esteem. Despite these concerns, banning social media entirely is not the answer.

      In conclusion, I believe the solution is education, not prohibition. Schools should teach "digital citizenship" — helping children use social media safely, critically, and responsibly. Social media, like fire, is a powerful tool that must be handled with care.
    modelAnswerZh: |
      社交媒体已经成为数百万年轻人生活中正常的一部分。但它是在帮助他们还是伤害他们？人们普遍认为社交媒体完全是消极的，但现实更加复杂。

      从积极面来说，社交媒体给年轻人一个声音。一个关心环境的青少年可以创作触达数千人的内容。在线社区连接有共同兴趣的孩子，平台越来越多地作为教育工具。这些好处是真实而重要的。

      然而，风险不容忽视。网络欺凌是一个日益严重的问题，跟随孩子到任何地方，甚至到他们的卧室。平台被故意设计成令人上瘾的，不切实际的身体形象可能对年轻人的自尊心有害。尽管存在这些担忧，完全禁止社交媒体不是答案。

      总之，我认为解决方案是教育，而不是禁止。学校应该教授"数字公民"——帮助孩子安全、批判性地、负责任地使用社交媒体。社交媒体像火一样，是一种必须小心使用的强大工具。

  - id: W077
    type: essay
    title: 'Online Learning vs Classroom Learning'
    titleZh: '在线学习vs课堂学习'
    prompt: 'Some people think online learning is better than traditional classroom learning. Others disagree. Which do you prefer and why? Write an essay.'
    promptZh: '有人认为在线学习比传统课堂学习更好。也有人不同意。你更喜欢哪种，为什么？写一篇议论文。'
    targetWords: '140-190'
