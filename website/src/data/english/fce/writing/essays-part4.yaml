    selfCheckListZh:
      - '我是否公平地比较了两种学习方式？'
      - '我是否用理由解释了我的偏好？'
      - '我是否承认了另一种方法的优势？'
      - '我的结论是否提出了实际的解决方案？'
    modelAnswer: |
      The COVID-19 pandemic forced millions of students to learn from home. This experience sparked an important debate: is online learning better, worse, or simply different from traditional classroom learning?

      Online learning offers undeniable advantages. Students can learn at their own pace, rewinding video lessons when needed. It also makes education more accessible — a student in a remote village can access the same courses as one in a major city. However, flexibility alone does not guarantee good learning.

      The classroom offers something screens cannot easily replicate: human interaction. The energy of a group discussion, a teacher noticing a struggling student, and the friendships formed during break time are all crucial for children's development. Research shows that students who learned entirely online during the pandemic felt lonelier and less motivated than those in physical classrooms.

      In conclusion, the future of education should involve a blend of both approaches. Technology should enhance teaching — with recorded lessons for revision and interactive platforms for practice — while preserving what makes classrooms special: the irreplaceable human connection.
    modelAnswerZh: |
      COVID-19大流行迫使数百万学生在家学习。这段经历引发了一场重要的辩论：在线学习比传统课堂学习更好、更差还是仅仅不同？

      在线学习有不可否认的优势。学生可以按自己的节奏学习，需要时回放视频课程。它还使教育更容易获得——偏远村庄的学生可以获得与大城市学生同样的课程。然而，仅有灵活性并不能保证好的学习效果。

      教室提供了屏幕无法轻易复制的东西：人际互动。小组讨论的活力、教师注意到有困难的学生、课间形成的友谊，对孩子的发展都至关重要。研究表明，大流行期间完全在线学习的学生比在实体教室中的学生感到更孤独、更缺乏动力。

      总之，教育的未来应该融合两种方法。技术应该增强教学——用录制课程进行复习和用互动平台进行练习——同时保留课堂的特殊之处：不可替代的人际联系。
