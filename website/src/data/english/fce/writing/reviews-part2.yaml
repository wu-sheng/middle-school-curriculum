      节目跟随 Mildred Hubble，一个普通女孩意外降落在 Cackle 小姐的女巫学院。Mildred 热情但笨手笨脚，她的咒语几乎总是出错。每一集将魔法冒险与让人感同身受的学校问题结合——友谊纠纷、严厉的老师和融入集体的压力。

