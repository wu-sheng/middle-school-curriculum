      续集能超越原作吗？在《玩具总动员2》的情况下，答案是响亮的"是"。这部皮克斯经典将第一部的魔力提升到新的高度，证明有时最好的故事排在第二位。

      第一部玩具总动员聚焦于胡迪和巴斯光年之间的竞争，而续集探索了一个更深的主题：当一个玩具不再被玩耍时会怎样？胡迪被一个玩具收藏家偷走，他计划把胡迪卖到日本的博物馆。巴斯和伙伴们必须去救他——但真正的冲突在胡迪的内心。

      与原作相比，《玩具总动员2》具有更多的情感深度和出色的角色发展。翠丝回忆被主人抛弃的场景是整个皮克斯系列中最感人的时刻。与主要是伙伴喜剧的第一部不同，这部续集让你又笑又哭。动画也明显更加精致，纹理更丰富，背景更细致。

      我建议先看原作来了解角色，但《玩具总动员2》独立观看也很好。这是每个曾经爱过一个玩具的人的必看之作——也就是每个人。

