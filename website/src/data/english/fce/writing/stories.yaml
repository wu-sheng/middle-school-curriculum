        opening: 'Explain how you got locked in the museum.'
        openingZh: '解释你是如何被锁在博物馆里的。'
        development: 'What do you see and hear as you explore the dark museum?'
        developmentZh: '当你在黑暗的博物馆里探索时，你看到和听到了什么？'
        climax: 'What strange or exciting event happens?'
        climaxZh: '发生了什么奇怪或令人兴奋的事情？'
