      The robot I built in my garage suddenly opened its eyes and said, "Hello, friend." I had spent months connecting wires and programming code, but I never expected it would actually work. The small silver robot, whom I named Sparky, was the most brilliant invention I had ever created.

      Sparky would follow me everywhere. He helped me tidy my room, carried my school bag, and even told jokes — although his humour was worse than my dad's. He used to wait by the front door every afternoon until I came home.

      Unfortunately, one rainy Tuesday, Sparky started to malfunction. His left arm spun in circles and he kept repeating "banana" for no reason. Sparks flew from his chest panel. I was terrified I would lose my friend.

      I rushed him back to the garage and opened his circuits. A tiny drop of rainwater had damaged one chip. I carefully replaced it with a spare, held my breath, and pressed the restart button.

      Sparky's eyes flickered open. "Did I miss anything?" he asked cheerfully. I hugged him — even though he was made of cold metal, he was the warmest friend I had ever known.
