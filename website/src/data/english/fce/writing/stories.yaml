    modelAnswer: |
      I woke up that morning and discovered I could fly. At first, I floated just a few centimetres above my bed. Then I rose higher, bumping my head on the ceiling. It was incredible!

      I sneaked out of the window and soared above the rooftops. The town looked tiny below me. Furthermore, I realised I could see everything with amazing clarity — a lost kitten on Oak Street, a child's balloon stuck in a tree, and smoke rising from a bakery.

      I swooped down and rescued the kitten, freed the balloon, and told the baker that his oven was overheating. He said that I was an angel. People on the street pointed and cheered. I felt like a real superhero.

      However, trouble arrived when reporters started chasing me with cameras. I flew faster, but the wind grew stronger. I was losing control. I crashed into a pond in the park, completely soaked.

      By evening, I was exhausted. I crawled into bed, hoping the power would return tomorrow. But when I woke up, I was ordinary again. My mum asked why my shoes were muddy. I just smiled and said I had gone for a very long walk.
    modelAnswerZh: |
      那天早上我醒来，发现自己会飞了。一开始，我只是在床上方飘浮了几厘米。然后我升得更高，头撞到了天花板。太不可思议了！

      我从窗户溜了出去，在屋顶上方翱翔。小镇在我下方看起来很小。此外，我发现自己能以惊人的清晰度看到一切——橡树街上一只走失的小猫，一个孩子的气球卡在树上，还有面包店冒出的烟。

      我俯冲下去救了小猫，放了气球，并告诉面包师他的烤箱过热了。他说我是天使。街上的人们指着我欢呼。我感觉自己像一个真正的超级英雄。

      然而，当记者开始拿着相机追我时，麻烦来了。我飞得更快，但风越来越强。我失去了控制。我一头栽进了公园的池塘里，全身湿透。

      到了晚上，我精疲力竭。我爬上床，希望明天超能力会回来。但当我醒来时，我又是一个普通人了。妈妈问我为什么鞋上都是泥。我只是微笑着说我去散了一个很长的步。

