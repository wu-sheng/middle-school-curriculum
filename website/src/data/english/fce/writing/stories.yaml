    titleZh: '瓶中信'
    prompt: 'Your story must begin with this sentence: ''I picked up the old glass bottle from the sand and noticed there was a message inside.'''
    promptZh: '你的故事必须以这句话开头：''我从沙滩上捡起那个旧玻璃瓶，发现里面有一封信。'''
    targetWords: '140-190'
