      I picked up the old glass bottle from the sand and noticed there was a message inside. The paper was yellowed and the ink had faded, but I could still read the mysterious words: "Follow the rocks to the cave. The treasure was hidden there long ago."

      Immediately, I looked along the shoreline. A row of dark rocks stretched towards the cliffs. My best friend Lily was sitting nearby, so I showed her the note. "Let's go!" she said excitedly.

      As soon as we reached the cliffs, we spotted a narrow cave entrance behind the largest rock. Inside, the cave was cool and damp. We found an old wooden box covered in sand. When we opened it, we discovered dozens of beautiful seashells, each one painted with tiny pictures of ships and whales.

      Then we noticed a name carved on the lid: "Captain Rose, 1923." The shells had been collected by a young sea captain over a hundred years ago.

      We took the box to the local museum, where it was displayed proudly. Sometimes the best treasures are not gold — they are stories waiting to be found.
    modelAnswerZh: |
      我从沙滩上捡起那个旧玻璃瓶，发现里面有一封信。纸张已经泛黄，墨水也褪色了，但我仍然能读出那些神秘的文字："沿着岩石走到洞穴。宝藏很久以前就被藏在那里了。"

      我立刻望向海岸线。一排黑色的岩石向悬崖延伸。我最好的朋友莉莉就坐在附近，所以我给她看了这张纸条。"我们去吧！"她兴奋地说。

      我们一到悬崖，就在最大的岩石后面发现了一个狭窄的洞穴入口。洞里阴凉潮湿。我们找到了一个覆满沙子的旧木箱。打开后，我们发现了几十个美丽的贝壳，每一个上面都画着船只和鲸鱼的小图案。

      然后我们注意到箱盖上刻着一个名字："罗斯船长，1923年。"这些贝壳是一百多年前一位年轻的船长收集的。

      我们把箱子送到了当地的博物馆，在那里它被自豪地展出。有时候最好的宝藏不是金子——而是等待被发现的故事。

