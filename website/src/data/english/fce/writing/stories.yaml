      - '我的动词时态是否一致？'
    modelAnswer: |
      When I heard the museum doors lock behind me, I knew I was in trouble. I had been reading about ancient Egypt in the library corner and completely lost track of time. Now the enormous building was dark and silent.

      I switched on my phone torch and tiptoed through the dinosaur hall. The massive skeletons cast eerie shadows on the walls. In the distance, I heard a strange humming sound. My hands were trembling, but I followed the noise.

      Meanwhile, the humming grew louder. I turned a corner and gasped — what an incredible sight! The ancient Egyptian room was glowing with golden light. The painted figures on the walls seemed to be moving, dancing in a silent celebration.

      "Don't be afraid," said a gentle voice. A museum guide, who had also been locked in, stepped out from behind a pillar. "The special lighting system switches on automatically at midnight. Beautiful, isn't it?"

      Together, we found an emergency exit. As I walked home under the stars, I decided that getting locked in a museum was the best accident I had ever had.
    modelAnswerZh: |
      当我听到博物馆的门在身后锁上时，我知道麻烦来了。我一直在图书角阅读关于古埃及的内容，完全忘了时间。现在这座巨大的建筑一片漆黑和寂静。

      我打开手机手电筒，踮着脚穿过恐龙大厅。巨大的骨架在墙上投下诡异的影子。在远处，我听到一种奇怪的嗡嗡声。我的手在颤抖，但我还是循着声音走了过去。

      与此同时，嗡嗡声越来越大。我转过一个拐角，倒吸一口气——多么不可思议的景象！古埃及展厅正散发着金色的光芒。墙上的彩绘人物似乎在动，在无声的庆典中舞蹈。

      "别害怕，"一个温柔的声音说道。一位同样被锁在里面的博物馆导览员从柱子后面走了出来。"特殊的照明系统在午夜会自动开启。很美，不是吗？"

      我们一起找到了紧急出口。当我在星空下走回家时，我觉得被锁在博物馆里是我经历过的最美好的意外。

