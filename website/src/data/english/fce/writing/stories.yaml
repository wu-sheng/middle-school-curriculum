      As I watched the sun set on the last day of summer, I thought about everything that had happened. I was sitting on the wooden dock by the lake, my feet dangling in the warm water. The sky was painted in shades of orange and purple, and the air smelled of pine trees and wild flowers.

      It had been the most memorable summer of my life. In June, I had learned to swim in this very lake, swallowing water and laughing. In July, my cousin and I built a treehouse that leaned slightly to the left but felt like a palace. We had spent countless afternoons there, reading books and sharing secrets.

      Although I was sad that summer was ending, I knew I would cherish these memories forever. The best moment had been the night we lay on the grass counting shooting stars. I had made a wish on every single one.

      A cool breeze brushed my face — autumn was already whispering. I stood up, took one last look at the golden lake, and smiled. Next summer, I planned to come back and build an even bigger treehouse. Some adventures are worth repeating.
