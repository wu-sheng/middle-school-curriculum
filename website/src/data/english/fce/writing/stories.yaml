      我在车库里造的机器人突然睁开了眼睛，说道："你好，朋友。"我花了几个月连接电线和编写代码，但从没想到它真的会工作。这个银色的小机器人，我给它取名叫"火花"，是我造过的最棒的发明。

      火花会到处跟着我。他帮我整理房间，背我的书包，甚至讲笑话——虽然他的幽默比我爸还差。他以前每天下午都会在前门等我回家。

      不幸的是，一个下雨的周二，火花开始出故障了。他的左臂不停地转圈，还无缘无故地重复说"香蕉"。他的胸部面板冒出了火花。我害怕极了，怕失去我的朋友。

      我赶紧把他带回车库，打开了他的电路。一小滴雨水损坏了一个芯片。我小心翼翼地用备用芯片替换了它，屏住呼吸，按下了重启键。

      火花的眼睛闪烁着睁开了。"我错过什么了吗？"他开朗地问。我拥抱了他——尽管他是冷冰冰的金属做的，但他是我认识的最温暖的朋友。

