tasks:
  - id: W001
    type: story
    title: 'The Door in the Tree'
    titleZh: '树上的门'
    prompt: 'Your story must begin with this sentence: ''I never expected to find a door in the old oak tree.'''
    promptZh: '你的故事必须以这句话开头：''我从没想过会在那棵老橡树上发现一扇门。'''
    targetWords: '140-190'
    difficulty: 1
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe where you are and how you found the door.'
        openingZh: '描述你在哪里，以及你是如何发现这扇门的。'
        development: 'What happens when you open it? What do you see?'
        developmentZh: '打开门后发生了什么？你看到了什么？'
        climax: 'What problem or surprise do you encounter?'
        climaxZh: '你遇到了什么问题或惊喜？'
        resolution: 'How does the adventure end?'
        resolutionZh: '这次冒险是怎么结束的？'
      mustUseWords:
        - 'Eventually'
        - 'To my surprise'
        - 'extraordinary'
      mustUseStructure:
        - 'At least one relative clause (who/which/where)'
        - 'At least one past perfect sentence'
      mustUseStructureZh:
        - '至少一个定语从句（who/which/where）'
        - '至少一个过去完成时句子'
    selfCheckList:
      - 'Did I use at least 3 descriptive adjectives?'
      - 'Did I include dialogue?'
      - 'Did I organize my story into paragraphs?'
      - 'Are my verb tenses consistent?'
    selfCheckListZh:
      - '我是否使用了至少 3 个描写性形容词？'
      - '我是否包含了对话？'
      - '我是否把故事分了段落？'
      - '我的动词时态是否一致？'
    modelAnswer: |
      I never expected to find a door in the old oak tree. It was a golden autumn afternoon, and I had been exploring the woods behind my grandmother's cottage when I noticed something extraordinary half-hidden behind thick ivy.

      The door was small and wooden, with a rusty brass handle. My heart racing, I pulled it open. To my surprise, a narrow staircase spiralled downwards into soft, blue light. I stepped inside cautiously.

      At the bottom, I discovered an underground garden where glowing flowers swayed without any wind. A tiny creature, who looked like a fox with silver wings, approached me. "Welcome," it whispered. "We have been waiting for someone brave."

      It explained that their magical spring had dried up, and only a human child could restart it. I followed the creature to a crystal pool and dropped in a small stone, which I had picked up earlier. Water began bubbling immediately.

      Eventually, I climbed back up the staircase, promising to return. When I looked back, the door had vanished — but I knew exactly where to find it again.
    modelAnswerZh: |
      我从没想过会在那棵老橡树上发现一扇门。那是一个金色的秋天下午，我一直在外婆小屋后面的树林里探险，突然注意到一个半隐藏在浓密常春藤后面的非凡之物。

      那扇门又小又旧，有一个生锈的黄铜把手。我心跳加速，拉开了它。令我惊讶的是，一个狭窄的楼梯螺旋向下延伸，通向柔和的蓝色光芒。我小心翼翼地走了进去。

      在底部，我发现了一个地下花园，发光的花朵在没有风的情况下摇曳。一个像长着银色翅膀的狐狸一样的小生物向我走来。"欢迎，"它低声说。"我们一直在等待一个勇敢的人。"

      它解释说他们的魔法泉水已经干涸了，只有人类孩子才能让它重新运作。我跟着这个小生物来到一个水晶池边，投入了一块我之前捡到的小石头。水立刻开始冒泡。

      最终，我沿着楼梯爬了回去，并承诺会再回来。当我回头看时，门已经消失了——但我知道在哪里能再次找到它。

  - id: W002
    type: story
    title: 'The Talking Animal'
    titleZh: '会说话的动物'
    prompt: 'Your story must begin with this sentence: ''The cat on the garden wall looked straight at me and said, "Good morning."'''
    promptZh: '你的故事必须以这句话开头：''花园墙上的猫直直地看着我，说道："早上好。"'''
    targetWords: '140-190'
    difficulty: 1
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe the moment you hear the animal speak. How do you react?'
        openingZh: '描述你听到动物说话的那一刻。你有什么反应？'
        development: 'What does the animal want? Where does it take you?'
        developmentZh: '这只动物想要什么？它带你去哪里？'
        climax: 'What challenge or funny situation do you face together?'
        climaxZh: '你们一起面对什么挑战或有趣的情况？'
        resolution: 'What do you learn from the experience?'
        resolutionZh: '你从这次经历中学到了什么？'
      mustUseWords:
