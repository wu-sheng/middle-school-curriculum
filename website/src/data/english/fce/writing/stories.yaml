      当我看着夏天最后一天的日落时，我回想起了所发生的一切。我坐在湖边的木码头上，双脚悬在温暖的水中。天空被涂成了橙色和紫色的色调，空气中弥漫着松树和野花的芬芳。

      这是我人生中最难忘的夏天。六月，我就在这个湖里学会了游泳，呛着水笑个不停。七月，我和表姐建了一个略微向左倾斜但感觉像宫殿一样的树屋。我们在那里度过了无数个下午，读书和分享秘密。

      虽然我很难过夏天要结束了，但我知道我会永远珍惜这些记忆。最美好的时刻是那个我们躺在草地上数流星的夜晚。我对每一颗流星都许了一个愿望。

      一阵凉风拂过我的脸——秋天已经在低语。我站起来，最后看了一眼金色的湖面，微笑着。明年夏天，我打算回来建一个更大的树屋。有些冒险值得重来。
