        - 'Although'
        - 'remarkable'
      mustUseStructure:
        - 'At least one piece of direct speech'
        - 'At least one conditional sentence (If...)'
      mustUseStructureZh:
        - '至少一句直接引语'
        - '至少一个条件句（If...）'
    selfCheckList:
      - 'Did I use at least 3 descriptive adjectives?'
      - 'Did I include dialogue?'
      - 'Did I organize my story into paragraphs?'
      - 'Are my verb tenses consistent?'
    selfCheckListZh:
