    modelAnswer: |
      There was a brown package on the doorstep with no name on it — just the words "Open at midnight." I carried the peculiar box to my room and placed it on my desk. It was light but something rattled inside. Who could have sent it?

      I waited anxiously all evening. I had never received such a mysterious gift before. Nevertheless, when the clock struck twelve, I carefully tore off the wrapping paper. Inside was a small wooden music box with a folded note.

      I opened the lid and a gentle melody filled the room. The note read: "This belonged to your great-grandmother. She wanted you to have it when you turned nine. Wind it up and listen carefully." I wound the tiny handle, and a hidden drawer popped open at the bottom.

      Inside the drawer lay a faded photograph of a young woman standing beside the very oak tree in our garden. On the back, she had written: "Dream bravely, little one."

      The next morning, I asked my grandmother about it. She smiled with tears in her eyes and said, "She always knew you would be special." I have kept the music box beside my bed ever since.
    modelAnswerZh: |
      门口有一个棕色的包裹，上面没有名字——只有"午夜打开"几个字。我把这个奇怪的盒子搬到房间，放在书桌上。它很轻，但里面有东西在响。是谁寄的呢？

      我整个晚上都焦急地等待着。我以前从未收到过如此神秘的礼物。尽管如此，当时钟敲响十二点时，我小心翼翼地撕开了包装纸。里面是一个小小的木质音乐盒，还有一张折叠的纸条。

      我打开盖子，一段温柔的旋律充满了房间。纸条上写着："这是你曾祖母的东西。她希望你九岁时拥有它。上好发条，仔细聆听。"我转动小把手，底部弹出了一个隐藏的抽屉。

      抽屉里放着一张褪色的照片，一位年轻女子站在我们花园里那棵橡树旁。照片背面，她写道："勇敢地做梦吧，小家伙。"

      第二天早上，我向外婆问起这件事。她含泪微笑着说："她一直知道你会很特别。"从那以后，我一直把音乐盒放在床头。

