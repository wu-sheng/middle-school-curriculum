      - '我是否包含了对话？'
      - '我是否把故事分了段落？'
      - '我的动词时态是否一致？'
    modelAnswer: |
      The cat on the garden wall looked straight at me and said, "Good morning." I dropped my cereal bowl in shock. The orange cat, who had been visiting our garden for weeks, flicked its tail impatiently.

      "Don't just stand there," it continued. "I need your help. If you follow me, I'll explain everything." Although I thought I might be dreaming, curiosity won. I climbed over the wall and followed the remarkable creature down a cobblestone alley I had never noticed before.

      Suddenly, we arrived at a tiny square where dozens of cats sat in a circle. "Our fountain has stopped working," my cat explained. "We need human hands to turn the old valve." In the centre stood a beautiful stone fountain covered in moss.

      I knelt down and twisted the rusty valve with all my strength. Water burst out, and the cats meowed with joy. "Thank you," said my cat warmly.

      I walked home smiling. The next morning, the cat was on the wall again. It just winked — but said nothing. Perhaps some secrets are better kept between friends.
    modelAnswerZh: |
      花园墙上的猫直直地看着我，说道："早上好。"我惊得把麦片碗掉在了地上。这只来我们花园好几个星期的橘猫不耐烦地甩了甩尾巴。

      "别傻站着了，"它继续说道。"我需要你的帮助。如果你跟着我，我会解释一切。"虽然我觉得自己可能在做梦，但好奇心占了上风。我翻过墙，跟着这只非凡的生物走进了一条我从未注意过的鹅卵石小巷。

      突然，我们来到了一个小广场，几十只猫围成一圈坐着。"我们的喷泉坏了，"我的猫解释道。"我们需要人类的手来转动那个旧阀门。"广场中央矗立着一座长满苔藓的美丽石头喷泉。

      我跪下来，使尽全力拧那个生锈的阀门。水喷了出来，猫咪们高兴地叫了起来。"谢谢你，"我的猫温暖地说。

      我笑着走回了家。第二天早上，那只猫又在墙上了。它只是眨了眨眼——但什么也没说。也许有些秘密最好还是朋友之间保守。

  - id: W003
    type: story
    title: 'Lost in a Museum at Night'
    titleZh: '夜晚迷失在博物馆'
    prompt: 'Your story must begin with this sentence: ''When I heard the museum doors lock behind me, I knew I was in trouble.'''
    promptZh: '你的故事必须以这句话开头：''当我听到博物馆的门在身后锁上时，我知道麻烦来了。'''
    targetWords: '140-190'
