  - id: W093
    type: essay
    title: 'What Makes a Good Student?'
    titleZh: '什么造就了好学生？'
    prompt: 'Write an essay discussing what qualities make a good student. Give examples from your own experience.'
    promptZh: '写一篇议论文讨论什么品质造就了好学生。从你自己的经历中举例。'
    targetWords: '140-190'
    difficulty: 4
    relatedQuest: Q12
    timeLimit: '40 minutes'
    scaffold:
      brainstorming:
        topicZh: '好学生有哪些品质？'
        topic: 'What qualities make someone a good student?'
        forPoints:
          - 'Curiosity — asking questions and wanting to understand why'
          - 'Perseverance — not giving up when things are difficult'
          - 'Organisation — managing time and keeping good notes'
        forPointsZh:
          - '好奇心——提问并想了解为什么'
          - '坚持——在困难时不放弃'
          - '组织能力——管理时间和做好笔记'
      connectors:
        - 'In my experience...'
        - 'Equally important is...'
        - 'To sum up...'
      mustUseWords:
        - 'Equally'
        - 'perseverance'
        - 'essential'
      mustUseStructure:
        - 'At least one example from personal experience'
        - 'Introduction + 2 body paragraphs + conclusion'
      mustUseStructureZh:
        - '至少一个个人经历的例子'
        - '开头段 + 2个正文段 + 结尾段'
    selfCheckList:
      - 'Did I discuss at least three qualities?'
      - 'Did I include a personal example?'
      - 'Did I use varied vocabulary (not repeating "good" or "important")?'
      - 'Is my conclusion memorable?'
    selfCheckListZh:
      - '我是否讨论了至少三种品质？'
      - '我是否包含了个人经历的例子？'
      - '我是否使用了多样的词汇（不重复"good"或"important"）？'
      - '我的结论令人印象深刻吗？'
