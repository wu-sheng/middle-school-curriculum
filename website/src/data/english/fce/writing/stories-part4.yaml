      - '结尾的揭示是否令人惊讶但公平（之前有伏笔）？'
      - '我是否通过行动而非形容词来展示角色的情感？'
    modelAnswer: |
      The train was almost empty, so when a stranger sat down directly opposite me, I knew something unusual was about to happen. She was an old woman with silver hair, wearing a coat covered in tiny embroidered stars — the same stars I had seen in my dreams.

      She placed a small wooden box on the table between us. "I believe this belongs to you," she said softly. I stared at the box. It had my initials carved into the lid.

      "How do you know my name?" I asked hesitantly.

      She smiled. "Open it."

      Inside was a photograph — intriguing and impossible. It showed me standing in a garden I had never visited, next to a woman who looked exactly like her. Meanwhile, the train passed through a tunnel, and when the light returned, the photograph had changed. Now it showed me sitting on this very train.

      "Who are you?" I whispered.

      "Someone who has been waiting to meet you," she replied. The train slowed. She stood up. "Keep the box. You will understand when the time comes."

      She stepped off the train and vanished into the crowd. I looked at the photograph again. In the corner, barely visible, was tomorrow's date. Whatever was about to happen, this was only the beginning.
    modelAnswerZh: |
      火车几乎是空的，所以当一个陌生人直接坐在我对面时，我知道不寻常的事情即将发生。她是一位银发老妇人，穿着一件绣满小星星的外套——我在梦中见过同样的星星。

      她把一个小木盒放在我们之间的桌子上。"我相信这是属于你的，"她轻声说。我盯着盒子。盖子上刻着我的名字缩写。

      "你怎么知道我的名字？"我犹豫地问。

      她微笑着。"打开它。"

      里面是一张照片——引人入胜而不可能的。它显示我站在一个我从未去过的花园里，旁边是一个长得和她一模一样的女人。与此同时，火车驶过一条隧道，当光线回来时，照片变了。现在它显示我坐在这趟火车上。

      "你是谁？"我低声说。

      "一个等待见你的人，"她回答。火车减速了。她站了起来。"留着这个盒子。时候到了你就会明白。"

      她下了火车，消失在人群中。我又看了看照片。在角落里，几乎看不见的，是明天的日期。不管即将发生什么，这只是个开始。

  - id: W032
    type: story
    title: 'The Map That Led Nowhere'
    titleZh: '通向虚无的地图'
    prompt: 'Your story must begin with this sentence: ''I found the map tucked inside an old library book, and from the moment I unfolded it, I could not stop thinking about where it might lead.'''
    promptZh: '你的故事必须以这句话开头：''我在一本旧图书馆书里找到了这张地图，从我展开它的那一刻起，我就无法停止思考它可能通向哪里。'''
    targetWords: '140-190'
    difficulty: 3
    relatedQuest: Q05
    scaffold:
