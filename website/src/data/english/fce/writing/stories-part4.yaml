    modelAnswer: |
      Be careful what you wish for — that was what my grandmother always said, and I finally understood why. It started when I found a golden coin in the park and wished I could read everyone's thoughts.

      The next morning, it happened. In the classroom, I could hear every thought around me — every worry, every secret, every unkind opinion. My best friend was thinking that my new haircut looked strange. My teacher was worrying about her sick cat. A boy in the corner was desperately hoping nobody would notice he had been crying.

      By lunchtime, the noise was unbearable. I pressed my hands against my ears, but the thoughts kept flooding in. If only I had never made that wish.

      Nevertheless, something unexpected happened. I walked over to the crying boy and sat beside him. "Are you OK?" I asked. His face crumpled with relief. Nobody else had noticed. We talked for the whole lunch break.

      That evening, I held the coin and wished to be normal again. The voices stopped. But the consequences of my wish had taught me something I would never forget: you do not need to read minds to understand people — you just need to pay attention.
    modelAnswerZh: |
      小心你许的愿望——这是我奶奶总是说的话，我终于明白了为什么。一切始于我在公园里找到一枚金币，许愿能读懂每个人的想法。

      第二天早上，它实现了。在教室里，我能听到周围每个人的想法——每个担忧、每个秘密、每个不友好的看法。我最好的朋友在想我的新发型看起来很奇怪。我的老师在担心她生病的猫。角落里一个男孩拼命希望没有人注意到他哭过。

      到午饭时间，噪音已经无法忍受。我用手捂住耳朵，但想法不断涌入。要是我从来没有许过那个愿望就好了。

      然而，意想不到的事情发生了。我走到那个哭泣的男孩旁边坐下。"你还好吗？"我问。他的脸上露出如释重负的表情。其他人都没有注意到。我们聊了整个午休时间。

      那天晚上，我握着金币许愿恢复正常。声音停了。但愿望的后果教会了我一些我永远不会忘记的东西：你不需要读心术来理解别人——你只需要留心。

