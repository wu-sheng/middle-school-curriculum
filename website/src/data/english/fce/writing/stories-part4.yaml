        language: 'Uses rich sensory language and at least one simile effectively.'
        languageZh: '有效地使用丰富的感官语言和至少一个比喻。'
    selfCheckList:
      - 'Did I create a vivid summer setting using sensory details?'
      - 'Does the story have a clear emotional arc?'
      - 'Did I use at least one effective simile?'
      - 'Does the ending connect to the theme of change and memory?'
