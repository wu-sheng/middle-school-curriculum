      - '故事是否有清晰的情感弧线？'
      - '我是否使用了至少一个有效的比喻？'
      - '结局是否与变化和记忆的主题相连？'
    modelAnswer: |
      On the last day of summer, something happened that I would remember for the rest of my life. The morning was serene — golden sunlight warmed the grass, the air smelled of cut hay and ripe blackberries, and the lake was as smooth as a mirror.

      I was sitting on the old wooden dock, reluctantly thinking about school starting tomorrow, when a paper boat drifted towards me across the water. Inside was a note: "Look up."

      I looked up. On the opposite bank stood a girl about my age, waving. She shouted something, but the wind carried her words away. I waved back. She pointed at the sky.

      Gradually, I noticed what she was pointing at. Hundreds of monarch butterflies were crossing the lake, their orange wings catching the light like tiny flames. I had never seen anything so beautiful. They were migrating south — leaving summer behind, just like us.

      The girl on the far bank sat down and watched too. We did not speak. We did not need to. We just watched the butterflies until the last one disappeared over the hills.

      When I finally looked across the lake again, she had gone. But that memorable morning taught me something: sometimes the most extraordinary moments are the ones you share in silence with a stranger.
    modelAnswerZh: |
      在夏天的最后一天，发生了一件我余生都会记得的事。那天早上很宁静——金色的阳光温暖着草地，空气中弥漫着割过的干草和成熟黑莓的气味，湖面平静如镜。

      我不情愿地坐在旧木码头上，想着明天就要开学了，这时一只纸船从水面漂向我。里面有一张纸条："抬头看。"

      我抬头看。对岸站着一个和我差不多大的女孩，在挥手。她喊了什么，但风把她的话吹走了。我挥手回应。她指向天空。

      渐渐地，我注意到她指着什么。数百只帝王蝶正在穿越湖面，它们橙色的翅膀在阳光下闪耀，像微小的火焰。我从未见过如此美丽的景象。它们正在向南迁徙——和我们一样，告别夏天。

      远岸的女孩也坐下来看。我们没有说话。我们不需要。我们只是看着蝴蝶，直到最后一只消失在山丘后面。

      当我最后再看向湖对岸时，她已经走了。但那个难忘的早晨教会了我一些东西：有时最非凡的时刻是你和一个陌生人在沉默中分享的时刻。

