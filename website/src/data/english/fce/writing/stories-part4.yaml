  - id: W030
    type: story
    title: 'The Sound in the Attic'
    titleZh: '阁楼里的声音'
    prompt: 'Your story must begin with this sentence: ''I had always been told never to go into the attic, but that night I heard something up there that I could not ignore.'''
    promptZh: '你的故事必须以这句话开头：''我一直被告知不要去阁楼，但那天晚上我听到了上面传来的声音，我无法忽视。'''
    targetWords: '140-190'
    difficulty: 2
    relatedQuest: Q05
    scaffold:
      storyMap:
        opening: 'Describe the sound — what does it sound like? Use at least two senses.'
        openingZh: '描述那个声音——它听起来像什么？使用至少两种感官。'
        development: 'You climb the stairs to the attic. What do you see, hear, and feel on the way up? Build tension.'
        developmentZh: '你爬楼梯去阁楼。上去的路上你看到、听到、感受到什么？制造紧张感。'
        climax: 'You open the attic door and discover something unexpected — not dangerous, but surprising.'
        climaxZh: '你打开阁楼门，发现了意想不到的东西——不是危险的，但令人惊讶。'
        resolution: 'What do you learn? How does this discovery change how you feel about the attic?'
        resolutionZh: '你学到了什么？这个发现如何改变你对阁楼的感受？'
      mustUseWords:
        - 'creep'
        - 'glimpse'
        - 'eerie'
        - 'relief'
      mustUseStructure:
        - 'At least two short sentences in a row for tension'
        - 'At least one sentence using past perfect (had + past participle)'
      mustUseStructureZh:
        - '至少两个连续的短句来制造紧张感'
        - '至少一个使用过去完成时的句子（had + 过去分词）'
      rubric:
        content: 'The story builds suspense effectively before the attic discovery, and the ending gives a satisfying twist or emotional resolution.'
        contentZh: '故事在阁楼发现之前有效地制造了悬念，结局给出了令人满意的反转或情感解决。'
        language: 'Uses sensory details to create an eerie atmosphere and correctly uses narrative tenses throughout.'
        languageZh: '使用感官细节创造阴森的氛围，并在整个叙述中正确使用叙事时态。'
    selfCheckList:
      - 'Did I describe the attic sounds using at least two senses?'
      - 'Did I build tension using short sentences before the climax?'
      - 'Is the discovery surprising but believable?'
      - 'Did I use past perfect for backstory?'
    selfCheckListZh:
      - '我是否用至少两种感官描述了阁楼的声音？'
      - '我是否在高潮前用短句制造了紧张感？'
      - '发现是否令人惊讶但可信？'
      - '我是否使用了过去完成时来描述背景？'
    modelAnswer: |
      I had always been told never to go into the attic, but that night I heard something up there that I could not ignore. It was a soft tapping sound, like fingertips on glass, followed by a low hum that made the ceiling vibrate.

      I crept up the narrow staircase. Each step groaned beneath my weight. The air grew colder. At the top, an eerie glow seeped from under the door. I reached for the handle. My heart was hammering. I pushed the door open.

      Inside, moonlight flooded through a broken skylight I had never known existed. Beneath it sat an old gramophone — the kind my grandmother had described but I had never seen. The wind was turning the disc, producing that strange humming sound. Beside it lay a shoebox filled with letters, tied with a faded ribbon.

      I caught a glimpse of my grandmother's handwriting on the first envelope. They were love letters, written before she married Grandad. A wave of relief washed over me — there was no ghost, just a forgotten piece of family history waiting to be found.

      I carried the box downstairs, smiling. The attic was no longer frightening. It was a treasure chest.
    modelAnswerZh: |
      我一直被告知不要去阁楼，但那天晚上我听到了上面传来的声音，我无法忽视。那是一种轻轻的敲击声，像指尖敲在玻璃上，接着是一阵低沉的嗡嗡声，让天花板都在震动。

      我悄悄爬上狭窄的楼梯。每一级都在我脚下吱呀作响。空气越来越冷。在顶部，一道怪异的光从门缝下渗出。我伸手去拿门把手。我的心跳得厉害。我推开了门。

      里面，月光透过一扇我从来不知道存在的破旧天窗倾泻而入。下面放着一台老式留声机——我祖母曾描述过但我从未见过的那种。风在转动唱片，发出那种奇怪的嗡嗡声。旁边放着一个鞋盒，里面装满了信件，用褪色的丝带系着。

      我瞥见了第一个信封上祖母的笔迹。那是情书，写在她嫁给爷爷之前。一阵如释重负的感觉涌上心头——没有鬼，只是一段被遗忘的家族历史在等待被发现。

      我微笑着把盒子带下了楼。阁楼不再令人恐惧。它是一个宝箱。

