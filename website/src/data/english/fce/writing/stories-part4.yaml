    modelAnswer: |
      I had exactly ten minutes to save them, and the clock was already ticking. The river had risen after the storm, and two small foxes were trapped on a rock in the middle, the water swirling around them.

      Seven minutes. I desperately searched for something to reach them with. A fallen branch — too short. A rope from Dad's shed — too far away. The water was rising fast.

      Five minutes. I was on the verge of giving up when I spotted the old wooden gate leaning against the fence. It was long enough to reach the rock. I dragged it to the riverbank and slid it across the water like a bridge.

      Three minutes. The gate held. I crawled across on my hands and knees, the river roaring beneath me. The foxes trembled but did not run. I scooped them into my jacket.

      One minute. I crawled back. The gate cracked. I threw myself onto the bank just as the wood shattered and was swept away.

      Safe. I opened my jacket. Two pairs of bright eyes blinked up at me. I smiled triumphantly, my heart still pounding. I had never felt so alive — or so grateful for a broken gate.
    modelAnswerZh: |
      我恰好有十分钟来救他们，时钟已经开始倒计时了。暴风雨过后河水上涨了，两只小狐狸被困在中间的一块岩石上，水在它们周围打旋。

      七分钟。我拼命寻找能够到它们的东西。一根倒下的树枝——太短了。爸爸棚里的绳子——太远了。水在迅速上涨。

      五分钟。我即将放弃时，看到了靠在围栏上的旧木门。它够长，能到达岩石。我把它拖到河岸，像桥一样滑过水面。

      三分钟。木门撑住了。我用手和膝盖爬过去，河水在下面咆哮。狐狸们颤抖着但没有跑。我把它们捧进了我的夹克。

      一分钟。我爬了回来。木门裂了。我扑到岸上的同时，木头碎裂被冲走了。

      安全了。我打开夹克。两双明亮的眼睛眨着看我。我得意洋洋地笑了，心跳还在砰砰作响。我从未感觉如此有活力——或如此感激一扇破木门。

