        development: 'You follow the map. What do you encounter along the way?'
        developmentZh: '你按照地图走。一路上你遇到了什么？'
        climax: 'You reach the spot marked X. What you find is not treasure — it is something more meaningful.'
        climaxZh: '你到达标记X的地点。你找到的不是宝藏——而是更有意义的东西。'
        resolution: 'What does the discovery teach you? You return the map to the library — for the next person to find.'
        resolutionZh: '这个发现教会了你什么？你把地图放回图书馆——让下一个人去发现。'
      mustUseWords:
