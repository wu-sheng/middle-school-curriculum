    modelAnswer: |
      There had never been a door at the end of the corridor before, but when I arrived at school that Monday morning, there it was. It was painted deep red — an ominous colour against the white walls — and it had no handle, only a small brass keyhole.

      Nobody else seemed to notice it. I asked my teacher, but she looked bewildered and said, "What door?" I looked again. It was still there. I could feel warmth radiating from behind it, like summer air leaking through a crack.

      At lunchtime, I pressed my hand against the wood. All of a sudden, it swung open.

      Light. Blinding, golden light. I stepped through.

      I was standing in a version of my classroom — but everything was different. The walls were covered in paintings I had made as a child. My old stories hung from the ceiling like paper birds. And sitting at the teacher's desk was a future version of myself, older, smiling, holding a book with my name on the cover.

      She looked up. "Keep writing," she said. "It will be worth it."

      The door closed behind me. I was back in the corridor. The door was gone. But her words astonished me — and I have never stopped writing since.
    modelAnswerZh: |
      走廊尽头以前从来没有门，但当我那个星期一早上到学校时，它就在那里。它被漆成深红色——在白色墙壁上显得不祥——没有把手，只有一个小小的黄铜钥匙孔。

      其他人似乎都没注意到它。我问老师，但她困惑地说："什么门？"我又看了看。它还在那里。我能感觉到它后面散发出温暖，像夏天的空气从缝隙中漏出来。

      午饭时间，我把手按在木头上。突然间，它开了。

      光。炫目的，金色的光。我走了进去。

      我站在一个版本的教室里——但一切都不同了。墙上贴满了我小时候画的画。我的旧故事像纸鸟一样挂在天花板上。坐在讲台后面的是一个未来版本的我，更大了，微笑着，手里拿着一本封面上有我名字的书。

      她抬起头。"继续写下去，"她说。"这会值得的。"

      门在我身后关上了。我回到了走廊。门消失了。但她的话让我震惊——从那以后我再也没有停止写作。

