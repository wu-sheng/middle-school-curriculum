    modelAnswer: |
      My grandfather was the best storyteller I ever knew, and the last story he told me changed everything. When he spoke, his eyes sparkled and his hands danced through the air, painting pictures that only he could see. His stories were always captivating — I could listen for hours.

      One autumn evening, he leaned forward in his chair and said, "Let me tell you about a boy who was afraid to try." His voice was soft, almost nostalgic. "This boy loved to draw, but he hid his sketchbook because he thought his pictures were not good enough. One day, a teacher found the sketchbook and said, 'These are wonderful. Why do you hide them?' The boy said, 'Because I am afraid people will laugh.'"

      Gradually, I realised the story was familiar. The teacher's words, the hidden sketchbook — these were details from my own life. The boy in the story was me.

      Grandfather placed his hand on mine. "The teacher was right," he said quietly. "You have a gift. Do not hide it because you are afraid."

      His words inspired me in a way no other advice ever had. I went home, took out my sketchbook, and showed my drawings to my family for the very first time.
    modelAnswerZh: |
      我爷爷是我认识的最好的讲故事的人，他给我讲的最后一个故事改变了一切。当他说话时，他的眼睛闪闪发光，双手在空中舞动，描绘着只有他才能看到的画面。他的故事总是令人着迷——我可以听上好几个小时。

      一个秋天的傍晚，他在椅子上向前倾身说："让我给你讲一个害怕尝试的男孩的故事。"他的声音轻柔，几乎带着怀旧。"这个男孩喜欢画画，但他把素描本藏起来，因为他觉得自己的画不够好。有一天，一位老师发现了素描本说：'这些很棒。你为什么要藏起来？'男孩说：'因为我害怕别人笑话。'"

      渐渐地，我意识到这个故事很熟悉。老师的话，隐藏的素描本——这些都是我自己生活中的细节。故事里的男孩就是我。

      爷爷把手放在我的手上。"老师说得对，"他轻声说。"你有天赋。不要因为害怕就把它藏起来。"

      他的话以任何其他建议都无法做到的方式激励了我。我回家拿出素描本，第一次向家人展示了我的画。
