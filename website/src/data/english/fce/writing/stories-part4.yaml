        development: 'Something happens — a new person, a discovery, or a challenge.'
        developmentZh: '发生了什么——一个新的人、一个发现或一个挑战。'
        climax: 'The most important or emotional moment of the story.'
        climaxZh: '故事中最重要或最感动的时刻。'
