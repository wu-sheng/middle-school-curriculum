      - 'Did I use narrative connectors to link events smoothly?'
      - 'Is the discovery meaningful, not just a physical object?'
      - 'Does the ending connect back to the beginning?'
    selfCheckListZh:
      - '我是否用至少三种感官描述了旅程？'
      - '我是否使用了叙事连接词来流畅地连接事件？'
      - '发现是否有意义，而不仅仅是一个物品？'
      - '结局是否与开头呼应？'
    modelAnswer: |
      I found the map tucked inside an old library book, and from the moment I unfolded it, I could not stop thinking about where it might lead. It was hand-drawn in vivid colours — blue rivers, green hills, and a red X beside a tree labelled "The Listening Oak."

      The next morning, filled with anticipation, I set off. The map led me through streets I had walked a thousand times, but gradually I noticed details I had never seen before — a carved face on a gatepost, a hidden garden behind a wall, a stream running under the pavement.

      Eventually, I reached a park I had never visited. Birds were singing in the ancient trees, and sunlight was filtering through the leaves like golden rain. In the centre stood an enormous oak tree with a hollow at its base. Inside the hollow was a notebook.

      I opened it. On the first page was written: "If you found this, sit beneath the tree and listen. Write what you hear." I sat down, closed my eyes, and listened. Wind. Birds. My own breathing. Gradually, the noise of the city faded completely.

      For the first time in months, my mind was quiet.

      I wrote a single line in the notebook, then tucked the map back inside the library book — ready for the next person who needed to find silence.
    modelAnswerZh: |
      我在一本旧图书馆书里找到了这张地图，从我展开它的那一刻起，我就无法停止思考它可能通向哪里。它是用生动的颜色手绘的——蓝色的河流、绿色的山丘，还有一个标着"倾听橡树"的树旁的红色X。

      第二天早上，满怀期待，我出发了。地图带我穿过我走过上千次的街道，但渐渐地我注意到了以前从未见过的细节——门柱上的雕刻面孔、墙后隐藏的花园、人行道下流淌的小溪。

      终于，我到达了一个我从未去过的公园。鸟儿在古老的树上歌唱，阳光穿过树叶像金色的雨。中间矗立着一棵巨大的橡树，底部有一个树洞。树洞里有一本笔记本。

      我打开它。第一页上写着："如果你找到了这个，坐在树下听听。写下你听到的。"我坐下来，闭上眼睛，听。风。鸟。我自己的呼吸。渐渐地，城市的噪音完全消退了。

      几个月来第一次，我的心安静了。

      我在笔记本上写了一行字，然后把地图夹回图书馆的书里——为下一个需要寻找宁静的人准备好。

